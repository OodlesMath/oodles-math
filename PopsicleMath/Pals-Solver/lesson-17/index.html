    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Poppins', sans-serif; 
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            overflow-x: hidden;
            background-color: #69d2ff; /* Fallback color for the sky */
        }

        /* Duolingo style 3D button effect classes used in Tailwind */
        .duo-btn {
            transition: all 0.1s ease-in-out;
        }
        .duo-btn:active:not(:disabled) {
            transform: translateY(4px);
            border-bottom-width: 0px !important;
            margin-top: 4px;
        }

        /* Colorful text animation */
        .rainbow-text {
            background: linear-gradient(to right, #ff4b4b, #ffc800, #58cc02, #1cb0f6, #ce82ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 300% 300%;
            animation: rainbow 5s ease infinite;
        }

        @keyframes rainbow { 
            0%{background-position:0% 50%}
            50%{background-position:100% 50%}
            100%{background-position:0% 50%}
        }

        /* Floating animation for icons */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }



        /* Tap Balloon bonus game */
        @keyframes balloon-rise {
            0% { transform: translate3d(0, 120px, 0) rotate(-4deg); }
            50% { transform: translate3d(12px, -55vh, 0) rotate(4deg); }
            100% { transform: translate3d(-8px, -125vh, 0) rotate(-3deg); }
        }
        @keyframes balloon-wobble {
            0%, 100% { margin-left: -5px; }
            50% { margin-left: 5px; }
        }
        .balloon-rise {
            animation-name: balloon-rise;
            animation-timing-function: linear;
            animation-fill-mode: forwards;
            will-change: transform;
        }
        .balloon-body {
            animation: balloon-wobble 1.8s ease-in-out infinite;
        }

        /* Custom scrollbar for mobile overflow */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
    </style>
</head>

        // Audio Context for Sound Effects
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        const playSound = (type) => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;

            if (type === 'click') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'correct') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(440, now); // A4
                osc.frequency.setValueAtTime(554.37, now + 0.1); // C#5
                osc.frequency.setValueAtTime(659.25, now + 0.2); // E5
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(150, now + 0.3);
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'win') {
                osc.type = 'square';
                [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                    osc.frequency.setValueAtTime(freq, now + (i * 0.15));
                });
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.8);
                osc.start(now);
                osc.stop(now + 0.8);
            }
        };

        const speakText = (text) => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85; 
                utterance.pitch = 1.1; 
                window.speechSynthesis.speak(utterance);
            }
        };

        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function generateUniqueNumbers(diff, usedSets) {
            let a, b, c;
            let isValid = false;
            let key = "";
            let attempts = 0;
            
            while (!isValid && attempts < 100) {
                if (diff === 10) {
                    c = randomInt(3, 10);
                    a = randomInt(1, c - 1);
                    b = c - a;
                } else if (diff === 20) {
                    c = randomInt(5, 20);
                    a = randomInt(1, c - 1);
                    b = c - a;
                } else if (diff === 50) {
                    c = randomInt(10, 50);
                    a = randomInt(1, c - 1);
                    b = c - a;
                }
                
                isValid = (a !== b && a !== 0 && b !== 0);
                
                if (isValid) {
                    key = [a, b, c].sort((x, y) => x - y).join(',');
                    if (usedSets.has(key)) {
                        isValid = false; // Already used this combination
                    }
                }
                attempts++;
            }
            return [a, b, c].sort(() => Math.random() - 0.5);
        }

        function buildQuestionBank(diff, count = 5) {
            const used = new Set();
            const bank = [];
            while (bank.length < count) {
                const nums = generateUniqueNumbers(diff, used);
                const key = [...nums].sort((a, b) => a - b).join(',');
                if (!used.has(key)) {
                    used.add(key);
                    bank.push(nums);
                }
            }
            return bank;
        }

        const Cell = ({ val, isActive, onClick, isCorrectRow }) => {
            const isEmpty = val === null;
            
            let baseStyles = "flex items-center justify-center font-extrabold leading-none select-none transition-all duration-200 rounded-2xl w-[4.55rem] h-[4.55rem] md:w-[5rem] md:h-[5rem] text-[2.1rem] md:text-[2.75rem] ";
            
            if (isCorrectRow) {
                // Correctly verified row cells
                baseStyles += "bg-[#d7ffb8] text-[#58cc02] border-4 border-solid border-[#58cc02] cursor-default";
            } else if (isActive) {
                // Currently focused active cell
                baseStyles += "bg-[#ddf4ff] text-[#1cb0f6] border-4 border-solid border-[#1cb0f6] scale-110 shadow-lg cursor-pointer";
            } else if (isEmpty) {
                // Empty, untouched cell waiting for input
                baseStyles += "bg-[#fffdf0] border-4 border-dashed border-[#ffc800] text-transparent hover:bg-[#fff9c4] cursor-pointer";
            } else {
                // Filled cell waiting to be checked
                baseStyles += "bg-white text-[#3c3c3c] border-4 border-solid border-[#e5e5e5] border-b-[6px] hover:border-[#d4d4d4] cursor-pointer";
            }

            return (
                <div onClick={onClick} className={baseStyles}>
                    {val !== null ? val : ''}
                </div>
            );
        };

        const OperatorCell = ({ op }) => {
            return (
                <div className="flex items-center justify-center font-extrabold select-none rounded-full w-[2.8rem] h-[2.8rem] md:w-[3.35rem] md:h-[3.35rem] text-[1.55rem] md:text-[2.45rem] text-[#a855f7] bg-[#f3e8ff] border-2 border-[#d8b4fe] shadow-sm">
                    {op}
                </div>
            );
        };

        const FactRow = ({ index, rowData, focusedCell, onCellClick }) => {
            const { inputs, status, message } = rowData;

            let rowBg = 'bg-white bg-opacity-80 backdrop-blur-sm border-[#e5e5e5] border-b-[6px]';
            
            // Highlight entire row if it contains the currently focused cell
            if (focusedCell && focusedCell.r === index && status !== 'correct') {
                rowBg = 'bg-[#f0f9ff] border-[#1cb0f6] border-b-[6px] shadow-sm scale-[1.01]';
            }
            
            if (status === 'correct') {
                rowBg = 'bg-[#d7ffb8] border-[#58cc02] border-b-[6px]';
            }
            if (status === 'wrong' || status === 'unrelated' || status === 'same') {
                rowBg = 'bg-[#ffdfe0] border-[#ff4b4b] border-b-[6px]';
            }

            const isCorrectRow = status === 'correct';
            const operator = index < 2 ? '+' : '−';

            const cells = [0, 1, 2].map((cIndex) => {
                const isActive = focusedCell && focusedCell.r === index && focusedCell.c === cIndex;
                return (
                    <Cell 
                        key={`v${cIndex}`} 
                        val={inputs[cIndex]} 
                        isActive={isActive} 
                        isCorrectRow={isCorrectRow}
                        onClick={() => onCellClick(index, cIndex)}
                    />
                );
            });

            return (
                <div className={`relative flex items-center justify-between px-3 md:px-7 py-3 md:py-4 rounded-[1.7rem] md:rounded-3xl border-4 w-full max-w-[100%] md:max-w-[98%] mx-auto transition-all duration-300 ${rowBg}`}>
                    {cells[0]}
                    <OperatorCell key="op" op={operator} />
                    {cells[1]}
                    <div key="eq" className="text-[#3c3c3c] text-[2.7rem] md:text-[3.15rem] font-extrabold w-10 md:w-14 flex justify-center drop-shadow-sm">=</div>
                    {cells[2]}

                    {/* Status Icons */}
                    {status === 'correct' && (
                        <div className="absolute top-1/2 -translate-y-1/2 -right-2 md:-right-6 z-10 animate-bounce">
                            <svg className="w-8 h-8 md:w-12 md:h-12 text-[#58cc02] bg-white rounded-full p-1 shadow-md border-2 border-[#58cc02]" fill="currentColor" viewBox="0 0 20 20">
                                <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" />
                            </svg>
                        </div>
                    )}
                    {(status === 'wrong' || status === 'unrelated') && (
                        <div className="absolute top-1/2 -translate-y-1/2 -right-2 md:-right-6 z-10 animate-pulse">
                            <svg className="w-8 h-8 md:w-12 md:h-12 text-[#ff4b4b] bg-white rounded-full p-1 shadow-md border-2 border-[#ff4b4b]" fill="currentColor" viewBox="0 0 20 20">
                                <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clipRule="evenodd" />
                            </svg>
                        </div>
                    )}
                    {/* Error Tooltips */}
                    {status === 'same' && (
                        <div className="absolute -top-10 right-0 bg-white border-2 border-[#ff4b4b] text-[#ff4b4b] font-bold px-3 py-1 rounded-xl text-sm md:text-base shadow-lg z-20">
                            Already found!
                        </div>
                    )}
                    {status === 'unrelated' && (
                        <div className="absolute -top-10 right-0 bg-white border-2 border-[#ff4b4b] text-[#ff4b4b] font-bold px-3 py-1 rounded-xl text-sm md:text-base shadow-lg z-20">
                            Use all 3 numbers!
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('splash'); // splash, game, summary
            const [difficulty, setDifficulty] = useState(null);
            const [score, setScore] = useState(0);
            const [round, setRound] = useState(1);
            
            const [usedGameSets, setUsedGameSets] = useState(new Set()); 
            const [questionBank, setQuestionBank] = useState([]);
            const [currentNumbers, setCurrentNumbers] = useState([]);
            
            const [rows, setRows] = useState([]);
            const [focusedCell, setFocusedCell] = useState(null); // { r: 0, c: 0 }
            const [checkResult, setCheckResult] = useState(null);

            const [miniGameOpen, setMiniGameOpen] = useState(false);
            const [miniGameOver, setMiniGameOver] = useState(false);
            const [miniGameScore, setMiniGameScore] = useState(0);
            const [balloons, setBalloons] = useState([]);
            const balloonIdRef = useRef(0);

            const instructionText = "Fill in the missing numbers to complete the fact family!";

            // Auto-read voice on game round load
            useEffect(() => {
                if (view === 'game') {
                    const timer = setTimeout(() => {
                        speakText(instructionText);
                    }, 500);
                    return () => clearTimeout(timer);
                }
            }, [view, round]);

            useEffect(() => {
                if (!miniGameOpen || miniGameOver) return;

                const colors = ['#ff5c7d', '#1cb0f6', '#58cc02', '#ce82ff', '#ffc800', '#ff8f3d'];
                const spawnBalloon = () => {
                    const id = ++balloonIdRef.current;
                    const isFire = Math.random() < 0.22;
                    const balloon = {
                        id,
                        x: 7 + Math.random() * 82,
                        duration: 8 + Math.random() * 4,
                        size: 66 + Math.random() * 28,
                        color: isFire ? '#ff4b4b' : colors[Math.floor(Math.random() * colors.length)],
                        isFire
                    };
                    setBalloons(prev => [...prev.slice(-17), balloon]);
                };

                spawnBalloon();
                const interval = setInterval(spawnBalloon, 950);
                return () => clearInterval(interval);
            }, [miniGameOpen, miniGameOver]);

            const makeEmptyRows = () => Array(4).fill(null).map(() => ({
                inputs: [null, null, null],
                status: null,
                message: null
            }));

            const loadQuestion = (bank, questionNumber, diff, currentScore) => {
                const selected = bank[questionNumber - 1];
                setCurrentNumbers(selected);
                setRows(makeEmptyRows());
                setFocusedCell({ r: 0, c: 0 });
                setCheckResult(null);
                setDifficulty(diff);
                setScore(currentScore);
                setRound(questionNumber);
                setView('game');
            };

            const startGame = (diffObj) => {
                playSound('click');
                const bank = buildQuestionBank(diffObj.val, TOTAL_ROUNDS);
                setQuestionBank(bank);
                setUsedGameSets(new Set(bank.map(nums => [...nums].sort((a,b) => a-b).join(','))));
                setMiniGameOpen(false);
                setMiniGameOver(false);
                setMiniGameScore(0);
                setBalloons([]);
                loadQuestion(bank, 1, diffObj.val, 0);
            };

            const handleNextQuestion = () => {
                playSound('click');
                setMiniGameOpen(false);
                setMiniGameOver(false);
                setMiniGameScore(0);
                setBalloons([]);
                setCheckResult(null);

                if (round < TOTAL_ROUNDS) {
                    loadQuestion(questionBank, round + 1, difficulty, score);
                } else {
                    playSound('win');
                    setView('summary');
                    triggerRealisticConfetti();
                }
            };

            const openBalloonGame = () => {
                playSound('click');
                setCheckResult(null);
                setMiniGameScore(0);
                setMiniGameOver(false);
                setBalloons([]);
                setMiniGameOpen(true);
            };

            const handleBalloonTap = (balloon) => {
                if (miniGameOver) return;
                setBalloons(prev => prev.filter(item => item.id !== balloon.id));
                if (balloon.isFire) {
                    playSound('wrong');
                    setMiniGameOver(true);
                    return;
                }
                playSound('click');
                setMiniGameScore(prev => prev + 1);
            };

            const handleCellClick = (rIndex, cIndex) => {
                if (checkResult) return;
                
                if (rows[rIndex].status === 'correct') return;
                
                playSound('click');
                setFocusedCell({ r: rIndex, c: cIndex });
            };

            const handleInput = (val) => {
                if (!focusedCell || checkResult) return;
                playSound('click');

                const { r, c } = focusedCell;
                if (rows[r].status === 'correct') return;

                const newRows = [...rows];
                newRows[r].inputs[c] = val;
                setRows(newRows);

                advanceFocus(newRows, r, c);
            };

            const advanceFocus = (currentRows, currR, currC) => {
                let next = null;
                for (let i = 0; i < 12; i++) {
                    const flatIndex = (currR * 3 + currC + 1 + i) % 12;
                    const r = Math.floor(flatIndex / 3);
                    const c = flatIndex % 3;
                    
                    if (currentRows[r].status !== 'correct' && currentRows[r].inputs[c] === null) {
                        next = { r, c };
                        break;
                    }
                }
                setFocusedCell(next);
            };

            const handleUndo = () => {
                if (checkResult) return;
                playSound('click');
                
                const newRows = [...rows];
                
                if (focusedCell && newRows[focusedCell.r].inputs[focusedCell.c] !== null) {
                    newRows[focusedCell.r].inputs[focusedCell.c] = null;
                    setRows(newRows);
                    return;
                }
                
                let startR = focusedCell ? focusedCell.r : 3;
                let startC = focusedCell ? focusedCell.c : 2;
                let prev = null;
                
                for (let i = 1; i < 13; i++) {
                    const flatIndex = (startR * 3 + startC - i + 12) % 12;
                    const pr = Math.floor(flatIndex / 3);
                    const pc = flatIndex % 3;
                    if (newRows[pr].status !== 'correct' && newRows[pr].inputs[pc] !== null) {
                        prev = { r: pr, c: pc };
                        break;
                    }
                }
                
                if (prev) {
                    newRows[prev.r].inputs[prev.c] = null;
                    setRows(newRows);
                    setFocusedCell(prev);
                }
            };

            const handleCheck = () => {
                const isFull = rows.every(r => r.inputs.every(v => v !== null));
                if (!isFull) return;

                const newRows = [...rows];
                let allCorrect = true;
                let validFacts = new Set();
                const givenSorted = [...currentNumbers].sort((a,b) => a-b).join(',');

                for (let i = 0; i < 4; i++) {
                    const r = newRows[i];
                    const [v1, v2, v3] = r.inputs;

                    const v1Num = Number(v1);
                    const v2Num = Number(v2);
                    const v3Num = Number(v3);

                    const usedSorted = [v1Num, v2Num, v3Num].sort((a,b) => a-b).join(',');
                    if (usedSorted !== givenSorted) {
                        r.status = 'unrelated';
                        allCorrect = false;
                        continue;
                    }

                    const op = i < 2 ? '+' : '−';
                    let mathCorrect = false;
                    if (op === '+') mathCorrect = (v1Num + v2Num === v3Num);
                    if (op === '−') mathCorrect = (v1Num - v2Num === v3Num);

                    if (!mathCorrect) {
                        r.status = 'wrong';
                        allCorrect = false;
                        continue;
                    }

                    const factStr = `${v1Num}${op}${v2Num}=${v3Num}`; 
                    if (validFacts.has(factStr)) {
                        r.status = 'same';
                        allCorrect = false;
                    } else {
                        validFacts.add(factStr);
                        r.status = 'correct';
                    }
                }

                setRows(newRows);
                setFocusedCell(null); 

                if (allCorrect) {
                    playSound('correct');
                    setCheckResult('wellDone');
                    setScore(score + 1);
                } else {
                    playSound('wrong');
                    setCheckResult('tryAgain');
                }
            };

            const handleTryAgain = () => {
                playSound('click');
                let firstEmpty = null;
                
                const newRows = rows.map((r, rIndex) => {
                    if (r.status !== 'correct') {
                        if (!firstEmpty) firstEmpty = { r: rIndex, c: 0 };
                        return { ...r, inputs: [null, null, null], status: null, message: null };
                    }
                    return r;
                });
                
                setRows(newRows);
                setFocusedCell(firstEmpty);
                setCheckResult(null);
            };

            const triggerRealisticConfetti = () => {
                const duration = 4000;
                const end = Date.now() + duration;

                const colors = ['#ff4b4b', '#ffc800', '#58cc02', '#1cb0f6', '#ce82ff'];

                (function frame() {
                    confetti({
                        particleCount: 4,
                        angle: 60,
                        spread: 60,
                        origin: { x: 0, y: 0.8 },
                        colors: colors,
                        zIndex: 99999
                    });
                    confetti({
                        particleCount: 4,
                        angle: 120,
                        spread: 60,
                        origin: { x: 1, y: 0.8 },
                        colors: colors,
                        zIndex: 99999
                    });

                    if (Date.now() < end) {
                        requestAnimationFrame(frame);
                    }
                }());
            };

            const renderSplash = () => (
                <div className="flex flex-col items-center justify-center w-full min-h-screen p-4 md:p-8 relative overflow-hidden">
                    
                    {/* Empty placeholder div reserved for Logo placement later */}
                    <div className="absolute top-4 right-4 w-16 h-16 md:w-24 md:h-24 z-50"></div>

                    <div className="animate-float mb-8 mt-12 md:mt-0 drop-shadow-lg">
                        <h1 className="text-5xl md:text-7xl font-black text-center rainbow-text px-4 leading-tight drop-shadow-[0_2px_4px_rgba(255,255,255,0.8)]">
                            Number Fact Families
                        </h1>
                        <p className="text-center text-[#1cb0f6] drop-shadow-sm font-bold mt-4 text-xl md:text-2xl bg-white bg-opacity-90 py-2 px-6 rounded-full inline-block border-2 border-[#1cb0f6] border-opacity-50">
                            Learn math the fun way!
                        </p>
                    </div>

                    <div className="bg-white bg-opacity-90 backdrop-blur-md border-2 border-[#e5e5e5] border-b-[8px] rounded-3xl p-6 md:p-8 w-full max-w-[480px] shadow-2xl flex flex-col items-center relative z-10">
                        <h2 className="text-3xl font-black text-center text-[#3c3c3c] mb-6 drop-shadow-sm">
                            Choose your level
                        </h2>
                        
                        <div className="flex flex-col gap-5 w-full">
                            {addSubList.map(opt => (
                                <button 
                                    key={`opt-${opt.val}`} 
                                    onClick={() => startGame(opt)}
                                    className={`duo-btn w-full rounded-2xl text-white font-black text-2xl py-4 border-2 border-b-[6px] shadow-sm hover:brightness-110`}
                                    style={{ backgroundColor: opt.color, borderColor: opt.border }}
                                >
                                    {opt.label}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const renderSummary = () => (
                <div className="flex flex-col items-center justify-center w-full min-h-screen p-4 relative overflow-hidden">
                    
                    {/* Empty placeholder div reserved for Logo placement later */}
                    <div className="absolute top-4 right-4 w-16 h-16 z-[10000]"></div>

                    <div className="bg-white bg-opacity-90 backdrop-blur-md border-2 border-[#e5e5e5] border-b-[8px] rounded-3xl p-8 w-full max-w-[500px] shadow-2xl flex flex-col items-center relative z-10 animate-float">
                        <div className="bg-[#ffc800] p-4 rounded-full mb-6 text-white border-4 border-[#e5b400] shadow-md">
                            <svg className="w-16 h-16" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
                        </div>
                        
                        <h1 className="text-4xl md:text-5xl font-black text-[#58cc02] mb-2 text-center drop-shadow-sm">
                            Lesson Complete!
                        </h1>
                        <p className="text-2xl font-bold text-[#afafaf] mb-8">
                            You scored {score} points
                        </p>
                        
                        <button 
                            onClick={() => { playSound('click'); setView('splash'); }}
                            className="duo-btn bg-[#1cb0f6] w-full text-white font-black text-2xl py-4 rounded-2xl border-2 border-b-[6px] border-[#1899d6] shadow-sm hover:brightness-110"
                        >
                            CONTINUE
                        </button>
                    </div>
                </div>
            );

            const renderGame = () => {
                const isFull = rows.every(r => r.inputs.every(v => v !== null));
                const checkReady = isFull;
                const isUndoDisabled = rows.every(r => r.status === 'correct' || r.inputs.every(v => v === null));
                const modeObj = addSubList.find(o => o.val === difficulty);

                return (
                    <div className="w-full h-screen relative overflow-hidden">
                        {/* Compact controls stay at the top-left; top-right is reserved for a future logo. */}
                        <div className="absolute top-2 md:top-3 left-2 md:left-4 z-40 flex flex-wrap items-center justify-start gap-1.5 md:gap-2 max-w-[76%] md:max-w-[72%]">
                            <button
                                onClick={() => { playSound('click'); setView('splash'); }}
                                className="duo-btn bg-white/95 text-[#7b7b7b] border-2 border-[#e5e5e5] border-b-4 rounded-xl px-2.5 py-2 md:px-3.5 font-bold text-xs md:text-sm hover:bg-gray-50 flex items-center gap-1.5 shadow-sm"
                            >
                                <svg className="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                                Back
                            </button>

                            <button
                                onClick={() => { playSound('click'); speakText(instructionText); }}
                                className="duo-btn bg-[#1cb0f6] border-2 border-b-[5px] border-[#1899d6] text-white p-2 md:p-2.5 rounded-full hover:brightness-110 shadow-lg"
                                aria-label="Read instructions aloud"
                                title="Listen to the instruction"
                            >
                                <svg className="w-4 h-4 md:w-5 md:h-5" fill="currentColor" viewBox="0 0 20 20">
                                    <path fillRule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.983 3.983 0 00-1.172-2.828 1 1 0 010-1.415z" clipRule="evenodd" />
                                </svg>
                            </button>

                            <div className="bg-white/95 text-[#7b7b7b] font-bold px-2.5 py-2 md:px-3.5 rounded-xl border-2 border-[#e5e5e5] shadow-sm text-[10px] md:text-sm whitespace-nowrap">
                                Round {round}/{TOTAL_ROUNDS}
                            </div>
                            <div className="bg-[#ffc800] text-white font-black px-2.5 py-2 md:px-3.5 rounded-xl border-2 border-b-[5px] border-[#e5b400] shadow-sm text-[10px] md:text-sm whitespace-nowrap">
                                Score: {score}
                            </div>
                            <div className="text-white px-2.5 py-2 md:px-3.5 rounded-xl font-bold border-2 border-b-[5px] shadow-sm text-[10px] md:text-sm whitespace-nowrap" style={{backgroundColor: modeObj?.color, borderColor: modeObj?.border}}>
                                {modeObj?.label}
                            </div>
                        </div>

                        {/* Reserved logo area — intentionally empty. */}
                        <div className="absolute top-2 right-2 md:top-3 md:right-4 z-40 w-20 h-14 md:w-32 md:h-20 pointer-events-none"></div>

                        {/* Equations sit directly inside the single large background house */}
                        <div className="absolute left-1/2 top-[43.5%] md:top-[45.8%] -translate-x-1/2 -translate-y-[4%] z-30 w-[98%] max-w-[930px] flex flex-col items-center gap-3 md:gap-4">
                            <div className="w-full rounded-[2rem] md:rounded-[2.35rem] border-[4px] md:border-[6px] border-[#d8a160] bg-[#fff8df]/94 backdrop-blur-[2px] shadow-2xl px-3.5 py-4 md:px-6 md:py-6">
                                <div className="flex flex-col gap-2.5 md:gap-3.5 w-full">
                                    {rows.map((row, i) => (
                                        <FactRow
                                            key={i}
                                            index={i}
                                            rowData={row}
                                            focusedCell={focusedCell}
                                            onCellClick={handleCellClick}
                                        />
                                    ))}
                                </div>
                            </div>

                            <div className="w-full max-w-[820px] bg-[#fff4d6]/94 backdrop-blur-sm border-2 border-white rounded-[1.6rem] shadow-xl px-3.5 py-3.5 md:px-6 md:py-4.5">
                                <div className="flex flex-wrap items-center justify-center gap-2 md:gap-3">
                                    {currentNumbers.map((num, i) => {
                                        const colors = [
                                            {bg: 'bg-[#1cb0f6]', border: 'border-[#1899d6]'},
                                            {bg: 'bg-[#ce82ff]', border: 'border-[#a568cc]'},
                                            {bg: 'bg-[#ffc800]', border: 'border-[#e5b400]'}
                                        ];
                                        return (
                                            <button
                                                key={`num-${i}`}
                                                onClick={() => handleInput(num)}
                                                className={`duo-btn w-[4.1rem] h-[4.1rem] md:w-[5.2rem] md:h-[5.2rem] rounded-xl md:rounded-2xl border-2 border-b-[7px] text-white font-black text-[1.95rem] md:text-[2.35rem] flex items-center justify-center ${colors[i].bg} ${colors[i].border} shadow-sm hover:brightness-110`}
                                            >
                                                {num}
                                            </button>
                                        );
                                    })}

                                    <button
                                        onClick={handleUndo}
                                        disabled={isUndoDisabled || checkResult !== null}
                                        className={`duo-btn rounded-xl md:rounded-2xl font-black text-sm md:text-lg px-4.5 py-3.5 md:px-6 md:py-4.5 transition-all min-w-[108px]
                                            ${isUndoDisabled || checkResult !== null
                                                ? 'bg-[#e5e5e5] text-[#afafaf] border-2 border-b-4 border-[#d5d5d5]'
                                                : 'bg-white text-[#ff4b4b] border-2 border-b-[6px] border-[#e5e5e5] hover:bg-gray-50'
                                            }
                                        `}
                                    >CLEAR</button>
                                    <button
                                        onClick={handleCheck}
                                        disabled={!checkReady || checkResult !== null}
                                        className={`duo-btn rounded-xl md:rounded-2xl font-black text-sm md:text-lg px-4.5 py-3.5 md:px-6 md:py-4.5 transition-all min-w-[108px]
                                            ${!checkReady || checkResult !== null
                                                ? 'bg-[#e5e5e5] text-[#afafaf] border-2 border-b-4 border-[#d5d5d5]'
                                                : 'bg-[#58cc02] text-white border-2 border-b-[6px] border-[#46a302] hover:brightness-110'
                                            }
                                        `}
                                    >CHECK</button>
                                </div>
                            </div>
                        </div>

                        {/* Result overlay */}
                        {checkResult && (
                            <div className="absolute inset-0 bg-black/40 flex items-center justify-center z-[70] p-4 backdrop-blur-sm">
                                <div className={`w-full max-w-[420px] rounded-3xl border-2 border-b-[8px] flex flex-col items-center justify-center p-5 md:p-6 shadow-2xl
                                    ${checkResult === 'wellDone'
                                        ? 'bg-[#d7ffb8] border-[#58cc02] text-[#3f9500]'
                                        : 'bg-[#ffdfe0] border-[#ff4b4b] text-[#ff4b4b]'}
                                `}>
                                    {checkResult === 'wellDone' ? (
                                        <>
                                            <div className="bg-white rounded-full p-2 mb-3 shadow-sm border-2 border-[#58cc02]">
                                                <svg className="w-11 h-11 md:w-12 md:h-12" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg>
                                            </div>
                                            <p className="font-black text-3xl md:text-4xl mb-1 text-center">Awesome!</p>
                                            <p className="font-bold text-base md:text-lg text-center mb-5">Choose what to do next.</p>
                                            <div className="grid grid-cols-2 gap-3 w-full">
                                                <button
                                                    onClick={handleNextQuestion}
                                                    className="duo-btn bg-[#1cb0f6] text-white border-2 border-b-[6px] border-[#1899d6] rounded-2xl px-3 py-3.5 font-black text-base md:text-xl shadow-sm"
                                                >
                                                    {round < TOTAL_ROUNDS ? 'NEXT' : 'FINISH'}
                                                </button>
                                                <button
                                                    onClick={openBalloonGame}
                                                    className="duo-btn bg-[#ce82ff] text-white border-2 border-b-[6px] border-[#a568cc] rounded-2xl px-3 py-3.5 font-black text-base md:text-xl shadow-sm"
                                                >
                                                    PLAY GAME
                                                </button>
                                            </div>
                                        </>
                                    ) : (
                                        <>
                                            <div className="bg-white rounded-full p-2 mb-4 shadow-sm border-2 border-[#ff4b4b]">
                                                <svg className="w-11 h-11 md:w-12 md:h-12" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clipRule="evenodd" /></svg>
                                            </div>
                                            <p className="font-black text-3xl md:text-4xl mb-5 text-center">Try again</p>
                                            <button
                                                onClick={handleTryAgain}
                                                className="duo-btn bg-[#ff4b4b] w-full border-b-[6px] border-[#d93b3b] rounded-2xl px-6 py-4 font-black text-xl text-white shadow-sm"
                                            >
                                                RETRY
                                            </button>
                                        </>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const renderBalloonGame = () => (
                <div className="fixed inset-0 z-[100] overflow-hidden bg-gradient-to-b from-[#69d2ff] via-[#bcecff] to-[#8ee23f]">
                    <div className="absolute inset-x-0 bottom-0 h-[24%] bg-gradient-to-b from-[#7fe337] to-[#48bc20]"></div>
                    <div className="absolute top-4 left-1/2 -translate-x-1/2 z-[120] flex flex-col items-center gap-2">
                        <div className="bg-white/95 border-2 border-white rounded-2xl shadow-lg px-5 py-2 text-center">
                            <div className="font-black text-[#1cb0f6] text-xl md:text-3xl">TAP BALLOONS!</div>
                            <div className="font-bold text-[#6b7280] text-xs md:text-sm">Tap the balloons, but do not tap 🔥</div>
                        </div>
                        <div className="bg-[#ffc800] text-white border-2 border-b-[5px] border-[#e5b400] rounded-xl px-4 py-2 font-black text-lg shadow-md">
                            Score: {miniGameScore}
                        </div>
                    </div>

                    <div className="absolute inset-0 overflow-hidden">
                        {balloons.map(balloon => (
                            <button
                                key={balloon.id}
                                onClick={() => handleBalloonTap(balloon)}
                                onAnimationEnd={() => setBalloons(prev => prev.filter(item => item.id !== balloon.id))}
                                className="balloon-rise absolute bottom-0 z-[110] border-0 bg-transparent p-0 cursor-pointer select-none"
                                style={{
                                    left: `${balloon.x}%`,
                                    animationDuration: `${balloon.duration}s`,
                                    width: `${balloon.size}px`,
                                    height: `${balloon.size * 1.45}px`
                                }}
                                aria-label={balloon.isFire ? 'Fire balloon' : 'Balloon'}
                            >
                                <div className="balloon-body relative w-full h-full flex flex-col items-center">
                                    <div
                                        className="relative flex items-center justify-center rounded-[50%_50%_46%_46%] border-[4px] border-white/80 shadow-xl text-2xl md:text-3xl"
                                        style={{
                                            width: `${balloon.size}px`,
                                            height: `${balloon.size * 1.12}px`,
                                            background: `radial-gradient(circle at 32% 24%, #ffffff 0 8%, ${balloon.color} 24% 72%, rgba(0,0,0,0.18) 100%)`
                                        }}
                                    >
                                        <span className="drop-shadow-md">{balloon.isFire ? '🔥' : '⭐'}</span>
                                        <span className="absolute -bottom-[9px] left-1/2 -translate-x-1/2 w-0 h-0 border-l-[8px] border-r-[8px] border-t-[13px] border-l-transparent border-r-transparent" style={{borderTopColor: balloon.color}}></span>
                                    </div>
                                    <div className="w-[2px] flex-1 bg-[#7b5b45]/70 mt-2 rounded-full"></div>
                                </div>
                            </button>
                        ))}
                    </div>

                    {miniGameOver && (
                        <div className="absolute inset-0 z-[140] bg-black/45 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="w-full max-w-[390px] bg-white rounded-3xl border-4 border-[#ff4b4b] border-b-[10px] shadow-2xl p-6 text-center">
                                <div className="text-7xl mb-2">🔥</div>
                                <h2 className="font-black text-[#ff4b4b] text-4xl mb-2">GAME OVER</h2>
                                <p className="font-bold text-[#6b7280] text-lg mb-5">Balloon score: {miniGameScore}</p>
                                <button
                                    onClick={handleNextQuestion}
                                    className="duo-btn w-full bg-[#58cc02] text-white border-2 border-b-[7px] border-[#46a302] rounded-2xl px-5 py-4 font-black text-xl shadow-sm"
                                >
                                    {round < TOTAL_ROUNDS ? 'NEXT QUESTION' : 'FINISH LESSON'}
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );


            return (
                <div className="w-full min-h-screen relative z-10">
                    <GameBackground currentNumbers={currentNumbers} showGameData={view === 'game'} />
                    {view === 'splash' && renderSplash()}
                    {view === 'game' && renderGame()}
                    {view === 'summary' && renderSummary()}
                    {miniGameOpen && renderBalloonGame()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
