<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Number Fact Families V3</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Poppins', sans-serif; 
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            overflow-x: hidden;
            /* Default attractive gradient background fallback */
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
        }

        /* Duolingo style 3D button effect classes used in Tailwind */
        .duo-btn {
            transition: all 0.1s ease-in-out;
        }
        .duo-btn:active:not(:disabled) {
            transform: translateY(4px);
            border-bottom-width: 0px !important;
            margin-top: 4px;
        }

        /* Colorful text animation */
        .rainbow-text {
            background: linear-gradient(to right, #ff4b4b, #ffc800, #58cc02, #1cb0f6, #ce82ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 300% 300%;
            animation: rainbow 5s ease infinite;
        }

        @keyframes rainbow { 
            0%{background-position:0% 50%}
            50%{background-position:100% 50%}
            100%{background-position:0% 50%}
        }

        /* Floating animation for icons */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        /* Custom scrollbar for mobile overflow */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
    </style>
</head>
<body class="text-[#3c3c3c]">
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const TOTAL_ROUNDS = 5;
        const addSubList = [
            { label: 'Up to 10', val: 10, color: '#58cc02', border: '#46a302' },
            { label: 'Up to 20', val: 20, color: '#1cb0f6', border: '#1899d6' },
            { label: 'Up to 50', val: 50, color: '#ce82ff', border: '#a568cc' }
        ];

        // Audio Context for Sound Effects
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        const playSound = (type) => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;

            if (type === 'click') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'correct') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(440, now); // A4
                osc.frequency.setValueAtTime(554.37, now + 0.1); // C#5
                osc.frequency.setValueAtTime(659.25, now + 0.2); // E5
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(150, now + 0.3);
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'win') {
                osc.type = 'square';
                [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                    osc.frequency.setValueAtTime(freq, now + (i * 0.15));
                });
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.8);
                osc.start(now);
                osc.stop(now + 0.8);
            }
        };

        const speakText = (text) => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Stop current speech if any
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85; // Slightly slower for kids
                utterance.pitch = 1.1; // Friendly higher pitch
                window.speechSynthesis.speak(utterance);
            }
        };

        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // Generate unique numbers that haven't been used in this game session yet
        function generateUniqueNumbers(diff, usedSets) {
            let a, b, c;
            let isValid = false;
            let key = "";
            let attempts = 0;
            
            while (!isValid && attempts < 100) {
                if (diff === 10) {
                    c = randomInt(3, 10);
                    a = randomInt(1, c - 1);
                    b = c - a;
                } else if (diff === 20) {
                    c = randomInt(5, 20);
                    a = randomInt(1, c - 1);
                    b = c - a;
                } else if (diff === 50) {
                    c = randomInt(10, 50);
                    a = randomInt(1, c - 1);
                    b = c - a;
                }
                
                isValid = (a !== b && a !== 0 && b !== 0);
                
                if (isValid) {
                    key = [a, b, c].sort((x, y) => x - y).join(',');
                    if (usedSets.has(key)) {
                        isValid = false; // The set was already used, try again
                    }
                }
                attempts++;
            }
            return [a, b, c].sort(() => Math.random() - 0.5);
        }

        const Cell = ({ val, isActive }) => {
            const isEmpty = val === undefined;
            return (
                <div className={`
                    flex items-center justify-center font-extrabold leading-none select-none transition-all duration-200
                    rounded-2xl w-[4rem] h-[4rem] md:w-[4.5rem] md:h-[4.5rem] text-3xl md:text-4xl 
                    ${isActive
                        ? 'bg-[#ddf4ff] text-[#1cb0f6] border-4 border-solid border-[#1cb0f6] scale-110 shadow-lg'
                        : isEmpty 
                            ? 'bg-[#fffce8] border-4 border-dashed border-[#ffc800] text-transparent' // Colorful & attractive empty slot
                            : 'bg-white text-[#3c3c3c] border-4 border-solid border-[#e5e5e5] border-b-[6px]' // Filled state
                    }
                `}>
                    {val !== undefined ? val : ''}
                </div>
            );
        };

        const OperatorCell = ({ op }) => {
            return (
                <div className="flex items-center justify-center font-extrabold select-none rounded-full w-10 h-10 md:w-12 md:h-12 text-2xl md:text-3xl text-[#a855f7] bg-[#f3e8ff] border-2 border-[#d8b4fe] shadow-sm">
                    {op}
                </div>
            );
        };

        const FactRow = ({ index, rowData, isActive, activeSlotIndex }) => {
            const { inputs, status, message } = rowData;

            let rowBg = 'bg-white bg-opacity-80 backdrop-blur-sm border-[#e5e5e5] border-b-[6px]';
            let overlayColor = '';
            
            if (isActive) rowBg = 'bg-[#f0f9ff] border-[#1cb0f6] border-b-[6px] shadow-sm scale-[1.01]';
            if (status === 'correct') {
                rowBg = 'bg-[#d7ffb8] border-[#58cc02] border-b-[6px]';
                overlayColor = 'text-[#58cc02]';
            }
            if (status === 'wrong' || status === 'unrelated' || status === 'same') {
                rowBg = 'bg-[#ffdfe0] border-[#ff4b4b] border-b-[6px]';
                overlayColor = 'text-[#ff4b4b]';
            }

            const getVal = (idx) => inputs[idx];
            const isAct = (idx) => isActive && activeSlotIndex === idx;
            const operator = index < 2 ? '+' : '−';

            const cells = [
                <Cell key="v1" val={getVal(0)} isActive={isAct(0)} />,
                <OperatorCell key="op" op={operator} />,
                <Cell key="v2" val={getVal(1)} isActive={isAct(1)} />,
                <div key="eq" className="text-[#3c3c3c] text-4xl font-extrabold w-8 md:w-12 flex justify-center drop-shadow-sm">=</div>,
                <Cell key="v3" val={getVal(2)} isActive={isAct(2)} />
            ];

            return (
                <div className={`relative flex items-center justify-between px-3 md:px-6 py-3 rounded-3xl border-4 w-full max-w-[95%] md:max-w-[90%] mx-auto transition-all duration-300 ${rowBg}`}>
                    {cells}

                    {/* Status Icons */}
                    {status === 'correct' && (
                        <div className="absolute top-1/2 -translate-y-1/2 -right-4 md:-right-6 z-10 animate-bounce">
                            <svg className="w-10 h-10 md:w-12 md:h-12 text-[#58cc02] bg-white rounded-full p-1 shadow-md border-2 border-[#58cc02]" fill="currentColor" viewBox="0 0 20 20">
                                <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" />
                            </svg>
                        </div>
                    )}
                    {(status === 'wrong' || status === 'unrelated') && (
                        <div className="absolute top-1/2 -translate-y-1/2 -right-4 md:-right-6 z-10 animate-pulse">
                            <svg className="w-10 h-10 md:w-12 md:h-12 text-[#ff4b4b] bg-white rounded-full p-1 shadow-md border-2 border-[#ff4b4b]" fill="currentColor" viewBox="0 0 20 20">
                                <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clipRule="evenodd" />
                            </svg>
                        </div>
                    )}
                    {/* Error Tooltips */}
                    {status === 'same' && (
                        <div className="absolute -top-10 right-0 bg-white border-2 border-[#ff4b4b] text-[#ff4b4b] font-bold px-3 py-1 rounded-xl text-sm md:text-base shadow-lg z-20">
                            Already found!
                        </div>
                    )}
                    {status === 'unrelated' && (
                        <div className="absolute -top-10 right-0 bg-white border-2 border-[#ff4b4b] text-[#ff4b4b] font-bold px-3 py-1 rounded-xl text-sm md:text-base shadow-lg z-20">
                            Use all 3 numbers!
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('splash'); // splash, game, summary
            const [difficulty, setDifficulty] = useState(null);
            const [score, setScore] = useState(0);
            const [round, setRound] = useState(1);
            
            // Game Board State
            const [usedGameSets, setUsedGameSets] = useState(new Set()); // Prevents duplicate questions
            const [currentNumbers, setCurrentNumbers] = useState([]);
            const [rows, setRows] = useState([]);
            const [activeRowIndex, setActiveRowIndex] = useState(0);
            const [checkResult, setCheckResult] = useState(null);

            const instructionText = "Fill in the missing numbers to complete the fact family!";

            // Auto-read voice on game round load
            useEffect(() => {
                if (view === 'game') {
                    // Small delay ensures the visual transition finishes before speaking
                    const timer = setTimeout(() => {
                        speakText(instructionText);
                    }, 500);
                    return () => clearTimeout(timer);
                }
            }, [view, round]);

            const initRound = (diff, currentScore, currentRound, activeUsedSets) => {
                const displayNums = generateUniqueNumbers(diff, activeUsedSets);
                
                // Save this set to history so it doesn't repeat
                const newKey = [...displayNums].sort((x, y) => x - y).join(',');
                const updatedSets = new Set(activeUsedSets);
                updatedSets.add(newKey);
                setUsedGameSets(updatedSets);

                setCurrentNumbers(displayNums);
                setRows(Array(4).fill(null).map(() => ({ inputs: [], status: null, message: null })));
                setActiveRowIndex(0);
                setCheckResult(null);
                setDifficulty(diff);
                setScore(currentScore);
                setRound(currentRound);
                setView('game');
            };

            const startGame = (diffObj) => {
                playSound('click');
                // Pass an empty Set for used questions since we are starting a fresh game
                initRound(diffObj.val, 0, 1, new Set());
            };

            const handleInput = (val) => {
                if (activeRowIndex > 3 || checkResult) return;
                playSound('click');

                const currentRow = rows[activeRowIndex];
                if (currentRow.inputs.length >= 3) return;

                const newInputs = [...currentRow.inputs, val];
                const newRows = [...rows];
                newRows[activeRowIndex] = { ...currentRow, inputs: newInputs };
                setRows(newRows);

                if (newInputs.length === 3) {
                    setActiveRowIndex(activeRowIndex < 3 ? activeRowIndex + 1 : 4);
                }
            };

            const handleUndo = () => {
                if (checkResult) return;
                playSound('click');
                let newRows = [...rows];
                let currIdx = activeRowIndex;

                if (currIdx === 4) currIdx = 3;

                if (newRows[currIdx].inputs.length > 0) {
                    newRows[currIdx].inputs.pop();
                    setRows(newRows);
                    setActiveRowIndex(currIdx);
                } else if (currIdx > 0) {
                    currIdx--;
                    newRows[currIdx].inputs.pop();
                    setRows(newRows);
                    setActiveRowIndex(currIdx);
                }
            };

            const handleCheck = () => {
                if (activeRowIndex !== 4) return;

                const newRows = [...rows];
                let allCorrect = true;
                let validFacts = new Set();
                const givenSorted = [...currentNumbers].sort((a,b) => a-b).join(',');

                for (let i = 0; i < 4; i++) {
                    const r = newRows[i];
                    const [v1, v2, v3] = r.inputs;

                    const v1Num = Number(v1);
                    const v2Num = Number(v2);
                    const v3Num = Number(v3);

                    const usedSorted = [v1Num, v2Num, v3Num].sort((a,b) => a-b).join(',');
                    if (usedSorted !== givenSorted) {
                        r.status = 'unrelated';
                        allCorrect = false;
                        continue;
                    }

                    const op = i < 2 ? '+' : '−';
                    let mathCorrect = false;
                    if (op === '+') mathCorrect = (v1Num + v2Num === v3Num);
                    if (op === '−') mathCorrect = (v1Num - v2Num === v3Num);

                    if (!mathCorrect) {
                        r.status = 'wrong';
                        allCorrect = false;
                        continue;
                    }

                    const factStr = `${v1Num}${op}${v2Num}=${v3Num}`; 
                    if (validFacts.has(factStr)) {
                        r.status = 'same';
                        allCorrect = false;
                    } else {
                        validFacts.add(factStr);
                        r.status = 'correct';
                    }
                }

                setRows(newRows);

                if (allCorrect) {
                    playSound('correct');
                    setCheckResult('wellDone');
                    const newScore = score + 1;
                    setScore(newScore);
                    
                    setTimeout(() => {
                        if (round < TOTAL_ROUNDS) {
                            initRound(difficulty, newScore, round + 1, usedGameSets);
                        } else {
                            playSound('win');
                            setView('summary');
                            triggerConfetti();
                        }
                    }, 2500);
                } else {
                    playSound('wrong');
                    setCheckResult('tryAgain');
                }
            };

            const handleTryAgain = () => {
                playSound('click');
                let firstEmpty = -1;
                const newRows = rows.map((r, i) => {
                    if (r.status !== 'correct') {
                        if (firstEmpty === -1) firstEmpty = i;
                        return { ...r, inputs: [], status: null, message: null };
                    }
                    return r;
                });
                setRows(newRows);
                setActiveRowIndex(firstEmpty !== -1 ? firstEmpty : 4);
                setCheckResult(null);
            };

            const triggerConfetti = () => {
                const duration = 3000;
                const end = Date.now() + duration;

                (function frame() {
                    confetti({
                        particleCount: 5,
                        angle: 60,
                        spread: 55,
                        origin: { x: 0 },
                        colors: ['#ff4b4b', '#ffc800', '#58cc02', '#1cb0f6', '#ce82ff'],
                        zIndex: 99999
                    });
                    confetti({
                        particleCount: 5,
                        angle: 120,
                        spread: 55,
                        origin: { x: 1 },
                        colors: ['#ff4b4b', '#ffc800', '#58cc02', '#1cb0f6', '#ce82ff'],
                        zIndex: 99999
                    });

                    if (Date.now() < end) {
                        requestAnimationFrame(frame);
                    }
                }());
            };

            const renderSplash = () => (
                <div className="flex flex-col items-center justify-center w-full min-h-screen p-4 md:p-8 relative overflow-hidden bg-gradient-to-br from-[#ffb6ff] via-[#b3f0ff] to-[#ffc999]">
                    
                    {/* Empty placeholder div reserved for Logo placement later */}
                    <div className="absolute top-4 right-4 w-16 h-16 md:w-24 md:h-24 z-50"></div>

                    <div className="animate-float mb-8 mt-12 md:mt-0 drop-shadow-lg">
                        <h1 className="text-5xl md:text-7xl font-black text-center rainbow-text px-4 leading-tight">
                            Number Fact Families
                        </h1>
                        <p className="text-center text-white drop-shadow-md font-bold mt-4 text-xl md:text-2xl bg-black bg-opacity-10 py-2 px-6 rounded-full inline-block">
                            Learn math the fun way!
                        </p>
                    </div>

                    <div className="bg-white border-2 border-[#e5e5e5] border-b-[8px] rounded-3xl p-6 md:p-8 w-full max-w-[480px] shadow-2xl flex flex-col items-center relative z-10">
                        <h2 className="text-3xl font-black text-center text-[#3c3c3c] mb-6 drop-shadow-sm">
                            Choose your level
                        </h2>
                        
                        <div className="flex flex-col gap-5 w-full">
                            {addSubList.map(opt => (
                                <button 
                                    key={`opt-${opt.val}`} 
                                    onClick={() => startGame(opt)}
                                    className={`duo-btn w-full rounded-2xl text-white font-black text-2xl py-4 border-2 border-b-[6px] shadow-sm hover:brightness-110`}
                                    style={{ backgroundColor: opt.color, borderColor: opt.border }}
                                >
                                    {opt.label}
                                </button>
                            ))}
                        </div>
                    </div>
                    
                    {/* Decorative background bubbles */}
                    <div className="absolute top-20 left-10 w-24 h-24 bg-white opacity-20 rounded-full blur-xl"></div>
                    <div className="absolute bottom-20 right-10 w-32 h-32 bg-white opacity-30 rounded-full blur-2xl"></div>
                </div>
            );

            const renderGame = () => {
                const checkReady = activeRowIndex === 4;
                const isUndoDisabled = activeRowIndex === 0 && rows[0].inputs.length === 0;
                const modeObj = addSubList.find(o => o.val === difficulty);

                return (
                    <div className="w-full min-h-screen flex flex-col md:flex-row relative overflow-y-auto md:overflow-hidden bg-gradient-to-br from-[#a8edea] to-[#fed6e3]">
                        
                        {/* Empty placeholder div reserved for Logo placement later */}
                        <div className="absolute top-4 right-4 w-12 h-12 md:w-16 md:h-16 z-50"></div>

                        {/* LEFT/TOP WORKSPACE PANEL */}
                        <div className="w-full md:w-[70%] lg:w-[75%] h-auto md:h-screen flex flex-col relative z-0 p-4 md:p-8 pb-32 md:pb-8">
                            
                            {/* Top Bar */}
                            <div className="flex justify-between items-center mb-6">
                                <button 
                                    onClick={() => { playSound('click'); setView('splash'); }} 
                                    className="duo-btn bg-white text-[#afafaf] border-2 border-[#e5e5e5] border-b-4 rounded-xl px-4 py-2 font-bold text-lg hover:bg-gray-50 flex items-center gap-2"
                                >
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                                    Back
                                </button>
                                
                                <div className="flex gap-4 items-center mr-16">
                                    <div className="bg-white text-[#afafaf] font-bold px-4 py-2 rounded-xl border-2 border-[#e5e5e5] shadow-sm">
                                        Round {round}/{TOTAL_ROUNDS}
                                    </div>
                                    <div className="text-white px-4 py-2 rounded-xl font-bold border-b-4 shadow-sm" style={{backgroundColor: modeObj?.color, borderColor: modeObj?.border}}>
                                        {modeObj?.label}
                                    </div>
                                </div>
                            </div>

                            {/* Instruction & TTS */}
                            <div className="flex flex-row items-center justify-center gap-3 mb-6 bg-white py-4 px-6 rounded-2xl border-2 border-[#e5e5e5] shadow-md max-w-2xl mx-auto w-full">
                                <h2 className="text-[#3c3c3c] text-lg md:text-xl font-black text-center flex-1">
                                    {instructionText}
                                </h2>
                                <button 
                                    onClick={() => { playSound('click'); speakText(instructionText); }}
                                    className="duo-btn bg-[#1cb0f6] border-b-4 border-[#1899d6] text-white p-3 rounded-full flex-shrink-0 hover:brightness-110 shadow-sm"
                                    aria-label="Read instructions aloud"
                                >
                                    <svg className="w-7 h-7" fill="currentColor" viewBox="0 0 20 20">
                                        <path fillRule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.983 3.983 0 00-1.172-2.828 1 1 0 010-1.415z" clipRule="evenodd" />
                                    </svg>
                                </button>
                            </div>

                            {/* Active Equation Workspace Grid */}
                            <div className="flex-1 flex flex-col gap-4 md:gap-6 justify-center w-full">
                                {rows.map((row, i) => (
                                    <FactRow 
                                        key={i} 
                                        index={i} 
                                        rowData={row} 
                                        isActive={activeRowIndex === i && !checkResult} 
                                        activeSlotIndex={row.inputs.length} 
                                    />
                                ))}
                            </div>
                        </div>

                        {/* RIGHT/BOTTOM CONTROLS PANEL */}
                        <div className="w-full md:w-[30%] lg:w-[25%] bg-white bg-opacity-95 md:border-l-2 border-t-2 md:border-t-0 border-white flex flex-col items-center py-6 px-4 fixed md:relative bottom-0 md:bottom-auto left-0 h-auto md:h-screen z-40 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] md:shadow-[-5px_0_20px_rgba(0,0,0,0.05)] backdrop-blur-md">
                            
                            <div className="hidden md:flex w-full justify-center mb-8 mt-4">
                                <div className="bg-[#ffc800] text-white px-6 py-3 rounded-2xl border-b-[6px] border-[#e5b400] font-black text-2xl flex items-center gap-2 shadow-sm">
                                    <svg className="w-7 h-7" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
                                    Score: {score}
                                </div>
                            </div>

                            {/* Numbers & Buttons wrapper */}
                            <div className="flex flex-row md:flex-col justify-center items-center w-full gap-4 md:gap-8 flex-1">
                                
                                {/* Number Selections */}
                                <div className="flex flex-row md:flex-col gap-3 md:gap-6 items-center">
                                    {currentNumbers.map((num, i) => {
                                        const colors = [
                                            {bg: 'bg-[#1cb0f6]', border: 'border-[#1899d6]'},
                                            {bg: 'bg-[#ce82ff]', border: 'border-[#a568cc]'},
                                            {bg: 'bg-[#ffc800]', border: 'border-[#e5b400]'}
                                        ];
                                        return (
                                            <button
                                                key={`num-${i}`}
                                                onClick={() => handleInput(num)}
                                                className={`duo-btn w-[4.5rem] h-[4.5rem] md:w-24 md:h-24 rounded-2xl border-2 border-b-[8px] text-white font-black text-3xl md:text-[2.7rem] flex items-center justify-center ${colors[i].bg} ${colors[i].border} shadow-sm hover:brightness-110`}
                                            >
                                                {num}
                                            </button>
                                        );
                                    })}
                                </div>

                                {/* Control Triggers */}
                                <div className="flex flex-col gap-3 w-32 md:w-full max-w-[200px]">
                                    <button
                                        onClick={handleUndo}
                                        disabled={isUndoDisabled || checkResult !== null}
                                        className={`duo-btn rounded-2xl font-black text-xl md:text-2xl py-3 md:py-4 transition-all
                                            ${isUndoDisabled || checkResult !== null 
                                                ? 'bg-[#e5e5e5] text-[#afafaf] border-2 border-b-4 border-[#d5d5d5]' 
                                                : 'bg-white text-[#ff4b4b] border-2 border-b-[6px] border-[#e5e5e5] hover:bg-gray-50'
                                            }
                                        `}
                                    >UNDO</button>
                                    <button
                                        onClick={handleCheck}
                                        disabled={!checkReady || checkResult !== null}
                                        className={`duo-btn rounded-2xl font-black text-xl md:text-2xl py-3 md:py-4 transition-all
                                            ${!checkReady || checkResult !== null 
                                                ? 'bg-[#e5e5e5] text-[#afafaf] border-2 border-b-4 border-[#d5d5d5]' 
                                                : 'bg-[#58cc02] text-white border-2 border-b-[6px] border-[#46a302] hover:brightness-110'
                                            }
                                        `}
                                    >CHECK</button>
                                </div>
                            </div>

                            {/* Result Overlay */}
                            {checkResult && (
                                <div className="absolute inset-0 bg-black bg-opacity-40 flex items-end md:items-center justify-center z-[60] rounded-none md:rounded-l-3xl p-4 pb-6 md:p-6 backdrop-blur-sm">
                                    <div className={`w-full max-w-sm rounded-3xl border-2 border-b-[8px] flex flex-col items-center justify-center p-6 animate-float shadow-2xl
                                        ${checkResult === 'wellDone' 
                                            ? 'bg-[#d7ffb8] border-[#58cc02] text-[#58cc02]' 
                                            : 'bg-[#ffdfe0] border-[#ff4b4b] text-[#ff4b4b]'}
                                    `}>
                                        {checkResult === 'wellDone' ? (
                                            <>
                                                <div className="bg-white rounded-full p-2 mb-4 shadow-sm border-2 border-[#58cc02]">
                                                    <svg className="w-12 h-12" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg>
                                                </div>
                                                <p className="font-black text-4xl mb-2 text-center drop-shadow-sm">Awesome!</p>
                                                <p className="font-bold text-lg text-center">Moving to next round...</p>
                                            </>
                                        ) : (
                                            <>
                                                <div className="bg-white rounded-full p-2 mb-4 shadow-sm border-2 border-[#ff4b4b]">
                                                    <svg className="w-12 h-12" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clipRule="evenodd" /></svg>
                                                </div>
                                                <p className="font-black text-4xl mb-6 text-center drop-shadow-sm">Try again</p>
                                                <button 
                                                    onClick={handleTryAgain} 
                                                    className="duo-btn bg-[#ff4b4b] w-full border-b-[6px] border-[#d93b3b] rounded-2xl px-6 py-4 font-black text-2xl text-white shadow-sm"
                                                >
                                                    RETRY
                                                </button>
                                            </>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const renderSummary = () => (
                <div className="flex flex-col items-center justify-center w-full min-h-screen p-4 relative overflow-hidden bg-gradient-to-br from-[#d7ffb8] via-[#e2fbc7] to-[#ffffff]">
                    
                    {/* Empty placeholder div reserved for Logo placement later */}
                    <div className="absolute top-4 right-4 w-16 h-16 z-[10000]"></div>

                    <div className="bg-white border-2 border-[#e5e5e5] border-b-[8px] rounded-3xl p-8 w-full max-w-[500px] shadow-2xl flex flex-col items-center relative z-10 animate-float">
                        <div className="bg-[#ffc800] p-4 rounded-full mb-6 text-white border-4 border-[#e5b400] shadow-md">
                            <svg className="w-16 h-16" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
                        </div>
                        
                        <h1 className="text-4xl md:text-5xl font-black text-[#58cc02] mb-2 text-center drop-shadow-sm">
                            Lesson Complete!
                        </h1>
                        <p className="text-2xl font-bold text-[#afafaf] mb-8">
                            You scored {score} points
                        </p>
                        
                        <button 
                            onClick={() => { playSound('click'); setView('splash'); }}
                            className="duo-btn bg-[#1cb0f6] w-full text-white font-black text-2xl py-4 rounded-2xl border-2 border-b-[6px] border-[#1899d6] shadow-sm hover:brightness-110"
                        >
                            CONTINUE
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="w-full min-h-screen">
                    {view === 'splash' && renderSplash()}
                    {view === 'game' && renderGame()}
                    {view === 'summary' && renderSummary()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
