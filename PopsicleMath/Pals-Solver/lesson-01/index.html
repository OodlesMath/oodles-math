<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Make Tens Strategy Game - Ver8</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            touch-action: none; 
            user-select: none; 
            -webkit-user-select: none; 
            overflow: hidden;
            background: linear-gradient(180deg, #69bdfa 0%, #a1dffc 60%, #b9eaff 100%);
        }

        /* --- Background Styles --- */
        .clouds-container { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
        .cloud { position: absolute; background: #ffffff; border-radius: 50px; animation: float linear infinite; opacity: 0.95; box-shadow: 0 4px 0 rgba(255,255,255,0.4) inset; }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: inherit; border-radius: 50%; }
        .c1 { width: 120px; height: 35px; top: 12%; animation-duration: 40s; animation-delay: -5s; }
        .c1::before { width: 60px; height: 60px; top: -30px; left: 15px; }
        .c1::after { width: 45px; height: 45px; top: -20px; right: 15px; }
        .c2 { width: 160px; height: 45px; top: 30%; animation-duration: 55s; animation-delay: -25s; transform: scale(1.1); opacity: 0.8; }
        .c2::before { width: 80px; height: 80px; top: -40px; left: 20px; }
        .c2::after { width: 65px; height: 65px; top: -25px; right: 25px; }
        .c3 { width: 90px; height: 30px; top: 60%; animation-duration: 35s; opacity: 0.85; }
        .c3::before { width: 50px; height: 50px; top: -25px; left: 10px; }
        
        @keyframes float { 0% { left: -200px; } 100% { left: 100vw; } }

        /* Minigame Starry Background */
        .starry-bg {
            background: linear-gradient(180deg, #181142 0%, #352163 45%, #523178 80%, #24143a 100%);
            position: relative;
        }
        .moon {
            position: absolute;
            top: 8%;
            right: 10%;
            width: 70px;
            height: 70px;
            background: #fff9d6;
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(255, 249, 214, 0.6), inset -10px -10px 0 rgba(0,0,0,0.1);
            z-index: 1;
        }
        .stars-layer-1 {
            position: absolute; inset: 0; opacity: 0.8; animation: twinkle-bg 3s infinite alternate;
            background-image: radial-gradient(2px 2px at 15% 25%, #ffffff 50%, transparent), radial-gradient(3px 3px at 35% 45%, #ffea00 50%, transparent), radial-gradient(2px 2px at 85% 25%, #ffffff 50%, transparent);
            background-size: 200px 200px;
        }
        .stars-layer-2 {
            position: absolute; inset: 0; opacity: 0.6; animation: twinkle-bg 5s infinite alternate-reverse;
            background-image: radial-gradient(1.5px 1.5px at 20% 30%, #ffffff 60%, transparent), radial-gradient(2.5px 2.5px at 60% 70%, #ffea00 60%, transparent), radial-gradient(1.5px 1.5px at 80% 10%, #ffffff 60%, transparent);
            background-size: 250px 250px;
        }
        @keyframes twinkle-bg { 0% { opacity: 0.4; } 100% { opacity: 1; } }

        /* Duolingo Style Buttons */
        .btn-duo-green { background-color: #58cc02; border-bottom: 5px solid #46a302; color: white; transition: all 0.1s ease; }
        .btn-duo-green:active:not(:disabled) { transform: translateY(5px); border-bottom: 0px solid #46a302; margin-bottom: 5px; }
        .btn-duo-blue { background-color: #1cb0f6; border-bottom: 5px solid #1899d6; color: white; transition: all 0.1s ease; }
        .btn-duo-blue:active:not(:disabled) { transform: translateY(5px); border-bottom: 0px solid #1899d6; margin-bottom: 5px; }
        .btn-duo-wrong { background-color: #ff4b4b !important; border-bottom: 5px solid #ea1515 !important; color: white !important; transition: all 0.1s ease; }
        .btn-duo-wrong:active:not(:disabled) { transform: translateY(5px); border-bottom: 0px solid #ea1515 !important; margin-bottom: 5px; }
        .btn-duo-white { background-color: #ffffff; border-bottom: 5px solid #cbd5e1; color: #334155; transition: all 0.1s ease; }
        .btn-duo-white:active:not(:disabled) { transform: translateY(5px); border-bottom: 0px solid #cbd5e1; margin-bottom: 5px; }

        /* General Highlights & Text Colors */
        .chunky-number { text-shadow: 0 3px 0 rgba(0,0,0,0.15); }
        .card-duo { background-color: white; border-radius: 1.25rem; border: 3px solid #e5e7eb; box-shadow: 0 8px 15px rgba(0, 0, 0, 0.08); position: relative; z-index: 10; }
        
        .color-0 { color: #0ea5e9; } /* Bright Blue */
        .color-1 { color: #ec4899; } /* Bright Pink */
        .color-2 { color: #8b5cf6; } /* Bright Purple */
        .border-color-0 { border-color: #0ea5e9; }
        .border-color-1 { border-color: #ec4899; }
        .border-color-2 { border-color: #8b5cf6; }

        /* Blocks */
        .ten-cube-segment-sq { background: linear-gradient(135deg, #4cb8ff 0%, #0088dd 100%); border: 1px solid #0077c2; border-bottom: 2px solid #005599; border-radius: 3px; box-shadow: inset 1px 1px 2px rgba(255,255,255,0.6); }
        .one-cube { background: linear-gradient(135deg, #ffde00 0%, #ffc800 100%); border: 2px solid #e5a900; border-bottom: 4px solid #cc8400; border-radius: 6px; box-shadow: inset 2px 2px 4px rgba(255,255,255,0.7); }

        /* Jar */
        .glass-jar-v9 { width: 120px; height: 140px; border: 6px solid rgba(255, 255, 255, 0.9); border-top: none; border-radius: 30px 30px 60px 60px; background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.1) 100%); backdrop-filter: blur(5px); box-shadow: inset 20px 0 30px rgba(255, 255, 255, 0.8), inset -10px -10px 20px rgba(0,0,0,0.2), 0 20px 40px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        @media (min-width: 640px) { .glass-jar-v9 { width: 150px; height: 170px; border-width: 8px; border-radius: 40px 40px 70px 70px; } }
        .jar-neck-v9 { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); width: 70px; height: 30px; border-left: 6px solid rgba(255,255,255,0.9); border-right: 6px solid rgba(255,255,255,0.9); background: rgba(255, 255, 255, 0.3); z-index: 5; }
        @media (min-width: 640px) { .jar-neck-v9 { top: -30px; width: 85px; height: 35px; border-width: 8px; } }
        .jar-lip-v9 { position: absolute; top: -38px; left: 50%; transform: translateX(-50%); width: 85px; height: 20px; border: 6px solid #ffffff; border-radius: 10px; background: #e0f2fe; z-index: 10; box-shadow: 0 5px 10px rgba(0,0,0,0.3), inset 0 3px 6px rgba(255,255,255,1); }
        @media (min-width: 640px) { .jar-lip-v9 { top: -45px; width: 105px; height: 24px; border-width: 8px; border-radius: 12px; } }
        .jar-highlight-v9 { position: absolute; left: 12%; top: 15%; width: 15%; height: 65%; background: #ffffff; border-radius: 30px; opacity: 0.7; transform: rotate(-10deg); z-index: 2; }
        .magic-fill-v9 { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(180deg, #FFEB3B 0%, #FF9800 100%); box-shadow: 0 -5px 25px rgba(255, 152, 0, 0.9), inset 0 0 25px rgba(255, 255, 255, 0.6); transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 0 0 55px 55px; opacity: 0.95; z-index: 1; overflow: hidden; }
        @media (min-width: 640px) { .magic-fill-v9 { border-radius: 0 0 62px 62px; } }
        .jar-glow { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); width: 250px; height: 150px; background: radial-gradient(ellipse at center, rgba(255, 235, 59, 0.4) 0%, transparent 70%); z-index: 0; pointer-events: none; animation: pulse-glow 2s infinite alternate; }
        @keyframes pulse-glow { 0% { transform: translateX(-50%) scale(1); opacity: 0.4; } 100% { transform: translateX(-50%) scale(1.1); opacity: 0.7; } }

        .bubble { position: absolute; background: rgba(255,255,255,0.6); border-radius: 50%; animation: rise 2s infinite ease-in; }
        @keyframes rise { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(-50px) scale(1.2); opacity: 0; } }

        /* Utilities */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* Animations */
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 70% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes bounce-sm { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .animate-bounce-sm { animation: bounce-sm 1s ease-in-out infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 1; transform: scale(1); filter: drop-shadow(0 0 8px rgba(255,215,0,0.8)); } 50% { opacity: 0.8; transform: scale(0.85); filter: drop-shadow(0 0 3px rgba(255,215,0,0.4)); } }
        .animate-twinkle { animation: twinkle 1.5s infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .animate-shake { animation: shake 0.2s ease-in-out 2; }
        @keyframes fadeIn { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; opacity: 0; }

        /* SVG Line Animations */
        @keyframes drawLineBond { 0% { stroke-dashoffset: 300; opacity: 1; } 100% { stroke-dashoffset: 0; opacity: 1; } }
        .animate-draw-line-bond { animation: drawLineBond 0.6s ease-out forwards; stroke-dasharray: 300; stroke-dashoffset: 300; opacity: 0; }
        
        @keyframes scaleUp { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        .animate-scale-up { animation: scaleUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; opacity: 0; }
    </style>
</head>
<body class="w-full h-screen flex flex-col text-slate-800 relative select-none">

    <script>
        // --- Game State ---
        const state = {
            gameState: 'start', 
            score: 0,
            completedQuestions: 0,
            targets: [],
            numbers: [],
            options: [], 
            maxSum: 20, 
            
            hasGuessedWrong: false,
            wrongGuesses: [], 
            correctAnswer: null,
            showFinalAnswer: false,
            showNumberBond: false,
            showSplitBond: false,

            stars: [],
            jar: { x: window.innerWidth / 2, caught: 0, target: 10 }
        };
        const MAX_QUESTIONS = 10; 

        // --- SVGs & Icons ---
        const Icons = {
            Trophy: `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 sm:w-6 sm:h-6" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>`,
            Reload: `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 sm:w-6 sm:h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>`,
            CheckBig: `<svg xmlns="http://www.w3.org/2000/svg" class="w-16 h-16 sm:w-20 sm:h-20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
            XBig: `<svg xmlns="http://www.w3.org/2000/svg" class="w-16 h-16 sm:w-20 sm:h-20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
            Plus: `<svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 sm:w-8 sm:h-8 drop-shadow-sm text-[#1e40af]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
            Puzzle: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="w-20 h-20 sm:w-24 sm:h-24 drop-shadow-lg">
                        <rect x="15" y="20" width="70" height="70" rx="20" fill="#0284c7"/>
                        <rect x="15" y="15" width="70" height="70" rx="20" fill="#38bdf8"/>
                        <path d="M42,32 h16 v-4 a8,8 0 1,1 16,0 v4 h4 a6,6 0 0,1 6,6 v16 a8,8 0 1,0 0,16 v4 a6,6 0 0,1 -6,6 h-16 v4 a8,8 0 1,1 -16,0 v-4 h-4 a6,6 0 0,1 -6,-6 v-16 a8,8 0 1,0 0,-16 v-4 a6,6 0 0,1 6,-6 Z" fill="#65a30d" transform="scale(0.85) translate(8, 12)"/>
                        <path d="M42,28 h16 v-4 a8,8 0 1,1 16,0 v4 h4 a6,6 0 0,1 6,6 v16 a8,8 0 1,0 0,16 v4 a6,6 0 0,1 -6,6 h-16 v4 a8,8 0 1,1 -16,0 v-4 h-4 a6,6 0 0,1 -6,-6 v-16 a8,8 0 1,0 0,-16 v-4 a6,6 0 0,1 6,-6 Z" fill="#84cc16" transform="scale(0.85) translate(8, 12)"/>
                    </svg>`,
            Star: `
                <svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="starGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#FFF176" />
                            <stop offset="50%" stop-color="#FFD54F" />
                            <stop offset="100%" stop-color="#FF9800" />
                        </linearGradient>
                    </defs>
                    <polygon points="50,10 61,35 89,35 66,54 75,82 50,65 25,82 34,54 11,35 39,35" fill="url(#starGrad3)" stroke="#E65100" stroke-width="6" stroke-linejoin="round"/>
                    <path d="M50,20 L58,38 L76,38 L62,50 L68,68 L50,56 L32,68 L38,50 L24,38 L42,38 Z" fill="#FFF9C4" opacity="0.9"/>
                </svg>
            `
        };

        // --- Audio Engine ---
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (AudioContext) audioCtx = new AudioContext();
            }
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            initAudio();
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const playTone = (freq, tType, duration, delay = 0, vol = 0.3) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = tType;
                osc.frequency.setValueAtTime(freq, now + delay);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                gain.gain.setValueAtTime(0, now + delay);
                gain.gain.linearRampToValueAtTime(vol, now + delay + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, now + delay + duration);
                osc.start(now + delay);
                osc.stop(now + delay + duration);
            };

            if (type === 'pop') playTone(600, 'sine', 0.1, 0, 0.4);
            else if (type === 'drop') playTone(300, 'triangle', 0.1, 0, 0.4);
            else if (type === 'success') {
                playTone(523.25, 'triangle', 0.2, 0, 0.4);
                playTone(659.25, 'triangle', 0.2, 0.05, 0.4);
                playTone(783.99, 'triangle', 0.2, 0.1, 0.4);
                playTone(1046.50, 'triangle', 0.4, 0.15, 0.4);
            }
            else if (type === 'star') {
                playTone(1200, 'sine', 0.1, 0, 0.2);
                playTone(1600, 'sine', 0.15, 0.05, 0.2);
            }
            else if (type === 'wrong') playTone(150, 'sawtooth', 0.3, 0, 0.3);
            else if (type === 'start') {
                playTone(523.25, 'sine', 0.3, 0, 0.3);

        // --- HTML Generators for Blocks ---

        // --- Core Logic ---
        function generateQuestionVer4() {
            const maxVal = state.maxSum || 20;
            let minAns = 11, maxAns = 19;
            if (maxVal === 30) { minAns = 21; maxAns = 29; }
            else if (maxVal === 50) { minAns = 31; maxAns = 49; }
            else if (maxVal === 100) { minAns = 51; maxAns = 99; }

            let bestSet = null;
            let minDistance = 999;
            
            for (let attempt = 0; attempt < 150; attempt++) {
                let finalAns = Math.floor(Math.random() * (maxAns - minAns + 1)) + minAns;
                if (finalAns % 10 === 0) continue;

                let possibleTens = [10, 20, 30, 40, 50, 60, 70, 80, 90].filter(t => t < finalAns);
                if (possibleTens.length === 0) continue;
                
                let pairSum = possibleTens[Math.floor(Math.random() * possibleTens.length)];
                let n3 = finalAns - pairSum;
                if (n3 % 10 === 0 || n3 <= 0) continue;

                let n1 = Math.floor(Math.random() * (pairSum - 1)) + 1;
                let n2 = pairSum - n1;
                
                if (n1 % 10 === 0 || n2 % 10 === 0 || n1 <= 0 || n2 <= 0) continue;

                let arr = [n1, n2, n3];
                let dist = Math.max(...arr) - Math.min(...arr);
                
                if (dist < minDistance) {
                    minDistance = dist;
                    bestSet = [n1, n2, n3];
                }
                
                if (maxVal <= 30 && dist <= 6) break;
                if (maxVal === 50 && dist <= 10) break;
                if (maxVal === 100 && dist <= 20) break;
            }

            if (!bestSet) bestSet = [5, 5, maxAns - 10 > 0 ? maxAns - 10 : 1];
            state.targets = bestSet.sort(() => Math.random() - 0.5);
        }

        // VER 8: Math constraint to avoid hard "2-number breaks" like 5+4+3 or 2+3+6
        function generateQuestionVer5() {
            const maxVal = state.maxSum || 20;
            let minAns = 11, maxAns = 19;
            if (maxVal === 30) { minAns = 21; maxAns = 29; }
            else if (maxVal === 50) { minAns = 31; maxAns = 49; }
            else if (maxVal === 100) { minAns = 51; maxAns = 99; }

            let bestSet = null;
            let minDistance = 999;
            
            for (let attempt = 0; attempt < 500; attempt++) {
                let finalAns = Math.floor(Math.random() * (maxAns - minAns + 1)) + minAns;
                if (finalAns % 10 === 0) continue;

                let n1 = Math.floor(Math.random() * (finalAns - 2)) + 1;
                let rem = finalAns - n1;
                let n2 = Math.floor(Math.random() * (rem - 1)) + 1;
                let n3 = rem - n2;

                if (n1%10 === 0 || n2%10 === 0 || n3%10 === 0) continue;
                if ((n1+n2)%10 === 0 || (n2+n3)%10 === 0 || (n1+n3)%10 === 0) continue;

                let arr = [n1, n2, n3];
                
                let canFillTwo = false;
                let canFillOne = false;
                for(let i=0; i<3; i++) {
                    let others = [0,1,2].filter(x => x !== i);
                    let req0 = 10 - (arr[others[0]] % 10);
                    let req1 = 10 - (arr[others[1]] % 10);
                    if (arr[i] >= req0 + req1) canFillTwo = true;
                    if (arr[i] >= req0 || arr[i] >= req1) canFillOne = true;
                }

                // Strictly ensure one number can fill others without complex back/forth
                if (finalAns >= 20 && !canFillTwo) continue;
                if (finalAns < 20 && !canFillOne) continue;

                let dist = Math.max(...arr) - Math.min(...arr);
                
                if (dist < minDistance) {
                    minDistance = dist;
                    bestSet = [n1, n2, n3];
                }
                
                if (maxVal <= 30 && dist <= 4) break;
                if (maxVal === 50 && dist <= 8) break;
                if (maxVal === 100 && dist <= 15) break;
            }

            // Absolute reliable fallback guaranteeing logic
            if (!bestSet) {
                if (maxVal === 20) bestSet = [8, 4, maxAns - 12 > 0 ? maxAns - 12 : 2];
                else bestSet = [9, 8, maxAns - 17 > 0 ? maxAns - 17 : 4];
            }
            
            state.targets = bestSet.sort(() => Math.random() - 0.5);
        }

        function generateQuestion() {
            if (state.completedQuestions < 5) {
                generateQuestionVer4();
            } else {
                generateQuestionVer5();
            }

            state.numbers = state.targets.map(num => ({
                tens: Math.floor(num / 10),
                ones: num % 10,
                isTransformed: false
            }));

            const total = state.targets.reduce((a, b) => a + b, 0);
            let opts = new Set([total]);
            while(opts.size < 4) {
                const variations = [total + 10, total - 10, total + 1, total - 1, total + 2, total - 2, total + 5, total - 5];
                const randChoice = variations[Math.floor(Math.random() * variations.length)];
                if (randChoice > 0 && randChoice !== total) opts.add(randChoice);
            }
            state.options = Array.from(opts).sort(() => Math.random() - 0.5);

            state.hasGuessedWrong = false;
            state.wrongGuesses = [];
            state.correctAnswer = null;
            state.showFinalAnswer = false;
            state.showNumberBond = false;
            state.showSplitBond = false;

            document.getElementById('scenic-bg').style.display = 'block';
            showNotification("Move the cubes to make TENS! 🧩");
        }

        function startGame() {
            initAudio();
            playSound('start');
            state.score = 0;
            state.completedQuestions = 0;
            state.gameState = 'regrouping';
            generateQuestion();
            renderApp();
        }

        function selectRange(val) {
            playSound('pop');
            state.maxSum = val;
            renderApp();
        }

        function showNotification(text) {
            const el = document.getElementById('notification-toast');
            document.getElementById('notification-text').innerText = text;
            el.classList.remove('opacity-0', '-translate-y-4');
            el.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                el.classList.remove('opacity-100', 'translate-y-0');
                el.classList.add('opacity-0', '-translate-y-4');

        function showFeedback(isCorrect, callback) {
            const overlay = document.getElementById('feedback-overlay');
            const content = document.getElementById('feedback-content');
            
            overlay.classList.remove('hidden');
            setTimeout(() => overlay.classList.add('opacity-100'), 10);
            
            content.className = `p-6 sm:p-10 rounded-[2rem] shadow-2xl border-[6px] border-white transform scale-0 transition-transform duration-300 ${isCorrect ? 'bg-[#58cc02]' : 'bg-[#ff4b4b]'}`;
            content.innerHTML = isCorrect ? Icons.CheckBig : Icons.XBig;
            
            setTimeout(() => content.classList.replace('scale-0', 'scale-110'), 50);
            setTimeout(() => content.classList.replace('scale-110', 'scale-100'), 250);

            setTimeout(() => {
                overlay.classList.remove('opacity-100');
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    if(callback) callback();
                }, 300);
            }, 1000);
        }

        function checkMultipleChoiceAnswer(guessVal) {
            if (state.showFinalAnswer || state.showNumberBond || state.showSplitBond) return; 

            const hasMadeTen = state.numbers.some(n => n.isTransformed);
            if (!hasMadeTen) {
                showNotification("Make a TEN (10, 20...) first before choosing! 👆");
                playSound('wrong');
                return;
            }

            const total = state.targets.reduce((a, b) => a + b, 0);
            if (guessVal === total) {
                playSound('success');
                if (!state.hasGuessedWrong) {
                    state.score += 20; 
                }
                
                state.correctAnswer = guessVal;
                state.showFinalAnswer = true;

                if (state.completedQuestions < 5) {
                    state.showNumberBond = true;
                } else {
                    state.showSplitBond = true;
                }
                renderApp();
                
                const delay = state.completedQuestions < 5 ? 3500 : 7500;
                setTimeout(() => {
                    state.showNumberBond = false;
                    state.showSplitBond = false;
                    
                    if ((state.completedQuestions + 1) % 5 === 0) {
                        showFeedback(true, () => startMinigame());
                    } else {
                        showFeedback(true, () => endQuestionNormal());
                    }
                }, delay); 
            } else {
                playSound('wrong');
                state.hasGuessedWrong = true; 
                if (!state.wrongGuesses.includes(guessVal)) {
                    state.wrongGuesses.push(guessVal);
                }
                renderApp();
                
                setTimeout(() => {
                    const btn = document.querySelector(`[data-val="${guessVal}"]`);
                    if (btn) {
                        btn.classList.add('animate-shake');
                        setTimeout(() => btn.classList.remove('animate-shake'), 500);
                    }
                }, 50);
            }
        }

        function endQuestionNormal() {
            shootConfettiShort();
            setTimeout(() => {
                if (state.completedQuestions + 1 >= MAX_QUESTIONS) {
                    state.gameState = 'finished';
                    document.getElementById('scenic-bg').style.display = 'block';
                    renderApp();
                    shootConfettiLong();
                } else {
                    state.completedQuestions++;
                    state.gameState = 'regrouping';
                    generateQuestion();
                    renderApp();
                }
            }, 1200);
        }

        // --- Drag and Drop Handling ---
        let isDragging = false;
        let dragSourceIdx = null;

        document.addEventListener('pointerdown', (e) => {
            if(state.gameState !== 'regrouping' || state.showNumberBond || state.showSplitBond) return;
            initAudio();
            const target = e.target.closest('[data-drag]');
            if(!target) return;

            const dragAction = target.getAttribute('data-drag');
            if (dragAction === 'unit') {
                const idx = parseInt(target.getAttribute('data-idx'));
                startDrag(e, idx);
                playSound('pop');
            }
        });

        function startDrag(e, sourceIdx) {
            e.preventDefault();
            isDragging = true;
            dragSourceIdx = sourceIdx;

            const proxy = document.getElementById('drag-proxy');
            proxy.innerHTML = `<div class="w-10 h-10 shadow-2xl">${getOneCubeHTML(false)}</div>`; 
            proxy.style.display = 'block';
            updateProxyPos(e.clientX, e.clientY);
        }

        document.addEventListener('pointermove', (e) => {
            if (state.gameState === 'minigame') {
                const wrapperEl = document.getElementById('jar-wrapper');
                const jarEl = document.getElementById('catcher-jar');
                if (wrapperEl && jarEl) {
                    const halfWidth = jarEl.offsetWidth / 2;
                    state.jar.x = Math.max(halfWidth, Math.min(window.innerWidth - halfWidth, e.clientX));
                    wrapperEl.style.left = `${state.jar.x}px`;
                }
            }

            if(!isDragging) return;
            e.preventDefault();
            updateProxyPos(e.clientX, e.clientY);
        });

        document.addEventListener('pointerup', (e) => {
            if(!isDragging) return;
            isDragging = false;
            
            const proxy = document.getElementById('drag-proxy');
            proxy.style.display = 'none';

            const targetEl = document.elementFromPoint(e.clientX, e.clientY);
            const slotEl = targetEl ? targetEl.closest('.game-slot') : null;

            if (slotEl) {
                const targetIdx = parseInt(slotEl.getAttribute('data-slot-idx'));
                if (targetIdx !== dragSourceIdx) {
                    if (state.numbers[targetIdx].ones < 10) {
                        state.numbers[dragSourceIdx].ones--;
                        state.numbers[targetIdx].ones++;
                        
                        if (state.numbers[targetIdx].ones === 10) {
                            state.numbers[targetIdx].ones = 0;
                            state.numbers[targetIdx].tens++;
                            state.numbers[targetIdx].isTransformed = true;
                            playSound('magic');
                            showNotification("Awesome! You made a TEN! 🌟");
                        } else {
                            playSound('drop');
                        }
                    } else {
                        showNotification("This column is full!");
                        playSound('wrong');
                    }
                }
            }
            dragSourceIdx = null;
            renderApp();
        });

        function updateProxyPos(x, y) {
            const proxy = document.getElementById('drag-proxy');
            proxy.style.left = x + 'px';
            proxy.style.top = y + 'px';
        }

        // --- Click Events ---
        document.addEventListener('click', (e) => {
            const actionBtn = e.target.closest('[data-action]');
            if (!actionBtn) return;
            
            const act = actionBtn.getAttribute('data-action');
            if (act === 'start') startGame();
            else if (act === 'guess') {
                const val = parseInt(actionBtn.getAttribute('data-val'));
                checkMultipleChoiceAnswer(val);
            } else if (act === 'set-range') {
                const val = parseInt(actionBtn.getAttribute('data-val'));
                selectRange(val);
            }
        });

        // --- Minigame: Catching Stars ---
        let animFrame;
        function startMinigame() {
            state.gameState = 'minigame';
            document.getElementById('scenic-bg').style.display = 'none'; 
            state.jar.caught = 0;
            state.stars = [];
            renderApp();
            
            let frameCount = 0;
            function updateMinigame() {
                if (state.gameState !== 'minigame') return;
                frameCount++;

                if (frameCount % 35 === 0 && state.stars.length < 12 && state.jar.caught < state.jar.target) {
                    state.stars.push({
                        id: Date.now() + Math.random(),
                        x: Math.random() * (window.innerWidth - 60) + 30,
                        y: -50,
                        speed: 2.5 + Math.random() * 3.5,
                        scale: 0.8 + Math.random() * 0.6,
                        caught: false
                    });
                }

                const fillEl = document.getElementById('jar-fill');
                if (fillEl) {
                    const fillPct = (state.jar.caught / state.jar.target) * 100;
                    fillEl.style.height = `${fillPct}%`;
                    
                    if(Math.random() < 0.1 && state.jar.caught > 0) {
                        const bubble = document.createElement('div');
                        bubble.className = 'bubble';
                        bubble.style.left = `${Math.random() * 80 + 10}%`;
                        bubble.style.width = `${Math.random() * 8 + 4}px`;
                        bubble.style.height = bubble.style.width;
                        bubble.style.bottom = `${Math.random() * 20}%`;
                        fillEl.appendChild(bubble);
                        setTimeout(() => bubble.remove(), 1900);
                    }
                }

                for (let i = state.stars.length - 1; i >= 0; i--) {
                    let star = state.stars[i];
                    if (star.caught) continue;

                    star.y += star.speed;
                    
                    const starEl = document.getElementById(`star-${star.id}`);
                    if (starEl) {
                        starEl.style.top = `${star.y}px`;
                        starEl.style.left = `${star.x}px`;
                    } else if (star.y < window.innerHeight) {
                        const container = document.getElementById('minigame-container');
                        if (container) {
                            const newStar = document.createElement('div');
                            newStar.id = `star-${star.id}`;
                            newStar.className = 'absolute w-10 h-10 sm:w-14 sm:h-14 animate-twinkle drop-shadow-[0_0_8px_rgba(255,215,0,0.8)]'; 
                            newStar.style.transform = `scale(${star.scale})`;
                            newStar.style.left = `${star.x}px`;
                            newStar.style.top = `${star.y}px`;
                            newStar.innerHTML = Icons.Star;
                            container.appendChild(newStar);
                        }
                    }

                    const jarEl = document.getElementById('catcher-jar');
                    if(jarEl) {
                        const jarRect = jarEl.getBoundingClientRect();
                        
                        if (star.y > jarRect.top && star.y < jarRect.bottom) {
                            if (Math.abs((star.x + 20) - state.jar.x) < jarRect.width / 2) { 
                                star.caught = true;
                                state.jar.caught++;
                                state.score += 5; 
                                playSound('star');
                                
                                if (starEl) {
                                    starEl.style.transform = 'scale(0)';
                                    starEl.style.opacity = '0';
                                    setTimeout(() => starEl.remove(), 200);
                                }
                                state.stars.splice(i, 1);

                                if (state.jar.caught >= state.jar.target) {
                                    playSound('magic');
                                    setTimeout(() => endMinigame(), 500);
                                    return; 
                                }
                            }
                        }
                    }

                    if (star.y > window.innerHeight) {
                        if (starEl) starEl.remove();
                        state.stars.splice(i, 1);
                    }
                }
                animFrame = requestAnimationFrame(updateMinigame);
            }
            updateMinigame();
        }

        function endMinigame() {
            cancelAnimationFrame(animFrame);
            shootConfettiLong();
            setTimeout(() => {
                if (state.completedQuestions + 1 >= MAX_QUESTIONS) {
                    state.gameState = 'finished';
                    document.getElementById('scenic-bg').style.display = 'block';
                    renderApp();
                    shootConfettiLong();
                } else {
                    state.completedQuestions++;
                    state.gameState = 'regrouping';
                    generateQuestion();
                    renderApp();
                }
            }, 4000); 
        }

        function shootConfettiLong() {
            const duration = 4000;
            const end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 5, angle: 270, spread: 120, origin: { x: Math.random(), y: -0.1 }, colors: ['#ffc800', '#ff4b4b', '#1cb0f6', '#58cc02', '#a335ee', '#ffffff'], startVelocity: 15 + Math.random() * 10, gravity: 0.6 + Math.random() * 0.4, ticks: 300, shapes: ['square', 'circle'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function shootConfettiShort() {
            confetti({ particleCount: 60, spread: 80, origin: { y: 0.6 }, colors: ['#ffc800', '#1cb0f6', '#58cc02'] });
        }

        // --- VER 8: PERFECTLY BALANCED NUMBER BOND (First 5 Qs) ---

                    <path d="M 270 0 C 270 50, 210 50, 210 100" fill="none" stroke="#ef4444" stroke-width="4" stroke-linecap="round" class="animate-draw-line-bond" />`;

                circleLeft = 50; // 50% mark maps to x=150 in 300 viewBox
                svgLines = `
                    <path d="M 30 0 C 30 50, 150 50, 150 100" fill="none" stroke="#ef4444" stroke-width="4" stroke-linecap="round" class="animate-draw-line-bond" />
                    <path d="M 270 0 C 270 50, 150 50, 150 100" fill="none" stroke="#ef4444" stroke-width="4" stroke-linecap="round" class="animate-draw-line-bond" />`;
            }

            return `
            <div class="absolute inset-0 z-50 flex items-center justify-center p-2 sm:p-4">
                <div class="absolute inset-0 bg-white/95 backdrop-blur-md rounded-3xl border-4 border-white shadow-2xl animate-pop-in"></div>
                
                <div class="relative w-full flex flex-col items-center justify-center">
                    
                    <div class="relative w-full max-w-xl mx-auto h-[200px] sm:h-[250px]">
                        <div class="absolute w-full top-0 h-16 text-5xl sm:text-6xl font-black">
                            <div class="absolute left-[10%] top-0 -translate-x-1/2 w-16 text-center ${colors[0]} drop-shadow-sm bg-white rounded-xl shadow-sm border-2 border-color-0">${t[0]}</div>
                            <div class="absolute left-[30%] top-0 -translate-x-1/2 text-[#1e40af] mt-2">+</div>
                            <div class="absolute left-[50%] top-0 -translate-x-1/2 w-16 text-center ${colors[1]} drop-shadow-sm bg-white rounded-xl shadow-sm border-2 border-color-1">${t[1]}</div>
                            <div class="absolute left-[70%] top-0 -translate-x-1/2 text-[#1e40af] mt-2">+</div>
                            <div class="absolute left-[90%] top-0 -translate-x-1/2 w-16 text-center ${colors[2]} drop-shadow-sm bg-white rounded-xl shadow-sm border-2 border-color-2">${t[2]}</div>
                        </div>

                        <svg class="absolute top-16 left-0 w-full h-20 sm:h-28 z-10" viewBox="0 0 300 100" preserveAspectRatio="none">
                            ${svgLines}
                        </svg>

                        <div class="absolute bottom-0 -translate-x-1/2 z-20 flex justify-center w-24" style="left: ${circleLeft}%">
                            <div class="text-red-600 border-[5px] sm:border-[6px] border-red-500 rounded-full w-20 h-20 sm:w-24 sm:h-24 flex items-center justify-center bg-white shadow-xl animate-scale-up drop-shadow-md chunky-number text-4xl sm:text-5xl">${bondSum}</div>
                        </div>
                    </div>

                    <div class="flex items-center gap-4 sm:gap-6 text-4xl sm:text-6xl font-black mt-8 sm:mt-12 z-20 bg-[#1cb0f6] px-8 py-3 rounded-full shadow-[0_10px_25px_rgba(28,176,246,0.4)] border-4 border-[#1899d6] animate-pop-in" style="animation-delay: 0.8s; opacity: 0; animation-fill-mode: forwards;">
                        <span class="text-white drop-shadow-md">${bondSum}</span>
                        <span class="text-white/70 text-4xl sm:text-5xl">+</span>
                        <span class="text-white drop-shadow-md">${otherNum}</span>
                        <span class="text-white/70 text-4xl sm:text-5xl">=</span>
                        <span class="text-[#ffc800] drop-shadow-md chunky-number">${finalSum}</span>
                    </div>

                </div>
            </div>`;
        }

        // --- VER 8: SPLIT BOND ANIMATION (Mathematically Optimal Path) ---
        function renderSplitBondAnim() {
            let t = state.targets;
            let S = -1;
            
            for(let i=0; i<3; i++) {
                let others = [0,1,2].filter(x => x !== i);
                let req0 = (10 - (t[others[0]] % 10)) % 10 || 10;
                let req1 = (10 - (t[others[1]] % 10)) % 10 || 10;
                if (t[i] >= req0 + req1) { S = i; break; }
            }
            
            if (S === -1) {
                for(let i=0; i<3; i++) {
                    let others = [0,1,2].filter(x => x !== i);
                    let req0 = (10 - (t[others[0]] % 10)) % 10 || 10;
                    let req1 = (10 - (t[others[1]] % 10)) % 10 || 10;
                    if (t[i] >= req0) { S = i; break; }
                    if (t[i] >= req1) { S = i; break; }
                }
            }
            if (S === -1) S = 0; // Absolute fallback

            let others = [0,1,2].filter(x => x !== S);
            let req0 = (10 - (t[others[0]] % 10)) % 10 || 10;
            let req1 = (10 - (t[others[1]] % 10)) % 10 || 10;

            let gives = {0: 0, 1: 0, 2: 0};
            if (t[S] >= req0 + req1) {
                gives[others[0]] = req0;
                gives[others[1]] = req1;
            } else if (t[S] >= req0) {
                gives[others[0]] = req0;
            } else if (t[S] >= req1) {
                gives[others[1]] = req1;
            }
            
            let kept = t[S] - gives[0] - gives[1] - gives[2];
            let splitParts = [];
            let colors = ['color-0', 'color-1', 'color-2'];

            if (S === 0) {
                if (kept > 0) splitParts.push({ val: kept, target: 0, c: colors[0] });
                if (gives[1] > 0) splitParts.push({ val: gives[1], target: 1, c: colors[1] });
                if (gives[2] > 0) splitParts.push({ val: gives[2], target: 2, c: colors[2] });
            } else if (S === 1) {
                if (gives[0] > 0) splitParts.push({ val: gives[0], target: 0, c: colors[0] });
                if (kept > 0) splitParts.push({ val: kept, target: 1, c: colors[1] });
                if (gives[2] > 0) splitParts.push({ val: gives[2], target: 2, c: colors[2] });
            } else if (S === 2) {
                if (gives[0] > 0) splitParts.push({ val: gives[0], target: 0, c: colors[0] });
                if (gives[1] > 0) splitParts.push({ val: gives[1], target: 1, c: colors[1] });
                if (kept > 0) splitParts.push({ val: kept, target: 2, c: colors[2] });
            }

            function renderSplitNode(idx) {
                if (idx !== S) return '';
                let lines = '';
                if (splitParts.length === 3) lines = `<path d="M 50 0 L 15 50" stroke="black" stroke-width="3" fill="none" class="animate-draw-line-bond"/><path d="M 50 0 L 50 50" stroke="black" stroke-width="3" fill="none" class="animate-draw-line-bond"/><path d="M 50 0 L 85 50" stroke="black" stroke-width="3" fill="none" class="animate-draw-line-bond"/>`;
                else if (splitParts.length === 2) lines = `<path d="M 50 0 L 30 50" stroke="black" stroke-width="3" fill="none" class="animate-draw-line-bond"/><path d="M 50 0 L 70 50" stroke="black" stroke-width="3" fill="none" class="animate-draw-line-bond"/>`;
                else lines = `<path d="M 50 0 L 50 50" stroke="black" stroke-width="3" fill="none" class="animate-draw-line-bond"/>`;

                return `
                <div class="absolute top-full left-1/2 transform -translate-x-1/2 flex flex-col items-center w-[120px] sm:w-[150px]">
                    <svg class="w-full h-12 -mt-1" viewBox="0 0 100 50" preserveAspectRatio="none">${lines}</svg>
                    <div class="flex gap-2 sm:gap-3 w-full justify-around -mt-2">
                        ${splitParts.map((p, i) => `<div class="w-10 h-10 sm:w-12 sm:h-12 rounded-full border-[3px] border-black flex items-center justify-center bg-white shadow-sm z-10 animate-fade-in text-2xl sm:text-3xl chunky-number ${p.c}" style="animation-delay: ${0.6 + i*0.1}s; opacity: 0; animation-fill-mode: forwards;">${p.val}</div>`).join('')}
                    </div>
                </div>`;
            }

            let equationsHTML = '';
            let stepDelay = 1.5;
            for (let i=0; i<3; i++) {
                if (i !== S && gives[i] > 0) {
                    let sum = state.targets[i] + gives[i];
                    equationsHTML += `
                    <div class="grid grid-cols-[auto_auto_auto_auto_auto] gap-x-3 sm:gap-x-5 gap-y-2 items-center w-full max-w-[320px] mx-auto text-4xl sm:text-5xl font-black">
                        <div class="text-right animate-fade-in ${colors[i]} drop-shadow-sm w-12" style="animation-delay: ${stepDelay}s; opacity: 0; animation-fill-mode: forwards;">${state.targets[i]}</div>
                        <div class="text-[#1e40af] animate-fade-in" style="animation-delay: ${stepDelay}s; opacity: 0; animation-fill-mode: forwards;">+</div>
                        <div class="text-left animate-fade-in ${colors[S]} drop-shadow-sm w-12" style="animation-delay: ${stepDelay}s; opacity: 0; animation-fill-mode: forwards;">${gives[i]}</div>
                        <div class="text-[#1e40af] animate-fade-in" style="animation-delay: ${stepDelay}s; opacity: 0; animation-fill-mode: forwards;">=</div>
                        <div class="text-left animate-fade-in text-red-500 drop-shadow-sm chunky-number w-16" style="animation-delay: ${stepDelay}s; opacity: 0; animation-fill-mode: forwards;">${sum}</div>
                    </div>`;
                    stepDelay += 1.0;
                }
            }

            // Final Sum Step logic
            let finalSumParts = [];
            for (let i=0; i<3; i++) {
                if (i !== S) {
                    if (gives[i] > 0) {
                        finalSumParts.push(`<span class="text-white drop-shadow-md">${state.targets[i] + gives[i]}</span>`);
                    } else {
                        finalSumParts.push(`<span class="text-white drop-shadow-md">${state.targets[i]}</span>`);
                    }
                }
            }
            if (kept > 0) finalSumParts.push(`<span class="text-white drop-shadow-md">${kept}</span>`);
            let finalSumStr = finalSumParts.join(' <span class="text-white/70">+</span> ');

            return `
            <div class="absolute inset-0 z-50 flex items-center justify-center p-2 sm:p-4">
                <div class="absolute inset-0 bg-white/95 backdrop-blur-md rounded-3xl border-4 border-white shadow-2xl animate-pop-in"></div>
                
                <div class="relative w-full max-w-2xl mx-auto flex flex-col items-center justify-center pt-8">
                    
                    <div class="flex items-start justify-center gap-3 sm:gap-6 text-5xl sm:text-7xl font-black w-full pb-20 border-b-[3px] border-slate-100">
                        <div class="relative flex flex-col items-center z-20">
                            <span class="${colors[0]} drop-shadow-sm bg-white rounded-xl shadow-sm border-2 border-color-0 px-2 py-1">${state.targets[0]}</span>
                            ${renderSplitNode(0)}
                        </div>
                        <span class="text-[#1e40af] pt-1 sm:pt-2">+</span>
                        <div class="relative flex flex-col items-center z-20">
                            <span class="${colors[1]} drop-shadow-sm bg-white rounded-xl shadow-sm border-2 border-color-1 px-2 py-1">${state.targets[1]}</span>
                            ${renderSplitNode(1)}
                        </div>
                        <span class="text-[#1e40af] pt-1 sm:pt-2">+</span>
                        <div class="relative flex flex-col items-center z-20">
                            <span class="${colors[2]} drop-shadow-sm bg-white rounded-xl shadow-sm border-2 border-color-2 px-2 py-1">${state.targets[2]}</span>
                            ${renderSplitNode(2)}
                        </div>
                    </div>

                    <div class="flex flex-col w-full gap-4 mt-8">
                        ${equationsHTML}
                        
                        <div class="flex items-center justify-center gap-3 sm:gap-5 text-4xl sm:text-6xl font-black animate-fade-in mt-6 bg-[#1cb0f6] py-4 px-8 rounded-full border-4 border-[#1899d6] shadow-[0_10px_25px_rgba(28,176,246,0.4)]" style="animation-delay: ${stepDelay}s; opacity: 0; animation-fill-mode: forwards;">
                            ${finalSumStr}
                            <span class="text-white/70">=</span>
                            <span class="text-[#ffc800] chunky-number drop-shadow-md">${state.targets.reduce((a,b)=>a+b,0)}</span>
                        </div>
                    </div>

                </div>
            </div>`;
        }

        function renderBoard() {
            let html = `<div class="flex flex-row flex-wrap md:flex-nowrap items-center justify-center gap-x-4 gap-y-6 sm:gap-6 w-full max-w-6xl mt-4 sm:mt-8">`;
            const colors = ['color-0', 'color-1', 'color-2'];
            
            state.targets.forEach((targetVal, idx) => {
                const currentVal = state.numbers[idx].tens * 10 + state.numbers[idx].ones;
                const isRounded = state.numbers[idx].ones === 0 && currentVal > 0;
                
                html += `
                <div class="game-slot flex flex-col p-3 sm:p-4 card-duo w-[150px] sm:w-[200px] md:w-[240px] shrink-0 transition-all duration-300" data-slot-idx="${idx}">
                    
                    <div class="text-center pb-2 border-b-[3px] border-slate-100 mb-3">
                        <span class="text-3xl sm:text-5xl font-black chunky-number ${isRounded ? 'text-[#58cc02]' : colors[idx]}">${currentVal}</span>
                    </div>

                    <div class="flex flex-col gap-3">
                        <!-- Tens Section -->
                        <div class="flex flex-col items-center justify-start bg-[#58cc02]/5 rounded-xl sm:rounded-2xl p-2 sm:p-3 w-full border-[2px] sm:border-[3px] border-[#58cc02]/40 relative min-h-[60px] sm:min-h-[80px]">
                            <span class="absolute -top-3 bg-white px-2 sm:px-3 text-[10px] sm:text-[12px] font-extrabold text-[#58cc02] uppercase tracking-widest rounded-full border-2 border-[#58cc02]/20">TENS</span>
                            <div class="flex flex-col items-center justify-start w-full pt-2">
                                ${Array(state.numbers[idx].tens).fill(0).map((_, tIdx) => 
                                    getTenRodHTML(state.numbers[idx].isTransformed && tIdx === state.numbers[idx].tens - 1)
                                ).join('')}
                            </div>
                        </div>

                        <!-- Ones Section -->
                        <div class="flex flex-col items-center bg-[#ffc800]/5 rounded-xl sm:rounded-2xl p-2 sm:p-3 w-full border-[2px] sm:border-[3px] border-[#ffc800]/50 relative mt-2">
                            <span class="absolute -top-3 bg-white px-2 sm:px-3 text-[10px] sm:text-[12px] font-extrabold text-[#d97706] uppercase tracking-widest rounded-full border-2 border-[#ffc800]/30">ONES</span>
                            
                            <div class="grid grid-cols-5 gap-1.5 sm:gap-2 mt-2 p-1.5 sm:p-2 rounded-xl bg-white/60 border-2 border-[#ffc800]/20 w-full justify-items-center self-center shadow-inner">
                                ${Array(10).fill(0).map((_, i) => {
                                    if(i < state.numbers[idx].ones) {
                                        return `<div class="flex items-center justify-center relative w-full aspect-square max-w-[2.5rem]">
                                            <div data-drag="unit" data-idx="${idx}" class="cursor-grab active:cursor-grabbing touch-none pointer-events-auto w-[90%] h-[90%] flex items-center justify-center">
                                                ${getOneCubeHTML(false, "pointer-events-none")}
                                            </div>
                                        </div>`;
                                    } else {
                                        return `<div class="flex items-center justify-center relative w-full aspect-square max-w-[2.5rem] pointer-events-none">
                                            <div class="w-[90%] h-[90%] flex items-center justify-center">
                                                ${getOneCubeHTML(true, "pointer-events-none")}
                                            </div>
                                        </div>`;
                                    }
                                }).join('')}
                            </div>
                        </div>
                    </div>
                </div>`;

                if (idx < state.targets.length - 1) {
                    html += `<div class="self-center mx-0 sm:mx-2 drop-shadow-md shrink-0 hidden md:block">${Icons.Plus}</div>`;
                }
            });

            html += `</div>`;
            return html;
        }

        function renderBottomControls() {
            const optionsHtml = state.options.map(opt => {
                let btnClass = "btn-duo-blue hover:brightness-110 active:scale-95";
                let disabledAttr = "";
                
                if (state.wrongGuesses.includes(opt)) {
                    btnClass = "btn-duo-wrong opacity-70 cursor-not-allowed";
                    disabledAttr = "disabled";
                } else if (state.correctAnswer === opt) {
                    btnClass = "btn-duo-green animate-bounce-sm";
                }

                return `
                <button data-action="guess" data-val="${opt}" ${disabledAttr} class="${btnClass} flex-1 h-14 sm:h-16 rounded-xl sm:rounded-2xl flex items-center justify-center font-black text-2xl sm:text-3xl text-white chunky-number shadow-lg transition-all mx-1 sm:mx-2">
                    ${opt}
                </button>
                `;
            }).join('');

            return `
            <div class="pt-4 sm:pt-6 pb-2 px-2 sm:px-4 flex items-center justify-center z-30 w-full shrink-0">
                <div class="grid grid-cols-4 w-full max-w-4xl gap-2 sm:gap-4">
                    ${optionsHtml}
                </div>
            </div>`;
        }

        function renderApp() {
            const app = document.getElementById('app');
            let html = '';

            if (state.gameState === 'start') {
                html = `
                <div class="flex-1 flex flex-col items-center justify-center p-4 z-10 w-full relative">
                    <div class="bg-white rounded-3xl p-8 sm:p-10 mb-6 w-full max-w-[360px] flex flex-col items-center shadow-[0_10px_20px_rgba(0,0,0,0.1)] border border-slate-100">
                        <div class="mb-6 animate-bounce-sm">
                            ${Icons.Puzzle}
                        </div>
                        <h1 class="text-4xl sm:text-5xl font-black text-[#1e293b] mb-1 tracking-tight text-center">Make Tens</h1>
                        <p class="text-[#94a3b8] font-bold text-sm sm:text-base uppercase tracking-widest text-center">STRATEGY GAME</p>
                    </div>

                    <div class="mb-6 w-full max-w-[360px] animate-slide-up bg-white/90 p-5 rounded-3xl border-4 border-white shadow-xl" style="animation-delay: 0.15s">
                        <p class="text-slate-800 font-black mb-4 text-base uppercase tracking-wider text-center">Select Max Sum:</p>
                        <div class="grid grid-cols-2 gap-3 w-full">
                            <button data-action="set-range" data-val="20" class="range-btn ${state.maxSum === 20 ? 'btn-duo-blue text-white chunky-number border-b-[5px] border-[#1899d6]' : 'btn-duo-white text-slate-600 border-b-[5px] border-slate-300'} w-full py-3 rounded-xl font-black text-xl transition-transform shadow-md">20</button>
                            <button data-action="set-range" data-val="30" class="range-btn ${state.maxSum === 30 ? 'btn-duo-blue text-white chunky-number border-b-[5px] border-[#1899d6]' : 'btn-duo-white text-slate-600 border-b-[5px] border-slate-300'} w-full py-3 rounded-xl font-black text-xl transition-transform shadow-md">30</button>
                            <button data-action="set-range" data-val="50" class="range-btn ${state.maxSum === 50 ? 'btn-duo-blue text-white chunky-number border-b-[5px] border-[#1899d6]' : 'btn-duo-white text-slate-600 border-b-[5px] border-slate-300'} w-full py-3 rounded-xl font-black text-xl transition-transform shadow-md">50</button>
                            <button data-action="set-range" data-val="100" class="range-btn ${state.maxSum === 100 ? 'btn-duo-blue text-white chunky-number border-b-[5px] border-[#1899d6]' : 'btn-duo-white text-slate-600 border-b-[5px] border-slate-300'} w-full py-3 rounded-xl font-black text-xl transition-transform shadow-md">100</button>
                        </div>
                    </div>
                    
                    <button data-action="start" class="btn-duo-green w-full max-w-[360px] py-4 sm:py-5 rounded-2xl font-black text-2xl uppercase tracking-widest shadow-xl flex items-center justify-center gap-3">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><polygon points="6 3 20 12 6 21 6 3"/></svg> PLAY NOW
                    </button>
                </div>`;
            } else if (state.gameState === 'finished') {
                html = `
                <div class="flex-1 flex flex-col items-center justify-center p-4 text-center animate-pop-in relative z-10">
                    <div class="card-duo p-8 sm:p-12 mb-6 sm:mb-8 flex flex-col items-center w-full max-w-sm border-[3px] sm:border-[4px] border-white">
                        <div class="bg-gradient-to-br from-[#ffc800] to-[#e5a900] p-6 sm:p-8 rounded-full mb-6 sm:mb-8 border-4 border-white animate-bounce-sm shadow-[0_6px_0_#cc8400] sm:shadow-[0_8px_0_#cc8400]">
                            <span class="text-5xl sm:text-7xl">🏆</span>
                        </div>
                        <h2 class="text-4xl sm:text-5xl font-black text-slate-800 mb-2">AWESOME!</h2>
                        <p class="text-[#afafaf] font-bold uppercase tracking-widest text-lg sm:text-xl mb-2 sm:mb-4">TOTAL SCORE</p>
                        <div class="text-6xl sm:text-8xl font-black text-[#58cc02] mb-6 sm:mb-10 drop-shadow-sm chunky-number">${state.score}</div>
                        <button data-action="start" class="btn-duo-blue w-full py-4 sm:py-5 rounded-2xl sm:rounded-3xl font-black text-xl sm:text-2xl uppercase tracking-widest shadow-xl text-white">
                            PLAY AGAIN
                        </button>
                    </div>
                </div>`;
            } else if (state.gameState === 'minigame') {
                html = `
                <div id="minigame-container" class="absolute inset-0 z-50 starry-bg overflow-hidden w-full h-full flex flex-col">
                    <div class="moon"></div>
                    <div class="stars-layer-1"></div>
                    <div class="stars-layer-2"></div>
                    
                    <div class="absolute top-8 sm:top-12 w-full text-center z-10 animate-fade-in pointer-events-none">
                        <h2 class="text-4xl sm:text-5xl md:text-6xl font-black text-white drop-shadow-[0_4px_0_#000]">CATCH STARS!</h2>
                        <div class="inline-block bg-black/40 backdrop-blur-sm px-4 sm:px-6 py-1 sm:py-2 rounded-full mt-2 sm:mt-4 border border-white/20">
                            <p class="text-white font-bold text-lg sm:text-xl tracking-widest">SCORE: <span class="text-[#ffc800] text-xl sm:text-2xl chunky-number">${state.score}</span></p>
                        </div>
                    </div>
                    
                    <div id="jar-wrapper" class="absolute bottom-[20px] z-20 flex justify-center items-end" style="left: ${state.jar.x}px; transform: translateX(-50%); touch-action: none; width: 300px;">
                        <div class="jar-glow"></div>
                        <div id="catcher-jar" class="relative glass-jar-v9 flex flex-col-reverse shadow-[0_0_30px_rgba(255,255,255,0.2)]">
                            <div class="jar-neck-v9"></div>
                            <div class="jar-lip-v9"></div>
                            <div class="jar-highlight-v9"></div>
                            <div id="jar-fill" class="magic-fill-v9 w-full" style="height: 0%;"></div>
                        </div>
                    </div>
                </div>`;
            } else {
                html = `
                ${renderHeader()}
                <div class="flex-1 w-full overflow-y-auto z-10 flex flex-col pt-[70px] sm:pt-[80px] pb-4 scrollbar-hide relative">
                    <div class="my-auto w-full flex flex-col items-center justify-center px-2 sm:px-4 min-h-min relative">
                        ${state.showNumberBond ? renderNumberBondAnim() : ''}
                        ${state.showSplitBond ? renderSplitBondAnim() : ''}
                        ${(!state.showNumberBond && !state.showSplitBond) ? `
                            ${renderEquation()}
                            ${renderBoard()}
                        ` : ''}
                        ${renderBottomControls()}
                    </div>
                </div>
                `;
            }

            app.innerHTML = html;
        }

        renderApp();
    </script>
</body>
</html>
