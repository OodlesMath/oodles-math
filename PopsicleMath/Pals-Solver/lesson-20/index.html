<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Circle Equal Groups</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        duoGreen: '#58CC02',
                        duoGreenDark: '#58A700',
                        duoBlue: '#1CB0F6',
                        duoBlueDark: '#1899D6',
                        duoYellow: '#FFC800',
                        duoYellowDark: '#E5B400',
                        duoRed: '#FF4B4B',
                        duoRedDark: '#E54343',
                        duoGray: '#E5E5E5',
                        duoText: '#4B4B4B'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 60%, #90EE90 60%, #3CB371 100%);
            height: 100vh;
            overflow: hidden;
            user-select: none;
            touch-action: none; /* Prevent scroll on touch devices */
        }

        .duo-btn {
            transition: all 0.1s ease;
            box-shadow: 0 4px 0 0 rgba(0,0,0,0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .duo-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 0 rgba(0,0,0,0.2);
        }

        .duo-btn-green {
            background-color: #58CC02;
            color: white;
            box-shadow: 0 4px 0 0 #58A700;
        }
        .duo-btn-green:active { box-shadow: 0 0 0 0 #58A700; }

        .duo-btn-blue {
            background-color: #1CB0F6;
            color: white;
            box-shadow: 0 4px 0 0 #1899D6;
        }
        .duo-btn-blue:active { box-shadow: 0 0 0 0 #1899D6; }
        
        .duo-btn-white {
            background-color: white;
            color: #4B4B4B;
            border: 2px solid #E5E5E5;
            box-shadow: 0 4px 0 0 #E5E5E5;
        }
        .duo-btn-white:active { box-shadow: 0 0 0 0 #E5E5E5; }

        .game-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 0 0 #E5E5E5;
            border: 2px solid #E5E5E5;
        }

        #draw-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            touch-action: none; /* Crucial for drawing on mobile */
        }

        .object-item {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            transition: transform 0.2s;
            position: relative;
        }
        
        @media (max-width: 600px) {
            .object-item { font-size: 2rem; }
        }

        .object-item.locked {
            filter: grayscale(40%) opacity(0.8);
            transform: scale(0.95);
        }

        .pop-animation {
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .shake-animation {
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
        }

        /* Floating Try Again Text */
        .feedback-toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #FF4B4B;
            color: white;
            padding: 10px 24px;
            border-radius: 100px;
            font-weight: bold;
            font-size: 1.5rem;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .feedback-toast.show {
            opacity: 1;
            transform: translate(-50%, -60%);
            animation: floatUp 1.5s forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, -50%); }
            80% { opacity: 1; transform: translate(-50%, -80%); }
            100% { opacity: 0; transform: translate(-50%, -90%); }
        }

        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- Confetti Overlay -->
    <canvas id="confetti-canvas"></canvas>

    <!-- Top Bar -->
    <div class="w-full max-w-4xl flex justify-between items-center mb-4 px-2 z-10">
        <div class="flex items-center gap-4 w-1/2">
            <span class="text-white font-bold text-lg drop-shadow-md">Q: <span id="q-counter">1/10</span></span>
            <div class="w-full bg-black/20 rounded-full h-4 relative overflow-hidden">
                <div id="progress-bar" class="bg-duoYellow h-full transition-all duration-300" style="width: 0%;"></div>
            </div>
        </div>
        <div class="flex items-center gap-4 text-white font-bold text-xl drop-shadow-md">
            <div class="flex items-center gap-1">
                ⭐ <span id="stars-display">0</span>
            </div>
            <div class="flex items-center gap-1">
                🎯 <span id="score-display">0</span>
            </div>
        </div>
    </div>

    <!-- Main Game Container -->
    <div class="game-container w-full max-w-4xl h-[70vh] flex flex-col p-4 md:p-8 relative z-10">
        
        <!-- Welcome Screen -->
        <div id="screen-welcome" class="flex-1 flex flex-col items-center justify-center text-center">
            <h1 class="text-4xl md:text-5xl font-extrabold text-duoText mb-6">Circle Equal Groups</h1>
            <p class="text-lg text-gray-500 mb-8 max-w-md">Learn division by drawing circles around groups of objects! Match the correct sizes to win.</p>
            <button onclick="startGame()" class="duo-btn duo-btn-green text-xl py-4 px-12 rounded-2xl">Play Now</button>
        </div>

        <!-- Game Screen -->
        <div id="screen-game" class="hidden flex-1 flex flex-col w-full h-full">
            
            <!-- Instruction Area -->
            <div class="flex justify-center items-center gap-4 mb-4">
                <button onclick="playInstruction()" class="w-12 h-12 bg-duoBlue text-white rounded-xl shadow-[0_4px_0_0_#1899D6] active:translate-y-1 active:shadow-none transition-all flex items-center justify-center text-2xl">
                    🔊
                </button>
                <h2 id="instruction-text" class="text-2xl md:text-3xl font-bold text-duoText">Circle groups of 3.</h2>
            </div>

            <!-- Play Area (Canvas + Grid) -->
            <div id="play-area" class="relative flex-1 w-full rounded-xl bg-blue-50 border-2 border-blue-100 overflow-hidden touch-none">
                <!-- CSS Grid for Objects -->
                <div id="objects-grid" class="absolute inset-0 w-full h-full p-4 md:p-8 grid place-items-center gap-2 pointer-events-none z-0">
                    <!-- Emojis populated by JS -->
                </div>
                <!-- Drawing Canvas -->
                <canvas id="draw-canvas"></canvas>
                <!-- Try Again Toast -->
                <div id="feedback-toast" class="feedback-toast">Try again!</div>
            </div>

            <!-- Multiple Choice Area (Hidden initially) -->
            <div id="mc-area" class="hidden flex-col items-center mt-4 pop-animation">
                <h3 class="text-xl md:text-2xl font-bold text-duoText mb-4">How many groups are there?</h3>
                <div id="mc-buttons" class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full max-w-2xl">
                    <!-- Buttons populated by JS -->
                </div>
            </div>

            <!-- Equation Area (Hidden initially) -->
            <div id="equation-area" class="hidden flex-col items-center mt-4 pop-animation">
                <div id="equation-text" class="text-4xl md:text-5xl font-extrabold text-duoGreen mb-6 tracking-wide">
                    12 ÷ 3 = 4
                </div>
                <button onclick="nextQuestion()" class="duo-btn duo-btn-blue text-xl py-3 px-10 rounded-2xl">Next</button>
            </div>
        </div>

        <!-- End Screen -->
        <div id="screen-end" class="hidden flex-1 flex flex-col items-center justify-center text-center pop-animation">
            <h1 class="text-5xl font-extrabold text-duoYellow mb-4">Awesome!</h1>
            <p class="text-2xl font-bold text-duoText mb-2">You completed all questions!</p>
            <p class="text-xl text-gray-500 mb-8">Final Score: <span id="final-score" class="text-duoGreen font-bold"></span></p>
            <div class="flex gap-4">
                <button onclick="location.reload()" class="duo-btn duo-btn-white text-lg py-3 px-8 rounded-xl">Home</button>
                <button onclick="startGame()" class="duo-btn duo-btn-green text-lg py-3 px-8 rounded-xl">Play Again</button>
            </div>
        </div>

    </div>

    <script>
        // --- Data & Constants ---
        const divisionFacts = [
            { total: 6, groupSize: 2 },
            { total: 8, groupSize: 2 }, { total: 8, groupSize: 4 },
            { total: 9, groupSize: 3 },
            { total: 10, groupSize: 2 }, { total: 10, groupSize: 5 },
            { total: 12, groupSize: 2 }, { total: 12, groupSize: 3 }, { total: 12, groupSize: 4 },
            { total: 15, groupSize: 3 }, { total: 15, groupSize: 5 },
            { total: 16, groupSize: 2 }, { total: 16, groupSize: 4 },
            { total: 18, groupSize: 2 }, { total: 18, groupSize: 3 },
            { total: 20, groupSize: 2 }, { total: 20, groupSize: 4 }, { total: 20, groupSize: 5 }
        ];
        const emojis = ['🐝', '🥕', '🍪', '🐜', '🍦', '🍅', '🍎', '🍌', '🍓', '🍩', '🎈', '⭐'];
        const pathColors = ['#FF4B4B', '#1CB0F6', '#FFC800', '#CE82FF', '#FF9600'];
        const TOTAL_QUESTIONS = 10;

        // --- State Variables ---
        let currentQuestion = 0;
        let score = 0;
        let stars = 0;
        let isFirstAttempt = true;
        let currentFact = null;
        let currentEmoji = null;
        
        let objectsData = []; // { id, x, y, el, locked }
        let currentPath = []; // Array of {x, y} relative to canvas (0 to 1)
        let lockedPaths = []; // Array of { path: [], color: string }
        let isDrawing = false;
        let groupsFound = 0;
        
        // --- DOM Elements ---
        const screens = {
            welcome: document.getElementById('screen-welcome'),
            game: document.getElementById('screen-game'),
            end: document.getElementById('screen-end')
        };
        const canvas = document.getElementById('draw-canvas');
        const ctx = canvas.getContext('2d');
        const grid = document.getElementById('objects-grid');
        const instructionText = document.getElementById('instruction-text');
        const playArea = document.getElementById('play-area');
        const mcArea = document.getElementById('mc-area');
        const mcButtons = document.getElementById('mc-buttons');
        const equationArea = document.getElementById('equation-area');
        const equationText = document.getElementById('equation-text');
        const toast = document.getElementById('feedback-toast');

        // --- Audio System (Web Audio API) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playTone(frequency, type, duration, vol=0.1) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playCorrectSound() {
            playTone(523.25, 'sine', 0.1); // C5
            setTimeout(() => playTone(659.25, 'sine', 0.15), 100); // E5
            setTimeout(() => playTone(783.99, 'sine', 0.2), 200); // G5
        }

        function playWrongSound() {
            playTone(300, 'sawtooth', 0.3, 0.05);
            setTimeout(() => playTone(250, 'sawtooth', 0.3, 0.05), 150);
        }

        function playCompleteSound() {
            playTone(440, 'square', 0.1, 0.05);
            setTimeout(() => playTone(554.37, 'square', 0.1, 0.05), 100);
            setTimeout(() => playTone(659.25, 'square', 0.1, 0.05), 200);
            setTimeout(() => playTone(880, 'square', 0.3, 0.05), 300);
        }

        // Web Speech API
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Cancel any ongoing speech
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.9; // Slightly slower for kids
                window.speechSynthesis.speak(utterance);
            }
        }

        function playInstruction() {
            if(currentFact) {
                speak(`Circle groups of ${currentFact.groupSize}`);
            }
        }

        // --- Core Game Flow ---
        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            currentQuestion = 0;
            score = 0;
            stars = 0;
            updateHeader();
            switchScreen('game');
            loadNextQuestion();
        }

        function switchScreen(screenName) {
            Object.values(screens).forEach(s => s.classList.add('hidden'));
            screens[screenName].classList.remove('hidden');
        }

        function loadNextQuestion() {
            currentQuestion++;
            if (currentQuestion > TOTAL_QUESTIONS) {
                endGame();
                return;
            }
            
            isFirstAttempt = true;
            groupsFound = 0;
            lockedPaths = [];
            currentPath = [];
            objectsData = [];
            
            // Pick random fact and emoji
            currentFact = divisionFacts[Math.floor(Math.random() * divisionFacts.length)];
            currentEmoji = emojis[Math.floor(Math.random() * emojis.length)];
            
            updateHeader();
            
            // Reset UI
            mcArea.classList.add('hidden');
            equationArea.classList.add('hidden');
            canvas.style.pointerEvents = 'auto'; // enable drawing
            
            // Setup Grid
            setupGrid();
            
            // Instruction
            instructionText.innerText = `Circle groups of ${currentFact.groupSize}.`;
            setTimeout(playInstruction, 500);
            
            resizeCanvas(); // ensures canvas is right size and clears it
        }

        function setupGrid() {
            grid.innerHTML = '';
            const t = currentFact.total;
            // Determine a nice grid layout. Prefer close to square.
            let cols = Math.ceil(Math.sqrt(t));
            let rows = Math.ceil(t / cols);
            
            // Minor aesthetic adjustments for specific numbers
            if (t === 6) { cols = 3; rows = 2; }
            if (t === 8) { cols = 4; rows = 2; }
            if (t === 10) { cols = 5; rows = 2; }
            if (t === 12) { cols = 4; rows = 3; }
            if (t === 15) { cols = 5; rows = 3; }
            if (t === 18) { cols = 6; rows = 3; }
            if (t === 20) { cols = 5; rows = 4; }

            grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

            for (let i = 0; i < t; i++) {
                const el = document.createElement('div');
                el.className = 'object-item pop-animation';
                el.innerText = currentEmoji;
                el.style.animationDelay = `${i * 0.05}s`;
                grid.appendChild(el);
                
                objectsData.push({
                    id: i,
                    el: el,
                    locked: false
                });
            }
        }

        function updateHeader() {
            document.getElementById('q-counter').innerText = `${currentQuestion}/${TOTAL_QUESTIONS}`;
            document.getElementById('progress-bar').style.width = `${(currentQuestion / TOTAL_QUESTIONS) * 100}%`;
            document.getElementById('score-display').innerText = score;
            document.getElementById('stars-display').innerText = stars;
        }

        // --- Canvas Drawing & Logic ---
        function resizeCanvas() {
            const rect = playArea.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            redrawCanvas();
            updateObjectCenters();
        }

        window.addEventListener('resize', () => {
            if (!screens.game.classList.contains('hidden')) {
                resizeCanvas();
            }
        });

        function getPointerPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            return {
                x: (clientX - rect.left) / canvas.width,
                y: (clientY - rect.top) / canvas.height
            };
        }

        function updateObjectCenters() {
            const canvasRect = canvas.getBoundingClientRect();
            objectsData.forEach(obj => {
                const rect = obj.el.getBoundingClientRect();
                obj.cx = (rect.left + rect.width / 2 - canvasRect.left) / canvas.width;
                obj.cy = (rect.top + rect.height / 2 - canvasRect.top) / canvas.height;
            });
        }

        // Pointer Events for Drawing
        canvas.addEventListener('pointerdown', startDraw);
        canvas.addEventListener('pointermove', draw);
        canvas.addEventListener('pointerup', endDraw);
        canvas.addEventListener('pointercancel', endDraw);
        canvas.addEventListener('pointerleave', endDraw);

        function startDraw(e) {
            if (canvas.style.pointerEvents === 'none') return;
            isDrawing = true;
            currentPath = [getPointerPos(e)];
            updateObjectCenters(); // Make sure centers are up to date
            canvas.setPointerCapture(e.pointerId);
        }

        function draw(e) {
            if (!isDrawing) return;
            const pos = getPointerPos(e);
            currentPath.push(pos);
            redrawCanvas();
        }

        function endDraw(e) {
            if (!isDrawing) return;
            isDrawing = false;
            canvas.releasePointerCapture(e.pointerId);
            
            if (currentPath.length < 5) {
                currentPath = [];
                redrawCanvas();
                return;
            }

            // Close the loop
            currentPath.push(currentPath[0]);
            
            // Check which objects are inside the polygon
            let insideCount = 0;
            let overlapsLocked = false;
            let capturedIds = [];

            objectsData.forEach(obj => {
                if (isPointInPolygon({x: obj.cx, y: obj.cy}, currentPath)) {
                    if (obj.locked) {
                        overlapsLocked = true;
                    } else {
                        insideCount++;
                        capturedIds.push(obj.id);
                    }
                }
            });

            // Logic Check
            if (overlapsLocked) {
                handleWrongGrouping("Don't overlap groups!");
            } else if (insideCount === currentFact.groupSize) {
                handleCorrectGrouping(capturedIds);
            } else {
                handleWrongGrouping();
            }

            currentPath = [];
            redrawCanvas();
        }

        function isPointInPolygon(point, vs) {
            let x = point.x, y = point.y;
            let inside = false;
            for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
                let xi = vs[i].x, yi = vs[i].y;
                let xj = vs[j].x, yj = vs[j].y;
                let intersect = ((yi > y) != (yj > y))
                    && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        function redrawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            // Draw locked paths
            lockedPaths.forEach(lp => {
                ctx.beginPath();
                ctx.lineWidth = 6;
                ctx.strokeStyle = lp.color;
                ctx.fillStyle = lp.color + '33'; // 20% opacity
                lp.path.forEach((p, i) => {
                    const px = p.x * canvas.width;
                    const py = p.y * canvas.height;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                });
                ctx.fill();
                ctx.stroke();
            });

            // Draw current path
            if (currentPath.length > 0) {
                ctx.beginPath();
                ctx.lineWidth = 6;
                ctx.strokeStyle = '#4B4B4B'; // Gray for active drawing
                ctx.setLineDash([10, 10]); // Dashed line for drawing
                currentPath.forEach((p, i) => {
                    const px = p.x * canvas.width;
                    const py = p.y * canvas.height;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                });
                ctx.stroke();
                ctx.setLineDash([]); // Reset
            }
        }

        function handleWrongGrouping(msg = "Try again!") {
            playWrongSound();
            isFirstAttempt = false;
            
            // Show toast
            toast.innerText = msg;
            toast.classList.remove('show');
            void toast.offsetWidth; // Trigger reflow
            toast.classList.add('show');
        }

        function handleCorrectGrouping(capturedIds) {
            playCorrectSound();
            
            // Lock elements visually
            objectsData.forEach(obj => {
                if (capturedIds.includes(obj.id)) {
                    obj.locked = true;
                    obj.el.classList.add('locked');
                }
            });

            // Save path with random color
            const color = pathColors[lockedPaths.length % pathColors.length];
            // Simplify path for aesthetics (keep every 3rd point to smooth it out visually)
            const simplified = currentPath.filter((_, i) => i % 2 === 0);
            simplified.push(simplified[0]); // Ensure closed
            lockedPaths.push({ path: simplified, color: color });
            
            groupsFound++;
            const totalGroupsNeeded = currentFact.total / currentFact.groupSize;
            
            if (groupsFound === totalGroupsNeeded) {
                // All grouped!
                setTimeout(showMultipleChoice, 500);
            }
        }

        function showMultipleChoice() {
            canvas.style.pointerEvents = 'none'; // disable drawing
            playCompleteSound();
            
            const correctAns = currentFact.total / currentFact.groupSize;
            
            // Generate distractors
            let options = new Set();
            options.add(correctAns);
            while(options.size < 4) {
                let offset = Math.floor(Math.random() * 5) - 2; // -2 to +2
                if (offset === 0) offset = 3;
                let val = correctAns + offset;
                if (val > 0 && val <= 20) options.add(val);
            }
            
            let optionsArr = Array.from(options).sort(() => Math.random() - 0.5);
            
            mcButtons.innerHTML = '';
            optionsArr.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'duo-btn duo-btn-white text-2xl font-bold py-4 rounded-2xl w-full';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                mcButtons.appendChild(btn);
            });

            speak("How many groups are there?");
            mcArea.classList.remove('hidden');
            
            // Scroll down slightly if needed on small screens
            mcArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function checkAnswer(selected, btnEl) {
            const correctAns = currentFact.total / currentFact.groupSize;
            
            if (selected === correctAns) {
                // Correct
                playCorrectSound();
                btnEl.classList.remove('duo-btn-white');
                btnEl.classList.add('duo-btn-green');
                btnEl.style.boxShadow = '0 4px 0 0 #58A700';
                btnEl.style.color = 'white';
                
                // Disable all buttons
                Array.from(mcButtons.children).forEach(b => b.disabled = true);
                
                if (isFirstAttempt) {
                    score += 10;
                    stars += 1;
                    updateHeader();
                }
                
                setTimeout(showEquation, 800);
            } else {
                // Wrong
                playWrongSound();
                isFirstAttempt = false;
                btnEl.classList.remove('duo-btn-white');
                btnEl.classList.add('bg-duoRed', 'text-white', 'shadow-[0_4px_0_0_#E54343]');
                btnEl.classList.add('shake-animation');
                setTimeout(() => {
                    btnEl.classList.remove('shake-animation', 'bg-duoRed', 'text-white', 'shadow-[0_4px_0_0_#E54343]');
                    btnEl.classList.add('duo-btn-white');
                }, 500);
            }
        }

        function showEquation() {
            mcArea.classList.add('hidden');
            const correctAns = currentFact.total / currentFact.groupSize;
            const eqStr = `${currentFact.total} ÷ ${currentFact.groupSize} = ${correctAns}`;
            equationText.innerText = eqStr;
            equationArea.classList.remove('hidden');
            
            const readText = `${currentFact.total} divided by ${currentFact.groupSize} equals ${correctAns}`;
            speak(readText);
            
            // Small Confetti for completing the question
            fireConfetti(50);
        }

        function nextQuestion() {
            loadNextQuestion();
        }

        function endGame() {
            switchScreen('end');
            document.getElementById('final-score').innerText = score;
            playCompleteSound();
            speak(`Awesome! You completed all questions. Your score is ${score}.`);
            fireConfetti(200);
        }

        // --- Simple Confetti System ---
        const cCanvas = document.getElementById('confetti-canvas');
        const cCtx = cCanvas.getContext('2d');
        let particles = [];

        function resizeConfetti() {
            cCanvas.width = window.innerWidth;
            cCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeConfetti);
        resizeConfetti();

        class Particle {
            constructor() {
                this.x = cCanvas.width / 2;
                this.y = cCanvas.height / 2;
                this.vx = (Math.random() - 0.5) * 20;
                this.vy = (Math.random() - 1) * 20 - 5;
                this.size = Math.random() * 10 + 5;
                this.color = pathColors[Math.floor(Math.random() * pathColors.length)];
                this.rot = Math.random() * 360;
                this.rotSpeed = (Math.random() - 0.5) * 10;
                this.life = 1.0;
                this.decay = Math.random() * 0.02 + 0.01;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.5; // gravity
                this.rot += this.rotSpeed;
                this.life -= this.decay;
            }
            draw() {
                cCtx.save();
                cCtx.translate(this.x, this.y);
                cCtx.rotate(this.rot * Math.PI / 180);
                cCtx.globalAlpha = Math.max(0, this.life);
                cCtx.fillStyle = this.color;
                cCtx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                cCtx.restore();
            }
        }

        function fireConfetti(amount = 100) {
            for (let i = 0; i < amount; i++) {
                particles.push(new Particle());
            }
            if (!isAnimatingConfetti) animateConfetti();
        }

        let isAnimatingConfetti = false;
        function animateConfetti() {
            isAnimatingConfetti = true;
            cCtx.clearRect(0, 0, cCanvas.width, cCanvas.height);
            
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            if (particles.length > 0) {
                requestAnimationFrame(animateConfetti);
            } else {
                isAnimatingConfetti = false;
                cCtx.clearRect(0, 0, cCanvas.width, cCanvas.height);
            }
        }
    </script>
</body>
