<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clock Time Adventure - Ver 7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- STREAMING_CHUNK: Base Setup & Responsive --- */
        html, body {
            height: 100%;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
            background-color: transparent; 
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #app {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 1rem;
            position: relative;
            z-index: 10;
        }

        /* --- STREAMING_CHUNK: Custom Vector Scenery Background --- */
        .sky-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* Light sky blue gradient matching the image */
            background: linear-gradient(180deg, #74C6F8 0%, #A4DCF9 100%);
            z-index: 1; 
            overflow: hidden;
        }

        .scenery-foreground {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 35vh; /* Grass area height */
            z-index: 2; 
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        /* Specific Vector Elements Styles */
        .rainbow-container {
            position: absolute;
            bottom: 25vh; /* Sits right behind the hills */
            left: 50%;
            transform: translateX(-50%);
            width: 90vw;
            max-width: 900px;
            z-index: -1;
        }

        .hills-layer {
            position: absolute;
            bottom: 30vh;
            left: 0;
            width: 100%;
            height: 100px;
        }

        .flat-grass {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 32vh;
            background: #54B812; /* Bright vibrant green */
            border-top: 6px solid #439E0C; /* Darker green top rim */
        }

        /* --- STREAMING_CHUNK: UI Components & Animations --- */
        .btn-3d {
            transition: all 0.1s ease;
            position: relative;
            top: 0;
            border-style: solid;
        }
        
        .btn-3d:active:not(:disabled) {
            top: 4px;
            border-bottom-width: 2px !important;
            margin-bottom: 4px; 
        }

        .btn-3d:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            top: 4px;
            border-bottom-width: 2px !important;
        }

        .btn-primary { 
            background-color: #58cc02; 
            border-color: #46a302; 
            color: white; 
            border-width: 2px; 
            border-bottom-width: 6px;
        }
        .btn-primary:hover:not(:disabled) { background-color: #61df02; }

        .btn-answer { 
            background-color: #ffffff; 
            border-color: #e5e7eb; 
            color: #4b5563; 
            border-width: 2px; 
            border-bottom-width: 6px; 
        }
        .btn-answer:hover:not(:disabled) { background-color: #f3f4f6; }

        .btn-correct { 
            background-color: #d7ffb8 !important; 
            border-color: #58a700 !important; 
            color: #58a700 !important; 
            border-width: 2px; 
            border-bottom-width: 6px;
        }
        .btn-wrong { 
            background-color: #ffdfe0 !important; 
            border-color: #ea2b2b !important; 
            color: #ea2b2b !important; 
            border-width: 2px; 
            border-bottom-width: 6px;
        }

        .btn-audio {
            background-color: #1CB0F6;
            border-color: #1899D6;
            color: white;
            border-width: 2px;
            border-bottom-width: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-audio:hover { background-color: #14C2FF; }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }
        .animate-float-slow { animation: float 6s ease-in-out infinite; }
        .animate-float-fast { animation: float 3s ease-in-out infinite; }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }

        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        .animate-shake { animation: shake 0.4s ease-in-out; }

        @keyframes starburst {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(2) rotate(180deg); opacity: 0; }
        }
        .star-particle-effect {
            position: absolute;
            width: 24px;
            height: 24px;
            background: #FFD700;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            pointer-events: none;
            z-index: 50;
            animation: starburst 0.8s ease-out forwards;
        }

        /* --- STREAMING_CHUNK: Card & Clock Styling --- */
        .game-card {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15), 0 5px 15px rgba(0,0,0,0.05), inset 0 0 0 4px rgba(255,255,255,0.8);
            border: 4px solid #bae6fd;
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .title-text {
            color: #EC4899;
            text-shadow: 3px 3px 0px rgba(252, 165, 165, 0.6);
            letter-spacing: 1px;
        }

        /* CLOCK STYLING */
        #main-clock {
            width: 100%; 
            max-width: 320px; 
            margin: 0 auto;
            display: block;
        }
        .clock-face { fill: white; stroke: #38BDF8; stroke-width: 6; } 
        .clock-center { fill: #EC4899; }
        .clock-number { font-family: 'Poppins', sans-serif; font-weight: 900; font-size: 11px; fill: #475569; text-anchor: middle; dominant-baseline: central; }         
        .hand-hour { stroke: #334155; stroke-width: 6; stroke-linecap: round; transform-origin: 50px 50px; transition: transform 0.5s cubic-bezier(0.4, 2.0, 0.2, 0.8); }
        .hand-minute { stroke: #EC4899; stroke-width: 4; stroke-linecap: round; transform-origin: 50px 50px; transition: transform 0.5s cubic-bezier(0.4, 2.0, 0.2, 0.8); }        
        .clock-tick { stroke: #CBD5E1; stroke-width: 1.5; }
        .clock-tick-major { stroke: #94A3B8; stroke-width: 2.5; }

        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999; 
        }

        @media (max-height: 750px) {
            .game-card { padding: 1.5rem !important; }
            #main-clock { max-width: 250px; } 
            .mascot-svg { width: 120px; height: 120px; }
            .mb-4, .mb-6, .mb-8 { margin-bottom: 0.75rem !important; }
        }

        @media (max-height: 600px) { 
            .game-card { padding: 1rem !important; max-height: 95vh; justify-content: space-evenly; }
            #main-clock { max-width: 180px; }
            .title-text { font-size: 1.8rem !important; margin-bottom: 0.5rem !important;}
            h2 { font-size: 1.4rem !important; }
            .btn-answer { padding: 0.5rem !important; font-size: 1rem !important; }
            #options-container { gap: 0.5rem !important; }
            .mascot-svg { width: 90px; height: 90px; margin-bottom: 0.5rem !important;}
            #feedback-area { height: auto; min-height: 2rem; margin-bottom: 0.2rem !important; }
            #feedback-message { font-size: 1rem !important; padding: 0.2rem 1rem !important; border-width: 2px !important;}
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- --- STREAMING_CHUNK: Scenery Sky (Sun, Rainbow, Clouds) --- -->
    <div class="sky-background">
        
        <!-- Sun with halo (Top Left) -->
        <div class="absolute top-[5%] left-[5%] w-28 h-28 md:w-40 md:h-40 animate-float-slow">
            <svg viewBox="0 0 100 100" class="w-full h-full">
                <!-- Soft transparent halo -->
                <circle cx="50" cy="50" r="45" fill="#A8DDF7" opacity="0.6"/>
                <circle cx="50" cy="50" r="35" fill="#A8DDF7" opacity="0.8"/>
                <!-- Sun Body -->
                <circle cx="50" cy="50" r="25" fill="#FFCF40" />
                <!-- Happy Face -->
                <circle cx="43" cy="45" r="2.5" fill="#B45309" />
                <circle cx="57" cy="45" r="2.5" fill="#B45309" />
                <path d="M 43 53 Q 50 60 57 53" fill="none" stroke="#B45309" stroke-width="2.5" stroke-linecap="round" />
            </svg>
        </div>
        
        <!-- Sharp Vector Rainbow -->
        <div class="rainbow-container">
            <svg viewBox="0 0 1000 500" class="w-full h-full" preserveAspectRatio="xMidYMax meet">
                <!-- Red -->
                <path d="M 50 500 A 450 450 0 0 1 950 500" fill="none" stroke="#FF4D4D" stroke-width="35" />
                <!-- Orange -->
                <path d="M 85 500 A 415 415 0 0 1 915 500" fill="none" stroke="#FFA333" stroke-width="35" />
                <!-- Yellow -->
                <path d="M 120 500 A 380 380 0 0 1 880 500" fill="none" stroke="#FFD133" stroke-width="35" />
                <!-- Green -->
                <path d="M 155 500 A 345 345 0 0 1 845 500" fill="none" stroke="#4BE072" stroke-width="35" />
                <!-- Blue -->
                <path d="M 190 500 A 310 310 0 0 1 810 500" fill="none" stroke="#4DA6FF" stroke-width="35" />
                <!-- Purple -->
                <path d="M 225 500 A 275 275 0 0 1 775 500" fill="none" stroke="#C86AFF" stroke-width="35" />
            </svg>
        </div>

        <!-- Fluffy Simple Clouds -->
        <!-- Cloud Top Center -->
        <div class="absolute top-[8%] left-[30%] animate-float-slow w-24 md:w-36">
            <svg viewBox="0 0 100 60" class="w-full h-full drop-shadow-md">
                <circle cx="30" cy="40" r="15" fill="#FFFFFF"/>
                <circle cx="50" cy="25" r="20" fill="#FFFFFF"/>
                <circle cx="70" cy="35" r="18" fill="#FFFFFF"/>
                <rect x="30" y="25" width="40" height="30" fill="#FFFFFF"/>
                <rect x="25" y="40" width="50" height="15" rx="7.5" fill="#FFFFFF"/>
            </svg>
        </div>
        
        <!-- Cloud Right -->
        <div class="absolute top-[20%] right-[15%] animate-float w-20 md:w-32" style="animation-delay: 1.5s;">
            <svg viewBox="0 0 100 60" class="w-full h-full drop-shadow-md">
                <circle cx="30" cy="40" r="15" fill="#FFFFFF"/>
                <circle cx="50" cy="25" r="20" fill="#FFFFFF"/>
                <circle cx="70" cy="35" r="18" fill="#FFFFFF"/>
                <rect x="30" y="25" width="40" height="30" fill="#FFFFFF"/>
                <rect x="25" y="40" width="50" height="15" rx="7.5" fill="#FFFFFF"/>
            </svg>
        </div>

        <!-- Butterfly & Translucent Cloud Overlapping Rainbow Left -->
        <div class="absolute bottom-[35vh] left-[20%] md:left-[30%] animate-float-slow w-32 md:w-48 z-10" style="animation-delay: 2s;">
            <svg viewBox="0 0 100 60" class="w-full h-full">
                <!-- Semi-transparent Cloud base -->
                <g opacity="0.85">
                    <circle cx="30" cy="40" r="15" fill="#FDFDFD"/>
                    <circle cx="50" cy="25" r="20" fill="#FDFDFD"/>
                    <circle cx="70" cy="35" r="18" fill="#FDFDFD"/>
                    <rect x="30" y="25" width="40" height="30" fill="#FDFDFD"/>
                    <rect x="25" y="40" width="50" height="15" rx="7.5" fill="#FDFDFD"/>
                </g>
                <!-- Blue Butterfly -->
                <g transform="translate(30, 15) scale(0.6) rotate(-10)" fill="#4DA6FF">
                    <path d="M10,10 C5,0 0,5 10,10 C20,5 15,0 10,10 Z"/>
                    <path d="M10,10 C5,20 0,15 10,10 C20,15 15,20 10,10 Z"/>
                </g>
                <!-- Purple Butterfly -->
                <g transform="translate(15, 30) scale(0.5) rotate(15)" fill="#C86AFF">
                    <path d="M10,10 C5,0 0,5 10,10 C20,5 15,0 10,10 Z"/>
                    <path d="M10,10 C5,20 0,15 10,10 C20,15 15,20 10,10 Z"/>
                </g>
            </svg>
        </div>
        
        <!-- Free Flying Butterflies in Sky -->
        <div class="absolute top-[30%] left-[20%] animate-float-fast w-6 md:w-8 text-[#FFD133]">
            <svg viewBox="0 0 20 20" class="w-full h-full fill-current"><path d="M10,10 C5,0 0,5 10,10 C20,5 15,0 10,10 Z"/><path d="M10,10 C5,20 0,15 10,10 C20,15 15,20 10,10 Z"/></svg>
        </div>
        <div class="absolute top-[40%] right-[25%] animate-float-fast w-5 md:w-6 text-[#FF4D4D]" style="animation-delay: 1s;">
            <svg viewBox="0 0 20 20" class="w-full h-full fill-current"><path d="M10,10 C5,0 0,5 10,10 C20,5 15,0 10,10 Z"/><path d="M10,10 C5,20 0,15 10,10 C20,15 15,20 10,10 Z"/></svg>
        </div>
    </div>

    <!-- --- STREAMING_CHUNK: Scenery Ground (Hills, Grass, Bushes, Flowers) --- -->
    <div class="scenery-foreground">
        
        <!-- Smooth Rolling Hills (Background layer) -->
        <div class="hills-layer text-[#65AC15]">
            <svg viewBox="0 0 1440 100" class="w-full h-full object-cover" fill="currentColor" preserveAspectRatio="none">
                <!-- Overlapping sine wave paths to simulate rounded rolling hills -->
                <path d="M0,80 Q100,0 250,60 T600,40 T900,70 T1200,30 T1440,80 L1440,100 L0,100 Z"></path>
                <path d="M0,100 Q150,20 350,70 T750,30 T1100,80 T1440,50 L1440,100 L0,100 Z" fill="#5E9E15" opacity="0.6"></path>
            </svg>
        </div>

        <!-- Flat Bright Grass Foreground -->
        <div class="flat-grass">
            
            <!-- Tiny Colorful Flowers Scattered on Grass -->
            <!-- Flower Red -->
            <div class="absolute top-[10%] left-[10%] w-4 h-4 md:w-6 md:h-6">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="#FFD133"/><circle cx="12" cy="4" r="4" fill="#FF4D4D"/><circle cx="12" cy="20" r="4" fill="#FF4D4D"/><circle cx="4" cy="12" r="4" fill="#FF4D4D"/><circle cx="20" cy="12" r="4" fill="#FF4D4D"/></svg>
            </div>
            <!-- Flower Blue -->
            <div class="absolute top-[30%] left-[25%] w-3 h-3 md:w-5 md:h-5">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="#FFD133"/><circle cx="12" cy="4" r="4" fill="#4DA6FF"/><circle cx="12" cy="20" r="4" fill="#4DA6FF"/><circle cx="4" cy="12" r="4" fill="#4DA6FF"/><circle cx="20" cy="12" r="4" fill="#4DA6FF"/></svg>
            </div>
            <!-- Flower Yellow -->
            <div class="absolute top-[15%] left-[50%] w-4 h-4 md:w-6 md:h-6">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="#FF8C00"/><circle cx="12" cy="4" r="4" fill="#FFD133"/><circle cx="12" cy="20" r="4" fill="#FFD133"/><circle cx="4" cy="12" r="4" fill="#FFD133"/><circle cx="20" cy="12" r="4" fill="#FFD133"/></svg>
            </div>
            <!-- Flower Purple -->
            <div class="absolute top-[40%] left-[60%] w-3 h-3 md:w-5 md:h-5">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="#FFD133"/><circle cx="12" cy="4" r="4" fill="#C86AFF"/><circle cx="12" cy="20" r="4" fill="#C86AFF"/><circle cx="4" cy="12" r="4" fill="#C86AFF"/><circle cx="20" cy="12" r="4" fill="#C86AFF"/></svg>
            </div>
            <!-- Flower White -->
            <div class="absolute top-[25%] right-[10%] w-4 h-4 md:w-6 md:h-6">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="#FFD133"/><circle cx="12" cy="4" r="4" fill="#FFFFFF"/><circle cx="12" cy="20" r="4" fill="#FFFFFF"/><circle cx="4" cy="12" r="4" fill="#FFFFFF"/><circle cx="20" cy="12" r="4" fill="#FFFFFF"/></svg>
            </div>
            <!-- Flower Pink/Red Cluster -->
            <div class="absolute top-[50%] left-[40%] w-4 h-4 md:w-5 md:h-5">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="#FFD133"/><circle cx="12" cy="4" r="4" fill="#FF4D4D"/><circle cx="12" cy="20" r="4" fill="#FF4D4D"/><circle cx="4" cy="12" r="4" fill="#FF4D4D"/><circle cx="20" cy="12" r="4" fill="#FF4D4D"/></svg>
            </div>
            <div class="absolute top-[65%] left-[41%] w-3 h-3 md:w-4 md:h-4">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="#FFD133"/><circle cx="12" cy="4" r="4" fill="#FF4D4D"/><circle cx="12" cy="20" r="4" fill="#FF4D4D"/><circle cx="4" cy="12" r="4" fill="#FF4D4D"/><circle cx="20" cy="12" r="4" fill="#FF4D4D"/></svg>
            </div>
        </div>

        <!-- Round Bushes sitting on hills (Anchored just above the flat grass) -->
        <!-- Bush Left -->
        <div class="absolute bottom-[30vh] left-[10%] w-16 md:w-24 drop-shadow-sm">
            <svg viewBox="0 0 100 60" class="w-full h-full">
                <rect x="45" y="45" width="10" height="15" fill="#8B5A2B"/>
                <circle cx="30" cy="35" r="20" fill="#4BE072"/>
                <circle cx="50" cy="25" r="25" fill="#4BE072"/>
                <circle cx="75" cy="35" r="20" fill="#4BE072"/>
                <rect x="30" y="35" width="45" height="20" fill="#4BE072"/>
                <circle cx="45" cy="20" r="8" fill="#71F594"/> <!-- Highlight -->
            </svg>
        </div>
        <!-- Bush Center-Left -->
        <div class="absolute bottom-[32vh] left-[28%] w-20 md:w-32 drop-shadow-sm">
            <svg viewBox="0 0 100 60" class="w-full h-full">
                <rect x="45" y="45" width="10" height="15" fill="#8B5A2B"/>
                <circle cx="30" cy="35" r="20" fill="#4BE072"/>
                <circle cx="50" cy="25" r="25" fill="#4BE072"/>
                <circle cx="75" cy="35" r="20" fill="#4BE072"/>
                <rect x="30" y="35" width="45" height="20" fill="#4BE072"/>
                <circle cx="55" cy="18" r="6" fill="#71F594"/> 
            </svg>
        </div>
        <!-- Bush Center-Right -->
        <div class="absolute bottom-[28vh] right-[35%] w-14 md:w-20 drop-shadow-sm">
            <svg viewBox="0 0 100 60" class="w-full h-full">
                <rect x="45" y="45" width="10" height="15" fill="#8B5A2B"/>
                <circle cx="30" cy="35" r="20" fill="#4BE072"/>
                <circle cx="50" cy="25" r="25" fill="#4BE072"/>
                <circle cx="75" cy="35" r="20" fill="#4BE072"/>
                <rect x="30" y="35" width="45" height="20" fill="#4BE072"/>
            </svg>
        </div>
        <!-- Bush Right -->
        <div class="absolute bottom-[31vh] right-[15%] w-24 md:w-36 drop-shadow-sm">
            <svg viewBox="0 0 100 60" class="w-full h-full">
                <rect x="45" y="45" width="10" height="15" fill="#8B5A2B"/>
                <circle cx="30" cy="35" r="20" fill="#4BE072"/>
                <circle cx="50" cy="25" r="25" fill="#4BE072"/>
                <circle cx="75" cy="35" r="20" fill="#4BE072"/>
                <rect x="30" y="35" width="45" height="20" fill="#4BE072"/>
                <circle cx="45" cy="20" r="10" fill="#71F594"/> 
            </svg>
        </div>
    </div>

    <!-- --- STREAMING_CHUNK: Main App UI (Start Screen) --- -->
    <div id="app">
        <!-- ================= START SCREEN ================= -->
        <div id="start-screen" class="game-card p-6 md:p-10 text-center animate-pop justify-center">
            <h1 class="text-4xl md:text-5xl font-black mb-6 tracking-wide title-text mt-4">
                Clock Time Adventure
            </h1>
            
            <!-- Highly Detailed Cute Mascot SVG -->
            <div class="mb-8 animate-float flex justify-center w-full">
                <svg viewBox="0 0 100 100" class="mascot-svg drop-shadow-2xl" style="width: 170px; height: 170px;">
                    <!-- Floating Hands/Feet -->
                    <circle cx="15" cy="65" r="6" fill="#F59E0B" />
                    <circle cx="85" cy="65" r="6" fill="#F59E0B" />
                    <circle cx="35" cy="95" r="7" fill="#F59E0B" />
                    <circle cx="65" cy="95" r="7" fill="#F59E0B" />

                    <!-- Main Body -->
                    <circle cx="50" cy="50" r="45" fill="#1CB0F6" stroke="#0284C7" stroke-width="4"/>
                    <circle cx="50" cy="50" r="36" fill="#FFFFFF" stroke="#E0F2FE" stroke-width="2"/>
                    
                    <!-- Big Anime Eyes -->
                    <circle cx="34" cy="42" r="8" fill="#1E293B"/>
                    <circle cx="66" cy="42" r="8" fill="#1E293B"/>
                    <circle cx="32" cy="39" r="3" fill="#FFFFFF"/>
                    <circle cx="64" cy="39" r="3" fill="#FFFFFF"/>
                    <circle cx="36" cy="44" r="1.5" fill="#FFFFFF"/>
                    <circle cx="68" cy="44" r="1.5" fill="#FFFFFF"/>
                    
                    <!-- Happy Smile & Cheeks -->
                    <path d="M 40 58 Q 50 70 60 58" fill="none" stroke="#1E293B" stroke-width="3.5" stroke-linecap="round"/>
                    <path d="M 45 64 Q 50 72 55 64 Z" fill="#F43F5E" /> 
                    <ellipse cx="22" cy="52" rx="5" ry="3.5" fill="#FDA4AF" opacity="0.8"/>
                    <ellipse cx="78" cy="52" rx="5" ry="3.5" fill="#FDA4AF" opacity="0.8"/>
                    
                    <!-- Alarm Bells & Hammer -->
                    <path d="M 18 20 Q 28 8 38 15" fill="none" stroke="#FBBF24" stroke-width="5" stroke-linecap="round"/>
                    <circle cx="18" cy="20" r="10" fill="#F43F5E" stroke="#BE123C" stroke-width="2"/>
                    <path d="M 82 20 Q 72 8 62 15" fill="none" stroke="#FBBF24" stroke-width="5" stroke-linecap="round"/>
                    <circle cx="82" cy="20" r="10" fill="#F43F5E" stroke="#BE123C" stroke-width="2"/>
                    <rect x="47" y="2" width="6" height="12" fill="#94A3B8" rx="2" />
                    <rect x="42" y="0" width="16" height="6" fill="#64748B" rx="3" />
                    
                    <!-- Gloss/Highlight -->
                    <path d="M 15 35 A 35 35 0 0 1 40 16" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
                </svg>
            </div>

            <p class="text-lg md:text-xl text-slate-600 font-extrabold mb-8 px-4">
                Look at the clock and choose the correct time. Let's play! 🌟
            </p>

            <button onclick="startGame()" class="btn-3d btn-primary text-2xl md:text-3xl px-12 py-4 rounded-2xl font-black uppercase tracking-widest w-full max-w-xs shadow-md mx-auto flex items-center justify-center gap-2">
                PLAY
                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </button>
        </div>

        <!-- --- STREAMING_CHUNK: Main App UI (Game Screen) --- -->
        <div id="game-screen" class="game-card pt-6 pb-6 px-6 md:pt-8 md:pb-8 md:px-8 hidden">
            
            <!-- Header (Progress & Score) with Custom Icons -->
            <div class="w-full flex justify-between items-center mb-4 px-1">
                <!-- Progress -->
                <div class="bg-blue-50 text-blue-600 px-4 py-2 rounded-2xl font-black text-lg md:text-xl flex items-center gap-2 border-4 border-blue-200">
                    <svg class="w-6 h-6 md:w-8 md:h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg> 
                    <span id="progress-text">1 / 10</span>
                </div>
                <!-- Score -->
                <div class="bg-yellow-50 text-yellow-500 px-4 py-2 rounded-2xl font-black text-lg md:text-xl flex items-center gap-2 border-4 border-yellow-300">
                    <svg class="w-6 h-6 md:w-8 md:h-8" viewBox="0 0 24 24" fill="#FBBF24" stroke="#D97706" stroke-width="2" stroke-linejoin="round">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                    </svg>
                    <span id="score-text">0</span>
                </div>
            </div>

            <!-- Feedback Message Area -->
            <div id="feedback-area" class="min-h-[3rem] flex items-center justify-center mb-2 w-full transition-opacity duration-300 opacity-0">
                <span id="feedback-message" class="text-xl md:text-2xl font-black rounded-full px-8 py-2 shadow-sm border-4"></span>
            </div>

            <!-- Question Title with Audio Icon embedded -->
            <div class="flex items-center justify-center gap-3 mb-4">
                <h2 class="text-2xl md:text-3xl font-black text-slate-700 m-0 drop-shadow-sm">What time is it?</h2>
                <button onclick="speakText('What time is it?')" class="btn-3d btn-audio rounded-2xl p-2 md:p-3 shadow-md" aria-label="Listen to question">
                    <!-- Beautiful Cartoon Speaker Icon -->
                    <svg class="w-7 h-7 md:w-9 md:h-9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor" stroke="none"></polygon>
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                    </svg>
                </button>
            </div>

            <!-- THE CLOCK -->
            <div class="mb-6 relative flex justify-center w-full">
                <!-- Expanded viewBox dramatically to ensure stroke thickness is never cut off -->
                <svg id="main-clock" viewBox="-20 -20 140 140" class="drop-shadow-2xl">
                    <!-- Face remains r=64 -->
                    <circle class="clock-face" cx="50" cy="50" r="64"/>
                    <circle cx="50" cy="50" r="57" fill="none" stroke="#F0F9FF" stroke-width="4"/>
                    
                    <g id="clock-marks"></g>
                    <!-- Hands remain exactly same absolute size as requested -->
                    <line id="hour-hand" class="hand-hour" x1="50" y1="50" x2="50" y2="28" />
                    <!-- Minute hand tip reaches y=15 (Radius 35 from center). Numbers are at Radius 42. Safe! -->
                    <line id="minute-hand" class="hand-minute" x1="50" y1="50" x2="50" y2="15" />
                    
                    <!-- Center Pin -->
                    <circle class="clock-center" cx="50" cy="50" r="6" stroke="#FFFFFF" stroke-width="2"/>
                    <circle cx="50" cy="50" r="2" fill="white"/>
                </svg>
            </div>

            <!-- Answer Options Grid -->
            <div class="w-full grid grid-cols-2 gap-4 mt-auto" id="options-container">
                <!-- Buttons injected via JS -->
            </div>
        </div>

        <!-- --- STREAMING_CHUNK: Main App UI (End Screen) --- -->
        <div id="end-screen" class="game-card p-6 md:p-10 text-center hidden justify-center">
            <h2 class="text-4xl md:text-5xl font-black text-[#58cc02] mb-6 tracking-wide drop-shadow-sm mt-4">
                Well done! 🎉
            </h2>
            
            <div class="mb-8 animate-pop flex justify-center w-full relative">
                <!-- Celebrating Mascot -->
                <svg viewBox="0 0 100 100" class="mascot-svg drop-shadow-2xl z-10" style="width: 170px; height: 170px;">
                    <!-- Jumping Hands/Feet -->
                    <circle cx="10" cy="40" r="6" fill="#F59E0B" />
                    <circle cx="90" cy="40" r="6" fill="#F59E0B" />
                    <circle cx="35" cy="90" r="7" fill="#F59E0B" />
                    <circle cx="65" cy="90" r="7" fill="#F59E0B" />

                    <!-- Main Body Green -->
                    <circle cx="50" cy="50" r="45" fill="#4ADE80" stroke="#16A34A" stroke-width="4"/>
                    <circle cx="50" cy="50" r="36" fill="#FFFFFF" stroke="#DCFCE7" stroke-width="2"/>
                    
                    <!-- Happy Closed Eyes -->
                    <path d="M 30 40 Q 36 32 42 40" fill="none" stroke="#1E293B" stroke-width="4" stroke-linecap="round"/>
                    <path d="M 58 40 Q 64 32 70 40" fill="none" stroke="#1E293B" stroke-width="4" stroke-linecap="round"/>
                    
                    <!-- Giant Smile -->
                    <path d="M 30 55 Q 50 85 70 55 Z" fill="#1E293B" stroke="#1E293B" stroke-width="2"/>
                    <path d="M 40 70 Q 50 65 60 70 Z" fill="#F43F5E" /> 
                    <ellipse cx="22" cy="48" rx="6" ry="4" fill="#FDA4AF" opacity="0.9"/>
                    <ellipse cx="78" cy="48" rx="6" ry="4" fill="#FDA4AF" opacity="0.9"/>
                    
                    <!-- Gold Bells -->
                    <path d="M 18 20 Q 28 8 38 15" fill="none" stroke="#D97706" stroke-width="5" stroke-linecap="round"/>
                    <circle cx="18" cy="20" r="10" fill="#FBBF24" stroke="#B45309" stroke-width="2"/>
                    <path d="M 82 20 Q 72 8 62 15" fill="none" stroke="#D97706" stroke-width="5" stroke-linecap="round"/>
                    <circle cx="82" cy="20" r="10" fill="#FBBF24" stroke="#B45309" stroke-width="2"/>
                </svg>
            </div>

            <!-- Colorful Score Block -->
            <div class="bg-gradient-to-r from-yellow-100 to-amber-100 rounded-3xl p-4 md:p-6 w-full mb-8 border-4 border-yellow-400 shadow-sm mx-auto max-w-sm">
                <p class="text-lg md:text-xl text-amber-600 font-black uppercase mb-1">Your Score</p>
                <div class="text-6xl md:text-7xl font-black text-[#1CB0F6] flex items-center justify-center gap-2">
                    <span id="final-score" class="drop-shadow-sm">10</span> 
                    <span class="text-4xl md:text-5xl text-blue-300">/ 10</span>
                </div>
            </div>

            <button onclick="resetGame()" class="btn-3d btn-primary text-xl md:text-2xl px-8 py-4 rounded-2xl font-black uppercase tracking-widest w-full max-w-xs flex items-center justify-center gap-3 shadow-md mx-auto">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                    <path d="M3 3v5h5"></path>
                </svg>
                Play Again
            </button>
        </div>

    </div>

    <!-- Confetti Layer (Must be topmost) -->
    <canvas id="confetti-canvas"></canvas>

    <script>
        /* --- STREAMING_CHUNK: Game Data & Audio Setup --- */
        let allQuestions = [
            { type: 'oclock',   hour: 3,  minute: 0,  text: "3 o'clock",   value: "3:00" },
            { type: 'halfpast', hour: 6,  minute: 30, text: "half past 6", value: "6:30" },
            { type: 'oclock',   hour: 8,  minute: 0,  text: "8 o'clock",   value: "8:00" },
            { type: 'halfpast', hour: 1,  minute: 30, text: "half past 1", value: "1:30" },
            { type: 'oclock',   hour: 10, minute: 0,  text: "10 o'clock",  value: "10:00" },
            { type: 'halfpast', hour: 4,  minute: 30, text: "half past 4", value: "4:30" },
            { type: 'oclock',   hour: 12, minute: 0,  text: "12 o'clock",  value: "12:00" },
            { type: 'halfpast', hour: 9,  minute: 30, text: "half past 9", value: "9:30" },
            { type: 'oclock',   hour: 5,  minute: 0,  text: "5 o'clock",   value: "5:00" },
            { type: 'halfpast', hour: 2,  minute: 30, text: "half past 2", value: "2:30" },
            { type: 'oclock',   hour: 1,  minute: 0,  text: "1 o'clock",   value: "1:00" },
            { type: 'halfpast', hour: 3,  minute: 30, text: "half past 3", value: "3:30" },
            { type: 'oclock',   hour: 7,  minute: 0,  text: "7 o'clock",   value: "7:00" },
            { type: 'halfpast', hour: 11, minute: 30, text: "half past 11", value: "11:30" },
            { type: 'oclock',   hour: 11, minute: 0,  text: "11 o'clock",  value: "11:00" },
            { type: 'halfpast', hour: 5,  minute: 30, text: "half past 5", value: "5:30" },
            { type: 'oclock',   hour: 2,  minute: 0,  text: "2 o'clock",   value: "2:00" },
            { type: 'halfpast', hour: 8,  minute: 30, text: "half past 8", value: "8:30" },
            { type: 'oclock',   hour: 4,  minute: 0,  text: "4 o'clock",   value: "4:00" },
            { type: 'halfpast', hour: 10, minute: 30, text: "half past 10", value: "10:30" },
        ];

        let gameQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let isWaitingForNext = false;
        let hasAnsweredCorrectlyThisRound = false; 

        // --- AUDIO SYSTEM ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playTone(freq, type, duration, vol = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playSound(type) {
            initAudio();
            switch(type) {
                case 'click':
                    playTone(600, 'sine', 0.1, 0.1);
                    break;
                case 'correct':
                    playTone(523.25, 'sine', 0.15, 0.1);
                    setTimeout(() => playTone(659.25, 'sine', 0.15, 0.1), 100);
                    setTimeout(() => playTone(783.99, 'sine', 0.15, 0.1), 200);
                    setTimeout(() => playTone(1046.50, 'sine', 0.3, 0.15), 300);
                    break;
                case 'wrong':
                    playTone(300, 'triangle', 0.2, 0.1);
                    setTimeout(() => playTone(250, 'triangle', 0.3, 0.1), 150);
                    break;
                case 'win':
                    playTone(523.25, 'square', 0.2, 0.05);
                    setTimeout(() => playTone(659.25, 'square', 0.2, 0.05), 200);
                    setTimeout(() => playTone(783.99, 'square', 0.2, 0.05), 400);
                    setTimeout(() => playTone(1046.50, 'square', 0.6, 0.08), 600);
                    break;
            }
        }

        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'en-US';
                msg.rate = 0.9;
                window.speechSynthesis.speak(msg);
            }
        }

        /* --- STREAMING_CHUNK: Core Game UI Logic --- */
        function setupClockFace() {
            const marksGroup = document.getElementById('clock-marks');
            marksGroup.innerHTML = '';
            
            for (let i = 1; i <= 60; i++) {
                const angle = (i * 6) - 90; 
                const rad = angle * (Math.PI / 180);
                const isHour = i % 5 === 0;
                
                // Adjusted radius out proportionally to match the larger r=64 clock face
                const outerR = 60; // Pushed outward
                const innerR = isHour ? 52 : 56; // Pushed outward
                
                const x1 = 50 + outerR * Math.cos(rad);
                const y1 = 50 + outerR * Math.sin(rad);
                const x2 = 50 + innerR * Math.cos(rad);
                const y2 = 50 + innerR * Math.sin(rad);
                
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1);
                line.setAttribute('y1', y1);
                line.setAttribute('x2', x2);
                line.setAttribute('y2', y2);
                line.setAttribute('class', isHour ? 'clock-tick-major' : 'clock-tick');
                marksGroup.appendChild(line);

                if (isHour) {
                    const num = i / 5;
                    // Numbers pushed outwards to textR=42. 
                    // Minute hand extends to radius 35 (50-15), so it will never overlap numbers!
                    const textR = 42; 
                    const tx = 50 + textR * Math.cos(rad);
                    const ty = 50 + textR * Math.sin(rad);
                    
                    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    text.setAttribute('x', tx);
                    text.setAttribute('y', ty + 1); 
                    text.setAttribute('class', 'clock-number');
                    text.textContent = num;
                    marksGroup.appendChild(text);
                }
            }
        }

        function switchScreen(screenId) {
            ['start-screen', 'game-screen', 'end-screen'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            const screen = document.getElementById(screenId);
            screen.classList.remove('hidden');
            screen.classList.remove('animate-pop');
            void screen.offsetWidth; 
            screen.classList.add('animate-pop');
        }

        function selectGameQuestions() {
            const oclockQuestions = allQuestions.filter(q => q.type === 'oclock');
            const halfpastQuestions = allQuestions.filter(q => q.type === 'halfpast');
            
            shuffle(oclockQuestions);
            shuffle(halfpastQuestions);
            
            gameQuestions = [];
            for (let i = 0; i < 5; i++) {
                gameQuestions.push(oclockQuestions[i]);
                gameQuestions.push(halfpastQuestions[i]);
            }
        }

        function generateOptions(correctQuestion) {
            const options = [correctQuestion.text];
            while (options.length < 4) {
                const randomQ = allQuestions[Math.floor(Math.random() * allQuestions.length)];
                if (!options.includes(randomQ.text)) {
                    options.push(randomQ.text);
                }
            }
            return shuffle(options);
        }

        function startGame() {
            playSound('click');
            currentQuestionIndex = 0;
            score = 0;
            selectGameQuestions();
            setupClockFace();
            loadQuestion();
            switchScreen('game-screen');
            speakText('What time is it?'); 
        }

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function loadQuestion() {
            isWaitingForNext = false;
            hasAnsweredCorrectlyThisRound = false;
            const q = gameQuestions[currentQuestionIndex];
            
            document.getElementById('progress-text').innerText = `${currentQuestionIndex + 1} / 10`;
            document.getElementById('score-text').innerText = score;

            const feedbackArea = document.getElementById('feedback-area');
            feedbackArea.classList.remove('opacity-100');
            feedbackArea.classList.add('opacity-0');

            const minAngle = q.minute * 6;
            const hourAngle = (q.hour % 12) * 30 + (q.minute / 60) * 30;

            document.getElementById('minute-hand').style.transform = `rotate(${minAngle}deg)`;
            document.getElementById('hour-hand').style.transform = `rotate(${hourAngle}deg)`;

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            const shuffledOptions = generateOptions(q);

            shuffledOptions.forEach((optText) => {
                const btn = document.createElement('button');
                btn.className = `btn-3d btn-answer text-lg md:text-xl p-3 md:p-4 rounded-2xl font-black w-full text-center flex items-center justify-center gap-1 shadow-sm`;
                btn.innerText = optText;
                btn.onclick = () => {
                    handleAnswer(btn, optText === q.text, optText);
                };
                container.appendChild(btn);
            });
        }

        /* --- STREAMING_CHUNK: Answer Evaluation & Feedback --- */
        function showFeedback(isCorrect, message) {
            const area = document.getElementById('feedback-area');
            const msgEl = document.getElementById('feedback-message');
            
            msgEl.innerText = message;
            if (isCorrect) {
                msgEl.className = 'text-lg md:text-xl font-black rounded-2xl px-6 py-2 bg-green-100 text-green-600 border-2 border-green-400 animate-pop';
            } else {
                msgEl.className = 'text-lg md:text-xl font-black rounded-2xl px-6 py-2 bg-red-100 text-red-500 border-2 border-red-300 animate-shake';
            }
            
            area.classList.remove('opacity-0');
            area.classList.add('opacity-100');
        }

        function createSparkles(x, y) {
            const container = document.getElementById('game-screen');
            for(let i=0; i<6; i++) {
                const star = document.createElement('div');
                star.className = 'star-particle-effect';
                star.style.left = `${x + (Math.random() * 50 - 25)}px`;
                star.style.top = `${y + (Math.random() * 50 - 25)}px`;
                container.appendChild(star);
                setTimeout(() => star.remove(), 800);
            }
        }

        function handleAnswer(btnElement, isCorrect, clickedTimeText) {
            if (isWaitingForNext) return;
            
            speakText(clickedTimeText);

            const allButtons = document.querySelectorAll('.btn-answer, .btn-correct, .btn-wrong');

            if (isCorrect) {
                isWaitingForNext = true;
                playSound('correct');
                
                if (!hasAnsweredCorrectlyThisRound) {
                    score++;
                    hasAnsweredCorrectlyThisRound = true;
                }
                document.getElementById('score-text').innerText = score;
                
                btnElement.classList.remove('btn-answer');
                btnElement.classList.add('btn-correct');
                
                const rect = btnElement.getBoundingClientRect();
                const screenRect = document.getElementById('game-screen').getBoundingClientRect();
                createSparkles(
                    rect.left - screenRect.left + rect.width / 2, 
                    rect.top - screenRect.top + rect.height / 2
                );

                const praises = ["Great job!", "Excellent!", "You got it!", "Awesome!"];
                showFeedback(true, praises[Math.floor(Math.random() * praises.length)]);

                allButtons.forEach(b => { if(b !== btnElement) b.disabled = true; });

                setTimeout(() => {
                    currentQuestionIndex++;
                    if (currentQuestionIndex < gameQuestions.length) {
                        loadQuestion();
                    } else {
                        endGame();
                    }
                }, 2200); 

            } else {
                hasAnsweredCorrectlyThisRound = true; 
                playSound('wrong');
                
                btnElement.classList.remove('btn-answer');
                btnElement.classList.add('btn-wrong');
                btnElement.classList.add('animate-shake');
                
                setTimeout(() => {
                    btnElement.classList.remove('animate-shake');
                }, 400);

                const encourages = ["Try again!", "Almost there!", "Look closely!"];
                showFeedback(false, encourages[Math.floor(Math.random() * encourages.length)]);
                
                btnElement.disabled = true;
            }
        }

        function endGame() {
            playSound('win');
            document.getElementById('final-score').innerText = score;
            switchScreen('end-screen');
            startConfetti();
        }

        function resetGame() {
            playSound('click');
            stopConfetti();
            startGame();
        }

        /* --- STREAMING_CHUNK: Confetti System --- */
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let confettiParticles = [];
        let confettiAnimationId = null;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const colors = ['#facc15', '#3b82f6', '#ef4444', '#10b981', '#a855f7', '#ff8a65'];

        function startConfetti() {
            confettiParticles = [];
            for (let i = 0; i < 200; i++) {
                confettiParticles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height * 0.3 - canvas.height * 0.3,
                    w: Math.random() * 12 + 6,
                    h: Math.random() * 12 + 6,
                    vx: Math.random() * 5 - 2.5, 
                    vy: Math.random() * 3 + 2, 
                    color: colors[Math.floor(Math.random() * colors.length)],
                    angle: Math.random() * 360,
                    spin: Math.random() * 6 - 3
                });
            }
            if (!confettiAnimationId) {
                renderConfetti();
            }
        }

        function stopConfetti() {
            confettiParticles = [];
            if (confettiAnimationId) {
                cancelAnimationFrame(confettiAnimationId);
                confettiAnimationId = null;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function renderConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let activeParticles = 0;

            confettiParticles.forEach((p) => {
                p.x += p.vx;
                p.y += p.vy;
                p.angle += p.spin;
                
                p.vy += 0.08; 
                p.vx *= 0.99; 

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.angle * Math.PI / 180);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                ctx.restore();

                if (p.y < canvas.height + 50) {
                    activeParticles++;
                }
            });

            if (activeParticles > 0) {
                confettiAnimationId = requestAnimationFrame(renderConfetti);
            } else {
                confettiAnimationId = null;
            }
        }
    </script>
