<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clock Time Adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        /* Setup for absolute centering on all devices */
        html, body {
            height: 100%;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            touch-action: manipulation; /* Prevent double-tap zoom */
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #app {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 100%;
            padding: 1rem;
        }

        /* Beautiful Animated CSS Background - Brighter & More Colorful */
        .sky-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* Vibrant sunset/sunrise gradient */
            background: linear-gradient(180deg, #3B82F6 0%, #60A5FA 30%, #C084FC 65%, #F472B6 100%);
            z-index: -10;
            overflow: hidden;
        }

        /* Vivid Rainbow */
        .rainbow {
            position: absolute;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 150vw;
            height: 150vw;
            max-width: 1200px;
            max-height: 1200px;
            border-radius: 50%;
            box-shadow: 
                0 0 0 20px rgba(239, 68, 68, 0.7),
                0 0 0 40px rgba(249, 115, 22, 0.7),
                0 0 0 60px rgba(250, 204, 21, 0.7),
                0 0 0 80px rgba(74, 222, 128, 0.7),
                0 0 0 100px rgba(56, 189, 248, 0.7),
                0 0 0 120px rgba(167, 139, 250, 0.7);
            opacity: 0.85;
            filter: blur(6px);
        }

        /* 3D Button Base */
        .btn-3d {
            transition: all 0.1s ease;
            position: relative;
            top: 0;
            border-style: solid;
        }
        
        .btn-3d:active:not(:disabled) {
            top: 4px;
            border-bottom-width: 2px !important;
            margin-bottom: 4px; 
        }

        .btn-3d:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            top: 4px;
            border-bottom-width: 2px !important;
        }

        /* Play & Action Buttons */
        .btn-primary { background-color: #58cc02; border-color: #46a302; color: white; border-width: 2px; border-bottom-width: 6px;}
        .btn-primary:hover:not(:disabled) { background-color: #61df02; }

        /* Unified Yellow Answer Options */
        .btn-answer { 
            background-color: #FEF9C3; /* yellow-100 */
            border-color: #EAB308; /* yellow-500 */
            color: #CA8A04; /* yellow-600 */
            border-width: 2px; 
            border-bottom-width: 6px; 
        }
        .btn-answer:hover:not(:disabled) { background-color: #FEF08A; /* yellow-200 */ }
        
        /* State overwrites for correctness */
        .btn-correct { background-color: #d7ffb8 !important; border-color: #58a700 !important; color: #58a700 !important; border-width: 2px; border-bottom-width: 6px;}
        .btn-wrong { background-color: #ffdfe0 !important; border-color: #ea2b2b !important; color: #ea2b2b !important; border-width: 2px; border-bottom-width: 6px;}

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }
        .animate-float-slow { animation: float 6s ease-in-out infinite; }

        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        .animate-shake { animation: shake 0.4s ease-in-out; }

        @keyframes starburst {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(2) rotate(180deg); opacity: 0; }
        }
        .star-particle {
            position: absolute;
            width: 24px;
            height: 24px;
            background: #FFD700;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            pointer-events: none;
            z-index: 50;
            animation: starburst 0.8s ease-out forwards;
        }

        /* Main Card Container - Enhanced Colors & Centering setup */
        .game-card {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 2rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2), 0 5px 15px rgba(0,0,0,0.1);
            border: 5px solid #93C5FD; 
            max-width: 600px;
            width: 100%;
            backdrop-filter: blur(12px); 
            position: relative;
            z-index: 10;
        }

        /* Title text styling */
        .title-text {
            color: #FF4757;
            text-shadow: 
                2px 2px 0px #FFF, 
                -2px -2px 0px #FFF, 
                2px -2px 0px #FFF, 
                -2px 2px 0px #FFF,
                3px 4px 0px rgba(0,0,0,0.15);
        }

        /* SVG Clock Styling - Enlarged Face (20% bigger viewBox), Same Content Size */
        #main-clock {
            width: 100%; 
            /* Increased max-width by 20% (280px -> 336px) to keep hands/numbers the exact same physical size on screen */
            max-width: 336px; 
            margin: 0 auto;
            display: block;
        }
        .clock-face { fill: white; stroke: #38BDF8; stroke-width: 5; } 
        .clock-center { fill: #EC4899; }
        .clock-number { font-family: 'Poppins', sans-serif; font-weight: 900; font-size: 11px; fill: #1E293B; text-anchor: middle; dominant-baseline: central; } 
        
        .hand-hour { stroke: #1E293B; stroke-width: 5; stroke-linecap: round; transform-origin: 50px 50px; transition: transform 0.5s cubic-bezier(0.4, 2.0, 0.2, 0.8); }
        .hand-minute { stroke: #EC4899; stroke-width: 3; stroke-linecap: round; transform-origin: 50px 50px; transition: transform 0.5s cubic-bezier(0.4, 2.0, 0.2, 0.8); }
        
        .clock-tick { stroke: #CBD5E1; stroke-width: 1; }
        .clock-tick-major { stroke: #64748B; stroke-width: 2; }

        /* Confetti Canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- CSS Sky Background Layer with beautiful SVG elements -->

                <path d="M 25 50 Q 10 50 10 35 Q 10 23 22 20 Q 25 35 40 45 Q 60 50 75 50 Z" fill="#F1F5F9"/>

        </div>
        <div class="absolute top-16 right-[20%] animate-float-slow w-24 h-16 md:w-36 md:h-24 opacity-90" style="animation-delay: 2s;">
            <svg viewBox="0 0 100 60" class="w-full h-full drop-shadow-lg">
                <path d="M 25 50 Q 10 50 10 35 Q 10 23 22 20 Q 30 3 50 3 Q 70 3 78 20 Q 90 23 90 35 Q 90 50 75 50 Z" fill="#FFFFFF" stroke="#BAE6FD" stroke-width="3" stroke-linejoin="round"/>
                <path d="M 25 50 Q 10 50 10 35 Q 10 23 22 20 Q 25 35 40 45 Q 60 50 75 50 Z" fill="#F1F5F9"/>
            </svg>
        </div>
        <div class="absolute bottom-20 left-[15%] animate-float-slow w-36 h-24 md:w-56 md:h-32" style="animation-delay: 1s;">
            <svg viewBox="0 0 100 60" class="w-full h-full drop-shadow-lg">
                <path d="M 25 50 Q 10 50 10 35 Q 10 23 22 20 Q 30 3 50 3 Q 70 3 78 20 Q 90 23 90 35 Q 90 50 75 50 Z" fill="#FFFFFF" stroke="#E0E7FF" stroke-width="3" stroke-linejoin="round"/>
                <path d="M 25 50 Q 10 50 10 35 Q 10 23 22 20 Q 25 35 40 45 Q 60 50 75 50 Z" fill="#F1F5F9"/>
            </svg>
        </div>
        
        <!-- SVG Stars -->
        <div class="absolute top-[15%] left-[35%] animate-pulse w-8 h-8 md:w-12 md:h-12">
            <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-md">
                <polygon points="50,10 61,40 90,40 66,57 75,88 50,70 25,88 34,57 10,40 39,40" fill="#FEF08A" stroke="#EAB308" stroke-width="4" stroke-linejoin="round"/>
            </svg>
        </div>
        <div class="absolute bottom-[25%] left-[8%] animate-pulse w-10 h-10 md:w-16 md:h-16" style="animation-delay: 1s;">
            <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-md">
                <polygon points="50,10 61,40 90,40 66,57 75,88 50,70 25,88 34,57 10,40 39,40" fill="#FEF08A" stroke="#EAB308" stroke-width="4" stroke-linejoin="round"/>
                <path d="M 40 55 Q 43 52 46 55" fill="none" stroke="#713F12" stroke-width="2" stroke-linecap="round" />
                <path d="M 54 55 Q 57 52 60 55" fill="none" stroke="#713F12" stroke-width="2" stroke-linecap="round" />
            </svg>
        </div>
        <div class="absolute top-[35%] right-[25%] animate-pulse w-6 h-6 md:w-10 md:h-10" style="animation-delay: 0.5s;">
            <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-md">
                <polygon points="50,10 61,40 90,40 66,57 75,88 50,70 25,88 34,57 10,40 39,40" fill="#FEF08A" stroke="#EAB308" stroke-width="4" stroke-linejoin="round"/>
            </svg>

    <!-- Confetti Layer -->
    <canvas id="confetti-canvas"></canvas>

    <!-- App Container -->
    <div id="app">
        
        <!-- ================= START SCREEN ================= -->
        <div id="start-screen" class="game-card p-8 flex flex-col items-center text-center animate-pop">
            <h1 class="text-5xl font-black mb-6 tracking-wide title-text">
                Clock Time Adventure
            </h1>
            
            <!-- Cute Mascot SVG (Enhanced Colors) -->
            <div class="mb-8 animate-float">
                <svg width="180" height="180" viewBox="0 0 100 100" class="drop-shadow-lg">
                    <circle cx="50" cy="50" r="45" fill="#FBBF24" stroke="#D97706" stroke-width="4"/>
                    <circle cx="50" cy="50" r="38" fill="none" stroke="#D97706" stroke-width="2"/>
                    <!-- Eyes -->
                    <ellipse cx="35" cy="40" rx="7" ry="8" fill="white"/>
                    <ellipse cx="65" cy="40" rx="7" ry="8" fill="white"/>
                    <circle cx="35" cy="40" r="3.5" fill="#1E293B"/>
                    <circle cx="65" cy="40" r="3.5" fill="#1E293B"/>
                    <circle cx="34" cy="38" r="1.5" fill="white"/>
                    <circle cx="64" cy="38" r="1.5" fill="white"/>
                    <!-- Smile -->
                    <path d="M 30 60 Q 50 82 70 60" fill="none" stroke="#1E293B" stroke-width="4" stroke-linecap="round"/>
                    <!-- Rosy cheeks -->
                    <circle cx="25" cy="55" r="6" fill="#EF4444" opacity="0.6"/>
                    <circle cx="75" cy="55" r="6" fill="#EF4444" opacity="0.6"/>
                    <!-- Alarm Bells -->
                    <path d="M 18 22 Q 28 12 38 17" fill="none" stroke="#D97706" stroke-width="5" stroke-linecap="round"/>
                    <circle cx="18" cy="22" r="9" fill="#EF4444" stroke="#B91C1C" stroke-width="2"/>
                    <path d="M 82 22 Q 72 12 62 17" fill="none" stroke="#D97706" stroke-width="5" stroke-linecap="round"/>
                    <circle cx="82" cy="22" r="9" fill="#EF4444" stroke="#B91C1C" stroke-width="2"/>
                </svg>
            </div>

            <p class="text-xl md:text-2xl text-slate-600 font-bold mb-8 px-4">
                Look at the clock and choose the correct time. Let's play! 🌟
            </p>

            <button onclick="startGame()" class="btn-3d btn-primary text-3xl px-12 py-5 rounded-2xl font-black uppercase tracking-widest w-full max-w-xs shadow-lg">
                PLAY
            </button>
        </div>

        <!-- ================= QUESTION SCREEN ================= -->
        <div id="game-screen" class="game-card p-6 md:p-8 flex flex-col items-center hidden relative">
            
            <!-- Header (Progress & Score) with colorful blocks -->
            <div class="w-full flex justify-between items-center mb-6 px-1">
                <div class="bg-blue-50 border-4 border-blue-400 text-blue-700 px-4 py-2 rounded-2xl font-black text-xl flex items-center gap-2 shadow-sm">
                    <span class="text-2xl">⏱️</span> <span id="progress-text">1 / 10</span>
                </div>
                <div class="bg-yellow-50 border-4 border-yellow-400 text-yellow-600 px-4 py-2 rounded-2xl font-black text-xl flex items-center gap-2 shadow-sm">
                    <span class="text-2xl">⭐</span> <span id="score-text">0</span>
                </div>
            </div>

            <!-- Feedback Message Area -->
            <div id="feedback-area" class="h-12 flex items-center justify-center mb-2 w-full transition-opacity duration-300 opacity-0">
                <span id="feedback-message" class="text-2xl font-bold rounded-full px-6 py-1 shadow-sm"></span>
            </div>

            <!-- Question Title and Audio Button -->
            <div class="flex items-center justify-center gap-4 mb-6">
                <h2 class="text-3xl md:text-4xl font-black text-slate-700 drop-shadow-sm">What time is it?</h2>
                <button onclick="speakText('What time is it?')" class="btn-3d rounded-full p-3 bg-green-500 border-green-700 hover:bg-green-400 text-white shadow-md border-b-4 active:border-b-0 active:translate-y-1 transition-all" aria-label="Listen to question">
                    <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.972 7.972 0 0117 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.983 5.983 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0113 10a3.984 3.984 0 01-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd"></path></svg>
                </button>
            </div>

            <!-- The Clock - ViewBox expanded to 120x120 for a 20% larger face without changing element coordinates -->
            <div class="mb-10 relative flex justify-center w-full">
                <svg id="main-clock" viewBox="-10 -10 120 120" class="drop-shadow-xl">
                    <!-- Base face increased from r=46 to r=56 (approx 20%) -->
                    <circle class="clock-face" cx="50" cy="50" r="56"/>
                    <!-- Inner ring increased from r=38 to r=48 -->
                    <circle cx="50" cy="50" r="48" fill="none" stroke="#E0F2FE" stroke-width="4"/>
                    
                    <!-- Ticks & Numbers injected via JS (coordinates remain the same, so they stay original size) -->
                    <g id="clock-marks"></g>

                    <!-- Hands -->
                    <line id="hour-hand" class="hand-hour" x1="50" y1="50" x2="50" y2="28" />
                    <line id="minute-hand" class="hand-minute" x1="50" y1="50" x2="50" y2="15" />
                    
                    <!-- Center Pin -->
                    <circle class="clock-center" cx="50" cy="50" r="4"/>
                    <circle cx="50" cy="50" r="1.5" fill="white"/>
                </svg>
            </div>

            <!-- Answer Options (4 buttons in a grid, uniformly yellow) -->
            <div class="w-full grid grid-cols-2 gap-4 md:gap-5" id="options-container">
                <!-- Buttons injected via JS -->
            </div>
        </div>

        <!-- ================= END SCREEN ================= -->
        <div id="end-screen" class="game-card p-8 flex flex-col items-center text-center hidden">
            <h2 class="text-5xl md:text-6xl font-black text-green-500 mb-6 tracking-wide drop-shadow-sm">
                Well done! 🎉
            </h2>
            
            <div class="mb-8 animate-pop">

                    <circle cx="50" cy="50" r="45" fill="#4ADE80" stroke="#16A34A" stroke-width="4"/>
                    <!-- Happy Eyes -->

                    <path d="M 40 70 Q 50 65 60 70 Z" fill="#F43F5E" /> <!-- Tongue -->

                    <polygon points="85,25 88,31 95,31 89,35 91,42 85,37 79,42 81,35 75,31 82,31" fill="#FDE047" stroke="#CA8A04" stroke-width="1.5" class="animate-float" style="animation-delay: 0.5s"/>

            </div>

            <!-- Colorful Score Block -->

                <p class="text-xl text-yellow-600 font-black uppercase mb-2">Your Score</p>
                <div class="text-7xl font-black text-blue-500 flex items-center justify-center gap-2">
                    <span id="final-score" class="drop-shadow-sm">10</span> 
                    <span class="text-5xl text-blue-300">/ 10</span>
                </div>
            </div>

            <button onclick="resetGame()" class="btn-3d btn-primary text-2xl px-10 py-5 rounded-2xl font-black uppercase tracking-widest w-full max-w-xs flex items-center justify-center gap-3 shadow-lg">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Play Again
            </button>
        </div>

    </div>

    <!-- ================= GAME LOGIC ================= -->
    <script>
        /* * QUESTION DATA */
        let allQuestions = [
            { type: 'oclock',   hour: 3,  minute: 0,  text: "3 o'clock",   value: "3:00" },
            { type: 'halfpast', hour: 6,  minute: 30, text: "half past 6", value: "6:30" },
            { type: 'oclock',   hour: 8,  minute: 0,  text: "8 o'clock",   value: "8:00" },
            { type: 'halfpast', hour: 1,  minute: 30, text: "half past 1", value: "1:30" },
            { type: 'oclock',   hour: 10, minute: 0,  text: "10 o'clock",  value: "10:00" },
            { type: 'halfpast', hour: 4,  minute: 30, text: "half past 4", value: "4:30" },
            { type: 'oclock',   hour: 12, minute: 0,  text: "12 o'clock",  value: "12:00" },
            { type: 'halfpast', hour: 9,  minute: 30, text: "half past 9", value: "9:30" },
            { type: 'oclock',   hour: 5,  minute: 0,  text: "5 o'clock",   value: "5:00" },
            { type: 'halfpast', hour: 2,  minute: 30, text: "half past 2", value: "2:30" },
            { type: 'oclock',   hour: 1,  minute: 0,  text: "1 o'clock",   value: "1:00" },
            { type: 'halfpast', hour: 3,  minute: 30, text: "half past 3", value: "3:30" },
            { type: 'oclock',   hour: 7,  minute: 0,  text: "7 o'clock",   value: "7:00" },
            { type: 'halfpast', hour: 11, minute: 30, text: "half past 11", value: "11:30" },
            { type: 'oclock',   hour: 11, minute: 0,  text: "11 o'clock",  value: "11:00" },
            { type: 'halfpast', hour: 5,  minute: 30, text: "half past 5", value: "5:30" },
            { type: 'oclock',   hour: 2,  minute: 0,  text: "2 o'clock",   value: "2:00" },
            { type: 'halfpast', hour: 8,  minute: 30, text: "half past 8", value: "8:30" },
            { type: 'oclock',   hour: 4,  minute: 0,  text: "4 o'clock",   value: "4:00" },
            { type: 'halfpast', hour: 10, minute: 30, text: "half past 10", value: "10:30" },
        ];

        let gameQuestions = [];

        // State Variables
        let currentQuestionIndex = 0;
        let score = 0;
        let isWaitingForNext = false;
        let hasAnsweredCorrectlyThisRound = false; 

        // Audio Context Setup
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // Web Audio Synthesizer
        function playTone(freq, type, duration, vol = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playSound(type) {
            initAudio();
            switch(type) {
                case 'click':
                    playTone(600, 'sine', 0.1, 0.1);
                    break;
                case 'correct':
                    playTone(523.25, 'sine', 0.15, 0.1);
                    setTimeout(() => playTone(659.25, 'sine', 0.15, 0.1), 100);
                    setTimeout(() => playTone(783.99, 'sine', 0.15, 0.1), 200);
                    setTimeout(() => playTone(1046.50, 'sine', 0.3, 0.15), 300);
                    break;
                case 'wrong':
                    playTone(300, 'triangle', 0.2, 0.1);
                    setTimeout(() => playTone(250, 'triangle', 0.3, 0.1), 150);
                    break;
                case 'win':
                    playTone(523.25, 'square', 0.2, 0.05);
                    setTimeout(() => playTone(659.25, 'square', 0.2, 0.05), 200);
                    setTimeout(() => playTone(783.99, 'square', 0.2, 0.05), 400);
                    setTimeout(() => playTone(1046.50, 'square', 0.6, 0.08), 600);
                    break;
            }
        }

        // Speech Synthesis System
        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'en-US';
                msg.rate = 0.9;
                window.speechSynthesis.speak(msg);
            }
        }

        function convertTimeToSpokenEnglish(timeStr) {
            let parts = timeStr.split(":");
            let hourStr = parts[0];
            
            if (timeStr.endsWith(":00")) {
                return hourStr + " o'clock";
            } else if (timeStr.endsWith(":30")) {
                return "half past " + hourStr;
            }
            return timeStr; 
        }

        // --- Initialization & UI Logic ---

        function setupClockFace() {
            const marksGroup = document.getElementById('clock-marks');
            marksGroup.innerHTML = '';
            
            for (let i = 1; i <= 60; i++) {
                const angle = (i * 6) - 90; 
                const rad = angle * (Math.PI / 180);
                const isHour = i % 5 === 0;
                
                const outerR = 46;
                const innerR = isHour ? 41 : 44; 
                const x1 = 50 + outerR * Math.cos(rad);
                const y1 = 50 + outerR * Math.sin(rad);
                const x2 = 50 + innerR * Math.cos(rad);
                const y2 = 50 + innerR * Math.sin(rad);
                
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1);
                line.setAttribute('y1', y1);
                line.setAttribute('x2', x2);
                line.setAttribute('y2', y2);
                line.setAttribute('class', isHour ? 'clock-tick-major' : 'clock-tick');
                marksGroup.appendChild(line);

                if (isHour) {
                    const num = i / 5;
                    const textR = 32; 
                    const tx = 50 + textR * Math.cos(rad);
                    const ty = 50 + textR * Math.sin(rad);
                    
                    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    text.setAttribute('x', tx);
                    text.setAttribute('y', ty + 1); 
                    text.setAttribute('class', 'clock-number');
                    text.textContent = num;
                    marksGroup.appendChild(text);
                }
            }
        }

        function switchScreen(screenId) {
            ['start-screen', 'game-screen', 'end-screen'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            const screen = document.getElementById(screenId);
            screen.classList.remove('hidden');
            
            screen.classList.remove('animate-pop');
            void screen.offsetWidth; 
            screen.classList.add('animate-pop');
        }

        function selectGameQuestions() {
            const oclockQuestions = allQuestions.filter(q => q.type === 'oclock');
            const halfpastQuestions = allQuestions.filter(q => q.type === 'halfpast');
            
            shuffle(oclockQuestions);
            shuffle(halfpastQuestions);
            
            gameQuestions = [];
            for (let i = 0; i < 5; i++) {
                gameQuestions.push(oclockQuestions[i]);
                gameQuestions.push(halfpastQuestions[i]);
            }
        }

        function generateOptions(correctQuestion) {
            const options = [correctQuestion.value];
            
            while (options.length < 4) {
                const randomQ = allQuestions[Math.floor(Math.random() * allQuestions.length)];
                if (!options.includes(randomQ.value)) {
                    options.push(randomQ.value);
                }
            }
            return shuffle(options);
        }

        function startGame() {
            playSound('click');
            currentQuestionIndex = 0;
            score = 0;
            selectGameQuestions();
            setupClockFace();
            loadQuestion();
            switchScreen('game-screen');
            speakText('What time is it?'); 
        }

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function loadQuestion() {
            isWaitingForNext = false;
            hasAnsweredCorrectlyThisRound = false;
            const q = gameQuestions[currentQuestionIndex];
            
            document.getElementById('progress-text').innerText = `${currentQuestionIndex + 1} / 10`;
            document.getElementById('score-text').innerText = score;

            const feedbackArea = document.getElementById('feedback-area');
            feedbackArea.classList.remove('opacity-100');
            feedbackArea.classList.add('opacity-0');

            const minAngle = q.minute * 6;
            const hourAngle = (q.hour % 12) * 30 + (q.minute / 60) * 30;

            document.getElementById('minute-hand').style.transform = `rotate(${minAngle}deg)`;
            document.getElementById('hour-hand').style.transform = `rotate(${hourAngle}deg)`;

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            const shuffledOptions = generateOptions(q);

            shuffledOptions.forEach((optValue) => {
                const btn = document.createElement('button');
                // Use unified yellow button style
                btn.className = `btn-3d btn-answer text-3xl px-6 py-4 rounded-2xl font-black w-full text-center flex items-center justify-center gap-2 drop-shadow-sm`;
                btn.innerText = optValue;
                btn.onclick = () => {
                    handleAnswer(btn, optValue === q.value, optValue);
                };
                container.appendChild(btn);
            });
        }

        function showFeedback(isCorrect, message) {
            const area = document.getElementById('feedback-area');
            const msgEl = document.getElementById('feedback-message');
            
            msgEl.innerText = message;
            if (isCorrect) {
                msgEl.className = 'text-xl md:text-2xl font-black rounded-2xl px-6 py-2 bg-green-100 text-green-600 border-4 border-green-400 animate-pop';
            } else {
                msgEl.className = 'text-xl md:text-2xl font-black rounded-2xl px-6 py-2 bg-red-100 text-red-500 border-4 border-red-300 animate-shake';
            }
            
            area.classList.remove('opacity-0');
            area.classList.add('opacity-100');
        }

        function createSparkles(x, y) {
            const container = document.getElementById('game-screen');
            for(let i=0; i<6; i++) {
                const star = document.createElement('div');
                star.className = 'star-particle';
                star.style.left = `${x + (Math.random() * 50 - 25)}px`;
                star.style.top = `${y + (Math.random() * 50 - 25)}px`;
                container.appendChild(star);
                setTimeout(() => star.remove(), 800);
            }
        }

        function handleAnswer(btnElement, isCorrect, clickedTimeValue) {
            if (isWaitingForNext) return;
            
            speakText(convertTimeToSpokenEnglish(clickedTimeValue));

            const allButtons = document.querySelectorAll('.btn-option');

            if (isCorrect) {
                isWaitingForNext = true;
                playSound('correct');
                
                if (!hasAnsweredCorrectlyThisRound) {
                    score++;
                    hasAnsweredCorrectlyThisRound = true;
                }
                document.getElementById('score-text').innerText = score;
                
                // Change class for correct styling
                btnElement.classList.remove('btn-answer');
                btnElement.classList.add('btn-correct');
                btnElement.innerHTML = `<span>🌟</span> ${btnElement.innerText}`;
                
                const rect = btnElement.getBoundingClientRect();
                const screenRect = document.getElementById('game-screen').getBoundingClientRect();
                createSparkles(
                    rect.left - screenRect.left + rect.width / 2, 
                    rect.top - screenRect.top + rect.height / 2
                );

                const praises = ["Great job!", "Excellent!", "You got it!", "Awesome!"];
                showFeedback(true, praises[Math.floor(Math.random() * praises.length)]);

                allButtons.forEach(b => { if(b !== btnElement) b.disabled = true; });

                setTimeout(() => {
                    currentQuestionIndex++;
                    if (currentQuestionIndex < gameQuestions.length) {
                        loadQuestion();
                    } else {
                        endGame();
                    }
                }, 2200); 

            } else {
                hasAnsweredCorrectlyThisRound = true; 

                playSound('wrong');
                // Change class for wrong styling
                btnElement.classList.remove('btn-answer');
                btnElement.classList.add('btn-wrong');
                btnElement.classList.add('animate-shake');
                
                setTimeout(() => {
                    btnElement.classList.remove('animate-shake');
                }, 400);

                const encourages = ["Try again!", "Almost there!", "Look closely!"];
                showFeedback(false, encourages[Math.floor(Math.random() * encourages.length)]);
                
                btnElement.disabled = true;
            }
        }

        function endGame() {
            playSound('win');
            document.getElementById('final-score').innerText = score;
            switchScreen('end-screen');
            startConfetti();
        }

        function resetGame() {
            playSound('click');
            stopConfetti();
            startGame();
        }

        // --- Lightweight Canvas Confetti System ---
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let confettiParticles = [];
        let confettiAnimationId = null;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const colors = ['#facc15', '#3b82f6', '#ef4444', '#10b981', '#a855f7', '#ff8a65'];

        function startConfetti() {
            confettiParticles = [];
            for (let i = 0; i < 200; i++) {
                confettiParticles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height * 0.3 - canvas.height * 0.3,
                    w: Math.random() * 12 + 6,
                    h: Math.random() * 12 + 6,
                    vx: Math.random() * 5 - 2.5, 
                    vy: Math.random() * 3 + 2, 
                    color: colors[Math.floor(Math.random() * colors.length)],
                    angle: Math.random() * 360,
                    spin: Math.random() * 6 - 3
                });
            }
            if (!confettiAnimationId) {
                renderConfetti();
            }
        }

        function stopConfetti() {
            confettiParticles = [];
            if (confettiAnimationId) {
                cancelAnimationFrame(confettiAnimationId);
                confettiAnimationId = null;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function renderConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let activeParticles = 0;

            confettiParticles.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                p.angle += p.spin;
                
                p.vy += 0.08; // Gravity
                p.vx *= 0.99; // Air resistance

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.angle * Math.PI / 180);
                ctx.fillStyle = p.color;
                
                ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                ctx.restore();

                if (p.y < canvas.height + 50) {
                    activeParticles++;
                }
            });

            if (activeParticles > 0) {
                confettiAnimationId = requestAnimationFrame(renderConfetti);
            } else {
                confettiAnimationId = null;
            }
        }

    </script>
</body>
