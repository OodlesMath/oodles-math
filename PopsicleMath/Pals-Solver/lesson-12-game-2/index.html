<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Adventure: Count On & Back (Ver 6)</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF4B4B;
            --secondary: #CE82FF;
            --success: #58CC02;
            --success-shadow: #46A302;
            --danger: #FF4B4B;
            --danger-shadow: #CC3C3C;
            --warning: #FFC800;
            --warning-shadow: #CC9F00;
            --info: #1CB0F6;
            --info-shadow: #168CC5;
            --answer-btn: #8B5CF6;
            --answer-btn-shadow: #7C3AED;
            --equation-bg: #FF7E67;
            --equation-shadow: #E05C45;
            --bg-color: #87CEEB;
            --text-dark: #3C3C3C;
            --white: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color); color: var(--text-dark);
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden; position: relative;
        }

        /* --- BACKGROUND --- */
        .scenery {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 60%);
        }

        .scenery .rainbow {
            position: absolute; top: 20px; left: -50px; width: 300px; height: 300px;
            border-radius: 50%; opacity: 0.6;
            box-shadow: inset 0 0 0 20px #FF4B4B, inset 0 0 0 40px #FFC800, inset 0 0 0 60px #58CC02, inset 0 0 0 80px #1CB0F6, inset 0 0 0 100px #CE82FF;
        }

        .scenery .cloud { position: absolute; background: white; border-radius: 100px; opacity: 0.9; }
        .scenery .cloud::before, .scenery .cloud::after { content: ''; position: absolute; background: white; border-radius: 50%; }
        .cloud-1 { width: 150px; height: 50px; top: 10%; left: 10%; }
        .cloud-1::before { width: 70px; height: 70px; top: -30px; left: 20px; }
        .cloud-1::after { width: 90px; height: 90px; top: -45px; right: 20px; }
        
        .cloud-2 { width: 120px; height: 40px; top: 20%; left: 60%; transform: scale(0.8); }
        .cloud-2::before { width: 60px; height: 60px; top: -25px; left: 15px; }
        .cloud-2::after { width: 70px; height: 70px; top: -35px; right: 15px; }

        .scenery .ground {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 30%;
            background: var(--success); border-top: 15px solid var(--success-shadow);
            border-radius: 50% 50% 0 0 / 15px 15px 0 0;
        }

        .tree { position: absolute; bottom: 15px; width: 80px; height: 120px; }
        .tree-1 { left: 5%; }
        .tree-2 { right: 10%; transform: scale(1.2); }
        .tree svg { width: 100%; height: 100%; overflow: visible; }

        /* --- HEADER UI --- */
        .header {
            width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; z-index: 100;
        }

        .score-box {
            background: var(--warning); color: white;
            font-size: clamp(18px, 4vw, 24px); font-weight: 900;
            padding: 8px 20px; border-radius: 20px; border-bottom: 5px solid var(--warning-shadow);
            display: flex; align-items: center; gap: 10px; text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
        }

        .progress-wrapper {
            flex-grow: 1; margin: 0 20px; background: rgba(255,255,255,0.6);
            border-radius: 20px; height: 20px; padding: 4px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .progress-fill { height: 100%; background: var(--success); width: 0%; transition: width 0.4s ease; border-radius: 15px; }

        .icon-btn {
            background: var(--info); border: none; color: white; font-size: 24px; cursor: pointer; width: 50px; height: 50px;
            border-radius: 18px; display: flex; align-items: center; justify-content: center;
            border-bottom: 5px solid var(--info-shadow); transition: transform 0.1s;
        }
        .icon-btn:active { transform: translateY(5px); border-bottom: 0px; margin-top: 5px; }

        /* --- MAIN CONTAINER --- */
        .main-wrapper { flex-grow: 1; width: 100%; display: flex; justify-content: center; align-items: center; padding: 10px; }

        .container {
            width: 100%; max-width: 900px; background: rgba(255, 255, 255, 0.95);
            border-radius: 30px; padding: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15); border: 4px solid white; max-height: 100%; overflow-y: auto;
        }

        /* --- LESSON AREA --- */
        .question-header { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 25px; }

        .equation {
            font-size: clamp(36px, 6vw, 56px); font-weight: 900; color: white; background: var(--equation-bg);
            padding: 10px 40px; border-radius: 30px; border-bottom: 8px solid var(--equation-shadow); text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }

        /* ICONS */
        .item-icon {
            width: clamp(30px, 6vw, 48px);
            height: clamp(30px, 6vw, 48px);
            filter: drop-shadow(2px 3px 2px rgba(0,0,0,0.15)); transition: all 0.3s;
        }

        /* CIRCLES & ALIGNMENT */
        .col-wrapper {
            display: flex; flex-direction: column; align-items: center; gap: 15px; 
            width: clamp(50px, 10vw, 75px);
        }

        .jump-node { display: flex; flex-direction: column; align-items: center; position: relative; width: 100%; }

        .circle {
            width: clamp(50px, 10vw, 75px); height: clamp(50px, 10vw, 75px);
            border-radius: 50%; background: white; border: 5px solid #E5E5E5;
            display: flex; justify-content: center; align-items: center;
            font-size: clamp(24px, 5vw, 36px); font-weight: 900; color: #A0AEC0; z-index: 2; transition: all 0.3s;
        }

        .circle.start {
            border-color: var(--info); background: var(--info); color: white;
            border-bottom: 6px solid var(--info-shadow); text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }
        .circle.active {
            border-color: var(--warning); cursor: pointer; color: var(--warning-shadow);
            border-bottom: 6px solid var(--warning); animation: pulse 1.5s infinite;
        }
        .circle.done {
            border-color: var(--success); background: var(--success); color: white;
            border-bottom: 6px solid var(--success-shadow); text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); box-shadow: 0 0 15px rgba(255, 200, 0, 0.6); } 100% { transform: scale(1); } }

        /* ARROWS (Red U-Shape Below Circles) */
        .arrow-svg {
            position: absolute;
            top: 50%; /* Anchors exactly to center of the circle vertically */
            height: clamp(35px, 6vw, 45px); /* U-shape depth */
            opacity: 0; transition: opacity 0.3s; z-index: 1; pointer-events: none; overflow: visible;
        }
        .arrow-svg.show { opacity: 1; }
        
        .arr-add { right: 50%; width: calc(100% + clamp(5px, 1vw, 10px)); } 
        #arr-1.arr-add { width: calc(200% + clamp(20px, 5vw, 50px)); }
        .arr-sub { left: 50%; width: calc(100% + clamp(5px, 1vw, 10px)); } 

        /* ANSWERS */
        .answers-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: clamp(8px, 1.5vw, 15px); width: 100%; max-width: 600px; display: none;
            margin-top: 20px;
        }

        .answer-btn {
            background: var(--answer-btn); border: none; border-bottom: 6px solid var(--answer-btn-shadow);
            border-radius: 15px; padding: 12px 10px;
            font-size: clamp(24px, 4.5vw, 36px); font-weight: 900; color: white;
            cursor: pointer; transition: all 0.1s; text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }
        .answer-btn:active { transform: translateY(6px); border-bottom: 0px; margin-bottom: 6px; }
        .answer-btn.correct { background: var(--success); border-bottom-color: var(--success-shadow); pointer-events: none; }
        .answer-btn.wrong { background: var(--danger); border-bottom-color: var(--danger-shadow); animation: shake 0.4s; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 75% { transform: translateX(-5px); } }

        .action-panel { display: none; gap: 20px; margin-top: 25px; }
        .btn-large {
            padding: 15px 35px; font-size: clamp(20px, 4vw, 26px); font-weight: 900; color: white;
            border: none; border-radius: 20px; cursor: pointer; transition: all 0.1s; text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
        }
        .btn-next { background: var(--info); border-bottom: 6px solid var(--info-shadow); }
        .btn-play { background: var(--secondary); border-bottom: 6px solid var(--secondary-shadow); }
        .btn-large:active { transform: translateY(6px); border-bottom: 0px; margin-bottom: 6px; }

        /* End Screen */
        #end-screen { display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; width: 100%; }
        .end-title { font-size: clamp(40px, 8vw, 60px); font-weight: 900; color: var(--warning); text-shadow: 3px 3px 0 var(--warning-shadow); margin-bottom: 10px; }
        .end-score-text { font-size: clamp(24px, 5vw, 36px); font-weight: 800; color: var(--text-dark); margin-bottom: 20px; }
        .end-score-number { font-size: clamp(60px, 12vw, 100px); color: var(--success); text-shadow: 4px 4px 0 var(--success-shadow); }

        .confetti { position: fixed; width: 15px; height: 15px; z-index: 9999; pointer-events: none; border-radius: 2px; }

        /* --- MINI GAME --- */
        #minigame-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, #1CB0F6 0%, #87CEEB 100%); z-index: 200; overflow: hidden; flex-direction: column; }
        .mg-header { width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.2); z-index: 210; }
        .balloon { position: absolute; bottom: -150px; cursor: pointer; display: flex; flex-direction: column; align-items: center; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        .balloon-svg { width: 90px; height: 120px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2)); transition: transform 0.1s;}
        .balloon:active .balloon-svg { transform: scale(0.9); }
        .balloon-face { position: absolute; top: 25px; font-size: 36px; pointer-events: none; }
        .pop-effect { position: absolute; width: 120px; height: 120px; background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 70%); animation: popFade 0.3s forwards; pointer-events: none; }
        @keyframes popFade { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }

        .btn-back {
            background: var(--danger); border: none; color: white; padding: 12px 25px; border-radius: 15px;
            font-size: 20px; font-weight: 800; cursor: pointer; border-bottom: 5px solid var(--danger-shadow);
        }
        .btn-back:active { transform: translateY(5px); border-bottom: 0px; margin-bottom: 5px;}

    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- SCENERY BACKGROUND -->
    <div class="scenery">
        <div class="rainbow"></div>
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="ground">
            <div class="tree tree-1"><svg viewBox="0 0 100 150"><rect x="40" y="80" width="20" height="70" fill="#8B4513" rx="5"/><circle cx="50" cy="50" r="40" fill="#2ECC71"/><circle cx="30" cy="70" r="30" fill="#27AE60"/><circle cx="70" cy="70" r="30" fill="#27AE60"/><circle cx="50" cy="30" r="35" fill="#2ECC71"/></svg></div>
            <div class="tree tree-2"><svg viewBox="0 0 100 150"><rect x="42" y="90" width="16" height="60" fill="#654321" rx="4"/><path d="M50 20 L20 80 L80 80 Z" fill="#27AE60"/><path d="M50 40 L10 100 L90 100 Z" fill="#2ECC71"/></svg></div>
        </div>
    </div>

    <!-- Header UI -->
    <div class="header">
        <div class="score-box">⭐ <span id="score-display">0</span></div>
        <div class="progress-wrapper"><div class="progress-fill" id="progress-bar"></div></div>
        <button class="icon-btn" id="btn-sound">🔊</button>
    </div>

    <!-- MAIN GAME CONTAINER -->
    <div class="main-wrapper">
        <div class="container" id="main-container">
            
            <div id="lesson-screen" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                <div class="question-header">
                    <div class="equation" id="equation-display">12 + 4 = ?</div>
                    <button class="icon-btn" id="btn-speak" style="background:var(--success); border-bottom-color:var(--success-shadow);">📢</button>
                </div>

                <!-- Dynamic Visual Area (Icons + Circles Perfect Alignment) -->
                <div id="items-area" style="width: 100%; display: flex; justify-content: center; margin-bottom: 25px;"></div>

                <div class="answers-grid" id="answers-area"></div>

                <div class="action-panel" id="action-panel">
                    <button class="btn-large btn-next" onclick="nextQuestion()">Next ➡️</button>
                    <button class="btn-large btn-play" onclick="openMiniGame()">🎈 Play Game</button>
                </div>
            </div>

            <!-- End Screen Area -->
            <div id="end-screen">
                <div class="end-title">Amazing!</div>
                <div class="end-score-text">Your Final Score</div>
                <div class="end-score-number" id="final-score">0</div>
                <button class="btn-large btn-play" style="margin-top: 30px;" onclick="initGame()">Play Again 🔄</button>
            </div>

        </div>
    </div>

    <!-- MINI GAME SCREEN -->
    <div id="minigame-screen">
        <div class="mg-header">
            <button class="btn-back" onclick="closeMiniGame()">⬅️ Back</button>
            <div class="score-box" style="font-size: 28px;">⭐ <span id="mg-score">0</span></div>
        </div>
        <div id="balloons-container" style="position:relative; width:100%; height:100%; flex-grow:1;"></div>
    </div>

    <audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" preload="auto"></audio>
    <audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3" preload="auto"></audio>
    <audio id="snd-pop" src="https://assets.mixkit.co/active_storage/sfx/2771/2771-preview.mp3" preload="auto"></audio>
    <audio id="snd-jump" src="https://assets.mixkit.co/active_storage/sfx/3005/3005-preview.mp3" preload="auto"></audio>

    <script>
        const appleSVG = `<svg class="item-icon" viewBox="0 0 100 100">
            <defs><radialGradient id="appleGrad" cx="40%" cy="30%" r="60%"><stop offset="0%" stop-color="#ff9999"/><stop offset="40%" stop-color="#FF4B4B"/><stop offset="100%" stop-color="#CC3C3C"/></radialGradient></defs>
            <path d="M48 30 Q45 15, 55 10" fill="none" stroke="#8B4513" stroke-width="4" stroke-linecap="round"/>
            <path d="M55 10 Q65 0, 75 10 Q65 20, 55 10" fill="#58CC02"/>
            <path d="M50 30 C30 15, 10 40, 15 65 C20 90, 45 95, 50 90 C55 95, 80 90, 85 65 C90 40, 70 15, 50 30" fill="url(#appleGrad)"/>
            <path d="M25 50 Q22 40, 30 35" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
        </svg>`;

        const balloonColors = [
            { main: '#FF4B4B', grad: '#ff9999' }, { main: '#58CC02', grad: '#aaff80' },
            { main: '#1CB0F6', grad: '#80dfff' }, { main: '#FFC800', grad: '#ffff80' }, { main: '#CE82FF', grad: '#e6ccff' }
        ];

        const createBalloonSVG = (colorObj) => `<svg class="balloon-svg" viewBox="0 0 100 140">
            <defs><radialGradient id="grad-${colorObj.main.replace('#','')}" cx="35%" cy="30%" r="50%"><stop offset="0%" stop-color="${colorObj.grad}"/><stop offset="100%" stop-color="${colorObj.main}"/></radialGradient></defs>
            <path d="M50 140 L50 115" fill="none" stroke="#fff" stroke-width="3" opacity="0.8"/>
            <path d="M50 10 C20 10, 10 35, 10 60 C10 85, 40 100, 45 110 L55 110 C60 100, 90 85, 90 60 C90 35, 80 10, 50 10 Z" fill="url(#grad-${colorObj.main.replace('#','')})"/>
            <path d="M45 110 L55 110 L55 115 L45 115 Z" fill="${colorObj.main}"/>
            <path d="M25 40 Q35 25, 50 25" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="6" stroke-linecap="round"/>
        </svg>`;

        // Red U-shape arrows
        const arrAddSVG = `<svg class="arrow-svg arr-add" id="arr-{id}" viewBox="0 0 100 40" preserveAspectRatio="none">
           <path d="M 0,5 Q 50,45 95,10" fill="none" stroke="#FF4B4B" stroke-width="6" stroke-linecap="round"/>
           <path d="M 85,3 L 97,9 L 85,18" fill="none" stroke="#FF4B4B" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>`;
        
        const arrSubSVG = `<svg class="arrow-svg arr-sub" id="arr-{id}" viewBox="0 0 100 40" preserveAspectRatio="none">
           <path d="M 100,5 Q 50,45 5,10" fill="none" stroke="#FF4B4B" stroke-width="6" stroke-linecap="round"/>
           <path d="M 15,3 L 3,9 L 15,18" fill="none" stroke="#FF4B4B" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>`;

        let score = 0;
        let isSoundOn = true;
        let currentRound = 1;
        const maxRounds = 10;
        let questionList = [];
        let currentQuestion = {};
        let jumpsDone = 0;
        let wrongAttempt = false;
        let mgInterval;
        let mgActive = false;

        function generateQuestionList() {
            let qs = [];
            let used = new Set();
            function getQ() {
                let safety = 0;
                while (safety < 200) {
                    let isAdd = Math.random() > 0.5;
                    let step = Math.floor(Math.random() * 5) + 1; // 1 to 5
                    let start, answer;
                    if (isAdd) {
                        start = Math.floor(Math.random() * (20 - step - 5 + 1)) + 5; 
                        answer = start + step;
                    } else {
                        start = Math.floor(Math.random() * (20 - 5 + 1)) + 5; 
                        let rowCount = start > 10 ? start - 10 : start;
                        if (step >= rowCount) { safety++; continue; } // Keep jumps on bottom row for perfect visual
                        answer = start - step;
                    }
                    let key = `${start}${isAdd ? '+' : '-'}${step}`;
                    if (!used.has(key)) {
                        used.add(key);
                        return { type: isAdd ? '+' : '-', start, step, answer };
                    }
                    safety++;
                }
                return { type: '+', start: 12, step: 4, answer: 16 };
            }
            for(let i=0; i<10; i++) qs.push(getQ());
            return qs;
        }

        function initGame() {
            score = 0; currentRound = 1; updateScore();
            questionList = generateQuestionList();
            document.getElementById('end-screen').style.display = 'none';
            document.getElementById('lesson-screen').style.display = 'flex';
            loadQuestion();
        }

        function updateScore() {
            document.getElementById('score-display').innerText = score;
            document.getElementById('mg-score').innerText = score;
        }

        function loadQuestion() {
            currentQuestion = questionList[currentRound - 1];
            jumpsDone = 0; wrongAttempt = false;
            document.getElementById('progress-bar').style.width = `${(currentRound / maxRounds) * 100}%`;
            
            const q = currentQuestion;
            document.getElementById('equation-display').innerText = `${q.start} ${q.type} ${q.step} = ?`;

            const area = document.getElementById('items-area');
            
            if (q.type === '+') {
                // ADDITION
                let leftHTML = `<div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: clamp(5px, 1vw, 10px);">`;
                leftHTML += `<div class="item-icon">${appleSVG}</div>`.repeat(q.start);
                leftHTML += `</div>`;
                
                let leftGroupHTML = `
                    <div style="display: flex; flex-direction: column; align-items: center; gap: 15px;">
                        ${leftHTML}
                        <div class="circle start">${q.start}</div>
                    </div>`;

                let rightGroupHTML = `<div style="display: flex; flex-wrap: nowrap; gap: clamp(5px, 1vw, 10px);">`;
                for (let i = 1; i <= q.step; i++) {
                    rightGroupHTML += `
                        <div class="col-wrapper">
                            <div class="item-icon">${appleSVG}</div>
                            <div class="jump-node">
                                ${arrAddSVG.replace('{id}', i)}
                                <div class="circle" id="jump-${i}" onclick="doJump(${i})">?</div>
                            </div>
                        </div>`;
                }
                rightGroupHTML += `</div>`;

                area.innerHTML = `
                    <div style="display: flex; align-items: flex-end; justify-content: center; gap: clamp(20px, 5vw, 50px); width: 100%;">
                        ${leftGroupHTML}
                        ${rightGroupHTML}
                    </div>`;
            } else {
                // SUBTRACTION (10-frame logic, perfect columns)
                let topCount = Math.min(10, q.start);
                let bottomCount = q.start - topCount;
                
                let topHTML = '';
                if (topCount > 0) {
                    topHTML = `<div style="display: flex; gap: clamp(5px, 1vw, 10px); justify-content: flex-start; padding-bottom: 10px;">`;
                    for(let i=0; i<topCount; i++) {
                        topHTML += `
                            <div class="col-wrapper">
                                <div class="item-icon">${appleSVG}</div>
                            </div>`;
                    }
                    topHTML += `</div>`;
                }

                let bottomHTML = `<div style="display: flex; gap: clamp(5px, 1vw, 10px); justify-content: flex-start; align-items: flex-start;">`;
                let targetRowTotal = bottomCount > 0 ? bottomCount : topCount;
                let uncountedCountInRow = targetRowTotal - (q.step + 1); 

                for(let i=0; i<uncountedCountInRow; i++) {
                    bottomHTML += `
                        <div class="col-wrapper">
                            <div class="item-icon">${appleSVG}</div>
                        </div>`;
                }

                for (let i = q.step; i >= 1; i--) {
                    bottomHTML += `
                        <div class="col-wrapper">
                            <div class="item-icon">${appleSVG}</div>
                            <div class="jump-node">
                                <div class="circle" id="jump-${i}" onclick="doJump(${i})">?</div>
                                ${arrSubSVG.replace('{id}', i)}
                            </div>
                        </div>`;
                }

                bottomHTML += `
                    <div class="col-wrapper">
                        <div class="item-icon">${appleSVG}</div>
                        <div class="jump-node">
                             <div class="circle start">${q.start}</div>
                        </div>
                    </div></div>`;

                area.innerHTML = `
                    <div style="display: flex; flex-direction: column; align-items: flex-start;">
                        ${bottomCount > 0 ? topHTML : ''}
                        ${bottomHTML}
                    </div>`;
            }

            document.getElementById('jump-1').classList.add('active');
            
            // Xóa sạch các đáp án cũ khỏi DOM để tránh lỗi hàm giọng đọc (voice bug)
            document.getElementById('answers-area').innerHTML = '';
            document.getElementById('answers-area').style.display = 'none';
            document.getElementById('action-panel').style.display = 'none';

            setTimeout(speakInstruction, 300);
        }

        function doJump(index) {
            const node = document.getElementById(`jump-${index}`);
            if (!node.classList.contains('active')) return;

            playSound('snd-jump');
            const q = currentQuestion;
            node.classList.remove('active');
            node.classList.add('done');
            
            const val = q.type === '+' ? q.start + index : q.start - index;
            node.innerText = val;

            document.getElementById(`arr-${index}`).classList.add('show');
            jumpsDone++;

            if (jumpsDone < q.step) {
                document.getElementById(`jump-${index + 1}`).classList.add('active');
            } else {
                showAnswers();
            }
        }

        function showAnswers() {
            const ansArea = document.getElementById('answers-area');
            ansArea.style.display = 'grid'; ansArea.innerHTML = '';

            const q = currentQuestion;
            let options = new Set([q.answer]);
            while(options.size < 4) {
                let offset = Math.floor(Math.random() * 7) - 3;
                let fake = q.answer + offset;
                if (fake > 0 && fake !== q.answer) options.add(fake);
            }
            options = Array.from(options).sort(() => Math.random() - 0.5);

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn'; btn.innerText = opt;
                btn.onclick = () => checkAnswer(btn, opt, q.answer);
                ansArea.appendChild(btn);
            });
        }

        function checkAnswer(btn, selected, correct) {
            if (selected === correct) {
                btn.classList.add('correct'); playSound('snd-correct'); fireConfetti(30);
                if (!wrongAttempt) { score += 10; updateScore(); }
                
                document.getElementById('equation-display').innerText = `${currentQuestion.start} ${currentQuestion.type} ${currentQuestion.step} = ${correct}`;
                document.querySelectorAll('.answer-btn').forEach(b => { if (b !== btn) { b.style.opacity = '0.5'; b.style.pointerEvents = 'none'; } });
                document.getElementById('action-panel').style.display = 'flex';
                
            } else {
                btn.classList.add('wrong'); playSound('snd-wrong'); wrongAttempt = true;
                setTimeout(() => btn.classList.remove('wrong'), 500);
            }
        }

        function nextQuestion() {
            currentRound++;
            if (currentRound > maxRounds) {
                document.getElementById('lesson-screen').style.display = 'none';
                document.getElementById('end-screen').style.display = 'flex';
                document.getElementById('final-score').innerText = score;
                fireMassiveConfetti();
            } else { loadQuestion(); }
        }

        // --- Voice Logic (Bug Fixed) ---
        function getSpeechText() {
            const q = currentQuestion;
            const operator = q.type === '+' ? 'plus' : 'minus';
            // Bây giờ DOM đã được dọn sạch trước mỗi câu hỏi, hàm này sẽ trả về đúng trạng thái
            if (document.querySelector('.answer-btn.correct')) {
                return `${q.start} ${operator} ${q.step} equals ${q.answer}.`;
            } else {
                return `${q.start} ${operator} ${q.step} equals what?`;
            }
        }

        function speakInstruction() {
            if (!isSoundOn) return;
            window.speechSynthesis.cancel();
            let msg = new SpeechSynthesisUtterance(getSpeechText());
            msg.lang = 'en-US'; msg.rate = 0.85;
            window.speechSynthesis.speak(msg);
        }

        document.getElementById('btn-speak').addEventListener('click', speakInstruction);
        
        document.getElementById('btn-sound').addEventListener('click', (e) => {
            isSoundOn = !isSoundOn;
            e.target.innerText = isSoundOn ? '🔊' : '🔇';
            if(!isSoundOn) window.speechSynthesis.cancel();
        });

        function playSound(id) {
            if (!isSoundOn) return;
            const audio = document.getElementById(id);
            audio.currentTime = 0; audio.play().catch(e => {});
        }

        // --- CONFETTI ---
        function createConfettiPiece() {
            const colors = ['#FF4B4B', '#58CC02', '#FFC800', '#1CB0F6', '#CE82FF'];
            let conf = document.createElement('div');
            conf.className = 'confetti';
            conf.style.left = Math.random() * 100 + 'vw'; conf.style.top = '-20px';
            conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            if(Math.random() > 0.5) conf.style.borderRadius = '50%';
            document.body.appendChild(conf);

            let startY = -20; let speedY = Math.random() * 4 + 3;
            let rotate = 0; let rotateSpeed = Math.random() * 10 - 5;
            let wobble = Math.random() * 2; let wobbleSpeed = Math.random() * 0.1; let time = 0;
            
            let fall = setInterval(() => {
                time++; startY += speedY; rotate += rotateSpeed;
                let currentX = Math.sin(time * wobbleSpeed) * wobble * 10;
                conf.style.transform = `translate(${currentX}px, ${startY}px) rotate(${rotate}deg)`;
                if (startY > window.innerHeight) { clearInterval(fall); conf.remove(); }
            }, 16);
        }
        function fireConfetti(amount) { for (let i = 0; i < amount; i++) setTimeout(createConfettiPiece, Math.random() * 500); }
        function fireMassiveConfetti() { for (let i = 0; i < 200; i++) setTimeout(createConfettiPiece, Math.random() * 2000); }

        // --- MINI GAME ---
        function openMiniGame() {
            document.getElementById('lesson-screen').style.display = 'none';
            document.getElementById('minigame-screen').style.display = 'flex';
            mgActive = true; spawnBalloonLoop();
        }

        function closeMiniGame() {
            mgActive = false; clearTimeout(mgInterval);
            document.getElementById('balloons-container').innerHTML = '';
            document.getElementById('minigame-screen').style.display = 'none';
            document.getElementById('lesson-screen').style.display = 'flex';
            nextQuestion();
        }

        function spawnBalloonLoop() {
            if(!mgActive) return;
            spawnBalloon();
            mgInterval = setTimeout(spawnBalloonLoop, Math.random() * 400 + 500);
        }

        function spawnBalloon() {
            if(!mgActive) return;
            const container = document.getElementById('balloons-container');
            const balloon = document.createElement('div');
            balloon.className = 'balloon';
            balloon.style.left = Math.random() * 80 + 10 + '%';
            
            let colorObj = balloonColors[Math.floor(Math.random() * balloonColors.length)];
            let faces = ['😊', '😎', '🤩', '🥳', '🎈'];
            let face = faces[Math.floor(Math.random() * faces.length)];

            balloon.innerHTML = createBalloonSVG(colorObj) + `<div class="balloon-face">${face}</div>`;
            container.appendChild(balloon);

            let bottom = -150;
            let speed = (Math.random() * 3 + 2) * 0.9;
            
            let float = setInterval(() => {
                if(!mgActive) { clearInterval(float); return; }
                bottom += speed;
                balloon.style.bottom = bottom + 'px';
                balloon.style.transform = `translateX(${Math.sin(bottom/40) * 15}px)`;

                if(bottom > window.innerHeight + 100) { clearInterval(float); balloon.remove(); }
            }, 16);

            const popBalloon = (e) => {
                e.preventDefault();
                playSound('snd-pop'); clearInterval(float);
                balloon.innerHTML = `<div class="pop-effect"></div>`;
                score += 1; updateScore();
                setTimeout(() => balloon.remove(), 300);
            };

            balloon.onmousedown = popBalloon;
            balloon.ontouchstart = popBalloon;
        }

        window.onload = initGame;
    </script>
</body>
</html>
