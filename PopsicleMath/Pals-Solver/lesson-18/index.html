<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picture Graph Adventure V4</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables - Duolingo Color Palette */
        :root {
            --primary: #58cc02;
            --primary-dark: #46a302;
            --secondary: #1cb0f6;
            --secondary-dark: #1899d6;
            --accent: #ff4b4b;
            --accent-dark: #ea1515;
            --yellow: #ffc800;
            --yellow-dark: #e5b400;
            --text-main: #4b4b4b;
            --text-light: #afafaf;
            --card-bg: #ffffff;
            --shadow: rgba(0, 0, 0, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            user-select: none;
        }

        body {
            /* Sky background */
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            color: var(--text-main);
            height: 100vh; /* Fixed height to prevent scrolling */
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevent scrolling absolutely */
            position: relative;
        }

        /* --- CSS ART BACKGROUND (Scenery) --- */
        .scenery {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .sun {
            position: absolute;
            top: 5vh; left: 5vw;
            width: 100px; height: 100px;
            background: #ffde00;
            border-radius: 50%;
            box-shadow: 0 0 40px #ffde00, 0 0 0 15px rgba(255, 222, 0, 0.3);
        }

        .rainbow-container {
            position: absolute;
            top: 8vh; left: 12vw;
            width: 300px; height: 150px;
            overflow: hidden; 
            opacity: 0.65;
        }
        
        .rainbow-arc {
            width: 300px; height: 300px;
            border-radius: 50%;
            box-shadow: 0 0 0 12px #ff4b4b inset, 
                        0 0 0 24px #ff9900 inset, 
                        0 0 0 36px #ffde00 inset, 
                        0 0 0 48px #58cc02 inset, 
                        0 0 0 60px #1cb0f6 inset;
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.9;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .cloud::before, .cloud::after {
            content: ''; position: absolute; background: white; border-radius: 50%;
        }
        .c1 { top: 12vh; right: 20vw; width: 150px; height: 50px; }
        .c1::before { width: 70px; height: 70px; top: -30px; left: 20px; }
        .c1::after { width: 50px; height: 50px; top: -20px; right: 20px; }
        
        .c2 { top: 25vh; left: 25vw; width: 120px; height: 40px; transform: scale(0.8); }
        .c2::before { width: 50px; height: 50px; top: -25px; left: 15px; }
        .c2::after { width: 40px; height: 40px; top: -15px; right: 15px; }

        .hills {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 20vh;
        }
        .hill {
            position: absolute;
            border-radius: 50% 50% 0 0;
            background: var(--primary);
            border-top: 15px solid var(--primary-dark);
        }
        .hill-bg {
            width: 120vw; height: 30vh;
            left: -10vw; bottom: -15vh;
            background: #61e002;
            border-top-color: #51c402;
        }
        .hill-fg1 {
            width: 80vw; height: 25vh;
            left: -20vw; bottom: -10vh;
        }
        .hill-fg2 {
            width: 90vw; height: 30vh;
            right: -20vw; bottom: -15vh;
            background: #4ab302;
            border-top-color: #3b8c02;
        }
        
        .decoration {
            position: absolute;
            font-size: 2.5rem;
            text-shadow: 2px 4px 0px rgba(0,0,0,0.15); 
        }
        .d1 { bottom: 12vh; left: 10vw; font-size: 4rem; } 
        .d2 { bottom: 6vh; left: 25vw; font-size: 2rem; } 
        .d3 { bottom: 10vh; right: 15vw; font-size: 4rem; } 
        .d4 { bottom: 4vh; right: 30vw; font-size: 2rem; } 

        /* --- START SCREEN --- */
        .overlay-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            z-index: 5000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .overlay-title {
            font-size: 4rem;
            color: var(--secondary);
            text-shadow: 0 6px 0 var(--secondary-dark), 0 10px 20px rgba(0,0,0,0.2);
            margin-bottom: 40px;
            font-weight: 900;
        }

        /* --- MAIN UI --- */
        .controls {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        .control-pill {
            background: white;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 800;
            color: var(--secondary);
            border: 3px solid #e5e5e5;
            box-shadow: 0 4px 0 #e5e5e5;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
        }

        .control-btn {
            cursor: pointer;
            border: none;
            background: white;
            width: 45px; height: 45px;
            border-radius: 50%;
            font-size: 1.3rem;
            border: 3px solid #e5e5e5;
            box-shadow: 0 4px 0 #e5e5e5;
            transition: all 0.1s;
            display: flex; align-items: center; justify-content: center;
        }
        .control-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #e5e5e5;
        }

        .progress-container {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 40%;
            max-width: 400px;
            height: 18px;
            background: #e5e5e5;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--primary);
            border-radius: 15px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 50%;
            background: rgba(255,255,255,0.2);
        }

        /* Khu vực hiển thị chính */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; 
            padding: 60px 20px 10px 20px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            z-index: 100;
        }

        /* Bảng dữ liệu */
        .data-table {
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 30px;
            border-radius: 20px;
            border: 4px solid #e5e5e5;
            box-shadow: 0 6px 0 #e5e5e5, 0 10px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            gap: 25px;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
            max-width: 900px;
        }

        .data-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--secondary-dark);
        }
        
        .data-item span:first-child, .row-label, .graph-item {
            text-shadow: 2px 4px 0px rgba(0,0,0,0.15);
            transform-origin: center bottom;
        }

        /* Biểu đồ tranh */
        .graph-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 25px;
            border: 4px solid #e5e5e5;
            box-shadow: 0 8px 0 #e5e5e5, 0 12px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 900px;
            margin-bottom: 20px;
        }

        .graph-legend {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--secondary);
            margin-bottom: 15px;
            background: #f0f9ff;
            border: 3px solid #b6e3ff;
            padding: 8px;
            border-radius: 15px;
        }

        .graph-row {
            display: flex;
            align-items: center;
            border-bottom: 3px dashed #cbd5e1;
            padding: 8px 0;
            min-height: 70px;
        }

        .graph-row:last-child {
            border-bottom: none;
        }

        .graph-row.error-highlight {
            background-color: #ffe4e6;
            border-radius: 15px;
            border: 3px solid var(--accent);
        }

        .row-label {
            width: 100px;
            font-size: 2.5rem;
            text-align: center;
            border-right: 4px solid #e5e5e5;
            padding-right: 15px;
            margin-right: 15px;
        }

        .row-items {
            flex: 1;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            cursor: pointer;
            min-height: 50px;
            align-items: center;
            justify-content: flex-start;
            padding-left: 10px;
        }

        .graph-item {
            font-size: 2.5rem;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transition: transform 0.1s;
        }

        .graph-item:hover {
            transform: scale(1.15) translateY(-3px);
        }

        /* Phần câu hỏi và đáp án */
        .question-container {
            text-align: center;
            margin-bottom: 15px;
            width: 100%;
            display: none;
        }

        .question-text-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            background: white;
            padding: 10px 35px;
            border-radius: 35px;
            border: 4px solid #e5e5e5;
            box-shadow: 0 6px 0 #e5e5e5;
            flex-wrap: wrap;
        }

        .question-text {
            font-size: 2rem;
            font-weight: 800;
            color: var(--secondary-dark);
        }

        .tts-btn-inline {
            background: var(--yellow);
            color: white;
            border: 3px solid var(--yellow-dark);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.6rem;
            cursor: pointer;
            box-shadow: 0 5px 0 var(--yellow-dark);
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .tts-btn-inline:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 var(--yellow-dark);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 650px;
            margin: 0 auto;
        }

        /* Nút đáp án (Option) V4: Đẹp, sặc sỡ, né màu Green/Red */
        .option-btn {
            background: #e0f2fe; /* Màu xanh thiên thanh nhạt */
            border: 4px solid #7dd3fc;
            color: #0284c7; /* Chữ màu xanh đậm */
            font-size: 1.8rem;
            font-weight: 800;
            padding: 15px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 6px 0 #7dd3fc;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .option-btn:hover {
            background: #bae6fd;
        }

        .option-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #7dd3fc;
        }

        /* Khi đúng: Chuyển sang xanh lá */
        .option-btn.correct {
            background: var(--primary);
            border-color: var(--primary-dark);
            box-shadow: 0 6px 0 var(--primary-dark);
            color: white;
        }

        /* Khi sai: Chuyển sang đỏ */
        .option-btn.wrong {
            background: var(--accent);
            border-color: var(--accent-dark);
            box-shadow: 0 6px 0 var(--accent-dark);
            color: white;
            animation: shake 0.4s;
        }

        /* Nút hành động chung */
        .action-btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 15px 45px;
            font-size: 1.8rem;
            font-weight: 900;
            border-radius: 35px;
            cursor: pointer;
            border: 4px solid var(--secondary-dark);
            box-shadow: 0 6px 0 var(--secondary-dark);
            transition: all 0.1s;
            letter-spacing: 1px;
        }

        .action-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 var(--secondary-dark);
        }

        /* Animations */
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px) rotate(-3deg); }
            50% { transform: translateX(10px) rotate(3deg); }
            75% { transform: translateX(-10px) rotate(-3deg); }
        }

        /* Confetti */
        .confetti {
            position: fixed;
            width: 12px;
            height: 12px;
            z-index: 10000;
            pointer-events: none;
            animation: fall 2.5s linear forwards;
            border-radius: 3px;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg) scale(0.5); opacity: 0; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            body { overflow-y: auto; overflow-x: hidden; height: auto; min-height: 100vh; }
            .main-container { padding-top: 100px; padding-bottom: 40px; height: auto; justify-content: flex-start; }
            .options-grid { grid-template-columns: 1fr; gap: 15px; }
            .overlay-title { font-size: 3rem; }
            .row-label { font-size: 2rem; width: 70px; padding-right: 10px; margin-right: 10px; }
            .graph-item { font-size: 2rem; }
            .question-text { font-size: 1.5rem; }
            .option-btn { font-size: 1.5rem; padding: 12px; }
            .progress-container { width: 45%; left: auto; right: 15px; transform: none; top: 25px; }
            .controls { flex-direction: column; gap: 10px; }
            .rainbow-container { left: -5vw; transform: scale(0.7); }
            .sun { left: -5vw; transform: scale(0.7); }
            .data-item { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- SCENERY BACKGROUND -->
    <div class="scenery">
        <div class="sun"></div>
        <div class="rainbow-container">
            <div class="rainbow-arc"></div>
        </div>
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="hills">
            <div class="hill hill-bg"></div>
            <div class="hill hill-fg2"></div>
            <div class="hill hill-fg1"></div>
        </div>
        <div class="decoration d1">🌲</div>
        <div class="decoration d2">🌷</div>
        <div class="decoration d3">🌳</div>
        <div class="decoration d4">🌻</div>
    </div>

    <!-- START SCREEN -->
    <div class="overlay-screen" id="startScreen">
        <h1 class="overlay-title">Picture Graph<br>Adventure 🚀</h1>
        <button class="action-btn" onclick="startGame()">Start Play</button>
    </div>

    <!-- Controls & Progress -->
    <div class="controls">
        <button class="control-btn" id="soundBtn" onclick="toggleSound()">🔊</button>
        <div class="control-pill">⭐ <span id="scoreDisplay">0</span></div>
        <!-- V4 Update: Changed Stage to Question Counter -->
        <div class="control-pill">Q: <span id="questionDisplay">1</span>/10</div>
    </div>
    
    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- Main Game Area -->
    <div class="main-container" id="mainContainer" style="display: none;">

        <!-- Stage 1: Build Graph Data Table -->
        <div class="data-table" id="dataTable">
            <!-- Rendered via JS -->
        </div>

        <!-- The Picture Graph -->
        <div class="graph-container" id="graphContainer">
            <div class="graph-legend" id="graphLegend">Each 🧸 stands for 1 item.</div>
            <div id="graphRows">
                <!-- Rows rendered via JS -->
            </div>
        </div>

        <!-- Stage 1 Check Button -->
        <button class="action-btn" id="checkGraphBtn" onclick="checkGraph()">Check Graph</button>

        <!-- Stage 2 & 3 Question Area -->
        <div class="question-container" id="questionArea">
            <div class="question-text-wrapper">
                <span class="question-text" id="questionText">How many items?</span>
                <button class="tts-btn-inline" onclick="readText(document.getElementById('questionText').innerText)">🔊</button>
            </div>
            <div class="options-grid" id="optionsGrid">
                <!-- Options rendered via JS -->
            </div>
        </div>

    </div>

    <!-- End Screen -->
    <div class="overlay-screen" id="endScreen" style="display: none; z-index: 6000;">
        <div style="font-size: 6rem; margin-bottom: 20px;">🌟🏆🌟</div>
        <h1 style="font-size: 4rem; color: var(--primary-dark); margin-bottom: 20px; font-weight: 900;">Awesome!</h1>
        <p style="font-size: 2rem; margin-bottom: 40px; color: var(--text-main); font-weight: 700;">
            Your score: <span id="finalScore" style="color: var(--accent); font-size: 3rem; margin: 0 10px;"></span> / 10
        </p>
        <button class="action-btn" onclick="resetGame()">Play Again</button>
    </div>

    <script>
        // Cấu hình Chủ đề / Theme Configurations
        const themes = [
            { name: "Toy Store", icon: "🧸", items: [{name: "Bears", icon: "🧸"}, {name: "Cars", icon: "🚗"}, {name: "Yo-yos", icon: "🪀"}, {name: "Blocks", icon: "🧱"}] },
            { name: "Ice Cream Shop", icon: "🍦", items: [{name: "Cones", icon: "🍦"}, {name: "Popsicles", icon: "🍧"}, {name: "Sundaes", icon: "🍨"}, {name: "Cupcakes", icon: "🧁"}] },
            { name: "Sticker Collection", icon: "⭐", items: [{name: "Stars", icon: "⭐"}, {name: "Hearts", icon: "💖"}, {name: "Flowers", icon: "🌸"}, {name: "Bugs", icon: "🦋"}] },
            { name: "Fruit Basket", icon: "🍎", items: [{name: "Apples", icon: "🍎"}, {name: "Bananas", icon: "🍌"}, {name: "Grapes", icon: "🍇"}, {name: "Berries", icon: "🍓"}] },
            { name: "Pet Rescue", icon: "🐶", items: [{name: "Dogs", icon: "🐶"}, {name: "Cats", icon: "🐱"}, {name: "Bunnies", icon: "🐰"}, {name: "Mice", icon: "🐹"}] }
        ];

        let currentTheme = null;
        let gameData = []; 
        let currentQuestionNumber = 1; // 1 to 10
        let score = 0;
        let questions = []; 
        let soundEnabled = true;
        let canAnswer = true;
        let hasMadeMistakeCurrentQuestion = false; // Trạng thái theo dõi điểm số V4
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'flex';
            if(audioCtx.state === 'suspended') { audioCtx.resume(); }
            initGameFlow();
        }

        // V4: Fixed Blank Screen bug on Play Again
        function resetGame() {
            document.getElementById('endScreen').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'flex'; // Khôi phục khung chính
            initGameFlow();
        }

        function initGameFlow() {
            score = 0;
            currentQuestionNumber = 1;
            hasMadeMistakeCurrentQuestion = false;
            
            updateScoreDisplay();
            updateProgress();
            
            document.getElementById('dataTable').style.display = 'flex';
            document.getElementById('checkGraphBtn').style.display = 'block';
            document.getElementById('questionArea').style.display = 'none';
            document.getElementById('graphContainer').style.display = 'block';

            currentTheme = themes[Math.floor(Math.random() * themes.length)];
            document.getElementById('graphLegend').innerText = `Each icon stands for 1 item.`;
            document.getElementById('questionDisplay').innerText = currentQuestionNumber;

            generateLogicData();
            renderBuildGraph();
            generateQuestions();

            setTimeout(() => {
                readText("Let's build the graph!");
            }, 500);
        }

        function generateLogicData() {
            const max = Math.floor(Math.random() * 3) + 7; 
            const min = Math.floor(Math.random() * 3) + 2; 
            const mid = Math.floor(Math.random() * 2) + 5; 
            
            let counts = [max, min, mid, mid];
            counts.sort(() => Math.random() - 0.5);

            gameData = currentTheme.items.map((item, index) => ({
                item: item,
                targetCount: counts[index],
                currentCount: 0 
            }));
        }

        function renderBuildGraph() {
            const dataTable = document.getElementById('dataTable');
            const graphRows = document.getElementById('graphRows');
            
            dataTable.innerHTML = '';
            graphRows.innerHTML = '';

            gameData.forEach((data, index) => {
                dataTable.innerHTML += `
                    <div class="data-item">
                        <span>${data.item.icon}</span> <span>${data.item.name}:</span>
                        <span style="color: var(--accent); font-size: 2rem;">${data.targetCount}</span>
                    </div>
                `;

                const row = document.createElement('div');
                row.className = 'graph-row';
                row.id = `row-${index}`;
                
                row.innerHTML = `
                    <div class="row-label">${data.item.icon}</div>
                    <div class="row-items" id="items-${index}" onclick="addIcon(${index})" title="Click to add">
                    </div>
                `;
                graphRows.appendChild(row);
            });
        }

        function addIcon(rowIndex) {
            const rowData = gameData[rowIndex];
            if (rowData.currentCount < 10) { 
                rowData.currentCount++;
                renderRowIcons(rowIndex);
                playSound('pop');
            }
        }

        function removeIcon(event, rowIndex) {
            event.stopPropagation();
            const rowData = gameData[rowIndex];
            if (rowData.currentCount > 0) {
                rowData.currentCount--;
                renderRowIcons(rowIndex);
                playSound('pop');
            }
        }

        function renderRowIcons(rowIndex) {
            const container = document.getElementById(`items-${rowIndex}`);
            const rowData = gameData[rowIndex];
            container.innerHTML = '';
            
            for (let i = 0; i < rowData.currentCount; i++) {
                const icon = document.createElement('span');
                icon.className = 'graph-item';
                icon.innerText = rowData.item.icon;
                icon.onclick = (e) => removeIcon(e, rowIndex);
                container.appendChild(icon);
            }
        }

        // V4: Scoring logic for Build Graph
        function checkGraph() {
            let allCorrect = true;
            gameData.forEach((data, index) => {
                const rowEl = document.getElementById(`row-${index}`);
                if (data.currentCount !== data.targetCount) {
                    allCorrect = false;
                    rowEl.classList.add('error-highlight');
                    setTimeout(() => rowEl.classList.remove('error-highlight'), 1500);
                } else {
                    rowEl.classList.remove('error-highlight');
                }
            });

            if (allCorrect) {
                playSound('correct');
                fireConfettiSmall();
                
                // V4: Chỉ cộng điểm nếu bé chưa sai lần nào ở câu này
                if (!hasMadeMistakeCurrentQuestion) {
                    score++;
                }
                updateScoreDisplay();
                
                currentQuestionNumber++;
                updateProgress();
                
                setTimeout(() => {
                    document.getElementById('dataTable').style.display = 'none';
                    document.getElementById('checkGraphBtn').style.display = 'none';
                    
                    document.querySelectorAll('.row-items').forEach(el => {
                        el.onclick = null;
                        el.style.cursor = 'default';
                    });
                    document.querySelectorAll('.graph-item').forEach(el => {
                        el.onclick = null;
                        el.style.cursor = 'default';
                    });

                    startQuestionsPhase();
                }, 1500);
            } else {
                playSound('wrong');
                readText("Oops, check the numbers again.");
                hasMadeMistakeCurrentQuestion = true; // V4: Đánh dấu lỗi để không cho điểm
            }
        }

        function generateQuestions() {
            questions = [];
            let maxObj = gameData.reduce((prev, current) => (prev.targetCount > current.targetCount) ? prev : current);
            let minObj = gameData.reduce((prev, current) => (prev.targetCount < current.targetCount) ? prev : current);
            
            let sameItems = [];
            for(let i=0; i<gameData.length; i++) {
                for(let j=i+1; j<gameData.length; j++) {
                    if(gameData[i].targetCount === gameData[j].targetCount) {
                        sameItems = [gameData[i], gameData[j]];
                        break;
                    }
                }
            }
            let totalAll = gameData.reduce((sum, current) => sum + current.targetCount, 0);

            questions.push({ text: `How many ${maxObj.item.name} are there?`, correct: maxObj.targetCount, type: 'number' });
            questions.push({ text: `How many ${minObj.item.name} are there?`, correct: minObj.targetCount, type: 'number' });
            questions.push({ text: `Which item has the most?`, correct: `${maxObj.item.icon} ${maxObj.item.name}`, type: 'text', options: gameData.map(d => `${d.item.icon} ${d.item.name}`) });
            questions.push({ text: `Which two items have the same number?`, correct: `${sameItems[0].item.icon} & ${sameItems[1].item.icon}`, type: 'text', 
                options: [ `${sameItems[0].item.icon} & ${sameItems[1].item.icon}`, `${maxObj.item.icon} & ${minObj.item.icon}`, `${sameItems[0].item.icon} & ${maxObj.item.icon}`, `${sameItems[1].item.icon} & ${minObj.item.icon}` ] 
            });

            questions.push({ text: `How many more ${maxObj.item.name} are there than ${minObj.item.name}?`, correct: maxObj.targetCount - minObj.targetCount, type: 'number' });
            questions.push({ text: `How many fewer ${minObj.item.name} are there than ${sameItems[0].item.name}?`, correct: sameItems[0].targetCount - minObj.targetCount, type: 'number' });
            questions.push({ text: `How many ${sameItems[0].item.name} and ${sameItems[1].item.name} are there altogether?`, correct: sameItems[0].targetCount + sameItems[1].targetCount, type: 'number' });
            questions.push({ text: `How many ${maxObj.item.name} and ${sameItems[0].item.name} are there altogether?`, correct: maxObj.targetCount + sameItems[0].targetCount, type: 'number' });
            questions.push({ text: `How many items are there altogether in the graph?`, correct: totalAll, type: 'number' });
        }

        function startQuestionsPhase() {
            document.getElementById('questionArea').style.display = 'block';
            showNextQuestion();
        }

        function showNextQuestion() {
            canAnswer = true;
            hasMadeMistakeCurrentQuestion = false; // Reset lỗi ở câu hỏi mới
            
            if (currentQuestionNumber > 10) {
                endGame();
                return;
            }

            const q = questions[currentQuestionNumber - 2]; // Subtract 2 because Graph build was Q1
            document.getElementById('questionDisplay').innerText = currentQuestionNumber;
            document.getElementById('questionText').innerText = q.text;

            let options = [];
            if (q.type === 'number') {
                options = [q.correct];
                while(options.length < 4) {
                    let wrong = q.correct + (Math.floor(Math.random() * 5) - 2);
                    if (wrong > 0 && !options.includes(wrong) && wrong !== q.correct) {
                        options.push(wrong);
                    }
                }
            } else {
                options = [...q.options]; 
            }

            options.sort(() => Math.random() - 0.5);

            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = '';
            
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(btn, opt === q.correct);
                grid.appendChild(btn);
            });

            setTimeout(() => { readText(q.text); }, 600);
        }

        // V4: Cập nhật quy tắc chấm điểm
        function handleAnswer(btn, isCorrect) {
            if (!canAnswer) return;
            
            if (isCorrect) {
                canAnswer = false; 
                btn.classList.add('correct');
                playSound('correct');
                fireConfettiSmall();
                
                // Chỉ cộng điểm khi bé trả lời đúng ngay lần đầu
                if (!hasMadeMistakeCurrentQuestion) {
                    score++;
                    updateScoreDisplay();
                }

                setTimeout(() => {
                    currentQuestionNumber++;
                    updateProgress();
                    showNextQuestion();
                }, 1500);

            } else {
                // Bé chọn sai, có thể chọn lại
                btn.classList.add('wrong');
                playSound('wrong');
                hasMadeMistakeCurrentQuestion = true; // Đánh dấu đã sai để hủy điểm cộng
                
                setTimeout(() => btn.classList.remove('wrong'), 500);
            }
        }

        // Text-to-Speech Function
        function readText(textToSpeak) {
            if (!soundEnabled) return;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(textToSpeak);
                msg.lang = 'en-US';
                msg.rate = 0.85;
                msg.pitch = 1.1; 
                window.speechSynthesis.speak(msg);
            }
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('soundBtn').innerText = soundEnabled ? '🔊' : '🔇';
            if(!soundEnabled) window.speechSynthesis.cancel();
        }

        function endGame() {
            document.getElementById('mainContainer').style.display = 'none';
            document.getElementById('endScreen').style.display = 'flex';
            document.getElementById('finalScore').innerText = score;
            playSound('win');
            
            for(let i=0; i<5; i++) {
                setTimeout(fireConfettiLarge, i * 400);
            }
            setTimeout(() => readText(`Awesome! You scored ${score} out of 10!`), 500);
        }

        function updateScoreDisplay() { document.getElementById('scoreDisplay').innerText = score; }
        
        function updateProgress() {
            // V4 progress calculation
            const percent = ((currentQuestionNumber - 1) / 10) * 100;
            document.getElementById('progressBar').style.width = `${percent}%`;
        }

        // --- Sound Logic ---
        function playSound(type) {
            if (!soundEnabled || audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'pop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(450, now);
                osc.frequency.exponentialRampToValueAtTime(700, now + 0.1);
                gain.gain.setValueAtTime(0.6, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'correct') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(500, now);
                osc.frequency.setValueAtTime(800, now + 0.1);
                osc.frequency.setValueAtTime(1200, now + 0.2);
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(250, now);
                osc.frequency.exponentialRampToValueAtTime(120, now + 0.4);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'win') {
                osc.type = 'sine';
                [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                    osc.frequency.setValueAtTime(freq, now + (i*0.15));
                });
                gain.gain.setValueAtTime(0.6, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.8);
                osc.start(now); osc.stop(now + 0.8);
            }
        }

        // --- Confetti Logic ---
        function fireConfettiSmall() { createConfetti(20); }
        function fireConfettiLarge() { createConfetti(50); }
        
        function createConfetti(amount) {
            const colors = ['#1cb0f6', '#ff4b4b', '#58cc02', '#ffc800', '#ce82ff'];
            const fragment = document.createDocumentFragment();
            for (let i = 0; i < amount; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animationDuration = (Math.random() * 1.5 + 1.5) + 's';
                fragment.appendChild(conf);
            }
            document.body.appendChild(fragment);
            setTimeout(() => {
                const confettis = document.querySelectorAll('.confetti');
                confettis.forEach(c => c.remove());
            }, 4500);
        }
    </script>
