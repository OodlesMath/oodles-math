<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treasure Key Number Hunt - Ver 18</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap');

        :root {
            --sky-top: #84d0ff;
            --sky-bottom: #cbf0ff;
            --grass-light: #7ed957;
            --grass-dark: #5cb85c;
            --card-bg: #ffffff;
            --text-main: #2b2b2b;
            --text-light: #666666;
            --btn-blue: #1cb0f6;
            --btn-blue-shadow: #1899d6;
            --btn-green: #58cc02;
            --btn-green-shadow: #58a700;
            --btn-red: #ff4b4b;
            --btn-red-shadow: #ea2b2b;
            --btn-purple: #ce82ff;
            --btn-purple-shadow: #a559ce;
            --btn-yellow: #ffc800;
            --btn-yellow-shadow: #d8a800;
            
            --puzzle-size-desktop: 300px;
            --puzzle-size-mobile: 240px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-bottom) 100%);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- STREAMING_CHUNK:Background Graphics --- */
        .scenery { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .cloud { position: absolute; background: #fff; border-radius: 50px; opacity: 0.9; box-shadow: 0 8px 0 rgba(255,255,255,0.6); animation: float 25s infinite linear; }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: #fff; border-radius: 50%; }
        .cloud1 { width: 140px; height: 50px; top: 12%; left: -150px; animation-duration: 30s; }
        .cloud1::before { width: 70px; height: 70px; top: -35px; left: 20px; }
        .cloud1::after { width: 50px; height: 50px; top: -25px; right: 20px; }
        .cloud2 { width: 180px; height: 60px; top: 20%; right: -200px; animation-duration: 40s; animation-direction: reverse; transform: scale(0.85); }
        .cloud2::before { width: 80px; height: 80px; top: -45px; left: 25px; }
        .cloud2::after { width: 60px; height: 60px; top: -30px; right: 30px; }

        .rainbow {
            position: absolute; width: 500px; height: 500px; border-radius: 50%;
            box-shadow: inset 0 0 0 20px rgba(255, 75, 75, 0.4), inset 0 0 0 40px rgba(255, 144, 0, 0.4), inset 0 0 0 60px rgba(255, 200, 0, 0.4), inset 0 0 0 80px rgba(88, 204, 2, 0.4), inset 0 0 0 100px rgba(28, 176, 246, 0.4), inset 0 0 0 120px rgba(206, 130, 255, 0.4);
            top: 5%; left: 50%; transform: translateX(-50%); clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%);
        }

        .grass-container {
            position: absolute; bottom: 0; width: 100%; height: 35vh;
            background: var(--grass-light); border-top: 15px solid var(--grass-dark);
            border-radius: 50% 50% 0 0 / 15% 15% 0 0; display: flex; justify-content: center;
        }

        .treasure-path {
            width: 140px; height: 100%; background: #f4d39c; border-left: 8px solid #dcb576; border-right: 8px solid #dcb576;
            transform: perspective(250px) rotateX(45deg); transform-origin: bottom; box-shadow: inset 0 20px 30px rgba(0,0,0,0.08); position: relative; z-index: 1;
        }

        .scenery-item { position: absolute; bottom: 30px; animation: sway 4s infinite ease-in-out alternate; }
        .tree { width: 80px; height: 100px; z-index: 2; }
        .tree-left-1 { left: 10%; bottom: 40px; transform: scale(1.2); animation-delay: 0s; }
        .tree-right-1 { right: 15%; bottom: 60px; transform: scale(1); animation-delay: 1s; }
        .tree-left-2 { left: 25%; bottom: 80px; transform: scale(0.8); animation-delay: 0.5s; z-index: 0; }
        .flower { width: 40px; height: 50px; z-index: 2; }
        .flower-1 { left: 20%; bottom: 10px; animation-delay: 0.2s; }
        .flower-2 { right: 28%; bottom: 20px; animation-delay: 0.8s; transform: scale(0.9); }
        .flower-3 { left: 40%; bottom: 30px; animation-delay: 1.2s; transform: scale(0.8); }

        @keyframes sway { 0% { transform: rotate(-3deg); } 100% { transform: rotate(3deg); } }
        @keyframes float { 0% { transform: translateX(0); } 100% { transform: translateX(120vw); } }

        /* --- STREAMING_CHUNK:HUD and Game Layout --- */
        .hud { position: absolute; top: 20px; left: 0; width: 100%; padding: 0 20px; display: flex; justify-content: space-between; align-items: flex-start; z-index: 20; pointer-events: none;}
        .hud > * { pointer-events: auto; }
        .hud-left { display: flex; align-items: flex-start; gap: 15px; }
        .hud-info { display: flex; flex-direction: column; gap: 10px; }
        .level-box { background: var(--btn-purple); padding: 8px 20px; border-radius: 20px; font-size: 22px; font-weight: 900; color: white; box-shadow: 0 5px 0 var(--btn-purple-shadow); border: 2px solid var(--btn-purple-shadow); text-align: center; }
        .score-box { background: white; padding: 8px 20px; border-radius: 20px; font-size: 22px; font-weight: 900; color: var(--btn-blue); box-shadow: 0 5px 0 #e5e5e5; border: 2px solid #e5e5e5; text-align: center; }
        .thumbnail-box { width: 90px; height: 90px; border-radius: 15px; background: white; border: 4px solid white; box-shadow: 0 5px 0 #e5e5e5; background-size: cover; background-position: center; background-repeat: no-repeat; }

        .game-wrapper {
            flex-grow: 1; display: flex; align-items: center; justify-content: center;
            width: 100%; padding: 130px 20px 20px 20px;
            z-index: 10; overflow-y: auto; overflow-x: hidden;
        }

        .game-container {
            width: 100%; max-width: 900px; display: flex; flex-direction: column; align-items: center; gap: 15px;
            margin: auto;
        }

        .card {
            background: var(--card-bg); width: 100%; border-radius: 35px; padding: 25px;
            box-shadow: 0 12px 0 #e5e5e5, 0 20px 30px rgba(0,0,0,0.1); border: 3px solid #e5e5e5;
            display: flex; flex-direction: column; align-items: center; transition: transform 0.3s ease;
        }

        /* --- STREAMING_CHUNK:Math Visuals --- */
        .math-header { display: flex; gap: 15px; align-items: center; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; width: 100%;}
        .m-block { font-size: 42px; font-weight: 900; color: white; padding: 10px 22px; border-radius: 15px; box-shadow: 0 8px 0 rgba(0,0,0,0.15); text-shadow: 2px 2px 0px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; min-width: 75px; }
        .op-text { font-size: 46px; font-weight: 900; margin: 0 5px; }
        
        /* Operator Colors */
        .op-green { color: var(--btn-green) !important; text-shadow: 0 3px 0 var(--btn-green-shadow); }
        .op-red { color: var(--btn-red) !important; text-shadow: 0 3px 0 var(--btn-red-shadow); }
        .op-blue { color: var(--btn-blue) !important; text-shadow: 0 3px 0 var(--btn-blue-shadow); }

        .b-pink { background: var(--btn-red); border: 2px solid var(--btn-red-shadow); box-shadow: 0 8px 0 var(--btn-red-shadow); }
        .b-blue { background: var(--btn-blue); border: 2px solid var(--btn-blue-shadow); box-shadow: 0 8px 0 var(--btn-blue-shadow); }
        .b-yellow { background: var(--btn-yellow); border: 2px solid var(--btn-yellow-shadow); box-shadow: 0 8px 0 var(--btn-yellow-shadow); color: var(--text-main); text-shadow: none; }

        .speaker-btn { background: var(--btn-blue); width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 6px 0 var(--btn-blue-shadow); transition: all 0.1s; margin-left: 10px; }
        .speaker-btn:active { transform: translateY(6px); box-shadow: 0 0 0 var(--btn-blue-shadow); }
        .speaker-btn svg { fill: white; width: 28px; height: 28px; }

        .math-body { display: flex; width: 100%; gap: 20px; align-items: stretch; justify-content: center; flex-wrap: wrap; }
        
        /* Tens / Ones Table */
        .math-left-col { flex: 1; min-width: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f9f9f9; border-radius: 20px; padding: 15px; border: 3px solid #e5e5e5;}
        .tens-ones-table { width: 100%; border-collapse: collapse; text-align: center; font-size: 28px; font-weight: 900; color: var(--text-main); }
        .tens-ones-table th { padding: 5px; font-size: 18px; color: var(--text-light); border-bottom: 3px solid var(--text-light); text-transform: uppercase;}
        .tens-ones-table td { padding: 10px; }
        .tens-ones-table .op-cell { font-size: 36px; font-weight: 900; }
        .tens-ones-table .border-top-cell { border-top: 3px solid var(--text-main); }
        .tens-ones-table .border-right-cell { border-right: 3px solid #ccc; }
        .res-text { color: var(--btn-blue); }

        /* Bonds Area */
        .math-right-col { flex: 2; min-width: 400px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; gap: 10px;}
        
        .bonds-row { display: flex; width: 100%; justify-content: center; align-items: flex-start; gap: 25px;}
        .number-bond { display: flex; flex-direction: column; align-items: center; position: relative; width: 150px; height: 120px; }
        .bond-lines { position: absolute; top: 20px; left: 0; width: 100%; height: 75px; z-index: 1; filter: drop-shadow(0 2px 1px rgba(0,0,0,0.1)); }
        
        .bond-circle { width: 50px; height: 50px; border-radius: 50%; background: white; border: 4px solid var(--btn-yellow); display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900; color: var(--text-main); z-index: 2; box-shadow: 0 4px 0 #e5e5e5; }
        .bond-top { margin-bottom: 15px; }
        .bond-bottom { display: flex; justify-content: space-between; width: 100%; padding: 0 5px; }
        
        .op-middle { font-size: 44px; font-weight: 900; align-self: center; margin-top: 15px;}

        /* Inverted Bond (Drag Targets) */
        .inverted-bond-wrapper { margin-top: 10px; display: flex; flex-direction: column; align-items: center; position: relative; width: 260px; height: 170px; }
        .inverted-bond-lines { position: absolute; top: 30px; left: 0; width: 100%; height: 100px; z-index: 1; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1)); }
        .inv-top-row { display: flex; justify-content: space-between; width: 100%; padding: 0 15px; margin-bottom: 30px; z-index: 2;}
        .inv-bottom-row { z-index: 2; margin-top: auto; }
        
        /* Custom size for Whole */
        .bond-circle.whole-bottom { width: 75px; height: 75px; font-size: 32px; border-width: 6px; box-shadow: 0 6px 0 #e5e5e5; }
        .bond-circle.whole-bottom.question-mark { background: var(--btn-yellow); border-color: var(--btn-yellow-shadow); color: white; }

        /* Draggable & Drop Zones */
        .draggable-math-node { cursor: grab; touch-action: none; position: relative; transition: opacity 0.3s ease; }
        .draggable-math-node:active { cursor: grabbing; transform: scale(1.1); box-shadow: 0 8px 10px rgba(0,0,0,0.3); z-index: 1000 !important; }
        
        .math-node-add { border-color: var(--btn-green); color: var(--btn-green); background: #f0fff0;}
        .math-node-sub { border-color: var(--btn-red); color: var(--btn-red); background: #fff0f0;}

        .math-drop-zone { width: 65px; height: 65px; border-radius: 50%; background: #fff8e1; border: 4px dashed var(--btn-yellow); display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900; color: #ccc; box-shadow: inset 0 3px 5px rgba(0,0,0,0.1); position: relative; text-align: center;}
        .math-drop-zone.hovered { background: #fff0b3; border-color: var(--btn-yellow-shadow); }
        .math-drop-zone.filled { background: white; border-style: solid; border-color: var(--btn-yellow); color: var(--text-main); box-shadow: 0 4px 0 #e5e5e5; }
        .zone-label { position: absolute; top: -25px; font-size: 14px; font-weight: 800; color: var(--text-light); text-transform: uppercase; }

        /* --- STREAMING_CHUNK:Interactive Areas --- */
        .answers-grid { display: none; grid-template-columns: repeat(4, 1fr); gap: 15px; width: 100%; margin-top: 25px; animation: popIn 0.5s ease-out;}
        .answers-grid.visible { display: grid; }
        .ans-btn { background: white; border: 3px solid #e5e5e5; border-radius: 20px; padding: 15px; font-size: 28px; font-weight: 900; color: var(--btn-blue); cursor: pointer; box-shadow: 0 8px 0 #e5e5e5; transition: all 0.1s ease; text-align: center; }
        .ans-btn:active { transform: translateY(8px); box-shadow: 0 0 0 #e5e5e5; }
        .ans-btn.correct { background: var(--btn-green); color: white; border-color: var(--btn-green-shadow); box-shadow: 0 8px 0 var(--btn-green-shadow); }
        .ans-btn.wrong { background: var(--btn-red); color: white; border-color: var(--btn-red-shadow); box-shadow: 0 8px 0 var(--btn-red-shadow); }

        .btn-next-question { display: none; background: var(--btn-green); color: white; font-size: 24px; font-weight: 900; padding: 15px 40px; border-radius: 25px; border: none; box-shadow: 0 8px 0 var(--btn-green-shadow); cursor: pointer; margin-top: 20px; animation: popIn 0.5s;}
        .btn-next-question:active { transform: translateY(8px); box-shadow: 0 0 0 var(--btn-green-shadow); }

        /* Puzzle Block */
        .inventory-block { background: rgba(255, 255, 255, 0.85); width: 100%; min-height: 110px; border-radius: 25px; border: 4px dashed var(--btn-blue); padding: 15px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center; box-shadow: 0 8px 0 rgba(0,0,0,0.05); backdrop-filter: blur(5px); transition: all 0.3s; }
        .puzzle-board-container { display: none; flex-direction: column; align-items: center; gap: 15px; width: 100%; background: white; padding: 25px; border-radius: 30px; box-shadow: 0 12px 0 #e5e5e5; border: 3px solid #e5e5e5; animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .puzzle-grid { width: 100%; max-width: 360px; aspect-ratio: 1 / 1; background: #e0e0e0; border: 5px solid var(--btn-yellow); border-radius: 15px; display: grid; gap: 2px; overflow: hidden; position: relative; }
        .drop-zone { background: rgba(255,255,255,0.4); border: 1px dashed rgba(0,0,0,0.2); width: 100%; height: 100%; position: relative; }
        
        .draggable-piece { background-repeat: no-repeat; cursor: grab; touch-action: none; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border-radius: 5px; border: 1px solid rgba(255,255,255,0.5); animation: popIn 0.4s ease-out; position: relative; z-index: 10; background-color: white; }
        .drop-zone .draggable-piece { width: 100% !important; height: 100% !important; border-radius: 0; border: none; box-shadow: none; cursor: pointer; }
        .inventory-block .draggable-piece { width: 70px !important; height: 70px !important; }
        .draggable-piece:active { cursor: grabbing; box-shadow: 0 8px 15px rgba(0,0,0,0.4); z-index: 1000 !important; }

        @keyframes popIn { 0% { transform: scale(0); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes bounceIn { 0% { transform: scale(0.5); opacity: 0; } 60% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); } }

        /* Screens & Buttons */
        .start-screen, .end-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.5s; }
        .start-screen.visible, .end-screen.visible { opacity: 1; pointer-events: all; }
        .start-screen h1 { font-size: 52px; color: var(--btn-blue); margin-bottom: 20px; text-shadow: 3px 3px 0px white, 0 6px 0 #e5e5e5; line-height: 1.2; }
        .end-title { font-size: 42px; color: var(--btn-yellow); font-weight: 900; margin-bottom: 20px; text-shadow: 0 5px 0 #d8a800; animation: bounceIn 1s; }

        .start-btn, .action-btn { color: white; font-weight: 900; border: none; cursor: pointer; transition: all 0.1s; border-radius: 25px; }
        .start-btn { background: var(--btn-green); font-size: 32px; padding: 18px 45px; border-radius: 35px; box-shadow: 0 10px 0 var(--btn-green-shadow); margin-top: 30px; }
        .start-btn:active { transform: translateY(10px); box-shadow: 0 0 0 var(--btn-green-shadow); }
        
        .action-buttons { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin-top: 15px; width: 100%;}
        .btn-replay { background: var(--btn-purple); font-size: 20px; padding: 12px 25px; box-shadow: 0 6px 0 var(--btn-purple-shadow); }
        .btn-replay:active { transform: translateY(6px); box-shadow: 0 0 0 var(--btn-purple-shadow); }
        .btn-next { background: var(--btn-green); font-size: 20px; padding: 12px 25px; box-shadow: 0 6px 0 var(--btn-green-shadow); }
        .btn-next:active { transform: translateY(6px); box-shadow: 0 0 0 var(--btn-green-shadow); }
        .btn-undo { background: var(--btn-red); font-size: 20px; padding: 12px 25px; box-shadow: 0 6px 0 var(--btn-red-shadow); }
        .btn-undo:active { transform: translateY(6px); box-shadow: 0 0 0 var(--btn-red-shadow); }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; }

        /* --- STREAMING_CHUNK:Responsive Media Queries --- */
        @media (max-width: 850px) {
            .math-body { flex-direction: column; }
            .math-left-col { width: 100%; min-width: unset; padding: 10px;}
            .math-right-col { width: 100%; min-width: unset; }
            .bonds-row { gap: 10px; }
            .number-bond { width: 130px; }
            .answers-grid { grid-template-columns: 1fr 1fr; }
        }

        @media (max-width: 600px) {
            .hud { top: 10px; }
            .thumbnail-box { width: 70px; height: 70px; }
            .level-box, .score-box { font-size: 16px; padding: 5px 12px; }
            .game-wrapper { padding-top: 100px; }
            
            .bonds-row { gap: 5px; }
            .number-bond { width: 120px; height: 100px; }
            .bond-circle { width: 40px; height: 40px; font-size: 16px; border-width: 3px;}
            .bond-lines { height: 60px; top: 15px;}
            .op-middle { font-size: 30px; }
            
            .inverted-bond-wrapper { width: 220px; height: 140px; }
            .inverted-bond-lines { height: 80px; top: 25px;}
            .math-drop-zone { width: 55px; height: 55px; font-size: 18px; }
            .bond-circle.whole-bottom { width: 65px; height: 65px; font-size: 26px; border-width: 5px; }
            .zone-label { font-size: 12px; top: -20px;}

            .ans-btn { font-size: 22px; padding: 10px; }
            .speaker-btn { width: 40px; height: 40px; }
            .speaker-btn svg { width: 20px; height: 20px; }
            .inventory-block .draggable-piece { width: 55px !important; height: 55px !important; }
            .start-screen h1 { font-size: 36px; }
            .m-block { font-size: 32px; padding: 8px 16px; min-width: 60px; }
            .op-text { font-size: 36px; }
        }

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(150px); background: var(--btn-red); color: white; padding: 12px 30px; border-radius: 30px; font-weight: 900; box-shadow: 0 6px 0 var(--btn-red-shadow); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 200; font-size: 24px; text-align: center; width: max-content; max-width: 90vw;}
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { background: var(--btn-green); box-shadow: 0 6px 0 var(--btn-green-shadow); }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <svg style="display:none;">
        <defs>
            <path id="icon-speaker" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            <g id="svg-tree">
                <rect x="35" y="60" width="30" height="40" fill="#8B4513" rx="5"/>
                <circle cx="50" cy="35" r="35" fill="#228B22"/>
                <circle cx="25" cy="50" r="25" fill="#32CD32"/>
                <circle cx="75" cy="50" r="25" fill="#32CD32"/>
                <circle cx="50" cy="15" r="20" fill="#7CFC00" opacity="0.6"/>
            </g>
            <g id="svg-flower">
                <rect x="46" y="50" width="8" height="50" fill="#32CD32" rx="4"/>
                <path d="M40,70 Q20,60 30,50" fill="none" stroke="#32CD32" stroke-width="6" stroke-linecap="round"/>
                <path d="M60,80 Q80,70 70,60" fill="none" stroke="#32CD32" stroke-width="6" stroke-linecap="round"/>
                <circle cx="50" cy="20" r="15" fill="#FF69B4"/>
                <circle cx="70" cy="35" r="15" fill="#FF1493"/>
                <circle cx="60" cy="60" r="15" fill="#FF69B4"/>
                <circle cx="40" cy="60" r="15" fill="#FF1493"/>
                <circle cx="30" cy="35" r="15" fill="#FF69B4"/>
                <circle cx="50" cy="40" r="12" fill="#FFD700"/>
            </g>
            <!-- Normal Bond Lines -->
            <g id="bond-lines-normal">
                <line x1="50%" y1="15%" x2="20%" y2="85%" stroke="#dcdcdc" stroke-width="6" stroke-linecap="round"/>
                <line x1="50%" y1="15%" x2="80%" y2="85%" stroke="#dcdcdc" stroke-width="6" stroke-linecap="round"/>
            </g>
            <!-- Inverted Curve Bond Lines -->
            <g id="bond-lines-inverted">
                <path d="M 65 10 C 65 60, 130 50, 130 90" fill="none" stroke="#dcdcdc" stroke-width="6" stroke-linecap="round"/>
                <path d="M 195 10 C 195 60, 130 50, 130 90" fill="none" stroke="#dcdcdc" stroke-width="6" stroke-linecap="round"/>
            </g>
        </defs>
    </svg>

    <!-- Scenery -->
    <div class="scenery">
        <div class="rainbow"></div>
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="grass-container">
            <svg class="scenery-item tree tree-left-1" viewBox="0 0 100 100"><use href="#svg-tree"></use></svg>

            let a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function getNextImage() {
            if (availableImages.length === 0) {
                availableImages = shuffleArray(ALL_ANIMAL_IMAGES);
            }
            return availableImages.pop();
        }

        /* --- CONFIGURATION --- */
        const LEVELS = [
            { id: 1, total: 4, gridSize: 2 },
            { id: 2, total: 9, gridSize: 3 },
            { id: 3, total: 16, gridSize: 4 }
        ];

        let currentLevelIndex = 0;
        let currentLevelConfig;
        let currentImage = '';
        let questions = [];
        let currentQuestionIndex = 0;
        let levelPieceIndices = []; 
        let placementHistory = []; 

        /* --- AUDIO --- */
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTone(freq, type, duration, vol=0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function playSound(type) {
            initAudio();
            switch(type) {
                case 'click': playTone(600, 'sine', 0.1, 0.1); break;
                case 'correct': 
                    setTimeout(() => playTone(440, 'sine', 0.15, 0.1), 0);
                    setTimeout(() => playTone(554, 'sine', 0.15, 0.1), 100);
                    setTimeout(() => playTone(659, 'sine', 0.3, 0.1), 200); break;
                case 'wrong':
                    playTone(200, 'sawtooth', 0.3, 0.1);
                    setTimeout(() => playTone(150, 'sawtooth', 0.3, 0.1), 150); break;
                case 'snap':
                    playTone(800, 'sine', 0.1, 0.1); break;
                case 'win':
                    [523, 659, 783, 1046].forEach((freq, i) => { setTimeout(() => playTone(freq, 'sine', 0.4, 0.15), i * 150); }); break;
            }
        }

        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US'; utterance.rate = 0.9; utterance.pitch = 1.2;
                window.speechSynthesis.speak(utterance);
            }
        }

        function showToast(msg, isSuccess=false) {
            const toast = document.getElementById('toast');
            toast.innerText = msg; toast.className = `toast show ${isSuccess ? 'success' : ''}`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        /* --- STREAMING_CHUNK:Math Generator Logic --- */
        function generateQuestions(total) {
            let qArray = [];
            let usedSet = new Set();
            
            for(let i = 0; i < total; i++) {
                const isAdd = (i % 2 === 0); 
                let n1, n2, ans;
                let t1, o1, t2, o2, tRes, oRes;

                if (isAdd) {
                    do {
                        n1 = Math.floor(Math.random() * 30) + 11; 
                        n2 = Math.floor(Math.random() * 30) + 11; 
                        if (n1 % 10 === 0) n1 += Math.floor(Math.random()*9)+1;
                        if (n2 % 10 === 0) n2 += Math.floor(Math.random()*9)+1;
                    } while (usedSet.has(`${n1}+${n2}`) || n1+n2 > 60);
                    
                    ans = n1 + n2;
                    usedSet.add(`${n1}+${n2}`);
                    
                    t1 = Math.floor(n1/10)*10; o1 = n1%10;
                    t2 = Math.floor(n2/10)*10; o2 = n2%10;
                    tRes = t1 + t2;
                    oRes = o1 + o2;
                } else {
                    do {
                        n1 = Math.floor(Math.random() * 20) + 21; 
                        n2 = Math.floor(Math.random() * 19) + 11; 
                        let n1ones = n1 % 10;
                        let n2ones = n2 % 10;
                        if (n1ones >= n2ones) n2 += (n1ones - n2ones + 1); 
                    } while (usedSet.has(`${n1}-${n2}`) || n1 <= n2 || n2 % 10 === 0);

                    ans = n1 - n2;
                    usedSet.add(`${n1}-${n2}`);
                    
                    t1 = (Math.floor(n1/10) - 1)*10; 
                    o1 = (n1%10) + 10;
                    t2 = Math.floor(n2/10)*10; 
                    o2 = n2%10;
                    tRes = t1 - t2;
                    oRes = o1 - o2;
                }

                let options = new Set([ans]);
                while(options.size < 4) {
                    let fakeAns = ans + (Math.floor(Math.random() * 11) - 5); 
                    if (fakeAns === ans || fakeAns < 0) continue;
                    options.add(fakeAns);
                }

                qArray.push({
                    type: isAdd ? 'add' : 'sub', 
                    num1: n1, num2: n2, ans: ans,
                    t1: t1, o1: o1, t2: t2, o2: o2,
                    tRes: tRes, oRes: oRes,
                    options: shuffleArray(Array.from(options)),
                    speakText: `What is ${n1} ${isAdd ? 'plus' : 'minus'} ${n2}?`
                });
            }
            return qArray;
        }

        /* --- PUZZLE LOGIC --- */
        function initPuzzleDropZones(config) {
            const grid = document.getElementById('drop-zone-grid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${config.gridSize}, 1fr)`;
            grid.style.gridTemplateRows = `repeat(${config.gridSize}, 1fr)`;
            
            for(let i=0; i<config.total; i++) {
                let zone = document.createElement('div');
                zone.className = 'drop-zone';
                zone.dataset.index = i;
                grid.appendChild(zone);
            }
        }

        function createPieceElement(index, config) {
            let piece = document.createElement('div');
            piece.className = 'draggable-piece';
            piece.dataset.index = index;
            piece.dataset.dragType = 'puzzle';
            
            let row = Math.floor(index / config.gridSize);
            let col = index % config.gridSize;
            
            let posX = config.gridSize > 1 ? (col / (config.gridSize - 1)) * 100 : 0;
            let posY = config.gridSize > 1 ? (row / (config.gridSize - 1)) * 100 : 0;
            
            piece.style.backgroundImage = `url('${currentImage}')`;
            piece.style.backgroundSize = `${config.gridSize * 100}% ${config.gridSize * 100}%`;
            piece.style.backgroundPosition = `${posX}% ${posY}%`;
            
            piece.onclick = function() {
                if (this.parentElement.classList.contains('drop-zone')) {
                    returnPieceToInventory(this);
                }
            };
            return piece;
        }

        /* --- GAME FLOW --- */
        function startGame(levelId) {
            initAudio(); stopConfetti();
            currentLevelIndex = LEVELS.findIndex(l => l.id === levelId);
            if (currentLevelIndex === -1) currentLevelIndex = 0;
            currentLevelConfig = LEVELS[currentLevelIndex];
            
            currentImage = getNextImage(); 
            questions = generateQuestions(currentLevelConfig.total);
            currentQuestionIndex = 0;
            placementHistory = []; 

            levelPieceIndices = [];
            for(let i=0; i<currentLevelConfig.total; i++) levelPieceIndices.push(i);
            levelPieceIndices = shuffleArray(levelPieceIndices);
            
            document.getElementById('start-screen').classList.remove('visible');
            document.getElementById('hud').style.display = 'flex';
            document.getElementById('game-area').style.display = 'flex';
            
            document.getElementById('question-card').style.display = 'flex';
            document.getElementById('puzzle-frame-container').style.display = 'none';
            document.getElementById('end-buttons').style.display = 'none';
            document.getElementById('btn-undo').style.display = 'none';
            document.getElementById('puzzle-title').innerText = "Drag pieces to complete!";
            document.getElementById('inventory-container').style.display = 'flex';
            document.getElementById('inventory-container').innerHTML = ''; 

            document.getElementById('level-display').innerText = `Level ${currentLevelConfig.id}`;
            document.getElementById('hud-thumbnail').style.backgroundImage = `url('${currentImage}')`;
            updateScore();
            
            initPuzzleDropZones(currentLevelConfig);
            
            speakText(`Level ${currentLevelConfig.id}. Solve math to get pieces!`);
            renderQuestion();
        }

        function replayLevel() { startGame(currentLevelConfig.id); }
        function nextLevel() {
            let nextId = currentLevelConfig.id + 1;
            if (nextId > LEVELS.length) nextId = 1; 
            startGame(nextId);
        }

        function updateScore() {
            document.getElementById('score-display').innerText = `${currentQuestionIndex} / ${currentLevelConfig.total}`;
        }

        /* --- STREAMING_CHUNK:Render Math Question --- */
        let mathZonesFilled = 0;
        let isAnsweringMath = false;

        function renderQuestion() {
            if (currentQuestionIndex >= currentLevelConfig.total) {
                transitionToPuzzlePhase();
                return;
            }
            isAnsweringMath = true; updateScore();
            const q = questions[currentQuestionIndex];
            const opSymbol = q.type === 'add' ? '+' : '-';
            const opColorClass = q.type === 'add' ? 'op-green' : 'op-red';
            
            // 1. Header
            document.getElementById('equation-container').innerHTML = `
                <div class="m-block b-pink">${q.num1}</div>
                <div class="op-text ${opColorClass}">${opSymbol}</div>
                <div class="m-block b-blue">${q.num2}</div>
                <div class="op-text op-blue">=</div>
                <div class="m-block b-yellow" id="eq-result-box">?</div>
                <div class="speaker-btn" id="main-speaker" onclick="playSound('click'); speakText('${q.speakText}')">
                    <svg viewBox="0 0 24 24"><use href="#icon-speaker"></use></svg>
                </div>
            `;
            setTimeout(() => speakText(q.speakText), 500);

            // 2. Table
            document.getElementById('table-container').innerHTML = `
                <table class="tens-ones-table">
                    <tr><th></th><th class="border-right-cell">Tens</th><th>ones</th></tr>
                    <tr><td></td><td class="border-right-cell">${Math.floor(q.num1/10)}</td><td>${q.num1%10}</td></tr>
                    <tr><td class="op-cell ${opColorClass}">${opSymbol}</td><td class="border-right-cell">${Math.floor(q.num2/10)}</td><td>${q.num2%10}</td></tr>
                    <tr><td class="border-top-cell"></td><td class="border-top-cell border-right-cell res-text" id="t-res"></td><td class="border-top-cell res-text" id="o-res"></td></tr>
                </table>
            `;

            // 3. Normal Bonds (Draggable Source - Without +, - text)
            // LƯU Ý: Phần HTML này BỎ ĐI span hiển thị text opSymbol, thay vào đó chỉ in số.
            document.getElementById('bonds-container').innerHTML = `
                <div class="number-bond">
                    <svg class="bond-lines" viewBox="0 0 150 120"><use href="#bond-lines-normal"></use></svg>
                    <div class="bond-circle bond-top"><span>${q.num1}</span></div>
                    <div class="bond-bottom">
                        <div class="bond-circle draggable-math-node" data-drag-type="math" data-type="tens" data-val="${q.t1}" data-op="none"><span>${q.t1}</span></div>
                        <div class="bond-circle draggable-math-node" data-drag-type="math" data-type="ones" data-val="${q.o1}" data-op="none"><span>${q.o1}</span></div>
                    </div>
                </div>
                <div class="op-middle ${opColorClass}">${opSymbol}</div>
                <div class="number-bond">
                    <svg class="bond-lines" viewBox="0 0 150 120"><use href="#bond-lines-normal"></use></svg>
                    <div class="bond-circle bond-top"><span>${q.num2}</span></div>
                    <div class="bond-bottom">
                        <div class="bond-circle draggable-math-node math-node-${q.type}" data-drag-type="math" data-type="tens" data-val="${q.t2}" data-op="${q.type}"><span>${q.t2}</span></div>
                        <div class="bond-circle draggable-math-node math-node-${q.type}" data-drag-type="math" data-type="ones" data-val="${q.o2}" data-op="${q.type}"><span>${q.o2}</span></div>
                    </div>
                </div>
            `;

            // 4. Inverted Bond (Drop Targets)
            mathZonesFilled = 0;
            document.getElementById('inverted-bond-container').innerHTML = `
                <svg class="inverted-bond-lines" viewBox="0 0 260 100" preserveAspectRatio="none"><use href="#bond-lines-inverted"></use></svg>
                <div class="inv-top-row">
                    <div class="math-drop-zone" id="drop-tens" data-type="tens" data-current="0" data-has-base="false" data-has-op="false"><span class="zone-label">Tens</span></div>
                    <div class="math-drop-zone" id="drop-ones" data-type="ones" data-current="0" data-has-base="false" data-has-op="false"><span class="zone-label">Ones</span></div>
                </div>
                <div class="inv-bottom-row">
                    <div class="bond-circle whole-bottom question-mark" id="bond-res-box">?</div>
                </div>
            `;

            // Hide answers & next button initially
            const ansContainer = document.getElementById('answers-container');
            ansContainer.classList.remove('visible');
            ansContainer.innerHTML = '';
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'ans-btn'; btn.innerText = opt;
                btn.onclick = () => checkFinalAnswer(opt, btn, q);
                ansContainer.appendChild(btn);
            });
            document.getElementById('btn-next-question').style.display = 'none';

            initDragAndDrop();
        }

        /* --- STREAMING_CHUNK:Drag and Drop System --- */
        let activePiece = null;

        function initDragAndDrop() {
            document.removeEventListener('pointermove', handlePointerMove);
            document.removeEventListener('pointerup', handlePointerUp);

            const pieces = document.querySelectorAll('.draggable-piece, .draggable-math-node');
            pieces.forEach(p => {
                p.addEventListener('pointerdown', handlePointerDown);
            });
        }

        function handlePointerDown(e) {
            if(e.button !== 0 && e.type !== 'touchstart') return; 
            activePiece = e.target;
            // Traverse up to find the actual draggable container if clicked on span
            while(!activePiece.classList.contains('draggable-piece') && !activePiece.classList.contains('draggable-math-node')) {
                activePiece = activePiece.parentElement;
                if(activePiece === document.body) return;
            }

            activePiece.style.zIndex = 1000;
            activePiece.dataset.startX = e.clientX;
            activePiece.dataset.startY = e.clientY;
            
            document.addEventListener('pointermove', handlePointerMove);
            document.addEventListener('pointerup', handlePointerUp);
            activePiece.setPointerCapture(e.pointerId);
            playSound('click');
        }

        function handlePointerMove(e) {
            if(!activePiece) return;
            let dx = e.clientX - parseFloat(activePiece.dataset.startX);
            let dy = e.clientY - parseFloat(activePiece.dataset.startY);
            activePiece.style.transform = `translate(${dx}px, ${dy}px) scale(1.1)`;
            
            if (activePiece.dataset.dragType === 'math') {
                const mathZones = document.querySelectorAll('.math-drop-zone');
                mathZones.forEach(z => z.classList.remove('hovered'));
                mathZones.forEach(zone => {
                    const zRect = zone.getBoundingClientRect();
                    if(e.clientX > zRect.left && e.clientX < zRect.right && e.clientY > zRect.top && e.clientY < zRect.bottom) {
                        zone.classList.add('hovered');
                    }
                });
            }
        }

        function handlePointerUp(e) {
            if(!activePiece) return;
            document.removeEventListener('pointermove', handlePointerMove);
            document.removeEventListener('pointerup', handlePointerUp);
            activePiece.releasePointerCapture(e.pointerId);
            
            if (activePiece.dataset.dragType === 'math') {
                handleMathDrop(e);
            } else if (activePiece.dataset.dragType === 'puzzle') {
                handlePuzzleDrop(e);
            }
        }

        function handleMathDrop(e) {
            const zones = document.querySelectorAll('.math-drop-zone');
            let snapped = false;
            
            zones.forEach(zone => {
                zone.classList.remove('hovered');
                const zRect = zone.getBoundingClientRect();
                const pX = e.clientX; const pY = e.clientY;
                
                if(pX > zRect.left && pX < zRect.right && pY > zRect.top && pY < zRect.bottom) {
                    if (zone.dataset.type === activePiece.dataset.type) {
                        let op = activePiece.dataset.op;
                        let val = parseInt(activePiece.dataset.val);

                        if (op === 'none' && zone.dataset.hasBase === 'false') {
                            zone.dataset.current = val;
                            zone.innerHTML = `<span class="zone-label">${zone.dataset.type}</span>${val}`;
                            zone.dataset.hasBase = 'true';
                            
                            // Visual change instead of hidden
                            activePiece.style.opacity = '0.5';
                            activePiece.style.pointerEvents = 'none';
                            
                            zone.classList.add('filled');
                            playSound('snap');
                            snapped = true;
                            mathZonesFilled++;
                        } else if (op !== 'none' && zone.dataset.hasBase === 'true' && zone.dataset.hasOp === 'false') {
                            let current = parseInt(zone.dataset.current);
                            let newVal = op === 'add' ? current + val : current - val;
                            let opSign = op === 'add' ? '+' : '-';
                            let opColor = op === 'add' ? 'var(--btn-green)' : 'var(--btn-red)';

                            zone.dataset.hasOp = 'true';
                            activePiece.style.opacity = '0.5';
                            activePiece.style.pointerEvents = 'none';
                            
                            playSound('snap');
                            snapped = true;
                            mathZonesFilled++;

                            // Show calculating animation
                            zone.innerHTML = `<span style="font-size:16px; color:${opColor}; display:block; line-height:1.2; text-shadow:none; font-weight:800;">${current}<br>${opSign} ${val}</span>`;
                            
                            setTimeout(() => {
                                zone.dataset.current = newVal;
                                zone.innerHTML = `<span class="zone-label">${zone.dataset.type}</span>${newVal}`;
                                
                                if (mathZonesFilled === 4) {
                                    setTimeout(() => {
                                        document.getElementById('answers-container').classList.add('visible');
                                        speakText("Great! Now choose the final answer.");
                                    }, 300);
                                }
                            }, 800);

                        } else {
                            playSound('wrong');
                            showToast("Not here yet!", false);
                        }
                    } else {
                        playSound('wrong');
                        showToast("Wrong place!", false);
                    }
                }
            });

            activePiece.style.transform = 'none'; // reset pos physically
            activePiece.style.zIndex = 100;
            activePiece = null;
        }

        function checkFinalAnswer(selected, btnElement, q) {
            if (!isAnsweringMath) return;
            playSound('click');

            if (parseInt(selected) === q.ans) {
                isAnsweringMath = false;
                btnElement.classList.add('correct'); playSound('correct');
                
                // Cập nhật UI kết quả
                document.getElementById('eq-result-box').innerText = q.ans;
                document.getElementById('bond-res-box').innerText = q.ans;
                document.getElementById('bond-res-box').classList.remove('question-mark');
                
                // Cập nhật bảng
                document.getElementById('t-res').innerText = Math.floor(q.ans/10);
                document.getElementById('o-res').innerText = q.ans%10;
                
                // Loa đọc toàn bộ câu
                let speakStr = `${q.num1} ${q.type === 'add' ? 'plus' : 'minus'} ${q.num2} equals ${q.ans}`;
                document.getElementById('main-speaker').setAttribute('onclick', `playSound('click'); speakText('${speakStr}')`);
                speakText(speakStr);

                // Thưởng mảnh ghép
                const pieceIdToAward = levelPieceIndices[currentQuestionIndex];
                const piece = createPieceElement(pieceIdToAward, currentLevelConfig);
                document.getElementById('inventory-container').appendChild(piece);
                
                // Show Next
                document.getElementById('btn-next-question').style.display = 'block';
                
            } else {
                btnElement.classList.add('wrong'); playSound('wrong');
                showToast('Try again!', false); speakText("Oops! Try again.");
                
                const card = document.getElementById('question-card');
                card.style.transform = 'translateX(-10px)';
                setTimeout(() => card.style.transform = 'translateX(10px)', 100);
                setTimeout(() => card.style.transform = 'translateX(-10px)', 200);
                setTimeout(() => card.style.transform = 'translateX(0)', 300);

                setTimeout(() => { btnElement.classList.remove('wrong'); }, 800);
            }
        }

        function nextQuestion() {
            playSound('click');
            currentQuestionIndex++;
            updateScore();
            renderQuestion();
        }

        /* --- STREAMING_CHUNK:Puzzle Phase Logic --- */
        function handlePuzzleDrop(e) {
            const dropZones = document.querySelectorAll('.drop-zone');
            let snapped = false;
            
            dropZones.forEach(zone => {
                const zRect = zone.getBoundingClientRect();
                const pX = e.clientX; const pY = e.clientY;
                
                if(pX > zRect.left && pX < zRect.right && pY > zRect.top && pY < zRect.bottom) {
                    if (zone.children.length > 0) {
                        returnPieceToInventory(zone.children[0]);
                    }

                    zone.appendChild(activePiece);
                    activePiece.style.transform = 'none';
                    activePiece.classList.add('snapped');
                    playSound('snap');
                    snapped = true;
                    placementHistory.push({ piece: activePiece, zone: zone });
                }
            });

            if(!snapped) {
                activePiece.style.transform = 'none';
                if (activePiece.parentElement.classList.contains('drop-zone')) {
                    returnPieceToInventory(activePiece);
                }
            }
            
            activePiece.style.zIndex = 10;
            activePiece = null;
            checkPuzzleCompletion();
        }

        function transitionToPuzzlePhase() {
            document.getElementById('question-card').style.display = 'none';
            document.getElementById('puzzle-frame-container').style.display = 'flex';
            speakText("Great! Now drag the pieces to complete the picture!");
            initDragAndDrop();
        }

        function returnPieceToInventory(piece) {
            playSound('click');
            piece.classList.remove('snapped');
            document.getElementById('inventory-container').appendChild(piece);
            placementHistory = placementHistory.filter(h => h.piece !== piece);
            checkPuzzleCompletion(); 
        }

        function undoLastMove() {
            if (placementHistory.length > 0) {
                const lastMove = placementHistory.pop();
                returnPieceToInventory(lastMove.piece);
            }
        }

        function checkPuzzleCompletion() {
            const dropZones = document.querySelectorAll('.drop-zone');
            let filledCount = 0;
            let correctCount = 0;

            dropZones.forEach(zone => {
                if (zone.children.length > 0) {
                    filledCount++;
                    const piece = zone.children[0];
                    if (piece.dataset.index === zone.dataset.index) {
                        correctCount++;
                    }
                }
            });

            document.getElementById('btn-undo').style.display = filledCount > 0 ? 'inline-block' : 'none';

            if (filledCount === currentLevelConfig.total) {
                if (correctCount === currentLevelConfig.total) {
                    document.getElementById('btn-undo').style.display = 'none'; 
                    finishLevel();
                } else {
                    playSound('wrong');
                    showToast('Oops! Some pieces are wrong. Tap to fix them!', false);
                }
            }
        }

        function finishLevel() {
            playSound('win');
            document.getElementById('puzzle-title').innerText = "Picture Complete!";
            speakText("Amazing! You completed the picture!");
            startConfetti();
            
            const btnNext = document.getElementById('btn-next');
            if (currentLevelIndex < LEVELS.length - 1) {
                btnNext.innerText = 'Next Level';
            } else {
                btnNext.innerText = 'Play Again Level 1';
            }
            document.getElementById('end-buttons').style.display = 'flex';
            document.getElementById('inventory-container').style.display = 'none'; 
        }

        /* --- CONFETTI --- */
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particles = []; let confettiActive = false; let animationFrameId;

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        function createConfetti() {
            const colors = ['#1cb0f6', '#58cc02', '#ff4b4b', '#ffc800', '#ce82ff'];
            for (let i = 0; i < 150; i++) {
                particles.push({
                    x: Math.random() * canvas.width, y: Math.random() * canvas.height - canvas.height,
                    w: Math.random() * 12 + 6, h: Math.random() * 12 + 6, color: colors[Math.floor(Math.random() * colors.length)],
                    vy: Math.random() * 4 + 2, vx: Math.random() * 3 - 1.5, rot: Math.random() * 360, rotSpeed: Math.random() * 6 - 3
                });
            }
        }

        function renderConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i]; ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI / 180);
                ctx.fillStyle = p.color; ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h); ctx.restore();
                p.y += p.vy; p.x += p.vx; p.rot += p.rotSpeed;
                if (p.y > canvas.height) { p.y = -20; p.x = Math.random() * canvas.width; }
            }
            if (confettiActive) { animationFrameId = requestAnimationFrame(renderConfetti); } 
            else { ctx.clearRect(0, 0, canvas.width, canvas.height); }
        }

        function startConfetti() { if (confettiActive) return; confettiActive = true; particles = []; createConfetti(); renderConfetti(); }
        function stopConfetti() { confettiActive = false; cancelAnimationFrame(animationFrameId); ctx.clearRect(0, 0, canvas.width, canvas.height); }

        document.body.addEventListener('click', () => { initAudio(); }, { once: true });

    </script>
