<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Money Mission</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1cb0f6;
            --primary-shadow: #1899d6;
            --secondary: #ffc800;
            --secondary-shadow: #e5b400;
            --success: #58cc02;
            --success-shadow: #58a700;
            --danger: #ff4b4b;
            --danger-shadow: #ea2b2b;
            --text-main: #3c3c3c;
            
            /* Enhanced Money colors */
            --m1: #7bd936; --m1-dark: #58a700;
            --m2: #a582ff; --m2-dark: #8150e6;
            --m5: #3ebef7; --m5-dark: #1899d6;
            --m10: #ff6b6b; --m10-dark: #ea2b2b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* Prevent all scrolling to keep everything in viewport */
        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* Prevents pull-to-refresh on mobile */
            background-color: #87CEEB; /* Sky blue fallback */
            position: fixed; 
        }

        /* --- Scenery Background (Duolingo Style) --- */
        #scenery-background {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: linear-gradient(to bottom, #74C6F4 0%, #B9E6FF 60%, #E3F6FF 100%);
            pointer-events: none;
        }

        .bg-sun {
            position: absolute;
            top: 5vh; left: 5vw;
            width: 15vmin; height: 15vmin;
            background: #FFD700;
            border-radius: 50%;
            box-shadow: 0 0 40px #FFA500, inset -5px -5px 15px rgba(255,165,0,0.5);
            animation: pulse-sun 4s infinite alternate;
        }

        @keyframes pulse-sun {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(1.05); opacity: 1; }
        }

        .bg-rainbow {
            position: absolute;
            top: 10vh; left: -10vw;
            width: 60vw; height: 60vw;
            border-radius: 50%;
            box-shadow: 
                0 0 0 3vw rgba(255, 75, 75, 0.7),
                0 0 0 6vw rgba(255, 165, 0, 0.7),
                0 0 0 9vw rgba(255, 200, 0, 0.7),
                0 0 0 12vw rgba(88, 204, 2, 0.7),
                0 0 0 15vw rgba(28, 176, 246, 0.7),
                0 0 0 18vw rgba(165, 130, 255, 0.7);
            opacity: 0.4;
        }

        .bg-cloud {
            position: absolute;
            background: #fff;
            border-radius: 50px;
            box-shadow: 0 8px 0 rgba(255,255,255,0.6);
            animation: float-cloud linear infinite alternate;
        }
        .bg-cloud::before, .bg-cloud::after {
            content: '';
            position: absolute;
            background: #fff;
            border-radius: 50%;
        }
        .c1 { top: 15vh; left: 30vw; width: 120px; height: 40px; animation-duration: 12s; }
        .c1::before { width: 50px; height: 50px; top: -25px; left: 15px; }
        .c1::after { width: 40px; height: 40px; top: -15px; right: 15px; }
        
        .c2 { top: 35vh; left: 10vw; width: 90px; height: 30px; animation-duration: 9s; opacity: 0.8; }
        .c2::before { width: 40px; height: 40px; top: -20px; left: 15px; }
        .c2::after { width: 30px; height: 30px; top: -10px; right: 10px; }

        .c3 { top: 25vh; left: 70vw; width: 150px; height: 50px; animation-duration: 15s; }
        .c3::before { width: 70px; height: 70px; top: -35px; left: 20px; }
        .c3::after { width: 50px; height: 50px; top: -20px; right: 20px; }

        @keyframes float-cloud {
            0% { transform: translateX(-10px); }
            100% { transform: translateX(20px); }
        }

        .bg-grass {
            position: absolute;
            bottom: -5vh; left: -10vw;
            width: 120vw; height: 25vh;
            background: #58cc02;
            border-radius: 50% 50% 0 0;
            box-shadow: inset 0 10px 0 #7bd936;
        }
        .bg-grass-2 {
            position: absolute;
            bottom: -8vh; left: -20vw;
            width: 140vw; height: 30vh;
            background: #4eb000;
            border-radius: 50% 50% 0 0;
            box-shadow: inset 0 10px 0 #58cc02;
            z-index: -1;
        }

        /* Logo positioning top-right */
        .oodles-logo {
            position: absolute;
            top: 20px;
            right: 20px;
            height: 60px;
            z-index: 10;
        }

        /* --- Main Game Layout --- */
        #app-container {
            position: absolute;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2vh 2vw;
            z-index: 1;
        }

        .screen {
            background: #fffdfa;
            border-radius: clamp(20px, 4vmin, 35px);
            padding: clamp(15px, 3vh, 40px) clamp(15px, 3vw, 30px);
            box-shadow: 0 15px 0 #e5b400, 0 25px 30px rgba(0,0,0,0.2);
            text-align: center;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(15px, 3vh, 25px);
            border: clamp(4px, 1vmin, 6px) solid #ffc800;
            width: 100%;
            max-width: 800px;
            max-height: 95vh;
        }

        .screen.active {
            display: flex;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .title {
            font-size: clamp(2rem, 6vmin, 3.8rem);
            color: #ffffff;
            font-weight: 900;
            text-shadow: 4px 4px 0px #ff9600, 0px 8px 15px rgba(0,0,0,0.15);
            letter-spacing: 2px;
            line-height: 1.1;
            margin: 0;
        }

        /* Buttons */
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 20px;
            padding: clamp(12px, 2.5vh, 18px) clamp(20px, 5vw, 40px);
            font-size: clamp(1.2rem, 3vmin, 1.5rem);
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 var(--primary-shadow);
            transition: all 0.1s ease;
            width: 100%;
            max-width: 350px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 var(--primary-shadow);
        }

        .btn-success {
            background: var(--success);
            box-shadow: 0 8px 0 var(--success-shadow);
        }
        .btn-success:active {
            box-shadow: 0 0px 0 var(--success-shadow);
        }

        /* Game UI Layout */
        #game-ui {
            width: 100%;
            max-width: 800px;
            height: 96vh;
            display: none;
            flex-direction: column;
            gap: 1.5vh;
            justify-content: flex-start;
        }
        #game-ui.active { display: flex; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 900;
            color: #ffffff;
            font-size: clamp(1rem, 3vmin, 1.4rem);
            padding: 0 10px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
        }

        .progress-container {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            height: clamp(15px, 3vh, 26px);
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.9);
            box-shadow: inset 0 3px 5px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #58cc02, #7bd936);
            border-radius: 10px;
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card {
            background: #fffdfa;
            border-radius: clamp(20px, 4vmin, 35px);
            padding: clamp(15px, 3vh, 30px) clamp(10px, 2vw, 30px);
            box-shadow: 0 12px 0 #e5b400;
            border: clamp(4px, 1vmin, 6px) solid #ffc800;
            display: flex;
            flex-direction: column;
            gap: clamp(10px, 2vh, 20px);
            flex: 1;
            min-height: 0; /* Important for flex shrink */
            overflow: hidden;
        }

        .question-header {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
            background: #fff4cc;
            padding: clamp(10px, 2vh, 15px);
            border-radius: 20px;
            border: 4px solid #ffe066;
            box-shadow: 0 4px 0 rgba(255, 224, 102, 0.5);
            flex-shrink: 0;
        }

        .question-text {
            font-size: clamp(1.2rem, 3.5vmin, 1.8rem);
            font-weight: 800;
            line-height: 1.3;
            color: #b38600;
            text-align: center;
        }

        .speaker-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            width: clamp(45px, 8vmin, 60px);
            height: clamp(45px, 8vmin, 60px);
            font-size: clamp(1.2rem, 3.5vmin, 1.8rem);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 0 var(--primary-shadow);
            flex-shrink: 0;
            transition: all 0.1s;
        }

        .speaker-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0 var(--primary-shadow);
        }

        /* Visual Area (Money & Item) */
        .visual-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(10px, 2vh, 20px);
            flex: 1 1 auto;
            min-height: 0;
            width: 100%;
        }

        .money-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: clamp(8px, 1.5vmin, 15px);
            width: 100%;
        }

        .money-bill {
            width: clamp(65px, 14vmin, 95px);
            height: clamp(40px, 8.5vmin, 55px);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: clamp(1.2rem, 3vmin, 1.5rem);
            color: white;
            box-shadow: 0 6px 0 rgba(0,0,0,0.15), inset 0 0 0 2px rgba(255,255,255,0.4);
            position: relative;
            cursor: grab;
            transition: transform 0.2s, filter 0.2s;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
            touch-action: none;
        }

        .money-bill:active { cursor: grabbing; }

        .money-bill.dragging {
            opacity: 0.95;
            z-index: 1000 !important;
            box-shadow: 0 20px 25px rgba(0,0,0,0.3);
            transform: scale(1.15) !important;
        }

        .money-bill.paid-hidden {
            visibility: hidden;
            opacity: 0;
            transition: all 0.2s;
        }

        /* BLINKING EFFECT FOR REMAINING MONEY */
        @keyframes flash-bounce {
            0% { transform: scale(1); filter: brightness(1); box-shadow: 0 6px 0 rgba(0,0,0,0.15); }
            50% { transform: scale(1.15) rotate(3deg); filter: brightness(1.3); box-shadow: 0 0 20px #ffc800, 0 10px 0 rgba(0,0,0,0.2); }
            100% { transform: scale(1); filter: brightness(1); box-shadow: 0 6px 0 rgba(0,0,0,0.15); }
        }

        .money-bill.blinking {
            animation: flash-bounce 0.8s infinite;
            border: 2px solid #fff;
            z-index: 10;
        }

        .money-bill::before {
            content: ''; position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 2px dashed rgba(255,255,255,0.5);
            border-radius: 4px; pointer-events: none;
        }
        .money-bill span { z-index: 1; pointer-events: none; }

        .m1 { background: linear-gradient(135deg, var(--m1), var(--m1-dark)); }
        .m2 { background: linear-gradient(135deg, var(--m2), var(--m2-dark)); }
        .m5 { background: linear-gradient(135deg, var(--m5), var(--m5-dark)); }
        .m10 { background: linear-gradient(135deg, var(--m10), var(--m10-dark)); }

        /* Drop Zone */
        .item-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f3e8ff;
            /* Lớn hơn ở đây */
            padding: clamp(15px, 3vh, 30px) 15px;
            border-radius: 25px;
            gap: clamp(8px, 1.5vh, 15px);
            border: 4px dashed #d8b4fe;
            transition: all 0.3s;
            position: relative;
            width: 100%;
            /* Lớn hơn ở đây */
            max-width: 450px; 
            flex-shrink: 0;
            min-height: 0;
        }

        .item-container.drag-over {
            background: #e9d5ff; border-color: #a855f7; transform: scale(1.03);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .item-container.paid-full {
            border: 4px solid var(--success);
            background: #e8fcd8; border-style: solid;
        }

        .undo-btn {
            position: absolute; top: 10px; right: 10px;
            background: var(--danger); color: white; border: none;
            border-radius: 12px; padding: 6px 12px;
            font-size: clamp(0.8rem, 2vmin, 1rem); font-weight: 800;
            cursor: pointer; box-shadow: 0 4px 0 var(--danger-shadow);
            display: none; align-items: center; gap: 5px; z-index: 10;
        }
        .undo-btn.visible { display: flex; animation: popIn 0.3s; }
        .undo-btn:active { transform: translateY(4px); box-shadow: 0 0 0 var(--danger-shadow); }

        .item-icon {
            /* Lớn hơn ở đây */
            width: clamp(80px, 18vh, 130px);
            height: clamp(80px, 18vh, 130px);
            filter: drop-shadow(0 10px 8px rgba(0,0,0,0.2));
            transition: transform 0.3s;
        }
        .item-container.drag-over .item-icon { transform: scale(1.1); }

        .price-tag {
            background: #a855f7; color: #ffffff;
            /* Lớn hơn ở đây */
            padding: 10px 22px; 
            border-radius: 20px;
            /* Lớn hơn ở đây */
            font-weight: 900; font-size: clamp(1.1rem, 3.5vmin, 1.4rem); 
            box-shadow: 0 5px 0 #7e22ce;
            display: flex; gap: 10px; align-items: center;
        }

        .paid-status {
            font-size: clamp(0.9rem, 2.5vmin, 1.1rem);
            font-weight: 900; color: var(--danger);
            background: #ffffff; padding: 4px 12px;
            border-radius: 12px; box-shadow: 0 2px 0 rgba(0,0,0,0.1);
        }
        .paid-full .paid-status { color: var(--success-shadow); }

        .instruction-badge {
            position: absolute; top: -15px;
            background: #ff6b6b; color: white;
            padding: 6px 15px; border-radius: 15px;
            font-size: clamp(0.8rem, 2vmin, 1rem);
            font-weight: 900; box-shadow: 0 4px 0 #ea2b2b;
            letter-spacing: 1px; white-space: nowrap;
        }

        /* Options Area (Đáp án nhỏ lại) */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: clamp(8px, 1.5vh, 12px);
            width: 100%;
            transition: opacity 0.3s;
            flex-shrink: 0;
            padding: 0 10px;
        }

        .options-grid.locked { opacity: 0.4; pointer-events: none; }

        .option-btn {
            background: #e0f2fe; 
            border: 3px solid #bae6fd; /* Border mảnh hơn */
            color: #0284c7; 
            border-radius: clamp(12px, 3vmin, 18px); /* Bo góc nhỏ hơn một chút */
            padding: clamp(8px, 1.5vh, 12px); /* Padding nhỏ lại */
            font-size: clamp(1.1rem, 3vmin, 1.4rem); /* Font chữ nhỏ lại */
            font-weight: 800; cursor: pointer;
            box-shadow: 0 4px 0 #bae6fd; /* Bóng đổ nhỏ lại */
            transition: all 0.1s ease; text-align: center;
        }

        .option-btn:active:not(:disabled) {
            transform: translateY(4px); box-shadow: 0 0px 0 #bae6fd;
        }
        .option-btn:disabled { cursor: not-allowed; }

        .option-btn.selected-correct {
            background: #e8fcd8; border-color: var(--success);
            color: var(--success-shadow); box-shadow: 0 0px 0 var(--success-shadow);
            transform: translateY(4px);
        }
        .option-btn.selected-wrong {
            background: #ffe6e6; border-color: var(--danger);
            color: var(--danger-shadow); box-shadow: 0 0px 0 var(--danger-shadow);
            transform: translateY(4px); opacity: 0.8;
        }

        /* Feedback Modal overlay style to keep layout tight */
        #feedback-area {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.6);
            display: flex; justify-content: center; align-items: flex-end;
            padding-bottom: 5vh;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s; z-index: 1000;
        }

        #feedback-area.show { opacity: 1; pointer-events: auto; }

        .feedback-content {
            width: 90%; max-width: 600px;
            background: #e8fcd8; border-radius: 30px;
            padding: clamp(20px, 4vh, 30px);
            display: flex; flex-direction: column; gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 6px solid #c0f29b;
            transform: translateY(100px); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #feedback-area.show .feedback-content { transform: translateY(0); }

        .feedback-header { display: flex; align-items: center; gap: 15px; }
        .feedback-icon {
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--success); color: white; font-size: 2rem;
            display: flex; align-items: center; justify-content: center; font-weight: 900;
        }
        .feedback-title { font-size: clamp(1.5rem, 4vmin, 2rem); font-weight: 900; color: var(--success-shadow); }

        .feedback-explanation {
            font-size: clamp(1.1rem, 3vmin, 1.4rem); font-weight: 800; color: #4a5568;
            background: rgba(255,255,255,0.8); padding: 15px;
            border-radius: 15px; text-align: center; border: 3px dashed #cbd5e0;
        }

        /* Confetti */
        .confetti {
            position: fixed; top: -20px; width: 15px; height: 30px;
            z-index: 99999; pointer-events: none; animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(1080deg); }
        }

        /* Device Specific Orientations */
        @media (orientation: landscape) and (max-height: 600px) {
            /* Compact mode for laptop/landscape phones */
            .card { flex-direction: row; align-items: stretch; }
            .visual-area { max-width: 50%; }
            .options-grid { align-self: center; }
            .question-header { flex-direction: row; }
        }
    </style>
</head>
<body>

<!-- Beautiful Scenery Background -->
<div id="scenery-background">
    <div class="bg-sun"></div>
    <div class="bg-rainbow"></div>
    <div class="bg-cloud c1"></div>
    <div class="bg-cloud c2"></div>
    <div class="bg-cloud c3"></div>
    <div class="bg-grass-2"></div>
    <div class="bg-grass">
        <!-- Some simple background flowers -->
        <svg style="position: absolute; bottom: 10vh; left: 15vw; width: 40px; height: 40px;" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="15" fill="#FFE066"/>
            <circle cx="50" cy="20" r="15" fill="#FF5E7E"/><circle cx="50" cy="80" r="15" fill="#FF5E7E"/>
            <circle cx="20" cy="50" r="15" fill="#FF5E7E"/><circle cx="80" cy="50" r="15" fill="#FF5E7E"/>
        </svg>
        <svg style="position: absolute; bottom: 5vh; left: 75vw; width: 50px; height: 50px;" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="15" fill="#FFF"/>
            <circle cx="50" cy="20" r="15" fill="#A582FF"/><circle cx="50" cy="80" r="15" fill="#A582FF"/>
            <circle cx="20" cy="50" r="15" fill="#A582FF"/><circle cx="80" cy="50" r="15" fill="#A582FF"/>
        </svg>
    </div>
</div>

<img src="../assets/logo-oodles-math.png" class="oodles-logo" onerror="this.style.display='none'">

<div id="app-container">
    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
        <h1 class="title">Money Mission</h1>
        <p style="font-size: clamp(1.1rem, 3vmin, 1.4rem); color: #b38600; font-weight: 800; background: #fff4cc; padding: 15px 20px; border-radius: 20px; border: 3px solid #ffe066;">
            Let's learn to count, add, and subtract money!
        </p>
        <svg width="120" height="120" viewBox="0 0 100 100" style="margin: 10px 0;">
            <circle cx="50" cy="50" r="48" fill="#ffc800" filter="drop-shadow(0px 8px 5px rgba(0,0,0,0.2))"/>
            <circle cx="50" cy="50" r="40" fill="#ffd438"/>
            <circle cx="50" cy="50" r="35" fill="none" stroke="#e5b400" stroke-width="4" stroke-dasharray="8 4"/>
            <text x="50" y="68" font-family="Poppins" font-size="45" font-weight="900" fill="#cc9a00" text-anchor="middle">$</text>
        </svg>
        <button class="btn" onclick="startGame()">Play Now</button>
    </div>

    <!-- Game UI -->
    <div id="game-ui">
        <div class="header">
            <span>Question <span id="current-q-text">1</span> / 10</span>
            <span>Score: <span id="score-text">0</span></span>
        </div>
        
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <div class="card">
            <div class="question-header">
                <div id="question-text" class="question-text">Question text goes here.</div>
                <!-- Speaker icon moved to the end -->
                <button class="speaker-btn" onclick="playTTS()">🔊</button>
            </div>

            <div class="visual-area" id="visual-area">
                <!-- Money and items injected here -->
            </div>

            <div class="options-grid" id="options-grid">
                <!-- Buttons injected here -->
            </div>
        </div>
    </div>

    <!-- End Screen -->
    <div id="end-screen" class="screen">

    // --- Base Questions Database ---
    const baseQuestions = [

    let activeQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let audioCtx = null;
    let isFirstAttempt = true;
    
    // Drag/Drop state
    let targetPrice = 0;
    let currentPaid = 0;
    let dragHistory = [];

    function shuffleArray(array) {
        let newArr = [...array];
        for (let i = newArr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
        }
        return newArr;
    }

    function initAudio() {
        if (!audioCtx) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        
        if (type === 'correct') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, now); 
            osc.frequency.setValueAtTime(659.25, now + 0.1); 
            osc.frequency.setValueAtTime(783.99, now + 0.2); 
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.start(now); osc.stop(now + 0.5);
        } else if (type === 'wrong') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(150, now + 0.3);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'coin') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now); osc.stop(now + 0.2);
        } else if (type === 'undo') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now); osc.stop(now + 0.2);
        } else if (type === 'unlock') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(440, now); 
            osc.frequency.setValueAtTime(880, now + 0.1);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
            osc.start(now); osc.stop(now + 0.4);
        }
    }

    function playTTS() {
        const text = activeQuestions[currentIndex].ttsText;
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            utterance.pitch = 1.1;
            window.speechSynthesis.speak(utterance);
        }
    }

    function startGame() {
        initAudio();
        activeQuestions = shuffleArray(baseQuestions);
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('game-ui').classList.add('active');
        currentIndex = 0; score = 0;
        loadQuestion();
    }

    function resetGame() {
        document.getElementById('end-screen').classList.remove('active');
        document.getElementById('start-screen').classList.add('active');
        document.querySelectorAll('.confetti').forEach(e => e.remove());
    }

    function loadQuestion() {
        const q = activeQuestions[currentIndex];
        isFirstAttempt = true; currentPaid = 0;
        targetPrice = q.type === 'subtraction' ? q.item.price : 0;
        dragHistory = []; 
        
        document.getElementById('current-q-text').innerText = currentIndex + 1;
        document.getElementById('score-text').innerText = score;
        document.getElementById('progress-bar').style.width = `${(currentIndex / 10) * 100}%`;
        
        document.getElementById('question-text').innerText = q.questionText;

        const visualArea = document.getElementById('visual-area');
        visualArea.innerHTML = '';
        
        const moneyContainer = document.createElement('div');
        moneyContainer.className = 'money-container';
        
        q.money.forEach(group => {
            for(let i=0; i<group.count; i++) {
                const bill = document.createElement('div');
                bill.className = `money-bill m${group.val}`;
                bill.innerHTML = `<span>$${group.val}</span>`;
                bill.dataset.val = group.val;
                if (q.type === 'subtraction') setupDraggable(bill);
                moneyContainer.appendChild(bill);
            }
        });
        visualArea.appendChild(moneyContainer);

        if (q.type === 'subtraction') {
            const itemContainer = document.createElement('div');
            itemContainer.className = 'item-container';
            itemContainer.id = 'drop-zone';
            
            const badge = document.createElement('div');
            badge.className = 'instruction-badge';
            // Cập nhật hướng dẫn cho bé biết có thể click
            badge.innerText = 'Drag or click money to pay';

            const undoBtn = document.createElement('button');
            undoBtn.id = 'undo-btn'; undoBtn.className = 'undo-btn';
            undoBtn.innerHTML = '⟲ Undo';
            undoBtn.onclick = handleUndo;
            
            const iconWrap = document.createElement('div');
            iconWrap.className = 'item-icon';
            iconWrap.innerHTML = SVGS[q.item.name];
            
            const priceTag = document.createElement('div');
            priceTag.className = 'price-tag';
            priceTag.innerHTML = `
                ${q.item.name} — $${q.item.price}
                <span class="paid-status" id="paid-status">Paid: $0</span>
            `;
            
            itemContainer.appendChild(undoBtn);
            itemContainer.appendChild(badge);
            itemContainer.appendChild(iconWrap);
            itemContainer.appendChild(priceTag);
            visualArea.appendChild(itemContainer);
        }

        const optionsGrid = document.getElementById('options-grid');
        optionsGrid.innerHTML = '';
        if (q.type === 'subtraction') {
            optionsGrid.classList.add('locked');
        } else {
            optionsGrid.classList.remove('locked');
        }

        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = `$${opt}`;
            btn.onclick = () => checkAnswer(opt, btn);
            optionsGrid.appendChild(btn);
        });

        document.getElementById('feedback-area').classList.remove('show');
    }

    function setupDraggable(el) {
        let isDragging = false; 
        let startX, startY;
        let hasMoved = false;

        const handleStart = (e) => {
            if (el.classList.contains('paid-hidden')) return;
            isDragging = true;
            hasMoved = false;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            startX = clientX; startY = clientY;
            el.classList.add('dragging');
            initAudio();
        };

        const handleMove = (e) => {
            if (!isDragging) return;
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const dx = clientX - startX; const dy = clientY - startY;
            
            // Chỉ coi là đang kéo khi di chuyển lớn hơn 5px (Tránh lỗi chạm nhẹ bị huỷ click)
            if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
                hasMoved = true;
            }
            if (!hasMoved) return;

            e.preventDefault(); 
            el.style.transform = `translate(${dx}px, ${dy}px) scale(1.15)`;
            
            const dropZone = document.getElementById('drop-zone');
            if (dropZone) {
                const rect = el.getBoundingClientRect();
                const dropRect = dropZone.getBoundingClientRect();
                if (rect.left < dropRect.right && rect.right > dropRect.left &&
                    rect.top < dropRect.bottom && rect.bottom > dropRect.top) {
                    dropZone.classList.add('drag-over');
                } else {
                    dropZone.classList.remove('drag-over');
                }
            }
        };

        const handleEnd = (e) => {
            if (!isDragging) return;
            isDragging = false; el.classList.remove('dragging');
            
            // Xử lý Click (Nếu người dùng chỉ nhấp vào tờ tiền mà không kéo)
            if (!hasMoved) {
                processPayment(el);
                return;
            }

            // Xử lý Drag & Drop
            const dropZone = document.getElementById('drop-zone');
            let droppedInside = false;

            if (dropZone) {
                dropZone.classList.remove('drag-over');
                const rect = el.getBoundingClientRect();
                const dropRect = dropZone.getBoundingClientRect();
                if (rect.left < dropRect.right && rect.right > dropRect.left &&
                    rect.top < dropRect.bottom && rect.bottom > dropRect.top) {
                    droppedInside = true;
                }
            }

            if (droppedInside) {
                processPayment(el);
            } else {
                el.style.transform = `translate(0px, 0px) scale(1)`;
            }
        };

        el.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);
        el.addEventListener('touchstart', handleStart, {passive: false});
        window.addEventListener('touchmove', handleMove, {passive: false});
        window.addEventListener('touchend', handleEnd);
    }

    // Hàm xử lý thanh toán tiền chung cho cả click và kéo thả
    function processPayment(el) {
        const val = parseInt(el.dataset.val);
        if (currentPaid + val <= targetPrice) {
            currentPaid += val;
            el.style.transform = `translate(0px, 0px) scale(1)`;
            el.classList.add('paid-hidden');
            
            dragHistory.push({ el: el, val: val });
            document.getElementById('undo-btn').classList.add('visible');

            playSound('coin');
            document.getElementById('paid-status').innerText = `Paid: $${currentPaid}`;
            
            const dropZone = document.getElementById('drop-zone');
            if (currentPaid === targetPrice) {
                dropZone.classList.add('paid-full');
                document.getElementById('paid-status').innerText = 'Fully Paid! ✓';
                playSound('unlock');
                document.getElementById('options-grid').classList.remove('locked');
                
                const allBills = document.querySelectorAll('.money-bill');
                allBills.forEach(b => {
                    if (!b.classList.contains('paid-hidden')) {
                        b.classList.add('blinking');
                    }
                });
            }
        } else {
            playSound('wrong');
            el.style.transform = `translate(0px, 0px) scale(1)`;
        }
    }

    function handleUndo() {
        if (dragHistory.length === 0) return;
        const lastMove = dragHistory.pop();
        currentPaid -= lastMove.val;
        lastMove.el.classList.remove('paid-hidden');
        playSound('undo');

        document.getElementById('paid-status').innerText = `Paid: $${currentPaid}`;
        
        if (dragHistory.length === 0) {
            document.getElementById('undo-btn').classList.remove('visible');
        }

        const dropZone = document.getElementById('drop-zone');
        if (currentPaid < targetPrice) {
            dropZone.classList.remove('paid-full');
            document.getElementById('options-grid').classList.add('locked');
            
            const allBills = document.querySelectorAll('.money-bill');
            allBills.forEach(b => b.classList.remove('blinking'));
        }
    }

    function checkAnswer(selectedVal, btnElement) {
        const q = activeQuestions[currentIndex];
        const isCorrect = selectedVal === q.correct;

        if (isCorrect) {
            playSound('correct');
            btnElement.classList.add('selected-correct');
            
            const allBills = document.querySelectorAll('.money-bill');
            allBills.forEach(b => b.classList.remove('blinking'));

            if (isFirstAttempt) {
                score++; document.getElementById('score-text').innerText = score;
            }

            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.disabled = true);

            const undoBtn = document.getElementById('undo-btn');
            if (undoBtn) undoBtn.classList.remove('visible');

            const feedbackArea = document.getElementById('feedback-area');
            document.getElementById('feedback-explanation').innerText = q.explanation;
            feedbackArea.classList.add('show');
            
        } else {
            playSound('wrong');
            btnElement.classList.add('selected-wrong');
            btnElement.disabled = true; 
            isFirstAttempt = false; 
        }
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < activeQuestions.length) {
            loadQuestion();
        } else {
            showEndScreen();
        }
    }

    function showEndScreen() {
        document.getElementById('game-ui').classList.remove('active');
        document.getElementById('feedback-area').classList.remove('show');
        
        const endScreen = document.getElementById('end-screen');
        endScreen.classList.add('active');
        document.getElementById('final-score').innerText = score;
        
        const msg = document.getElementById('end-message');
        if (score >= 8) {
            msg.innerText = "Amazing money master! 🌟";
        } else if (score >= 5) {
            msg.innerText = "Good job! Keep practising! 👍";
        } else {
            msg.innerText = "Nice try! Let's play again! 💪";
        }

        createConfetti();
    }

    function createConfetti() {
        const colors = ['#1cb0f6', '#ffc800', '#58cc02', '#ff4b4b', '#a582ff'];
        for (let i = 0; i < 150; i++) {
            const conf = document.createElement('div');
            conf.className = 'confetti';
            conf.style.left = Math.random() * 100 + 'vw';
            conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            conf.style.animationDuration = (Math.random() * 2.5 + 2) + 's';
            conf.style.animationDelay = (Math.random() * 1.5) + 's';
            if(Math.random() > 0.5) conf.style.borderRadius = '50%';
            document.body.appendChild(conf);
        }
    }

</script>
</body>
</html>
