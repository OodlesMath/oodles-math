<!DOCTYPE html>
<html lang="en">
<head>
    
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Money Mission</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1cb0f6;
            --primary-shadow: #1899d6;
            --secondary: #ffc800;
            --secondary-shadow: #e5b400;
            --success: #58cc02;
            --success-shadow: #58a700;
            --danger: #ff4b4b;
            --danger-shadow: #ea2b2b;
            --text-main: #3c3c3c;
            --text-light: #90a4ae;
            
            /* Enhanced Money colors */
            --m1: #7bd936;
            --m1-dark: #58a700;
            --m2: #a582ff;
            --m2-dark: #8150e6;
            --m5: #3ebef7;
            --m5-dark: #1899d6;
            --m10: #ff6b6b;
            --m10-dark: #ea2b2b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            /* Vibrant Kids App Background */
            background: #3abff8;
            background-image: 
                radial-gradient(circle at 40px 40px, rgba(255,255,255,0.2) 20px, transparent 0),
                radial-gradient(circle at 120px 100px, rgba(255,255,255,0.15) 15px, transparent 0),
                radial-gradient(circle at 80px 180px, rgba(255,255,255,0.1) 10px, transparent 0);
            background-size: 200px 200px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            touch-action: none;
        }

        #app-container {
            width: 100%;
            max-width: 760px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
        }

        /* Screens */
        .screen {
            background: #fffdfa;
            border-radius: 35px;
            padding: 50px 30px;
            box-shadow: 0 15px 0 #e5b400;
            text-align: center;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            border: 6px solid #ffc800;
        }

        .screen.active {
            display: flex;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .title {
            font-size: 3.8rem;
            color: #ffffff;
            font-weight: 900;
            margin-bottom: 5px;
            text-shadow: 4px 4px 0px #ff9600, 0px 8px 15px rgba(0,0,0,0.15);
            letter-spacing: 2px;
            line-height: 1.1;
        }

        /* Buttons */
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 18px 40px;
            font-size: 1.5rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 var(--primary-shadow);
            transition: all 0.1s ease;
            width: 100%;
            max-width: 350px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 var(--primary-shadow);
        }

        .btn-success {
            background: var(--success);
            box-shadow: 0 8px 0 var(--success-shadow);
        }
        .btn-success:active {
            box-shadow: 0 0px 0 var(--success-shadow);
        }

        /* Game UI */
        #game-ui {
            display: none;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        #game-ui.active {
            display: flex;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 900;
            color: #ffffff;
            font-size: 1.4rem;
            padding: 0 10px;
            text-shadow: 2px 2px 0 #0284c7; /* Strong shadow for readability on bright background */
        }

        .progress-container {
            width: 100%;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 15px;
            height: 26px;
            margin-bottom: 10px;
            overflow: hidden;
            border: 4px solid rgba(255, 255, 255, 0.8);
            box-shadow: inset 0 3px 5px rgba(0,0,0,0.1);
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #58cc02, #7bd936);
            border-radius: 10px;
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .card {
            background: #fffdfa;
            border-radius: 35px;
            padding: 35px;
            box-shadow: 0 15px 0 #e5b400;
            border: 6px solid #ffc800; /* Beautiful thick colorful border */
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Colorful Text Block */
        .question-header {
            display: flex;
            gap: 20px;
            align-items: center;
            background: #fff4cc; /* Pastel yellow */
            padding: 20px;
            border-radius: 25px;
            border: 4px solid #ffe066;
            box-shadow: 0 5px 0 rgba(255, 224, 102, 0.5);
        }

        .speaker-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 20px;
            width: 65px;
            height: 65px;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--primary-shadow);
            flex-shrink: 0;
            transition: all 0.1s;
        }

        .speaker-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 var(--primary-shadow);
        }

        .question-text {
            font-size: 1.5rem;
            font-weight: 800;
            line-height: 1.4;
            color: #b38600; /* Darker yellow/brown for good contrast */
        }

        /* Visual Area */
        .visual-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            padding: 10px 0;
            min-height: 180px;
            position: relative;
        }

        .money-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            width: 100%;
        }

        .money-bill {
            width: 95px;
            height: 55px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.5rem;
            color: white;
            box-shadow: 0 6px 0 rgba(0,0,0,0.15), inset 0 0 0 2px rgba(255,255,255,0.4);
            position: relative;
            user-select: none;
            cursor: grab;
            transition: transform 0.2s;
            overflow: hidden;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
            touch-action: none;
        }

        .money-bill:active {
            cursor: grabbing;
        }

        .money-bill.dragging {
            opacity: 0.95;
            z-index: 1000 !important;
            box-shadow: 0 20px 25px rgba(0,0,0,0.3);
            transform: scale(1.15);
        }

        .money-bill.paid-hidden {
            visibility: hidden;
            opacity: 0;
            transition: all 0.2s;
        }

        .money-bill::before {
            content: '';
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 2px dashed rgba(255,255,255,0.5);
            border-radius: 4px;
        }

        .money-bill span { z-index: 1; }

        .m1 { background: linear-gradient(135deg, var(--m1), var(--m1-dark)); }
        .m2 { background: linear-gradient(135deg, var(--m2), var(--m2-dark)); }
        .m5 { background: linear-gradient(135deg, var(--m5), var(--m5-dark)); }
        .m10 { background: linear-gradient(135deg, var(--m10), var(--m10-dark)); }

        /* Drop Zone */
        .item-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f3e8ff; /* Pastel purple */
            padding: 30px 40px;
            border-radius: 30px;
            gap: 15px;
            border: 4px dashed #d8b4fe; /* Deep purple border */
            transition: all 0.3s;
            position: relative;
            width: 100%;
            max-width: 400px;
        }

        .item-container.drag-over {
            background: #e9d5ff;
            border-color: #a855f7;
            transform: scale(1.03);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .item-container.paid-full {
            border: 4px solid var(--success);
            background: #e8fcd8;
            border-style: solid;
        }

        /* Undo Button */
        .undo-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 8px 15px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--danger-shadow);
            display: none;
            align-items: center;
            gap: 5px;
            z-index: 10;
        }

        .undo-btn.visible {
            display: flex;
            animation: popIn 0.3s;
        }

        .undo-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 var(--danger-shadow);
        }

        .item-icon {
            width: 120px;
            height: 120px;
            filter: drop-shadow(0 10px 8px rgba(0,0,0,0.15));
            transition: transform 0.3s;
        }

        .item-container.drag-over .item-icon {
            transform: scale(1.1);
        }

        .price-tag {
            background: #a855f7;
            color: #ffffff;
            padding: 10px 25px;
            border-radius: 18px;
            font-weight: 900;
            font-size: 1.4rem;
            box-shadow: 0 5px 0 #7e22ce;
            display: flex;
            gap: 15px;
            align-items: center;
            margin-top: 10px;
        }

        .paid-status {
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--danger);
            background: #ffffff;
            padding: 5px 15px;
            border-radius: 12px;
            box-shadow: 0 2px 0 rgba(0,0,0,0.1);
        }
        
        .paid-full .paid-status {
            color: var(--success-shadow);
        }

        .instruction-badge {
            position: absolute;
            top: -20px;
            background: #ff6b6b;
            color: white;
            padding: 8px 20px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 900;
            box-shadow: 0 4px 0 #ea2b2b;
            letter-spacing: 1px;
        }

        /* Options Area */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            transition: opacity 0.3s;
        }

        .options-grid.locked {
            opacity: 0.4;
            pointer-events: none;
        }

        .option-btn {
            background: #e0f2fe; /* Pastel Blue background */
            border: 4px solid #bae6fd; /* Thicker colorful border */
            color: #0284c7; /* Darker blue text */
            border-radius: 25px;
            padding: 22px;
            font-size: 1.8rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 #bae6fd;
            transition: all 0.1s ease;
            text-align: center;
        }

        .option-btn:active:not(:disabled) {
            transform: translateY(8px);
            box-shadow: 0 0px 0 #bae6fd;
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.selected-correct {
            background: #e0ffc7;
            border-color: var(--success);
            color: var(--success-shadow);
            box-shadow: 0 0px 0 var(--success-shadow);
            transform: translateY(8px);
        }

        .option-btn.selected-wrong {
            background: #ffe6e6;
            border-color: var(--danger);
            color: var(--danger-shadow);
            box-shadow: 0 0px 0 var(--danger-shadow);
            transform: translateY(8px);
            opacity: 0.8;
        }

        /* Feedback Area */
        #feedback-area {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        #feedback-area.show {
            transform: translateY(0);
        }

        .feedback-content {
            width: 100%;
            max-width: 760px;
            border-radius: 35px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.15);
            border: 6px solid #fff;
        }

        .feedback-content.correct { 
            background: #e8fcd8; 
            border-color: #c0f29b;
        }

        .feedback-header {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .feedback-icon {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            color: white;
            font-weight: 900;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .correct .feedback-icon { background: var(--success); }

        .feedback-title {
            font-size: 2rem;
            font-weight: 900;
        }
        .correct .feedback-title { color: var(--success-shadow); }

        .feedback-explanation {
            font-size: 1.5rem;
            font-weight: 800;
            color: #4a5568;
            background: rgba(255,255,255,0.8);
            padding: 15px 20px;
            border-radius: 18px;
            text-align: center;
            border: 3px dashed #cbd5e0;
        }

        /* Confetti */
        .confetti {
            position: fixed;
            top: -20px;
            width: 15px;
            height: 30px;
            z-index: 9999;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(1080deg); }
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
            .question-text { font-size: 1.3rem; }
            .speaker-btn { width: 55px; height: 55px; font-size: 1.6rem; }
            .money-bill { width: 80px; height: 48px; font-size: 1.2rem; }
            .screen { padding: 40px 20px; border-width: 4px; }
            .card { padding: 25px 20px; border-width: 4px; }
            .feedback-content { padding: 25px; border-width: 4px; }
            .item-container { padding: 25px 20px; }
            .item-icon { width: 90px; height: 90px; }
            .title { font-size: 3rem; }
            .option-btn { padding: 18px; font-size: 1.6rem; }
        }
    </style>
</head>
<body>
<img src="../assets/logo-oodles-math.png" class="oodles-logo">
<div id="app-container">

    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
        <h1 class="title">Money Mission</h1>
        <p style="font-size: 1.4rem; color: #b38600; font-weight: 800; background: #fff4cc; padding: 15px 25px; border-radius: 20px; border: 3px solid #ffe066;">
            Let's learn to count, add, and subtract money!
        </p>
        <svg width="150" height="150" viewBox="0 0 100 100" style="margin: 15px 0;">
            <circle cx="50" cy="50" r="48" fill="#ffc800" filter="drop-shadow(0px 8px 5px rgba(0,0,0,0.15))"/>
            <circle cx="50" cy="50" r="40" fill="#ffd438"/>
            <circle cx="50" cy="50" r="35" fill="none" stroke="#e5b400" stroke-width="4" stroke-dasharray="8 4"/>
            <text x="50" y="68" font-family="Poppins" font-size="45" font-weight="900" fill="#cc9a00" text-anchor="middle">$</text>
            <path d="M 30 30 L 40 40 M 70 30 L 60 40 M 35 70 Q 50 85 65 70" stroke="#cc9a00" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.6"/>
        </svg>
        <button class="btn" onclick="startGame()">Play Now</button>
    </div>

    <!-- Game UI -->
    <div id="game-ui">
        <div class="header">
            <span>Question <span id="current-q-text">1</span> / 10</span>
            <span>Score: <span id="score-text">0</span></span>
        </div>
        
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <div class="card">
            <div class="question-header">
                <button class="speaker-btn" onclick="playTTS()">🔊</button>
                <div id="question-text" class="question-text">Question text goes here.</div>
            </div>

            <div class="visual-area" id="visual-area">
                <!-- Money and items injected here -->
            </div>

            <div class="options-grid" id="options-grid">
                <!-- Buttons injected here -->
            </div>
        </div>
    </div>

    <!-- End Screen -->
    <div id="end-screen" class="screen">
        <h1 class="title" style="color: var(--success); text-shadow: 4px 4px 0px var(--success-shadow);">You finished!</h1>
        <p style="font-size: 1.8rem; font-weight: 900; color: #0284c7; background: #e0f2fe; padding: 20px 40px; border-radius: 25px; border: 4px solid #bae6fd;">
            Score: <span id="final-score" style="color: var(--primary);">0</span> / 10
        </p>
        <p id="end-message" style="font-size: 1.5rem; font-weight: 800; margin-bottom: 10px; color: #ff9600;"></p>
        <button class="btn" onclick="resetGame()">Play Again</button>
    </div>

</div>

<!-- Feedback Area -->
<div id="feedback-area">
    <div id="feedback-content" class="feedback-content">
        <div class="feedback-header">
            <div id="feedback-icon" class="feedback-icon">✓</div>
            <div id="feedback-title" class="feedback-title">Great job!</div>
        </div>
        <div id="feedback-explanation" class="feedback-explanation">Explanation here</div>
        <button id="next-btn" class="btn btn-success" style="align-self: flex-end;" onclick="nextQuestion()">Next</button>
    </div>
</div>

    // --- State ---
    let activeQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let audioCtx = null;
    let isFirstAttempt = true;
    
    // Drag and drop state
    let targetPrice = 0;
    let currentPaid = 0;
    let dragHistory = [];

    // --- Utility ---
    function shuffleArray(array) {
        let newArr = [...array];
        for (let i = newArr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
        }
        return newArr;
    }

    // --- Audio System ---
    function initAudio() {
        if (!audioCtx) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playSound(type) {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        const now = audioCtx.currentTime;
        
        if (type === 'correct') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, now); 
            osc.frequency.setValueAtTime(659.25, now + 0.1); 
            osc.frequency.setValueAtTime(783.99, now + 0.2); 
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
        } else if (type === 'wrong') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(150, now + 0.3);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        } else if (type === 'coin') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now);
            osc.stop(now + 0.2);
        } else if (type === 'undo') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now);
            osc.stop(now + 0.2);
        } else if (type === 'unlock') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(440, now); 
            osc.frequency.setValueAtTime(880, now + 0.1);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
            osc.start(now);
            osc.stop(now + 0.4);
        }
    }

    function playTTS() {
        const text = activeQuestions[currentIndex].ttsText;
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            utterance.pitch = 1.1;
            window.speechSynthesis.speak(utterance);
        }
    }

    // --- UI Functions ---
    function startGame() {
        initAudio();
        // Xáo trộn ngẫu nhiên câu hỏi
        activeQuestions = shuffleArray(baseQuestions);
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('game-ui').classList.add('active');
        currentIndex = 0;
        score = 0;
        loadQuestion();
    }

    function resetGame() {
        document.getElementById('end-screen').classList.remove('active');
        document.getElementById('start-screen').classList.add('active');
        document.querySelectorAll('.confetti').forEach(e => e.remove());
    }

    function loadQuestion() {
        const q = activeQuestions[currentIndex];
        isFirstAttempt = true;
        currentPaid = 0;
        targetPrice = q.type === 'subtraction' ? q.item.price : 0;
        dragHistory = []; // Đặt lại lịch sử kéo thả
        
        // Update header
        document.getElementById('current-q-text').innerText = currentIndex + 1;
        document.getElementById('score-text').innerText = score;
        document.getElementById('progress-bar').style.width = `${(currentIndex / 10) * 100}%`;
        
        // Update text
        document.getElementById('question-text').innerText = q.questionText;

        // Render visuals
        const visualArea = document.getElementById('visual-area');
        visualArea.innerHTML = '';
        
        // Money Container
        const moneyContainer = document.createElement('div');
        moneyContainer.className = 'money-container';
        
        q.money.forEach(group => {
            for(let i=0; i<group.count; i++) {
                const bill = document.createElement('div');
                bill.className = `money-bill m${group.val}`;
                bill.innerHTML = `<span>$${group.val}</span>`;
                bill.dataset.val = group.val;
                
                if (q.type === 'subtraction') {
                    setupDraggable(bill);
                }
                
                moneyContainer.appendChild(bill);
            }
        });
        visualArea.appendChild(moneyContainer);

        // Item Container (if subtraction)
        if (q.type === 'subtraction') {
            const itemContainer = document.createElement('div');
            itemContainer.className = 'item-container';
            itemContainer.id = 'drop-zone';
            
            const badge = document.createElement('div');
            badge.className = 'instruction-badge';
            badge.innerText = 'Drag money to pay';

            // Undo Button
            const undoBtn = document.createElement('button');
            undoBtn.id = 'undo-btn';
            undoBtn.className = 'undo-btn';
            undoBtn.innerHTML = '⟲ Undo';
            undoBtn.onclick = handleUndo;
            
            const iconWrap = document.createElement('div');
            iconWrap.className = 'item-icon';
            iconWrap.innerHTML = SVGS[q.item.name];
            
            const priceTag = document.createElement('div');
            priceTag.className = 'price-tag';
            priceTag.innerHTML = `
                ${q.item.name} — $${q.item.price}
                <span class="paid-status" id="paid-status">Paid: $0</span>
            `;
            
            itemContainer.appendChild(undoBtn);
            itemContainer.appendChild(badge);
            itemContainer.appendChild(iconWrap);
            itemContainer.appendChild(priceTag);
            visualArea.appendChild(itemContainer);
        }

        // Render options
        const optionsGrid = document.getElementById('options-grid');
        optionsGrid.innerHTML = '';
        if (q.type === 'subtraction') {
            optionsGrid.classList.add('locked');
        } else {
            optionsGrid.classList.remove('locked');
        }

        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = `$${opt}`;
            btn.onclick = () => checkAnswer(opt, btn);
            optionsGrid.appendChild(btn);
        });

        document.getElementById('feedback-area').classList.remove('show');
    }

    // --- Drag & Drop & Undo Logic ---
    function setupDraggable(el) {
        let isDragging = false;
        let startX, startY;

        const handleStart = (e) => {
            if (el.classList.contains('paid-hidden')) return;
            isDragging = true;
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            startX = clientX;
            startY = clientY;
            
            el.classList.add('dragging');
            initAudio();
        };

        const handleMove = (e) => {
            if (!isDragging) return;
            e.preventDefault(); 
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const dx = clientX - startX;
            const dy = clientY - startY;
            
            el.style.transform = `translate(${dx}px, ${dy}px) scale(1.15)`;
            
            const dropZone = document.getElementById('drop-zone');
            if (dropZone) {
                const rect = el.getBoundingClientRect();
                const dropRect = dropZone.getBoundingClientRect();
                if (rect.left < dropRect.right && rect.right > dropRect.left &&
                    rect.top < dropRect.bottom && rect.bottom > dropRect.top) {
                    dropZone.classList.add('drag-over');
                } else {
                    dropZone.classList.remove('drag-over');
                }
            }
        };

        const handleEnd = (e) => {
            if (!isDragging) return;
            isDragging = false;
            el.classList.remove('dragging');
            
            const dropZone = document.getElementById('drop-zone');
            let droppedInside = false;

            if (dropZone) {
                dropZone.classList.remove('drag-over');
                const rect = el.getBoundingClientRect();
                const dropRect = dropZone.getBoundingClientRect();
                
                if (rect.left < dropRect.right && rect.right > dropRect.left &&
                    rect.top < dropRect.bottom && rect.bottom > dropRect.top) {
                    droppedInside = true;
                }
            }

            if (droppedInside) {
                const val = parseInt(el.dataset.val);
                if (currentPaid + val <= targetPrice) {
                    // Update state
                    currentPaid += val;
                    // Reset transform before hiding to prepare for potential undo
                    el.style.transform = `translate(0px, 0px) scale(1)`;
                    el.classList.add('paid-hidden');
                    
                    // Add to history
                    dragHistory.push({ el: el, val: val });
                    document.getElementById('undo-btn').classList.add('visible');

                    playSound('coin');
                    document.getElementById('paid-status').innerText = `Paid: $${currentPaid}`;
                    
                    if (currentPaid === targetPrice) {
                        dropZone.classList.add('paid-full');
                        document.getElementById('paid-status').innerText = 'Fully Paid! ✓';
                        playSound('unlock');
                        document.getElementById('options-grid').classList.remove('locked');
                    }
                } else {
                    playSound('wrong');
                    el.style.transform = `translate(0px, 0px) scale(1)`;
                }
            } else {
                el.style.transform = `translate(0px, 0px) scale(1)`;
            }
        };

        el.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);
        
        el.addEventListener('touchstart', handleStart, {passive: false});
        window.addEventListener('touchmove', handleMove, {passive: false});
        window.addEventListener('touchend', handleEnd);
    }

    function handleUndo() {
        if (dragHistory.length === 0) return;
        
        const lastMove = dragHistory.pop();
        currentPaid -= lastMove.val;
        
        // Show the bill again in its original container
        lastMove.el.classList.remove('paid-hidden');
        playSound('undo');

        // Update UI Text
        document.getElementById('paid-status').innerText = `Paid: $${currentPaid}`;
        
        // Hide undo button if history is empty
        if (dragHistory.length === 0) {
            document.getElementById('undo-btn').classList.remove('visible');
        }

        // If we were fully paid, we need to revert the fully paid state and lock options
        const dropZone = document.getElementById('drop-zone');
        if (currentPaid < targetPrice) {
            dropZone.classList.remove('paid-full');
            document.getElementById('options-grid').classList.add('locked');
        }
    }

    // --- Logic ---
    function checkAnswer(selectedVal, btnElement) {
        const q = activeQuestions[currentIndex];
        const isCorrect = selectedVal === q.correct;

        if (isCorrect) {
            playSound('correct');
            btnElement.classList.add('selected-correct');
            
            if (isFirstAttempt) {
                score++;
                document.getElementById('score-text').innerText = score;
            }

            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.disabled = true);

            // Hide undo button once correctly answered
            const undoBtn = document.getElementById('undo-btn');
            if (undoBtn) undoBtn.classList.remove('visible');

            const feedbackArea = document.getElementById('feedback-area');
            const feedbackContent = document.getElementById('feedback-content');
            
            feedbackContent.className = 'feedback-content correct';
            document.getElementById('feedback-icon').innerText = '✓';
            document.getElementById('feedback-title').innerText = 'Great job!';
            document.getElementById('feedback-explanation').innerText = q.explanation;
            
            feedbackArea.classList.add('show');
            
        } else {
            playSound('wrong');
            btnElement.classList.add('selected-wrong');
            btnElement.disabled = true; 
            isFirstAttempt = false; 
        }
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < activeQuestions.length) {
            loadQuestion();
        } else {
            showEndScreen();
        }
    }

    function showEndScreen() {
        document.getElementById('game-ui').classList.remove('active');
        document.getElementById('feedback-area').classList.remove('show');
        
        const endScreen = document.getElementById('end-screen');
        endScreen.classList.add('active');
        document.getElementById('final-score').innerText = score;
        
        const msg = document.getElementById('end-message');
        if (score >= 8) {
            msg.innerText = "Amazing money master! 🌟";
        } else if (score >= 5) {
            msg.innerText = "Good job! Keep practising! 👍";
        } else {
            msg.innerText = "Nice try! Let's play again! 💪";
        }

        createConfetti();
    }

    // --- Top Confetti Effect ---
    function createConfetti() {
        const colors = ['#1cb0f6', '#ffc800', '#58cc02', '#ff4b4b', '#a582ff'];
        for (let i = 0; i < 100; i++) {
            const conf = document.createElement('div');
            conf.className = 'confetti';
            conf.style.left = Math.random() * 100 + 'vw';
            conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            conf.style.animationDuration = (Math.random() * 2.5 + 2) + 's';
            conf.style.animationDelay = (Math.random() * 1.5) + 's';
            
            if(Math.random() > 0.5) conf.style.borderRadius = '50%';
            
            document.body.appendChild(conf);
        }
    }
