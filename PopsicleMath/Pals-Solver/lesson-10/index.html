<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ten Frames Game v3</title>
  
  <!-- Poppins Font for Kid-Friendly Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tone.js for Web Audio Synthesis -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            poppins: ['Poppins', 'sans-serif'],
          },
          colors: {
            // Duolingo-inspired color palette
            duo: {
              sky: '#1cb0f6',
              skyLight: '#78cfff',
              grass: '#58cc02',
              grassDark: '#46a302',
              red: '#ff4b4b',
              orange: '#ff9000',
              yellow: '#f6c000',
              purple: '#ce82ff',
            }
          }
        },
      },
    }
  </script>
  
  <style>
    /* Prevent default web behaviors for a native app feel */
    body {
      touch-action: none; /* Prevents scroll and pinch-zoom */
      overflow: hidden;
    }
    
    .no-select {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Bouncy animation for placing icons */
    .icon-animation {
      animation: popBounce 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    
    @keyframes popBounce {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Thick white outline for colorful text to pop against backgrounds */
    .text-outline {
      text-shadow: 
        3px 3px 0px #fff, -3px -3px 0px #fff, 
        3px -3px 0px #fff, -3px 3px 0px #fff, 
        0px 6px 0px rgba(0,0,0,0.15);
    }
    
    /* 3D Button Utility Classes */
    .btn-3d {
      border-bottom-width: 6px;
      transition: all 0.1s ease;
    }
    .btn-3d:active {
      border-bottom-width: 0px;
      transform: translateY(6px);
    }

    /* Responsive Grid Scaling Trick */
    .frames-container {
      aspect-ratio: 5 / 2.3;
    }

    /* Background Animations */
    @keyframes floatCloud {
      0% { transform: translateX(0); }
      50% { transform: translateX(20px); }
      100% { transform: translateX(0); }
    }
    @keyframes floatCloudReverse {
      0% { transform: translateX(0); }
      50% { transform: translateX(-15px); }
      100% { transform: translateX(0); }
    }
    @keyframes spinSun {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes swayTree {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(2deg); }
      75% { transform: rotate(-2deg); }
      100% { transform: rotate(0deg); }
    }

    .cloud-1 { animation: floatCloud 8s ease-in-out infinite; }
    .cloud-2 { animation: floatCloudReverse 12s ease-in-out infinite; }
    .tree-sway { animation: swayTree 6s ease-in-out infinite; transform-origin: bottom center; }
    
    /* Enhanced Gradients */
    .bg-gradient-sky {
        background: linear-gradient(to bottom, #78cfff 0%, #1cb0f6 100%);
    }
    .bg-gradient-grass {
        background: linear-gradient(to bottom, #58cc02 0%, #46a302 100%);
    }
  </style>
</head>

<body class="bg-gradient-sky font-poppins h-[100dvh] w-screen no-select relative overflow-hidden">
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
  <!-- Background Layer (z-0, absolute, unclickable) -->
  <div class="absolute inset-0 z-0 pointer-events-none flex flex-col justify-between">
    
    <!-- Top section: Sky Area -->
    <div class="relative w-full h-[60%]">
      
      <!-- Animated Sun with Rays -->
      <div class="absolute top-8 left-8 sm:top-12 sm:left-12">
          <!-- Sun Rays (Spinning) -->
          <svg class="absolute -top-4 -left-4 w-28 h-28 sm:w-36 sm:h-36 opacity-30" style="animation: spinSun 20s linear infinite;" viewBox="0 0 100 100">
              <path d="M50 0 L55 35 L100 50 L55 65 L50 100 L45 65 L0 50 L45 35 Z" fill="#f6c000"/>
          </svg>
          <!-- Sun Core -->
          <div class="relative w-20 h-20 sm:w-28 sm:h-28 bg-gradient-to-br from-[#ffe566] to-duo-yellow rounded-full border-4 border-[#e5b200] shadow-[0_0_50px_rgba(246,192,0,0.9)]"></div>
      </div>
      
      <!-- Fluffy Animated Clouds -->
      <div class="cloud-1 absolute top-16 left-[20%] opacity-95 scale-75 md:scale-100">
        <div class="w-32 h-10 bg-white rounded-full relative shadow-md">
          <div class="absolute -top-6 left-4 w-16 h-16 bg-white rounded-full"></div>
          <div class="absolute -top-4 left-16 w-12 h-12 bg-white rounded-full"></div>
        </div>
      </div>
      <div class="cloud-2 absolute top-32 right-[25%] opacity-90 scale-100 md:scale-125">
        <div class="w-40 h-12 bg-white rounded-full relative shadow-md">
          <div class="absolute -top-8 left-6 w-20 h-20 bg-white rounded-full"></div>
          <div class="absolute -top-6 left-20 w-16 h-16 bg-white rounded-full"></div>
        </div>
      </div>
      <div class="cloud-1 absolute top-8 right-[10%] opacity-80 scale-50 md:scale-75" style="animation-delay: -3s;">
        <div class="w-32 h-10 bg-white rounded-full relative shadow-md">
          <div class="absolute -top-6 left-4 w-16 h-16 bg-white rounded-full"></div>
        </div>
      </div>

      <!-- Colorful Rainbow -->
      <svg class="absolute bottom-0 left-1/2 transform -translate-x-1/2 w-[95%] md:w-[70%] max-h-[80%] opacity-65" viewBox="0 0 200 100" preserveAspectRatio="none">
        <path d="M 5 100 A 95 95 0 0 1 195 100" fill="none" stroke="#ce82ff" stroke-width="8" stroke-linecap="round"/>
        <path d="M 17 100 A 83 83 0 0 1 183 100" fill="none" stroke="#1cb0f6" stroke-width="8" stroke-linecap="round"/>
        <path d="M 29 100 A 71 71 0 0 1 171 100" fill="none" stroke="#58cc02" stroke-width="8" stroke-linecap="round"/>
        <path d="M 41 100 A 59 59 0 0 1 159 100" fill="none" stroke="#f6c000" stroke-width="8" stroke-linecap="round"/>
        <path d="M 53 100 A 47 47 0 0 1 147 100" fill="none" stroke="#ff9000" stroke-width="8" stroke-linecap="round"/>
        <path d="M 65 100 A 35 35 0 0 1 135 100" fill="none" stroke="#ff4b4b" stroke-width="8" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- Bottom section: Grass Area -->
    <div class="relative w-full h-[40%] bg-gradient-grass border-t-[12px] sm:border-t-[20px] border-[#388202] overflow-hidden shadow-[inset_0_10px_20px_rgba(0,0,0,0.1)]" style="border-radius: 60% 60% 0 0 / 20% 20% 0 0;">
      
      <!-- Decorative Swaying Trees -->
      <div class="tree-sway absolute top-4 left-[10%] sm:left-[15%]">
        <div class="w-5 h-16 bg-gradient-to-r from-[#6b350f] to-[#8B4513] mx-auto rounded-md shadow-sm"></div>
        <div class="w-24 h-24 bg-gradient-to-br from-[#32CD32] to-[#228B22] rounded-full absolute -top-16 -left-9 shadow-lg"></div>
        <div class="w-20 h-20 bg-gradient-to-br from-[#3fe03f] to-[#32CD32] rounded-full absolute -top-20 left-2 shadow-sm"></div>
      </div>
      
      <div class="tree-sway absolute top-12 right-[5%] sm:right-[15%] scale-125 sm:scale-150" style="animation-delay: -2s;">
        <div class="w-4 h-14 bg-gradient-to-r from-[#6b350f] to-[#8B4513] mx-auto rounded-sm shadow-sm"></div>
        <div class="w-20 h-20 bg-gradient-to-br from-[#32CD32] to-[#228B22] rounded-full absolute -top-14 -left-8 shadow-lg"></div>
        <div class="w-16 h-16 bg-gradient-to-br from-[#3fe03f] to-[#32CD32] rounded-full absolute -top-16 left-0 shadow-sm"></div>
      </div>
      
      <!-- Scattered Flowers with subtle hover/sway effect -->
      <div class="tree-sway absolute top-8 left-[35%] text-2xl sm:text-3xl drop-shadow-lg transform -rotate-12" style="animation-duration: 4s;">🌸</div>
      <div class="tree-sway absolute top-24 left-[20%] text-xl sm:text-2xl drop-shadow-lg transform rotate-12" style="animation-duration: 5s;">🌼</div>
      <div class="tree-sway absolute top-14 left-[60%] text-3xl sm:text-4xl drop-shadow-lg" style="animation-duration: 4.5s;">🌺</div>
      <div class="tree-sway absolute top-8 right-[35%] text-xl sm:text-2xl drop-shadow-lg transform -rotate-12" style="animation-duration: 5.5s;">🌷</div>
      <div class="tree-sway absolute top-20 right-[25%] text-2xl sm:text-3xl drop-shadow-lg transform rotate-6" style="animation-duration: 3.5s;">🌻</div>
    </div>
  </div>

  <!-- Foreground Layer (z-10, interactive) -->
  <div class="relative z-10 w-full h-full flex flex-col pt-3 pb-4 px-2 sm:px-6 max-w-7xl mx-auto">
      
      <!-- Header: Stats and Logo Placeholder -->
      <header class="flex justify-between items-start shrink-0 h-16 sm:h-20 w-full">
          <!-- Total Dots Display -->
          <div class="bg-white/95 backdrop-blur rounded-2xl px-6 py-3 border-2 border-b-4 border-slate-200 text-xl sm:text-2xl font-extrabold text-slate-500 shadow-md flex items-center transform transition-transform" id="total-box">
              Total: <span id="total-count" class="ml-3 text-duo-sky text-3xl sm:text-4xl">0</span>
          </div>
          
          <!-- Top Right Corner explicitly left empty for Logo insertion -->
          <div class="w-24 h-16 sm:w-32 sm:h-20" id="logo-placeholder"></div>
      </header>

      <!-- Main Game Workspace: Auto-scaling flex container to ensure no scrolling -->
      <main class="flex-grow flex items-center justify-center min-h-0 w-full px-1 mt-4 sm:mt-0">
        
        <!-- Wrapper strictly constrains max dimensions while preserving grid layout -->
        <div class="w-full max-w-5xl max-h-full flex flex-col justify-center items-center">
          
          <!-- Responsive Grid for 4 Ten Frames (1 col on small mobile, 2 cols on tablets/desktop) -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3 sm:gap-6 w-full justify-items-center">
            
            <!-- Frame 1 -->
            <div class="w-full max-w-[450px] bg-white/95 backdrop-blur-sm rounded-3xl p-2 sm:p-4 shadow-lg border-4 border-b-8 border-duo-sky flex flex-col justify-center">
               <div class="frames-container w-full grid grid-cols-5 grid-rows-2 gap-1 sm:gap-2">
                 <div id="grid-0" class="contents"></div>
               </div>
            </div>
            
            <!-- Frame 2 -->
            <div class="w-full max-w-[450px] bg-white/95 backdrop-blur-sm rounded-3xl p-2 sm:p-4 shadow-lg border-4 border-b-8 border-duo-red flex flex-col justify-center">
               <div class="frames-container w-full grid grid-cols-5 grid-rows-2 gap-1 sm:gap-2">
                 <div id="grid-1" class="contents"></div>
               </div>
            </div>
            
            <!-- Frame 3 -->
            <div class="w-full max-w-[450px] bg-white/95 backdrop-blur-sm rounded-3xl p-2 sm:p-4 shadow-lg border-4 border-b-8 border-duo-grass flex flex-col justify-center">
               <div class="frames-container w-full grid grid-cols-5 grid-rows-2 gap-1 sm:gap-2">
                 <div id="grid-2" class="contents"></div>
               </div>
            </div>
            
            <!-- Frame 4 -->
            <div class="w-full max-w-[450px] bg-white/95 backdrop-blur-sm rounded-3xl p-2 sm:p-4 shadow-lg border-4 border-b-8 border-duo-purple flex flex-col justify-center">
               <div class="frames-container w-full grid grid-cols-5 grid-rows-2 gap-1 sm:gap-2">
                 <div id="grid-3" class="contents"></div>
               </div>
            </div>

          </div>
        </div>
      </main>

      <!-- Control Panel -->
      <footer class="shrink-0 flex flex-wrap justify-center items-center gap-3 sm:gap-6 mt-4">
          
          <!-- Realistic Icon Customizer -->
          <div class="bg-white/95 backdrop-blur-sm p-2 sm:p-3 rounded-3xl border-2 border-b-4 border-slate-200 shadow-md flex gap-2 sm:gap-3" id="icon-selector">
              <!-- Rendered via JS -->
          </div>

          <!-- Utility Actions -->
          <button onclick="clearAll(true)" class="btn-3d bg-slate-100 text-slate-600 border-slate-300 font-extrabold text-lg sm:text-xl py-2 px-4 sm:py-3 sm:px-6 rounded-2xl hover:bg-slate-200 flex items-center gap-2">
              🧹 Clear All
          </button>
          
          <!-- Repurposed TTS Button to read total count -->
          <button onclick="readTotal()" class="btn-3d bg-duo-orange border-[#d97a00] hover:bg-[#e68200] text-white font-extrabold text-lg sm:text-xl py-2 px-4 sm:py-3 sm:px-6 rounded-2xl flex items-center gap-2 shadow-lg">
              🔊 Read Total
          </button>

      </footer>
  </div>

  <script>
    // --- Application State & Configuration ---
    const TOTAL_FRAMES = 4;
    const CELLS_PER_FRAME = 10;
    
    // Core game state
    let appState = Array.from({length: TOTAL_FRAMES}, () => Array(CELLS_PER_FRAME).fill(0));
    
    // Icon configurations
    const icons = ['🍎', '🌟', '🐶', '🚗', '🎈'];
    let selectedIcon = '🍎';

    // --- Audio Synthesis Engine (Tone.js) ---
    let toneStarted = false;
    let popSynth, clearSynth;

    function initAudio() {
      if (toneStarted) return;
      Tone.start();
      
      // Sweet popping sound for adding dots
      popSynth = new Tone.Synth({
        oscillator: { type: 'sine' },
        envelope: { attack: 0.01, decay: 0.1, sustain: 0, release: 0.1 }
      }).toDestination();
      popSynth.volume.value = -8;

      // Whoosh/Sweep for clearing the board
      clearSynth = new Tone.MembraneSynth().toDestination();
      clearSynth.volume.value = -15;
      
      toneStarted = true;
    }

    // Initialize audio context on first user interaction anywhere
    document.addEventListener('pointerdown', initAudio, { once: true });

    // --- Text-To-Speech (TTS) ---
    function playTTS(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); // Stop current speech
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.85; // Slower for kids
        utterance.pitch = 1.3; // Higher, friendlier pitch
        window.speechSynthesis.speak(utterance);
      }
    }

    function readTotal() {
      let total = 0;
      appState.forEach(frame => frame.forEach(cell => total += cell));
      playTTS(`You have ${total}.`);
      
      // Animate the total box playfully
      const box = document.getElementById('total-box');
      box.classList.remove('scale-100');
      box.classList.add('scale-110', 'bg-blue-50');
      setTimeout(() => {
        box.classList.remove('scale-110', 'bg-blue-50');
        box.classList.add('scale-100');
      }, 300);
    }

    // --- Initialization & UI Building ---
    function init() {
      buildGrid();
      buildIconSelector();
      updateUI();
    }

    function buildGrid() {
      for (let f = 0; f < TOTAL_FRAMES; f++) {
        const gridElement = document.getElementById(`grid-${f}`);
        gridElement.innerHTML = ''; 

        for (let c = 0; c < CELLS_PER_FRAME; c++) {
          const cell = document.createElement('button');
          cell.id = `cell-${f}-${c}`;
          cell.type = 'button';
          // Creates identical square interactive zones
          cell.className = 'w-full h-full bg-white border-2 sm:border-4 border-slate-200 rounded-lg sm:rounded-xl flex items-center justify-center transition-all focus:outline-none hover:bg-slate-50 cursor-pointer shadow-sm relative overflow-visible';
          cell.setAttribute('aria-label', `Frame ${f + 1}, Cell ${c + 1}`);
          
          cell.onclick = () => {
            initAudio(); // Failsafe
            toggleCell(f, c);
          };

          gridElement.appendChild(cell);
        }
      }
    }

    function buildIconSelector() {
      const container = document.getElementById('icon-selector');
      container.innerHTML = '';
      
      icons.forEach(icon => {
        const btn = document.createElement('button');
        btn.id = `btn-icon-${icon}`;
        btn.className = `w-10 h-10 sm:w-14 sm:h-14 text-2xl sm:text-3xl bg-white border-2 border-b-4 rounded-xl flex items-center justify-center transition-all ${icon === selectedIcon ? 'border-duo-sky border-b-2 translate-y-[2px] bg-sky-50 scale-110' : 'border-slate-200 hover:bg-slate-50 active:translate-y-[2px] active:border-b-2'}`;
        btn.innerHTML = `<span class="drop-shadow-md pointer-events-none">${icon}</span>`;
        
        btn.onclick = () => {
          initAudio();
          if (toneStarted) popSynth.triggerAttackRelease("G4", "32n");
          setDotIcon(icon);
        };
        
        container.appendChild(btn);
      });
    }

    // --- Core Mechanics ---
    function toggleCell(frameIndex, cellIndex) {
      const isCurrentlyFilled = appState[frameIndex][cellIndex] === 1;
      appState[frameIndex][cellIndex] = isCurrentlyFilled ? 0 : 1;
      
      if (!isCurrentlyFilled && toneStarted) {
         // Add dot sound
         popSynth.triggerAttackRelease("C5", "32n");
      } else if (isCurrentlyFilled && toneStarted) {
         // Remove dot sound
         popSynth.triggerAttackRelease("G4", "32n");
      }
      
      updateUI();
    }

    function clearAll(playAudio = false) {
      appState = appState.map(frame => frame.map(() => 0));
      if (playAudio && toneStarted) {
         clearSynth.triggerAttackRelease("C2", "8n");
      }
      updateUI();
    }

    function setDotIcon(icon) {
      selectedIcon = icon;
      buildIconSelector(); // Re-render to update active styling
      updateUI(); // Apply new icon to existing dots
    }

    // --- Rendering & Feedback ---
    function updateUI() {
      let totalDots = 0;

      for (let f = 0; f < TOTAL_FRAMES; f++) {
        for (let c = 0; c < CELLS_PER_FRAME; c++) {
          const cell = document.getElementById(`cell-${f}-${c}`);
          const cellState = appState[f][c];
          
          cell.innerHTML = ''; // Clear contents

          if (cellState === 1) {
            totalDots++;
            // Render 3D emoji icon with pop animation
            cell.innerHTML = `<span class="text-3xl sm:text-4xl md:text-5xl drop-shadow-md icon-animation pointer-events-none">${selectedIcon}</span>`;
            cell.classList.add('bg-sky-50/50', 'border-sky-300');
            cell.classList.remove('border-slate-200');
          } else {
            cell.classList.remove('bg-sky-50/50', 'border-sky-300');
            cell.classList.add('border-slate-200');
          }
        }
      }
      
      // Update running total (visible to help kids count)
      const totalEl = document.getElementById('total-count');
      totalEl.innerText = totalDots;
      
      // Little bump animation on the total when it changes
      const totalBox = document.getElementById('total-box');
      totalBox.classList.add('scale-105');
      setTimeout(() => totalBox.classList.remove('scale-105'), 150);
    }

    // Bootstrap app
    window.onload = init;
  </script>
</body>
</html>
