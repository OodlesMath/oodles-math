<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Length Hunt - Version 3</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables for Duolingo-inspired colors */
        :root {
            --primary: #1CB0F6;      
            --primary-dark: #1899D6;
            --success: #58CC02;      
            --success-dark: #58A700;
            --danger: #FF4B4B;       
            --danger-dark: #EA2B2B;
            --warning: #FFC800;      
            --warning-dark: #E5B400;
            --text-main: #4A154B;    /* Cute deep purple for kids */
            --text-light: #777777;
            --bg-card: #FFFFFF;
            --bg-app: #DDF4FF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-app);
            overflow-y: auto; 
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        /* Beautiful Background Scenery */
        .scenery {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        .sky {
            position: absolute;
            top: 0;
            width: 100%;
            height: 65%;
            background: linear-gradient(180deg, #60C3FF 0%, #C4E8FB 100%);
        }

        .grass {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 35%;
            background: linear-gradient(180deg, #7CFC00 0%, #32CD32 100%);
            border-top: 8px solid #55BA45;
        }

        .sun {
            position: absolute;
            top: 8%;
            left: 8%; /* Moved to left */
            font-size: 90px;
            animation: pulse 4s infinite alternate;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.6));
        }

        .cloud {
            position: absolute;
            font-size: 70px;
            opacity: 0.95;
            animation: float linear infinite;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.05));
        }

        .rainbow {
            position: absolute;
            width: 500px;
            height: 250px;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 250px 250px 0 0;
            box-shadow: 
                inset 0 15px 0 rgba(255, 75, 75, 0.8), 
                inset 0 30px 0 rgba(255, 150, 0, 0.8), 
                inset 0 45px 0 rgba(255, 200, 0, 0.8), 
                inset 0 60px 0 rgba(88, 204, 2, 0.8), 
                inset 0 75px 0 rgba(28, 176, 246, 0.8);
            opacity: 0.5;
        }

        .decor {
            position: absolute;
            font-size: 45px;
            filter: drop-shadow(0 4px 2px rgba(0,0,0,0.15));
        }

        /* App Container & Screens */
        #app {
            position: relative;
            width: 100%;
            max-width: 700px;
            padding: 20px;
            z-index: 10;
            margin: auto;
        }

        .screen {
            display: none;
            width: 100%;
            background: var(--bg-card);
            border-radius: 30px;
            padding: 35px 25px;
            box-shadow: 0 12px 0 rgba(0, 0, 0, 0.1), 0 20px 30px rgba(0,0,0,0.1);
            text-align: center;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .screen.active {
            display: block;
        }

        /* Start Screen */
        .title {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(45deg, #FF4B4B, #FF9600);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            filter: drop-shadow(2px 3px 0px rgba(0,0,0,0.1));
        }

        .subtitle {
            font-size: 22px;
            color: #1899D6;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .mascot {
            font-size: 100px;
            margin: 20px 0 30px 0;
            display: inline-block;
            animation: bounce 2s infinite;
            filter: drop-shadow(0 10px 5px rgba(0,0,0,0.15));
        }

        /* Buttons */
        .btn {
            background-color: var(--success);
            color: white;
            font-size: 24px;
            font-weight: 800;
            padding: 16px 45px;
            border: none;
            border-radius: 20px;
            border-bottom: 8px solid var(--success-dark);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.1s;
            width: 85%;
            max-width: 320px;
            box-shadow: 0 5px 15px rgba(88, 204, 2, 0.4);
        }

        .btn:active {
            transform: translateY(8px);
            border-bottom: 0px solid var(--success-dark);
            margin-bottom: 8px; 
            box-shadow: 0 0 0 rgba(88, 204, 2, 0);
        }

        /* Game Screen */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 20px;
            font-weight: 800;
            color: #A0A0A0;
        }

        .score-display {
            color: var(--warning-dark);
            background: #FFF3C4;
            padding: 8px 20px;
            border-radius: 16px;
            border: 2px solid #FFE485;
        }

        .question-header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            min-height: 80px;
            background: #F4F4FD;
            padding: 15px 20px;
            border-radius: 20px;
            border: 2px solid #E5E5F7;
        }

        .question-text {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-main);
            line-height: 1.3;
        }

        .btn-speak {
            background: var(--primary);
            color: white;
            font-size: 26px;
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 18px;
            border-bottom: 6px solid var(--primary-dark);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.1s;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(28, 176, 246, 0.3);
        }

        .btn-speak:active {
            transform: translateY(6px);
            border-bottom: 0;
            margin-bottom: 6px;
            box-shadow: none;
        }

        /* Options */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .option {
            background: white;
            border: 3px solid #E5E5E5;
            border-bottom: 6px solid #E5E5E5;
            border-radius: 20px;
            padding: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .option:hover {
            background: #F9FAFB;
            border-color: #D1D5DB;
            transform: scale(1.01);
        }

        .option:active {
            transform: scale(0.99) translateY(4px);
            border-bottom-width: 2px;
            margin-bottom: 4px;
        }

        /* Visual track for comparing length */
        .option-inner {
            display: flex;
            align-items: center;
            width: 100%;
            height: 80px; /* Increased height for thicker realistic icons */
            background: #F3F4F6;
            border-radius: 12px;
            padding-left: 20px;
            border-left: 4px dashed #9CA3AF; 
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.04);
            position: relative;
        }

        /* States */
        .option.correct {
            background: #D7FFB8;
            border-color: var(--success);
            border-bottom-color: var(--success-dark);
            pointer-events: none;
        }

        .option.wrong {
            background: #FFD4D4;
            border-color: var(--danger);
            border-bottom-color: var(--danger-dark);
            animation: shake 0.4s;
        }

        .feedback-msg {
            height: 35px;
            font-size: 24px;
            font-weight: 800;
            margin-top: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* Confetti */
        #confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            top: -20px;
            width: 15px;
            height: 30px;
            border-radius: 6px;
            animation: fall linear forwards;
        }

        /* Animations */
        @keyframes float {
            0% { transform: translateX(-150px); }
            100% { transform: translateX(110vw); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(720deg); }
        }

        /* Responsive Tweaks */
        @media (max-width: 500px) {
            .screen { padding: 25px 15px; border-radius: 24px;}
            .title { font-size: 36px; }
            .question-text { font-size: 22px; }
            .option-inner { height: 70px; padding-left: 10px; }
            .btn-speak { width: 50px; height: 50px; font-size: 20px;}
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- Background Scenery -->
    <div class="scenery">
        <div class="sky"></div>
        <div class="rainbow"></div>
        <div class="sun">☀️</div>
        <div class="cloud" style="top: 8%; left: 35%; animation-duration: 30s;">☁️</div>
        <div class="cloud" style="top: 20%; left: 70%; font-size: 90px; animation-duration: 40s;">☁️</div>
        <div class="cloud" style="top: 15%; left: 5%; font-size: 60px; animation-duration: 25s;">☁️</div>
        
        <div class="grass"></div>
        <div class="decor" style="left: 5%; bottom: 22%;">🌳</div>
        <div class="decor" style="right: 10%; bottom: 25%; font-size: 60px;">🌲</div>
        <div class="decor" style="left: 15%; bottom: 12%;">🌸</div>
        <div class="decor" style="left: 25%; bottom: 8%;">🌷</div>
        <div class="decor" style="right: 20%; bottom: 10%;">🌼</div>
        <div class="decor" style="left: 45%; bottom: 5%; font-size: 35px;">🌻</div>
        <div class="decor" style="right: 40%; bottom: 18%;">🍄</div>
    </div>

    <!-- App Container -->
    <div id="app">
        
        <!-- START SCREEN -->
        <div id="screen-start" class="screen active">
            <h1 class="title">Length Hunt</h1>
            <p class="subtitle">Look carefully. Find the correct object!</p>
            <div class="mascot">📏✨</div>
            <br>
            <button class="btn" onclick="startGame()">Play</button>
        </div>

        <!-- GAME SCREEN -->
        <div id="screen-game" class="screen">
            <div class="top-bar">
                <div class="progress">Question <span id="q-num">1</span> / 10</div>
                <div class="score-display">Score: <span id="score">0</span></div>
            </div>

            <div class="question-header">
                <h2 id="question-text" class="question-text">Question goes here?</h2>
                <button id="btn-speak" class="btn-speak">🔊</button>
            </div>

            <div id="options-container" class="options-container">
                <!-- Options injected via JS -->
            </div>

            <div id="feedback-msg" class="feedback-msg">Great job!</div>
        </div>

        <!-- END SCREEN -->
        <div id="screen-end" class="screen">
            <h1 class="title" style="margin-bottom: 20px;">Game Complete!</h1>
            <div class="mascot" id="end-emoji">🏆</div>
            <h2 style="font-size: 32px; margin-bottom: 15px; font-weight: 800; color: #4A154B;">Your Score: <span id="final-score" style="color: var(--primary);">0 / 10</span></h2>
            <p id="final-msg" class="subtitle" style="color: var(--success); font-size: 26px;"></p>
            <button class="btn" onclick="startGame()">Play Again</button>
        </div>

    </div>

    <!-- Confetti Layer -->
    <div id="confetti-container"></div>

    <script>
        // --- Game Data ---
        // Questions looking for "longer" or "shorter" have 2 options. "longest" or "shortest" have 3 options.
        const questions = [
            { q: "Which one is longer?", obj: "pen", lengths: [{v:50, id:'short'}, {v:100, id:'long'}], correct: 'long' },
            { q: "Which one is shorter?", obj: "ruler", lengths: [{v:100, id:'long'}, {v:50, id:'short'}], correct: 'short' },
            { q: "Which object is the longest?", obj: "crayon", lengths: [{v:40, id:'short'}, {v:70, id:'medium'}, {v:100, id:'long'}], correct: 'long' },
            { q: "Which object is the shortest?", obj: "rope", lengths: [{v:100, id:'long'}, {v:70, id:'medium'}, {v:40, id:'short'}], correct: 'short' },
            { q: "Find the longer pencil.", obj: "pencil", lengths: [{v:50, id:'short'}, {v:100, id:'long'}], correct: 'long' },
            { q: "Find the shorter marker.", obj: "marker", lengths: [{v:100, id:'long'}, {v:50, id:'short'}], correct: 'short' },
            { q: "Which one is longer?", obj: "train", lengths: [{v:50, id:'short'}, {v:100, id:'long'}], correct: 'long' },
            { q: "Which one is shorter?", obj: "toothbrush", lengths: [{v:100, id:'long'}, {v:50, id:'short'}], correct: 'short' },
            { q: "Which object is the longest?", obj: "snake", lengths: [{v:100, id:'long'}, {v:40, id:'short'}, {v:70, id:'medium'}], correct: 'long' },
            { q: "Which object is the shortest?", obj: "ribbon", lengths: [{v:70, id:'medium'}, {v:100, id:'long'}, {v:40, id:'short'}], correct: 'short' }
        ];

        // --- State ---
        let currentQuestionIndex = 0;
        let score = 0;
        let isAnimating = false;
        let audioCtx;

        // --- Audio System (Web Audio API) ---
        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playTone(freq, type, duration, vol = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playClick() { playTone(600, 'sine', 0.1); }
        function playCorrect() {
            playTone(440, 'sine', 0.15); // A4
            setTimeout(() => playTone(554, 'sine', 0.15), 100); // C#5
            setTimeout(() => playTone(659, 'sine', 0.25), 200); // E5
        }
        function playWrong() {
            playTone(300, 'triangle', 0.2, 0.15);
            setTimeout(() => playTone(250, 'triangle', 0.3, 0.15), 150);
        }
        function playWin() {
            [523, 659, 783, 1046, 1046].forEach((f, i) => {
                setTimeout(() => playTone(f, 'square', 0.2, 0.05), i * 150);
            });
        }

        // --- Text-to-Speech ---
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85; // Slower, child-friendly
                utterance.pitch = 1.2; // Cheerful pitch
                window.speechSynthesis.speak(utterance);
            }
        }

        document.getElementById('btn-speak').addEventListener('click', () => {
            playClick();
            speak(questions[currentQuestionIndex].q);
        });

        // --- Core Logic ---
        function startGame() {
            initAudio();
            playClick();
            currentQuestionIndex = 0;
            score = 0;
            document.getElementById('confetti-container').innerHTML = '';
            
            switchScreen('screen-game');
            loadQuestion();
        }

        function loadQuestion() {
            if (currentQuestionIndex >= questions.length) {
                endGame();
                return;
            }

            isAnimating = false;
            const q = questions[currentQuestionIndex];
            
            // Update UI
            document.getElementById('q-num').innerText = currentQuestionIndex + 1;
            document.getElementById('score').innerText = score;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('feedback-msg').style.opacity = '0';

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            // Shuffle options visually
            const shuffledLengths = [...q.lengths].sort(() => Math.random() - 0.5);

            shuffledLengths.forEach(lenObj => {
                const optDiv = document.createElement('div');
                optDiv.className = 'option';
                optDiv.onclick = () => checkAnswer(optDiv, lenObj.id, q.correct);

                const innerDiv = document.createElement('div');
                innerDiv.className = 'option-inner';
                innerDiv.innerHTML = generateObjectHTML(q.obj, lenObj.v);

                optDiv.appendChild(innerDiv);
                optionsContainer.appendChild(optDiv);
            });
        }

        function checkAnswer(optDiv, selectedId, correctId) {
            if (isAnimating) return;

            if (selectedId === correctId) {
                isAnimating = true;
                optDiv.classList.add('correct');
                playCorrect();
                score++;
                document.getElementById('score').innerText = score;

                const msgs = ["Great job!", "You got it!", "Awesome!", "Perfect!"];
                showFeedback(msgs[Math.floor(Math.random() * msgs.length)], 'var(--success)');

                setTimeout(() => {
                    currentQuestionIndex++;
                    loadQuestion();
                }, 1500);
            } else {
                optDiv.classList.add('wrong');
                playWrong();
                showFeedback("Try again!", 'var(--danger)');
                
                setTimeout(() => {
                    optDiv.classList.remove('wrong');
                    document.getElementById('feedback-msg').style.opacity = '0';
                }, 1000);
            }
        }

        function showFeedback(text, color) {
            const msgEl = document.getElementById('feedback-msg');
            msgEl.innerText = text;
            msgEl.style.color = color;
            msgEl.style.opacity = '1';
        }

        function endGame() {
            switchScreen('screen-end');
            
            let msg = "";
            let emoji = "🏆";
            if(score === 10) { msg = "Amazing! You are a length expert!"; emoji = "🌟"; }
            else if(score >= 7) { msg = "Great job! You can compare lengths!"; emoji = "🎉"; }
            else if(score >= 4) { msg = "Good try! Let's practice more!"; emoji = "👍"; }
            else { msg = "Keep going! You can do it!"; emoji = "💪"; }

            document.getElementById('final-score').innerText = score + " / 10";
            document.getElementById('final-msg').innerText = msg;
            document.getElementById('end-emoji').innerText = emoji;

            playWin();
            createConfetti();
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // --- NEW! Fix for Flat Grey Lines: Fully Solid 3-Slice HTML/CSS Architecture ---
        function generateObjectHTML(type, lengthPct) {
            let html = '';
            
            // Train emoji logic
            if (type === 'train') {
                let cars = lengthPct === 100 ? 3 : (lengthPct >= 70 ? 2 : 1);
                let trainHtml = '<div style="font-size: 45px; display: flex; align-items: center; line-height: 1; filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.3));">🚂';
                for(let i=0; i<cars; i++) trainHtml += '🚃';
                trainHtml += '</div>';
                return `<div style="width: ${lengthPct}%; min-width: 30%; display: flex; align-items: center;">${trainHtml}</div>`;
            }

            // Beautiful, solid, robust objects utilizing precise flexbox sizing
            switch(type) {
                case 'pen':
                    html = `
                        <div style="flex: 0 0 25px; height: 22px; background: #0097E6; border-radius: 11px 0 0 11px; box-shadow: inset 0 5px rgba(255,255,255,0.4), inset 0 -4px rgba(0,0,0,0.2);"></div>
                        <div style="flex: 1 1 auto; height: 22px; background: #DCDDE1; box-shadow: inset 0 6px rgba(255,255,255,0.8), inset 0 -4px rgba(0,0,0,0.1); border-top: 1px solid #B2BEC3; border-bottom: 1px solid #B2BEC3;"></div>
                        <div style="flex: 0 0 25px; height: 22px; background: #0097E6; clip-path: polygon(0 0, 100% 50%, 0 100%);"></div>`;
                    break;
                case 'pencil':
                    html = `
                        <div style="flex: 0 0 35px; height: 24px; display: flex;">
                            <div style="flex: 1; background: #FF9F43; border-radius: 6px 0 0 6px; box-shadow: inset 0 5px rgba(255,255,255,0.4), inset 0 -4px rgba(0,0,0,0.2);"></div>
                            <div style="width: 12px; background: #A4B0BE; border-left: 2px solid #747D8C; border-right: 2px solid #747D8C;"></div>
                        </div>
                        <div style="flex: 1 1 auto; height: 24px; background: #FDCB6E; box-shadow: inset 0 6px rgba(255,255,255,0.5), inset 0 -4px rgba(0,0,0,0.1); display: flex; flex-direction: column; justify-content: space-evenly;">
                            <div style="height: 1px; background: #E1B12C;"></div>
                            <div style="height: 1px; background: #E1B12C;"></div>
                        </div>
                        <div style="flex: 0 0 30px; height: 24px; background: #FFEAA7; clip-path: polygon(0 0, 100% 50%, 0 100%); position: relative;">
                            <div style="position: absolute; right: 0; top: 35%; height: 30%; width: 10px; background: #2D3436;"></div>
                        </div>`;
                    break;
                case 'marker':
                    html = `
                        <div style="flex: 0 0 20px; height: 30px; background: #9B59B6; border-radius: 6px 0 0 6px; box-shadow: inset 0 5px rgba(255,255,255,0.3), inset 0 -4px rgba(0,0,0,0.2);"></div>
                        <div style="flex: 1 1 auto; height: 30px; background: #FFF; border-top: 2px solid #E2E8F0; border-bottom: 2px solid #E2E8F0; display: flex; align-items: center; justify-content: center;">
                            <div style="width: 80%; height: 10px; background: #F1F5F9; border-radius: 5px;"></div>
                        </div>
                        <div style="flex: 0 0 35px; height: 34px; background: #9B59B6; border-radius: 0 8px 8px 0; margin-left: -2px; box-shadow: inset 0 5px rgba(255,255,255,0.3), inset 0 -4px rgba(0,0,0,0.2); z-index: 1;"></div>`;
                    break;
                case 'crayon':
                    html = `
                        <div style="flex: 0 0 15px; height: 28px; background: #E84118; border-radius: 6px 0 0 6px; box-shadow: inset 0 5px rgba(255,255,255,0.3), inset 0 -4px rgba(0,0,0,0.2);"></div>
                        <div style="flex: 1 1 auto; height: 28px; background: #E84118; border-top: 4px solid #C23616; border-bottom: 4px solid #C23616; display: flex; align-items: center; justify-content: center;">
                            <span style="color: rgba(255,255,255,0.9); font-size: 11px; font-weight: 800; letter-spacing: 3px;">CRAYON</span>
                        </div>
                        <div style="flex: 0 0 25px; height: 20px; background: #E84118; clip-path: polygon(0 0, 100% 30%, 100% 70%, 0 100%); margin-left: 2px;"></div>`;
                    break;
                case 'ruler':
                    html = `
                        <div style="flex: 1 1 100%; height: 36px; background: #F1C40F; border: 2px solid #F39C12; border-radius: 4px; box-shadow: inset 0 5px rgba(255,255,255,0.6), inset 0 -4px rgba(0,0,0,0.1); position: relative;">
                            <div style="position: absolute; top: 0; left: 0; right: 0; height: 12px; background-image: repeating-linear-gradient(to right, #333 0, #333 2px, transparent 2px, transparent 25px);"></div>
                            <div style="position: absolute; bottom: 0; left: 0; right: 0; height: 8px; background-image: repeating-linear-gradient(to right, #333 0, #333 2px, transparent 2px, transparent 12px);"></div>
                        </div>`;
                    break;
                case 'rope':
                    html = `
                        <div style="flex: 1 1 100%; height: 22px; background: repeating-linear-gradient(45deg, #E67E22 0, #E67E22 10px, #F39C12 10px, #F39C12 20px); border-radius: 11px; box-shadow: inset 0 -5px 6px rgba(0,0,0,0.3), inset 0 5px 5px rgba(255,255,255,0.4);"></div>`;
                    break;
                case 'toothbrush':
                    html = `
                        <div style="flex: 1 1 auto; height: 16px; background: #00CEC9; border-radius: 8px 0 0 8px; box-shadow: inset 0 5px rgba(255,255,255,0.4), inset 0 -4px rgba(0,0,0,0.2);"></div>
                        <div style="flex: 0 0 45px; height: 20px; background: #00CEC9; border-radius: 0 10px 10px 0; position: relative; box-shadow: inset 0 -4px rgba(0,0,0,0.2);">
                            <div style="position: absolute; bottom: 100%; left: 5px; width: 35px; height: 16px; background: #FFF; border-radius: 4px 4px 0 0; background-image: repeating-linear-gradient(to right, #DFE6E9 0, #DFE6E9 2px, transparent 2px, transparent 5px);"></div>
                        </div>`;
                    break;
                case 'snake':
                    html = `
                        <div style="flex: 0 0 20px; height: 18px; background: #55E6C1; clip-path: polygon(100% 0, 0 50%, 100% 100%);"></div>
                        <div style="flex: 1 1 auto; height: 18px; background: repeating-linear-gradient(90deg, #55E6C1 0, #55E6C1 12px, #10AC84 12px, #10AC84 24px); border-radius: 9px; box-shadow: inset 0 -4px rgba(0,0,0,0.2), inset 0 4px rgba(255,255,255,0.3);"></div>
                        <div style="flex: 0 0 30px; height: 26px; background: #10AC84; border-radius: 13px 16px 16px 13px; position: relative; box-shadow: inset 0 -4px rgba(0,0,0,0.2);">
                            <div style="position: absolute; top: 4px; right: 8px; width: 8px; height: 8px; background: #FFF; border-radius: 50%;">
                                <div style="width: 4px; height: 4px; background: #222; margin: 2px; border-radius: 50%;"></div>
                            </div>
                            <div style="position: absolute; top: 14px; right: -8px; width: 12px; height: 6px; background: #FF5252; clip-path: polygon(0 20%, 100% 0, 70% 50%, 100% 100%, 0 80%);"></div>
                        </div>`;
                    break;
                case 'ribbon':
                    html = `
                        <div style="flex: 0 0 20px; height: 26px; background: #FD79A8; clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%, 50% 50%);"></div>
                        <div style="flex: 1 1 auto; height: 22px; background: #E84393; border-top: 2px dashed #FFF; border-bottom: 2px dashed #FFF;"></div>
                        <div style="flex: 0 0 20px; height: 26px; background: #FD79A8; clip-path: polygon(0 0, 100% 0, 50% 50%, 100% 100%, 0 100%);"></div>`;
                    break;
            }
            
            // This wrapper guarantees items are fully rendered and thick
            return `<div style="width: ${lengthPct}%; min-width: 30%; display: flex; align-items: center; filter: drop-shadow(2px 5px 4px rgba(0,0,0,0.25)); transition: transform 0.3s;">${html}</div>`;
        }

        // Confetti effect
        function createConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#58CC02', '#1CB0F6', '#FF4B4B', '#FFC800', '#CE82FF', '#FF9600'];
            
            for(let i = 0; i < 100; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animationDuration = (Math.random() * 3 + 2) + 's';
                conf.style.animationDelay = (Math.random() * 1) + 's';
                
                // Randomly rotate to make it look realistic
                conf.style.transform = `rotate(${Math.random() * 360}deg)`;
                
                container.appendChild(conf);
            }
        }
    </script>
</body>
</html>
