<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fifty Chart Number Hop - Ver 4</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #3c3c3c;
            --primary: #1cb0f6;
            --primary-shadow: #1899d6;
            --correct: #58cc02;
            --correct-shadow: #58a700;
            --wrong: #ff4b4b;
            --wrong-shadow: #ea1515;
            --accent: #ffc800;
            --accent-shadow: #e5b400;
            --cell-border: #e5e5e5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: 'Poppins', sans-serif;
        }

        body {
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
        }

        /* Beautiful Scenery Background */
        .scenery-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        /* Screens */
        .screen {
            display: none;
            width: 100%;
            max-width: 1050px;
            padding: 20px;
            text-align: center;
            z-index: 10;
        }
        .screen.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* UI Elements */
        h1 {
            font-size: 3rem;
            font-weight: 800;
            color: var(--primary);
            text-shadow: 3px 3px 0px white, 0px 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        .btn {
            display: inline-block;
            background-color: var(--primary);
            color: white;
            font-size: 1.5rem;
            font-weight: 800;
            padding: 15px 40px;
            border-radius: 20px;
            border: none;
            border-bottom: 6px solid var(--primary-shadow);
            cursor: pointer;
            transition: all 0.1s;
            text-transform: uppercase;
            letter-spacing: 1px;
            outline: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .btn:active:not(:disabled) {
            transform: translateY(6px);
            border-bottom: 0px solid var(--primary-shadow);
            margin-bottom: 6px;
            box-shadow: 0 0px 0px rgba(0,0,0,0);
        }
        
        .btn.correct { background-color: var(--correct); border-bottom-color: var(--correct-shadow); }
        .btn.wrong { background-color: var(--wrong); border-bottom-color: var(--wrong-shadow); animation: shake 0.4s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }

        /* Game Layout */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 15px 30px;
            border-radius: 24px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
        }
        .game-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .score-board {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--correct-shadow);
            background: #e5ffd6;
            padding: 8px 24px;
            border-radius: 16px;
            border: 3px solid var(--correct);
            box-shadow: 0 4px 0 var(--correct-shadow);
        }

        .game-content {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: stretch;
        }

        /* Chart Section */
        .chart-section {
            flex: 1 1 450px;
            max-width: 550px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            position: relative;
            backdrop-filter: blur(5px);
        }

        .fifty-chart {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 8px;
            position: relative;
        }

        /* Dashed Line SVG overlay */
        .hop-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 3;
        }

        .cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 800;
            color: #555;
            border-radius: 12px;
            border: 2px solid var(--cell-border);
            transition: all 0.3s;
            position: relative;
            background-color: white;
            z-index: 2;
        }
        
        /* Vibrant Candy Colors for Chart Rows */
        .cell:nth-child(-n+10) { background-color: #ffd6e5; border-color: #ff99bf; box-shadow: 0 4px 0 #ff99bf;} /* Pink */
        .cell:nth-child(n+11):nth-child(-n+20) { background-color: #ffe8b3; border-color: #ffb347; box-shadow: 0 4px 0 #ffb347;} /* Orange */
        .cell:nth-child(n+21):nth-child(-n+30) { background-color: #e2f0cb; border-color: #b5d58f; box-shadow: 0 4px 0 #b5d58f;} /* Green */
        .cell:nth-child(n+31):nth-child(-n+40) { background-color: #c5ebfe; border-color: #8ccdef; box-shadow: 0 4px 0 #8ccdef;} /* Blue */
        .cell:nth-child(n+41):nth-child(-n+50) { background-color: #ebd4f4; border-color: #c89bd7; box-shadow: 0 4px 0 #c89bd7;} /* Purple */

        .cell.highlight-start {
            background-color: var(--accent) !important;
            color: white !important;
            border-color: var(--accent-shadow) !important;
            box-shadow: 0 4px 0 var(--accent-shadow), 0 0 15px rgba(255, 200, 0, 0.5) !important;
            transform: scale(1.1);
            z-index: 4;
        }
        .cell.highlight-end {
            background-color: var(--correct) !important;
            color: white !important;
            border-color: var(--correct-shadow) !important;
            box-shadow: 0 4px 0 var(--correct-shadow), 0 0 15px rgba(88, 204, 2, 0.5) !important;
            transform: scale(1.1);
            z-index: 4;
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.25); }
            100% { transform: scale(1.1); }
        }

        /* The Animated Token & Arc Bounce Logic */
        .token {
            position: absolute;
            width: 50px;
            height: 50px;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 6;
            transition: transform 0.6s linear; 
            pointer-events: none;
        }
        .token-inner {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .token-inner svg {
            width: 120%;
            height: 120%;
            filter: drop-shadow(0 6px 4px rgba(0,0,0,0.25));
        }
        
        .token-inner.bounce {
            animation: hopBounceArc 0.6s cubic-bezier(0.3, 1, 0.7, 1);
        }
        @keyframes hopBounceArc {
            0% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-35px) scale(1.15); } 
            100% { transform: translateY(0) scale(1); }
        }

        /* Question Section */
        .question-section {
            flex: 1 1 320px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .question-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(5px);
        }

        .equation {
            font-size: 3.5rem;
            font-weight: 800;
            background: #ffffff;
            padding: 10px 30px;
            border-radius: 20px;
            border: 4px dashed #ffb347;
            width: 100%;
            text-align: center;
        }

        .question-text-container {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #eaf6ff;
            padding: 15px;
            border-radius: 16px;
            border: 3px solid #8ccdef;
            width: 100%;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            color: #444;
            text-align: left;
            line-height: 1.4;
            flex: 1;
        }

        .speaker-btn {
            background: var(--accent);
            border: none;
            border-bottom: 5px solid var(--accent-shadow);
            border-radius: 50%;
            width: 55px;
            height: 55px;
            min-width: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
        }
        .speaker-btn:active {
            transform: translateY(5px);
            border-bottom: 0px;
            margin-bottom: 5px;
        }
        .speaker-btn svg {
            width: 28px;
            height: 28px;
            fill: white;
            margin-left: 3px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            position: relative;
        }
        
        .option-btn {
            background-color: #f8faff;
            color: var(--primary-shadow);
            font-size: 2rem;
            font-weight: 800;
            padding: 15px;
            border-radius: 20px;
            border: 3px solid #d0e3ff;
            border-bottom: 6px solid #b0d0ff;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .option-btn:hover:not(:disabled) {
            background-color: #eaf1ff;
        }
        .option-btn:active:not(:disabled) {
            transform: translateY(6px);
            border-bottom-width: 0px;
            margin-bottom: 6px;
        }
        
        /* Make disabled wrong buttons look locked */
        .option-btn.wrong:disabled {
            opacity: 0.7;
            background-color: var(--wrong);
            color: white;
            border-color: var(--wrong-shadow);
            border-bottom-width: 6px;
        }
        
        /* Correct button style */
        .option-btn.correct:disabled {
            background-color: var(--correct);
            color: white;
            border-color: var(--correct-shadow);
            border-bottom-width: 6px;
            opacity: 1;
        }

        /* Next Button - Prominent Styling */
        #next-btn {
            display: none;
            width: 100%;
            margin-top: 10px;
            background-color: var(--correct);
            border-bottom-color: var(--correct-shadow);
            animation: pop 0.4s ease;
        }

        /* End Screen */
        .end-card {
            background: var(--card-bg);
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: inline-block;
            backdrop-filter: blur(5px);
        }
        .end-score {
            font-size: 4.5rem;
            font-weight: 800;
            color: var(--correct);
            margin: 20px 0;
            text-shadow: 2px 2px 0 var(--correct-shadow);
        }

        /* Confetti Canvas */
        #confetti {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        /* Responsive */
        @media (max-width: 850px) {
            h1 { font-size: 2.2rem; }
            .game-header { padding: 12px 20px; }
            .game-title { font-size: 1.5rem; }
            .cell { font-size: 1.1rem; border-radius: 10px; border-width: 2px;}
            .token { width: 40px; height: 40px; }
            .equation { font-size: 2.5rem; padding: 10px 15px; }
            .option-btn { font-size: 1.6rem; padding: 12px; }
            .chart-section { padding: 15px; border-radius: 20px; }
            .fifty-chart { gap: 5px; }
        }
        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .game-header { flex-direction: column; gap: 10px; }
            .cell { font-size: 1rem; border-radius: 8px; border-width: 1.5px; box-shadow: 0 2px 0; }
            /* Repatch cell shadows for mobile */
            .cell:nth-child(-n+10) { box-shadow: 0 2px 0 #ff99bf;} 
            .cell:nth-child(n+11):nth-child(-n+20) { box-shadow: 0 2px 0 #ffb347;} 
            .cell:nth-child(n+21):nth-child(-n+30) { box-shadow: 0 2px 0 #b5d58f;} 
            .cell:nth-child(n+31):nth-child(-n+40) { box-shadow: 0 2px 0 #8ccdef;} 
            .cell:nth-child(n+41):nth-child(-n+50) { box-shadow: 0 2px 0 #c89bd7;} 
            
            .token { width: 32px; height: 32px; }
            .fifty-chart { gap: 4px; }
            .question-text { font-size: 1rem; }
            .speaker-btn { width: 45px; height: 45px; min-width: 45px; }
            .speaker-btn svg { width: 22px; height: 22px; }
            .equation { font-size: 2.2rem; }
            .end-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- Beautiful Duolingo-style Scenery Background -->
    <svg class="scenery-bg" preserveAspectRatio="xMidYMax slice" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#7fe0ff" />
                <stop offset="60%" stop-color="#d6f5ff" />
                <stop offset="100%" stop-color="#ffffff" />
            </linearGradient>
            <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="15" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
        </defs>
        <!-- Sky -->
        <rect width="1000" height="600" fill="url(#skyGrad)" />
        
        <!-- Rainbow -->
        <g opacity="0.6">
            <path d="M 50 600 A 450 450 0 0 1 950 600" fill="none" stroke="#ff9999" stroke-width="25"/>
            <path d="M 75 600 A 425 425 0 0 1 925 600" fill="none" stroke="#ffcc99" stroke-width="25"/>
            <path d="M 100 600 A 400 400 0 0 1 900 600" fill="none" stroke="#ffff99" stroke-width="25"/>
            <path d="M 125 600 A 375 375 0 0 1 875 600" fill="none" stroke="#99ff99" stroke-width="25"/>
            <path d="M 150 600 A 350 350 0 0 1 850 600" fill="none" stroke="#99ccff" stroke-width="25"/>
            <path d="M 175 600 A 325 325 0 0 1 825 600" fill="none" stroke="#cc99ff" stroke-width="25"/>
        </g>

        <!-- Sun -->
        <circle cx="850" cy="120" r="60" fill="#FFD700" filter="url(#glow)" />
        
        <!-- Clouds -->
        <path d="M 150 150 Q 180 120 220 150 Q 250 130 280 150 Q 320 180 280 200 L 150 200 Q 110 180 150 150 Z" fill="white" opacity="0.95"/>
        <path d="M 650 80 Q 680 50 720 80 Q 750 60 780 80 Q 820 110 780 130 L 650 130 Q 610 110 650 80 Z" fill="white" opacity="0.8"/>
        <path d="M 350 280 Q 370 250 400 280 Q 420 260 450 280 Q 480 300 450 320 L 350 320 Q 320 300 350 280 Z" fill="white" opacity="0.7"/>

        <!-- Grass Hills -->
        <path d="M -100 600 Q 250 350 600 600 Z" fill="#9ce67a"/>
        <path d="M 300 600 Q 700 300 1100 600 Z" fill="#75cf51"/>

        <!-- Background Trees & Flowers -->
        <circle cx="150" cy="500" r="15" fill="#ff4b4b"/>
        <circle cx="150" cy="500" r="6" fill="#ffc800"/>
        
        <circle cx="850" cy="550" r="12" fill="#cc99ff"/>
        <circle cx="850" cy="550" r="5" fill="#fff"/>
        
        <!-- Cute Tree -->
        <rect x="750" y="420" width="25" height="180" fill="#a0522d" rx="10"/>
        <circle cx="762" cy="420" r="70" fill="#4cb02f"/>
        <circle cx="715" cy="450" r="50" fill="#3d8f25"/>
        <circle cx="810" cy="460" r="45" fill="#58cc02"/>
    </svg>

    <!-- Confetti Overlay -->
    <canvas id="confetti"></canvas>

    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
        <div class="end-card">
            <h1>Fifty Chart<br>Number Hop</h1>
            <p style="font-size: 1.4rem; margin-bottom: 30px; color: #666; font-weight: 600;">Learn math by hopping!</p>
            <button class="btn" onclick="startGame()">Play Now</button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
        <div class="game-header">
            <div class="game-title">Number Hop</div>
            <div class="score-board" id="score-display">Score: 0 / 10</div>
        </div>

        <div class="game-content">
            <!-- Left: Fifty Chart -->
            <div class="chart-section">
                <!-- SVG Canvas for Dashed Hop Lines -->
                <svg id="hop-canvas" class="hop-canvas"></svg>

                <div class="fifty-chart" id="chart">
                    <!-- JS will populate 50 cells here -->
                    <div id="token" class="token">
                        <div class="token-inner" id="token-inner">
                            <!-- Cute Realistic 3D Star Token -->
                            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <defs>
                                    <radialGradient id="starGrad" cx="50%" cy="40%" r="60%">
                                        <stop offset="0%" stop-color="#fff59d"/>
                                        <stop offset="50%" stop-color="#ffc107"/>
                                        <stop offset="100%" stop-color="#ff9800"/>
                                    </radialGradient>
                                </defs>
                                <!-- Body -->
                                <path d="M50 5 L64 35 L98 40 L73 63 L79 95 L50 80 L21 95 L27 63 L2 40 L36 35 Z" fill="url(#starGrad)" stroke="#f57c00" stroke-width="4" stroke-linejoin="round"/>
                                <!-- Cheeks -->
                                <circle cx="35" cy="55" r="6" fill="#ff7043" opacity="0.6"/>
                                <circle cx="65" cy="55" r="6" fill="#ff7043" opacity="0.6"/>
                                <!-- Eyes -->
                                <circle cx="40" cy="45" r="5" fill="#3e2723"/>
                                <circle cx="60" cy="45" r="5" fill="#3e2723"/>
                                <circle cx="38" cy="43" r="2" fill="white"/>
                                <circle cx="58" cy="43" r="2" fill="white"/>
                                <!-- Smile -->
                                <path d="M 43 55 Q 50 62 57 55" stroke="#3e2723" stroke-width="3.5" fill="none" stroke-linecap="round"/>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Question and Answers -->
            <div class="question-section">
                <div class="question-card">
                    <div class="equation" id="equation-display"></div>
                    <div class="question-text-container">
                        <div class="question-text" id="question-text"></div>
                        <button class="speaker-btn" onclick="readQuestion()">
                            <!-- Cute Speaker Icon -->
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M13.5 3.5v17a.5.5 0 0 1-.82.38l-4.9-4.13H4a1.5 1.5 0 0 1-1.5-1.5v-6.5A1.5 1.5 0 0 1 4 7.25h3.78l4.9-4.13a.5.5 0 0 1 .82.38z" fill="#fff" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/>
                                <path d="M17.5 7.5c2 2.5 2 6.5 0 9" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
                                <path d="M20.5 4.5c4 4.5 4 10.5 0 15" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="options-grid" id="options-container">
                    <!-- Option buttons generated here -->
                </div>
                <button id="next-btn" class="btn" onclick="handleNext()">Next Question</button>
            </div>
        </div>
    </div>

    <!-- End Screen -->
    <div id="end-screen" class="screen">
        <div class="end-card">
            <h1>Great Job!</h1>
            <div class="end-score" id="final-score">8 / 10</div>
            <button class="btn" onclick="resetGame()">Play Again</button>
        </div>
    </div>

    <script>
        // --- AUDIO SYSTEM (Web Audio API) ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'click') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(700, now);
                osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'correct') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(500, now);
                osc.frequency.setValueAtTime(800, now + 0.15);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0.15, now + 0.2);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.35);
                osc.start(now);
                osc.stop(now + 0.35);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(120, now + 0.25);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.start(now);
                osc.stop(now + 0.25);
            } else if (type === 'hop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(550, now);
                osc.frequency.exponentialRampToValueAtTime(850, now + 0.1);
                gain.gain.setValueAtTime(0.08, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'tada') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.setValueAtTime(600, now + 0.15);
                osc.frequency.setValueAtTime(800, now + 0.3);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.8);
                osc.start(now);
                osc.stop(now + 0.8);
            }
        }

        function readQuestion() {
            playSound('click');
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
                // Strip HTML tags for clean reading
                const rawText = document.getElementById('question-text').innerHTML.replace(/<[^>]*>?/gm, '');
                const utterance = new SpeechSynthesisUtterance(rawText);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                utterance.pitch = 1.2; 
                window.speechSynthesis.speak(utterance);
            }
        }

        // --- GAME LOGIC ---
        const TOTAL_QUESTIONS = 10;
        const HOP_DURATION = 600; // Hopping speed
        let currentQuestionNum = 0;
        let score = 0;
        let currentQ = {};
        let isAnimating = false;
        let isFirstTry = true; // Tracks if it's the first attempt
        
        let poolAddition = [];
        let poolSubtraction = [];

        // Generate full pools of unique questions
        function generateQuestionPools() {
            poolAddition = [];
            poolSubtraction = [];
            
            // Addition: start + move <= 50
            for (let start = 1; start <= 49; start++) {
                for (let move = 1; move <= 50 - start; move++) {
                    poolAddition.push({
                        start, move, answer: start + move, isAddition: true, sign: "+", direction: "forward"
                    });
                }
            }
            // Subtraction: start - move >= 1
            for (let start = 2; start <= 50; start++) {
                for (let move = 1; move <= start - 1; move++) {
                    poolSubtraction.push({
                        start, move, answer: start - move, isAddition: false, sign: "-", direction: "back"
                    });
                }
            }
            
            // Shuffle arrays to randomize
            poolAddition.sort(() => Math.random() - 0.5);
            poolSubtraction.sort(() => Math.random() - 0.5);
        }

        // Initialize Fifty Chart Grid
        const chartContainer = document.getElementById('chart');
        const token = document.getElementById('token');
        for (let i = 1; i <= 50; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.id = 'cell-' + i;
            cell.innerText = i;
            chartContainer.insertBefore(cell, token);
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function startGame() {
            playSound('click');
            initAudio();
            generateQuestionPools(); // Fresh pools every new game
            currentQuestionNum = 0;
            score = 0;
            switchScreen('game-screen');
            updateScoreBoard();
            nextQuestion();
        }

        function resetGame() {
            playSound('click');
            stopConfetti();
            startGame();
        }

        function updateScoreBoard() {
            document.getElementById('score-display').innerText = `Score: ${score} / ${TOTAL_QUESTIONS}`;
        }

        function generateOptions(correctAnswer) {
            let options = [correctAnswer];
            while (options.length < 3) {
                let offset = Math.floor(Math.random() * 5) + 1;
                if (Math.random() > 0.5) offset *= -1;
                if (Math.random() > 0.8) offset = 10; 

                let wrong = correctAnswer + offset;
                if (wrong >= 1 && wrong <= 50 && !options.includes(wrong)) {
                    options.push(wrong);
                }
            }
            return options.sort(() => Math.random() - 0.5);
        }

        function getCellCenter(cellNum) {
            const cell = document.getElementById('cell-' + cellNum);
            const chartRect = chartContainer.getBoundingClientRect();
            const cellRect = cell.getBoundingClientRect();
            return {
                x: cellRect.left - chartRect.left + (cellRect.width / 2),
                y: cellRect.top - chartRect.top + (cellRect.height / 2)
            };
        }

        function positionTokenInstantly(cellNum) {
            const pos = getCellCenter(cellNum);
            token.style.display = 'flex';
            token.style.transform = `translate(calc(${pos.x}px - 50%), calc(${pos.y}px - 50%))`;
        }

        function drawDashedArc(x1, y1, x2, y2) {
            const svg = document.getElementById('hop-canvas');
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            
            const midX = (x1 + x2) / 2;
            const midY = Math.min(y1, y2) - 30;

            const length = Math.sqrt(Math.pow(x2-x1, 2) + Math.pow(y2-y1, 2));
            
            const d = `M ${x1} ${y1} Q ${midX} ${midY} ${x2} ${y2}`;
            path.setAttribute('d', d);
            path.setAttribute('stroke', '#888');
            path.setAttribute('stroke-width', '4');
            path.setAttribute('stroke-dasharray', '8,8');
            path.setAttribute('stroke-linecap', 'round');
            path.setAttribute('fill', 'none');
            
            path.setAttribute('stroke-dashoffset', length);
            path.style.transition = `stroke-dashoffset ${HOP_DURATION}ms linear`;
            
            svg.appendChild(path);
            setTimeout(() => { path.setAttribute('stroke-dashoffset', '0'); }, 10);
        }

        function renderColorfulText() {
            const c1 = currentQ.isAddition ? 'var(--primary)' : '#c941df'; // Different vibrant colors
            const c2 = 'var(--accent-shadow)';
            
            document.getElementById('equation-display').innerHTML = 
                `<span style="color:${c1}">${currentQ.start}</span> 
                 <span style="color:#aaa">${currentQ.sign}</span> 
                 <span style="color:${c2}">${currentQ.move}</span> 
                 <span style="color:#aaa">=</span> 
                 <span style="color:var(--correct)">?</span>`;

            document.getElementById('question-text').innerHTML = 
                `Start at <b style="color:${c1}; font-size:1.3rem">${currentQ.start}</b>. <br>
                 Move ${currentQ.direction} <b style="color:${c2}; font-size:1.3rem">${currentQ.move}</b> spaces.<br> 
                 What number do you land on?`;
        }

        function nextQuestion() {
            if (currentQuestionNum >= TOTAL_QUESTIONS) {
                endGame();
                return;
            }
            
            isAnimating = false;
            isFirstTry = true; // reset tries for new question
            document.getElementById('next-btn').style.display = 'none';

            // Alternating logic (Odd = Addition, Even = Subtraction)
            if (currentQuestionNum % 2 === 0) {
                currentQ = poolAddition.pop();
            } else {
                currentQ = poolSubtraction.pop();
            }
            
            currentQuestionNum++;

            // Clear Highlights and Paths
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('highlight-start', 'highlight-end'));
            document.getElementById('hop-canvas').innerHTML = '';

            renderColorfulText();
            
            // Highlight start
            document.getElementById('cell-' + currentQ.start).classList.add('highlight-start');
            positionTokenInstantly(currentQ.start);

            // Render options
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            const options = generateOptions(currentQ.answer);
            
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(opt, btn);
                optionsContainer.appendChild(btn);
            });
        }

        async function handleAnswer(selectedAnswer, btnElement) {
            if (isAnimating) return;

            if (selectedAnswer === currentQ.answer) {
                isAnimating = true; // Block other clicks while animating
                playSound('correct');
                btnElement.classList.add('correct');
                
                if (isFirstTry) {
                    score++;
                    updateScoreBoard();
                }

                // Disable all option buttons
                const buttons = document.querySelectorAll('.option-btn');
                buttons.forEach(b => b.disabled = true);

                await animateHops(currentQ.start, currentQ.answer, currentQ.move, currentQ.isAddition);
                
                // Show Next Button after animation completes
                document.getElementById('next-btn').style.display = 'inline-block';
            } else {
                playSound('wrong');
                btnElement.classList.add('wrong');
                btnElement.disabled = true; // Disable only this wrong option, allow retry
                isFirstTry = false; // Mark that first attempt failed
            }
        }

        function handleNext() {
            playSound('click');
            nextQuestion();
        }

        function animateHops(start, end, moves, isAddition) {
            return new Promise(async (resolve) => {
                let current = start;
                
                // Break moves into ones and tens
                const tens = Math.floor(moves / 10);
                const ones = moves % 10;
                
                const stepOne = isAddition ? 1 : -1;
                const stepTen = isAddition ? 10 : -10;
                const tokenInner = document.getElementById('token-inner');

                await new Promise(r => setTimeout(r, 400));

                // 1. Hop Ones First (horizontal steps)
                for (let i = 0; i < ones; i++) {
                    const prev = current;
                    current += stepOne;
                    
                    const prevPos = getCellCenter(prev);
                    const newPos = getCellCenter(current);

                    positionTokenInstantly(current); 
                    
                    tokenInner.classList.remove('bounce');
                    void tokenInner.offsetWidth; 
                    tokenInner.classList.add('bounce');
                    
                    playSound('hop');
                    
                    if (Math.ceil(prev / 10) === Math.ceil(current / 10)) {
                        drawDashedArc(prevPos.x, prevPos.y, newPos.x, newPos.y);
                    }

                    await new Promise(r => setTimeout(r, HOP_DURATION)); 
                }

                // 2. Hop Tens (vertical steps)
                for (let i = 0; i < tens; i++) {
                    current += stepTen;
                    
                    positionTokenInstantly(current); 
                    
                    tokenInner.classList.remove('bounce');
                    void tokenInner.offsetWidth; 
                    tokenInner.classList.add('bounce');
                    
                    playSound('hop');

                    await new Promise(r => setTimeout(r, HOP_DURATION)); 
                }

                tokenInner.classList.remove('bounce');
                document.getElementById('cell-' + end).classList.add('highlight-end');
                playSound('click'); 
                resolve();
            });
        }

        function endGame() {
            playSound('tada');
            switchScreen('end-screen');
            document.getElementById('final-score').innerText = `${score} / ${TOTAL_QUESTIONS}`;
            startConfetti();
        }

        window.addEventListener('resize', () => {
            if (document.getElementById('game-screen').classList.contains('active')) {
                let targetCell = currentQ.start;
                if (document.getElementById('cell-' + currentQ.answer)?.classList.contains('highlight-end')) {
                    targetCell = currentQ.answer;
                }
                if (targetCell) {
                    positionTokenInstantly(targetCell);
                    document.getElementById('hop-canvas').innerHTML = ''; 
                }
            }
        });

        // --- CONFETTI SYSTEM ---
        const canvas = document.getElementById("confetti");
        const ctx = canvas.getContext("2d");
        let particles = [];
        let animationId;
        const colors = ["#1cb0f6", "#58cc02", "#ffc800", "#ff4b4b", "#c9ebba"];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resizeCanvas);

        function startConfetti() {
            resizeCanvas();
            particles = [];
            for (let i = 0; i < 200; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    r: Math.random() * 8 + 4,
                    dx: Math.random() * 4 - 2,
                    dy: Math.random() * 4 + 3,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    tilt: Math.random() * 10 - 10,
                    tiltAngleInc: (Math.random() * 0.07) + 0.05,
                    tiltAngle: 0
                });
            }
            animateConfetti();
        }

        function animateConfetti() {
            animationId = requestAnimationFrame(animateConfetti);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p) => {
                p.tiltAngle += p.tiltAngleInc;
                p.y += p.dy;
                p.x += Math.sin(p.tiltAngle) * 2;
                p.tilt = Math.sin(p.tiltAngle) * 15;

                ctx.beginPath();
                ctx.lineWidth = p.r;
                ctx.strokeStyle = p.color;
                ctx.moveTo(p.x + p.tilt + p.r, p.y);
                ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r);
                ctx.stroke();

                if (p.y > canvas.height) {
                    p.y = -20;
                    p.x = Math.random() * canvas.width;
                }
            });
        }

        function stopConfetti() {
            cancelAnimationFrame(animationId);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

    </script>
</body>
</html>
