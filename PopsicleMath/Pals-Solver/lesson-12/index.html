<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hundred Chart Number Hop - Ver 9</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #3c3c3c;
            --primary: #1cb0f6;
            --primary-shadow: #1899d6;
            --correct: #58cc02;
            --correct-shadow: #58a700;
            --wrong: #ff4b4b;
            --wrong-shadow: #ea1515;
            --accent: #ffc800;
            --accent-shadow: #e5b400;
            --cell-border: #e5e5e5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: 'Poppins', sans-serif;
        }

        body {
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
        }

        /* Beautiful Scenery Background */
        .scenery-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        /* Screens */
        .screen {
            display: none;
            width: 100%;
            max-width: 1050px;
            padding: 20px;
            text-align: center;
            z-index: 10;
        }
        .screen.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* UI Elements */
        h1 {
            font-size: 3rem;
            font-weight: 800;
            color: var(--primary);
            text-shadow: 3px 3px 0px white, 0px 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 10px;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        .btn {
            display: inline-block;
            background-color: var(--primary);
            color: white;
            font-size: 1.5rem;
            font-weight: 800;
            padding: 15px 40px;
            border-radius: 20px;
            border: none;
            border-bottom: 6px solid var(--primary-shadow);
            cursor: pointer;
            transition: all 0.1s;
            text-transform: uppercase;
            letter-spacing: 1px;
            outline: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .btn:active:not(:disabled) {
            transform: translateY(6px);
            border-bottom: 0px solid var(--primary-shadow);
            margin-bottom: 6px;
            box-shadow: 0 0px 0px rgba(0,0,0,0);
        }
        
        .btn.correct { background-color: var(--correct); border-bottom-color: var(--correct-shadow); }
        .btn.wrong { background-color: var(--wrong); border-bottom-color: var(--wrong-shadow); animation: shake 0.4s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }

        /* Setup Box for Modes */
        .setup-box {
            margin: 20px auto 30px auto;
            padding: 20px;
            background: #f8faff;
            border-radius: 24px;
            border: 3px solid #d0e3ff;
            max-width: 500px;
        }
        .setup-section {
            margin-bottom: 25px;
        }
        .setup-section:last-child {
            margin-bottom: 0;
        }
        .setup-box p {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 12px;
        }
        .mode-options {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .mode-btn {
            background-color: white;
            color: #888;
            font-size: 1.1rem;
            font-weight: 800;
            padding: 12px 20px;
            border-radius: 16px;
            border: 3px solid #e5e5e5;
            border-bottom: 5px solid #d5d5d5;
            cursor: pointer;
            transition: all 0.1s;
        }
        .mode-btn.active {
            background-color: var(--correct);
            color: white;
            border-color: var(--correct-shadow);
            border-bottom-color: #46a300;
        }
        .mode-btn:active:not(.active) {
            transform: translateY(4px);
            border-bottom-width: 1px;
            margin-bottom: 4px;
        }

        /* Game Layout */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 15px 30px;
            border-radius: 24px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
        }
        .game-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .score-board {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--correct-shadow);
            background: #e5ffd6;
            padding: 8px 24px;
            border-radius: 16px;
            border: 3px solid var(--correct);
            box-shadow: 0 4px 0 var(--correct-shadow);
        }

        .game-content {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: stretch;
        }

        /* Chart Section */
        .chart-section {
            flex: 1 1 450px;
            max-width: 550px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            position: relative;
            backdrop-filter: blur(5px);
        }

        .hundred-chart {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            position: relative;
        }

        /* Interactive Board Styling */
        .hundred-chart.active-board .cell {
            cursor: pointer;
        }
        .hundred-chart.active-board .cell:hover {
            transform: scale(1.15);
            z-index: 5;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3) !important;
            filter: brightness(1.05);
        }

        .wrong-shake {
            animation: shake 0.4s;
            background-color: var(--wrong) !important;
            color: white !important;
            border-color: var(--wrong-shadow) !important;
        }

        /* Dashed Line SVG overlay */
        .hop-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 3;
        }

        .cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 800;
            color: #555;
            border-radius: 8px;
            border: 2px solid var(--cell-border);
            transition: all 0.2s;
            position: relative;
            background-color: white;
            z-index: 2;
        }
        
        /* Vibrant Candy Colors for Chart Rows */
        .row-color-1 { background-color: #ffd6e5; border-color: #ff99bf; box-shadow: 0 3px 0 #ff99bf;} 
        .row-color-2 { background-color: #ffe8b3; border-color: #ffb347; box-shadow: 0 3px 0 #ffb347;} 
        .row-color-3 { background-color: #e2f0cb; border-color: #b5d58f; box-shadow: 0 3px 0 #b5d58f;} 
        .row-color-4 { background-color: #c5ebfe; border-color: #8ccdef; box-shadow: 0 3px 0 #8ccdef;} 
        .row-color-5 { background-color: #ebd4f4; border-color: #c89bd7; box-shadow: 0 3px 0 #c89bd7;} 

        .cell.highlight-start {
            background-color: var(--accent) !important;
            color: white !important;
            border-color: var(--accent-shadow) !important;
            box-shadow: 0 3px 0 var(--accent-shadow), 0 0 15px rgba(255, 200, 0, 0.5) !important;
            transform: scale(1.1);
            z-index: 4;
        }
        .cell.highlight-end {
            background-color: var(--correct) !important;
            color: white !important;
            border-color: var(--correct-shadow) !important;
            box-shadow: 0 3px 0 var(--correct-shadow), 0 0 15px rgba(88, 204, 2, 0.5) !important;
            transform: scale(1.1);
            z-index: 4;
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.25); }
            100% { transform: scale(1.1); }
        }

        /* The Animated Token & Arc Bounce Logic */
        .token {
            position: absolute;
            width: 28px; 
            height: 28px;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 6;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            pointer-events: none;
        }
        .token-inner {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .token-inner svg {
            width: 100%;
            height: 100%;
            animation: twinkle 1.5s infinite ease-in-out;
        }
        
        @keyframes twinkle {
            0%, 100% { filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)) brightness(1); transform: scale(1); }
            50% { filter: drop-shadow(0 0 10px rgba(255, 215, 0, 1)) brightness(1.15); transform: scale(1.1); }
        }

        .token-inner.bounce {
            animation: hopBounceArc 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes hopBounceArc {
            0% { transform: translateY(0) scale(1) rotate(0deg); }
            50% { transform: translateY(-35px) scale(1.2) rotate(12deg); } 
            100% { transform: translateY(0) scale(1) rotate(0deg); }
        }

        /* Question Section */
        .question-section {
            flex: 1 1 320px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .question-card {
            background: var(--card-bg);
            padding: 20px 25px;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(5px);
        }

        .equation {
            font-size: 3.5rem;
            font-weight: 800;
            background: #ffffff;
            padding: 5px 30px;
            border-radius: 20px;
            border: 4px dashed #ffb347;
            width: 100%;
            text-align: center;
        }

        .question-text-container {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #eaf6ff;
            padding: 12px 15px;
            border-radius: 16px;
            border: 3px solid #8ccdef;
            width: 100%;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: #444;
            text-align: left;
            line-height: 1.4;
            flex: 1;
        }

        .speaker-btn {
            background: var(--accent);
            border: none;
            border-bottom: 5px solid var(--accent-shadow);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            min-width: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
        }
        .speaker-btn:active {
            transform: translateY(5px);
            border-bottom: 0px;
            margin-bottom: 5px;
        }
        .speaker-btn svg {
            width: 24px;
            height: 24px;
            fill: white;
            margin-left: 2px;
        }

        /* Instruction Toast */
        .instruction-toast {
            background: var(--accent);
            color: white;
            padding: 12px 20px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 1.1rem;
            text-align: center;
            box-shadow: 0 4px 0 var(--accent-shadow);
            animation: pulse 1.5s infinite;
            width: 100%;
            transition: background 0.3s, box-shadow 0.3s;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            position: relative;
        }
        
        .option-btn {
            font-size: 2rem;
            font-weight: 800;
            padding: 15px;
            border-radius: 20px;
            border: 3px solid;
            border-bottom: 6px solid;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .option-btn:active:not(:disabled) {
            transform: translateY(6px);
            border-bottom-width: 0px;
            margin-bottom: 6px;
        }

        /* Beautiful Candy Colored Options */
        .opt-candy-0 { background-color: #ffd6e5; color: #d13076; border-color: #ff99bf; border-bottom-color: #e6739f; }
        .opt-candy-0:hover:not(:disabled) { background-color: #ffe6f0; }

        .opt-candy-1 { background-color: #c5ebfe; color: #2b82b3; border-color: #8ccdef; border-bottom-color: #6eb5db; }
        .opt-candy-1:hover:not(:disabled) { background-color: #dbf3ff; }

        .opt-candy-2 { background-color: #e2f0cb; color: #5d8a29; border-color: #b5d58f; border-bottom-color: #9ac26d; }
        .opt-candy-2:hover:not(:disabled) { background-color: #eff6e1; }
        
        .option-btn:disabled {
            opacity: 0.5;
            cursor: default;
        }
        
        /* Disable specific wrong click state */
        .option-btn.wrong:disabled {
            opacity: 0.8;
            background-color: var(--wrong) !important;
            color: white !important;
            border-color: var(--wrong-shadow) !important;
            border-bottom-width: 6px;
        }
        
        .option-btn.correct:disabled {
            background-color: var(--correct) !important;
            color: white !important;
            border-color: var(--correct-shadow) !important;
            border-bottom-width: 6px;
            opacity: 1;
        }

        #next-btn {
            display: none;
            width: 100%;
            margin-top: 5px;
            background-color: var(--correct);
            border-bottom-color: var(--correct-shadow);
            animation: pop 0.4s ease;
        }

        /* End Screen */
        .end-card {
            background: var(--card-bg);
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: inline-block;
            backdrop-filter: blur(5px);
        }
        .end-score {
            font-size: 4.5rem;
            font-weight: 800;
            color: var(--correct);
            margin: 20px 0;
            text-shadow: 2px 2px 0 var(--correct-shadow);
        }

        #confetti {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        /* Responsive */
        @media (max-width: 850px) {
            h1 { font-size: 2.2rem; }
            .game-header { padding: 12px 20px; }
            .game-title { font-size: 1.5rem; }
            .cell { font-size: 0.9rem; border-radius: 6px;}
            .token { width: 24px; height: 24px; }
            .equation { font-size: 2.5rem; padding: 10px 15px; }
            .option-btn { font-size: 1.6rem; padding: 12px; }
            .chart-section { padding: 15px; border-radius: 20px; }
            .hundred-chart { gap: 3px; }
        }
        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .game-header { flex-direction: column; gap: 10px; }
            .cell { font-size: 0.75rem; border-radius: 4px; border-width: 1.5px; box-shadow: 0 2px 0; }
            
            .row-color-1 { box-shadow: 0 2px 0 #ff99bf;} 
            .row-color-2 { box-shadow: 0 2px 0 #ffb347;} 
            .row-color-3 { box-shadow: 0 2px 0 #b5d58f;} 
            .row-color-4 { box-shadow: 0 2px 0 #8ccdef;} 
            .row-color-5 { box-shadow: 0 2px 0 #c89bd7;} 
            
            .token { width: 18px; height: 18px; }
            .hundred-chart { gap: 2px; }
            .question-text { font-size: 0.95rem; }
            .speaker-btn { width: 40px; height: 40px; min-width: 40px; }
            .speaker-btn svg { width: 20px; height: 20px; }
            .equation { font-size: 2.2rem; }
            .end-card { padding: 30px 20px; }
            .setup-box p { font-size: 1.1rem; }
            .mode-btn { font-size: 1rem; padding: 10px 15px;}
            .instruction-toast { font-size: 0.95rem; padding: 10px 15px; }
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- Beautiful Duolingo-style Scenery Background -->
    <svg class="scenery-bg" preserveAspectRatio="xMidYMax slice" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#7fe0ff" />
                <stop offset="60%" stop-color="#d6f5ff" />
                <stop offset="100%" stop-color="#ffffff" />
            </linearGradient>
            <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="15" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
        </defs>
        <!-- Sky -->
        <rect width="1000" height="600" fill="url(#skyGrad)" />
        
        <!-- Rainbow -->
        <g opacity="0.6">
            <path d="M 50 600 A 450 450 0 0 1 950 600" fill="none" stroke="#ff9999" stroke-width="25"/>
            <path d="M 75 600 A 425 425 0 0 1 925 600" fill="none" stroke="#ffcc99" stroke-width="25"/>
            <path d="M 100 600 A 400 400 0 0 1 900 600" fill="none" stroke="#ffff99" stroke-width="25"/>
            <path d="M 125 600 A 375 375 0 0 1 875 600" fill="none" stroke="#99ff99" stroke-width="25"/>
            <path d="M 150 600 A 350 350 0 0 1 850 600" fill="none" stroke="#99ccff" stroke-width="25"/>
            <path d="M 175 600 A 325 325 0 0 1 825 600" fill="none" stroke="#cc99ff" stroke-width="25"/>
        </g>

        <!-- Sun -->
        <circle cx="850" cy="120" r="60" fill="#FFD700" filter="url(#glow)" />
        
        <!-- Clouds -->
        <path d="M 150 150 Q 180 120 220 150 Q 250 130 280 150 Q 320 180 280 200 L 150 200 Q 110 180 150 150 Z" fill="white" opacity="0.95"/>
        <path d="M 650 80 Q 680 50 720 80 Q 750 60 780 80 Q 820 110 780 130 L 650 130 Q 610 110 650 80 Z" fill="white" opacity="0.8"/>
        <path d="M 350 280 Q 370 250 400 280 Q 420 260 450 280 Q 480 300 450 320 L 350 320 Q 320 300 350 280 Z" fill="white" opacity="0.7"/>

        <!-- Grass Hills -->
        <path d="M -100 600 Q 250 350 600 600 Z" fill="#9ce67a"/>
        <path d="M 300 600 Q 700 300 1100 600 Z" fill="#75cf51"/>

        <!-- Background Trees & Flowers -->
        <circle cx="150" cy="500" r="15" fill="#ff4b4b"/>
        <circle cx="150" cy="500" r="6" fill="#ffc800"/>
        
        <circle cx="850" cy="550" r="12" fill="#cc99ff"/>
        <circle cx="850" cy="550" r="5" fill="#fff"/>
        
        <!-- Cute Tree -->
        <rect x="750" y="420" width="25" height="180" fill="#a0522d" rx="10"/>
        <circle cx="762" cy="420" r="70" fill="#4cb02f"/>
        <circle cx="715" cy="450" r="50" fill="#3d8f25"/>
        <circle cx="810" cy="460" r="45" fill="#58cc02"/>
    </svg>

    <!-- Confetti Overlay -->
    <canvas id="confetti"></canvas>

    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
        <div class="end-card" style="padding: 40px 20px;">
            <h1>Number Hop</h1>
            
            <div class="setup-box">
                <div class="setup-section">
                    <p>1. Choose Chart Size:</p>
                    <div class="mode-options">
                        <button class="mode-btn size-btn" id="btn-size-50" onclick="setSize(50)">50 Chart</button>
                        <button class="mode-btn size-btn active" id="btn-size-100" onclick="setSize(100)">100 Chart</button>
                    </div>
                </div>

                <div class="setup-section">
                    <p>2. Choose Game Mode:</p>
                    <div class="mode-options">
                        <button class="mode-btn active" id="btn-mix" onclick="setMode('mix')">Mix (+ & -)</button>
                        <button class="mode-btn" id="btn-add" onclick="setMode('add')">Addition (+)</button>
                        <button class="mode-btn" id="btn-sub" onclick="setMode('sub')">Subtraction (-)</button>
                    </div>
                </div>
            </div>

            <button class="btn" onclick="startGame()">Play Now</button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
        <div class="game-header">
            <div class="game-title" id="main-game-title">Number Hop</div>
            <div class="score-board" id="score-display">Score: 0 / 10</div>
        </div>

        <div class="game-content">
            <!-- Left: Chart -->
            <div class="chart-section">
                <!-- SVG Canvas for Dashed Hop Lines -->
                <svg id="hop-canvas" class="hop-canvas"></svg>

                <div class="hundred-chart" id="chart">
                    <!-- JS will populate cells here -->
                    <div id="token" class="token">
                        <div class="token-inner" id="token-inner">
                            <!-- Cute Realistic 3D Star Token -->
                            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <defs>
                                    <radialGradient id="starGrad" cx="50%" cy="40%" r="60%">
                                        <stop offset="0%" stop-color="#fff59d"/>
                                        <stop offset="50%" stop-color="#ffc107"/>
                                        <stop offset="100%" stop-color="#ff9800"/>
                                    </radialGradient>
                                </defs>
                                <path d="M50 5 L64 35 L98 40 L73 63 L79 95 L50 80 L21 95 L27 63 L2 40 L36 35 Z" fill="url(#starGrad)" stroke="#f57c00" stroke-width="4" stroke-linejoin="round"/>
                                <circle cx="35" cy="55" r="6" fill="#ff7043" opacity="0.6"/>
                                <circle cx="65" cy="55" r="6" fill="#ff7043" opacity="0.6"/>
                                <circle cx="40" cy="45" r="5" fill="#3e2723"/>
                                <circle cx="60" cy="45" r="5" fill="#3e2723"/>
                                <circle cx="38" cy="43" r="2" fill="white"/>
                                <circle cx="58" cy="43" r="2" fill="white"/>
                                <path d="M 43 55 Q 50 62 57 55" stroke="#3e2723" stroke-width="3.5" fill="none" stroke-linecap="round"/>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Question and Answers -->
            <div class="question-section">
                <div class="question-card">
                    <div class="equation" id="equation-display"></div>
                    <div class="question-text-container">
                        <div class="question-text" id="question-text"></div>
                        <button class="speaker-btn" onclick="readQuestion()">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M13.5 3.5v17a.5.5 0 0 1-.82.38l-4.9-4.13H4a1.5 1.5 0 0 1-1.5-1.5v-6.5A1.5 1.5 0 0 1 4 7.25h3.78l4.9-4.13a.5.5 0 0 1 .82.38z" fill="#fff" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/>
                                <path d="M17.5 7.5c2 2.5 2 6.5 0 9" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
                                <path d="M20.5 4.5c4 4.5 4 10.5 0 15" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div id="instruction-toast" class="instruction-toast">
                    Tap the correct answer on the board!
                </div>

                <div class="options-grid" id="options-container">
                    <!-- Option buttons generated here -->
                </div>
                <button id="next-btn" class="btn" onclick="handleNext()">Next Question</button>
            </div>
        </div>
    </div>

    <!-- End Screen -->
    <div id="end-screen" class="screen">
        <div class="end-card">
            <h1>Great Job!</h1>
            <div class="end-score" id="final-score">8 / 10</div>
            <button class="btn" onclick="resetGame()">Play Again</button>
        </div>
    </div>

    <script>
        // --- AUDIO SYSTEM (Web Audio API) ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'click') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(700, now);
                osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'correct') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(500, now);
                osc.frequency.setValueAtTime(800, now + 0.15);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0.15, now + 0.2);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.35);
                osc.start(now);
                osc.stop(now + 0.35);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(120, now + 0.25);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.start(now);
                osc.stop(now + 0.25);
            } else if (type === 'hop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(550, now);
                osc.frequency.exponentialRampToValueAtTime(850, now + 0.1);
                gain.gain.setValueAtTime(0.08, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'tada') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.setValueAtTime(600, now + 0.15);
                osc.frequency.setValueAtTime(800, now + 0.3);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.8);
                osc.start(now);
                osc.stop(now + 0.8);
            }
        }

        function readQuestion() {
            playSound('click');
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
                const rawText = document.getElementById('question-text').innerHTML.replace(/<[^>]*>?/gm, '');
                const utterance = new SpeechSynthesisUtterance(rawText);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                utterance.pitch = 1.2; 
                window.speechSynthesis.speak(utterance);
            }
        }

        // --- GAME LOGIC ---
        const TOTAL_QUESTIONS = 10;
        const HOP_DURATION = 500; // Perfect duration for clear elegant hop
        let currentQuestionNum = 0;
        let score = 0;
        let currentQ = {};
        let isAnimating = false;
        let isFirstTry = true;
        let selectedMode = 'mix'; 
        let chartSize = 100; // Default chart size
        let boardActive = false; 
        let currentManualCell = 0; 
        
        let poolAddition = [];
        let poolSubtraction = [];

        // Global DOM Elements
        const chartContainer = document.getElementById('chart');
        const token = document.getElementById('token');

        // Setup functions
        function setSize(size) {
            chartSize = size;
            document.querySelectorAll('.size-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-size-' + size).classList.add('active');
            playSound('click');
        }

        function setMode(mode) {
            selectedMode = mode;
            document.querySelectorAll('.mode-btn:not(.size-btn)').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');
            playSound('click');
        }

        function generateQuestionPools() {
            poolAddition = [];
            poolSubtraction = [];
            
            let minStart = (chartSize === 100) ? 20 : 1;
            let maxVal = chartSize;

            // Addition
            for (let start = minStart; start <= maxVal - 1; start++) {
                for (let move = 1; move <= maxVal - start; move++) {
                    poolAddition.push({
                        start, move, answer: start + move, isAddition: true, sign: "+", direction: "forward"
                    });
                }
            }
            // Subtraction
            for (let start = minStart + 1; start <= maxVal; start++) {
                for (let move = 1; move <= start - minStart; move++) {
                    poolSubtraction.push({
                        start, move, answer: start - move, isAddition: false, sign: "-", direction: "back"
                    });
                }
            }
            
            // Shuffle
            poolAddition.sort(() => Math.random() - 0.5);
            poolSubtraction.sort(() => Math.random() - 0.5);
        }

        // Initialize Chart Grid
        function initChart() {
            // Remove existing cells, keep token
            const existingCells = chartContainer.querySelectorAll('.cell');
            existingCells.forEach(c => c.remove());
            
            for (let i = 1; i <= chartSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                // Add Row Colors dynamically (repeating 1-5 pattern)
                const colorIndex = (Math.ceil(i / 10) - 1) % 5 + 1;
                cell.classList.add('row-color-' + colorIndex);

                cell.id = 'cell-' + i;
                cell.innerText = i;
                chartContainer.insertBefore(cell, token);
            }
        }
        
        // Initial build for preview
        initChart();

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function startGame() {
            playSound('click');
            initAudio();
            initChart();
            generateQuestionPools();
            currentQuestionNum = 0;
            score = 0;
            
            document.getElementById('main-game-title').innerText = `Number Hop 1-${chartSize}`;
            
            switchScreen('game-screen');
            updateScoreBoard();
            nextQuestion();
        }

        function resetGame() {
            playSound('click');
            stopConfetti();
            switchScreen('start-screen'); // Return to setup
        }

        function updateScoreBoard() {
            document.getElementById('score-display').innerText = `Score: ${score} / ${TOTAL_QUESTIONS}`;
        }

        function generateOptions(correctAnswer) {
            let options = [correctAnswer];
            while (options.length < 3) {
                let offset = Math.floor(Math.random() * 5) + 1;
                if (Math.random() > 0.5) offset *= -1;
                if (Math.random() > 0.8) offset = 10; 

                let wrong = correctAnswer + offset;
                if (wrong >= 1 && wrong <= chartSize && !options.includes(wrong)) {
                    options.push(wrong);
                }
            }
            return options.sort(() => Math.random() - 0.5);
        }

        function getCellCenter(cellNum) {
            const cell = document.getElementById('cell-' + cellNum);
            const chartRect = chartContainer.getBoundingClientRect();
            const cellRect = cell.getBoundingClientRect();
            return {
                x: cellRect.left - chartRect.left + (cellRect.width / 2),
                y: cellRect.top - chartRect.top + (cellRect.height / 2)
            };
        }

        function positionTokenInstantly(cellNum) {
            const cell = document.getElementById('cell-' + cellNum);
            const chartRect = chartContainer.getBoundingClientRect();
            const cellRect = cell.getBoundingClientRect();
            
            // Position at the bottom-right corner of the cell
            const x = cellRect.right - chartRect.left - 2; 
            const y = cellRect.bottom - chartRect.top - 2;

            token.style.display = 'flex';
            token.style.transform = `translate(calc(${x}px - 100%), calc(${y}px - 100%))`;
        }

        // Draw animated dashed hop line
        function drawDashedArc(x1, y1, x2, y2) {
            const svg = document.getElementById('hop-canvas');
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            
            const isVertical = Math.abs(x1 - x2) < 10;
            
            let midX = (x1 + x2) / 2;
            let midY = (y1 + y2) / 2;

            if (isVertical) {
                midX += 35; // Beautiful outward curve for vertical
            } else {
                midY -= 35; // Beautiful upward curve for horizontal
            }

            const length = Math.sqrt(Math.pow(x2-x1, 2) + Math.pow(y2-y1, 2));
            
            const d = `M ${x1} ${y1} Q ${midX} ${midY} ${x2} ${y2}`;
            path.setAttribute('d', d);
            
            // Glowing, thicker, vibrant dashed line
            path.setAttribute('stroke', '#ff5722');
            path.setAttribute('stroke-width', '5');
            path.setAttribute('stroke-dasharray', '10,8');
            path.setAttribute('stroke-linecap', 'round');
            path.setAttribute('fill', 'none');
            path.style.filter = 'drop-shadow(0px 4px 6px rgba(255,87,34,0.6))'; 
            
            path.setAttribute('stroke-dashoffset', length);
            path.style.transition = `stroke-dashoffset ${HOP_DURATION}ms cubic-bezier(0.4, 0, 0.2, 1)`;
            
            svg.appendChild(path);

            setTimeout(() => { 
                path.setAttribute('stroke-dashoffset', '0'); 
            }, 10);
        }

        function renderColorfulText() {
            const c1 = currentQ.isAddition ? 'var(--primary)' : '#c941df';
            const c2 = 'var(--accent-shadow)';
            
            document.getElementById('equation-display').innerHTML = 
                `<span style="color:${c1}">${currentQ.start}</span> 
                 <span style="color:#aaa">${currentQ.sign}</span> 
                 <span style="color:${c2}">${currentQ.move}</span> 
                 <span style="color:#aaa">=</span> 
                 <span style="color:var(--correct)">?</span>`;

            document.getElementById('question-text').innerHTML = 
                `Start at <b style="color:${c1}; font-size:1.3rem">${currentQ.start}</b>. <br>
                 Move ${currentQ.direction} <b style="color:${c2}; font-size:1.3rem">${currentQ.move}</b> spaces.<br> 
                 What number do you land on?`;
        }

        function nextQuestion() {
            if (currentQuestionNum >= TOTAL_QUESTIONS) {
                endGame();
                return;
            }
            
            isAnimating = false;
            isFirstTry = true;
            document.getElementById('next-btn').style.display = 'none';

            // Select question
            if (selectedMode === 'add') {
                currentQ = poolAddition.pop();
            } else if (selectedMode === 'sub') {
                currentQ = poolSubtraction.pop();
            } else {
                currentQ = (currentQuestionNum % 2 === 0) ? poolAddition.pop() : poolSubtraction.pop();
            }
            
            currentQuestionNum++;

            // Reset Board & Paths
            document.querySelectorAll('.cell').forEach(c => {
                c.classList.remove('highlight-start', 'highlight-end');
                c.onclick = () => handleBoardClick(parseInt(c.innerText), c);
            });
            document.getElementById('hop-canvas').innerHTML = '';

            renderColorfulText();
            
            currentManualCell = currentQ.start;
            document.getElementById('cell-' + currentQ.start).classList.add('highlight-start');
            positionTokenInstantly(currentQ.start);

            // Enable Interactive Board
            boardActive = true;
            document.getElementById('chart').classList.add('active-board');
            
            // Setup Toast Instruction
            const toast = document.getElementById('instruction-toast');
            toast.innerText = "Tap the correct answer on the board!";
            toast.style.display = 'block';
            toast.style.backgroundColor = "var(--accent)";
            toast.style.boxShadow = "0 4px 0 var(--accent-shadow)";

            // Render Candy Options (Disabled initially)
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            const options = generateOptions(currentQ.answer);
            
            options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = `option-btn opt-candy-${index}`; 
                btn.innerText = opt;
                btn.disabled = true; 
                btn.onclick = () => handleAnswer(opt, btn);
                optionsContainer.appendChild(btn);
            });
        }

        // Handle Player Clicking The Board (Manual Movement)
        async function handleBoardClick(clickedNum, cellElement) {
            if (!boardActive || isAnimating) return;

            // Allow moving to adjacent cells OR jumping straight to the final answer
            const isAdjacent = (clickedNum === currentManualCell + 1) ||
                               (clickedNum === currentManualCell - 1) ||
                               (clickedNum === currentManualCell + 10) ||
                               (clickedNum === currentManualCell - 10);

            if (isAdjacent || clickedNum === currentQ.answer) {
                isAnimating = true;
                
                let diff = clickedNum - currentManualCell;
                let isAddition = diff > 0;
                let moves = Math.abs(diff);

                await animateHops(currentManualCell, clickedNum, moves, isAddition);

                currentManualCell = clickedNum;
                isAnimating = false;

                if (currentManualCell === currentQ.answer) {
                    boardActive = false;
                    document.getElementById('chart').classList.remove('active-board');
                    document.getElementById('cell-' + currentQ.answer).classList.add('highlight-end');
                    playSound('correct');
                    
                    document.querySelectorAll('.option-btn').forEach(btn => {
                        btn.disabled = false;
                    });
                    
                    const toast = document.getElementById('instruction-toast');
                    toast.innerText = "Great! Now select your answer below!";
                    toast.style.backgroundColor = "var(--correct)";
                    toast.style.boxShadow = "0 4px 0 var(--correct-shadow)";
                }
            } else {
                playSound('wrong');
                cellElement.classList.add('wrong-shake');
                isFirstTry = false; // Penalize wrong attempts
                setTimeout(() => cellElement.classList.remove('wrong-shake'), 400);
            }
        }

        // Handle Selecting Final Answer
        async function handleAnswer(selectedAnswer, btnElement) {
            if (selectedAnswer === currentQ.answer) {
                playSound('correct');
                btnElement.classList.add('correct');
                
                if (isFirstTry) {
                    score++;
                    updateScoreBoard();
                }

                document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
                document.getElementById('instruction-toast').style.display = 'none';
                document.getElementById('next-btn').style.display = 'inline-block';
            } else {
                playSound('wrong');
                btnElement.classList.add('wrong');
                btnElement.disabled = true;
                isFirstTry = false;
            }
        }

        function handleNext() {
            playSound('click');
            nextQuestion();
        }

        function animateHops(start, end, moves, isAddition) {
            return new Promise(async (resolve) => {
                let current = start;
                
                const tens = Math.floor(moves / 10);
                const ones = moves % 10;
                
                const stepOne = isAddition ? 1 : -1;
                const stepTen = isAddition ? 10 : -10;
                const tokenInner = document.getElementById('token-inner');

                await new Promise(r => setTimeout(r, 200)); // Short prep pause

                // 1. Hop Ones First
                for (let i = 0; i < ones; i++) {
                    const prev = current;
                    current += stepOne;
                    
                    const prevPos = getCellCenter(prev);
                    const newPos = getCellCenter(current);

                    positionTokenInstantly(current); 
                    
                    tokenInner.classList.remove('bounce');
                    void tokenInner.offsetWidth; 
                    tokenInner.classList.add('bounce');
                    
                    playSound('hop');
                    
                    if (Math.ceil(prev / 10) === Math.ceil(current / 10)) {
                        drawDashedArc(prevPos.x, prevPos.y, newPos.x, newPos.y);
                    }

                    await new Promise(r => setTimeout(r, HOP_DURATION)); 
                }

                // 2. Hop Tens
                for (let i = 0; i < tens; i++) {
                    const prev = current;
                    current += stepTen;
                    
                    const prevPos = getCellCenter(prev);
                    const newPos = getCellCenter(current);

                    positionTokenInstantly(current); 
                    
                    tokenInner.classList.remove('bounce');
                    void tokenInner.offsetWidth; 
                    tokenInner.classList.add('bounce');
                    
                    playSound('hop');

                    drawDashedArc(prevPos.x, prevPos.y, newPos.x, newPos.y);

                    await new Promise(r => setTimeout(r, HOP_DURATION)); 
                }

                tokenInner.classList.remove('bounce');
                resolve();
            });
        }

        function endGame() {
            playSound('tada');
            switchScreen('end-screen');
            document.getElementById('final-score').innerText = `${score} / ${TOTAL_QUESTIONS}`;
            startConfetti();
        }

        window.addEventListener('resize', () => {
            if (document.getElementById('game-screen').classList.contains('active')) {
                let targetCell = currentQ.start;
                if (document.getElementById('cell-' + currentQ.answer)?.classList.contains('highlight-end')) {
                    targetCell = currentQ.answer;
                } else if (currentManualCell) {
                    targetCell = currentManualCell;
                }
                
                if (targetCell) {
                    positionTokenInstantly(targetCell);
                    document.getElementById('hop-canvas').innerHTML = ''; 
                }
            }
        });

        // --- CONFETTI SYSTEM ---
        const canvas = document.getElementById("confetti");
        const ctx = canvas.getContext("2d");
        let particles = [];
        let animationId;
        const colors = ["#1cb0f6", "#58cc02", "#ffc800", "#ff4b4b", "#c9ebba"];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resizeCanvas);

        function startConfetti() {
            resizeCanvas();
            particles = [];
            for (let i = 0; i < 200; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    r: Math.random() * 8 + 4,
                    dx: Math.random() * 4 - 2,
                    dy: Math.random() * 4 + 3,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    tilt: Math.random() * 10 - 10,
                    tiltAngleInc: (Math.random() * 0.07) + 0.05,
                    tiltAngle: 0
                });
            }
            animateConfetti();
        }

        function animateConfetti() {
            animationId = requestAnimationFrame(animateConfetti);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p) => {
                p.tiltAngle += p.tiltAngleInc;
                p.y += p.dy;
                p.x += Math.sin(p.tiltAngle) * 2;
                p.tilt = Math.sin(p.tiltAngle) * 15;

                ctx.beginPath();
                ctx.lineWidth = p.r;
                ctx.strokeStyle = p.color;
                ctx.moveTo(p.x + p.tilt + p.r, p.y);
                ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r);
                ctx.stroke();

                if (p.y > canvas.height) {
                    p.y = -20;
                    p.x = Math.random() * canvas.width;
                }
            });
        }

        function stopConfetti() {
            cancelAnimationFrame(animationId);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

    </script>
</body>
</html>
