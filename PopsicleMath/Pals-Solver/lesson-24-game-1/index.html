<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tanghulu Multiplication - Ver 9</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --white: #ffffff;
            --text-dark: #4B4B4B;
            --primary: #FF4B4B;
            --secondary: #FFC800;
            --accent: #58CC02;
            --accent-shadow: #58A700;
            --skewer-color: #f4d35e;
            --basket-color: #d2b48c;
            --basket-dark: #8b7355;
            --font-main: 'Poppins', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: var(--font-main);
            background: #87CEEB;
            height: 100vh;
            width: 100vw;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            color: var(--text-dark);
            touch-action: pan-y;
        }

        /* --- Bối cảnh thiên nhiên --- */
        .world-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            background: linear-gradient(to bottom, #74d4f2 0%, #b3e5fc 100%);
        }

        .rainbow {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 130vw;
            height: 130vw;
            border-radius: 50%;
            border: 45px solid transparent;
            box-shadow: 
                0 0 0 10px rgba(156, 39, 176, 0.4),
                0 0 0 20px rgba(63, 81, 181, 0.4),
                0 0 0 30px rgba(33, 150, 243, 0.4),
                0 0 0 40px rgba(76, 175, 80, 0.4),
                0 0 0 50px rgba(255, 235, 59, 0.4),
                0 0 0 60px rgba(255, 152, 0, 0.4),
                0 0 0 70px rgba(244, 67, 54, 0.4);
            filter: blur(1px);
            z-index: 1;
        }

        .sun {
            position: absolute;
            top: 40px; left: 60px;
            width: 80px; height: 80px;
            background: #ffea00;
            border-radius: 50%;
            box-shadow: 0 0 40px #ffea00;
            z-index: 2;
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            width: 140px; height: 55px;
            z-index: 2;
            opacity: 0.9;
        }
        .cloud::before { content: ''; position: absolute; width: 70px; height: 70px; top: -35px; left: 20px; background: white; border-radius: 50%; }
        .cloud::after { content: ''; position: absolute; width: 55px; height: 55px; top: -25px; left: 65px; background: white; border-radius: 50%; }
        
        .cloud-1 { top: 120px; right: 10%; animation: float 30s infinite linear; }
        .cloud-2 { top: 200px; left: 15%; animation: float 35s infinite linear reverse; }

        @keyframes float { from { transform: translateX(80px); } to { transform: translateX(-80px); } }

        /* Cỏ và Hoa */
        .grass-hill {
            position: absolute;
            bottom: 0; left: -10%;
            width: 120%; height: 28vh;
            background: #58CC02;
            border-top-left-radius: 50% 100px;
            border-top-right-radius: 50% 100px;
            z-index: 3;
            box-shadow: inset 0 20px 0 #46a302;
        }

        .flower {
            position: absolute;
            width: 24px; height: 24px;
            background: white;
            border-radius: 50%;
            z-index: 4;
            box-shadow: -12px 0 0 white, 12px 0 0 white, 0 -12px 0 white, 0 12px 0 white;
            transform: scale(0.6);
            opacity: 0.9;
        }
        .flower::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 16px; height: 16px; background: #FFC800; border-radius: 50%;
        }

        /* --- UI Layers --- */
        .ui-layer {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 50;
            display: flex;
            padding: 20px;
            pointer-events: none;
        }
        .score-board {
            background: var(--white);
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: 800; font-size: 1.3rem;
            color: var(--secondary);
            box-shadow: 0 4px 0 #E5E5E5;
            display: flex; align-items: center; gap: 10px;
            pointer-events: auto;
            border: 2px solid #F0F0F0;
        }

        /* --- Game Main Layout --- */
        .main-wrapper {
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            width: 100%;
            z-index: 10;
            padding-top: 80px; 
            padding-bottom: 6vh; 
            min-height: 600px; 
        }

        .game-container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        /* Khu vực câu hỏi */
        .header-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px;
        }

        .equation-wrapper { display: flex; align-items: center; gap: 15px; margin-bottom: 5px; }
        .equation-board {
            background: var(--white); padding: 10px 30px; border-radius: 25px;
            font-size: clamp(2rem, 5vw, 2.8rem); font-weight: 800;
            box-shadow: 0 6px 0 #E5E5E5; border: 3px solid #F0F0F0;
        }
        .equation-board span.highlight { color: var(--primary); }
        .equation-board span.answer-highlight { color: var(--accent); }

        .tts-btn {
            background: var(--secondary); border: none; width: 55px; height: 55px; border-radius: 50%;
            box-shadow: 0 5px 0 #D4A000; cursor: pointer; font-size: 1.6rem;
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.1s;
        }
        .tts-btn:active { transform: translateY(4px); box-shadow: none; }

        .mascot-msg {
            background: var(--white); padding: 8px 25px; border-radius: 20px;
            font-size: 1.1rem; font-weight: 700; color: #6a4c93;
            box-shadow: 0 4px 0 #E5E5E5; margin-bottom: 5px;
            text-align: center; border: 2px solid #F0F0F0;
        }

        /* --- Tanghulu Components --- */
        .tanghulu-stand {
            position: relative;
            width: 95%;
            max-width: 600px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 5px;
        }

        .skewer-container {
            display: flex;
            justify-content: space-around; 
            width: 100%;
            padding: 0 5%; 
            align-items: flex-end;
            min-height: 230px;
            padding-bottom: 5px;
        }

        .skewer {
            width: 10px;
            height: 220px;
            background: var(--skewer-color);
            border-radius: 5px;
            position: relative;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            padding-bottom: 8px;
            transition: all 0.3s;
            box-shadow: 2px 0 0 rgba(0,0,0,0.1);
        }

        .skewer.complete {
            background: #ffd60a;
            box-shadow: 0 0 20px rgba(255, 214, 10, 0.6);
        }
        .skewer.error { animation: shake 0.4s; background: #ff4d6d; }

        /* VER 9: Removed .counter CSS since we deleted the blocks */

        /* Candied Fruit */
        .fruit {
            width: 44px; height: 44px;
            border-radius: 50%;
            position: relative;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: -4px;
            z-index: 5;
            cursor: pointer;
            touch-action: none;
        }
        .fruit::before { 
            content: ''; position: absolute; top: 12%; left: 18%;
            width: 25%; height: 25%; background: rgba(255,255,255,0.75); border-radius: 50%;
        }
        .fruit.red { background: radial-gradient(circle at 35% 35%, #ff5e62, #d90429); box-shadow: 0 4px 0 #9d0208; }
        .fruit.yellow { background: radial-gradient(circle at 35% 35%, #ffee32, #ffb703); box-shadow: 0 4px 0 #e85d04; }
        .fruit.green { background: radial-gradient(circle at 35% 35%, #a6ef1a, #38b000); box-shadow: 0 4px 0 #007200; }
        .fruit.purple { background: radial-gradient(circle at 35% 35%, #c8b2ff, #7209b7); box-shadow: 0 4px 0 #430a89; }

        .skewer .fruit {
            width: 40px; height: 40px;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
        }

        /* Basket */
        .basket-base {
            width: 100%; 
            height: 60px;
            background: var(--basket-color);
            background-image: repeating-linear-gradient(45deg, transparent, transparent 15px, rgba(0,0,0,0.05) 15px, rgba(0,0,0,0.05) 30px);
            border-radius: 10px 10px 30px 30px;
            box-shadow: 0 8px 0 var(--basket-dark);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            margin-top: -2px; z-index: 10;
            border: 4px solid var(--basket-dark);
            position: relative;
        }
        .basket-rim {
            position: absolute; top: 0; width: 100.5%; height: 10px;
            background: var(--basket-dark); border-radius: 10px;
        }
        .stand-mouth {
            width: 80px; height: 35px; background: #fff;
            border-radius: 12px; border: 4px solid var(--basket-dark);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 1.6rem; font-weight: 800; color: var(--primary);
            z-index: 11;
            overflow: hidden;
        }

        /* --- Tray & Buttons --- */
        .tray {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            padding: 15px 40px; border-radius: 35px;
            display: flex; gap: 25px; margin: 10px 0;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            z-index: 20;
        }

        .action-area {
            min-height: 80px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            z-index: 20;
        }

        .btn {
            background: var(--accent); color: white; border: none;
            padding: 14px 45px; font-size: 1.5rem; font-weight: 800;
            border-radius: 20px; box-shadow: 0 6px 0 var(--accent-shadow);
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.1s;
        }
        .btn:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 2px 0 var(--accent-shadow); }
        .btn-blue { background: #1CB0F6; box-shadow: 0 6px 0 #1899D6; }
        .btn:disabled { background: #ccc; box-shadow: 0 6px 0 #999; opacity: 0.6; cursor: not-allowed; }

        .answers-container { display: none; gap: 20px; margin-bottom: 10px; }
        .answer-bubble {
            width: 80px; height: 80px; border-radius: 22px;
            background: white; color: #1CB0F6; font-size: 2.2rem; font-weight: 800;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; box-shadow: 0 6px 0 #E5E5E5; border: 3px solid #F0F0F0;
            transition: all 0.1s;
        }
        .answer-bubble:active { transform: translateY(4px); box-shadow: 0 2px 0 #E5E5E5; }

        /* --- Screens --- */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
            z-index: 200; display: flex; justify-content: center; align-items: center;
            visibility: hidden; opacity: 0; transition: 0.3s;
        }
        .overlay.active { visibility: visible; opacity: 1; }
        .modal {
            background: white; padding: 40px; border-radius: 40px; text-align: center;
            max-width: 90%; width: 450px; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            border: 4px solid #F0F0F0;
        }

        .number-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 25px; }
        .num-toggle {
            background: white; border: 3px solid #E5E5E5; font-size: 1.5rem; font-weight: 800;
            padding: 12px 0; border-radius: 18px; cursor: pointer; box-shadow: 0 4px 0 #E5E5E5;
        }
        .num-toggle.selected { background: #1CB0F6; color: white; border-color: #1899D6; box-shadow: 0 4px 0 #1899D6; }

        @keyframes popIn { 0% { transform: scale(0); } 80% { transform: scale(1.15); } 100% { transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

        /* Pháo giấy lớp cao nhất */
        .confetti { 
            position: fixed; 
            z-index: 10000; 
            pointer-events: none; 
        }

        #ghostFruit {
            position: fixed; pointer-events: none; z-index: 1000; opacity: 0.9;
            transform: translate(-50%, -50%); display: none;
        }

        /* --- Media Queries (Tối ưu thiết bị) --- */
        @media (max-width: 600px) {
            .rainbow { width: 180vw; height: 180vw; top: 15%; }
            .tanghulu-stand { max-width: 100%; width: 95%; }
            .skewer-container { min-height: 180px; padding: 0 2%; }
            .skewer { height: 160px; width: 8px; }
            .fruit { width: 34px; height: 34px; }
            .skewer .fruit { width: 32px; height: 32px; }
            .basket-base { height: 50px; border-radius: 8px 8px 20px 20px; }
            .stand-mouth { width: 60px; height: 28px; font-size: 1.3rem; border-width: 3px;}
            .main-wrapper { padding-bottom: 10vh; min-height: 550px; }
            .grass-hill { height: 25vh; border-top-left-radius: 50% 60px; border-top-right-radius: 50% 60px; }
            .tray { gap: 15px; padding: 10px 20px; }
        }

        @media (max-height: 750px) {
            .main-wrapper { padding-top: 60px; padding-bottom: 5vh; }
            .grass-hill { height: 20vh; }
            .skewer-container { min-height: 180px; }
            .skewer { height: 160px; }
            .flower { transform: scale(0.4); }
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <div class="world-bg">
        <div class="rainbow"></div>
        <div class="sun"></div>
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="grass-hill">
            <div class="flower" style="left: 15%; top: 20px;"></div>
            <div class="flower" style="left: 35%; top: 50px;"></div>
            <div class="flower" style="left: 65%; top: 15px;"></div>
            <div class="flower" style="left: 85%; top: 40px;"></div>
            <div class="flower" style="left: 50%; top: 60px; transform: scale(0.45);"></div>
        </div>
    </div>

    <div class="ui-layer">
        <div class="score-board">⭐ <span id="scoreDisplay">0</span></div>
    </div>

    <div class="main-wrapper">
        <div class="game-container">
            
            <div class="header-area">
                <div class="equation-wrapper">
                    <div class="equation-board" id="equationBoard">
                        <span id="eqText">? × ? = ?</span>
                    </div>
                    <button class="tts-btn" id="ttsBtn" title="Listen">🔊</button>
                </div>
                <div class="mascot-msg" id="mascotMsg">Ready to fill the basket?</div>
            </div>

            <div class="tanghulu-stand">
                <div class="skewer-container" id="skewerContainer"></div>
                <div class="basket-base">
                    <div class="basket-rim"></div>
                    <div class="stand-mouth" id="baseNumberDisplay">?</div>
                </div>
            </div>

            <div class="tray" id="tray">
                <div class="fruit red" data-color="red"></div>
                <div class="fruit yellow" data-color="yellow"></div>
                <div class="fruit green" data-color="green"></div>
                <div class="fruit purple" data-color="purple"></div>
            </div>

            <div class="action-area">
                <button class="btn btn-blue" id="checkGroupsBtn" style="display:none;">Check Now</button>
                <div class="answers-container" id="answersContainer"></div>
                <button class="btn" id="nextBtn" style="display:none;">Next Round</button>
            </div>
            
        </div>
    </div>

    <div id="ghostFruit" class="fruit"></div>

    <div class="overlay active" id="setupScreen">
        <div class="modal">
            <h1 style="color:var(--primary)">🍡 Tanghulu Shop</h1>
            <p>Pick your math tables to start:</p>
            <div class="number-grid" id="numberGrid"></div>
            <button class="btn" id="startBtn" disabled>Start Selling!</button>
        </div>
    </div>

    <div class="overlay" id="endScreen">
        <div class="modal">
            <h1 style="color:var(--accent)">Excellent! 🍡🌟</h1>
            <p>You're a Tanghulu Master!</p>
            <p style="font-size: 1.8rem; color: var(--primary); font-weight: 800;">Final Score: <span id="finalScore"></span>/5</p>
            <button class="btn btn-blue" id="restartBtn" style="margin-top: 15px;">Play Again</button>
        </div>
    </div>

<script>
    let state = {
        phase: 'setup',
        round: 0,
        maxRounds: 5,
        score: 0,
        selectedBases: [],
        problemPool: [], 
        base: 0,
        multiplier: 0,
        sound: true,
        skewerData: new Array(10).fill(0)
    };

    const els = {
        scoreDisplay: document.getElementById('scoreDisplay'),
        eqText: document.getElementById('eqText'),
        ttsBtn: document.getElementById('ttsBtn'),
        mascotMsg: document.getElementById('mascotMsg'),
        baseNumberDisplay: document.getElementById('baseNumberDisplay'),
        skewerContainer: document.getElementById('skewerContainer'),
        tray: document.getElementById('tray'),
        checkGroupsBtn: document.getElementById('checkGroupsBtn'),
        answersContainer: document.getElementById('answersContainer'),
        nextBtn: document.getElementById('nextBtn'),
        setupScreen: document.getElementById('setupScreen'),
        endScreen: document.getElementById('endScreen'),
        numberGrid: document.getElementById('numberGrid'),
        startBtn: document.getElementById('startBtn'),
        restartBtn: document.getElementById('restartBtn'),
        finalScore: document.getElementById('finalScore'),
        ghostFruit: document.getElementById('ghostFruit')
    };

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTone(freq, type, duration, vol=0.1, slideFreq=null) {
        if (!state.sound) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if (slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    const sfx = {
        pop: () => playTone(600, 'sine', 0.1, 0.2, 300),
        bubble: () => playTone(400, 'sine', 0.2, 0.1, 800),
        ding: () => playTone(880, 'triangle', 0.3, 0.2),
        buzz: () => playTone(150, 'sawtooth', 0.3, 0.1),
        tada: () => {
            playTone(523, 'triangle', 0.4, 0.15);
            setTimeout(()=>playTone(659, 'triangle', 0.4, 0.15), 100);
            setTimeout(()=>playTone(784, 'triangle', 0.6, 0.2), 200);
        }
    };

    function speak(text) {
        if (!window.speechSynthesis || !state.sound) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US'; u.rate = 0.9;
        window.speechSynthesis.speak(u);
    }

    function init() {
        for (let i=2; i<=9; i++) {
            const b = document.createElement('div'); b.className = 'num-toggle'; b.innerText = i;
            b.onclick = () => {
                b.classList.toggle('selected');
                if (b.classList.contains('selected')) state.selectedBases.push(i);
                else state.selectedBases = state.selectedBases.filter(n => n !== i);
                els.startBtn.disabled = state.selectedBases.length === 0;
            };
            els.numberGrid.appendChild(b);
        }

        // VER 9: Tạo xiên que không chèn thêm thẻ .counter
        els.skewerContainer.innerHTML = '';
        for (let i=0; i<10; i++) {
            const s = document.createElement('div'); 
            s.className = 'skewer'; 
            s.dataset.index = i;
            els.skewerContainer.appendChild(s);
        }

        els.startBtn.onclick = startGame;
        els.restartBtn.onclick = () => location.reload();
        
        els.ttsBtn.onclick = () => {
            if (state.phase === 'drag') {
                speak(`${state.base} times ${state.multiplier} equals what?`);
            } else {
                speak(`${state.base} times ${state.multiplier} equals ${state.base * state.multiplier}`);
            }
        };

        els.checkGroupsBtn.onclick = checkGroups;
        els.nextBtn.onclick = startRound;

        els.tray.onclick = (e) => {
            if (state.phase !== 'drag' || isDragging) return;
            const target = e.target.closest('.fruit');
            if (!target) return;
            let foundIdx = -1;
            for (let i=0; i<10; i++) {
                if (state.skewerData[i] < state.base) { foundIdx = i; break; }
            }
            if (foundIdx !== -1) {
                addFruitToSkewer(document.querySelector(`.skewer[data-index="${foundIdx}"]`), target.dataset.color);
            }
        };

        els.skewerContainer.onclick = (e) => {
            if (state.phase !== 'drag') return;
            const f = e.target.closest('.fruit');
            if (f) {
                const s = f.closest('.skewer');
                const idx = s.dataset.index;
                f.remove(); state.skewerData[idx]--;
                sfx.bubble();
            }
        };

        els.tray.onpointerdown = handleDragStart;
        document.onpointermove = handleDragMove;
        document.onpointerup = handleDragEnd;
    }

    function startGame() {
        state.round = 0; state.score = 0;
        els.scoreDisplay.innerText = 0;
        
        let allProblems = [];
        state.selectedBases.forEach(baseNum => {
            for(let mult = 2; mult <= 9; mult++) {
                allProblems.push({ base: baseNum, multiplier: mult });
            }
        });
        
        for (let i = allProblems.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [allProblems[i], allProblems[j]] = [allProblems[j], allProblems[i]];
        }
        
        state.problemPool = allProblems.slice(0, state.maxRounds);
        state.maxRounds = Math.min(5, state.problemPool.length);

        els.setupScreen.classList.remove('active');
        startRound();
    }

    function startRound() {
        state.round++;
        if (state.round > state.maxRounds) return endGame();

        const currentProblem = state.problemPool[state.round - 1];
        state.base = currentProblem.base;
        state.multiplier = currentProblem.multiplier;
        
        state.phase = 'drag';
        state.skewerData.fill(0);

        els.eqText.innerHTML = `<span class="highlight">${state.base}</span> × <span class="highlight">${state.multiplier}</span> = ?`;
        els.baseNumberDisplay.innerText = state.base;
        setMsg(`Challenge: Put ${state.base} fruits on ${state.multiplier} skewers!`);

        document.querySelectorAll('.skewer').forEach((s) => {
            s.className = 'skewer';
            s.querySelectorAll('.fruit').forEach(f => f.remove());
        });

        els.checkGroupsBtn.style.display = 'block';
        els.answersContainer.style.display = 'none';
        els.nextBtn.style.display = 'none';
        els.tray.style.display = 'flex';
        
        speak(`${state.base} times ${state.multiplier} equals what?`);
    }

    function setMsg(t) { els.mascotMsg.innerText = t; }

    let isDragging = false, draggedColor = '';
    function handleDragStart(e) {
        if (state.phase !== 'drag') return;
        const target = e.target.closest('.fruit');
        if (!target) return;
        draggedColor = target.dataset.color;
        isDragging = true;
        els.ghostFruit.className = `fruit ${draggedColor}`;
        els.ghostFruit.style.display = 'flex';
        updateGhost(e.clientX, e.clientY);
        sfx.pop();
    }
    function handleDragMove(e) { if (isDragging) updateGhost(e.clientX, e.clientY); }
    function updateGhost(x, y) { els.ghostFruit.style.left = x + 'px'; els.ghostFruit.style.top = y + 'px'; }
    function handleDragEnd(e) {
        if (!isDragging) return;
        els.ghostFruit.style.display = 'none';
        const elAtPoint = document.elementFromPoint(e.clientX, e.clientY);
        const targetSkewer = elAtPoint?.closest('.skewer');
        if (targetSkewer) addFruitToSkewer(targetSkewer, draggedColor);
        isDragging = false;
    }

    function addFruitToSkewer(sk, color) {
        const idx = sk.dataset.index;
        if (state.skewerData[idx] >= state.base) {
            sk.classList.add('error'); setTimeout(()=>sk.classList.remove('error'), 400);
            sfx.buzz(); return;
        }
        state.skewerData[idx]++;
        const f = document.createElement('div'); f.className = `fruit ${color}`;
        sk.appendChild(f);
        sfx.pop();
        if (state.skewerData[idx] === state.base) sk.classList.add('complete');
    }

    function checkGroups() {
        let full = 0, partial = 0;
        state.skewerData.forEach((count) => {
            if (count === state.base) full++;
            else if (count > 0) partial++;
        });

        if (partial > 0 || full !== state.multiplier) {
            sfx.buzz(); setMsg(`Almost! You need exactly ${state.multiplier} skewers with ${state.base} pieces.`);
            return;
        }

        sfx.ding(); state.phase = 'answer';
        els.checkGroupsBtn.style.display = 'none'; els.tray.style.display = 'none';
        setMsg("Correct groups! Now, what is the total?");
        showAnswers();
    }

    function showAnswers() {
        const correct = state.base * state.multiplier;
        let arr = [correct];
        while(arr.length < 3) {
            let w = correct + (Math.random() > 0.5 ? 1 : -1) * (Math.floor(Math.random()*5)+1);
            if (w > 0 && !arr.includes(w)) arr.push(w);
        }
        arr.sort(()=>Math.random()-0.5);
        els.answersContainer.innerHTML = '';
        arr.forEach(a => {
            const b = document.createElement('div'); b.className = 'answer-bubble'; b.innerText = a;
            b.onclick = () => {
                if (state.phase !== 'answer') return;
                if (a === correct) {
                    sfx.tada(); state.score++; els.scoreDisplay.innerText = state.score;
                    els.eqText.innerHTML = `${state.base} × ${state.multiplier} = <span class="answer-highlight">${correct}</span>`;
                    setMsg("Amazing job! Count them: " + correct);
                    speak(`${state.base} times ${state.multiplier} equals ${correct}`);
                    state.phase = 'wait'; createConfetti(50);
                    setTimeout(() => { els.answersContainer.style.display = 'none'; els.nextBtn.style.display = 'block'; }, 1500);
                } else {
                    sfx.buzz(); b.style.animation = 'shake 0.4s'; b.style.background = '#ff4d6d'; b.style.color = 'white';
                }
            };
            els.answersContainer.appendChild(b);
        });
        els.answersContainer.style.display = 'flex';
    }

    function endGame() {
        state.phase = 'end'; els.finalScore.innerText = state.score;
        els.endScreen.classList.add('active'); 
        sfx.tada(); createConfetti(200); 
    }

    /* VER 9: Hiệu ứng pháo giấy chân thực, sử dụng Keyframe Animation chi tiết hơn */
    function createConfetti(n) {
        const colors = ['#FF4B4B', '#FFC800', '#58CC02', '#1CB0F6', '#CE82FF', '#ff9800', '#e91e63'];
        for (let i = 0; i < n; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.background = colors[Math.floor(Math.random() * colors.length)];
            
            const type = Math.random();
            let w = 8 + Math.random() * 10;
            let h = w;
            if (type < 0.3) {
                c.style.borderRadius = '50%';
            } else if (type < 0.6) {
                h = w * (1.5 + Math.random() * 2);
            }
            c.style.width = w + 'px';
            c.style.height = h + 'px';

            c.style.left = '50vw';
            c.style.top = '50vh';
            document.body.appendChild(c);

            const duration = 3 + Math.random() * 2;
            const keyframes = [];
            const steps = 30; // 30 frames cho quỹ đạo rơi mượt mà
            
            // Tính toán vật lý mô phỏng
            const vx = (Math.random() - 0.5) * 1000; // Lan toả ngang
            const vy = -(Math.random() * 600 + 400); // Lực nổ hất lên trên
            const g = 800; // Trọng lực
            const swayFreq = Math.random() * 3 + 1; // Tần số đung đưa
            const swayAmp = Math.random() * 50 + 20; // Biên độ đung đưa
            
            const rotXSpeed = (Math.random() - 0.5) * 1000;
            const rotYSpeed = (Math.random() - 0.5) * 1000;
            const rotZSpeed = (Math.random() - 0.5) * 500;

            for (let step = 0; step <= steps; step++) {
                const t = step / steps;
                const time = t * duration;
                
                // Cập nhật toạ độ X, Y theo thời gian
                const cx = vx * time + Math.sin(time * swayFreq) * swayAmp;
                const cy = vy * time + 0.5 * g * time * time;
                
                const rotX = rotXSpeed * time;
                const rotY = rotYSpeed * time;
                const rotZ = rotZSpeed * time;

                keyframes.push({
                    transform: `translate3d(${cx}px, ${cy}px, 0) rotateX(${rotX}deg) rotateY(${rotY}deg) rotateZ(${rotZ}deg)`,
                    opacity: t > 0.8 ? (1 - (t - 0.8) * 5) : 1 // Mờ dần ở cuối
                });
            }

            c.animate(keyframes, {
                duration: duration * 1000,
                easing: 'linear',
                fill: 'forwards'
            });
            
            setTimeout(() => c.remove(), duration * 1000);
        }
    }

    window.onload = init;
</script>
</body>
</html>
