        body {

            margin: 0;

            overflow-x: hidden;

        /* 3D Button Effects */
        .btn-3d {
            transition: all 0.1s ease;
            position: relative;
            top: 0;
        }
        .btn-3d:active:not(:disabled) {
            top: 6px;
            box-shadow: 0 0px 0 0 currentColor !important;

            opacity: 0.6;

            100% { transform: scale(1); opacity: 1; }

            animation: fadeIn 0.4s ease-out forwards;

            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }

            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;

            20%, 80% { transform: translate3d(4px, 0, 0); }

            100% { transform: rotate(5deg); }
        }

            animation: spin 30s linear infinite;
        }
        @keyframes spin {

    <script>
        /* --- AUDIO SYSTEM (Web Audio API) --- */
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance('');
                utterance.volume = 0;
                window.speechSynthesis.speak(utterance);
            }
        }

        function playTone(freq, type, duration, vol=0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playDing() { playTone(600, 'sine', 0.1, 0.2); setTimeout(() => playTone(800, 'sine', 0.2, 0.2), 100); }
        function playWrong() { playTone(300, 'sawtooth', 0.2, 0.1); setTimeout(() => playTone(200, 'sawtooth', 0.3, 0.1), 150); }
        function playClick() { playTone(500, 'sine', 0.05, 0.05); }
        function playWin() {
            const notes = [400, 500, 600, 800, 1000];
            notes.forEach((n, i) => setTimeout(() => playTone(n, 'sine', 0.15, 0.2), i * 100));
        }

        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85;
                utterance.pitch = 1.1;
                window.speechSynthesis.speak(utterance);
            }
        }

            flower: () => `<svg viewBox="0 0 100 100" class="w-full h-full svg-shadow">
                <circle cx="50" cy="20" r="18" fill="#ff9600" stroke="#cc7800" stroke-width="2"/>
                <circle cx="50" cy="80" r="18" fill="#ff9600" stroke="#cc7800" stroke-width="2"/>
                <circle cx="20" cy="50" r="18" fill="#ff9600" stroke="#cc7800" stroke-width="2"/>
                <circle cx="80" cy="50" r="18" fill="#ff9600" stroke="#cc7800" stroke-width="2"/>
                <circle cx="28" cy="28" r="18" fill="#ff9600" stroke="#cc7800" stroke-width="2"/>
                <circle cx="72" cy="72" r="18" fill="#ff9600" stroke="#cc7800" stroke-width="2"/>
                <circle cx="28" cy="72" r="18" fill="#ff9600" stroke="#cc7800" stroke-width="2"/>
                <circle cx="72" cy="28" r="18" fill="#ff9600" stroke="#cc7800" stroke-width="2"/>
                <circle cx="50" cy="50" r="18" fill="#ffc800" stroke="#e5b400" stroke-width="3"/>
                <circle cx="45" cy="45" r="5" fill="#FFF" opacity="0.8"/>
            </svg>`,
            racecar: (c) => `<svg viewBox="0 0 100 100" class="w-full h-full svg-shadow drop-shadow-lg">
                <circle cx="8" cy="62" r="4" fill="#E0E0E0" opacity="0.7" filter="blur(1px)"/>
                <circle cx="3" cy="58" r="3" fill="#E0E0E0" opacity="0.5" filter="blur(2px)"/>
                <path d="M 4 36 L 16 34 L 16 45 L 8 45 Z" fill="#212121" stroke="#000" stroke-width="1.5"/>
                <rect x="7" y="31" width="14" height="4" fill="${c||'#1cb0f6'}" rx="1" stroke="#000" stroke-width="1"/>
                <path d="M 12 65 L 5 65 A 6 6 0 0 1 5 50 L 25 42 L 40 28 L 65 28 L 80 45 L 94 50 A 6 6 0 0 1 94 65 L 85 65 L 12 65 Z" fill="#000" opacity="0.2" transform="translate(0, 2)"/>
                <path d="M 12 65 L 5 65 A 6 6 0 0 1 5 50 L 25 42 L 40 28 L 65 28 L 80 45 L 94 50 A 6 6 0 0 1 94 65 L 85 65 L 12 65 Z" fill="${c||'#1cb0f6'}" stroke="#000" stroke-width="1.5"/>
                <path d="M 28 42 L 42 30 L 63 30 L 76 45" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
                <path d="M 18 52 L 85 52 L 82 56 L 15 56 Z" fill="#ffffff" opacity="0.4"/>
                <path d="M 42 30 L 62 30 L 72 42 L 35 42 Z" fill="#81D4FA" stroke="#000" stroke-width="1.5"/>
                <path d="M 46 32 L 58 32 L 48 40" fill="#ffffff" opacity="0.8"/>
                <circle cx="30" cy="65" r="14" fill="#212121" stroke="#000" stroke-width="2"/>
                <circle cx="75" cy="65" r="14" fill="#212121" stroke="#000" stroke-width="2"/>
                <circle cx="30" cy="65" r="8" fill="#B0BEC5" stroke="#455A64" stroke-width="2"/>
                <circle cx="75" cy="65" r="8" fill="#B0BEC5" stroke="#455A64" stroke-width="2"/>
                <path d="M 30 57 L 30 73 M 22 65 L 38 65" stroke="#455A64" stroke-width="2"/>
                <path d="M 75 57 L 75 73 M 67 65 L 83 65" stroke="#455A64" stroke-width="2"/>
                <circle cx="30" cy="65" r="3" fill="#212121"/>
                <circle cx="75" cy="65" r="3" fill="#212121"/>
                <ellipse cx="92" cy="55" rx="3" ry="6" fill="#FFF59D" filter="drop-shadow(2px 0px 5px #FFEA00)"/>
                <path d="M 92 50 Q 97 55 92 60" fill="none" stroke="#FFEA00" stroke-width="2"/>
            </svg>`,
            trophy: () => `<svg viewBox="0 0 100 100" class="w-full h-full svg-shadow drop-shadow-xl">
                <path d="M22 30 C5 30 5 60 30 55" fill="none" stroke="#e5b400" stroke-width="8" stroke-linecap="round"/>
                <path d="M78 30 C95 30 95 60 70 55" fill="none" stroke="#e5b400" stroke-width="8" stroke-linecap="round"/>
                <rect x="42" y="70" width="16" height="15" fill="#d4af37"/>
                <path d="M 42 70 L 58 70 L 53 85 L 47 85 Z" fill="#b8860b"/>
                <rect x="25" y="85" width="50" height="12" rx="4" fill="#8b4513"/>
                <rect x="25" y="85" width="50" height="4" rx="2" fill="#a0522d"/> 
                <rect x="40" y="87" width="20" height="6" fill="#ffd700" rx="1"/> 
                <path d="M25 22 L75 22 L65 55 A 15 15 0 0 1 35 55 Z" fill="#ffc800"/>
                <path d="M25 22 L75 22 L65 55 A 15 15 0 0 1 35 55 Z" fill="#fff59d" opacity="0.4" clip-path="inset(0 50% 0 0)"/>
                <path d="M 35 30 L 45 60" stroke="#ffffff" stroke-width="4" opacity="0.6" stroke-linecap="round"/> 
                <ellipse cx="50" cy="22" rx="26" ry="6" fill="#ffe066" stroke="#d4af37" stroke-width="2"/>
                <ellipse cx="50" cy="22" rx="20" ry="3" fill="#e5b400"/>
                <polygon points="50,35 53,42 60,42 55,47 57,54 50,50 43,54 45,47 40,42 47,42" fill="#fff" opacity="0.9"/>
            </svg>`
        };

        const arrowSvg = `<svg class="absolute -top-12 left-1/2 transform -translate-x-1/2 w-12 h-12 md:w-16 md:h-16 text-duo-red drop-shadow-xl bounce-arrow z-20" fill="none" viewBox="0 0 24 24" stroke="#ff0000" stroke-width="4"><path stroke-linecap="round" stroke-linejoin="round" d="M19 14l-7 7m0 0l-7-7m7 7V3" /></svg>`;

        /* --- GAME DATA & RANDOM GENERATION --- */

        const raceCars12 = [
            {i:'racecar', c:'#ff4b4b', name:'red'},         
            {i:'racecar', c:'#58cc02', name:'green'},       
            {i:'racecar', c:'#1cb0f6', name:'blue'},        
            {i:'racecar', c:'#af52de', name:'purple'},      
            {i:'racecar', c:'#ff9600', name:'orange'},      
            {i:'racecar', c:'#ff7ab3', name:'pink'},        
            {i:'racecar', c:'#00ced1', name:'cyan'},        
            {i:'racecar', c:'#8b4513', name:'brown'},       
            {i:'racecar', c:'#1e3a8a', name:'dark blue'},   
            {i:'racecar', c:'#ffc800', name:'yellow'},      
            {i:'racecar', c:'#a3e635', name:'lime'},        
            {i:'racecar', c:'#9ca3af', name:'gray'}         
        ];

        const cardinalItems = [
            { icon: 'apple', name: 'apples' },
            { icon: 'balloon', name: 'balloons' },
            { icon: 'star', name: 'stars' },
            { icon: 'cupcake', name: 'cupcakes' },
            { icon: 'pencil', name: 'pencils' },
            { icon: 'flower', name: 'flowers' }
        ];

        const btnThemes = [
            { bg: 'bg-duo-blue', border: 'border-duo-blue-dark' },
            { bg: 'bg-duo-purple', border: 'border-duo-purple-dark' },
            { bg: 'bg-duo-pink', border: 'border-duo-pink-dark' },
            { bg: 'bg-duo-orange', border: 'border-duo-orange-dark' }
        ];

        let questions = [];
        let currentIndex = 0;
        let score = 0;
        let isAnswering = false;
        let currentQuestionFailed = false;

        /* --- GAME LOGIC --- */
        function shuffle(array) {
            let curr = array.length, rand;
            while (curr != 0) {
                rand = Math.floor(Math.random() * curr);
                curr--;
                [array[curr], array[rand]] = [array[rand], array[curr]];
            }
            return array;
        }

        function getOrdinalSuffix(i) {
            let j = i % 10, k = i % 100;
            if (j == 1 && k != 11) return "st";
            if (j == 2 && k != 12) return "nd";
            if (j == 3 && k != 13) return "rd";
            return "th";
        }

        // Generate 12 completely new & random questions each time
        function generateRandomQuestions() {
            let generated = [];
            
            // Generate 6 random Cardinal Questions
            let itemsToUse = shuffle([...cardinalItems]);
            for(let i=0; i<6; i++) {
                let item = itemsToUse[i];
                let qty = Math.floor(Math.random() * 12) + 1; // 1 to 12
                generated.push({
                    type: 'cardinal',
                    total: qty,
                    icon: item.icon,
                    q: `How many ${item.name} are there?`,
                    ans: [`${qty}`, `${qty}${getOrdinalSuffix(qty)}`],
                    correct: `${qty}`
                });
            }

            // Generate 6 random Ordinal Questions
            let usedPositions = new Set();
            for(let i=0; i<6; i++) {
                let targetIdx;
                do {
                    targetIdx = Math.floor(Math.random() * 12);
                } while(usedPositions.has(targetIdx));
                usedPositions.add(targetIdx);
                
                let targetCar = raceCars12[targetIdx];
                let pos = targetIdx + 1;
                let ord = `${pos}${getOrdinalSuffix(pos)}`;
                
                generated.push({
                    type: 'ordinal',
                    items: raceCars12,
                    targetIdx: targetIdx,
                    q: `What position is the ${targetCar.name} car in?`,
                    ans: [`${pos}`, ord],
                    correct: ord
                });
            }
            
            return shuffle(generated);
        }

        function startGame() {
            initAudio();
            playClick();
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('game-screen').classList.add('flex');
            
            // Call the random generator instead of hardcoded array
            questions = generateRandomQuestions();
            currentIndex = 0;
            score = 0;
            updateScore();
            loadQuestion();
        }

        function resetGame() {
            playClick();
            document.getElementById('end-screen').classList.add('hidden');
            startGame();
        }

        function loadQuestion() {
            isAnswering = false;
            currentQuestionFailed = false;
            const q = questions[currentIndex];
            
            document.getElementById('question-counter').innerText = `Question ${currentIndex + 1} / ${questions.length}`;
            document.getElementById('progress-fill').style.width = `${((currentIndex) / questions.length) * 100}%`;
            document.getElementById('question-text').innerText = q.q;
            
            renderVisuals(q);
            
            const ansContainer = document.getElementById('answers-container');
            ansContainer.innerHTML = '';
            
            const shuffledAnswers = shuffle([...q.ans]);
            const selectedThemes = shuffle([...btnThemes]).slice(0, 2);

            shuffledAnswers.forEach((ans, idx) => {
                const theme = selectedThemes[idx];
                const btn = document.createElement('button');
                btn.className = `btn-3d flex-1 ${theme.bg} text-white text-3xl md:text-[2.5rem] font-black py-6 px-8 rounded-2xl border-b-[8px] ${theme.border} outline-none w-full hover:brightness-110 tracking-wide`;
                btn.innerText = ans;
                
                btn.onclick = () => checkAnswer(ans, btn, q.correct);
                ansContainer.appendChild(btn);
            });

            setTimeout(readQuestion, 300);
        }

        function readQuestion() {
            const q = questions[currentIndex];
            if(q) speakText(q.q);
        }

        function renderVisuals(q) {
            const container = document.getElementById('visual-container');
            container.innerHTML = '';
            
            const existingBadges = container.querySelectorAll('.feedback-badge');
            existingBadges.forEach(b => b.remove());

            if (q.type === 'cardinal') {
                const wrap = document.createElement('div');
                wrap.className = 'flex flex-wrap justify-center items-center gap-3 md:gap-6 p-4 fade-in w-full h-full content-center';
                for(let i=0; i<q.total; i++) {
                    const iconWrap = document.createElement('div');
                    iconWrap.className = q.total > 8 ? 'w-10 h-10 md:w-14 md:h-14 hover:scale-110 transition-transform' : 'w-12 h-12 md:w-16 md:h-16 hover:scale-110 transition-transform';
                    iconWrap.innerHTML = icons[q.icon]();
                    wrap.appendChild(iconWrap);
                }
                container.appendChild(wrap);
            } 
            else if (q.type === 'ordinal') {
                const wrap = document.createElement('div');
                wrap.className = 'flex items-end w-full h-full relative fade-in';
                
                // LEFT SIDE: Finish Line & Trophy
                const finishLine = document.createElement('div');
                finishLine.className = 'flex flex-col items-center justify-end h-[90%] w-16 md:w-24 border-r-4 border-dashed border-[#a78bfa] z-10 shrink-0 bg-white/40 pb-2 md:pb-4 rounded-l-2xl';
                finishLine.innerHTML = `
                    <div class="w-10 h-10 md:w-14 md:h-14 mb-2 animate-bounce drop-shadow-sm">${icons.trophy()}</div>
                    <div class="text-[10px] md:text-sm font-black text-purple-600 tracking-wider">FINISH</div>
                    <div class="w-full h-4 mt-2 bg-checkered border-t border-b border-gray-400 shadow-sm opacity-80"></div>
                `;
                wrap.appendChild(finishLine);

                // RIGHT SIDE: Race Track and 12 Cars
                const trackWrap = document.createElement('div');
                trackWrap.className = 'flex-1 flex justify-between items-end h-[90%] relative pl-2 md:pl-4 pb-2 md:pb-4';
                
                // Track line (Road)
                const track = document.createElement('div');
                track.className = 'absolute bottom-2 md:bottom-4 left-0 right-2 h-4 bg-gray-400 rounded-full border-b-4 border-gray-500 z-0 shadow-inner';
                trackWrap.appendChild(track);
                
                q.items.forEach((item, idx) => {
                    const itemWrap = document.createElement('div');
                    const percent = Math.floor(100 / q.items.length) - 1;
                    itemWrap.style.width = `${percent}%`;
                    itemWrap.style.maxWidth = '60px';
                    itemWrap.style.minWidth = '20px';
                    itemWrap.className = 'relative flex justify-center z-10';
                    
                    // Cars face left towards the Finish Line
                    const iconHtml = icons[item.i](item.c);
                    itemWrap.innerHTML = `<div class="w-full aspect-square transform scale-x-[-1] hover:scale-[1.2] hover:scale-x-[-1.2] transition-transform cursor-pointer drop-shadow-lg">${iconHtml}</div>`;
                    
                    if (idx === q.targetIdx) {
                        itemWrap.innerHTML += arrowSvg;
                    }
                    trackWrap.appendChild(itemWrap);
                });
                
                wrap.appendChild(trackWrap);
                container.appendChild(wrap);
            }
        }

        function checkAnswer(selected, btnElement, correct) {
            if (isAnswering || btnElement.disabled) return;
            isAnswering = true;

            btnElement.className = btnElement.className.replace(/bg-duo-[a-z]+/g, '').replace(/border-duo-[a-z]+-dark/g, '');

            if (selected === correct) {
                playDing();
                
                if (!currentQuestionFailed) {
                    score++;
                    updateScore();
                }
                
                btnElement.classList.add('bg-duo-green', 'border-duo-green-dark');
                
                showFeedbackBadge(true, !currentQuestionFailed);
                
                setTimeout(() => {
                    currentIndex++;
                    if (currentIndex < questions.length) {
                        loadQuestion();
                    } else {
                        endGame();
                    }
                }, 1500);

            } else {
                playWrong();
                currentQuestionFailed = true;
                
                btnElement.classList.add('bg-duo-red', 'border-duo-red-dark', 'shake');
                
                showFeedbackBadge(false, false);

                setTimeout(() => {
                    btnElement.classList.remove('shake');
                    btnElement.disabled = true; 
                    isAnswering = false;
                }, 1200);
            }
        }

        function showFeedbackBadge(isCorrect, gotPoint) {
            const container = document.getElementById('visual-container');
            const badge = document.createElement('div');
            badge.className = 'feedback-badge absolute inset-0 flex flex-col items-center justify-center z-30 bg-white/90 backdrop-blur-sm rounded-[1.5rem] pop-in';
            
            if (isCorrect) {
                const message = gotPoint ? "Excellent!" : "Correct!";
                badge.innerHTML = `
                    <div class="bg-duo-green text-white rounded-full p-4 drop-shadow-xl mb-4 transform scale-110">
                        <svg class="w-20 h-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <h2 class="text-duo-green font-black text-4xl drop-shadow-sm tracking-wide">${message}</h2>
                `;
            } else {
                badge.innerHTML = `
                    <div class="bg-duo-red text-white rounded-full p-4 drop-shadow-xl mb-4">
                        <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </div>
                    <h2 class="text-duo-red font-black text-3xl drop-shadow-sm tracking-wide">Try again!</h2>
                `;
                setTimeout(() => { if(badge.parentNode) badge.remove(); }, 1200);
            }
            container.appendChild(badge);
        }

        function updateScore() {
            document.getElementById('score-text').innerText = score;
        }

        function endGame() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('flex');
            
            const endScreen = document.getElementById('end-screen');
            endScreen.classList.remove('hidden');
            
            document.getElementById('final-score').innerText = `${score}/12`;
            document.getElementById('progress-fill').style.width = '100%';
            
            playWin();
            
            if (score === 12) {
                speakText("Perfect score! Amazing work! You finished the game.");
            } else {
                speakText(`Great job! You scored ${score} out of 12. You finished the game.`);
            }
            
            launchConfetti();
        }

        /* --- CONFETTI SYSTEM --- */
        function launchConfetti() {
            const colors = ['#58cc02', '#1cb0f6', '#ffc800', '#ff0000', '#af52de', '#ff7ab3'];
            for(let i=0; i<150; i++) {
                const conf = document.createElement('div');
                conf.className = 'fixed z-[9999] rounded-sm pointer-events-none';
                
                const size = Math.random() * 12 + 10;
                conf.style.width = `${size}px`;
                conf.style.height = `${size * (Math.random() > 0.5 ? 1 : 1.5)}px`;
                if(Math.random() > 0.5) conf.style.borderRadius = '50%';
                
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.left = `${Math.random() * 100}vw`;
                conf.style.top = '-20px';
                
                document.body.appendChild(conf);

                const duration = Math.random() * 3000 + 2000;
                
                if (typeof conf.animate === 'function') {
                    conf.animate([
                        { transform: `translate3d(0,0,0) rotate(0deg)`, opacity: 1 },
                        { transform: `translate3d(${Math.random()*400 - 200}px, 100vh, 0) rotate(${Math.random()*720}deg)`, opacity: 0 }
                    ], {
                        duration: duration,
                        easing: 'cubic-bezier(.37,0,.63,1)'
                    });
                } else {
                    conf.style.transition = `all ${duration}ms linear`;
                    setTimeout(() => {
                        conf.style.transform = `translateY(100vh) rotate(360deg)`;
                        conf.style.opacity = '0';
                    }, 10);
                }

                setTimeout(() => {
                    if(conf.parentNode) conf.remove();
                }, duration);
            }
        }
    </script>
