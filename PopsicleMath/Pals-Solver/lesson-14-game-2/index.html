<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toy Shop Math Ver 3</title>
    
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            blue: '#1CB0F6',
                            blueDark: '#1899D6',
                            cyan: '#00C2FF',
                            cyanDark: '#0099CC',
                            green: '#58CC02',
                            greenDark: '#46A302',
                            yellow: '#FFC800',
                            yellowDark: '#E5B400',
                            red: '#FF4B4B',
                            redDark: '#E54343',
                            pink: '#FF71C6',
                            pinkDark: '#E566B2',
                            purple: '#CE82FF',
                            gray: '#E5E5E5',
                            grayDark: '#AFAFAF'
                        }
                    },
                    animation: {
                        'pop-in': 'popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'bounce-slight': 'bounceSlight 2s infinite',
                        'cross-out': 'crossOut 0.4s ease-out forwards'
                    },
                    keyframes: {
                        popIn: {
                            '0%': { transform: 'scale(0.5)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' }
                        },
                        bounceSlight: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-5px)' }
                        },
                        crossOut: {
                            '0%': { transform: 'scale(0) rotate(45deg)', opacity: '0' },
                            '100%': { transform: 'scale(1) rotate(45deg)', opacity: '1' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            touch-action: none;
        }

        /* Background Canvas */
        #backgroundCanvas {
            display: block;
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1; 
            pointer-events: none;
        }

        /* 3D Buttons & Elements */
        .btn-3d {
            border-bottom-width: 6px;
            transition: transform 0.1s, border-bottom-width 0.1s;
        }
        .btn-3d:active:not(:disabled) {
            border-bottom-width: 0px;
            transform: translateY(6px);
        }
        
        .toggle-btn {
            border-bottom-width: 4px;
            transition: all 0.1s;
        }
        .toggle-btn.active {
            border-bottom-width: 0px;
            transform: translateY(4px);
        }

        .btn-answer {
            background-color: #00C2FF;
            border: 3px solid #0099CC;
            border-bottom-width: 8px;
            color: white;
            transition: all 0.1s;
        }
        .btn-answer:active:not(:disabled) {
            border-bottom-width: 0px;
            transform: translateY(8px);
        }
        .btn-answer.correct { background-color: #58CC02; border-color: #46A302; }
        .btn-answer.wrong { background-color: #FF4B4B; border-color: #E54343; }

        /* Shop Items */
        .shop-item {
            width: 90px;
            height: 110px;
            background: white;
            border-radius: 16px;
            border: 3px solid #E5E5E5;
            border-bottom-width: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* Draggable Bills / Dots */
        .bill {
            width: 75px;
            min-height: 85px;
            padding: 8px 4px;
            background-color: #00C2FF;
            border: 3px solid #0099CC;
            border-bottom-width: 5px;
            border-radius: 12px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 50;
            transition: transform 0.1s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
        }
        .bill.sub-bill {
            width: 65px; min-height: 75px; padding: 6px 2px;
        }
        .bill:hover { transform: scale(1.05); }
        .bill:active { transform: scale(1.1) rotate(-3deg); border-bottom-width: 2px; }
        
        .is-dragging {
            position: absolute !important;
            opacity: 0.95;
            transform: scale(1.2) rotate(-5deg) !important;
            z-index: 9999 !important;
            pointer-events: none;
            margin: 0 !important;
            box-shadow: 0 15px 25px rgba(0,0,0,0.3) !important;
        }

        .dropzone {
            transition: all 0.2s;
        }
        .dropzone.active {
            background-color: rgba(255, 200, 0, 0.2) !important;
            border-color: #FFC800 !important;
        }

        /* Cải tiến Dots (Chấm) */
        .dots-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: flex-start;
            gap: 3px;
            width: 100%;
            max-width: 55px; /* Giới hạn độ rộng để wrap thành 2 hàng cho $10 */
            margin-top: 6px;
        }
        .dot {
            width: 8px;
            height: 8px;
            background-color: white;
            border-radius: 50%;
            box-shadow: inset -1px -1px 2px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.4);
        }

        /* Cross Out Animation cho Phép trừ */
        .bill.crossed {
            filter: grayscale(100%) opacity(0.6);
            pointer-events: none;
            position: relative;
        }
        .bill.crossed::after {
            content: ''; position: absolute; top: 48%; left: -10%; width: 120%; height: 6px;
            background: #FF4B4B; border-radius: 3px; transform: rotate(45deg) scale(0); transform-origin: center;
            animation: crossOut 0.4s ease-out forwards;
        }
        .bill.crossed::before {
            content: ''; position: absolute; top: 48%; left: -10%; width: 120%; height: 6px;
            background: #FF4B4B; border-radius: 3px; transform: rotate(-45deg) scale(0); transform-origin: center;
            animation: crossOut 0.4s ease-out forwards; animation-delay: 0.1s;
        }

        @media (min-width: 768px) {
            .shop-item { width: 110px; height: 130px; }
            .bill { width: 85px; min-height: 95px; }
            .dots-grid { max-width: 70px; gap: 4px; }
            .dot { width: 10px; height: 10px; }
        }
    </style>
</head>
<body class="w-full h-screen flex flex-col relative text-gray-800">

    <!-- CANVAS BACKGROUND -->
    <canvas id="backgroundCanvas" aria-label="Sunny outdoor background"></canvas>

    <!-- SETUP SCREEN -->
    <div id="setup-screen" class="absolute inset-0 z-50 bg-white/30 backdrop-blur-md flex flex-col items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white/95 p-6 md:p-10 rounded-[3rem] shadow-[0_20px_50px_rgba(0,0,0,0.2)] w-full max-w-lg text-center border-b-[8px] border-brand-cyan z-10 relative my-auto">

                    <div class="flex gap-2 justify-center flex-wrap" id="config-theme">
                        <button class="toggle-btn bg-white border-gray-300 text-gray-500 px-4 py-2 rounded-xl font-black" data-val="toy">🧸 Toys</button>
                        <button class="toggle-btn bg-white border-gray-300 text-gray-500 px-4 py-2 rounded-xl font-black" data-val="grocery">🍎 Grocery</button>
                        <button class="toggle-btn active bg-brand-pink border-brand-pinkDark text-white px-4 py-2 rounded-xl font-black" data-val="mix">Mixed</button>
                    </div>
                </div>
            </div>

            <button id="btn-start" class="btn-3d w-full bg-brand-yellow border-brand-yellowDark text-white text-2xl md:text-3xl font-black py-4 md:py-5 rounded-2xl uppercase tracking-wider">
                START GAME
            </button>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="hidden absolute inset-0 z-40 flex flex-col bg-transparent overflow-hidden">
        
        <!-- HEADER -->
        <div class="absolute top-4 left-4 z-30 flex gap-3 pointer-events-auto">
            <div class="bg-white/95 backdrop-blur text-brand-blue font-black px-4 py-2 rounded-2xl shadow-md border-b-4 border-gray-200 text-lg md:text-xl">
                Q: <span id="ui-qnum">1</span>/10
            </div>
            <div class="bg-white/95 backdrop-blur text-brand-yellow font-black px-4 py-2 rounded-2xl shadow-md border-b-4 border-gray-200 text-lg md:text-xl">
                ⭐ <span id="ui-score">0</span>
            </div>

        <!-- INSTRUCTION BUBBLE -->
        <div class="w-full flex justify-center mt-20 md:mt-16 z-30 pointer-events-none px-4">
            <div class="bg-white/95 backdrop-blur-md rounded-[2rem] p-3 md:p-4 shadow-xl border-b-4 border-gray-200 flex items-center justify-center gap-4 pointer-events-auto w-auto max-w-[95%] border-2 border-white transition-all">

                    <svg class="w-6 h-6 md:w-7 md:h-7" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                </button>
                <!-- NEXT BUTTON -->
                <button id="btn-next" class="hidden btn-3d flex-shrink-0 bg-brand-green border-brand-greenDark text-white font-black text-xl md:text-2xl px-6 py-2 md:py-3 rounded-xl ml-2 uppercase animate-pulse">

        <!-- DYNAMIC PLAY AREA -->
        <div id="play-area" class="flex-1 relative flex flex-col items-center justify-start pt-[2vh] md:pt-[5vh] z-20 pointer-events-auto px-4 w-full max-w-5xl mx-auto pb-[20vh]">
            <!-- Content injected by JS based on phase -->
        </div>

        <!-- BOTTOM PANEL (Answers or Next Button) -->
        <div id="panel-bottom" class="absolute bottom-0 w-full bg-white/90 backdrop-blur-lg shadow-[0_-20px_50px_rgba(0,0,0,0.15)] p-4 md:p-6 z-40 transform translate-y-full transition-transform duration-500 rounded-t-[2rem] md:rounded-t-[3rem] border-t-[8px] border-gray-100 flex flex-col items-center pointer-events-auto">
            
            <div id="ui-choices" class="grid grid-cols-4 gap-3 md:gap-6 w-full max-w-4xl">

        </div>

    <!-- END SCREEN -->
    <div id="end-screen" class="hidden absolute inset-0 z-50 bg-black/40 backdrop-blur-sm flex flex-col items-center justify-center p-4 overflow-hidden pointer-events-auto">
        <canvas id="confetti" class="absolute inset-0 pointer-events-none z-[9999]"></canvas>
        
        <div class="bg-white p-10 md:p-14 rounded-[3rem] shadow-[0_25px_60px_rgba(0,0,0,0.5)] w-full max-w-lg text-center border-b-[10px] border-brand-cyan z-10 relative">
            <h1 class="text-5xl md:text-6xl font-black text-brand-cyanDark mb-4 tracking-tight">Great Job!</h1>
            <div class="text-[5rem] md:text-[6rem] mb-6 drop-shadow-lg leading-none animate-bounce" id="ui-stars">⭐⭐⭐</div>

                    BACK TO SETUP

    <!-- ======================= JAVASCRIPT ======================= -->
    <script>
        /** CANVAS BACKGROUND SYSTEM **/
        (() => {
            const bgCanvas = document.getElementById('backgroundCanvas');
            const bgCtx = bgCanvas.getContext('2d', { alpha: false });

            let bgWidth = 0; let bgHeight = 0;
            let bgClouds = []; let bgTrees = []; let bgFlowers = []; let bgButterflies = [];
            const flowerColors = ['#ff4b4b', '#ffc800', '#ce82ff', '#ffffff', '#1cb0f6', '#ff8fab'];

            function resizeBackgroundCanvas() {
                const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
                bgWidth = window.innerWidth; bgHeight = window.innerHeight;
                bgCanvas.width = Math.floor(bgWidth * dpr); bgCanvas.height = Math.floor(bgHeight * dpr);
                bgCanvas.style.width = bgWidth + 'px'; bgCanvas.style.height = bgHeight + 'px';
                bgCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
                generateBackgroundEnvironment();
            }

            function generateBackgroundEnvironment() {
                bgClouds = []; bgTrees = []; bgFlowers = []; bgButterflies = [];
                const cloudCount = bgWidth < 600 ? 3 : 5;
                for (let i = 0; i < cloudCount; i++) {
                    bgClouds.push({ x: Math.random() * bgWidth, y: bgHeight * (0.05 + Math.random() * 0.3), size: 28 + Math.random() * (bgWidth < 600 ? 34 : 52), speed: Math.random() * 0.16 + 0.05, opacity: 0.72 + Math.random() * 0.24 });
                }
                const treeCount = bgWidth < 600 ? 6 : 11;
                for (let i = 0; i < treeCount; i++) {
                    bgTrees.push({ x: (i / Math.max(1, treeCount - 1)) * bgWidth + (Math.random() * 70 - 35), y: bgHeight * (0.55 + Math.random() * 0.05), scale: 0.48 + Math.random() * 0.56 });
                }
                const flowerCount = bgWidth < 600 ? 10 : 18;
                for (let i = 0; i < flowerCount; i++) {
                    bgFlowers.push({ x: Math.random() * bgWidth, y: bgHeight * 0.65 + Math.random() * (bgHeight * 0.15), color: flowerColors[Math.floor(Math.random() * flowerColors.length)], scale: 0.42 + Math.random() * 0.42, sway: Math.random() * Math.PI * 2, petals: Math.random() > 0.45 ? 6 : 5 });
                }
                for (let i = 0; i < 4; i++) {
                    bgButterflies.push({ x: Math.random() * bgWidth, y: bgHeight * (0.28 + Math.random() * 0.24), size: 5 + Math.random() * 4, speed: 0.18 + Math.random() * 0.18, phase: Math.random() * Math.PI * 2, color: ['#ff6b9d', '#ffd93d', '#9b5de5', '#00bbf9'][i % 4] });
                }
            }

            function updateBackground() {
                bgClouds.forEach(cloud => {
                    cloud.x -= cloud.speed;
                    if (cloud.x + cloud.size * 2.4 < 0) { cloud.x = bgWidth + cloud.size * 2.4; cloud.y = bgHeight * (0.05 + Math.random() * 0.3); }
                });
                bgButterflies.forEach(b => {
                    b.x += b.speed; b.phase += 0.08;
                    if (b.x > bgWidth + 30) { b.x = -30; b.y = bgHeight * (0.28 + Math.random() * 0.24); }
                });
            }

            function drawBackground(time = 0) {
                const skyGradient = bgCtx.createLinearGradient(0, 0, 0, bgHeight * 0.72);
                skyGradient.addColorStop(0, '#7dd3fc'); skyGradient.addColorStop(0.62, '#bae6fd'); skyGradient.addColorStop(1, '#e0f8ff');
                bgCtx.fillStyle = skyGradient; bgCtx.fillRect(0, 0, bgWidth, bgHeight);

                const sx = Math.min(90, bgWidth * 0.12); const sy = Math.min(92, bgHeight * 0.13); const sr = Math.max(35, Math.min(bgWidth, bgHeight) * 0.055);
                bgCtx.save(); bgCtx.translate(sx, sy);
                bgCtx.fillStyle = 'rgba(255, 213, 82, 0.22)'; bgCtx.beginPath(); bgCtx.arc(0, 0, sr * 1.75, 0, Math.PI * 2); bgCtx.fill();
                bgCtx.fillStyle = '#FFD369'; bgCtx.beginPath(); bgCtx.arc(0, 0, sr, 0, Math.PI * 2); bgCtx.fill();
                bgCtx.fillStyle = '#D35400'; bgCtx.beginPath(); bgCtx.arc(-sr * 0.32, -sr * 0.1, sr * 0.08, 0, Math.PI * 2); bgCtx.arc(sr * 0.32, -sr * 0.1, sr * 0.08, 0, Math.PI * 2); bgCtx.fill();
                bgCtx.strokeStyle = '#D35400'; bgCtx.lineWidth = Math.max(3, sr * 0.07); bgCtx.lineCap = 'round';
                bgCtx.beginPath(); bgCtx.arc(0, sr * 0.12, sr * 0.36, 0.15 * Math.PI, 0.85 * Math.PI); bgCtx.stroke();
                bgCtx.restore();

                bgCtx.save(); bgCtx.translate(bgWidth * 0.5, bgHeight * 0.65); bgCtx.lineWidth = Math.max(16, Math.min(35, bgWidth * 0.025)); bgCtx.lineCap = 'round';
                const rainbowColors = ['#ff4b4b', '#ff9900', '#ffc800', '#58cc02', '#1cb0f6', '#ce82ff'];
                const baseRadius = Math.min(bgWidth * 0.48, bgHeight * 0.55, 700);
                for (let i = 0; i < rainbowColors.length; i++) {
                    bgCtx.strokeStyle = rainbowColors[i]; bgCtx.globalAlpha = 0.85; bgCtx.beginPath(); bgCtx.arc(0, 0, baseRadius - i * bgCtx.lineWidth, Math.PI, 0); bgCtx.stroke();
                }
                bgCtx.restore();

                bgClouds.forEach(c => {
                    bgCtx.save(); bgCtx.globalAlpha = c.opacity; bgCtx.fillStyle = '#ffffff'; bgCtx.beginPath();
                    bgCtx.arc(c.x, c.y, c.size, 0, Math.PI * 2); bgCtx.arc(c.x + c.size * 0.82, c.y + c.size * 0.2, c.size * 0.72, 0, Math.PI * 2);
                    bgCtx.arc(c.x - c.size * 0.85, c.y + c.size * 0.22, c.size * 0.68, 0, Math.PI * 2); bgCtx.arc(c.x + c.size * 0.15, c.y - c.size * 0.28, c.size * 0.72, 0, Math.PI * 2);
                    bgCtx.fill(); bgCtx.restore();
                });

                bgButterflies.forEach(b => {
                    const y = b.y + Math.sin(b.phase) * 10;
                    bgCtx.save(); bgCtx.translate(b.x, y); bgCtx.fillStyle = b.color; bgCtx.globalAlpha = 0.88;
                    bgCtx.beginPath(); bgCtx.ellipse(-b.size, 0, b.size, b.size * 1.35, Math.sin(b.phase) * 0.5, 0, Math.PI * 2);
                    bgCtx.ellipse(b.size, 0, b.size, b.size * 1.35, -Math.sin(b.phase) * 0.5, 0, Math.PI * 2); bgCtx.fill();
                    bgCtx.strokeStyle = '#334155'; bgCtx.lineWidth = 1.4; bgCtx.beginPath(); bgCtx.moveTo(0, -b.size * 1.1); bgCtx.lineTo(0, b.size * 1.2); bgCtx.stroke();
                    bgCtx.restore();
                });

                bgCtx.fillStyle = '#65a30d'; bgCtx.beginPath(); bgCtx.moveTo(0, bgHeight); bgCtx.lineTo(0, bgHeight * 0.60);
                for (let x = 0; x <= bgWidth + 280; x += 280) bgCtx.quadraticCurveTo(x - 140, bgHeight * 0.50, x, bgHeight * 0.60);
                bgCtx.lineTo(bgWidth, bgHeight); bgCtx.fill();

                bgTrees.forEach(t => {
                    bgCtx.save(); bgCtx.translate(t.x, t.y); bgCtx.scale(t.scale, t.scale);
                    bgCtx.fillStyle = '#8B5A2B'; bgCtx.fillRect(-9, 0, 18, 56);
                    bgCtx.fillStyle = '#4ade80'; bgCtx.beginPath(); bgCtx.arc(0, -24, 38, 0, Math.PI * 2); bgCtx.arc(-25, -12, 29, 0, Math.PI * 2); bgCtx.arc(24, -10, 30, 0, Math.PI * 2); bgCtx.fill();
                    bgCtx.fillStyle = 'rgba(255,255,255,0.28)'; bgCtx.beginPath(); bgCtx.arc(-12, -34, 12, 0, Math.PI * 2); bgCtx.fill(); bgCtx.restore();
                });

                bgCtx.fillStyle = '#58cc02'; bgCtx.beginPath(); bgCtx.moveTo(0, bgHeight); bgCtx.lineTo(0, bgHeight * 0.65);
                bgCtx.quadraticCurveTo(bgWidth * 0.5, bgHeight * 0.58, bgWidth, bgHeight * 0.65); bgCtx.lineTo(bgWidth, bgHeight); bgCtx.fill();
                bgCtx.strokeStyle = '#84cc16'; bgCtx.lineWidth = Math.max(10, Math.min(18, bgWidth * 0.014)); bgCtx.lineCap = 'round';
                bgCtx.beginPath(); bgCtx.moveTo(-20, bgHeight * 0.65); bgCtx.quadraticCurveTo(bgWidth * 0.5, bgHeight * 0.58, bgWidth + 20, bgHeight * 0.65); bgCtx.stroke();

                bgFlowers.forEach(f => {
                    bgCtx.save(); const sway = Math.sin(time * 0.0015 + f.sway) * 1.4; bgCtx.translate(f.x + sway, f.y); bgCtx.scale(f.scale, f.scale);
                    bgCtx.strokeStyle = '#259a3f'; bgCtx.lineWidth = 2.4; bgCtx.lineCap = 'round'; bgCtx.beginPath(); bgCtx.moveTo(0, 5); bgCtx.quadraticCurveTo(2, 14, 0, 23); bgCtx.stroke();
                    bgCtx.fillStyle = '#55d85a'; bgCtx.beginPath(); bgCtx.ellipse(-6, 15, 4, 8, -0.8, 0, Math.PI * 2); bgCtx.ellipse(6, 18, 4, 8, 0.75, 0, Math.PI * 2); bgCtx.fill();
                    const pCount = f.petals || 6; bgCtx.fillStyle = f.color;
                    for (let p = 0; p < pCount; p++) { bgCtx.save(); bgCtx.rotate((Math.PI * 2 * p) / pCount); bgCtx.beginPath(); bgCtx.ellipse(0, -9, 5.2, 9.5, 0, 0, Math.PI * 2); bgCtx.fill(); bgCtx.restore(); }
                    bgCtx.fillStyle = '#ffe066'; bgCtx.beginPath(); bgCtx.arc(0, 0, 5, 0, Math.PI * 2); bgCtx.fill(); bgCtx.strokeStyle = 'rgba(154,103,0,0.28)'; bgCtx.lineWidth = 1; bgCtx.stroke(); bgCtx.restore();
                });
            }

            function backgroundAnimationLoop(time) {
                updateBackground(); drawBackground(time); requestAnimationFrame(backgroundAnimationLoop);
            }

            window.addEventListener('resize', resizeBackgroundCanvas); resizeBackgroundCanvas(); requestAnimationFrame(backgroundAnimationLoop);
        })();

        /** AUDIO & TTS SYSTEM **/
        const AudioSys = {
            ctx: null,
            init: function() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            playTone: function(freq, type, duration, vol=0.1) {
                if (!this.ctx) return;
                try {
                    const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                    osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    gain.gain.setValueAtTime(vol, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                    osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + duration);
                } catch(e) {}
            },
            pop: () => AudioSys.playTone(600, 'sine', 0.1, 0.1),
            remove: () => AudioSys.playTone(300, 'sine', 0.1, 0.05),
            correct: () => { AudioSys.playTone(500, 'sine', 0.1); setTimeout(() => AudioSys.playTone(800, 'sine', 0.2), 100); setTimeout(() => AudioSys.playTone(1000, 'sine', 0.3), 200); },
            wrong: () => { AudioSys.playTone(200, 'sawtooth', 0.3, 0.1); },

        };

        /** GAME LOGIC **/
        function getItems() {
            let pool = state.theme === 'mix' ? [...THEMES.toy, ...THEMES.grocery] : THEMES[state.theme];
            pool = pool.sort(() => Math.random() - 0.5);
            return [pool[0], pool[1]];
        }

        function generateQuestion() {
            let type = state.op === 'mix' ? (Math.random() > 0.5 ? 'add' : 'sub') : state.op;
            let a, b, answer, signature, attempts = 0;
            const items = getItems();

            do {
                if (type === 'add') {
                    answer = Math.floor(Math.random() * (state.range - 3)) + 4; 
                    a = Math.floor(Math.random() * (answer - 1)) + 1;
                    b = answer - a;
                } else {
                    let possibleStarts = [10, 20, 30, 50, 100].filter(v => v <= state.range);
                    a = possibleStarts[Math.floor(Math.random() * possibleStarts.length)] || state.range;
                    b = Math.floor(Math.random() * (a - 1)) + 1;
                    answer = a - b;
                }
                signature = `${type}_${a}_${b}`;
                attempts++;
            } while (state.usedQuestions.has(signature) && attempts < 100);
            
            state.usedQuestions.add(signature);
            return { type, a, b, answer, items };
        }

        function generateChoices(correct) {
            let choices = new Set([correct]);
            while(choices.size < 4) {
                let offset = Math.floor(Math.random() * 11) - 5; 
                if(offset === 0) continue;
                let wrong = correct + offset;
                if (wrong >= 0 && wrong <= state.range + 5) choices.add(wrong);
            }
            return Array.from(choices).sort(() => Math.random() - 0.5);
        }

        function darkenColor(hex, percent) {
            let r = parseInt(hex.substring(1,3), 16);
            let g = parseInt(hex.substring(3,5), 16);
            let b = parseInt(hex.substring(5,7), 16);
            r = Math.max(0, r - percent); g = Math.max(0, g - percent); b = Math.max(0, b - percent);
            return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
        }

            let bills = [];

            [10, 5, 2, 1].forEach(denom => {

                    remaining -= denom;
                }
            });
            return bills;
        }

        /** ================= DRAG, DROP & CLICK ENGINE ================= **/
        let activeDrag = null; let startX=0, startY=0, initLeft=0, initTop=0;
        
        function setupDraggables(specificEl = null) {
            const targets = specificEl ? [specificEl] : document.querySelectorAll('.draggable');
            targets.forEach(el => {
                el.addEventListener('pointerdown', e => {
                    if (!el.classList.contains('draggable') || state.phase === 2) return;
                    e.preventDefault();
                    
                    let dragEl = el;
                    let isSource = el.dataset.source === 'true';
                    
                    if (isSource) {
                        // Clone source bill
                        dragEl = el.cloneNode(true);
                        dragEl.dataset.source = 'false'; // Khỏi bị clone lại
                        setupDraggables(dragEl); // Gắn event cho clone
                    }

                    activeDrag = dragEl; AudioSys.init();
                    
                    const rect = el.getBoundingClientRect(); 
                    initLeft = rect.left; initTop = rect.top; 
                    startX = e.clientX; startY = e.clientY;
                    activeDrag.dataset.moved = 'false';

                    document.body.appendChild(activeDrag); 
                    activeDrag.classList.add('is-dragging'); 
                    activeDrag.style.left = initLeft + 'px'; activeDrag.style.top = initTop + 'px';
                    activeDrag.setPointerCapture(e.pointerId);
                });
            });
        }

        document.body.addEventListener('pointermove', e => {
            if (!activeDrag) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            if (Math.abs(dx) > 5 || Math.abs(dy) > 5) activeDrag.dataset.moved = 'true';
            activeDrag.style.left = (initLeft + dx) + 'px';
            activeDrag.style.top = (initTop + dy) + 'px';
        });

        document.body.addEventListener('pointerup', e => {
            if (!activeDrag) return;
            activeDrag.releasePointerCapture(e.pointerId); 
            activeDrag.classList.remove('is-dragging');
            activeDrag.style.position = ''; activeDrag.style.left = ''; activeDrag.style.top = '';

            const isTap = activeDrag.dataset.moved !== 'true';
            const val = parseInt(activeDrag.dataset.val);
            const isBundle = activeDrag.dataset.isbundle === 'true';

            activeDrag.style.display = 'none'; 
            const elemBelow = document.elementFromPoint(e.clientX, e.clientY); 
            activeDrag.style.display = 'flex';
            
            const targetZone = elemBelow ? elemBelow.closest('.dropzone') : null;

            if (state.currentQ.type === 'add') {
                const zOnes = document.getElementById('zone-ones');
                const zTens = document.getElementById('zone-tens');

                // HÀNH ĐỘNG CLICK / TAP (Auto-move)
                if (isTap) {
                    if (isBundle) {
                        // Gộp $10

                        let newSum = getZoneSum(zOnes) - 10; // actually previous sum - 10

                        AudioSys.pop();

                    } else if (activeDrag.dataset.wasPlaced === 'true') {
                        // Click vào tờ tiền ĐÃ ĐẶT -> Xóa đi (sửa sai)
                        activeDrag.remove();
                        AudioSys.remove();

                        // Nguồn -> Khung
                        if (val === 10) zTens.appendChild(activeDrag);
                        else zOnes.appendChild(activeDrag);
                        activeDrag.dataset.wasPlaced = 'true';
                        AudioSys.pop();
                    }
                } 
                // HÀNH ĐỘNG KÉO THẢ (DRAG)
                else {
                    if (targetZone) {
                        if (isBundle && targetZone.id === 'zone-tens') {
                            zTens.innerHTML += createBillHTML(10, false);
                            // Xóa các bill lẻ trong Ones để bù trừ 10
                            let removed = 0;
                            const onesBills = Array.from(zOnes.querySelectorAll('.bill:not(.bundle-btn)')).sort((a,b) => parseInt(b.dataset.val) - parseInt(a.dataset.val));
                            for(let b of onesBills) {

                                    removed += parseInt(b.dataset.val);
                                    b.remove();
                                }
                            }
                            // Nếu removed > 10 (vd 5,5,2 tháo 5,5 vừa đẹp. Nếu lỡ 5,2,2,2 = 11, tháo hết 11 trả lại 1)
                            if (removed > 10) {
                                zOnes.innerHTML += createBillHTML(removed - 10, false);
                            }
                            activeDrag.remove();
                            setupDraggables(); // Gắn event cho DOM mới
                            AudioSys.pop();
                        } else if (!isBundle) {
                            if (val === 10 && targetZone.id === 'zone-tens') { targetZone.appendChild(activeDrag); activeDrag.dataset.wasPlaced = 'true'; AudioSys.pop(); }
                            else if (val < 10 && targetZone.id === 'zone-ones') { targetZone.appendChild(activeDrag); activeDrag.dataset.wasPlaced = 'true'; AudioSys.pop(); }
                            else activeDrag.remove(); // Drop sai chỗ -> biến mất
                        } else activeDrag.remove();
                    } else activeDrag.remove();
                }

                // Gắn lại event cho bill mới thêm bằng innerHTML
                document.querySelectorAll('#zone-tens .bill, #zone-ones .bill').forEach(b => {
                    if (!b.classList.contains('draggable')) {
                        b.classList.add('draggable');
                        b.dataset.wasPlaced = 'true';
                        setupDraggables(b);
                    }
                });
                checkAddProgress();

            } else {
                // PHÉP TRỪ
                const zWallet = document.getElementById('zone-wallet');
                const zPayment = document.getElementById('zone-payment');

                if (isTap) {
                    // Chạm để chuyển qua lại
                    if (activeDrag.parentElement === zWallet) zPayment.appendChild(activeDrag);
                    else zWallet.appendChild(activeDrag);
                    AudioSys.pop();
                } else {
                    if (targetZone) {
                        targetZone.appendChild(activeDrag); AudioSys.pop();
                    } else {
                        // Rớt ra ngoài -> về chỗ cũ
                        if(activeDrag.dataset.oldZone === 'payment') zPayment.appendChild(activeDrag);
                        else zWallet.appendChild(activeDrag);
                    }
                }
                activeDrag.dataset.oldZone = activeDrag.parentElement.id === 'zone-payment' ? 'payment' : 'wallet';
                checkSubProgress();
            }

            activeDrag = null;
        });

        function getZoneSum(zone) {
            let sum = 0;
            zone.querySelectorAll('.bill:not(.bundle-btn)').forEach(b => sum += parseInt(b.dataset.val));
            return sum;
        }

        // Global Event Listeners
        document.getElementById('btn-start').onclick = () => { 
            AudioSys.init(); 
            document.getElementById('setup-screen').classList.add('hidden'); 
            document.getElementById('game-screen').classList.remove('hidden'); 
            state.score = 0; state.qNum = 0; ui.score.textContent = 0; 
            loadQuestion(); 
        };
        
        ui.btnTts.onclick = () => { speak(state.speechText); };
        ui.btnNext.onclick = () => { AudioSys.pop(); ui.btnNext.classList.add('hidden'); loadQuestion(); };
        
        document.getElementById('btn-replay').onclick = () => { 
            document.getElementById('end-screen').classList.add('hidden'); 
            state.score = 0; state.qNum = 0; ui.score.textContent = 0; state.usedQuestions.clear();
            loadQuestion();
        };

        document.getElementById('btn-home').onclick = () => { 
            document.getElementById('end-screen').classList.add('hidden'); 
            document.getElementById('setup-screen').classList.remove('hidden'); 
            state.usedQuestions.clear(); 
        };

        function endGame() {
            document.getElementById('game-screen').classList.add('hidden'); 
            document.getElementById('end-screen').classList.remove('hidden'); 
            AudioSys.win();
            document.getElementById('ui-final-score').textContent = `${state.score}/${state.totalQ}`;
            document.getElementById('ui-stars').textContent = state.score >= 9 ? '⭐⭐⭐' : state.score >= 6 ? '⭐⭐' : state.score >= 3 ? '⭐' : '🌱';
            startConfetti();
        }

        /** CONFETTI **/
        let confettiCtx; let confettiParticles = []; let confettiLoop;
        function startConfetti() {
            const canvas = document.getElementById('confetti'); canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            confettiCtx = canvas.getContext('2d'); confettiParticles = [];
            const colors = ['#1CB0F6', '#58CC02', '#FFC800', '#FF4B4B', '#CE82FF'];
            for(let i=0; i<200; i++) confettiParticles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height - canvas.height, w: Math.random() * 15 + 10, h: Math.random() * 15 + 10, color: colors[Math.floor(Math.random() * colors.length)], vy: Math.random() * 6 + 3, vx: Math.random() * 6 - 3, rot: Math.random() * 360, rotSpeed: Math.random() * 15 - 7 });
            cancelAnimationFrame(confettiLoop); requestAnimationFrame(drawConfetti);
        }
        function drawConfetti() {
            if (document.getElementById('end-screen').classList.contains('hidden')) return;
            confettiCtx.clearRect(0, 0, confettiCtx.canvas.width, confettiCtx.canvas.height);
            confettiParticles.forEach(p => { p.y += p.vy; p.x += p.vx; p.rot += p.rotSpeed; if (p.y > confettiCtx.canvas.height) { p.y = -20; p.x = Math.random() * confettiCtx.canvas.width; }
                confettiCtx.save(); confettiCtx.translate(p.x, p.y); confettiCtx.rotate(p.rot * Math.PI / 180); confettiCtx.fillStyle = p.color; confettiCtx.fillRect(-p.w/2, -p.h/2, p.w, p.h); confettiCtx.restore(); });
            confettiLoop = requestAnimationFrame(drawConfetti);
        }
        window.addEventListener('resize', () => { if (!document.getElementById('end-screen').classList.contains('hidden')) { const canvas = document.getElementById('confetti'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; } });
    </script>
</body>
