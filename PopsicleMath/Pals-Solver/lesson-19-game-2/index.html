    <script>
        // --- Game State ---
        const state = {
            score: 0,
            questionIndex: 0,
            totalQuestions: 5,
            difficulty: 'easy',
            mode: 'increasing',
            highScore: (() => { try { return Number(localStorage.getItem('rocketSkipScoreV8')) || 0; } catch (e) { return 0; } })(),
            currentQuestion: null,
            isFirstTry: true,
            perfectAnswers: 0,
            isSoundOn: true,
            isWaitingForNext: false,
            usedQuestions: new Set() // Track used sequences to ensure randomness
        };

        // --- DOM Elements ---
        const screens = {
            settings: document.getElementById('settings-screen'),
            game: document.getElementById('game-screen'),
            end: document.getElementById('end-screen')
        };
        
        const ui = {
            score: document.getElementById('score-display'),
            highScore: document.getElementById('high-score-display'),
            qCounter: document.getElementById('question-counter'),
            progBar: document.getElementById('progress-bar'),
            powerBar: document.getElementById('power-bar-fill'),
            seqContainer: document.getElementById('sequence-container'),
            qText: document.getElementById('question-text'),
            feedback: document.getElementById('feedback-message'),
            rocketContainer: document.getElementById('rocket-container'),
            rocketFire: document.getElementById('rocket-fire'),
            starsBg: document.getElementById('starsBg'),
            earth: document.getElementById('start-earth'),
            finalScore: document.getElementById('final-score'),
            perfectCount: document.getElementById('perfect-count'),
            playerRank: document.getElementById('player-rank'),
            optionsContainer: document.getElementById('options-container'),
            optionBtns: document.querySelectorAll('.option-btn'),
            postQuestionActions: document.getElementById('post-question-actions'),
            btnNext: document.getElementById('btn-next-question'),
            btnPlayGame: document.getElementById('btn-play-minigame'),
            overlayMinigame: document.getElementById('minigame-overlay'),
            frameMinigame: document.getElementById('minigame-frame'),
            sourceMinigame: document.getElementById('minigame-source'),
            btnCloseMinigame: document.getElementById('btn-close-minigame')
        };

        // --- Audio System (Web Audio API) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        
        const sounds = {
            playTone: (freq, type, duration, vol = 0.1) => {
                if (!state.isSoundOn) return;
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            },
            correct: () => {
                sounds.playTone(523.25, 'sine', 0.1, 0.2); // C5
                setTimeout(() => sounds.playTone(659.25, 'sine', 0.1, 0.2), 100); // E5
                setTimeout(() => sounds.playTone(783.99, 'sine', 0.15, 0.2), 200); // G5
                setTimeout(() => sounds.playTone(1046.50, 'sine', 0.3, 0.25), 300); // C6
            },
            wrong: () => {
                sounds.playTone(200, 'triangle', 0.1, 0.2);
                setTimeout(() => sounds.playTone(150, 'sawtooth', 0.3, 0.2), 100);
            },
            click: () => {
                sounds.playTone(900, 'sine', 0.05, 0.1);
            },
            thrust: () => {
                if (!state.isSoundOn) return;
                const bufferSize = audioCtx.sampleRate * 2.0; 
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1; 
                }
                
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 500;
                
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2.0);
                
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                noise.start();
            }
        };

        // --- TTS System ---
        const speak = (text) => {
            if (!state.isSoundOn || !('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.85; 
            utterance.pitch = 1.1; 
            window.speechSynthesis.speak(utterance);
        };

        const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        
        const shuffleArray = (arr) => {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        };

        const showScreen = (screenName) => {
            Object.values(screens).forEach(s => s.classList.add('hide'));
            screens[screenName].classList.remove('hide');
        };

        const generateQuestion = () => {
            const seqLength = 5;
            let step, start, isIncreasing, sequence, missingIndex, answer, finalOptions;
            let attemptsOuter = 0;
            let signature = "";
            let text, rule;

            do {
                if (state.difficulty === 'easy') {
                    const steps = [1, 2, 5];
                    step = steps[randInt(0, steps.length - 1)];
                    isIncreasing = true;
                } else if (state.difficulty === 'medium') {
                    const steps = [2, 3, 5, 10];
                    step = steps[randInt(0, steps.length - 1)];
                    if (state.mode === 'mixed') isIncreasing = Math.random() > 0.5;
                    else isIncreasing = state.mode === 'increasing';
                } else { 
                    const steps = [3, 4, 5, 10];
                    step = steps[randInt(0, steps.length - 1)];
                    if (state.mode === 'mixed') isIncreasing = Math.random() > 0.5;
                    else isIncreasing = state.mode === 'increasing';
                }

                sequence = [];
                let maxVal = 50;
                let minVal = 1;
                let span = (seqLength - 1) * step;

                if (isIncreasing) {
                    let maxStart = maxVal - span;
                    if (maxStart < 1) { 
                        step = 2; span = 8; maxStart = 42; 
                    }
                    start = randInt(minVal, maxStart);
                    for(let i=0; i<seqLength; i++) sequence.push(start + i * step);
                } else {
                    let minStart = minVal + span;
                    if (minStart > 50) { 
                        step = 2; span = 8; minStart = 9;
                    }
                    start = randInt(minStart, maxVal);
                    for(let i=0; i<seqLength; i++) sequence.push(start - i * step);
                }

                if (state.difficulty === 'easy') {
                    missingIndex = Math.random() > 0.3 ? 4 : 3;
                } else if (state.difficulty === 'medium') {
                    missingIndex = randInt(1, 4);
                } else {
                    missingIndex = randInt(0, 4);
                }
                
                signature = `${sequence.join(',')}_${missingIndex}`;
                attemptsOuter++;
            } while(state.usedQuestions.has(signature) && attemptsOuter < 50);

            // Mark this specific pattern as used
            state.usedQuestions.add(signature);

            answer = sequence[missingIndex];
            let options = new Set([answer]);
            let attempts = 0;
            
            while(options.size < 4 && attempts < 50) {
                let wrong;
                let rnd = Math.random();
                if(rnd < 0.3) wrong = answer + step; 
                else if (rnd < 0.6) wrong = answer - step;
                else if (rnd < 0.8) wrong = answer + 1; 
                else wrong = answer - 1;
                
                if (wrong > 0 && wrong <= 60 && !sequence.includes(wrong)) {
                    options.add(wrong);
                }
                attempts++;
            }
            
            let fallback = 1;
            while(options.size < 4) {
                if(!options.has(fallback) && !sequence.includes(fallback)) options.add(fallback);
                fallback++;
            }

            finalOptions = shuffleArray(Array.from(options));

            text = "What number is missing?";
            rule = isIncreasing ? `counting up by ${step}` : `counting down by ${step}`;
            if (state.difficulty === 'hard' && Math.random() > 0.5) {
                text = "What comes next in the pattern?";
                if(missingIndex !== 4) text = "What number is missing?"; 
            }

            return { sequence, missingIndex, answer, options: finalOptions, rule, text };
        };

        const renderQuestion = () => {
            state.currentQuestion = generateQuestion();
            state.isFirstTry = true;
            state.isWaitingForNext = false;
            
            ui.optionsContainer.classList.remove('hide');
            ui.postQuestionActions.classList.add('hide');
            
            const q = state.currentQuestion;
            
            ui.qCounter.textContent = `Mission ${state.questionIndex + 1}/${state.totalQuestions}`;
            ui.qText.textContent = q.text;
            
            ui.seqContainer.innerHTML = '';
            q.sequence.forEach((num, idx) => {
                const box = document.createElement('div');
                box.className = `sequence-box w-14 h-14 sm:w-20 sm:h-20 flex items-center justify-center rounded-2xl text-2xl sm:text-4xl font-black transition-all duration-300`;
                
                if (idx === q.missingIndex) {
                    box.classList.add('missing');
                    box.textContent = '?';
                    box.id = 'missing-box';
                } else {
                    box.textContent = num;
                }
                ui.seqContainer.appendChild(box);
            });

            ui.optionBtns.forEach((btn, idx) => {
                btn.className = 'fuel-cell btn-3d h-20 sm:h-24 flex flex-col items-center justify-center option-btn shadow-lg'; 
                btn.disabled = false;
                btn.querySelector('.option-text').textContent = q.options[idx];
            });

            if(state.questionIndex > 0) speak(q.text);
        };

        const updateScore = (points) => {
            state.score += points;
            ui.score.textContent = state.score;
            
            ui.score.style.transform = 'scale(1.5)';
            ui.score.style.color = '#fff';
            setTimeout(() => {
                ui.score.style.transform = 'scale(1)';
                ui.score.style.color = '#39FF14'; 
            }, 200);
        };

        const showFeedback = (isCorrect) => {
            ui.feedback.textContent = isCorrect ? "Great job!" : "Try again!";
            ui.feedback.style.color = isCorrect ? "#39FF14" : "#ff0055";
            ui.feedback.style.opacity = "1";
            ui.feedback.style.transform = "translateY(-30px) scale(1.1)";
            
            setTimeout(() => {
                ui.feedback.style.opacity = "0";
                ui.feedback.style.transform = "translateY(0) scale(1)";
            }, 1500);
        };

        const handleOptionClick = (e) => {
            if (state.isWaitingForNext) return;
            
            const btn = e.currentTarget;
            if(btn.disabled) return; 
            
            const selectedVal = parseInt(btn.querySelector('.option-text').textContent);
            const q = state.currentQuestion;

            if (selectedVal === q.answer) {
                // CORRECT
                state.isWaitingForNext = true;
                sounds.correct();
                btn.classList.add('correct');
                
                const missingBox = document.getElementById('missing-box');
                missingBox.textContent = q.answer;
                missingBox.classList.remove('missing');
                missingBox.className = 'sequence-box w-14 h-14 sm:w-20 sm:h-20 flex items-center justify-center rounded-2xl text-2xl sm:text-4xl font-black transition-all duration-300 bg-space-dark text-neon-yellow border-4 border-white shadow-[0_0_25px_#ffcc00] transform scale-110';

                showFeedback(true);
                
                // Scoring
                if (state.isFirstTry) {
                    updateScore(10);
                    state.perfectAnswers++;
                } else {
                    updateScore(0); // 0 points for retries as requested
                }

                sounds.thrust();
                ui.rocketContainer.classList.add('animate-fly-up');
                ui.rocketFire.style.transform = 'scaleY(1.8) translateY(5px)';
                ui.starsBg.classList.add('scrolling-stars');
                
                if (state.questionIndex === 0) {
                    ui.earth.classList.add('earth-hide');
                }
                
                const progressPct = ((state.questionIndex + 1) / state.totalQuestions) * 100;
                ui.progBar.style.width = `${progressPct}%`;
                ui.powerBar.style.height = `${progressPct}%`;

                if(state.difficulty === 'hard' && state.isFirstTry && Math.random() > 0.5) {
                    speak(`Correct! The rule is ${q.rule}`);
                } else {
                     speak(q.answer.toString());
                }

                setTimeout(() => {
                    ui.rocketContainer.classList.remove('animate-fly-up');
                    ui.rocketFire.style.transform = '';
                    ui.starsBg.classList.remove('scrolling-stars');
                    
                    // Show NEXT and PLAY GAME buttons
                    ui.optionsContainer.classList.add('hide');
                    ui.postQuestionActions.classList.remove('hide');
                    
                }, 2200);

            } else {
                // WRONG
                sounds.wrong();
                btn.classList.add('wrong', 'animate-shake');
                btn.disabled = true; // Let them pick again, but disable this specific button
                state.isFirstTry = false;
                showFeedback(false);
                
                setTimeout(() => {
                    btn.classList.remove('animate-shake');
                }, 400);
            }
        };

        const startGame = () => {
            sounds.click();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            state.difficulty = document.querySelector('input[name="difficulty"]:checked').value;
            state.mode = document.querySelector('input[name="mode"]:checked').value;
            state.totalQuestions = parseInt(document.querySelector('input[name="questions"]:checked').value);
            
            state.score = 0;
            state.questionIndex = 0;
            state.perfectAnswers = 0;
            state.usedQuestions.clear(); // Clear memory of used sequences
            
            ui.score.textContent = "0";
            ui.highScore.textContent = state.highScore;
            ui.progBar.style.width = "0%";
            ui.powerBar.style.height = "0%";
            
            ui.earth.classList.remove('earth-hide');
            
            showScreen('game');
            renderQuestion();
            speak("Mission started. Let's go!");
        };

        const endGame = () => {
            showScreen('end');
            
            setTimeout(() => sounds.playTone(523.25, 'sine', 0.2, 0.2), 0); 
            setTimeout(() => sounds.playTone(659.25, 'sine', 0.2, 0.2), 200); 
            setTimeout(() => sounds.playTone(783.99, 'sine', 0.2, 0.2), 400); 
            setTimeout(() => sounds.playTone(1046.50, 'sine', 0.6, 0.3), 600); 
            
            if (state.score > state.highScore) {
                state.highScore = state.score;
                try { localStorage.setItem('rocketSkipScoreV8', state.highScore); } catch(e) {}
            }

            ui.finalScore.textContent = state.score;
            ui.perfectCount.textContent = `${state.perfectAnswers}/${state.totalQuestions}`;

            const pct = state.perfectAnswers / state.totalQuestions;
            let rank = "";
            if (pct >= 0.9) rank = "Skip Master 🏆";
            else if (pct >= 0.7) rank = "Super Pilot ⭐";
            else rank = "Space Explorer 🚀";
            
            ui.playerRank.textContent = rank;

            startConfetti();
            
            speak(`Mission complete! You scored ${state.score} points. You are a ${rank}`);
        };

        // Minigame and Flow Controls
        ui.btnNext.addEventListener('click', () => {
            sounds.click();
            state.questionIndex++;
            if (state.questionIndex < state.totalQuestions) {
                renderQuestion();
            } else {
                endGame();
            }
        });

        ui.btnPlayGame.addEventListener('click', () => {
            sounds.click();
            ui.overlayMinigame.classList.remove('hide');

            // Load the embedded game directly into the iframe.
            // This avoids Blob URLs, which some browsers and hosting previews block.
            const miniGameHtml = ui.sourceMinigame.value;
            ui.frameMinigame.onload = () => {
                try { ui.frameMinigame.contentWindow.focus(); } catch (e) { ui.frameMinigame.focus(); }
            };

            try {
                ui.frameMinigame.removeAttribute('src');
                ui.frameMinigame.srcdoc = miniGameHtml;
            } catch (error) {
                // Fallback for older browsers.
                ui.frameMinigame.src = 'about:blank';
                const miniDoc = ui.frameMinigame.contentDocument || ui.frameMinigame.contentWindow.document;
                miniDoc.open();
                miniDoc.write(miniGameHtml);
                miniDoc.close();
            }
        });

        ui.btnCloseMinigame.addEventListener('click', () => {
            sounds.click();
            ui.frameMinigame.onload = null;
            ui.frameMinigame.srcdoc = '';
            ui.frameMinigame.src = 'about:blank'; // Stop the mini-game loop and audio.
            ui.overlayMinigame.classList.add('hide');
        });

        // Confetti Canvas
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let confettiAnimationId;

        const startConfetti = () => {
            canvas.classList.remove('hide');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            const colors = ['#00e5ff', '#39FF14', '#ff00aa', '#ff6600', '#ffcc00', '#ffffff'];
            
            for(let i=0; i<150; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 12 + 6,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    speedY: Math.random() * 4 + 3,
                    speedX: Math.random() * 4 - 2,
                    rotation: Math.random() * 360,
                    rotSpeed: Math.random() * 15 - 7.5
                });
            }
            animateConfetti();
        };

        const animateConfetti = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let active = false;
            particles.forEach(p => {
                p.y += p.speedY;
                p.x += p.speedX;
                p.rotation += p.rotSpeed;
                
                if(p.y < canvas.height) active = true;

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation * Math.PI / 180);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                ctx.restore();
            });
            if(active) confettiAnimationId = requestAnimationFrame(animateConfetti);
        };
        
        const stopConfetti = () => {
            cancelAnimationFrame(confettiAnimationId);
            canvas.classList.add('hide');
        };

        // Base Listeners
        document.getElementById('btn-start').addEventListener('click', startGame);
        
        document.getElementById('btn-home').addEventListener('click', () => {
            sounds.click();
            showScreen('settings');
        });
        
        document.getElementById('btn-play-again').addEventListener('click', () => {
            stopConfetti();
            startGame();
        });
        
        document.getElementById('btn-end-home').addEventListener('click', () => {
            stopConfetti();
            sounds.click();
            showScreen('settings');
        });

        document.getElementById('btn-read-question').addEventListener('click', () => {
            sounds.click();
            if(state.currentQuestion) speak(state.currentQuestion.text);
            const btn = document.getElementById('btn-read-question');
            btn.style.transform = 'scale(1.2)';
            setTimeout(()=> btn.style.transform = '', 150);
        });

        const iconOn = document.getElementById('icon-sound-on');
        const iconOff = document.getElementById('icon-sound-off');
        document.getElementById('btn-sound').addEventListener('click', () => {
            state.isSoundOn = !state.isSoundOn;
            if(state.isSoundOn) {
                iconOn.classList.remove('hide');
                iconOff.classList.add('hide');
                sounds.click(); 
                document.getElementById('btn-sound').classList.add('text-neon-green');
                document.getElementById('btn-sound').classList.remove('text-gray-500');
            } else {
                iconOn.classList.add('hide');
                iconOff.classList.remove('hide');
                window.speechSynthesis.cancel();
                document.getElementById('btn-sound').classList.remove('text-neon-green');
                document.getElementById('btn-sound').classList.add('text-gray-500');
            }
        });

        ui.optionBtns.forEach(btn => {
            btn.addEventListener('click', handleOptionClick);
        });

        ui.highScore.textContent = state.highScore;

        window.addEventListener('resize', () => {
            if(!canvas.classList.contains('hide')) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });

    </script>
</body>
</html>
