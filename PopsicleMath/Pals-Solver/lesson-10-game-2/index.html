<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zootopia Math Bus Ver 7</title>
    
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            blue: '#1CB0F6',
                            blueDark: '#1899D6',
                            cyan: '#00C2FF',
                            cyanDark: '#0099CC',
                            green: '#58CC02',
                            greenDark: '#46A302',
                            yellow: '#FFC800',
                            yellowDark: '#E5B400',
                            red: '#FF4B4B',
                            pink: '#FF71C6',
                            pinkDark: '#E566B2'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            touch-action: none;
        }

        /* Background Canvas */
        #backgroundCanvas {
            display: block;
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1; 
            pointer-events: none;
        }

        /* Nút nhấn 3D */
        .btn-3d {
            border-bottom-width: 6px;
            transition: transform 0.1s, border-bottom-width 0.1s;
        }
        .btn-3d:active:not(:disabled) {
            border-bottom-width: 0px;
            transform: translateY(6px);
        }

        .btn-answer {
            background-color: #00C2FF;
            border: 3px solid #0099CC;
            border-bottom-width: 8px;
            color: white;
            transition: all 0.1s;
        }
        .btn-answer:active:not(:disabled) {
            border-bottom-width: 0px;
            transform: translateY(8px);
        }
        .btn-answer.correct { background-color: #58CC02; border-color: #46A302; }
        .btn-answer.wrong { background-color: #FF4B4B; border-color: #E54343; }

        /* Icon Animal */
        .student-icon {
            cursor: pointer; 
            touch-action: none;
            z-index: 50;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.25));
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .student-icon:hover { transform: scale(1.15); }
        .student-icon:active { transform: scale(1.25) rotate(-5deg); }
        
        .is-dragging {
            position: absolute !important;
            opacity: 0.95;
            transform: scale(1.2) rotate(-10deg) !important;
            z-index: 9999 !important;
            pointer-events: none;
            margin: 0 !important;
            filter: drop-shadow(0 15px 12px rgba(0,0,0,0.3));
        }

        .dropzone-active {
            border-color: #58CC02 !important;
            background-color: rgba(88, 204, 2, 0.3) !important;
            box-shadow: 0 0 20px rgba(88, 204, 2, 0.5) inset;
        }
    </style>
</head>
<body class="w-full h-screen flex flex-col relative text-gray-800">

    <!-- CANVAS BACKGROUND -->
    <canvas id="backgroundCanvas" aria-label="Zootopia background"></canvas>

    <!-- ======================= JAVASCRIPT ======================= -->
    <script>
        /** CANVAS BACKGROUND SYSTEM **/
        (() => {
            const bgCanvas = document.getElementById('backgroundCanvas');
            const bgCtx = bgCanvas.getContext('2d', { alpha: false });

            let bgWidth = 0; let bgHeight = 0;
            let bgClouds = []; let bgTrees = []; let bgFlowers = []; let bgButterflies = [];

            const flowerColors = ['#ff4b4b', '#ffc800', '#ce82ff', '#ffffff', '#1cb0f6', '#ff8fab'];

            function resizeBackgroundCanvas() {
                const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
                bgWidth = window.innerWidth; bgHeight = window.innerHeight;
                bgCanvas.width = Math.floor(bgWidth * dpr); bgCanvas.height = Math.floor(bgHeight * dpr);
                bgCanvas.style.width = bgWidth + 'px'; bgCanvas.style.height = bgHeight + 'px';
                bgCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
                generateBackgroundEnvironment();
            }

            function generateBackgroundEnvironment() {
                bgClouds = []; bgTrees = []; bgFlowers = []; bgButterflies = [];
                const cloudCount = bgWidth < 600 ? 3 : 5;
                for (let i = 0; i < cloudCount; i++) {
                    bgClouds.push({ x: Math.random() * bgWidth, y: bgHeight * (0.05 + Math.random() * 0.3), size: 28 + Math.random() * (bgWidth < 600 ? 34 : 52), speed: Math.random() * 0.16 + 0.05, opacity: 0.72 + Math.random() * 0.24 });
                }
                const treeCount = bgWidth < 600 ? 6 : 11;
                for (let i = 0; i < treeCount; i++) {
                    bgTrees.push({ x: (i / Math.max(1, treeCount - 1)) * bgWidth + (Math.random() * 70 - 35), y: bgHeight * (0.55 + Math.random() * 0.05), scale: 0.48 + Math.random() * 0.56 });
                }
                const flowerCount = bgWidth < 600 ? 10 : 18;
                for (let i = 0; i < flowerCount; i++) {
                    bgFlowers.push({ x: Math.random() * bgWidth, y: bgHeight * 0.65 + Math.random() * (bgHeight * 0.15), color: flowerColors[Math.floor(Math.random() * flowerColors.length)], scale: 0.42 + Math.random() * 0.42, sway: Math.random() * Math.PI * 2, petals: Math.random() > 0.45 ? 6 : 5 });
                }
                for (let i = 0; i < 4; i++) {
                    bgButterflies.push({ x: Math.random() * bgWidth, y: bgHeight * (0.28 + Math.random() * 0.24), size: 5 + Math.random() * 4, speed: 0.18 + Math.random() * 0.18, phase: Math.random() * Math.PI * 2, color: ['#ff6b9d', '#ffd93d', '#9b5de5', '#00bbf9'][i % 4] });
                }
            }

            function updateBackground() {
                bgClouds.forEach(cloud => {
                    cloud.x -= cloud.speed;
                    if (cloud.x + cloud.size * 2.4 < 0) { cloud.x = bgWidth + cloud.size * 2.4; cloud.y = bgHeight * (0.05 + Math.random() * 0.3); }
                });
                bgButterflies.forEach(b => {
                    b.x += b.speed; b.phase += 0.08;
                    if (b.x > bgWidth + 30) { b.x = -30; b.y = bgHeight * (0.28 + Math.random() * 0.24); }
                });
            }

            function drawBackground(time = 0) {
                const skyGradient = bgCtx.createLinearGradient(0, 0, 0, bgHeight * 0.72);
                skyGradient.addColorStop(0, '#7dd3fc'); skyGradient.addColorStop(0.62, '#bae6fd'); skyGradient.addColorStop(1, '#e0f8ff');
                bgCtx.fillStyle = skyGradient; bgCtx.fillRect(0, 0, bgWidth, bgHeight);

                const sx = Math.min(90, bgWidth * 0.12); const sy = Math.min(92, bgHeight * 0.13); const sr = Math.max(35, Math.min(bgWidth, bgHeight) * 0.055);
                bgCtx.save(); bgCtx.translate(sx, sy);
                bgCtx.fillStyle = 'rgba(255, 213, 82, 0.22)'; bgCtx.beginPath(); bgCtx.arc(0, 0, sr * 1.75, 0, Math.PI * 2); bgCtx.fill();
                bgCtx.fillStyle = '#FFD369'; bgCtx.beginPath(); bgCtx.arc(0, 0, sr, 0, Math.PI * 2); bgCtx.fill();
                bgCtx.fillStyle = '#D35400'; bgCtx.beginPath(); bgCtx.arc(-sr * 0.32, -sr * 0.1, sr * 0.08, 0, Math.PI * 2); bgCtx.arc(sr * 0.32, -sr * 0.1, sr * 0.08, 0, Math.PI * 2); bgCtx.fill();
                bgCtx.strokeStyle = '#D35400'; bgCtx.lineWidth = Math.max(3, sr * 0.07); bgCtx.lineCap = 'round';
                bgCtx.beginPath(); bgCtx.arc(0, sr * 0.12, sr * 0.36, 0.15 * Math.PI, 0.85 * Math.PI); bgCtx.stroke();
                bgCtx.restore();

                bgCtx.save(); bgCtx.translate(bgWidth * 0.5, bgHeight * 0.65); bgCtx.lineWidth = Math.max(16, Math.min(35, bgWidth * 0.025)); bgCtx.lineCap = 'round';
                const rainbowColors = ['#ff4b4b', '#ff9900', '#ffc800', '#58cc02', '#1cb0f6', '#ce82ff'];
                const baseRadius = Math.min(bgWidth * 0.48, bgHeight * 0.55, 700);
                for (let i = 0; i < rainbowColors.length; i++) {
                    bgCtx.strokeStyle = rainbowColors[i]; bgCtx.globalAlpha = 0.85; bgCtx.beginPath(); bgCtx.arc(0, 0, baseRadius - i * bgCtx.lineWidth, Math.PI, 0); bgCtx.stroke();
                }
                bgCtx.restore();

                bgClouds.forEach(c => {
                    bgCtx.save(); bgCtx.globalAlpha = c.opacity; bgCtx.fillStyle = '#ffffff'; bgCtx.beginPath();
                    bgCtx.arc(c.x, c.y, c.size, 0, Math.PI * 2); bgCtx.arc(c.x + c.size * 0.82, c.y + c.size * 0.2, c.size * 0.72, 0, Math.PI * 2);
                    bgCtx.arc(c.x - c.size * 0.85, c.y + c.size * 0.22, c.size * 0.68, 0, Math.PI * 2); bgCtx.arc(c.x + c.size * 0.15, c.y - c.size * 0.28, c.size * 0.72, 0, Math.PI * 2);
                    bgCtx.fill(); bgCtx.restore();
                });

                bgButterflies.forEach(b => {
                    const y = b.y + Math.sin(b.phase) * 10;
                    bgCtx.save(); bgCtx.translate(b.x, y); bgCtx.fillStyle = b.color; bgCtx.globalAlpha = 0.88;
                    bgCtx.beginPath(); bgCtx.ellipse(-b.size, 0, b.size, b.size * 1.35, Math.sin(b.phase) * 0.5, 0, Math.PI * 2);
                    bgCtx.ellipse(b.size, 0, b.size, b.size * 1.35, -Math.sin(b.phase) * 0.5, 0, Math.PI * 2); bgCtx.fill();
                    bgCtx.strokeStyle = '#334155'; bgCtx.lineWidth = 1.4; bgCtx.beginPath(); bgCtx.moveTo(0, -b.size * 1.1); bgCtx.lineTo(0, b.size * 1.2); bgCtx.stroke();
                    bgCtx.restore();
                });

                bgCtx.fillStyle = '#65a30d'; bgCtx.beginPath(); bgCtx.moveTo(0, bgHeight); bgCtx.lineTo(0, bgHeight * 0.60);
                for (let x = 0; x <= bgWidth + 280; x += 280) bgCtx.quadraticCurveTo(x - 140, bgHeight * 0.50, x, bgHeight * 0.60);
                bgCtx.lineTo(bgWidth, bgHeight); bgCtx.fill();

                bgTrees.forEach(t => {
                    bgCtx.save(); bgCtx.translate(t.x, t.y); bgCtx.scale(t.scale, t.scale);
                    bgCtx.fillStyle = '#8B5A2B'; bgCtx.fillRect(-9, 0, 18, 56);
                    bgCtx.fillStyle = '#4ade80'; bgCtx.beginPath(); bgCtx.arc(0, -24, 38, 0, Math.PI * 2); bgCtx.arc(-25, -12, 29, 0, Math.PI * 2); bgCtx.arc(24, -10, 30, 0, Math.PI * 2); bgCtx.fill();
                    bgCtx.fillStyle = 'rgba(255,255,255,0.28)'; bgCtx.beginPath(); bgCtx.arc(-12, -34, 12, 0, Math.PI * 2); bgCtx.fill(); bgCtx.restore();
                });

                bgCtx.fillStyle = '#58cc02'; bgCtx.beginPath(); bgCtx.moveTo(0, bgHeight); bgCtx.lineTo(0, bgHeight * 0.65);
                bgCtx.quadraticCurveTo(bgWidth * 0.5, bgHeight * 0.58, bgWidth, bgHeight * 0.65); bgCtx.lineTo(bgWidth, bgHeight); bgCtx.fill();
                bgCtx.strokeStyle = '#84cc16'; bgCtx.lineWidth = Math.max(10, Math.min(18, bgWidth * 0.014)); bgCtx.lineCap = 'round';
                bgCtx.beginPath(); bgCtx.moveTo(-20, bgHeight * 0.65); bgCtx.quadraticCurveTo(bgWidth * 0.5, bgHeight * 0.58, bgWidth + 20, bgHeight * 0.65); bgCtx.stroke();

                bgFlowers.forEach(f => {
                    bgCtx.save(); const sway = Math.sin(time * 0.0015 + f.sway) * 1.4; bgCtx.translate(f.x + sway, f.y); bgCtx.scale(f.scale, f.scale);
                    bgCtx.strokeStyle = '#259a3f'; bgCtx.lineWidth = 2.4; bgCtx.lineCap = 'round'; bgCtx.beginPath(); bgCtx.moveTo(0, 5); bgCtx.quadraticCurveTo(2, 14, 0, 23); bgCtx.stroke();
                    bgCtx.fillStyle = '#55d85a'; bgCtx.beginPath(); bgCtx.ellipse(-6, 15, 4, 8, -0.8, 0, Math.PI * 2); bgCtx.ellipse(6, 18, 4, 8, 0.75, 0, Math.PI * 2); bgCtx.fill();
                    const pCount = f.petals || 6; bgCtx.fillStyle = f.color;
                    for (let p = 0; p < pCount; p++) { bgCtx.save(); bgCtx.rotate((Math.PI * 2 * p) / pCount); bgCtx.beginPath(); bgCtx.ellipse(0, -9, 5.2, 9.5, 0, 0, Math.PI * 2); bgCtx.fill(); bgCtx.restore(); }
                    bgCtx.fillStyle = '#ffe066'; bgCtx.beginPath(); bgCtx.arc(0, 0, 5, 0, Math.PI * 2); bgCtx.fill(); bgCtx.strokeStyle = 'rgba(154,103,0,0.28)'; bgCtx.lineWidth = 1; bgCtx.stroke(); bgCtx.restore();
                });
            }

            function backgroundAnimationLoop(time) {
                updateBackground(); drawBackground(time); requestAnimationFrame(backgroundAnimationLoop);
            }

            window.addEventListener('resize', resizeBackgroundCanvas); resizeBackgroundCanvas(); requestAnimationFrame(backgroundAnimationLoop);
        })();

        /** Zootopia Styled Animal Icons **/
        const animalSvgs = [
            `<svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-md"><ellipse cx="32" cy="20" rx="12" ry="35" fill="#90A4AE" transform="rotate(-15 32 20)"/><ellipse cx="68" cy="20" rx="12" ry="35" fill="#90A4AE" transform="rotate(15 68 20)"/><ellipse cx="32" cy="20" rx="6" ry="25" fill="#F48FB1" transform="rotate(-15 32 20)"/><ellipse cx="68" cy="20" rx="6" ry="25" fill="#F48FB1" transform="rotate(15 68 20)"/><circle cx="50" cy="65" r="35" fill="#B0BEC5"/><circle cx="35" cy="55" r="6" fill="#7E57C2"/><circle cx="65" cy="55" r="6" fill="#7E57C2"/><circle cx="50" cy="65" r="4.5" fill="#F06292"/><path d="M 50 69 L 50 75 M 40 75 Q 50 82 60 75" fill="none" stroke="#3E2723" stroke-width="3" stroke-linecap="round"/></svg>`,
            `<svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-md"><polygon points="10,35 30,5 45,25" fill="#F57C00"/><polygon points="90,35 70,5 55,25" fill="#F57C00"/><circle cx="50" cy="55" r="40" fill="#FF9800"/><path d="M 10 55 Q 50 95 90 55 Q 50 100 10 55 Z" fill="#FFE0B2"/><circle cx="35" cy="48" r="5" fill="#2E7D32"/><circle cx="65" cy="48" r="5" fill="#2E7D32"/><ellipse cx="50" cy="65" rx="7" ry="5" fill="#3E2723"/><path d="M 40 72 Q 50 80 60 72" fill="none" stroke="#3E2723" stroke-width="3" stroke-linecap="round"/></svg>`,
            `<svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-md"><circle cx="50" cy="55" r="40" fill="#A1887F"/><path d="M 15 50 Q 50 30 85 50 Q 80 80 50 85 Q 20 80 15 50 Z" fill="#D7CCC8"/><path d="M 25 50 Q 35 45 45 50 Q 35 55 25 50 Z" fill="#795548"/><path d="M 75 50 Q 65 45 55 50 Q 65 55 75 50 Z" fill="#795548"/><circle cx="35" cy="50" r="4" fill="#3E2723"/><circle cx="65" cy="50" r="4" fill="#3E2723"/><ellipse cx="50" cy="65" rx="6" ry="4" fill="#5D4037"/><path d="M 35 75 Q 50 85 65 75" fill="none" stroke="#3E2723" stroke-width="3" stroke-linecap="round"/></svg>`,
            `<svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-md"><circle cx="25" cy="25" r="12" fill="#FFB300"/><circle cx="75" cy="25" r="12" fill="#FFB300"/><circle cx="50" cy="55" r="42" fill="#FFCA28"/><circle cx="50" cy="68" r="20" fill="#FFE082"/><circle cx="20" cy="50" r="3" fill="#3E2723"/><circle cx="28" cy="62" r="2.5" fill="#3E2723"/><circle cx="22" cy="70" r="3" fill="#3E2723"/><circle cx="80" cy="50" r="3" fill="#3E2723"/><circle cx="72" cy="62" r="2.5" fill="#3E2723"/><circle cx="78" cy="70" r="3" fill="#3E2723"/><circle cx="35" cy="48" r="5" fill="#3E2723"/><circle cx="65" cy="48" r="5" fill="#3E2723"/><ellipse cx="50" cy="62" rx="6" ry="4" fill="#3E2723"/><path d="M 50 66 L 50 72 M 40 72 Q 50 78 60 72" fill="none" stroke="#3E2723" stroke-width="3" stroke-linecap="round"/></svg>`
        ];

        /** ÂM THANH & GIỌNG ĐỌC **/
        const AudioSys = {
            ctx: null,
            init: function() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            playTone: function(freq, type, duration, vol=0.1) {
                if (!this.ctx) return;
                try {
                    const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                    osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    gain.gain.setValueAtTime(vol, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                    osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + duration);
                } catch(e) {}
            },
            pop: () => AudioSys.playTone(600, 'sine', 0.1, 0.1),
            correct: () => { AudioSys.playTone(500, 'sine', 0.1); setTimeout(() => AudioSys.playTone(800, 'sine', 0.2), 100); },
            wrong: () => { AudioSys.playTone(250, 'sawtooth', 0.2); setTimeout(() => AudioSys.playTone(200, 'sawtooth', 0.3), 150); },
            win: () => { [500, 600, 700, 800, 1200].forEach((f, i) => setTimeout(() => AudioSys.playTone(f, 'square', 0.15), i*150)); }
        };

        const speak = (text) => {
            if (!window.speechSynthesis) return; window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text); utterance.rate = 0.85; utterance.pitch = 1.3; 
            window.speechSynthesis.speak(utterance);
        };

        /** LOGIC TRÒ CHƠI **/
        const state = { qNum: 0, score: 0, totalQ: 10, currentQ: null, dragTaskDone: false, firstTry: true, usedQuestions: new Set(), maxRange: 20, speechText: "" };

        const screens = { setup: document.getElementById('setup-screen'), game: document.getElementById('game-screen'), end: document.getElementById('end-screen') };
        const ui = { qnum: document.getElementById('ui-qnum'), score: document.getElementById('ui-score'), instruction: document.getElementById('ui-instruction'), busZone: document.getElementById('dropzone-bus'), stopZone: document.getElementById('dropzone-stop'), panel: document.getElementById('panel-answer'), choices: document.getElementById('ui-choices') };

        document.querySelectorAll('.range-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.range-btn').forEach(b => {
                    b.classList.remove('bg-brand-cyan', 'border-brand-cyanDark', 'text-white');
                    b.classList.add('bg-gray-300', 'border-gray-400', 'text-gray-600');
                });
                e.target.classList.remove('bg-gray-300', 'border-gray-400', 'text-gray-600');
                e.target.classList.add('bg-brand-cyan', 'border-brand-cyanDark', 'text-white');
                state.maxRange = parseInt(e.target.getAttribute('data-range'));
            });
        });

        function generateQuestion() {
            let a, b, answer, type; let signature; let attempts = 0;
            type = (state.qNum % 2 === 1) ? 'add' : 'sub'; 
            do {
                if (type === 'add') {
                    answer = Math.floor(Math.random() * (state.maxRange - 4)) + 5; 
                    a = Math.floor(Math.random() * (answer - 1)) + 1; b = answer - a;
                } else {
                    a = Math.floor(Math.random() * (state.maxRange - 5)) + 6; 
                    b = Math.floor(Math.random() * (a - 1)) + 1; answer = a - b;
                }
                signature = `${a}${type}${b}`; attempts++;
            } while (state.usedQuestions.has(signature) && attempts < 100);
            state.usedQuestions.add(signature); return { type, a, b, answer };
        }

        function generateChoices(correct) {
            let choices = new Set([correct]);
            while(choices.size < 4) {
                let offset = Math.floor(Math.random() * 11) - 5; 
                if(offset === 0) continue;
                let wrong = correct + offset;
                if (wrong >= 0 && wrong <= state.maxRange + 5) choices.add(wrong);
            }
            return Array.from(choices).sort(() => Math.random() - 0.5);
        }

        function renderStudents(container, count, draggable) {
            container.innerHTML = '';
            let iconClass = 'w-[45px] h-[45px] md:w-[50px] md:h-[50px]';
            if (count > 30) iconClass = 'w-[25px] h-[25px] md:w-[32px] md:h-[32px]';
            else if (count > 15) iconClass = 'w-[35px] h-[35px] md:w-[42px] md:h-[42px]';

            for(let i=0; i<count; i++) {
                const el = document.createElement('div');
                el.className = `student-icon ${iconClass} ${draggable ? 'draggable animate-pulse' : ''}`;
                el.innerHTML = animalSvgs[Math.floor(Math.random() * animalSvgs.length)];
                if(draggable) setupDraggable(el);
                container.appendChild(el);
            }
        }

        function loadQuestion() {
            if (state.qNum >= state.totalQ) return endGame();
            state.qNum++; state.firstTry = true; state.dragTaskDone = false; state.currentQ = generateQuestion();
            const q = state.currentQ;

            ui.qnum.textContent = state.qNum; ui.panel.style.transform = 'translateY(100%)'; 
            
            let text = "";
            if (q.type === 'add') {
                renderStudents(ui.busZone, q.a, false); renderStudents(ui.stopZone, q.b, true);
                text = `Drag ${q.b} animals onto the bus.`;
            } else {
                renderStudents(ui.busZone, q.a, true); renderStudents(ui.stopZone, 0, false);
                text = `Drag ${q.b} animals off the bus.`;
            }
            
            ui.instruction.innerHTML = text; 
            state.speechText = text;
            speak(text);
        }

        function checkDragTask() {
            const q = state.currentQ; let isComplete = false;
            if (q.type === 'add') {
                if (ui.busZone.children.length === (q.a + q.b) && ui.stopZone.children.length === 0) isComplete = true;
            } else {
                if (ui.stopZone.children.length === q.b && ui.busZone.children.length === (q.a - q.b)) isComplete = true;
            }

            if (isComplete && !state.dragTaskDone) {
                state.dragTaskDone = true;
                document.querySelectorAll('.draggable').forEach(el => el.classList.remove('draggable', 'animate-pulse'));
                
                const sign = q.type === 'add' ? '+' : '-';
                
                // Hiển thị phép tính ở khối phía trên
                ui.instruction.innerHTML = `
                    <div class="flex items-center gap-2 md:gap-4 text-4xl md:text-5xl drop-shadow-sm font-black text-center justify-center">
                        <span class="text-brand-cyanDark">${q.a}</span> 
                        <span class="text-gray-400">${sign}</span> 
                        <span class="text-brand-yellowDark">${q.b}</span> 
                        <span class="text-gray-400">=</span> 
                        <span class="text-gray-300">?</span>
                    </div>
                `;
                
                ui.choices.innerHTML = '';
                generateChoices(q.answer).forEach(val => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-answer btn-3d w-full py-3 md:py-4 rounded-xl text-3xl md:text-4xl font-black shadow-sm';
                    btn.textContent = val;
                    btn.onclick = () => handleAnswer(btn, val);
                    ui.choices.appendChild(btn);
                });

                // Đổi câu nói thành định dạng toán học Tiếng Anh chuẩn xác
                const operationText = q.type === 'add' ? 'plus' : 'minus';
                state.speechText = `${q.a} ${operationText} ${q.b} equals what?`;
                speak(state.speechText);
                
                ui.panel.style.transform = 'translateY(0)';
            }
        }

        function handleAnswer(btn, val) {
            const isCorrect = (val === state.currentQ.answer);
            const allBtns = document.querySelectorAll('.btn-answer');
            allBtns.forEach(b => b.disabled = true);

            if (isCorrect) {
                btn.classList.add('correct'); AudioSys.correct();
                ui.instruction.innerHTML = ui.instruction.innerHTML.replace('<span class="text-gray-300">?</span>', `<span class="text-brand-green">${val}</span>`);
                if (state.firstTry) { state.score++; ui.score.textContent = state.score; }
                setTimeout(() => { loadQuestion(); }, 1500);
            } else {
                btn.classList.add('wrong'); AudioSys.wrong(); state.firstTry = false;
                
                // Backup câu hỏi cũ để nháy báo sai xong khôi phục lại
                let oldHTML = ui.instruction.innerHTML;
                ui.instruction.innerHTML = `<span class="text-brand-red">Try again!</span>`;
                speak("Try again!");
                
                setTimeout(() => { 
                    ui.instruction.innerHTML = oldHTML;
                    btn.classList.remove('wrong'); 
                    allBtns.forEach(b => b.disabled = false); 
                }, 1000);
            }
        }

        /** KÉO THẢ VÀ CLICK-TO-MOVE **/
        let activeDrag = null; let startX=0, startY=0, initLeft=0, initTop=0;
        
        function setupDraggable(el) {
            el.addEventListener('pointerdown', e => {
                if (!el.classList.contains('draggable') || state.dragTaskDone) return;
                if (state.currentQ.type === 'add' && el.parentElement === ui.busZone) return;
                if (state.currentQ.type === 'sub' && el.parentElement === ui.stopZone) return;

                activeDrag = el; AudioSys.init(); el.classList.remove('animate-pulse');
                const rect = el.getBoundingClientRect(); initLeft = rect.left; initTop = rect.top; startX = e.clientX; startY = e.clientY;
                
                el.dataset.moved = 'false';

                document.body.appendChild(el); el.classList.add('is-dragging'); el.style.left = initLeft + 'px'; el.style.top = initTop + 'px';
                el.setPointerCapture(e.pointerId);
                if(state.currentQ.type === 'add') ui.busZone.classList.add('dropzone-active');
                if(state.currentQ.type === 'sub') ui.stopZone.classList.add('dropzone-active');
            });
        }

        document.body.addEventListener('pointermove', e => {
            if (!activeDrag) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
                activeDrag.dataset.moved = 'true';
            }
            activeDrag.style.left = (initLeft + dx) + 'px';
            activeDrag.style.top = (initTop + dy) + 'px';
        });

        document.body.addEventListener('pointerup', e => {
            if (!activeDrag) return;
            activeDrag.releasePointerCapture(e.pointerId); activeDrag.classList.remove('is-dragging');
            activeDrag.style.position = ''; activeDrag.style.left = ''; activeDrag.style.top = '';
            ui.busZone.classList.remove('dropzone-active'); ui.stopZone.classList.remove('dropzone-active');

            const q = state.currentQ;
            let isTap = activeDrag.dataset.moved !== 'true';

            if (isTap) {
                if (q.type === 'add') {
                    ui.busZone.appendChild(activeDrag);
                } else {
                    ui.stopZone.appendChild(activeDrag);
                }
                AudioSys.pop(); 
                checkDragTask();
            } else {
                activeDrag.style.display = 'none'; const elemBelow = document.elementFromPoint(e.clientX, e.clientY); activeDrag.style.display = 'flex';
                const targetZone = elemBelow ? elemBelow.closest('#dropzone-bus, #dropzone-stop') : null;
                
                let isValid = false;
                if (targetZone) {
                    if (q.type === 'add' && targetZone.id === 'dropzone-bus') isValid = true;
                    if (q.type === 'sub' && targetZone.id === 'dropzone-stop') isValid = true;
                }

                if (isValid) { 
                    targetZone.appendChild(activeDrag); AudioSys.pop(); checkDragTask(); 
                } else { 
                    activeDrag.classList.add('animate-pulse'); 
                    if (q.type === 'add') ui.stopZone.appendChild(activeDrag); else ui.busZone.appendChild(activeDrag); 
                }
            }
            activeDrag = null;
        });

        document.getElementById('btn-start').onclick = () => { AudioSys.init(); screens.setup.classList.add('hidden'); screens.game.classList.remove('hidden'); state.score = 0; state.qNum = 0; ui.score.textContent = 0; loadQuestion(); };
        document.getElementById('btn-tts').onclick = () => { speak(state.speechText); };
        document.getElementById('btn-replay').onclick = () => { screens.end.classList.add('hidden'); screens.setup.classList.remove('hidden'); state.usedQuestions.clear(); };

        function endGame() {
            screens.game.classList.add('hidden'); screens.end.classList.remove('hidden'); AudioSys.win();
            document.getElementById('ui-final-score').textContent = `${state.score}/${state.totalQ}`;
            document.getElementById('ui-stars').textContent = state.score >= 9 ? '⭐⭐⭐' : state.score >= 6 ? '⭐⭐' : state.score >= 3 ? '⭐' : '🌱';
            startConfetti();
        }

        /** CONFETTI **/
        let confettiCtx; let confettiParticles = []; let confettiLoop;
        function startConfetti() {
            const canvas = document.getElementById('confetti'); canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            confettiCtx = canvas.getContext('2d'); confettiParticles = [];
            const colors = ['#1CB0F6', '#58CC02', '#FFC800', '#FF4B4B', '#FF71C6'];
            for(let i=0; i<200; i++) confettiParticles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height - canvas.height, w: Math.random() * 15 + 10, h: Math.random() * 15 + 10, color: colors[Math.floor(Math.random() * colors.length)], vy: Math.random() * 6 + 3, vx: Math.random() * 6 - 3, rot: Math.random() * 360, rotSpeed: Math.random() * 15 - 7 });
            cancelAnimationFrame(confettiLoop); requestAnimationFrame(drawConfetti);
        }
        function drawConfetti() {
            if (screens.end.classList.contains('hidden')) return;
            confettiCtx.clearRect(0, 0, confettiCtx.canvas.width, confettiCtx.canvas.height);
            confettiParticles.forEach(p => { p.y += p.vy; p.x += p.vx; p.rot += p.rotSpeed; if (p.y > confettiCtx.canvas.height) { p.y = -20; p.x = Math.random() * confettiCtx.canvas.width; }
                confettiCtx.save(); confettiCtx.translate(p.x, p.y); confettiCtx.rotate(p.rot * Math.PI / 180); confettiCtx.fillStyle = p.color; confettiCtx.fillRect(-p.w/2, -p.h/2, p.w, p.h); confettiCtx.restore(); });
            confettiLoop = requestAnimationFrame(drawConfetti);
        }
        window.addEventListener('resize', () => { if (!screens.end.classList.contains('hidden')) { const canvas = document.getElementById('confetti'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; } });
    </script>
</body>
