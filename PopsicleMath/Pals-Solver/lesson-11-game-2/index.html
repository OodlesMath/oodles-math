<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Story Quest - V5</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --card-bg: #ffffff;
            --text-main: #3c3c3c;
            --text-light: #777777;
            --primary: #58cc02;
            --primary-shadow: #46a302;
            --secondary: #1cb0f6;
            --secondary-shadow: #1899d6;
            --danger: #ff4b4b;
            --danger-shadow: #ea2b2b;
            --warning: #ffc800;
            --warning-shadow: #e5b400;
            --grey-border: #e5e5e5;
            --grey-bg: #f7f7f7;
            
            /* Pastel Blocks */
            --block-1: #e1f5fe;
            --block-2: #f3e5f5;
            --block-ans: #e8f5e9;
            
            --font-main: 'Poppins', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: var(--font-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-color: #8fd3f4;
        }

        /* --- Beautiful Landscape Background --- */
        .bg-landscape {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .bg-landscape svg {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- UI Components --- */
        .container {
            width: 100%;
            max-width: 850px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: auto;
            position: relative;
            z-index: 10;
        }

        .card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 30px;
            width: 100%;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.15);
            text-align: center;
            border: 4px solid rgba(255, 255, 255, 0.8);
            border-bottom-width: 10px;
            border-bottom-color: var(--grey-border);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title {
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--secondary);
            margin-bottom: 10px;
            text-shadow: 2px 3px 0px rgba(0,0,0,0.1);
        }

        .subtitle {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 30px;
        }

        /* Buttons */
        .btn {
            font-family: var(--font-main);
            font-size: 1.3rem;
            font-weight: 800;
            padding: 15px 30px;
            border-radius: 20px;
            border: 2px solid var(--grey-border);
            border-bottom-width: 6px;
            background-color: white;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.1s ease;
            outline: none;
            letter-spacing: 0.5px;
        }

        .btn:active:not(:disabled) {
            transform: translateY(4px);
            border-bottom-width: 2px;
            margin-top: 4px;
        }

        .btn:disabled {
            cursor: default;
            opacity: 0.6;
        }

        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary-shadow);
            color: white;
        }

        .btn-secondary {
            background-color: var(--secondary);
            border-color: var(--secondary-shadow);
            color: white;
        }

        .btn-option {
            font-size: 1.8rem;
            width: 100%;
            padding: 15px 20px;
            background-color: #fcfcfc;
        }

        .btn-option:hover:not(:disabled) {
            background-color: #f0f9ff;
            border-color: var(--secondary);
            color: var(--secondary);
        }

        .btn-option.correct {
            background-color: var(--primary);
            border-color: var(--primary-shadow);
            color: white;
        }

        .btn-option.wrong {
            background-color: var(--danger);
            border-color: var(--danger-shadow);
            color: white;
            animation: shake 0.4s ease-in-out;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 20px;
            background-color: rgba(255,255,255,0.6);
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
            border: 2px solid white;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            border-radius: 10px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 40%;
            background: rgba(255,255,255,0.3);
            border-radius: 10px 10px 0 0;
        }

        /* Story Container & TTS */
        .story-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #fff9e6, #fff3c4);
            padding: 15px 25px;
            border-radius: 20px;
            border: 3px dashed var(--warning);
            margin-bottom: 20px;
            gap: 15px;
            width: 100%;
            box-shadow: 0 4px 10px rgba(255, 200, 0, 0.1);
        }

        .story-text {
            font-size: 1.3rem;
            font-weight: 700;
            line-height: 1.5;
            color: #4a4a4a;
            text-align: left;
            margin: 0;
            flex-grow: 1;
        }

        .tts-btn {
            background-color: var(--secondary);
            color: white;
            border: none;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            min-width: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 0 var(--secondary-shadow);
            transition: all 0.1s;
        }

        .tts-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 var(--secondary-shadow);
        }

        .tts-btn svg { width: 30px; height: 30px; fill: white; }

        /* Dynamic Emojis */
        .emoji-viewport {
            width: 100%;
            max-height: 250px;
            overflow-y: auto;
            background: rgba(240, 248, 255, 0.6);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #e1f0fa;
        }

        .emoji-viewport::-webkit-scrollbar { width: 8px; }
        .emoji-viewport::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .emoji-viewport::-webkit-scrollbar-thumb { background: #c1d5e0; border-radius: 10px; }
        
        .emoji-group-wrapper {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .emoji-wrapper {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease, transform 0.2s ease;
        }

        .emoji-bounce {
            animation: float 2s infinite ease-in-out;
            filter: drop-shadow(0px 4px 3px rgba(0,0,0,0.2));
            display: inline-block;
        }

        /* Crossed-out styles for subtraction */
        .sub-item {
            cursor: pointer;
        }
        
        .sub-item:hover:not(.crossed-out) {
            transform: scale(1.15);
        }

        .emoji-wrapper.crossed-out {
            opacity: 0.35;
        }

        .emoji-wrapper.crossed-out .emoji-bounce {
            animation: none; /* Stop bouncing */
            transform: scale(0.9);
            filter: drop-shadow(0px 2px 1px rgba(0,0,0,0.1));
        }

        .emoji-wrapper.crossed-out::after {
            content: '';
            position: absolute;
            width: 130%;
            height: 6px;
            background-color: var(--danger);
            transform: rotate(-45deg);
            border-radius: 3px;
            z-index: 2;
            box-shadow: 0 0 4px rgba(255,255,255,0.8);
        }

        .emoji-large { font-size: 3rem; }
        .emoji-medium { font-size: 2.2rem; }
        .emoji-small { font-size: 1.6rem; }

        /* Number Bond */
        .number-bond {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .bond-svg { width: 220px; height: 160px; overflow: visible; }
        .bond-circle { fill: white; stroke: var(--secondary); stroke-width: 5; }
        .bond-line { stroke: var(--secondary); stroke-width: 5; }
        .bond-text { font-family: var(--font-main); font-weight: 800; font-size: 26px; fill: var(--text-main); text-anchor: middle; dominant-baseline: middle; }
        .bond-text.question-mark { fill: var(--secondary); font-size: 36px; }

        /* Equation Blocks */
        .equation {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            background: #fff;
            padding: 15px 25px;
            border-radius: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 2px solid var(--grey-border);
        }

        .equation-box {
            border: 3px solid var(--grey-border);
            border-radius: 16px;
            min-width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
            color: var(--text-main);
            transition: all 0.3s ease;
            box-shadow: 0 4px 0 var(--grey-border);
        }

        /* Colorful Boxes */
        #eq-num1 { background-color: var(--block-1); border-color: #81d4fa; box-shadow: 0 4px 0 #4fc3f7; }
        #eq-num2 { background-color: var(--block-2); border-color: #ce93d8; box-shadow: 0 4px 0 #ba68c8; }
        #eq-op { background-color: #fff; border-color: var(--grey-border); box-shadow: 0 4px 0 var(--grey-border); color: var(--text-main); }
        #eq-ans { background: var(--grey-bg); border-style: dashed; color: var(--text-light); border-color: var(--grey-border); box-shadow: none; }
        #eq-ans.highlight { background-color: var(--block-ans); border-color: var(--primary); box-shadow: 0 4px 0 var(--primary-shadow); color: var(--primary); transform: scale(1.1); border-style: solid; }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            margin-bottom: 10px;
        }

        /* Feedback Area */
        .feedback-area {
            min-height: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            width: 100%;
        }

        .feedback-area.visible { opacity: 1; pointer-events: auto; }
        .feedback-msg { font-size: 1.8rem; font-weight: 800; margin-bottom: 10px; }
        .feedback-msg.correct { color: var(--primary); }
        .feedback-msg.wrong { color: var(--danger); }

        /* Screens */
        #game-screen, #end-screen { display: none; width: 100%; }

        /* Confetti Canvas */
        #confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        @keyframes popIn {
            0% { transform: scale(0.6); opacity: 0; }
            80% { transform: scale(1.03); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* Responsive */
        @media (max-width: 650px) {
            .title { font-size: 2.2rem; }
            .story-text { font-size: 1.15rem; }
            .equation { font-size: 1.8rem; padding: 10px 15px; }
            .equation-box { min-width: 55px; height: 55px; border-width: 3px; border-radius: 12px; }
            .btn-option { font-size: 1.5rem; padding: 15px; }
            .card { padding: 20px; border-radius: 24px; }
            .story-container { padding: 12px 15px; flex-direction: column; text-align: center; }
            .story-text { text-align: center; }
            .tts-btn { width: 45px; height: 45px; min-width: 45px; margin-top: 5px; }
            .emoji-viewport { max-height: 180px; padding: 10px; }
            .emoji-large { font-size: 2.2rem; }
            .emoji-medium { font-size: 1.8rem; }
            .emoji-small { font-size: 1.4rem; }
            .bond-svg { width: 180px; height: 130px; }
        }
        
        /* Landscape on Mobile & Tablets */
        @media (max-height: 600px) and (orientation: landscape) {
            .card { flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 15px; }
            .story-container { width: 100%; margin-bottom: 10px; padding: 10px; }
            .emoji-viewport { width: 45%; max-height: 150px; margin-bottom: 0; }
            .number-bond { width: 45%; margin-bottom: 0; }
            .equation { width: 100%; margin-bottom: 10px; font-size: 1.5rem; }
            .equation-box { min-width: 45px; height: 45px; }
            .bond-svg { width: 150px; height: 110px; }
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- Beautiful Landscape Background -->
    <div class="bg-landscape">
        <svg viewBox="0 0 1000 600" preserveAspectRatio="xMidYMax slice">
            <defs>
                <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#8fd3f4"/>
                    <stop offset="100%" stop-color="#bbedff"/>
                </linearGradient>
            </defs>
            <rect width="1000" height="600" fill="url(#sky)" />
            <circle cx="850" cy="150" r="60" fill="#ffde00" />
            <path d="M 150 600 A 350 350 0 0 1 850 600" fill="none" stroke="#ff4b4b" stroke-width="25" opacity="0.8"/>
            <path d="M 175 600 A 325 325 0 0 1 825 600" fill="none" stroke="#ffc800" stroke-width="25" opacity="0.8"/>
            <path d="M 200 600 A 300 300 0 0 1 800 600" fill="none" stroke="#58cc02" stroke-width="25" opacity="0.8"/>
            <path d="M 225 600 A 275 275 0 0 1 775 600" fill="none" stroke="#1cb0f6" stroke-width="25" opacity="0.8"/>
            <path d="M 250 600 A 250 250 0 0 1 750 600" fill="none" stroke="#ce82ff" stroke-width="25" opacity="0.8"/>
            <path d="M 150 200 a 30 30 0 0 1 30 -30 a 40 40 0 0 1 70 10 a 30 30 0 0 1 20 40 h -120 a 20 20 0 0 1 0 -20 z" fill="#ffffff" opacity="0.9"/>
            <path d="M 750 280 a 40 40 0 0 1 40 -40 a 50 50 0 0 1 80 10 a 40 40 0 0 1 30 50 h -150 a 20 20 0 0 1 0 -20 z" fill="#ffffff" opacity="0.9"/>
            <path d="M -100 600 Q 250 380 650 600 Z" fill="#74d600" />
            <path d="M 350 600 Q 750 420 1200 600 Z" fill="#58cc02" />
            <!-- Trees & Flowers -->
            <g transform="translate(200, 480)">
                <rect x="-10" y="0" width="20" height="50" fill="#8B4513" rx="5"/><circle cx="0" cy="-20" r="35" fill="#32CD32" /><circle cx="-20" cy="-10" r="25" fill="#228B22" /><circle cx="20" cy="-10" r="25" fill="#32CD32" />
            </g>
            <g transform="translate(800, 500) scale(0.8)">
                <rect x="-10" y="0" width="20" height="50" fill="#8B4513" rx="5"/><circle cx="0" cy="-20" r="35" fill="#32CD32" /><circle cx="-20" cy="-10" r="25" fill="#228B22" /><circle cx="20" cy="-10" r="25" fill="#32CD32" />
            </g>
            <g transform="translate(350, 560) scale(1.5)">
                <circle cx="0" cy="-5" r="4" fill="#ff4b4b" /><circle cx="-5" cy="0" r="4" fill="#ff4b4b" /><circle cx="5" cy="0" r="4" fill="#ff4b4b" /><circle cx="0" cy="5" r="4" fill="#ff4b4b" /><circle cx="0" cy="0" r="3" fill="#ffc800" />
            </g>
            <g transform="translate(650, 570) scale(1.2)">
                <circle cx="0" cy="-5" r="4" fill="#ce82ff" /><circle cx="-5" cy="0" r="4" fill="#ce82ff" /><circle cx="5" cy="0" r="4" fill="#ce82ff" /><circle cx="0" cy="5" r="4" fill="#ce82ff" /><circle cx="0" cy="0" r="3" fill="#ffc800" />
            </g>
        </svg>
    </div>

    <!-- Confetti Layer -->
    <canvas id="confetti"></canvas>

    <div class="container">
        
        <!-- START SCREEN -->
        <div id="start-screen" class="card pop-in">
            <h1 class="title">Math Story Quest</h1>
            <p class="subtitle">Read the story, count the items, and find the answer!</p>
            <div class="emoji-group-wrapper" style="margin-bottom: 40px; font-size: 4rem;">
                <span class="emoji-bounce" style="animation-delay: 0s;">🦊</span>
                <span class="emoji-bounce" style="animation-delay: 0.2s;">🍎</span>
                <span class="emoji-bounce" style="animation-delay: 0.4s;">⭐</span>
            </div>
            <button class="btn btn-primary" style="font-size: 1.6rem; width: 100%; max-width: 300px; padding: 18px;" onclick="startGame()">Play Now!</button>
        </div>

        <!-- GAME SCREEN -->
        <div id="game-screen">
            <div class="progress-container">
                <div id="progress" class="progress-bar"></div>
            </div>

            <div class="card pop-in" id="question-card">
                
                <div class="story-container">
                    <p class="story-text" id="story-content"></p>
                    <button class="tts-btn" onclick="speakStory()" title="Listen to the story">
                        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    </button>
                </div>

                <div class="emoji-viewport" id="emojis">
                    <!-- Dynamic emojis rendered here -->
                </div>
                
                <div class="number-bond" id="number-bond-container">
                    <!-- SVG injected by JS -->
                </div>

                <div class="equation">
                    <div class="equation-box" id="eq-num1"></div>
                    <div class="equation-box" id="eq-op"></div>
                    <div class="equation-box" id="eq-num2"></div>
                    <div style="color: var(--text-main); font-size: 2.5rem;">=</div>
                    <div class="equation-box" id="eq-ans">?</div>
                </div>

                <!-- Choose Answer Phase -->
                <div class="options-grid" id="options-grid">
                    <!-- Buttons injected by JS -->
                </div>

                <div class="feedback-area" id="feedback">
                    <div class="feedback-msg" id="feedback-text"></div>
                    <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" style="display: none; width: 220px; font-size: 1.4rem;">Next Question</button>
                </div>
            </div>
        </div>

        <!-- END SCREEN -->
        <div id="end-screen" class="card">
            <h1 class="title">Great Job!</h1>
            <div class="emoji-group-wrapper" style="margin-top: 20px; font-size: 5rem;">
                <span class="emoji-bounce" style="animation-delay: 0s;">🏆</span>
                <span class="emoji-bounce" style="animation-delay: 0.2s;">🌟</span>
            </div>
            <p class="story-text" style="font-size: 2.2rem; margin: 30px 0; text-align: center;">Your Score: <span id="final-score" style="color: var(--primary); font-size: 3.5rem; font-weight: 800;"></span> / 10</p>
            <button class="btn btn-secondary" style="font-size: 1.6rem; width: 100%; max-width: 300px; padding: 18px;" onclick="location.reload()">Play Again!</button>
        </div>

    </div>

    <script>
        /* --- GAME DATA --- */
        let questions = [
            { text: "Jessy has 20 marbles. Sophia has 8 marbles. How many marbles do they have in total?", num1: 20, num2: 8, op: "+", answer: 28, emoji: "🟣" },
            { text: "Lucas buys 16 flowers. He gives 13 flowers to his mum. How many flowers does Lucas have now?", num1: 16, num2: 13, op: "-", answer: 3, emoji: "🌸" },
            { text: "Jolene harvested 18 apples. Jake harvested 7 apples. How many apples did they harvest in total?", num1: 18, num2: 7, op: "+", answer: 25, emoji: "🍎" },
            { text: "Mark made 24 gummies in total. He gave 9 gummies to Leo. How many gummies does Mark have left?", num1: 24, num2: 9, op: "-", answer: 15, emoji: "🍬" },
            { text: "Emma has 15 books. She buys 12 more books. How many books does she have now?", num1: 15, num2: 12, op: "+", answer: 27, emoji: "📚" },
            { text: "Noah has 35 toy cars. He loses 14 of them. How many toy cars does he have left?", num1: 35, num2: 14, op: "-", answer: 21, emoji: "🚗" },
            { text: "Mia baked 40 cookies. She gave away 15 cookies to her friends. How many cookies does Mia have now?", num1: 40, num2: 15, op: "-", answer: 25, emoji: "🍪" },
            { text: "Leo collected 22 stars. He found 16 more stars. How many stars does Leo have in total?", num1: 22, num2: 16, op: "+", answer: 38, emoji: "⭐" },
            { text: "Lily has 30 pencils. She gives 11 pencils to her brother. How many pencils are left?", num1: 30, num2: 11, op: "-", answer: 19, emoji: "✏️" },
            { text: "Oliver caught 14 fish. His dad caught 19 fish. How many fish did they catch in total?", num1: 14, num2: 19, op: "+", answer: 33, emoji: "🐟" }
        ];

        /* --- STATE --- */
        let currentQIndex = 0;
        let score = 0;
        let isAnswered = false; 
        let hasMistake = false; 
        let audioCtx;

        /* --- SHUFFLE & PREPARE QUESTIONS --- */
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // Tạo ra mảng câu hỏi xen kẽ Cộng - Trừ
        function prepareQuestions() {
            let addQs = questions.filter(q => q.op === '+');
            let subQs = questions.filter(q => q.op === '-');
            shuffleArray(addQs);
            shuffleArray(subQs);
            
            let alternated = [];
            // Random xem bắt đầu bằng dấu cộng hay trừ trước
            let startWithAdd = Math.random() > 0.5;
            
            for(let i = 0; i < 5; i++) {
                if (startWithAdd) {
                    alternated.push(addQs[i]);
                    alternated.push(subQs[i]);
                } else {
                    alternated.push(subQs[i]);
                    alternated.push(addQs[i]);
                }
            }
            questions = alternated;
        }

        /* --- AUDIO SYSTEM --- */
        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTone(freq, type, duration, vol = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const sounds = {
            click: () => playTone(600, 'sine', 0.1),
            slash: () => playTone(350, 'triangle', 0.15, 0.05),
            correct: () => {
                playTone(400, 'sine', 0.1);
                setTimeout(() => playTone(600, 'sine', 0.2), 100);
                setTimeout(() => playTone(800, 'sine', 0.3), 200);
            },
            wrong: () => {
                playTone(300, 'sawtooth', 0.3, 0.05);
                setTimeout(() => playTone(250, 'sawtooth', 0.4, 0.05), 150);
            },
            win: () => {
                const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51];
                notes.forEach((freq, i) => setTimeout(() => playTone(freq, 'sine', 0.3), i * 150));
            }
        };

        /* --- TEXT TO SPEECH --- */
        function speakStory() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const text = document.getElementById('story-content').textContent;
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85; 
                utterance.pitch = 1.1; 
                window.speechSynthesis.speak(utterance);
            }
        }
        function stopSpeaking() { if ('speechSynthesis' in window) window.speechSynthesis.cancel(); }

        /* --- ADVANCED CONFETTI SYSTEM --- */
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        let animationId = null;

        function createConfetti() {
            if (animationId) cancelAnimationFrame(animationId);
            particles = [];
            
            const colors = ['#58cc02', '#1cb0f6', '#ff4b4b', '#ffc800', '#ce82ff', '#ff8c00', '#00e5ff'];
            const shapes = ['circle', 'square'];
            
            for (let i = 0; i < 200; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height, // Bắt đầu ở trên màn hình
                    r: Math.random() * 6 + 4,
                    dx: Math.random() * 2 - 1, // Độ tạt ngang của gió
                    dy: Math.random() * 3 + 2, // Tốc độ rơi
                    color: colors[Math.floor(Math.random() * colors.length)],
                    shape: shapes[Math.floor(Math.random() * shapes.length)],
                    tilt: Math.floor(Math.random() * 10) - 10,
                    tiltAngleInc: (Math.random() * 0.07) + 0.05,
                    tiltAngle: 0
                });
            }
            animateConfetti();
        }

        function animateConfetti() {
            animationId = requestAnimationFrame(animateConfetti);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach((p) => {
                p.tiltAngle += p.tiltAngleInc;
                p.y += p.dy; // Rơi xuống liên tục
                p.x += Math.sin(p.tiltAngle) + p.dx; // Lắc lư sang hai bên

                ctx.beginPath();
                ctx.fillStyle = p.color;

                if (p.shape === 'circle') {
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.tiltAngle);
                    ctx.fillRect(-p.r, -p.r, p.r * 2, p.r * 2);
                    ctx.restore();
                }

                // Nếu rơi khỏi màn hình thì lặp lại từ trên xuống để tạo vòng lặp vô tận
                if (p.y > canvas.height) {
                    p.x = Math.random() * canvas.width;
                    p.y = -20;
                }
            });
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        /* --- GAME LOGIC --- */
        function startGame() {
            initAudio();
            sounds.click();
            prepareQuestions(); // Xếp xen kẽ câu hỏi
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            loadQuestion();
        }

        function renderNumberBond(q) {
            let topText = q.op === '+' ? "?" : q.num1;
            let leftText = q.op === '+' ? q.num1 : q.num2;
            let rightText = q.op === '+' ? q.num2 : "?";

            const svg = `
            <svg class="bond-svg" viewBox="0 0 200 150">
                <line x1="100" y1="40" x2="50" y2="110" class="bond-line" />
                <line x1="100" y1="40" x2="150" y2="110" class="bond-line" />
                <circle cx="100" cy="30" r="28" class="bond-circle" />
                <circle cx="50" cy="120" r="28" class="bond-circle" />
                <circle cx="150" cy="120" r="28" class="bond-circle" />
                <text x="100" y="32" class="bond-text ${topText === '?' ? 'question-mark' : ''}" id="bond-top">${topText}</text>
                <text x="50" y="122" class="bond-text ${leftText === '?' ? 'question-mark' : ''}" id="bond-left">${leftText}</text>
                <text x="150" y="122" class="bond-text ${rightText === '?' ? 'question-mark' : ''}" id="bond-right">${rightText}</text>
            </svg>
            `;
            document.getElementById('number-bond-container').innerHTML = svg;
        }

        function generateOptions(correctAnswer) {
            let options = new Set([correctAnswer]);
            while(options.size < 4) {
                let offset = Math.floor(Math.random() * 5) + 1;
                let sign = Math.random() > 0.5 ? 1 : -1;
                let wrong = correctAnswer + (offset * sign);
                if (wrong > 0) options.add(wrong);
            }
            return Array.from(options).sort(() => Math.random() - 0.5);
        }

        function loadQuestion() {
            stopSpeaking();
            const q = questions[currentQIndex];
            isAnswered = false;
            hasMistake = false; 

            // Update Progress
            document.getElementById('progress').style.width = `${(currentQIndex / questions.length) * 100}%`;

            // Reset UI Animation
            document.getElementById('question-card').classList.remove('pop-in');
            void document.getElementById('question-card').offsetWidth; 
            document.getElementById('question-card').classList.add('pop-in');

            document.getElementById('story-content').textContent = q.text;
            
            // Generate Dynamic Emojis
            let emojiHTML = '';
            let totalIcons = q.op === '+' ? q.num1 + q.num2 : q.num1;
            let sizeClass = totalIcons > 25 ? 'emoji-small' : (totalIcons > 15 ? 'emoji-medium' : 'emoji-large');

            if (q.op === '+') {
                // Nhóm 1 bên trái, dấu cộng ở giữa, Nhóm 2 bên phải
                emojiHTML += `<div style="display: flex; align-items: center; justify-content: center; gap: 15px; width: 100%; flex-wrap: wrap;">`;
                
                // Group 1
                emojiHTML += `<div style="display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 8px; flex: 1; min-width: 30%;">`;
                for(let i=0; i<q.num1; i++) {
                    emojiHTML += `<div class="emoji-wrapper ${sizeClass}"><span class="emoji-bounce" style="animation-delay: ${(i%5)*0.1}s">${q.emoji}</span></div>`;
                }
                emojiHTML += `</div>`;

                // Plus Sign
                emojiHTML += `<div style="font-size: 3.5rem; font-weight: 900; color: var(--primary); display: flex; align-items: center; filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.1)); padding: 0 10px;">+</div>`;

                // Group 2
                emojiHTML += `<div style="display: flex; flex-wrap: wrap; justify-content: flex-start; gap: 8px; flex: 1; min-width: 30%;">`;
                for(let i=0; i<q.num2; i++) {
                    emojiHTML += `<div class="emoji-wrapper ${sizeClass}"><span class="emoji-bounce" style="animation-delay: ${(i%5)*0.1}s">${q.emoji}</span></div>`;
                }
                emojiHTML += `</div>`;

                emojiHTML += `</div>`;
            } else {
                // Subtraction items
                emojiHTML += `<div class="emoji-group-wrapper" id="emoji-sub-container" style="justify-content: center;">`;
                for(let i=0; i<q.num1; i++) {
                    emojiHTML += `<div class="emoji-wrapper sub-item ${sizeClass}"><span class="emoji-bounce" style="animation-delay: ${(i%5)*0.1}s">${q.emoji}</span></div>`;
                }
                emojiHTML += `</div>`;
            }
            
            document.getElementById('emojis').innerHTML = emojiHTML;

            // Handle Interactive Subtraction Clicks
            const container = document.getElementById('emojis');
            if (q.op === '-') {
                let crossedOut = 0;
                container.onclick = () => {
                    if (crossedOut < q.num2 && !isAnswered) {
                        const items = container.querySelectorAll('.sub-item:not(.crossed-out)');
                        if (items.length > 0) {
                            items[items.length - 1].classList.add('crossed-out');
                            crossedOut++;
                            sounds.slash();
                        }
                    }
                };
            } else {
                container.onclick = null;
            }

            // Equation Blocks
            document.getElementById('eq-num1').textContent = q.num1;
            document.getElementById('eq-op').textContent = q.op === '+' ? '+' : '−';
            document.getElementById('eq-num2').textContent = q.num2;
            
            const eqAns = document.getElementById('eq-ans');
            eqAns.textContent = '?';
            eqAns.className = 'equation-box'; // remove highlight

            // Bond
            renderNumberBond(q);

            // Controls
            document.getElementById('feedback').classList.remove('visible');
            document.getElementById('next-btn').style.display = 'none';

            // Generate Options Grid
            const options = generateOptions(q.answer);
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-option';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(btn, opt, q.answer);
                grid.appendChild(btn);
            });
        }

        function checkAnswer(btn, selectedAns, correctAns) {
            if (isAnswered) return;
            
            if (selectedAns === correctAns) {
                isAnswered = true;
                if (!hasMistake) score++; 
                sounds.correct();
                
                btn.classList.add('correct');
                document.querySelectorAll('.btn-option').forEach(b => b.disabled = true);

                const eqAns = document.getElementById('eq-ans');
                eqAns.textContent = correctAns;
                eqAns.classList.add('highlight');

                const qmNode = document.querySelector('.question-mark');
                if (qmNode) {
                    qmNode.textContent = correctAns;
                    qmNode.classList.remove('question-mark');
                    qmNode.style.fill = 'var(--primary)';
                }

                // Auto cross-out remaining items if they got it right without clicking
                if (questions[currentQIndex].op === '-') {
                    const container = document.getElementById('emojis');
                    const num2 = questions[currentQIndex].num2;
                    let currentlyCrossed = container.querySelectorAll('.crossed-out').length;
                    
                    let delay = 0;
                    while (currentlyCrossed < num2) {
                        const items = container.querySelectorAll('.sub-item:not(.crossed-out)');
                        if (items.length > 0) {
                            setTimeout(() => {
                                items[items.length - 1].classList.add('crossed-out');
                                sounds.slash();
                            }, delay);
                            delay += 100;
                            currentlyCrossed++;
                        } else break;
                    }
                }

                showFeedback(true, hasMistake ? "Good fix! 🌟" : "Awesome! 🌟");
            } else {
                sounds.wrong();
                hasMistake = true; 
                btn.classList.add('wrong');
                btn.disabled = true;
                showFeedback(false, "Try again!");
            }
        }

        function showFeedback(isCorrect, customMsg) {
            const feedback = document.getElementById('feedback');
            const msg = document.getElementById('feedback-text');
            const nextBtn = document.getElementById('next-btn');

            feedback.classList.add('visible');
            msg.textContent = customMsg;
            
            if (isCorrect) {
                msg.className = "feedback-msg correct";
                nextBtn.style.display = 'block';
                nextBtn.classList.add('pop-in');
            } else {
                msg.className = "feedback-msg wrong";
                nextBtn.style.display = 'none';
                setTimeout(() => {
                    if(!isAnswered) feedback.classList.remove('visible');
                }, 1500);
            }
        }

        function nextQuestion() {
            sounds.click();
            currentQIndex++;
            if (currentQIndex < questions.length) {
                loadQuestion();
            } else {
                showEndScreen();
            }
        }

        function showEndScreen() {
            stopSpeaking();
            document.getElementById('game-screen').style.display = 'none';
            const endScreen = document.getElementById('end-screen');
            endScreen.style.display = 'block';
            endScreen.classList.add('pop-in');
            document.getElementById('final-score').textContent = score;
            
            sounds.win();
            createConfetti();
        }

    </script>
</body>
</html>
