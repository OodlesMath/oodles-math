<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Adventure</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        duo: {
                            blue: '#1CB0F6',
                            bluedark: '#1899D6',
                            green: '#58CC02',
                            greendark: '#46A302',
                            red: '#FF4B4B',
                            reddark: '#EA2B2B',
                            orange: '#FF9600',
                            orangedark: '#E58700',
                            purple: '#CE82FF',
                            purpledark: '#A568CC',
                            gray: '#E5E5E5',
                            graydark: '#AFAFAF'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            overflow: hidden; /* Ngăn cuộn trang */
            touch-action: manipulation;
        }
        
        /* Animations */
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .scale-in {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        @keyframes drawCross {
            0% { stroke-dasharray: 40; stroke-dashoffset: 40; }
            100% { stroke-dasharray: 40; stroke-dashoffset: 0; }
        }
        .animate-draw-cross line {
            stroke-dasharray: 40;
            stroke-dashoffset: 40;
            animation: drawCross 0.3s ease-out forwards;
        }
        
        @keyframes bounceShort {
            0%, 100% { transform: translateY(0) scale(1.05); }
            50% { transform: translateY(-8px) scale(1.05); }
        }
        .animate-bounce-short {
            animation: bounceShort 0.5s ease-in-out infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        /* 3D Button styles */
        .btn-3d {
            transition: all 0.1s;
        }
        .btn-3d:active {
            transform: translateY(4px) !important;
            border-bottom-width: 0px !important;
            margin-top: 4px;
        }
        
        .speaker-icon {
            transition: transform 0.2s;
        }
        .speaker-icon:hover {
            transform: scale(1.1);
        }
        .speaker-icon:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body class="bg-gradient-to-b from-[#58CC02] to-[#1CB0F6] h-screen w-screen flex flex-col items-center justify-center p-2 md:p-4 text-slate-700">
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- App Container -->
    <div class="w-full max-w-6xl h-full max-h-[900px] flex flex-col bg-white rounded-[2rem] md:rounded-[3rem] shadow-2xl border-b-[8px] border-black/10 overflow-hidden relative">
        
        <!-- Header -->
        <header class="flex justify-between items-center p-4 md:px-8 md:py-5 shrink-0 relative z-10">
            <!-- Left: Title -->
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 md:w-12 md:h-12 bg-duo-orange rounded-xl flex items-center justify-center text-white text-2xl shadow-sm border-b-4 border-duo-orangedark font-black">M</div>
                <h1 class="text-xl md:text-2xl font-extrabold text-slate-700 hidden sm:block tracking-wide">Math Adventure</h1>
            </div>

            <!-- Middle: Progress/Score -->
            <div class="flex-1 flex justify-center">
                <div class="bg-slate-100 px-4 py-2 md:px-6 md:py-3 rounded-2xl border-2 border-slate-200 flex items-center gap-2">
                    <span class="text-duo-orange text-xl md:text-2xl font-black" id="score-text">0</span>
                    <span class="text-slate-400 font-bold text-sm md:text-base">/ 10 🌟</span>
                </div>
            </div>

            <!-- Right: Empty space for Logo -->
            <div class="w-10 md:w-32 h-10 flex justify-end items-center">
                <!-- LOGO GOES HERE -->
            </div>
        </header>

        <!-- Progress Bar -->
        <div class="w-full px-6 md:px-10 shrink-0">
            <div class="h-4 w-full bg-slate-200 rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-duo-green transition-all duration-300 w-0"></div>
            </div>
        </div>

        <!-- END SCREEN (Hidden by default) -->
        <div id="end-screen" class="hidden flex-1 flex-col items-center justify-center p-6 text-center z-50">
            <h2 class="text-5xl md:text-7xl font-black text-duo-orange mb-6 drop-shadow-sm">Amazing!</h2>
            <p class="text-2xl md:text-3xl font-bold text-slate-600 mb-2">You completed all levels.</p>
            <p class="text-3xl md:text-4xl font-extrabold text-duo-blue mb-10">Score: <span id="final-score">10</span> / 10 🌟</p>
            
            <button onclick="startGame()" class="btn-3d bg-duo-green border-b-4 border-duo-greendark text-white text-2xl md:text-3xl font-black py-4 px-12 rounded-2xl shadow-sm uppercase tracking-wider">
                Play Again
            </button>
        </div>

        <!-- GAME AREA -->
        <main id="game-screen" class="flex-1 flex flex-col lg:flex-row p-4 md:p-6 lg:p-8 gap-4 md:gap-8 min-h-0 relative">
            
            <!-- LEFT PANEL: Question & Options -->
            <div class="flex-1 flex flex-col items-center justify-evenly h-full min-h-0 bg-slate-50/50 rounded-3xl p-2 md:p-4 border-2 border-slate-100">
                
                <!-- Equation & Speaker -->
                <div class="flex items-center gap-4 shrink-0">
                    <button onclick="speakCurrentQuestion()" class="speaker-icon w-12 h-12 md:w-16 md:h-16 bg-duo-blue rounded-full flex items-center justify-center border-b-4 border-duo-bluedark text-white shadow-sm shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 md:h-8 md:w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5 10v4a2 2 0 002 2h2.27l4.15 3.113A1 1 0 0015 18.27V5.73a1 1 0 00-1.58-.819L9.27 8H7a2 2 0 00-2 2z" />
                        </svg>
                    </button>
                    <h2 id="equation" class="text-[clamp(2rem,5vw,4rem)] font-black text-center tracking-wide leading-none">
                        <!-- Filled by JS -->
                    </h2>
                </div>

                <!-- Number Bond -->
                <div class="relative w-[180px] h-[180px] sm:w-[220px] sm:h-[220px] md:w-[260px] md:h-[260px] lg:w-[280px] lg:h-[280px] shrink-0 my-2" id="number-bond-container">
                    <!-- Lines -->
                    <svg class="absolute inset-0 w-full h-full z-0 pointer-events-none">
                        <line x1="50%" y1="20%" x2="20%" y2="80%" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round" />
                        <line x1="50%" y1="20%" x2="50%" y2="80%" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round" />
                        <line x1="50%" y1="20%" x2="80%" y2="80%" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round" />
                    </svg>

                    <!-- Circles -->
                    <div id="nb-whole" class="absolute top-[20%] left-[50%] -translate-x-1/2 -translate-y-1/2 w-[35%] h-[35%] rounded-full border-[5px] md:border-8 flex items-center justify-center text-[clamp(1.5rem,4vw,3rem)] font-black bg-white z-10 transition-all duration-300 shadow-sm border-duo-purple text-duo-purple"></div>
                    <div id="nb-part1" class="absolute top-[80%] left-[20%] -translate-x-1/2 -translate-y-1/2 w-[25%] h-[25%] rounded-full border-[4px] md:border-[6px] flex items-center justify-center text-[clamp(1.2rem,3vw,2rem)] font-black bg-white z-10 shadow-sm border-duo-blue text-duo-blue"></div>
                    <div id="nb-part2" class="absolute top-[80%] left-[50%] -translate-x-1/2 -translate-y-1/2 w-[25%] h-[25%] rounded-full border-[4px] md:border-[6px] flex items-center justify-center text-[clamp(1.2rem,3vw,2rem)] font-black bg-white z-10 shadow-sm border-duo-green text-duo-green"></div>
                    <div id="nb-part3" class="absolute top-[80%] left-[80%] -translate-x-1/2 -translate-y-1/2 w-[25%] h-[25%] rounded-full border-[4px] md:border-[6px] flex items-center justify-center text-[clamp(1.2rem,3vw,2rem)] font-black bg-white z-10 shadow-sm border-duo-orange text-duo-orange transition-all duration-300"></div>
                </div>

                <!-- Answer Options -->
                <div id="options-container" class="grid grid-cols-2 gap-3 md:gap-4 w-full max-w-[300px] md:max-w-md shrink-0">
                    <!-- Filled by JS -->
                </div>

                <!-- Next Button Area -->
                <div class="h-16 w-full flex items-center justify-center mt-2 shrink-0" id="next-btn-area">
                    <!-- Filled by JS -->
                </div>
            </div>

            <!-- RIGHT PANEL: Ten Frames -->
            <div class="w-full lg:w-5/12 flex flex-col items-center justify-center bg-slate-100 rounded-3xl p-4 border-2 border-slate-200 shrink-0 min-h-0 overflow-hidden">
                <div class="flex-1 flex flex-col justify-center w-full max-w-sm gap-2 sm:gap-3 md:gap-4">
                    <div id="ten-frames" class="flex flex-col gap-2 sm:gap-3 w-full">
                        <!-- Filled by JS -->
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script>
        // --- Sound Effects ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        
        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
        }

        const playSuccessSound = () => {
            initAudio();
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
                osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); 
                osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 1);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 1);
            } catch(e) {}
        };

        const playErrorSound = () => {
            initAudio();
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.3);
            } catch(e) {}
        };

        // --- Speech Synthesis ---
        const synth = window.speechSynthesis;
        function speakCurrentQuestion() {
            if (!nums) return;
            synth.cancel(); // Stop current speech
            let text = '';
            
            if (mode === 'add') {
                text = `${nums.a} plus ${nums.b} plus ${nums.c}`;
            } else {
                text = `${nums.total} minus ${nums.a} minus ${nums.b}`;
            }
            
            // Add "equals" when answered correctly
            if (selectedOption !== null && selectedOption === nums.answer) {
                text += ` equals ${nums.answer}`;
            }

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.85; // Slightly slower for kids
            utterance.pitch = 1.2;
            synth.speak(utterance);
        }

        // --- Confetti Logic (Using canvas-confetti) ---
        function fireConfetti() {
            var duration = 4 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 9999 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 50 * (timeLeft / duration);
                // Fire from left
                confetti(Object.assign({}, defaults, { 
                    particleCount,
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }
                }));
                // Fire from right
                confetti(Object.assign({}, defaults, { 
                    particleCount,
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }
                }));
            }, 250);
        }

        // --- Game State ---
        const MAX_QUESTIONS = 10;
        let score = 0;
        let questionCount = 0;
        let mode = 'add';
        let nums = null;
        let options = [];
        let selectedOption = null;
        let animStep = 0; // Represents the "chunk/group" stage
        let history = new Set();
        let animTimeouts = [];

        // --- Core Logic ---
        function generateMathQuestion(qIndex) {
            const isAdd = Math.random() > 0.5;
            const isHard = qIndex >= 8; // Câu hỏi 9 và 10 sẽ khó hơn

            if (isAdd) {
                if (!isHard) {
                    // Dễ: 2 chữ số (10-20) + 1 chữ số (1-9) + 1 chữ số (1-9) => Dạng ab + c + d
                    let a = Math.floor(Math.random() * 11) + 10; // 10 đến 20
                    let b = Math.floor(Math.random() * 9) + 1;   // 1 đến 9
                    let maxC = 40 - a - b;
                    let c = Math.floor(Math.random() * Math.min(9, maxC)) + 1; // 1 đến 9
                    let total = a + b + c;
                    return { mode: 'add', a, b, c, total, answer: total };
                } else {
                    // Khó: 2 chữ số + 2 chữ số + 1 chữ số
                    let a = Math.floor(Math.random() * 6) + 10; // 10 đến 15
                    let b = Math.floor(Math.random() * 6) + 10; // 10 đến 15
                    let maxC = 40 - a - b;
                    let c = Math.floor(Math.random() * Math.min(9, maxC)) + 1;
                    let total = a + b + c;
                    return { mode: 'add', a, b, c, total, answer: total };
                }
            } else {
                if (!isHard) {
                    // Dễ: Tổng 2 chữ số (20-30) - 1 chữ số - 1 chữ số => Dạng ef - g - h
                    let total = Math.floor(Math.random() * 11) + 20; // 20 đến 30
                    let a = Math.floor(Math.random() * 9) + 1; // 1 đến 9
                    let b = Math.floor(Math.random() * 9) + 1; // 1 đến 9
                    let c = total - a - b;
                    return { mode: 'sub', a, b, c, total, answer: c };
                } else {
                    // Khó: Tổng 2 chữ số (30-40) - 2 chữ số - 1 chữ số
                    let total = Math.floor(Math.random() * 11) + 30; // 30 đến 40
                    let a = Math.floor(Math.random() * 6) + 10; // 10 đến 15
                    let b = Math.floor(Math.random() * 5) + 5;  // 5 đến 9
                    
                    // Trộn vị trí a, b cho phong phú
                    if (Math.random() > 0.5) {
                        let temp = a; a = b; b = temp;
                    }
                    
                    let c = total - a - b;
                    return { mode: 'sub', a, b, c, total, answer: c };
                }
            }
        }

        function getUniqueQuestion(qIndex) {
            let q;
            let qStr;
            let attempts = 0;
            do {
                q = generateMathQuestion(qIndex);
                qStr = q.mode === 'add' ? `add_${q.a}_${q.b}_${q.c}` : `sub_${q.total}_${q.a}_${q.b}`;
                attempts++;
            } while (history.has(qStr) && attempts < 100);
            history.add(qStr);
            return q;
        }

        function generateOptions(correctAnswer) {
            const opts = new Set([correctAnswer]);
            while (opts.size < 4) {
                let offset = Math.floor(Math.random() * 11) - 5;
                if (offset === 0) continue;
                let opt = correctAnswer + offset;
                if (opt >= 0 && opt <= 50) {
                    opts.add(opt);
                }
            }
            return Array.from(opts).sort(() => Math.random() - 0.5);
        }

        // --- Render Functions ---
        function updateUI() {
            // Update Score & Progress
            document.getElementById('score-text').innerText = score;
            const progressPercent = (questionCount / MAX_QUESTIONS) * 100;
            document.getElementById('progress-bar').style.width = `${progressPercent}%`;

            // Equation
            const eqEl = document.getElementById('equation');
            if (mode === 'add') {
                eqEl.innerHTML = `
                    <span class="text-duo-blue">${nums.a}</span> + 
                    <span class="text-duo-green">${nums.b}</span> + 
                    <span class="text-duo-orange">${nums.c}</span> = 
                    <span class="${selectedOption !== null ? (selectedOption === nums.answer ? 'text-duo-green' : 'text-duo-red') : 'text-slate-400'}">
                        ${selectedOption !== null ? nums.answer : '?'}
                    </span>`;
            } else {
                eqEl.innerHTML = `
                    <span class="text-duo-purple">${nums.total}</span> - 
                    <span class="text-duo-red">${nums.a}</span> - 
                    <span class="text-duo-blue">${nums.b}</span> = 
                    <span class="${selectedOption !== null ? (selectedOption === nums.answer ? 'text-duo-green' : 'text-duo-red') : 'text-slate-400'}">
                        ${selectedOption !== null ? nums.answer : '?'}
                    </span>`;
            }

            // Number Bond
            const nbWhole = document.getElementById('nb-whole');
            const nbPart1 = document.getElementById('nb-part1');
            const nbPart2 = document.getElementById('nb-part2');
            const nbPart3 = document.getElementById('nb-part3');

            nbPart1.innerText = nums.a;
            nbPart2.innerText = nums.b;
            
            if (mode === 'add') {
                nbWhole.innerText = selectedOption !== null ? nums.total : '?';
                nbPart3.innerText = nums.c;
                
                // Colorize
                nbPart1.className = nbPart1.className.replace(/border-duo-\w+ text-duo-\w+/, 'border-duo-blue text-duo-blue');
                nbPart2.className = nbPart2.className.replace(/border-duo-\w+ text-duo-\w+/, 'border-duo-green text-duo-green');
                nbPart3.className = nbPart3.className.replace(/border-duo-\w+ text-duo-\w+/, 'border-duo-orange text-duo-orange');
                
                if (selectedOption === nums.answer) {
                    nbWhole.className = nbWhole.className.replace(/border-duo-\w+ text-duo-\w+/, 'border-duo-green text-duo-green scale-110');
                } else {
                    nbWhole.className = nbWhole.className.replace(/border-duo-\w+ text-duo-\w+ scale-110/, 'border-duo-purple text-duo-purple');
                }
            } else {
                nbWhole.innerText = nums.total;
                nbPart3.innerText = selectedOption !== null ? nums.c : '?';
                
                // Colorize
                nbPart1.className = nbPart1.className.replace(/border-duo-\w+ text-duo-\w+/, 'border-duo-red text-duo-red');
                nbPart2.className = nbPart2.className.replace(/border-duo-\w+ text-duo-\w+/, 'border-duo-blue text-duo-blue');
                nbWhole.className = nbWhole.className.replace(/border-duo-\w+ text-duo-\w+ scale-110/, 'border-duo-purple text-duo-purple');

                if (selectedOption === nums.answer) {
                    nbPart3.className = nbPart3.className.replace(/border-duo-\w+ text-duo-\w+/, 'border-duo-green text-duo-green scale-110');
                } else {
                    nbPart3.className = nbPart3.className.replace(/border-duo-\w+ text-duo-\w+ scale-110/, 'border-duo-orange text-duo-orange');
                }
            }

            // Options (All same beautiful color for consistency)
            const optsContainer = document.getElementById('options-container');
            let optsHtml = '';
            
            options.forEach((opt) => {
                let baseClass = `btn-3d py-2 md:py-3 px-4 text-2xl md:text-3xl font-black rounded-2xl flex items-center justify-center text-white transition-all `;
                
                if (selectedOption === null) {
                    // Default State: All options are Duo Blue
                    baseClass += `bg-duo-blue border-2 border-b-[6px] border-duo-bluedark hover:opacity-90 active:border-b-0 cursor-pointer shadow-sm`;
                } else if (opt === nums.answer) {
                    // Correct answer style
                    baseClass += `bg-duo-green border-2 border-b-[4px] border-duo-greendark scale-105 animate-bounce-short z-10 shadow-md`;
                } else if (opt === selectedOption) {
                    // Wrong clicked answer style
                    baseClass += `bg-duo-red border-2 border-b-[4px] border-duo-reddark opacity-90`;
                } else {
                    // Disabled style (for the other options that weren't clicked)
                    baseClass += `bg-slate-200 border-2 border-b-[4px] border-slate-300 text-slate-400 opacity-60`;
                }
                
                optsHtml += `<button ${selectedOption !== null ? 'disabled' : ''} onclick="handleAnswer(${opt})" class="${baseClass}">${opt}</button>`;
            });
            optsContainer.innerHTML = optsHtml;

            // Next Button Area
            const nextArea = document.getElementById('next-btn-area');
            if (selectedOption !== null) {
                const isLast = questionCount >= MAX_QUESTIONS;
                nextArea.innerHTML = `
                    <button onclick="${isLast ? 'showEndScreen()' : 'startQuestion()'}" 
                            class="animate-fade-in btn-3d w-full max-w-sm bg-duo-blue border-b-[6px] border-duo-bluedark text-white text-xl md:text-2xl font-black py-3 md:py-4 px-8 rounded-2xl shadow-sm uppercase tracking-widest">
                        ${isLast ? 'Finish 🏆' : 'Continue ➡️'}
                    </button>
                `;
            } else {
                nextArea.innerHTML = '';
            }

            renderTenFrames();
        }

        // Gets Dots mapped for the chunked Animation Step
        function getDotsArray() {
            const arr = new Array(40).fill({ type: 'empty' });
            if (!nums) return arr;

            if (mode === 'add') {
                let visibleDots = 0;
                if (animStep >= 1) visibleDots += nums.a;
                if (animStep >= 2) visibleDots += nums.b;
                if (animStep >= 3) visibleDots += nums.c;

                for (let i = 0; i < visibleDots; i++) {
                    if (i < nums.a) {
                        arr[i] = { type: 'dot', color: 'bg-duo-blue' };
                    } else if (i < nums.a + nums.b) {
                        arr[i] = { type: 'dot', color: 'bg-duo-green' };
                    } else {
                        arr[i] = { type: 'dot', color: 'bg-duo-orange' };
                    }
                }
            } else if (mode === 'sub') {
                let visibleCrosses = 0;
                if (animStep >= 1) visibleCrosses += nums.a;
                if (animStep >= 2) visibleCrosses += nums.b;

                for (let i = 0; i < nums.total; i++) {
                    let hasCross = i >= nums.total - visibleCrosses;
                    let crossColor = null;
                    if (hasCross) {
                        let distanceFromEnd = (nums.total - 1) - i;
                        crossColor = distanceFromEnd < nums.a ? 'red' : 'blue';
                    }
                    arr[i] = { type: 'dot', color: 'bg-duo-purple', cross: hasCross, crossColor };
                }
            }
            return arr;
        }

        function renderTenFrames() {
            const arr = getDotsArray();
            const container = document.getElementById('ten-frames');
            let html = '';
            
            for(let f = 0; f < 4; f++) {
                html += `<div class="bg-white p-1.5 sm:p-2 md:p-3 rounded-2xl shadow-sm border-2 border-slate-100 relative">
                            <div class="grid grid-rows-2 grid-cols-5 gap-1 md:gap-2">`;
                
                for(let c = 0; c < 10; c++) {
                    const idx = f * 10 + c;
                    const dot = arr[idx];
                    
                    html += `<div class="aspect-square border-2 border-dashed border-slate-200 rounded-lg flex items-center justify-center p-0.5 sm:p-1 bg-slate-50/50">`;
                    
                    if (dot.type === 'dot') {
                        html += `<div class="relative w-full h-full rounded-full shadow-sm ${dot.color} scale-in">`;
                        if (dot.cross) {
                            const strokeC = dot.crossColor === 'red' ? '#FF4B4B' : '#1CB0F6';
                            html += `<svg class="absolute inset-0 w-full h-full animate-draw-cross z-10" viewBox="-2 -2 28 28">
                                        <line x1="2" y1="2" x2="22" y2="22" stroke="${strokeC}" stroke-width="6" stroke-linecap="round" />
                                        <line x1="22" y1="2" x2="2" y2="22" stroke="${strokeC}" stroke-width="6" stroke-linecap="round" />
                                     </svg>`;
                        }
                        html += `</div>`;
                    }
                    
                    html += `</div>`;
                }
                html += `</div></div>`;
            }
            container.innerHTML = html;
        }

        function clearAnimTimeouts() {
            animTimeouts.forEach(clearTimeout);
            animTimeouts = [];
        }

        // --- Animations ---
        function controlAnimation() {
            clearAnimTimeouts();
            if (!nums || selectedOption !== null) return;

            // Flashing by Groups!
            if (mode === 'add') {
                animStep = 1; // Flash 1: Show a
                renderTenFrames();
                animTimeouts.push(setTimeout(() => {
                    if (selectedOption === null) {
                        animStep = 2; // Flash 2: Show a + b
                        renderTenFrames();
                        animTimeouts.push(setTimeout(() => {
                            if (selectedOption === null) {
                                animStep = 3; // Flash 3: Show a + b + c
                                renderTenFrames();
                            }
                        }, 800));
                    }
                }, 800));
            } else if (mode === 'sub') {
                animStep = 0; // Total dots only
                renderTenFrames();
                animTimeouts.push(setTimeout(() => {
                    if (selectedOption === null) {
                        animStep = 1; // Flash 1: Cross a
                        renderTenFrames();
                        animTimeouts.push(setTimeout(() => {
                            if (selectedOption === null) {
                                animStep = 2; // Flash 2: Cross a + b
                                renderTenFrames();
                            }
                        }, 800));
                    }
                }, 800));
            }
        }

        // --- Game Flow ---
        window.handleAnswer = (opt) => {
            selectedOption = opt;
            clearAnimTimeouts();
            
            // Fast forward animation to show the final piece
            animStep = mode === 'add' ? 3 : 2; 
            
            if (opt === nums.answer) {
                playSuccessSound();
                score++;
            } else {
                playErrorSound();
            }
            
            updateUI();
        };

        function startQuestion() {
            // Sử dụng questionCount để kiểm soát độ khó
            nums = getUniqueQuestion(questionCount);
            mode = nums.mode;
            options = generateOptions(nums.answer);
            selectedOption = null;
            animStep = 0;
            questionCount++;
            
            updateUI();
            controlAnimation();

            // Speak after a tiny delay so UI updates first
            setTimeout(speakCurrentQuestion, 300);
        }

        function showEndScreen() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('end-screen').classList.add('flex');
            document.getElementById('final-score').innerText = score;
            
            playSuccessSound(); 
            fireConfetti();
        }

        window.startGame = () => {
            initAudio(); 
            score = 0;
            questionCount = 0;
            history.clear();
            
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('flex');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('game-screen').classList.add('flex');
            
            startQuestion();
        };

        // Bắt đầu game khi load
        window.onload = () => {
            startGame();
        };
    </script>
</body>
</html>
