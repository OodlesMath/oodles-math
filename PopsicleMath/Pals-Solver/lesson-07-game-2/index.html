<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Choose the Correct Sentence</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --primary-light: #eff6ff;
            --correct: #22c55e;
            --correct-dark: #16a34a;
            --correct-light: #dcfce7;
            --wrong: #ef4444;
            --wrong-dark: #dc2626;
            --wrong-light: #fee2e2;
            --bg-color: #f0f9ff;
            --card-bg: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .app-container {
            width: min(94vw, 1000px);
            min-height: 90vh;
            background: transparent;
            display: flex;
            flex-direction: column;
            position: relative;
            padding: 2vh 0;
        }

        /* Screens */
        .screen {
            display: none;
            flex-direction: column;
            flex: 1;
            width: 100%;
            animation: fadeIn 0.4s ease-in-out;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Start & End Screen */
        .center-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: var(--card-bg);
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 2px solid var(--border);
        }

        .title {
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .subtitle {
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .btn-large {
            background-color: var(--primary);
            color: white;
            font-size: 1.25rem;
            font-weight: 700;
            padding: 1rem 3rem;
            border: none;
            border-radius: 1.5rem;
            border-bottom: 6px solid var(--primary-hover);
            cursor: pointer;
            transition: all 0.1s;
            font-family: inherit;
        }

        .btn-large:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
            margin-bottom: 4px;
        }

        /* Game Header */
        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            gap: 1rem;
        }

        .progress-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .progress-text {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 1rem;
        }

        .progress-bar {
            height: 16px;
            background-color: #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
            width: 100%;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--correct);
            border-radius: 8px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .score-display {
            font-size: 1.25rem;
            font-weight: 700;
            color: #f59e0b;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Main Game Content */
        .game-content {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            flex: 1;
        }

        @media (min-width: 768px) {
            .game-content {
                flex-direction: row;
                align-items: stretch;
            }
            .picture-section {
                flex: 1;
            }
            .choices-section {
                flex: 1;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
        }

        .picture-section {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 1.5rem;
            padding: 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 250px;
        }

        .picture-section svg {
            width: 100%;
            height: auto;
            max-height: 400px;
            border-radius: 1rem;
        }

        .choices-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .choice-btn {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-bottom-width: 5px;
            border-radius: 1.25rem;
            padding: 1rem 1.25rem;
            cursor: pointer;
            transition: all 0.15s;
            text-align: left;
            width: 100%;
        }

        .choice-btn:active:not(:disabled) {
            transform: translateY(3px);
            border-bottom-width: 2px;
            margin-bottom: 3px;
        }

        .choice-btn:disabled {
            cursor: default;
        }

        .choice-letter {
            width: 2.5rem;
            height: 2.5rem;
            border: 2px solid var(--border);
            border-radius: 0.75rem;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-right: 1rem;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .choice-text {
            font-size: clamp(1rem, 2vw, 1.25rem);
            font-weight: 600;
            color: var(--text-main);
        }

        /* Choice States */
        .choice-btn.correct {
            background-color: var(--correct-light);
            border-color: var(--correct-dark);
            color: var(--correct-dark);
        }
        .choice-btn.correct .choice-letter {
            background-color: white;
            border-color: var(--correct-dark);
            color: var(--correct-dark);
        }
        .choice-btn.correct .choice-text {
            color: var(--correct-dark);
        }

        .choice-btn.wrong {
            background-color: var(--wrong-light);
            border-color: var(--wrong-dark);
            animation: shake 0.4s;
        }
        .choice-btn.wrong .choice-letter {
            background-color: white;
            border-color: var(--wrong-dark);
            color: var(--wrong-dark);
        }
        .choice-btn.wrong .choice-text {
            color: var(--wrong-dark);
        }

        .choice-btn.disabled {
            opacity: 0.6;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        /* Feedback Banner */
        .feedback-banner {
            position: fixed;
            bottom: -150px;
            left: 0;
            width: 100%;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 50;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
        }

        @media (min-width: 1000px) {
            .feedback-banner {
                position: absolute;
                border-radius: 1.5rem;
                bottom: -150px;
                box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            }
        }

        .feedback-banner.show {
            bottom: 0;
        }

        .feedback-banner.correct { background-color: var(--correct-light); }
        .feedback-banner.wrong { background-color: var(--wrong-light); }

        .feedback-message {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .feedback-banner.correct .feedback-message { color: var(--correct-dark); }
        .feedback-banner.wrong .feedback-message { color: var(--wrong-dark); }

        .feedback-icon {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
        }

        .btn-next {
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 700;
            padding: 0.75rem 2rem;
            border-radius: 1rem;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.1s;
        }
        
        .btn-next:active { transform: scale(0.95); }
        .feedback-banner.correct .btn-next { background-color: var(--correct); color: white; border-bottom: 4px solid var(--correct-dark); }
        .feedback-banner.wrong .btn-next { background-color: var(--wrong); color: white; border-bottom: 4px solid var(--wrong-dark); }

        /* End Screen Stars */
        .stars-container {
            display: flex;
            gap: 1rem;
            margin: 2rem 0;
        }
        .star {
            font-size: 4rem;
            color: #e2e8f0;
            transition: color 0.5s, transform 0.5s;
        }
        .star.earned {
            color: #fbbf24;
            transform: scale(1.1) rotate(10deg);
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>

    <script>
        // --- AUDIO SYSTEM (Web Audio API) ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playTone(freq, type, duration, vol=0.1) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playClick() { playTone(400, 'sine', 0.1, 0.05); }
        function playCorrect() { 
            playTone(440, 'sine', 0.1, 0.1); 
            setTimeout(() => playTone(554, 'sine', 0.1, 0.1), 100); 
            setTimeout(() => playTone(659, 'sine', 0.2, 0.15), 200); 
        }
        function playWrong() {
            playTone(300, 'triangle', 0.15, 0.1);
            setTimeout(() => playTone(250, 'triangle', 0.2, 0.1), 150);
        }
        function playWin() {
            [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                setTimeout(() => playTone(freq, 'square', 0.2, 0.05), i * 150);
            });
            setTimeout(() => playTone(1046.50, 'square', 0.4, 0.05), 600);
        }

        // --- SVG HELPER ---
        const wrapSVG = (content) => `
            <svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
                <rect width="300" height="200" fill="url(#skyGrad)"/>
                <path d="M 0 150 Q 75 130 150 150 T 300 150 L 300 200 L 0 200 Z" fill="#86efac"/>
                ${content}
            </svg>
        `;

        // --- QUESTIONS DATA ---
        const allQuestions = [
            {
                image: wrapSVG(`
                    <g transform="translate(150, 110)">
                        <use href="#kennel_bg"/>
                        <g transform="translate(0, 15) scale(0.9)"><use href="#puppy_front"/></g>
                        <use href="#kennel_fg"/>
                    </g>
                `),
                correct: "The puppy is in the kennel.",
                distractors: ["The puppy is on the kennel.", "The puppy is under the kennel."]
            },
            {
                image: wrapSVG(`
                    <g transform="translate(150, 120)">
                        <use href="#kennel_bg"/><use href="#kennel_fg"/>
                    </g>
                    <g transform="translate(150, 15)"><use href="#puppy_front"/></g>
                `),
                correct: "The puppy is on the kennel.",
                distractors: ["The puppy is in the kennel.", "The puppy is next to the kennel."]
            },
            {
                image: wrapSVG(`
                    <g transform="translate(150, 110)">
                        <use href="#kennel_bg"/><use href="#kennel_fg"/>
                    </g>
                    <g transform="translate(150, 130)"><use href="#puppy_side"/></g>
                `),
                correct: "The puppy is in front of the kennel.",
                distractors: ["The puppy is behind the kennel.", "The puppy is on the kennel."]
            },
            {
                image: wrapSVG(`
                    <g transform="translate(110, 100)"><use href="#puppy_side"/></g>
                    <g transform="translate(150, 110)">
                        <use href="#kennel_bg"/><use href="#kennel_fg"/>
                    </g>
                `),
                correct: "The puppy is behind the kennel.",
                distractors: ["The puppy is in front of the kennel.", "The puppy is above the kennel."]
            },
            {
                image: wrapSVG(`
                    <g transform="translate(150, 130)">
                        <use href="#kennel_bg"/><use href="#kennel_fg"/>
                    </g>
                    <g transform="translate(150, 30)">
                        <line x1="0" y1="-20" x2="0" y2="20" stroke="#94a3b8" stroke-width="2"/>
                        <circle cx="0" cy="-35" r="18" fill="#ef4444"/>
                        <use href="#puppy_front" />
                    </g>
                `),
                correct: "The puppy is above the kennel.",
                distractors: ["The puppy is below the kennel.", "The puppy is in the kennel."]
            },
            {
                image: wrapSVG(`
                    <g transform="translate(150, 130)"><use href="#table"/></g>
                    <g transform="translate(150, 80)"><use href="#ball"/></g>
                `),
                correct: "The ball is on the table.",
                distractors: ["The ball is below the table.", "The ball is next to the table."]
            },
            {
                image: wrapSVG(`
                    <g transform="translate(150, 100)"><use href="#table"/></g>
                    <g transform="translate(150, 150)"><use href="#ball"/></g>
                `),
                correct: "The ball is below the table.",
                distractors: ["The ball is on the table.", "The ball is above the table."]
            },
            {
                image: wrapSVG(`
                    <g transform="translate(150, 100)"><use href="#chair"/></g>
                    <g transform="translate(150, 140)"><use href="#teddy"/></g>
                `),
                correct: "The teddy bear is below the chair.",
                distractors: ["The teddy bear is on the chair.", "The teddy bear is in the chair."]
            },
            {
                image: wrapSVG(`
                    <g transform="translate(90, 120)"><use href="#chair"/></g>
                    <g transform="translate(210, 120)"><use href="#chair"/></g>
                    <g transform="translate(150, 145)"><use href="#toy_car"/></g>
                `),
                correct: "The toy is between two chairs.",
                distractors: ["The toy is on the chair.", "The toy is behind the chairs."]
            },
            {
                image: wrapSVG(`
                    <g transform="translate(150, 130)">
                        <use href="#basket_bg"/>
                        <g transform="translate(0, -5)"><use href="#apple"/></g>
                        <use href="#basket_fg"/>
                    </g>
                `),
                correct: "The apple is in the basket.",
                distractors: ["The apple is next to the basket.", "The apple is below the basket."]
            },
            {
                image: wrapSVG(`
                    <g transform="translate(100, 130)"><use href="#box_bg"/><use href="#box_fg"/></g>
                    <g transform="translate(190, 130)"><use href="#cat"/></g>
                `),
                correct: "The cat is next to the box.",
                distractors: ["The cat is in the box.", "The cat is above the box."]
            },
            {
                image: wrapSVG(`
                    <g transform="translate(150, 80)"><use href="#board"/></g>
                    <g transform="translate(210, 140)"><use href="#bag"/></g>
                `),
                correct: "The school bag is at the board.",
                distractors: ["The school bag is on the board.", "The school bag is above the board."]
            }
        ];

        // --- GAME LOGIC ---
        let questions = [];
        let currentIndex = 0;
        let score = 0;
        let isAnswered = false;

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startGame() {
            initAudio();
            playClick();
            questions = shuffle([...allQuestions]).slice(0, 12); // Use all 12, randomized
            currentIndex = 0;
            score = 0;
            updateScoreUI();
            switchScreen('screen-game');
            loadQuestion();
        }

        function goHome() {
            playClick();
            switchScreen('screen-start');
        }

        function loadQuestion() {
            isAnswered = false;
            document.getElementById('feedback-banner').classList.remove('show');
            
            const q = questions[currentIndex];
            
            // Update UI
            document.getElementById('progress-text').innerText = `Question ${currentIndex + 1} / ${questions.length}`;
            document.getElementById('progress-fill').style.width = `${(currentIndex / questions.length) * 100}%`;
            
            document.getElementById('picture-box').innerHTML = q.image;

            // Prepare choices
            let choices = [...q.distractors, q.correct];
            choices = shuffle(choices);

            const choicesBox = document.getElementById('choices-box');
            choicesBox.innerHTML = '';

            const letters = ['A', 'B', 'C'];

            choices.forEach((text, i) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.onclick = () => selectAnswer(btn, text, q.correct);
                
                btn.innerHTML = `
                    <div class="choice-letter">${letters[i]}</div>
                    <div class="choice-text">${text}</div>
                `;
                choicesBox.appendChild(btn);
            });
        }

        function selectAnswer(btn, selectedText, correctText) {
            if (isAnswered) return;
            initAudio();
            
            const isCorrect = selectedText === correctText;
            const buttons = document.querySelectorAll('.choice-btn');
            
            if (isCorrect) {
                isAnswered = true;
                playCorrect();
                btn.classList.add('correct');
                score++;
                updateScoreUI();
                showFeedback(true);
                // Disable other buttons
                buttons.forEach(b => {
                    if(b !== btn) b.classList.add('disabled');
                    b.disabled = true;
                });
            } else {
                playWrong();
                btn.classList.add('wrong');
                showFeedback(false);
                // Remove wrong class after shake
                setTimeout(() => {
                    if(!isAnswered) btn.classList.remove('wrong');
                }, 400);
            }
        }

        function showFeedback(isCorrect) {
            const banner = document.getElementById('feedback-banner');
            const icon = document.getElementById('feedback-icon');
            const text = document.getElementById('feedback-text');
            
            banner.className = `feedback-banner show ${isCorrect ? 'correct' : 'wrong'}`;
            
            if (isCorrect) {
                icon.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="color: var(--correct-dark)"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
                text.innerText = "Great job!";
            } else {
                icon.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="color: var(--wrong-dark)"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
                text.innerText = "Try again!";
            }
        }

        function updateScoreUI() {
            document.getElementById('score-text').innerText = score;
        }

        function nextQuestion() {
            playClick();
            if (!isAnswered) {
                // If they clicked next on a wrong banner, just hide banner
                document.getElementById('feedback-banner').classList.remove('show');
                return;
            }

            currentIndex++;
            if (currentIndex < questions.length) {
                loadQuestion();
            } else {
                endGame();
            }
        }

        function endGame() {
            document.getElementById('feedback-banner').classList.remove('show');
            document.getElementById('progress-fill').style.width = `100%`;
            playWin();
            switchScreen('screen-end');
            
            document.getElementById('final-score-text').innerText = `You got ${score} / ${questions.length}!`;
            
            const stars = document.querySelectorAll('#final-stars .star');
            stars.forEach(s => s.classList.remove('earned'));
            
            let earnedStars = 1;
            if (score >= 10) earnedStars = 3;
            else if (score >= 7) earnedStars = 2;

            setTimeout(() => {
                for(let i=0; i<earnedStars; i++) {
                    setTimeout(() => {
                        stars[i].classList.add('earned');
                    }, i * 300);
                }
            }, 500);

            triggerConfetti();
        }

        // --- CONFETTI ANIMATION ---
        function triggerConfetti() {
            const container = document.getElementById('confetti-canvas');
            container.innerHTML = '';
            const colors = ['#fce18a', '#ff726d', '#b48def', '#f4306d', '#4ade80'];
            
            for(let i=0; i<80; i++) {
                const conf = document.createElement('div');
                conf.style.position = 'absolute';
                conf.style.width = `${Math.random() * 8 + 6}px`;
                conf.style.height = `${Math.random() * 12 + 8}px`;
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.left = `${Math.random() * 100}vw`;
                conf.style.top = '-20px';
                conf.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                
                const duration = Math.random() * 3 + 2;
                const delay = Math.random() * 1.5;
                
                conf.animate([
                    { transform: `translate3d(0,0,0) rotate(0deg)`, opacity: 1 },
                    { transform: `translate3d(${Math.random()*100 - 50}px, 100vh, 0) rotate(${Math.random()*720}deg)`, opacity: 0 }
                ], {
                    duration: duration * 1000,
                    delay: delay * 1000,
                    easing: 'cubic-bezier(.37,0,.63,1)',
                    fill: 'forwards'
                });
                
                container.appendChild(conf);
            }

            // Cleanup after animation
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }
    </script>
