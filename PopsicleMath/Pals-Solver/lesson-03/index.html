<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Make Tens Strategy Game - Ver 3</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            touch-action: none; 
            user-select: none; 
            -webkit-user-select: none; 
            overflow: hidden;
            background: linear-gradient(180deg, #69bdfa 0%, #a1dffc 60%, #b9eaff 100%);
        }

        /* --- Ver 7 Background Styles --- */
        .clouds-container { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
        .cloud { position: absolute; background: #ffffff; border-radius: 50px; animation: float linear infinite; opacity: 0.95; box-shadow: 0 4px 0 rgba(255,255,255,0.4) inset; }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: inherit; border-radius: 50%; }
        .c1 { width: 120px; height: 35px; top: 12%; animation-duration: 40s; animation-delay: -5s; }
        .c1::before { width: 60px; height: 60px; top: -30px; left: 15px; }
        .c1::after { width: 45px; height: 45px; top: -20px; right: 15px; }
        .c2 { width: 160px; height: 45px; top: 30%; animation-duration: 55s; animation-delay: -25s; transform: scale(1.1); opacity: 0.8; }
        .c2::before { width: 80px; height: 80px; top: -40px; left: 20px; }
        .c2::after { width: 65px; height: 65px; top: -25px; right: 25px; }
        .c3 { width: 90px; height: 30px; top: 60%; animation-duration: 35s; opacity: 0.85; }
        .c3::before { width: 50px; height: 50px; top: -25px; left: 10px; }
        
        @keyframes float { 
            0% { left: -200px; } 
            100% { left: 100vw; } 
        }

        /* Minigame Starry Background */
        .starry-bg {
            background: linear-gradient(180deg, #181142 0%, #352163 45%, #523178 80%, #24143a 100%);
            position: relative;
        }
        .moon {
            position: absolute;
            top: 8%;
            right: 10%; /* Kept right but not absolute top corner to allow logo room if needed */
            width: 70px;
            height: 70px;
            background: #fff9d6;
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(255, 249, 214, 0.6), inset -10px -10px 0 rgba(0,0,0,0.1);
            z-index: 1;
        }
        .stars-layer-1 {
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(2px 2px at 15% 25%, #ffffff 50%, transparent),
                radial-gradient(3px 3px at 35% 45%, #ffea00 50%, transparent),
                radial-gradient(2px 2px at 85% 25%, #ffffff 50%, transparent);
            background-size: 200px 200px;
            opacity: 0.8;
            animation: twinkle-bg 3s infinite alternate;
        }
        @keyframes twinkle-bg { 0% { opacity: 0.4; } 100% { opacity: 1; } }

        /* Duolingo Style Buttons */
        .btn-duo-green { background-color: #58cc02; border-bottom: 5px solid #46a302; color: white; transition: all 0.1s ease; }
        .btn-duo-green:active:not(:disabled) { transform: translateY(5px); border-bottom: 0px solid #46a302; margin-bottom: 5px; }
        
        .btn-duo-blue { background-color: #1cb0f6; border-bottom: 5px solid #1899d6; color: white; transition: all 0.1s ease; }
        .btn-duo-blue:active:not(:disabled) { transform: translateY(5px); border-bottom: 0px solid #1899d6; margin-bottom: 5px; }
        
        .btn-duo-wrong { background-color: #ff4b4b !important; border-bottom: 5px solid #ea1515 !important; color: white !important; transition: all 0.1s ease; }
        .btn-duo-wrong:active:not(:disabled) { transform: translateY(5px); border-bottom: 0px solid #ea1515 !important; margin-bottom: 5px; }
        
        .btn-duo-white { background-color: #ffffff; border-bottom: 5px solid #cbd5e1; color: #334155; transition: all 0.1s ease; }
        .btn-duo-white:active:not(:disabled) { transform: translateY(5px); border-bottom: 0px solid #cbd5e1; margin-bottom: 5px; }

        /* Number Highlights */
        .chunky-number { text-shadow: 0 3px 0 rgba(0,0,0,0.15); }

        /* Duo Style Cards */
        .card-duo {
            background-color: white;
            border-radius: 1.25rem;
            border: 3px solid #e5e7eb;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.08);
            position: relative;
            z-index: 10;
        }

        /* --- SQUARED BLUE CUBES (Ten Rod) --- */
        .ten-cube-segment-sq {
            background: linear-gradient(135deg, #4cb8ff 0%, #0088dd 100%);
            border: 1px solid #0077c2;
            border-bottom: 2px solid #005599; 
            border-radius: 3px; 
            box-shadow: inset 1px 1px 2px rgba(255,255,255,0.6);
        }

        /* Golden Ones Cube */
        .one-cube {
            background: linear-gradient(135deg, #ffde00 0%, #ffc800 100%);
            border: 2px solid #e5a900;
            border-bottom: 4px solid #cc8400; 
            border-radius: 6px;
            box-shadow: inset 2px 2px 4px rgba(255,255,255,0.7);
        }

        /* --- Glass Jar Styles --- */
        .glass-jar-v9 {
            width: 120px;
            height: 140px;
            border: 6px solid rgba(255, 255, 255, 0.9);
            border-top: none;
            border-radius: 30px 30px 60px 60px;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.1) 100%);
            backdrop-filter: blur(5px);
            box-shadow: 
                inset 20px 0 30px rgba(255, 255, 255, 0.8), 
                inset -10px -10px 20px rgba(0,0,0,0.2), 
                0 20px 40px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        @media (min-width: 640px) { .glass-jar-v9 { width: 150px; height: 170px; border-width: 8px; border-radius: 40px 40px 70px 70px; } }
        
        .jar-neck-v9 {
            position: absolute; top: -25px; left: 50%; transform: translateX(-50%); width: 70px; height: 30px;
            border-left: 6px solid rgba(255,255,255,0.9); border-right: 6px solid rgba(255,255,255,0.9);
            background: rgba(255, 255, 255, 0.3); z-index: 5;
        }
        @media (min-width: 640px) { .jar-neck-v9 { top: -30px; width: 85px; height: 35px; border-width: 8px; } }
        
        .jar-lip-v9 {
            position: absolute; top: -38px; left: 50%; transform: translateX(-50%); width: 85px; height: 20px;
            border: 6px solid #ffffff; border-radius: 10px; background: #e0f2fe; z-index: 10;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3), inset 0 3px 6px rgba(255,255,255,1);
        }
        @media (min-width: 640px) { .jar-lip-v9 { top: -45px; width: 105px; height: 24px; border-width: 8px; border-radius: 12px; } }
        
        .jar-highlight-v9 {
            position: absolute; left: 12%; top: 15%; width: 15%; height: 65%;
            background: #ffffff; border-radius: 30px; opacity: 0.7; transform: rotate(-10deg); z-index: 2; 
        }
        
        .magic-fill-v9 {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(180deg, #FFEB3B 0%, #FF9800 100%);
            box-shadow: 0 -5px 25px rgba(255, 152, 0, 0.9), inset 0 0 25px rgba(255, 255, 255, 0.6);
            transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 0 0 55px 55px; opacity: 0.95; z-index: 1; overflow: hidden;
        }
        @media (min-width: 640px) { .magic-fill-v9 { border-radius: 0 0 62px 62px; } }
        
        .bubble {
            position: absolute; background: rgba(255,255,255,0.6); border-radius: 50%; animation: rise 2s infinite ease-in;
        }
        @keyframes rise {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-50px) scale(1.2); opacity: 0; }
        }

        /* Hide scrollbar */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* Animations */
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 70% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes bounce-sm { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .animate-bounce-sm { animation: bounce-sm 1s ease-in-out infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 1; transform: scale(1); filter: drop-shadow(0 0 8px rgba(255,215,0,0.8)); } 50% { opacity: 0.8; transform: scale(0.85); filter: drop-shadow(0 0 3px rgba(255,215,0,0.4)); } }
        .animate-twinkle { animation: twinkle 1.5s infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .animate-shake { animation: shake 0.2s ease-in-out 2; }
    </style>
</head>

        // --- STREAMING_CHUNK:Setting up Audio & Speech... ---
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (AudioContext) audioCtx = new AudioContext();
            }
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            initAudio();
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const playTone = (freq, tType, duration, delay = 0, vol = 0.3) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = tType;
                osc.frequency.setValueAtTime(freq, now + delay);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                gain.gain.setValueAtTime(0, now + delay);
                gain.gain.linearRampToValueAtTime(vol, now + delay + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, now + delay + duration);
                osc.start(now + delay);
                osc.stop(now + delay + duration);
            };

            if (type === 'pop') playTone(600, 'sine', 0.1, 0, 0.4);
            else if (type === 'drop') playTone(300, 'triangle', 0.1, 0, 0.4);
            else if (type === 'success') {
                playTone(523.25, 'triangle', 0.2, 0, 0.4);
                playTone(659.25, 'triangle', 0.2, 0.05, 0.4);
                playTone(783.99, 'triangle', 0.2, 0.1, 0.4);
                playTone(1046.50, 'triangle', 0.4, 0.15, 0.4);
            }
            else if (type === 'star') {
                playTone(1200, 'sine', 0.1, 0, 0.2);
                playTone(1600, 'sine', 0.15, 0.05, 0.2);
            }
            else if (type === 'wrong') playTone(150, 'sawtooth', 0.3, 0, 0.3);
            else if (type === 'start') {
                playTone(523.25, 'sine', 0.3, 0, 0.3);   
                playTone(659.25, 'sine', 0.3, 0.1, 0.3); 
                playTone(783.99, 'sine', 0.5, 0.2, 0.3); 
            }
            else if (type === 'magic') {
                for(let i=0; i<5; i++) playTone(800 + i*200, 'sine', 0.1, i*0.05, 0.2);
            }
        }

        function readQuestionAloud() {
            if (state.targets.length < 2) return;
            const text = `${state.targets[0]} plus ${state.targets[1]} equals what?`;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.85; // Slightly slower for younger kids
            utterance.pitch = 1.2; // Slightly higher pitch for friendliness
            utterance.lang = 'en-US';
            window.speechSynthesis.speak(utterance);
        }

        // --- STREAMING_CHUNK:Configuring blocks and numbers... ---
        function getTenRodHTML(isNew, extraClass = "") {
            let segments = "";
            for(let i=0; i<10; i++) {
                segments += `<div class="ten-cube-segment-sq aspect-square w-full"></div>`;
            }
            return `<div class="grid grid-cols-10 gap-[1px] sm:gap-[2px] w-full max-w-[150px] sm:max-w-[180px] mx-auto ${isNew ? 'animate-pop-in' : ''} ${extraClass} mb-1 sm:mb-2">
                ${segments}
            </div>`;
        }

        function getOneCubeHTML(isGhost = false, extraClass = "") {
            if (isGhost) {
                return `<div class="w-full h-full bg-black/5 rounded-[4px] sm:rounded-md border-[2px] sm:border-[3px] border-dashed border-slate-300 transition-all duration-200 select-none ${extraClass}"></div>`;
            }
            return `<div class="w-full h-full rounded-[4px] sm:rounded-md one-cube flex items-center justify-center select-none active:scale-95 hover:brightness-110 ${extraClass}">
                <div class="w-[30%] h-[30%] rounded-full bg-white/60 absolute top-[10%] left-[10%] blur-[1px]"></div>
            </div>`;
        }

        function generateQuestion() {
            const maxVal = state.maxSum || 30;
            let minAns = 11, maxAns = 30;
            if (maxVal === 20) { minAns = 11; maxAns = 20; }
            else if (maxVal === 30) { minAns = 21; maxAns = 30; }
            else if (maxVal === 40) { minAns = 31; maxAns = 40; }
            else if (maxVal === 50) { minAns = 41; maxAns = 50; }
            else if (maxVal === 100) { minAns = 51; maxAns = 100; }

            let n1, n2;
            let valid = false;
            
            while (!valid) {
                let ans = Math.floor(Math.random() * (maxAns - minAns + 1)) + minAns;
                let onesDigit = ans % 10;
                
                if (state.regroupingMode === 'with') {
                    let targetOnesSum = (onesDigit === 0) ? 10 : 10 + onesDigit;
                    let minOne = Math.max(1, targetOnesSum - 9);
                    let maxOne = Math.min(9, targetOnesSum - 1);
                     
                    if (minOne <= maxOne) {
                        let ones1 = Math.floor(Math.random() * (maxOne - minOne + 1)) + minOne;
                        let ones2 = targetOnesSum - ones1;
                        
                        let tensSum = Math.floor(ans / 10) - 1; 
                        let tens1 = Math.floor(Math.random() * (tensSum + 1));
                        let tens2 = tensSum - tens1;
                        
                        n1 = tens1 * 10 + ones1;
                        n2 = tens2 * 10 + ones2;
                        if (n1 > 0 && n2 > 0) valid = true;
                    }
                } else { 
                    let targetOnesSum = onesDigit;
                    let ones1 = Math.floor(Math.random() * (targetOnesSum + 1));
                    let ones2 = targetOnesSum - ones1;
                    
                    let tensSum = Math.floor(ans / 10);
                    let tens1 = Math.floor(Math.random() * (tensSum + 1));
                    let tens2 = tensSum - tens1;
                    
                    n1 = tens1 * 10 + ones1;
                    n2 = tens2 * 10 + ones2;
                    
                    if (n1 > 0 && n2 > 0) valid = true;
                }
            }

            state.targets = [n1, n2];
            
            state.numbers = state.targets.map(num => ({
                tens: Math.floor(num / 10),
                ones: num % 10,
                isTransformed: false
            }));

            const total = state.targets.reduce((a, b) => a + b, 0);
            let opts = new Set([total]);
            while(opts.size < 4) {
                const variations = [total + 10, total - 10, total + 1, total - 1, total + 2, total - 2];
                const randChoice = variations[Math.floor(Math.random() * variations.length)];
                if (randChoice > 0 && randChoice !== total) opts.add(randChoice);
            }
            state.options = Array.from(opts).sort(() => Math.random() - 0.5);

            state.hasGuessedWrong = false;
            state.wrongGuesses = [];
            state.correctAnswer = null;
            state.showFinalAnswer = false;

            document.getElementById('scenic-bg').style.display = 'block';
            const msg = state.regroupingMode === 'with' ? "Move ones to make TENS! 🧩" : "Move pieces to add up! 🧩";
            showNotification(msg);
        }

        // --- STREAMING_CHUNK:Defining game loop functions... ---
        function startGame() {
            initAudio();
            playSound('start');
            state.score = 0;
            state.completedQuestions = 0;
            state.gameState = 'regrouping';
            generateQuestion();
            renderApp();
        }

        function selectRange(val) {
            playSound('pop');
            state.maxSum = val;
            renderApp();
        }

        function selectRegrouping(val) {
            playSound('pop');
            state.regroupingMode = val;
            renderApp();
        }

        function showNotification(text) {
            const el = document.getElementById('notification-toast');
            document.getElementById('notification-text').innerText = text;
            el.classList.remove('opacity-0', '-translate-y-4');
            el.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                el.classList.remove('opacity-100', 'translate-y-0');
                el.classList.add('opacity-0', '-translate-y-4');
            }, 2500);
        }

        function showFeedback(isCorrect, callback) {
            const overlay = document.getElementById('feedback-overlay');
            const content = document.getElementById('feedback-content');
            
            overlay.classList.remove('hidden');
            setTimeout(() => overlay.classList.add('opacity-100'), 10);
            
            content.className = `p-6 sm:p-10 rounded-[2rem] shadow-2xl border-[6px] border-white transform scale-0 transition-transform duration-300 ${isCorrect ? 'bg-[#58cc02]' : 'bg-[#ff4b4b]'}`;
            content.innerHTML = isCorrect ? Icons.CheckBig : Icons.XBig;
            
            setTimeout(() => content.classList.replace('scale-0', 'scale-110'), 50);
            setTimeout(() => content.classList.replace('scale-110', 'scale-100'), 250);

            setTimeout(() => {
                overlay.classList.remove('opacity-100');
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    if(callback) callback();
                }, 300);
            }, 1000);
        }

        function checkMultipleChoiceAnswer(guessVal) {
            if (state.showFinalAnswer) return; 
            const total = state.targets.reduce((a, b) => a + b, 0);
            
            if (guessVal === total) {
                playSound('success');
                if (!state.hasGuessedWrong) state.score += 20; 
                state.correctAnswer = guessVal;
                state.showFinalAnswer = true;
                renderApp();
                
                setTimeout(() => {
                    showFeedback(true, () => {
                        state.completedQuestions++;
                        if (state.completedQuestions === 3 || state.completedQuestions === 6) {
                            startMinigame();
                        } else {
                            state.gameState = 'regrouping';
                            generateQuestion();
                            renderApp();
                        }
                    });
                }, 800);
            } else {
                playSound('wrong');
                state.hasGuessedWrong = true;
                if (!state.wrongGuesses.includes(guessVal)) state.wrongGuesses.push(guessVal);
                renderApp();
                
                setTimeout(() => {
                    const btn = document.querySelector(`[data-val="${guessVal}"]`);
                    if (btn) {
                        btn.classList.add('animate-shake');
                        setTimeout(() => btn.classList.remove('animate-shake'), 500);
                    }
                }, 50);
            }
        }

        // --- STREAMING_CHUNK:Handling Drag and Drop Events... ---
        let isDragging = false;
        let dragSourceIdx = null;
        let dragType = null;

        document.addEventListener('pointerdown', (e) => {
            if(state.gameState !== 'regrouping') return;
            initAudio();
            const target = e.target.closest('[data-drag]');
            if(!target) return;

            const action = target.getAttribute('data-drag');
            if (action === 'unit' || action === 'ten') {
                const idx = parseInt(target.getAttribute('data-idx'));
                startDrag(e, idx, action);
                playSound('pop');
            }
        });

        function startDrag(e, sourceIdx, type) {
            e.preventDefault();
            isDragging = true;
            dragSourceIdx = sourceIdx;
            dragType = type;

            const proxy = document.getElementById('drag-proxy');
            if (type === 'unit') {
                proxy.innerHTML = `<div class="w-10 h-10 shadow-2xl">${getOneCubeHTML(false)}</div>`;
            } else {
                proxy.innerHTML = `<div class="w-32 shadow-2xl">${getTenRodHTML(false)}</div>`;
            }
            proxy.style.display = 'block';
            updateProxyPos(e.clientX, e.clientY);
        }

        document.addEventListener('pointermove', (e) => {
            if (state.gameState === 'minigame') {
                const jarEl = document.getElementById('catcher-jar');
                if (jarEl) {
                    const halfWidth = jarEl.offsetWidth / 2;
                    state.jar.x = Math.max(halfWidth, Math.min(window.innerWidth - halfWidth, e.clientX));
                    jarEl.style.left = `${state.jar.x}px`;
                }
            }

            if(!isDragging) return;
            e.preventDefault();
            updateProxyPos(e.clientX, e.clientY);
        });

        document.addEventListener('pointerup', (e) => {
            if(!isDragging) return;
            isDragging = false;
            
            const proxy = document.getElementById('drag-proxy');
            proxy.style.display = 'none';

            const targetEl = document.elementFromPoint(e.clientX, e.clientY);
            const slotEl = targetEl ? targetEl.closest('.game-slot') : null;

            if (slotEl) {
                const targetIdx = parseInt(slotEl.getAttribute('data-slot-idx'));
                if (targetIdx !== dragSourceIdx) {
                    if (dragType === 'unit') {
                        if (state.numbers[targetIdx].ones < 10) {
                            state.numbers[dragSourceIdx].ones--;
                            state.numbers[targetIdx].ones++;
                            
                            if (state.numbers[targetIdx].ones === 10) {
                                state.numbers[targetIdx].ones = 0;
                                state.numbers[targetIdx].tens++;
                                state.numbers[targetIdx].isTransformed = true;
                                playSound('magic');
                                showNotification("Awesome! TEN Made! 🌟");
                            } else {
                                playSound('drop');
                            }
                        } else {
                            showNotification("This slot is already full!");
                            playSound('wrong');
                        }
                    } else if (dragType === 'ten') {
                        if (state.numbers[dragSourceIdx].tens > 0) {
                            state.numbers[dragSourceIdx].tens--;
                            state.numbers[targetIdx].tens++;
                            playSound('drop');
                        }
                    }
                }
            }
            dragSourceIdx = null;
            dragType = null;
            renderApp();
        });

        function updateProxyPos(x, y) {
            const proxy = document.getElementById('drag-proxy');
            proxy.style.left = x + 'px';
            proxy.style.top = y + 'px';
        }

        // --- STREAMING_CHUNK:Implementing UI Click Events & Minigame logic... ---
        document.addEventListener('click', (e) => {
            const actionBtn = e.target.closest('[data-action]');
            if (!actionBtn) return;
            
            const act = actionBtn.getAttribute('data-action');
            if (act === 'start') startGame();
            else if (act === 'guess') {
                const val = parseInt(actionBtn.getAttribute('data-val'));
                checkMultipleChoiceAnswer(val);
            } else if (act === 'set-range') {
                const val = parseInt(actionBtn.getAttribute('data-val'));
                selectRange(val);
            } else if (act === 'set-regrouping') {
                const val = actionBtn.getAttribute('data-val');
                selectRegrouping(val);
            } else if (act === 'read-aloud') {
                readQuestionAloud();
            }
        });

        let animFrame;
        function startMinigame() {
            state.gameState = 'minigame';
            document.getElementById('scenic-bg').style.display = 'none'; 
            state.jar.caught = 0;
            state.stars = [];
            renderApp();
            
            let frameCount = 0;
            function updateMinigame() {
                if (state.gameState !== 'minigame') return;
                frameCount++;

                if (frameCount % 35 === 0 && state.stars.length < 12 && state.jar.caught < state.jar.target) {
                    state.stars.push({
                        id: Date.now() + Math.random(),
                        x: Math.random() * (window.innerWidth - 60) + 30,
                        y: -50,
                        speed: 2.5 + Math.random() * 3.5,
                        scale: 0.8 + Math.random() * 0.6,
                        caught: false
                    });
                }

                const fillEl = document.getElementById('jar-fill');
                if (fillEl) {
                    const fillPct = (state.jar.caught / state.jar.target) * 100;
                    fillEl.style.height = `${fillPct}%`;
                    
                    if(Math.random() < 0.1 && state.jar.caught > 0) {
                        const bubble = document.createElement('div');
                        bubble.className = 'bubble';
                        bubble.style.left = `${Math.random() * 80 + 10}%`;
                        bubble.style.width = `${Math.random() * 8 + 4}px`;
                        bubble.style.height = bubble.style.width;
                        bubble.style.bottom = `${Math.random() * 20}%`;
                        fillEl.appendChild(bubble);
                        setTimeout(() => bubble.remove(), 1900);
                    }
                }

                for (let i = state.stars.length - 1; i >= 0; i--) {
                    let star = state.stars[i];
                    if (star.caught) continue;

                    star.y += star.speed;
                    
                    const starEl = document.getElementById(`star-${star.id}`);
                    if (starEl) {
                        starEl.style.top = `${star.y}px`;
                        starEl.style.left = `${star.x}px`;
                    } else if (star.y < window.innerHeight) {
                        const container = document.getElementById('minigame-container');
                        if (container) {
                            const newStar = document.createElement('div');
                            newStar.id = `star-${star.id}`;
                            newStar.className = 'absolute w-10 h-10 sm:w-14 sm:h-14 animate-twinkle'; 
                            newStar.style.transform = `scale(${star.scale})`;
                            newStar.style.left = `${star.x}px`;
                            newStar.style.top = `${star.y}px`;
                            newStar.innerHTML = Icons.Star;
                            container.appendChild(newStar);
                        }
                    }

                    const jarEl = document.getElementById('catcher-jar');
                    if(jarEl) {
                        const jarTopY = window.innerHeight - jarEl.offsetHeight - 20; 
                        const jarBottomY = window.innerHeight - 30;
                        const jarHalfWidth = jarEl.offsetWidth / 2;

                        if (star.y > jarTopY && star.y < jarBottomY) {
                            if (Math.abs((star.x + 20) - state.jar.x) < jarHalfWidth) { 
                                star.caught = true;
                                state.jar.caught++;
                                state.score += 5; 
                                playSound('star');
                                
                                if (starEl) {
                                    starEl.style.transform = 'scale(0)';
                                    starEl.style.opacity = '0';
                                    setTimeout(() => starEl.remove(), 200);
                                }
                                state.stars.splice(i, 1);

                                if (state.jar.caught >= state.jar.target) {
                                    playSound('magic');
                                    setTimeout(() => endMinigame(), 500);
                                    return; 
                                }
                            }
                        }
                    }

                    if (star.y > window.innerHeight) {
                        if (starEl) starEl.remove();
                        state.stars.splice(i, 1);
                    }
                }
                animFrame = requestAnimationFrame(updateMinigame);
            }
            updateMinigame();
        }

        function endMinigame() {
            cancelAnimationFrame(animFrame);
            shootConfetti();
            setTimeout(() => {
                if (state.completedQuestions >= MAX_QUESTIONS) {
                    state.gameState = 'finished';
                    document.getElementById('scenic-bg').style.display = 'block';
                    renderApp();
                    shootConfetti();
                } else {
                    state.gameState = 'regrouping';
                    generateQuestion();
                    renderApp();
                }
            }, 3000);
        }

        function shootConfetti() {
            const duration = 2500;
            const end = Date.now() + duration;
            // Confetti originating from the very top (y: 0 or slightly above)
            confetti({ particleCount: 150, spread: 100, origin: { y: -0.1 }, colors: ['#ffc800', '#ff4b4b', '#1cb0f6', '#58cc02'], shapes: ['square', 'circle'] });
            
            (function frame() {
                confetti({ particleCount: 10, angle: 60, spread: 55, origin: { x: 0, y: -0.1 }, colors: ['#58cc02', '#1cb0f6', '#ffc800', '#ff4b4b', '#a335ee'], shapes: ['square', 'circle'] });
                confetti({ particleCount: 10, angle: 120, spread: 55, origin: { x: 1, y: -0.1 }, colors: ['#58cc02', '#1cb0f6', '#ffc800', '#ff4b4b', '#a335ee'], shapes: ['square', 'circle'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        // --- STREAMING_CHUNK:Rendering visual interface... ---
        function renderHeader() {
            if (state.gameState === 'start' || state.gameState === 'finished' || state.gameState === 'minigame') return '';
            
            return `
            <div class="absolute top-4 left-4 z-50 flex flex-row items-center gap-2">
                <div class="bg-white rounded-[20px] px-3 py-1.5 flex items-center gap-1.5 border-[3px] border-slate-100 shadow-sm">
                    ${Icons.Trophy}
                    <span class="font-black text-xl leading-none text-[#ffc800] chunky-number">${state.score}</span>
                </div>
                <div class="bg-[#1cb0f6] rounded-[20px] px-3 py-2 text-white text-[15px] font-black border-b-[4px] border-[#1899d6] shadow-sm whitespace-nowrap leading-none pt-2.5">
                    Level ${state.completedQuestions + 1}/${MAX_QUESTIONS}
                </div>
                <button data-action="start" class="bg-white w-10 h-10 rounded-[18px] text-slate-400 border-[3px] border-slate-100 hover:bg-slate-50 transition-colors active:scale-95 shadow-sm flex items-center justify-center flex-shrink-0">
                    ${Icons.Reload}
                </button>
            </div>
            `;
        }

        function renderNumberBond() {
            const total = state.targets.reduce((a, b) => a + b, 0);
            const val1 = state.numbers[0].tens * 10 + state.numbers[0].ones;
            const val2 = state.numbers[1].tens * 10 + state.numbers[1].ones;

            return `
            <div class="flex flex-col items-center mb-2 sm:mb-4 relative z-10 w-full max-w-[200px] mx-auto mt-2 sm:mt-4">
                <div class="relative w-full h-20 sm:h-24">
                    <!-- Connecting Lines -->
                    <svg class="absolute inset-0 w-full h-full" style="z-index: -1;">
                        <line x1="50%" y1="20%" x2="25%" y2="80%" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"/>
                        <line x1="50%" y1="20%" x2="75%" y2="80%" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"/>
                    </svg>
                    <!-- Whole -->
                    <div class="absolute top-0 left-1/2 -translate-x-1/2 bg-white border-[4px] border-[#1cb0f6] w-12 h-12 sm:w-16 sm:h-16 rounded-full flex items-center justify-center text-lg sm:text-2xl font-black text-[#1899d6] shadow-md chunky-number">
                        ${state.showFinalAnswer ? total : '?'}
                    </div>
                    <!-- Parts -->
                    <div class="absolute bottom-0 left-[10%] bg-white border-[4px] border-[#58cc02] w-10 h-10 sm:w-12 sm:h-12 rounded-full flex items-center justify-center text-base sm:text-lg font-black text-[#46a302] shadow-md chunky-number transition-all duration-300">
                        ${val1}
                    </div>
                    <div class="absolute bottom-0 right-[10%] bg-white border-[4px] border-[#58cc02] w-10 h-10 sm:w-12 sm:h-12 rounded-full flex items-center justify-center text-base sm:text-lg font-black text-[#46a302] shadow-md chunky-number transition-all duration-300">
                        ${val2}
                    </div>
                </div>
            </div>
            `;
        }

        function renderEquation() {
            const initialStr = state.targets.map(n => `<span class="text-[#0284c7] chunky-number">${n}</span>`).join(' <span class="text-slate-300 mx-1 sm:mx-1.5">+</span> ');
            const currentVals = state.numbers.map(n => n.tens * 10 + n.ones).filter(v => v > 0);
            const intermediateStr = currentVals.map(n => `<span class="text-slate-600 chunky-number">${n}</span>`).join(' <span class="text-slate-300 mx-1 sm:mx-1.5">+</span> ');

            const rawInitial = state.targets.join(' + ');
            const rawIntermediate = currentVals.join(' + ');
            const showIntermediate = rawInitial !== rawIntermediate;

            const finalAnsHtml = state.showFinalAnswer 
                ? `<span class="text-xl sm:text-2xl md:text-3xl font-black text-[#d97706] mx-1 chunky-number">${state.targets.reduce((a,b)=>a+b,0)}</span>`
                : `<span class="text-xl sm:text-2xl md:text-3xl font-black text-[#d97706] mx-1 chunky-number">?</span>`;

            return `
            <div class="w-fit max-w-full bg-white/95 py-1.5 sm:py-2 px-3 sm:px-6 text-center shadow-md rounded-[1.5rem] sm:rounded-[2rem] flex flex-row flex-wrap justify-center items-center gap-1 sm:gap-2 border-[3px] border-white mx-auto relative z-20">
                <div class="flex items-center gap-0.5 sm:gap-1 font-extrabold text-lg sm:text-2xl md:text-3xl tracking-widest whitespace-nowrap">
                    ${initialStr}
                </div>
                
                ${showIntermediate ? `
                <div class="text-lg sm:text-2xl md:text-3xl font-black text-[#1cb0f6] mx-0.5 sm:mx-1 chunky-number">=</div>
                <div class="flex items-center gap-0.5 sm:gap-1 font-extrabold text-lg sm:text-2xl md:text-3xl tracking-widest whitespace-nowrap">
                    ${intermediateStr}
                </div>` : ''}

                <div class="flex items-center gap-1 bg-[#1cb0f6] px-2 sm:px-4 py-0.5 sm:py-1 rounded-xl sm:rounded-full shadow-[inset_0_-4px_0_rgba(0,0,0,0.15)] border-2 border-[#1899d6] ml-1 sm:ml-2 whitespace-nowrap mt-1 sm:mt-0">
                    <span class="text-xl sm:text-2xl md:text-3xl font-black text-white tracking-widest chunky-number">=</span>
                    ${finalAnsHtml}
                </div>

                <!-- Text to Speech Speaker Button -->
                <button data-action="read-aloud" class="ml-2 bg-slate-100 hover:bg-slate-200 border-2 border-slate-300 rounded-full p-1.5 sm:p-2 transition-colors active:scale-95 flex items-center justify-center">
                    ${Icons.Speaker}
                </button>
            </div>`;
        }

        function renderBoard() {
            let html = `<div class="flex flex-row flex-wrap md:flex-nowrap items-center justify-center gap-x-4 gap-y-6 sm:gap-6 w-full max-w-4xl mt-2 sm:mt-4">`;
            
            state.targets.forEach((targetVal, idx) => {
                const currentVal = state.numbers[idx].tens * 10 + state.numbers[idx].ones;
                const isRounded = state.numbers[idx].ones === 0 && currentVal > 0;
                
                html += `
                <div class="game-slot flex flex-col p-3 sm:p-4 card-duo w-[150px] sm:w-[200px] md:w-[240px] shrink-0 transition-all duration-300" data-slot-idx="${idx}">
                    <div class="text-center pb-2 border-b-[3px] border-slate-100 mb-3">
                        <span class="text-3xl sm:text-5xl font-black chunky-number ${isRounded ? 'text-[#58cc02]' : 'text-[#0284c7]'}">${currentVal}</span>
                    </div>

                    <div class="flex flex-col gap-3">
                        <!-- Tens Section -->
                        <div class="flex flex-col items-center justify-start bg-[#58cc02]/5 rounded-xl sm:rounded-2xl p-2 sm:p-3 w-full border-[2px] sm:border-[3px] border-[#58cc02]/40 relative min-h-[60px] sm:min-h-[80px]">
                            <span class="absolute -top-3 bg-white px-2 sm:px-3 text-[10px] sm:text-[12px] font-extrabold text-[#58cc02] uppercase tracking-widest rounded-full border-2 border-[#58cc02]/20">Tens</span>
                            <div class="flex flex-col items-center justify-start w-full pt-2">
                                ${Array(state.numbers[idx].tens).fill(0).map((_, tIdx) => `
                                    <div data-drag="ten" data-idx="${idx}" class="cursor-grab active:cursor-grabbing w-full touch-none pointer-events-auto">
                                        ${getTenRodHTML(state.numbers[idx].isTransformed && tIdx === state.numbers[idx].tens - 1, "pointer-events-none")}
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <!-- Ones Section -->
                        <div class="flex flex-col items-center bg-[#ffc800]/5 rounded-xl sm:rounded-2xl p-2 sm:p-3 w-full border-[2px] sm:border-[3px] border-[#ffc800]/50 relative mt-2">
                            <span class="absolute -top-3 bg-white px-2 sm:px-3 text-[10px] sm:text-[12px] font-extrabold text-[#d97706] uppercase tracking-widest rounded-full border-2 border-[#ffc800]/30">Ones</span>
                            
                            <div class="grid grid-cols-5 gap-1.5 sm:gap-2 mt-2 p-1.5 sm:p-2 rounded-xl bg-white/60 border-2 border-[#ffc800]/20 w-full justify-items-center self-center shadow-inner">
                                ${Array(10).fill(0).map((_, i) => {
                                    if(i < state.numbers[idx].ones) {
                                        return `<div class="flex items-center justify-center relative w-full aspect-square max-w-[2.5rem]">
                                            <div data-drag="unit" data-idx="${idx}" class="cursor-grab active:cursor-grabbing touch-none pointer-events-auto w-[90%] h-[90%] flex items-center justify-center">
                                                ${getOneCubeHTML(false, "pointer-events-none")}
                                            </div>
                                        </div>`;
                                    } else {
                                        return `<div class="flex items-center justify-center relative w-full aspect-square max-w-[2.5rem] pointer-events-none">
                                            <div class="w-[90%] h-[90%] flex items-center justify-center">
                                                ${getOneCubeHTML(true, "pointer-events-none")}
                                            </div>
                                        </div>`;
                                    }
                                }).join('')}
                            </div>
                        </div>
                    </div>
                </div>`;

                if (idx < state.targets.length - 1) {
                    html += `<div class="self-center mx-0 sm:mx-2 drop-shadow-md shrink-0 hidden md:block">${Icons.Plus}</div>`;
                }
            });

            html += `</div>`;
            return html;
        }

        function renderBottomControls() {
            const optionsHtml = state.options.map(opt => {
                let btnClass = "btn-duo-blue hover:brightness-110 active:scale-95";
                let disabledAttr = "";
                
                if (state.wrongGuesses.includes(opt)) {
                    btnClass = "btn-duo-wrong opacity-70 cursor-not-allowed";
                    disabledAttr = "disabled";
                } else if (state.correctAnswer === opt) {
                    btnClass = "btn-duo-green animate-bounce-sm";
                }

                return `
                <button data-action="guess" data-val="${opt}" ${disabledAttr} class="${btnClass} flex-1 h-14 sm:h-16 rounded-xl sm:rounded-2xl flex items-center justify-center font-black text-2xl sm:text-3xl text-white chunky-number shadow-lg transition-all mx-1 sm:mx-2">
                    ${opt}
                </button>
                `;
            }).join('');

            return `
            <div class="pt-4 sm:pt-6 pb-2 px-2 sm:px-4 flex items-center justify-center z-30 w-full shrink-0">
                <div class="grid grid-cols-4 w-full max-w-4xl gap-2 sm:gap-4">
                    ${optionsHtml}
                </div>
            </div>`;
        }

        function renderApp() {
            const app = document.getElementById('app');
            let html = '';

            if (state.gameState === 'start') {
                html = `
                <div class="flex-1 flex flex-col items-center justify-center p-4 z-10 w-full relative">
                    <!-- Clean White Card -->
                    <div class="bg-white rounded-3xl p-6 sm:p-8 mb-4 w-full max-w-[360px] flex flex-col items-center shadow-[0_10px_20px_rgba(0,0,0,0.1)] border border-slate-100">
                        <div class="w-20 h-20 bg-gradient-to-br from-[#a3e635] to-[#58cc02] rounded-[1.25rem] mb-4 flex items-center justify-center shadow-[0_6px_0_#46a302] border-4 border-white animate-bounce-sm">
                            ${Icons.Puzzle}
                        </div>
                        <h1 class="text-4xl sm:text-5xl font-black mb-1 tracking-tight text-center text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-700 drop-shadow-sm pb-1">Make Tens</h1>
                        <p class="text-[#94a3b8] font-bold text-xs sm:text-sm uppercase tracking-widest text-center">Strategy Game - Ver 3</p>
                    </div>

                    <!-- Addition Type Selection -->
                    <div class="mb-4 w-full max-w-[360px] animate-slide-up bg-white/90 p-4 rounded-3xl border-4 border-white shadow-xl" style="animation-delay: 0.10s">
                        <p class="font-black mb-3 text-sm uppercase tracking-wider text-center text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-pink-500">Addition Type</p>
                        <div class="flex flex-row gap-2 w-full">
                            <button data-action="set-regrouping" data-val="with" class="flex-1 py-3 rounded-xl transition-transform shadow-md flex flex-col items-center justify-center ${state.regroupingMode === 'with' ? 'bg-gradient-to-b from-[#1cb0f6] to-[#0ea5e9] text-white border-b-[4px] border-[#0284c7]' : 'bg-white text-slate-500 border-b-[4px] border-slate-300 hover:bg-slate-50'}">
                                <span class="text-sm sm:text-base font-black tracking-wide drop-shadow-sm">With Regrouping</span>
                            </button>
                            <button data-action="set-regrouping" data-val="without" class="flex-1 py-3 rounded-xl transition-transform shadow-md flex flex-col items-center justify-center ${state.regroupingMode === 'without' ? 'bg-gradient-to-b from-[#1cb0f6] to-[#0ea5e9] text-white border-b-[4px] border-[#0284c7]' : 'bg-white text-slate-500 border-b-[4px] border-slate-300 hover:bg-slate-50'}">
                                <span class="text-sm sm:text-base font-black tracking-wide drop-shadow-sm">No Regrouping</span>
                            </button>
                        </div>
                    </div>

                    <!-- Max Sum Selection -->
                    <div class="mb-5 w-full max-w-[360px] animate-slide-up bg-white/90 p-4 rounded-3xl border-4 border-white shadow-xl" style="animation-delay: 0.15s">
                        <p class="font-black mb-3 text-sm uppercase tracking-wider text-center text-transparent bg-clip-text bg-gradient-to-r from-emerald-500 to-teal-500">Select Max Sum</p>
                        <div class="flex flex-wrap justify-center gap-2 sm:gap-3 w-full">
                            <button data-action="set-range" data-val="20" class="range-btn ${state.maxSum === 20 ? 'btn-duo-green text-white chunky-number border-b-[5px] border-[#46a302]' : 'btn-duo-white text-slate-600 border-b-[5px] border-slate-300'} flex-1 min-w-[50px] py-2 sm:py-3 rounded-xl font-black text-lg sm:text-xl transition-transform shadow-md">20</button>
                            <button data-action="set-range" data-val="30" class="range-btn ${state.maxSum === 30 ? 'btn-duo-green text-white chunky-number border-b-[5px] border-[#46a302]' : 'btn-duo-white text-slate-600 border-b-[5px] border-slate-300'} flex-1 min-w-[50px] py-2 sm:py-3 rounded-xl font-black text-lg sm:text-xl transition-transform shadow-md">30</button>
                            <button data-action="set-range" data-val="40" class="range-btn ${state.maxSum === 40 ? 'btn-duo-green text-white chunky-number border-b-[5px] border-[#46a302]' : 'btn-duo-white text-slate-600 border-b-[5px] border-slate-300'} flex-1 min-w-[50px] py-2 sm:py-3 rounded-xl font-black text-lg sm:text-xl transition-transform shadow-md">40</button>
                            <button data-action="set-range" data-val="50" class="range-btn ${state.maxSum === 50 ? 'btn-duo-green text-white chunky-number border-b-[5px] border-[#46a302]' : 'btn-duo-white text-slate-600 border-b-[5px] border-slate-300'} flex-1 min-w-[50px] py-2 sm:py-3 rounded-xl font-black text-lg sm:text-xl transition-transform shadow-md">50</button>
                            <button data-action="set-range" data-val="100" class="range-btn ${state.maxSum === 100 ? 'btn-duo-green text-white chunky-number border-b-[5px] border-[#46a302]' : 'btn-duo-white text-slate-600 border-b-[5px] border-slate-300'} flex-1 min-w-[50px] py-2 sm:py-3 rounded-xl font-black text-lg sm:text-xl transition-transform shadow-md">100</button>
                        </div>
                    </div>
                    
                    <!-- Solid Green Button -->
                    <button data-action="start" class="btn-duo-green w-full max-w-[360px] py-4 rounded-2xl font-black text-2xl uppercase tracking-widest shadow-xl flex items-center justify-center gap-3">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><polygon points="6 3 20 12 6 21 6 3"/></svg> START
                    </button>
                </div>`;
            } else if (state.gameState === 'finished') {
                html = `
                <div class="flex-1 flex flex-col items-center justify-center p-4 text-center animate-pop-in relative z-10 w-full h-full">
                    <div class="card-duo p-8 sm:p-12 mb-6 sm:mb-8 flex flex-col items-center w-full max-w-sm border-[3px] sm:border-[4px] border-white mx-auto my-auto shadow-2xl">
                        <div class="bg-gradient-to-br from-[#ffc800] to-[#e5a900] p-6 sm:p-8 rounded-full mb-6 sm:mb-8 border-4 border-white animate-bounce-sm shadow-[0_6px_0_#cc8400] sm:shadow-[0_8px_0_#cc8400]">
                            ${Icons.Trophy}
                        </div>
                        <h2 class="text-4xl sm:text-5xl font-black text-slate-800 mb-2">Awesome!</h2>
                        <p class="text-[#afafaf] font-bold uppercase tracking-widest text-lg sm:text-xl mb-2 sm:mb-4">Total Score</p>
                        <div class="text-6xl sm:text-8xl font-black text-[#58cc02] mb-6 sm:mb-10 drop-shadow-sm chunky-number">${state.score}</div>
                        <button data-action="start" class="btn-duo-blue w-full py-4 sm:py-5 rounded-2xl sm:rounded-3xl font-black text-xl sm:text-2xl uppercase tracking-widest shadow-xl text-white">
                            Play Again
                        </button>
                    </div>
                </div>`;
            } else if (state.gameState === 'minigame') {
                html = `
                <div id="minigame-container" class="absolute inset-0 z-50 starry-bg overflow-hidden w-full h-full flex flex-col justify-center items-center">
                    <div class="moon"></div>
                    <div class="stars-layer-1"></div>
                    
                    <div class="absolute top-8 sm:top-12 w-full text-center z-10 animate-fade-in pointer-events-none">
                        <h2 class="text-4xl sm:text-5xl md:text-6xl font-black text-white drop-shadow-[0_4px_0_#000]">CATCH STARS!</h2>
                        <div class="inline-block bg-black/40 backdrop-blur-sm px-4 sm:px-6 py-1 sm:py-2 rounded-full mt-2 sm:mt-4 border border-white/20">
                            <p class="text-white font-bold text-lg sm:text-xl tracking-widest">SCORE: <span class="text-[#ffc800] text-xl sm:text-2xl chunky-number">${state.score}</span></p>
                        </div>
                    </div>
                    
                    <!-- Glass Jar V9 -->
                    <div id="catcher-jar" class="absolute bottom-[20px] glass-jar-v9 flex flex-col-reverse z-20" style="left: ${state.jar.x}px; transform: translateX(-50%); touch-action: none;">
                        <div class="jar-neck-v9"></div>
                        <div class="jar-lip-v9"></div>
                        <div class="jar-highlight-v9"></div>
                        <div id="jar-fill" class="magic-fill-v9 w-full" style="height: 0%;"></div>
                    </div>
                </div>`;
            } else {
                html = `
                ${renderHeader()}
                <div class="flex-1 w-full overflow-y-auto z-10 flex flex-col pt-[70px] sm:pt-[80px] pb-4 scrollbar-hide">
                    <div class="my-auto w-full flex flex-col items-center justify-center px-2 sm:px-4 min-h-min">
                        ${renderNumberBond()}
                        ${renderEquation()}
                        ${renderBoard()}
                        ${renderBottomControls()}
                    </div>
                </div>
                `;
            }
            app.innerHTML = html;
        }

        renderApp();
    </script>
</body>
</html>
