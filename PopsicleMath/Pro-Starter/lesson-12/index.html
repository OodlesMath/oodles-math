<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multiplication Arrays V7: Single Block UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #1CB0F6;
            --primary-shadow: #1899D6;
            --success: #58CC02;
            --success-shadow: #58A700;
            --danger: #FF4B4B;
            --danger-shadow: #EA2B2B;
            --text-main: #4B4B4B;
        }

        html, body {
            height: 100%; width: 100%;
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevent scrolling, always fit to screen */
            touch-action: manipulation;
            background-color: #87CEEB; 
        }

        /* --- SCENERY BACKGROUND --- */
        .scenery-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: linear-gradient(180deg, #87CEEB 0%, #D4F0FF 70%); overflow: hidden;
        }

        /* Grass */
        .scenery-bg::after {
            content: ''; position: absolute; bottom: 0; left: -10%; width: 120%; height: 35%;
            background: #58CC02; border-top: 12px solid #46A302;
            border-radius: 50% 50% 0 0 / 40px 40px 0 0;
        }

        /* Clouds */
        .cloud { position: absolute; background: white; border-radius: 50px; opacity: 0.9; }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: white; border-radius: 50%; }
        .cloud-1 { top: 15%; left: 10%; width: 120px; height: 40px; }
        .cloud-1::before { width: 60px; height: 60px; top: -30px; left: 15px; }
        .cloud-1::after { width: 40px; height: 40px; top: -15px; left: 65px; }
        .cloud-2 { top: 25%; right: 20%; width: 150px; height: 50px; opacity: 0.7;}
        .cloud-2::before { width: 70px; height: 70px; top: -35px; left: 20px; }
        .cloud-2::after { width: 50px; height: 50px; top: -20px; left: 80px; }
        .cloud-3 { top: 5%; left: 45%; width: 100px; height: 30px; opacity: 0.6; transform: scale(0.8);}
        .cloud-3::before { width: 50px; height: 50px; top: -25px; left: 10px; }
        .cloud-3::after { width: 35px; height: 35px; top: -10px; left: 55px; }

        /* Rainbow */
        .rainbow-wrapper {
            position: absolute; top: 0; left: 0; width: 300px; height: 300px;
            overflow: hidden; pointer-events: none;
        }
        .rainbow-arc {
            position: absolute; top: -100px; left: -100px; width: 200px; height: 200px;
            border-radius: 50%; opacity: 0.85;
            box-shadow: 
                0 0 0 25px #FF4B4B,
                0 0 0 50px #FF9600,
                0 0 0 75px #FFC800,
                0 0 0 100px #58CC02,
                0 0 0 125px #1CB0F6;
        }

        /* Flowers */
        .flower {
            position: absolute; font-size: 24px; z-index: 1; user-select: none; pointer-events: none;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
        }

        /* --- UI COMPONENTS --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            border-radius: 32px; box-shadow: 0 12px 0 rgba(0,0,0,0.1), 0 4px 20px rgba(0,0,0,0.1);
            padding: 16px 24px; width: 100%; display: flex; flex-direction: column; align-items: center;
        }

        .duo-btn {
            background-color: var(--primary); color: white; border-radius: 16px;
            font-weight: 800; font-size: 1.125rem;
            text-transform: uppercase; letter-spacing: 0.5px; border: none;
            cursor: pointer; box-shadow: 0 5px 0 var(--primary-shadow);
            transition: transform 0.1s, box-shadow 0.1s; user-select: none;
            display: inline-flex; align-items: center; justify-content: center; text-align: center;
        }
        .duo-btn:active { transform: translateY(5px); box-shadow: 0 0 0 transparent !important; }
        .duo-btn.success { background-color: var(--success); box-shadow: 0 5px 0 var(--success-shadow); }
        .duo-btn.danger { background-color: var(--danger); box-shadow: 0 5px 0 var(--danger-shadow); }
        .duo-btn.disabled { background-color: #E5E5E5; color: #AFAFAF; box-shadow: 0 5px 0 #CFCFCF !important; pointer-events: none; }

        .duo-select {
            appearance: none; background-color: white; border: 2px solid #E5E5E5;
            border-radius: 12px; padding: 12px 16px; font-family: 'Poppins', sans-serif;
            font-weight: 700; color: var(--text-main); width: 100%; cursor: pointer; outline: none;
        }

        /* Screen Management */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease-in-out; box-sizing: border-box; overflow-y: auto;
        }
        .screen.active { opacity: 1; pointer-events: auto; z-index: 10; }
        
        .main-container {
            width: 100%; max-width: 900px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; margin: auto; padding: 10px 20px;
            max-height: 100vh;
        }

        /* --- REALISTIC ARRAYS & DOTS --- */
        .array-box {
            background: white; border: 3px solid #E5E5E5; border-radius: 20px;
            padding: 16px; display: inline-grid; gap: 8px; 
            box-shadow: 0 4px 0 #D0D0D0; justify-content: center; align-items: center;
        }
        .dot {
            width: clamp(20px, 4.5vw, 32px); 
            height: clamp(20px, 4.5vw, 32px);
            border-radius: 50%; background-color: var(--dot-color); position: relative;
            box-shadow: inset -3px -4px 6px rgba(0,0,0,0.2), inset 2px 3px 5px rgba(255,255,255,0.4), 2px 3px 4px rgba(0,0,0,0.15);
        }
        .dot::after {
            content: ''; position: absolute; top: 15%; left: 15%; width: 35%; height: 35%;
            border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 70%);
        }

        /* Animations */
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-8px); } 40%, 80% { transform: translateX(8px); } }
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .pop-in { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* Formula Container & Inline TTS */
        .formula-container {
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(1.4rem, 4vw, 2.5rem); font-weight: 800; flex-wrap: wrap;
            text-align: center; margin: 10px 0; min-height: 60px;
            background: #F0F4F8; padding: 8px 16px; border-radius: 16px;
            border: 2px dashed #CBD5E1; line-height: 1.3;
        }
        .math-text { white-space: nowrap; }
        .blank-slot {
            display: inline-block; min-width: 60px; border-bottom: 5px solid var(--text-main);
            margin: 0 8px; text-align: center; color: var(--primary); padding-bottom: 2px;
        }
        
        .inline-tts-btn {
            background: var(--primary); border: none; cursor: pointer;
            width: 40px; height: 40px; border-radius: 12px;
            display: inline-flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 0 var(--primary-shadow);
            transition: transform 0.1s, box-shadow 0.1s; margin-left: 8px;
            vertical-align: middle;
        }
        .inline-tts-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .inline-tts-btn svg { width: 22px; height: 22px; fill: white; }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
        
        /* Minigame Overlays */
        #mg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: block; touch-action: none; }
        .minigame-ui {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 30px; z-index: 11; pointer-events: none;
            background: rgba(255,255,255,0.95); padding: 12px 32px; border-radius: 30px;
            box-shadow: 0 6px 0 #E5E5E5, 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- Scenery Background -->
    <div class="scenery-bg">
        <div class="rainbow-wrapper">
            <div class="rainbow-arc"></div>
        </div>
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
        <!-- Flowers on Grass -->
        <div class="flower" style="bottom: 10%; left: 10%; font-size: 26px;">🌸</div>
        <div class="flower" style="bottom: 5%; left: 30%; font-size: 20px;">🌼</div>
        <div class="flower" style="bottom: 12%; right: 15%; font-size: 30px;">🌺</div>
        <div class="flower" style="bottom: 8%; right: 35%; font-size: 24px;">🌻</div>
        <div class="flower" style="bottom: 18%; left: 50%; font-size: 22px;">🌸</div>
        <div class="flower" style="bottom: 3%; left: 70%; font-size: 28px;">🌼</div>
    </div>

    <!-- Confetti Overlay -->
    <canvas id="confetti-canvas"></canvas>

    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
        <div class="main-container">
            <div class="glass-panel" style="max-width: 500px; padding: 24px;">
                <h1 class="text-4xl font-extrabold text-[#1CB0F6] mb-2 drop-shadow-sm text-center">Math Arrays</h1>
                <p class="text-gray-500 font-bold mb-6 text-lg text-center">Which one is more or less?</p>
                
                <div class="space-y-4 w-full text-left">
                    <div>
                        <label class="block font-bold mb-2 text-gray-700">Multiplication Tables</label>
                        <select id="setting-tables" class="duo-select">
                            <option value="5">Tables 2 - 5</option>
                            <option value="10">Tables 2 - 10</option>
                        </select>
                    </div>

                        <label class="block font-bold mb-2 text-gray-700">Number of Questions</label>

                        <label class="block font-bold mb-2 text-gray-700">Question Type</label>

                <button id="btn-start" class="duo-btn w-full mt-6 text-2xl py-4">START GAME</button>
                
                <div class="mt-4 text-base font-bold text-gray-400">
                    High Score: <span id="display-highscore" class="text-[var(--primary)] text-xl">0</span>
                </div>

        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
        <div class="main-container">
            <div class="glass-panel w-full relative">
                
                <!-- Internal Game Header (Moved inside main block) -->
                <div class="w-full flex justify-between items-center mb-2 md:mb-4">
                    <div class="font-bold text-sm md:text-base text-gray-500 bg-gray-100 px-3 py-1 md:px-4 md:py-1.5 rounded-xl border-2 border-gray-200">
                        <span id="question-counter">1/5</span>
                    </div>
                    
                    <div class="font-extrabold text-base md:text-lg text-[var(--primary)] shrink-0 bg-[#E1F3FE] px-3 py-1 md:px-4 md:py-1.5 rounded-xl border-2 border-[#BCE4FD]">
                        <span id="current-score">0</span> <span class="text-xs md:text-sm text-[var(--primary-shadow)]">pts</span>
                    </div>
                </div>

                <!-- Arrays Display -->
                <div class="flex flex-row flex-wrap justify-center items-end gap-6 md:gap-16 mb-2 w-full pop-in" id="arrays-wrapper">
                    <div class="flex flex-col items-center gap-2 md:gap-4">
                        <div id="array-left" class="array-box"></div>
                        <div id="label-left" class="font-bold text-xl md:text-2xl text-gray-400 opacity-0 transition-opacity"></div>
                    </div>
                    <div class="flex flex-col items-center gap-2 md:gap-4">
                        <div id="array-right" class="array-box"></div>
                        <div id="label-right" class="font-bold text-xl md:text-2xl text-gray-400 opacity-0 transition-opacity"></div>
                    </div>
                </div>

                <!-- Question & Formula -->
                <div id="formula-area" class="formula-container pop-in w-full">
                    <!-- Content injected via JS -->
                </div>

                <!-- Answers: optimized to single row using grid-cols-4 -->
                <div id="answers-grid" class="grid gap-2 md:gap-4 w-full max-w-xl mt-2 pop-in">
                    <!-- Buttons injected via JS -->
                </div>

    </div>

    <!-- Minigame Screen -->
    <div id="minigame-screen" class="screen" style="background: transparent;">
        <div class="minigame-ui">
            <div class="text-2xl font-bold text-[var(--danger)]">Time: <span id="mg-time">20</span>s</div>
            <div class="text-2xl font-bold text-[var(--primary)]">Score: <span id="mg-score">0</span></div>
        </div>
        <canvas id="mg-canvas"></canvas>
    </div>

    <!-- End Screen -->
    <div id="end-screen" class="screen">
        <div class="main-container">
            <div class="glass-panel" style="max-width: 500px; padding: 24px;">
                <h2 class="text-5xl font-extrabold text-[var(--success)] mb-4 drop-shadow-sm text-center">Awesome!</h2>
                <p class="text-2xl font-bold text-gray-500 mb-8 text-center">You completed the lesson!</p>
                
                <div class="bg-gray-100 rounded-3xl p-6 mb-8 w-full border-4 border-white shadow-inner text-center">
                    <div class="text-lg font-bold text-gray-400 uppercase tracking-wider mb-2">Total Score</div>
                    <div id="final-score" class="text-7xl font-extrabold text-[var(--primary)] drop-shadow-md">0</div>
                </div>

                <button id="btn-restart" class="duo-btn w-full text-2xl py-4">PLAY AGAIN</button>
            </div>
        </div>
    </div>

    <script>
        /** =========================================================================
         * AUDIO SYNTHESIZER & TTS
         * ========================================================================= */
        const AudioSys = (function() {
            let ctx = null;
            
            function init() {
                if (!ctx) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    ctx = new AudioContext();
                }
                if (ctx.state === 'suspended') ctx.resume();
            }

            function playTone(freq, type, duration, vol=0.1) {
                if(!ctx) return;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(vol, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            }

            return {
                init,
                correct: () => {
                    init();
                    playTone(523.25, 'sine', 0.1, 0.1); 
                    setTimeout(() => playTone(659.25, 'sine', 0.2, 0.1), 100); 
                },
                wrong: () => {
                    init();
                    playTone(250, 'sawtooth', 0.2, 0.05);
                    setTimeout(() => playTone(200, 'sawtooth', 0.3, 0.05), 100);
                },
                complete: () => {
                    init();
                    [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => {
                        setTimeout(() => playTone(f, 'square', 0.15, 0.05), i * 120);
                    });
                },
                pop: () => {
                    init();
                    playTone(800, 'sine', 0.05, 0.1);
                },
                tts: (text) => {
                    if (!window.speechSynthesis) return;
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.85; 
                    utterance.pitch = 1.1; 
                    window.speechSynthesis.speak(utterance);
                }
            };
        })();

        /** =========================================================================
         * CONFETTI SYSTEM (Z-INDEX 9999)
         * ========================================================================= */
        const Confetti = (function() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            let animationId = null;

            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            window.addEventListener('resize', resize); resize();

            class Particle {
                constructor() {
                    this.x = canvas.width / 2; this.y = canvas.height / 2;
                    this.vx = (Math.random() - 0.5) * 25; this.vy = (Math.random() - 1) * 25 - 5;
                    this.size = Math.random() * 12 + 6;
                    this.color = ['#FF4B4B', '#FFC800', '#1CB0F6', '#FF9600', '#58CC02'][Math.floor(Math.random() * 5)];
                    this.rotation = Math.random() * 360; this.rs = (Math.random() - 0.5) * 15;
                }
                update() {
                    this.x += this.vx; this.y += this.vy; this.vy += 0.6; this.rotation += this.rs;
                }
                draw() {
                    ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rotation * Math.PI / 180);
                    ctx.fillStyle = this.color; ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                    ctx.restore();
                }
            }

            function loop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach((p, index) => {
                    p.update(); p.draw();
                    if (p.y > canvas.height + 50) particles.splice(index, 1);
                });
                if (particles.length > 0) animationId = requestAnimationFrame(loop);
                else ctx.clearRect(0, 0, canvas.width, canvas.height);
            }

            return {
                fire: () => {
                    if (animationId) cancelAnimationFrame(animationId);
                    particles = []; for(let i = 0; i < 150; i++) particles.push(new Particle());
                    loop();
                }
            };
        })();

        /** =========================================================================
         * MINIGAME SYSTEM (DELTA-TIME PHYSICS)
         * ========================================================================= */
        const MiniGame = (function() {
            const canvas = document.getElementById('mg-canvas');
            const ctx = canvas.getContext('2d');
            const timeEl = document.getElementById('mg-time');
            const scoreEl = document.getElementById('mg-score');

            let animationId;
            let lastTime;
            let timeRemaining = 20;
            let balls = [];
            let basket = {x: 0, y: 0, w: 120, h: 70}; 
            let score = 0;
            let isPlaying = false;
            let onCompleteCallback = null;
            let spawnTimer = 0;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                basket.y = canvas.height - basket.h - 30; // 30px from bottom
                if(!isPlaying) basket.x = canvas.width/2 - basket.w/2;
            }
            window.addEventListener('resize', resize);

            function updateBasketPosition(clientX) {
                basket.x = clientX - basket.w / 2;
                if (basket.x < 0) basket.x = 0;
                if (basket.x + basket.w > canvas.width) basket.x = canvas.width - basket.w;
            }

            // Mouse & Touch events
            canvas.addEventListener('mousemove', e => updateBasketPosition(e.clientX));
            canvas.addEventListener('touchmove', e => {
                e.preventDefault(); // prevent scroll
                updateBasketPosition(e.touches[0].clientX);
            }, {passive: false});

            function start(onComplete) {
                resize();
                onCompleteCallback = onComplete;
                timeRemaining = 20;
                score = 0;
                balls = [];
                isPlaying = true;
                scoreEl.textContent = score;
                timeEl.textContent = timeRemaining.toFixed(0);
                lastTime = performance.now();
                
                screens.game.classList.remove('active');
                screens['minigame-screen'] = document.getElementById('minigame-screen');
                screens['minigame-screen'].classList.add('active');
                
                animationId = requestAnimationFrame(loop);
            }

            function spawnBall() {
                const colors = ['#FF4B4B', '#FFC800', '#CE82FF', '#FF9600', '#00C2CB'];
                const radius = 25; 
                const x = Math.random() * (canvas.width - radius * 2) + radius;
                balls.push({
                    x, y: -radius, radius,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    speed: Math.random() * 100 + 150 
                });
            }

            function loop(currentTime) {
                if (!isPlaying) return;
                const dt = (currentTime - lastTime) / 1000; 
                lastTime = currentTime;

                timeRemaining -= dt;
                timeEl.textContent = Math.ceil(Math.max(0, timeRemaining));

                if (timeRemaining <= 0) {
                    end();
                    return;
                }

                // Spawn logic
                spawnTimer -= dt;
                if (spawnTimer <= 0) {
                    spawnBall();
                    spawnTimer = 0.5 + Math.random() * 0.5; 
                }

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Update & Draw balls
                for (let i = balls.length - 1; i >= 0; i--) {
                    const b = balls[i];
                    b.y += b.speed * dt; 

                    // Draw Ball
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                    ctx.fillStyle = b.color;
                    ctx.fill();
                    // Ball Highlight
                    ctx.beginPath();
                    ctx.arc(b.x - b.radius*0.3, b.y - b.radius*0.3, b.radius*0.3, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.fill();

                    // Collision detection (Basket top rim)
                    if (b.y + b.radius > basket.y && b.y < basket.y + basket.h) {
                        if (b.x > basket.x && b.x < basket.x + basket.w) {
                            score += 5;
                            scoreEl.textContent = score;
                            AudioSys.pop();
                            balls.splice(i, 1);
                            Confetti.fire();
                            continue;
                        }
                    }

                    // Remove if missed
                    if (b.y - b.radius > canvas.height) {
                        balls.splice(i, 1);
                    }
                }

                // Draw Basket
                ctx.fillStyle = '#FF9600'; 
                ctx.beginPath();
                ctx.moveTo(basket.x, basket.y);
                ctx.lineTo(basket.x + basket.w, basket.y);
                ctx.lineTo(basket.x + basket.w - 15, basket.y + basket.h);
                ctx.lineTo(basket.x + 15, basket.y + basket.h);
                ctx.fill();
                // Bucket rim
                ctx.fillStyle = '#D97706';
                ctx.fillRect(basket.x - 5, basket.y, basket.w + 10, 10);

                animationId = requestAnimationFrame(loop);
            }

            function end() {
                isPlaying = false;
                cancelAnimationFrame(animationId);
                AudioSys.complete();
                screens['minigame-screen'].classList.remove('active');
                screens.game.classList.add('active');
                if (onCompleteCallback) onCompleteCallback(score);
            }

            return { start };
        })();

        /** =========================================================================
         * GAME LOGIC
         * ========================================================================= */
        const ARRAY_COLORS = ['#FF4B4B', '#FFC800', '#CE82FF', '#FF9600', '#00C2CB', '#58CC02'];
        
        const state = {
            tablesMax: 5, totalQs: 5, qType: 'mixed', questions: [],
            currentQIndex: 0, score: 0,
            highScore: localStorage.getItem('mathArrayHighScoreV7') || 0,
            step: 1, stepFailed: false, currentSpokenText: ""
        };

        const screens = {
            start: document.getElementById('start-screen'),
            game: document.getElementById('game-screen'),
            end: document.getElementById('end-screen')
        };
        
        const els = {
            btnStart: document.getElementById('btn-start'),
            btnRestart: document.getElementById('btn-restart'),
            qCounter: document.getElementById('question-counter'),
            score: document.getElementById('current-score'),
            highScoreDisplay: document.getElementById('display-highscore'),
            arrayLeft: document.getElementById('array-left'),
            arrayRight: document.getElementById('array-right'),
            labelLeft: document.getElementById('label-left'),
            labelRight: document.getElementById('label-right'),
            formulaArea: document.getElementById('formula-area'),
            answersGrid: document.getElementById('answers-grid'),
            finalScore: document.getElementById('final-score')
        };

        els.highScoreDisplay.textContent = state.highScore;

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function generateQuestions() {
            state.questions = [];
            const generatedPairs = new Set();
            while(state.questions.length < state.totalQs) {
                const shareCols = Math.random() > 0.5;
                let c1, r1, c2, r2;
                let maxMultiplier = state.tablesMax;
                if (shareCols) {
                    c1 = c2 = Math.floor(Math.random() * (maxMultiplier - 1)) + 2;
                    r1 = Math.floor(Math.random() * 9) + 2; r2 = Math.floor(Math.random() * 9) + 2;
                    while(r1 === r2) r2 = Math.floor(Math.random() * 9) + 2;
                } else {
                    r1 = r2 = Math.floor(Math.random() * 9) + 2; 
                    c1 = Math.floor(Math.random() * (maxMultiplier - 1)) + 2; c2 = Math.floor(Math.random() * (maxMultiplier - 1)) + 2;
                    while(c1 === c2) c2 = Math.floor(Math.random() * (maxMultiplier - 1)) + 2;
                }
                const sig = `${c1}x${r1}-${c2}x${r2}`;
                const reverseSig = `${c2}x${r2}-${c1}x${r1}`;
                if (!generatedPairs.has(sig) && !generatedPairs.has(reverseSig)) {
                    generatedPairs.add(sig);
                    const shuffledColors = shuffle([...ARRAY_COLORS]);
                    state.questions.push({
                        left: { cols: c1, rows: r1, ans: c1 * r1, color: shuffledColors[0] },
                        right: { cols: c2, rows: r2, ans: c2 * r2, color: shuffledColors[1] }
                    });
                }
            }
        }

        function switchScreen(screenName) {
            Object.values(screens).forEach(s => { if(s) s.classList.remove('active'); });
            screens[screenName].classList.add('active');
            window.scrollTo(0,0);
        }

        function startGame() {
            AudioSys.init(); 
            state.tablesMax = parseInt(document.getElementById('setting-tables').value);
            state.totalQs = parseInt(document.getElementById('setting-questions').value);
            state.qType = document.getElementById('setting-type').value;
            state.score = 0; state.currentQIndex = 0;
            els.score.textContent = '0';
            generateQuestions();
            switchScreen('game');
            loadQuestion();
        }

        function drawArray(container, cols, rows, color) {
            container.innerHTML = ''; container.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            const total = cols * rows;
            for(let i=0; i<total; i++) {
                const dot = document.createElement('div'); dot.className = 'dot';
                dot.style.setProperty('--dot-color', color); container.appendChild(dot);
            }
        }

        function getDistractors(correct) {
            const options = new Set([correct]);
            while(options.size < 4) {
                const offset = Math.floor(Math.random() * 4) + 1;
                const sign = Math.random() > 0.5 ? 1 : -1;
                const fake = correct + (offset * sign);
                if(fake > 0 && fake !== correct) options.add(fake);
            }
            return shuffle(Array.from(options));
        }

        function triggerReplayAnimation(el) {
            el.classList.remove('pop-in'); void el.offsetWidth; el.classList.add('pop-in');
        }

        function loadQuestion() {
            const q = state.questions[state.currentQIndex];
            state.step = 1; state.stepFailed = false;

            // Streamlined Counter
            els.qCounter.textContent = `${state.currentQIndex + 1}/${state.totalQs}`;

            drawArray(els.arrayLeft, q.left.cols, q.left.rows, q.left.color);
            drawArray(els.arrayRight, q.right.cols, q.right.rows, q.right.color);
            
            els.labelLeft.style.opacity = '0'; els.labelRight.style.opacity = '0';
            triggerReplayAnimation(document.getElementById('arrays-wrapper'));
            renderStep();
        }

        function createTTSButton() {
            return `
                <button class="inline-tts-btn" onclick="AudioSys.tts(state.currentSpokenText)" aria-label="Listen">
                    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                </button>
            `;
        }

        function renderStep() {
            const q = state.questions[state.currentQIndex];
            let formulaHtml = "";
            els.answersGrid.innerHTML = '';
            els.answersGrid.className = 'grid gap-2 md:gap-4 w-full max-w-xl mt-2 pop-in';
            state.stepFailed = false;

            if (state.step === 1 || state.step === 2) {
                els.answersGrid.classList.add('grid-cols-4');
                const isLeft = state.step === 1;
                const target = isLeft ? q.left : q.right;
                
                formulaHtml = `<span class="math-text">${target.cols} &times; ${target.rows} &nbsp;= </span><span class="blank-slot">?</span>`;
                state.currentSpokenText = `What is ${target.cols} times ${target.rows}?`;
                
                const options = getDistractors(target.ans);
                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'duo-btn text-xl md:text-2xl py-2 md:py-3 px-1 w-full';
                    btn.textContent = opt;
                    btn.onclick = () => handleMathAnswer(btn, opt, target.ans);
                    els.answersGrid.appendChild(btn);
                });
            }
            else if (state.step === 3) {
                els.answersGrid.classList.add('grid-cols-2');
                
                let askMore = state.qType === 'more' ? true : (state.qType === 'less' ? false : Math.random() > 0.5);
                const leftStr = `${q.left.cols} &times; ${q.left.rows}`;
                const rightStr = `${q.right.cols} &times; ${q.right.rows}`;
                let correctAns;
                
                if (askMore) {
                    if (q.left.ans > q.right.ans) {
                        formulaHtml = `<span class="math-text">${leftStr}</span>&nbsp; is &nbsp;<span class="blank-slot" style="min-width: 120px;"></span>&nbsp; than &nbsp;<span class="math-text">${rightStr}</span>`;
                        state.currentSpokenText = `${q.left.cols} times ${q.left.rows} is what than ${q.right.cols} times ${q.right.rows}? Choose more or less.`;
                    } else {
                        formulaHtml = `<span class="math-text">${rightStr}</span>&nbsp; is &nbsp;<span class="blank-slot" style="min-width: 120px;"></span>&nbsp; than &nbsp;<span class="math-text">${leftStr}</span>`;
                        state.currentSpokenText = `${q.right.cols} times ${q.right.rows} is what than ${q.left.cols} times ${q.left.rows}? Choose more or less.`;
                    }
                    correctAns = 'MORE';
                } else {
                    if (q.left.ans < q.right.ans) {
                        formulaHtml = `<span class="math-text">${leftStr}</span>&nbsp; is &nbsp;<span class="blank-slot" style="min-width: 120px;"></span>&nbsp; than &nbsp;<span class="math-text">${rightStr}</span>`;
                        state.currentSpokenText = `${q.left.cols} times ${q.left.rows} is what than ${q.right.cols} times ${q.right.rows}? Choose more or less.`;
                    } else {
                        formulaHtml = `<span class="math-text">${rightStr}</span>&nbsp; is &nbsp;<span class="blank-slot" style="min-width: 120px;"></span>&nbsp; than &nbsp;<span class="math-text">${leftStr}</span>`;
                        state.currentSpokenText = `${q.right.cols} times ${q.right.rows} is what than ${q.left.cols} times ${q.left.rows}? Choose more or less.`;
                    }
                    correctAns = 'LESS';
                }

                ['MORE', 'LESS'].forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'duo-btn text-2xl py-3 md:py-4 w-full';
                    if(opt === 'MORE') btn.classList.add('!bg-[#CE82FF]', '!shadow-[0_5px_0_#A855F7]');
                    if(opt === 'LESS') btn.classList.add('!bg-[#FF9600]', '!shadow-[0_5px_0_#D97706]');
                    btn.textContent = opt;
                    btn.onclick = () => handleCompareAnswer(btn, opt, correctAns);
                    els.answersGrid.appendChild(btn);
                });
            }

            els.formulaArea.innerHTML = formulaHtml + createTTSButton();
            triggerReplayAnimation(els.formulaArea);
            triggerReplayAnimation(els.answersGrid);

            setTimeout(() => AudioSys.tts(state.currentSpokenText), 400);
        }

        function updateScore() {
            if (!state.stepFailed) {
                state.score += 10; els.score.textContent = state.score;
            }
        }

        function disableAllButtons() {
            Array.from(els.answersGrid.children).forEach(btn => btn.classList.add('disabled'));
        }

        function handleMathAnswer(btn, selected, correct) {
            if (selected === correct) {
                AudioSys.correct(); btn.classList.add('success');
                disableAllButtons(); updateScore();
                
                const q = state.questions[state.currentQIndex];
                if (state.step === 1) {
                    els.labelLeft.innerHTML = `${q.left.cols} &times; ${q.left.rows} = <span class="text-[var(--success)]">${correct}</span>`;
                    els.labelLeft.style.opacity = '1';
                } else {
                    els.labelRight.innerHTML = `${q.right.cols} &times; ${q.right.rows} = <span class="text-[var(--success)]">${correct}</span>`;
                    els.labelRight.style.opacity = '1';
                }

                els.formulaArea.querySelector('.blank-slot').textContent = correct;
                els.formulaArea.querySelector('.blank-slot').style.color = 'var(--success)';
                els.formulaArea.querySelector('.blank-slot').style.borderColor = 'transparent';

                setTimeout(() => { state.step++; renderStep(); }, 1000);
            } else {
                AudioSys.wrong(); state.stepFailed = true;
                btn.classList.add('danger', 'shake');
                setTimeout(() => btn.classList.remove('shake', 'danger'), 500);
            }
        }

        function handleCompareAnswer(btn, selected, correct) {
            if (selected === correct) {
                AudioSys.complete(); Confetti.fire(); btn.classList.add('success');
                btn.classList.remove('!bg-[#CE82FF]', '!shadow-[0_5px_0_#A855F7]', '!bg-[#FF9600]', '!shadow-[0_5px_0_#D97706]');
                disableAllButtons(); updateScore();

                els.formulaArea.querySelector('.blank-slot').textContent = correct;
                els.formulaArea.querySelector('.blank-slot').style.color = 'var(--success)';
                els.formulaArea.querySelector('.blank-slot').style.borderColor = 'transparent';

                // Display NEXT / PLAY GAME options
                setTimeout(() => {
                    els.answersGrid.className = 'grid gap-2 md:gap-4 w-full max-w-xl mt-2 pop-in grid-cols-2';
                    els.answersGrid.innerHTML = `
                        <button class="duo-btn text-xl md:text-2xl py-3 md:py-4 !bg-[var(--success)] !shadow-[0_5px_0_var(--success-shadow)]" onclick="advanceQuestion()">NEXT</button>
                        <button class="duo-btn text-xl md:text-2xl py-3 md:py-4 !bg-[#1CB0F6] !shadow-[0_5px_0_#1899D6]" onclick="launchMinigame()">PLAY GAME</button>
                    `;
                    triggerReplayAnimation(els.answersGrid);
                }, 1000);
            } else {
                AudioSys.wrong(); state.stepFailed = true; 
                btn.classList.add('danger', 'shake');
                btn.classList.remove('!bg-[#CE82FF]', '!shadow-[0_5px_0_#A855F7]', '!bg-[#FF9600]', '!shadow-[0_5px_0_#D97706]');
                setTimeout(() => btn.classList.remove('shake', 'danger'), 500);
            }
        }

        window.advanceQuestion = function() {
            state.currentQIndex++;
            if (state.currentQIndex < state.totalQs) loadQuestion();
            else endGame();
        }

        window.launchMinigame = function() {
            MiniGame.start((miniScore) => {
                state.score += miniScore;
                els.score.textContent = state.score;
                advanceQuestion();
            });
        }

        function endGame() {
            if (state.score > state.highScore) {
                state.highScore = state.score;
                localStorage.setItem('mathArrayHighScoreV7', state.highScore);
                els.highScoreDisplay.textContent = state.highScore;
            }
            els.finalScore.textContent = state.score;
            switchScreen('end');
        }

        els.btnStart.addEventListener('click', startGame);
        els.btnRestart.addEventListener('click', () => { Confetti.fire(); switchScreen('start'); });

    </script>
</body>
</html>
