<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Skip Counting Multiplication Adventure - Ver 5</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1CB0F6;
            --primary-dark: #1899D6;
            --success: #58CC02;
            --success-dark: #58A700;
            --danger: #FF4B4B;
            --danger-dark: #EA1515;
            --warning: #FFC800;
            --warning-dark: #E5B400;
            --text-main: #4B4B4B;
            --bg-sky: #87CEEB;
            --bg-grass: #7ED957;
            --white: #FFFFFF;
            --stone: #E5E5E5;
            --stone-dark: #C4C4C4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            user-select: none;
        }

        body {
            background: linear-gradient(180deg, #60B6E9 0%, #A8E0FF 100%);
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* No scrolling */
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            touch-action: manipulation;
        }

        /* --- BEAUTIFUL SCENERY BACKGROUND --- */
        .scenery {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            overflow: hidden;
        }
        .sun {
            position: absolute;
            top: 5%; left: 5%; 
            width: 90px; height: 90px;
            background: #FFD700;
            border-radius: 50%;
            box-shadow: 0 0 50px #FFD700, inset -5px -5px 10px rgba(220, 150, 0, 0.5);
            animation: pulse 3s infinite alternate;
        }
        .cloud {
            position: absolute;
            background: rgba(255,255,255,0.95);
            border-radius: 50px;
            animation: floatClouds linear infinite;
        }
        .cloud::before, .cloud::after {
            content: ''; position: absolute; background: rgba(255,255,255,0.95); border-radius: 50%;
        }
        .c1 { width: 120px; height: 35px; top: 12%; left: -150px; animation-duration: 30s; }
        .c1::before { width: 60px; height: 60px; top: -30px; left: 15px; }
        .c1::after { width: 50px; height: 50px; top: -20px; right: 15px; }
        
        .c2 { width: 180px; height: 50px; top: 25%; left: -200px; animation-duration: 40s; animation-delay: -15s; transform: scale(0.8); }
        .c2::before { width: 80px; height: 80px; top: -40px; left: 30px; }
        .c2::after { width: 70px; height: 70px; top: -30px; right: 30px; }

        .grass {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 25%;
            background: var(--bg-grass);
            border-top: 12px solid #6CC24A;
            border-radius: 50% 50% 0 0 / 25px 25px 0 0;
        }

        .tree { position: absolute; font-size: clamp(4rem, 8vw, 7rem); z-index: 1; filter: drop-shadow(0 5px 0 rgba(0,0,0,0.15)); }
        .flower { position: absolute; font-size: clamp(2rem, 4vw, 3rem); z-index: 2; animation: sway 3s infinite alternate ease-in-out; filter: drop-shadow(0 3px 0 rgba(0,0,0,0.1)); }
        
        @keyframes sway { 0% { transform: rotate(-8deg); } 100% { transform: rotate(8deg); } }

        .rainbow {
            position: absolute;
            top: 10%; left: 50%;
            transform: translateX(-50%);
            width: 350px; height: 175px;
            border-radius: 175px 175px 0 0;
            box-shadow: 
                inset 0 12px 0 #FF4B4B, inset 0 24px 0 #FF9100, inset 0 36px 0 #FFC800,
                inset 0 48px 0 #58CC02, inset 0 60px 0 #1CB0F6, inset 0 72px 0 #A150D3;
            opacity: 0.35;
        }

        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
        @keyframes floatClouds { from { transform: translateX(-200px); } to { transform: translateX(120vw); } }

        /* --- APP CONTAINER --- */
        .app-container {
            width: 95vw;
            max-width: 900px;
            height: 92vh;
            max-height: 750px;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 35px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            border: 6px solid #FFF;
        }

        .screen {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding: 15px 20px;
        }
        .screen.active { display: flex; }

        /* --- UI ELEMENTS --- */
        h1, h2, h3 { text-align: center; color: var(--text-main); margin-bottom: 15px; }
        h1 { font-size: clamp(1.8rem, 4vw, 2.8rem); color: var(--primary-dark); text-shadow: 2px 2px 0 #FFF; font-weight: 900; }
        
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; background: #FFF; border-radius: 20px;
            border: 2px solid var(--stone); margin-bottom: 10px;
            font-weight: 800; font-size: 1.2rem; color: var(--warning-dark);
        }
        .progress-container { flex-grow: 1; margin: 0 20px; height: 16px; background: var(--stone); border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--success); width: 0%; transition: width 0.3s ease; }

        .btn {
            background: var(--white); border: 2px solid var(--stone); border-bottom: 6px solid var(--stone-dark);
            border-radius: 20px; padding: 12px 20px; font-size: 1.2rem; font-weight: 800;
            color: var(--text-main); cursor: pointer; transition: all 0.1s;
            display: flex; justify-content: center; align-items: center; text-align: center;
        }
        .btn:active { transform: translateY(4px); border-bottom-width: 2px; margin-bottom: 4px; }
        
        .btn-primary { background: var(--primary); border-color: var(--primary-dark); color: #FFF; border-bottom-color: var(--primary-dark); }
        .btn-success { background: var(--success); border-color: var(--success-dark); color: #FFF; border-bottom-color: var(--success-dark); }
        .btn-warning { background: var(--warning); border-color: var(--warning-dark); color: #FFF; border-bottom-color: var(--warning-dark); }
        
        /* Setup Screen */
        .grid-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px; margin-bottom: 20px;
        }
        .btn-table { font-size: clamp(1.2rem, 3vw, 1.8rem); padding: 15px; }
        .btn-table.selected { background: var(--primary); color: #FFF; border-color: var(--primary-dark); border-bottom-color: var(--primary-dark); }

        /* Game Screen */
        .header-title { text-align: center; color: var(--danger); font-size: clamp(1.8rem, 4vw, 2.4rem); font-weight: 900; margin-bottom: 0; text-transform: uppercase; }
        .header-subtitle { text-align: center; color: var(--text-main); font-size: clamp(0.9rem, 2vw, 1.2rem); margin-bottom: 10px; font-weight: 600; display: flex; justify-content: center; align-items: center; gap: 10px;}

        .equation-box {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            font-size: clamp(3rem, 8vw, 5rem); font-weight: 900; margin-bottom: 15px;
        }
        .eq-num-a { color: var(--primary); }
        .eq-operator { color: var(--stone-dark); font-size: clamp(2.5rem, 6vw, 4rem);}
        .eq-num-b { color: var(--warning); }
        .eq-equal { color: var(--stone-dark); font-size: clamp(2.5rem, 6vw, 4rem);}
        .eq-ans { 
            color: var(--danger); background: #FFF; border: 4px solid var(--danger);
            border-radius: 20px; padding: 0 20px; min-width: 80px; text-align: center;
            box-shadow: 0 6px 0 var(--danger-dark); transition: all 0.3s;
        }
        .eq-ans.correct { color: var(--success); border-color: var(--success-dark); box-shadow: 0 6px 0 var(--success-dark); }
        
        .speaker-btn {
            background: var(--warning); width: clamp(40px, 10vw, 55px); height: clamp(40px, 10vw, 55px);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: clamp(1.2rem, 3vw, 1.8rem); cursor: pointer; box-shadow: 0 5px 0 var(--warning-dark);
            border: 2px solid #FFF; margin-left: 10px; transition: transform 0.1s;
        }
        .speaker-btn:active { transform: translateY(5px); box-shadow: 0 0 0 var(--warning-dark); }

        /* NUMBER LINE */
        .number-line-container {
            position: relative; margin: 10px 0; padding: 0 20px; flex-grow: 1; min-height: 140px;
        }
        .nl-wrapper { position: relative; height: 100%; width: 100%; }
        
        .nl-line {
            position: absolute; bottom: 45px; left: 0; right: 0;
            height: 8px; background: var(--primary-dark); border-radius: 4px; z-index: 2;
        }
        
        .nl-ticks {
            position: absolute; bottom: 45px; left: 0; right: 0;
            display: flex; justify-content: space-between; align-items: center; z-index: 1;
        }
        
        .nl-tick { position: relative; display: flex; justify-content: center; }
        
        .nl-tick-mark {
            width: 4px; height: 20px; background: var(--primary-dark);
            position: absolute; top: -6px; border-radius: 2px;
        }
        .nl-tick-mark.mark-important { width: 6px; height: 26px; top: -9px; background: var(--danger); }
        
        .nl-tick-num {
            position: absolute; top: 20px; font-weight: 800; text-align: center; transition: all 0.3s;
        }
        .nl-tick-num.minor { font-size: 0.9rem; color: #A0A0A0; font-weight: 600; }
        .nl-tick-num.important { font-size: 1.2rem; color: var(--text-main); }
        .nl-tick-num.highlight { font-size: 1.8rem; color: var(--danger); font-weight: 900; top: 22px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }

        .nl-ticks.dense .nl-tick-num.minor { display: none; }
        .nl-ticks.dense .nl-tick-mark { width: 2px; height: 12px; top: -2px; }

        /* Arcs SVG */
        #arcs-svg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }
        .arc-path {
            fill: none; stroke: var(--danger); stroke-width: 6; stroke-dasharray: 12, 10; stroke-linecap: round;
        }

        /* Frog (Main Game) */
        .frog-mascot {
            position: absolute; bottom: 45px; 
            width: clamp(65px, 14vw, 85px); height: clamp(65px, 14vw, 85px); /* Slightly larger for new SVG */
            z-index: 5;
            transform: translateX(-50%); transition: left 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.25));
        }
        .frog-mascot:hover { filter: drop-shadow(0 8px 8px rgba(0,0,0,0.3)); transform: translateX(-50%) scale(1.05); }
        .frog-mascot:active { transform: translateX(-50%) scale(0.95); }
        
        @keyframes jumpFrog {
            0% { transform: translateX(-50%) translateY(0) scale(1); }
            50% { transform: translateX(-50%) translateY(-70px) scale(1.1); }
            100% { transform: translateX(-50%) translateY(0) scale(1); }
        }

        /* Controls Area */
        .controls-area {
            display: flex; flex-direction: column; align-items: center; gap: 5px; min-height: 70px; margin-bottom: 5px;
        }
        .jump-btn {
            font-size: clamp(1.4rem, 4vw, 1.8rem); padding: 10px 40px; border-radius: 25px;
            animation: pulse-btn 1.5s infinite alternate; text-transform: uppercase;
        }
        @keyframes pulse-btn { from { transform: scale(1); } to { transform: scale(1.05); } }
        .keyboard-tip { font-size: 0.85rem; color: #888; font-weight: 600; }

        /* Answers Grid */
        .answers-grid {
            display: none; flex-direction: row; justify-content: center; align-items: center;
            gap: 15px; width: 100%; padding: 5px; margin-bottom: 15px;
        }
        .btn-answer { 
            flex: 1; max-width: 150px; font-size: clamp(1.3rem, 4vw, 1.8rem); 
            padding: 12px 5px; border-radius: 18px;
            background: var(--primary); border-color: var(--primary-dark);
            border-bottom-color: var(--primary-dark); color: #FFF;
        }
        .btn-answer.wrong { background: var(--danger); border-color: var(--danger-dark); border-bottom-color: var(--danger-dark); animation: shake 0.4s ease-in-out; }
        .btn-answer.correct { background: var(--success); border-color: var(--success-dark); border-bottom-color: var(--success-dark); }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-8px); } 40%, 80% { transform: translateX(8px); } }

        /* Feedback Drawer */
        .feedback-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: var(--success); color: #FFF; padding: 20px;
            display: flex; flex-direction: column; gap: 10px;
            transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10; border-top-left-radius: 35px; border-top-right-radius: 35px; border-top: 5px solid #FFF;
        }
        .feedback-overlay.show { transform: translateY(0); }
        .feedback-text { font-size: 1.4rem; font-weight: 800; text-align: center; }

        /* --- MINI-GAME SCREEN (CATCH BALLS) --- */
        #minigame-screen {
            background: linear-gradient(180deg, #4A90E2 0%, #87CEEB 100%);
            border-radius: 30px; position: relative; touch-action: none; 
        }
        .mg-header { text-align: center; color: #FFF; font-size: 1.8rem; font-weight: 900; text-shadow: 2px 2px 0 rgba(0,0,0,0.2); margin-bottom: 5px; }
        .mg-progress { text-align: center; color: #FFF; font-weight: 800; font-size: 1.2rem; margin-bottom: 10px; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 20px; display: inline-block; align-self: center;}
        
        #rain-area {
            position: relative; flex-grow: 1; width: 100%; border-radius: 20px; overflow: hidden;
            border: 4px dashed rgba(255,255,255,0.4); background: rgba(255,255,255,0.1);
        }
        
        /* Colorful Balls */
        .mg-ball {
            position: absolute; width: 55px; height: 55px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: #FFF; font-weight: 900; font-size: 1.4rem;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.3), 0 5px 10px rgba(0,0,0,0.2);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,255,0.4);
        }
        
        /* Mini-game Frog (Optimized for drag) */
        .mg-frog {
            position: absolute; bottom: 10px; width: 90px; height: 90px; z-index: 10;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
        }

        /* End Screen */
        .stars { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; }
        .star { font-size: clamp(3rem, 10vw, 5rem); color: var(--stone); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: scale(0); }
        .star.earned { color: var(--warning); transform: scale(1); text-shadow: 0 0 25px rgba(255, 200, 0, 0.6); }
        
        .review-list {
            background: #f9f9f9; border-radius: 20px; padding: 15px; max-height: 200px;
            overflow-y: auto; margin-bottom: 20px; border: 3px solid var(--stone);
            font-size: 0.95rem; text-align: left;
        }
        .review-item { padding: 10px; border-bottom: 2px solid var(--stone); font-weight: 600; }
        .review-item:last-child { border-bottom: none; }
        .review-item.perfect { border-left: 6px solid var(--success); }
        .review-item.mistakes { border-left: 6px solid var(--danger); }

        #confetti { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1000; }

        @media (max-width: 600px) {
            .btn-answer { font-size: 1.2rem; padding: 10px 2px; }
            .header-title { font-size: 1.6rem; }
            .equation-box { font-size: 2.8rem; margin-bottom: 5px; }
            .frog-mascot { width: 65px; height: 65px; bottom: 35px; }
            .nl-line, .nl-ticks { bottom: 35px; }
            .jump-btn { font-size: 1.2rem; padding: 10px 20px; }
            .mg-frog { width: 75px; height: 75px; }
            .mg-ball { width: 45px; height: 45px; font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- SCENERY BACKGROUND -->
    <div class="scenery">
        <div class="sun"></div>
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="rainbow"></div>
        <div class="grass">
            <div class="tree" style="left: 2%; bottom: 8%;">🌲</div>
            <div class="flower" style="left: 18%; bottom: 3%;">🌺</div>
            <div class="flower" style="left: 35%; bottom: 1%;">🌼</div>
            <div class="tree" style="right: 8%; bottom: 5%;">🌳</div>
            <div class="flower" style="right: 25%; bottom: 4%;">🌻</div>
        </div>
    </div>

    <!-- CONFETTI LAYER ON TOP -->
    <canvas id="confetti"></canvas>

    <!-- NEW CUTE FROG SVG DEFINITION (Matches Reference Image) -->
    <template id="frog-svg-template">
        <svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
            <g stroke="#000" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
                <!-- Back Legs -->
                <path d="M 30 65 C 8 60, 5 85, 18 86 C 14 91, 19 95, 23 90 C 25 95, 30 95, 31 90 C 33 94, 37 90, 34 86 L 34 75 Z" fill="#8CC63F"/>
                <path d="M 70 65 C 92 60, 95 85, 82 86 C 86 91, 81 95, 77 90 C 75 95, 70 95, 69 90 C 67 94, 63 90, 66 86 L 66 75 Z" fill="#8CC63F"/>
                
                <!-- Body -->
                <path d="M 32 60 L 32 82 C 32 95, 68 95, 68 82 L 68 60 Z" fill="#8CC63F"/>
                
                <!-- Belly -->
                <path d="M 38 72 C 38 58, 62 58, 62 72 C 62 88, 38 88, 38 72 Z" fill="#DCE775"/>
                
                <!-- Front Legs -->
                <path d="M 31 60 L 29 86 C 25 89, 29 95, 33 91 C 34 96, 40 96, 41 91 C 45 95, 49 89, 45 86 L 43 60 Z" fill="#8CC63F"/>
                <path d="M 69 60 L 71 86 C 75 89, 71 95, 67 91 C 66 96, 60 96, 59 91 C 55 95, 51 89, 55 86 L 57 60 Z" fill="#8CC63F"/>
                
                <!-- Head Base -->
                <ellipse cx="50" cy="46" rx="42" ry="28" fill="#8CC63F"/>
                
                <!-- Eyes (White part) -->
                <circle cx="32" cy="26" r="16" fill="#FFF"/>
                <circle cx="68" cy="26" r="16" fill="#FFF"/>
                
                <!-- Pupils (Black) -->
                <circle cx="32" cy="26" r="10.5" fill="#000"/>
                <circle cx="68" cy="26" r="10.5" fill="#000"/>
            </g>
            
            <!-- Eye Highlights (No stroke) -->
            <circle cx="28.5" cy="22.5" r="3.5" fill="#FFF"/>
            <circle cx="36" cy="30" r="1.5" fill="#FFF"/>
            <circle cx="64.5" cy="22.5" r="3.5" fill="#FFF"/>
            <circle cx="72" cy="30" r="1.5" fill="#FFF"/>
            
            <!-- Cheeks (No stroke) -->
            <circle cx="18" cy="46" r="5.5" fill="#FF8A80"/>
            <circle cx="82" cy="46" r="5.5" fill="#FF8A80"/>
            
            <g fill="#000">
                <!-- Nostrils -->
                <circle cx="46" cy="40" r="1.2"/>
                <circle cx="54" cy="40" r="1.2"/>
            </g>
            
            <!-- Smile -->
            <path d="M 43 48 Q 50 55 57 48" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>
        </svg>
    </template>

    <!-- GAME UI CONTAINER -->
    <div class="app-container">
        
        <!-- SCREEN 1: Setup -->
        <div id="setup-screen" class="screen active">
            <h1><span class="icon-placeholder">🐸</span> Jump & Multiply!</h1>
            <h3 style="font-weight: 600;">Choose a times table to learn:</h3>
            
            <div class="grid-options" id="table-options">
                <button class="btn btn-table" data-val="2">× 2</button>
                <button class="btn btn-table" data-val="3">× 3</button>
                <button class="btn btn-table" data-val="4">× 4</button>
                <button class="btn btn-table" data-val="5">× 5</button>
                <button class="btn btn-table" data-val="mixed" style="grid-column: span 2;">Mixed (2-5)</button>
                <button class="btn btn-table" data-val="challenge" style="grid-column: span 2;">Challenge (2-10)</button>
            </div>

            <div style="flex-grow:1"></div>
            <button class="btn btn-primary btn-start" id="start-btn" style="font-size: 1.8rem; padding: 15px;">
                START PLAYING! 🚀
            </button>
        </div>

        <!-- SCREEN 2: Main Game -->
        <div id="game-screen" class="screen">
            <div class="top-bar">
                <div>⭐ <span id="score-display">0</span></div>
                <div class="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <div id="question-count">1/10</div>
            </div>

            <div class="header-title">JUMP & MULTIPLY!</div>
            <div class="header-subtitle">
                <span id="instruction-text">Help the frog jump to find the answer!</span>
            </div>

            <div class="equation-box">
                <span class="eq-num-a" id="eq-a">4</span> 
                <span class="eq-operator">×</span> 
                <span class="eq-num-b" id="eq-b">2</span> 
                <span class="eq-equal">=</span> 
                <span class="eq-ans" id="eq-ans">?</span>
                <div class="speaker-btn" id="tts-btn">📢</div>
            </div>

            <div class="number-line-container">
                <div class="nl-wrapper" id="nl-wrapper">
                    <svg id="arcs-svg"></svg>
                    <div class="frog-mascot" id="frog-mascot">
                        <!-- SVG Frog injected via JS -->
                    </div>
                    <div class="nl-line"></div>
                    <div class="nl-ticks" id="nl-ticks"></div>
                </div>
            </div>

            <div class="controls-area" id="controls-area">
                <button class="btn btn-primary jump-btn" id="jump-btn">JUMP! 🦘</button>
                <div class="keyboard-tip">Tip: Press SPACEBAR to jump!</div>
            </div>

            <div class="answers-grid" id="answers-grid">
                <!-- Answers horizontal row -->
            </div>

            <!-- Feedback Drawer -->
            <div class="feedback-overlay" id="feedback-overlay">
                <div class="feedback-text" id="feedback-text">Awesome job!</div>
                <button class="btn btn-white" id="next-btn" style="color: var(--primary-dark); font-size: 1.5rem;">PLAY MINI-GAME 🎮</button>
            </div>
        </div>

        <!-- SCREEN 2.5: Mini-game (Catch Balls) -->
        <div id="minigame-screen" class="screen">
            <div class="mg-header">CATCH THE MULTIPLES OF <span id="mg-table">2</span>! 🎾</div>
            <div class="mg-progress" id="mg-progress-text">Caught: 0/3</div>
            
            <div id="rain-area">
                <!-- Falling balls go here -->
                <div class="mg-frog" id="mg-frog" style="left: calc(50% - 45px);">
                    <!-- SVG Frog injected via JS -->
                </div>
            </div>
        </div>

        <!-- SCREEN 3: End -->
        <div id="end-screen" class="screen">
            <h1 style="margin-top: 10px;">🎉 GREAT JOB! 🎉</h1>
            <div class="stars">
                <div class="star" id="star1">⭐</div>
                <div class="star" id="star2">⭐</div>
                <div class="star" id="star3">⭐</div>
            </div>
            <h2>Final Score: <span id="final-score" style="color: var(--danger); font-size: 2rem;">0</span> / 10</h2>
            
            <div class="review-list" id="review-list"></div>

            <div style="display: flex; gap: 15px; flex-direction: column; margin-top: auto;">
                <button class="btn btn-success" id="play-again-btn" style="padding: 15px; font-size: 1.5rem;">PLAY AGAIN 🔄</button>
                <button class="btn" id="back-home-btn">HOME 🏠</button>
            </div>
        </div>
    </div>

    <script>
        // --- Inject SVG Frog ---
        const frogSvgHtml = document.getElementById('frog-svg-template').innerHTML;
        document.getElementById('frog-mascot').innerHTML = frogSvgHtml;
        document.getElementById('mg-frog').innerHTML = frogSvgHtml;
        document.querySelector('.icon-placeholder').innerHTML = '<span style="display:inline-block; width: 45px; height: 45px; vertical-align: middle;">' + frogSvgHtml + '</span>';

        // --- Web Audio API Setup ---
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        }

        function playTone(freq, type, duration, vol=0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        const sounds = {
            correct: () => { playTone(523.25, 'sine', 0.1); setTimeout(() => playTone(659.25, 'sine', 0.2), 100); setTimeout(() => playTone(783.99, 'sine', 0.3), 200); },
            wrong: () => { playTone(300, 'sawtooth', 0.2, 0.05); setTimeout(() => playTone(250, 'sawtooth', 0.3, 0.05), 150); },
            pop: () => { playTone(800 + Math.random()*200, 'sine', 0.1, 0.05); },
            jump: () => { playTone(400, 'sine', 0.1, 0.05); setTimeout(() => playTone(600, 'sine', 0.1, 0.05), 50); },
            splash: () => { playTone(900, 'sine', 0.1, 0.03); setTimeout(() => playTone(1200, 'sine', 0.1, 0.03), 50); },
            cheer: () => { playTone(440, 'square', 0.2, 0.05); setTimeout(() => playTone(554, 'square', 0.2, 0.05), 150); setTimeout(() => playTone(659, 'square', 0.4, 0.05), 300); }
        };

        // --- Text to Speech Setup ---
        let currentUtterance = "";
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'en-US'; msg.rate = 0.9; msg.pitch = 1.2;
                window.speechSynthesis.speak(msg);
            }
        }

        // --- Confetti Setup ---
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        let particles = []; let confettiActive = false;

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        function createConfetti() {
            particles = []; confettiActive = true;
            for(let i=0; i<150; i++) {
                particles.push({
                    x: Math.random() * canvas.width, y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 10 + 6, color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                    speed: Math.random() * 4 + 2, angle: Math.random() * Math.PI * 2, spin: Math.random() * 0.2 - 0.1
                });
            }
            requestAnimationFrame(renderConfetti);
        }

        function renderConfetti() {
            if(!confettiActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height); let activeCount = 0;
            particles.forEach(p => {
                p.y += p.speed; p.x += Math.sin(p.angle) * 2; p.angle += p.spin;
                if(p.y < canvas.height) {
                    activeCount++; ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle);
                    ctx.fillStyle = p.color; ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size); ctx.restore();
                }
            });
            if(activeCount > 0) requestAnimationFrame(renderConfetti); else confettiActive = false;
        }

        // --- Main Game Logic ---
        const state = { selectedTable: '2', questions: [], qIndex: 0, score: 0, flawless: true, jumpsDone: 0, reviewLog: [] };

        const screens = { setup: document.getElementById('setup-screen'), game: document.getElementById('game-screen'), minigame: document.getElementById('minigame-screen'), end: document.getElementById('end-screen') };
        const tableBtns = document.querySelectorAll('.btn-table');
        const eqA = document.getElementById('eq-a'), eqB = document.getElementById('eq-b'), eqAns = document.getElementById('eq-ans');
        const instructionText = document.getElementById('instruction-text'), nlTicksContainer = document.getElementById('nl-ticks'), frogMascot = document.getElementById('frog-mascot'), arcsSvg = document.getElementById('arcs-svg');
        const jumpBtn = document.getElementById('jump-btn'), controlsArea = document.getElementById('controls-area'), answersGrid = document.getElementById('answers-grid');
        const feedbackOverlay = document.getElementById('feedback-overlay'), feedbackText = document.getElementById('feedback-text'), nextBtn = document.getElementById('next-btn');

        tableBtns.forEach(btn => {
            btn.addEventListener('click', () => { tableBtns.forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); state.selectedTable = btn.dataset.val; sounds.pop(); });
        });

        document.getElementById('start-btn').addEventListener('click', () => { initAudio(); sounds.jump(); if(!state.selectedTable) state.selectedTable = '2'; startGame(); });
        document.getElementById('tts-btn').addEventListener('click', () => { speak(currentUtterance); });
        
        // Handle Next Button (transition to Mini-game or Next Question)
        nextBtn.addEventListener('click', () => { 
            feedbackOverlay.classList.remove('show'); 
            if (nextBtn.innerText.includes("MINI-GAME")) startMiniGame();
            else proceedToNextQuestion();
        });
        
        frogMascot.addEventListener('click', () => { if (controlsArea.style.display !== 'none') performJump(); });
        jumpBtn.addEventListener('click', performJump);
        document.addEventListener('keydown', (e) => { if (e.code === 'Space' && screens.game.classList.contains('active') && controlsArea.style.display !== 'none') { e.preventDefault(); performJump(); } });
        window.addEventListener('resize', () => { if (screens.game.classList.contains('active')) redrawCurrentState(); });

        function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

        function generateWrongNumbers(ans, count) {
            let wrongs = new Set(); let attempts = 0;
            while(wrongs.size < count && attempts < 100) {
                attempts++; let offset = Math.floor(Math.random() * 10) - 5; if (offset === 0) offset = 1;
                let w = ans + offset; if(w >= 0 && w !== ans) wrongs.add(w);
            }
            let fallbackNum = 0;
            while(wrongs.size < count) { if (fallbackNum !== ans && !wrongs.has(fallbackNum)) wrongs.add(fallbackNum); fallbackNum++; }
            return Array.from(wrongs).slice(0, count);
        }

        function generateQuestions() {
            let qs = [], tables = [];
            if (state.selectedTable === 'mixed') tables = [2, 3, 4, 5];
            else if (state.selectedTable === 'challenge') tables = [2, 3, 4, 5, 6, 7, 8, 9, 10];
            else tables = [parseInt(state.selectedTable)];

            let pool = [];
            for (let t of tables) {
                for (let a = 1; a <= 10; a++) { pool.push({ multiplier: a, table: t }); }
            }
            
            pool = shuffle(pool);
            let selected = pool.slice(0, 10);
            
            selected.forEach(item => {
                let ans = item.multiplier * item.table;
                qs.push({ 
                    multiplier: item.multiplier, table: item.table, ans: ans, 
                    choices: shuffle([ans, ...generateWrongNumbers(ans, 3)]) 
                });
            });

            return qs;
        }

        function startGame() {
            state.questions = generateQuestions(); state.qIndex = 0; state.score = 0; state.reviewLog = [];
            screens.setup.classList.remove('active'); screens.end.classList.remove('active'); screens.minigame.classList.remove('active');
            screens.game.classList.add('active');
            updateTopBar(); renderQuestion();
        }

        function updateTopBar() {
            document.getElementById('score-display').innerText = state.score;
            document.getElementById('question-count').innerText = `${state.qIndex + 1}/10`;
            document.getElementById('progress-bar').style.width = `${((state.qIndex) / 10) * 100}%`;
        }

        function renderQuestion() {
            updateTopBar(); state.flawless = true; state.jumpsDone = 0;
            let q = state.questions[state.qIndex];

            eqA.innerText = q.multiplier; eqB.innerText = q.table; eqAns.innerText = "?"; eqAns.className = "eq-ans";
            currentUtterance = `Help the frog jump ${q.multiplier} times by counting by ${q.table}!`;
            instructionText.innerText = currentUtterance; speak(currentUtterance);

            // Generate Number Line
            nlTicksContainer.innerHTML = ''; arcsSvg.innerHTML = '';
            
            let maxTotalVal = q.multiplier * q.table;
            let extraTicks = (maxTotalVal > 25) ? 1 : 2;
            let totalTicks = maxTotalVal + extraTicks;

            if (totalTicks > 30) nlTicksContainer.classList.add('dense');
            else nlTicksContainer.classList.remove('dense');
            
            for (let i = 0; i <= totalTicks; i++) {
                let tickDiv = document.createElement('div'); tickDiv.className = 'nl-tick'; tickDiv.id = `tick-${i}`;
                let mark = document.createElement('div'); mark.className = 'nl-tick-mark';
                let num = document.createElement('div');
                
                if (i % q.table === 0 && i !== 0) { num.className = 'nl-tick-num important'; mark.classList.add('mark-important'); } 
                else if (i === 0) { num.className = 'nl-tick-num important'; mark.classList.add('mark-important'); } 
                else { num.className = 'nl-tick-num minor'; }
                
                num.innerText = i; tickDiv.appendChild(mark); tickDiv.appendChild(num); nlTicksContainer.appendChild(tickDiv);
            }

            controlsArea.style.display = 'flex'; answersGrid.style.display = 'none';
            jumpBtn.innerText = `JUMP! (${q.multiplier})`;
            
            setTimeout(() => { positionFrogAt(0); }, 50);

            // Generate Answers (Horizontal Flex row)
            answersGrid.innerHTML = '';
            q.choices.forEach(c => {
                let btn = document.createElement('button'); btn.className = 'btn btn-answer'; btn.innerText = c;
                btn.onclick = () => handleAnswerClick(c, btn); answersGrid.appendChild(btn);
            });
        }

        function getTickXPosition(value) {
            const tick = document.getElementById(`tick-${value}`); const container = document.getElementById('nl-wrapper');
            if (tick && container) {
                const tr = tick.getBoundingClientRect(); const cr = container.getBoundingClientRect();
                return (tr.left - cr.left) + (tr.width / 2);
            }
            return 0;
        }

        function positionFrogAt(value) {
            const targetX = getTickXPosition(value);
            if(targetX > 0) frogMascot.style.left = `${targetX}px`;
        }

        function drawArc(startVal, endVal) {
            const startX = getTickXPosition(startVal); const endX = getTickXPosition(endVal);
            if(startX === 0 && endX === 0) return;

            const wrapper = document.getElementById('nl-wrapper');
            const baseline = wrapper.offsetHeight - 45; 
            const midX = (startX + endX) / 2;
            const distance = Math.abs(endX - startX);
            const height = Math.min(distance / 1.2, 50); 

            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            const d = `M ${startX} ${baseline} Q ${midX} ${baseline - height * 2} ${endX} ${baseline}`;
            path.setAttribute('d', d); path.setAttribute('class', 'arc-path');
            
            const length = distance * 2; path.style.strokeDasharray = length; path.style.strokeDashoffset = length;
            arcsSvg.appendChild(path);
            
            path.getBoundingClientRect(); 
            path.style.transition = 'stroke-dashoffset 0.4s ease-in-out'; path.style.strokeDashoffset = '0';
            setTimeout(() => { path.style.strokeDasharray = '12, 10'; }, 400);
        }

        function performJump() {
            let q = state.questions[state.qIndex];
            if (state.jumpsDone >= q.multiplier) return;

            sounds.jump();
            let startVal = state.jumpsDone * q.table; let endVal = (state.jumpsDone + 1) * q.table;
            
            frogMascot.style.animation = 'none'; void frogMascot.offsetWidth;
            frogMascot.style.animation = 'jumpFrog 0.4s ease-in-out';
            
            positionFrogAt(endVal); drawArc(startVal, endVal);
            
            const landedTickNum = document.querySelector(`#tick-${endVal} .nl-tick-num`);
            if (landedTickNum) landedTickNum.classList.add('highlight');

            state.jumpsDone++; let jumpsLeft = q.multiplier - state.jumpsDone;
            
            if (jumpsLeft > 0) {
                jumpBtn.innerText = `JUMP! (${jumpsLeft})`;
                instructionText.innerText = `Great! Jump ${jumpsLeft} more time${jumpsLeft > 1 ? 's' : ''}.`;
            } else {
                controlsArea.style.display = 'none';
                instructionText.innerText = `Where did the frog land? Choose the answer!`;
                setTimeout(() => { sounds.pop(); answersGrid.style.display = 'flex'; }, 500);
            }
        }

        function redrawCurrentState() {
            let q = state.questions[state.qIndex]; arcsSvg.innerHTML = ''; 
            let currentVal = state.jumpsDone * q.table; positionFrogAt(currentVal);
            for(let i = 0; i < state.jumpsDone; i++) drawArc(i * q.table, (i+1) * q.table);
        }

        function handleAnswerClick(val, btn) {
            if (feedbackOverlay.classList.contains('show')) return;
            let q = state.questions[state.qIndex];

            if (val === q.ans) {
                // Correct!
                sounds.correct(); btn.classList.add('correct'); eqAns.innerText = val; eqAns.classList.add('correct');
                Array.from(answersGrid.children).forEach(b => b.disabled = true);
                
                if (state.flawless) { state.score++; updateTopBar(); }

                state.reviewLog.push({ text: `${q.multiplier} jumps of ${q.table} ➔ ${q.multiplier} × ${q.table} = ${q.ans}`, flawless: state.flawless });
                feedbackText.innerHTML = `AWESOME! <br> <b>${q.multiplier} × ${q.table} = ${q.ans}</b>`;
                
                nextBtn.innerHTML = "PLAY MINI-GAME 🎮"; nextBtn.style.color = "var(--primary-dark)";
                feedbackOverlay.classList.add('show'); createConfetti();

                let speechText = `${q.multiplier} times ${q.table} equals ${q.ans}. Awesome!`; speak(speechText);
            } else {
                // Wrong! Allow retry but no points
                sounds.wrong(); state.flawless = false; btn.classList.add('wrong');
                setTimeout(() => btn.classList.remove('wrong'), 400); speak("Try again!");
            }
        }

        function proceedToNextQuestion() {
            state.qIndex++; 
            if(state.qIndex >= 10) endGame(); 
            else {
                screens.minigame.classList.remove('active');
                screens.game.classList.add('active');
                renderQuestion(); 
            }
        }

        // --- MINI-GAME LOGIC (CATCH BALLS) ---
        let mgActive = false;
        let mgCaught = 0;
        let mgDrops = [];
        let mgLastSpawn = 0;
        let mgAnimFrame = null;
        let mgCurrentTable = 2;
        const ballColors = ['#FF4B4B', '#1CB0F6', '#58CC02', '#FFC800', '#A150D3', '#FF9100'];

        const rainArea = document.getElementById('rain-area');
        const mgFrog = document.getElementById('mg-frog');
        const mgProgressText = document.getElementById('mg-progress-text');

        // FROG DRAGGING LOGIC (Optimized)
        function moveFrog(clientX) {
            let rect = rainArea.getBoundingClientRect();
            let x = clientX - rect.left;
            let frogWidth = mgFrog.offsetWidth;
            // Left is absolute edge, so max is width - frogWidth
            let newLeft = Math.max(0, Math.min(x - (frogWidth / 2), rect.width - frogWidth));
            mgFrog.style.left = `${newLeft}px`;
        }
        
        rainArea.addEventListener('mousemove', (e) => { if(mgActive) moveFrog(e.clientX); });
        rainArea.addEventListener('touchmove', (e) => { if(mgActive) { e.preventDefault(); moveFrog(e.touches[0].clientX); } }, {passive: false});

        function startMiniGame() {
            screens.game.classList.remove('active');
            screens.minigame.classList.add('active');
            
            mgCurrentTable = state.questions[state.qIndex].table;
            document.getElementById('mg-table').innerText = mgCurrentTable;
            mgCaught = 0;
            mgProgressText.innerText = `Caught: 0/3`;
            
            // Re-center frog safely
            let aw = rainArea.offsetWidth || 300;
            let fw = mgFrog.offsetWidth || 80;
            mgFrog.style.left = `${(aw / 2) - (fw / 2)}px`;

            rainArea.querySelectorAll('.mg-ball').forEach(el => el.remove());
            mgDrops = [];
            mgActive = true;
            
            sounds.splash();
            mgAnimFrame = requestAnimationFrame(mgLoop);
        }

        function mgLoop(timestamp) {
            if (!mgActive) return;

            if (timestamp - mgLastSpawn > 1000) { spawnBall(); mgLastSpawn = timestamp; }

            let frogRect = mgFrog.getBoundingClientRect();
            let areaRect = rainArea.getBoundingClientRect();

            for (let i = mgDrops.length - 1; i >= 0; i--) {
                let drop = mgDrops[i];
                drop.y += drop.speed;
                drop.el.style.top = `${drop.y}px`;

                let dropRect = drop.el.getBoundingClientRect();
                
                // Fine-tune hit box slightly smaller than the full rectangle
                let hitPadding = 15;

                if (dropRect.bottom - hitPadding >= frogRect.top && 
                    dropRect.top + hitPadding <= frogRect.bottom &&
                    dropRect.right - hitPadding >= frogRect.left && 
                    dropRect.left + hitPadding <= frogRect.right) {
                    
                    if (drop.isCorrect) {
                        sounds.splash(); mgCaught++;
                        mgProgressText.innerText = `Caught: ${mgCaught}/3`;
                        mgProgressText.style.color = "var(--success)"; setTimeout(() => mgProgressText.style.color = "#FFF", 300);
                        if (mgCaught >= 3) endMiniGame();
                    } else {
                        sounds.wrong();
                        mgProgressText.style.color = "var(--danger)"; setTimeout(() => mgProgressText.style.color = "#FFF", 300);
                    }
                    drop.el.remove(); mgDrops.splice(i, 1);
                } 
                else if (drop.y > areaRect.height) {
                    drop.el.remove(); mgDrops.splice(i, 1);
                }
            }
            if (mgActive) mgAnimFrame = requestAnimationFrame(mgLoop);
        }

        function spawnBall() {
            let isCorrect = Math.random() > 0.4; 
            let val;
            if (isCorrect) { val = mgCurrentTable * (Math.floor(Math.random() * 9) + 1); } 
            else {
                let offset = Math.floor(Math.random() * 5) + 1;
                val = (mgCurrentTable * (Math.floor(Math.random() * 9) + 1)) + offset;
                if (val % mgCurrentTable === 0) val += 1;
            }

            let el = document.createElement('div');
            el.className = 'mg-ball';
            el.innerText = val;
            
            // Random styling for balls
            let color = ballColors[Math.floor(Math.random() * ballColors.length)];
            el.style.background = `radial-gradient(circle at 30% 30%, #FFF 0%, ${color} 60%, #222 100%)`;
            
            let maxLeft = rainArea.offsetWidth - 55;
            let startX = Math.random() * maxLeft;
            el.style.left = `${startX}px`; el.style.top = `-60px`;

            rainArea.appendChild(el);

            mgDrops.push({
                el: el, x: startX, y: -60,
                speed: 3 + Math.random() * 3, 
                isCorrect: isCorrect
            });
        }

        function endMiniGame() {
            mgActive = false; cancelAnimationFrame(mgAnimFrame);
            sounds.cheer(); createConfetti();
            mgProgressText.innerText = `YOU DID IT! 🎉`;
            setTimeout(() => { proceedToNextQuestion(); }, 2000);
        }


        // --- End Screen Logic ---
        function endGame() {
            screens.game.classList.remove('active'); screens.minigame.classList.remove('active'); screens.end.classList.add('active');
            sounds.cheer(); createConfetti();
            document.getElementById('final-score').innerText = state.score;

            let starsEarned = 1; if (state.score >= 8) starsEarned = 3; else if (state.score >= 5) starsEarned = 2;
            document.getElementById('star1').className = 'star'; document.getElementById('star2').className = 'star'; document.getElementById('star3').className = 'star';

            setTimeout(() => { if(starsEarned >= 1) { sounds.pop(); document.getElementById('star1').classList.add('earned'); } }, 500);
            setTimeout(() => { if(starsEarned >= 2) { sounds.pop(); document.getElementById('star2').classList.add('earned'); } }, 1000);
            setTimeout(() => { if(starsEarned >= 3) { sounds.pop(); document.getElementById('star3').classList.add('earned'); } }, 1500);

            const rl = document.getElementById('review-list'); rl.innerHTML = '';
            state.reviewLog.forEach((log, i) => {
                let div = document.createElement('div'); div.className = `review-item ${log.flawless ? 'perfect' : 'mistakes'}`;
                div.innerHTML = `<b>Q${i+1}:</b> ${log.text} ${log.flawless ? '✅' : '❌'}`; rl.appendChild(div);
            });
            speak(`Great job! You scored ${state.score} out of 10.`);
        }

        document.getElementById('play-again-btn').addEventListener('click', () => { sounds.jump(); startGame(); });
        document.getElementById('back-home-btn').addEventListener('click', () => { sounds.pop(); screens.end.classList.remove('active'); screens.setup.classList.add('active'); });

    </script>
</body>
</html>
