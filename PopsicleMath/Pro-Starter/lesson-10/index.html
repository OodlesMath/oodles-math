<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cookie Sharing - Ver 4</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1CB0F6;
            --primary-shadow: #1899D6;
            --success: #58CC02;
            --success-shadow: #58A700;
            --danger: #FF4B4B;
            --danger-shadow: #EA1515;
            --warning: #FFC800;
            --warning-shadow: #F49000;
            --text-main: #3C3C3C;
            --plate-border: #C8D9EE;
        }

        * {
            box-sizing: border-box;
            user-select: none; 
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: linear-gradient(to bottom, #7FE0FF 0%, #E6F8FF 60%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Beautiful Background Elements --- */
        .bg-layer {
            position: absolute;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .sun {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 100px;
            height: 100px;
            background: #FFD900;
            border-radius: 50%;
            box-shadow: 0 0 40px #FFD900, 0 0 80px #FFAA00;
            animation: pulseSun 4s infinite alternate;
        }

        @keyframes pulseSun {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(1.05); opacity: 1; }
        }

        /* Fixed Perfect Arch Rainbow (7 Colors) */
        .rainbow {
            position: absolute;
            bottom: 25vh; 
            left: 50%;
            transform: translateX(-50%);
            width: clamp(300px, 80vw, 800px);
            aspect-ratio: 2 / 1; 
            border-top-left-radius: 1000px;
            border-top-right-radius: 1000px;
            background: radial-gradient(circle at 50% 100%,
                transparent 0%, transparent 40%,
                #CE82FF 40%, #CE82FF 45%, /* Violet */
                #2B70C9 45%, #2B70C9 50%, /* Indigo */
                #1CB0F6 50%, #1CB0F6 55%, /* Blue */
                #58CC02 55%, #58CC02 60%, /* Green */
                #FFC800 60%, #FFC800 65%, /* Yellow */
                #FF9600 65%, #FF9600 70%, /* Orange */
                #FF4B4B 70%, #FF4B4B 75%, /* Red */
                transparent 75%
            );
            opacity: 0.85;
            z-index: 1;
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            animation: floatCloud linear infinite;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .cloud1 { top: 10%; width: 120px; height: 40px; left: -150px; animation-duration: 35s; animation-delay: 0s; }
        .cloud1::before { width: 50px; height: 50px; top: -25px; left: 15px; }
        .cloud1::after { width: 40px; height: 40px; top: -15px; right: 15px; }
        
        .cloud2 { top: 25%; width: 160px; height: 50px; left: -200px; animation-duration: 45s; animation-delay: -15s; }
        .cloud2::before { width: 70px; height: 70px; top: -35px; left: 25px; }
        .cloud2::after { width: 50px; height: 50px; top: -20px; right: 25px; }

        @keyframes floatCloud {
            0% { transform: translateX(-200px); }
            100% { transform: translateX(120vw); }
        }

        .grass {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 25vh;
            background: #58CC02;
            border-top: 8px solid #6CE808;
            border-top-left-radius: 50% 30px;
            border-top-right-radius: 50% 30px;
            z-index: 2;
        }

        .tree {
            position: absolute;
            bottom: 20vh;
            width: 40px;
            height: 80px;
            background: #8B4513; 
            border-radius: 5px;
            z-index: 1;
        }
        .tree::before {
            content: '';
            position: absolute;
            bottom: 40px;
            left: -30px;
            width: 100px;
            height: 100px;
            background: #3EA800;
            border-radius: 50%;
            box-shadow: inset -10px -10px 0 #2D7A00;
        }
        .tree1 { left: 10%; transform: scale(0.8); }
        .tree2 { right: 15%; transform: scale(1.1); }

        .flower {
            position: absolute;
            bottom: 15vh;
            width: 20px;
            height: 20px;
            background: #FF4B4B;
            border-radius: 50%;
            z-index: 3;
            box-shadow: 15px 0 0 #FF4B4B, 7.5px 15px 0 #FF4B4B, -7.5px 15px 0 #FF4B4B, -15px 0 0 #FF4B4B, 0 -15px 0 #FF4B4B;
        }
        .flower::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: #FFC800; border-radius: 50%; }
        .flower1 { left: 25%; transform: scale(0.5); }
        .flower2 { right: 30%; transform: scale(0.6); bottom: 10vh; }
        .flower3 { left: 50%; transform: scale(0.4); bottom: 5vh; }

        /* --- UI Containers --- */
        .game-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 900px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        .header-area {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            position: relative;
            padding-top: 10px;
        }

        .progress-bar {
            width: 60%; 
            height: 16px;
            background: #E5E5E5;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 3px 0 rgba(0,0,0,0.1);
        }

        .progress-fill {
            height: 100%;
            background: var(--success);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 10px;
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.15);
        }

        /* Screens */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            flex: 1;
            animation: fadeIn 0.4s ease-in-out;
            min-height: 0; 
        }

        .screen.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Typography */
        h1 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            color: var(--primary);
            text-align: center;
            margin: 0 0 10px 0;
            text-shadow: 0 4px 0 var(--primary-shadow), 0 8px 10px rgba(0,0,0,0.1);
            letter-spacing: 1px;
            line-height: 1.2;
        }

        h2 {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            text-align: center;
            color: var(--text-main);
            margin: 0 0 20px 0;
        }

        .instruction-card {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: white;
            padding: 10px 25px;
            border-radius: 20px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.05), 0 8px 20px rgba(0,0,0,0.05);
            margin: 10px 0;
            border: 2px solid #F0F0F0;
            z-index: 11;
        }

        .instruction-text {
            font-size: clamp(1.1rem, 3.5vw, 1.5rem);
            font-weight: 700;
            color: var(--text-main);
        }

        /* Buttons */
        .btn {
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 1.2rem;
            text-transform: uppercase;
            padding: 15px 20px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.1s;
            margin: 5px;
            color: white;
            position: relative;
            top: 0;
            width: 100%;
            max-width: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn:active { top: 4px; box-shadow: 0 0 0 transparent !important; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; top: 4px; box-shadow: none !important; }

        .btn-primary { background-color: var(--primary); box-shadow: 0 4px 0 var(--primary-shadow); }
        .btn-success { background-color: var(--success); box-shadow: 0 4px 0 var(--success-shadow); }
        .btn-warning { background-color: var(--warning); box-shadow: 0 4px 0 var(--warning-shadow); color: #8C5300; }
        .btn-danger { background-color: var(--danger); box-shadow: 0 4px 0 var(--danger-shadow); }

        .icon-btn {
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 0 var(--primary-shadow);
            transition: transform 0.1s;
            flex-shrink: 0;
        }
        .icon-btn:active { transform: translateY(3px); box-shadow: 0 0 0 var(--primary-shadow); }
        .icon-btn svg { width: 20px; height: 20px; fill: currentColor; }

        /* Game Core Area */
        .game-area {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            min-height: 0;
            justify-content: flex-start;
            gap: 10px;
            padding: 5px 0;
        }

        .item-pool {
            min-height: clamp(60px, 12vh, 100px);
            background: rgba(255, 255, 255, 0.7);
            border: 3px dashed var(--primary);
            border-radius: 20px;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: clamp(5px, 2vw, 15px);
            backdrop-filter: blur(5px);
        }

        .plates-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: clamp(10px, 3vw, 25px);
            min-height: 0;
        }

        /* SVG Items & Realistic Plates */
        .game-item {
            width: clamp(35px, 8vw, 60px);
            height: clamp(35px, 8vw, 60px);
            cursor: grab;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            touch-action: none;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.15));
        }
        .game-item:active { cursor: grabbing; transform: scale(1.1); filter: drop-shadow(0 8px 8px rgba(0,0,0,0.2)); }
        .game-item.selected { transform: scale(1.2) translateY(-5px); filter: drop-shadow(0 0 10px var(--warning)); animation: pulseItem 1s infinite; }

        @keyframes pulseItem {
            0% { transform: scale(1.1) translateY(-5px); }
            50% { transform: scale(1.3) translateY(-5px); }
            100% { transform: scale(1.1) translateY(-5px); }
        }

        .plate {
            background: radial-gradient(circle at 40% 40%, #FFFFFF 30%, #E8F0FE 80%, #D2E3FC 100%);
            border: clamp(3px, 1vw, 5px) solid var(--plate-border);
            border-radius: 50%;
            width: clamp(80px, 22vw, 160px);
            height: clamp(80px, 22vw, 160px);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 2px;
            padding: 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15), inset 0 5px 15px rgba(255,255,255,1), inset 0 -8px 15px rgba(0,0,0,0.08);
            transition: transform 0.2s, border-color 0.2s;
        }
        .plate.highlight { border-color: var(--primary); background: radial-gradient(circle at 40% 40%, #FFF 30%, #D6EAF8 80%, #AED6F1 100%); transform: scale(1.05); }
        .plate .game-item { width: clamp(25px, 5vw, 40px); height: clamp(25px, 5vw, 40px); filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1)); }

        /* Bottom Controls / Equation Phase */
        .bottom-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            min-height: clamp(80px, 20vh, 160px);
            padding-bottom: 10px;
            z-index: 12;
        }

        #action-area { width: 100%; display: flex; justify-content: center; }

        #equation-area {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
            animation: slideUp 0.4s ease-out;
            background: rgba(255,255,255,0.9);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .equation-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .equation-box {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 800;
            color: var(--primary);
            text-align: center;
            text-shadow: 0 2px 0 rgba(0,0,0,0.05);
        }

        .options-row {
            display: flex;
            flex-direction: row;
            justify-content: center;
            width: 100%;
            gap: clamp(8px, 2vw, 20px);
        }

        .option-btn {
            flex: 1;
            max-width: 90px; 
            height: clamp(50px, 12vw, 70px);
            font-size: clamp(1.5rem, 5vw, 2rem);
            padding: 0;
            margin: 0;
            background-color: var(--primary);
            box-shadow: 0 5px 0 var(--primary-shadow);
            border-radius: 16px;
        }

        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* --- Mini Game: Tube Ball Sort --- */
        .minigame-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 600px;
            padding: 30px 20px;
            background: rgba(20, 20, 60, 0.7); /* Darker BG for tubes to pop */
            border-radius: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .mg-tubes-area {
            display: flex;
            gap: clamp(8px, 2vw, 15px);
            justify-content: center;
            align-items: flex-end;
            min-height: 250px;
        }

        .tube {
            width: clamp(45px, 12vw, 65px);
            height: clamp(180px, 40vw, 240px);
            border: 4px solid rgba(255, 255, 255, 0.9);
            border-top: none;
            border-radius: 0 0 35px 35px;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 -10px 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column-reverse; /* Stack balls from bottom */
            align-items: center;
            padding-bottom: 5px;
            gap: 2px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }

        .tube.selected {
            transform: translateY(-15px);
            border-color: var(--warning);
            box-shadow: 0 15px 25px rgba(0,0,0,0.3), inset 0 -10px 20px rgba(0,0,0,0.2);
        }

        .tube-ball {
            width: clamp(35px, 10vw, 50px);
            height: clamp(35px, 10vw, 50px);
            border-radius: 50%;
            /* Shiny 3D effect overlayed on background color */
            background-image: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 40%, rgba(0,0,0,0.4) 100%);
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .tube.selected .tube-ball:last-child {
            transform: translateY(-20px);
        }

        /* Feedback Toast */
        .feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            background: white;
            padding: 15px 30px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: 100;
            text-align: center;
        }
        .feedback.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .feedback.error { color: var(--danger); border: 4px solid var(--danger); }
        .feedback.success { color: var(--success); border: 4px solid var(--success); }

        /* Confetti */
        .confetti {
            position: fixed;
            width: 12px;
            height: 12px;
            z-index: 9999;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- Background Layers -->
    <div class="bg-layer">
        <div class="sun"></div>
        <div class="rainbow"></div>
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="grass"></div>
        <div class="tree tree1"></div>
        <div class="tree tree2"></div>
        <div class="flower flower1"></div>
        <div class="flower flower2"></div>
        <div class="flower flower3"></div>
    </div>

    <!-- Main Game Container -->
    <div class="game-container">
        
        <!-- Header: Progress Bar -->
        <div class="header-area" id="header-area" style="display: none;">
            <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <h1 style="font-size: clamp(3rem, 10vw, 5rem);">🍪<br>Cookie Sharing</h1>
            <h2>Share the treats equally!</h2>
            <div style="display: flex; flex-direction: column; width: 100%; max-width: 300px; gap: 10px; margin-top: 20px;">
                <button class="btn btn-success" onclick="startGame('easy')">EASY</button>
                <button class="btn btn-warning" onclick="startGame('medium')">MEDIUM</button>
                <button class="btn btn-danger" onclick="startGame('challenge')">CHALLENGE</button>
            </div>
        </div>

        <!-- Combo Screen (Play & Equation) -->
        <div id="play-screen" class="screen">
            
            <div class="instruction-card">
                <span class="instruction-text" id="instruction-text">Share X items equally among Y plates.</span>
                <button class="icon-btn" onclick="readInstruction()" title="Listen">
                    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                </button>
            </div>

            <!-- Visual Elements -->
            <div class="game-area">
                <div id="item-pool" class="item-pool"></div>
                <div id="plates-container" class="plates-container"></div>
            </div>

            <!-- Bottom dynamic area -->
            <div class="bottom-section">
                
                <!-- State 1: Concrete Check -->
                <div id="action-area">
                    <button class="btn btn-primary" style="max-width: 250px;" onclick="checkConcreteAnswer()">CHECK</button>
                </div>

                <!-- State 2: Abstract Equation -->
                <div id="equation-area">
                    <div class="equation-wrapper">
                        <div id="equation-display" class="equation-box">12 ÷ 3 = ?</div>
                        <button class="icon-btn" onclick="readEquation()" title="Listen Equation">
                            <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                        </button>
                    </div>
                    <div class="options-row" id="options-grid"></div>
                    <button class="btn btn-success" id="next-btn" style="display:none; max-width: 200px; margin-top: 15px;" onclick="goToMinigame()">NEXT</button>
                </div>

            </div>
        </div>

        <!-- Mini Game Screen: Ball Sort (Tubes) -->
        <div id="minigame-screen" class="screen">
            <h1 style="font-size: clamp(2rem, 6vw, 3rem); text-shadow: 0 3px 0 var(--primary-shadow);">Ball Sort!</h1>
            <h2 style="font-weight: 700; margin-bottom: 20px;">Sort balls by color into the tubes</h2>
            
            <div class="minigame-container">
                <div class="mg-tubes-area" id="mg-tubes">
                    <!-- Tubes injected here -->
                </div>
            </div>
        </div>

        <!-- End Screen -->
        <div id="end-screen" class="screen">
            <h1 style="font-size: clamp(3rem, 8vw, 4rem);">Game Over!</h1>
            <div style="background: white; padding: 20px 40px; border-radius: 30px; box-shadow: 0 10px 0 rgba(0,0,0,0.05); text-align: center; margin-bottom: 20px;">
                <h2 id="final-score" style="font-size: clamp(3.5rem, 10vw, 5rem); color: var(--success); font-weight: 800; margin: 0;">10/10</h2>
            </div>
            <h2 id="final-message" style="font-weight: 800; color: var(--primary);">Amazing sharing!</h2>
            <div style="display: flex; flex-direction: column; width: 100%; max-width: 300px; gap: 10px;">
                <button class="btn btn-success" onclick="goToStart()">PLAY AGAIN</button>
                <button class="btn btn-primary" onclick="goToStart()">HOME</button>
            </div>
        </div>

    </div>

    <!-- Feedback Toast -->
    <div id="feedback-toast" class="feedback">Try again!</div>

    <script>
        // --- High Quality SVG Assest for Multiple Items ---
        const gameItems = [
            {
                name: 'cookies',
                svg: `<svg viewBox="0 0 100 100" style="width:100%; height:100%; pointer-events:none;">
                        <circle cx="50" cy="50" r="46" fill="#EAAA64" />
                        <path d="M50 4A46 46 0 0 0 4 50a46 46 0 0 0 92 0A46 46 0 0 0 50 4zm0 84a38 38 0 1 1 0-76 38 38 0 0 1 0 76z" fill="#C28741" opacity="0.3"/>
                        <circle cx="35" cy="30" r="6" fill="#4E311A" />
                        <circle cx="65" cy="40" r="7.5" fill="#4E311A" />
                        <circle cx="45" cy="65" r="7" fill="#4E311A" />
                        <circle cx="70" cy="65" r="5" fill="#4E311A" />
                        <circle cx="25" cy="55" r="5" fill="#4E311A" />
                        <circle cx="50" cy="20" r="4.5" fill="#4E311A" />
                    </svg>`
            },
            {
                name: 'donuts',
                svg: `<svg viewBox="0 0 100 100" style="width:100%; height:100%; pointer-events:none;">
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M 50 5 A 45 45 0 1 0 50 95 A 45 45 0 1 0 50 5 Z M 50 35 A 15 15 0 1 1 50 65 A 15 15 0 1 1 50 35 Z" fill="#EAAA64"/>
                        <path d="M 50 5 A 45 45 0 0 0 5 50 Q 15 60 25 50 Q 35 40 45 50 Q 50 55 50 65 A 15 15 0 0 1 50 35 A 15 15 0 0 1 65 50 Q 65 60 75 50 Q 85 40 95 50 A 45 45 0 0 0 50 5 Z" fill="#FF85C0"/>
                        <rect x="30" y="20" width="8" height="3" rx="1.5" fill="#FFF" transform="rotate(45 30 20)"/>
                        <rect x="60" y="15" width="8" height="3" rx="1.5" fill="#FFFF00" transform="rotate(-30 60 15)"/>
                        <rect x="75" y="35" width="8" height="3" rx="1.5" fill="#00FFFF" transform="rotate(10 75 35)"/>
                        <rect x="20" y="35" width="8" height="3" rx="1.5" fill="#00FF00" transform="rotate(-45 20 35)"/>
                    </svg>`
            },
            {
                name: 'candies',
                svg: `<svg viewBox="0 0 100 100" style="width:100%; height:100%; pointer-events:none;">
                        <path d="M 30 50 L 5 25 L 5 75 Z" fill="#FFC800"/>
                        <path d="M 70 50 L 95 25 L 95 75 Z" fill="#FFC800"/>
                        <circle cx="50" cy="50" r="25" fill="#FF4B4B"/>
                        <circle cx="50" cy="50" r="15" fill="#FFF"/>
                        <circle cx="50" cy="50" r="5" fill="#FF4B4B"/>
                    </svg>`
            },
            {
                name: 'cupcakes',
                svg: `<svg viewBox="0 0 100 100" style="width:100%; height:100%; pointer-events:none;">
                        <path d="M 30 50 L 70 50 L 60 95 L 40 95 Z" fill="#FFC800"/>
                        <path d="M 20 50 Q 50 10 80 50 Z" fill="#CE82FF"/>
                        <circle cx="50" cy="20" r="10" fill="#FF4B4B"/>
                        <path d="M 40 95 L 40 50 M 50 95 L 50 50 M 60 95 L 60 50" stroke="#E6A800" stroke-width="2"/>
                    </svg>`
            },
            {
                name: 'strawberries',
                svg: `<svg viewBox="0 0 100 100" style="width:100%; height:100%; pointer-events:none;">
                        <path d="M 15 35 Q 50 100 85 35 Q 50 -10 15 35" fill="#FF4B4B"/>
                        <path d="M 50 15 L 35 5 L 50 10 L 65 5 Z" fill="#58CC02"/>
                        <circle cx="50" cy="40" r="3" fill="#FFC800"/>
                        <circle cx="35" cy="55" r="3" fill="#FFC800"/>
                        <circle cx="65" cy="50" r="3" fill="#FFC800"/>
                        <circle cx="50" cy="70" r="3" fill="#FFC800"/>
                        <circle cx="30" cy="40" r="3" fill="#FFC800"/>
                        <circle cx="70" cy="35" r="3" fill="#FFC800"/>
                    </svg>`
            }
        ];

        // --- State Management ---
        const state = {
            difficulty: 'easy',
            questions: [],
            currentQIndex: 0,
            score: 0,
            isFirstTryEq: true,
            equationSolved: false,
            selectedItem: null,
            audioCtx: null
        };

        // --- Audio System ---
        function initAudio() {
            if (!state.audioCtx) {
                state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(type) {
            if (!state.audioCtx) return;
            const ctx = state.audioCtx;
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(ctx.destination);
            
            if (type === 'click' || type === 'tap') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.1);
            } else if (type === 'win') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, ctx.currentTime);
                osc.frequency.setValueAtTime(600, ctx.currentTime + 0.1);
                osc.frequency.setValueAtTime(800, ctx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.5);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(250, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.3);
            }
        }

        function readInstruction() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const text = document.getElementById('instruction-text').innerText;
                speakText(text);
            }
        }

        function readEquation() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const q = state.questions[state.currentQIndex];
                const text = `${q.total} divided by ${q.plates} equals ${state.equationSolved ? q.answer : 'what'}`;
                speakText(text);
            }
        }

        function speakText(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 0.85; 
            msg.pitch = 1.1; 
            window.speechSynthesis.speak(msg);
        }

        // --- Game Logic ---
        function generateQuestions(diff) {
            let possible = [];
            let maxTotal = 12;
            let divisors = [];

            if (diff === 'easy') { maxTotal = 12; divisors = [2, 3]; }
            else if (diff === 'medium') { maxTotal = 20; divisors = [2, 3, 4, 5]; }
            else if (diff === 'challenge') { maxTotal = 30; divisors = [2, 3, 4, 5, 6]; }

            for (let d of divisors) {
                for (let ans = 1; ans <= 10; ans++) {
                    let total = d * ans;
                    if (total <= maxTotal && total > 0) {
                        possible.push({ total: total, plates: d, answer: ans });
                    }
                }
            }
            possible.sort(() => Math.random() - 0.5);
            return possible.slice(0, 10);
        }

        function startGame(diff) {
            initAudio();
            playSound('click');
            document.getElementById('header-area').style.display = 'flex';
            state.difficulty = diff;
            state.questions = generateQuestions(diff);
            state.currentQIndex = 0;
            state.score = 0;
            switchScreen('play-screen');
            loadQuestion();
        }

        function updateProgress() {
            const percent = (state.currentQIndex / 10) * 100;
            document.getElementById('progress-fill').style.width = percent + '%';
        }

        function loadQuestion() {
            state.selectedItem = null;
            state.equationSolved = false;
            updateProgress();
            
            // UI Reset
            document.getElementById('action-area').style.display = 'flex';
            document.getElementById('equation-area').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('options-grid').style.display = 'flex';
            
            const q = state.questions[state.currentQIndex];
            const currentItemDef = gameItems[state.currentQIndex % gameItems.length];
            
            document.getElementById('instruction-text').innerText = `Share ${q.total} ${currentItemDef.name} equally among ${q.plates} plates.`;
            setTimeout(() => { readInstruction(); }, 600); 
            
            const pool = document.getElementById('item-pool');
            const platesCont = document.getElementById('plates-container');
            pool.innerHTML = '';
            platesCont.innerHTML = '';

            // Add dynamic items
            for (let i = 0; i < q.total; i++) {
                const item = document.createElement('div');
                item.className = 'game-item';
                item.innerHTML = currentItemDef.svg;
                item.draggable = true;
                item.addEventListener('dragstart', handleDragStart);
                item.addEventListener('dragend', handleDragEnd);
                item.addEventListener('click', (e) => handleItemTap(e, item));
                pool.appendChild(item);
            }

            // Add plates
            for (let i = 0; i < q.plates; i++) {
                const plate = document.createElement('div');
                plate.className = 'plate';
                plate.addEventListener('dragover', handleDragOver);
                plate.addEventListener('dragleave', handleDragLeave);
                plate.addEventListener('drop', handleDrop);
                plate.addEventListener('click', () => handlePlateTap(plate));
                platesCont.appendChild(plate);
            }

            pool.addEventListener('click', () => handlePlateTap(pool));
        }

        // --- Interaction Handlers (Main Game) ---
        let draggedElement = null;

        function handleDragStart(e) { draggedElement = this; setTimeout(() => this.style.opacity = '0.5', 0); playSound('tap'); }
        function handleDragEnd(e) { setTimeout(() => this.style.opacity = '1', 0); draggedElement = null; }
        function handleDragOver(e) { e.preventDefault(); this.classList.add('highlight'); }
        function handleDragLeave(e) { this.classList.remove('highlight'); }
        function handleDrop(e) {
            e.preventDefault();
            this.classList.remove('highlight');
            if (draggedElement) { this.appendChild(draggedElement); playSound('tap'); }
        }

        function handleItemTap(e, item) {
            e.stopPropagation();
            playSound('tap');
            if (state.selectedItem === item) {
                item.classList.remove('selected');
                state.selectedItem = null;
            } else {
                if (state.selectedItem) state.selectedItem.classList.remove('selected');
                item.classList.add('selected');
                state.selectedItem = item;
            }
        }

        function handlePlateTap(container) {
            if (state.selectedItem) {
                container.appendChild(state.selectedItem);
                state.selectedItem.classList.remove('selected');
                state.selectedItem = null;
                playSound('tap');
            }
        }

        function showToast(msg, type) {
            const toast = document.getElementById('feedback-toast');
            toast.innerText = msg;
            toast.className = `feedback show ${type}`;
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function checkConcreteAnswer() {
            const q = state.questions[state.currentQIndex];
            const pool = document.getElementById('item-pool');
            const plates = document.querySelectorAll('.plate');

            if (pool.children.length > 0) {
                playSound('wrong');
                showToast("Use all the items!", "error");
                return;
            }

            let allEqual = true;
            let firstCount = plates[0].children.length;

            for (let i = 1; i < plates.length; i++) {
                if (plates[i].children.length !== firstCount) {
                    allEqual = false;
                    break;
                }
            }

            if (allEqual && firstCount === q.answer) {
                playSound('win');
                showToast("Great job!", "success");
                setTimeout(startEquationPhase, 1200);
            } else {
                playSound('wrong');
                showToast("Try again! Make them equal.", "error");
            }
        }

        // --- Abstract Phase (Equation) ---
        function startEquationPhase() {
            state.isFirstTryEq = true;
            const q = state.questions[state.currentQIndex];
            
            document.getElementById('action-area').style.display = 'none';
            document.getElementById('equation-area').style.display = 'flex';
            document.getElementById('equation-display').innerText = `${q.total} ÷ ${q.plates} = ?`;
            
            setTimeout(() => { readEquation(); }, 500); 
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';

            let options = new Set([q.answer]);
            while(options.size < 4) {
                let offset = Math.floor(Math.random() * 5) - 2; 
                if (offset === 0) offset = 3;
                let wrongAns = q.answer + offset;
                if (wrongAns > 0) options.add(wrongAns);
            }

            let optArray = Array.from(options).sort(() => Math.random() - 0.5);

            optArray.forEach(val => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-primary option-btn';
                btn.innerText = val;
                btn.onclick = () => checkEquationAnswer(val, q.answer, btn);
                grid.appendChild(btn);
            });
        }

        function checkEquationAnswer(selected, correct, btn) {
            if (selected === correct) {
                playSound('win');
                createConfetti(50); 
                btn.className = 'btn btn-success option-btn';
                document.getElementById('equation-display').innerText = `${state.questions[state.currentQIndex].total} ÷ ${state.questions[state.currentQIndex].plates} = ${correct}`;
                
                if (state.isFirstTryEq) state.score++;
                state.equationSolved = true;

                document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
                
                readEquation();
                document.getElementById('next-btn').style.display = 'block';

            } else {
                playSound('wrong');
                state.isFirstTryEq = false;
                btn.className = 'btn btn-danger option-btn shake';
                setTimeout(() => btn.classList.remove('shake'), 500);
            }
        }

        // --- Mini Game Feature: Ball Sort (Glass Tubes) ---
        let mgTubes = [];
        const TUBE_CAP = 4;
        let mgSelectedTube = null;

        function goToMinigame() {
            playSound('click');
            switchScreen('minigame-screen');
            initMinigame();
        }

        function initMinigame() {
            mgTubes = [[], [], [], [], []]; // 5 tubes total
            mgSelectedTube = null;
            
            let balls = [];
            // 3 Colors matching standard ball sort UI (Blue, Red, Green)
            const colors = ['#1CB0F6', '#FF4B4B', '#58CC02']; 
            colors.forEach(c => {
                for(let i=0; i<4; i++) balls.push(c);
            });
            
            balls.sort(() => Math.random() - 0.5);
            
            // Fill first 3 tubes with the 12 balls, leave 2 empty
            for(let i=0; i<12; i++) {
                mgTubes[Math.floor(i/4)].push(balls[i]);
            }
            
            renderTubes();
        }

        function renderTubes() {
            const container = document.getElementById('mg-tubes');
            container.innerHTML = '';
            
            mgTubes.forEach((tubeBalls, idx) => {
                const tubeEl = document.createElement('div');
                tubeEl.className = 'tube';
                if (mgSelectedTube === idx) tubeEl.classList.add('selected');
                
                tubeEl.onclick = () => mgTapTube(idx);
                
                // Render balls from bottom up
                tubeBalls.forEach(color => {
                    const ballEl = document.createElement('div');
                    ballEl.className = 'tube-ball';
                    ballEl.style.backgroundColor = color;
                    tubeEl.appendChild(ballEl);
                });
                
                container.appendChild(tubeEl);
            });
        }

        function mgTapTube(idx) {
            playSound('tap');
            if (mgSelectedTube === null) {
                // Select tube if it's not empty
                if (mgTubes[idx].length > 0) {
                    mgSelectedTube = idx;
                    renderTubes();
                }
            } else {
                if (mgSelectedTube === idx) {
                    // Deselect
                    mgSelectedTube = null;
                    renderTubes();
                } else {
                    let source = mgTubes[mgSelectedTube];
                    let target = mgTubes[idx];
                    let movingBall = source[source.length - 1];
                    
                    // Validate move: target must have space AND (be empty OR top ball matches color)
                    if (target.length < TUBE_CAP && (target.length === 0 || target[target.length - 1] === movingBall)) {
                        target.push(source.pop());
                        mgSelectedTube = null;
                        renderTubes();
                        checkMgWin();
                    } else {
                        // Invalid Move
                        playSound('wrong');
                        mgSelectedTube = null;
                        renderTubes();
                    }
                }
            }
        }

        function checkMgWin() {
            let completeTubes = 0;
            for (let tube of mgTubes) {
                if (tube.length === 0) continue;
                if (tube.length === TUBE_CAP) {
                    let allSame = tube.every(b => b === tube[0]);
                    if (allSame) completeTubes++;
                }
            }
            
            // We have 3 colors, so we need 3 complete tubes to win
            if (completeTubes === 3) {
                playSound('win');
                createConfetti(60);
                showToast("Great sorting!", "success");
                
                setTimeout(() => {
                    state.currentQIndex++;
                    if (state.currentQIndex < 10) {
                        switchScreen('play-screen');
                        loadQuestion();
                    } else {
                        showEndScreen();
                    }
                }, 2000);
            }
        }

        // --- End Screen & Utilities ---
        function showEndScreen() {
            document.getElementById('header-area').style.display = 'none';
            document.getElementById('final-score').innerText = `${state.score}/10`;
            const msgEl = document.getElementById('final-message');
            
            if (state.score >= 9) msgEl.innerText = "Amazing sharing!";
            else if (state.score >= 6) msgEl.innerText = "Great work!";
            else msgEl.innerText = "Good try! Let's practice again!";

            switchScreen('end-screen');
            createConfetti(150); 
        }

        function goToStart() {
            playSound('click');
            document.getElementById('header-area').style.display = 'none';
            switchScreen('start-screen');
        }

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function createConfetti(amount = 40) {
            const colors = ['#1CB0F6', '#58CC02', '#FF4B4B', '#FFC800', '#CE82FF'];
            for (let i = 0; i < amount; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = '-20px'; 
                
                const animDuration = Math.random() * 2 + 2;
                const rotation = Math.random() * 360;
                
                conf.style.transition = `top ${animDuration}s cubic-bezier(0.25, 0.46, 0.45, 0.94), transform ${animDuration}s linear`;
                
                document.body.appendChild(conf);
                
                setTimeout(() => {
                    conf.style.top = '120vh';
                    conf.style.transform = `rotate(${rotation}deg)`;
                }, 10);
                
                setTimeout(() => conf.remove(), animDuration * 1000);
            }
        }
    </script>
