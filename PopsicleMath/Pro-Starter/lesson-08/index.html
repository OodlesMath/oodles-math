<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Fun - Tens and Ones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to bottom, #AEE1F9, #F0F9FF);
            position: relative;
        }

        /* Fixed Background Canvas */
        #backgroundCanvas {
            display: block;
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        /* Colorful Typography */
        .text-rainbow {
            background: linear-gradient(45deg, #FF5722, #FFC107, #4CAF50, #2196F3, #9C27B0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* Improved Base-10 Blocks (Slightly smaller to fit screens nicely) */
        .ten-block {
            display: inline-flex;
            flex-direction: column;
            width: 18px;
            height: 90px;
            background: linear-gradient(to right, #2196F3, #03A9F4);
            border: 2px solid #01579B;
            margin: 2px;
            border-radius: 3px;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.3), inset -1px -1px 3px rgba(0,0,0,0.1);
            position: relative;
        }
        .ten-block-segment {
            flex: 1;
            border-bottom: 2px solid #01579B;
            box-sizing: border-box;
        }
        .ten-block-segment:last-child {
            border-bottom: none;
        }
        
        .one-block {
            display: inline-block;
            width: 15px;
            height: 15px;
            background: linear-gradient(to right, #E91E63, #F06292);
            border: 2px solid #880E4F;
            margin: 3px;
            border-radius: 3px;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.3), inset -1px -1px 3px rgba(0,0,0,0.1);
        }

        /* Table Styling */
        .math-table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            border: 4px solid #E0E0E0;
            overflow: hidden;
        }
        .math-table th {
            font-size: 1.5rem;
            padding: 10px;
            border-bottom: 4px solid #333;
            color: #333;
            font-weight: 800;
        }
        .math-table td {
            border: 2px solid #CCC;
            padding: 8px;
            vertical-align: middle;
        }
        .math-table tr:last-child td {
            border-bottom: none;
        }
        .math-table tr td:first-child {
            border-left: none;
        }
        .math-table tr td:last-child {
            border-right: none;
        }

        .operator-cell {
            font-size: 2.5rem;
            font-weight: 900;
            text-align: center;
            width: 50px;
            color: #FF5722;
        }
        .blocks-cell {
            text-align: center;
            min-height: 100px;
        }

        /* Fancy Buttons - Unified Pastel Blue Style */
        .btn-fancy {
            background-color: #E3F2FD; /* Light Blue */
            border: 4px solid #90CAF9;
            border-bottom-width: 6px;
            border-radius: 16px;
            font-weight: 800;
            color: #1565C0; /* Dark Blue Text */
            transition: all 0.1s;
            cursor: pointer;
        }
        
        .btn-fancy:hover:not(:disabled) { 
            background-color: #BBDEFB; 
            border-color: #64B5F6; 
        }

        .btn-fancy:active:not(:disabled) {
            transform: translateY(3px);
            border-bottom-width: 3px;
            margin-bottom: 3px;
        }

        /* Feedback Buttons */
        .btn-correct {
            background-color: #E8F5E9 !important;
            border-color: #4CAF50 !important;
            color: #2E7D32 !important;
        }
        .btn-wrong {
            background-color: #FFEBEE !important;
            border-color: #F44336 !important;
            color: #C62828 !important;
        }

        /* Speaker Icon */
        .speaker-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #2196F3;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 4px 0 #1976D2;
            margin-left: 10px;
        }
        .speaker-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #1976D2;
        }
        .speaker-btn:hover {
            background-color: #42A5F5;
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px) rotate(-5deg); }
            75% { transform: translateX(10px) rotate(5deg); }
        }
        .shake { animation: shake 0.4s ease-in-out; }
        
        @keyframes bounce-in {
            0% { transform: scale(0.5); opacity: 0; }
            60% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); }
        }
        .bounce-in { animation: bounce-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* Main Container setup for perfect fit without scroll */
        .game-container {
            width: 95%;
            max-width: 800px;
            max-height: 96vh;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            border: 8px solid white;
            z-index: 10;
            margin: auto;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow-y: auto; /* Fallback for very small screens */
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- Stunning Animated Background Canvas -->
    <canvas id="backgroundCanvas" aria-label="Background with sky, rainbow, grass, flowers, butterflies, and trees"></canvas>

    <!-- Audio Elements for Sound Effects -->
    <audio id="sfx-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" preload="auto"></audio>
    <audio id="sfx-wrong" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3" preload="auto"></audio>
    <audio id="sfx-win" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3" preload="auto"></audio>
    <audio id="sfx-pop" src="https://assets.mixkit.co/active_storage/sfx/2004/2004-preview.mp3" preload="auto"></audio>

    <div class="game-container p-3 md:p-6">

        <!-- SETUP SCREEN -->
        <div id="setup-screen" class="text-center w-full py-2">
            <h1 class="text-4xl md:text-5xl font-black mb-2 text-rainbow pb-1">Math Fun! 🌟</h1>
            <p class="text-gray-600 mb-4 md:mb-6 text-lg md:text-xl font-bold">Let's practice our math skills!</p>
            
            <div class="space-y-4 md:space-y-5 max-w-sm mx-auto text-left bg-white p-4 md:p-6 rounded-3xl shadow-lg border-4 border-blue-100">
                <!-- Operation Select -->
                <div>
                    <label class="block text-gray-800 font-extrabold mb-2 text-lg">Operation:</label>
                    <select id="operation-select" class="w-full p-3 rounded-xl border-4 border-purple-200 focus:outline-none focus:border-purple-500 text-lg font-bold text-gray-700 bg-purple-50 cursor-pointer">
                        <option value="add">Addition (+)</option>
                        <option value="sub">Subtraction (-)</option>
                        <option value="mix">Mix (+ / -)</option>
                    </select>
                </div>

                <!-- Number Range Select -->
                <div>
                    <label class="block text-gray-800 font-extrabold mb-2 text-lg">Number Range:</label>
                    <select id="range-select" class="w-full p-3 rounded-xl border-4 border-blue-200 focus:outline-none focus:border-blue-500 text-lg font-bold text-gray-700 bg-blue-50 cursor-pointer">
                        <option value="20-30">20 to 30</option>
                        <option value="30-50">30 to 50</option>
                        <option value="50-100">50 to 100</option>
                    </select>
                </div>

                <!-- Difficulty Select -->
                <div>
                    <label class="block text-gray-800 font-extrabold mb-2 text-lg">Difficulty:</label>
                    <div class="flex flex-col space-y-3">
                        <label class="flex items-center cursor-pointer p-3 border-4 border-green-200 rounded-xl hover:bg-green-50 transition">
                            <input type="radio" name="regrouping" value="false" checked class="w-5 h-5 text-green-600 accent-green-500">
                            <span class="ml-3 text-lg font-bold text-gray-700">No Regrouping</span>
                        </label>
                        <label class="flex items-center cursor-pointer p-3 border-4 border-orange-200 rounded-xl hover:bg-orange-50 transition">
                            <input type="radio" name="regrouping" value="true" class="w-5 h-5 text-orange-600 accent-orange-500">
                            <span class="ml-3 text-lg font-bold text-gray-700">With Regrouping</span>
                        </label>
                    </div>
                </div>

                <button onclick="startGame()" class="w-full mt-4 bg-gradient-to-b from-[#78C800] to-[#58A700] hover:from-[#88D810] hover:to-[#68B710] text-white font-black py-4 px-6 rounded-2xl text-2xl shadow-[0_6px_0_#468200] active:shadow-[0_0px_0_#468200] active:translate-y-1 transition-all">
                    START! 🚀
                </button>
            </div>
        </div>

        <!-- GAME SCREEN -->
        <div id="game-screen" class="hidden w-full flex-grow flex flex-col relative py-1 justify-between">

            <!-- Header Panel -->
            <div class="flex justify-between items-center mb-3 w-full max-w-xl mx-auto">
                <div class="flex items-center gap-2 bg-white px-4 py-2 rounded-xl border-4 border-gray-200 font-black text-gray-500 text-lg shadow-sm">
                    <i class="fas fa-list-ol text-blue-400"></i>
                    <span id="question-counter">1/10</span>
                </div>
                <div class="flex items-center gap-2 bg-white px-4 py-2 rounded-xl border-4 border-yellow-300 font-black text-yellow-500 text-lg shadow-sm">
                    <i class="fas fa-star text-yellow-400"></i>
                    <span id="score-display">0</span>
                </div>
            </div>

            <!-- Visual Area (Table) -->
            <div class="mb-4 bounce-in flex-grow flex items-center justify-center min-h-[160px]" id="visual-area">
                <table class="math-table">
                    <thead>
                        <tr>
                            <th class="border-0 bg-gray-50 rounded-tl-xl w-[15%]"></th>
                            <th class="border-0 bg-blue-50 text-blue-700 w-[42.5%]">Tens</th>
                            <th class="border-0 bg-pink-50 text-pink-700 w-[42.5%] rounded-tr-xl">Ones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="operator-cell border-t-4 border-gray-300"></td>
                            <td class="blocks-cell border-t-4 border-gray-300 bg-blue-50/30" id="tens-row-1"></td>
                            <td class="blocks-cell border-t-4 border-gray-300 bg-pink-50/30" id="ones-row-1"></td>
                        </tr>
                        <tr>
                            <td class="operator-cell" id="operator-display">+</td>
                            <td class="blocks-cell bg-blue-50/30" id="tens-row-2"></td>
                            <td class="blocks-cell bg-pink-50/30" id="ones-row-2"></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Interaction Area -->
            <div id="interaction-area" class="text-center w-full max-w-xl mx-auto pb-2">
                <div class="flex items-center justify-center mb-4 min-h-[40px]">
                    <h2 id="question-text" class="text-2xl md:text-3xl font-black text-gray-700">Choose the right math:</h2>
                    <button id="speak-btn" onclick="speakQuestion()" class="speaker-btn ml-3" title="Listen to question">
                        <i class="fas fa-volume-up text-lg"></i>
                    </button>
                </div>
                
                <div id="options-grid" class="grid grid-cols-2 gap-3 md:gap-4 w-full">
                    <!-- Buttons rendered by JS -->
                </div>
            </div>
            
            <!-- Toast Feedback -->
            <div id="feedback-toast" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 hidden px-8 py-5 rounded-3xl font-black text-3xl shadow-2xl z-50 transition-all duration-300 border-4 border-white">
                Feedback
            </div>
        </div>

        <!-- RESULT SCREEN -->
        <div id="result-screen" class="hidden w-full text-center py-8 relative flex-grow flex flex-col justify-center">
            <h1 class="text-5xl md:text-6xl font-black text-rainbow mb-6 bounce-in">Awesome! 🎉</h1>
            <p class="text-2xl text-gray-700 font-bold mb-6">You finished 10 questions!</p>
            
            <div class="inline-block bg-white p-6 rounded-3xl border-8 border-yellow-400 shadow-xl mb-8">
                <div class="text-xl text-gray-500 font-black uppercase tracking-wider mb-2">Total Score</div>
                <div class="text-6xl font-black text-yellow-500 flex items-center justify-center gap-4">
                    <i class="fas fa-star"></i>
                    <span id="final-score">0</span>
                </div>
            </div>
            
            <div>
                <button onclick="returnToSetup()" class="bg-gradient-to-b from-[#1CB0F6] to-[#1899D6] hover:from-[#2BC0FF] hover:to-[#1CB0F6] text-white font-black py-4 px-8 rounded-2xl text-2xl shadow-[0_6px_0_#147BB0] active:shadow-[0_0px_0_#147BB0] active:translate-y-1 transition-all">
                    PLAY AGAIN 🔄
                </button>
            </div>
        </div>

    </div>

    <!-- BACKGROUND SCRIPT (Ver 6 Template) -->
    <script>
        (() => {
            const bgCanvas = document.getElementById('backgroundCanvas');
            const bgCtx = bgCanvas.getContext('2d', { alpha: false });
            let bgWidth = 0; let bgHeight = 0;
            let bgClouds = []; let bgTrees = []; let bgFlowers = []; let bgButterflies = [];
            const flowerColors = ['#ff4b4b', '#ffc800', '#ce82ff', '#ffffff', '#1cb0f6', '#ff8fab'];

            function resizeBackgroundCanvas() {
                const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
                bgWidth = window.innerWidth;
                bgHeight = window.innerHeight;
                bgCanvas.width = Math.floor(bgWidth * dpr);
                bgCanvas.height = Math.floor(bgHeight * dpr);
                bgCanvas.style.width = bgWidth + 'px';
                bgCanvas.style.height = bgHeight + 'px';
                bgCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
                generateBackgroundEnvironment();
            }

            function generateBackgroundEnvironment() {
                bgClouds = []; bgTrees = []; bgFlowers = []; bgButterflies = [];
                const cloudCount = bgWidth < 600 ? 3 : 5;
                for (let i = 0; i < cloudCount; i++) {
                    bgClouds.push({
                        x: Math.random() * bgWidth,
                        y: bgHeight * (0.08 + Math.random() * 0.34),
                        size: 28 + Math.random() * (bgWidth < 600 ? 34 : 52),
                        speed: Math.random() * 0.16 + 0.05,
                        opacity: 0.72 + Math.random() * 0.24
                    });
                }
                const treeCount = bgWidth < 600 ? 6 : 11;
                for (let i = 0; i < treeCount; i++) {
                    bgTrees.push({
                        x: (i / Math.max(1, treeCount - 1)) * bgWidth + (Math.random() * 70 - 35),
                        y: bgHeight * (0.66 + Math.random() * 0.04),
                        scale: 0.48 + Math.random() * 0.56
                    });
                }
                const flowerCount = bgWidth < 600 ? 10 : 18;
                for (let i = 0; i < flowerCount; i++) {
                    bgFlowers.push({
                        x: Math.random() * bgWidth,
                        y: bgHeight * 0.80 + Math.random() * (bgHeight * 0.16),
                        color: flowerColors[Math.floor(Math.random() * flowerColors.length)],
                        scale: 0.42 + Math.random() * 0.42,
                        sway: Math.random() * Math.PI * 2,
                        petals: Math.random() > 0.45 ? 6 : 5
                    });
                }
                for (let i = 0; i < 4; i++) {
                    bgButterflies.push({
                        x: Math.random() * bgWidth,
                        y: bgHeight * (0.28 + Math.random() * 0.24),
                        size: 5 + Math.random() * 4,
                        speed: 0.18 + Math.random() * 0.18,
                        phase: Math.random() * Math.PI * 2,
                        color: ['#ff6b9d', '#ffd93d', '#9b5de5', '#00bbf9'][i % 4]
                    });
                }
            }

            function updateBackground() {
                bgClouds.forEach(cloud => {
                    cloud.x -= cloud.speed;
                    if (cloud.x + cloud.size * 2.4 < 0) {
                        cloud.x = bgWidth + cloud.size * 2.4;
                        cloud.y = bgHeight * (0.08 + Math.random() * 0.34);
                    }
                });
                bgButterflies.forEach(b => {
                    b.x += b.speed;
                    b.phase += 0.08;
                    if (b.x > bgWidth + 30) {
                        b.x = -30;
                        b.y = bgHeight * (0.28 + Math.random() * 0.24);
                    }
                });
            }

            function drawRoundedCloud(cloud) {
                bgCtx.save();
                bgCtx.globalAlpha = cloud.opacity;
                bgCtx.fillStyle = '#ffffff';
                bgCtx.beginPath();
                bgCtx.arc(cloud.x, cloud.y, cloud.size, 0, Math.PI * 2);
                bgCtx.arc(cloud.x + cloud.size * 0.82, cloud.y + cloud.size * 0.2, cloud.size * 0.72, 0, Math.PI * 2);
                bgCtx.arc(cloud.x - cloud.size * 0.85, cloud.y + cloud.size * 0.22, cloud.size * 0.68, 0, Math.PI * 2);
                bgCtx.arc(cloud.x + cloud.size * 0.15, cloud.y - cloud.size * 0.28, cloud.size * 0.72, 0, Math.PI * 2);
                bgCtx.fill();
                bgCtx.restore();
            }

            function drawSun() {
                const x = Math.min(90, bgWidth * 0.12);
                const y = Math.min(92, bgHeight * 0.13);
                const r = Math.max(35, Math.min(bgWidth, bgHeight) * 0.055);
                bgCtx.save();
                bgCtx.translate(x, y);
                bgCtx.fillStyle = 'rgba(255, 213, 82, 0.22)';
                bgCtx.beginPath();
                bgCtx.arc(0, 0, r * 1.75, 0, Math.PI * 2);
                bgCtx.fill();
                bgCtx.fillStyle = '#FFD369';
                bgCtx.beginPath();
                bgCtx.arc(0, 0, r, 0, Math.PI * 2);
                bgCtx.fill();
                bgCtx.fillStyle = '#D35400';
                bgCtx.beginPath();
                bgCtx.arc(-r * 0.32, -r * 0.1, r * 0.08, 0, Math.PI * 2);
                bgCtx.arc(r * 0.32, -r * 0.1, r * 0.08, 0, Math.PI * 2);
                bgCtx.fill();
                bgCtx.strokeStyle = '#D35400';
                bgCtx.lineWidth = Math.max(3, r * 0.07);
                bgCtx.lineCap = 'round';
                bgCtx.beginPath();
                bgCtx.arc(0, r * 0.12, r * 0.36, 0.15 * Math.PI, 0.85 * Math.PI);
                bgCtx.stroke();
                bgCtx.restore();
            }

            function drawRainbow() {
                bgCtx.save();
                // Shifted left (from 0.5 to 0.35)
                bgCtx.translate(bgWidth * 0.35, bgHeight * 0.67);
                bgCtx.lineWidth = Math.max(13, Math.min(22, bgWidth * 0.015));
                bgCtx.lineCap = 'round';
                const rainbowColors = ['#ff4b4b', '#ff9900', '#ffc800', '#58cc02', '#1cb0f6', '#ce82ff'];
                // Increased baseRadius by 20%
                const baseRadius = Math.min(bgWidth * 0.408, bgHeight * 0.552, 504); 
                for (let i = 0; i < rainbowColors.length; i++) {
                    bgCtx.strokeStyle = rainbowColors[i];
                    bgCtx.globalAlpha = 0.82;
                    bgCtx.beginPath();
                    bgCtx.arc(0, 0, baseRadius - i * bgCtx.lineWidth, Math.PI, 0);
                    bgCtx.stroke();
                }
                bgCtx.restore();
            }

            function drawTree(tree) {
                bgCtx.save();
                bgCtx.translate(tree.x, tree.y);
                bgCtx.scale(tree.scale, tree.scale);
                bgCtx.fillStyle = '#8B5A2B';
                bgCtx.fillRect(-9, 0, 18, 56);
                bgCtx.fillStyle = '#4ade80';
                bgCtx.beginPath();
                bgCtx.arc(0, -24, 38, 0, Math.PI * 2);
                bgCtx.arc(-25, -12, 29, 0, Math.PI * 2);
                bgCtx.arc(24, -10, 30, 0, Math.PI * 2);
                bgCtx.fill();
                bgCtx.fillStyle = 'rgba(255,255,255,0.28)';
                bgCtx.beginPath();
                bgCtx.arc(-12, -34, 12, 0, Math.PI * 2);
                bgCtx.fill();
                bgCtx.restore();
            }

            function drawFlower(flower, time) {
                bgCtx.save();
                const sway = Math.sin(time * 0.0015 + flower.sway) * 1.4;
                bgCtx.translate(flower.x + sway, flower.y);
                bgCtx.scale(flower.scale, flower.scale);
                bgCtx.strokeStyle = '#259a3f'; bgCtx.lineWidth = 2.4; bgCtx.lineCap = 'round';
                bgCtx.beginPath(); bgCtx.moveTo(0, 5); bgCtx.quadraticCurveTo(2, 14, 0, 23); bgCtx.stroke();
                bgCtx.fillStyle = '#55d85a';
                bgCtx.beginPath();
                bgCtx.ellipse(-6, 15, 4, 8, -0.8, 0, Math.PI * 2);
                bgCtx.ellipse(6, 18, 4, 8, 0.75, 0, Math.PI * 2);
                bgCtx.fill();
                const petalCount = flower.petals || 6;
                bgCtx.fillStyle = flower.color;
                for (let petal = 0; petal < petalCount; petal++) {
                    bgCtx.save();
                    bgCtx.rotate((Math.PI * 2 * petal) / petalCount);
                    bgCtx.beginPath();
                    bgCtx.ellipse(0, -9, 5.2, 9.5, 0, 0, Math.PI * 2);
                    bgCtx.fill();
                    bgCtx.restore();
                }
                bgCtx.fillStyle = '#ffe066';
                bgCtx.beginPath(); bgCtx.arc(0, 0, 5, 0, Math.PI * 2); bgCtx.fill();
                bgCtx.strokeStyle = 'rgba(154,103,0,0.28)'; bgCtx.lineWidth = 1; bgCtx.stroke();
                bgCtx.restore();
            }

            function drawButterfly(b) {
                const y = b.y + Math.sin(b.phase) * 10;
                bgCtx.save(); bgCtx.translate(b.x, y); bgCtx.fillStyle = b.color; bgCtx.globalAlpha = 0.88;
                bgCtx.beginPath();
                bgCtx.ellipse(-b.size, 0, b.size, b.size * 1.35, Math.sin(b.phase) * 0.5, 0, Math.PI * 2);
                bgCtx.ellipse(b.size, 0, b.size, b.size * 1.35, -Math.sin(b.phase) * 0.5, 0, Math.PI * 2);
                bgCtx.fill();
                bgCtx.strokeStyle = '#334155'; bgCtx.lineWidth = 1.4;
                bgCtx.beginPath(); bgCtx.moveTo(0, -b.size * 1.1); bgCtx.lineTo(0, b.size * 1.2); bgCtx.stroke();
                bgCtx.restore();
            }

            function drawBackground(time = 0) {
                const skyGradient = bgCtx.createLinearGradient(0, 0, 0, bgHeight * 0.72);
                skyGradient.addColorStop(0, '#7dd3fc');
                skyGradient.addColorStop(0.62, '#bae6fd');
                skyGradient.addColorStop(1, '#e0f8ff');
                bgCtx.fillStyle = skyGradient;
                bgCtx.fillRect(0, 0, bgWidth, bgHeight);

                drawSun(); drawRainbow();
                bgClouds.forEach(drawRoundedCloud); bgButterflies.forEach(drawButterfly);

                bgCtx.fillStyle = '#65a30d';
                bgCtx.beginPath(); bgCtx.moveTo(0, bgHeight); bgCtx.lineTo(0, bgHeight * 0.66);
                for (let x = 0; x <= bgWidth + 280; x += 280) { bgCtx.quadraticCurveTo(x - 140, bgHeight * 0.55, x, bgHeight * 0.66); }
                bgCtx.lineTo(bgWidth, bgHeight); bgCtx.fill();

                bgTrees.forEach(drawTree);

                bgCtx.fillStyle = '#58cc02';
                bgCtx.beginPath(); bgCtx.moveTo(0, bgHeight); bgCtx.lineTo(0, bgHeight * 0.72);
                bgCtx.quadraticCurveTo(bgWidth * 0.5, bgHeight * 0.66, bgWidth, bgHeight * 0.72);
                bgCtx.lineTo(bgWidth, bgHeight); bgCtx.fill();

                bgCtx.strokeStyle = '#84cc16'; bgCtx.lineWidth = Math.max(10, Math.min(18, bgWidth * 0.014)); bgCtx.lineCap = 'round';
                bgCtx.beginPath(); bgCtx.moveTo(-20, bgHeight * 0.72);
                bgCtx.quadraticCurveTo(bgWidth * 0.5, bgHeight * 0.66, bgWidth + 20, bgHeight * 0.72); bgCtx.stroke();

                bgFlowers.forEach(flower => drawFlower(flower, time));
            }

            function backgroundAnimationLoop(time) {
                updateBackground(); drawBackground(time);
                requestAnimationFrame(backgroundAnimationLoop);
            }
            window.addEventListener('resize', resizeBackgroundCanvas);
            resizeBackgroundCanvas(); requestAnimationFrame(backgroundAnimationLoop);
        })();
    </script>

    <!-- GAME LOGIC SCRIPT -->
    <script>
        const TOTAL_QUESTIONS = 10;
        let questions = [];
        let currentQIndex = 0;
        let score = 0;
        let currentPhase = 1; 
        let failedCurrentPhase = false;
        
        // Audio elements
        const sfxCorrect = document.getElementById('sfx-correct');
        const sfxWrong = document.getElementById('sfx-wrong');
        const sfxWin = document.getElementById('sfx-win');
        const sfxPop = document.getElementById('sfx-pop');

        function playSound(audioEl) {
            if(!audioEl) return;
            audioEl.currentTime = 0;
            audioEl.play().catch(e => console.log("Audio block:", e));
        }

        // TTS (Text-to-Speech)
        function speakQuestion() {
            if (!window.speechSynthesis) return;
            const q = questions[currentQIndex];
            let textToSpeak = "";
            let opWord = q.operator === '+' ? 'plus' : 'minus';
            
            if (currentPhase === 1) {
                textToSpeak = "Choose the correct math sentence for the blocks.";
            } else {
                textToSpeak = `What is ${q.num1} ${opWord} ${q.num2}?`;
            }

            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'en-US'; utterance.rate = 0.9; utterance.pitch = 1.2;
            
            const voices = window.speechSynthesis.getVoices();
            const englishVoices = voices.filter(v => v.lang.startsWith('en'));
            if(englishVoices.length > 0) {
                utterance.voice = englishVoices.find(v => v.name.includes('Female') || v.name.includes('Google')) || englishVoices[0];
            }
            window.speechSynthesis.speak(utterance);
        }
        window.speechSynthesis.onvoiceschanged = function() { window.speechSynthesis.getVoices(); };

        // Generate Math Logic with + and - support
        function generateQuestions(rangeStr, isRegrouping, opType) {
            let qArray = [];
            let [minRange, maxRange] = rangeStr.split('-').map(Number);
            let attempts = 0;
            let usedKeys = new Set();

            while (qArray.length < TOTAL_QUESTIONS && attempts < 2000) {
                attempts++;
                
                // Determine operation for this iteration
                let op = opType === 'mix' ? (Math.random() > 0.5 ? '+' : '-') : (opType === 'add' ? '+' : '-');
                
                let num1, num2, answer;
                let t1, o1, t2, o2;

                if (op === '+') {
                    answer = Math.floor(Math.random() * (maxRange - minRange + 1)) + minRange;
                    let minNum = answer > 20 ? 10 : 1; 
                    num1 = Math.floor(Math.random() * (answer - minNum - 10)) + 10; 
                    if(num1 <= 0 || num1 >= answer) continue;
                    num2 = answer - num1;
                } else {
                    // For Subtraction, we start with a large number (num1) inside the target range
                    num1 = Math.floor(Math.random() * (maxRange - minRange + 1)) + minRange;
                    let minNum = 10;
                    num2 = Math.floor(Math.random() * (num1 - minNum - 5)) + minNum; 
                    if(num2 <= 0 || num2 >= num1) continue;
                    answer = num1 - num2;
                }

                t1 = Math.floor(num1 / 10); o1 = num1 % 10;
                t2 = Math.floor(num2 / 10); o2 = num2 % 10;

                let regroupConditionMet = false;
                if (op === '+') {
                    regroupConditionMet = isRegrouping ? (o1 + o2 >= 10) : (o1 + o2 < 10);
                } else {
                    regroupConditionMet = isRegrouping ? (o1 < o2) : (o1 >= o2);
                }

                if (!regroupConditionMet) continue;

                let key = `${num1}${op}${num2}`;
                if (usedKeys.has(key)) continue;
                usedKeys.add(key);
                
                let phase1Options = generatePhase1Options(num1, num2, op);
                let phase2Options = generatePhase2Options(answer);

                qArray.push({ num1, t1, o1, num2, t2, o2, answer, operator: op, phase1Options, phase2Options });
            }
            return qArray;
        }

        function generatePhase1Options(n1, n2, op) {
            let correct = `${n1} ${op} ${n2}`;
            let wrongOp = op === '+' ? '-' : '+';
            let options = [correct];
            
            let pool = [
                `${n1 + 10} ${op} ${n2}`, `${n1 - 10} ${op} ${n2}`,
                `${n1} ${op} ${n2 + 10}`, `${n1} ${op} ${n2 - 10}`,
                `${n1 + 1} ${op} ${n2}`, `${n1 - 1} ${op} ${n2}`,
                `${n1} ${op} ${n2 + 1}`, `${n1} ${op} ${n2 - 1}`,
                `${n1} ${wrongOp} ${n2}`, `${n2} ${op} ${n1}`
            ];

            // Filter out negatives/zeros or identical formulas
            pool = pool.filter(opt => {
                let match = opt.match(/(\d+)\s*[\+\-]\s*(\d+)/);
                if(!match) return false;
                let a = parseInt(match[1]); let b = parseInt(match[2]);
                return a > 0 && b > 0 && opt !== correct;
            });

            pool.sort(() => Math.random() - 0.5);

            for (let i = 0; i < pool.length; i++) {
                if (options.length < 4 && !options.includes(pool[i])) options.push(pool[i]);
            }
            return options.sort(() => Math.random() - 0.5);
        }

        function generatePhase2Options(answer) {
            let options = [answer];
            let pool = [ answer + 1, answer - 1, answer + 10, answer - 10, answer + 2, answer - 2, answer + 9, answer - 9 ];
            pool = pool.filter(val => val > 0 && val !== answer);
            pool.sort(() => Math.random() - 0.5);

            for (let i = 0; i < pool.length; i++) {
                if (options.length < 4 && !options.includes(pool[i])) options.push(pool[i]);
            }
            return options.sort(() => Math.random() - 0.5);
        }

        function renderBlocks(count, type) {
            let html = '';
            if (type === 'tens') {
                for (let i = 0; i < count; i++) {
                    html += `<div class="ten-block">${'<div class="ten-block-segment"></div>'.repeat(10)}</div>`;
                }
            } else {
                let layoutClass = count > 5 ? 'grid grid-cols-2 gap-1 justify-items-center inline-grid' : 'flex flex-wrap justify-center gap-1 max-w-[50px] mx-auto';
                html += `<div class="${layoutClass}">`;
                for (let i = 0; i < count; i++) html += `<div class="one-block"></div>`;
                html += `</div>`;
            }
            return html;
        }

        // --- Game Flow Control ---
        function startGame() {
            playSound(sfxPop);
            const opType = document.getElementById('operation-select').value;
            const range = document.getElementById('range-select').value;
            const regrouping = document.querySelector('input[name="regrouping"]:checked').value === 'true';

            questions = generateQuestions(range, regrouping, opType);
            if(questions.length < TOTAL_QUESTIONS) {
                questions = generateQuestions("20-100", regrouping, opType); // Fallback
            }

            currentQIndex = 0; score = 0; updateScoreDisplay();
            
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            
            loadQuestion();
        }

        function loadQuestion() {
            if (currentQIndex >= TOTAL_QUESTIONS) { endGame(); return; }

            const q = questions[currentQIndex];
            currentPhase = 1; failedCurrentPhase = false;

            document.getElementById('question-counter').innerText = `${currentQIndex + 1}/${TOTAL_QUESTIONS}`;
            
            // Draw blocks & update operator
            document.getElementById('tens-row-1').innerHTML = renderBlocks(q.t1, 'tens');
            document.getElementById('ones-row-1').innerHTML = renderBlocks(q.o1, 'ones');
            document.getElementById('operator-display').innerText = q.operator;
            document.getElementById('tens-row-2').innerHTML = renderBlocks(q.t2, 'tens');
            document.getElementById('ones-row-2').innerHTML = renderBlocks(q.o2, 'ones');

            const visualArea = document.getElementById('visual-area');
            visualArea.classList.remove('bounce-in'); void visualArea.offsetWidth; visualArea.classList.add('bounce-in');

            renderPhaseUI();
        }

        function renderPhaseUI() {
            const q = questions[currentQIndex];
            const titleEl = document.getElementById('question-text');
            const gridEl = document.getElementById('options-grid');
            gridEl.innerHTML = '';

            if (currentPhase === 1) {
                titleEl.innerText = "Choose the right math:";
                q.phase1Options.forEach((opt, index) => {
                    let btn = document.createElement('button');
                    // Unified Pastel Blue Color
                    btn.className = `btn-fancy py-3 md:py-4 px-3 text-2xl md:text-3xl w-full tracking-wider`;
                    btn.innerText = opt;
                    btn.onclick = () => checkAnswer(opt, btn);
                    gridEl.appendChild(btn);
                });
            } else if (currentPhase === 2) {
                let opWord = q.operator === '+' ? '+' : '-';
                titleEl.innerHTML = `<span class="text-blue-500">${q.num1} ${opWord} ${q.num2}</span> = ?`;
                q.phase2Options.forEach((opt, index) => {
                    let btn = document.createElement('button');
                    // Unified Pastel Blue Color
                    btn.className = `btn-fancy py-3 md:py-4 px-3 text-3xl md:text-4xl w-full`;
                    btn.innerText = opt;
                    btn.onclick = () => checkAnswer(opt, btn);
                    gridEl.appendChild(btn);
                });
                speakQuestion();
            }
        }

        function checkAnswer(selectedOpt, btnElement) {
            const q = questions[currentQIndex];
            let isCorrect = false;

            if (currentPhase === 1) {
                if (selectedOpt === `${q.num1} ${q.operator} ${q.num2}`) isCorrect = true;
            } else {
                if (parseInt(selectedOpt) === q.answer) isCorrect = true;
            }

            let allBtns = document.querySelectorAll('#options-grid button');
            allBtns.forEach(b => b.disabled = true);

            if (isCorrect) {
                playSound(sfxCorrect);
                btnElement.classList.add('btn-correct');
                showToast("Great Job! ⭐", "success");

                if (!failedCurrentPhase) { score += 1; updateScoreDisplay(); }

                setTimeout(() => {
                    if (currentPhase === 1) {
                        currentPhase = 2; failedCurrentPhase = false; renderPhaseUI();
                    } else {
                        currentQIndex++; loadQuestion();
                    }
                }, 1500);
            } else {
                playSound(sfxWrong);
                btnElement.classList.add('btn-wrong', 'shake');
                failedCurrentPhase = true; 
                showToast("Try Again! 🤔", "error");

                setTimeout(() => {
                    btnElement.classList.remove('shake', 'btn-wrong');
                    allBtns.forEach(b => b.disabled = false);
                }, 1000);
            }
        }

        function showToast(message, type) {
            const toast = document.getElementById('feedback-toast');
            toast.innerText = message;
            if (type === 'success') {
                toast.className = "fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 px-8 py-5 rounded-3xl font-black text-3xl md:text-4xl shadow-[0_10px_25px_rgba(0,0,0,0.3)] z-50 bg-[#88D810] text-white border-4 border-white bounce-in";
            } else {
                toast.className = "fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 px-8 py-5 rounded-3xl font-black text-3xl md:text-4xl shadow-[0_10px_25px_rgba(0,0,0,0.3)] z-50 bg-[#FF4B4B] text-white border-4 border-white shake";
            }
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => { toast.classList.add('hidden'); toast.style.opacity = '1'; }, 300);
            }, 1200);
        }

        function updateScoreDisplay() {
            const scoreDisplay = document.getElementById('score-display');
            scoreDisplay.innerText = score;
            scoreDisplay.parentElement.classList.add('bounce-in');
            setTimeout(() => { scoreDisplay.parentElement.classList.remove('bounce-in'); }, 500);
        }

        // --- End Game & Spectacular Confetti ---
        let confettiInterval = null;

        function endGame() {
            playSound(sfxWin);
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            triggerBeautifulConfetti();
        }

        function triggerBeautifulConfetti() {
            const duration = 8 * 1000; // 8 seconds of magic
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 10000, colors: ['#ff4b4b', '#ffc800', '#ce82ff', '#ffffff', '#1cb0f6', '#58cc02'] };

            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            // Big initial explosion from center
            confetti({ particleCount: 200, spread: 120, origin: { y: 0.5 }, zIndex: 10000, colors: defaults.colors });

            // Continuous elegant shower from sides
            if (confettiInterval) clearInterval(confettiInterval);
            confettiInterval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(confettiInterval);
                var particleCount = 40 * (timeLeft / duration);
                
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        function returnToSetup() {
            playSound(sfxPop);
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
            
            if (confettiInterval) clearInterval(confettiInterval);
            confetti.reset();
        }

    </script>
