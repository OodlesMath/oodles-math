<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cute Measurement Math Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #fdf2f8; /* pink-50 */
            touch-action: none; 
            overflow: hidden;
            background-image: radial-gradient(#fbcfe8 2px, transparent 2px);
            background-size: 30px 30px;
        }

        .cute-shadow {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .btn-cute {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 6px 0 0 rgba(0,0,0,0.15);
        }
        
        .btn-cute:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 0 rgba(0,0,0,0.15);
        }

        /* Cube track and snapping styling */
        #cube-track {
            border: 4px solid transparent; 
        }

        #cube-track.snapped {
            box-shadow: 0 0 25px 8px rgba(34, 197, 94, 0.5), 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: #22c55e;
            background-color: rgba(220, 252, 227, 0.95);
        }

        /* Animations */
        @keyframes bounce-float {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }
        .animate-float {
            animation: bounce-float 3s infinite ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .shake {
            animation: shake 0.4s ease-in-out;
        }

        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .pop-in {
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Catching Mini Game Styles */
        #basket {
            position: absolute;
            bottom: 20px;
            font-size: 80px;
            left: 50%;
            transform: translateX(-50%);
            user-select: none;
            z-index: 30;
            transition: left 0.05s ease-out;
        }
        .falling-fruit {
            position: absolute;
            font-size: 50px;
            user-select: none;
            z-index: 20;
            will-change: top;
        }

        /* Particles */
        .particle {
            position: absolute;
            pointer-events: none;
            animation: fall 1.5s linear forwards;
            z-index: 50;
        }
        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(200px) rotate(360deg); opacity: 0; }
        }
        
        @keyframes flash-red {
            0% { background-color: rgba(239, 68, 68, 0.4); }
            100% { background-color: transparent; }
        }
        
        .bomb-flash {
            animation: flash-red 0.4s ease-out;
        }
        
        .screen { display: none; }
        .active-screen { display: flex; }
    </style>
</head>
<body class="w-screen h-screen flex justify-center items-center p-2 sm:p-4">

    <!-- Container -->
    <div class="relative w-full max-w-4xl h-full max-h-[850px] bg-gradient-to-b from-white to-blue-50 sm:rounded-3xl cute-shadow overflow-hidden flex flex-col border-4 border-white">
        
        <!-- HEADER / STATS -->
        <div id="header" class="hidden p-4 glass-panel flex justify-between items-center border-b-4 border-blue-100 z-20">
            <div class="flex items-center gap-4">
                <img src="https://image2url.com/r2/default/images/1770270908168-036a8878-e468-415d-9a50-73d8cbcc8574.png" alt="Logo" class="h-12 object-contain filter drop-shadow-sm">
                <div class="text-xl font-bold text-pink-500 bg-pink-50 px-5 py-2 rounded-full shadow-inner border-2 border-pink-100">
                    Round: <span id="round-display">1</span>/10
                </div>
            </div>
            <div class="text-xl font-black text-amber-500 bg-amber-50 px-5 py-2 rounded-full shadow-inner border-2 border-amber-100 flex items-center gap-2">
                ⭐ <span id="score-display">0</span>
            </div>
        </div>

        <!-- 1. START SCREEN -->
        <div id="screen-start" class="screen active-screen flex-col items-center justify-center h-full p-8 text-center bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 relative overflow-hidden">
            <!-- Decorative background elements -->
            <div class="absolute top-10 left-10 text-6xl opacity-20 transform -rotate-12">🍎</div>
            <div class="absolute bottom-20 right-10 text-6xl opacity-20 transform rotate-12">📏</div>
            
            <img src="https://image2url.com/r2/default/images/1770270908168-036a8878-e468-415d-9a50-73d8cbcc8574.png" alt="Logo" class="h-28 object-contain mb-8 drop-shadow-md animate-float">
            <h1 class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-pink-500 mb-6 drop-shadow-sm">Measure & Play!</h1>
            <div class="text-[100px] mb-10 animate-float" style="animation-delay: 0.5s;">🦒📏</div>
            <button onclick="startGame()" class="btn-cute bg-gradient-to-b from-green-400 to-green-500 hover:from-green-500 hover:to-green-600 text-white font-black text-4xl py-5 px-16 rounded-full border-4 border-green-600 tracking-wide z-10">
                START PLAYING
            </button>
        </div>

        <!-- 2. GAME SCREEN -->
        <div id="screen-game" class="screen flex-col h-full relative">
            
            <!-- Measuring Area -->
            <div id="measure-area" class="flex-grow relative w-full overflow-hidden flex flex-col items-center justify-center gap-8 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-opacity-50">
                
                <!-- Dynamic Layout Wrapper for Object & Cubes -->
                <div id="measurement-wrapper" class="w-fit flex flex-col items-start gap-4 p-4 mx-auto transition-all duration-500">
                    <!-- Object to measure will be injected here -->
                    <div id="object-container" class="relative z-10 flex items-end"></div>
                    
                    <!-- Cube Track -->
                    <div id="cube-track" class="flex items-center min-h-[60px] min-w-[60px] rounded-xl transition-all duration-300 p-2 border-4 border-transparent">
                        <!-- Cubes injected by JS -->
                    </div>
                </div>

                <!-- Controls (Nút 3D chuyên nghiệp) -->
                <div class="flex gap-8 z-30 bg-white/80 p-5 rounded-[2rem] backdrop-blur-md shadow-lg border-2 border-white/90">
                    <button onclick="removeCube()" class="relative w-20 h-20 bg-gradient-to-b from-red-400 to-red-600 hover:from-red-500 hover:to-red-700 rounded-full shadow-[0_8px_0_rgb(185,28,28)] active:shadow-[0_0px_0_rgb(185,28,28)] active:translate-y-2 transition-all flex items-center justify-center border-4 border-white">
                        <svg class="w-10 h-10 text-white drop-shadow-md" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="5" d="M20 12H4"></path></svg>
                    </button>
                    <button onclick="addCube()" class="relative w-20 h-20 bg-gradient-to-b from-green-400 to-green-600 hover:from-green-500 hover:to-green-700 rounded-full shadow-[0_8px_0_rgb(21,128,61)] active:shadow-[0_0px_0_rgb(21,128,61)] active:translate-y-2 transition-all flex items-center justify-center border-4 border-white">
                        <svg class="w-10 h-10 text-white drop-shadow-md" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="5" d="M12 4v16m8-8H4"></path></svg>
                    </button>
                </div>
            </div>

            <!-- Input Area -->
            <div class="glass-panel rounded-t-[40px] shadow-[0_-15px_30px_rgba(0,0,0,0.05)] p-8 z-30 border-t-4 border-white relative">
                <div class="flex flex-wrap justify-center items-center gap-4 text-3xl md:text-4xl font-bold text-gray-600">
                    <span>It's</span>
                    <input type="number" id="answer-input" class="w-24 md:w-32 text-center border-4 border-blue-200 rounded-2xl focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 text-blue-600 py-3 shadow-inner bg-white/90 font-black transition-all" placeholder="?">
                    <span>cm</span>
                    <span id="dimension-text" class="text-pink-500 underline decoration-wavy decoration-pink-300 decoration-4 underline-offset-8">long</span>.
                    
                    <!-- TTS Audio Button (Hidden initially) -->
                    <button id="tts-btn" type="button" onclick="speakSentence()" class="hidden ml-2 text-5xl hover:scale-110 active:scale-95 transition-transform drop-shadow-md" title="Listen again">
                        🔊
                    </button>
                </div>
                
                <div class="mt-8 flex justify-center">
                    <button onclick="checkAnswer()" class="btn-cute bg-gradient-to-b from-blue-400 to-blue-500 hover:from-blue-500 hover:to-blue-600 text-white font-black text-3xl py-4 px-12 rounded-full border-4 border-blue-600 w-full max-w-md tracking-wide">
                        Check Answer ✔️
                    </button>
                </div>
            </div>
        </div>

        <!-- 3. CATCHING MINIGAME SCREEN -->
        <div id="screen-minigame" class="screen flex-col h-full relative overflow-hidden bg-gradient-to-b from-sky-200 to-green-200 cursor-none">
            <div class="absolute top-6 left-6 text-2xl font-black text-green-700 bg-white/90 px-6 py-3 rounded-full z-30 shadow-md border-4 border-green-300">
                🍎 <span id="catch-score">0</span>
            </div>
             <div class="absolute top-6 right-6 text-2xl font-black text-red-600 bg-white/90 px-6 py-3 rounded-full z-30 shadow-md border-4 border-red-300">
                ⏳ <span id="catch-timer">15</span>s
            </div>
            <h2 class="text-center mt-28 text-6xl font-black text-orange-500 drop-shadow-[0_5px_5px_rgba(0,0,0,0.2)] z-30 pointer-events-none pop-in tracking-wider" style="-webkit-text-stroke: 2px white;">CATCH THE FRUIT!</h2>

            <div id="catching-area" class="flex-grow relative w-full h-full" onmousemove="moveBasket(event)" ontouchmove="moveBasket(event)">
                 <div id="basket" class="drop-shadow-lg">🧺</div>
                 <div id="fruits-container" class="absolute inset-0 pointer-events-none z-20"></div>
            </div>
        </div>

        <!-- 4. END SCREEN -->
        <div id="screen-end" class="screen flex-col items-center justify-center h-full p-8 text-center bg-gradient-to-b from-yellow-100 to-orange-100 relative overflow-hidden">
            <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-30"></div>
            <h1 class="text-6xl font-black text-orange-500 mb-6 pop-in z-10" style="-webkit-text-stroke: 2px white;">Awesome Job! 🎉</h1>
            <div class="text-[120px] mb-8 animate-float z-10">🏆</div>
            <p class="text-3xl text-gray-700 font-bold mb-6 z-10">You are a measurement master!</p>
            <div class="text-5xl font-black text-blue-600 bg-white px-10 py-5 rounded-full cute-shadow border-4 border-blue-300 mb-12 z-10">
                Score: <span id="final-score">0</span> ⭐
            </div>
            <button onclick="resetGame()" class="btn-cute bg-gradient-to-b from-pink-400 to-pink-500 hover:from-pink-500 hover:to-pink-600 text-white font-black text-3xl py-5 px-16 rounded-full border-4 border-pink-600 z-10 tracking-wide">
                Play Again 🔄
            </button>
        </div>

    </div>

    <script>
        // --- SOUND EFFECTS (Web Audio API) ---
        const SoundManager = {
            ctx: null,
            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            play(type) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                const now = this.ctx.currentTime;
                
                if (type === 'snap') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, now);
                    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now); osc.stop(now + 0.1);
                } else if (type === 'correct') {
                    // Happy Ting Ting
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, now); // C5
                    osc.frequency.setValueAtTime(659.25, now + 0.1); // E5
                    osc.frequency.setValueAtTime(783.99, now + 0.2); // G5
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.4);
                    osc.start(now); osc.stop(now + 0.4);
                } else if (type === 'wrong') {
                    // Low Boop
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.3);
                    osc.start(now); osc.stop(now + 0.3);
                } else if (type === 'click') {
                    // Short Pop
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(400, now);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                    osc.start(now); osc.stop(now + 0.05);
                } else if (type === 'catch') {
                    // High blip
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, now);
                    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now); osc.stop(now + 0.1);
                } else if (type === 'explosion') {
                    // Low rumble cho bom
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(20, now + 0.4);
                    gain.gain.setValueAtTime(0.4, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now); osc.stop(now + 0.4);
                }
            }
        };

        // --- TTS Engine ---
        function speakSentence() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Stop any ongoing speech
                const text = `It's ${currentObject.sizeCm} centimeters ${currentObject.type}.`;
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85; // Slightly slower for kids
                utterance.pitch = 1.1; // Slightly higher/friendly
                window.speechSynthesis.speak(utterance);
            }
        }

        // --- GAME CONFIGURATION ---
        const PX_PER_CM = 45; // 1 cm = 45 pixels on screen
        const TOTAL_ROUNDS = 10;
        
        // Game State
        let currentRound = 1;
        let score = 0;
        let consecutiveWins = 0; 
        let currentObject = null;
        let currentCubeCount = 0;

        // Minigame State
        let catchScoreVal = 0;
        let catchTimeLeft = 15;
        let catchGameTimer, fruitSpawnTimer, gameLoopFrame;
        const fruitsList = ['🍎', '🍊', '🍇', '🍉', '🍓', '🍒'];
        let activeFruits = [];

        // Level Database - Kết hợp Đa dạng LONG (Ngang) và TALL (Dọc)
        const items = [
            { emoji: '✏️', minCm: 4, maxCm: 7, type: 'long', rot: '-45deg' },
            { emoji: '🍦', minCm: 4, maxCm: 7, type: 'tall', rot: '0deg' },
            { emoji: '🥖', minCm: 5, maxCm: 9, type: 'long', rot: '45deg' },
            { emoji: '🌻', minCm: 5, maxCm: 8, type: 'tall', rot: '0deg' },
            { emoji: '🐛', minCm: 3, maxCm: 6, type: 'long', rot: '0deg' },
            { emoji: '📱', minCm: 4, maxCm: 7, type: 'tall', rot: '0deg' },
            { emoji: '🐟', minCm: 4, maxCm: 7, type: 'long', rot: '0deg' },
            { emoji: '🥤', minCm: 5, maxCm: 8, type: 'tall', rot: '0deg' },
            { emoji: '🛹', minCm: 6, maxCm: 9, type: 'long', rot: '-45deg' },
            { emoji: '🧸', minCm: 4, maxCm: 6, type: 'tall', rot: '0deg' },
        ];

        // --- CORE FUNCTIONS ---

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
            
            if(screenId === 'screen-game') {
                document.getElementById('header').classList.remove('hidden');
                document.getElementById('header').classList.add('flex');
            } else if (screenId === 'screen-start' || screenId === 'screen-end') {
                document.getElementById('header').classList.add('hidden');
                document.getElementById('header').classList.remove('flex');
            }
        }

        function updateUI() {
            document.getElementById('round-display').innerText = currentRound;
            document.getElementById('score-display').innerText = score;
        }

        function startGame() {
            SoundManager.init(); // Initialize audio context on first user interaction
            resetGame();
            showScreen('screen-game');
            loadRound();
        }

        function loadRound() {
            if (currentRound > TOTAL_ROUNDS) {
                endGame();
                return;
            }

            // Reset UI
            const inputEl = document.getElementById('answer-input');
            inputEl.value = '';
            inputEl.classList.remove('shake');
            inputEl.disabled = false;
            inputEl.focus();
            document.getElementById('tts-btn').style.display = 'none'; // Hide speaker

            updateUI();

            // Generate object
            const template = items[(currentRound - 1) % items.length];
            const sizeCm = Math.floor(Math.random() * (template.maxCm - template.minCm + 1)) + template.minCm;
            
            currentObject = {
                emoji: template.emoji,
                sizeCm: sizeCm,
                type: template.type,
                rot: template.rot,
                pxSize: sizeCm * PX_PER_CM
            };

            // Layout Switching Logic (Long vs Tall)
            const wrapper = document.getElementById('measurement-wrapper');
            const track = document.getElementById('cube-track');
            const objContainer = document.getElementById('object-container');

            if (currentObject.type === 'long') {
                // Nằm Ngang: Đồ vật phía trên, khối nối ngang phía dưới
                wrapper.className = 'w-fit flex flex-col items-start gap-4 p-4 mx-auto transition-all duration-500';
                track.className = 'flex flex-row items-center min-h-[60px] min-w-[60px] rounded-xl transition-all duration-300 p-2 border-4 border-transparent';
                objContainer.className = 'relative z-10 pl-2 flex items-end';
            } else {
                // Đứng Dọc: Đồ vật bên trái, khối nối dọc bên phải
                wrapper.className = 'w-fit flex flex-row items-end gap-6 p-4 mx-auto transition-all duration-500';
                track.className = 'flex flex-col-reverse items-center min-h-[60px] min-w-[60px] rounded-xl transition-all duration-300 p-2 border-4 border-transparent';
                objContainer.className = 'relative z-10 pb-2 flex items-end';
            }

            // Render Object (Giữ nguyên tâm xoay center)
            objContainer.innerHTML = `<div style="font-size: ${currentObject.pxSize}px; line-height: 1; display: inline-flex; align-items: center; justify-content: center; transform: rotate(${currentObject.rot}); transform-origin: center center; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.15));">${currentObject.emoji}</div>`;
            
            // Adjust text text
            document.getElementById('dimension-text').innerText = currentObject.type;

            // Initialize Cubes
            currentCubeCount = 0;
            renderCubes();
            track.classList.remove('snapped');
        }

        // --- CUBE LOGIC ---
        function addCube() {
            if (document.getElementById('answer-input').disabled) return; // Prevent if already won
            SoundManager.play('click');
            if (currentCubeCount < 15) {
                currentCubeCount++;
                renderCubes();
                checkSnap();
            }
        }

        function removeCube() {
            if (document.getElementById('answer-input').disabled) return;
            SoundManager.play('click');
            if (currentCubeCount > 0) {
                currentCubeCount--;
                renderCubes();
                checkSnap();
            }
        }

        function renderCubes() {
            const track = document.getElementById('cube-track');
            track.innerHTML = ''; 

            const bgColors = ['bg-red-500', 'bg-blue-500', 'bg-green-500', 'bg-yellow-400', 'bg-purple-500'];
            const borderColors = ['border-red-700', 'border-blue-700', 'border-green-700', 'border-yellow-600', 'border-purple-700'];

            for (let i = 0; i < currentCubeCount; i++) {
                const colorIdx = i % bgColors.length;
                
                const cubeWrap = document.createElement('div');
                cubeWrap.className = 'relative flex-none flex items-center justify-center';
                cubeWrap.style.width = PX_PER_CM + 'px';
                cubeWrap.style.height = PX_PER_CM + 'px';

                const cube = document.createElement('div');
                cube.className = `absolute inset-0 ${bgColors[colorIdx]} border-2 ${borderColors[colorIdx]} rounded-[4px] shadow-sm z-10`;
                
                // Khớp nối Unifix peg (Chỉnh hướng dựa vào Long hay Tall)
                const peg = document.createElement('div');
                if (currentObject.type === 'long') {
                    // Ngang: Chốt nối nằm bên phải
                    peg.className = `absolute -right-[6px] top-[10px] w-[6px] h-[20px] ${bgColors[colorIdx]} border-y-2 border-r-2 ${borderColors[colorIdx]} rounded-r-sm z-0`;
                } else {
                    // Dọc: Chốt nối nằm bên trên
                    peg.className = `absolute left-[10px] -top-[6px] h-[6px] w-[20px] ${bgColors[colorIdx]} border-x-2 border-t-2 ${borderColors[colorIdx]} rounded-t-sm z-0`;
                }
                
                cubeWrap.appendChild(cube);
                cubeWrap.appendChild(peg);
                track.appendChild(cubeWrap);
            }
        }

        function checkSnap() {
            const track = document.getElementById('cube-track');
            if (currentCubeCount === currentObject.sizeCm) {
                if (!track.classList.contains('snapped')) {
                    track.classList.add('snapped');
                    SoundManager.play('snap');
                }
            } else {
                track.classList.remove('snapped');
            }
        }

        // --- GAMEPLAY LOGIC ---
        function checkAnswer() {
            const inputEl = document.getElementById('answer-input');
            if (inputEl.disabled) return; // Prevent double click

            const answer = parseInt(inputEl.value);
            if (isNaN(answer)) return;

            if (answer === currentObject.sizeCm) {
                // Trả lời đúng
                SoundManager.play('correct');
                
                // Hiệu ứng pháo giấy rực rỡ
                confetti({
                    particleCount: 150,
                    spread: 80,
                    origin: { y: 0.6 },
                    colors: ['#22c55e', '#3b82f6', '#f59e0b', '#ec4899', '#a855f7'],
                    zIndex: 100
                });

                createParticles(inputEl);
                score += 10;
                consecutiveWins++;
                
                inputEl.style.backgroundColor = '#dcfce3'; // green-100
                inputEl.style.color = '#166534'; // green-800
                inputEl.disabled = true; // Lock input
                
                // Hiển thị nút đọc và tự động đọc một lần
                document.getElementById('tts-btn').style.display = 'inline-block';
                speakSentence();
                updateUI();
                
                // Tạm dừng một chút để bé nghe âm thanh và xem kết quả trước khi qua vòng
                setTimeout(() => {
                    inputEl.style.backgroundColor = '';
                    inputEl.style.color = '';
                    
                    if (consecutiveWins >= 2) {
                        consecutiveWins = 0;
                        startCatchingGame(); 
                    } else {
                        currentRound++;
                        loadRound();
                    }
                }, 3500);

            } else {
                // Trả lời sai
                SoundManager.play('wrong');
                inputEl.classList.remove('shake');
                void inputEl.offsetWidth; 
                inputEl.classList.add('shake');
                inputEl.style.backgroundColor = '#fee2e2'; // red-100
                
                setTimeout(() => {
                    inputEl.style.backgroundColor = '';
                    inputEl.value = '';
                    inputEl.focus();
                }, 800);
            }
        }

        // --- CATCHING MINIGAME LOGIC ---
        function startCatchingGame() {
            showScreen('screen-minigame');
            catchScoreVal = 0;
            catchTimeLeft = 15;
            activeFruits = [];
            document.getElementById('fruits-container').innerHTML = '';
            updateCatchUI();
            
            catchGameTimer = setInterval(gameTimerTick, 1000);
            fruitSpawnTimer = setInterval(spawnFruit, 700); 
            gameLoopFrame = requestAnimationFrame(gameLoop);
        }

        function updateCatchUI() {
            document.getElementById('catch-score').innerText = catchScoreVal;
            document.getElementById('catch-timer').innerText = catchTimeLeft;
        }

        function gameTimerTick() {
            catchTimeLeft--;
            updateCatchUI();
            if (catchTimeLeft <= 0) {
                endCatchingGame();
            }
        }

        function moveBasket(e) {
            const area = document.getElementById('catching-area');
            const rect = area.getBoundingClientRect();
            const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            
            let xPos = clientX - rect.left;
            xPos = Math.max(40, Math.min(xPos, rect.width - 40));
            
            document.getElementById('basket').style.left = xPos + 'px';
        }

        function spawnFruit() {
            const container = document.getElementById('fruits-container');
            
            // 20% tỉ lệ rơi ra bom
            const isBomb = Math.random() < 0.2;
            const emoji = isBomb ? '💣' : fruitsList[Math.floor(Math.random() * fruitsList.length)];
            
            const fruitEl = document.createElement('div');
            fruitEl.className = 'falling-fruit';
            fruitEl.innerText = emoji;
            
            const startX = Math.random() * (container.offsetWidth - 50);
            fruitEl.style.left = startX + 'px';
            fruitEl.style.top = '-60px';

            container.appendChild(fruitEl);

            activeFruits.push({
                el: fruitEl,
                x: startX,
                y: -60,
                speed: Math.random() * 3 + (isBomb ? 4 : 3), // Bom rơi nhanh hơn 1 chút
                isBomb: isBomb
            });
        }

        function gameLoop() {
            const basket = document.getElementById('basket');
            const basketRect = basket.getBoundingClientRect();
            const containerRect = document.getElementById('catching-area').getBoundingClientRect();

            activeFruits.forEach((fruitData, index) => {
                fruitData.y += fruitData.speed;
                fruitData.el.style.top = fruitData.y + 'px';

                const fruitRect = fruitData.el.getBoundingClientRect();

                // Check collision with basket
                if (
                    fruitRect.bottom >= basketRect.top + 20 && 
                    fruitRect.top < basketRect.bottom &&
                    fruitRect.right > basketRect.left + 10 &&
                    fruitRect.left < basketRect.right - 10
                ) {
                    if (fruitData.isBomb) {
                        // Hứng trúng BOM!
                        SoundManager.play('explosion');
                        catchScoreVal = Math.max(0, catchScoreVal - 5); // Trừ 5 điểm
                        
                        // Hiệu ứng chớp đỏ nhấp nháy
                        const gameArea = document.getElementById('screen-minigame');
                        gameArea.classList.remove('bomb-flash');
                        void gameArea.offsetWidth; // reset animation
                        gameArea.classList.add('bomb-flash');
                        
                        createParticles(fruitData.el, 15, ['#ef4444', '#f97316', '#111827']); // Hạt đen đỏ cam
                    } else {
                        // Hứng trúng trái cây!
                        SoundManager.play('catch');
                        catchScoreVal += 5;
                        createParticles(fruitData.el, 5); 
                    }
                    
                    updateCatchUI();
                    fruitData.el.remove();
                    activeFruits.splice(index, 1);
                } 
                else if (fruitData.y > containerRect.height) {
                    fruitData.el.remove();
                    activeFruits.splice(index, 1);
                }
            });

            if (catchTimeLeft > 0) {
                gameLoopFrame = requestAnimationFrame(gameLoop);
            }
        }

        function endCatchingGame() {
            clearInterval(catchGameTimer);
            clearInterval(fruitSpawnTimer);
            cancelAnimationFrame(gameLoopFrame);

            score += catchScoreVal;
            updateUI();
            
            setTimeout(() => {
                currentRound++;
                showScreen('screen-game');
                loadRound();
            }, 2000); 
        }

        function endGame() {
            showScreen('screen-end');
            document.getElementById('final-score').innerText = score;
            createParticles(document.getElementById('screen-end'), 50);
            SoundManager.play('correct'); // Tạm dùng âm này cho end game
        }

        function resetGame() {
            currentRound = 1;
            score = 0;
            consecutiveWins = 0;
            updateUI();
        }

        // --- UTILS ---
        function createParticles(targetElement, count = 15, customColors = null) {
            const rect = targetElement.getBoundingClientRect();
            const colors = customColors || ['#f43f5e', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6'];
            
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = (rect.left + Math.random() * rect.width) + 'px';
                p.style.top = (rect.top + Math.random() * rect.height) + 'px';
                p.style.width = (Math.random() * 10 + 5) + 'px';
                p.style.height = p.style.width;
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                if (Math.random() > 0.5) p.style.borderRadius = '50%';
                
                p.animate([
                    { transform: `translate(0, 0) rotate(0deg)`, opacity: 1 },
                    { transform: `translate(${(Math.random() * 100 - 50)}px, ${Math.random() * 200 + 100}px) rotate(${Math.random() * 360}deg)`, opacity: 0 }
                ], {
                    duration: 1000 + Math.random() * 1000,
                    easing: 'cubic-bezier(0, .9, .57, 1)'
                });

                document.body.appendChild(p);
                setTimeout(() => p.remove(), 2000);
            }
        }

        // Init input Enter key
        document.getElementById('answer-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkAnswer();
        });

    </script>
</body>
