<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jungle Tug: Math Challenge v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Duolingo Inspired Color Palette */
            --sky-top: #38bdf8;
            --sky-bot: #bae6fd;
            --grass-top: #58cc02;
            --grass-bot: #46a302;
            --dirt-1: #fde047;
            --dirt-2: #facc15;
            --dirt-3: #eab308;
            --duo-blue: #1cb0f6;
            --duo-blue-dark: #1899d6;
            --duo-red: #ff4b4b;
            --duo-red-dark: #ea2b2b;
            --duo-green: #58cc02;
            --duo-green-dark: #46a302;
            --duo-yellow: #ffc800;
            --duo-yellow-dark: #e5b400;
        }

        body {
            font-family: 'Poppins', sans-serif;
            touch-action: manipulation;
            user-select: none;
            overflow: hidden;
            background: var(--sky-bot);
            margin: 0;
            padding: 0;
        }

        /* Format Elements */
        .kid-text { text-shadow: 3px 3px 0px #fff, 0 6px 15px rgba(0,0,0,0.2); }
        .modal-card { background: #ffffff; border: 8px solid var(--duo-yellow); box-shadow: 0 25px 50px rgba(0,0,0,0.4); border-radius: 40px; }

        /* ================= SCENERY BACKGROUND ================= */
        .sky-area {
            position: absolute; inset: 0;
            background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bot) 55%, var(--grass-top) 55%, var(--grass-bot) 100%);
            z-index: 0;
        }

        /* SUN */
        .sun {
            position: absolute; top: 20px; left: 60px;
            width: 140px; height: 140px;
            background: var(--duo-yellow); border-radius: 50%;
            box-shadow: 0 0 0 15px rgba(255, 200, 0, 0.3), 0 0 0 30px rgba(255, 200, 0, 0.1);
            animation: sun-glow 4s infinite alternate ease-in-out;
            z-index: 1;
        }
        @keyframes sun-glow { 0% { transform: scale(1) rotate(0deg); } 100% { transform: scale(1.05) rotate(5deg); } }

        .cloud {
            position: absolute; background: rgba(255, 255, 255, 0.95);
            border-radius: 100px; animation: float-cloud linear infinite; z-index: 2;
            box-shadow: 0 10px 0 rgba(0,0,0,0.05);
        }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: inherit; border-radius: 50%; }
        .cloud-1 { width: 180px; height: 70px; top: 12%; left: 15%; animation-duration: 45s; }
        .cloud-1::before { width: 80px; height: 80px; top: -35px; left: 30px; }
        .cloud-1::after { width: 90px; height: 90px; top: -45px; right: 30px; }
        .cloud-2 { width: 260px; height: 80px; top: 22%; left: 60%; animation-duration: 55s; animation-delay: -20s; }
        .cloud-2::before { width: 100px; height: 100px; top: -50px; left: 40px; }
        .cloud-2::after { width: 110px; height: 110px; top: -55px; right: 40px; }
        @keyframes float-cloud { from { transform: translateX(-400px); } to { transform: translateX(110vw); } }

        /* RAINBOW */
        .rainbow {
            position: absolute; bottom: 45vh; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 1200px; height: 50vh; opacity: 0.8; z-index: 1; pointer-events: none;
        }

        .mountain {
            position: absolute; bottom: 55vh; z-index: 3;
            background: linear-gradient(135deg, #74d924 0%, #46a302 100%);
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            border-bottom: 10px solid #3d8f02;
        }
        .mt-1 { left: -5%; width: 45vw; height: 30vh; z-index: 4; background: linear-gradient(135deg, #8cf03a 0%, #3d8f02 100%); }
        .mt-2 { left: 15%; width: 55vw; height: 40vh; }
        .mt-3 { right: 10%; width: 45vw; height: 26vh; z-index: 4; background: linear-gradient(135deg, #8cf03a 0%, #3d8f02 100%);}
        .mt-4 { right: -10%; width: 50vw; height: 36vh; }

        /* ================= TREES ================= */
        .green-tree { 
            position: absolute; bottom: 54vh; z-index: 5; 
            width: 320px; height: 320px;
            filter: drop-shadow(0 15px 10px rgba(0,0,0,0.25));
        }
        .green-tree.left { left: 5%; transform: scale(0.95); transform-origin: bottom center; }
        .green-tree.right { right: 5%; transform: scaleX(-0.95) scaleY(0.95); transform-origin: bottom center; }

        .pine-tree { 
            position: absolute; bottom: 55vh; z-index: 4; 
            display: flex; flex-direction: column; align-items: center; 
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.25)); 
        }
        .pine-tree.left { left: -2%; transform: scale(0.7); transform-origin: bottom; }
        .pine-tree.right { right: -4%; transform: scale(0.75); transform-origin: bottom; }
        .pine-layer { 
            background: linear-gradient(135deg, #58cc02 0%, #46a302 100%);
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%); width: 100%; position: relative;
            border-bottom: 8px solid rgba(0,0,0,0.1); 
        }
        .pl-1 { width: 110px; height: 110px; z-index: 4; margin-bottom: -35px; }
        .pl-2 { width: 150px; height: 130px; z-index: 3; margin-bottom: -40px; }
        .pl-3 { width: 190px; height: 150px; z-index: 2; margin-bottom: -45px; }
        .pl-4 { width: 230px; height: 170px; z-index: 1; }
        .pine-trunk { width: 45px; height: 75px; background: #8b4a1c; margin-top: -15px; z-index: 0; border-radius: 5px; box-shadow: inset -10px 0 rgba(0,0,0,0.2);}

        /* ================= GROUND AREA & DIRT ================= */
        .ground-area {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60vh;
            background: linear-gradient(180deg, var(--grass-top) 0%, var(--grass-bot) 100%);
            border-top: 12px solid #74d924; z-index: 6; overflow: hidden;
        }
        .dirt-track {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 140%; height: 100%;
            background: radial-gradient(ellipse at top, var(--dirt-1) 0%, var(--dirt-2) 40%, var(--dirt-3) 100%);
            clip-path: ellipse(65% 100% at 50% 100%);
            border-top: 15px dashed rgba(202, 138, 4, 0.5);
        }

        /* ================= GAME STAGE & RESPONSIVE ================= */
        .stage-anchor {
            position: absolute; bottom: 50vh; left: 50%; transform: translateX(-50%);
            width: 100%; display: flex; justify-content: center; align-items: flex-end; z-index: 10;
        }
        .scale-wrapper {
            transform-origin: center bottom; transition: transform 0.3s ease;
            position: relative; display: flex; justify-content: center; align-items: flex-end;
            height: 250px; width: 1400px;
        }
        @media (max-width: 1600px) { .scale-wrapper { transform: scale(0.85); } }
        @media (max-width: 1300px) { .scale-wrapper { transform: scale(0.7); } }
        @media (max-width: 1000px) { .scale-wrapper { transform: scale(0.55); } }
        @media (max-width: 768px) { .scale-wrapper { transform: scale(0.42); } }
        @media (max-width: 480px) { .scale-wrapper { transform: scale(0.32); } }

        .tug-group {
            display: flex; align-items: flex-end; position: relative; width: 100%; justify-content: center;
            gap: 250px; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-origin: center bottom;
        }

        .center-mark {
            position: absolute; left: 50%; bottom: -10px; height: 200px; width: 10px;
            background: repeating-linear-gradient(180deg, rgba(255,255,255,0.9) 0, rgba(255,255,255,0.9) 20px, transparent 20px, transparent 40px);
            transform: translateX(-50%); z-index: 5; border-radius: 5px;
        }

        /* STRIPED ROPE */
        .rope-container {
            position: absolute; bottom: 45px; left: 50%; transform: translateX(-50%);
            width: 1400px; height: 32px;
            background: repeating-linear-gradient(45deg, #8b4a1c 0 20px, #522504 20px 40px); 
            border-radius: 16px; 
            box-shadow: 0 10px 15px rgba(0,0,0,0.4), inset 0 6px 8px rgba(255,255,255,0.2); 
            z-index: 15; border: 4px solid #3a1a02;
        }
        .ribbon {
            position: absolute; left: 50%; top: -25px; transform: translateX(-50%);
            width: 50px; height: 100px; background: var(--duo-red); border: 6px solid var(--duo-red-dark);
            clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 80%, 0 100%);
            z-index: 25; animation: sway 2s infinite alternate ease-in-out;
            box-shadow: 0 6px 10px rgba(0,0,0,0.4);
        }
        @keyframes sway { from { transform: translateX(-50%) rotate(-12deg); } to { transform: translateX(-50%) rotate(12deg); } }

        /* ================= HIGH-DETAIL CSS ANIMALS ================= */
        .team { display: flex; align-items: flex-end; z-index: 20; position: relative; gap: -15px; }
        .team.right { flex-direction: row-reverse; }

        .animal {
            width: 130px; height: 190px; position: relative; flex-shrink: 0;
            transform-origin: bottom center; filter: drop-shadow(0 15px 12px rgba(0,0,0,0.3));
        }        
        .animal.pull-l { animation: tug-l 0.5s ease; }
        .animal.pull-r { animation: tug-r 0.5s ease; }
        @keyframes tug-l { 0%, 100% {transform: rotate(0);} 50% {transform: translateX(-25px) rotate(-15deg) scaleY(0.95);} }
        @keyframes tug-r { 0%, 100% {transform: rotate(0);} 50% {transform: translateX(25px) rotate(15deg) scaleY(0.95);} }

        .character { position: relative; width: 100%; height: 100%; }

        .head { 
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%); 
            width: 105px; height: 95px; background: radial-gradient(circle at 35% 35%, var(--light), var(--main)); 
            border: 4px solid rgba(0,0,0,0.25); border-radius: 45% 45% 40% 40%; z-index: 4; 
            box-shadow: inset -8px -8px 15px rgba(0,0,0,0.15); 
        }
        .body { 
            position: absolute; top: 85px; left: 50%; transform: translateX(-50%); 
            width: 85px; height: 75px; background: radial-gradient(circle at 30% 30%, var(--light), var(--main)); 
            border: 4px solid rgba(0,0,0,0.25); border-radius: 40px 40px 20px 20px;
            z-index: 2; overflow: hidden; box-shadow: inset -8px -8px 15px rgba(0,0,0,0.2);
        }        
        .shirt { position: absolute; top: 0; left: 0; right: 0; height: 60%; background: var(--shirt); box-shadow: inset 0 -4px 0 rgba(0,0,0,0.1);}
        .shorts { position: absolute; bottom: 0; left: 0; right: 0; height: 40%; background: var(--shorts); box-shadow: inset 0 6px 6px rgba(0,0,0,0.2); }

        .eye { position: absolute; top: 40px; width: 16px; height: 26px; background: #1a0b00; border-radius: 50%; z-index: 6; }
        .eye.l { left: 24px; } .eye.r { right: 24px; }
        .eye::before { content:''; position:absolute; top:4px; left:4px; width:6px; height:10px; background:#fff; border-radius:50%; box-shadow: 0 0 3px #fff; }
        .eye::after { content:''; position:absolute; bottom:5px; right:3px; width:4px; height:4px; background:#fff; border-radius:50%; opacity: 0.9; }
        
        .cheek { position: absolute; top: 60px; width: 20px; height: 12px; background: #ff4b4b; border-radius: 50%; z-index: 6; opacity: 0.7; filter: blur(2px); }
        .cheek.l { left: 8px; } .cheek.r { right: 8px; }

        .ear { position: absolute; width: 36px; height: 36px; background: var(--main); border: 4px solid rgba(0,0,0,0.25); border-radius: 50%; top: -2px; z-index: 3; box-shadow: inset -3px -3px 6px rgba(0,0,0,0.2); }
        .ear.l { left: -6px; } .ear.r { right: -6px; }
        
        .snout { position: absolute; top: 52px; left: 50%; transform: translateX(-50%); width: 54px; height: 36px; background: var(--snout); border-radius: 20px; z-index: 5; box-shadow: inset -2px -4px 8px rgba(0,0,0,0.15); }
        .nose { position: absolute; top: 2px; left: 50%; transform: translateX(-50%); width: 20px; height: 12px; background: #222; border-radius: 10px; }
        .mouth { position: absolute; top: 68px; left: 50%; transform: translateX(-50%); width: 24px; height: 16px; border-bottom: 6px solid #3a0000; border-radius: 50%; z-index: 6; }

        /* ARMS & ROPE GRIP */
        .arm { position: absolute; background: var(--main); border: 4px solid rgba(0,0,0,0.25); border-radius: 15px; box-shadow: inset -4px -4px 8px rgba(0,0,0,0.2); }
        .arm::after { content:''; position:absolute; top:-4px; left:-4px; right:-4px; height:26px; background: var(--shirt); border-radius: 15px 15px 0 0;}
        .team.left .arm.front { left: 45px; top: 110px; transform: rotate(-60deg); width: 34px; height: 58px; z-index: 25; }
        .team.left .arm.back { left: 25px; top: 105px; transform: rotate(-45deg); width: 32px; height: 48px; z-index: 1; }
        .team.right .arm.front { right: 45px; top: 110px; transform: rotate(60deg); width: 34px; height: 58px; z-index: 25; }
        .team.right .arm.back { right: 25px; top: 105px; transform: rotate(45deg); width: 32px; height: 48px; z-index: 1; }
        .hand { position: absolute; bottom: -14px; left: -4px; width: 36px; height: 36px; background: var(--main); border-radius: 50%; border: 4px solid rgba(0,0,0,0.25); box-shadow: inset -2px -2px 5px rgba(0,0,0,0.3); z-index: 26;}

        .leg { position: absolute; top: 135px; width: 30px; height: 48px; background: var(--main); z-index: 1; border-radius: 5px; box-shadow: inset -3px -3px 6px rgba(0,0,0,0.2); }
        .leg::before { content:''; position:absolute; top:0; left:0; right:0; height:24px; background: var(--shorts); border-radius: 5px 5px 0 0; box-shadow: inset 0 -3px 4px rgba(0,0,0,0.3);}
        .leg.l { left: 25px; } .leg.r { right: 25px; }

        .shoe { position: absolute; top: 34px; left: -4px; width: 38px; height: 20px; background: var(--shoe); border-radius: 15px 15px 5px 5px; box-shadow: inset 0 -5px 0 rgba(255,255,255,0.8), 0 5px 6px rgba(0,0,0,0.25);}
        .shoe::before { content:''; position:absolute; left:0; top:0; bottom:0; width:12px; background: rgba(255,255,255,0.95); border-radius: 15px 0 0 5px;}

        /* FIXED TAILS */
        .tiger-tail { position: absolute; top: 110px; left: -15px; width: 55px; height: 18px; border-radius: 10px; background: repeating-linear-gradient(90deg, #f97316 0 10px, #451a03 10px 20px); transform: rotate(-30deg); z-index: 1; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .elephant-tail { position: absolute; top: 120px; left: -5px; width: 40px; height: 12px; background: #94a3b8; border-radius: 10px; transform: rotate(-40deg); z-index: 1; box-shadow: 0 3px 5px rgba(0,0,0,0.2);}
        .bear-tail { position: absolute; top: 120px; right: 2px; width: 28px; height: 28px; background: #b45309; border-radius: 50%; z-index: 1; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .lion-tail { position: absolute; top: 110px; right: -18px; width: 50px; height: 14px; background: #fbbf24; border-radius: 10px; transform: rotate(30deg); z-index: 1; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .lion-tail::after { content:''; position:absolute; right: -10px; top: -6px; width: 26px; height: 26px; background: #ea580c; border-radius: 50%;}

        /* --- ANIMAL VARIANTS --- */
        .tiger { --main: #f97316; --light: #fb923c; --snout: #fff; --shirt: var(--duo-blue); --shorts: #1e293b; --shoe: var(--duo-blue); }
        .tiger .ear::after { content:''; position:absolute; inset:6px; background:#fff; border-radius:50%; }
        .tiger .head::after { content:''; position:absolute; width: 6px; height: 18px; background: #451a03; border-radius: 5px; top: 5px; left: 50%; transform: translateX(-50%); box-shadow: -15px 5px 0 #451a03, 15px 5px 0 #451a03; z-index: 5;}
        .tiger .head::before { content:''; position:absolute; width: 15px; height: 6px; background: #451a03; border-radius: 5px; top: 45px; left: -2px; box-shadow: 94px 0 0 #451a03, 0 15px 0 #451a03, 94px 15px 0 #451a03; z-index: 5;}
        .tiger .snout { width: 64px; height: 42px; top: 48px; border-radius: 50%; }
        
        .elephant { --main: #94a3b8; --light: #cbd5e1; --snout: #94a3b8; --shirt: var(--duo-yellow); --shorts: #1e293b; --shoe: var(--duo-blue); }
        .elephant .head { width: 115px; }
        .elephant .ear { width: 58px; height: 64px; top: 10px; border-radius: 40%; }
        .elephant .ear.l { left: -24px; } .elephant .ear.r { right: -24px; }
        .elephant .ear::after { content:''; position:absolute; inset:8px; background:#fbcfe8; border-radius:40%; }
        .elephant .snout { width: 30px; height: 60px; top: 45px; border-radius: 15px 15px 20px 20px; z-index: 7; background: repeating-linear-gradient(180deg, #94a3b8 0, #94a3b8 10px, #64748b 10px, #64748b 12px); box-shadow: 0 5px 10px rgba(0,0,0,0.2);}
        .elephant .nose { display: none; }
        .elephant .tusk { position: absolute; top: 58px; width: 12px; height: 26px; background: #fff; border-radius: 50% 50% 50% 50% / 80% 80% 20% 20%; z-index: 6; border: 2px solid #cbd5e1; border-top:none; box-shadow: inset -2px 0 3px rgba(0,0,0,0.15); }
        .elephant .tusk.l { left: 30px; transform: rotate(25deg); } .elephant .tusk.r { right: 30px; transform: rotate(-25deg); }

        .buffalo { --main: #4a3f35; --light: #6b5c4d; --snout: #332b24; --shirt: var(--duo-red); --shorts: #1e293b; --shoe: var(--duo-red); }
        .buffalo .head { border-radius: 40% 40% 50% 50%; }
        .buffalo .horn { position: absolute; top: -12px; width: 60px; height: 45px; border-bottom: 20px solid #f8fafc; border-radius: 50%; z-index: 2; background: transparent; filter: drop-shadow(0 5px 4px rgba(0,0,0,0.4)); }
        .buffalo .horn.l { left: -38px; transform: rotate(25deg); } .buffalo .horn.r { right: -38px; transform: rotate(-25deg); }
        .buffalo .ear { top: 25px; width: 26px; height: 18px; border-radius: 50%; }
        .buffalo .ear.l { left: -12px; transform: rotate(-20deg); } .buffalo .ear.r { right: -12px; transform: rotate(20deg); }
        .buffalo .snout { width: 70px; height: 46px; top: 48px; border-radius: 25px; }
        .buffalo .nose::after { content:''; position:absolute; top: 14px; left: 50%; transform: translateX(-50%); width: 22px; height: 22px; border: 5px solid var(--duo-yellow); border-radius: 50%; z-index: 10; box-shadow: 0 5px 8px rgba(0,0,0,0.4);}
        .buffalo .bull-tuft { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 32px; height: 24px; background: var(--main); border-radius: 50% 50% 0 0; z-index: 7; box-shadow: inset 0 3px 3px rgba(255,255,255,0.15); }

        .bear { --main: #b45309; --light: #d97706; --snout: #fef3c7; --shirt: var(--duo-green); --shorts: #1e293b; --shoe: var(--duo-green); }
        .bear .ear { border-radius: 50%; top: -6px; }
        .bear .ear::after { content:''; position:absolute; inset:6px; background:#fef3c7; border-radius:50%; }
        .bear .belly { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 56px; height: 46px; background: #fef3c7; border-radius: 50% 50% 0 0; z-index: 1; opacity: 0.95; }

        .lion { --main: #fbbf24; --light: #fde047; --snout: #fef3c7; --shirt: #9333ea; --shorts: #1e293b; --shoe: #9333ea; }
        .lion-mane-wrap { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); width: 150px; height: 140px; z-index: 3; filter: drop-shadow(0 6px 6px rgba(0,0,0,0.3)); }
        .lion .ear { z-index: 5; }

        .rhino { --main: #64748b; --light: #94a3b8; --snout: #cbd5e1; --shirt: #a855f7; --shorts: #1e293b; --shoe: #a855f7; }
        .rhino .head { border-radius: 40% 40% 45% 45%; }
        .rhino .ear { border-radius: 50% 50% 50% 10%; transform: rotate(15deg); }
        .rhino .ear.r { transform: scaleX(-1) rotate(15deg); }
        .rhino .snout { width: 62px; height: 48px; top: 45px; border-radius: 25px 25px 20px 20px;}
        .rhino-horn { position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%); width: 22px; height: 48px; background: linear-gradient(90deg, #f8fafc, #cbd5e1); border-radius: 50% 50% 10% 10%; z-index: 8; box-shadow: -3px 3px 6px rgba(0,0,0,0.25); }
        .rhino-horn-small { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%) translate(-16px, -12px); width: 14px; height: 24px; background: #e2e8f0; border-radius: 50% 50% 10% 10%; z-index: 7; }

        /* ================= MATH UI & BUTTONS ================= */
        .math-ui-container {
            position: absolute; bottom: 0; width: 100%; height: 45vh; min-height: 280px;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px);
            border-top: 10px solid #fff; box-shadow: 0 -20px 50px rgba(0,0,0,0.15);
            border-radius: 40px 40px 0 0; padding: 10px 15px 20px; z-index: 50; 
            display: flex; flex-direction: column; align-items: center;
        }
        
        .btn-math { 
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1); 
            border-radius: 1.5rem; display: flex; align-items: center; justify-content: center;
            border-bottom-width: 6px; /* Duolingo thick border style */
        }
        .btn-math:active:not(:disabled) { 
            transform: translateY(6px); border-bottom-width: 0px !important; margin-top: 6px;
        }
        .btn-math:disabled { opacity: 0.7; transform: translateY(6px); border-bottom-width: 0px !important; margin-top: 6px; cursor: not-allowed; }

        /* Icon SVG Styling */
        .svg-icon { filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
        #fireworksCanvas { position: fixed; inset: 0; z-index: 99999; pointer-events: none; }

        @keyframes float-text {
            0% { transform: translate(-50%, 0) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -60px) scale(1.5); opacity: 0; }
        }
        .animate-float-text { animation: float-text 1s ease-out forwards; }
        
        @keyframes shake-kid {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px) rotate(-4deg); }
            75% { transform: translateX(10px) rotate(4deg); }
        }

            <p class="text-[var(--duo-yellow-dark)] font-black text-lg sm:text-xl mb-5 uppercase tracking-widest drop-shadow-sm">Math Challenge</p>
            
            <div class="bg-white rounded-3xl p-5 mb-5 border-4 border-slate-100 shadow-sm text-left">
                <!-- Operations -->
                <p class="text-[11px] sm:text-xs font-black text-slate-400 uppercase mb-2 tracking-wider text-center">Select Operation:</p>
                <div class="flex gap-2 sm:gap-3 mb-5">
                    <button id="opAdd" onclick="setOp('add')" class="flex-1 py-2 sm:py-3 font-black rounded-xl border-b-[6px] text-sm sm:text-lg bg-[var(--duo-blue)] text-white border-[var(--duo-blue-dark)] transform transition active:translate-y-1 active:border-b-0">Add (+)</button>
                    <button id="opSub" onclick="setOp('sub')" class="flex-1 py-2 sm:py-3 font-black rounded-xl border-b-[6px] text-sm sm:text-lg bg-slate-100 text-slate-500 border-slate-300 hover:bg-slate-200 transform transition active:translate-y-1 active:border-b-0">Sub (-)</button>
                    <button id="opMixed" onclick="setOp('mixed')" class="flex-1 py-2 sm:py-3 font-black rounded-xl border-b-[6px] text-sm sm:text-lg bg-slate-100 text-slate-500 border-slate-300 hover:bg-slate-200 transform transition active:translate-y-1 active:border-b-0">Mixed</button>
                </div>

                <!-- Math Range (Updated to 6 Levels) -->
                <p class="text-[11px] sm:text-xs font-black text-slate-400 uppercase mb-2 tracking-wider text-center">Math Range:</p>
                <div class="grid grid-cols-3 sm:flex sm:justify-center gap-2 sm:gap-3 mb-5">
                    <button id="range5" onclick="setRange(5)" class="flex-1 py-2 sm:py-3 font-black rounded-xl border-b-[6px] text-base sm:text-xl bg-slate-100 text-slate-500 border-slate-300 hover:bg-slate-200 transform transition active:translate-y-1 active:border-b-0">5</button>
                    <button id="range10" onclick="setRange(10)" class="flex-1 py-2 sm:py-3 font-black rounded-xl border-b-[6px] text-base sm:text-xl bg-[var(--duo-blue)] text-white border-[var(--duo-blue-dark)] transform transition active:translate-y-1 active:border-b-0">10</button>
                    <button id="range20" onclick="setRange(20)" class="flex-1 py-2 sm:py-3 font-black rounded-xl border-b-[6px] text-base sm:text-xl bg-slate-100 text-slate-500 border-slate-300 hover:bg-slate-200 transform transition active:translate-y-1 active:border-b-0">20</button>
                    <button id="range30" onclick="setRange(30)" class="flex-1 py-2 sm:py-3 font-black rounded-xl border-b-[6px] text-base sm:text-xl bg-slate-100 text-slate-500 border-slate-300 hover:bg-slate-200 transform transition active:translate-y-1 active:border-b-0">30</button>
                    <button id="range50" onclick="setRange(50)" class="flex-1 py-2 sm:py-3 font-black rounded-xl border-b-[6px] text-base sm:text-xl bg-slate-100 text-slate-500 border-slate-300 hover:bg-slate-200 transform transition active:translate-y-1 active:border-b-0">50</button>
                    <button id="range100" onclick="setRange(100)" class="flex-1 py-2 sm:py-3 font-black rounded-xl border-b-[6px] text-base sm:text-xl bg-slate-100 text-slate-500 border-slate-300 hover:bg-slate-200 transform transition active:translate-y-1 active:border-b-0">100</button>
                </div>
                
                <!-- Match Duration -->
                <div class="bg-blue-50 rounded-2xl p-4 border-2 border-blue-100">
                    <p class="text-[11px] sm:text-xs font-black text-blue-500 uppercase mb-2 tracking-wider text-center">Race Duration:</p>
                    <div class="flex items-center gap-3">
                        <input type="range" id="timeSlider" min="1" max="5" value="2" class="flex-1 accent-[var(--duo-blue)] h-3 rounded-full bg-blue-200 cursor-pointer">
                        <p id="timeLabel" class="text-2xl font-black text-[var(--duo-blue-dark)] w-12 text-right">2m</p>
                    </div>
                </div>
            </div>

            <!-- Start Buttons -->
            <div class="flex flex-col gap-3">
                <button onclick="bootGame('cpu')" class="btn-math w-full bg-[var(--duo-green)] text-white font-black py-4 sm:py-4 rounded-2xl text-xl sm:text-2xl border-[var(--duo-green-dark)] hover:brightness-110 flex items-center justify-center gap-2 shadow-sm">
                    VS CPU <span class="text-3xl ml-1 drop-shadow-md">🤖</span>
                </button>
                <button onclick="bootGame('pvp')" class="btn-math w-full bg-[var(--duo-red)] text-white font-black py-4 sm:py-4 rounded-2xl text-xl sm:text-2xl border-[var(--duo-red-dark)] hover:brightness-110 flex items-center justify-center gap-2 shadow-sm">
                    2 PLAYERS <span class="text-3xl ml-1 drop-shadow-md">👨‍👦</span>
                </button>
            </div>
        </div>
    </div>

    <!-- GAME OVER SCREEN (Updated UI) -->
    <div id="endScreen" class="fixed inset-0 bg-slate-900/80 backdrop-blur-xl z-[1000] hidden items-center justify-center p-4">
        <div class="modal-card w-full max-w-[550px] p-6 sm:p-10 text-center relative animate-bounce-in border-b-[12px] border-[var(--duo-yellow-dark)]">
            <h2 id="resultTitle" class="text-6xl sm:text-7xl font-black uppercase kid-text text-[var(--duo-yellow)] mb-6 leading-tight drop-shadow-xl">
                TIME UP!
            </h2>
            
            <!-- Enhanced Score Block -->
            <div class="flex justify-between gap-4 mb-8 w-full max-w-sm mx-auto">
                <div class="flex-1 bg-[var(--duo-blue)] rounded-[2rem] p-4 sm:p-6 border-b-[6px] border-[var(--duo-blue-dark)] flex flex-col items-center shadow-lg relative overflow-hidden transform transition hover:scale-105">
                    <div class="absolute top-0 right-0 w-20 h-20 bg-white opacity-10 rounded-full -mr-8 -mt-8"></div>
                    <p class="text-blue-100 font-bold uppercase tracking-widest text-xs sm:text-sm mb-1 z-10">Blue Team</p>
                    <p id="finalBlueScore" class="text-5xl sm:text-6xl font-black text-white drop-shadow-md z-10">0</p>
                </div>
                
                <div class="flex-1 bg-[var(--duo-red)] rounded-[2rem] p-4 sm:p-6 border-b-[6px] border-[var(--duo-red-dark)] flex flex-col items-center shadow-lg relative overflow-hidden transform transition hover:scale-105">
                    <div class="absolute top-0 left-0 w-20 h-20 bg-white opacity-10 rounded-full -ml-8 -mt-8"></div>
                    <p class="text-red-100 font-bold uppercase tracking-widest text-xs sm:text-sm mb-1 z-10">Red Team</p>
                    <p id="finalRedScore" class="text-5xl sm:text-6xl font-black text-white drop-shadow-md z-10">0</p>
                </div>
            </div>

            <button onclick="location.reload()" class="btn-math w-full bg-[var(--duo-blue)] text-white font-black py-4 sm:py-5 rounded-3xl text-2xl sm:text-3xl border-[var(--duo-blue-dark)] hover:brightness-110 shadow-sm">
                <span class="flex items-center justify-center gap-3">
                    PLAY AGAIN
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 sm:w-10 sm:h-10 svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                    </svg>
                </span>
            </button>
        </div>
    </div>

    <script>
        let gameMode = 'cpu', isMuted = false, timeLeft = 120, gameActive = false;
        let visualOffset = 0; const MAX_OFFSET = 8;
        let p1Score = 0, p2Score = 0;
        let qSP = {}, qP1 = {}, qP2 = {};

        // Settings State
        let selectedOp = 'add';
        let selectedRange = 10;

        // SVGs for Audio Toggle
        const speakerSvg = `<svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 svg-icon text-[var(--duo-blue)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>`;
        const muteSvg = `<svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 svg-icon text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>`;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSfx(freqs, type = 'sine', duration = 0.2) {
            if (isMuted) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const freqsArray = Array.isArray(freqs) ? freqs : [freqs];
            freqsArray.forEach((freq, i) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                    osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                    osc.start(); osc.stop(audioCtx.currentTime + duration);
                }, i * 100);
            });
        }

        // ================ ZERO-LAG CONFETTI ================
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let fwAnimationId = null;
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        function triggerConfetti() {
            const colors = ['#58cc02', '#1cb0f6', '#ff4b4b', '#ffc800', '#ce82ff', '#fff'];
            const pCount = window.innerWidth < 600 ? 80 : 150;
            for (let i = 0; i < pCount; i++) {
                particles.push({ 
                    x: canvas.width / 2, y: canvas.height / 2 + (Math.random() * 50 - 25),
                    vx: (Math.random() - 0.5) * 30, vy: (Math.random() - 1) * 25 - 5,
                    w: Math.random() * 10 + 6, h: Math.random() * 10 + 6,
                    color: colors[Math.floor(Math.random()*colors.length)],
                    rot: Math.random() * 360, rotSpeed: (Math.random() - 0.5) * 25
                });
            }
            if(!fwAnimationId) animateConfetti();
        }

        function animateConfetti() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach((p, i) => {
                p.vy += 0.5; p.x += p.vx; p.y += p.vy; p.rot += p.rotSpeed;
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot * Math.PI / 180);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
                ctx.restore();
                if(p.y > canvas.height + 20) particles.splice(i, 1);
            });
            if(particles.length > 0) fwAnimationId = requestAnimationFrame(animateConfetti);
            else fwAnimationId = null;
        }

        // ================ SETTINGS UI LOGIC ================
        function updateMenuUI() {
            ['add', 'sub', 'mixed'].forEach(o => {
                const el = document.getElementById('op' + o.charAt(0).toUpperCase() + o.slice(1));
                if(o === selectedOp) el.className = "flex-1 py-2 sm:py-3 font-black rounded-xl border-b-[6px] text-sm sm:text-lg bg-[var(--duo-blue)] text-white border-[var(--duo-blue-dark)] transform transition active:translate-y-1 active:border-b-0";
                else el.className = "flex-1 py-2 sm:py-3 font-black rounded-xl border-b-[6px] text-sm sm:text-lg bg-slate-100 text-slate-500 border-slate-300 hover:bg-slate-200 transform transition active:translate-y-1 active:border-b-0";
            });
            
            [5, 10, 20, 30, 50, 100].forEach(r => {
                const el = document.getElementById('range' + r);
                if(r === selectedRange) el.className = "flex-1 py-2 sm:py-3 font-black rounded-xl border-b-[6px] text-base sm:text-xl bg-[var(--duo-blue)] text-white border-[var(--duo-blue-dark)] transform transition active:translate-y-1 active:border-b-0";
                else el.className = "flex-1 py-2 sm:py-3 font-black rounded-xl border-b-[6px] text-base sm:text-xl bg-slate-100 text-slate-500 border-slate-300 hover:bg-slate-200 transform transition active:translate-y-1 active:border-b-0";
            });
        }

        function setOp(op) { selectedOp = op; updateMenuUI(); }
        function setRange(val) { selectedRange = val; updateMenuUI(); }
        document.getElementById('timeSlider').oninput = (e) => {
            const val = e.target.value;
            document.getElementById('timeLabel').innerText = `${val}m`;
            timeLeft = val * 60;
        };

        function bootGame(mode) {
            gameMode = mode; gameActive = true;
            document.getElementById('startScreen').classList.add('hidden');
            
            // Show Score Boards
            document.getElementById('blueScoreBoard').classList.remove('hidden');
            document.getElementById('redScoreBoard').classList.remove('hidden');

            if (mode === 'cpu') {
                document.getElementById('singlePlayerView').classList.remove('hidden');
                document.getElementById('singlePlayerView').classList.add('flex');
                startCpu(); gen('sp');
            } else {
                document.getElementById('twoPlayerView').classList.remove('hidden');
                document.getElementById('twoPlayerView').classList.add('grid');
                gen('p1'); gen('p2');
            }
            setInterval(tick, 1000); 
            updateScoreBoard();
            playSfx([400, 600, 800], 'triangle', 0.3);
        }

        function tick() {
            if(!gameActive) return;
            timeLeft--;
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
            
            if(timeLeft <= 10 && timeLeft > 0) {
                document.getElementById('timer').classList.add('text-red-500');
                if(timeLeft % 2 === 0) playSfx(800, 'sine', 0.1);
            }
            if(timeLeft <= 0) endGame();
        }

        function startCpu() {
            setInterval(() => {
                if(!gameActive || gameMode !== 'cpu') return;
                p2Score++;
                updateScoreBoard();
                triggerAnim('right');
            }, 6000);
        }

        // THUẬT TOÁN SINH CÂU HỎI MỚI - ĐÁP ÁN RƠI CHUẨN VÀO KHOẢNG (RANGE)
        function getQ() {
            let isAdd = selectedOp === 'add' ? true : selectedOp === 'sub' ? false : Math.random() > 0.5;
            
            let minAns = 2, maxAns = 5;
            if (selectedRange === 10) { minAns = 5; maxAns = 10; }
            else if (selectedRange === 20) { minAns = 10; maxAns = 20; }
            else if (selectedRange === 30) { minAns = 20; maxAns = 30; }
            else if (selectedRange === 50) { minAns = 30; maxAns = 50; }
            else if (selectedRange === 100) { minAns = 50; maxAns = 100; }

            if (isAdd) {
                // Cộng: Kết quả [minAns, maxAns]. n1, n2 <= kết quả
                const ans = Math.floor(Math.random() * (maxAns - minAns + 1)) + minAns;
                const n1 = Math.floor(Math.random() * (ans - 1)) + 1;
                return { n1: n1, n2: ans - n1, op: '+', ans: ans, wrongCount: 0 };
            } else {
                // Trừ: Kết quả [minAns, maxAns-1]. n1 (số bị trừ) lớn hơn kết quả nhưng không vượt maxAns
                let ans = Math.floor(Math.random() * (maxAns - minAns)) + minAns;
                if (ans >= maxAns) ans = maxAns - 1; // Fallback an toàn
                
                let maxPossibleN1 = maxAns;
                let n1 = Math.floor(Math.random() * (maxPossibleN1 - ans)) + ans + 1;
                
                return { n1: n1, n2: n1 - ans, op: '-', ans: ans, wrongCount: 0 };
            }
        }

        function speakQuestion(t) {
            if(isMuted) return;
            const n1 = document.getElementById(t+'N1').innerText;
            const op = document.getElementById(t+'Op').innerText;
            const n2 = document.getElementById(t+'N2').innerText;
            const opWord = op === '+' ? 'plus' : 'minus';
            const msg = new SpeechSynthesisUtterance(`${n1} ${opWord} ${n2}`);
            msg.lang = 'en-US'; msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        function gen(t) {
            let p = getQ();
            const os = [p.ans];
            
            // Generate fake options within reasonable range
            const variance = Math.max(4, Math.floor(selectedRange * 0.2));
            let attempts = 0;
            while(os.length < 4 && attempts < 100) {
                const alt = p.ans + (Math.floor(Math.random() * (variance * 2 + 1)) - variance);
                if(alt >= 0 && !os.includes(alt)) os.push(alt);
                attempts++;
            }
            let fallbackVal = 0;
            while(os.length < 4) { if(!os.includes(fallbackVal)) os.push(fallbackVal); fallbackVal++; }
            os.sort(()=>Math.random()-0.5);

            document.getElementById(t+'N1').innerText = p.n1;
            document.getElementById(t+'Op').innerText = p.op;
            document.getElementById(t+'N2').innerText = p.n2;
            
            const ansBox = document.getElementById(t+'Ans');
            if (ansBox) {
                ansBox.innerText = '?';
                if(t==='sp') ansBox.className = 'w-16 h-16 sm:w-24 sm:h-24 bg-white rounded-2xl border-4 border-dashed border-sky-400 flex items-center justify-center text-sky-500 animate-pulse shadow-inner text-4xl sm:text-6xl transition-all relative';
                else {
                    const color = t==='p1' ? 'blue' : 'red';
                    ansBox.className = `w-12 h-12 md:w-16 md:h-16 lg:w-20 lg:h-20 bg-${color}-50 rounded-xl sm:rounded-2xl border-4 border-dashed border-${color}-400 flex items-center justify-center text-${color}-500 animate-pulse text-2xl md:text-4xl shadow-inner transition-all relative`;
                }
            }
            
            if(t==='sp') qSP=p; else if(t==='p1') qP1=p; else qP2=p;

            const grid = document.getElementById(t+'Grid');
            grid.innerHTML = '';
            
            const spColors = ['bg-pink-100 text-pink-600 border-pink-300', 'bg-blue-100 text-blue-600 border-blue-300', 'bg-green-100 text-green-600 border-green-300', 'bg-purple-100 text-purple-600 border-purple-300'];
            
            os.forEach((o, index) => {
                const btn = document.createElement('button');
                if(t==='sp') {
                    const colCls = spColors[index % 4];
                    btn.className = `btn-math ${colCls} font-black py-2 sm:py-4 text-3xl sm:text-5xl shadow-sm hover:brightness-95 w-full h-full`;
                } else {
                    const colCls = t==='p1' ? 'bg-white text-[var(--duo-blue)] border-[var(--duo-blue-dark)]' : 'bg-white text-[var(--duo-red)] border-[var(--duo-red-dark)]';
                    btn.className = `btn-math ${colCls} font-black py-2 sm:py-3 text-3xl md:text-5xl shadow-sm hover:bg-slate-50 w-full h-full`;
                }
                btn.innerText = o;
                btn.onclick = () => solve(o, t, btn);
                grid.appendChild(btn);
            });
        }

        function triggerAnim(side) {
            const els = document.querySelectorAll(side === 'left' ? '#team1 .animal' : '#team2 .animal');
            const cls = side === 'left' ? 'pull-l' : 'pull-r';
            els.forEach(e => { e.classList.remove(cls); void e.offsetWidth; e.classList.add(cls); });
        }

        function floatText(txt, targetId, colorClass) {
            const el = document.getElementById(targetId);
            if(!el) return;
            const fl = document.createElement('div');
            fl.innerText = txt;
            fl.className = `absolute top-[-30px] left-1/2 -translate-x-1/2 text-4xl sm:text-5xl font-black ${colorClass} animate-float-text pointer-events-none drop-shadow-md z-[100]`;
            el.appendChild(fl);
            setTimeout(()=>fl.remove(), 1000);
        }

        function solve(v, t, btn) {
            if(!gameActive) return;
            let q = (t==='sp'?qSP:t==='p1'?qP1:qP2);
            const correct = q.ans === v;
            const ansBox = document.getElementById(t+'Ans');
            
            if(correct) {
                playSfx([600, 800], 'sine', 0.15);
                btn.className = btn.className.replace(/bg-\w+-100|bg-white/g, 'bg-[var(--duo-green)] text-white').replace(/border-\w+-300|border-\w+-dark/g, 'border-[var(--duo-green-dark)]').replace(/text-\w+-600|text-\w+-500/g, 'text-white');
                if(ansBox) {
                    ansBox.innerText = v;
                    ansBox.className = ansBox.className.replace(/bg-\w+-50|bg-white/g, 'bg-[var(--duo-green)] text-white border-[var(--duo-green-dark)] scale-110').replace(/border-dashed/g, 'border-solid');
                }
                floatText('+1', t+'Ans', 'text-[var(--duo-green)]');
                
                if(t==='sp' || t==='p1') { p1Score++; triggerAnim('left'); } else { p2Score++; triggerAnim('right'); }
                updateScoreBoard();
                setTimeout(() => { if(gameActive) gen(t); }, 600);
            } else {
                playSfx(150, 'sawtooth', 0.3);
                btn.classList.add('animate-shake-kid', 'bg-[var(--duo-red)]', 'text-white', 'border-[var(--duo-red-dark)]');
                btn.classList.remove('bg-white', 'bg-blue-100', 'bg-pink-100', 'bg-green-100', 'bg-purple-100');
                btn.className = btn.className.replace(/text-\w+-\d00|text-\w+/g, 'text-white');
                btn.disabled = true;
                
                q.wrongCount++;
                if(q.wrongCount >= 2) {
                    if(t==='sp' || t==='p1') { p1Score--; floatText('-1', t+'Ans', 'text-[var(--duo-red)]'); triggerAnim('right');} 
                    else { p2Score--; floatText('-1', t+'Ans', 'text-[var(--duo-red)]'); triggerAnim('left');}
                    q.wrongCount = 0;
                    updateScoreBoard();
                }
            }
        }

        function updateScoreBoard() {
            document.getElementById('p1ScoreTxt').innerText = p1Score;
            document.getElementById('p2ScoreTxt').innerText = p2Score;
            
            visualOffset = p2Score - p1Score;
            const cappedOffset = Math.max(-MAX_OFFSET, Math.min(MAX_OFFSET, visualOffset));
            
            const step = window.innerWidth < 600 ? 15 : 22;
            const tilt = cappedOffset * 0.6;
            document.getElementById('tugGroup').style.transform = `translateX(${cappedOffset * step}px) rotate(${tilt}deg)`;
            
            const percentage = ((cappedOffset + MAX_OFFSET) / (MAX_OFFSET * 2)) * 100;
            const pClamp = Math.max(5, Math.min(95, percentage));
            document.getElementById('progBlue').style.width = `${100 - pClamp}%`;
            document.getElementById('progRed').style.width = `${pClamp}%`;
            document.getElementById('progMarker').style.left = `${pClamp}%`;
        }

        function endGame() {
            gameActive = false;
            document.getElementById('endScreen').classList.remove('hidden');
            document.getElementById('endScreen').classList.add('flex');
            
            const title = document.getElementById('resultTitle');
            
            // Cập nhật điểm cho panel UI mới
            document.getElementById('finalBlueScore').innerText = p1Score;
            document.getElementById('finalRedScore').innerText = p2Score;
            
            if(p1Score > p2Score) {
                title.innerText = "BLUE WINS!"; title.className = "text-6xl sm:text-7xl font-black uppercase kid-text text-[var(--duo-blue)] mb-6 leading-tight drop-shadow-xl";
                playSfx([400, 600, 800, 1000], 'triangle', 0.2);
            } else if(p2Score > p1Score) {
                title.innerText = gameMode === 'cpu' ? "BOT WINS!" : "RED WINS!"; title.className = "text-6xl sm:text-7xl font-black uppercase kid-text text-[var(--duo-red)] mb-6 leading-tight drop-shadow-xl";
                playSfx([300, 200, 150], 'sawtooth', 0.3);
            } else {
                title.innerText = "IT'S A TIE!"; title.className = "text-6xl sm:text-7xl font-black uppercase kid-text text-slate-400 mb-6 leading-tight drop-shadow-xl";
                playSfx([400, 400], 'sine', 0.3);
            }

            triggerConfetti();
            setTimeout(triggerConfetti, 1000);
            setTimeout(triggerConfetti, 2500);
        }

        document.getElementById('muteBtn').onclick = function() {
            isMuted = !isMuted;
            this.innerHTML = isMuted ? muteSvg : speakerSvg;
        };
        
        window.onload = () => document.body.addEventListener('click', () => { if(audioCtx.state==='suspended') audioCtx.resume(); }, {once:true});
    </script>
</body>
</html>
