<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Place Value Party</title>
    <!-- Tích hợp Tailwind CSS qua CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;900&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Ngăn scroll body */
        }

        .pattern-bg {
            background-color: #8cd3ff;
            background-image: 
                radial-gradient(circle at center, rgba(255,255,255,0.3) 12%, transparent 12%),
                radial-gradient(circle at center, rgba(255,255,255,0.3) 12%, transparent 12%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            animation: moveBg 20s linear infinite;
            min-height: 100dvh;
            width: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes moveBg {
            0% { background-position: 0 0, 30px 30px; }
            100% { background-position: 60px 60px, 90px 90px; }
        }

        @keyframes float-y {
            0% { bottom: -150px; animation-timing-function: ease-out; opacity: 0; }
            5% { opacity: 1; }
            50% { bottom: 60vh; animation-timing-function: ease-in; }
            95% { opacity: 1; }
            100% { bottom: -150px; opacity: 0; }
        }
        
        @keyframes float-x {
            0% { transform: translateX(0px) rotate(0deg); }
            100% { transform: translateX(var(--moveX)) rotate(360deg); }
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .bounce-in { animation: bounce-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
        @keyframes bounce-in {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        ::-webkit-scrollbar { display: none; }
        
        /* Utility classes for hiding/showing screens */
        .screen-hidden { display: none !important; }

        /* SVG Icon Helpers */
        .lucide { width: 100%; height: 100%; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>

    <!-- --- Game Logic Scripts --- -->
    <script>
        // Utilities
        const randomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        const formatTens = (t) => t === 1 ? '1 ten' : `${t} tens`;
        const formatOnes = (o) => o === 1 ? '1 one' : `${o} ones`;
        const formatThereIsAre = (n) => n === 1 ? 'There is' : 'There are';

        const generateChoices = (correctAnswer) => {
            const choices = new Set([correctAnswer]);
            while (choices.size < 4) {
                choices.add(randomInt(11, 50));
            }
            return Array.from(choices).sort(() => Math.random() - 0.5); 
        };

        // Synthesizer
        class SoundSynthesizer {
            constructor() { this.ctx = null; }
            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            }
            play(type) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gainNode = this.ctx.createGain();
                osc.connect(gainNode);
                gainNode.connect(this.ctx.destination);
                const now = this.ctx.currentTime;

                if (type === 'pop') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                    gainNode.gain.setValueAtTime(0.5, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now); osc.stop(now + 0.1);
                } else if (type === 'ding') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(1200, now); osc.frequency.exponentialRampToValueAtTime(2000, now + 0.1);
                    gainNode.gain.setValueAtTime(0.3, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    osc.start(now); osc.stop(now + 0.5);
                } else if (type === 'boing') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(800, now + 0.15); osc.frequency.exponentialRampToValueAtTime(200, now + 0.3);
                    gainNode.gain.setValueAtTime(0.4, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now); osc.stop(now + 0.3);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
                    gainNode.gain.setValueAtTime(0.3, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now); osc.stop(now + 0.4);
                } else if (type === 'slice') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                    gainNode.gain.setValueAtTime(0.2, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now); osc.stop(now + 0.1);
                } else if (type === 'tada') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(400, now); osc.frequency.setValueAtTime(500, now + 0.1); osc.frequency.setValueAtTime(600, now + 0.2); osc.frequency.setValueAtTime(800, now + 0.3);
                    gainNode.gain.setValueAtTime(0.2, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.8);
                    osc.start(now); osc.stop(now + 0.8);
                }
            }
            playRandomCorrect() {
                const sounds = ['pop', 'ding', 'boing'];
                this.play(sounds[Math.floor(Math.random() * sounds.length)]);
            }
        }
        const synth = new SoundSynthesizer();

        // Confetti
        function triggerCelebration(duration = 2000) {
            const container = document.getElementById('confetti-container');
            container.innerHTML = '';
            const colors = ['#ff4b4b', '#ffc800', '#58cc02', '#1cb0f6', '#ce82ff', '#ff9600'];
            
            for (let i = 0; i < 60; i++) {
                const conf = document.createElement('div');
                conf.className = 'absolute w-4 h-4 rounded-sm shadow-sm';
                conf.style.left = `${Math.random() * 100}%`;
                conf.style.top = `-10%`;
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animation = `fall ${Math.random() * 2 + 1.5}s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards`;
                conf.style.animationDelay = `${Math.random() * 0.5}s`;
                conf.style.transform = `rotate(${Math.random() * 360}deg)`;
                container.appendChild(conf);
            }
            setTimeout(() => { container.innerHTML = ''; }, duration + 2000);
        }

        // TTS
        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'en-US'; msg.pitch = 1.3; msg.rate = 1.0; 
                const voices = window.speechSynthesis.getVoices();
                const preferredVoice = voices.find(v => v.name.includes('Google US English') || v.name.includes('Samantha') || v.name.includes('Karen'));
                if (preferredVoice) msg.voice = preferredVoice;
                window.speechSynthesis.speak(msg);
            }
        }
        if ('speechSynthesis' in window) window.speechSynthesis.getVoices();

        // --- Game State ---
        let gameState = 'start'; 
        let score = 0;
        let streak = 0;
        let questionsPlayed = 0;
        const TOTAL_QUESTIONS = 10; 

        let currentNum = 0, tens = 0, ones = 0, currentChoices = [];
        let feedback = null, failedCurrent = false;

        let bonusTime = 10, bonusActive = false, isSlicing = false, slicedFruits = new Set(), bonusTimerInterval;

        // --- Core Functions ---
        function updateUI() {
            // Hide all screens
            ['start', 'round1', 'round2', 'bonus', 'end'].forEach(screen => {
                document.getElementById(`screen-${screen}`).classList.add('screen-hidden');
            });

            // Adjust main wrapper alignment
            const wrapper = document.getElementById('main-wrapper');
            if (gameState === 'start' || gameState === 'end') {
                wrapper.classList.add('justify-center', 'my-auto');
                wrapper.classList.remove('justify-start', 'pt-2', 'sm:pt-6', 'pb-6');
            } else {
                wrapper.classList.remove('justify-center', 'my-auto');
                wrapper.classList.add('justify-start', 'pt-2', 'sm:pt-6', 'pb-6');
            }

            // Update shared UI (Score & Progress)
            const scoreDisplays = document.querySelectorAll('.score-display');
            scoreDisplays.forEach(el => el.textContent = score);
            
            const progressBars = document.querySelectorAll('.progress-bar');
            const progressPercent = (questionsPlayed / TOTAL_QUESTIONS) * 100;
            progressBars.forEach(el => el.style.width = `${progressPercent}%`);

            // Show active screen and update specific content
            document.getElementById(`screen-${gameState}`).classList.remove('screen-hidden');

            if (gameState === 'round1') {
                document.getElementById('r1-tens-text').textContent = `${formatThereIsAre(tens)} ${formatTens(tens)}.`;
                document.getElementById('r1-ones-text').textContent = `${formatThereIsAre(ones)} ${formatOnes(ones)}.`;
                for(let i=0; i<4; i++){
                    const btn = document.getElementById(`choice-${i}`);
                    btn.textContent = currentChoices[i];
                    
                    // Reset styling
                    const colorThemes = [
                        { bg: 'bg-[#ff4b4b]', border: 'border-[#d90000]', btm: 'border-b-[#d90000]' },
                        { bg: 'bg-[#1cb0f6]', border: 'border-[#1899d6]', btm: 'border-b-[#1899d6]' },
                        { bg: 'bg-[#ce82ff]', border: 'border-[#a552cc]', btm: 'border-b-[#a552cc]' },
                        { bg: 'bg-[#ff9600]', border: 'border-[#cc7800]', btm: 'border-b-[#cc7800]' }
                    ];
                    const theme = colorThemes[i];
                    
                    btn.className = `py-6 sm:py-8 text-4xl sm:text-5xl font-black rounded-[1.5rem] sm:rounded-[2rem] transition-all duration-150 shadow-sm text-white cursor-pointer select-none border-b-[6px] sm:border-b-[8px] hover:brightness-110 active:border-b-0 active:translate-y-[8px] sm:active:translate-y-[10px] ${theme.bg} ${theme.border}`;
                    btn.disabled = false;
                }
                document.getElementById('r1-feedback').innerHTML = '';
            } 
            else if (gameState === 'round2') {
                document.getElementById('r2-target-num').textContent = currentNum;
                document.getElementById('expanded-input').value = '';
                document.getElementById('expanded-input').disabled = false;
                document.getElementById('r2-submit-btn').disabled = false;
                document.getElementById('r2-feedback').innerHTML = '';
            }
            else if (gameState === 'bonus') {
                document.getElementById('bonus-target-text').textContent = `${formatTens(tens)}, ${formatOnes(ones)}`;
                document.getElementById('bonus-timer').textContent = bonusTime;
                document.getElementById('bonus-feedback-overlay').classList.add('screen-hidden');
            }
            else if (gameState === 'end') {
                document.getElementById('final-score').textContent = score;
            }
        }

        function initGame() {
            synth.init();
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            score = 0; streak = 0; questionsPlayed = 0;
            nextQuestion();
        }

        function nextQuestion() {
            if (questionsPlayed >= TOTAL_QUESTIONS) {
                gameState = 'end';
                synth.play('tada');
                triggerCelebration(4000);
                speakText("Incredible job! You are a place value master!");
                updateUI();
                return;
            }

            currentNum = randomInt(11, 50);
            tens = Math.floor(currentNum / 10);
            ones = currentNum % 10;
            currentChoices = generateChoices(currentNum);
            
            feedback = null;
            failedCurrent = false;
            gameState = 'round1';
            questionsPlayed++;

            updateUI();
            speakText(`Find the number! ${formatThereIsAre(tens)} ${formatTens(tens)} and ${formatOnes(ones)}.`);
        }

        function handleReplayPrompt() {
            if (gameState === 'round1') speakText(`${formatThereIsAre(tens)} ${formatTens(tens)} and ${formatOnes(ones)}. What number is it?`);
            else if (gameState === 'round2') speakText(`Type the expanded form for ${currentNum}. How many tens and ones?`);
            else if (gameState === 'bonus') speakText(`Ninja fruit time! Slice the fruit for ${formatTens(tens)} and ${formatOnes(ones)}!`);
        }

        function handleChoiceClick(choiceIndex) {
            if (feedback === 'correct') return;
            const choice = currentChoices[choiceIndex];
            const btn = document.getElementById(`choice-${choiceIndex}`);

            if (choice === currentNum) {
                synth.playRandomCorrect();
                feedback = 'correct';
                triggerCelebration(1500);
                if (!failedCurrent) score++;
                
                // Style correct button
                btn.className = `py-6 sm:py-8 text-4xl sm:text-5xl font-black rounded-[1.5rem] sm:rounded-[2rem] transition-all duration-150 shadow-sm text-white select-none bg-[#58cc02] border-[#46a302] border-b-0 translate-y-[8px] sm:translate-y-[10px] shadow-none cursor-default`;
                
                // Disable all buttons
                for(let i=0; i<4; i++) document.getElementById(`choice-${i}`).disabled = true;

                document.getElementById('r1-feedback').innerHTML = '<span class="text-3xl sm:text-4xl font-black text-[#58cc02] animate-bounce">Super! 🎉</span>';
                updateUI(); // Updates score visually

                setTimeout(() => {
                    feedback = null;
                    failedCurrent = false; 
                    gameState = 'round2';
                    updateUI();
                    speakText(`Perfect! Now type the expanded form for ${currentNum}.`);
                    setTimeout(() => document.getElementById('expanded-input').focus(), 150);
                }, 1500);
            } else {
                synth.play('wrong');
                failedCurrent = true;
                document.getElementById('r1-feedback').innerHTML = '<span class="text-3xl sm:text-4xl font-black text-[#ff4b4b] animate-pulse">Try Again! 👀</span>';
                speakText("Oops! Try again!");
                setTimeout(() => {
                    if (feedback !== 'correct') document.getElementById('r1-feedback').innerHTML = '';
                }, 1200);
            }
        }

        function handleExpandedSubmit(e) {
            e.preventDefault();
            if (feedback === 'correct') return;

            const inputVal = document.getElementById('expanded-input').value;
            const cleanInput = inputVal.replace(/\s+/g, '');
            const correctAnswer = `${tens * 10}+${ones}`;

            if (cleanInput === correctAnswer) {
                synth.playRandomCorrect();
                feedback = 'correct';
                triggerCelebration(1500);
                
                document.getElementById('expanded-input').disabled = true;
                document.getElementById('r2-submit-btn').disabled = true;

                if (!failedCurrent) {
                    score++;
                    streak++;
                } else {
                    streak = 0; 
                }

                document.getElementById('r2-feedback').innerHTML = '<span class="text-3xl sm:text-4xl font-black text-[#58cc02] animate-bounce">Perfect! 🌟</span>';
                updateUI();

                setTimeout(() => {
                    feedback = null;
                    if (streak >= 3) startBonusRound();
                    else nextQuestion();
                }, 1500);
            } else {
                synth.play('wrong');
                failedCurrent = true;
                document.getElementById('r2-feedback').innerHTML = '<span class="text-2xl sm:text-3xl font-black text-[#ff4b4b] animate-pulse">Tens + Ones!</span>';
                speakText("Remember: Tens plus Ones!");
                document.getElementById('expanded-input').value = '';
                setTimeout(() => {
                    if (feedback !== 'correct') document.getElementById('r2-feedback').innerHTML = '';
                }, 1200);
            }
        }

        // --- Bonus Round Logic ---
        function startBonusRound() {
            gameState = 'bonus';
            streak = 0;
            bonusTime = 10;
            bonusActive = true;
            slicedFruits = new Set();
            updateUI();

            const emojis = ['🍎', '🍉', '🍇', '🍓', '🍌', '🍍', '🥭', '🍑', '🥥', '🥝'];
            const container = document.getElementById('fruits-container');
            container.innerHTML = ''; // Clear old fruits

            // Generate fruits
            let fruitsData = Array.from({ length: 20 }).map((_, i) => {
                return {
                    id: i,
                    number: (i % 3 === 0) ? currentNum : randomInt(11, 50),
                    emoji: emojis[randomInt(0, emojis.length - 1)],
                    startX: randomInt(10, 80),
                    moveX: randomInt(-200, 200),
                    duration: randomInt(3, 5),
                    delay: Math.random() * 8
                };
            }).sort(() => Math.random() - 0.5);

            fruitsData.forEach(f => {
                const wrapper = document.createElement('div');
                wrapper.className = 'absolute opacity-0';
                wrapper.style.left = `${f.startX}%`;
                wrapper.style.bottom = '-150px';
                wrapper.style.animation = `float-y ${f.duration}s forwards`;
                wrapper.style.animationDelay = `${f.delay}s`;

                const fruitInner = document.createElement('div');
                fruitInner.className = 'relative text-[5rem] sm:text-[7rem] select-none cursor-crosshair flex items-center justify-center w-32 h-32 pointer-events-auto';
                fruitInner.style.setProperty('--moveX', `${f.moveX}px`);
                fruitInner.style.animation = `float-x ${f.duration}s linear forwards`;
                fruitInner.style.animationDelay = `${f.delay}s`;
                fruitInner.style.filter = 'drop-shadow(0 15px 10px rgba(0,0,0,0.5))';

                // Setup interactions
                const handleInteraction = (e) => {
                    e.stopPropagation();
                    if (!bonusActive || slicedFruits.has(f.id)) return;
                    if (e.type === 'pointerdown') isSlicing = true;
                    if (isSlicing || e.type === 'pointerdown') processSlice(f, fruitInner);
                };

                fruitInner.addEventListener('pointerenter', handleInteraction);
                fruitInner.addEventListener('pointerdown', handleInteraction);

                fruitInner.innerHTML = `
                    <span>${f.emoji}</span>
                    <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                        <span class="bg-white rounded-full px-3 py-1 text-2xl sm:text-3xl font-black text-[#4b4b4b] shadow-2xl border-[4px] border-gray-200">
                            ${f.number}
                        </span>
                    </div>
                `;

                wrapper.appendChild(fruitInner);
                container.appendChild(wrapper);
            });

            speakText(`Bonus Round! Slice the fruit for ${currentNum}!`);

            // Timer Loop
            clearInterval(bonusTimerInterval);
            bonusTimerInterval = setInterval(() => {
                if (bonusTime > 0 && bonusActive) {
                    bonusTime--;
                    document.getElementById('bonus-timer').textContent = bonusTime;
                    if (bonusTime === 0) {
                        endBonus(false);
                    }
                }
            }, 1000);
        }

        function processSlice(f, element) {
            slicedFruits.add(f.id);
            element.innerHTML = `<span class="text-[6rem] sm:text-[8rem] drop-shadow-md animate-ping" style="animation-duration: 0.4s; animation-iteration-count: 1; animation-fill-mode: forwards;">💥</span>`;

            if (f.number === currentNum) {
                endBonus(true);
            } else {
                synth.play('slice');
            }
        }

        function endBonus(isWin) {
            bonusActive = false;
            clearInterval(bonusTimerInterval);
            const overlay = document.getElementById('bonus-feedback-overlay');
            const overlayText = document.getElementById('bonus-feedback-text');
            overlay.classList.remove('screen-hidden');

            if (isWin) {
                synth.play('tada');
                score += 5;
                updateUI();
                triggerCelebration(2500);
                overlayText.innerHTML = `+5 STARS! <br/>✨⭐✨`;
                speakText("Awesome slicing! 5 bonus stars!");
            } else {
                synth.play('wrong');
                overlayText.innerHTML = `Time's Up! ⏰`;
                overlayText.className = "text-4xl sm:text-[5rem] font-black text-white drop-shadow-[0_8px_8px_rgba(0,0,0,0.8)] text-center";
                speakText("Time is up! Let's keep going!");
            }

            setTimeout(() => {
                nextQuestion();
            }, 2500);
        }

        // Global pointer events for slicing state
        document.addEventListener('pointerdown', () => isSlicing = true);
        document.addEventListener('pointerup', () => isSlicing = false);
        document.addEventListener('pointercancel', () => isSlicing = false);

    </script>
</body>
</html>
