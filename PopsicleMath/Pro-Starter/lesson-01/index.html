<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Comparisons: Size & Length</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap');
        
        body {
            font-family: 'Comic Neue', cursive, sans-serif;
            background-color: #87CEEB; /* Sky blue */
            user-select: none;
            overflow: hidden; /* Prevent scrolling in game */
        }

        .bounce {
            animation: bounce 0.5s;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .shake {
            animation: shake 0.5s;
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }

        .option-card {
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .option-card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .option-card.correct {
            border-color: #4ade80;
            background-color: #dcfce7;
            pointer-events: none;
        }
        .option-card.wrong {
            border-color: #f87171;
            background-color: #fee2e2;
        }

        /* Minigame Target */
        .target-ring {
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        #crosshair {
            transition: left 0.05s linear;
        }

        /* Dart Animation */
        .dart-container {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            pointer-events: none;
            z-index: 60; /* Above everything */
            width: 60px;
            height: 120px;
        }

        .dart-container.fly {
            opacity: 1;
            animation: dartFly 0.5s ease-out forwards;
        }

        @keyframes dartFly {
            0% {
                transform: translateX(-50%) translateY(0) scale(1);
            }
            100% {
                /* fly up and land on the target at the crosshair's X position */
                transform: translateX(calc(-50% + var(--dart-target-x))) translateY(-40vh) scale(0.6) rotate(180deg);
            }
        }

        /* Confetti */
        .confetti {
            position: absolute;
            width: 15px;
            height: 15px;
            background-color: #f00;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center">

    <!-- Start Screen -->
    <div id="start-screen" class="text-center bg-white p-10 rounded-3xl shadow-2xl max-w-2xl w-[90%] border-4 border-yellow-400 relative z-10">
        <img src="https://image2url.com/r2/default/images/1770270908168-036a8878-e468-415d-9a50-73d8cbcc8574.png" alt="Game Logo" class="h-32 mx-auto mb-6 object-contain drop-shadow-md" onerror="this.style.display='none'">
        <h1 class="text-5xl md:text-6xl text-blue-600 mb-6 drop-shadow-md">Size & Length Explorer!</h1>
        <p class="text-2xl text-gray-700 mb-8">Let's learn about longer, taller, and shorter!</p>
        <button onclick="startGame()" class="bg-green-500 hover:bg-green-600 text-white text-3xl py-4 px-10 rounded-full shadow-lg transform transition hover:scale-110 active:scale-95 border-b-4 border-green-700">
            <i class="fas fa-play mr-2"></i> Play Now
        </button>
    </div>

    <!-- Main Game Screen -->
    <div id="game-screen" class="hidden w-full h-full flex flex-col items-center justify-between py-6 px-4">
        
        <!-- Header / Progress -->
        <div class="w-full max-w-4xl flex flex-wrap gap-2 justify-between items-center bg-white p-4 rounded-2xl shadow-md border-2 border-blue-200">
            <div class="flex items-center gap-3 md:gap-4">
                <img src="https://image2url.com/r2/default/images/1770270908168-036a8878-e468-415d-9a50-73d8cbcc8574.png" alt="Game Logo" class="h-10 md:h-12 object-contain" onerror="this.style.display='none'">
                <div class="text-xl text-blue-800 font-bold">
                    Score: <span id="score-display">0</span>
                </div>
            </div>
            <div class="flex space-x-2" id="streak-stars">
                <!-- Stars will be injected here -->
            </div>
            <div class="text-xl text-purple-600 font-bold">
                Question <span id="q-current">1</span>/<span id="q-total">9</span>
            </div>
        </div>

        <!-- Question Area -->
        <div class="text-center mt-4 bg-white p-6 rounded-3xl shadow-lg border-4 border-purple-300 w-full max-w-4xl relative">
            <button onclick="repeatQuestionAudio()" class="absolute top-4 right-4 bg-blue-100 hover:bg-blue-200 text-blue-600 p-3 rounded-full text-2xl transition-colors">
                <i class="fas fa-volume-up"></i>
            </button>
            <h2 id="question-text" class="text-4xl md:text-5xl text-gray-800 mt-2 mb-4">Question goes here?</h2>
        </div>

        <!-- Options Container -->
        <div id="options-container" class="flex flex-row flex-wrap justify-center items-end gap-6 my-6 flex-grow w-full max-w-5xl">
            <!-- Options injected via JS -->
        </div>

        <!-- Feedback Area -->
        <div id="feedback-area" class="h-20 text-3xl font-bold flex items-center justify-center w-full">
            <!-- Correct/Wrong text -->
        </div>
    </div>

    <!-- Minigame Screen -->
    <div id="minigame-screen" class="hidden absolute inset-0 bg-blue-900 bg-opacity-90 flex flex-col items-center justify-center z-50">
        <h2 class="text-5xl text-yellow-300 mb-2 drop-shadow-lg">Bonus Game: Bullseye!</h2>
        <p class="text-2xl text-white mb-8">Click or tap to throw the dart when the crosshair is in the center!</p>
        
        <div class="relative w-64 h-64 md:w-96 md:h-96 bg-white rounded-full shadow-2xl overflow-hidden cursor-pointer" onclick="throwDart()">
            <!-- Target Rings -->
            <div class="target-ring w-full h-full bg-white"></div>
            <div class="target-ring w-4/5 h-4/5 bg-black"></div>
            <div class="target-ring w-3/5 h-3/5 bg-blue-500"></div>
            <div class="target-ring w-2/5 h-2/5 bg-red-500"></div>
            <div class="target-ring w-1/5 h-1/5 bg-yellow-400"></div>
            
            <!-- Moving Crosshair -->
            <div id="crosshair" class="absolute top-0 bottom-0 w-1 bg-green-400 shadow-[0_0_10px_green] z-10" style="left: 0%;"></div>
        </div>
        
        <!-- Dart Container (Hidden by default) -->
        <div id="dart-container" class="dart-container">
            <!-- Dart SVG injected here -->
        </div>

        <div id="minigame-feedback" class="h-16 text-4xl font-bold text-white mt-8"></div>
    </div>

    <!-- Victory Screen -->
    <div id="victory-screen" class="hidden absolute inset-0 bg-yellow-100 flex flex-col items-center justify-center z-50">
        <div class="bg-white p-12 rounded-3xl shadow-2xl text-center border-4 border-yellow-400 max-w-2xl">
            <img src="https://image2url.com/r2/default/images/1770270908168-036a8878-e468-415d-9a50-73d8cbcc8574.png" alt="Game Logo" class="h-24 mx-auto mb-6 object-contain" onerror="this.style.display='none'">
            <h1 class="text-6xl text-green-500 mb-6 font-bold"><i class="fas fa-trophy text-yellow-400"></i> You Won!</h1>
            <p class="text-3xl text-gray-700 mb-8">You are a Size & Length Master!</p>
            <p class="text-2xl text-blue-600 mb-8">Final Score: <span id="final-score" class="font-bold text-4xl"></span></p>
            <button onclick="location.reload()" class="bg-blue-500 hover:bg-blue-600 text-white text-3xl py-4 px-10 rounded-full shadow-lg transform transition hover:scale-110">
                <i class="fas fa-redo mr-2"></i> Play Again
            </button>
        </div>
    </div>

    <script>
        // --- AUDIO SYSTEM (Web Audio API for SFX & SpeechSynthesis for Voice) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const synth = window.speechSynthesis;
        let selectedVoice = null;

        function initVoices() {
            const voices = synth.getVoices();
            // Try to find a friendly English voice
            selectedVoice = voices.find(v => v.lang === 'en-US' && v.name.includes('Female')) || 
                            voices.find(v => v.lang === 'en-US') || 
                            voices.find(v => v.lang.startsWith('en')) || 
                            voices[0];
        }
        speechSynthesis.onvoiceschanged = initVoices;

        function speak(text, callback = null) {
            if (synth.speaking) synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            if (selectedVoice) utterance.voice = selectedVoice;
            utterance.rate = 0.85; // Slightly slower for kids
            utterance.pitch = 1.1; // Slightly higher pitch
            
            if (callback) {
                utterance.onend = callback;
            }
            synth.speak(utterance);
        }

        function playTone(frequency, type, duration, vol = 0.5) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = type;
            oscillator.frequency.value = frequency;
            
            gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + duration);
        }

        function playCorrectSound() {
            playTone(523.25, 'sine', 0.1); // C5
            setTimeout(() => playTone(659.25, 'sine', 0.1), 100); // E5
            setTimeout(() => playTone(783.99, 'sine', 0.2), 200); // G5
        }

        function playWrongSound() {
            playTone(300, 'sawtooth', 0.3, 0.2);
            setTimeout(() => playTone(250, 'sawtooth', 0.4, 0.2), 150);
        }

        function playMinigameWin() {
            playTone(400, 'square', 0.1);
            setTimeout(() => playTone(600, 'square', 0.1), 100);
            setTimeout(() => playTone(800, 'square', 0.3), 200);
            setTimeout(() => playTone(1200, 'square', 0.4), 300);
        }

        function playMinigameMiss() {
            playTone(200, 'triangle', 0.5);
        }

        // --- SVG GENERATORS ---
        function drawDart() {
            return `<svg viewBox="0 0 60 120" width="100%" height="100%">
                <!-- Flights (Feathers) -->
                <path d="M25,100 L5,120 L25,115 L45,120 L25,100" fill="#ef4444" />
                <path d="M35,100 L55,120 L35,115 L15,120 L35,100" fill="#ef4444" />
                <!-- Barrel -->
                <rect x="25" y="30" width="10" height="70" fill="#d1d5db" stroke="#9ca3af" stroke-width="1" rx="2" />
                <!-- Point -->
                <polygon points="30,0 20,30 40,30" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/>
            </svg>`;
        }

        function drawPencil(length, color) {
            return `<svg viewBox="0 0 ${length + 50} 40" width="100%" height="60px" style="max-width: ${length + 50}px">
                <!-- Tip -->
                <polygon points="0,20 20,10 20,30" fill="#fcd34d" />
                <polygon points="0,20 8,16 8,24" fill="#1f2937" />
                <!-- Body -->
                <rect x="20" y="10" width="${length}" height="20" fill="${color}" stroke="#1f2937" stroke-width="2"/>
                <line x1="20" y1="15" x2="${20+length}" y2="15" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                <!-- Metal part -->
                <rect x="${20 + length}" y="10" width="10" height="20" fill="#9ca3af" />
                <!-- Eraser -->
                <rect x="${30 + length}" y="10" width="15" height="20" fill="#f87171" rx="4" />
            </svg>`;
        }

        function drawTree(height) {
            return `<svg viewBox="0 0 100 ${height + 60}" width="100px" height="100%" style="max-height: ${height + 60}px">
                <!-- Trunk -->
                <rect x="40" y="50" width="20" height="${height}" fill="#78350f" rx="2" />
                <!-- Leaves -->
                <circle cx="50" cy="50" r="30" fill="#22c55e" />
                <circle cx="35" cy="35" r="25" fill="#16a34a" />
                <circle cx="65" cy="35" r="25" fill="#16a34a" />
                <circle cx="50" cy="20" r="25" fill="#15803d" />
            </svg>`;
        }

        function drawBuilding(height, color) {
            let windows = '';
            let numRows = Math.floor(height / 25);
            for(let i=0; i<numRows; i++) {
                windows += `<rect x="20" y="${height - (i*25) - 20}" width="15" height="15" fill="#e0f2fe" rx="2"/>`;
                windows += `<rect x="45" y="${height - (i*25) - 20}" width="15" height="15" fill="#e0f2fe" rx="2"/>`;
            }
            return `<svg viewBox="0 0 80 ${height + 20}" width="80px" height="100%" style="max-height: ${height + 20}px">
                <rect x="10" y="10" width="60" height="${height}" fill="${color}" stroke="#1e293b" stroke-width="3" rx="4"/>
                <rect x="30" y="${height - 10}" width="20" height="20" fill="#1e293b" /> <!-- Door -->
                ${windows}
            </svg>`;
        }

        // --- GAME DATA ---
        const gameData = [
            {
                question: "Which pencil is longer?",
                repeatCorrect: "The red pencil is longer.",
                layout: "horizontal", // items placed in a column, content extends horizontally
                options: [
                    { id: 1, html: drawPencil(150, '#3b82f6'), isCorrect: false },
                    { id: 2, html: drawPencil(250, '#ef4444'), isCorrect: true }
                ]
            },
            {
                question: "Which tree is taller?",
                repeatCorrect: "The right tree is taller.",
                layout: "vertical", // items placed side by side, content extends vertically
                options: [
                    { id: 1, html: drawTree(100), isCorrect: false },
                    { id: 2, html: drawTree(180), isCorrect: true }
                ]
            },
            {
                question: "Which building is shorter?",
                repeatCorrect: "The blue building is shorter.",
                layout: "vertical",
                options: [
                    { id: 1, html: drawBuilding(120, '#3b82f6'), isCorrect: true },
                    { id: 2, html: drawBuilding(200, '#eab308'), isCorrect: false }
                ]
            },
            {
                question: "Which pencil is the longest?",
                repeatCorrect: "The green pencil is the longest.",
                layout: "horizontal",
                options: [
                    { id: 1, html: drawPencil(100, '#a855f7'), isCorrect: false },
                    { id: 2, html: drawPencil(280, '#22c55e'), isCorrect: true },
                    { id: 3, html: drawPencil(180, '#f97316'), isCorrect: false }
                ]
            },
            {
                question: "Which tree is the tallest?",
                repeatCorrect: "The middle tree is the tallest.",
                layout: "vertical",
                options: [
                    { id: 1, html: drawTree(120), isCorrect: false },
                    { id: 2, html: drawTree(220), isCorrect: true },
                    { id: 3, html: drawTree(150), isCorrect: false }
                ]
            },
            {
                question: "Which pencil is the shortest?",
                repeatCorrect: "The yellow pencil is the shortest.",
                layout: "horizontal",
                options: [
                    { id: 1, html: drawPencil(200, '#3b82f6'), isCorrect: false },
                    { id: 2, html: drawPencil(150, '#ec4899'), isCorrect: false },
                    { id: 3, html: drawPencil(90, '#eab308'), isCorrect: true }
                ]
            },
            {
                question: "Which pencil is shorter?",
                repeatCorrect: "The pink pencil is shorter.",
                layout: "horizontal",
                options: [
                    { id: 1, html: drawPencil(220, '#8b5cf6'), isCorrect: false },
                    { id: 2, html: drawPencil(130, '#ec4899'), isCorrect: true }
                ]
            },
            {
                question: "Which building is the shortest?",
                repeatCorrect: "The orange building is the shortest.",
                layout: "vertical",
                options: [
                    { id: 1, html: drawBuilding(180, '#22c55e'), isCorrect: false },
                    { id: 2, html: drawBuilding(90, '#f97316'), isCorrect: true },
                    { id: 3, html: drawBuilding(240, '#a855f7'), isCorrect: false }
                ]
            },
            {
                question: "Which building is the tallest?",
                repeatCorrect: "The purple building is the tallest.",
                layout: "vertical",
                options: [
                    { id: 1, html: drawBuilding(150, '#ef4444'), isCorrect: false },
                    { id: 2, html: drawBuilding(250, '#a855f7'), isCorrect: true },
                    { id: 3, html: drawBuilding(200, '#3b82f6'), isCorrect: false }
                ]
            }
        ];

        // --- GAME STATE ---
        let currentQuestionIndex = 0;
        let score = 0;
        let streak = 0; // To trigger minigame
        let isProcessing = false;
        
        // Minigame state
        let crosshairPos = 0;
        let crosshairDir = 1;
        let minigameAnimFrame;
        let isMinigameActive = false;

        // --- CORE FUNCTIONS ---

        function startGame() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            initVoices(); // Try init again on user gesture
            
            // Pre-render dart
            document.getElementById('dart-container').innerHTML = drawDart();

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            if (currentQuestionIndex >= gameData.length) {
                showVictory();
                return;
            }

            isProcessing = false;
            const q = gameData[currentQuestionIndex];
            
            // Update UI Counters
            document.getElementById('q-current').innerText = currentQuestionIndex + 1;
            document.getElementById('q-total').innerText = gameData.length;
            document.getElementById('question-text').innerText = q.question;
            document.getElementById('feedback-area').innerHTML = '';
            
            updateStreakUI();

            // Render Options
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            // Adjust layout based on type
            if(q.layout === 'vertical') {
                container.className = "flex flex-row justify-center items-end gap-10 my-6 flex-grow w-full max-w-5xl h-64";
            } else {
                container.className = "flex flex-col justify-center items-start gap-8 my-6 flex-grow w-full max-w-2xl mx-auto";
            }

            q.options.forEach((opt, index) => {
                const card = document.createElement('div');
                // Card styling based on layout
                if(q.layout === 'vertical') {
                    card.className = "option-card bg-white border-4 border-gray-200 rounded-xl p-4 flex flex-col justify-end items-center h-full w-40";
                } else {
                    card.className = "option-card bg-white border-4 border-gray-200 rounded-xl p-4 flex items-center w-full";
                }
                
                card.innerHTML = opt.html;
                card.onclick = () => checkAnswer(opt.isCorrect, card, q.repeatCorrect);
                container.appendChild(card);
            });

            // Speak question
            setTimeout(() => speak(q.question), 300);
        }

        function repeatQuestionAudio() {
            if(!isProcessing) {
                speak(gameData[currentQuestionIndex].question);
            }
        }

        function checkAnswer(isCorrect, cardElement, repeatText) {
            if (isProcessing) return;
            isProcessing = true;

            const feedbackArea = document.getElementById('feedback-area');

            if (isCorrect) {
                playCorrectSound();
                cardElement.classList.add('correct', 'bounce');
                score += 10;
                streak++;
                document.getElementById('score-display').innerText = score;
                
                feedbackArea.innerHTML = `<span class="text-green-500 bg-white px-6 py-2 rounded-full shadow"><i class="fas fa-check-circle"></i> Excellent!</span>`;
                
                speak(repeatText, () => {
                    setTimeout(() => {
                        currentQuestionIndex++;
                        if (streak === 3 && currentQuestionIndex < gameData.length) {
                            startMinigame();
                        } else {
                            loadQuestion();
                        }
                    }, 500);
                });

            } else {
                playWrongSound();
                cardElement.classList.add('wrong', 'shake');
                streak = 0;
                updateStreakUI();
                feedbackArea.innerHTML = `<span class="text-red-500 bg-white px-6 py-2 rounded-full shadow"><i class="fas fa-times-circle"></i> Try again!</span>`;
                
                setTimeout(() => {
                    cardElement.classList.remove('wrong', 'shake');
                    feedbackArea.innerHTML = '';
                    isProcessing = false;
                }, 1000);
            }
        }

        function updateStreakUI() {
            const container = document.getElementById('streak-stars');
            container.innerHTML = '';
            for(let i=0; i<3; i++) {
                if(i < streak) {
                    container.innerHTML += `<i class="fas fa-star text-yellow-400 text-2xl drop-shadow-sm"></i>`;
                } else {
                    container.innerHTML += `<i class="far fa-star text-gray-300 text-2xl"></i>`;
                }
            }
        }

        // --- MINIGAME LOGIC ---

        function startMinigame() {
            streak = 0; // Reset streak
            document.getElementById('streak-stars').innerHTML = '';
            isMinigameActive = true;
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('minigame-screen').classList.remove('hidden');
            document.getElementById('minigame-feedback').innerText = '';
            
            // Ensure dart is reset
            const dart = document.getElementById('dart-container');
            dart.classList.remove('fly');
            dart.style.removeProperty('--dart-target-x');

            speak("Bonus Game! Click to hit the bullseye!");
            
            crosshairPos = 0;
            crosshairDir = 1;
            animateCrosshair();
        }

        function animateCrosshair() {
            if (!isMinigameActive) return;
            
            const crosshair = document.getElementById('crosshair');
            const speed = 2; // Speed of movement
            
            crosshairPos += speed * crosshairDir;
            
            if (crosshairPos >= 100) {
                crosshairPos = 100;
                crosshairDir = -1;
            } else if (crosshairPos <= 0) {
                crosshairPos = 0;
                crosshairDir = 1;
            }
            
            crosshair.style.left = `${crosshairPos}%`;
            minigameAnimFrame = requestAnimationFrame(animateCrosshair);
        }

        function throwDart() {
            if (!isMinigameActive) return;
            isMinigameActive = false;
            cancelAnimationFrame(minigameAnimFrame);

            const dart = document.getElementById('dart-container');
            
            // Calculate horizontal target offset relative to center for CSS animation
            // crosshairPos is 0-100%, we want a value from approx -150px to +150px
            // A simple approximation is (pos - 50) * multiplier
            const targetOffset = (crosshairPos - 50) * 3;
            dart.style.setProperty('--dart-target-x', `${targetOffset}px`);
            
            // Trigger animation
            dart.classList.add('fly');

            // Wait for animation to finish before showing feedback (0.5s)
            setTimeout(() => {
                const feedback = document.getElementById('minigame-feedback');
                
                // Calculate distance from center (50%)
                const distance = Math.abs(50 - crosshairPos);
                
                let points = 0;
                if (distance < 10) { // Yellow center (approx 20% width = 10% radius)
                    points = 50;
                    playMinigameWin();
                    feedback.innerHTML = `<span class="text-yellow-400">BULLSEYE! +50 points!</span>`;
                    speak("Bullseye! Amazing!");
                } else if (distance < 20) { // Red
                    points = 20;
                    playCorrectSound();
                    feedback.innerHTML = `<span class="text-red-400">Great Shot! +20 points!</span>`;
                    speak("Great shot!");
                } else if (distance < 30) { // Blue
                    points = 10;
                    playCorrectSound();
                    feedback.innerHTML = `<span class="text-blue-300">Good! +10 points!</span>`;
                } else {
                    playMinigameMiss();
                    feedback.innerHTML = `<span class="text-gray-300">Missed the center!</span>`;
                    speak("Oops, missed!");
                }

                score += points;
                document.getElementById('score-display').innerText = score;

                setTimeout(() => {
                    document.getElementById('minigame-screen').classList.add('hidden');
                    document.getElementById('game-screen').classList.remove('hidden');
                    loadQuestion();
                }, 3000);
            }, 500); // Wait for dart animation
        }

        // --- VICTORY SYSTEM ---

        function showVictory() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('victory-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            
            speak("Congratulations! You won the game!");
            playMinigameWin();
            createConfetti();
        }

        function createConfetti() {
            const colors = ['#f00', '#0f0', '#00f', '#ff0', '#f0f', '#0ff'];
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confetti.style.animationDelay = (Math.random() * 2) + 's';
                document.body.appendChild(confetti);
            }
        }

    </script>
</body>
</html>
