<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Repeated Addition Multiplication V3</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-top: #78C6FA;
            --sky-bottom: #C4E8FF;
            --grass-main: #58CC02;
            --grass-dark: #46A302;
            --card-bg: #ffffff;
            --text-main: #3C3C3C;
            --btn-blue: #1CB0F6;
            --btn-blue-shadow: #1899D6;
            --btn-green: #58CC02;
            --btn-green-shadow: #46A302;
            --btn-red: #FF4B4B;
            --btn-red-shadow: #EA2B2B;
            --btn-gray: #E5E5E5;
            --btn-gray-shadow: #CECECE;
            --box-bg: #F7F9FA;
            --box-border: #E5E5E5;
            --font-family: 'Poppins', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100vh; /* Strictly fit to viewport */
            overflow: hidden; /* Prevent scrolling */
        }

        body {
            font-family: var(--font-family);
            background: linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-bottom) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            padding: 10px;
        }

        /* --- Beautiful Scenery --- */
        .scenery {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            overflow: hidden;
        }

        .grass {
            position: absolute;
            bottom: 0; left: -10%; right: -10%;
            height: 20vh;
            background: var(--grass-main);
            border-top: 15px solid var(--grass-dark);
            border-radius: 50% 50% 0 0 / 30px 30px 0 0;
        }

        /* Trees */
        .tree {
            position: absolute;
            bottom: 15vh;
            width: 20px;
            height: 40px;
            background: #8B4513;
            border-radius: 2px;
        }
        .tree::after {
            content: '';
            position: absolute;
            top: -40px;
            left: -20px;
            width: 60px;
            height: 60px;
            background: #46A302;
            border-radius: 50%;
            box-shadow: 15px 5px 0 #58CC02, -5px 15px 0 #3e9102;
        }
        .tree-1 { left: 10%; transform: scale(1.2); }
        .tree-2 { left: 85%; transform: scale(0.8); }

        /* Flowers */
        .flower {
            position: absolute;
            bottom: 5vh;
            width: 12px;
            height: 12px;
            background: #FFD700;
            border-radius: 50%;
            z-index: 2;
        }
        .flower-pink {
            box-shadow: -10px 0 0 #FF69B4, 10px 0 0 #FF69B4, 0 -10px 0 #FF69B4, 0 10px 0 #FF69B4;
        }
        .flower-white {
            box-shadow: -10px 0 0 #FFF, 10px 0 0 #FFF, 0 -10px 0 #FFF, 0 10px 0 #FFF;
        }
        .f1 { left: 20%; bottom: 8vh; }
        .f2 { left: 50%; bottom: 4vh; transform: scale(0.8); }
        .f3 { left: 75%; bottom: 10vh; }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.9;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .cloud-1 { top: 15%; left: 5%; width: 120px; height: 40px; }
        .cloud-1::before { width: 60px; height: 60px; top: -30px; left: 15px; }
        .cloud-1::after { width: 45px; height: 45px; top: -20px; right: 15px; }
        
        /* Note: Kept away from Top-Right corner to leave space for Logo */
        .cloud-2 { top: 25%; left: 45%; width: 150px; height: 50px; }
        .cloud-2::before { width: 70px; height: 70px; top: -35px; left: 20px; }
        .cloud-2::after { width: 60px; height: 60px; top: -25px; right: 20px; }

        /* Improved Rainbow using radial gradient */
        .rainbow {
            position: absolute;
            top: 5%; left: 30%;
            transform: translateX(-50%);
            width: 300px; height: 150px;
            border-radius: 150px 150px 0 0;
            background: radial-gradient(circle at 50% 100%,
                transparent 60px,
                #CE82FF 60px, #CE82FF 75px,
                #1CB0F6 75px, #1CB0F6 90px,
                #58CC02 90px, #58CC02 105px,
                #FFC800 105px, #FFC800 120px,
                #FF9600 120px, #FF9600 135px,
                #FF4B4B 135px, #FF4B4B 150px,
                transparent 150px
            );
            opacity: 0.6;
            z-index: -1;
            filter: blur(1px); /* Soften the edges of the rainbow */
        }

        /* --- Layout & Screens --- */
        .app-container {
            width: 100%;
            max-width: 800px;
            height: 95vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        .screen {
            display: none;
            width: 100%;
            max-height: 100%;
            background: var(--card-bg);
            border-radius: 25px;
            padding: clamp(15px, 3vh, 30px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15), 0 6px 0 rgba(0,0,0,0.05);
            text-align: center;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: none;
            flex-direction: column;
            justify-content: center;
        }

        .screen.active {
            display: flex;
        }

        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* --- Typography --- */
        .title-colorful {
            font-weight: 900;
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            margin-bottom: 10px;
            background: linear-gradient(45deg, #FF4B4B, #FF9600, #58CC02, #1CB0F6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
            line-height: 1.2;
        }
        h2 { font-weight: 800; font-size: clamp(1.5rem, 3vw, 1.8rem); color: #4B4B4B; margin-bottom: 15px; }
        p { font-size: clamp(1rem, 2vw, 1.2rem); margin-bottom: 15px; font-weight: 600; color: #777;}

        /* --- Buttons & Controls --- */
        .btn {
            display: inline-block;
            font-family: var(--font-family);
            font-weight: 800;
            font-size: clamp(1rem, 2vw, 1.2rem);
            padding: clamp(10px, 2vh, 15px) clamp(20px, 4vw, 30px);
            border: none;
            border-radius: 18px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.1s ease;
            margin: 5px;
            color: white;
            outline: none;
        }

        .btn:active:not(:disabled) { transform: translateY(6px); }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none !important; box-shadow: 0 0 0 var(--btn-gray-shadow) !important; }

        .btn-green { background: var(--btn-green); box-shadow: 0 6px 0 var(--btn-green-shadow); }
        .btn-green:active:not(:disabled) { box-shadow: 0 0 0 var(--btn-green-shadow); }
        .btn-blue { background: var(--btn-blue); box-shadow: 0 6px 0 var(--btn-blue-shadow); }
        .btn-blue:active:not(:disabled) { box-shadow: 0 0 0 var(--btn-blue-shadow); }
        .btn-gray { background: var(--btn-gray); box-shadow: 0 6px 0 var(--btn-gray-shadow); color: #999; }
        .btn-gray.selected { background: var(--btn-blue); box-shadow: 0 6px 0 var(--btn-blue-shadow); color: white; }

        /* Option Grid 2x2 for better mobile fit */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .btn-option {
            width: 100%;
            font-size: clamp(1.1rem, 2.5vw, 1.5rem);
            text-transform: none;
            margin: 0;
            padding: clamp(10px, 2vh, 15px) 5px;
            background: white;
            color: var(--text-main);
            border: 2px solid var(--btn-gray-shadow);
            box-shadow: 0 6px 0 var(--btn-gray-shadow);
        }
        .btn-option.addition { border-color: var(--btn-blue-shadow); color: var(--btn-blue-shadow); }
        .btn-option.multiplication { border-color: var(--btn-green-shadow); color: var(--btn-green-shadow); }
        .btn-option:active:not(:disabled) { transform: translateY(6px); box-shadow: 0 0 0 var(--btn-gray-shadow); }
        .btn-option.correct { background: var(--btn-green); color: white; border-color: var(--btn-green-shadow); box-shadow: 0 6px 0 var(--btn-green-shadow); }
        .btn-option.wrong { background: var(--btn-red); color: white; border-color: var(--btn-red-shadow); box-shadow: 0 6px 0 var(--btn-red-shadow); animation: shake 0.4s; }

        /* --- Gameplay Area --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: clamp(10px, 2vh, 20px);
            font-weight: 800;
            font-size: clamp(1rem, 2vw, 1.2rem);
            color: var(--text-main);
            border-bottom: 2px solid var(--box-border);
            padding-bottom: 10px;
        }

        .question-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: clamp(10px, 2vh, 20px);
        }

        .question-text {
            font-size: clamp(1.1rem, 2.5vw, 1.4rem);
            font-weight: 800;
            color: var(--text-main);
            flex: 1;
        }

        .speaker-icon {
            font-size: clamp(1.2rem, 3vw, 1.5rem);
            cursor: pointer;
            transition: transform 0.2s;
            background: var(--btn-blue);
            color: white;
            min-width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 var(--btn-blue-shadow);
            flex-shrink: 0;
        }
        .speaker-icon:active { transform: scale(0.9) translateY(4px); box-shadow: 0 0 0 var(--btn-blue-shadow); }

        .visual-area {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
            margin-bottom: clamp(15px, 3vh, 25px);
            min-height: 80px;
        }

        .item-box {
            background: white;
            border: 3px solid var(--box-border);
            border-radius: 18px;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .emoji-item {
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            line-height: 1.1;
            /* Enhance realism with drop shadow */
            filter: drop-shadow(2px 4px 2px rgba(0,0,0,0.25));
            animation: popIn 0.3s backwards;
        }

        .feedback-area {
            display: none;
            margin-top: 15px;
            padding: 15px;
            border-radius: 20px;
            background: #f0fdf4;
            border: 2px solid var(--btn-green);
            animation: popIn 0.3s;
        }
        .feedback-text {
            font-size: clamp(1rem, 2vw, 1.2rem);
            color: var(--btn-green-shadow);
            margin-bottom: 10px;
            font-weight: 700;
        }

        /* --- Summary Screen --- */
        .review-list {
            flex: 1;
            overflow-y: auto;
            text-align: left;
            margin: 15px 0;
            padding-right: 10px;
            max-height: 45vh;
        }
        .review-item {
            background: var(--box-bg);
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 5px solid var(--btn-green);
        }
        .review-item p { margin: 3px 0; font-size: 0.95rem; }
        .review-equation { font-weight: 800; font-size: 1.1rem; }
        .add-color { color: var(--btn-blue-shadow); }
        .mul-color { color: var(--btn-green-shadow); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--box-bg); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--btn-gray-shadow); border-radius: 10px; }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        .confetti {
            position: fixed;
            width: 15px;
            height: 15px;
            background-color: #f2d74e;
            z-index: 99999; /* Ensure confetti is on very top */
            animation: fall linear forwards;
            pointer-events: none;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* --- Responsive / Layout adjustments for landscape --- */
        @media (max-height: 500px) and (orientation: landscape) {
            .app-container { height: 100vh; }
            .screen { padding: 10px; max-height: 100vh; }
            .title-colorful { font-size: 1.5rem; margin-bottom: 5px; }
            h2, p { margin-bottom: 5px; }
            .visual-area { margin-bottom: 10px; }
            .emoji-item { font-size: 1.5rem; }
            .options-grid { max-width: 600px; grid-template-columns: repeat(4, 1fr); gap: 5px; }
            .btn-option { font-size: 1rem; padding: 8px; }
            .btn { padding: 10px 20px; font-size: 1rem; }
            .tree, .flower, .rainbow, .cloud { display: none; /* Simplify background on extremely small landscape */ }
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- Beautiful Background Scenery -->
    <div class="scenery">
        <div class="rainbow"></div>
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="grass"></div>
        <div class="tree tree-1"></div>
        <div class="tree tree-2"></div>
        <div class="flower flower-pink f1"></div>
        <div class="flower flower-white f2"></div>
        <div class="flower flower-pink f3"></div>
    </div>

    <div class="app-container">
        
        <!-- Setup Screen -->
        <div id="screen-setup" class="screen active">
            <div class="title-colorful">Repeated Addition<br>Multiplication</div>
            <p>Learn to multiply by making equal groups!</p>
            
            <div style="margin: 2vh 0;">
                <h3 style="color: var(--text-main); font-weight: 800;">Select Difficulty:</h3>
                <div style="display: flex; justify-content: center; margin-top: 10px; flex-wrap: wrap;">
                    <button class="btn btn-gray selected" id="btn-easy" onclick="setDifficulty('easy')">Easy (2-5)</button>
                    <button class="btn btn-gray" id="btn-medium" onclick="setDifficulty('medium')">Medium (2-10)</button>
                </div>
            </div>

            <div>
                <button class="btn btn-green" style="font-size: clamp(1.2rem, 3vw, 1.5rem); padding: 15px 40px;" onclick="startGame()">Start Game</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="screen-game" class="screen">
            <div class="top-bar">
                <div id="progress-text">Question 1/10</div>
                <div id="score-text">Score: 0</div>
            </div>

            <div class="question-header">
                <div class="question-text" id="question-text">How many groups are there? How many in each group?</div>
                <div class="speaker-icon" onclick="speakCurrentQuestion()" title="Listen to question">🔊</div>
            </div>

            <div class="visual-area" id="visual-area">
                <!-- Boxes populated here -->
            </div>

            <div class="options-grid" id="options-area">
                <!-- Options populated here -->
            </div>

            <div class="feedback-area" id="feedback-area">
                <div class="feedback-text" id="feedback-text"></div>
                <button class="btn btn-blue" onclick="nextQuestion()">Next Question ➜</button>
            </div>
        </div>

        <!-- Summary Screen -->
        <div id="screen-summary" class="screen">
            <div class="title-colorful">Great Job!</div>
            <h2 id="final-score" style="color: var(--btn-green-shadow);">Final Score: 10/10</h2>
            
            <div class="review-list" id="review-list">
                <!-- Review items populated here -->
            </div>

            <div>
                <button class="btn btn-green" style="font-size: 1.2rem; margin-top: 5px;" onclick="resetGame()">Play Again</button>
            </div>
        </div>

    </div>

    <script>
        // --- Game Configuration & Assets ---
        // Selected highly recognizable, cute emojis that look good with drop shadow
        const EMOJIS = ['🍎', '🍓', '🍔', '🍕', '🐶', '🐱', '🚗', '🌻', '🎈', '🧸'];
        const TOTAL_QUESTIONS = 10;
        
        // --- State Variables ---
        let state = {
            difficulty: 'easy', 
            questions: [],
            currentQuestionIndex: 0,
            score: 0,
            firstTryPerfect: true,
            currentStep: 1, 
            currentSpeechText: ''
        };

        // --- Audio Context (Web Audio API) ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if(audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(500, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'wrong') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(250, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.25);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // --- Speech Synthesis ---
        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.9; // Slightly slower for kids
                utterance.pitch = 1.1; // Slightly higher/cuter
                utterance.lang = 'en-US';
                window.speechSynthesis.speak(utterance);
            }
        }

        function speakCurrentQuestion() {
            speakText(state.currentSpeechText);
        }

        // --- Confetti Effect ---
        function triggerConfetti() {
            const colors = ['#f2d74e', '#95c3de', '#ff9a91', '#58CC02', '#1CB0F6', '#FF9600'];
            for (let i = 0; i < 70; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                
                // Add some rotation variety
                if (Math.random() > 0.5) confetti.style.borderRadius = '50%';
                
                document.body.appendChild(confetti);
                
                setTimeout(() => {
                    confetti.remove();
                }, 4000);
            }
        }

        // --- Game Logic ---
        function setDifficulty(level) {
            state.difficulty = level;
            document.getElementById('btn-easy').classList.remove('selected');
            document.getElementById('btn-medium').classList.remove('selected');
            document.getElementById('btn-' + level).classList.add('selected');
        }

        function generateQuestions() {
            state.questions = [];
            const maxFactor = state.difficulty === 'easy' ? 5 : 10;
            const usedCombinations = new Set();
            
            // Shuffle emojis so each question tends to have a different icon
            let availableEmojis = [...EMOJIS];
            for (let i = availableEmojis.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [availableEmojis[i], availableEmojis[j]] = [availableEmojis[j], availableEmojis[i]];
            }

            while (state.questions.length < TOTAL_QUESTIONS) {
                // Number of groups: 2 to 5 (gives enough combinations to guarantee 10 unique ones)
                let groupCount = Math.floor(Math.random() * 4) + 2; 
                let itemsPerGroup = Math.floor(Math.random() * (maxFactor - 1)) + 2;
                
                // Ensure the exact same math calculation hasn't been asked yet
                let comboKey = `${groupCount}x${itemsPerGroup}`;
                if (usedCombinations.has(comboKey)) continue;
                usedCombinations.add(comboKey);

                // Pick an emoji, cycling through the shuffled list
                let emoji = availableEmojis[state.questions.length % availableEmojis.length];
                let product = groupCount * itemsPerGroup;

                let addArray = Array(groupCount).fill(itemsPerGroup);
                let correctAdd = addArray.join(' + ') + ' = ' + product;
                let correctMul = `${groupCount} × ${itemsPerGroup} = ${product}`;

                state.questions.push({
                    groupCount,
                    itemsPerGroup,
                    product,
                    emoji,
                    correctAdd,
                    correctMul,
                    visualText: `${groupCount} groups of ${itemsPerGroup}`
                });
            }
        }

        function generateOptions(type, q) {
            let options = new Set();
            if (type === 'addition') {
                options.add(q.correctAdd);
                options.add(Array(q.groupCount + 1).fill(q.itemsPerGroup).join(' + ') + ' = ' + (q.product + q.itemsPerGroup));
                if (q.groupCount !== q.itemsPerGroup) {
                    options.add(Array(q.itemsPerGroup).fill(q.groupCount).join(' + ') + ' = ' + q.product);
                } else {
                    options.add(Array(q.groupCount).fill(q.itemsPerGroup + 1).join(' + ') + ' = ' + (q.product + q.groupCount));
                }
                options.add(`${q.groupCount} + ${q.itemsPerGroup} = ${q.groupCount + q.itemsPerGroup}`);
                options.add(Array(q.groupCount).fill(q.itemsPerGroup).join(' + ') + ' = ' + (q.product + 2));
            } else {
                options.add(q.correctMul);
                options.add(`${q.groupCount} + ${q.itemsPerGroup} = ${q.groupCount + q.itemsPerGroup}`);
                let wrongProd = q.product + q.groupCount;
                options.add(`${q.groupCount} × ${q.itemsPerGroup} = ${wrongProd}`);
                if (q.groupCount !== q.itemsPerGroup) {
                    options.add(`${q.itemsPerGroup} × ${q.groupCount} = ${q.product}`);
                } else {
                    options.add(`${q.groupCount} × ${q.itemsPerGroup + 1} = ${q.groupCount * (q.itemsPerGroup + 1)}`);
                }
            }

            let optionsArr = Array.from(options).slice(0, 4); 
            // Shuffle options
            for (let i = optionsArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [optionsArr[i], optionsArr[j]] = [optionsArr[j], optionsArr[i]];
            }
            return optionsArr;
        }

        // --- Screen Management & Rendering ---
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function startGame() {
            initAudio();
            generateQuestions();
            state.score = 0;
            state.currentQuestionIndex = 0;
            switchScreen('screen-game');
            loadQuestion();
            
            // Silent speech initialization (for iOS)
            let u = new SpeechSynthesisUtterance('');
            u.volume = 0;
            window.speechSynthesis.speak(u);
        }

        function loadQuestion() {
            state.firstTryPerfect = true;
            state.currentStep = 1;
            
            document.getElementById('feedback-area').style.display = 'none';
            document.getElementById('options-area').style.display = 'grid'; // Use grid
            
            updateTopBar();
            renderVisuals();
            renderStep1();
        }

        function updateTopBar() {
            document.getElementById('progress-text').innerText = `Question ${state.currentQuestionIndex + 1}/${TOTAL_QUESTIONS}`;
            document.getElementById('score-text').innerText = `Score: ${state.score}`;
        }

        function renderVisuals() {
            const q = state.questions[state.currentQuestionIndex];
            const visualArea = document.getElementById('visual-area');
            visualArea.innerHTML = '';
            
            for (let i = 0; i < q.groupCount; i++) {
                const box = document.createElement('div');
                box.className = 'item-box';
                for (let j = 0; j < q.itemsPerGroup; j++) {
                    const item = document.createElement('span');
                    item.className = 'emoji-item';
                    item.innerText = q.emoji;
                    item.style.animationDelay = `${(i * q.itemsPerGroup + j) * 0.04}s`;
                    box.appendChild(item);
                }
                visualArea.appendChild(box);
            }
        }

        function renderStep1() {
            const q = state.questions[state.currentQuestionIndex];
            const qText = "Look at the groups. Choose the addition sentence.";
            
            document.getElementById('question-text').innerText = qText;
            state.currentSpeechText = qText;
            speakCurrentQuestion(); // Auto speak or let them click the icon

            const options = generateOptions('addition', q);
            renderOptions(options, q.correctAdd, 'addition', handleStep1Answer);
        }

        function renderStep2() {
            state.currentStep = 2;
            const q = state.questions[state.currentQuestionIndex];
            const qText = "Great! Now choose the multiplication sentence.";
            
            document.getElementById('question-text').innerText = qText;
            state.currentSpeechText = qText;
            speakCurrentQuestion();

            const options = generateOptions('multiplication', q);
            renderOptions(options, q.correctMul, 'multiplication', handleStep2Answer);
        }

        function renderOptions(options, correctAnswer, styleClass, callback) {
            const optionsArea = document.getElementById('options-area');
            optionsArea.innerHTML = '';
            optionsArea.style.pointerEvents = 'auto'; 
            
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = `btn btn-option ${styleClass}`;
                btn.innerText = opt;
                btn.onclick = (e) => {
                    if(btn.disabled) return;
                    
                    if (opt === correctAnswer) {
                        btn.classList.add('correct');
                        playSound('correct');
                        optionsArea.style.pointerEvents = 'none'; 
                        Array.from(optionsArea.children).forEach(b => b.disabled = true); 
                        setTimeout(callback, 800);
                    } else {
                        btn.classList.add('wrong');
                        playSound('wrong');
                        state.firstTryPerfect = false;
                        setTimeout(() => btn.classList.remove('wrong'), 400);
                    }
                };
                optionsArea.appendChild(btn);
            });
        }

        function handleStep1Answer() {
            renderStep2();
        }

        function handleStep2Answer() {
            showFeedback();
        }

        function showFeedback() {
            state.currentStep = 3;
            document.getElementById('options-area').style.display = 'none';
            const feedbackArea = document.getElementById('feedback-area');
            const feedbackText = document.getElementById('feedback-text');
            const q = state.questions[state.currentQuestionIndex];

            if (state.firstTryPerfect) {
                state.score++;
                triggerConfetti();
            }
            updateTopBar();

            document.getElementById('question-text').innerText = "Awesome!";
            
            const explanation = `${q.groupCount} groups of ${q.itemsPerGroup} means ${q.correctAdd}. So, ${q.correctMul}.`;
            feedbackText.innerHTML = `<strong>${state.firstTryPerfect ? 'Perfect!' : 'Good try!'}</strong><br>${explanation}`;
            
            state.currentSpeechText = state.firstTryPerfect ? "Perfect! " + explanation : "Good try! " + explanation;
            speakCurrentQuestion();

            feedbackArea.style.display = 'block';
        }

        function nextQuestion() {
            state.currentQuestionIndex++;
            if (state.currentQuestionIndex < TOTAL_QUESTIONS) {
                loadQuestion();
            } else {
                showSummary();
            }
        }

        function showSummary() {
            switchScreen('screen-summary');
            document.getElementById('final-score').innerText = `Final Score: ${state.score}/${TOTAL_QUESTIONS}`;
            
            const reviewList = document.getElementById('review-list');
            reviewList.innerHTML = '';
            
            state.questions.forEach((q, index) => {
                const item = document.createElement('div');
                item.className = 'review-item';
                item.innerHTML = `
                    <p><strong>Q${index + 1}:</strong> ${q.visualText} ${q.emoji}</p>
                    <p class="review-equation add-color">${q.correctAdd}</p>
                    <p class="review-equation mul-color">${q.correctMul}</p>
                `;
                reviewList.appendChild(item);
            });

            // Trigger multiple waves of confetti if high score
            if(state.score >= TOTAL_QUESTIONS / 2) {
                triggerConfetti();
                setTimeout(triggerConfetti, 800);
                setTimeout(triggerConfetti, 1600);
            }
        }

        function resetGame() {
            switchScreen('screen-setup');
        }

    </script>
</body>
</html>
