<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Time Quest - Version 4</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap');

        :root {
            /* Duolingo inspired palette */
            --bg-color: #DDF4FF;
            --card-bg: #FFFFFF;
            --text-color: #4B4B4B;
            --text-question: #1CB0F6;
            
            --btn-blue: #1CB0F6;
            --btn-blue-shadow: #1899D6;
            
            --btn-green: #58CC02;
            --btn-green-shadow: #58A700;
            
            --btn-red: #FF4B4B;
            --btn-red-shadow: #EA1515;
            
            --btn-white: #FFFFFF;
            --btn-white-shadow: #E5E5E5;

            --btn-purple: #CE82FF;
            --btn-purple-shadow: #A559D9;

            --clock-border: #1CB0F6;
            --clock-face: #FFFFFF;
            --clock-hour: #FF4B4B;
            --clock-minute: #1CB0F6;
            --clock-center: #FFC800;
            --clock-text: #4B4B4B;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Background Decorations */
        .bg-decorations {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .bg-icon {
            position: absolute;
            opacity: 0.8;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
        }

        /* Top Bar & Logo Space */
        .top-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 10;
            pointer-events: none;
        }
        
        .logo-space {
            width: 100px;
            height: 80px;
            /* Empty top-right space for logo */
            margin-left: auto;
        }

        /* Main App Container */
        #app {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 800px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Screens */
        .screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            animation: fadeIn 0.4s ease-out;
        }

        .hidden {
            display: none !important;
        }

        /* Typography */
        h1 {
            font-size: 3.5rem;
            color: var(--btn-blue);
            text-shadow: 2px 4px 0px var(--btn-blue-shadow);
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.2;
            font-weight: 900;
        }

        h2 {
            font-size: 1.8rem;
            color: var(--text-color);
            text-align: center;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .question-block {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: var(--card-bg);
            padding: 20px 30px;
            border-radius: 24px;
            box-shadow: 0 8px 0 var(--btn-white-shadow);
            margin-bottom: 30px;
            width: 100%;
            max-width: 650px;
            border: 2px solid var(--btn-white-shadow);
        }

        .question-text {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-question);
            flex: 1;
            text-align: center;
            line-height: 1.4;
        }

        /* Buttons */
        .btn {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            outline: none;
            padding: 15px 25px;
            border: 2px solid;
            width: 100%;
        }

        .btn:active:not(.wrong) {
            transform: translateY(4px);
        }

        .btn-primary {
            background-color: var(--btn-green);
            color: white;
            border-color: var(--btn-green-shadow);
            border-bottom-width: 6px;
            font-size: 1.8rem;
            padding: 15px 40px;
            margin-top: 20px;
            width: auto;
            min-width: 250px;
            border-radius: 24px;
        }
        .btn-primary:active {
            border-bottom-width: 2px;
        }

        .btn-speaker {
            background-color: var(--btn-blue);
            color: white;
            border-color: var(--btn-blue-shadow);
            border-bottom-width: 6px;
            border-radius: 50%;
            width: 65px;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            flex-shrink: 0;
        }
        .btn-speaker:active {
            border-bottom-width: 2px;
        }
        
        .btn-speaker svg {
            width: 32px;
            height: 32px;
            fill: none;
            stroke: white;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .answers-grid {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 800px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-answer {
            background-color: var(--btn-white);
            color: var(--text-color);
            border-color: var(--btn-white-shadow);
            border-bottom-width: 6px;
            flex: 1;
            min-width: 200px;
            padding: 18px 10px;
            border-radius: 20px;
        }
        .btn-answer:active:not(.wrong) {
            border-bottom-width: 2px;
        }
        .btn-answer:hover:not(.wrong):not(.correct) {
            background-color: #F7F7F7;
        }

        .btn-answer .digital {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--btn-blue);
            margin-bottom: 5px;
        }

        .btn-answer .phrase {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-color);
        }

        .btn-answer.correct {
            background-color: #D7FFB8;
            border-color: var(--btn-green);
            border-bottom-color: var(--btn-green-shadow);
        }

        .btn-answer.wrong {
            background-color: #FFD2D2;
            border-color: var(--btn-red);
            border-bottom-color: var(--btn-red-shadow);
            opacity: 0.6;
            transform: none !important;
            cursor: not-allowed;
        }

        /* Clock - Increased physical size (+10% from 312px = ~343px) */
        .clock-container {
            width: 343px;
            height: 343px;
            margin-bottom: 35px;
            background: var(--clock-face);
            border-radius: 50%;
            box-shadow: 0 12px 0 var(--btn-white-shadow), inset 0 0 20px rgba(0,0,0,0.03);
            position: relative;
        }

        svg.clock-svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        /* Feedback Overlay */
        #feedback-overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 30px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .feedback-content {
            width: 100%;
            max-width: 800px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #feedback-overlay.correct {
            background-color: #D7FFB8;
            border-top: 4px solid var(--btn-green);
        }
        #feedback-overlay.correct .feedback-text { color: var(--btn-green-shadow); }

        .feedback-text {
            font-size: 2.2rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .feedback-icon {
            width: 48px; height: 48px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            background: white;
            font-size: 1.8rem;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .btn-next {
            font-size: 1.3rem;
            padding: 15px 35px;
            border-radius: 20px;
            font-weight: 800;
            border-bottom-width: 4px;
            text-transform: uppercase;
        }
        #feedback-overlay.correct .btn-next {
            background-color: var(--btn-green);
            border-color: var(--btn-green-shadow);
            color: white;
        }

        /* Confetti */
        #confetti-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .anim-pulse {
            animation: pulse 2.5s infinite;
        }

        /* Responsive Design */
        @media (max-width: 650px) {
            h1 { font-size: 2.5rem; }
            .question-text { font-size: 1.3rem; }
            .answers-grid { flex-direction: column; align-items: center; }
            .btn-answer { width: 100%; }
            /* Adjusted Mobile Clock Size (+10% from 264px = 290px) */
            .clock-container { width: 290px; height: 290px; }
            
            .feedback-content { flex-direction: column; gap: 20px; text-align: center; }
            .feedback-text { justify-content: center; }
            .btn-next { width: 100%; }
            
            .question-block {
                flex-direction: row; 
                padding: 15px;
                gap: 15px;
            }
            .btn-speaker {
                width: 55px; height: 55px;
            }
            .btn-speaker svg {
                width: 26px; height: 26px;
            }
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- Background SVG Decorations -->
    <div class="bg-decorations" id="bg-decorations">
        <!-- Injected via JS for neatness -->
    </div>

    <!-- Top Bar (Kept only for logo space) -->
    <div class="top-bar hidden" id="top-bar">
        <div class="logo-space"></div>
    </div>

    <div id="app">
        <!-- Start Screen -->
        <div id="screen-start" class="screen">
            <h1 class="anim-pulse">Time Quest</h1>
            <svg width="180" height="180" viewBox="0 0 100 100" style="margin-bottom: 25px; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.1));">
                <circle cx="50" cy="50" r="45" fill="white" stroke="#1CB0F6" stroke-width="6"/>
                <circle cx="50" cy="50" r="36" fill="none" stroke="#E5E5E5" stroke-width="1"/>
                <line x1="50" y1="50" x2="50" y2="25" stroke="#FF4B4B" stroke-width="6" stroke-linecap="round"/>
                <line x1="50" y1="50" x2="75" y2="50" stroke="#1CB0F6" stroke-width="5" stroke-linecap="round"/>
                <circle cx="50" cy="50" r="5" fill="#FFC800"/>
            </svg>
            <button class="btn btn-primary anim-pulse" onclick="startGame()">PLAY</button>
        </div>

        <!-- Game Screen -->
        <div id="screen-game" class="screen hidden">
            <div class="question-block">
                <div class="question-text" id="question-text">What time is it?</div>
                <button class="btn btn-speaker" onclick="speakCurrentQuestion()" aria-label="Read Question">
                    <svg viewBox="0 0 24 24">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="white" stroke="white"></polygon>
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                    </svg>
                </button>
            </div>
            
            <div class="clock-container">
                <!-- Expanded viewBox to 264 to allow 10% larger face. Scale inside keeps exact size of elements -->
                <svg class="clock-svg" id="analog-clock" viewBox="0 0 264 264">
                    <!-- Clock Face (Radius increased to fit the 10% larger box) -->
                    <circle cx="132" cy="132" r="125" fill="var(--clock-face)" stroke="var(--clock-border)" stroke-width="12"/>
                    <circle cx="132" cy="132" r="113" fill="none" stroke="#F0F0F0" stroke-width="1"/>
                    
                    <!-- Ticks and Numbers injected by JS -->
                    <g id="clock-ticks"></g>
                    <g id="clock-numbers"></g>
                    
                    <!-- Shadow layer for hands -->
                    <g transform="translate(0, 3)">
                        <!-- Shadows keep the same absolute length as hands -->
                        <line id="hour-hand-shadow" x1="132" y1="132" x2="132" y2="87" stroke="rgba(0,0,0,0.15)" stroke-width="12" stroke-linecap="round" transform="rotate(0 132 132)"/>
                        <line id="minute-hand-shadow" x1="132" y1="132" x2="132" y2="57" stroke="rgba(0,0,0,0.15)" stroke-width="8" stroke-linecap="round" transform="rotate(0 132 132)"/>
                        <circle cx="132" cy="132" r="10" fill="rgba(0,0,0,0.15)"/>
                    </g>
                    
                    <!-- Hands (Kept identical absolute length as v3, numbers moved outward) -->
                    <line id="hour-hand" x1="132" y1="132" x2="132" y2="87" stroke="var(--clock-hour)" stroke-width="12" stroke-linecap="round" transform="rotate(0 132 132)"/>
                    <line id="minute-hand" x1="132" y1="132" x2="132" y2="57" stroke="var(--clock-minute)" stroke-width="8" stroke-linecap="round" transform="rotate(0 132 132)"/>
                    <circle cx="132" cy="132" r="10" fill="var(--clock-center)"/>
                    <circle cx="132" cy="132" r="4" fill="#FFFFFF"/>
                </svg>
            </div>

            <div class="answers-grid" id="answers-container">
                <!-- Answer buttons injected here -->
            </div>
        </div>

        <!-- End Screen -->
        <div id="screen-end" class="screen hidden">
            <h1 id="final-score-title">Awesome!</h1>
            <h2 id="final-score-text">You got 10 out of 10!</h2>
            <svg width="180" height="180" viewBox="0 0 100 100" style="margin-bottom: 20px; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.15));">
                <circle cx="50" cy="50" r="45" fill="#FFC800" stroke="#FF9600" stroke-width="6"/>
                <path d="M 30 45 Q 50 70 70 45" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
                <circle cx="35" cy="35" r="6" fill="white"/>
                <circle cx="65" cy="35" r="6" fill="white"/>
            </svg>
            <button class="btn btn-primary" onclick="resetGame()">PLAY AGAIN</button>
        </div>
    </div>

    <!-- Feedback Overlay (Only shown on Correct answer now) -->
    <div id="feedback-overlay" class="hidden">
        <div class="feedback-content">
            <div class="feedback-text">
                <div class="feedback-icon" id="feedback-icon">✓</div>
                <span id="feedback-msg">Great job!</span>
            </div>
            <button class="btn btn-next" id="btn-next" onclick="nextQuestion()">CONTINUE</button>
        </div>
    </div>

    <!-- Confetti layer at the very top -->
    <canvas id="confetti-canvas"></canvas>

    <script>
        /* --- QUESTION DATABASE --- */
        // Updated daily routine questions with spokenText property for natural TTS reading
        const allQuestions = [
            // O'clock Times (12)
            { type: 'standard', h: 1, m: 0, digital: "1:00", phrase: "one o'clock" },
            { type: 'standard', h: 2, m: 0, digital: "2:00", phrase: "two o'clock" },
            { type: 'standard', h: 3, m: 0, digital: "3:00", phrase: "three o'clock" },
            { type: 'standard', h: 4, m: 0, digital: "4:00", phrase: "four o'clock" },
            { type: 'standard', h: 5, m: 0, digital: "5:00", phrase: "five o'clock" },
            { type: 'standard', h: 6, m: 0, digital: "6:00", phrase: "six o'clock" },
            { type: 'standard', h: 7, m: 0, digital: "7:00", phrase: "seven o'clock" },
            { type: 'standard', h: 8, m: 0, digital: "8:00", phrase: "eight o'clock" },
            { type: 'standard', h: 9, m: 0, digital: "9:00", phrase: "nine o'clock" },
            { type: 'standard', h: 10, m: 0, digital: "10:00", phrase: "ten o'clock" },
            { type: 'standard', h: 11, m: 0, digital: "11:00", phrase: "eleven o'clock" },
            { type: 'standard', h: 12, m: 0, digital: "12:00", phrase: "twelve o'clock" },
            
            // Half Past Times (12)
            { type: 'standard', h: 1, m: 30, digital: "1:30", phrase: "half past one" },
            { type: 'standard', h: 2, m: 30, digital: "2:30", phrase: "half past two" },
            { type: 'standard', h: 3, m: 30, digital: "3:30", phrase: "half past three" },
            { type: 'standard', h: 4, m: 30, digital: "4:30", phrase: "half past four" },
            { type: 'standard', h: 5, m: 30, digital: "5:30", phrase: "half past five" },
            { type: 'standard', h: 6, m: 30, digital: "6:30", phrase: "half past six" },
            { type: 'standard', h: 7, m: 30, digital: "7:30", phrase: "half past seven" },
            { type: 'standard', h: 8, m: 30, digital: "8:30", phrase: "half past eight" },
            { type: 'standard', h: 9, m: 30, digital: "9:30", phrase: "half past nine" },
            { type: 'standard', h: 10, m: 30, digital: "10:30", phrase: "half past ten" },
            { type: 'standard', h: 11, m: 30, digital: "11:30", phrase: "half past eleven" },
            { type: 'standard', h: 12, m: 30, digital: "12:30", phrase: "half past twelve" },

            // Five-minute Times (8)
            { type: 'standard', h: 4, m: 5, digital: "4:05", phrase: "five past four" },
            { type: 'standard', h: 10, m: 10, digital: "10:10", phrase: "ten past ten" },
            { type: 'standard', h: 12, m: 15, digital: "12:15", phrase: "quarter past twelve" },
            { type: 'standard', h: 7, m: 25, digital: "7:25", phrase: "twenty-five past seven" },
            { type: 'standard', h: 6, m: 35, digital: "6:35", phrase: "twenty-five to seven" },
            { type: 'standard', h: 9, m: 40, digital: "9:40", phrase: "twenty to ten" },
            { type: 'standard', h: 12, m: 50, digital: "12:50", phrase: "ten to one" },
            { type: 'standard', h: 10, m: 55, digital: "10:55", phrase: "five to eleven" },

            // Daily Routine Questions (8)
            { type: 'routine', h: 7, m: 0, digital: "7:00 am", phrase: "in the morning", text: "The baby woke up at ______ in the morning.", spokenText: "What time did the baby wake up in the morning?" },
            { type: 'routine', h: 12, m: 15, digital: "12:15 pm", phrase: "in the afternoon", text: "Sally eats her lunch at ______.", spokenText: "What time does Sally eat her lunch?" },
            { type: 'routine', h: 3, m: 30, digital: "3:30 pm", phrase: "in the afternoon", text: "The students finish school at ______.", spokenText: "What time do the students finish school?" },
            { type: 'routine', h: 6, m: 45, digital: "6:45 pm", phrase: "in the evening", text: "My family eats dinner at ______.", spokenText: "What time does your family eat dinner?" },
            { type: 'routine', h: 8, m: 0, digital: "8:00 pm", phrase: "at night", text: "Anita jogs at the park every evening at ______.", spokenText: "What time does Anita jog at the park every evening?" },
            { type: 'routine', h: 6, m: 0, digital: "6:00 am", phrase: "in the morning", text: "The sun comes up at ______ in the morning.", spokenText: "What time does the sun come up in the morning?" },
            { type: 'routine', h: 10, m: 30, digital: "10:30 am", phrase: "in the morning", text: "We have a morning snack at ______.", spokenText: "What time do we have a morning snack?" },
            { type: 'routine', h: 8, m: 30, digital: "8:30 pm", phrase: "at night", text: "Tom brushes his teeth at ______ before bed.", spokenText: "What time does Tom brush his teeth before bed?" }
        ];

        const standardAnswers = allQuestions.filter(q => q.type === 'standard');
        const routineAnswers = allQuestions.filter(q => q.type === 'routine');

        /* --- STATE --- */
        let currentRound = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let isAnswered = false;
        let hasAttemptedWrong = false; // Tracks if the user made a mistake in current question

        /* --- AUDIO CONTEXT --- */
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); 
                osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2);
                
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.05);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
                
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'wrong') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.3);
                
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.05);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
                
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'pop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.01);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.1);
            }
        }

        /* --- SPEECH SYNTHESIS --- */
        function speakText(text) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            utterance.pitch = 1.3; 
            window.speechSynthesis.speak(utterance);
        }

        function speakCurrentQuestion() {
            const q = currentRound[currentQuestionIndex];
            // Use natural spokenText if provided, otherwise default fallback
            let textToSpeak = q.spokenText || (q.type === 'routine' ? q.text : "What time is it?");
            speakText(textToSpeak);
        }

        /* --- UTILS --- */
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        /* --- INITIALIZATION --- */
        function buildClockFace() {
            const ticksGroup = document.getElementById('clock-ticks');
            const numbersGroup = document.getElementById('clock-numbers');
            ticksGroup.innerHTML = '';
            numbersGroup.innerHTML = '';

            // Using the new viewBox center (132, 132)
            for (let i = 0; i < 60; i++) {
                let angle = (i * 6) * (Math.PI / 180);
                let isHour = i % 5 === 0;
                // Pushed outward by ~12px to match new 10% larger box, while preserving hand sizes
                let rOuter = 120;
                let rInner = isHour ? 107 : 114;
                
                let x1 = 132 + rInner * Math.sin(angle);
                let y1 = 132 - rInner * Math.cos(angle);
                let x2 = 132 + rOuter * Math.sin(angle);
                let y2 = 132 - rOuter * Math.cos(angle);

                let line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", x1);
                line.setAttribute("y1", y1);
                line.setAttribute("x2", x2);
                line.setAttribute("y2", y2);
                line.setAttribute("stroke", "var(--clock-text)");
                line.setAttribute("stroke-width", isHour ? "4" : "1.5"); // Same absolute thickness
                line.setAttribute("stroke-linecap", "round");
                ticksGroup.appendChild(line);

                if (isHour) {
                    let num = i === 0 ? 12 : i / 5;
                    let rNum = 90; // Moved numbers outwards to not overlap with hands
                    let nx = 132 + rNum * Math.sin(angle);
                    let ny = 132 - rNum * Math.cos(angle);
                    
                    let text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    text.setAttribute("x", nx);
                    text.setAttribute("y", ny);
                    text.setAttribute("text-anchor", "middle");
                    text.setAttribute("dominant-baseline", "central");
                    text.setAttribute("fill", "var(--clock-text)");
                    text.setAttribute("font-size", "24px"); // Unchanged font size
                    text.setAttribute("font-weight", "800");
                    text.setAttribute("font-family", "Poppins");
                    text.textContent = num;
                    numbersGroup.appendChild(text);
                }
            }
        }

        function createDecorations() {
            const container = document.getElementById('bg-decorations');
            container.innerHTML = '';
            
            const svgItems = [
                `<svg viewBox="0 0 100 100">
                   <circle cx="50" cy="55" r="35" fill="#FFFFFF" stroke="#1CB0F6" stroke-width="6"/>
                   <circle cx="50" cy="55" r="4" fill="#1CB0F6"/>
                   <line x1="50" y1="55" x2="50" y2="35" stroke="#1CB0F6" stroke-width="4" stroke-linecap="round"/>
                   <line x1="50" y1="55" x2="65" y2="55" stroke="#FFC800" stroke-width="4" stroke-linecap="round"/>
                   <path d="M 20 25 A 15 15 0 0 1 40 15" fill="none" stroke="#FF4B4B" stroke-width="6" stroke-linecap="round"/>
                   <path d="M 80 25 A 15 15 0 0 0 60 15" fill="none" stroke="#FF4B4B" stroke-width="6" stroke-linecap="round"/>
                   <line x1="30" y1="85" x2="20" y2="95" stroke="#1CB0F6" stroke-width="6" stroke-linecap="round"/>
                   <line x1="70" y1="85" x2="80" y2="95" stroke="#1CB0F6" stroke-width="6" stroke-linecap="round"/>
                </svg>`,
                `<svg viewBox="0 0 100 100">
                   <rect x="15" y="25" width="70" height="60" rx="10" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="4"/>
                   <path d="M 15 35 Q 15 25 25 25 L 75 25 Q 85 25 85 35 L 85 45 L 15 45 Z" fill="#FF4B4B"/>
                   <rect x="25" y="15" width="8" height="18" rx="4" fill="#A5A5A5"/>
                   <rect x="67" y="15" width="8" height="18" rx="4" fill="#A5A5A5"/>
                   <circle cx="50" cy="65" r="14" fill="#58CC02"/>
                   <path d="M 43 65 L 47 69 L 57 59" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>`,
                `<svg viewBox="0 0 100 100">
                   <path d="M 20 10 L 80 10 L 80 20 L 55 50 L 80 80 L 80 90 L 20 90 L 20 80 L 45 50 L 20 20 Z" fill="#F0F8FF" stroke="#A5C6DF" stroke-width="4"/>
                   <path d="M 25 80 L 75 80 L 50 50 Z" fill="#FFC800"/> 
                   <path d="M 35 32 L 65 32 L 50 50 Z" fill="#FFC800"/> 
                   <rect x="15" y="5" width="70" height="12" rx="6" fill="#CE82FF"/>
                   <rect x="15" y="83" width="70" height="12" rx="6" fill="#CE82FF"/>
                </svg>`,
                `<svg viewBox="0 0 100 100">
                   <path fill="#FFFFFF" d="M30 65 A20 20 0 0 1 35 26 A25 25 0 0 1 75 30 A20 20 0 0 1 70 65 Z"/>
                   <circle cx="45" cy="45" r="3" fill="#4B4B4B"/>
                   <circle cx="60" cy="45" r="3" fill="#4B4B4B"/>
                   <path d="M 48 52 Q 52 56 57 52" fill="none" stroke="#4B4B4B" stroke-width="2.5" stroke-linecap="round"/>
                </svg>`,
                `<svg viewBox="0 0 100 100">
                   <polygon fill="#FFC800" points="50,10 61,39 92,39 67,58 76,88 50,70 24,88 33,58 8,39 39,39"/>
                   <polygon fill="#FFD940" points="50,15 58,37 80,37 63,51 69,73 50,60 50,15"/>
                </svg>`
            ];

            for(let i=0; i<12; i++) {
                let div = document.createElement('div');
                div.className = 'bg-icon';
                div.innerHTML = svgItems[i % svgItems.length];
                
                let size = Math.random() * 50 + 40;
                div.style.width = size + 'px';
                div.style.height = size + 'px';
                
                let posX, posY;
                if (Math.random() > 0.5) {
                    posX = Math.random() > 0.5 ? Math.random() * 15 : 85 + Math.random() * 10;
                    posY = Math.random() * 90;
                } else {
                    posX = Math.random() * 90;
                    posY = Math.random() > 0.5 ? Math.random() * 15 : 85 + Math.random() * 10;
                }
                
                div.style.left = posX + 'vw';
                div.style.top = posY + 'vh';
                div.style.transform = `rotate(${Math.random() * 360}deg)`;
                
                container.appendChild(div);
            }
        }

        /* --- GAME LOGIC --- */
        function startGame() {
            initAudio();
            playSound('pop');
            buildClockFace();
            createDecorations();
            
            let shuffled = shuffle([...allQuestions]);
            currentRound = shuffled.slice(0, 10);
            currentQuestionIndex = 0;
            score = 0;
            
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('top-bar').classList.remove('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            
            loadQuestion();
        }

        function setClockHands(h, m) {
            const mAngle = m * 6;
            const hAngle = ((h % 12) * 30) + (m * 0.5);
            
            // Set rotation for actual hands with new center (132, 132)
            document.getElementById('hour-hand').setAttribute('transform', `rotate(${hAngle} 132 132)`);
            document.getElementById('minute-hand').setAttribute('transform', `rotate(${mAngle} 132 132)`);
            
            // Set rotation for shadow layers
            document.getElementById('hour-hand-shadow').setAttribute('transform', `rotate(${hAngle} 132 132)`);
            document.getElementById('minute-hand-shadow').setAttribute('transform', `rotate(${mAngle} 132 132)`);
        }

        function loadQuestion() {
            isAnswered = false;
            hasAttemptedWrong = false; // Reset attempt tracker
            document.getElementById('feedback-overlay').classList.add('hidden');
            
            const q = currentRound[currentQuestionIndex];
            
            document.getElementById('question-text').innerText = q.type === 'routine' ? q.text : "What time is it?";
            setClockHands(q.h, q.m);
            speakCurrentQuestion();

            let options = [q];
            let pool = q.type === 'routine' ? routineAnswers : standardAnswers;
            
            let shuffledPool = shuffle([...pool]);
            for (let cand of shuffledPool) {
                if (options.length === 3) break;
                if (cand.digital !== q.digital) {
                    options.push(cand);
                }
            }
            
            options = shuffle(options);
            
            const container = document.getElementById('answers-container');
            container.innerHTML = '';
            
            options.forEach((opt) => {
                let btn = document.createElement('button');
                btn.className = 'btn btn-answer';
                btn.onclick = () => selectAnswer(btn, opt.digital === q.digital, opt);
                
                let divDigital = document.createElement('div');
                divDigital.className = 'digital';
                divDigital.innerText = opt.digital;
                
                let divPhrase = document.createElement('div');
                divPhrase.className = 'phrase';
                divPhrase.innerText = opt.phrase;
                
                btn.appendChild(divDigital);
                btn.appendChild(divPhrase);
                container.appendChild(btn);
            });
        }

        function selectAnswer(btn, isCorrect, opt) {
            if (isAnswered || btn.classList.contains('wrong')) return;
            
            // Speak the specific answer text immediately
            speakText(opt.phrase);
            
            if (isCorrect) {
                isAnswered = true; // Lock further selection once correct
                btn.classList.add('correct');
                
                // Add score only if no wrong attempt was made this round
                if (!hasAttemptedWrong) {
                    score++;
                }
                
                playSound('correct');
                
                // Disable all other buttons
                const allBtns = document.getElementById('answers-container').children;
                for (let b of allBtns) {
                    b.style.pointerEvents = 'none';
                }

                // Show the Next overlay for Teacher review
                const overlay = document.getElementById('feedback-overlay');
                const feedbackMsg = document.getElementById('feedback-msg');
                const feedbackIcon = document.getElementById('feedback-icon');

                overlay.className = 'correct'; 
                feedbackMsg.innerText = "Great job!";
                feedbackIcon.innerText = "✓";
                feedbackIcon.style.color = "var(--btn-green)";
                overlay.classList.remove('hidden');
                
            } else {
                // If wrong, mark as wrong, no points, let them try again
                btn.classList.add('wrong');
                hasAttemptedWrong = true;
                playSound('wrong');
                // The feedback overlay intentionally does NOT show here.
            }
        }

        function nextQuestion() {
            playSound('pop');
            currentQuestionIndex++;
            if (currentQuestionIndex < currentRound.length) {
                loadQuestion();
            } else {
                endGame();
            }
        }

        function endGame() {
            document.getElementById('screen-game').classList.add('hidden');
            document.getElementById('top-bar').classList.add('hidden');
            document.getElementById('feedback-overlay').classList.add('hidden');
            
            const endScreen = document.getElementById('screen-end');
            endScreen.classList.remove('hidden');
            
            document.getElementById('final-score-text').innerText = `You got ${score} out of 10!`;
            
            if (score >= 8) {
                document.getElementById('final-score-title').innerText = "Awesome!";
                playSound('correct');
                shootConfetti();
            } else if (score >= 5) {
                document.getElementById('final-score-title').innerText = "Good job!";
            } else {
                document.getElementById('final-score-title').innerText = "Keep practicing!";
            }
        }

        function resetGame() {
            playSound('pop');
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('screen-end').classList.add('hidden');
            startGame();
        }

        /* --- CONFETTI EFFECT --- */
        function shootConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            let particles = [];
            const colors = ['#1CB0F6', '#58CC02', '#FF4B4B', '#FFC800', '#CE82FF'];
            
            for(let i=0; i<150; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height - 100,
                    size: Math.random() * 12 + 6,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    speed: Math.random() * 4 + 2.5,
                    angle: Math.random() * 360,
                    spin: Math.random() * 12 - 6
                });
            }
            
            function animate() {
                if (document.getElementById('screen-end').classList.contains('hidden')) return;
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let allDone = true;
                
                particles.forEach(p => {
                    if (p.y < canvas.height) allDone = false;
                    
                    p.y += p.speed;
                    p.angle += p.spin;
                    
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.angle * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.roundRect(-p.size/2, -p.size/2, p.size, p.size, 2);
                    ctx.fill();
                    ctx.restore();
                });
                
                if (!allDone) {
                    requestAnimationFrame(animate);
                }
            }
            
            animate();
        }

        window.addEventListener('resize', () => {
            const canvas = document.getElementById('confetti-canvas');
            if(canvas.width > 0) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });
        
        createDecorations();
    </script>
</body>
</html>
