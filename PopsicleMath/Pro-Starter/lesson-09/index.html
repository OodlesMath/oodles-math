<!DOCTYPE html>
<html lang="en">
<head>
    
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Equal & Unequal Groups Game V4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        /* Lock body size to viewport and prevent scrolling */
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15) rotate(3deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        .animate-pop {
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px) rotate(-2deg); }
            40% { transform: translateX(8px) rotate(2deg); }
            60% { transform: translateX(-8px) rotate(-2deg); }
            80% { transform: translateX(8px) rotate(2deg); }
        }
        .animate-shake {
            animation: shake 0.5s ease-in-out;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes rainbowFade {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }
        .text-colorful {
            background: linear-gradient(to right, #ff416c, #ff4b2b, #facc15, #00b09b, #1d976c, #8e2de2, #4a00e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 300% 300%;
            animation: rainbow 6s ease infinite;
        }
        @keyframes rainbow { 
            0%{background-position:0% 50%}
            50%{background-position:100% 50%}
            100%{background-position:0% 50%}
        }
        
        /* Utility class to hide elements */
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-100">
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- BACKGROUND (Fixed across all screens) -->
    <div class="fixed inset-0 pointer-events-none -z-10 bg-gradient-to-b from-[#78C4F6] to-[#b3e5fc] overflow-hidden">
        <!-- Sun -->
        <div class="absolute top-6 left-6 w-20 h-20 sm:w-28 sm:h-28 bg-yellow-400 rounded-full shadow-[0_0_60px_rgba(250,204,21,0.8)] animate-float"></div>
        
        <!-- Rainbow -->
        <div class="absolute top-0 right-[20%] w-56 h-56 sm:w-80 sm:h-80 opacity-60" style="animation: rainbowFade 8s infinite">
            <svg viewBox="0 0 100 50" class="w-full h-full">
            <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#ff416c" stroke-width="4"/>
            <path d="M 15 50 A 35 35 0 0 1 85 50" fill="none" stroke="#ff9a44" stroke-width="4"/>
            <path d="M 20 50 A 30 30 0 0 1 80 50" fill="none" stroke="#facc15" stroke-width="4"/>
            <path d="M 25 50 A 25 25 0 0 1 75 50" fill="none" stroke="#4ade80" stroke-width="4"/>
            <path d="M 30 50 A 20 20 0 0 1 70 50" fill="none" stroke="#38bdf8" stroke-width="4"/>
            <path d="M 35 50 A 15 15 0 0 1 65 50" fill="none" stroke="#c084fc" stroke-width="4"/>
            </svg>
        </div>

        <!-- Clouds -->
        <div class="absolute top-12 right-[40%] w-28 h-10 bg-white rounded-full opacity-90 animate-float" style="animation-delay: 1s">
            <div class="absolute -top-5 left-3 w-14 h-14 bg-white rounded-full"></div>
            <div class="absolute -top-3 right-3 w-10 h-10 bg-white rounded-full"></div>
        </div>
        <div class="absolute top-24 left-[20%] w-36 h-12 bg-white rounded-full opacity-80 animate-float" style="animation-delay: 2.5s">
            <div class="absolute -top-7 left-5 w-16 h-16 bg-white rounded-full"></div>
            <div class="absolute -top-3 right-5 w-12 h-12 bg-white rounded-full"></div>
        </div>

        <!-- Ground/Grass - Vibrant green -->
        <div class="absolute bottom-0 left-0 right-0 h-[25vh] bg-[#58CC02]">
            <!-- Grass wavy top border -->
            <div class="absolute -top-6 left-0 right-0 h-12 bg-[#58CC02]" style="clip-path: polygon(0 50%, 5% 30%, 10% 50%, 15% 20%, 20% 50%, 25% 30%, 30% 50%, 35% 20%, 40% 50%, 45% 30%, 50% 50%, 55% 20%, 60% 50%, 65% 30%, 70% 50%, 75% 20%, 80% 50%, 85% 30%, 90% 50%, 95% 20%, 100% 50%, 100% 100%, 0% 100%)"></div>
            
            <!-- Decorative Scenery on Grass -->
            <div class="absolute top-2 left-[10%] text-4xl">🌲</div>
            <div class="absolute top-8 left-[25%] text-3xl">🌻</div>
            <div class="absolute top-1 right-[15%] text-5xl">🌳</div>
            <div class="absolute top-10 right-[30%] text-2xl">🌷</div>
            <div class="absolute top-4 left-[80%] text-3xl">🍄</div>
        </div>
    </div>

    <!-- CONFETTI CANVAS (Topmost Layer) -->
    <canvas id="confetti-canvas" class="fixed inset-0 pointer-events-none z-[9999] hidden"></canvas>

    <!-- MAIN APP CONTAINER - 100vh strict fit -->
    <div class="h-screen w-full flex flex-col items-center justify-center p-2 sm:p-4 md:p-6 relative z-10 box-border overflow-hidden">
        
        <!-- START SCREEN -->
        <div id="start-screen" class="flex flex-col items-center justify-center w-full h-full">
            <div class="bg-white/95 backdrop-blur-md p-8 sm:p-12 rounded-[32px] shadow-2xl text-center max-w-2xl w-full border-8 border-white">
                <h1 class="text-4xl md:text-6xl font-black mb-4 drop-shadow-md text-colorful pb-2">
                    Math Fun!
                </h1>
                <p class="text-xl md:text-2xl text-gray-700 mb-8 font-bold">
                    Let's find the Equal and Unequal groups!
                </p>
                <button 
                    onclick="startGame()"
                    class="w-full sm:w-auto bg-[#58CC02] hover:bg-[#46a302] text-white text-3xl font-extrabold py-5 px-12 rounded-full shadow-[0_6px_0_#46a302] transform transition active:translate-y-2 active:shadow-[0_0px_0_#46a302]"
                >
                    PLAY NOW ▶
                </button>
            </div>
        </div>

        <!-- GAME SCREEN -->
        <div id="game-screen" class="hidden flex-col items-center w-full max-w-5xl h-full max-h-full">
            
            <!-- Header - Score (Top Left), Empty Space (Top Right) -->
            <div class="w-full flex justify-between items-center shrink-0 mb-2 sm:mb-4 pt-1 sm:pt-2">
                <div class="bg-white/95 backdrop-blur-sm px-5 py-2 rounded-full shadow-lg border-[3px] border-yellow-400 flex items-center gap-2 transform transition hover:scale-105">
                    <span class="text-2xl">⭐</span>
                    <span id="score-display" class="text-2xl font-black text-gray-800">0</span>
                </div>
                <!-- Right side empty for logo -->
                <div class="w-24 h-10"></div> 
            </div>

            <!-- Main Game Area Container (Fills remaining height) -->
            <div class="flex-1 w-full bg-white rounded-[32px] shadow-2xl border-[6px] sm:border-8 border-white flex flex-col relative min-h-0 overflow-hidden mb-2 sm:mb-4">
                
                <!-- Feedback Overlay -->
                <div id="feedback-overlay" class="hidden absolute inset-0 z-20 flex items-center justify-center bg-white/75 backdrop-blur-sm rounded-[24px]">
                    <div id="feedback-text" class="text-5xl sm:text-7xl md:text-8xl font-black drop-shadow-xl text-center px-4">
                        <!-- Content updated via JS -->
                    </div>
                </div>

                <!-- Question Header with TTS -->
                <div class="shrink-0 bg-[#1CB0F6]/10 p-3 sm:p-5 border-b-4 border-gray-100 flex flex-col sm:flex-row items-center justify-center gap-3 text-center">
                    <h2 class="text-xl sm:text-3xl font-extrabold text-[#1CB0F6] drop-shadow-sm">
                        Are these groups Equal or Unequal?
                    </h2>
                    <button 
                        onclick="speakQuestion()"
                        class="bg-[#1CB0F6] hover:bg-[#1899d6] text-white p-2.5 sm:p-3 rounded-full shadow-[0_4px_0_#1899d6] transform transition active:translate-y-1 active:shadow-[0_0px_0_#1899d6] flex-shrink-0"
                        aria-label="Read question aloud"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6 sm:w-8 sm:h-8">
                            <path d="M13.5 4.06c0-1.336-1.616-2.005-2.56-1.06l-4.5 4.5H4.508c-1.141 0-2.318.664-2.66 1.905A9.76 9.76 0 001.5 12c0 .898.121 1.768.35 2.595.341 1.24 1.518 1.905 2.659 1.905h1.93l4.5 4.5c.945.945 2.561.276 2.561-1.06V4.06zM18.584 5.106a.75.75 0 011.06 0c3.808 3.807 3.808 9.98 0 13.788a.75.75 0 11-1.06-1.06 8.25 8.25 0 000-11.668.75.75 0 010-1.06z" />
                            <path d="M15.932 7.757a.75.75 0 011.061 0 4.5 4.5 0 010 6.364.75.75 0 01-1.06-1.06 3 3 0 000-4.243.75.75 0 010-1.061z" />
                        </svg>
                    </button>
                </div>

                <!-- Picture Area (Flex-1 shrinks/grows to fit available space) -->
                <div class="flex-1 bg-[#F7F7F7] p-2 sm:p-6 flex flex-col items-center justify-center min-h-0 overflow-y-auto">
                    <div id="groups-container" class="flex flex-wrap justify-center items-center gap-4 sm:gap-8 w-full max-h-full">
                        <!-- Group boxes will be injected here via JS -->
                    </div>
                </div>

                <!-- Controls Area (Fixed at bottom) -->
                <div class="shrink-0 bg-white p-4 sm:p-6 border-t-4 border-gray-100 flex flex-row gap-4 justify-center items-center z-10">
                    <button 
                        onclick="handleAnswer(true)"
                        class="flex-1 bg-[#58CC02] hover:bg-[#46a302] text-white py-4 sm:py-6 px-4 rounded-[1.5rem] shadow-[0_6px_0_#46a302] transform transition active:translate-y-2 active:shadow-[0_0px_0_#46a302] flex flex-col items-center justify-center gap-0.5 sm:gap-1 max-w-[250px]"
                    >
                        <span class="text-2xl sm:text-4xl font-black tracking-wide">EQUAL</span>
                        <span class="text-sm sm:text-xl font-bold opacity-90">(Same)</span>
                    </button>
                    
                    <button 
                        onclick="handleAnswer(false)"
                        class="flex-1 bg-[#FF4B4B] hover:bg-[#ea3939] text-white py-4 sm:py-6 px-4 rounded-[1.5rem] shadow-[0_6px_0_#ea3939] transform transition active:translate-y-2 active:shadow-[0_0px_0_#ea3939] flex flex-col items-center justify-center gap-0.5 sm:gap-1 max-w-[250px]"
                    >
                        <span class="text-2xl sm:text-4xl font-black tracking-wide">UNEQUAL</span>
                        <span class="text-sm sm:text-xl font-bold opacity-90">(Different)</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- END SCREEN -->
        <div id="end-screen" class="hidden flex flex-col items-center justify-center w-full h-full relative z-10">
            <div class="bg-white/95 backdrop-blur-md p-8 sm:p-14 rounded-[32px] shadow-2xl text-center max-w-2xl w-full border-8 border-white animate-pop">
                <div class="text-7xl sm:text-8xl mb-4">🏆</div>
                <h1 class="text-4xl md:text-6xl font-black mb-4 text-colorful">
                    Game Over!
                </h1>
                <p class="text-2xl md:text-3xl text-gray-700 mb-8 font-bold">
                    You scored: <br class="sm:hidden"/> 
                    <span class="text-yellow-500 text-4xl sm:text-5xl ml-2"><span id="final-score-val">0</span> / 10</span>
                </p>
                <button 
                    onclick="startGame()"
                    class="w-full sm:w-auto bg-[#1CB0F6] hover:bg-[#1899d6] text-white text-2xl sm:text-3xl font-extrabold py-5 px-12 rounded-full shadow-[0_6px_0_#1899d6] transform transition active:translate-y-2 active:shadow-[0_0px_0_#1899d6]"
                >
                    PLAY AGAIN 🔄
                </button>
            </div>
        </div>

    </div>

    <script>
        // Game Constants
        const EMOJIS = ['🍎', '🧸', '🏀', '🌸', '🐶', '🚗', '🐸', '🎈', '🍓', '🦋', '🍔', '🍕'];
        const TOTAL_QUESTIONS = 10;
        
        // Game State
        let score = 0;
        let questionCount = 0;
        let currentQuestions = [];
        let isAnimating = false;

        // DOM Elements
        const screens = {
            start: document.getElementById('start-screen'),
            game: document.getElementById('game-screen'),
            end: document.getElementById('end-screen')
        };
        const scoreDisplay = document.getElementById('score-display');
        const finalScoreVal = document.getElementById('final-score-val');
        const groupsContainer = document.getElementById('groups-container');
        const feedbackOverlay = document.getElementById('feedback-overlay');
        const feedbackText = document.getElementById('feedback-text');

        // Audio Setup
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            } else {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.6, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            }
        }

        function speakQuestion() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance("Are these groups equal or unequal?");
                utterance.lang = 'en-US';
                utterance.rate = 0.85; 
                utterance.pitch = 1.2; 
                window.speechSynthesis.speak(utterance);
            }
        }

        // Logic to generate 10 completely UNIQUE questions
        function generateUniqueQuestions() {
            const questions = [];
            const seenKeys = new Set();

            while (questions.length < TOTAL_QUESTIONS) {
                const numGroups = Math.floor(Math.random() * 2) + 2; // 2 or 3 groups
                const isEq = Math.random() > 0.5;
                const emoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
                let sizes = [];

                if (isEq) {
                    const size = Math.floor(Math.random() * 4) + 2; // 2 to 5 objects
                    sizes = Array(numGroups).fill(size);
                } else {
                    const baseSize = Math.floor(Math.random() * 3) + 2; // 2 to 4
                    sizes = Array(numGroups).fill(baseSize);
                    const changeIdx = Math.floor(Math.random() * numGroups);
                    let newSize = Math.floor(Math.random() * 4) + 2;
                    while (newSize === baseSize) {
                        newSize = Math.floor(Math.random() * 4) + 2;
                    }
                    sizes[changeIdx] = newSize;
                }

                // Create a unique key to ensure no duplicate questions
                const uniqueKey = `${emoji}-${isEq}-${sizes.join(',')}`;
                
                if (!seenKeys.has(uniqueKey)) {
                    seenKeys.add(uniqueKey);
                    questions.push({ sizes, isEq, emoji });
                }
            }
            return questions;
        }

        function renderQuestion() {
            const q = currentQuestions[questionCount];
            groupsContainer.innerHTML = ''; 

            q.sizes.forEach(size => {
                const box = document.createElement('div');
                // Reduced padding and min-width to fit better on small heights
                box.className = "bg-white border-[3px] border-[#E5E5E5] rounded-[1.5rem] p-3 sm:p-5 flex flex-wrap justify-center items-center shadow-[0_6px_0_#E5E5E5] transition-transform duration-300 hover:scale-[1.02]";
                box.style.minWidth = '120px';
                box.style.minHeight = '120px';

                const innerFlex = document.createElement('div');
                innerFlex.className = "flex flex-wrap justify-center items-center gap-2 sm:gap-3 max-w-[180px]";

                for (let i = 0; i < size; i++) {
                    const span = document.createElement('span');
                    // Reduced text size slightly
                    span.className = "text-4xl sm:text-[3.5rem] leading-none drop-shadow-md filter";
                    span.style.filter = "drop-shadow(2px 3px 4px rgba(0,0,0,0.15))";
                    span.innerText = q.emoji;
                    innerFlex.appendChild(span);
                }

                box.appendChild(innerFlex);
                groupsContainer.appendChild(box);
            });
        }

        function showScreen(screenName) {
            Object.values(screens).forEach(screen => screen.classList.add('hidden'));
            screens[screenName].classList.remove('hidden');
            screens[screenName].classList.add('flex');
        }

        function startGame() {
            initAudio();
            stopConfetti();
            score = 0;
            questionCount = 0;
            scoreDisplay.innerText = score;
            
            currentQuestions = generateUniqueQuestions();
            
            showScreen('game');
            renderQuestion();
            
            setTimeout(speakQuestion, 400); 
        }

        function handleAnswer(userAnswerIsEqual) {
            if (isAnimating) return; 
            isAnimating = true;

            const q = currentQuestions[questionCount];
            const isCorrect = userAnswerIsEqual === q.isEq;
            
            feedbackOverlay.classList.remove('hidden');
            feedbackText.className = "text-5xl sm:text-7xl md:text-8xl font-black drop-shadow-xl text-center px-4"; 

            if (isCorrect) {
                playSound('correct');
                score++;
                scoreDisplay.innerText = score;
                feedbackText.innerText = 'GREAT JOB! 🎉';
                feedbackText.classList.add('text-[#58CC02]', 'animate-pop');
            } else {
                playSound('incorrect');
                feedbackText.innerText = 'OOPS! 🙈';
                feedbackText.classList.add('text-[#FF4B4B]', 'animate-shake');
            }

            setTimeout(() => {
                feedbackOverlay.classList.add('hidden');
                
                if (questionCount + 1 >= TOTAL_QUESTIONS) {
                    endGame();
                } else {
                    questionCount++;
                    renderQuestion();
                    speakQuestion();
                    isAnimating = false;
                }
            }, 1200);
        }

        function endGame() {
            finalScoreVal.innerText = score;
            showScreen('end');
            startConfetti();
            isAnimating = false;
        }

        let confettiAnimationId;
        function startConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            canvas.classList.remove('hidden');
            const ctx = canvas.getContext('2d');
            
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            const colors = ['#fce18a', '#ff726d', '#b48def', '#f4306d', '#4ade80', '#38bdf8'];

            for (let i = 0; i < 150; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    r: Math.random() * 6 + 4,
                    dx: Math.random() * 4 - 2,
                    dy: Math.random() * 5 + 3,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    tilt: Math.random() * 10 - 10,
                    tiltAngle: 0,
                    tiltAngleInc: (Math.random() * 0.07) + 0.05
                });
            }

            function render() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach((p) => {
                    p.tiltAngle += p.tiltAngleInc;
                    p.y += p.dy;
                    p.x += Math.sin(p.tiltAngle) * 2;
                    
                    ctx.beginPath();
                    ctx.lineWidth = p.r;
                    ctx.strokeStyle = p.color;
                    ctx.moveTo(p.x + p.tilt + p.r, p.y);
                    ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r);
                    ctx.stroke();

                    if (p.y > canvas.height) {
                        p.y = -10;
                        p.x = Math.random() * canvas.width;
                    }
                });
                confettiAnimationId = requestAnimationFrame(render);
            }
            render();
        }

        function stopConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            canvas.classList.add('hidden');
            cancelAnimationFrame(confettiAnimationId);
        }

        // Handle window resize for confetti
        window.addEventListener('resize', () => {
            const canvas = document.getElementById('confetti-canvas');
            if (!canvas.classList.contains('hidden')) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });

    </script>
</body>
</html>
