<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nature Adventure Math - Ver 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            touch-action: manipulation;
            overflow: hidden;
            background: #87CEEB; /* Sky Blue */
            color: #1e293b;
            user-select: none;
        }

        /* Logo Placeholder in Top Right */
        .app-logo {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            height: 60px;
            z-index: 100;
            /* Add actual src in HTML below */
        }

        /* --- Nature Background (Duolingo Style) --- */
        .sky-bg {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, #5AB9EA 0%, #B5E2FA 100%);
            z-index: -5;
        }

        /* Rainbow */
        .rainbow-container {
            position: fixed;
            top: -10vh;
            left: -10vw;
            width: 70vw;
            height: 70vw;
            min-width: 400px;
            min-height: 400px;
            border-radius: 50%;
            box-shadow: 
                inset 0 0 0 20px rgba(255, 99, 132, 0.6),
                inset 0 0 0 40px rgba(255, 159, 64, 0.6),
                inset 0 0 0 60px rgba(255, 205, 86, 0.6),
                inset 0 0 0 80px rgba(75, 192, 192, 0.6),
                inset 0 0 0 100px rgba(54, 162, 235, 0.6),
                inset 0 0 0 120px rgba(153, 102, 255, 0.6);
            opacity: 0.4;
            z-index: -4;
            pointer-events: none;
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 100px;
            animation: drift var(--d) infinite linear;
            z-index: -3;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .cloud::before { width: 50%; height: 100%; top: -40%; left: 15%; }
        .cloud::after { width: 40%; height: 80%; top: -30%; right: 15%; }

        @keyframes drift {
            from { transform: translateX(-200px); }
            to { transform: translateX(110vw); }
        }

        .grass-layer-1 {
            position: fixed;
            bottom: -5vh;
            left: -10%;
            width: 120%;
            height: 35vh;
            background: #73D353;
            border-radius: 50% 50% 0 0;
            z-index: -2;
            border-top: 15px solid #58A73C;
        }
        
        .grass-layer-2 {
            position: fixed;
            bottom: -10vh;
            right: -20%;
            width: 140%;
            height: 25vh;
            background: #8DE06D;
            border-radius: 50% 50% 0 0;
            z-index: -1;
            border-top: 12px solid #6DCB4F;
        }

        /* --- UI Elements --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 4px solid white;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
        }

        .btn-kids {
            box-shadow: 0 8px 0 rgba(0,0,0,0.2);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-kids:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
        }

        /* Item Fading for Subtraction */
        .dimmed {
            opacity: 0.35;
            transform: scale(0.85) !important;
            filter: grayscale(40%);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: default;
            box-shadow: none !important;
            border-color: #cbd5e1 !important;
        }

        /* Card Hover */
        .item-card {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .item-card:not(.dimmed):hover {
            transform: scale(1.08) translateY(-5px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
        }

        /* Animations */
        .hidden { display: none !important; }
        
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }

        .floating { animation: floating 3s infinite ease-in-out; }
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .pulse-speaker {
            animation: pulse-speaker 2s infinite;
        }
        @keyframes pulse-speaker {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        #confetti-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999; /* Ensure it's on top */
        }
    </style>
</head>

    <script>
        // --- AUDIO SYSTEM (TTS & SFX) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let currentInstructionRawText = "";
        let audioUnlocked = false;

        function unlockAudio() {
            if (audioUnlocked) return;
            try {
                // Unlock Web Audio API
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                osc.connect(audioCtx.destination);
                osc.start(0); osc.stop(audioCtx.currentTime + 0.001);
                
                // Unlock Speech Synthesis
                if ('speechSynthesis' in window) {
                    const u = new SpeechSynthesisUtterance('');
                    u.volume = 0;
                    window.speechSynthesis.speak(u);
                }
                audioUnlocked = true;
            } catch(e) {}
        }

        function playSound(type) {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                
                if (type === 'pop') {
                    // Soft cute pop for subtracting
                    osc.type = 'sine'; 
                    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.15);
                } else if (type === 'success') {
                    // Happy chime
                    [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => { // C5, E5, G5, C6
                        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                        o.connect(g); g.connect(audioCtx.destination);
                        o.type = 'sine'; o.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.1);
                        g.gain.setValueAtTime(0.2, audioCtx.currentTime + i*0.1);
                        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i*0.1 + 0.3);
                        o.start(audioCtx.currentTime + i*0.1); o.stop(audioCtx.currentTime + i*0.1 + 0.3);
                    });
                } else if (type === 'fail') {
                    // Gentle boop
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(250, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(200, audioCtx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
                }
            } catch(e){}
        }

        function playVoice(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Stop any ongoing speech
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.9; // Slightly slower for kids
                utterance.pitch = 1.2; // Cheerful pitch
                utterance.lang = 'en-US';
                window.speechSynthesis.speak(utterance);
            }
        }

        function playCurrentInstruction() {
            playVoice(currentInstructionRawText);
        }

        // --- GAME DATA (Cute Nature SVGs) ---
        const svgs = {

            carrot: `<svg viewBox="0 0 100 100"><path d="M20 20 Q50 10 80 80 Q10 50 20 20 Z" fill="#f97316"/><path d="M25 25 L45 15 M35 35 L55 25 M45 45 L65 35" fill="none" stroke="#c2410c" stroke-width="3" stroke-linecap="round"/><path d="M20 20 Q10 5 25 0 M20 20 Q5 10 0 25 M20 20 Q5 0 10 10" fill="none" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/></svg>`,
            snail: `<svg viewBox="0 0 100 100"><path d="M20 80 L80 80 Q90 80 85 70 L25 70 Q10 70 20 80 Z" fill="#fcd34d"/><path d="M85 70 Q95 50 85 45 Q75 40 80 70" fill="#fcd34d"/><circle cx="82" cy="45" r="2" fill="#000"/><path d="M82 43 L80 35 M86 43 L88 35" stroke="#fcd34d" stroke-width="2" stroke-linecap="round"/><circle cx="80" cy="35" r="1.5" fill="#000"/><circle cx="88" cy="35" r="1.5" fill="#000"/><circle cx="45" cy="55" r="25" fill="#b45309"/><path d="M45 55 A 5 5 0 1 1 45 45 A 12 12 0 1 1 45 67 A 19 19 0 1 1 45 36 A 25 25 0 0 1 70 55" fill="none" stroke="#fef3c7" stroke-width="3" stroke-linecap="round"/></svg>`
        };

        const levels = [
            { s: 3, b: 1, icon: 'apple', bg: 'bg-red-100 border-red-300' },
            { s: 4, b: 2, icon: 'flower', bg: 'bg-pink-100 border-pink-300' },
            { s: 5, b: 3, icon: 'bee', bg: 'bg-yellow-100 border-yellow-300' },
            { s: 2, b: 1, icon: 'ladybug', bg: 'bg-orange-100 border-orange-300' },
            { s: 4, b: 4, icon: 'butterfly', bg: 'bg-purple-100 border-purple-300' },
            { s: 3, b: 0, icon: 'leaf', bg: 'bg-green-100 border-green-300' },
            { s: 5, b: 2, icon: 'strawberry', bg: 'bg-rose-100 border-rose-300' },
            { s: 4, b: 1, icon: 'mushroom', bg: 'bg-amber-100 border-amber-300' },
            { s: 2, b: 2, icon: 'carrot', bg: 'bg-orange-100 border-orange-300' },
            { s: 5, b: 4, icon: 'snail', bg: 'bg-yellow-100 border-yellow-400' }
        ];

        let currentLvl = 0;
        let score = 0;
        let itemsRemoved = 0;
        let isLocked = false;

        // --- BACKGROUND SETUP ---
        function setupWorld() {
            const sky = document.getElementById('sky');
            if(!sky) return;
            // Clouds
            for (let i = 0; i < 5; i++) {
                const c = document.createElement('div');
                c.className = 'cloud';
                c.style.cssText = `width:${Math.random()*150+100}px;height:${Math.random()*40+30}px;left:${Math.random()*100}%;top:${Math.random()*30}vh;--d:${Math.random()*40+30}s;opacity:0.8;`;
                sky.appendChild(c);
            }
        }

        // --- GAME LOGIC ---
        function startGame() {
            unlockAudio();
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            loadLevel();
        }

        function loadLevel() {
            const l = levels[currentLvl];
            itemsRemoved = 0;
            isLocked = false;
            
            // Update Stats
            document.getElementById('level-num').innerText = currentLvl + 1;
            document.getElementById('score-display').innerText = score;
            document.getElementById('eq-start').innerText = l.s;
            document.getElementById('eq-sub').innerText = l.b;
            
            // Reset Slot
            const slot = document.getElementById('ans-slot');
            slot.innerText = "?";
            slot.className = "w-24 h-24 md:w-32 md:h-32 rounded-[30px] border-8 border-dashed border-blue-300 flex items-center justify-center bg-blue-50 text-blue-300 text-6xl md:text-8xl transition-all";
            
            document.getElementById('input-pad').classList.add('hidden');
            
            // Instructions
            const instBox = document.getElementById('instruction-text');
            if (l.b === 0) {
                instBox.innerHTML = `Keep them all! Take away <span class='text-red-500'>0</span>`;
                currentInstructionRawText = "Keep them all! Take away zero.";
            } else {
                instBox.innerHTML = `Tap <span class="text-red-500 text-2xl md:text-4xl mx-1">${l.b}</span> to take away!`;
                currentInstructionRawText = `Tap ${l.b} items to take them away.`;
            }

            // Render Items
            const container = document.getElementById('items-container');
            container.innerHTML = "";
            
            for (let i = 0; i < l.s; i++) {
                const card = document.createElement('div');
                // Removed fixed width/height classes, relying on padding/content + flex
                card.className = `item-card w-20 h-20 md:w-28 md:h-28 p-3 md:p-4 rounded-3xl border-4 cursor-pointer shadow-lg flex items-center justify-center bg-white ${l.bg}`;
                card.innerHTML = svgs[l.icon];
                card.onclick = () => subtractActivity(card);
                container.appendChild(card);
            }

            // Auto-play voice instruction for the level
            setTimeout(playCurrentInstruction, 500);

            if (l.b === 0) setTimeout(showInput, 1500);
        }

        function subtractActivity(el) {
            if (isLocked) return;
            const l = levels[currentLvl];
            
            // Apply fading if not already faded and we need to remove more
            if (itemsRemoved < l.b && !el.classList.contains('dimmed')) {
                playSound('pop');
                el.classList.add('dimmed');
                itemsRemoved++;
                
                if (itemsRemoved === l.b) {
                    setTimeout(showInput, 600);
                }
            }
        }

        function showInput() {
            document.getElementById('instruction-text').innerHTML = `How many are left? <span class='text-blue-500'>Choose!</span>`;
            currentInstructionRawText = "How many items are left? Choose the correct number below.";
            playCurrentInstruction();
            document.getElementById('input-pad').classList.remove('hidden');
        }

        function submitAnswer(val) {
            if (isLocked) return;
            const l = levels[currentLvl];
            const correct = l.s - l.b;
            const slot = document.getElementById('ans-slot');
            
            slot.innerText = val;
            
            if (val === correct) {
                isLocked = true;
                playSound('success');
                score += 100;
                // Success styling
                slot.className = "w-24 h-24 md:w-32 md:h-32 rounded-[30px] border-8 border-green-500 flex items-center justify-center bg-green-500 text-white shadow-xl transform scale-110";
                
                setTimeout(() => {
                    document.getElementById('overlay-success').classList.remove('hidden');
                }, 1000);
            } else {
                playSound('fail');
                slot.classList.add('shake');
                slot.classList.replace('text-blue-300', 'text-red-500');
                slot.classList.replace('border-blue-300', 'border-red-400');
                
                setTimeout(() => {
                    slot.classList.remove('shake');
                    slot.classList.replace('text-red-500', 'text-blue-300');
                    slot.classList.replace('border-red-400', 'border-blue-300');
                    slot.innerText = "?";
                }, 500);
            }
        }

        function nextLevel() {
            document.getElementById('overlay-success').classList.add('hidden');
            currentLvl++;
            if (currentLvl < levels.length) {
                loadLevel();
            } else {
                showEnd();
            }
        }

        // --- END SCREEN & CONFETTI ---
        function showEnd() {
            document.getElementById('screen-game').classList.add('hidden');
            document.getElementById('screen-end').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            playSound('success');
            setTimeout(() => playVoice("You are a math superstar! Great job!"), 500);
            startConfetti();
        }

        // Confetti Canvas Engine
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let confettiPieces = [];

        function resizeCanvas() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Confetti {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -canvas.height; // Start above screen
                this.w = Math.random() * 15 + 10;
                this.h = Math.random() * 10 + 5;
                this.c = `hsl(${Math.random() * 360}, 100%, 60%)`;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = Math.random() * 3 + 2;
                this.rot = Math.random() * 360;
                this.rotSpeed = (Math.random() - 0.5) * 10;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.rot += this.rotSpeed;
                // Wobble
                this.x += Math.sin(this.y * 0.02);
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rot * Math.PI / 180);
                ctx.fillStyle = this.c;
                ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
                ctx.restore();
            }
        }

        function startConfetti() {
            for(let i=0; i<150; i++) confettiPieces.push(new Confetti());
            
            function loop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                confettiPieces.forEach((p, index) => {
                    p.update();
                    p.draw();
                    if (p.y > canvas.height + 20) {
                        // Reset to top to keep falling
                        confettiPieces[index] = new Confetti();
                        confettiPieces[index].y = -20;
                    }
                });
                requestAnimationFrame(loop);
            }
            loop();
        }

        window.onload = setupWorld;
    </script>
</body>
</html>
