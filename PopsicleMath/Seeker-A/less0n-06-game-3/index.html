<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Car Garage Math Game - Ver 2</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #38BDF8; /* Sky Blue */
            /* Allow scrolling on very short screens to avoid clipping, but hide horizontal overflow */
            overflow-x: hidden;
            overflow-y: auto; 
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        /* --- Custom Typography Styles for Kids --- */
        .text-outline-white {
            text-shadow: 
                -2px -2px 0 #FFF,  
                 2px -2px 0 #FFF,
                -2px  2px 0 #FFF,
                 2px  2px 0 #FFF,
                 0px  4px 0px rgba(0,0,0,0.2);
        }
        
        .text-outline-dark {
            text-shadow: 
                -2px -2px 0 #374151,  
                 2px -2px 0 #374151,
                -2px  2px 0 #374151,
                 2px  2px 0 #374151,
                 0px  4px 0px rgba(0,0,0,0.3);
        }

        /* --- Animations --- */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px) rotate(-3deg); }
            40% { transform: translateX(8px) rotate(3deg); }
            60% { transform: translateX(-8px) rotate(-3deg); }
            80% { transform: translateX(8px) rotate(3deg); }
        }
        .animate-shake { animation: shake 0.4s ease-in-out; }

        @keyframes drift {
            from { transform: translateX(-20vw); }
            to { transform: translateX(120vw); }
        }
        .animate-drift { animation-name: drift; }

        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow { animation: spin-slow 30s linear infinite; }

        @keyframes bounce-short {
            0% { transform: scale(0.8); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .animate-bounce-short {
            animation: bounce-short 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotate(0deg) rotateX(0deg); opacity: 1; }
            10% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg) rotateX(360deg); opacity: 0; }
        }
        .animate-confetti-fall {
            animation-name: confetti-fall;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }

        /* Car Blink Animation */
        @keyframes blinkAnim {
            0%, 96%, 100% { transform: scaleY(1); }
            98% { transform: scaleY(0.1); }
        }
        .blink { animation: blinkAnim 4s infinite; transform-origin: center; }

        /* Clicky Buttons */
        .btn-clicky {
            transition: all 0.1s;
        }
        .btn-clicky:active {
            border-bottom-width: 0px !important;
            transform: translateY(8px);
            margin-bottom: 8px;
        }
        
        .btn-option {
            transition: all 0.1s;
        }
        .btn-option:active {
            border-bottom-width: 2px !important;
            transform: translateY(6px);
            margin-bottom: 6px;
        }
    </style>
</head>
<body class="min-h-screen relative">
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- Logo Placeholder Area (Top Right) -->
    <!-- You can replace the src below with your actual logo -->
    <div class="absolute top-4 right-4 sm:top-6 sm:right-8 z-50 pointer-events-none">
        <div class="w-24 h-12 bg-white/30 backdrop-blur-sm rounded-xl border-2 border-white/50 flex items-center justify-center text-white font-bold text-sm shadow-sm">
            LOGO HERE
        </div>
        <!-- <img src="../assets/logo-oodles-math.png" class="h-12 w-auto drop-shadow-md"> -->
    </div>

    <div id="app" class="min-h-screen flex flex-col relative w-full"></div>

    <script>
        // --- GAME STATE ---
        let round = 0;
        const totalRounds = 10;
        let levelData = null;
        let gameState = 'start'; // 'start', 'playing', 'success', 'end'
        let mistakes = 0;
        let soundEnabled = true;
        let wrongAnswer = null;

        // Bright, kid-friendly colors for options
        const carColors = ['#FF4B4B', '#FFC800', '#CE82FF', '#FF9600', '#58CC02'];
        // The unified color for all cars inside the garage
        const garageCarColor = '#1CB0F6'; 

        // --- SVG GENERATORS ---

        // Upgraded Car SVG (More realistic & pretty, but still cute)
        function getCarSVG(color) {
            // A darker version of the main color for depth/borders
            const darkerColor = "rgba(0,0,0,0.15)";
            
            return `
            <svg viewBox="0 0 140 100" class="w-full h-full drop-shadow-lg" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Under-car shadow -->
                <ellipse cx="70" cy="92" rx="60" ry="6" fill="#1F2937" opacity="0.25" />
                
                <!-- Exhaust smoke -->
                <circle cx="15" cy="80" r="10" fill="white" opacity="0.8" />
                <circle cx="6" cy="70" r="6" fill="white" opacity="0.5" />
                <circle cx="2" cy="60" r="4" fill="white" opacity="0.3" />

                <!-- Back Bumper -->
                <path d="M 15 65 C 15 75, 20 85, 30 85 L 35 85 C 35 75, 35 65, 35 65 Z" fill="#4B5563" stroke="#1F2937" stroke-width="3" stroke-linejoin="round"/>
                
                <!-- Front Bumper -->
                <path d="M 125 65 C 125 75, 120 85, 110 85 L 105 85 C 105 75, 105 65, 105 65 Z" fill="#4B5563" stroke="#1F2937" stroke-width="3" stroke-linejoin="round"/>

                <!-- Main Car Body (Hatchback/SUV style) -->
                <path d="M 20 60 C 20 30, 45 15, 75 15 C 110 15, 125 40, 125 65 C 125 85, 110 88, 90 88 L 45 88 C 25 88, 20 75, 20 60 Z" fill="${color}" stroke="#1F2937" stroke-width="5" stroke-linejoin="round"/>
                
                <!-- Body Depth Highlight (Bottom shadow) -->
                <path d="M 25 75 C 40 85, 100 85, 120 75" stroke="${darkerColor}" stroke-width="10" stroke-linecap="round" fill="none"/>

                <!-- Body Gloss/Highlight (Top curve) -->
                <path d="M 35 28 C 55 20, 85 20, 105 38" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.5" fill="none"/>

                <!-- Windows -->
                <!-- Back Window -->
                <path d="M 35 28 L 65 28 L 65 52 L 25 52 C 25 40, 30 32, 35 28 Z" fill="#BAE6FD" stroke="#1F2937" stroke-width="4" stroke-linejoin="round"/>
                <!-- Front Window -->
                <path d="M 65 28 L 85 28 C 98 28, 112 40, 112 52 L 65 52 Z" fill="#BAE6FD" stroke="#1F2937" stroke-width="4" stroke-linejoin="round"/>
                
                <!-- Window Reflections (Diagonal slashes) -->
                <path d="M 95 32 L 105 32 L 95 48 L 85 48 Z" fill="#FFFFFF" opacity="0.7" />
                <path d="M 50 32 L 60 32 L 50 48 L 40 48 Z" fill="#FFFFFF" opacity="0.7" />

                <!-- Headlights & Taillights (Detailed) -->
                <!-- Taillight -->
                <path d="M 20 52 L 20 66 C 14 62, 14 56, 20 52 Z" fill="#FCA5A5" stroke="#1F2937" stroke-width="3" stroke-linejoin="round"/>
                <circle cx="20" cy="59" r="2" fill="#FEF08A" />
                
                <!-- Headlight -->
                <ellipse cx="118" cy="58" rx="7" ry="9" fill="#FEF08A" stroke="#1F2937" stroke-width="3" />
                <ellipse cx="120" cy="56" rx="3" ry="4" fill="#FFFFFF" />

                <!-- Cute Face (Blinking) -->
                <g class="blink">
                    <!-- Left Eye -->
                    <circle cx="100" cy="72" r="5" fill="#1F2937" />
                    <circle cx="101" cy="70" r="2" fill="#FFFFFF" />
                    <!-- Right Eye -->
                    <circle cx="116" cy="72" r="5" fill="#1F2937" />
                    <circle cx="117" cy="70" r="2" fill="#FFFFFF" />
                </g>
                <!-- Rosy Cheeks -->
                <circle cx="92" cy="76" r="4" fill="#FF8A8A" opacity="0.8" />
                <circle cx="124" cy="76" r="4" fill="#FF8A8A" opacity="0.8" />
                <!-- Smile -->
                <path d="M 104 78 Q 108 83 112 78" stroke="#1F2937" stroke-width="3" stroke-linecap="round" fill="none" />

                <!-- Detailed Wheels (Chonky and realistic) -->
                <!-- Back Wheel -->
                <circle cx="45" cy="88" r="18" fill="#1F2937" />
                <circle cx="45" cy="88" r="13" fill="#374151" />
                <circle cx="45" cy="88" r="9" fill="#D1D5DB" stroke="#9CA3AF" stroke-width="2"/>
                <circle cx="45" cy="88" r="3" fill="#4B5563" />
                <!-- Front Wheel -->
                <circle cx="95" cy="88" r="18" fill="#1F2937" />
                <circle cx="95" cy="88" r="13" fill="#374151" />
                <circle cx="95" cy="88" r="9" fill="#D1D5DB" stroke="#9CA3AF" stroke-width="2"/>
                <circle cx="95" cy="88" r="3" fill="#4B5563" />
            </svg>
            `;
        }

        // Beautiful Duolingo-style Background (Sky, Sun, Rainbow, Clouds, Grass, Trees, Flowers)
        function getBackgroundHTML() {
            // Generate animated clouds
            let clouds = '';
            for(let i=0; i<6; i++) {
                let width = 100 + Math.random() * 80;
                let height = 50 + Math.random() * 30;
                let top = 2 + Math.random() * 25; // Top 25% of screen
                let left = -(30 + Math.random() * 20);
                let duration = 40 + Math.random() * 40;
                let delay = i * 12;
                clouds += `
                <div class="absolute bg-white rounded-full opacity-90 animate-drift drop-shadow-md" 
                     style="width: ${width}px; height: ${height}px; top: ${top}%; left: ${left}%; animation-duration: ${duration}s; animation-delay: -${delay}s; animation-timing-function: linear;">
                    <div class="absolute top-[-40%] left-[15%] w-[50%] h-[120%] bg-white rounded-full"></div>
                    <div class="absolute top-[-20%] right-[15%] w-[45%] h-[90%] bg-white rounded-full"></div>
                </div>`;
            }

            return `
            <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
                <!-- Solid Sky -->
                <div class="absolute inset-0 bg-[#38BDF8]"></div>
                
                <!-- Sun (Moved to Top Left) -->
                <div class="absolute top-8 left-8 sm:top-12 sm:left-12 animate-spin-slow origin-center z-10">
                    <i data-lucide="sun" class="w-28 h-28 sm:w-36 sm:h-36 text-[#FFC800] fill-[#FFC800] drop-shadow-[0_0_15px_rgba(255,200,0,0.6)] stroke-[1px]"></i>
                </div>

                <!-- Rainbow SVG -->
                <svg class="absolute bottom-[20%] sm:bottom-[25%] left-1/2 transform -translate-x-1/2 w-[80%] max-w-[600px] h-auto opacity-70" viewBox="0 0 200 100" preserveAspectRatio="xMidYMax slice">
                    <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="#FF4B4B" stroke-width="12" stroke-linecap="round"/>
                    <path d="M 32 100 A 68 68 0 0 1 168 100" fill="none" stroke="#FF9600" stroke-width="12" stroke-linecap="round"/>
                    <path d="M 44 100 A 56 56 0 0 1 156 100" fill="none" stroke="#FFC800" stroke-width="12" stroke-linecap="round"/>
                    <path d="M 56 100 A 44 44 0 0 1 144 100" fill="none" stroke="#58CC02" stroke-width="12" stroke-linecap="round"/>
                    <path d="M 68 100 A 32 32 0 0 1 132 100" fill="none" stroke="#1CB0F6" stroke-width="12" stroke-linecap="round"/>
                    <path d="M 80 100 A 20 20 0 0 1 120 100" fill="none" stroke="#CE82FF" stroke-width="12" stroke-linecap="round"/>
                </svg>

                <!-- Clouds -->
                ${clouds}

                <!-- Grass Hills Background Layer -->
                <div class="absolute bottom-0 left-[-10%] w-[120%] h-[40%] bg-[#58CC02] rounded-t-[50%] border-t-[8px] border-[#46A302]"></div>
                <!-- Grass Hills Foreground Layer -->
                <div class="absolute bottom-0 right-[-10%] w-[120%] h-[30%] bg-[#A3E635] rounded-t-[50%] border-t-[8px] border-[#84CC16]"></div>

                <!-- Decorative Trees & Flowers -->
                <div class="absolute bottom-[25%] left-[10%] w-12 h-20">
                    <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-3 h-8 bg-[#8B4513] rounded-sm"></div>
                    <div class="absolute bottom-4 left-1/2 -translate-x-1/2 w-12 h-12 bg-[#22C55E] rounded-full drop-shadow-md"></div>
                </div>
                <div class="absolute bottom-[32%] right-[15%] w-16 h-24">
                    <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-4 h-10 bg-[#8B4513] rounded-sm"></div>
                    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-16 h-16 bg-[#16A34A] rounded-full drop-shadow-md"></div>
                </div>
                <div class="absolute bottom-[10%] left-[25%] w-6 h-6 animate-pulse">
                    <div class="w-full h-full bg-pink-400 rounded-full flex items-center justify-center shadow-sm">
                        <div class="w-2 h-2 bg-yellow-300 rounded-full"></div>
                    </div>
                </div>
                <div class="absolute bottom-[15%] right-[25%] w-5 h-5 animate-pulse" style="animation-delay: 1s;">
                    <div class="w-full h-full bg-white rounded-full flex items-center justify-center shadow-sm border border-gray-100">
                        <div class="w-2 h-2 bg-yellow-400 rounded-full"></div>
                    </div>
                </div>
                <div class="absolute bottom-[5%] left-[60%] w-7 h-7 animate-pulse" style="animation-delay: 0.5s;">
                    <div class="w-full h-full bg-purple-400 rounded-full flex items-center justify-center shadow-sm">
                        <div class="w-2.5 h-2.5 bg-yellow-300 rounded-full"></div>
                    </div>
                </div>
            </div>
            `;
        }

        // Confetti Generator (Highest Z-index)
        function getConfettiHTML() {
            const colors = ['#FF4B4B', '#1CB0F6', '#58CC02', '#FFC800', '#CE82FF'];
            let confetti = '';
            for(let i=0; i<100; i++) {
                let size = Math.random() * 15 + 10;
                let color = colors[Math.floor(Math.random() * colors.length)];
                let left = Math.random() * 100;
                let delay = Math.random() * 3;
                let duration = Math.random() * 3 + 2.5;
                let borderRadius = Math.random() > 0.3 ? '2px' : '50%';
                let heightMod = Math.random() > 0.5 ? 0.8 : 1.5;
                
                confetti += `
                <div class="absolute animate-confetti-fall z-[100]" 
                     style="left: ${left}%; top: -50px; width: ${size}px; height: ${size * heightMod}px; background-color: ${color}; border-radius: ${borderRadius}; animation-delay: ${delay}s; animation-duration: ${duration}s;">
                </div>`;
            }
            return `<div class="fixed inset-0 pointer-events-none overflow-hidden z-[100]">${confetti}</div>`;
        }

        // --- AUDIO & TTS ---
        function speak(text) {
            if (!window.speechSynthesis || !soundEnabled) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.85; 
            utterance.pitch = 1.2; 
            const voices = window.speechSynthesis.getVoices();
            // Try to find a friendly English voice
            const kidVoice = voices.find(v => v.name.includes('Google US English') || v.name.includes('Samantha') || v.name.includes('Karen'));
            if (kidVoice) utterance.voice = kidVoice;
            window.speechSynthesis.speak(utterance);
        }

        function playSound(type) {
            if (!soundEnabled) return;
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                
                if (type === 'success') {
                    // Cheerful major chord arpeggio
                    [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, ctx.currentTime + (i * 0.08));
                        gain.gain.setValueAtTime(0, ctx.currentTime + (i * 0.08));
                        gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + (i * 0.08) + 0.05);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + (i * 0.08) + 0.4);
                        osc.start(ctx.currentTime + (i * 0.08));
                        osc.stop(ctx.currentTime + (i * 0.08) + 0.5);
                    });
                } else if (type === 'error') {
                    // Soft 'boop' sound
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(200, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(120, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'pop') {
                    // Friendly pop
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.1);
                }
            } catch (e) {
                console.error("Audio error", e);
            }
        }

        window.playTargetAudio = () => {
            if(levelData) {
                playSound('pop');
                speak(`We need ${levelData.target} cars in total.`);
            }
        };

        // --- GAME LOGIC ---
        function generateLevel(currentRound) {
            let targetMin = 4, targetMax = 6;
            if (currentRound > 3) { targetMin = 6; targetMax = 8; }
            if (currentRound > 6) { targetMin = 8; targetMax = 10; }
            
            const target = Math.floor(Math.random() * (targetMax - targetMin + 1)) + targetMin;
            const parked = Math.floor(Math.random() * (target - 1)) + 1; 
            const needed = target - parked;

            const options = new Set();
            options.add(needed);
            
            while (options.size < 3) {
                let distractor = Math.floor(Math.random() * targetMax) + 1;
                if (distractor !== needed && distractor > 0 && distractor <= 10) {
                    options.add(distractor);
                }
            }

            return {
                target,
                parked,
                needed,
                options: Array.from(options).sort(() => Math.random() - 0.5)
            };
        }

        window.startGame = () => {
            round = 0;
            mistakes = 0;
            wrongAnswer = null;
            gameState = 'playing';
            levelData = generateLevel(0);
            playSound('pop');
            speak(`Let's park the cars! We need ${levelData.target} in total.`);
            renderApp();
        };

        window.nextLevel = () => {
            if (round + 1 >= totalRounds) {
                gameState = 'end';
                playSound('success');
                speak("Amazing job! You finished the game!");
            } else {
                round++;
                levelData = generateLevel(round);
                gameState = 'playing';
                wrongAnswer = null;
                speak(`Next one! Make ${levelData.target}.`);
            }
            renderApp();
        };

        window.handleSelection = (number) => {
            if (gameState !== 'playing') return;

            if (number === levelData.needed) {
                playSound('success');
                speak(["Awesome!", "Great job!", "Perfect!", "You got it!"][Math.floor(Math.random() * 4)]);
                gameState = 'success';
                wrongAnswer = null;
                renderApp();
                setTimeout(window.nextLevel, 2000); 
            } else {
                mistakes++;
                wrongAnswer = number;
                playSound('error');
                speak("Oops, try again!");
                renderApp();
                
                // Clear animation after a bit
                setTimeout(() => {
                    if (gameState === 'playing') {
                        wrongAnswer = null;
                        renderApp();
                    }
                }, 800);
            }
        };

        window.toggleSound = () => {
            soundEnabled = !soundEnabled;
            renderApp();
        };

        window.goHome = () => {
            gameState = 'start';
            renderApp();
        };

        // --- UI RENDERING ---
        function renderStartScreen() {
            return `
            ${getBackgroundHTML()}
            <div class="flex-1 flex flex-col items-center justify-center p-4 relative z-20">
                <div class="bg-white/95 backdrop-blur-md p-8 md:p-12 rounded-[3rem] max-w-lg w-full flex flex-col items-center border-[6px] border-white shadow-[0_12px_0_0_rgba(0,0,0,0.15)]">
                    <div class="bg-[#FF9600] text-white py-2 px-8 rounded-full font-black uppercase tracking-widest text-sm mb-6 shadow-[0_4px_0_0_#D97706] transform -rotate-2 border-2 border-white">
                        Math Game
                    </div>
                    <h1 class="text-5xl md:text-6xl font-black text-[#4B4B4B] mb-8 leading-tight text-center">
                        Car <span class="text-[#1CB0F6]">Garage</span>
                    </h1>
                    
                    <div class="flex justify-center gap-2 md:gap-4 mb-8">
                        <div class="w-24 md:w-32 transform -rotate-6 transition-transform hover:scale-110">${getCarSVG('#FF4B4B')}</div>
                        <div class="w-24 md:w-32 transform translate-y-4 transition-transform hover:scale-110 z-10">${getCarSVG('#1CB0F6')}</div>
                        <div class="w-24 md:w-32 transform rotate-6 transition-transform hover:scale-110">${getCarSVG('#58CC02')}</div>
                    </div>
                    
                    <p class="text-xl text-[#777777] font-bold mb-10 text-center">Park the cars to match the target number!</p>
                    
                    <button onclick="startGame()" class="btn-clicky w-full bg-[#58CC02] hover:bg-[#46A302] text-white text-3xl font-black py-5 px-8 rounded-2xl flex items-center justify-center gap-4 uppercase tracking-wider border-b-[8px] border-[#46A302]">
                        <i data-lucide="play" class="w-10 h-10 fill-current"></i> Play Now
                    </button>
                </div>
            </div>`;
        }

        function renderGameScreen() {
            // OPTION BUTTONS
            let optionsHTML = '';
            levelData.options.forEach((opt, idx) => {
                const isWrong = wrongAnswer === opt;
                const wrongClasses = isWrong ? 'animate-shake bg-red-50 border-red-200 border-b-red-300 opacity-80' : 'bg-white border-[#E5E7EB] hover:bg-gray-50';
                const wrongTextClasses = isWrong ? 'bg-[#FF4B4B] text-white border-[#C93838]' : 'bg-[#F3F4F6] text-[#4B4B4B] border-[#E5E7EB]';
                
                // Mini cars for buttons (Assorted colors to make distinct groups)
                let miniCars = '';
                for(let c=0; c<opt; c++) {
                    const carColor = carColors[c % carColors.length];
                    const sizeClass = opt > 4 ? "w-8 h-6 sm:w-10 sm:h-8" : "w-10 h-8 sm:w-14 sm:h-10";
                    miniCars += `<div class="${sizeClass}">${getCarSVG(carColor)}</div>`;
                }

                optionsHTML += `
                <button onclick="handleSelection(${opt})" class="btn-option group border-4 rounded-[2rem] p-3 sm:p-5 flex flex-col items-center min-w-[120px] sm:min-w-[160px] transition-all duration-100 border-b-[8px] shadow-sm ${wrongClasses}">
                    <div class="grid gap-1.5 sm:gap-2 mb-4 w-full justify-items-center ${opt > 4 ? 'grid-cols-3' : 'grid-cols-2'}">
                        ${miniCars}
                    </div>
                    <div class="w-[80%] py-1.5 sm:py-2 rounded-2xl text-center font-black text-2xl sm:text-3xl transition-colors border-2 shadow-sm ${wrongTextClasses}">
                        ${opt}
                    </div>
                </button>`;
            });

            // PARKED CARS (Unified Color)
            let parkedCarsHTML = '';
            for(let i=0; i<levelData.parked; i++) {
                parkedCarsHTML += `
                <div class="w-full max-w-[90px] aspect-[4/3] bg-white rounded-2xl flex items-center justify-center p-1 sm:p-2 border-b-[6px] border-[#E5E7EB] shadow-inner">
                    ${getCarSVG(garageCarColor)}
                </div>`;
            }

            // NEEDED CARS
            let neededCarsHTML = '';
            for(let i=0; i<levelData.needed; i++) {
                if(gameState === 'success') {
                    // On success, show them driving in with the same unified color
                    neededCarsHTML += `
                    <div class="w-full max-w-[90px] aspect-[4/3] rounded-2xl flex items-center justify-center p-1 sm:p-2">
                        <div class="animate-bounce w-full h-full">${getCarSVG(garageCarColor)}</div>
                    </div>`;
                } else {
                    neededCarsHTML += `
                    <div class="w-full max-w-[90px] aspect-[4/3] rounded-2xl border-4 border-dashed border-[#D1D5DB] bg-white/50 flex items-center justify-center p-1 sm:p-2 transition-all duration-300">
                        <span class="text-[#D1D5DB] font-black text-5xl opacity-50">?</span>
                    </div>`;
                }
            }

            return `
            ${getBackgroundHTML()}
            
            <!-- Progress Bar & Controls -->
            <div class="bg-white/95 backdrop-blur-md px-4 py-3 sm:py-4 flex justify-between items-center shadow-lg z-30 sticky top-0 border-b-[4px] border-[#E5E7EB]">
                <div class="flex-1 max-w-4xl mx-auto flex items-center gap-4">
                    <button onclick="goHome()" class="text-[#AFB6C2] hover:text-[#FF4B4B] transition transform hover:scale-110">
                        <i data-lucide="home" class="w-8 h-8 stroke-[3px]"></i>
                    </button>
                    
                    <div class="flex-1 bg-[#F3F4F6] h-6 sm:h-8 rounded-full overflow-hidden relative border-[3px] border-[#D1D5DB]">
                        <div class="absolute top-0 left-0 h-full bg-[#58CC02] transition-all duration-500 ease-out rounded-full" style="width: ${(round / totalRounds) * 100}%">
                            <div class="absolute top-1 left-2 right-2 h-2 bg-white/40 rounded-full"></div>
                        </div>
                    </div>
                    
                    <button onclick="toggleSound()" class="text-[#AFB6C2] hover:text-[#1CB0F6] transition transform hover:scale-110">
                        ${soundEnabled 
                            ? `<i data-lucide="volume-2" class="w-8 h-8 stroke-[3px]"></i>` 
                            : `<i data-lucide="volume-x" class="w-8 h-8 stroke-[3px]"></i>`
                        }
                    </button>
                </div>
            </div>

            <!-- Main Game Area -->
            <div class="flex-1 flex flex-col items-center justify-center w-full max-w-5xl mx-auto p-4 sm:p-6 z-20 relative">
                
                <!-- TARGET HEADER -->
                <div class="flex items-center justify-center gap-4 sm:gap-6 mb-8 sm:mb-12 mt-2 bg-white/40 p-4 rounded-[2rem] backdrop-blur-sm border-2 border-white/50 shadow-sm">
                    <div class="flex flex-col items-end justify-center">
                        <h2 class="text-[#FFC800] text-xl sm:text-2xl font-black uppercase tracking-widest text-outline-white">Target</h2>
                        <div class="flex items-center gap-2 sm:gap-3">
                            <p class="text-3xl sm:text-5xl font-extrabold text-white text-outline-dark leading-tight">Make Total</p>
                            <!-- Audio Button -->
                            <button onclick="playTargetAudio()" class="bg-[#1CB0F6] hover:bg-[#1899D6] p-2 sm:p-3 rounded-full border-b-[4px] border-[#1899D6] text-white transition-all active:translate-y-1 active:border-b-0 shadow-md group">
                                <i data-lucide="volume-2" class="w-6 h-6 sm:w-8 sm:h-8 stroke-[3px] group-hover:scale-110 transition-transform"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="bg-[#FFC800] border-[6px] border-white w-24 h-24 sm:w-32 sm:h-32 rounded-[2rem] flex items-center justify-center shadow-[0_8px_0_0_#D97706] transform rotate-3">
                        <span class="text-6xl sm:text-8xl font-black text-white drop-shadow-md">${levelData.target}</span>
                    </div>
                </div>

                <!-- GARAGE AREA -->
                <div class="w-full relative px-2 sm:px-8 drop-shadow-2xl">
                    <div class="bg-white/95 backdrop-blur-sm border-4 border-[#D1D5DB] rounded-t-[3rem] p-4 sm:p-8 pt-12 min-h-[180px] sm:min-h-[220px] transition-all duration-300 relative z-10 ${gameState === 'success' ? 'bg-[#D7FFB8] border-[#58CC02]' : ''}">
                        
                        <!-- Garage Sign -->
                        <div class="absolute -top-7 left-1/2 transform -translate-x-1/2 bg-[#FF4B4B] text-white px-10 py-2 rounded-full font-black tracking-widest text-xl sm:text-2xl border-b-[6px] border-[#C93838] shadow-lg z-20 whitespace-nowrap">
                            GARAGE
                        </div>

                        <!-- Responsive Flex Grid for Cars -->
                        <div class="flex flex-wrap justify-center gap-2 sm:gap-4 mt-2">
                            ${parkedCarsHTML}
                            ${neededCarsHTML}
                        </div>
                    </div>

                    <!-- Road under Garage -->
                    <div class="w-full h-12 sm:h-16 bg-[#4B5563] rounded-b-[3rem] border-b-[8px] border-[#374151] relative z-20 flex items-center justify-center overflow-hidden shadow-xl">
                        <div class="w-[90%] border-t-[8px] border-dashed border-[#FFC800] opacity-90"></div>
                    </div>
                </div>

                <!-- OPTIONS AREA -->
                <div class="w-full mt-8 sm:mt-12 h-auto min-h-[220px] flex items-center justify-center">
                    ${gameState === 'success' ? `
                        <div class="text-center w-full py-8">
                            <h2 class="text-5xl md:text-7xl font-black text-white animate-bounce text-outline-dark drop-shadow-xl">Perfect!</h2>
                        </div>
                    ` : `
                        <div class="w-full flex flex-col items-center">
                            <div class="h-12 mb-4 flex items-center justify-center">
                                ${wrongAnswer !== null 
                                    ? `<div class="bg-[#FF4B4B] text-white px-8 py-2 rounded-full font-black text-2xl tracking-widest uppercase animate-pulse border-b-4 border-[#C93838] shadow-lg">Try Again!</div>`
                                    : `<p class="font-black text-2xl sm:text-3xl uppercase tracking-widest text-white text-outline-dark">Select the missing cars</p>`
                                }
                            </div>
                            <!-- Responsive Flex Wrap for Options -->
                            <div class="flex justify-center gap-4 sm:gap-8 flex-wrap w-full px-2">
                                ${optionsHTML}
                            </div>
                        </div>
                    `}
                </div>
            </div>`;
        }

        function renderEndScreen() {
            let stars = 1;
            if(mistakes === 0) stars = 3;
            else if(mistakes <= 3) stars = 2;

            let starHTML = '';
            [1, 2, 3].forEach(s => {
                let sClass = s <= stars ? 'scale-110 drop-shadow-lg' : 'scale-75 opacity-50 grayscale';
                let fill = s <= stars ? '#FFC800' : '#E5E7EB';
                let stroke = s <= stars ? '#D97706' : '#9CA3AF';
                let delay = s * 150;
                starHTML += `
                <div class="transition-all duration-700 transform ${sClass}" style="animation: bounce-short 0.6s ease ${delay}ms both;">
                    <svg width="90" height="90" viewBox="0 0 24 24" fill="${fill}" stroke="${stroke}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                    </svg>
                </div>`;
            });

            return `
            ${getBackgroundHTML()}
            ${getConfettiHTML()}
            
            <div class="flex-1 flex flex-col items-center justify-center p-4 relative z-50">
                <div class="bg-white/95 backdrop-blur-md p-10 sm:p-12 rounded-[3rem] shadow-[0_12px_0_0_rgba(0,0,0,0.15)] max-w-lg w-full flex flex-col items-center animate-bounce-short border-[6px] border-white">
                    <h2 class="text-5xl sm:text-6xl font-black text-[#FFC800] mb-8 text-outline-white drop-shadow-md text-center leading-tight">Level<br/>Complete!</h2>
                    
                    <div class="flex justify-center gap-2 sm:gap-4 mb-8">
                        ${starHTML}
                    </div>

                    <div class="bg-[#F3F4F6] w-full rounded-3xl p-6 mb-8 border-4 border-[#E5E7EB] shadow-inner">
                        <div class="flex justify-between items-center text-xl sm:text-2xl font-bold text-[#777777] mb-3">
                            <span>Cars Parked:</span>
                            <span class="text-[#1CB0F6] text-3xl sm:text-4xl font-black">${totalRounds}</span>
                        </div>
                        <div class="flex justify-between items-center text-xl sm:text-2xl font-bold text-[#777777]">
                            <span>Accuracy:</span>
                            <span class="text-2xl sm:text-3xl font-black ${mistakes === 0 ? 'text-[#58CC02]' : 'text-[#FF4B4B]'}">
                                ${mistakes === 0 ? "Perfect!" : `${totalRounds} / ${totalRounds + mistakes}`}
                            </span>
                        </div>
                    </div>

                    <button onclick="startGame()" class="btn-clicky w-full bg-[#1CB0F6] hover:bg-[#1899D6] text-white text-3xl font-black py-5 px-8 rounded-2xl flex items-center justify-center gap-4 uppercase tracking-wider border-b-[8px] border-[#1899D6] shadow-md z-10">
                        <i data-lucide="rotate-ccw" class="w-10 h-10 stroke-[3px]"></i> Play Again
                    </button>
                </div>
            </div>`;
        }

        function renderApp() {
            const app = document.getElementById('app');
            if (gameState === 'start') {
                app.innerHTML = renderStartScreen();
            } else if (gameState === 'playing' || gameState === 'success') {
                app.innerHTML = renderGameScreen();
            } else if (gameState === 'end') {
                app.innerHTML = renderEndScreen();
            }
            
            // Re-initialize Lucide Icons
            if(window.lucide) {
                lucide.createIcons();
            }
        }

        // --- INITIALIZATION ---
        if(window.speechSynthesis) {
            window.speechSynthesis.getVoices();
        }
        
        renderApp();
    </script>
</body>
</html>
