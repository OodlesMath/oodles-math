<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bridge Master: Counting Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            background: #bae6fd;
        }

        /* --- BACKGROUND STYLE --- */
        #bg-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #0ea5e9 0%, #38bdf8 40%, #bae6fd 100%);
            z-index: 0;
            overflow: hidden;
        }

        .sun {
            position: absolute;
            top: -40px; left: -40px;
            width: 220px; height: 220px;
            background: #facc15;
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(250, 204, 21, 0.6);
            z-index: 1;
        }

        .cloud-container {
            position: absolute;
            pointer-events: none;
            z-index: 2;
            opacity: 0.9;
        }

        .cloud-shape {
            width: 120px; height: 40px;
            background: #fff;
            border-radius: 50px;
            position: relative;
            filter: drop-shadow(0 10px 15px rgba(255,255,255,0.6));
        }

        .cloud-shape::after, .cloud-shape::before {
            content: '';
            position: absolute;
            background: #fff;
            border-radius: 50%;
        }

        .cloud-shape::after { width: 60px; height: 60px; top: -30px; left: 15px; }
        .cloud-shape::before { width: 50px; height: 50px; top: -20px; right: 15px; }

        .cloud-move-1 { animation: float 65s infinite linear; top: 15%; }
        .cloud-move-2 { animation: float 50s infinite linear reverse; top: 25%; }

        @keyframes float {
            from { transform: translateX(-200px); }
            to { transform: translateX(110vw); }
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            background: transparent;
        }

        #fireworksCanvas {
            z-index: 60;
        }

        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .interactive { pointer-events: auto; }

        .pop-in { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* --- UNIT PICKER (POSITIONED AT CLOUD LEVEL) --- */
        .length-picker {
            position: absolute;
            top: 32%; 
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px);
            padding: 15px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 4px solid #fff;
            pointer-events: auto;
            max-width: 95vw;
            overflow-x: auto;
        }

        .unit-square {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex-shrink: 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            border-bottom: 4px solid rgba(0,0,0,0.2);
        }

        .unit-square:active { transform: scale(0.85) translateY(2px); border-bottom: 0px; }
        .unit-square:hover { transform: translateY(-3px); filter: brightness(1.1); }
        
        .math-card {
            background: white;
            border: 8px solid #fbbf24;
            border-radius: 3rem;
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- Background Layer -->
    <div id="bg-container">
        <div class="sun"></div>
        <div class="cloud-container cloud-move-1" style="left: 10%;">
            <div class="cloud-shape"></div>
        </div>
        <div class="cloud-container cloud-move-2" style="right: 5%;">
            <div class="cloud-shape" style="transform: scale(0.8); opacity: 0.7;"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <canvas id="fireworksCanvas"></canvas>

    <div class="ui-layer">
        <!-- Scoreboard -->
        <div class="absolute top-6 right-6">
            <div id="scoreBox" class="bg-[#facc15] border-4 border-white rounded-2xl px-6 py-2 shadow-lg opacity-0 transition-opacity duration-500">
                <span class="text-white font-bold text-xl flex items-center gap-2">
                    🏆 Project Progress: <span id="currentScore">0</span>/10
                </span>
            </div>
        </div>

        <div id="hint" class="absolute top-[45%] w-full text-center text-white font-bold text-2xl drop-shadow-md animate-bounce opacity-0">
            CHOOSE NUMBER OF BLOCKS!
        </div>

        <!-- Length Picker -->
        <div id="lengthPicker" class="length-picker hidden">
            <!-- Squares generated via JS -->
        </div>

        <!-- Start Screen -->
        <div id="startScreen" class="absolute inset-0 flex items-center justify-center bg-black/20 backdrop-blur-sm interactive">
            <div class="bg-white rounded-[2.5rem] p-10 max-sm:p-6 max-w-sm w-[90%] text-center shadow-2xl border-8 border-[#facc15] pop-in">
                <h1 class="text-4xl sm:text-5xl font-extrabold text-[#facc15] mb-2">Bridge Master</h1>
                <h2 class="text-lg font-semibold text-slate-500 mb-8 uppercase tracking-widest">👷 COUNTING MISSION</h2>
                <div class="flex justify-center gap-6 mb-8 text-7xl">
                    <div class="animate-bounce">🏗️</div>
                </div>
                <p class="text-slate-600 mb-8 font-medium italic text-sm sm:text-base">"Count the blocks correctly to build the bridge!"</p>
                <button id="startBtn" class="w-full bg-green-500 hover:bg-green-600 text-white text-xl sm:text-2xl font-bold py-5 rounded-2xl shadow-[0_8px_0_rgb(21,128,61)] active:translate-y-2 active:shadow-none transition-all">
                    START PROJECT
                </button>
            </div>
        </div>

        <!-- Math Revival Screen -->
        <div id="mathRevivalScreen" class="hidden absolute inset-0 flex items-center justify-center bg-black/60 backdrop-blur-md interactive">
            <div class="math-card max-w-md w-[90%] text-center pop-in shadow-2xl">
                <h2 class="text-3xl font-bold text-[#facc15] mb-2">URGENT REPAIR! 🛠️</h2>
                <p class="text-slate-500 mb-6 font-semibold uppercase tracking-wider">Solve to save the worker!</p>
                <div id="mathQuestion" class="text-5xl font-black text-slate-800 mb-8 bg-yellow-50 py-8 rounded-3xl border-4 border-yellow-100">? + ? = ?</div>
                <div id="mathOptions" class="grid grid-cols-2 gap-4"></div>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverScreen" class="hidden absolute inset-0 flex items-center justify-center bg-black/50 interactive">
            <div class="bg-white rounded-[3rem] p-10 max-w-sm w-[90%] text-center shadow-2xl border-8 border-red-500 pop-in">
                <h1 class="text-4xl font-bold text-red-600 mb-4">FAILED!</h1>
                <div class="text-8xl mb-6">🐊</div>
                <button id="retryBtn" class="w-full bg-blue-500 hover:bg-blue-600 text-white text-2xl font-bold py-4 rounded-2xl shadow-[0_6px_0_rgb(29,78,216)] active:translate-y-2 active:shadow-none transition-all">
                    RETRY ↺
                </button>
            </div>
        </div>

        <!-- Congrats Screen -->
        <div id="congratsScreen" class="hidden absolute inset-0 flex items-center justify-center bg-yellow-400/20 backdrop-blur-sm interactive">
            <div class="bg-white rounded-[3rem] p-10 text-center shadow-2xl border-8 border-green-500 pop-in">
                <h1 class="text-5xl font-bold text-green-600 mb-4">COMPLETE!</h1>
                <div class="text-9xl mb-8">🏆</div>
                <button id="finalResetBtn" class="w-full bg-green-500 hover:bg-green-600 text-white text-2xl font-bold py-4 rounded-2xl shadow-[0_6px_0_rgb(21,128,61)] active:translate-y-2 transition-all">
                    PLAY AGAIN
                </button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const fwCanvas = document.getElementById('fireworksCanvas');
        const fwCtx = fwCanvas.getContext('2d');
        
        // --- CONFIGURATION ---
        const PLATFORM_Y_OFFSET = 120; 
        const UNIT_SIZE = 40; 
        const MIN_UNITS = 2;
        const MAX_UNITS = 9;

        const pickerColors = ['#38bdf8', '#fb923c', '#4ade80', '#facc15', '#f87171', '#3b82f6', '#f97316', '#22c55e', '#eab308', '#ef4444'];

        // Game State
        let score = 0;
        let gameActive = false;
        let state = 'waiting'; 
        let platforms = [];
        let placedSticks = []; 
        let stick = { x: 0, y: 0, length: 0, angle: 0 };
        let character = { x: 0, y: 0, targetX: 0 };
        let cameraX = 0;
        let targetCameraX = 0;
        let fwParticles = [];

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            const w = window.innerWidth;
            const h = window.innerHeight;
            canvas.width = w * dpr; canvas.height = h * dpr;
            canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
            fwCanvas.width = w * dpr; fwCanvas.height = h * dpr;
            fwCanvas.style.width = w + 'px'; fwCanvas.style.height = h + 'px';
            ctx.scale(dpr, dpr); fwCtx.scale(dpr, dpr);
            if (gameActive) draw();
        }
        window.addEventListener('resize', resize);
        resize();

        function createPicker() {
            const picker = document.getElementById('lengthPicker');
            picker.innerHTML = '';
            for(let i=1; i<=10; i++) {
                const square = document.createElement('div');
                square.className = 'unit-square';
                square.style.backgroundColor = pickerColors[i-1];
                square.innerText = i;
                square.onclick = () => selectLength(i);
                picker.appendChild(square);
            }
        }

        function selectLength(units) {
            if(state !== 'waiting' || !gameActive) return;
            stick.length = units * UNIT_SIZE;
            state = 'falling';
            document.getElementById('lengthPicker').classList.add('hidden');
            document.getElementById('hint').classList.add('opacity-0');
        }

        function initGame() {
            score = 0; platforms = []; placedSticks = []; cameraX = 0; targetCameraX = 0;
            platforms.push({ x: 100, width: 140 });
            addPlatform();
            character.x = platforms[0].x + platforms[0].width - 50;
            character.y = canvas.height - PLATFORM_Y_OFFSET;
            character.targetX = character.x;
            resetStick();
            state = 'waiting';
            updateUI();
            createPicker();
            document.getElementById('lengthPicker').classList.remove('hidden');
            document.getElementById('hint').classList.remove('opacity-0');
        }

        function resetStick() {
            stick.length = 0; 
            stick.angle = -Math.PI / 2;
            stick.x = platforms[0].x + platforms[0].width;
            stick.y = canvas.height - PLATFORM_Y_OFFSET;
        }

        function addPlatform() {
            const last = platforms[platforms.length - 1];
            const unitsGap = MIN_UNITS + Math.floor(Math.random() * (MAX_UNITS - MIN_UNITS));
            const gap = unitsGap * UNIT_SIZE;
            let width;
            if (score >= 9) width = 240; 
            else width = 70 + Math.random() * 50;
            platforms.push({ x: last.x + last.width + gap, width: width, unitsGoal: unitsGap });
        }

        function update() {
            if (!gameActive && state !== 'congrats') {
                if (fwParticles.length > 0) drawFireworks();
                return;
            }

            cameraX += (targetCameraX - cameraX) * 0.08;

            if (state === 'falling') {
                stick.angle += 0.18;
                const landingX = stick.x + stick.length;
                const target = platforms[1];
                const isTooLong = landingX > target.x + target.width;
                const isTooShort = landingX < target.x;

                if (stick.angle >= 0) {
                    if (isSuccess() || isTooLong) {
                        stick.angle = 0; 
                        state = 'walking';
                        character.targetX = isSuccess() ? target.x + target.width - 50 : landingX + 35;
                    } else if (isTooShort) {
                        if (stick.angle >= Math.PI / 2) {
                            stick.angle = Math.PI / 2; 
                            state = 'walking';
                            character.targetX = stick.x + 5;
                        }
                    }
                }
            }

            if (state === 'walking') {
                character.x += 4.5;
                if (character.x >= character.targetX) {
                    character.x = character.targetX;
                    if (isSuccess()) {
                        placedSticks.push({ x: stick.x, y: stick.y, length: stick.length, angle: 0 });
                        score++; updateUI();
                        if (score >= 10) triggerCompletion();
                        else nextTurn();
                    } else {
                        state = 'falling_down';
                    }
                }
            }

            if (state === 'falling_down') {
                character.y += 12;
                if (character.y > canvas.height + 150) triggerMathChallenge();
            }

            draw();
            drawFireworks();
            requestAnimationFrame(update);
        }

        function isSuccess() {
            const landingX = stick.x + stick.length;
            const target = platforms[1];
            return landingX >= target.x && landingX <= target.x + target.width;
        }

        function nextTurn() {
            state = 'transitioning';
            setTimeout(() => {
                targetCameraX = platforms[1].x - 100;
                setTimeout(() => {
                    platforms.shift(); addPlatform();
                    resetStick();
                    state = 'waiting';
                    document.getElementById('lengthPicker').classList.remove('hidden');
                    document.getElementById('hint').classList.remove('opacity-0');
                }, 600);
            }, 300);
        }

        // --- DRAWING FUNCTIONS ---

        function drawWorker(x, y) {
            ctx.save();
            ctx.translate(x, y);
            const time = Date.now() * 0.01;
            const isWalking = (state === 'walking');
            const cycle = isWalking ? Math.sin(time) : 0;
            const cycleAlt = isWalking ? Math.sin(time + Math.PI) : 0;
            const bob = isWalking ? Math.abs(Math.sin(time * 2)) * 4 : 0;
            ctx.translate(0, -bob);

            const hipY = -35; 
            
            // Legs with joints
            [cycleAlt, cycle].forEach((c, idx) => {
                ctx.save();
                ctx.translate(0, hipY);
                ctx.rotate(c * 0.45);
                ctx.fillStyle = idx === 0 ? '#1e3a8a' : '#2563eb';
                ctx.beginPath(); ctx.roundRect(-7, 0, 14, 22, 6); ctx.fill();
                ctx.translate(0, 18);
                ctx.rotate(isWalking ? (c > 0 ? c * 0.5 : 0) : 0);
                ctx.beginPath(); ctx.roundRect(-6.5, 0, 13, 20, 5); ctx.fill();
                ctx.translate(0, 17);
                ctx.rotate(-(c * 0.45 + (isWalking ? (c > 0 ? c * 0.5 : 0) : 0))); 
                ctx.fillStyle = idx === 0 ? '#2d1406' : '#451a03';
                ctx.beginPath(); ctx.roundRect(-8, 0, 23, 13, 4); ctx.fill();
                ctx.restore();
            });

            // Arms
            [cycle, cycleAlt].forEach((c, idx) => {
                ctx.save();
                ctx.translate(idx === 0 ? 14 : -14, -65); 
                ctx.rotate(-c * 0.6); 
                ctx.fillStyle = '#3b82f6';
                ctx.beginPath(); ctx.roundRect(idx === 0 ? 0 : -9, 0, 9, 18, 4); ctx.fill();
                ctx.translate(idx === 0 ? 4 : -4, 16);
                ctx.rotate(Math.abs(c) * 0.4);
                ctx.fillStyle = '#f59e0b';
                ctx.fillRect(-4, 0, 8, 12);
                ctx.fillStyle = '#4b5563'; 
                ctx.beginPath(); ctx.arc(0, 15, 6, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            });

            // Body
            ctx.fillStyle = '#ea580c'; ctx.beginPath(); ctx.roundRect(-16, -72, 32, 37, 6); ctx.fill();
            ctx.fillStyle = '#f8fafc'; ctx.fillRect(-16, -64, 32, 4.5); ctx.fillRect(-16, -48, 32, 4.5);
            
            // Head & Face
            ctx.fillStyle = '#f59e0b'; ctx.beginPath(); ctx.arc(0, -88, 15, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath(); ctx.arc(-5, -90, 2.3, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(5, -90, 2.3, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#000'; ctx.lineWidth = 1.2;
            ctx.beginPath(); ctx.arc(0, -84, 5, 0.2, Math.PI - 0.2); ctx.stroke();

            const hatGrad = ctx.createLinearGradient(-22, -110, 22, -90);
            hatGrad.addColorStop(0, '#fbbf24'); hatGrad.addColorStop(1, '#b45309');
            ctx.fillStyle = hatGrad; ctx.beginPath(); ctx.ellipse(0, -100, 20, 16, 0, Math.PI, 0); ctx.fill();
            ctx.beginPath(); ctx.roundRect(-26, -102, 52, 6, 3); ctx.fill();
            ctx.restore();
        }

        function drawClassicPlatform(p, isTarget, isLast) {
            const h = PLATFORM_Y_OFFSET;
            const topH = 20;
            const y = canvas.height - h;
            ctx.save();
            ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(p.x + 8, y + 8, p.width, h);
            ctx.fillStyle = '#cbd5e1'; ctx.beginPath(); ctx.roundRect(p.x, y, p.width, h, 8); ctx.fill();
            ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 4; ctx.beginPath();
            ctx.moveTo(p.x + 10, y + topH + 10); ctx.lineTo(p.x + p.width - 10, canvas.height - 10);
            ctx.moveTo(p.x + p.width - 10, y + topH + 10); ctx.lineTo(p.x + 10, canvas.height - 10); ctx.stroke();
            ctx.fillStyle = isLast ? '#22c55e' : (isTarget ? '#f59e0b' : '#64748b');
            ctx.beginPath(); ctx.roundRect(p.x - 2, y, p.width + 4, topH, 4); ctx.fill();
            if(isTarget && !isLast) { ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.arc(p.x + p.width/2, y + topH/2, 6, 0, Math.PI*2); ctx.fill(); }
            ctx.restore();
        }

        function drawWorld() {
            const time = Date.now() * 0.002;
            const riverH = 80;
            ctx.fillStyle = '#0369a1';
            ctx.fillRect(cameraX, canvas.height - riverH, canvas.width, riverH);
            
            ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 2;
            for(let i=0; i<3; i++) {
                ctx.beginPath();
                ctx.moveTo(cameraX, canvas.height - riverH + 20 + i*20); ctx.lineTo(cameraX + canvas.width, canvas.height - riverH + 20 + i*20);
                ctx.setLineDash([40, 60]); ctx.lineDashOffset = time * 20 * (i%2?1:-1); ctx.stroke();
            }
            ctx.setLineDash([]);

            // Crocodile
            const crocBaseX = cameraX + canvas.width/2 + Math.sin(time * 0.4) * (canvas.width/2.8);
            const crocDir = Math.cos(time * 0.4) > 0 ? 1 : -1; 
            const swing = Math.sin(time * 5) * 12;
            
            ctx.save();
            ctx.translate(crocBaseX, canvas.height - 35);
            ctx.scale(crocDir, 1); 
            ctx.fillStyle = '#166534';
            ctx.beginPath(); ctx.ellipse(0, 0, 75, 20, 0, 0, Math.PI * 2); ctx.fill(); 
            ctx.beginPath(); ctx.moveTo(-55, 0); ctx.quadraticCurveTo(-110, swing, -140, 0); ctx.lineTo(-55, 8); ctx.fill(); 
            ctx.beginPath(); ctx.moveTo(50, -8); ctx.lineTo(130, -5); ctx.lineTo(130, 10); ctx.lineTo(50, 15); ctx.fill(); 
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(65, -8, 5, 0, Math.PI*2); ctx.fill(); 
            ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(66, -8, 2.5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#064e3b';
            for(let i=-45; i<45; i+=15) { ctx.beginPath(); ctx.moveTo(i, -16); ctx.lineTo(i+8, -28); ctx.lineTo(i+16, -16); ctx.fill(); }
            ctx.restore();

            if (cameraX < 850) drawSiteOffice(-120, canvas.height - PLATFORM_Y_OFFSET);
            if (score >= 9) drawBuildingSite(platforms[platforms.length-1].x + 50, canvas.height - PLATFORM_Y_OFFSET);
        }

        function drawSiteOffice(x, y) {
            ctx.save(); ctx.translate(x, y);
            ctx.fillStyle = '#22c55e'; ctx.beginPath(); ctx.roundRect(0, 0, 600, 150, 20); ctx.fill();
            ctx.fillStyle = '#f8fafc'; ctx.beginPath(); ctx.roundRect(150, -110, 300, 110, 10); ctx.fill();
            ctx.fillStyle = '#1e293b'; ctx.beginPath(); ctx.moveTo(130, -110); ctx.lineTo(470, -110); ctx.lineTo(450, -140); ctx.lineTo(150, -140); ctx.fill();
            ctx.fillStyle = '#bae6fd'; ctx.fillRect(180, -80, 60, 45); ctx.fillRect(360, -80, 60, 45);
            ctx.fillStyle = '#64748b'; ctx.fillRect(275, -80, 50, 80);
            ctx.restore();
        }

        function drawBuildingSite(x, y) {
            ctx.save(); ctx.translate(x, y);
            ctx.fillStyle = '#22c55e'; ctx.beginPath(); ctx.roundRect(0, 0, 1200, 150, 20); ctx.fill();
            const bX = 200, bW = 220, bH = 350;
            ctx.fillStyle = '#0f172a'; ctx.beginPath(); ctx.roundRect(bX, -bH, bW, bH, 10); ctx.fill();
            ctx.fillStyle = '#0ea5e9';
            for(let r=0; r<8; r++) { for(let c=0; c<4; c++) {
                ctx.globalAlpha = 0.5 + Math.sin(Date.now()*0.001 + r)*0.3;
                ctx.fillRect(bX+15+c*50, -bH+15+r*42, 40, 35);
            }}
            ctx.globalAlpha = 1;
            ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 6; ctx.beginPath(); ctx.moveTo(bX+bW+30, 0); ctx.lineTo(bX+bW+30, -420); ctx.stroke();
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save(); ctx.translate(-cameraX, 0);
            drawWorld();
            platforms.forEach((p, idx) => drawClassicPlatform(p, idx === 1, idx === 1 && score >= 9));
            
            placedSticks.concat(state !== 'waiting' ? [stick] : []).forEach(s => {
                ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(s.angle);
                ctx.lineWidth = 14; ctx.strokeStyle = '#3d1a03'; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(s.length, 0); ctx.stroke();
                
                if(s.angle === 0) {
                    const units = Math.round(s.length / UNIT_SIZE);
                    for(let i=0; i<units; i++) {
                        ctx.fillStyle = pickerColors[i % pickerColors.length];
                        ctx.globalAlpha = 0.4;
                        ctx.beginPath();
                        ctx.roundRect(i * UNIT_SIZE + 2, -5, UNIT_SIZE - 4, 10, 2);
                        ctx.fill();
                    }
                    ctx.globalAlpha = 1;
                }
                ctx.restore();
            });
            drawWorker(character.x, character.y);
            ctx.restore();
        }

        // --- MATH REPAIR ---
        function triggerMathChallenge() {
            gameActive = false;
            const isAdd = Math.random() > 0.5;
            let n1, n2, ans;
            if (isAdd) { 
                ans = Math.floor(Math.random() * 16) + 4; 
                n1 = Math.floor(Math.random() * (ans - 1)) + 1; 
                n2 = ans - n1; 
            } else { 
                n1 = Math.floor(Math.random() * 11) + 10; 
                n2 = Math.floor(Math.random() * (n1 - 2)) + 1; 
                ans = n1 - n2; 
            }
            // FIXED: Now displays either + or - correctly
            document.getElementById('mathQuestion').innerText = `${n1} ${isAdd ? '+' : '-'} ${n2} = ?`;
            
            const options = [ans];
            while(options.length < 4) { const fake = ans + (Math.floor(Math.random() * 8) - 4); if (fake >= 0 && !options.includes(fake)) options.push(fake); }
            options.sort(() => Math.random() - 0.5);
            const grid = document.getElementById('mathOptions'); grid.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "bg-[#facc15] hover:bg-yellow-500 text-white text-3xl font-bold py-5 rounded-2xl shadow-lg transition active:scale-95 interactive";
                btn.innerText = opt;
                btn.onclick = () => { if (opt === ans) revive(); else { document.getElementById('mathRevivalScreen').classList.add('hidden'); gameOver(); } };
                grid.appendChild(btn);
            });
            document.getElementById('mathRevivalScreen').classList.remove('hidden');
        }

        function revive() {
            document.getElementById('mathRevivalScreen').classList.add('hidden');
            character.x = platforms[0].x + platforms[0].width - 50; character.y = canvas.height - PLATFORM_Y_OFFSET; character.targetX = character.x;
            resetStick();
            state = 'waiting'; gameActive = true; update();
            document.getElementById('lengthPicker').classList.remove('hidden');
            document.getElementById('hint').classList.remove('opacity-0');
        }

        function triggerCompletion() {
            state = 'congrats'; gameActive = false; document.getElementById('congratsScreen').classList.remove('hidden');
            for(let i=0; i<15; i++) { setTimeout(() => createFirework(Math.random()*canvas.width, Math.random()*canvas.height/2), i*300); }
            animateFireworksLoop();
        }

        function createFirework(x, y) {
            const colors = ['#facc15', '#f87171', '#60a5fa', '#4ade80', '#ffffff'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            for(let i=0; i<40; i++) {
                const angle = (Math.PI * 2 / 40) * i; const speed = 3 + Math.random() * 6;
                fwParticles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, alpha: 1, color });
            }
        }

        function drawFireworks() {
            fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
            for(let i = fwParticles.length - 1; i >= 0; i--) {
                const p = fwParticles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.alpha -= 0.015;
                if (p.alpha <= 0) fwParticles.splice(i, 1);
                else { fwCtx.globalAlpha = p.alpha; fwCtx.fillStyle = p.color; fwCtx.beginPath(); fwCtx.arc(p.x, p.y, 3, 0, Math.PI * 2); fwCtx.fill(); }
            }
        }

        function animateFireworksLoop() { if (state !== 'congrats') return; drawFireworks(); requestAnimationFrame(animateFireworksLoop); }

        function updateUI() { 
            document.getElementById('currentScore').innerText = score;
            document.getElementById('scoreBox').classList.remove('opacity-0');
        }

        function gameOver() {
            gameActive = false; document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('lengthPicker').classList.add('hidden');
            document.getElementById('hint').classList.add('opacity-0');
        }

        document.getElementById('startBtn').onclick = () => {
            document.getElementById('startScreen').classList.add('hidden');
            gameActive = true; initGame(); update();
        };

        document.getElementById('retryBtn').onclick = () => {
            document.getElementById('gameOverScreen').classList.add('hidden');
            gameActive = true; initGame(); update();
        };

        document.getElementById('finalResetBtn').onclick = () => {
            document.getElementById('congratsScreen').classList.add('hidden');
            initGame(); gameActive = true; update();
        };

        initGame(); draw();
    </script>
</body>
</html>
