<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Which Comes 1st? - Ver 2</title>
    
    <!-- Load Poppins Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        sky: '#4CB5F9', // Duolingo sky blue
                        grass: '#58CC02', // Duolingo green
                        grassDark: '#46A302',
                        dirt: '#CE825C',
                        dirtDark: '#A66342',
                        duoYellow: '#FFC800',
                        duoYellowDark: '#E5B400',
                    }
                }
            }
        }
    </script>

    <style>
        /* Base & Resets */
        body {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            background-color: #4CB5F9;
        }

        /* Duolingo Style Buttons */
        .btn-duo {
            border-radius: 1.5rem;
            transition: all 0.15s ease;
        }
        .btn-duo:active {
            transform: translateY(6px);
            border-bottom-width: 0 !important;
            margin-top: 6px;
        }

        /* 3D Animal Icons */
        .animal-btn {
            background: #ffffff;
            border: 4px solid #e5e5e5;
            border-bottom: 8px solid #cccccc;
            border-radius: 50%;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            width: clamp(4rem, 12vw, 8rem);
            height: clamp(4rem, 12vw, 8rem);
            font-size: clamp(2.5rem, 7vw, 4.5rem);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .animal-btn:active {
            transform: scale(0.95) translateY(4px);
            border-bottom-width: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .animal-btn span {
            filter: drop-shadow(0px 6px 4px rgba(0,0,0,0.25));
        }

        /* Animations */
        @keyframes bounce-happy {
            0%, 100% { transform: translateY(0) scale(1); }
            40% { transform: translateY(-30px) scale(1.1) rotate(5deg); }
            60% { transform: translateY(-15px) scale(1.05) rotate(-5deg); }
            80% { transform: translateY(-30px) scale(1.1) rotate(5deg); }
        }
        .anim-correct {
            animation: bounce-happy 1s ease infinite;
            border-color: #FFC800;
            border-bottom-color: #E5B400;
            background: #FFF9D2;
        }

        @keyframes gentle-shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px) rotate(-5deg); }
            40% { transform: translateX(8px) rotate(5deg); }
            60% { transform: translateX(-8px) rotate(-5deg); }
            80% { transform: translateX(8px) rotate(5deg); }
        }
        .anim-wrong {
            animation: gentle-shake 0.5s ease;
            opacity: 0.7;
            filter: grayscale(0.6);
        }

        /* Clouds */
        @keyframes drift {
            from { transform: translateX(-200px); }
            to { transform: translateX(120vw); }
        }
        .cloud {
            position: absolute;
            background: #fff;
            border-radius: 50px;
            opacity: 0.9;
            animation: drift linear infinite;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: #fff;
            border-radius: 50%;
        }
        .cloud1 { width: 120px; height: 40px; top: 8%; animation-duration: 35s; }
        .cloud1::before { width: 60px; height: 60px; top: -25px; left: 20px; }
        .cloud1::after { width: 45px; height: 45px; top: -15px; right: 20px; }
        
        .cloud2 { width: 180px; height: 50px; top: 18%; animation-duration: 45s; animation-delay: -15s; opacity: 0.7; transform: scale(0.8); }
        .cloud2::before { width: 80px; height: 80px; top: -40px; left: 30px; }
        .cloud2::after { width: 60px; height: 60px; top: -20px; right: 30px; }

        /* Confetti */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 99999; /* Ensure it is on top of everything */
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col select-none text-gray-800 relative">
     <!-- Logo -->
    <div class="logo-container">
        <img src="../assets/logo-oodles-math.png" onerror="this.style.display='none'" alt="Logo">
    </div>
    
    <!-- Scenery Background Elements -->
    <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
        <!-- Sky is body bg -->
        <!-- Clouds -->
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>

        <!-- Rainbow SVG -->
        <svg viewBox="0 0 100 50" class="absolute top-4 left-1/4 w-1/2 max-w-lg opacity-60 drop-shadow-md">
            <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#FF4B4B" stroke-width="6" stroke-linecap="round"/>
            <path d="M 17 50 A 33 33 0 0 1 83 50" fill="none" stroke="#FF9000" stroke-width="6" stroke-linecap="round"/>
            <path d="M 24 50 A 26 26 0 0 1 76 50" fill="none" stroke="#FFC800" stroke-width="6" stroke-linecap="round"/>
            <path d="M 31 50 A 19 19 0 0 1 69 50" fill="none" stroke="#58CC02" stroke-width="6" stroke-linecap="round"/>
            <path d="M 38 50 A 12 12 0 0 1 62 50" fill="none" stroke="#1CB0F6" stroke-width="6" stroke-linecap="round"/>
        </svg>
    </div>

    <canvas id="confetti-canvas"></canvas>

    <!-- ==================== START SCREEN ==================== -->
    <div id="start-screen" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-sky bg-opacity-90 backdrop-blur-sm">
        
        <h1 class="text-5xl md:text-8xl font-black mb-10 text-center px-4 leading-tight text-white drop-shadow-[0_8px_0_#1CB0F6]">
            Which Comes<br>
            <span class="text-duoYellow drop-shadow-[0_8px_0_#E5B400] text-7xl md:text-9xl">1st?</span>
        </h1>
        
        <div class="flex gap-4 md:gap-8 text-5xl md:text-7xl mb-16 bg-white/20 px-10 py-6 rounded-full border-4 border-white shadow-[0_10px_20px_rgba(0,0,0,0.15)] animate-bounce" style="animation-duration: 3s;">
            <span style="filter: drop-shadow(0 6px 0 rgba(0,0,0,0.2));">🐰</span>
            <span style="filter: drop-shadow(0 6px 0 rgba(0,0,0,0.2));" class="mt-4">🐻</span>
            <span style="filter: drop-shadow(0 6px 0 rgba(0,0,0,0.2));">🦆</span>
        </div>

        <button onclick="startGame()" class="btn-duo bg-grass text-white font-black text-4xl md:text-6xl py-4 px-16 border-b-[8px] border-grassDark shadow-xl flex items-center gap-4">
            <span>START</span>
        </button>
    </div>

    <!-- ==================== GAME SCREEN ==================== -->
    <div id="game-screen" class="hidden flex-col h-full relative z-10">
        
        <!-- Header: Top Right is left completely EMPTY -->
        <div class="flex justify-start items-center p-4 z-30 gap-4 w-full">
            <button onclick="goHome()" class="btn-duo bg-white text-gray-400 w-14 h-14 flex items-center justify-center text-3xl border-2 border-gray-200 border-b-[6px] shadow-sm">
                ✖
            </button>
            <div id="stars-container" class="bg-white/90 px-6 py-2 rounded-full shadow-sm border-2 border-gray-200 flex gap-2 text-3xl md:text-4xl">
                <!-- Stars -->
            </div>
        </div>

        <!-- Question Area -->
        <div class="flex-1 flex flex-col items-center justify-start mt-4 z-30 px-4">
            <!-- Question Bubble -->
            <div class="bg-white px-6 md:px-10 py-4 md:py-6 rounded-[2rem] shadow-xl border-4 border-gray-100 border-b-[8px] flex items-center gap-4 md:gap-6 cursor-pointer hover:bg-gray-50 active:scale-95 transition-transform" onclick="speakCurrentQuestion()">
                <h2 id="question-text" class="text-3xl sm:text-5xl md:text-6xl font-black text-[#4B4B4B]">
                    Which is 1st?
                </h2>
                <!-- Speaker Button -->
                <div class="bg-[#1CB0F6] rounded-full w-12 h-12 md:w-16 md:h-16 flex items-center justify-center text-2xl md:text-3xl border-b-[4px] border-[#1899D6] text-white">
                    🔊
                </div>
            </div>
        </div>

        <!-- Track & Animals Area -->
        <div class="h-1/2 md:h-3/5 w-full relative flex flex-col justify-end">
            
            <!-- Beautiful Grass / Hills -->
            <div class="absolute bottom-20 md:bottom-28 w-full h-40 md:h-56 bg-grass rounded-t-[50%] md:rounded-t-[100%] scale-[1.5] md:scale-[1.1] z-0 border-t-8 border-grassDark"></div>
            
            <!-- Trees and Flowers (SVG purely decorative) -->
            <div class="absolute bottom-40 left-[10%] z-10 w-16 h-24 opacity-90">
                <svg viewBox="0 0 100 150"><path d="M40 150h20v-50H40z" fill="#8B4513"/><circle cx="50" cy="50" r="50" fill="#46A302"/></svg>
            </div>
            <div class="absolute bottom-44 right-[15%] z-10 w-12 h-20 opacity-90">
                <svg viewBox="0 0 100 150"><path d="M40 150h20v-50H40z" fill="#8B4513"/><circle cx="50" cy="50" r="50" fill="#46A302"/></svg>
            </div>
            <div class="absolute bottom-32 left-[30%] z-10 w-6 h-6">
                <svg viewBox="0 0 50 50"><circle cx="25" cy="25" r="15" fill="#FF4B4B"/><circle cx="25" cy="25" r="5" fill="#FFC800"/></svg>
            </div>
            <div class="absolute bottom-36 right-[30%] z-10 w-8 h-8">
                <svg viewBox="0 0 50 50"><circle cx="25" cy="25" r="15" fill="#1CB0F6"/><circle cx="25" cy="25" r="5" fill="#FFC800"/></svg>
            </div>

            <!-- The Dirt Track -->
            <div class="h-24 md:h-36 w-full bg-dirt border-t-[8px] border-dirtDark relative z-20 shadow-inner flex items-center justify-center">
                
                <!-- Finish Line -->
                <div class="absolute left-0 top-0 bottom-0 w-12 md:w-24 border-r-[4px] border-gray-800 z-10 flex flex-col" style="background: repeating-linear-gradient(45deg, #fff, #fff 10px, #000 10px, #000 20px);">
                    <div class="absolute -top-10 md:-top-16 left-2 md:left-6 bg-[#FF4B4B] text-white font-black text-xs md:text-xl px-2 py-1 rounded border-2 border-white shadow-md transform -rotate-6">FINISH</div>
                    <div class="w-1 md:w-2 h-10 md:h-16 bg-gray-300 absolute -top-10 md:-top-16 left-6 md:left-12 border border-gray-400"></div>
                </div>

                <!-- Animals Container: Centered, Responsive gap -->
                <div id="animals-container" class="flex justify-between items-end w-full max-w-5xl mx-auto pl-16 md:pl-32 pr-4 md:pr-12 relative z-30 pb-2 md:pb-6 gap-1 md:gap-4">
                    <!-- Animals generated by JS -->
                </div>
            </div>
            
            <!-- Bottom Track Trim -->
            <div class="h-6 w-full bg-[#A66342] relative z-20"></div>
        </div>

        <!-- Wrong Answer Toast -->
        <div id="wrong-feedback" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-[#FF4B4B] text-white font-black text-2xl md:text-4xl px-8 py-4 rounded-full shadow-2xl z-50 hidden opacity-0 transition-opacity duration-300 pointer-events-none text-center border-4 border-white">
            Oops! Try again!
        </div>

        <!-- Correct Answer Modal -->
        <div id="correct-modal" class="absolute inset-0 bg-black/40 z-40 hidden flex-col items-center justify-end pb-10 backdrop-blur-sm">
            <div class="bg-white rounded-[2rem] p-8 md:p-10 shadow-2xl flex flex-col items-center border-b-[10px] border-gray-200 w-11/12 max-w-md text-center transform transition-transform animate-bounce" style="animation-duration: 0.5s; animation-iteration-count: 1;">
                <div class="text-7xl md:text-8xl mb-2 drop-shadow-md">🎉</div>
                <h2 id="praise-text" class="text-4xl md:text-5xl font-black text-grass mb-6">
                    Awesome!
                </h2>
                <button onclick="nextQuestion()" class="btn-duo bg-[#1CB0F6] text-white font-black text-3xl md:text-4xl py-4 px-12 border-b-[8px] border-[#1899D6] w-full shadow-lg">
                    CONTINUE
                </button>
            </div>
        </div>
    </div>

    <!-- ==================== END SCREEN ==================== -->
    <div id="end-screen" class="hidden absolute inset-0 z-50 flex-col items-center justify-center bg-sky bg-opacity-95 backdrop-blur-md">
        
        <div class="bg-white p-10 md:p-14 rounded-[3rem] border-b-[12px] border-gray-200 shadow-2xl flex flex-col items-center max-w-2xl w-11/12 text-center relative">
            <div class="absolute -top-16 text-8xl md:text-9xl drop-shadow-lg">🏆</div>
            
            <h1 class="text-5xl md:text-7xl font-black text-[#4B4B4B] mt-8 mb-4">
                Lesson Complete!
            </h1>
            
            <div class="bg-duoYellow text-white rounded-2xl px-8 py-4 mb-8 border-b-[6px] border-duoYellowDark">
                <h2 class="text-3xl md:text-4xl font-black">
                    Score: <span id="final-score">5</span> / 5
                </h2>
            </div>

            <div class="flex gap-2 md:gap-4 mb-10 text-5xl md:text-7xl drop-shadow-md" id="final-stars">
                <!-- Stars -->
            </div>

            <button onclick="startGame()" class="btn-duo bg-grass text-white font-black text-3xl md:text-4xl py-5 px-14 border-b-[8px] border-grassDark shadow-lg w-full">
                PLAY AGAIN
            </button>
        </div>
    </div>

    <!-- ==================== JAVASCRIPT ==================== -->
    <script>
        // --- Game Data ---
        const ALL_ANIMALS = [
            { id: 'rabbit', icon: '🐰' },
            { id: 'bear', icon: '🐻' },
            { id: 'cat', icon: '🐱' },
            { id: 'elephant', icon: '🐘' },
            { id: 'duck', icon: '🦆' }
        ];

        const ORDINALS = ['1st', '2nd', '3rd', '4th', '5th'];
        const PRAISE_WORDS = ['Great job!', 'Awesome!', 'Perfect!', 'You did it!', 'Super!'];
        const ENCOURAGE_WORDS = ['Oops! Try again!', 'Look carefully!', 'Not quite!', 'Which is it?'];

        let gameState = {
            round: 0,
            score: 0,
            questionOrder: [],
            currentAnimalsOrder: [],
            targetOrdinalIndex: 0,
            isInputLocked: false
        };

        // --- Audio System ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playTone(freq, type, duration, vol=0.1) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playCorrectSound() {
            initAudio();
            playTone(523.25, 'sine', 0.15, 0.15); // C5
            setTimeout(() => playTone(659.25, 'sine', 0.15, 0.15), 100); // E5
            setTimeout(() => playTone(783.99, 'sine', 0.3, 0.15), 200); // G5
        }

        function playWrongSound() {
            initAudio();
            playTone(300, 'triangle', 0.2, 0.1);
            setTimeout(() => playTone(250, 'triangle', 0.3, 0.1), 150);
        }

        function playWinSound() {
            initAudio();
            [0, 150, 300].forEach((time, i) => {
                setTimeout(() => playTone(523.25 + (i*100), 'square', 0.2, 0.1), time);
            });
            setTimeout(() => playTone(1046.50, 'square', 0.6, 0.1), 450);
            setTimeout(() => playTone(1318.51, 'square', 0.8, 0.1), 700);
        }

        // --- Speech ---
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.85; 
                utterance.pitch = 1.2; 
                utterance.lang = 'en-US';
                window.speechSynthesis.speak(utterance);
            }
        }

        function speakCurrentQuestion() {
            const targetWord = ORDINALS[gameState.targetOrdinalIndex];
            speak(`Which is ${targetWord}?`);
        }

        // --- Utils ---
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // --- Game Logic ---
        function startGame() {
            initAudio();
            gameState.round = 0;
            gameState.score = 0;
            gameState.questionOrder = shuffle([0, 1, 2, 3, 4]); 

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('game-screen').classList.add('flex');
            
            loadRound();
        }

        function loadRound() {
            gameState.isInputLocked = false;
            
            document.getElementById('correct-modal').classList.add('hidden');
            document.getElementById('correct-modal').classList.remove('flex');
            const toast = document.getElementById('wrong-feedback');
            toast.classList.add('hidden');
            toast.style.opacity = '0';
            
            gameState.targetOrdinalIndex = gameState.questionOrder[gameState.round];
            const targetWord = ORDINALS[gameState.targetOrdinalIndex];
            
            // Cập nhật text câu hỏi (Which is...)
            document.getElementById('question-text').innerText = `Which is ${targetWord}?`;
            
            gameState.currentAnimalsOrder = shuffle([...ALL_ANIMALS]);
            renderAnimals();
            renderStars();
            
            setTimeout(() => {
                speakCurrentQuestion();
            }, 500);
        }

        function renderStars() {
            const container = document.getElementById('stars-container');
            container.innerHTML = '';
            for(let i = 0; i < 5; i++) {
                if (i < gameState.score) {
                    container.innerHTML += `<span class="text-[#FFC800] drop-shadow-sm">⭐</span>`;
                } else {
                    container.innerHTML += `<span class="text-gray-300">⭐</span>`;
                }
            }
        }

        function renderAnimals() {
            const container = document.getElementById('animals-container');
            container.innerHTML = '';
            
            gameState.currentAnimalsOrder.forEach((animal, index) => {
                const animalHTML = `
                    <div class="flex flex-col items-center justify-end h-full">
                        <div onclick="handleAnimalClick(${index})" 
                             id="animal-btn-${index}" 
                             class="animal-btn cursor-pointer">
                            <span>${animal.icon}</span>
                        </div>
                        
                        <div id="marker-${index}" class="opacity-0 transition-opacity duration-300
                                     bg-[#1CB0F6] text-white font-black
                                     text-sm sm:text-lg md:text-2xl px-3 sm:px-4 py-1 
                                     rounded-xl mt-2 md:mt-4 shadow-sm border-b-[4px] border-[#1899D6]">
                            ${ORDINALS[index]}
                        </div>
                    </div>
                `;
                container.innerHTML += animalHTML;
            });
        }

        function handleAnimalClick(clickedIndex) {
            if (gameState.isInputLocked) return;

            const btn = document.getElementById(`animal-btn-${clickedIndex}`);
            const marker = document.getElementById(`marker-${clickedIndex}`);
            
            if (clickedIndex === gameState.targetOrdinalIndex) {
                gameState.isInputLocked = true;
                gameState.score++;
                
                playCorrectSound();
                fireConfetti();
                
                btn.classList.add('anim-correct');
                marker.classList.remove('opacity-0');
                marker.classList.add('opacity-100');
                
                const praise = PRAISE_WORDS[Math.floor(Math.random() * PRAISE_WORDS.length)];
                document.getElementById('praise-text').innerText = praise;
                speak(praise);
                
                setTimeout(() => {
                    renderStars();
                    document.getElementById('correct-modal').classList.remove('hidden');
                    document.getElementById('correct-modal').classList.add('flex');
                }, 1000);

            } else {
                playWrongSound();
                btn.classList.add('anim-wrong');
                setTimeout(() => btn.classList.remove('anim-wrong'), 500);
                
                const encourage = ENCOURAGE_WORDS[Math.floor(Math.random() * ENCOURAGE_WORDS.length)];
                const toast = document.getElementById('wrong-feedback');
                toast.innerText = encourage;
                toast.classList.remove('hidden');
                toast.style.opacity = '1';
                
                speak(encourage);
                
                setTimeout(() => {
                    toast.style.opacity = '0';
                    setTimeout(() => toast.classList.add('hidden'), 300);
                }, 1500);
            }
        }

        function nextQuestion() {
            gameState.round++;
            if (gameState.round >= 5) {
                showEndScreen();
            } else {
                loadRound();
            }
        }

        function showEndScreen() {
            playWinSound();
            fireworks();
            
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('flex');
            
            const endScreen = document.getElementById('end-screen');
            endScreen.classList.remove('hidden');
            endScreen.classList.add('flex');
            
            document.getElementById('final-score').innerText = gameState.score;
            
            const finalStarsContainer = document.getElementById('final-stars');
            finalStarsContainer.innerHTML = '';
            for(let i = 0; i < 5; i++) {
                if (i < gameState.score) {
                    finalStarsContainer.innerHTML += `<span>⭐</span>`;
                } else {
                    finalStarsContainer.innerHTML += `<span class="opacity-30 grayscale">⭐</span>`;
                }
            }

            speak(`Lesson Complete! Your score is ${gameState.score} out of 5!`);
        }

        function goHome() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('flex');
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }

        // --- Confetti System ---
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationId;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y, isBig, color = null) {
                this.x = x;
                this.y = y;
                this.size = (Math.random() * 10 + 5) * (isBig ? 1.5 : 1);
                const colors = ['#FF4B4B', '#FF9000', '#FFC800', '#58CC02', '#1CB0F6', '#CE82FF'];
                this.color = color || colors[Math.floor(Math.random() * colors.length)];
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = (Math.random() * 15 + 5) * (isBig ? 1.2 : 1);
                this.speedX = Math.cos(angle) * velocity;
                this.speedY = Math.sin(angle) * velocity - 3;
                
                this.gravity = 0.4;
                this.friction = 0.96;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 15 - 7.5;
                this.opacity = 1;
                this.decay = Math.random() * 0.015 + 0.01;
            }
            update() {
                this.speedX *= this.friction;
                this.speedY *= this.friction;
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                this.rotation += this.rotationSpeed;
                this.opacity -= this.decay;
            }
            draw() {
                if (this.opacity <= 0) return;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                if(this.size % 2 > 1) {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size/2, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                }
                ctx.restore();
            }
        }

        function fireConfetti(isBig = false) {
            const count = isBig ? 150 : 60;
            const originX = canvas.width / 2;
            const originY = canvas.height / 2;
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(
                    originX + (Math.random() * 100 - 50), 
                    originY + (Math.random() * 100 - 50),
                    isBig
                ));
            }
            if (!animationId) animateConfetti();
        }

        function fireworks() {
            const burstCount = 6;
            let bursts = 0;
            const interval = setInterval(() => {
                const x = Math.random() * canvas.width;
                const y = Math.random() * (canvas.height / 2);
                for (let i = 0; i < 80; i++) {
                    particles.push(new Particle(x, y, true));
                }
                if (!animationId) animateConfetti();
                bursts++;
                if (bursts >= burstCount) clearInterval(interval);
            }, 400);
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.y < canvas.height + 50 && p.opacity > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            if (particles.length > 0) {
                animationId = requestAnimationFrame(animateConfetti);
            } else {
                animationId = null;
            }
        }
    </script>
</body>
</html>
