<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Little Math Heroes: Wizard Cup V3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0ea5e9;
            --secondary: #ec4899;
            --accent: #facc15;
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            overflow: hidden;
            touch-action: none;
            /* Prevent text selection to feel more like an app */
            user-select: none;
            -webkit-user-select: none;
        }

        /* Beautiful Duolingo-style Scenery Background */
        .scenery-bg {
            position: fixed;
            inset: 0;
            z-index: -10;
            background: linear-gradient(to bottom, #7dd3fc 0%, #e0f2fe 60%);
            overflow: hidden;
        }

        .sun {
            position: absolute;
            top: 5%;
            left: 10%;
            width: 120px;
            height: 120px;
            background: #fef08a;
            border-radius: 50%;
            box-shadow: 0 0 40px #facc15, 0 0 80px #fde047;
            animation: pulse-sun 4s infinite alternate ease-in-out;
        }

        /* V3: Massive Rainbow touching the grass */
        .rainbow {
            position: absolute;
            /* Container height is 900px, clip-path cuts it in half at 450px */
            /* We want the 450px cut to sit right behind the grass (approx 20vh from bottom) */
            bottom: calc(20vh - 450px);
            left: 50%;
            transform: translateX(-50%);
            width: 900px;
            height: 900px;
            border-radius: 50%;
            box-shadow: 
                inset 0 0 0 35px rgba(239, 68, 68, 0.6),
                inset 0 0 0 70px rgba(249, 115, 22, 0.6),
                inset 0 0 0 105px rgba(250, 204, 21, 0.6),
                inset 0 0 0 140px rgba(74, 222, 128, 0.6),
                inset 0 0 0 175px rgba(59, 130, 246, 0.6),
                inset 0 0 0 210px rgba(168, 85, 247, 0.6);
            opacity: 0.7;
            clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%);
            z-index: -5; /* Stay behind everything but background */
        }

        /* Rainbow scaling for larger screens */
        @media (min-width: 768px) {
            .rainbow {
                width: 1400px;
                height: 1400px;
                bottom: calc(20vh - 700px);
                box-shadow: 
                    inset 0 0 0 50px rgba(239, 68, 68, 0.6),
                    inset 0 0 0 100px rgba(249, 115, 22, 0.6),
                    inset 0 0 0 150px rgba(250, 204, 21, 0.6),
                    inset 0 0 0 200px rgba(74, 222, 128, 0.6),
                    inset 0 0 0 250px rgba(59, 130, 246, 0.6),
                    inset 0 0 0 300px rgba(168, 85, 247, 0.6);
            }
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.9;
            animation: float-clouds linear infinite;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .cloud-1 { top: 15%; width: 120px; height: 40px; animation-duration: 40s; left: -150px; }
        .cloud-1::before { width: 50px; height: 50px; top: -25px; left: 15px; }
        .cloud-1::after { width: 70px; height: 70px; top: -35px; right: 15px; }
        
        .cloud-2 { top: 25%; width: 100px; height: 35px; animation-duration: 55s; left: -120px; animation-delay: 15s; }
        .cloud-2::before { width: 40px; height: 40px; top: -20px; left: 15px; }
        .cloud-2::after { width: 60px; height: 60px; top: -30px; right: 10px; }

        .grass-layer-1 {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 25vh;
            background: #4ade80;
            border-top: 8px solid #22c55e;
            border-radius: 50% 50% 0 0 / 40px 100px 0 0;
            transform: scaleX(1.2);
            z-index: -4;
        }
        
        .grass-layer-2 {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 18vh;
            background: #22c55e;
            border-top: 8px solid #16a34a;
            border-radius: 50% 50% 0 0 / 100px 40px 0 0;
            transform: scaleX(1.2) translateX(-5%);
            z-index: -3;
        }

        .scenery-tree {
            position: absolute;
            bottom: 15vh;
            width: 60px;
            height: 120px;
            z-index: -2;
        }
        .tree-trunk { position: absolute; bottom: 0; left: 20px; width: 20px; height: 40px; background: #92400e; border-radius: 5px; }
        .tree-leaves { position: absolute; bottom: 30px; left: 0; width: 60px; height: 90px; background: #15803d; border-radius: 50px; }

        .scenery-flower {
            position: absolute;
            bottom: 5vh;
            width: 30px;
            height: 40px;
            z-index: -1;
        }
        .flower-stem { position: absolute; bottom: 0; left: 13px; width: 4px; height: 20px; background: #16a34a; }
        .flower-petals { position: absolute; top: 0; left: 5px; width: 20px; height: 20px; background: #ec4899; border-radius: 50%; box-shadow: 0 0 0 5px #f472b6; }
        .flower-center { position: absolute; top: 5px; left: 10px; width: 10px; height: 10px; background: #facc15; border-radius: 50%; }

        /* Game Card Container */
        .game-card {
            width: 95%;
            max-width: 600px;
            height: 90vh;
            max-height: 850px;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 50px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15), inset 0 0 0 8px rgba(255,255,255,1), 0 0 0 12px rgba(255,255,255,0.4);
            position: relative;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        /* Decorative Block Borders */
        .decorated-block {
            position: relative;
            background: #ffffff;
            border-radius: 35px;
            border: 4px solid #e0e7ff;
            box-shadow: 0 10px 0 #cbd5e1;
            padding: 20px;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }

        .visual-container {
            min-height: 150px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            align-content: center;
            gap: 15px;
        }

        /* Enhanced Realistic Icons */
        .math-icon {
            font-size: 3.5rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* Make emojis pop like 3D objects */
            filter: drop-shadow(2px 6px 8px rgba(0,0,0,0.3)) saturate(1.2) contrast(1.1);
        }
        .math-icon:active {
            transform: scale(0.9);
        }
        .math-icon.dimmed {
            opacity: 0.2;
            filter: grayscale(1) blur(1px) drop-shadow(0 0 0 transparent);
            transform: scale(0.7) translateY(15px);
        }

        /* Math Bubble - More Colorful */
        .math-bubble {
            background: #fff;
            border: 6px solid #facc15;
            border-radius: 40px;
            padding: 20px 30px;
            box-shadow: 0 12px 0 #eab308, 0 15px 30px rgba(250, 204, 21, 0.3);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        /* Audio Button */
        .btn-audio {
            background: #0ea5e9;
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 6px 0 #0284c7;
            transition: all 0.1s;
        }
        .btn-audio:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #0284c7;
        }

        /* Wizard Hat - Turned Upward */
        #wizard-hat {
            position: absolute;
            width: 140px;
            height: 140px;
            pointer-events: none;
            z-index: 160;
            transform: translate(-50%, -50%) rotate(180deg);
            filter: drop-shadow(0 -10px 15px rgba(0,0,0,0.4));
        }

        .bonus-star {
            position: absolute;
            font-size: 3.5rem;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3));
            z-index: 150;
            pointer-events: none;
        }

        /* Game Buttons */
        .btn-game {
            transition: all 0.15s ease-out;
            border-bottom: 8px solid rgba(0,0,0,0.2);
            text-transform: uppercase;
        }
        .btn-game:active {
            transform: translateY(6px);
            border-bottom-width: 2px;
        }

        /* Paper Confetti Canvas - Fixed on Top */
        #confetti-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
        }

        /* Top Right Logo Area */
        .logo-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        .oodles-logo {
            max-width: 120px;
            height: auto;
            background: rgba(255,255,255,0.8);
            padding: 5px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Animations */
        @keyframes bounce-gentle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .animate-bounce-gentle { animation: bounce-gentle 2.5s infinite ease-in-out; }

        @keyframes float-clouds {
            from { transform: translateX(-50vw); }
            to { transform: translateX(150vw); }
        }

        @keyframes pulse-sun {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px) rotate(-3deg); }
            75% { transform: translateX(8px) rotate(3deg); }
        }
        .animate-shake { animation: shake 0.4s ease-in-out; }

    </style>
</head>

    <script>
        // --- DATA ---
        let QUESTIONS = []; // Will be populated dynamically
        
        // Generates exactly 10 random, non-repeating questions
        // Rules: Subtraction within 10, Answer > 0 (No zero answers)
        function generateRandomQuestions() {
            const pool = [];
            const icons = ["🍎", "🐢", "🍓", "🎈", "🧸", "🚗", "🦋", "🌻", "🐶", "🍕", "🦄", "🍦", "🍭", "🚀", "🐼", "🦖", "🍔", "🍟", "⚽", "🌟", "🐸", "🐳", "🍄"];
            
            // 1. Generate all possible math pairs (A - B = C)
            for (let a = 2; a <= 10; a++) {
                for (let b = 1; b < a; b++) { // b < a guarantees answer > 0
                    pool.push({ a: a, b: b, c: a - b });
                }
            }
            
            // 2. Shuffle pool and take 10 unique questions
            pool.sort(() => Math.random() - 0.5);
            const selectedPairs = pool.slice(0, 10);
            
            // 3. Shuffle icons
            const shuffledIcons = icons.sort(() => Math.random() - 0.5);
            
            // 4. Format into game data structure
            return selectedPairs.map((item, index) => {
                // Generate 3 unique choices including the correct answer
                let opts = new Set([item.c]);
                while(opts.size < 3) {
                    let randAns = Math.floor(Math.random() * 9) + 1; // 1 to 9
                    opts.add(randAns);
                }
                
                return {
                    q: `${item.a} - ${item.b}`,
                    a: item.c,
                    icon: shuffledIcons[index],
                    options: Array.from(opts).sort(() => Math.random() - 0.5)
                };
            });
        }

        // V3: Colorful Candy-Like Button Themes for Options
        const colorfulButtonThemes = [
            'bg-sky-400 border-sky-300 text-white',
            'bg-pink-400 border-pink-300 text-white',
            'bg-amber-400 border-amber-300 text-white',
            'bg-emerald-400 border-emerald-300 text-white',
            'bg-violet-400 border-violet-300 text-white',
            'bg-orange-400 border-orange-300 text-white'
        ];

        // --- STATE ---
        let currentIdx = 0;
        let score = 0;
        let isActive = false;
        let isFirstAttempt = true;
        let bagX = 0, bagY = 0;

        // --- AUDIO ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSfx(freqs, type = 'sine', duration = 0.2) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            const gain = audioCtx.createGain();
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + duration);

            freqs.forEach((f, i) => {
                const osc = audioCtx.createOscillator();
                osc.type = type;
                osc.frequency.setValueAtTime(f, now + (i * 0.05));
                osc.connect(gain);
                osc.start(now + (i * 0.05));
                osc.stop(now + duration);
            });
        }

        const sounds = {
            click: () => playSfx([400, 600], 'triangle', 0.15),
            correct: () => playSfx([523, 659, 783, 1046], 'sine', 0.6),
            wrong: () => playSfx([250, 150], 'sawtooth', 0.4),
            pop: () => playSfx([800, 1200], 'sine', 0.15),
            catch: () => playSfx([1200, 1800], 'square', 0.1),
            win: () => playSfx([523, 659, 783, 1046, 1318, 1567], 'square', 1.2)
        };

        // Text-to-Speech Function
        function speakCurrentQuestion() {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            
            const data = QUESTIONS[currentIdx];
            const textToSpeak = data.q.replace('-', 'minus') + ' equals';
            
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'en-US';
            utterance.rate = 0.85; 
            utterance.pitch = 1.3; 
            
            window.speechSynthesis.speak(utterance);
        }

        // --- UI HELPERS ---
        const $ = id => document.getElementById(id);
        const hide = el => el.classList.add('hidden');
        const show = el => el.classList.remove('hidden');

        // --- CORE LOGIC ---
        function initGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            // Generate fresh set of random questions
            QUESTIONS = generateRandomQuestions();
            currentIdx = 0;
            score = 0;
            
            sounds.click();
            hide($('screen-intro'));
            show($('screen-game'));
            show($('game-header'));
            loadQuestion();

            // Hat Tracking
            const moveHandler = (e) => {
                const rect = $('bonus-overlay').getBoundingClientRect();
                const cx = e.touches ? e.touches[0].clientX : e.clientX;
                const cy = e.touches ? e.touches[0].clientY : e.clientY;
                
                let x = cx - rect.left;
                let y = cy - rect.top;
                
                $('wizard-hat').style.left = `${x}px`;
                $('wizard-hat').style.top = `${y}px`;
            };
            window.addEventListener('mousemove', moveHandler);
            window.addEventListener('touchmove', moveHandler, { passive: false });
        }

        function loadQuestion() {
            isActive = true;
            isFirstAttempt = true;
            const data = QUESTIONS[currentIdx];
            
            $('q-count').innerText = currentIdx + 1;
            $('progress-val').style.width = ((currentIdx + 1) / QUESTIONS.length * 100) + '%';
            $('equation-text').innerText = `${data.q} = ?`;
            $('feedback-msg').classList.add('opacity-0');
            hide($('btn-next'));

            setTimeout(speakCurrentQuestion, 500);

            const visualArea = $('visual-area');
            visualArea.innerHTML = '';
            const totalCount = parseInt(data.q.split(' - ')[0]);
            for(let i=0; i<totalCount; i++) {
                const span = document.createElement('span');
                span.className = 'math-icon animate-bounce-gentle';
                span.style.animationDelay = (i * 0.1) + 's';
                span.innerText = data.icon;
                span.onclick = () => {
                    sounds.pop();
                    span.classList.toggle('dimmed');
                };
                visualArea.appendChild(span);
            }

            const choicesGrid = $('choices-grid');
            choicesGrid.innerHTML = '';
            
            // Give each button a distinct colorful theme
            const shuffledThemes = [...colorfulButtonThemes].sort(() => Math.random() - 0.5);

            data.options.forEach((val, index) => {
                const btn = document.createElement('button');
                const themeClass = shuffledThemes[index];
                
                // Add colorful theme to the button
                btn.className = `btn-game py-5 sm:py-6 ${themeClass} border-[4px] rounded-[30px] text-5xl font-black shadow-lg hover:brightness-110`;
                btn.innerText = val;
                btn.onclick = () => checkAnswer(val, btn, themeClass);
                choicesGrid.appendChild(btn);
            });
        }

        function checkAnswer(val, btn, originalTheme) {
            if(!isActive) return;
            const data = QUESTIONS[currentIdx];

            if(val === data.a) {
                isActive = false;
                sounds.correct();
                
                if (isFirstAttempt) {
                    score += 10;
                    $('score-text').innerText = score;
                    $('feedback-msg').innerText = "Perfect! ✨";
                    $('feedback-msg').className = 'h-10 text-3xl font-black transition-all mb-4 text-center text-emerald-500 drop-shadow-sm';
                    setTimeout(startBonus, 1500);
                } else {
                    $('feedback-msg').innerText = "Good Job! ➔";
                    $('feedback-msg').className = 'h-10 text-3xl font-black transition-all mb-4 text-center text-yellow-500 drop-shadow-sm';
                    show($('btn-next'));
                }
                
                // Emphasize correct answer with Bright Lime style
                btn.className = "btn-game py-5 sm:py-6 bg-lime-400 border-4 border-lime-200 rounded-[30px] text-5xl font-black text-white shadow-xl transform scale-105 z-10 relative";
                
                if ('speechSynthesis' in window) {
                    const ansText = data.q.replace('-', 'minus') + ' equals ' + data.a;
                    const u = new SpeechSynthesisUtterance(ansText);
                    u.rate = 0.85; u.pitch = 1.3;
                    window.speechSynthesis.speak(u);
                }

            } else {
                sounds.wrong();
                isFirstAttempt = false;
                
                // Wrong animation but keep the button's beautiful base color (just fade slightly)
                btn.className = `btn-game py-5 sm:py-6 ${originalTheme} border-4 rounded-[30px] text-5xl font-black shadow-lg opacity-60 animate-shake`;
                
                $('feedback-msg').innerText = "Oops! Try again. 💪";
                $('feedback-msg').className = 'h-10 text-2xl font-black transition-all mb-4 text-center text-rose-500';
                setTimeout(() => {
                    btn.classList.remove('animate-shake');
                    $('feedback-msg').classList.add('opacity-0');
                }, 1200);
            }
        }

        // --- BONUS ---
        function startBonus() {
            show($('bonus-overlay'));
            let time = 5;
            $('bonus-timer').innerText = time;

            const countdown = setInterval(() => {
                time--;
                $('bonus-timer').innerText = time;
                if(time <= 0) {
                    clearInterval(countdown);
                    clearInterval(spawner);
                    endBonus();
                }
            }, 1000);

            const spawner = setInterval(spawnStar, 400);
        }

        function spawnStar() {
            const star = document.createElement('div');
            star.innerText = '⭐';
            star.className = 'bonus-star';
            star.style.left = (Math.random() * 80 + 10) + '%';
            star.style.top = '-10%';
            $('bonus-overlay').appendChild(star);

            const duration = Math.random() * 1500 + 2000;
            const anim = star.animate([
                { top: '-10%', transform: 'rotate(0deg)' },
                { top: '110%', transform: 'rotate(720deg)' }
            ], { duration: duration, easing: 'linear' });

            const check = setInterval(() => {
                const sRect = star.getBoundingClientRect();
                const hRect = $('wizard-hat').getBoundingClientRect();
                
                const dx = (sRect.left + sRect.width/2) - (hRect.left + hRect.width/2);
                const dy = (sRect.top + sRect.height/2) - (hRect.top + hRect.height/2);
                const dist = Math.sqrt(dx*dx + dy*dy);

                if(dist < 70) {
                    sounds.catch();
                    score += 2;
                    $('score-text').innerText = score;
                    star.innerHTML = '<span class="text-white text-3xl font-black drop-shadow-md">+2</span>';
                    star.style.filter = 'none';
                    clearInterval(check);
                    setTimeout(() => star.remove(), 300);
                }
            }, 50);

            anim.onfinish = () => { clearInterval(check); star.remove(); };
        }

        function endBonus() {
            hide($('bonus-overlay'));
            nextStep();
        }

        function nextStep() {
            currentIdx++;
            if(currentIdx < QUESTIONS.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        // --- RESULTS (Paper Confetti) ---
        function showResults() {
            sounds.win();
            hide($('screen-game'));
            hide($('game-header'));
            show($('screen-result'));
            $('final-score').innerText = score;
            startPaperConfetti();
        }

        function startPaperConfetti() {
            const canvas = $('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let particles = [];

            const colors = ['#f43f5e', '#3b82f6', '#facc15', '#4ade80', '#a855f7', '#fb923c'];

            class ConfettiParticle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height - canvas.height;
                    this.w = Math.random() * 10 + 10;
                    this.h = Math.random() * 20 + 15;
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                    this.vy = Math.random() * 3 + 2;
                    this.vx = Math.random() * 4 - 2;
                    this.angle = Math.random() * 360;
                    this.spin = Math.random() * 0.2 - 0.1;
                }
                draw() {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.angle);
                    ctx.fillStyle = this.color;
                    ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
                    ctx.restore();
                }
                update() {
                    this.y += this.vy;
                    this.x += this.vx;
                    this.angle += this.spin;
                    // Respawn at top if it falls down
                    if (this.y > canvas.height) {
                        this.y = -50;
                        this.x = Math.random() * canvas.width;
                    }
                }
            }

            for (let i = 0; i < 150; i++) {
                particles.push(new ConfettiParticle());
            }

            let animationId;
            function anim() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                animationId = requestAnimationFrame(anim);
            }
            anim();

            setTimeout(() => {
                cancelAnimationFrame(animationId);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }, 8000);

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }

    </script>
</body>
</html>
