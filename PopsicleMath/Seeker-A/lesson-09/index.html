<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Adventure Math - Ver 4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            touch-action: manipulation;
            overflow: hidden;
            background: #020617; /* Deep Space Black */
            color: white;
            user-select: none;
        }

        /* Logo Placeholder */
        .app-logo {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            height: 60px;
            z-index: 100;
        }

        /* Space Environment */
        .sky-bg {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, #070b19 0%, #0c1a36 50%, #17365d 100%);
            z-index: -5;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--d) infinite ease-in-out;
            z-index: -4;
            box-shadow: 0 0 4px rgba(255, 255, 255, 0.8);
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.5); box-shadow: 0 0 8px white; }
        }

        .nebula-cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            filter: blur(50px);
            border-radius: 50%;
            animation: drift var(--d) infinite linear;
            z-index: -3;
        }
        @keyframes drift {
            from { transform: translateX(-300px); }
            to { transform: translateX(110vw); }
        }

        .moon-surface {
            position: fixed;
            bottom: -50px;
            left: -10%;
            width: 120%;
            height: 250px;
            background: linear-gradient(to bottom, #2d3748, #1a202c);
            border-radius: 50% 50% 0 0;
            z-index: -2;
            box-shadow: inset 0 25px 60px rgba(0,0,0,0.8);
            border-top: 4px solid #4a5568;
        }
        
        .crater {
            position: absolute;
            background: #171923;
            border-radius: 50%;
            opacity: 0.5;
            box-shadow: inset 4px 4px 10px rgba(0,0,0,0.8), 1px 1px 2px rgba(255,255,255,0.15);
        }

        /* Glassmorphism Panels */
        .glass-panel {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(16px);
            border: 2px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .btn-kids {
            box-shadow: 0 8px 0 rgba(0,0,0,0.4);
            transition: transform 0.1s, box-shadow 0.1s, filter 0.2s;
        }
        .btn-kids:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.4);
        }
        .btn-kids:hover {
            filter: brightness(1.1);
        }

        /* Item Interaction */
        .item-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: inset 0 0 20px rgba(255,255,255,0.05), 0 10px 20px rgba(0,0,0,0.3);
        }
        .item-card:not(.dimmed):hover {
            transform: scale(1.1) translateY(-8px);
            box-shadow: inset 0 0 30px rgba(255,255,255,0.1), 0 15px 30px rgba(0,0,0,0.5);
            border-color: rgba(255, 255, 255, 0.8);
        }
        .dimmed {
            opacity: 0.3;
            transform: scale(0.8) !important;
            filter: grayscale(80%) brightness(0.6);
            cursor: default;
            box-shadow: none !important;
            border-color: #334155 !important;
            background: transparent !important;
        }

        /* Animations */
        .hidden { display: none !important; }
        
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }

        .floating { animation: floating 3.5s infinite ease-in-out; }
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .pulse-speaker {
            animation: pulse-speaker 2s infinite;
        }
        @keyframes pulse-speaker {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 12px rgba(56, 189, 248, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
        }

        #fireworks-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <!-- Top Right Logo -->

    <!-- Space Background -->

                            <path d="M13.5 4.06c0-1.336-1.616-2.005-2.56-1.06l-4.5 4.5H4.508c-1.141 0-2.318.664-2.66 1.905A9.76 9.76 0 001.5 12c0 .898.121 1.768.35 2.595.341 1.24 1.518 1.905 2.659 1.905h1.93l4.5 4.5c.945.945 2.561.276 2.561-1.06V4.06zM18.584 5.106a.75.75 0 011.06 0c3.808 3.807 3.808 9.98 0 13.788a.75.75 0 11-1.06-1.06 8.25 8.25 0 000-11.668.75.75 0 010-1.06z"/>
                            <path d="M15.932 7.757a.75.75 0 011.061 0 6 6 0 010 8.486.75.75 0 01-1.06-1.061 4.5 4.5 0 000-6.364.75.75 0 010-1.06z"/>

            <button onclick="submitAnswer(2)" class="btn-kids bg-gradient-to-b from-orange-400 to-orange-600 border-2 border-orange-300 py-4 rounded-3xl text-4xl font-black text-white border-b-8 border-b-orange-800">2</button>

    <!-- Final Summary Screen -->

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let currentInstructionRawText = "";
        let audioUnlocked = false;

        function unlockAudio() {
            if (audioUnlocked) return;
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                osc.connect(audioCtx.destination);
                osc.start(0); osc.stop(audioCtx.currentTime + 0.001);
                
                if ('speechSynthesis' in window) {
                    const u = new SpeechSynthesisUtterance('');
                    u.volume = 0;
                    window.speechSynthesis.speak(u);
                }
                audioUnlocked = true;
            } catch(e) {}
        }

        function playSound(type) {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                
                if (type === 'pop') {
                    osc.type = 'sine'; 
                    osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
                } else if (type === 'success') {
                    [440, 554.37, 659.25, 880].forEach((f, i) => { // A4, C#5, E5, A5
                        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                        o.connect(g); g.connect(audioCtx.destination);
                        o.type = 'square'; o.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.1);
                        g.gain.setValueAtTime(0.1, audioCtx.currentTime + i*0.1);
                        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i*0.1 + 0.4);
                        o.start(audioCtx.currentTime + i*0.1); o.stop(audioCtx.currentTime + i*0.1 + 0.4);
                    });
                } else if (type === 'fail') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
                }
            } catch(e){}
        }

        function playVoice(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.9; 
                utterance.pitch = 1.1; 
                utterance.lang = 'en-US';
                window.speechSynthesis.speak(utterance);
            }
        }

        function playCurrentInstruction() {
            playVoice(currentInstructionRawText);
        }

        /* --- HIGHLY REALISTIC SPACE SVGS --- */

                <path d="M43 40 Q50 35 57 40 Q50 45 43 40 Z" fill="#ffffff" opacity="0.6"/>
            </svg>`,
            
            astronaut: `<svg viewBox="0 0 100 100">
                <defs>
                    <linearGradient id="suitMain" x1="0%" y1="0%" x2="100%" y2="100%">

                <!-- Backpack -->
                <rect x="15" y="20" width="70" height="50" rx="8" fill="url(#pack)" stroke="#475569" stroke-width="2"/>

                <rect x="35" y="55" width="30" height="15" rx="4" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>

                <path d="M22 45 Q10 55 20 70" stroke="url(#suitMain)" stroke-width="8" stroke-linecap="round" fill="none"/>

            { s: 5, b: 3, icon: 'rover' },
            { s: 2, b: 1, icon: 'alien' },
            { s: 4, b: 4, icon: 'ufo' },

            { s: 5, b: 2, icon: 'earth' },
            { s: 4, b: 1, icon: 'comet' },
            { s: 2, b: 2, icon: 'satellite' },
            { s: 5, b: 4, icon: 'asteroid' }
        ];

        let currentLvl = 0;
        let score = 0;
        let itemsRemoved = 0;
        let isLocked = false;

        function setupWorld() {
            const sky = document.getElementById('sky');
            const moon = document.getElementById('moon');
            if(!sky || !moon) return;
            
            for (let i = 0; i < 100; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const size = Math.random() * 3 + 1;
                s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${Math.random()*3+2}s;`;
                sky.appendChild(s);
            }
            
            for (let i = 0; i < 6; i++) {
                const c = document.createElement('div');
                c.className = 'nebula-cloud';
                c.style.cssText = `width:${Math.random()*300+200}px;height:${Math.random()*100+50}px;left:${Math.random()*100}%;top:${Math.random()*70}%;--d:${Math.random()*30+20}s; background: rgba(${Math.random()*150+50}, ${Math.random()*50+50}, ${Math.random()*200+100}, 0.15);`;
                sky.appendChild(c);
            }
            
            for (let i = 0; i < 15; i++) {
                const cr = document.createElement('div');
                cr.className = 'crater';
                cr.style.cssText = `width:${Math.random()*60+20}px;height:${Math.random()*25+10}px;left:${Math.random()*100}%;top:${Math.random()*200+10}px;`;
                moon.appendChild(cr);
            }
        }

        function startGame() {
            unlockAudio();
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            loadLevel();
        }

        function loadLevel() {
            const l = levels[currentLvl];
            itemsRemoved = 0;
            isLocked = false;
            
            document.getElementById('level-num').innerText = currentLvl + 1;
            document.getElementById('score-display').innerText = score;
            document.getElementById('eq-start').innerText = l.s;
            document.getElementById('eq-sub').innerText = l.b;
            
            const slot = document.getElementById('ans-slot');
            slot.innerText = "?";
            slot.className = "w-24 h-24 md:w-32 md:h-32 rounded-[30px] border-8 border-dashed border-cyan-500/50 flex items-center justify-center bg-cyan-950/40 text-cyan-300 transition-all shadow-[inset_0_0_20px_rgba(6,182,212,0.3)]";
            
            document.getElementById('input-pad').classList.add('hidden');
            
            const instBox = document.getElementById('instruction-text');
            if (l.b === 0) {
                instBox.innerHTML = `Keep them all! Subtract <span class='text-red-400'>0</span>`;
                currentInstructionRawText = "Keep them all! Subtract zero.";
            } else {
                instBox.innerHTML = `Tap <span class="text-red-400 text-2xl md:text-3xl mx-1">${l.b}</span> to subtract!`;
                currentInstructionRawText = `Tap ${l.b} items to subtract them.`;
            }

            const container = document.getElementById('items-container');
            container.innerHTML = "";
            
            for (let i = 0; i < l.s; i++) {
                const card = document.createElement('div');
                card.className = `item-card w-20 h-20 md:w-28 md:h-28 p-2 md:p-3 rounded-3xl border-2 border-slate-500 cursor-pointer flex items-center justify-center`;
                card.innerHTML = svgs[l.icon];
                card.onclick = () => subtractActivity(card);
                container.appendChild(card);
            }

            setTimeout(playCurrentInstruction, 500);
            if (l.b === 0) setTimeout(showInput, 1500);
        }

        function subtractActivity(el) {
            if (isLocked) return;
            const l = levels[currentLvl];
            
            if (itemsRemoved < l.b && !el.classList.contains('dimmed')) {
                playSound('pop');
                el.classList.add('dimmed');
                itemsRemoved++;
                
                if (itemsRemoved === l.b) {
                    setTimeout(showInput, 600);
                }
            }
        }

        function showInput() {
            document.getElementById('instruction-text').innerHTML = `How many are left? <span class='text-cyan-400'>Choose!</span>`;
            currentInstructionRawText = "How many items are left? Choose the correct number below.";
            playCurrentInstruction();
            document.getElementById('input-pad').classList.remove('hidden');
        }

        function submitAnswer(val) {
            if (isLocked) return;
            const l = levels[currentLvl];
            const correct = l.s - l.b;
            const slot = document.getElementById('ans-slot');
            
            slot.innerText = val;
            
            if (val === correct) {
                isLocked = true;
                playSound('success');
                score += 100;
                
                slot.className = "w-24 h-24 md:w-32 md:h-32 rounded-[30px] border-8 border-green-400 flex items-center justify-center bg-green-500 text-white shadow-[0_0_30px_rgba(74,222,128,0.8)] transform scale-110";
                
                setTimeout(() => {
                    document.getElementById('overlay-success').classList.remove('hidden');
                }, 1000);
            } else {
                playSound('fail');
                slot.classList.add('shake');
                slot.classList.replace('text-cyan-300', 'text-red-400');
                slot.classList.replace('border-cyan-500/50', 'border-red-500/80');
                
                setTimeout(() => {
                    slot.classList.remove('shake');
                    slot.classList.replace('text-red-400', 'text-cyan-300');
                    slot.classList.replace('border-red-500/80', 'border-cyan-500/50');
                    slot.innerText = "?";
                }, 500);
            }
        }

        function nextLevel() {
            document.getElementById('overlay-success').classList.add('hidden');
            currentLvl++;
            if (currentLvl < levels.length) {
                loadLevel();
            } else {
                showEnd();
            }
        }

        function showEnd() {
            document.getElementById('screen-game').classList.add('hidden');
            document.getElementById('screen-end').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            playSound('success');
            setTimeout(() => playVoice("You are a galaxy hero! Mission complete!"), 500);
            startFireworks();
        }

        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        let parts = [];

        function resizeCanvas() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.015;
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fill();
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05;
                this.alpha -= this.decay;
            }
        }

        function startFireworks() {
            function createExplosion(x, y) {
                const hue = Math.random() * 360;
                for (let i = 0; i < 60; i++) {
                    const color = `hsl(${hue}, 100%, 60%)`;
                    parts.push(new Particle(x, y, color));
                }
            }
            
            function loop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if (Math.random() < 0.06) {
                    createExplosion(Math.random() * canvas.width, Math.random() * canvas.height * 0.6);
                }
                
                parts.forEach((p, index) => {
                    p.update();
                    p.draw();
                    if (p.alpha <= 0) {
                        parts.splice(index, 1);
                    }
                });
                
                requestAnimationFrame(loop);
            }
            
            createExplosion(canvas.width/2, canvas.height/2);
            loop();
        }

        window.onload = setupWorld;
    </script>
</body>
</html>
