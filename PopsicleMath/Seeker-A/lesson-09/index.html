<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Adventure Math - Ver 3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            touch-action: manipulation;
            overflow: hidden;
            background: #083344;
            color: white;
        }

        /* Adventure Background based on image */
        .sky-bg {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, #0c4a6e 0%, #164e63 50%, #0891b2 100%);
            z-index: -3;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--d) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.4); }
        }

        /* Moon Surface & Clouds from image */
        .moon-surface {
            position: fixed;
            bottom: -50px;
            left: -10%;
            width: 120%;
            height: 200px;
            background: #4d7c0f; /* Greenish cratered look like image */
            border-radius: 50% 50% 0 0;
            z-index: -1;
            box-shadow: inset 0 20px 40px rgba(0,0,0,0.2);
        }

        .crater {
            position: absolute;
            background: #365314;
            border-radius: 50%;
            opacity: 0.4;
        }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            filter: blur(20px);
            border-radius: 50%;
            bottom: 50px;
            animation: drift var(--d) infinite linear;
            z-index: -2;
        }

        @keyframes drift {
            from { transform: translateX(-200px); }
            to { transform: translateX(100vw); }
        }

        /* Game Elements */
        .glass {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .btn-fancy {
            box-shadow: 0 8px 0 rgba(0,0,0,0.3);
            transition: all 0.1s;
        }
        .btn-fancy:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }

        .pop-out {
            animation: popOut 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popOut {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        #fireworks-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
        }

        .hidden { display: none !important; }

        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .floating { animation: floating 3s infinite ease-in-out; }
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>
    <div class="sky-bg" id="sky"></div>
    <div class="moon-surface" id="moon"></div>
    <canvas id="fireworks-canvas"></canvas>

    <!-- Start Screen -->
    <div id="screen-start" class="fixed inset-0 flex flex-col items-center justify-center z-50 p-6 text-center">
        <div class="floating mb-12">
            <h1 class="text-6xl md:text-9xl font-black italic tracking-tighter bg-clip-text text-transparent bg-gradient-to-b from-yellow-300 via-orange-400 to-red-500 drop-shadow-2xl uppercase">
                Space<br>Explorer
            </h1>
        </div>
        <p class="text-2xl md:text-3xl text-white font-bold mb-12 drop-shadow-md">Master Subtraction in Space!</p>
        <button onclick="startGame()" class="btn-fancy bg-gradient-to-r from-yellow-400 to-orange-600 px-20 py-8 rounded-full text-4xl font-black border-b-8 border-orange-800 uppercase tracking-widest hover:scale-105 transition-all">
            Ready? Go!
        </button>
    </div>

    <!-- Main Game UI -->
    <div id="screen-game" class="hidden min-h-screen flex flex-col items-center justify-between p-4 max-w-5xl mx-auto">
        <!-- Top Stats -->
        <div class="w-full flex justify-between items-center py-4 gap-2">
            <div class="glass px-5 py-2 rounded-2xl font-black text-base md:text-2xl">
                Level: <span id="level-num" class="text-yellow-400">1</span>
            </div>
            <div id="instruction-box" class="flex-1 max-w-md bg-white text-indigo-950 px-4 py-3 rounded-2xl shadow-2xl font-black text-center text-sm md:text-xl border-b-4 border-indigo-200">
                <!-- Text updated via JS -->
            </div>
            <div class="glass px-5 py-2 rounded-2xl font-black text-base md:text-2xl text-right">
                Score: <span id="score-display" class="text-green-400">0</span>
            </div>
        </div>

        <!-- Interactive Area -->
        <div class="flex-1 w-full flex flex-col items-center justify-center gap-12 py-4">
            <div id="items-container" class="flex flex-wrap justify-center gap-6 md:gap-12 min-h-[120px] md:min-h-[200px]">
                <!-- Items injected here -->
            </div>

            <!-- Visual Equation -->
            <div class="glass p-8 md:p-12 rounded-[40px] flex flex-wrap items-center justify-center gap-6 md:gap-12 w-full max-w-3xl">
                <div class="flex items-center gap-4 md:gap-10 text-6xl md:text-9xl font-black drop-shadow-lg">
                    <span id="eq-start">5</span>
                    <span class="text-red-500">-</span>
                    <span id="eq-sub" class="text-yellow-400">2</span>
                    <span class="text-white">=</span>
                    <div id="ans-slot" class="w-24 h-24 md:w-36 md:h-36 rounded-3xl border-4 border-dashed border-white/50 flex items-center justify-center text-white bg-black/20">?</div>
                </div>
            </div>
        </div>

        <!-- Number Pad -->
        <div id="input-pad" class="hidden w-full max-w-2xl grid grid-cols-3 sm:grid-cols-6 gap-3 md:gap-4 mb-8">
            <!-- Buttons 0-5 -->
            <button onclick="submitAnswer(0)" class="btn-fancy bg-indigo-500 py-4 rounded-2xl text-4xl font-bold border-b-8 border-indigo-700">0</button>
            <button onclick="submitAnswer(1)" class="btn-fancy bg-indigo-500 py-4 rounded-2xl text-4xl font-bold border-b-8 border-indigo-700">1</button>
            <button onclick="submitAnswer(2)" class="btn-fancy bg-indigo-500 py-4 rounded-2xl text-4xl font-bold border-b-8 border-indigo-700">2</button>
            <button onclick="submitAnswer(3)" class="btn-fancy bg-indigo-500 py-4 rounded-2xl text-4xl font-bold border-b-8 border-indigo-700">3</button>
            <button onclick="submitAnswer(4)" class="btn-fancy bg-indigo-500 py-4 rounded-2xl text-4xl font-bold border-b-8 border-indigo-700">4</button>
            <button onclick="submitAnswer(5)" class="btn-fancy bg-indigo-500 py-4 rounded-2xl text-4xl font-bold border-b-8 border-indigo-700">5</button>
        </div>
    </div>

    <!-- Success Feedback -->
    <div id="overlay-success" class="hidden fixed inset-0 z-[60] bg-cyan-950/90 flex flex-col items-center justify-center p-6 text-center">
        <div class="floating text-9xl mb-8">✨</div>
        <h2 class="text-7xl font-black text-yellow-400 mb-12 drop-shadow-xl">FANTASTIC!</h2>
        <button onclick="nextLevel()" class="btn-fancy bg-gradient-to-r from-green-400 to-emerald-600 px-16 py-6 rounded-full text-3xl font-black border-b-8 border-emerald-900 uppercase">Next Star! →</button>
    </div>

    <!-- Final Summary -->
    <div id="screen-end" class="hidden fixed inset-0 z-[70] bg-gradient-to-b from-indigo-900 to-cyan-900 flex flex-col items-center justify-center p-8 text-center">
        <div class="floating text-9xl mb-8">🏆</div>
        <h2 class="text-6xl md:text-8xl font-black mb-6 text-white uppercase">Galaxy Legend!</h2>
        <p class="text-2xl text-blue-200 mb-10 font-bold">You've reached the edge of the universe!</p>
        <div class="glass p-10 rounded-[50px] mb-12 w-full max-w-md border-4 border-yellow-400">
            <p class="text-xl text-yellow-300 font-black uppercase mb-2">Total Score</p>
            <p id="final-score" class="text-8xl font-black text-white">1000</p>
        </div>
        <button onclick="location.reload()" class="btn-fancy bg-red-500 px-16 py-8 rounded-full text-3xl font-black border-b-8 border-red-800 uppercase">Mission Restart</button>
    </div>

    <script>
        // --- SOUND ENGINE ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                if (type === 'pop') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
                } else if (type === 'success') {
                    [440, 554, 659, 880].forEach((f, i) => {
                        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                        o.connect(g); g.connect(audioCtx.destination);
                        o.type = 'square'; o.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.1);
                        g.gain.setValueAtTime(0.1, audioCtx.currentTime + i*0.1);
                        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i*0.1 + 0.4);
                        o.start(audioCtx.currentTime + i*0.1); o.stop(audioCtx.currentTime + i*0.1 + 0.4);
                    });
                } else if (type === 'fail') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
                }
            } catch(e){}
        }

        // --- GAME DATA ---
        const levels = [
            { s: 3, b: 1, icon: 'rocket', color: 'bg-red-500 border-red-300' },
            { s: 5, b: 2, icon: 'astronaut', color: 'bg-indigo-100 border-indigo-400' },
            { s: 4, b: 2, icon: 'rover', color: 'bg-orange-500 border-orange-300' },
            { s: 2, b: 2, icon: 'alien', color: 'bg-emerald-400 border-emerald-200' },
            { s: 5, b: 4, icon: 'ufo', color: 'bg-purple-500 border-purple-300' },
            { s: 3, b: 0, icon: 'saturn', color: 'bg-yellow-500 border-yellow-200' },
            { s: 4, b: 1, icon: 'comet', color: 'bg-blue-400 border-blue-200' },
            { s: 5, b: 3, icon: 'rocket', color: 'bg-red-500 border-red-300' },
            { s: 2, b: 1, icon: 'astronaut', color: 'bg-indigo-100 border-indigo-400' },
            { s: 5, b: 5, icon: 'rover', color: 'bg-orange-500 border-orange-300' }
        ];

        const svgs = {
            rocket: `<svg viewBox="0 0 100 100"><path d="M50 5 C65 30 65 75 65 85 L35 85 C35 75 35 30 50 5" fill="white" stroke="#334155" stroke-width="2"/><path d="M40 85 L60 85 L50 98 Z" fill="#ef4444"/><rect x="42" y="45" width="16" height="16" rx="8" fill="#0ea5e9"/><path d="M35 60 L20 85 L35 85 Z" fill="#ef4444"/><path d="M65 60 L80 85 L65 85 Z" fill="#ef4444"/></svg>`,
            astronaut: `<svg viewBox="0 0 100 100"><rect x="30" y="20" width="40" height="45" rx="15" fill="white" stroke="#334155" stroke-width="2"/><rect x="35" y="28" width="30" height="18" rx="6" fill="#1e293b"/><circle cx="45" cy="35" r="3" fill="white" opacity="0.3"/><rect x="35" y="65" width="30" height="25" rx="5" fill="white" stroke="#334155" stroke-width="2"/></svg>`,
            rover: `<svg viewBox="0 0 100 100"><rect x="25" y="40" width="50" height="30" rx="5" fill="#f97316" stroke="#334155" stroke-width="2"/><circle cx="35" cy="75" r="10" fill="#334155"/><circle cx="65" cy="75" r="10" fill="#334155"/><rect x="45" y="25" width="10" height="15" fill="#64748b"/><rect x="40" y="20" width="20" height="10" rx="2" fill="#0ea5e9"/></svg>`,
            alien: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="#4ade80"/><ellipse cx="35" cy="40" rx="10" ry="15" fill="black"/><ellipse cx="65" cy="40" rx="10" ry="15" fill="black"/><path d="M40 75 Q50 85 60 75" stroke="black" stroke-width="4" fill="none" stroke-linecap="round"/><circle cx="35" cy="38" r="3" fill="white" opacity="0.5"/></svg>`,
            ufo: `<svg viewBox="0 0 100 100"><ellipse cx="50" cy="65" rx="45" ry="15" fill="#a855f7" stroke="#334155" stroke-width="2"/><path d="M30 60 Q50 20 70 60" fill="#d8b4fe" opacity="0.8" stroke="#334155" stroke-width="2"/><circle cx="30" cy="65" r="3" fill="white"/><circle cx="50" cy="65" r="3" fill="white"/><circle cx="70" cy="65" r="3" fill="white"/></svg>`,
            saturn: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="30" fill="#eab308" stroke="#334155" stroke-width="2"/><ellipse cx="50" cy="50" rx="50" ry="12" fill="none" stroke="#fde047" stroke-width="6" opacity="0.9"/></svg>`,
            comet: `<svg viewBox="0 0 100 100"><path d="M20 20 C60 20 80 50 90 90" stroke="white" stroke-width="12" fill="none" stroke-linecap="round"/><circle cx="30" cy="30" r="22" fill="#fbbf24"/></svg>`
        };

        let currentLvl = 0;
        let score = 0;
        let itemsRemoved = 0;
        let isLocked = false;

        // --- BACKGROUND SETUP ---
        function setupWorld() {
            const sky = document.getElementById('sky');
            const moon = document.getElementById('moon');
            
            // Stars
            for (let i = 0; i < 70; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const size = Math.random() * 4 + 1;
                s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${Math.random()*3+2}s;`;
                sky.appendChild(s);
            }

            // Clouds
            for (let i = 0; i < 6; i++) {
                const c = document.createElement('div');
                c.className = 'cloud';
                c.style.cssText = `width:${Math.random()*200+100}px;height:${Math.random()*60+40}px;left:${Math.random()*100}%;bottom:${Math.random()*80}px;--d:${Math.random()*20+20}s;`;
                sky.appendChild(c);
            }

            // Craters on moon
            for (let i = 0; i < 15; i++) {
                const cr = document.createElement('div');
                cr.className = 'crater';
                cr.style.cssText = `width:${Math.random()*50+20}px;height:${Math.random()*20+10}px;left:${Math.random()*100}%;top:${Math.random()*80}px;`;
                moon.appendChild(cr);
            }
        }

        // --- GAME LOGIC ---
        function startGame() {
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            loadLevel();
        }

        function loadLevel() {
            const l = levels[currentLvl];
            itemsRemoved = 0;
            isLocked = false;
            
            document.getElementById('level-num').innerText = currentLvl + 1;
            document.getElementById('score-display').innerText = score;
            document.getElementById('eq-start').innerText = l.s;
            document.getElementById('eq-sub').innerText = l.b;
            
            const slot = document.getElementById('ans-slot');
            slot.innerText = "?";
            slot.className = "w-24 h-24 md:w-36 md:h-36 rounded-3xl border-4 border-dashed border-white/50 flex items-center justify-center text-white bg-black/20";
            
            document.getElementById('input-pad').classList.add('hidden');
            const ib = document.getElementById('instruction-box');
            ib.innerHTML = l.b === 0 
                ? "Keep them all! Take away <span class='text-red-600 text-2xl'>0</span>" 
                : `Blast away <span class="text-red-600 text-3xl font-black">${l.b}</span> items!`;

            const container = document.getElementById('items-container');
            container.innerHTML = "";
            for (let i = 0; i < l.s; i++) {
                const card = document.createElement('div');
                card.className = `w-24 h-24 md:w-36 md:h-36 p-3 rounded-[32px] border-4 cursor-pointer shadow-xl transition-all hover:scale-110 flex items-center justify-center ${l.color}`;
                card.innerHTML = svgs[l.icon] || svgs.rocket;
                card.onclick = () => removeItem(card);
                container.appendChild(card);
            }

            if (l.b === 0) setTimeout(showInput, 1200);
        }

        function removeItem(el) {
            if (isLocked) return;
            const l = levels[currentLvl];
            if (itemsRemoved < l.b && !el.classList.contains('pop-out')) {
                playSound('pop');
                el.classList.add('pop-out');
                itemsRemoved++;
                if (itemsRemoved === l.b) {
                    setTimeout(showInput, 600);
                }
            }
        }

        function showInput() {
            document.getElementById('instruction-box').innerHTML = "Count how many are left! <span class='text-blue-600'>Pick the number!</span>";
            document.getElementById('input-pad').classList.remove('hidden');
        }

        function submitAnswer(val) {
            if (isLocked) return;
            const l = levels[currentLvl];
            const correct = l.s - l.b;
            const slot = document.getElementById('ans-slot');
            
            slot.innerText = val;
            
            if (val === correct) {
                isLocked = true;
                playSound('success');
                score += 100;
                slot.className = "w-24 h-24 md:w-36 md:h-36 rounded-3xl border-4 border-green-400 flex items-center justify-center text-white bg-green-500 shadow-[0_0_40px_rgba(34,197,94,0.6)]";
                setTimeout(() => {
                    document.getElementById('overlay-success').classList.remove('hidden');
                }, 800);
            } else {
                playSound('fail');
                slot.classList.add('shake');
                slot.classList.replace('text-white', 'text-red-500');
                setTimeout(() => {
                    slot.classList.remove('shake');
                    slot.classList.replace('text-red-500', 'text-white');
                    slot.innerText = "?";
                }, 500);
            }
        }

        function nextLevel() {
            document.getElementById('overlay-success').classList.add('hidden');
            currentLvl++;
            if (currentLvl < levels.length) {
                loadLevel();
            } else {
                showEnd();
            }
        }

        function showEnd() {
            document.getElementById('screen-game').classList.add('hidden');
            document.getElementById('screen-end').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            startFireworks();
        }

        // --- FIREWORKS ---
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        let parts = [];

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class Part {
            constructor(x,y,c) {
                this.x=x; this.y=y; this.c=c;
                this.v={x:(Math.random()-0.5)*10, y:(Math.random()-0.5)*10};
                this.a=1;
            }
            draw() {
                ctx.globalAlpha = this.a;
                ctx.fillStyle = this.c;
                ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI*2); ctx.fill();
            }
            up() {
                this.x+=this.v.x; this.y+=this.v.y; this.v.y+=0.1; this.a-=0.015;
            }
        }

        function startFireworks() {
            function loop() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                if (Math.random()<0.1) {
                    let x = Math.random()*canvas.width, y = Math.random()*canvas.height*0.5;
                    let c = `hsl(${Math.random()*360}, 100%, 50%)`;
                    for(let i=0; i<30; i++) parts.push(new Part(x,y,c));
                }
                parts.forEach((p,i) => {
                    p.up(); p.draw();
                    if(p.a<=0) parts.splice(i,1);
                });
                requestAnimationFrame(loop);
            }
            loop();
        }

        window.onload = setupWorld;
    </script>
</body>
</html>
