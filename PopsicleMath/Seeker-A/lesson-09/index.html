<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Adventure Math - Ver 3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            touch-action: manipulation;
            overflow: hidden;
            background: #020617; /* Deep Space Black */
            color: white;
            user-select: none;
        }

        /* Logo Placeholder */
        .app-logo {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            height: 60px;
            z-index: 100;
        }

        /* Space Environment */
        .sky-bg {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, #0c4a6e 0%, #164e63 50%, #0891b2 100%);
            z-index: -5;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--d) infinite ease-in-out;
            z-index: -4;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.5); box-shadow: 0 0 5px white; }
        }

        .nebula-cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            filter: blur(40px);
            border-radius: 50%;
            animation: drift var(--d) infinite linear;
            z-index: -3;
        }
        @keyframes drift {
            from { transform: translateX(-300px); }
            to { transform: translateX(110vw); }
        }

        .moon-surface {
            position: fixed;
            bottom: -50px;
            left: -10%;
            width: 120%;
            height: 220px;
            background: linear-gradient(to bottom, #4d7c0f, #365314); /* Alien green moon */
            border-radius: 50% 50% 0 0;
            z-index: -2;
            box-shadow: inset 0 20px 60px rgba(0,0,0,0.6);
            border-top: 5px solid #65a30d;
        }
        
        .crater {
            position: absolute;
            background: #1a2e05;
            border-radius: 50%;
            opacity: 0.4;
            box-shadow: inset 3px 3px 8px rgba(0,0,0,0.7), 1px 1px 2px rgba(255,255,255,0.1);
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        .btn-kids {
            box-shadow: 0 8px 0 rgba(0,0,0,0.4);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-kids:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.4);
        }

        /* Item Fading for Subtraction (Mechanic kept from V2) */
        .item-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .item-card:not(.dimmed):hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.6);
        }
        .dimmed {
            opacity: 0.3;
            transform: scale(0.8) !important;
            filter: grayscale(80%) brightness(0.7);
            cursor: default;
            box-shadow: none !important;
            border-color: #334155 !important;
            background: transparent !important;
        }

        /* Animations */
        .hidden { display: none !important; }
        
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }

        .floating { animation: floating 3.5s infinite ease-in-out; }
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .pulse-speaker {
            animation: pulse-speaker 2s infinite;
        }
        @keyframes pulse-speaker {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 12px rgba(56, 189, 248, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
        }

        #fireworks-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <!-- Top Right Logo -->
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">

    <!-- Space Background -->
    <div class="sky-bg" id="sky"></div>
    <div class="moon-surface" id="moon"></div>
    <canvas id="fireworks-canvas"></canvas>

    <!-- Start Screen -->
    <div id="screen-start" class="fixed inset-0 flex flex-col items-center justify-center z-50 p-6 text-center bg-slate-900/60 backdrop-blur-sm">
        <div class="floating mb-10">
            <h1 class="text-6xl md:text-8xl font-black italic tracking-tighter bg-clip-text text-transparent bg-gradient-to-b from-blue-300 via-indigo-300 to-purple-400 drop-shadow-[0_0_20px_rgba(168,85,247,0.6)] uppercase">
                Space Math
            </h1>
        </div>
        <p class="text-3xl md:text-4xl text-cyan-200 font-bold mb-12 drop-shadow-md">Cosmic Subtraction!</p>
        <button onclick="startGame()" class="btn-kids bg-gradient-to-b from-indigo-500 to-indigo-700 px-20 py-8 rounded-full text-4xl font-black border-b-8 border-indigo-900 uppercase tracking-widest hover:scale-105 transition-transform text-white text-shadow-sm ring-4 ring-indigo-300/50">
            LAUNCH NOW
        </button>
    </div>

    <div id="screen-game" class="hidden h-screen flex flex-col p-4 w-full relative z-10 overflow-hidden">
        
        <!-- Header: Stats Left, Instruction Center -->
        <div class="w-full flex items-start justify-between py-2 shrink-0 h-[100px]">
            <!-- Left Side: Stats -->
            <div class="flex flex-col md:flex-row items-start gap-2 md:gap-4 z-10">
                <div class="glass-panel px-4 py-2 rounded-2xl font-black text-xl flex items-center gap-2 border-yellow-400/50 border-2 text-slate-100">
                    <span class="text-yellow-400 text-shadow">LEVEL</span>
                    <span id="level-num" class="text-yellow-900 bg-yellow-400 px-3 py-1 rounded-xl">1</span>
                </div>
                <div class="glass-panel px-4 py-2 rounded-2xl font-black text-xl flex items-center gap-2 border-green-400/50 border-2 text-slate-100">
                    <span class="text-green-400 text-shadow">SCORE</span>
                    <span id="score-display" class="text-green-900 bg-green-400 px-3 py-1 rounded-xl">0</span>
                </div>
            </div>
            
            <!-- Centered: Instruction with Speaker -->
            <div class="absolute left-1/2 -translate-x-1/2 w-full max-w-[320px] md:max-w-lg z-20 flex flex-col items-center">
                <div class="glass-panel rounded-3xl shadow-2xl p-2 pl-4 pr-2 flex items-center justify-between w-full border-cyan-400 border-2 bg-slate-900/80">
                    <span id="instruction-text" class="text-white font-extrabold text-base md:text-xl text-center flex-1 drop-shadow-md">
                        <!-- Text injected via JS -->
                    </span>
                    <button onclick="playCurrentInstruction()" class="ml-2 w-12 h-12 md:w-14 md:h-14 bg-cyan-500 rounded-full flex items-center justify-center text-slate-900 pulse-speaker hover:bg-cyan-400 active:scale-95 transition-all shrink-0 border-b-4 border-cyan-700">
                        <svg class="w-6 h-6 md:w-8 md:h-8" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M13.5 4.06c0-1.336-1.616-2.005-2.56-1.06l-4.5 4.5H4.508c-1.141 0-2.318.664-2.66 1.905A9.76 9.76 0 001.5 12c0 .898.121 1.768.35 2.595.341 1.24 1.518 1.905 2.659 1.905h1.93l4.5 4.5c.945.945 2.561.276 2.561-1.06V4.06zM18.584 5.106a.75.75 0 011.06 0c3.808 3.807 3.808 9.98 0 13.788a.75.75 0 11-1.06-1.06 8.25 8.25 0 000-11.668.75.75 0 010-1.06z"/>
                            <path d="M15.932 7.757a.75.75 0 011.061 0 6 6 0 010 8.486.75.75 0 01-1.06-1.061 4.5 4.5 0 000-6.364.75.75 0 010-1.06z"/>
                        </svg>
                    </button>
                </div>
            </div>
            
            <!-- Right spacer -->
            <div class="w-20 md:w-48 shrink-0"></div>
        </div>

        <!-- Playground Area -->
        <div class="flex-1 w-full flex flex-col items-center justify-center gap-6 md:gap-10 pb-4">
            
            <!-- Items Container: Centered, wraps beautifully -->
            <div id="items-container" class="flex flex-wrap items-center justify-center gap-4 md:gap-8 w-full max-w-5xl min-h-[160px] md:min-h-[220px]">
                <!-- Items injected here -->
            </div>

            <!-- Equation Area -->
            <div class="glass-panel p-6 md:p-10 rounded-[40px] flex flex-wrap items-center justify-center gap-4 md:gap-10 w-full max-w-3xl border-purple-500/30">
                <div class="flex items-center gap-4 md:gap-8 text-6xl md:text-8xl font-black drop-shadow-2xl">
                    <span id="eq-start" class="text-white bg-slate-800/80 px-6 py-2 rounded-3xl border-4 border-slate-600">5</span>
                    <span class="text-red-400 font-bold">-</span>
                    <span id="eq-sub" class="text-yellow-300 bg-slate-800/80 px-6 py-2 rounded-3xl border-4 border-slate-600">2</span>
                    <span class="text-cyan-400 font-bold">=</span>
                    <div id="ans-slot" class="w-24 h-24 md:w-32 md:h-32 rounded-[30px] border-8 border-dashed border-cyan-500/50 flex items-center justify-center bg-cyan-950/40 text-cyan-300 transition-all">?</div>
                </div>
            </div>
        </div>

        <!-- Number Pad (Bottom) -->
        <div id="input-pad" class="hidden w-full max-w-3xl mx-auto grid grid-cols-3 sm:grid-cols-6 gap-3 md:gap-5 pb-6 shrink-0 z-20">
            <button onclick="submitAnswer(0)" class="btn-kids bg-slate-800 border-2 border-slate-600 py-4 rounded-3xl text-4xl font-black text-white border-b-8 hover:bg-slate-700 hover:border-cyan-400">0</button>
            <button onclick="submitAnswer(1)" class="btn-kids bg-slate-800 border-2 border-slate-600 py-4 rounded-3xl text-4xl font-black text-white border-b-8 hover:bg-slate-700 hover:border-cyan-400">1</button>
            <button onclick="submitAnswer(2)" class="btn-kids bg-slate-800 border-2 border-slate-600 py-4 rounded-3xl text-4xl font-black text-white border-b-8 hover:bg-slate-700 hover:border-cyan-400">2</button>
            <button onclick="submitAnswer(3)" class="btn-kids bg-slate-800 border-2 border-slate-600 py-4 rounded-3xl text-4xl font-black text-white border-b-8 hover:bg-slate-700 hover:border-cyan-400">3</button>
            <button onclick="submitAnswer(4)" class="btn-kids bg-slate-800 border-2 border-slate-600 py-4 rounded-3xl text-4xl font-black text-white border-b-8 hover:bg-slate-700 hover:border-cyan-400">4</button>
            <button onclick="submitAnswer(5)" class="btn-kids bg-slate-800 border-2 border-slate-600 py-4 rounded-3xl text-4xl font-black text-white border-b-8 hover:bg-slate-700 hover:border-cyan-400">5</button>
        </div>
    </div>

    <!-- Success Feedback Overlay -->
    <div id="overlay-success" class="hidden fixed inset-0 z-[60] bg-slate-950/80 backdrop-blur-md flex flex-col items-center justify-center p-6 text-center">
        <div class="floating text-9xl mb-8">🚀</div>
        <h2 class="text-7xl md:text-8xl font-black text-green-400 mb-12 drop-shadow-[0_0_30px_rgba(74,222,128,0.5)]">STELLAR!</h2>
        <button onclick="nextLevel()" class="btn-kids bg-gradient-to-b from-cyan-400 to-cyan-600 px-20 py-6 rounded-full text-4xl font-black border-b-8 border-cyan-800 uppercase text-slate-900">
            NEXT MISSION
        </button>
    </div>

    <!-- Final Summary Screen -->
    <div id="screen-end" class="hidden fixed inset-0 z-[70] bg-slate-900/95 backdrop-blur-lg flex flex-col items-center justify-center p-8 text-center">
        <div class="floating text-9xl mb-6 z-10">🌍</div>
        <h2 class="text-6xl md:text-8xl font-black mb-4 text-white uppercase drop-shadow-[0_0_20px_rgba(255,255,255,0.5)] z-10">GALAXY HERO!</h2>
        <p class="text-3xl text-yellow-300 mb-8 font-black uppercase tracking-widest z-10">Mission Complete</p>
        
        <div class="glass-panel p-10 rounded-[50px] mb-10 w-full max-w-md border-4 border-yellow-400/50 bg-slate-800/80 z-10 transform scale-110 shadow-[0_0_50px_rgba(250,204,21,0.3)]">
            <p class="text-2xl text-cyan-300 font-black uppercase mb-2">Total Stars</p>
            <p id="final-score" class="text-8xl font-black text-yellow-400 drop-shadow-md">0</p>
        </div>
        
        <button onclick="location.reload()" class="btn-kids bg-white px-16 py-6 rounded-full text-3xl font-black border-b-8 border-slate-400 text-slate-900 z-10 hover:bg-slate-200">
            PLAY AGAIN
        </button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let currentInstructionRawText = "";
        let audioUnlocked = false;

        function unlockAudio() {
            if (audioUnlocked) return;
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                osc.connect(audioCtx.destination);
                osc.start(0); osc.stop(audioCtx.currentTime + 0.001);
                
                if ('speechSynthesis' in window) {
                    const u = new SpeechSynthesisUtterance('');
                    u.volume = 0;
                    window.speechSynthesis.speak(u);
                }
                audioUnlocked = true;
            } catch(e) {}
        }

        function playSound(type) {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                
                if (type === 'pop') {
                    // Futuristic beep for space
                    osc.type = 'sine'; 
                    osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
                } else if (type === 'success') {
                    // Cosmic success chime
                    [440, 554.37, 659.25, 880].forEach((f, i) => { // A4, C#5, E5, A5
                        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                        o.connect(g); g.connect(audioCtx.destination);
                        o.type = 'square'; o.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.1);
                        g.gain.setValueAtTime(0.1, audioCtx.currentTime + i*0.1);
                        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i*0.1 + 0.4);
                        o.start(audioCtx.currentTime + i*0.1); o.stop(audioCtx.currentTime + i*0.1 + 0.4);
                    });
                } else if (type === 'fail') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
                }
            } catch(e){}
        }

        function playVoice(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.9; 
                utterance.pitch = 1.1; 
                utterance.lang = 'en-US';
                window.speechSynthesis.speak(utterance);
            }
        }

        function playCurrentInstruction() {
            playVoice(currentInstructionRawText);
        }

        const svgs = {
            rocket: `<svg viewBox="0 0 100 100"><defs><linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#e2e8f0"/><stop offset="50%" stop-color="#ffffff"/><stop offset="100%" stop-color="#94a3b8"/></linearGradient><linearGradient id="window" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#38bdf8"/><stop offset="100%" stop-color="#0369a1"/></linearGradient><linearGradient id="fire" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#fef08a"/><stop offset="50%" stop-color="#f97316"/><stop offset="100%" stop-color="#ef4444"/></linearGradient></defs><path d="M30 60 L10 90 L35 85 Z" fill="#b91c1c"/><path d="M70 60 L90 90 L65 85 Z" fill="#7f1d1d"/><path d="M45 85 L50 100 L55 85 Z" fill="url(#fire)"><animate attributeName="d" values="M45 85 L50 100 L55 85 Z; M45 85 L50 110 L55 85 Z; M45 85 L50 100 L55 85 Z" dur="0.1s" repeatCount="indefinite"/></path><path d="M50 5 C75 30 75 80 65 90 L35 90 C25 80 25 30 50 5 Z" fill="url(#body)"/><circle cx="50" cy="40" r="12" fill="#1e293b"/><circle cx="50" cy="40" r="10" fill="url(#window)"/><path d="M43 35 Q50 30 57 35 Q50 40 43 35 Z" fill="white" opacity="0.5"/></svg>`,
            astronaut: `<svg viewBox="0 0 100 100"><defs><linearGradient id="suit" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#cbd5e1"/></linearGradient><linearGradient id="visor" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0f172a"/><stop offset="50%" stop-color="#1e293b"/><stop offset="100%" stop-color="#fbbf24"/></linearGradient></defs><rect x="25" y="15" width="50" height="55" rx="20" fill="url(#suit)" stroke="#475569" stroke-width="2"/><rect x="32" y="22" width="36" height="26" rx="10" fill="url(#visor)"/><path d="M36 28 Q50 22 64 28 Q50 32 36 28 Z" fill="white" opacity="0.4"/><circle cx="55" cy="35" r="2" fill="white" opacity="0.8"/><rect x="35" y="55" width="30" height="15" rx="4" fill="#e2e8f0" stroke="#94a3b8"/><circle cx="40" cy="62" r="3" fill="#ef4444"/><circle cx="50" cy="62" r="3" fill="#3b82f6"/><circle cx="60" cy="62" r="3" fill="#eab308"/><path d="M25 40 Q15 50 25 60" stroke="#94a3b8" stroke-width="4" fill="none"/><path d="M75 40 Q85 50 75 60" stroke="#94a3b8" stroke-width="4" fill="none"/></svg>`,
            rover: `<svg viewBox="0 0 100 100"><defs><linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fcd34d"/><stop offset="100%" stop-color="#b45309"/></linearGradient><linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#1e3a8a"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient></defs><circle cx="25" cy="75" r="12" fill="#1e293b" stroke="#64748b" stroke-width="3" stroke-dasharray="4 2"/><circle cx="50" cy="75" r="12" fill="#1e293b" stroke="#64748b" stroke-width="3" stroke-dasharray="4 2"/><circle cx="75" cy="75" r="12" fill="#1e293b" stroke="#64748b" stroke-width="3" stroke-dasharray="4 2"/><rect x="20" y="45" width="60" height="25" rx="4" fill="url(#gold)"/><rect x="25" y="40" width="50" height="5" fill="#94a3b8"/><rect x="30" y="38" width="40" height="4" fill="url(#panel)"/><line x1="35" y1="38" x2="35" y2="42" stroke="white" stroke-width="1" opacity="0.5"/><line x1="45" y1="38" x2="45" y2="42" stroke="white" stroke-width="1" opacity="0.5"/><line x1="55" y1="38" x2="55" y2="42" stroke="white" stroke-width="1" opacity="0.5"/><line x1="65" y1="38" x2="65" y2="42" stroke="white" stroke-width="1" opacity="0.5"/><rect x="70" y="20" width="4" height="25" fill="#cbd5e1"/><rect x="65" y="15" width="14" height="10" rx="2" fill="#0f172a"/><circle cx="69" cy="20" r="3" fill="#38bdf8"/></svg>`,
            alien: `<svg viewBox="0 0 100 100"><defs><radialGradient id="alienSkin" cx="50%" cy="30%" r="70%"><stop offset="0%" stop-color="#86efac"/><stop offset="100%" stop-color="#166534"/></radialGradient></defs><path d="M40 30 Q30 15 20 20" stroke="#166534" stroke-width="3" fill="none"/><circle cx="20" cy="20" r="4" fill="#fef08a"/><path d="M60 30 Q70 15 80 20" stroke="#166534" stroke-width="3" fill="none"/><circle cx="80" cy="20" r="4" fill="#fef08a"/><path d="M20 50 Q20 10 50 10 T80 50 Q80 90 50 90 T20 50 Z" fill="url(#alienSkin)"/><ellipse cx="35" cy="50" rx="12" ry="18" fill="#020617" transform="rotate(-15 35 50)"/><ellipse cx="65" cy="50" rx="12" ry="18" fill="#020617" transform="rotate(15 65 50)"/><circle cx="38" cy="45" r="3" fill="white" opacity="0.8"/><circle cx="62" cy="45" r="3" fill="white" opacity="0.8"/><path d="M45 75 Q50 80 55 75" stroke="#14532d" stroke-width="3" fill="none" stroke-linecap="round"/><circle cx="50" cy="25" r="3" fill="#14532d" opacity="0.3"/><circle cx="40" cy="20" r="2" fill="#14532d" opacity="0.3"/><circle cx="60" cy="20" r="4" fill="#14532d" opacity="0.3"/></svg>`,
            ufo: `<svg viewBox="0 0 100 100"><defs><linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#e2e8f0"/><stop offset="50%" stop-color="#94a3b8"/><stop offset="100%" stop-color="#475569"/></linearGradient><linearGradient id="dome" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#38bdf8" stop-opacity="0.8"/><stop offset="100%" stop-color="#0284c7" stop-opacity="0.3"/></linearGradient></defs><polygon points="40,70 60,70 80,100 20,100" fill="#fef08a" opacity="0.3"><animate attributeName="opacity" values="0.1;0.4;0.1" dur="1s" repeatCount="indefinite"/></polygon><path d="M30 50 C30 20 70 20 70 50 Z" fill="url(#dome)"/><circle cx="50" cy="40" r="8" fill="#4ade80"/><ellipse cx="47" cy="38" rx="2" ry="3" fill="black"/><ellipse cx="53" cy="38" rx="2" ry="3" fill="black"/><ellipse cx="50" cy="60" rx="45" ry="15" fill="url(#metal)"/><circle cx="15" cy="60" r="3" fill="#ef4444"><animate attributeName="fill" values="#ef4444;#fca5a5;#ef4444" dur="0.5s" repeatCount="indefinite"/></circle><circle cx="32" cy="65" r="3" fill="#3b82f6"><animate attributeName="fill" values="#3b82f6;#93c5fd;#3b82f6" dur="0.5s" begin="0.1s" repeatCount="indefinite"/></circle><circle cx="50" cy="68" r="3" fill="#22c55e"><animate attributeName="fill" values="#22c55e;#86efac;#22c55e" dur="0.5s" begin="0.2s" repeatCount="indefinite"/></circle><circle cx="68" cy="65" r="3" fill="#eab308"><animate attributeName="fill" values="#eab308;#fde047;#eab308" dur="0.5s" begin="0.3s" repeatCount="indefinite"/></circle><circle cx="85" cy="60" r="3" fill="#a855f7"><animate attributeName="fill" values="#a855f7;#d8b4fe;#a855f7" dur="0.5s" begin="0.4s" repeatCount="indefinite"/></circle></svg>`,
            saturn: `<svg viewBox="0 0 100 100"><defs><linearGradient id="planet" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fcd34d"/><stop offset="50%" stop-color="#d97706"/><stop offset="100%" stop-color="#78350f"/></linearGradient><linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fef08a"/><stop offset="100%" stop-color="#b45309"/></linearGradient></defs><path d="M10 50 A 45 15 0 0 1 90 50" fill="none" stroke="url(#ring)" stroke-width="8" opacity="0.6"/><circle cx="50" cy="50" r="30" fill="url(#planet)"/><path d="M22 40 Q50 45 78 40" stroke="#b45309" stroke-width="4" fill="none" opacity="0.5"/><path d="M20 50 Q50 55 80 50" stroke="#fef08a" stroke-width="3" fill="none" opacity="0.4"/><path d="M22 60 Q50 65 78 60" stroke="#78350f" stroke-width="5" fill="none" opacity="0.5"/><path d="M10 50 A 45 15 0 0 0 90 50" fill="none" stroke="url(#ring)" stroke-width="10"/><path d="M15 50 A 40 12 0 0 0 85 50" fill="none" stroke="#fef08a" stroke-width="2" opacity="0.8"/></svg>`,
            comet: `<svg viewBox="0 0 100 100"><defs><linearGradient id="tail" x1="100%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#38bdf8" stop-opacity="0"/><stop offset="50%" stop-color="#818cf8" stop-opacity="0.5"/><stop offset="100%" stop-color="#fdf4ff" stop-opacity="1"/></linearGradient><radialGradient id="rock" cx="30%" cy="30%" r="70%"><stop offset="0%" stop-color="#d1d5db"/><stop offset="100%" stop-color="#475569"/></radialGradient></defs><path d="M30 30 L95 10 Q60 50 95 90 L30 30 Z" fill="url(#tail)"/><circle cx="35" cy="35" r="20" fill="url(#rock)"/><ellipse cx="25" cy="30" rx="4" ry="6" fill="#1e293b" opacity="0.5" transform="rotate(45 25 30)"/><circle cx="42" cy="25" r="3" fill="#1e293b" opacity="0.4"/><circle cx="35" cy="45" r="5" fill="#1e293b" opacity="0.6"/><circle cx="35" cy="35" r="22" fill="none" stroke="#bae6fd" stroke-width="2" opacity="0.6"/></svg>`,
            earth: `<svg viewBox="0 0 100 100"><defs><radialGradient id="ocean" cx="40%" cy="40%" r="60%"><stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#1e3a8a"/></radialGradient><radialGradient id="earthShadow" cx="50%" cy="50%" r="50%"><stop offset="70%" stop-color="transparent"/><stop offset="100%" stop-color="rgba(0,0,0,0.6)"/></radialGradient></defs><circle cx="50" cy="50" r="40" fill="url(#ocean)"/><path d="M25 40 Q40 20 50 30 T75 40 Q80 60 65 70 T35 65 Z" fill="#22c55e" opacity="0.8"/><path d="M50 80 Q60 90 70 85 T85 60 Q75 70 60 70 Z" fill="#22c55e" opacity="0.8"/><path d="M15 55 Q20 45 30 50 T25 70 Z" fill="#22c55e" opacity="0.8"/><circle cx="50" cy="50" r="40" fill="url(#earthShadow)"/><path d="M20 30 Q50 10 80 30" stroke="white" stroke-width="2" fill="none" opacity="0.3"/></svg>`,
            satellite: `<svg viewBox="0 0 100 100"><defs><linearGradient id="solar" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1e40af"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient></defs><rect x="10" y="40" width="25" height="20" fill="url(#solar)" stroke="#60a5fa" stroke-width="1"/><line x1="18" y1="40" x2="18" y2="60" stroke="#60a5fa" stroke-width="1"/><line x1="26" y1="40" x2="26" y2="60" stroke="#60a5fa" stroke-width="1"/><rect x="65" y="40" width="25" height="20" fill="url(#solar)" stroke="#60a5fa" stroke-width="1"/><line x1="73" y1="40" x2="73" y2="60" stroke="#60a5fa" stroke-width="1"/><line x1="81" y1="40" x2="81" y2="60" stroke="#60a5fa" stroke-width="1"/><rect x="35" y="45" width="30" height="10" fill="#94a3b8"/><circle cx="50" cy="50" r="12" fill="#e2e8f0"/><circle cx="50" cy="50" r="6" fill="#0f172a"/><path d="M50 38 L40 20 L60 20 Z" fill="none" stroke="#cbd5e1" stroke-width="2"/><circle cx="50" cy="18" r="3" fill="#ef4444"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></circle></svg>`,
            asteroid: `<svg viewBox="0 0 100 100"><defs><radialGradient id="rockGrad" cx="40%" cy="30%" r="60%"><stop offset="0%" stop-color="#94a3b8"/><stop offset="100%" stop-color="#334155"/></radialGradient></defs><path d="M30 20 L60 15 L85 35 L80 70 L50 90 L20 80 L10 50 Z" fill="url(#rockGrad)"/><circle cx="35" cy="40" r="8" fill="#1e293b" opacity="0.6"/><circle cx="65" cy="55" r="12" fill="#1e293b" opacity="0.6"/><circle cx="45" cy="70" r="6" fill="#1e293b" opacity="0.6"/><circle cx="70" cy="30" r="5" fill="#1e293b" opacity="0.6"/><path d="M30 20 Q40 30 50 25" stroke="#cbd5e1" stroke-width="2" fill="none" opacity="0.4"/></svg>`
        };

        const levels = [
            { s: 3, b: 1, icon: 'rocket', style: 'border-red-500/50 hover:shadow-red-500/30' },
            { s: 4, b: 2, icon: 'astronaut', style: 'border-blue-400/50 hover:shadow-blue-400/30' },
            { s: 5, b: 3, icon: 'rover', style: 'border-orange-400/50 hover:shadow-orange-400/30' },
            { s: 2, b: 1, icon: 'alien', style: 'border-green-400/50 hover:shadow-green-400/30' },
            { s: 4, b: 4, icon: 'ufo', style: 'border-purple-500/50 hover:shadow-purple-500/30' },
            { s: 3, b: 0, icon: 'saturn', style: 'border-yellow-400/50 hover:shadow-yellow-400/30' },
            { s: 5, b: 2, icon: 'earth', style: 'border-cyan-400/50 hover:shadow-cyan-400/30' },
            { s: 4, b: 1, icon: 'comet', style: 'border-indigo-400/50 hover:shadow-indigo-400/30' },
            { s: 2, b: 2, icon: 'satellite', style: 'border-blue-300/50 hover:shadow-blue-300/30' },
            { s: 5, b: 4, icon: 'asteroid', style: 'border-slate-400/50 hover:shadow-slate-400/30' }
        ];

        let currentLvl = 0;
        let score = 0;
        let itemsRemoved = 0;
        let isLocked = false;

        function setupWorld() {
            const sky = document.getElementById('sky');
            const moon = document.getElementById('moon');
            if(!sky || !moon) return;
            
            // Stars
            for (let i = 0; i < 80; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const size = Math.random() * 3 + 1;
                s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${Math.random()*3+2}s;`;
                sky.appendChild(s);
            }
            
            // Nebula Clouds
            for (let i = 0; i < 5; i++) {
                const c = document.createElement('div');
                c.className = 'nebula-cloud';
                c.style.cssText = `width:${Math.random()*250+150}px;height:${Math.random()*80+40}px;left:${Math.random()*100}%;top:${Math.random()*70}%;--d:${Math.random()*30+20}s; background: rgba(${Math.random()*100+50}, ${Math.random()*50}, ${Math.random()*150+100}, 0.15);`;
                sky.appendChild(c);
            }
            
            // Moon Craters
            for (let i = 0; i < 15; i++) {
                const cr = document.createElement('div');
                cr.className = 'crater';
                cr.style.cssText = `width:${Math.random()*50+20}px;height:${Math.random()*20+10}px;left:${Math.random()*100}%;top:${Math.random()*150+10}px;`;
                moon.appendChild(cr);
            }
        }

        function startGame() {
            unlockAudio();
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            loadLevel();
        }

        function loadLevel() {
            const l = levels[currentLvl];
            itemsRemoved = 0;
            isLocked = false;
            
            // Update Stats
            document.getElementById('level-num').innerText = currentLvl + 1;
            document.getElementById('score-display').innerText = score;
            document.getElementById('eq-start').innerText = l.s;
            document.getElementById('eq-sub').innerText = l.b;
            
            // Reset Slot
            const slot = document.getElementById('ans-slot');
            slot.innerText = "?";
            slot.className = "w-24 h-24 md:w-32 md:h-32 rounded-[30px] border-8 border-dashed border-cyan-500/50 flex items-center justify-center bg-cyan-950/40 text-cyan-300 transition-all";
            
            document.getElementById('input-pad').classList.add('hidden');
            
            // Instructions
            const instBox = document.getElementById('instruction-text');
            if (l.b === 0) {
                instBox.innerHTML = `Keep them all! Subtract <span class='text-red-400'>0</span>`;
                currentInstructionRawText = "Keep them all! Subtract zero.";
            } else {
                instBox.innerHTML = `Tap <span class="text-red-400 text-2xl md:text-3xl mx-1">${l.b}</span> to subtract!`;
                currentInstructionRawText = `Tap ${l.b} items to subtract them.`;
            }

            // Render Items
            const container = document.getElementById('items-container');
            container.innerHTML = "";
            
            for (let i = 0; i < l.s; i++) {
                const card = document.createElement('div');
                card.className = `item-card w-20 h-20 md:w-28 md:h-28 p-2 md:p-3 rounded-3xl border-2 cursor-pointer shadow-lg flex items-center justify-center ${l.style}`;
                card.innerHTML = svgs[l.icon];
                card.onclick = () => subtractActivity(card);
                container.appendChild(card);
            }

            setTimeout(playCurrentInstruction, 500);
            if (l.b === 0) setTimeout(showInput, 1500);
        }

        function subtractActivity(el) {
            if (isLocked) return;
            const l = levels[currentLvl];
            
            if (itemsRemoved < l.b && !el.classList.contains('dimmed')) {
                playSound('pop');
                el.classList.add('dimmed');
                itemsRemoved++;
                
                if (itemsRemoved === l.b) {
                    setTimeout(showInput, 600);
                }
            }
        }

        function showInput() {
            document.getElementById('instruction-text').innerHTML = `How many are left? <span class='text-cyan-400'>Choose!</span>`;
            currentInstructionRawText = "How many items are left? Choose the correct number below.";
            playCurrentInstruction();
            document.getElementById('input-pad').classList.remove('hidden');
        }

        function submitAnswer(val) {
            if (isLocked) return;
            const l = levels[currentLvl];
            const correct = l.s - l.b;
            const slot = document.getElementById('ans-slot');
            
            slot.innerText = val;
            
            if (val === correct) {
                isLocked = true;
                playSound('success');
                score += 100;
                
                // Success styling for Space theme
                slot.className = "w-24 h-24 md:w-32 md:h-32 rounded-[30px] border-8 border-green-400 flex items-center justify-center bg-green-500 text-white shadow-[0_0_30px_rgba(74,222,128,0.6)] transform scale-110";
                
                setTimeout(() => {
                    document.getElementById('overlay-success').classList.remove('hidden');
                }, 1000);
            } else {
                playSound('fail');
                slot.classList.add('shake');
                slot.classList.replace('text-cyan-300', 'text-red-400');
                slot.classList.replace('border-cyan-500/50', 'border-red-500/80');
                
                setTimeout(() => {
                    slot.classList.remove('shake');
                    slot.classList.replace('text-red-400', 'text-cyan-300');
                    slot.classList.replace('border-red-500/80', 'border-cyan-500/50');
                    slot.innerText = "?";
                }, 500);
            }
        }

        function nextLevel() {
            document.getElementById('overlay-success').classList.add('hidden');
            currentLvl++;
            if (currentLvl < levels.length) {
                loadLevel();
            } else {
                showEnd();
            }
        }

        function showEnd() {
            document.getElementById('screen-game').classList.add('hidden');
            document.getElementById('screen-end').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            playSound('success');
            setTimeout(() => playVoice("You are a galaxy hero! Mission complete!"), 500);
            startFireworks();
        }

        // Space Fireworks Canvas
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        let parts = [];

        function resizeCanvas() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 6 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.015;
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fill();
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05; // gravity
                this.alpha -= this.decay;
            }
        }

        function startFireworks() {
            function createExplosion(x, y) {
                const hue = Math.random() * 360;
                for (let i = 0; i < 50; i++) {
                    const color = `hsl(${hue}, 100%, 60%)`;
                    parts.push(new Particle(x, y, color));
                }
            }
            
            function loop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Random explosions
                if (Math.random() < 0.05) {
                    createExplosion(Math.random() * canvas.width, Math.random() * canvas.height * 0.6);
                }
                
                parts.forEach((p, index) => {
                    p.update();
                    p.draw();
                    if (p.alpha <= 0) {
                        parts.splice(index, 1);
                    }
                });
                
                requestAnimationFrame(loop);
            }
            
            // Initial blast
            createExplosion(canvas.width/2, canvas.height/2);
            loop();
        }

        window.onload = setupWorld;
    </script>
</body>
