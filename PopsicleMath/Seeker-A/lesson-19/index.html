<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2D Shape Quest V8!</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Poppins:wght@500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            /* Vibrant Duolingo color palette */
            --bg-sky-top: #1cb0f6;
            --bg-sky-bottom: #8fe0ff;
            --c-green: #58cc02;
            --c-green-shadow: #58a700;
            --c-blue: #1cb0f6;
            --c-blue-shadow: #1899d6;
            --c-yellow: #ffc800;
            --c-yellow-shadow: #e5b400;
            --c-red: #ff4b4b;
            --c-red-shadow: #ea1515;
            --c-purple: #ce82ff;
            --c-purple-shadow: #a568cc;
            --text-dark: #3c3c3c;
            --text-light: #afafaf;
            --font-main: 'Nunito', 'Poppins', sans-serif;
            --card-bg: #ffffff;
            --card-border: #f8fafc;
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-main);
            background: linear-gradient(180deg, var(--bg-sky-top) 0%, var(--bg-sky-bottom) 100%);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            height: 100vh; overflow: hidden; touch-action: none;
            color: var(--text-dark);
        }

        /* Landscape Background Fixed to bottom */
        .scenery {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            z-index: -2; pointer-events: none;
            display: flex; flex-direction: column; justify-content: flex-end;
        }
        .hill-back {
            position: absolute; bottom: 0; left: -10%; right: -10%; height: 50vh;
            background: #71df1e; border-radius: 50% 50% 0 0 / 15% 15% 0 0;
            z-index: 1;
        }
        .hill-front {
            position: absolute; bottom: 0; left: -20%; right: -20%; height: 40vh;
            background: #58cc02; border-radius: 50% 50% 0 0 / 15% 15% 0 0;
            z-index: 2; border-top: 15px solid #89e219;
        }
        
        .clouds { position: fixed; inset: 0; pointer-events: none; z-index: -1; }
        .cloud {
            position: absolute; background: #ffffff; border-radius: 100px;
            animation: float linear infinite; 
            box-shadow: 0 10px 0 rgba(255, 255, 255, 0.3); /* Chunky highlight */
        }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: #ffffff; border-radius: 50%; }
        @keyframes float { from { transform: translateX(-300px); } to { transform: translateX(calc(100vw + 300px)); } }

        /* Chunky Header */
        header {
            width: 100%; max-width: 950px;
            background: rgba(255, 255, 255, 0.95); padding: 12px 30px;
            border-radius: 30px;
            display: flex; justify-content: space-between; align-items: center;
            border: 4px solid #ffffff;
            border-bottom: 8px solid #e2e8f0;
            margin-bottom: 10px; z-index: 10;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .title-text { 
            font-weight: 900; 
            font-size: 2rem; 
            letter-spacing: 1px; 
            text-transform: uppercase; 
            color: var(--c-blue);
            filter: drop-shadow(0 2px 2px rgba(28, 176, 246, 0.3));
        }

        .score-box {
            background: var(--c-yellow); 
            color: white; padding: 8px 28px;
            border-radius: 24px; font-weight: 900; font-size: 1.5rem;
            border-bottom: 5px solid var(--c-yellow-shadow);
            text-shadow: 1px 2px 0 rgba(0,0,0,0.15);
            display: flex; align-items: center; gap: 8px;
        }

        /* Main Game Area */
        main {
            width: 100%; max-width: 950px; flex: 1;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; z-index: 10;
        }

        .question-card {
            background: white; width: 100%; border-radius: 36px; padding: 25px 40px;
            border: 4px solid #ffffff; border-bottom: 10px solid #e2e8f0;
            display: flex; align-items: center; justify-content: center; gap: 25px;
            margin-bottom: 35px; box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            position: relative;
        }

        .question-text {
            font-size: 2.8rem; font-weight: 900; color: var(--text-dark); text-align: center;
            letter-spacing: -0.5px;
        }

        .speaker-btn {
            background: var(--c-blue); 
            border: none; border-radius: 24px;
            width: 75px; height: 75px; font-size: 2.4rem; cursor: pointer; color: white;
            border-bottom: 6px solid var(--c-blue-shadow);
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.1s; flex-shrink: 0;
            box-shadow: 0 8px 20px rgba(28, 176, 246, 0.3);
        }
        .speaker-btn:active { transform: translateY(6px); border-bottom-width: 0px; margin-top: 6px; }

        #game-content {
            width: 100%; display: flex; justify-content: center; align-items: center; gap: 30px; flex-wrap: wrap;
        }

        /* Enhanced Choice Cards */
        .choice-card {
            background: var(--card-bg); border-radius: 36px; cursor: pointer;
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid #ffffff; border-bottom: 12px solid #e2e8f0;
            width: 280px; height: 350px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
            box-shadow: 0 15px 30px rgba(0,0,0,0.06);
        }
        .choice-card:hover { transform: translateY(-10px); border-color: #f1f5f9; box-shadow: 0 25px 40px rgba(0,0,0,0.1); }
        .choice-card:active { transform: translateY(8px); border-bottom-width: 4px; margin-top: 8px;}

        .choice-card.correct { 
            border-color: #bbf7d0; background: #f0fdf4; 
            border-bottom-color: var(--c-green-shadow); 
        }
        .choice-card.wrong { 
            border-color: #fecdd3; background: #fff1f2; 
            border-bottom-color: var(--c-red-shadow); opacity: 0.6; pointer-events: none;
        }

        .choice-card canvas {
            width: 240px !important; height: 240px !important;
            filter: drop-shadow(0 20px 20px rgba(0,0,0,0.15));
        }

        /* Overlays */
        .overlay {
            position: fixed; inset: 0; background: rgba(255,255,255,0.92);
            z-index: 500; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
            backdrop-filter: blur(12px);
        }

        .start-btn {
            background: var(--c-green); color: white; border: none;
            padding: 22px 65px; font-size: 2.2rem; font-weight: 900;
            border-radius: 35px; cursor: pointer; border-bottom: 10px solid var(--c-green-shadow);
            text-transform: uppercase; letter-spacing: 2px; transition: transform 0.1s;
            box-shadow: 0 12px 30px rgba(88, 204, 2, 0.4);
        }
        .start-btn:active { transform: translateY(10px); border-bottom-width: 0px; margin-top: 10px; }

        .start-btn.blue { 
            background: var(--c-blue);
            border-bottom-color: var(--c-blue-shadow); 
            box-shadow: 0 12px 30px rgba(28, 176, 246, 0.4);
        }

        /* Star Catcher - Night Sky Fullscreen */
        #bonus-overlay {
            background: transparent;
            backdrop-filter: none;
            padding: 0;
        }
        #bonus-overlay .container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
            display: flex; flex-direction: column; align-items: center; padding-top: 40px;
        }
        #bonus-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; touch-action: none; cursor: grab;
        }
        #bonus-canvas:active { cursor: grabbing; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px; padding: 20px 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            color: white; pointer-events: auto;
        }

        .feedback {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 7rem; font-weight: 900; z-index: 1000; pointer-events: none; display: none;
            text-shadow: 0 20px 40px rgba(0,0,0,0.3);
            -webkit-text-stroke: 5px white;
        }

        .hidden { display: none !important; }

        #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 600; }

        /* Responsive Design */
        @media (max-width: 850px) {
            .choice-card { width: 30%; height: 280px; }
            .choice-card canvas { width: 100% !important; height: auto !important; aspect-ratio: 1/1; }
        }
        @media (max-width: 600px) {
            .question-text { font-size: 1.8rem; }
            .question-card { padding: 20px; margin-bottom: 2vh; flex-direction: column; gap: 15px; border-radius: 28px; border-bottom-width: 8px; }
            .choice-card { width: 45%; height: 240px; border-bottom-width: 8px; border-radius: 28px; }
            .start-btn { font-size: 1.8rem; padding: 18px 45px; border-radius: 28px; border-bottom-width: 8px; }
            header { padding: 12px 20px; border-radius: 24px; border-bottom-width: 6px; }
            .title-text { font-size: 1.5rem; }
            .hill-back { height: 60vh; }
            .hill-front { height: 48vh; }
            .speaker-btn { width: 60px; height: 60px; font-size: 1.8rem; border-radius: 20px; border-bottom-width: 5px; }
            .glass-panel { padding: 15px 20px; }
            .glass-panel h2 { font-size: 2.2rem !important; }
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <div class="scenery">
        <div class="hill-back"></div>
        <div class="hill-front"></div>
    </div>
    <div class="clouds" id="clouds-container"></div>

    <header>
        <div class="title-text">2D Shape Quest</div>
        <div class="score-box">⭐ <span id="score-val">0</span></div>
    </header>

    <main>
        <div class="question-card">
            <div id="question" class="question-text">Loading...</div>
            <button class="speaker-btn" onclick="speakTask()">🔊</button>
        </div>

        <div id="game-content"></div>

        <div id="feedback" class="feedback"></div>
    </main>

    <div id="start-overlay" class="overlay">
        <div style="font-size: 100px; margin-bottom: -10px; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.15));">🌟</div>
        <h1 style="font-size: 5rem; font-weight: 900; line-height: 1.1; text-transform: uppercase; color: var(--c-blue);">Shape Quest</h1>
        <p style="font-size: 1.8rem; color: var(--text-dark); margin-bottom: 45px; font-weight: 800;">Find the shapes to play the mini-game!</p>
        <button class="start-btn" onclick="startGame()">LET'S PLAY</button>
    </div>

    <!-- STAR CATCHER FULLSCREEN OVERLAY -->
    <div id="bonus-overlay" class="overlay hidden">
        <canvas id="bonus-canvas"></canvas>
        <div class="container">
            <div class="glass-panel" id="bonus-ui-panel">
                <h2 style="font-size: 3.5rem; color: #ffc800; font-weight: 900; text-transform: uppercase; margin: 0 0 5px 0; -webkit-text-stroke: 2px #d97706; text-shadow: 0 4px 10px rgba(0,0,0,0.5);">BONUS TIME! 🌟</h2>
                <p style="font-weight: 800; font-size: 1.4rem; margin: 0 0 20px 0; color: #e2e8f0;">Fill the glass jar with 15 stars!</p>
                
                <div style="display: flex; justify-content: space-between; width: 100%; margin-bottom: 15px; font-weight: 900; font-size: 1.8rem;">
                    <div style="color: #8fe0ff; text-shadow: 0 2px 5px rgba(0,0,0,0.5);">JAR: <span id="bonus-score">0</span>/15</div>
                </div>
                <button id="bonus-start-btn" class="start-btn blue" style="font-size: 1.6rem; padding: 15px 40px; margin-top: 10px;" onclick="startStarGame()">START CATCHING</button>
            </div>
        </div>
    </div>

    <div id="win-overlay" class="overlay hidden">
        <canvas id="confetti-canvas"></canvas>
        <div style="font-size: 130px; margin-bottom: 10px; filter: drop-shadow(0 25px 25px rgba(0,0,0,0.25));">🏆</div>
        <h1 style="font-size: 5rem; color: var(--c-green); font-weight: 900; text-transform: uppercase; -webkit-text-stroke: 2px var(--c-green-shadow);">AMAZING JOB!</h1>
        <div style="font-size: 3rem; font-weight: 900; color: var(--text-dark); margin-bottom: 50px;">Total Score: <span id="final-score" style="color: var(--c-yellow)">0</span> ⭐</div>
        <button class="start-btn blue" onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <script>
        // Flat 2D Geometries - Updated colors to be very bright and vibrant
        const SHAPES = [
            { id: 'square', name: 'Square', color: 0xff4b4b, geometry: () => new THREE.PlaneGeometry(4.5, 4.5) },
            { id: 'circle', name: 'Circle', color: 0x1cb0f6, geometry: () => new THREE.CircleGeometry(2.6, 64) },
            { id: 'triangle', name: 'Triangle', color: 0x58cc02, geometry: () => new THREE.CircleGeometry(3.6, 3, Math.PI/2) },
            { id: 'rectangle', name: 'Rectangle', color: 0xffc800, geometry: () => new THREE.PlaneGeometry(6.5, 3.8) },
            { id: 'half_circle', name: 'Half Circle', color: 0xce82ff, geometry: () => { const g = new THREE.CircleGeometry(3.5, 64, 0, Math.PI); g.translate(0, -1.2, 0); return g; } },
            { id: 'quarter_circle', name: 'Quarter Circle', color: 0xff9600, geometry: () => { const g = new THREE.CircleGeometry(4.5, 64, 0, Math.PI/2); g.translate(-1.8, -1.8, 0); return g; } }
        ];

        let state = {
            score: 0,
            currentIdx: 0,
            questions: [],
            isLocked: false,
            soundInited: false
        };

        let synth;

        function initClouds() {
            const container = document.getElementById('clouds-container');
            for(let i=0; i<8; i++) {
                const c = document.createElement('div');
                c.className = 'cloud';
                const w = 150 + Math.random()*200;
                c.style.width = w + 'px';
                c.style.height = w*0.4 + 'px';
                c.style.top = (5 + Math.random()*35) + '%';
                c.style.left = '-400px';
                c.style.animationDuration = (30 + Math.random()*40) + 's';
                c.style.animationDelay = (Math.random()*25) + 's';
                
                const b1 = document.createElement('div');
                b1.style.width = w*0.5 + 'px'; b1.style.height = w*0.5 + 'px';
                b1.style.top = -w*0.2 + 'px'; b1.style.left = w*0.1 + 'px';
                b1.style.borderRadius = '50%'; b1.style.background = '#ffffff'; b1.style.position = 'absolute';
                
                const b2 = document.createElement('div');
                b2.style.width = w*0.4 + 'px'; b2.style.height = w*0.4 + 'px';
                b2.style.top = -w*0.15 + 'px'; b2.style.right = w*0.15 + 'px';
                b2.style.borderRadius = '50%'; b2.style.background = '#ffffff'; b2.style.position = 'absolute';

                c.appendChild(b1); c.appendChild(b2);
                container.appendChild(c);
            }
        }
        initClouds();

        function startGame() {
            if(!synth) {
                synth = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: "triangle" },
                    envelope: { attack: 0.05, decay: 0.2, sustain: 0.2, release: 1 }
                }).toDestination();
                synth.volume.value = -5;
            }
            Tone.start();
            state.soundInited = true;
            document.getElementById('start-overlay').classList.add('hidden');
            startLevel1();
        }

        function startLevel1() {
            state.currentIdx = 0;
            state.questions = [...SHAPES].sort(() => Math.random() - 0.5);
            loadNext();
        }

        function loadNext() {
            state.isLocked = false;
            const target = state.questions[state.currentIdx];
            const choices = [target];
            while(choices.length < 3) {
                const r = SHAPES[Math.floor(Math.random()*SHAPES.length)];
                if(!choices.find(c => c.id === r.id)) choices.push(r);
            }
            choices.sort(() => Math.random() - 0.5);

            document.getElementById('question').innerText = `Where is the ${target.name}?`;
            const container = document.getElementById('game-content');
            container.innerHTML = '';

            const cSize = 280; 

            choices.forEach(c => {
                const card = document.createElement('div');
                card.className = 'choice-card';
                const canvas = document.createElement('canvas');
                canvas.width = cSize; canvas.height = cSize;
                card.appendChild(canvas);
                container.appendChild(card);
                initMiniThree(canvas, c);
                card.onclick = () => handleChoice(c, card, target);
            });

            speakTask();
        }

        function initMiniThree(canvas, shapeData) {
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
            camera.position.z = 11;
            
            const mat = new THREE.MeshBasicMaterial({ 
                color: shapeData.color,
                side: THREE.DoubleSide
            });
            
            const mesh = new THREE.Mesh(shapeData.geometry(), mat);
            
            // Thicker bolder outlines for the Duolingo 2D cartoon look
            const edges = new THREE.EdgesGeometry(mesh.geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ 
                color: 0x2b2b2b, 
                linewidth: 6 
            }));
            mesh.add(line);

            mesh.rotation.x = 0;
            mesh.rotation.y = 0;
            scene.add(mesh);

            let time = Math.random() * 100;
            function animate() {
                if(!canvas.isConnected) return;
                requestAnimationFrame(animate);
                
                time += 0.05;
                mesh.position.y = Math.sin(time) * 0.25;
                mesh.rotation.z = Math.sin(time * 0.6) * 0.08;
                
                renderer.render(scene, camera);
            }
            animate();
        }

        function handleChoice(choice, card, target) {
            if(state.isLocked) return;
            state.isLocked = true;

            if(choice.id === target.id) {
                state.score += 10;
                document.getElementById('score-val').innerText = state.score;
                card.classList.add('correct');
                showFeedback("AWESOME! ✨", "var(--c-green)");
                
                if(synth) synth.triggerAttackRelease(["C5", "E5", "G5", "C6"], "8n");

                setTimeout(() => {
                    state.currentIdx++;
                    if(state.currentIdx >= state.questions.length) showBonusIntro();
                    else loadNext();
                }, 1500);
            } else {
                card.classList.add('wrong');
                showFeedback("OOPS!", "var(--c-red)");
                
                if(synth) synth.triggerAttackRelease("C3", "8n");
                
                setTimeout(() => {
                    card.classList.remove('wrong');
                    state.isLocked = false;
                }, 800);
            }
        }

        function showFeedback(text, color) {
            const fb = document.getElementById('feedback');
            fb.innerText = text;
            fb.style.color = color;
            fb.style.display = 'block';
            fb.animate([
                { transform: 'translate(-50%, -30%) scale(0.5)', opacity: 0 },
                { transform: 'translate(-50%, -50%) scale(1.2)', opacity: 1, offset: 0.2 },
                { transform: 'translate(-50%, -50%) scale(1)', opacity: 1, offset: 0.8 },
                { transform: 'translate(-50%, -70%) scale(0.8)', opacity: 0 }
            ], { duration: 1500, easing: 'cubic-bezier(0.175, 0.885, 0.32, 1.275)' });
            setTimeout(() => fb.style.display = 'none', 1400);
        }

        function speakTask() {
            if(!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(document.getElementById('question').innerText);
            utterance.lang = 'en-US';
            utterance.rate = 0.9; 
            utterance.pitch = 1.2; 
            window.speechSynthesis.speak(utterance);
        }

        // --- FULLSCREEN STAR CATCHER MINI GAME ---
        const bCanvas = document.getElementById('bonus-canvas');
        const bCtx = bCanvas.getContext('2d');
        let gameId, isPlaying = false, starsCaught = 0;
        const TARGET_STARS = 15;
        
        let jar = { x: 0, y: 0, w: 120, h: 140 };
        let stars = [];
        let hitParticles = [];
        let bgStars = [];

        function resizeBonusCanvas() {
            bCanvas.width = window.innerWidth;
            bCanvas.height = window.innerHeight;
            jar.y = window.innerHeight - jar.h - 50;
            if(jar.x === 0) jar.x = window.innerWidth / 2 - jar.w / 2;
        }
        window.addEventListener('resize', resizeBonusCanvas);

        function initBgStars() {
            bgStars = [];
            for(let i=0; i<150; i++) {
                bgStars.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    size: Math.random() * 2 + 0.5,
                    opacity: Math.random(),
                    twinkleSpeed: Math.random() * 0.05 + 0.01
                });
            }
        }

        function showBonusIntro() {
            resizeBonusCanvas();
            initBgStars();
            drawNightSky(); // Draw initially behind the UI
            document.getElementById('bonus-overlay').classList.remove('hidden');
            document.getElementById('bonus-ui-panel').classList.remove('hidden');
        }

        function startStarGame() {
            document.getElementById('bonus-ui-panel').classList.add('hidden'); // Hide instructions
            starsCaught = 0; stars = []; hitParticles = [];
            document.getElementById('bonus-score').innerText = starsCaught;
            isPlaying = true;
            updateStarGame();
        }

        // Move Glass Jar with Mouse/Touch directly mapped to screen
        function moveJar(e) {
            if(!isPlaying) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            jar.x = clientX - jar.w / 2;
            
            // Keep inside bounds
            if(jar.x < 0) jar.x = 0;
            if(jar.x > bCanvas.width - jar.w) jar.x = bCanvas.width - jar.w;
        }

        bCanvas.addEventListener('pointermove', moveJar);
        bCanvas.addEventListener('touchmove', moveJar, {passive: false});

        function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius, rot) {
            let rotStep = Math.PI / spikes;
            let x = cx, y = cy, angle = rot;
            ctx.beginPath();
            ctx.moveTo(cx + Math.cos(angle) * outerRadius, cy + Math.sin(angle) * outerRadius);
            for(let i=0; i<spikes; i++){
                x = cx + Math.cos(angle) * outerRadius;
                y = cy + Math.sin(angle) * outerRadius;
                ctx.lineTo(x, y);
                angle += rotStep;

                x = cx + Math.cos(angle) * innerRadius;
                y = cy + Math.sin(angle) * innerRadius;
                ctx.lineTo(x, y);
                angle += rotStep;
            }
            ctx.lineTo(cx + Math.cos(rot) * outerRadius, cy + Math.sin(rot) * outerRadius);
            ctx.closePath();
        }

        function drawNightSky() {
            // Vibrant Gradient Night Sky
            let grd = bCtx.createLinearGradient(0, 0, 0, bCanvas.height);
            grd.addColorStop(0, "#171558"); // Deep dark blue
            grd.addColorStop(1, "#4c1d95"); // Vibrant purple-blue
            bCtx.fillStyle = grd;
            bCtx.fillRect(0, 0, bCanvas.width, bCanvas.height);

            // Twinkling background stars
            bgStars.forEach(s => {
                s.opacity += s.twinkleSpeed;
                if(s.opacity > 1 || s.opacity < 0.2) s.twinkleSpeed *= -1;
                bCtx.globalAlpha = Math.abs(s.opacity);
                bCtx.fillStyle = "#ffffff";
                bCtx.beginPath();
                bCtx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                bCtx.fill();
            });
            bCtx.globalAlpha = 1.0;
        }

        function drawGlassJar(ctx) {
            ctx.save();
            ctx.translate(jar.x, jar.y);

            // 1. Glowing Starlight Fill inside the jar
            let fillRatio = Math.min(1, starsCaught / TARGET_STARS);
            let fillHeight = fillRatio * (jar.h - 30);
            
            if (fillHeight > 0) {
                // Glow aura
                ctx.shadowColor = "#fcd34d";
                ctx.shadowBlur = 25;
                // Gradient for magical liquid/light
                let fillGrd = ctx.createLinearGradient(0, jar.h - fillHeight, 0, jar.h);
                fillGrd.addColorStop(0, "rgba(255, 200, 0, 0.95)"); // Bright vibrant yellow
                fillGrd.addColorStop(1, "rgba(245, 158, 11, 0.85)"); // Warm Amber
                
                ctx.fillStyle = fillGrd;
                ctx.beginPath();
                // Fill matches the bottom rounded corners
                ctx.roundRect(10, jar.h - fillHeight - 10, jar.w - 20, fillHeight, [0, 0, 15, 15]);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Little static stars inside the fill to make it cute
                ctx.fillStyle = "#ffffff";
                for(let i=0; i<starsCaught; i++) {
                    let sx = 20 + (i * 37 % (jar.w - 40));
                    let sy = jar.h - 20 - (i * 17 % (fillHeight - 10));
                    drawStar(ctx, sx, sy, 5, 4, 2, 0);
                    ctx.fill();
                }
            }

            // 2. Back Glass (Translucent)
            ctx.fillStyle = "rgba(255, 255, 255, 0.15)";
            ctx.strokeStyle = "rgba(255, 255, 255, 0.7)";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.roundRect(0, 0, jar.w, jar.h, 24);
            ctx.fill();
            ctx.stroke();

            // 3. Thick Rim (Glass lip)
            ctx.fillStyle = "rgba(255, 255, 255, 0.35)";
            ctx.beginPath();
            ctx.roundRect(-8, -10, jar.w + 16, 20, 10);
            ctx.fill();
            ctx.stroke();

            // 4. Glass Glare / Reflection (The glossy look)
            ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
            ctx.beginPath();
            ctx.roundRect(12, 15, 18, jar.h - 40, 9);
            ctx.fill();
            
            ctx.beginPath();
            ctx.roundRect(jar.w - 20, 20, 6, jar.h - 50, 3);
            ctx.fill();

            // Score Badge floating next to jar
            ctx.fillStyle = "#ffffff";
            ctx.font = "900 24px 'Nunito', sans-serif";
            ctx.textAlign = "center";
            ctx.shadowColor = "rgba(0,0,0,0.5)";
            ctx.shadowBlur = 5;
            ctx.fillText(`${starsCaught}/${TARGET_STARS}`, jar.w / 2, jar.h + 35);

            ctx.restore();
        }

        function spawnHitParticles(x, y) {
            for(let i=0; i<12; i++) {
                hitParticles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10 - 2,
                    life: 1.0,
                    size: Math.random() * 5 + 2
                });
            }
        }

        function updateStarGame() {
            if(!isPlaying) return;

            drawNightSky();

            // Spawn Stars
            if(Math.random() < 0.04) { // Spawn rate
                stars.push({
                    x: Math.random() * (bCanvas.width - 60) + 30,
                    y: -40,
                    speed: 4 + Math.random() * 5,
                    rot: Math.random() * Math.PI,
                    rotSpeed: (Math.random() - 0.5) * 0.15,
                    size: 20 + Math.random() * 10
                });
            }

            // Draw and Update Stars
            for(let i=stars.length-1; i>=0; i--) {
                let s = stars[i];
                s.y += s.speed;
                s.rot += s.rotSpeed;

                // Glow Effect
                bCtx.shadowColor = "#ffc800";
                bCtx.shadowBlur = 25;
                bCtx.fillStyle = "#ffc800";
                drawStar(bCtx, s.x, s.y, 5, s.size, s.size/2.2, s.rot);
                bCtx.fill();
                bCtx.shadowBlur = 0; 
                
                // Draw inner highlight
                bCtx.fillStyle = "#ffffff";
                drawStar(bCtx, s.x, s.y, 5, s.size*0.4, s.size/5, s.rot);
                bCtx.fill();

                // Collision Detection with Jar Opening
                if(s.y + s.size > jar.y - 10 && s.y < jar.y + jar.h / 2 &&
                   s.x > jar.x - 10 && s.x < jar.x + jar.w + 10) {
                    
                    starsCaught++;
                    if(synth) synth.triggerAttackRelease("E6", "32n"); // Ping sound
                    
                    spawnHitParticles(s.x, s.y);
                    stars.splice(i, 1);
                    
                    // WIN CONDITION CHECK
                    if (starsCaught >= TARGET_STARS) {
                        endStarGameWin();
                        return; // Stop updating instantly
                    }

                } else if (s.y > bCanvas.height + 50) {
                    // Off screen
                    stars.splice(i, 1);
                }
            }

            // Draw and Update Particles
            for(let i=hitParticles.length-1; i>=0; i--) {
                let p = hitParticles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.25; // gravity
                p.life -= 0.04;
                
                bCtx.globalAlpha = Math.max(0, p.life);
                bCtx.fillStyle = "#ffc800";
                bCtx.shadowColor = "#fcd34d";
                bCtx.shadowBlur = 10;
                bCtx.beginPath();
                bCtx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                bCtx.fill();
                bCtx.globalAlpha = 1.0;
                bCtx.shadowBlur = 0;

                if(p.life <= 0) hitParticles.splice(i, 1);
            }

            drawGlassJar(bCtx);

            gameId = requestAnimationFrame(updateStarGame);
        }

        function endStarGameWin() {
            isPlaying = false; 
            cancelAnimationFrame(gameId);
            
            // Add bonus points to main score
            state.score += 50;
            document.getElementById('score-val').innerText = state.score;
            
            if(synth) {
                synth.triggerAttackRelease(["C5", "E5", "G5", "C6"], "2n");
            }

            // Small delay to let user see full jar before transitioning
            setTimeout(() => {
                document.getElementById('bonus-overlay').classList.add('hidden');
                document.getElementById('win-overlay').classList.remove('hidden');
                document.getElementById('final-score').innerText = state.score;
                startConfetti();
            }, 1000);
        }

        // Beautiful Paper Confetti Effect
        function startConfetti() {
            const fCanvas = document.getElementById('confetti-canvas');
            const fCtx = fCanvas.getContext('2d');
            fCanvas.width = window.innerWidth; fCanvas.height = window.innerHeight;
            
            let particles = [];
            const colors = ['#58cc02', '#1cb0f6', '#ffc800', '#ff4b4b', '#ce82ff', '#ff9600'];

            for(let i=0; i<150; i++) {
                particles.push({
                    x: Math.random() * fCanvas.width,
                    y: Math.random() * fCanvas.height - fCanvas.height, 
                    w: Math.random() * 14 + 10,
                    h: Math.random() * 20 + 10,
                    vx: Math.random() * 4 - 2,
                    vy: Math.random() * 5 + 4,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rot: Math.random() * 360,
                    rotSpeed: Math.random() * 15 - 7.5
                });
            }

            function loop() {
                fCtx.clearRect(0,0,fCanvas.width,fCanvas.height);
                let active = false;
                
                particles.forEach((p, i) => {
                    p.x += p.vx; 
                    p.y += p.vy; 
                    p.rot += p.rotSpeed;
                    
                    p.vx += Math.sin(p.rot * 0.05) * 0.15; // Flutter
                    
                    if(p.y < fCanvas.height + 20) active = true;

                    fCtx.save();
                    fCtx.translate(p.x, p.y);
                    fCtx.rotate(p.rot * Math.PI / 180);
                    fCtx.fillStyle = p.color;
                    
                    const scaleY = Math.abs(Math.sin(p.rot * 0.05));
                    fCtx.scale(1, scaleY);
                    
                    fCtx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
                    fCtx.restore();
                });
                
                if(active) {
                    requestAnimationFrame(loop);
                } else {
                    // Loop confetti endless
                    particles.forEach(p => {
                        p.y = Math.random() * -fCanvas.height;
                        p.x = Math.random() * fCanvas.width;
                    });
                    requestAnimationFrame(loop);
                }
            }
            loop();
        }
    </script>
</body>
