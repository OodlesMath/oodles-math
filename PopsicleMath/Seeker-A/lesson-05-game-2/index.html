<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Number Line Math Adventure V7</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800;900&display=swap" rel="stylesheet">
    <!-- Using Tone.js for Bunny Hop sound effects -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root {
            /* Duolingo Inspired Color Palette */
            --sky-blue: #1CB0F6;
            --light-sky: #89E2FE;
            --grass-green: #58CC02;
            --grass-dark: #46A302;
            --dirt-brown: #965A38;
            --btn-blue: #1CB0F6;
            --btn-blue-shadow: #1899D6;
            --btn-green: #58CC02;
            --btn-green-shadow: #58A700;
            --btn-purple: #CE82FF;
            --btn-purple-shadow: #A568CC;
            --btn-red: #FF4B4B;
            --btn-red-shadow: #EA1515;
            --text-main: #4B4B4B;
            --text-light: #AFAFAF;
            --white: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--light-sky);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevent scrolling outside game area */
        }

        /* --- Beautiful Background (Duolingo Style) --- */
        .scenery-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
            background: linear-gradient(to bottom, var(--sky-blue) 0%, var(--light-sky) 50%);
        }

        .sun {
            position: absolute;
            top: 40px;
            left: 50px;
            width: 90px;
            height: 90px;
            background: #FFD900;
            border-radius: 50%;
            box-shadow: 0 0 50px #FFD900;
        }

        /* Rainbow made bigger and more beautiful */
        .rainbow {
            position: absolute;
            bottom: calc(18vh - 60vw);
            left: -10vw;
            width: 120vw;
            height: 120vw;
            border-radius: 50%;
            box-shadow: inset 0 0 0 4vw #FF4B4B, 
                        inset 0 0 0 8vw #FF9600, 
                        inset 0 0 0 12vw #FFD900, 
                        inset 0 0 0 16vw #58CC02, 
                        inset 0 0 0 20vw #1CB0F6, 
                        inset 0 0 0 24vw #CE82FF;
            opacity: 0.55;
            clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%);
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.9;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .c1 { width: 140px; height: 50px; top: 100px; left: 12%; }
        .c1::before { width: 70px; height: 70px; top: -35px; left: 25px; }
        .c1::after { width: 50px; height: 50px; top: -15px; left: 80px; }
        
        .c2 { width: 100px; height: 35px; top: 160px; right: 18%; opacity: 0.8;}
        .c2::before { width: 50px; height: 50px; top: -25px; left: 20px; }

        .hills {
            position: absolute;
            bottom: 15vh;
            width: 100%;
            height: 200px;
        }
        .hill {
            position: absolute;
            background: #74D620;
            border-radius: 50%;
        }
        .h1 { width: 600px; height: 300px; bottom: -150px; left: -100px; }
        .h2 { width: 800px; height: 400px; bottom: -200px; right: -200px; background: #68C41A; }

        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 18vh;
            background: var(--grass-green);
            border-top: 15px solid var(--grass-dark);
        }

        .decoration {
            position: absolute;
            font-size: 2rem;
            bottom: 18vh;
            filter: drop-shadow(0 5px 0 rgba(0,0,0,0.1));
        }
        .tree1 { left: 5%; font-size: 4rem; bottom: 16vh; }
        .tree2 { right: 8%; font-size: 5rem; bottom: 15vh; }
        .flower1 { left: 25%; font-size: 2rem;}
        .flower2 { right: 30%; font-size: 1.5rem;}
        .flower3 { left: 60%; font-size: 2.2rem;}

        /* --- UI Elements --- */
        .game-header {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 100;
        }

        .score-board {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--white);
            background: var(--btn-blue);
            padding: 10px 25px;
            border-radius: 20px;
            border-bottom: 5px solid var(--btn-blue-shadow);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .timer-display {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--text-main);
            background: var(--white);
            padding: 10px 20px;
            border-radius: 20px;
            border-bottom: 5px solid #E5E5E5;
        }

        .icon-btn {
            background: var(--white);
            color: var(--text-main);
            border: none;
            border-bottom: 5px solid #E5E5E5;
            border-radius: 15px;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: transform 0.1s;
        }
        .icon-btn:active {
            transform: translateY(5px);
            border-bottom-width: 0px;
            margin-bottom: 5px;
        }

        /* --- Screens --- */
        .screen {
            flex: 1;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            z-index: 10;
            animation: fadeIn 0.4s ease;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 { 
            font-size: 3rem; 
            margin-bottom: 5px; 
            color: var(--white); 
            -webkit-text-stroke: 2px var(--btn-blue-shadow);
            text-shadow: 0 4px 0 var(--btn-blue-shadow); 
            font-weight: 900; 
            text-align: center;
        }
        p.subtitle { 
            font-size: 1.4rem; 
            color: var(--white); 
            font-weight: 800; 
            margin-top: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            text-align: center;
        }

        /* --- Range Selector --- */
        .range-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            width: 100%;
        }

        .chunky-btn {
            background: var(--white);
            border: 2px solid #E5E5E5;
            border-bottom: 6px solid #E5E5E5;
            border-radius: 20px;
            padding: 15px 30px;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--btn-blue);
            cursor: pointer;
            transition: all 0.1s;
            text-align: center;
        }
        .chunky-btn:hover { background: #F7F7F7; }
        .chunky-btn:active {
            transform: translateY(6px);
            border-bottom-width: 0px;
            margin-bottom: 6px;
        }
        
        .btn-success { background: var(--btn-green); color: white; border-color: var(--btn-green-shadow); border-bottom-color: var(--btn-green-shadow); }
        .btn-success:hover { background: #50BA02; }

        /* --- Math Area --- */
        .problem-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .equation-text {
            font-size: 4rem;
            font-weight: 900;
            color: var(--white);
            background: var(--btn-purple);
            padding: 10px 40px;
            border-radius: 25px;
            border-bottom: 6px solid var(--btn-purple-shadow);
            text-shadow: 0 3px 0 var(--btn-purple-shadow);
            letter-spacing: 2px;
        }

        .speaker-btn {
            background: #FFD900;
            color: #D48000;
            font-size: 2.5rem;
            border: none;
            border-bottom: 6px solid #E6A400;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .speaker-btn:active {
            transform: translateY(6px);
            border-bottom-width: 0px;
            margin-bottom: 6px;
        }

        /* --- Number Line (Always Centered) --- */
        .number-line-container {
            width: 100%;
            overflow-x: auto;
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid #E5E5E5;
            border-bottom: 8px solid #D5D5D5;
            border-radius: 25px;
            padding: 115px 20px 45px 20px; 
            margin: 20px 0;
            position: relative;
            scroll-behavior: smooth;
            text-align: center; /* Helper to align inline elements centrally */
        }
        
        .number-line-container::-webkit-scrollbar { height: 12px; }
        .number-line-container::-webkit-scrollbar-track { background: #F0F0F0; border-radius: 10px; }
        .number-line-container::-webkit-scrollbar-thumb { background: var(--btn-blue); border-radius: 10px; }

        .number-line {
            position: relative;
            height: 95px;
            display: inline-flex; /* Changed to inline-flex to allow margin auto centering */
            margin: 0 auto;
            align-items: flex-end;
            min-width: max-content;
            padding: 0 50px; 
        }

        .main-line {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            height: 6px;
            background: var(--text-light);
            border-radius: 4px;
            z-index: 1;
        }

        #arcCanvas {
            position: absolute;
            top: -95px; 
            left: 0;
            width: 100%;
            height: 140px;
            z-index: 2;
            pointer-events: none;
        }

        .tick {
            position: relative;
            width: 65px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            z-index: 3;
        }

        .tick::after {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--text-main);
            position: absolute;
            bottom: 6px;
            border-radius: 2px;
        }

        .tick-label {
            font-weight: 900;
            font-size: 1.5rem; 
            color: var(--text-main);
            transform: translateY(35px);
        }

        .frog {
            position: absolute;
            bottom: 35px;
            left: 0;
            transform: translateX(-50%);
            transition: left 0.5s ease-in-out, bottom 0.25s ease-out;
            z-index: 10;
            filter: drop-shadow(0 8px 4px rgba(0,0,0,0.3));
        }

        .frog svg { display: block; width: 70px; height: 70px; }
        .frog.jumping { bottom: 100px; }

        /* --- Answers Area --- */
        .actions-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        .answers-grid {
            display: flex;
            justify-content: center;
            gap: 20px; 
            flex-wrap: wrap;
            transition: opacity 0.3s;
        }
        
        .answers-grid.hidden-answers { opacity: 0.3; pointer-events: none; }

        .answer-btn {
            background-color: var(--white);
            border: 3px solid #E5E5E5;
            border-bottom: 8px solid #E5E5E5;
            border-radius: 25px;
            padding: 15px 40px;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--text-main);
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.2s;
            min-width: 100px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .answer-btn:hover { transform: scale(1.08); filter: brightness(1.05); }
        .answer-btn:active { transform: scale(0.95) translateY(8px); border-bottom-width: 0px; margin-bottom: 8px; }

        /* 4 Vibrant Colors for Answers */
        .answer-color-0 { background-color: #FFF200; border-color: #D4C400; border-bottom-color: #B3A500; color: #A07800; }
        .answer-color-1 { background-color: #FF9600; border-color: #E68600; border-bottom-color: #CC7700; color: white; }
        .answer-color-2 { background-color: #CE82FF; border-color: #B572E0; border-bottom-color: #9C62C2; color: white; }
        .answer-color-3 { background-color: #FF75B5; border-color: #FA529B; border-bottom-color: #D6387C; color: white; }

        .answer-btn.correct { background-color: var(--btn-green) !important; border-color: var(--btn-green-shadow) !important; border-bottom-color: var(--btn-green-shadow) !important; color: white !important; animation: bounce 0.5s; }
        .answer-btn.wrong { background-color: var(--btn-red) !important; border-color: var(--btn-red-shadow) !important; border-bottom-color: var(--btn-red-shadow) !important; color: white !important; animation: shake 0.4s; }

        @keyframes bounce { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-15px) scale(1.05); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        .feedback-text { height: 35px; font-size: 1.5rem; font-weight: 900; color: var(--white); text-shadow: 0 2px 4px rgba(0,0,0,0.3); margin-top: 10px; }

        /* --- Overlays & Confetti --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; text-align: center; }
        .win-card { background: var(--white); padding: 40px; border-radius: 30px; border-bottom: 10px solid #E5E5E5; max-width: 500px; width: 90%; position: relative; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .win-title { font-size: 3.5rem; color: var(--btn-green); margin: 0; font-weight: 900; text-shadow: 0 3px 0 var(--btn-green-shadow);}
        .stats-box { background: #F7F7F7; border-radius: 20px; padding: 20px; margin: 20px 0; text-align: left; border: 2px solid #E5E5E5; }
        .stats-box p { font-size: 1.4rem; font-weight: 800; margin: 10px 0; color: var(--text-main); display: flex; align-items: center; gap: 10px; }
        #confettiCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; display: none; }

        /* --- Bunny Bonus Game Styles --- */
        #bunnyBonus { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #8bd3ff; display: none; flex-direction: column; align-items: center; z-index: 3000; overflow: hidden; touch-action: none; }
        #canvas-container { width: 100%; height: 100%; }
        #canvas-container canvas { display: block; width: 100%; height: 100%; }
        
        .bonus-ui { position: absolute; top: 20px; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; color: white; font-size: 2.2rem; font-weight: 900; text-shadow: 3px 3px 0 #1565c0; z-index: 10;}
        
        .quit-bonus-btn {
            background: rgba(255,255,255,0.3); border: 2px solid white; border-radius: 15px; 
            color: white; font-size: 1.2rem; font-weight: 900; padding: 8px 20px; 
            cursor: pointer; text-shadow: none; transition: all 0.2s;
            box-shadow: 0 4px 0 rgba(255,255,255,0.2);
            pointer-events: auto; /* Ensure clickable */
        }
        .quit-bonus-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }

        .bonus-start-msg { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #fff59d; font-size: 2.5rem; font-weight: 900; text-align: center; text-shadow: 4px 4px 0 #d84315; animation: pulse 1s infinite alternate; z-index: 10; pointer-events: none;}

        @keyframes pulse { from { transform: translate(-50%, -50%) scale(1); } to { transform: translate(-50%, -50%) scale(1.1); } }

        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            .equation-text { font-size: 3rem; padding: 10px 25px; }
            .speaker-btn { width: 60px; height: 60px; font-size: 2rem; }
            .chunky-btn { font-size: 1.4rem; padding: 12px 25px; }
            .answer-btn { padding: 12px 20px; font-size: 1.8rem; min-width: 70px;}
            .score-board { font-size: 1.2rem; padding: 8px 15px;}
            .game-header { top: 10px; left: 10px; }
            .frog svg { width: 50px; height: 50px; }
            .bonus-ui { padding: 0 15px; font-size: 1.5rem;}
            .quit-bonus-btn { font-size: 1rem; padding: 5px 12px;}
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- Beautiful Background -->
    <div class="scenery-bg">
        <div class="sun"></div>
        <div class="rainbow"></div>
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="hills">
            <div class="hill h1"></div>
            <div class="hill h2"></div>
        </div>
        <div class="ground"></div>
        <!-- Decorations -->
        <div class="decoration tree1">🌳</div>
        <div class="decoration tree2">🌲</div>
        <div class="decoration flower1">🌷</div>
        <div class="decoration flower2">🌻</div>
        <div class="decoration flower3">🌼</div>
    </div>

    <!-- Header Controls -->
    <div class="game-header">
        <div class="score-board" id="scoreBoard">⭐ <span id="scoreVal">0</span></div>
        <div id="timerDisplay" class="timer-display" style="display:none;">⏱ 00:00</div>
        <button class="icon-btn" id="soundToggle" title="Toggle Sound">🔊</button>
        <button class="icon-btn" id="timerToggle" title="Toggle Timer">⏱</button>
        <button class="icon-btn" id="resetBtn" title="Change Mode">⚙️</button>
    </div>

    <!-- Range Selector Screen -->
    <div class="screen active" id="rangeScreen">
        <h1>Number Line Adventure</h1>
        <p class="subtitle">Choose your goal and start jumping!</p>
        <div class="range-grid">
            <button class="chunky-btn" onclick="startGame(5)">Up to 5</button>
            <button class="chunky-btn" onclick="startGame(10)">Up to 10</button>
            <button class="chunky-btn" onclick="startGame(20)">Up to 20</button>
            <button class="chunky-btn" onclick="startGame(30)">Up to 30</button>
            <button class="chunky-btn" onclick="startGame(40)">Up to 40</button>
            <button class="chunky-btn" onclick="startGame(50)">Up to 50</button>
            <button class="chunky-btn" onclick="startGame(100)">Up to 100</button>
        </div>
    </div>

    <!-- Main Game Screen -->
    <div class="screen" id="mathGameScreen">
        <h1 id="gameTitle">Hop to Add!</h1>
        
        <div class="problem-container">
            <div class="equation-text" id="equationDisplay">0 + 0 = ?</div>
            <button class="speaker-btn" onclick="playQuestionAudio()" title="Listen to question">🔊</button>
        </div>

        <div class="number-line-container" id="nlContainer">
            <div class="number-line" id="numberLine">
                <div class="main-line"></div>
                <svg id="arcCanvas"></svg>
                <!-- Custom SVG Frog -->
                <div class="frog" id="frogEl">
                    <svg viewBox="0 0 100 100">
                        <ellipse cx="20" cy="70" rx="15" ry="10" fill="#46A302"/>
                        <ellipse cx="80" cy="70" rx="15" ry="10" fill="#46A302"/>
                        <ellipse cx="50" cy="60" rx="40" ry="30" fill="#58CC02"/>
                        <circle cx="30" cy="30" r="15" fill="#58CC02"/>
                        <circle cx="70" cy="30" r="15" fill="#58CC02"/>
                        <circle cx="30" cy="30" r="10" fill="white"/>
                        <circle cx="70" cy="30" r="10" fill="white"/>
                        <circle cx="30" cy="30" r="5" fill="#1CB0F6"/>
                        <circle cx="70" cy="30" r="5" fill="#1CB0F6"/>
                        <circle cx="28" cy="28" r="2" fill="white"/>
                        <circle cx="68" cy="28" r="2" fill="white"/>
                        <path d="M 35 65 Q 50 75 65 65" fill="none" stroke="#2B5D00" stroke-width="4" stroke-linecap="round"/>
                        <circle cx="20" cy="60" r="6" fill="#FF8A80" opacity="0.8"/>
                        <circle cx="80" cy="60" r="6" fill="#FF8A80" opacity="0.8"/>
                    </svg>
                </div>
            </div>
        </div>

        <div class="actions-container">
            <button class="chunky-btn btn-success" id="jumpBtn" style="font-size: 2rem;">🐸 Jump! (<span id="jumpsLeft">0</span>)</button>
            <div class="feedback-text" id="feedback"></div>
            <!-- 4 Answers will be placed here -->
            <div class="answers-grid hidden-answers" id="answersGrid"></div>
        </div>
    </div>

    <!-- Confetti Canvas -->
    <canvas id="confettiCanvas"></canvas>

    <!-- Win Modal -->
    <div class="overlay" id="winOverlay">
        <div class="win-card">
            <h2 class="win-title">AMAZING! 🏆</h2>
            <p style="font-size: 1.4rem; font-weight: 800; color: var(--text-light); margin-top: 5px;">Level Completed!</p>
            
            <div class="stats-box">
                <p>⭐ <span>Score: <span id="finalScore" style="color:var(--btn-red);">0</span></span></p>
                <p>🪙 <span>Coins: <span id="finalCoins" style="color:#f57c00;">0</span></span></p>
                <p id="finalTimeLine" style="display: none;">⏱ <span>Time: <span id="finalTime" style="color:var(--btn-blue);">00:00</span></span></p>
            </div>

            <div style="display:flex; flex-direction:column; gap:15px; margin-top:20px;">
                <button class="chunky-btn btn-success" onclick="continueGame()">CONTINUE</button>
                <button class="chunky-btn" onclick="goToMenu()">CHANGE MODE</button>
            </div>
        </div>
    </div>

    <!-- Bunny Bonus Game Section -->
    <div id="bunnyBonus">
        <div class="bonus-ui">
            <div>💰 <span id="bonusCoins">0</span></div>
            <!-- Quit Button added to safely exit the infinite mode -->
            <button class="quit-bonus-btn" id="quitBonusBtn">QUIT GAME</button>
        </div>
        <div id="bonusMsg" class="bonus-start-msg">Tap or Space to Jump!</div>
        <div id="canvas-container"></div>
    </div>

    <script>
        // --- State ---
        let maxRange = 10;
        let score = 0;
        let questionsCompleted = 0;
        let num1 = 0, num2 = 0, currentCorrectAnswer = 0;
        let jumpsRemaining = 0;
        let currentPos = 0;
        let eligibleForPoints = true;
        
        let isMuted = false;
        let timerActive = false;
        let timerInterval = null;
        let secondsElapsed = 0;
        let totalBonusCoins = 0;
        let bonusActive = false;
        
        let tickWidth = window.innerWidth <= 768 ? 55 : 75; 

        // Question Pool for Random Non-Repeating Logic
        let questionPool = [];

        // --- DOM Elements ---
        const rangeScreen = document.getElementById('rangeScreen');
        const mathGameScreen = document.getElementById('mathGameScreen');
        const equationDisplay = document.getElementById('equationDisplay');
        const jumpBtn = document.getElementById('jumpBtn');
        const jumpsLeftText = document.getElementById('jumpsLeft');
        const nlContainer = document.getElementById('nlContainer');
        const numberLine = document.getElementById('numberLine');
        const arcCanvas = document.getElementById('arcCanvas');
        const frogEl = document.getElementById('frogEl');
        const answersGrid = document.getElementById('answersGrid');
        const scoreVal = document.getElementById('scoreVal');
        const feedback = document.getElementById('feedback');
        const winOverlay = document.getElementById('winOverlay');
        const bunnyBonus = document.getElementById('bunnyBonus');
        const quitBonusBtn = document.getElementById('quitBonusBtn');
        
        // --- Audio Engine (Main Game) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration, volume = 0.1) {
            if (isMuted) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        const sounds = {
            click: () => playTone(800, 'sine', 0.05, 0.05),
            correct: () => { playTone(523, 'sine', 0.1); setTimeout(()=>playTone(659, 'sine', 0.1), 100); setTimeout(()=>playTone(783, 'sine', 0.2), 200); },
            wrong: () => playTone(220, 'sawtooth', 0.3, 0.1),
            hop: () => {
                if (isMuted) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.connect(gain).connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            },
            win: () => { [523, 659, 783, 1046, 1318].forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.2, 0.1), i * 120)); }
        };

        // --- Sound Effects using Tone.js (For Bunny Game) ---
        const SoundFX = {
            jumpSynth: null,
            failSynth: null,
            winSynth: null,
            isReady: false,
            
            init() {
                if(this.isReady) return;
                try {
                    this.jumpSynth = new Tone.MembraneSynth({ pitchDecay: 0.05, octaves: 4, oscillator: { type: "sine" } }).toDestination();
                    this.jumpSynth.volume.value = -10;

                    this.failSynth = new Tone.FMSynth({
                        harmonicity: 0.5, modulationIndex: 10, oscillator: { type: "sawtooth" },
                        envelope: { attack: 0.1, decay: 0.2, sustain: 0.1, release: 0.2 }
                    }).toDestination();
                    this.failSynth.volume.value = -10;

                    this.winSynth = new Tone.PolySynth().toDestination();
                    this.winSynth.volume.value = -5;
                    
                    this.isReady = true;
                } catch(e) { console.log("Audio context not ready"); }
            },
            playJump() {
                if(isMuted) return;
                if(!this.isReady) this.init();
                if(this.isReady && Tone.context.state === 'running') this.jumpSynth.triggerAttackRelease("C3", "8n");
            },
            playFail() {
                if(isMuted) return;
                if(!this.isReady) this.init();
                if(this.isReady && Tone.context.state === 'running') this.failSynth.triggerAttackRelease("G2", "4n");
            },
            playWin() {
                if(isMuted) return;
                if(!this.isReady) this.init();
                if(this.isReady && Tone.context.state === 'running') {
                    const now = Tone.now();
                    this.winSynth.triggerAttackRelease("C4", "8n", now);
                    this.winSynth.triggerAttackRelease("E4", "8n", now + 0.15);
                    this.winSynth.triggerAttackRelease("G4", "4n", now + 0.3);
                }
            }
        };

        // --- Text to Speech ---
        function playQuestionAudio() {
            if (isMuted) return;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(`${num1} plus ${num2} equals what?`);
                msg.lang = 'en-US';
                msg.rate = 0.9; 
                msg.pitch = 1.2; 
                window.speechSynthesis.speak(msg);
            }
        }

        // --- Game Flow ---
        function goToMenu() {
            sounds.click();
            winOverlay.style.display = 'none';
            mathGameScreen.classList.remove('active');
            rangeScreen.classList.add('active');
            stopConfetti();
        }

        // Generate non-repeating question pool
        function buildQuestionPool(maxR) {
            questionPool = [];
            for (let i = 0; i < maxR; i++) {
                let maxNum2 = maxR - i;
                if (maxNum2 < 1) continue; // Must jump at least 1 step
                for (let j = 1; j <= maxNum2; j++) {
                    questionPool.push({ n1: i, n2: j });
                }
            }
            
            // Fallback for extremely small ranges
            if (questionPool.length === 0) {
                questionPool.push({ n1: Math.max(0, maxR - 2), n2: 2 });
            }
            
            // Shuffle Array (Fisher-Yates)
            for (let i = questionPool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [questionPool[i], questionPool[j]] = [questionPool[j], questionPool[i]];
            }
        }

        function startGame(range) {
            sounds.click();
            maxRange = range;
            score = 0;
            questionsCompleted = 0;
            totalBonusCoins = 0;
            updateScore();
            
            buildQuestionPool(maxRange);
            
            rangeScreen.classList.remove('active');
            mathGameScreen.classList.add('active');
            
            if(timerActive) {
                clearInterval(timerInterval);
                secondsElapsed = 0;
                document.getElementById('timerDisplay').textContent = `⏱ 00:00`;
                timerInterval = setInterval(() => { 
                    secondsElapsed++; 
                    document.getElementById('timerDisplay').textContent = `⏱ ${formatTime(secondsElapsed)}`;
                }, 1000);
            }
            generateQuestion();
        }

        function generateQuestion() {
            eligibleForPoints = true;
            feedback.textContent = '';
            answersGrid.classList.add('hidden-answers');
            answersGrid.innerHTML = '';
            arcCanvas.innerHTML = ''; 
            
            // Refill pool if empty
            if (questionPool.length === 0) {
                buildQuestionPool(maxRange);
            }
            
            // Pop random unique question from pool
            const q = questionPool.pop();
            num1 = q.n1;
            num2 = q.n2;
            
            currentCorrectAnswer = num1 + num2;
            jumpsRemaining = num2;
            currentPos = num1;
            
            equationDisplay.textContent = `${num1} + ${num2} = ?`;
            updateJumpBtn();
            
            renderNumberLine();
            generateAnswers();
        }

        function renderNumberLine() {
            Array.from(numberLine.children).forEach(c => {
                if(c.id !== 'frogEl' && c.id !== 'arcCanvas' && !c.classList.contains('main-line')) {
                    numberLine.removeChild(c);
                }
            });

            let startTick = Math.max(0, num1 - 2);
            let endTick = Math.min(maxRange, currentCorrectAnswer + 3);
            if(maxRange <= 20) { startTick = 0; endTick = maxRange; }

            for(let i = startTick; i <= endTick; i++) {
                const tick = document.createElement('div');
                tick.className = 'tick';
                tick.style.width = `${tickWidth}px`;
                
                const label = document.createElement('div');
                label.className = 'tick-label';
                label.textContent = i;
                
                tick.appendChild(label);
                numberLine.insertBefore(tick, frogEl);
            }

            numberLine.style.width = `${(endTick - startTick + 1) * tickWidth + 100}px`;
            arcCanvas.style.width = numberLine.style.width;
            numberLine.dataset.startTick = startTick;

            updateFrogPosition();
            centerFrog();
        }

        function updateFrogPosition() {
            const startTick = parseInt(numberLine.dataset.startTick);
            const relativeIndex = currentPos - startTick;
            const leftPos = 50 + (relativeIndex * tickWidth) + (tickWidth/2);
            frogEl.style.left = `${leftPos}px`;
        }

        function centerFrog() {
            if (numberLine.offsetWidth <= nlContainer.clientWidth) return;
            
            setTimeout(() => {
                const scrollLeftPos = frogEl.offsetLeft - (nlContainer.clientWidth / 2) + (frogEl.offsetWidth / 2);
                nlContainer.scrollTo({
                    left: Math.max(0, scrollLeftPos),
                    behavior: 'smooth'
                });
            }, 50);
        }

        function drawJumpArc(fromVal, toVal, jumpNumber) {
            const startTick = parseInt(numberLine.dataset.startTick);
            const x1 = 50 + (fromVal - startTick) * tickWidth + tickWidth/2;
            const x2 = 50 + (toVal - startTick) * tickWidth + tickWidth/2;
            const y = 125; 

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const midX = (x1 + x2) / 2;
            const controlY = y - 65; 

            path.setAttribute("d", `M ${x1} ${y} Q ${midX} ${controlY} ${x2} ${y}`);
            path.setAttribute("fill", "none");
            path.setAttribute("stroke", "var(--btn-blue)");
            path.setAttribute("stroke-width", "4");
            path.setAttribute("stroke-dasharray", "8, 6");
            path.setAttribute("stroke-linecap", "round");
            
            arcCanvas.appendChild(path);

            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("x", midX);
            text.setAttribute("y", controlY - 8); 
            text.setAttribute("text-anchor", "middle");
            text.setAttribute("fill", "var(--btn-blue-shadow)");
            text.setAttribute("font-size", "22px");
            text.setAttribute("font-family", "Poppins");
            text.setAttribute("font-weight", "900");
            text.textContent = jumpNumber;

            arcCanvas.appendChild(text);
        }

        function updateJumpBtn() {
            if (jumpsRemaining > 0) {
                jumpBtn.disabled = false;
                jumpBtn.style.opacity = '1';
                jumpsLeftText.textContent = jumpsRemaining;
            } else {
                jumpBtn.disabled = true;
                jumpBtn.style.opacity = '0.5';
                jumpBtn.textContent = "Great jumping!";
                answersGrid.classList.remove('hidden-answers');
            }
        }

        jumpBtn.onclick = () => {
            if(jumpsRemaining <= 0) return;
            Tone.start(); 
            
            const prevPos = currentPos;
            const jumpIndex = (currentPos - num1) + 1;
            
            jumpsRemaining--;
            currentPos++;
            sounds.hop();
            
            drawJumpArc(prevPos, currentPos, jumpIndex);

            frogEl.classList.add('jumping');
            updateFrogPosition();
            centerFrog();
            
            setTimeout(() => {
                frogEl.classList.remove('jumping');
            }, 250);
            
            updateJumpBtn();
        };

        function generateAnswers() {
            let opts = [currentCorrectAnswer];
            // Request 4 answers instead of 3
            while(opts.length < 4) {
                let variation = Math.floor(Math.random() * 7) - 3; // Broader random variation
                let w = currentCorrectAnswer + variation;
                if(w !== currentCorrectAnswer && w >= 0 && w <= maxRange && !opts.includes(w)) {
                    opts.push(w);
                } else {
                    w = Math.floor(Math.random() * (maxRange+1));
                    if(!opts.includes(w)) opts.push(w);
                }
            }
            
            opts.sort(()=>Math.random()-0.5).forEach((val, index) => {
                const btn = document.createElement('button');
                btn.className = `answer-btn answer-color-${index}`;
                btn.textContent = val;
                btn.onclick = () => checkAnswer(btn, val);
                answersGrid.appendChild(btn);
            });
        }

        function checkAnswer(btn, val) {
            if (jumpsRemaining > 0) return;
            Tone.start(); 
            
            if(val === currentCorrectAnswer) {
                btn.classList.add('correct');
                equationDisplay.textContent = `${num1} + ${num2} = ${currentCorrectAnswer}`;
                feedback.textContent = `🌟 Awesome!`;
                sounds.correct();
                
                Array.from(answersGrid.children).forEach(b => b.style.pointerEvents = 'none');
                
                if (eligibleForPoints) score++;
                updateScore();
                questionsCompleted++;
                
                setTimeout(() => {
                    if (questionsCompleted > 0 && questionsCompleted % 10 === 0) {
                        showWinScreen();
                    } else if (questionsCompleted > 0 && questionsCompleted % 3 === 0) {
                        startBonusLevel();
                    } else {
                        generateQuestion();
                    }
                }, 1500);

            } else {
                btn.classList.add('wrong');
                btn.style.pointerEvents = 'none';
                eligibleForPoints = false;
                feedback.textContent = "Oops! Try again.";
                sounds.wrong();
            }
        }

        function updateScore() { scoreVal.textContent = score; }
        
        document.getElementById('resetBtn').onclick = goToMenu;

        function formatTime(secs) {
            const m = Math.floor(secs/60).toString().padStart(2,'0');
            const s = (secs%60).toString().padStart(2,'0');
            return `${m}:${s}`;
        }

        function showWinScreen() {
            sounds.win();
            winOverlay.style.display = 'flex';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalCoins').textContent = totalBonusCoins;
            if(timerActive) {
                document.getElementById('finalTimeLine').style.display = 'flex';
                document.getElementById('finalTime').textContent = formatTime(secondsElapsed);
            } else {
                document.getElementById('finalTimeLine').style.display = 'none';
            }
            startConfetti();
        }

        function continueGame() {
            winOverlay.style.display = 'none';
            stopConfetti();
            generateQuestion();
        }

        const cfCanvas = document.getElementById('confettiCanvas');
        const cfCtx = cfCanvas.getContext('2d');
        let confetti = [];
        let cfActive = false;

        function startConfetti() {
            cfCanvas.style.display = 'block';
            cfCanvas.width = window.innerWidth;
            cfCanvas.height = window.innerHeight;
            cfActive = true;
            confetti = [];
            const colors = ['#1CB0F6', '#58CC02', '#CE82FF', '#FF4B4B', '#FFD900'];
            
            for(let i=0; i<150; i++) {
                confetti.push({
                    x: Math.random() * cfCanvas.width,
                    y: Math.random() * -cfCanvas.height - 50,
                    w: Math.random() * 10 + 10,
                    h: Math.random() * 15 + 10,
                    vx: (Math.random() - 0.5) * 5,
                    vy: Math.random() * 3 + 3,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rot: Math.random() * 360,
                    rotSpeed: (Math.random() - 0.5) * 12
                });
            }
            confettiLoop();
        }

        function stopConfetti() { cfActive = false; cfCanvas.style.display = 'none'; }

        function confettiLoop() {
            if(!cfActive) return;
            cfCtx.clearRect(0, 0, cfCanvas.width, cfCanvas.height);
            for(let p of confetti) {
                p.x += p.vx; p.y += p.vy; p.rot += p.rotSpeed;
                p.x += Math.sin(p.y / 50) * 1.5;
                if(p.y > cfCanvas.height) { p.y = -20; p.x = Math.random() * cfCanvas.width; }
                cfCtx.save();
                cfCtx.translate(p.x, p.y);
                cfCtx.rotate(p.rot * Math.PI / 180);
                cfCtx.fillStyle = p.color;
                cfCtx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
                cfCtx.restore();
            }
            requestAnimationFrame(confettiLoop);
        }

        // --- Bunny Hop Engine ---
        function Runner(containerSelector, config) {
            const container = document.querySelector(containerSelector);
            if (!container) return;
            this.container = container;
            this.config = Object.assign({
                SPEED: 7, GRAVITY: 0.6, INITIAL_JUMP_VELOCITY: 14
            }, config);
            this.init();
        }

        Runner.prototype = {
            init: function() {
                this.canvas = document.createElement('canvas');
                this.canvas.style.display = "block";
                this.ctx = this.canvas.getContext('2d');
                this.container.innerHTML = '';
                this.container.appendChild(this.canvas);
                
                this.bunny = { x: 150, y: 0, vy: 0, jumping: false, width: 70, height: 80 };
                this.obstacles = [];
                this.decorations = [];
                this.flowers = [];
                this.score = 0;
                this.isGameOver = false;
                this.isStarted = false;
                this.frameCount = 0;
                this.animationFrameId = null;

                for(let i=0; i<5; i++) {
                    this.decorations.push({ x: Math.random() * 2000, type: 'tree' });
                }
                for(let i=0; i<12; i++) {
                    this.flowers.push(this.createFlower(Math.random() * 2000));
                }

                this.bindEvents();
                this.resize();
            },
            resize: function() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.floorY = this.canvas.height - 120;
                
                if (!this.bunny.jumping) {
                    this.bunny.y = this.floorY - this.bunny.height;
                }
                this.flowers.forEach(f => {
                    f.y = this.floorY + 15 + Math.random() * 60;
                });
                if(!this.isStarted) this.draw();
            },
            createFlower: function(xPos) {
                const colors = ['#ff8fab', '#facc15', '#f87171', '#c084fc'];
                return {
                    x: xPos,
                    y: (this.floorY || window.innerHeight - 120) + 15 + Math.random() * 60,
                    color: colors[Math.floor(Math.random() * colors.length)]
                };
            },
            bindEvents: function() {
                const handleInput = (e) => {
                    // Bypass logic if we aren't in the bonus game
                    if(!bonusActive) return;
                    
                    // Don't intercept clicks inside the button
                    if(e.target.tagName.toLowerCase() === 'button' && e.type !== 'keydown') return; 
                    
                    if (this.isGameOver) return; 
                    
                    if (!this.isStarted) {
                        Tone.start(); 
                        document.getElementById('bonusMsg').style.display = 'none';
                        return this.isStarted = true;
                    }
                    this.jump();
                };

                this.canvas.addEventListener('mousedown', handleInput);
                this.canvas.addEventListener('touchstart', (e) => { 
                     if(e.target.tagName.toLowerCase() !== 'button') {
                        e.preventDefault(); 
                        handleInput(e); 
                     }
                }, {passive: false});
            },
            start: function() {
                this.resize();
                this.restart();
                if(this.animationFrameId) cancelAnimationFrame(this.animationFrameId);
                this.gameLoop();
            },
            stop: function() {
                if(this.animationFrameId) cancelAnimationFrame(this.animationFrameId);
            },
            jump: function() {
                if (!this.bunny.jumping) {
                    this.bunny.vy = -this.config.INITIAL_JUMP_VELOCITY;
                    this.bunny.jumping = true;
                    SoundFX.playJump();
                }
            },
            restart: function() {
                this.bunny.y = this.floorY - this.bunny.height;
                this.bunny.vy = 0;
                this.bunny.jumping = false;
                this.obstacles = [];
                this.score = 0; 
                this.isGameOver = false; 
                this.isStarted = true;
                this.frameCount = 0;
            },
            update: function() {
                if (!this.isStarted || this.isGameOver) return;

                this.frameCount++;
                this.score += 0.05; 
                document.getElementById('bonusCoins').textContent = Math.floor(this.score);

                this.bunny.y += this.bunny.vy;
                this.bunny.vy += this.config.GRAVITY;
                const restY = this.floorY - this.bunny.height;
                
                if (this.bunny.y > restY) {
                    this.bunny.y = restY;
                    this.bunny.vy = 0;
                    this.bunny.jumping = false;
                }

                this.decorations.forEach(d => {
                    d.x -= this.config.SPEED * 0.4;
                    if(d.x < -100) {
                        d.x = this.canvas.width + 100 + Math.random() * 300;
                    }
                });
                
                this.flowers.forEach(f => {
                    f.x -= this.config.SPEED;
                    if(f.x < -50) {
                        Object.assign(f, this.createFlower(this.canvas.width + Math.random() * 200));
                    }
                });

                const spawnRate = Math.max(60, Math.floor(140 - this.config.SPEED * 5));
                if (this.frameCount % spawnRate === 0) {
                    this.obstacles.push({ 
                        x: this.canvas.width + 50, 
                        w: 45 + Math.random() * 25, 
                        h: 45 + Math.random() * 20,
                        type: Math.random() > 0.5 ? 'rock' : 'log'
                    });
                }

                this.obstacles.forEach(o => {
                    o.x -= this.config.SPEED;
                    
                    const bx = this.bunny.x + 20;
                    const by = this.bunny.y + 15;
                    const bw = this.bunny.width - 40;
                    const bh = this.bunny.height - 25;

                    const ox = o.x + 10;
                    const oy = this.floorY - o.h + 10;
                    const ow = o.w - 20;
                    const oh = o.h - 10;

                    if (bx < ox + ow && bx + bw > ox && by < oy + oh && by + bh > oy) {
                        this.gameOver(false);
                    }
                });
                
                this.obstacles = this.obstacles.filter(o => o.x > -150);
            },
            gameOver: function(userQuit = false) {
                this.isGameOver = true;
                bonusActive = false; 
                
                const bMsg = document.getElementById('bonusMsg');
                if (userQuit) {
                    SoundFX.playWin();
                    bMsg.textContent = `GOOD JOB! +${Math.floor(this.score)} Coins! ➔`;
                    bMsg.style.color = '#fff59d';
                } else {
                    SoundFX.playFail();
                    bMsg.textContent = `GAME OVER! 💥 +${Math.floor(this.score)} Coins`;
                    bMsg.style.color = '#ff5252';
                }
                bMsg.style.display = 'block';

                totalBonusCoins += Math.floor(this.score);

                setTimeout(() => {
                    document.getElementById('bunnyBonus').style.display = 'none';
                    document.getElementById('mathGameScreen').style.opacity = '1';
                    generateQuestion(); 
                }, 2000);
            },
            draw: function() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                const skyGrad = this.ctx.createLinearGradient(0, 0, 0, this.floorY);
                skyGrad.addColorStop(0, '#7cd0fc');
                skyGrad.addColorStop(1, '#dff4ff');
                this.ctx.fillStyle = skyGrad;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                this.ctx.fillStyle = 'rgba(255, 234, 138, 0.4)';
                this.ctx.beginPath(); this.ctx.arc(100, 90, 70, 0, Math.PI * 2); this.ctx.fill();
                this.ctx.fillStyle = '#ffdf6d'; 
                this.ctx.beginPath(); this.ctx.arc(100, 90, 50, 0, Math.PI * 2); this.ctx.fill();

                const rbColors = ['#e992aa', '#e5cd78', '#88d0c2', '#6ab1d1', '#54819d', '#cc95c0'];
                this.ctx.lineWidth = Math.min(30, this.canvas.width / 40);
                this.ctx.lineCap = 'butt';
                const rbRadiusBase = Math.min(this.canvas.width * 0.4, 450);
                
                rbColors.forEach((color, i) => {
                    this.ctx.strokeStyle = color;
                    this.ctx.beginPath();
                    this.ctx.arc(this.canvas.width / 2, this.floorY + 20, rbRadiusBase - i * (this.ctx.lineWidth - 1), Math.PI, 0);
                    this.ctx.stroke();
                });

                this.ctx.fillStyle = '#ffffff';
                [[this.canvas.width * 0.2, 100], [this.canvas.width * 0.8, 80], [this.canvas.width * 0.5, 50]].forEach(pos => {
                    this.ctx.beginPath();
                    this.ctx.arc(pos[0], pos[1], 20, 0, Math.PI * 2);
                    this.ctx.arc(pos[0] + 25, pos[1] - 12, 30, 0, Math.PI * 2);
                    this.ctx.arc(pos[0] + 50, pos[1], 20, 0, Math.PI * 2);
                    this.ctx.fill();
                });

                this.decorations.forEach(d => {
                    this.ctx.fillStyle = '#9c6644';
                    this.ctx.fillRect(d.x + 20, this.floorY - 70, 15, 70);
                    this.ctx.fillStyle = '#4ade80';
                    this.ctx.beginPath(); this.ctx.arc(d.x + 27, this.floorY - 80, 35, 0, Math.PI * 2); this.ctx.fill();
                    this.ctx.fillStyle = '#22c55e';
                    this.ctx.beginPath(); this.ctx.arc(d.x + 20, this.floorY - 70, 18, 0, Math.PI * 2); this.ctx.fill();
                });

                this.ctx.fillStyle = '#a3e635'; 
                this.ctx.beginPath();
                this.ctx.moveTo(0, this.floorY - 25);
                this.ctx.quadraticCurveTo(this.canvas.width / 2, this.floorY - 100, this.canvas.width, this.floorY - 10);
                this.ctx.lineTo(this.canvas.width, this.canvas.height);
                this.ctx.lineTo(0, this.canvas.height);
                this.ctx.fill();

                this.ctx.fillStyle = '#65a30d'; 
                this.ctx.beginPath();
                this.ctx.moveTo(0, this.floorY + 15);
                this.ctx.quadraticCurveTo(this.canvas.width / 3, this.floorY - 30, this.canvas.width, this.floorY + 30);
                this.ctx.lineTo(this.canvas.width, this.canvas.height);
                this.ctx.lineTo(0, this.canvas.height);
                this.ctx.fill();

                this.ctx.fillStyle = '#65a30d';
                this.ctx.fillRect(0, this.floorY + 15, this.canvas.width, this.canvas.height - this.floorY - 15);

                this.flowers.forEach(f => {
                    this.ctx.fillStyle = f.color;
                    this.ctx.beginPath();
                    this.ctx.arc(f.x - 5, f.y, 5, 0, Math.PI*2);
                    this.ctx.arc(f.x + 5, f.y, 5, 0, Math.PI*2);
                    this.ctx.arc(f.x, f.y - 5, 5, 0, Math.PI*2);
                    this.ctx.arc(f.x, f.y + 5, 5, 0, Math.PI*2);
                    this.ctx.fill();
                    this.ctx.fillStyle = '#ffffff';
                    this.ctx.beginPath(); this.ctx.arc(f.x, f.y, 4, 0, Math.PI*2); this.ctx.fill();
                });

                this.obstacles.forEach(o => {
                    const oy = this.floorY - o.h;
                    if(o.type === 'rock') {
                        this.ctx.fillStyle = '#afbac4'; 
                        this.ctx.beginPath();
                        this.ctx.moveTo(o.x, this.floorY);
                        this.ctx.lineTo(o.x + o.w/2, oy);
                        this.ctx.lineTo(o.x + o.w, this.floorY);
                        this.ctx.fill();
                        this.ctx.fillStyle = '#8e9fac';
                        this.ctx.beginPath();
                        this.ctx.moveTo(o.x + o.w/2, oy);
                        this.ctx.lineTo(o.x + o.w, this.floorY);
                        this.ctx.lineTo(o.x + o.w*0.8, this.floorY);
                        this.ctx.fill();
                    } else {
                        this.ctx.fillStyle = '#a67b5b'; 
                        this.ctx.fillRect(o.x, oy + o.h/2, o.w, o.h/2);
                        this.ctx.fillStyle = '#8b5a2b'; 
                        this.ctx.fillRect(o.x, oy + o.h - 5, o.w, 5);
                        this.ctx.fillStyle = '#d4b886';
                        this.ctx.beginPath();
                        this.ctx.ellipse(o.x, oy + o.h*0.75, 5, o.h/4, 0, 0, Math.PI*2);
                        this.ctx.fill();
                    }
                });

                const bx = this.bunny.x, by = this.bunny.y;
                const jump = this.bunny.jumping;
                
                this.ctx.save();
                this.ctx.translate(bx, by);
                if(jump) {
                    this.ctx.rotate(-0.1);
                    this.ctx.translate(0, -5);
                }

                const bunnyColor = '#ffffff';
                const earColor = '#ffb3c6';

                const s = 1.2; 
                this.ctx.scale(s, s);

                this.ctx.fillStyle = bunnyColor;
                this.ctx.beginPath(); this.ctx.ellipse(20, 15, 8, 25, -0.2, 0, Math.PI*2); this.ctx.fill();
                this.ctx.fillStyle = earColor;
                this.ctx.beginPath(); this.ctx.ellipse(20, 18, 4, 18, -0.2, 0, Math.PI*2); this.ctx.fill();
                
                this.ctx.fillStyle = bunnyColor;
                this.ctx.beginPath(); this.ctx.ellipse(40, 10, 8, 25, 0.1, 0, Math.PI*2); this.ctx.fill();
                this.ctx.fillStyle = earColor;
                this.ctx.beginPath(); this.ctx.ellipse(40, 13, 4, 18, 0.1, 0, Math.PI*2); this.ctx.fill();

                this.ctx.fillStyle = bunnyColor;
                this.ctx.beginPath(); this.ctx.ellipse(35, 50, 25, 20, 0, 0, Math.PI*2); this.ctx.fill();
                this.ctx.beginPath(); this.ctx.arc(35, 35, 20, 0, Math.PI*2); this.ctx.fill();

                this.ctx.fillStyle = '#f3f4f6';
                this.ctx.beginPath(); this.ctx.arc(8, 55, 8, 0, Math.PI*2); this.ctx.fill();

                this.ctx.fillStyle = '#4b5563'; 
                this.ctx.beginPath(); this.ctx.arc(42, 30, 3, 0, Math.PI*2); this.ctx.fill();
                
                this.ctx.fillStyle = '#ffb3c6'; 
                this.ctx.beginPath(); this.ctx.arc(46, 38, 4, 0, Math.PI*2); this.ctx.fill();
                
                this.ctx.fillStyle = '#ff8fab'; 
                this.ctx.beginPath(); this.ctx.arc(52, 34, 2, 0, Math.PI*2); this.ctx.fill();

                this.ctx.fillStyle = bunnyColor;
                if(!jump) {
                    const offset = Math.sin(this.frameCount * 0.5) * 4;
                    this.ctx.beginPath(); this.ctx.ellipse(25 + offset, 68, 6, 4, 0, 0, Math.PI*2); this.ctx.fill();
                    this.ctx.beginPath(); this.ctx.ellipse(45 - offset, 68, 6, 4, 0, 0, Math.PI*2); this.ctx.fill();
                } else {
                    this.ctx.beginPath(); this.ctx.ellipse(25, 72, 5, 8, 0.5, 0, Math.PI*2); this.ctx.fill();
                }

                this.ctx.restore();
            },
            gameLoop: function() {
                this.update(); 
                this.draw();
                this.animationFrameId = requestAnimationFrame(() => this.gameLoop());
            }
        };

        // Secure Global Keyboard Listener for Bunny Hop Jump
        window.addEventListener('keydown', (e) => {
            if (bonusActive && (e.code === 'Space' || e.key === ' ')) {
                e.preventDefault(); // Prevents page scrolling down
                
                if (window.bunnyRunner && !window.bunnyRunner.isGameOver) {
                    if (!window.bunnyRunner.isStarted) {
                        Tone.start(); 
                        document.getElementById('bonusMsg').style.display = 'none';
                        window.bunnyRunner.isStarted = true;
                    }
                    window.bunnyRunner.jump();
                }
            }
        }, {passive: false});

        // Quit Button Logic
        quitBonusBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.currentTarget.blur(); // Remove focus so spacebar doesn't trigger it again
            if(bonusActive && window.bunnyRunner) {
                window.bunnyRunner.gameOver(true); // Call game over explicitly cleanly
            }
        });

        // --- Start Bonus Game Setup ---
        function startBonusLevel() {
            sounds.win();
            mathGameScreen.style.opacity = '0';
            const bBonus = document.getElementById('bunnyBonus');
            bBonus.style.display = 'flex';
            
            currentBonusCoins = 0; 
            bonusActive = true; 
            
            const bMsg = document.getElementById('bonusMsg');
            bMsg.style.display = 'block';
            bMsg.style.color = '#fff59d';
            bMsg.textContent = "Tap or Space to Jump!";
            
            document.getElementById('bonusCoins').textContent = currentBonusCoins;

            if (!window.bunnyRunner) {
                window.bunnyRunner = new Runner('#canvas-container');
            }
            window.bunnyRunner.start();
            // Removed setInterval completely so the game runs infinitely until death or quit.
        }

        // Global Listeners for sound toggles
        document.getElementById('soundToggle').onclick = function() {
            isMuted = !isMuted; this.textContent = isMuted ? '🔇' : '🔊';
            if(!isMuted && audioCtx.state === 'suspended') audioCtx.resume();
        };
        
        document.getElementById('timerToggle').onclick = function() {
            timerActive = !timerActive;
            document.getElementById('timerDisplay').style.display = timerActive ? 'block' : 'none';
            if(timerActive && mathGameScreen.classList.contains('active')) {
                secondsElapsed = 0;
                document.getElementById('timerDisplay').textContent = `⏱ 00:00`;
                timerInterval = setInterval(() => { 
                    secondsElapsed++; 
                    document.getElementById('timerDisplay').textContent = `⏱ ${formatTime(secondsElapsed)}`;
                }, 1000);
            } else {
                clearInterval(timerInterval);
            }
        };

        window.addEventListener('resize', () => {
            tickWidth = window.innerWidth <= 768 ? 55 : 75; 
            if (bonusActive && window.bunnyRunner) {
                window.bunnyRunner.resize();
            }
            if (cfActive) {
                cfCanvas.width = window.innerWidth;
                cfCanvas.height = window.innerHeight;
            }
            if (mathGameScreen.classList.contains('active') && numberLine.children.length > 0) {
                 renderNumberLine();
                 
                 arcCanvas.innerHTML = '';
                 for(let i = num1; i < currentPos; i++){
                     const jumpIndex = (i - num1) + 1;
                     drawJumpArc(i, i+1, jumpIndex);
                 }
            }
        });
    </script>
</body>
</html>
