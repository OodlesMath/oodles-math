<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Number Line Math Adventure V5</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Duolingo Inspired Color Palette */
            --sky-blue: #1CB0F6;
            --light-sky: #89E2FE;
            --grass-green: #58CC02;
            --grass-dark: #46A302;
            --dirt-brown: #965A38;
            --btn-blue: #1CB0F6;
            --btn-blue-shadow: #1899D6;
            --btn-green: #58CC02;
            --btn-green-shadow: #58A700;
            --btn-purple: #CE82FF;
            --btn-purple-shadow: #A568CC;
            --btn-red: #FF4B4B;
            --btn-red-shadow: #EA1515;
            --text-main: #4B4B4B;
            --text-light: #AFAFAF;
            --white: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--light-sky);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevent scrolling outside game area */
        }

        /* --- Beautiful Background (Duolingo Style) --- */
        .scenery-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
            background: linear-gradient(to bottom, var(--sky-blue) 0%, var(--light-sky) 50%);
        }

        .sun {
            position: absolute;
            top: 40px;
            left: 50px;
            width: 90px;
            height: 90px;
            background: #FFD900;
            border-radius: 50%;
            box-shadow: 0 0 50px #FFD900;
        }

        /* Rainbow made bigger and more beautiful */
        .rainbow {
            position: absolute;
            bottom: calc(18vh - 60vw);
            left: -10vw;
            width: 120vw;
            height: 120vw;
            border-radius: 50%;
            box-shadow: inset 0 0 0 4vw #FF4B4B, 
                        inset 0 0 0 8vw #FF9600, 
                        inset 0 0 0 12vw #FFD900, 
                        inset 0 0 0 16vw #58CC02, 
                        inset 0 0 0 20vw #1CB0F6, 
                        inset 0 0 0 24vw #CE82FF;
            opacity: 0.55;
            clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%);
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.9;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .c1 { width: 140px; height: 50px; top: 100px; left: 12%; }
        .c1::before { width: 70px; height: 70px; top: -35px; left: 25px; }
        .c1::after { width: 50px; height: 50px; top: -15px; left: 80px; }
        
        .c2 { width: 100px; height: 35px; top: 160px; right: 18%; opacity: 0.8;}
        .c2::before { width: 50px; height: 50px; top: -25px; left: 20px; }

        .hills {
            position: absolute;
            bottom: 15vh;
            width: 100%;
            height: 200px;
        }
        .hill {
            position: absolute;
            background: #74D620;
            border-radius: 50%;
        }
        .h1 { width: 600px; height: 300px; bottom: -150px; left: -100px; }
        .h2 { width: 800px; height: 400px; bottom: -200px; right: -200px; background: #68C41A; }

        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 18vh;
            background: var(--grass-green);
            border-top: 15px solid var(--grass-dark);
        }

        .decoration {
            position: absolute;
            font-size: 2rem;
            bottom: 18vh;
            filter: drop-shadow(0 5px 0 rgba(0,0,0,0.1));
        }
        .tree1 { left: 5%; font-size: 4rem; bottom: 16vh; }
        .tree2 { right: 8%; font-size: 5rem; bottom: 15vh; }
        .flower1 { left: 25%; font-size: 2rem;}
        .flower2 { right: 30%; font-size: 1.5rem;}
        .flower3 { left: 60%; font-size: 2.2rem;}

        /* --- UI Elements --- */
        .game-header {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 100;
        }

        .score-board {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--white);
            background: var(--btn-blue);
            padding: 10px 25px;
            border-radius: 20px;
            border-bottom: 5px solid var(--btn-blue-shadow);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .timer-display {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--text-main);
            background: var(--white);
            padding: 10px 20px;
            border-radius: 20px;
            border-bottom: 5px solid #E5E5E5;
        }

        .icon-btn {
            background: var(--white);
            color: var(--text-main);
            border: none;
            border-bottom: 5px solid #E5E5E5;
            border-radius: 15px;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: transform 0.1s;
        }
        .icon-btn:active {
            transform: translateY(5px);
            border-bottom-width: 0px;
            margin-bottom: 5px;
        }

        /* --- Screens --- */
        .screen {
            flex: 1;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            z-index: 10;
            animation: fadeIn 0.4s ease;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 { 
            font-size: 3rem; 
            margin-bottom: 5px; 
            color: var(--white); 
            -webkit-text-stroke: 2px var(--btn-blue-shadow);
            text-shadow: 0 4px 0 var(--btn-blue-shadow); 
            font-weight: 900; 
            text-align: center;
        }
        p.subtitle { 
            font-size: 1.4rem; 
            color: var(--white); 
            font-weight: 800; 
            margin-top: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            text-align: center;
        }

        /* --- Range Selector --- */
        .range-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            width: 100%;
        }

        .chunky-btn {
            background: var(--white);
            border: 2px solid #E5E5E5;
            border-bottom: 6px solid #E5E5E5;
            border-radius: 20px;
            padding: 15px 30px;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--btn-blue);
            cursor: pointer;
            transition: all 0.1s;
            text-align: center;
        }
        .chunky-btn:hover { background: #F7F7F7; }
        .chunky-btn:active {
            transform: translateY(6px);
            border-bottom-width: 0px;
            margin-bottom: 6px;
        }
        
        .btn-success { background: var(--btn-green); color: white; border-color: var(--btn-green-shadow); border-bottom-color: var(--btn-green-shadow); }
        .btn-success:hover { background: #50BA02; }

        /* --- Math Area --- */
        .problem-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .equation-text {
            font-size: 4rem;
            font-weight: 900;
            color: var(--white);
            background: var(--btn-purple);
            padding: 10px 40px;
            border-radius: 25px;
            border-bottom: 6px solid var(--btn-purple-shadow);
            text-shadow: 0 3px 0 var(--btn-purple-shadow);
            letter-spacing: 2px;
        }

        .speaker-btn {
            background: #FFD900;
            color: #D48000;
            font-size: 2.5rem;
            border: none;
            border-bottom: 6px solid #E6A400;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .speaker-btn:active {
            transform: translateY(6px);
            border-bottom-width: 0px;
            margin-bottom: 6px;
        }

        /* --- Number Line --- */
        .number-line-container {
            width: 100%;
            overflow-x: auto;
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid #E5E5E5;
            border-bottom: 8px solid #D5D5D5;
            border-radius: 25px;
            padding: 115px 20px 45px 20px; 
            margin: 20px 0;
            position: relative;
            scroll-behavior: smooth;
        }
        
        .number-line-container::-webkit-scrollbar { height: 12px; }
        .number-line-container::-webkit-scrollbar-track { background: #F0F0F0; border-radius: 10px; }
        .number-line-container::-webkit-scrollbar-thumb { background: var(--btn-blue); border-radius: 10px; }

        .number-line {
            position: relative;
            height: 95px;
            display: flex;
            align-items: flex-end;
            min-width: max-content;
            padding: 0 50px; 
        }

        .main-line {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            height: 6px;
            background: var(--text-light);
            border-radius: 4px;
            z-index: 1;
        }

        #arcCanvas {
            position: absolute;
            top: -95px; 
            left: 0;
            width: 100%;
            height: 140px;
            z-index: 2;
            pointer-events: none;
        }

        .tick {
            position: relative;
            width: 65px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            z-index: 3;
        }

        .tick::after {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--text-main);
            position: absolute;
            bottom: 6px;
            border-radius: 2px;
        }

        .tick-label {
            font-weight: 900;
            font-size: 1.5rem; 
            color: var(--text-main);
            transform: translateY(35px);
        }

        .frog {
            position: absolute;
            bottom: 35px;
            left: 0;
            transform: translateX(-50%);
            transition: left 0.5s ease-in-out, bottom 0.25s ease-out;
            z-index: 10;
            filter: drop-shadow(0 8px 4px rgba(0,0,0,0.3));
        }

        .frog svg { display: block; width: 70px; height: 70px; }
        .frog.jumping { bottom: 100px; }

        /* --- Answers Area --- */
        .actions-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        .answers-grid {
            display: flex;
            justify-content: center;
            gap: 30px; 
            flex-wrap: wrap;
            transition: opacity 0.3s;
        }
        
        .answers-grid.hidden-answers { opacity: 0.3; pointer-events: none; }

        .answer-btn {
            background-color: var(--white);
            border: 3px solid #E5E5E5;
            border-bottom: 8px solid #E5E5E5;
            border-radius: 25px;
            padding: 15px 50px;
            font-size: 3rem;
            font-weight: 900;
            color: var(--text-main);
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.2s;
            min-width: 120px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .answer-btn:hover { transform: scale(1.08); filter: brightness(1.05); }
        .answer-btn:active { transform: scale(0.95) translateY(8px); border-bottom-width: 0px; margin-bottom: 8px; }

        .answer-color-0 { background-color: #FFF200; border-color: #D4C400; border-bottom-color: #B3A500; color: #A07800; }
        .answer-color-1 { background-color: #FF9600; border-color: #E68600; border-bottom-color: #CC7700; color: white; }
        .answer-color-2 { background-color: #CE82FF; border-color: #B572E0; border-bottom-color: #9C62C2; color: white; }

        .answer-btn.correct { background-color: var(--btn-green) !important; border-color: var(--btn-green-shadow) !important; border-bottom-color: var(--btn-green-shadow) !important; color: white !important; animation: bounce 0.5s; }
        .answer-btn.wrong { background-color: var(--btn-red) !important; border-color: var(--btn-red-shadow) !important; border-bottom-color: var(--btn-red-shadow) !important; color: white !important; animation: shake 0.4s; }

        @keyframes bounce { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-15px) scale(1.05); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        .feedback-text { height: 35px; font-size: 1.5rem; font-weight: 900; color: var(--white); text-shadow: 0 2px 4px rgba(0,0,0,0.3); margin-top: 10px; }

        /* --- Overlays & Confetti --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; text-align: center; }
        .win-card { background: var(--white); padding: 40px; border-radius: 30px; border-bottom: 10px solid #E5E5E5; max-width: 500px; width: 90%; position: relative; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .win-title { font-size: 3.5rem; color: var(--btn-green); margin: 0; font-weight: 900; text-shadow: 0 3px 0 var(--btn-green-shadow);}
        .stats-box { background: #F7F7F7; border-radius: 20px; padding: 20px; margin: 20px 0; text-align: left; border: 2px solid #E5E5E5; }
        .stats-box p { font-size: 1.4rem; font-weight: 800; margin: 10px 0; color: var(--text-main); display: flex; align-items: center; gap: 10px; }
        #confettiCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; display: none; }

        /* --- Bonus Game Styles --- */
        #marioBonus { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #e1f5fe; display: none; flex-direction: column; align-items: center; z-index: 3000; overflow: hidden; touch-action: none; }
        #marioCanvas { display: block; margin: auto; }
        .bonus-ui { position: absolute; top: 20px; left: 0; width: 100%; display: flex; justify-content: space-around; color: white; font-size: 2.2rem; font-weight: 900; text-shadow: 3px 3px 0 #1565c0; pointer-events: none; z-index: 10;}
        .bonus-start-msg { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #fff59d; font-size: 2.5rem; font-weight: 900; text-align: center; text-shadow: 4px 4px 0 #d84315; animation: pulse 1s infinite alternate; z-index: 10;}
        .flash-red { animation: flashRed 0.3s; }
        @keyframes pulse { from { transform: translate(-50%, -50%) scale(1); } to { transform: translate(-50%, -50%) scale(1.1); } }
        @keyframes flashRed { 0%, 100% { background: #e1f5fe; } 50% { background: #ffcdd2; } }

        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            .equation-text { font-size: 3rem; padding: 10px 25px; }
            .speaker-btn { width: 60px; height: 60px; font-size: 2rem; }
            .chunky-btn { font-size: 1.4rem; padding: 12px 25px; }
            .answer-btn { padding: 12px 25px; font-size: 2rem; min-width: 80px;}
            .score-board { font-size: 1.2rem; padding: 8px 15px;}
            .game-header { top: 10px; left: 10px; }
            .frog svg { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- Beautiful Background -->
    <div class="scenery-bg">
        <div class="sun"></div>
        <div class="rainbow"></div>
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="hills">
            <div class="hill h1"></div>
            <div class="hill h2"></div>
        </div>
        <div class="ground"></div>
        <!-- Decorations -->
        <div class="decoration tree1">🌳</div>
        <div class="decoration tree2">🌲</div>
        <div class="decoration flower1">🌷</div>
        <div class="decoration flower2">🌻</div>
        <div class="decoration flower3">🌼</div>
    </div>

    <!-- Header Controls -->
    <div class="game-header">
        <div class="score-board" id="scoreBoard">⭐ <span id="scoreVal">0</span></div>
        <div id="timerDisplay" class="timer-display" style="display:none;">⏱ 00:00</div>
        <button class="icon-btn" id="soundToggle" title="Toggle Sound">🔊</button>
        <button class="icon-btn" id="timerToggle" title="Toggle Timer">⏱</button>
        <button class="icon-btn" id="resetBtn" title="Change Mode">⚙️</button>
    </div>

    <!-- Range Selector Screen -->
    <div class="screen active" id="rangeScreen">
        <h1>Number Line Adventure</h1>
        <p class="subtitle">Choose your goal and start jumping!</p>
        <div class="range-grid">
            <button class="chunky-btn" onclick="startGame(5)">Up to 5</button>
            <button class="chunky-btn" onclick="startGame(10)">Up to 10</button>
            <button class="chunky-btn" onclick="startGame(20)">Up to 20</button>
            <button class="chunky-btn" onclick="startGame(30)">Up to 30</button>
            <button class="chunky-btn" onclick="startGame(40)">Up to 40</button>
            <button class="chunky-btn" onclick="startGame(50)">Up to 50</button>
            <button class="chunky-btn" onclick="startGame(100)">Up to 100</button>
        </div>
    </div>

    <!-- Main Game Screen -->
    <div class="screen" id="mathGameScreen">
        <h1 id="gameTitle">Hop to Add!</h1>
        
        <div class="problem-container">
            <div class="equation-text" id="equationDisplay">0 + 0 = ?</div>
            <button class="speaker-btn" onclick="playQuestionAudio()" title="Listen to question">🔊</button>
        </div>

        <div class="number-line-container" id="nlContainer">
            <div class="number-line" id="numberLine">
                <div class="main-line"></div>
                <svg id="arcCanvas"></svg>
                <!-- Ticks inserted via JS -->
                <!-- Custom SVG Frog -->
                <div class="frog" id="frogEl">
                    <svg viewBox="0 0 100 100">
                        <!-- Back legs -->
                        <ellipse cx="20" cy="70" rx="15" ry="10" fill="#46A302"/>
                        <ellipse cx="80" cy="70" rx="15" ry="10" fill="#46A302"/>
                        <!-- Body -->
                        <ellipse cx="50" cy="60" rx="40" ry="30" fill="#58CC02"/>
                        <!-- Eyes -->
                        <circle cx="30" cy="30" r="15" fill="#58CC02"/>
                        <circle cx="70" cy="30" r="15" fill="#58CC02"/>
                        <circle cx="30" cy="30" r="10" fill="white"/>
                        <circle cx="70" cy="30" r="10" fill="white"/>
                        <circle cx="30" cy="30" r="5" fill="#1CB0F6"/>
                        <circle cx="70" cy="30" r="5" fill="#1CB0F6"/>
                        <circle cx="28" cy="28" r="2" fill="white"/>
                        <circle cx="68" cy="28" r="2" fill="white"/>
                        <!-- Smile -->
                        <path d="M 35 65 Q 50 75 65 65" fill="none" stroke="#2B5D00" stroke-width="4" stroke-linecap="round"/>
                        <!-- Cheeks -->
                        <circle cx="20" cy="60" r="6" fill="#FF8A80" opacity="0.8"/>
                        <circle cx="80" cy="60" r="6" fill="#FF8A80" opacity="0.8"/>
                    </svg>
                </div>
            </div>
        </div>

        <div class="actions-container">
            <button class="chunky-btn btn-success" id="jumpBtn" style="font-size: 2rem;">🐸 Jump! (<span id="jumpsLeft">0</span>)</button>
            <div class="feedback-text" id="feedback"></div>
            <div class="answers-grid hidden-answers" id="answersGrid"></div>
        </div>
    </div>

    <!-- Confetti Canvas -->
    <canvas id="confettiCanvas"></canvas>

    <!-- Win Modal -->
    <div class="overlay" id="winOverlay">
        <div class="win-card">
            <h2 class="win-title">AMAZING! 🏆</h2>
            <p style="font-size: 1.4rem; font-weight: 800; color: var(--text-light); margin-top: 5px;">Level Completed!</p>
            
            <div class="stats-box">
                <p>⭐ <span>Score: <span id="finalScore" style="color:var(--btn-red);">0</span></span></p>
                <p>🪙 <span>Coins: <span id="finalCoins" style="color:#f57c00;">0</span></span></p>
                <p id="finalTimeLine" style="display: none;">⏱ <span>Time: <span id="finalTime" style="color:var(--btn-blue);">00:00</span></span></p>
            </div>

            <div style="display:flex; flex-direction:column; gap:15px; margin-top:20px;">
                <button class="chunky-btn btn-success" onclick="continueGame()">CONTINUE</button>
                <button class="chunky-btn" onclick="goToMenu()">CHANGE MODE</button>
            </div>
        </div>
    </div>

    <!-- Bonus Game Section -->
    <div id="marioBonus">
        <div class="bonus-ui">
            <div>💰 <span id="bonusCoins">0</span></div>
            <div>⏱ <span id="bonusTime">12</span>s</div>
        </div>
        <div id="bonusMsg" class="bonus-start-msg">Avoid Cactus 🌵 & Collect Coins!</div>
        <canvas id="marioCanvas"></canvas>
    </div>

    <script>
        // --- State ---
        let maxRange = 10;
        let score = 0;
        let questionsCompleted = 0;
        let num1 = 0, num2 = 0, currentCorrectAnswer = 0;
        let jumpsRemaining = 0;
        let currentPos = 0;
        let eligibleForPoints = true;
        
        let isMuted = false;
        let timerActive = false;
        let timerInterval = null;
        let secondsElapsed = 0;
        let totalBonusCoins = 0;

        // Beautiful SVGs for Bonus Game (Duolingo Style)

        // --- Audio Engine ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration, volume = 0.1) {
            if (isMuted) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        const sounds = {
            click: () => playTone(800, 'sine', 0.05, 0.05),
            correct: () => { playTone(523, 'sine', 0.1); setTimeout(()=>playTone(659, 'sine', 0.1), 100); setTimeout(()=>playTone(783, 'sine', 0.2), 200); },
            wrong: () => playTone(220, 'sawtooth', 0.3, 0.1),
            hop: () => {
                if (isMuted) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.connect(gain).connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            },
            jump: () => {
                if (isMuted) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.connect(gain).connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            },
            coin: () => { playTone(987, 'sine', 0.1, 0.1); setTimeout(()=>playTone(1318, 'sine', 0.2, 0.1), 50); },
            hit: () => { playTone(150, 'sawtooth', 0.3, 0.2); setTimeout(()=>playTone(100, 'square', 0.4, 0.2), 100); },

        function generateQuestion() {
            eligibleForPoints = true;
            feedback.textContent = '';
            answersGrid.classList.add('hidden-answers');
            answersGrid.innerHTML = '';
            arcCanvas.innerHTML = ''; 
            
            num1 = Math.floor(Math.random() * maxRange);
            let maxNum2 = maxRange - num1;
            if (maxNum2 < 1) { num1 = maxRange - 2; maxNum2 = 2; }
            num2 = Math.floor(Math.random() * maxNum2) + 1;
            
            currentCorrectAnswer = num1 + num2;
            jumpsRemaining = num2;
            currentPos = num1;
            
            equationDisplay.textContent = `${num1} + ${num2} = ?`;
            updateJumpBtn();

        function renderNumberLine() {
            Array.from(numberLine.children).forEach(c => {
                if(c.id !== 'frogEl' && c.id !== 'arcCanvas' && !c.classList.contains('main-line')) {
                    numberLine.removeChild(c);
                }
            });

            let startTick = Math.max(0, num1 - 2);
            let endTick = Math.min(maxRange, currentCorrectAnswer + 3);
            if(maxRange <= 20) { startTick = 0; endTick = maxRange; }

            for(let i = startTick; i <= endTick; i++) {
                const tick = document.createElement('div');
                tick.className = 'tick';
                tick.style.width = `${tickWidth}px`;
                
                const label = document.createElement('div');
                label.className = 'tick-label';
                label.textContent = i;
                
                tick.appendChild(label);
                numberLine.insertBefore(tick, frogEl);
            }

            numberLine.style.width = `${(endTick - startTick + 1) * tickWidth + 100}px`;
            arcCanvas.style.width = numberLine.style.width;
            numberLine.dataset.startTick = startTick;

            updateFrogPosition();
            centerFrog();
        }

        function updateFrogPosition() {
            const startTick = parseInt(numberLine.dataset.startTick);
            const relativeIndex = currentPos - startTick;
            const leftPos = 50 + (relativeIndex * tickWidth) + (tickWidth/2);
            frogEl.style.left = `${leftPos}px`;
        }

        function centerFrog() {
            setTimeout(() => {
                const targetScroll = frogEl.offsetLeft - nlContainer.clientWidth/2 + 30;
                nlContainer.scrollTo({
                    left: Math.max(0, targetScroll),
                    behavior: 'smooth'
                });
            }, 50);
        }

        // Draw Dashed Arc using SVG with Number
        function drawJumpArc(fromVal, toVal, jumpNumber) {
            const startTick = parseInt(numberLine.dataset.startTick);
            const x1 = 50 + (fromVal - startTick) * tickWidth + tickWidth/2;
            const x2 = 50 + (toVal - startTick) * tickWidth + tickWidth/2;
            const y = 125; 

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const midX = (x1 + x2) / 2;
            const controlY = y - 65; 

            path.setAttribute("d", `M ${x1} ${y} Q ${midX} ${controlY} ${x2} ${y}`);
            path.setAttribute("fill", "none");
            path.setAttribute("stroke", "var(--btn-blue)");
            path.setAttribute("stroke-width", "4");
            path.setAttribute("stroke-dasharray", "8, 6");
            path.setAttribute("stroke-linecap", "round");
            
            arcCanvas.appendChild(path);

            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("x", midX);
            text.setAttribute("y", controlY - 8); 
            text.setAttribute("text-anchor", "middle");
            text.setAttribute("fill", "var(--btn-blue-shadow)");
            text.setAttribute("font-size", "22px");
            text.setAttribute("font-family", "Poppins");
            text.setAttribute("font-weight", "900");
            text.textContent = jumpNumber;

            arcCanvas.appendChild(text);

        function updateJumpBtn() {
            if (jumpsRemaining > 0) {

        jumpBtn.onclick = () => {
            if(jumpsRemaining <= 0) return;
            
            const prevPos = currentPos;
            const jumpIndex = (currentPos - num1) + 1;
            
            jumpsRemaining--;

            sounds.hop();
            
            drawJumpArc(prevPos, currentPos, jumpIndex);

            frogEl.classList.add('jumping');
            updateFrogPosition();
            centerFrog();
            
            setTimeout(() => {
                frogEl.classList.remove('jumping');
            }, 250);
            
            updateJumpBtn();
        };

        function generateAnswers() {
            let opts = [currentCorrectAnswer];
            while(opts.length < 3) {
                let variation = Math.floor(Math.random() * 5) - 2;
                let w = currentCorrectAnswer + variation;
                if(w !== currentCorrectAnswer && w >= 0 && w <= maxRange && !opts.includes(w)) {
                    opts.push(w);
                } else {
                    w = Math.floor(Math.random() * (maxRange+1));
                    if(!opts.includes(w)) opts.push(w);
                }
            }
            
            opts.sort(()=>Math.random()-0.5).forEach((val, index) => {
                const btn = document.createElement('button');
                btn.className = `answer-btn answer-color-${index}`;
                btn.textContent = val;
                btn.onclick = () => checkAnswer(btn, val);
                answersGrid.appendChild(btn);
            });
        }

        function checkAnswer(btn, val) {
            if (jumpsRemaining > 0) return;

            if(val === currentCorrectAnswer) {
                btn.classList.add('correct');
                equationDisplay.textContent = `${num1} + ${num2} = ${currentCorrectAnswer}`;
                feedback.textContent = `🌟 Awesome!`;
                sounds.correct();
                
                Array.from(answersGrid.children).forEach(b => b.style.pointerEvents = 'none');
                
                if (eligibleForPoints) score++;

                questionsCompleted++;

                        showWinScreen();
                    } else if (questionsCompleted > 0 && questionsCompleted % 3 === 0) {
                        startBonusLevel();
                    } else {
                        generateQuestion();
                    }
                }, 1500);

            } else {
                btn.classList.add('wrong');
                btn.style.pointerEvents = 'none';
                eligibleForPoints = false;
                feedback.textContent = "Oops! Try again.";
                sounds.wrong();
            }
        }

        function formatTime(secs) {

        const cfCanvas = document.getElementById('confettiCanvas');

        function startConfetti() {
            cfCanvas.style.display = 'block';
            cfCanvas.width = window.innerWidth;
            cfCanvas.height = window.innerHeight;
            cfActive = true;
            confetti = [];
            const colors = ['#1CB0F6', '#58CC02', '#CE82FF', '#FF4B4B', '#FFD900'];
            
            for(let i=0; i<150; i++) {
                confetti.push({
                    x: Math.random() * cfCanvas.width,
                    y: Math.random() * -cfCanvas.height - 50,
                    w: Math.random() * 10 + 10,
                    h: Math.random() * 15 + 10,
                    vx: (Math.random() - 0.5) * 5,
                    vy: Math.random() * 3 + 3,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rot: Math.random() * 360,
                    rotSpeed: (Math.random() - 0.5) * 12
                });
            }
            confettiLoop();
        }

        function stopConfetti() { cfActive = false; cfCanvas.style.display = 'none'; }

        function confettiLoop() {
            if(!cfActive) return;
            cfCtx.clearRect(0, 0, cfCanvas.width, cfCanvas.height);
            for(let p of confetti) {
                p.x += p.vx; p.y += p.vy; p.rot += p.rotSpeed;
                p.x += Math.sin(p.y / 50) * 1.5;
                if(p.y > cfCanvas.height) { p.y = -20; p.x = Math.random() * cfCanvas.width; }
                cfCtx.save();
                cfCtx.translate(p.x, p.y);
                cfCtx.rotate(p.rot * Math.PI / 180);
                cfCtx.fillStyle = p.color;
                cfCtx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
                cfCtx.restore();
            }
            requestAnimationFrame(confettiLoop);
        }

        // --- Upgraded Bonus Game Engine (V5) ---

        function jump(e) {

                marioVY = -16; 
                sounds.jump();
                document.getElementById('bonusMsg').style.display = 'none';
            }
        }

        window.addEventListener('mousedown', jump);
        window.addEventListener('touchstart', jump, {passive: false});
        // Keydown for Spacebar (V4 feature retained)
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();

        function bonusLoop() {
            if(!bonusActive) return;

            // Bright Duolingo Sky
            let gradient = bCtx.createLinearGradient(0, 0, 0, bCanvas.height);
            gradient.addColorStop(0, "#1CB0F6"); 
            gradient.addColorStop(1, "#89E2FE"); 
            bCtx.fillStyle = gradient;
            bCtx.fillRect(0, 0, bCanvas.width, bCanvas.height);

            // Fluffy Clouds
            bCtx.fillStyle = "rgba(255, 255, 255, 0.9)";
            clouds.forEach(c => {
                c.x -= c.s;
                if(c.x < -100) { c.x = bCanvas.width + 100; c.y = Math.random()*120 + 20; }
                bCtx.beginPath(); bCtx.arc(c.x, c.y, 30, 0, Math.PI*2); bCtx.arc(c.x+30, c.y-15, 35, 0, Math.PI*2); bCtx.arc(c.x+60, c.y, 30, 0, Math.PI*2); bCtx.fill();
            });

            // Smooth Rolling Hills (Duolingo Style)
            bCtx.fillStyle = "#74D620";
            scenery.forEach(s => {
                s.x -= 2;
                if(s.x < -400) s.x = bCanvas.width + 100;
                bCtx.beginPath(); bCtx.arc(s.x + 200, groundY + 100, 250, Math.PI, 0); bCtx.fill();
            });

            // Vibrant Grass Ground
            bCtx.fillStyle = "#58CC02"; 
            bCtx.fillRect(0, groundY, bCanvas.width, bCanvas.height - groundY);
            bCtx.fillStyle = "#46A302"; // Grass top dark rim
            bCtx.fillRect(0, groundY, bCanvas.width, 15);

            // Grass details
            for(let i=0; i<bCanvas.width; i+=40) {
                bCtx.fillRect((i - (scenery[0].x*3)%40), groundY+5, 10, 8);
            }

            marioVY += 0.8; marioY += marioVY;
            if(marioY > groundY) { marioY = groundY; marioVY = 0; }

            const mx = 80; const my = marioY - 50; 

            framesSinceLastObstacle++;
            if(Math.random() < 0.008 && framesSinceLastObstacle > 120) {
                obstacles.push({x: bCanvas.width + 50, y: groundY - 40, w: 30, h: 40, active: true});
                framesSinceLastObstacle = 0;
            }
            
            // Draw SVG Obstacles (Cactus)
            obstacles.forEach((ob, i) => {
                ob.x -= 8;
                if (cactusImg.complete) {
                    bCtx.drawImage(cactusImg, ob.x - 10, ob.y - 20, ob.w + 20, ob.h + 20);
                }

                if (ob.active && mx + 15 > ob.x && mx - 15 < ob.x + ob.w && my + 45 > ob.y) {
                    ob.active = false; sounds.gameOver(); bonusActive = false;
                    const bMsg = document.getElementById('bonusMsg');
                    bMsg.textContent = "GAME OVER! 💥"; bMsg.style.display = 'block'; bMsg.style.color = '#ff5252';
                    marioBonus.classList.add('flash-red');
                    setTimeout(endBonus, 2000);
                }
            });
            obstacles = obstacles.filter(o => o.x > -100);

            // Draw SVG Coins
            if(Math.random() < 0.05) coins.push({x: bCanvas.width, y: groundY - 50 - Math.random()*130});
            coins.forEach((c, i) => {
                c.x -= 8;
                if (coinImg.complete) {
                    bCtx.drawImage(coinImg, c.x - 18, c.y - 22, 36, 44);
                }

                const dx = c.x - mx; const dy = c.y - (marioY - 25); 
                if(Math.sqrt(dx*dx + dy*dy) < 45) {
                    coins.splice(i, 1); currentBonusCoins++;
                    document.getElementById('bonusCoins').textContent = currentBonusCoins;
                    sounds.coin();
                }
            });
            coins = coins.filter(c => c.x > -50);

            // Draw SVG Mario
            if (marioImg.complete) {
                bCtx.drawImage(marioImg, mx - 30, marioY - 60, 60, 60);
            }

            requestAnimationFrame(bonusLoop);
        }

        document.getElementById('soundToggle').onclick = function() {
            isMuted = !isMuted; this.textContent = isMuted ? '🔇' : '🔊';
            if(!isMuted && audioCtx.state === 'suspended') audioCtx.resume();
        };
        
        document.getElementById('timerToggle').onclick = function() {
            timerActive = !timerActive;
            document.getElementById('timerDisplay').style.display = timerActive ? 'block' : 'none';
            if(timerActive && mathGameScreen.classList.contains('active')) {
                secondsElapsed = 0;
                document.getElementById('timerDisplay').textContent = `⏱ 00:00`;
                timerInterval = setInterval(() => { 
                    secondsElapsed++; 
                    document.getElementById('timerDisplay').textContent = `⏱ ${formatTime(secondsElapsed)}`;
                }, 1000);
            } else {
                clearInterval(timerInterval);
            }
        };

        window.addEventListener('resize', () => {
            tickWidth = window.innerWidth <= 768 ? 55 : 75; 
            if (bonusActive) {
                bCanvas.width = window.innerWidth;
                bCanvas.height = Math.min(window.innerHeight * 0.7, 500);
                groundY = bCanvas.height - 50;
                if (marioY > groundY) marioY = groundY;
            }
            if (cfActive) {
                cfCanvas.width = window.innerWidth;
                cfCanvas.height = window.innerHeight;
            }
            if (mathGameScreen.classList.contains('active') && numberLine.children.length > 0) {
                 renderNumberLine();
                 
                 arcCanvas.innerHTML = '';
                 for(let i = num1; i < currentPos; i++){
                     const jumpIndex = (i - num1) + 1;
                     drawJumpArc(i, i+1, jumpIndex);
                 }
            }
        });
    </script>
</body>
</html>
