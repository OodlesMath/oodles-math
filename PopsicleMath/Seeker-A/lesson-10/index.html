<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Number Line Subtraction Game V7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap');
        
        :root {
            --sky-top: #38bdf8;
            --sky-bottom: #bae6fd;
            --grass-light: #86efac;
            --grass-dark: #4ade80;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 60%, var(--grass-light) 60%, var(--grass-dark) 100%);
            touch-action: manipulation;
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 1rem;
        }

        /* --- Beautiful Background Elements --- */
        .scenery-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        /* Sun */
        .sun {
            position: absolute;
            top: 5%;
            left: 5%;
            width: 100px;
            height: 100px;
            background: #fde047;
            border-radius: 50%;
            box-shadow: 0 0 40px #fde047, 0 0 80px #fef08a;
            animation: pulse-sun 4s infinite alternate;
        }

        @keyframes pulse-sun {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        /* Rainbow - Thinner by 50%, precise semi-circle touching the grass */
        .rainbow {
            position: absolute;
            bottom: 40%; /* Matches hill height */
            left: 50%;
            transform: translateX(-50%);
            width: 100vw;
            max-width: 120vh; /* Limits width to exactly 2x the 60vh top section */
            height: auto;
            aspect-ratio: 2 / 1;
            opacity: 0.65;
            z-index: -1;
        }

        /* Clouds */
        @keyframes float-cloud {
            from { transform: translateX(-200px); }
            to { transform: translateX(120vw); }
        }
        .cloud {
            position: absolute;
            fill: white;
            opacity: 0.8;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }
        .cloud-1 { top: 10%; animation: float-cloud 50s linear infinite; width: 150px; }
        .cloud-2 { top: 25%; animation: float-cloud 35s linear infinite; animation-delay: -15s; width: 100px; }
        .cloud-3 { top: 8%; animation: float-cloud 45s linear infinite; animation-delay: -30s; width: 180px; }

        /* Hills */
        .hills {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40%;
        }

        /* Trees & Flowers styling */
        .tree, .flower {
            position: absolute;
            bottom: 0;
            transform-origin: bottom center;
            animation: sway 6s ease-in-out infinite alternate;
        }
        .flower { animation-duration: 4s; }
        @keyframes sway {
            0% { transform: rotate(-3deg); }
            100% { transform: rotate(3deg); }
        }

        /* --- Game UI Elements --- */
        .game-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 8px solid #ffffff;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 8px rgba(255, 255, 255, 0.4);
            width: 100%;
            max-width: 900px; /* Wider for laptop/tablet */
            border-radius: 2.5rem;
            padding: 1.5rem;
            user-select: none;
            position: relative;
            z-index: 10;
        }

        @media (min-width: 640px) {
            .game-card { padding: 2.5rem; border-radius: 3.5rem; }
        }

        /* Number Line Styling */
        .number-line-container {
            position: relative;
            height: 120px;
            margin: 20px 0;
            user-select: none;
        }

        @media (min-width: 640px) {
            .number-line-container { height: 180px; margin: 40px 0; }
        }

        .line {
            position: absolute;
            top: 50%;
            left: 5%;
            right: 5%;
            height: 12px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa, #3b82f6);
            border-radius: 10px;
            transform: translateY(-50%);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2), inset 0 3px 5px rgba(255,255,255,0.4);
        }

        .tick-zone {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 40px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform: translateX(-50%);
            z-index: 10;
        }

        @media (min-width: 640px) { .tick-zone { width: 60px; } }

        .tick {
            width: 6px;
            height: 24px;
            background-color: #1e3a8a;
            position: absolute;
            bottom: 50%;
            border-radius: 4px;
        }

        @media (min-width: 640px) { .tick { width: 8px; height: 32px; } }

        .tick-label {
            font-weight: 900;
            font-size: 1.5rem;
            color: #334155;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 70px;
            text-shadow: 0 3px 0 white, 0 -3px 0 white, 3px 0 0 white, -3px 0 0 white;
        }

        @media (min-width: 640px) { .tick-label { font-size: 2.2rem; margin-top: 100px; } }

        .tick-zone:hover .tick-label {
            transform: scale(1.3) translateY(5px);
            color: #3b82f6;
        }

        /* SVG Frog Character */
        .character {
            position: absolute;
            bottom: 50%;
            width: 70px;
            height: 90px;
            transition: left 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            filter: drop-shadow(0 10px 8px rgba(0,0,0,0.3));
            transform: translateY(15%);
        }

        @media (min-width: 640px) { .character { width: 90px; height: 120px; } }

        /* Jump Arc & Animation */
        .arc-path {
            position: absolute;
            top: 0;
            fill: none;
            stroke-width: 6;
            stroke-dasharray: 10, 6;
            stroke-dashoffset: 1000;
            stroke-linecap: round;
            filter: drop-shadow(0 4px 3px rgba(0,0,0,0.2));
        }

        @media (min-width: 640px) { .arc-path { stroke-width: 8; stroke-dasharray: 14, 8; } }

        @keyframes drawArc { to { stroke-dashoffset: 0; } }

        @keyframes fadeUpIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .jump-animation { animation: jump 0.4s ease; }
        
        @keyframes jump {
            0%, 100% { transform: translateY(15%) scale(1); }
            50% { transform: translateY(-60px) scale(1.1); }
        }

        @media (min-width: 640px) {
            @keyframes jump {
                0%, 100% { transform: translateY(15%) scale(1); }
                50% { transform: translateY(-90px) scale(1.1); }
            }
        }

        /* Ripple Effect */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.4);
            transform: scale(0);
            animation: ripple-effect 0.6s ease-out;
            pointer-events: none;
            z-index: 5;
        }
        @keyframes ripple-effect { to { transform: scale(4); opacity: 0; } }

        /* Candy-style Buttons */
        .btn-base {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.1s;
            user-select: none;
            outline: none;
            border: none;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
            box-shadow: 0 8px 0 #1d4ed8, 0 12px 15px rgba(59, 130, 246, 0.4);
        }
        .btn-primary:active { transform: translateY(8px); box-shadow: 0 0px 0 #1d4ed8; }

        .btn-secondary {
            background: #f43f5e;
            color: white;
            box-shadow: 0 8px 0 #be123c, 0 12px 15px rgba(244, 63, 94, 0.4);
        }
        .btn-secondary:active { transform: translateY(8px); box-shadow: 0 0px 0 #be123c; }

        .btn-success {
            background: #22c55e;
            color: white;
            box-shadow: 0 8px 0 #15803d, 0 12px 15px rgba(34, 197, 94, 0.4);
        }
        .btn-success:active { transform: translateY(8px); box-shadow: 0 0px 0 #15803d; }
        
        .btn-speaker {
            background: #fbbf24;
            color: white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            box-shadow: 0 5px 0 #d97706, 0 8px 10px rgba(251, 191, 36, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @media (min-width: 640px) { .btn-speaker { width: 70px; height: 70px; } }
        .btn-speaker:active { transform: translateY(5px); box-shadow: 0 0px 0 #d97706; }

        /* Bonus Game Overlay - Twilight theme */
        .bonus-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%);
            z-index: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            border-radius: 2rem;
            animation: fadeIn 0.3s ease-in;
            padding-top: 1.5rem;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Redesigned Firefly Element */
        .bonus-fly-element {
            position: absolute;
            width: 80px; /* Made slightly larger for better detail visibility */
            height: 80px;
            cursor: pointer;
            z-index: 600;
            user-select: none;
            animation: buzz-jitter 0.15s infinite;
        }
        @media (min-width: 640px) { .bonus-fly-element { width: 100px; height: 100px; } }

        @keyframes buzz-jitter {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(1px, -1px) rotate(2deg); }
            50% { transform: translate(-1px, 1px) rotate(-2deg); }
            75% { transform: translate(1px, 1px) rotate(1deg); }
        }

        @keyframes pulse-glow {
            from { opacity: 0.3; transform: scale(0.9); }
            to { opacity: 0.9; transform: scale(1.1); }
        }
        .firefly-glow-part {
            transform-origin: center;
            animation: pulse-glow 0.8s infinite alternate ease-in-out;
        }

        .bonus-frog {
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 180px;
            z-index: 700;
            pointer-events: none;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.6));
        }
        @media (min-width: 640px) { .bonus-frog { width: 180px; height: 240px; } }
        .bonus-tongue { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 650; }
        
        .text-glow { text-shadow: 0 0 15px rgba(255,255,255,0.9), 0 0 30px rgba(255,255,255,0.7); }

        .confetti-piece, .firework-particle { z-index: 9999 !important; }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- --- SCENERY BACKGROUND --- -->
    <div class="scenery-layer">
        <!-- Sun -->
        <div class="sun"></div>
        
        <!-- Rainbow - Recalculated for exactly 50% thinner bands, matching semi-circle layout perfectly -->
        <svg class="rainbow" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMax meet">
            <!-- 
                Original Widths were 35. New Widths are 18.
                Center is (500, 500). Max radius is 500.
            -->
            <path d="M 0 500 A 500 500 0 0 1 1000 500" fill="none" stroke="#ef4444" stroke-width="18"/>
            <path d="M 18 500 A 482 482 0 0 1 982 500" fill="none" stroke="#f97316" stroke-width="18"/>
            <path d="M 36 500 A 464 464 0 0 1 964 500" fill="none" stroke="#eab308" stroke-width="18"/>
            <path d="M 54 500 A 446 446 0 0 1 946 500" fill="none" stroke="#22c55e" stroke-width="18"/>
            <path d="M 72 500 A 428 428 0 0 1 928 500" fill="none" stroke="#3b82f6" stroke-width="18"/>
            <path d="M 90 500 A 410 410 0 0 1 910 500" fill="none" stroke="#a855f7" stroke-width="18"/>
        </svg>

        <!-- Clouds -->
        <svg class="cloud cloud-1" viewBox="0 0 150 80"><path d="M 30 50 A 20 20 0 0 1 50 30 A 30 30 0 0 1 100 30 A 20 20 0 0 1 120 50 Q 140 50 140 65 Q 140 80 120 80 L 30 80 Q 10 80 10 65 Q 10 50 30 50 Z"/></svg>
        <svg class="cloud cloud-2" viewBox="0 0 150 80"><path d="M 30 50 A 20 20 0 0 1 50 30 A 30 30 0 0 1 100 30 A 20 20 0 0 1 120 50 Q 140 50 140 65 Q 140 80 120 80 L 30 80 Q 10 80 10 65 Q 10 50 30 50 Z"/></svg>
        <svg class="cloud cloud-3" viewBox="0 0 150 80"><path d="M 30 50 A 20 20 0 0 1 50 30 A 30 30 0 0 1 100 30 A 20 20 0 0 1 120 50 Q 140 50 140 65 Q 140 80 120 80 L 30 80 Q 10 80 10 65 Q 10 50 30 50 Z"/></svg>

        <!-- Hills Overlay -->
        <div class="hills">
            <svg viewBox="0 0 1440 320" preserveAspectRatio="none" style="position:absolute; bottom:0; width:100%; height:100%;">
                <!-- Back Hill -->
                <path fill="#22c55e" d="M0,128L48,138.7C96,149,192,171,288,160C384,149,480,107,576,96C672,85,768,107,864,138.7C960,171,1056,213,1152,224C1248,235,1344,213,1392,202.7L1440,192L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
                <!-- Front Hill -->
                <path fill="#16a34a" d="M0,256L60,245.3C120,235,240,213,360,208C480,203,600,213,720,229.3C840,245,960,267,1080,261.3C1200,256,1320,224,1380,208L1440,192L1440,320L1380,320C1320,320,1200,320,1080,320C960,320,840,320,720,320C600,320,480,320,360,320C240,320,120,320,60,320L0,320Z"></path>
            </svg>
            
            <!-- Trees & Flowers -->
            <svg class="tree" style="left: 10%; bottom: 15%; width: 60px; height: 100px;" viewBox="0 0 100 150">
                <rect x="40" y="80" width="20" height="70" fill="#78350f" rx="5"/>
                <circle cx="50" cy="50" r="50" fill="#15803d"/>
                <circle cx="30" cy="30" r="30" fill="#22c55e"/>
                <circle cx="70" cy="40" r="35" fill="#16a34a"/>
            </svg>
            <svg class="tree" style="left: 85%; bottom: 25%; width: 50px; height: 80px;" viewBox="0 0 100 150">
                <rect x="40" y="80" width="20" height="70" fill="#78350f" rx="5"/>
                <polygon points="50,0 10,80 90,80" fill="#15803d"/>
                <polygon points="50,20 20,90 80,90" fill="#16a34a"/>
            </svg>
            <svg class="flower" style="left: 25%; bottom: 10%; width: 30px; height: 40px;" viewBox="0 0 50 60">
                <rect x="23" y="30" width="4" height="30" fill="#15803d"/>
                <circle cx="25" cy="20" r="8" fill="#fde047"/>
                <circle cx="10" cy="20" r="10" fill="#ec4899"/><circle cx="40" cy="20" r="10" fill="#ec4899"/>
                <circle cx="25" cy="5" r="10" fill="#ec4899"/><circle cx="25" cy="35" r="10" fill="#ec4899"/>
            </svg>
            <svg class="flower" style="left: 70%; bottom: 5%; width: 40px; height: 50px; animation-delay: -2s;" viewBox="0 0 50 60">
                <rect x="23" y="30" width="4" height="30" fill="#15803d"/>
                <circle cx="25" cy="20" r="8" fill="#fde047"/>
                <circle cx="10" cy="20" r="10" fill="#3b82f6"/><circle cx="40" cy="20" r="10" fill="#3b82f6"/>
                <circle cx="25" cy="5" r="10" fill="#3b82f6"/><circle cx="25" cy="35" r="10" fill="#3b82f6"/>
            </svg>
        </div>
    </div>

    <!-- --- START SCREEN --- -->
    <div id="start-screen" class="fixed inset-0 z-[100] bg-white/40 backdrop-blur-xl flex flex-col items-center justify-center p-6 text-center">
        <div class="bg-white border-8 border-sky-400 p-8 sm:p-16 rounded-[3rem] shadow-2xl flex flex-col items-center max-w-2xl w-full">
            <div class="w-40 h-48 sm:w-56 sm:h-64 mb-6">
                <!-- Cute Frog SVG -->
                <svg viewBox="0 0 200 220" width="100%" height="100%" style="overflow: visible;">
                    <path d="M 35 60 Q 30 140 45 180" fill="none" stroke="#15803d" stroke-width="8" stroke-linecap="round"/>
                    <ellipse cx="65" cy="190" rx="25" ry="14" fill="#22c55e"/>
                    <ellipse cx="145" cy="190" rx="25" ry="14" fill="#22c55e"/>
                    <ellipse cx="105" cy="140" rx="65" ry="55" fill="#22c55e"/>
                    <ellipse cx="105" cy="165" rx="45" ry="28" fill="#e2e8f0"/>
                    <circle cx="45" cy="150" r="14" fill="#22c55e"/>
                    <circle cx="70" cy="85" r="32" fill="#22c55e"/>
                    <circle cx="140" cy="85" r="32" fill="#22c55e"/>
                    <ellipse cx="105" cy="110" rx="80" ry="48" fill="#22c55e"/>
                    <circle cx="70" cy="85" r="18" fill="#0f172a"/>
                    <circle cx="63" cy="78" r="8" fill="#ffffff"/>
                    <circle cx="140" cy="85" r="18" fill="#0f172a"/>
                    <circle cx="133" cy="78" r="8" fill="#ffffff"/>
                    <circle cx="40" cy="120" r="16" fill="#fca5a5"/>
                    <circle cx="170" cy="120" r="16" fill="#fca5a5"/>
                    <path d="M 75 130 Q 105 150 135 130" stroke="#0f172a" stroke-width="6" fill="none" stroke-linecap="round"/>
                </svg>
            </div>
            <h1 class="text-4xl sm:text-6xl font-black text-blue-500 mb-2 drop-shadow-md uppercase tracking-wide">Froggy Jump!</h1>
            <p class="text-xl sm:text-3xl font-bold text-slate-500 mb-10">Learn Subtraction with Fun!</p>
            <button id="start-game-btn" class="btn-base btn-primary py-5 px-10 sm:py-6 sm:px-16 text-3xl sm:text-5xl">
                PLAY NOW!
            </button>
        </div>
    </div>

    <!-- --- END SCREEN --- -->
    <div id="end-screen" class="hidden fixed inset-0 z-[90] bg-white/90 backdrop-blur-md flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-6xl sm:text-8xl md:text-9xl font-black text-rose-500 mb-6 animate-bounce text-glow tracking-wider uppercase">AMAZING!</h1>
        <p class="text-3xl sm:text-5xl text-slate-700 font-bold mb-8">You are a math superstar!</p>
        <div class="flex items-center gap-4 text-5xl sm:text-7xl font-black text-blue-600 bg-blue-100 px-12 py-8 rounded-[3rem] mb-12 border-8 border-blue-300 shadow-2xl">
            Score: <span id="final-score">0</span>
        </div>
        <button id="play-again-btn" class="btn-base btn-success py-6 px-12 sm:py-8 sm:px-20 text-3xl sm:text-5xl">
            PLAY AGAIN!
        </button>
    </div>

    <!-- --- MAIN GAME UI --- -->
    <div class="game-card">
        
        <!-- Bonus Game Overlay -->
        <div id="bonus-overlay" class="hidden bonus-overlay">
            <div class="text-center z-10 px-4 w-full max-w-md">
                <h2 class="text-5xl sm:text-7xl font-black text-yellow-300 mb-2 drop-shadow-md text-glow">BONUS!</h2>
                <p class="text-xl sm:text-3xl text-blue-200 mb-6 font-bold uppercase tracking-widest">Catch the Fireflies!</p>
                <div class="w-full bg-slate-800/70 rounded-full h-5 sm:h-8 overflow-hidden mb-3 border-4 border-slate-600">
                    <div id="bonus-timer-bar" class="h-full bg-yellow-400 transition-all duration-75 shadow-[0_0_15px_#facc15]" style="width: 100%"></div>
                </div>
                <p class="font-black text-blue-100 text-xl sm:text-3xl">TIME: <span id="bonus-seconds">15.0</span>s</p>
            </div>

            <div id="bonus-area" class="absolute inset-0 overflow-hidden pointer-events-none">
                <!-- Cute SVG Frog for Bonus -->
                <div class="bonus-frog">
                    <svg viewBox="0 0 200 220" width="100%" height="100%" style="overflow: visible;">
                        <path d="M 35 60 Q 30 140 45 180" fill="none" stroke="#15803d" stroke-width="8" stroke-linecap="round"/>
                        <ellipse cx="65" cy="190" rx="25" ry="14" fill="#22c55e"/>
                        <ellipse cx="145" cy="190" rx="25" ry="14" fill="#22c55e"/>
                        <ellipse cx="105" cy="140" rx="65" ry="55" fill="#22c55e"/>
                        <ellipse cx="105" cy="165" rx="45" ry="28" fill="#e2e8f0"/>
                        <circle cx="45" cy="150" r="14" fill="#22c55e"/>
                        <circle cx="70" cy="85" r="32" fill="#22c55e"/>
                        <circle cx="140" cy="85" r="32" fill="#22c55e"/>
                        <ellipse cx="105" cy="110" rx="80" ry="48" fill="#22c55e"/>
                        <circle cx="70" cy="85" r="18" fill="#0f172a"/>
                        <circle cx="63" cy="78" r="8" fill="#ffffff"/>
                        <circle cx="140" cy="85" r="18" fill="#0f172a"/>
                        <circle cx="133" cy="78" r="8" fill="#ffffff"/>
                        <circle cx="40" cy="120" r="16" fill="#fca5a5"/>
                        <circle cx="170" cy="120" r="16" fill="#fca5a5"/>
                        <!-- Interactive Mouth -->
                        <path class="bonus-mouth-closed" d="M 75 130 Q 105 150 135 130" stroke="#0f172a" stroke-width="6" fill="none" stroke-linecap="round"/>
                        <ellipse class="bonus-mouth-open" cx="105" cy="130" rx="25" ry="18" fill="#991b1b" visibility="hidden"/>
                    </svg>
                </div>
                <svg class="bonus-tongue" id="bonus-tongue-svg">
                    <line id="tongue-line" x1="0" y1="0" x2="0" y2="0" stroke="#f472b6" stroke-width="12" stroke-linecap="round" visibility="hidden" />
                    <circle id="tongue-tip" cx="0" cy="0" r="10" fill="#f472b6" visibility="hidden" />
                </svg>
            </div>
        </div>

        <!-- Header -->
        <div class="text-center mb-6 sm:mb-8 mt-2">
            <h1 class="text-4xl sm:text-5xl md:text-6xl font-black text-rose-500 mb-2 drop-shadow-sm uppercase">Jump & Subtract!</h1>
            <p class="text-slate-500 text-xl sm:text-3xl font-bold">Help the frog jump backward!</p>
        </div>

        <!-- Problem Display & Audio Button -->
        <div class="flex items-center justify-center gap-3 sm:gap-6 md:gap-8 text-5xl sm:text-7xl md:text-8xl font-black text-slate-800 mb-8 select-none flex-wrap">
            <span id="num1" class="text-blue-500 drop-shadow-md">0</span>
            <span class="text-slate-300">-</span>
            <span id="num2" class="text-amber-500 drop-shadow-md">0</span>
            <span class="text-slate-300">=</span>
            <div class="relative">
                <div id="answer-display" class="w-24 h-24 sm:w-32 sm:h-32 md:w-40 md:h-40 flex items-center justify-center border-[6px] sm:border-[8px] border-dashed border-slate-300 rounded-[2rem] bg-slate-50 text-slate-400 transition-all duration-300 shadow-inner">?</div>
            </div>
            <!-- Speaker Icon for Text to Speech -->
            <button id="speak-btn" class="btn-base btn-speaker ml-2" aria-label="Read Question Aloud">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-8 h-8 sm:w-10 sm:h-10">
                    <path d="M13.5 4.06c0-1.336-1.616-2.005-2.56-1.06l-4.5 4.5H4.508c-1.141 0-2.318.664-2.66 1.905A9.76 9.76 0 0 0 1.5 12c0 .898.121 1.768.35 2.595.341 1.24 1.518 1.905 2.659 1.905h1.93l4.5 4.5c.945.945 2.561.276 2.561-1.06V4.06ZM18.584 5.106a.75.75 0 0 1 1.06 0c3.808 3.807 3.808 9.98 0 13.788a.75.75 0 0 1-1.06-1.06 8.25 8.25 0 0 0 0-11.668.75.75 0 0 1 0-1.06Z" />
                    <path d="M15.932 7.757a.75.75 0 0 1 1.061 0 6 6 0 0 1 0 8.486.75.75 0 0 1-1.06-1.061 4.5 4.5 0 0 0 0-6.364.75.75 0 0 1 0-1.06Z" />
                </svg>
            </button>
        </div>

        <!-- Number Line -->
        <div class="number-line-container" id="number-line">
            <div class="line"></div>
            <div id="ticks-container"></div>
            
            <!-- Character -->
            <div id="character" class="character">
                <svg viewBox="0 0 200 220" width="100%" height="100%" style="overflow: visible;">
                    <path d="M 35 60 Q 30 140 45 180" fill="none" stroke="#15803d" stroke-width="8" stroke-linecap="round"/>
                    <ellipse cx="65" cy="190" rx="25" ry="14" fill="#22c55e"/>
                    <ellipse cx="145" cy="190" rx="25" ry="14" fill="#22c55e"/>
                    <ellipse cx="105" cy="140" rx="65" ry="55" fill="#22c55e"/>
                    <ellipse cx="105" cy="165" rx="45" ry="28" fill="#e2e8f0"/>
                    <circle cx="45" cy="150" r="14" fill="#22c55e"/>
                    <circle cx="70" cy="85" r="32" fill="#22c55e"/>
                    <circle cx="140" cy="85" r="32" fill="#22c55e"/>
                    <ellipse cx="105" cy="110" rx="80" ry="48" fill="#22c55e"/>
                    <circle cx="70" cy="85" r="18" fill="#0f172a"/>
                    <circle cx="63" cy="78" r="8" fill="#ffffff"/>
                    <circle cx="140" cy="85" r="18" fill="#0f172a"/>
                    <circle cx="133" cy="78" r="8" fill="#ffffff"/>
                    <circle cx="40" cy="120" r="16" fill="#fca5a5"/>
                    <circle cx="170" cy="120" r="16" fill="#fca5a5"/>
                    <path class="frog-mouth-closed" d="M 75 130 Q 105 150 135 130" stroke="#0f172a" stroke-width="6" fill="none" stroke-linecap="round"/>
                </svg>
            </div>
            <svg id="arc-svg" class="absolute inset-0 w-full h-full pointer-events-none"></svg>
        </div>

        <!-- Controls -->
        <div class="flex flex-col items-center gap-5 sm:gap-8 mt-12">
            <div id="action-buttons" class="flex gap-4 sm:gap-6 w-full max-w-3xl">
                <button id="reset-jumps-btn" class="btn-base btn-secondary flex-1 py-4 sm:py-6 text-xl sm:text-3xl">
                    START OVER
                </button>
                <button id="check-btn" class="btn-base btn-primary flex-[2] py-4 sm:py-6 text-2xl sm:text-4xl">
                    CHECK ANSWER
                </button>
            </div>
            
            <button id="next-btn" class="btn-base btn-success hidden w-full max-w-3xl py-4 sm:py-6 text-2xl sm:text-4xl">
                NEXT PROBLEM!
            </button>
            
            <div id="feedback" class="h-12 sm:h-16 text-3xl sm:text-5xl font-black transition-all duration-300 opacity-0 transform"></div>
        </div>

        <!-- Progress Footer -->
        <div class="mt-6 sm:mt-10 pt-6 sm:pt-8 border-t-4 border-slate-100 flex justify-between items-center text-slate-500 font-bold uppercase tracking-widest text-base sm:text-2xl">
            <div class="bg-blue-50 px-6 py-3 sm:px-8 sm:py-4 rounded-3xl border-4 border-blue-200">Score: <span id="score" class="text-blue-600 text-2xl sm:text-4xl font-black">0</span></div>
            <div class="bg-emerald-50 px-6 py-3 sm:px-8 sm:py-4 rounded-3xl border-4 border-emerald-200"><span id="solved-count" class="text-emerald-500 text-2xl sm:text-4xl font-black">1</span>/10</div>
        </div>
    </div>

    <script>
        // --- Audio Context & Synth ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let audioUnlocked = false;

        function unlockAudio() {
            if (!audioUnlocked) {
                audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                gain.gain.value = 0;
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.01);
                audioUnlocked = true;
            }
        }

        document.body.addEventListener('click', unlockAudio, { once: true });
        document.body.addEventListener('touchstart', unlockAudio, { once: true });

        function playSound(type) {
            if (!audioUnlocked || audioCtx.state === 'suspended') return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'jump') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(700, now + 0.15);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            } else if (type === 'correct') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.setValueAtTime(554.37, now + 0.1);
                osc.frequency.setValueAtTime(659.25, now + 0.2);
                osc.frequency.setValueAtTime(880, now + 0.3);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(250, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.4);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            } else if (type === 'catch') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(900, now);
                osc.frequency.exponentialRampToValueAtTime(1600, now + 0.1);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'firework') {
                const bufferSize = audioCtx.sampleRate * 0.5;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 1200;
                const noiseGain = audioCtx.createGain();
                noiseGain.gain.setValueAtTime(0.5, now);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                noise.connect(filter);
                filter.connect(noiseGain);
                noiseGain.connect(audioCtx.destination);
                noise.start(now);
            }
        }

        // --- Game Logic Variables ---
        let problemPool = [];
        let currentProblemIndex = 0;
        let currentNum1 = 0;
        let currentNum2 = 0;
        let score = 0;
        let currentPos = 0;
        let isInitialJumping = false;
        let isAnimating = false;
        let solvedCount = 0;
        let totalRounds = 10; 
        let isBonusActive = false;
        let bonusTimer = null;
        let flyInterval = null;
        let fireworkInterval = null;
        const maxNum = 10;
        
        // DOM Elements
        const character = document.getElementById('character');
        const num1El = document.getElementById('num1');
        const num2El = document.getElementById('num2');
        const answerDisplay = document.getElementById('answer-display');
        const checkBtn = document.getElementById('check-btn');
        const nextBtn = document.getElementById('next-btn');
        const resetBtn = document.getElementById('reset-jumps-btn');
        const speakBtn = document.getElementById('speak-btn');
        const feedback = document.getElementById('feedback');
        const scoreEl = document.getElementById('score');
        const solvedCountEl = document.getElementById('solved-count');
        const ticksContainer = document.getElementById('ticks-container');
        const arcSvg = document.getElementById('arc-svg');
        const bonusOverlay = document.getElementById('bonus-overlay');
        const bonusBar = document.getElementById('bonus-timer-bar');
        const bonusSeconds = document.getElementById('bonus-seconds');
        const tongueLine = document.getElementById('tongue-line');
        const tongueTip = document.getElementById('tongue-tip');
        const mouthClosed = document.querySelector('.bonus-mouth-closed');
        const mouthOpen = document.querySelector('.bonus-mouth-open');

        // Generate 10 unique non-repeating problems, ensuring answer > 0
        function generateProblemPool() {
            const allPossibleProblems = [];
            for (let a = 3; a <= 10; a++) {
                for (let b = 1; b < a; b++) { // Condition b < a guarantees non-zero answer
                    allPossibleProblems.push({ num1: a, num2: b });
                }
            }
            // Shuffle array using Fisher-Yates
            for (let i = allPossibleProblems.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [allPossibleProblems[i], allPossibleProblems[j]] = [allPossibleProblems[j], allPossibleProblems[i]];
            }
            // Take the first 10 for this game session
            problemPool = allPossibleProblems.slice(0, 10);
        }

        // Text to Speech
        speakBtn.addEventListener('click', () => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const text = `What is ${currentNum1} minus ${currentNum2}?`;
                const msg = new SpeechSynthesisUtterance(text);
                msg.rate = 0.85; 
                msg.pitch = 1.2; 
                msg.lang = 'en-US';
                window.speechSynthesis.speak(msg);
            }
        });

        // Start Screen
        document.getElementById('start-game-btn').addEventListener('click', () => {
            unlockAudio();
            document.getElementById('start-screen').classList.add('hidden');
            playSound('correct');
            initNumberLine();
            
            generateProblemPool();
            currentProblemIndex = 0;
            loadNextProblem();
        });

        // End Screen
        document.getElementById('play-again-btn').addEventListener('click', () => {
            document.getElementById('end-screen').classList.add('hidden');
            clearInterval(fireworkInterval);
            document.querySelectorAll('.confetti-piece, .firework-particle').forEach(e => e.remove());
            
            score = 0;
            solvedCount = 0;
            scoreEl.innerText = score;
            solvedCountEl.innerText = 1;
            
            generateProblemPool();
            currentProblemIndex = 0;
            loadNextProblem();
        });

        function initNumberLine() {
            ticksContainer.innerHTML = '';
            for (let i = 0; i <= maxNum; i++) {
                const percentage = 5 + (i * 9);
                const zone = document.createElement('div');
                zone.className = 'tick-zone';
                zone.style.left = `${percentage}%`;
                zone.onclick = () => handleTickClick(i);
                
                const tick = document.createElement('div');
                tick.className = 'tick';
                
                const label = document.createElement('div');
                label.className = 'tick-label';
                label.innerText = i;
                
                zone.appendChild(tick);
                zone.appendChild(label);
                ticksContainer.appendChild(zone);
            }
        }

        function getPositionForValue(val) { return 5 + (val * 9); }

        function createRipple(pos) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            const left = getPositionForValue(pos);
            const container = document.getElementById('number-line');
            ripple.style.left = `calc(${left}% - 10px)`;
            ripple.style.top = '50%';
            ripple.style.width = '20px';
            ripple.style.height = '20px';
            container.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        function loadNextProblem() {
            if (currentProblemIndex >= problemPool.length) return;

            const prob = problemPool[currentProblemIndex];
            currentNum1 = prob.num1;
            currentNum2 = prob.num2;
            
            num1El.innerText = currentNum1;
            num2El.innerText = currentNum2;
            solvedCountEl.innerText = Math.min(solvedCount + 1, totalRounds);
            
            resetAnswerDisplay();
            
            currentPos = 0;
            isInitialJumping = true;
            feedback.style.opacity = '0';
            
            document.getElementById('action-buttons').classList.remove('hidden');
            nextBtn.classList.add('hidden');
            bonusOverlay.classList.add('hidden');
            
            clearArcs();
            moveCharacter(0, false);
            
            setTimeout(() => { showInitialJump(); }, 600);
        }

        function resetAnswerDisplay() {
            answerDisplay.innerText = '?';
            answerDisplay.className = "w-24 h-24 sm:w-32 sm:h-32 md:w-40 md:h-40 flex items-center justify-center border-[6px] sm:border-[8px] border-dashed border-slate-300 rounded-[2rem] bg-slate-50 text-slate-400 transition-all duration-300 shadow-inner";
        }

        function moveCharacter(value, animate = true) {
            const pos = getPositionForValue(value);
            const charWidth = character.offsetWidth || 90;
            character.style.left = `calc(${pos}% - ${charWidth / 2}px)`;
            
            if (animate) {
                character.classList.remove('jump-animation');
                void character.offsetWidth; // trigger reflow
                character.classList.add('jump-animation');
                playSound('jump');
                setTimeout(() => createRipple(value), 350);
            }
            currentPos = value;
            
            if (!isInitialJumping) updateAnswerDisplay();
        }

        function updateAnswerDisplay() {
            answerDisplay.innerText = currentPos;
            answerDisplay.classList.remove('border-dashed', 'text-slate-400', 'border-slate-300', 'bg-slate-50');
            answerDisplay.classList.add('border-solid', 'text-rose-500', 'border-rose-400', 'bg-rose-50');
        }

        function handleTickClick(targetVal) {
            if (!nextBtn.classList.contains('hidden') || isBonusActive || isAnimating) return;
            isInitialJumping = false;
            isAnimating = true;

            if (targetVal < currentPos) {
                let jumpCount = 0;
                const stepBack = () => {
                    if (currentPos > targetVal) {
                        jumpCount++;
                        // ONLY ADD ARC AND NUMBER FOR BACKWARD JUMPS
                        drawJumpArc(currentPos, currentPos - 1, '#f43f5e', `-${jumpCount}`);
                        moveCharacter(currentPos - 1);
                        setTimeout(stepBack, 450);
                    } else {
                        isAnimating = false;
                    }
                };
                stepBack();
            } else if (targetVal > currentPos) {
                const stepForward = () => {
                    if (currentPos < targetVal) {
                        // NO ARC, NO NUMBER FOR FORWARD JUMPS
                        moveCharacter(currentPos + 1);
                        setTimeout(stepForward, 450);
                    } else {
                        isAnimating = false;
                    }
                };
                stepForward();
            } else {
                isAnimating = false;
            }
        }

        function drawJumpArc(start, end, color = '#f43f5e', labelText = null) {
            const containerRect = arcSvg.getBoundingClientRect();
            const startX = (getPositionForValue(start) / 100) * containerRect.width;
            const endX = (getPositionForValue(end) / 100) * containerRect.width;
            const centerY = containerRect.height / 2;
            const dist = Math.abs(end - start);
            const height = Math.min(containerRect.height * 0.4, dist * (containerRect.height / 5));

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const peakY = centerY - height * 2.5;
            const d = `M ${startX} ${centerY} Q ${(startX + endX) / 2} ${peakY} ${endX} ${centerY}`;
            
            path.setAttribute("d", d);
            path.setAttribute("class", "arc-path");
            path.style.stroke = color;
            path.style.animation = "drawArc 0.5s forwards";
            
            arcSvg.appendChild(path);

            if (labelText) {
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", (startX + endX) / 2);
                const truePeakY = 0.25 * centerY + 0.5 * peakY + 0.25 * centerY;
                text.setAttribute("y", truePeakY - 15);
                text.setAttribute("text-anchor", "middle");
                text.setAttribute("font-weight", "900");
                text.setAttribute("font-size", window.innerWidth > 640 ? "24px" : "18px");
                text.setAttribute("fill", color);
                text.setAttribute("class", "jump-label text-glow");
                text.textContent = labelText;
                
                text.style.opacity = "0";
                text.style.animation = "fadeUpIn 0.3s forwards 0.1s";
                
                arcSvg.appendChild(text);
            }
        }

        function clearArcs() { arcSvg.innerHTML = ''; }

        function showInitialJump() {
            isAnimating = true;
            const step = () => {
                if (currentPos < currentNum1) {
                    // SILENT MOVE - NO ARCS FOR INITIAL JUMP
                    moveCharacter(currentPos + 1);
                    setTimeout(step, 450);
                } else {
                    isInitialJumping = false;
                    isAnimating = false;
                    resetAnswerDisplay();
                }
            };
            step();
        }

        function checkAnswer() {
            const correctAnswer = currentNum1 - currentNum2;

            if (currentPos === correctAnswer) {
                score += 10;
                solvedCount++;
                scoreEl.innerText = score;
                
                showFeedback("GREAT JOB! 🌟", "text-emerald-500");
                playSound('correct');
                answerDisplay.classList.remove('bg-rose-50', 'border-rose-400', 'text-rose-500');
                answerDisplay.classList.add('bg-emerald-100', 'border-emerald-500', 'text-emerald-600');
                createConfetti();
                
                document.getElementById('action-buttons').classList.add('hidden');
                
                if (solvedCount >= totalRounds) {
                    setTimeout(() => {
                        document.getElementById('end-screen').classList.remove('hidden');
                        document.getElementById('final-score').innerText = score;
                        playSound('correct');
                        fireworkInterval = setInterval(launchFirework, 600);
                    }, 1500);
                } else if (solvedCount % 2 === 0) { // Bonus game every 2 solved problems
                    setTimeout(startBonusGame, 1200);
                } else {
                    nextBtn.classList.remove('hidden');
                }
            } else {
                showFeedback("OOPS! TRY AGAIN 🐸", "text-rose-500");
                playSound('wrong');
                answerDisplay.classList.add('animate-pulse');
                setTimeout(() => answerDisplay.classList.remove('animate-pulse'), 500);
            }
        }

        function startBonusGame() {
            isBonusActive = true;
            bonusOverlay.classList.remove('hidden');
            
            for(let i=0; i<4; i++) spawnFly(); // Spawn initial fireflies
            flyInterval = setInterval(spawnFly, 1200); 

            let timeLeft = 15000; // 15 seconds
            const interval = 50;
            
            bonusTimer = setInterval(() => {
                timeLeft -= interval;
                bonusBar.style.width = (timeLeft / 15000) * 100 + '%';
                bonusSeconds.innerText = (timeLeft / 1000).toFixed(1);

                if (timeLeft <= 0) endBonusGame();
            }, interval);
        }

        function spawnFly() {
            // Cap fireflies to max 6
            if(!isBonusActive || document.querySelectorAll('.bonus-fly-element').length >= 6) return;
            
            const firefly = document.createElement('div');
            firefly.className = 'bonus-fly-element pointer-events-auto';
            
            // Render the highly detailed illustration-based Firefly SVG
            firefly.innerHTML = `
                <div class="w-full h-full relative">
                    <svg viewBox="0 0 100 100" class="w-full h-full" style="overflow: visible;">
                        <defs>
                            <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
                                <stop offset="0%" stop-color="#fef08a" stop-opacity="1" />
                                <stop offset="70%" stop-color="#facc15" stop-opacity="0.9" />
                                <stop offset="100%" stop-color="#f97316" stop-opacity="0.8" />
                            </radialGradient>
                        </defs>
                        
                        <!-- Glowing Aura/Sparkles -->
                        <circle cx="50" cy="65" r="35" fill="#fef08a" opacity="0.3" class="firefly-glow-part" />
                        
                        <!-- Sparkles (Stars) -->
                        <path d="M 15 65 L 18 68 L 15 71 L 12 68 Z" fill="#fef08a" class="firefly-glow-part"/>
                        <path d="M 85 55 L 87 57 L 85 59 L 83 57 Z" fill="#fef08a" class="firefly-glow-part"/>
                        <path d="M 25 85 L 28 88 L 25 91 L 22 88 Z" fill="#fef08a" class="firefly-glow-part"/>
                        <path d="M 75 80 L 78 83 L 75 86 L 72 83 Z" fill="#fef08a" class="firefly-glow-part"/>
                        <path d="M 40 95 L 42 97 L 40 99 L 38 97 Z" fill="#fef08a" class="firefly-glow-part"/>
                        <path d="M 60 90 L 62 92 L 60 94 L 58 92 Z" fill="#fef08a" class="firefly-glow-part"/>

                        <!-- Abdomen/Belly -->
                        <circle cx="50" cy="60" r="22" fill="url(#glowGrad)" />
                        <!-- Belly Stripes -->
                        <path d="M 31 52 Q 50 56 69 52" stroke="#ea580c" stroke-width="2" fill="none" opacity="0.7"/>
                        <path d="M 29 60 Q 50 65 71 60" stroke="#ea580c" stroke-width="2" fill="none" opacity="0.7"/>
                        <path d="M 33 68 Q 50 72 67 68" stroke="#ea580c" stroke-width="2" fill="none" opacity="0.7"/>
                        <path d="M 41 76 Q 50 79 59 76" stroke="#ea580c" stroke-width="2" fill="none" opacity="0.7"/>
                        
                        <!-- Antennae -->
                        <path d="M 50 30 Q 30 15 25 20" stroke="#57534e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                        <circle cx="25" cy="20" r="3" fill="#57534e"/>
                        <path d="M 50 30 Q 70 15 75 20" stroke="#57534e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                        <circle cx="75" cy="20" r="3" fill="#57534e"/>
                        
                        <!-- Head -->
                        <ellipse cx="50" cy="30" rx="14" ry="10" fill="#78716c"/>
                        
                        <!-- Red Wings (Elytra) - Slightly open -->
                        <!-- Left Wing -->
                        <g transform="translate(50, 32) rotate(-25)">
                            <path d="M 0 0 C -35 0, -45 40, -5 45 Q 0 45 0 0 Z" fill="#ef4444"/>
                            <!-- Speckles -->
                            <circle cx="-15" cy="15" r="1.5" fill="white" opacity="0.8"/>
                            <circle cx="-22" cy="25" r="1" fill="white" opacity="0.6"/>
                            <circle cx="-10" cy="30" r="2" fill="white" opacity="0.9"/>
                            <circle cx="-18" cy="38" r="1" fill="white" opacity="0.5"/>
                            <circle cx="-5" cy="20" r="1.2" fill="white" opacity="0.7"/>
                        </g>
                        <!-- Right Wing -->
                        <g transform="translate(50, 32) rotate(25)">
                            <path d="M 0 0 C 35 0, 45 40, 5 45 Q 0 45 0 0 Z" fill="#ef4444"/>
                            <circle cx="15" cy="15" r="1.5" fill="white" opacity="0.8"/>
                            <circle cx="22" cy="25" r="1" fill="white" opacity="0.6"/>
                            <circle cx="10" cy="30" r="2" fill="white" opacity="0.9"/>
                            <circle cx="18" cy="38" r="1" fill="white" opacity="0.5"/>
                            <circle cx="5" cy="20" r="1.2" fill="white" opacity="0.7"/>
                        </g>
                    </svg>
                </div>
            `;
            
            const rect = bonusOverlay.getBoundingClientRect();
            const startX = Math.random() * (rect.width - 80);
            const startY = Math.random() * (rect.height * 0.45) + 80; 
            
            firefly.style.left = startX + 'px';
            firefly.style.top = startY + 'px';
            bonusOverlay.appendChild(firefly);

            const moveFly = () => {
                if(!isBonusActive || !firefly.parentElement) return;
                const nextX = Math.max(20, Math.min(rect.width - 80, parseFloat(firefly.style.left) + (Math.random() - 0.5) * 200));
                const nextY = Math.max(80, Math.min(rect.height * 0.6, parseFloat(firefly.style.top) + (Math.random() - 0.5) * 150));
                
                firefly.animate([
                    { left: firefly.style.left, top: firefly.style.top },
                    { left: nextX + 'px', top: nextY + 'px' }
                ], { duration: 1100 + Math.random() * 1200, easing: 'ease-in-out' }).onfinish = moveFly;
            };
            moveFly();

            firefly.onclick = (e) => catchFly(e, firefly);
        }

        function catchFly(e, fly) {
            if (fly.getAttribute('data-caught')) return;
            fly.setAttribute('data-caught', 'true');
            fly.style.pointerEvents = 'none';

            playSound('catch');

            const rect = bonusOverlay.getBoundingClientRect();
            const frogX = rect.width / 2;
            const frogY = rect.height - (rect.height < 500 ? 60 : 90); 
            
            const flyRect = fly.getBoundingClientRect();
            const flyX = flyRect.left - rect.left + flyRect.width / 2;
            const flyY = flyRect.top - rect.top + flyRect.height / 2;

            mouthClosed.setAttribute('visibility', 'hidden');
            mouthOpen.setAttribute('visibility', 'visible');

            tongueLine.setAttribute('x1', frogX);
            tongueLine.setAttribute('y1', frogY);
            tongueLine.setAttribute('x2', frogX);
            tongueLine.setAttribute('y2', frogY);
            tongueLine.setAttribute('visibility', 'visible');
            
            tongueTip.setAttribute('cx', frogX);
            tongueTip.setAttribute('cy', frogY);
            tongueTip.setAttribute('visibility', 'visible');

            const duration = 120;
            const startTime = performance.now();

            function animateTongue(time) {
                const progress = Math.min((time - startTime) / duration, 1);
                
                if (progress < 1) {
                    const curX = frogX + (flyX - frogX) * progress;
                    const curY = frogY + (flyY - frogY) * progress;
                    tongueLine.setAttribute('x2', curX);
                    tongueLine.setAttribute('y2', curY);
                    tongueTip.setAttribute('cx', curX);
                    tongueTip.setAttribute('cy', curY);
                    requestAnimationFrame(animateTongue);
                } else {
                    score += 5;
                    scoreEl.innerText = score;
                    
                    const pullStartTime = performance.now();
                    function retract(time2) {
                        const p2 = Math.min((time2 - pullStartTime) / duration, 1);
                        const curX = flyX + (frogX - flyX) * p2;
                        const curY = flyY + (frogY - flyY) * p2;
                        
                        tongueLine.setAttribute('x2', curX);
                        tongueLine.setAttribute('y2', curY);
                        tongueTip.setAttribute('cx', curX);
                        tongueTip.setAttribute('cy', curY);
                        
                        fly.style.left = (curX - flyRect.width/2) + 'px';
                        fly.style.top = (curY - flyRect.height/2) + 'px';
                        fly.style.transform = `scale(${1 - p2}) rotate(${p2 * 360}deg)`;

                        if (p2 < 1) {
                            requestAnimationFrame(retract);
                        } else {
                            tongueLine.setAttribute('visibility', 'hidden');
                            tongueTip.setAttribute('visibility', 'hidden');
                            fly.remove();
                            mouthClosed.setAttribute('visibility', 'visible');
                            mouthOpen.setAttribute('visibility', 'hidden');
                        }
                    }
                    requestAnimationFrame(retract);
                }
            }
            requestAnimationFrame(animateTongue);
        }

        function endBonusGame() {
            clearInterval(bonusTimer);
            clearInterval(flyInterval);
            isBonusActive = false;
            document.querySelectorAll('.bonus-fly-element').forEach(f => f.remove());
            bonusOverlay.classList.add('hidden');
            nextBtn.classList.remove('hidden');
            showFeedback("BONUS DONE! 🌟", "text-rose-500");
        }

        function showFeedback(text, colorClass) {
            feedback.innerText = text;
            feedback.className = `h-12 sm:h-16 text-3xl sm:text-5xl font-black transition-all duration-300 opacity-100 transform translate-y-0 ${colorClass}`;
        }

        // Highly Realistic 3D Confetti Engine
        function createConfetti() {
            const colors = ['#f43f5e', '#22c55e', '#eab308', '#3b82f6', '#a855f7', '#ec4899', '#06b6d4'];
            for (let i = 0; i < 120; i++) {
                const conf = document.createElement('div');
                conf.className = 'absolute z-[9999] pointer-events-none';
                
                const w = Math.random() * 8 + 6;
                const h = Math.random() * 12 + 8;
                conf.style.width = w + 'px';
                conf.style.height = Math.random() > 0.4 ? h + 'px' : w + 'px'; // Mix of rectangles and squares
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px'; // Mix of circles and rectangles
                
                conf.style.left = (Math.random() * 100) + 'vw';
                conf.style.top = '-30px';
                document.body.appendChild(conf);

                const fallDuration = 2000 + Math.random() * 2500;
                const endY = window.innerHeight + 150;
                const endX = (Math.random() - 0.5) * 600; // Drift sideways
                
                // 3D rotations for highly realistic flutter
                const rotateX = Math.random() * 15 + 5; 
                const rotateY = Math.random() * 15 + 5;
                const rotateZ = Math.random() * 5;

                conf.animate([
                    { transform: `translate3d(0, 0, 0) rotateX(0deg) rotateY(0deg) rotateZ(0deg)`, opacity: 1 },
                    { transform: `translate3d(${endX}px, ${endY}px, 0) rotateX(${rotateX*360}deg) rotateY(${rotateY*180}deg) rotateZ(${rotateZ*90}deg)`, opacity: 1 }
                ], {
                    duration: fallDuration,
                    easing: 'cubic-bezier(0.37, 0, 0.63, 1)' 
                }).onfinish = () => conf.remove();
            }
        }

        // Firework Engine for End Screen
        function launchFirework() {
            const x = Math.random() * (window.innerWidth - 100) + 50;
            const y = window.innerHeight; 
            const rocket = document.createElement('div');
            rocket.className = 'absolute w-2 h-10 bg-yellow-300 rounded-full firework-particle shadow-[0_0_15px_#fde047]';
            rocket.style.left = x + 'px';
            rocket.style.top = y + 'px';
            document.body.appendChild(rocket);
            
            const targetY = window.innerHeight * 0.1 + Math.random() * (window.innerHeight * 0.4);
            playSound('jump');
            
            rocket.animate([
                { top: y + 'px', transform: 'scaleY(1)' },
                { top: targetY + 'px', transform: 'scaleY(0.5)' }
            ], { duration: 700, easing: 'ease-out' }).onfinish = () => {
                rocket.remove();
                playSound('firework');
                createExplosion(x, targetY);
            };
        }

        function createExplosion(x, y) {
            const colors = ['#f43f5e', '#22c55e', '#3b82f6', '#eab308', '#a855f7', '#06b6d4', '#ec4899'];
            for(let i=0; i<80; i++) {
                const particle = document.createElement('div');
                particle.className = 'absolute w-4 h-4 rounded-full firework-particle';
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.boxShadow = `0 0 10px ${particle.style.backgroundColor}`;
                document.body.appendChild(particle);
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = 100 + Math.random() * 300;
                
                particle.animate([
                    { transform: 'translate(0,0) scale(1)', opacity: 1 },
                    { transform: `translate(${Math.cos(angle)*velocity}px, ${Math.sin(angle)*velocity + 200}px) scale(0)`, opacity: 0 }
                ], { duration: 1500 + Math.random()*1000, easing: 'cubic-bezier(.17,.89,.32,1)' }).onfinish = () => particle.remove();
            }
        }

        // Action Listeners
        checkBtn.addEventListener('click', checkAnswer);
        nextBtn.addEventListener('click', () => {
            currentProblemIndex++;
            loadNextProblem();
        });
        resetBtn.addEventListener('click', () => {
            if (isBonusActive || isAnimating) return;
            isInitialJumping = true; 
            clearArcs();
            currentPos = 0;
            moveCharacter(0, false);
            setTimeout(showInitialJump, 300);
            playSound('jump');
        });

        // Handle Resizing Gracefully
        window.addEventListener('resize', () => {
            clearArcs();
            const pos = getPositionForValue(currentPos);
            const charWidth = character.offsetWidth || 90;
            character.style.left = `calc(${pos}% - ${charWidth / 2}px)`;
        });

    </script>
</body>
</html>
