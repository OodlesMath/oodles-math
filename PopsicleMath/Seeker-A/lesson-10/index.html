<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Number Line Adventure - Math Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* --- MAIN GAME STYLES --- */
        :root {
            --green: #58cc02; --green-shadow: #58a700;
            --blue: #1cb0f6; --blue-shadow: #1899d6;
            --yellow: #ffc800; --yellow-shadow: #e5b400;
            --red: #ff4b4b; --red-shadow: #ea2b2b;
            --purple: #ce82ff; --white: #ffffff;
            --bg-gray: #f7f7f7; --border-gray: #e5e5e5;
            --text-dark: #4b4b4b; --text-light: #afafaf;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #7dd3fc;
            font-family: 'Poppins', sans-serif;
            touch-action: none; user-select: none; -webkit-user-select: none;
        }

        #gameCanvas {
            display: block; width: 100%; height: 100%;
            position: absolute; top: 0; left: 0; z-index: 1;
            cursor: pointer;
        }

        #fxCanvas {
            display: block; width: 100%; height: 100%;
            position: absolute; top: 0; left: 0; z-index: 100;
            pointer-events: none;
        }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
        }

        #top-bar {
            position: absolute; top: 20px; width: 100%; display: flex;
            justify-content: center; align-items: flex-start; padding: 0 20px;
            box-sizing: border-box; pointer-events: none; display: none;
        }

        .top-bar-inner {
            display: flex; width: 100%; max-width: 1200px;
            justify-content: flex-start; gap: 20px;
        }

        @media (max-width: 768px) {
            .top-bar-inner { flex-direction: column; align-items: center; gap: 10px; }
        }

        .ui-box {
            background: var(--white); border: 3px solid var(--border-gray);
            border-bottom: 6px solid var(--border-gray); padding: 10px 25px;
            border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center;
            pointer-events: auto;
        }

        #score-container { flex-direction: column; min-width: 120px; }
        .gem-icon { width: 32px; height: 32px; margin-right: 8px; filter: drop-shadow(0px 3px 0px rgba(0,0,0,0.15)); }
        #score-display { font-size: 2rem; font-weight: 900; color: var(--blue); display: flex; align-items: center; }        
        #progress-display { font-size: 1rem; font-weight: 700; color: var(--text-light); margin-top: -5px; text-transform: uppercase; letter-spacing: 1px; }

        #question-board { gap: 20px; transform: translateY(0); animation: bounceSoft 3s ease-in-out infinite; }
        @keyframes bounceSoft { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        
        #question-text { font-size: 3rem; font-weight: 900; color: var(--purple); white-space: nowrap; }

        #speaker-btn {
            background: var(--blue); border: none; border-bottom: 5px solid var(--blue-shadow);
            border-radius: 50%; width: 60px; height: 60px; display: flex;
            justify-content: center; align-items: center; cursor: pointer;
            transition: all 0.1s ease; flex-shrink: 0; padding: 12px;
        }
        #speaker-btn svg { width: 100%; height: 100%; fill: var(--white); }
        #speaker-btn:active { transform: translateY(5px); border-bottom: 0px solid var(--blue-shadow); margin-bottom: 5px; }

        #bottom-controls {
            position: absolute; bottom: 30px; display: flex; gap: 15px;
            pointer-events: auto; display: none; background: rgba(255, 255, 255, 0.9);
            padding: 15px 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 4px solid var(--border-gray); align-items: center; justify-content: center; flex-wrap: wrap;
        }

        .ctrl-btn {
            border: none; border-radius: 20px; padding: 15px 35px;
            font-size: 1.5rem; color: var(--white); font-family: 'Poppins', sans-serif;
            font-weight: 900; cursor: pointer; text-transform: uppercase;
            letter-spacing: 1px; transition: all 0.1s ease; display: flex;
            align-items: center; justify-content: center; gap: 10px;
        }

        .btn-blue { background: var(--blue); border-bottom: 6px solid var(--blue-shadow); }
        .btn-yellow { background: var(--yellow); border-bottom: 6px solid var(--yellow-shadow); color: var(--text-dark); }
        .btn-green { background: var(--green); border-bottom: 6px solid var(--green-shadow); }
        .btn-green-next { background: #10b981; border-bottom: 6px solid #059669; }
        
        .ctrl-btn:active { transform: translateY(6px); border-bottom-width: 0px; margin-bottom: 6px; }
        .ctrl-btn svg { width: 28px; height: 28px; fill: currentColor; font-weight: bold; }

        .panel {
            background: var(--white); border: 4px solid var(--border-gray);
            border-bottom: 12px solid var(--border-gray); box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            padding: 40px 50px; border-radius: 35px; text-align: center; color: var(--text-dark);
            pointer-events: auto; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%; width: 450px; box-sizing: border-box; display: flex;
            flex-direction: column; align-items: center;
        }
        .panel.hidden { display: none !important; }
        .title-icon { width: 100px; height: 100px; margin-bottom: 10px; animation: bounceSoft 2s infinite ease-in-out; }
        
        .panel h1 { margin: 5px 0 10px; font-size: 3.5rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; line-height: 1.1; }
        .title-start { color: var(--green); }
        .title-win { color: var(--yellow); }
        .panel p { font-size: 1.2rem; color: var(--text-light); margin-bottom: 25px; line-height: 1.6; font-weight: 700; }
        .highlight { color: var(--blue); font-weight: 900; font-size: 2.2rem; }

        button.main-btn {
            background: var(--green); border: none; border-bottom: 6px solid var(--green-shadow);
            border-radius: 20px; padding: 18px 0; font-size: 1.8rem; color: var(--white);
            font-family: 'Poppins', sans-serif; font-weight: 900; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; width: 100%; margin-top: 10px; transition: all 0.1s ease;
        }
        button.main-btn.btn-blue { background: var(--blue); border-bottom-color: var(--blue-shadow); }
        button.main-btn:hover { filter: brightness(1.1); }
        button.main-btn:active { transform: translateY(6px); border-bottom-width: 0px; margin-bottom: 6px; }

        @media (max-width: 768px) {
            #question-text { font-size: 2.2rem; }
            .panel h1 { font-size: 2.8rem; }
            button.main-btn { font-size: 1.5rem; padding: 15px 0; }
            .ctrl-btn { padding: 12px 25px; font-size: 1.2rem; }
            #bottom-controls { width: 95%; padding: 10px; bottom: 15px; }
        }

        /* --- MINIGAME OVERLAY STYLES --- */
        #mg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #a1c4fd 0%, #e0c3fc 100%);
            z-index: 2000; display: none; flex-direction: column; align-items: center;
            font-family: 'Poppins', sans-serif; user-select: none;
        }
        
        .mg-bg-shapes { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .mg-cloud { position: absolute; background: rgba(255, 255, 255, 0.3); border-radius: 100px; }
        .mg-cloud::before, .mg-cloud::after { content: ''; position: absolute; background: rgba(255, 255, 255, 0.3); border-radius: 50%; }

        .mg-header-pill {
            background: #ffffff; border-radius: 20px; padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            width: 90%; max-width: 600px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%); z-index: 20;
        }
        .mg-header-pill h2 { font-size: 24px; color: #4b4b4b; margin: 0; font-weight: 800; }
        .mg-controls-group { display: flex; gap: 10px; }
        
        .mg-btn-icon {
            width: 45px; height: 45px; border-radius: 12px; border: none; cursor: pointer;
            display: flex; justify-content: center; align-items: center; transition: transform 0.1s;
        }
        .mg-btn-icon:active { transform: translateY(4px); box-shadow: 0 0 0 transparent !important; }
        .mg-btn-icon svg { width: 24px; height: 24px; }
        .mg-btn-gray { background: #e5e5e5; box-shadow: 0 4px 0 #cccccc; }
        .mg-btn-red { background: #ff4b4b; box-shadow: 0 4px 0 #ea2b2b; }

        #mg-tubes-container {
            display: flex; gap: 15px; justify-content: center; align-items: flex-end;
            margin-top: 150px; z-index: 10;
        }
        
        .mg-tube {
            width: 55px; height: 240px; border: 3px solid rgba(255, 255, 255, 0.9); border-top: none; border-radius: 0 0 30px 30px;
            background: rgba(255, 255, 255, 0.2); box-shadow: inset 0 0 10px rgba(255,255,255,0.5), 0 5px 15px rgba(0,0,0,0.05);
            display: flex; flex-direction: column-reverse; align-items: center; justify-content: flex-start;
            padding-bottom: 5px; gap: 2px; cursor: pointer; position: relative;
        }
        
        .mg-tube::after {
            content: ''; position: absolute; left: 4px; top: 0; bottom: 10px; width: 10px;
            background: linear-gradient(to right, rgba(255,255,255,0.8), transparent); border-radius: 10px; pointer-events: none;
        }
        .mg-tube.completed {
            border-color: #FFD700; box-shadow: 0 0 20px rgba(255, 215, 0, 0.6), inset 0 0 15px rgba(255,255,255,0.8);
            animation: mgPulseGlow 1.5s infinite;
        }
        @keyframes mgPulseGlow { 0% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.4), inset 0 0 15px rgba(255,255,255,0.8); } 50% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.8), inset 0 0 15px rgba(255,255,255,0.8); } 100% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.4), inset 0 0 15px rgba(255,255,255,0.8); } }
        
        .mg-ball {
            width: 45px; height: 45px; border-radius: 50%; position: relative; z-index: 2;
            box-shadow: 0 3px 5px rgba(0,0,0,0.1); transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .mg-ball::after {
            content: ''; position: absolute; top: 15%; left: 20%; width: 30%; height: 30%;
            background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 70%); border-radius: 50%; transform: rotate(-45deg);
        }
        .mg-ball.selected { transform: translateY(-40px); }

        .mg-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px); z-index: 25; display: none; justify-content: center; align-items: center;
        }
        .mg-overlay.active { display: flex; }
        .mg-card { background: rgba(255, 255, 255, 0.95); border-radius: 30px; padding: 30px; text-align: center; box-shadow: 0 15px 30px rgba(0,0,0,0.15); max-width: 90%; width: 400px; }
        .mg-btn { display: inline-block; font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 20px; padding: 15px 30px; border-radius: 20px; border: none; cursor: pointer; transition: transform 0.1s ease; margin-top: 15px;}
        .mg-btn-green { background: #58CC02; color: white; box-shadow: 0 6px 0 #58A700; }
        .mg-btn-green:active { transform: translateY(6px); box-shadow: 0 0 0 #58A700; }
        
        #mg-confetti-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 99999; }
        
        .mg-particle { position: absolute; pointer-events: none; background: white; border-radius: 50%; z-index: 25; animation: mgSparkle 0.6s ease-out forwards; }
        @keyframes mgSparkle { 0% { transform: scale(0) translateY(0); opacity: 1; } 50% { opacity: 1; } 100% { transform: scale(1.5) translateY(-30px); opacity: 0; } }

        @media (max-width: 600px) {
            .mg-header-pill { width: 95%; padding: 10px; }
            .mg-header-pill h2 { font-size: 18px; }
            .mg-tube { width: 45px; height: 200px; }
            .mg-ball { width: 36px; height: 36px; }
            #mg-tubes-container { gap: 10px; }
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- MAIN GAME LAYERS -->
    <canvas id="gameCanvas"></canvas>
    <canvas id="fxCanvas"></canvas> 

    <div id="ui-layer">
        <div id="top-bar">
            <div class="top-bar-inner">
                <div id="score-container" class="ui-box">
                    <div id="score-display">
                        <svg class="gem-icon" viewBox="0 0 24 24"><path fill="#00e5ff" d="M12 2L2 8l10 14L22 8Z"/><path fill="#00b8cc" d="M12 2v20l10-14Z"/><path fill="#e0ffff" d="M12 2L2 8h20Z"/></svg>
                        <span id="score-text">0</span>
                    </div>
                    <div id="progress-display">Level 1/10</div>
                </div>
                
                <div id="question-board" class="ui-box">
                    <span id="question-text">1 + 1 = ?</span>
                    <button id="speaker-btn" onclick="playTTS()" title="Read aloud">
                        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <div id="bottom-controls">
            <button onclick="handleReset()" class="ctrl-btn btn-yellow" id="btn-reset" title="Reset Hops">
                <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
                RESET
            </button>
            <button onclick="handleCheck()" class="ctrl-btn btn-green" id="btn-check" title="Check Answer">
                <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                CHECK
            </button>
            <button onclick="handleNext()" class="ctrl-btn btn-green-next" id="btn-next" style="display:none;" title="Next Question">
                NEXT <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
            </button>
        </div>

        <div id="start-panel" class="panel">
            <svg class="title-icon" viewBox="0 0 100 100">
                <circle cx="50" cy="55" r="40" fill="#a1e535"/>
                <circle cx="30" cy="25" r="15" fill="#a1e535"/>
                <circle cx="70" cy="25" r="15" fill="#a1e535"/>
                <circle cx="30" cy="25" r="8" fill="#fff"/>
                <circle cx="70" cy="25" r="8" fill="#fff"/>
                <circle cx="30" cy="25" r="4" fill="#000"/>
                <circle cx="70" cy="25" r="4" fill="#000"/>
                <path d="M 35 60 Q 50 75 65 60" stroke="#4b4b4b" stroke-width="6" fill="none" stroke-linecap="round"/>
            </svg>
            <h1 class="title-start">Number Line</h1>
            <p>Tap the leaf to hop to it<br>and solve the math!</p>
            <button class="main-btn" onclick="startGame()">START GAME</button>
        </div>

        <div id="win-panel" class="panel hidden">
            <svg class="title-icon" viewBox="0 0 24 24" fill="#ffc800"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            <h1 id="win-title" class="title-win">GREAT JOB!</h1>
            <p>You completed all the hops!</p>
            <h2 style="color:var(--text-dark); font-size:1.8rem; margin:10px 0 25px;">Total Score: <br><span id="win-score" class="highlight">10</span></h2>
            <button class="main-btn btn-blue" onclick="resetMainGame()">PLAY AGAIN</button>
        </div>
    </div>

    <!-- MINIGAME OVERLAY PENALTY -->
    <div id="mg-layer">
        <div class="mg-bg-shapes" id="mg-bg-shapes"></div>
        <div class="mg-header-pill">
            <h2>Bonus: Sort the Colors!</h2>
            <div class="mg-controls-group">
                <button class="mg-btn-icon mg-btn-gray" onclick="mg_undoMove()">
                    <svg viewBox="0 0 24 24"><path fill="#1cb0f6" d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C20.48 10.3 16.89 8 12.5 8z"/></svg>
                </button>
                <button class="mg-btn-icon mg-btn-red" onclick="mg_restartLevel()">
                    <svg viewBox="0 0 24 24"><path fill="#ffffff" d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
                </button>
            </div>
        </div>
        
        <div id="mg-tubes-container"></div>
        
        <div id="mg-level-complete-overlay" class="mg-overlay">
            <div class="mg-card">
                <h1 style="color: #58CC02;">Excellent!</h1>
                <p>You sorted the colors.<br>Let's go back to Math!</p>
                <button class="mg-btn mg-btn-green" onclick="closeMinigame()">RETURN TO MATH</button>
            </div>
        </div>
        <canvas id="mg-confetti-canvas"></canvas>
    </div>

<script>
    // =========================================================================
    // MAIN GAME SCRIPT
    // =========================================================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const fxCanvas = document.getElementById('fxCanvas');
    const fxCtx = fxCanvas.getContext('2d');
    
    let canvasWidth, canvasHeight;
    let leafSpacing, startX, leafWidth;
    let WATER_LEVEL;
    
    let gameState = 'start'; 
    let diamonds = 0; 
    let questionsAnswered = 0;
    let maxQuestions = 10;
    let usedQuestions = new Set();
    
    let frog = {
        leafIndex: 1, 
        startLeafIndex: 1, 
        x: -1000, y: 0,
        vx: 0, vy: 0,
        hopProgress: 0,
        isHopping: false,
        state: 'idle', 
        facing: 1,
        targetIndex: 1,
        currentHopData: null
    };

    let jumpQueue = [];      
    let completedHops = [];  
    
    let clouds = [];
    let bgTrees = [];
    let mountains = [];
    let decorFishes = [];
    let standingLotuses = [];
    let floatingLeaves = [];
    let platforms = []; 
    let particles = [];
    let confetti = [];
    
    let backgroundTime = 0;
    let currentQuestion = null;

    // --- AUDIO SYSTEM ---
    let audioCtx = null;
    function initAudio() { 
        if(!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume(); 
        }
    }
    
    function playTone(freq, type, duration, vol=0.1) {
        if(!audioCtx) return;
        try {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        } catch(e) {}
    }

    const sfx = {
        hop: () => { playTone(400, 'sine', 0.1, 0.05); setTimeout(() => playTone(600, 'sine', 0.15, 0.05), 50); },
        correct: () => { playTone(523.25, 'sine', 0.1, 0.1); setTimeout(() => playTone(659.25, 'sine', 0.1, 0.1), 100); setTimeout(() => playTone(783.99, 'sine', 0.3, 0.1), 200); },
        wrong: () => { playTone(250, 'square', 0.2, 0.08); setTimeout(() => playTone(150, 'square', 0.3, 0.1), 150); },
        reset: () => { playTone(300, 'triangle', 0.1, 0.1); setTimeout(() => playTone(250, 'triangle', 0.2, 0.1), 100); },
        win: () => { [523.25, 659.25, 783.99, 1046.50, 1318.51].forEach((freq, i) => setTimeout(() => playTone(freq, 'square', 0.4, 0.08), i * 120)); }
    };

    function resize() {
        canvasWidth = window.innerWidth;
        canvasHeight = window.innerHeight;
        canvas.width = canvasWidth; canvas.height = canvasHeight;
        fxCanvas.width = canvasWidth; fxCanvas.height = canvasHeight;
        
        WATER_LEVEL = canvasHeight * 0.7;

        let padding = canvasWidth * 0.05; 
        if (padding < 20) padding = 20;
        let availableWidth = canvasWidth - padding * 2;
        leafSpacing = availableWidth / 9; 
        startX = padding;
        leafWidth = Math.min(leafSpacing * 0.7, 80); 

        platforms = [];
        let lineY = WATER_LEVEL + 20; 
        for(let i = 1; i <= 10; i++) {
            platforms.push({ num: i, x: startX + (i - 1) * leafSpacing, y: lineY, w: leafWidth });
        }

        if(!frog.isHopping && frog.state === 'idle' && platforms[frog.leafIndex - 1]) {
            let p = platforms[frog.leafIndex - 1];
            frog.x = p.x; frog.y = p.y;
        }
        generateEnvironment();
    }
    window.addEventListener('resize', resize);

    function generateEnvironment() {
        clouds = []; bgTrees = []; decorFishes = []; standingLotuses = []; floatingLeaves = []; mountains = [];
        
        for(let i=0; i<8; i++) { clouds.push({ x: Math.random() * canvasWidth, y: Math.random() * (WATER_LEVEL * 0.5), size: 30 + Math.random() * 50, speed: Math.random() * 0.2 + 0.1 }); }
        for(let i=0; i<8; i++) { bgTrees.push({ x: Math.random() * canvasWidth, y: WATER_LEVEL - (10 + Math.random() * 20), scale: 0.4 + Math.random() * 0.5 }); }
        
        mountains.push({ x: canvasWidth * 0.2, h: 250, w: 500, c1: "#8cd136", c2: "#5cb823" });
        mountains.push({ x: canvasWidth * 0.8, h: 220, w: 450, c1: "#a1e535", c2: "#7ab823" });
        mountains.push({ x: canvasWidth * 0.5, h: 300, w: 600, c1: "#b5ea54", c2: "#499b2e" });

        let fishColors = [ {body: '#ff9900', stripe: '#ffd633'}, {body: '#00b4d8', stripe: '#74c69d'}, {body: '#ce82ff', stripe: '#ffb2d1'}, {body: '#ff4b4b', stripe: '#ffc800'} ];
        for(let i=0; i<15; i++) {
            decorFishes.push({ x: Math.random() * canvasWidth, y: WATER_LEVEL + 40 + Math.random() * (canvasHeight - WATER_LEVEL - 60), speed: 0.5 + Math.random(), dir: Math.random() > 0.5 ? 1 : -1, scale: 0.4 + Math.random() * 0.3, bobOffset: Math.random() * Math.PI * 2, colorObj: fishColors[Math.floor(Math.random() * fishColors.length)] });
        }
        for(let i=0; i<10; i++) {
            standingLotuses.push({ x: Math.random()*canvasWidth, y: WATER_LEVEL - 10 + Math.random() * 10, height: 40 + Math.random() * 30, scale: 0.5 + Math.random() * 0.3, swayOffset: Math.random() * Math.PI * 2 });
            floatingLeaves.push({ x: Math.random()*canvasWidth, y: WATER_LEVEL + Math.random() * 20, scale: 0.3 + Math.random() * 0.4, rotation: Math.random() * Math.PI * 2 });
        }
    }

    function generateMathQuestion() {
        let op = (questionsAnswered % 2 === 0) ? '+' : '-';
        let num1, num2, ans, qString;
        let attempts = 0;
        do {
            if (op === '+') {
                ans = Math.floor(Math.random() * 9) + 2; 
                num1 = Math.floor(Math.random() * (ans - 1)) + 1; 
                num2 = ans - num1;
            } else {
                num1 = Math.floor(Math.random() * 9) + 2; 
                num2 = Math.floor(Math.random() * (num1 - 1)) + 1; 
                ans = num1 - num2; 
            }
            qString = `${num1} ${op} ${num2}`;
            attempts++;
            if (attempts > 50) break;
        } while (usedQuestions.has(qString));

        usedQuestions.add(qString);
        currentQuestion = {
            num1: num1, op: op, num2: num2, ans: ans, failed: false,
            text: `${num1} ${op} ${num2} = ?`,
            spokenText: `${num1} ${op === '+' ? 'plus' : 'minus'} ${num2} equals what?`
        };
        
        document.getElementById('question-text').innerText = currentQuestion.text;
        document.getElementById('progress-display').innerText = `Level ${questionsAnswered + 1}/10`;

        jumpQueue = [];
        completedHops = [];
        resetFrogToStart(num1, op === '+');
    }

    function resetFrogToStart(num1, isAdd) {
        frog.startLeafIndex = num1;
        frog.leafIndex = num1;
        frog.targetIndex = num1;
        frog.state = 'idle';
        
        let startLeaf = platforms[num1 - 1];
        if (startLeaf) {
            frog.x = startLeaf.x; frog.y = startLeaf.y;
            frog.facing = isAdd ? 1 : -1;
            createSparkles(frog.x, frog.y, 15, '#ffffff');
        }
    }

    function playTTS() {
        if (!currentQuestion) return;
        initAudio();
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            let msg = new SpeechSynthesisUtterance(currentQuestion.spokenText);
            msg.lang = 'en-US'; msg.rate = 0.9; msg.pitch = 1.2;
            window.speechSynthesis.speak(msg);
        }
    }

    function initLevel() {
        initAudio();
        diamonds = 0; questionsAnswered = 0; usedQuestions.clear();
        document.getElementById('score-text').innerText = `0`;
        particles = []; confetti = []; jumpQueue = []; completedHops = [];
        resize(); 
        setTimeout(() => { generateMathQuestion(); }, 500);
    }

    canvas.addEventListener('mousedown', handleCanvasClick);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleCanvasClick(e.touches[0] || e); }, {passive: false});

    function handleCanvasClick(e) {
        initAudio();
        if(gameState !== 'playing' || frog.isHopping || frog.state !== 'idle' || jumpQueue.length > 0) return;
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        for(let p of platforms) {
            let leafCenterX = p.x + p.w / 2;
            let leafCenterY = p.y;
            // Tighter bound prevents overlapping click bugs
            if(Math.abs(x - leafCenterX) < p.w * 0.7 && Math.abs(y - leafCenterY) < 80) {
                planJumpToLeaf(p.num);
                break;
            }
        }
    }

    function planJumpToLeaf(targetNum) {
        if (frog.leafIndex === targetNum) return; 
        
        let step = targetNum > frog.leafIndex ? 1 : -1;
        let curr = frog.leafIndex;
        jumpQueue = [];
        
        while (curr !== targetNum) {
            curr += step;
            jumpQueue.push(curr);
        }
        
        startNextHop();
    }

    function startNextHop() {
        if (jumpQueue.length === 0) return;
        let nextLeaf = jumpQueue.shift();
        
        let stepCount = completedHops.length + 1;
        
        frog.targetIndex = nextLeaf;
        frog.facing = nextLeaf > frog.leafIndex ? 1 : -1;
        frog.isHopping = true;
        frog.hopProgress = 0;
        
        frog.currentHopData = { from: frog.leafIndex, to: nextLeaf, stepNum: stepCount };
        sfx.hop();
    }

    function handleReset() {
        initAudio();
        if(gameState !== 'playing' || frog.isHopping || frog.state !== 'idle') return;
        if(completedHops.length === 0 && jumpQueue.length === 0) return; 

        sfx.reset();
        jumpQueue = [];
        completedHops = [];
        frog.leafIndex = frog.startLeafIndex;
        let p = platforms[frog.startLeafIndex - 1];
        frog.x = p.x; frog.y = p.y;
        createSparkles(frog.x, frog.y, 10, '#ffc800');
    }

    function handleCheck() {
        initAudio();
        if(gameState !== 'playing' || frog.isHopping || frog.state !== 'idle' || jumpQueue.length > 0) return;

        if (frog.leafIndex === currentQuestion.ans) {
            // Correct
            sfx.correct();
            if(!currentQuestion.failed) {
                diamonds++;
                document.getElementById('score-text').innerText = `${diamonds}`;
                createSparkles(frog.x, frog.y, 25, '#ffc800');
            }
            
            // Show full math equation
            currentQuestion.text = `${currentQuestion.num1} ${currentQuestion.op} ${currentQuestion.num2} = ${currentQuestion.ans}`;
            currentQuestion.spokenText = `${currentQuestion.num1} ${currentQuestion.op === '+' ? 'plus' : 'minus'} ${currentQuestion.num2} equals ${currentQuestion.ans}`;
            document.getElementById('question-text').innerText = currentQuestion.text;
            
            // Switch UI for Next
            document.getElementById('btn-check').style.display = 'none';
            document.getElementById('btn-reset').style.display = 'none';
            document.getElementById('btn-next').style.display = 'flex';
        } else {
            // Wrong
            sfx.wrong();
            currentQuestion.failed = true;
            createSparkles(frog.x, frog.y, 20, '#ff4b4b');
            
            // Reset to start of question to retry
            jumpQueue = [];
            completedHops = [];
            frog.leafIndex = frog.startLeafIndex;
            frog.targetIndex = frog.startLeafIndex;
            let p = platforms[frog.startLeafIndex - 1];
            frog.x = p.x;
            frog.y = p.y;
            frog.state = 'idle';
            frog.isHopping = false;
        }
    }

    function handleNext() {
        initAudio();
        questionsAnswered++;
        document.getElementById('btn-check').style.display = 'flex';
        document.getElementById('btn-reset').style.display = 'flex';
        document.getElementById('btn-next').style.display = 'none';
        
        if(questionsAnswered >= maxQuestions) {
            gameState = 'win';
            document.getElementById('top-bar').style.display = 'none';
            document.getElementById('bottom-controls').style.display = 'none';
            document.getElementById('win-score').innerText = diamonds;
            document.getElementById('win-panel').classList.remove('hidden');
            sfx.win();
            for(let i=0; i<5; i++) {
                setTimeout(() => { createConfettiBurst(canvasWidth*0.2 + Math.random()*canvasWidth*0.6, canvasHeight*0.3); }, i * 300);
            }
        } else if (questionsAnswered % 2 === 0) {
            generateMathQuestion(); // Chuẩn bị sẵn câu hỏi trước khi mở mini-game
            openMinigamePenalty(); // Reward!
        } else {
            generateMathQuestion();
        }
    }

    function update(timeScale = 1) {
        backgroundTime += 0.03 * timeScale;

        clouds.forEach(el => { el.x -= el.speed * timeScale; if (el.x + el.size * 2 < 0) { el.x = canvasWidth + el.size * 2; el.y = Math.random() * (WATER_LEVEL * 0.4); } });
        decorFishes.forEach(f => {
            f.x += f.speed * f.dir * timeScale;
            if(f.dir === 1 && f.x > canvasWidth + 100) { f.x = -100; f.y = WATER_LEVEL + 40 + Math.random()*(canvasHeight - WATER_LEVEL - 60); } 
            else if(f.dir === -1 && f.x < -100) { f.x = canvasWidth + 100; f.y = WATER_LEVEL + 40 + Math.random()*(canvasHeight - WATER_LEVEL - 60); }
        });

        // Hop logic
        if (frog.isHopping) {
            frog.hopProgress += 0.035 * timeScale; // Tốc độ giảm 30% so với bản v10
            let startP = platforms[frog.leafIndex - 1];
            let endP = platforms[frog.targetIndex - 1];
            
            if (frog.hopProgress >= 1) {
                frog.hopProgress = 1; frog.isHopping = false;
                
                completedHops.push(frog.currentHopData);
                frog.leafIndex = frog.targetIndex;
                frog.x = endP.x; frog.y = endP.y;
                createSparkles(frog.x, frog.y + 10, 5, '#ffffff');
                
                if (jumpQueue.length > 0) {
                    startNextHop();
                }
            } else {
                frog.x = startP.x + (endP.x - startP.x) * frog.hopProgress;
                let hopHeight = Math.abs(endP.x - startP.x) * 0.4 + 40;
                frog.y = startP.y - Math.sin(frog.hopProgress * Math.PI) * hopHeight;
            }
        }

        for (let i = particles.length - 1; i >= 0; i--) { let p = particles[i]; p.x += p.vx * timeScale; p.y += p.vy * timeScale; p.vy += 0.15 * timeScale; p.life -= p.decay * timeScale; if (p.life <= 0) particles.splice(i, 1); }
        for (let i = confetti.length - 1; i >= 0; i--) { let c = confetti[i]; c.x += c.vx * timeScale; c.y += c.vy * timeScale; c.vy += 0.1 * timeScale; c.rot += c.rotSpeed * timeScale; c.wobble += c.wobbleSpeed * timeScale; c.x += Math.sin(c.wobble) * 2 * timeScale; if (c.y > canvasHeight + 100) confetti.splice(i, 1); }
    }

    function createSparkles(x, y, amount, color) {
        for(let i=0; i<amount; i++) { particles.push({ x: x + (Math.random() - 0.5) * 30, y: y + (Math.random() - 0.5) * 20, vx: (Math.random() - 0.5) * 6, vy: -Math.random() * 6 - 2, size: Math.random() * 6 + 3, color: color, life: 1, decay: 0.02 + Math.random()*0.02 }); }
    }
    function createConfettiBurst(x, y) {
        let count = 60 + Math.random()*20; let colors = ["#1cb0f6", "#58cc02", "#ffc800", "#ff4b4b", "#ce82ff"];
        for(let i=0; i<count; i++) {
            let angle = Math.random() * Math.PI * 2; let speed = Math.random() * 12 + 4;
            confetti.push({ x: x, y: y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed - 5, size: Math.random()*15 + 8, color: colors[Math.floor(Math.random()*colors.length)], rot: Math.random()*Math.PI*2, rotSpeed: (Math.random()-0.5)*0.3, wobbleSpeed: Math.random()*0.1 + 0.05, wobble: Math.random()*Math.PI*2 });
        }
    }

    function drawMountain(ctx, mx, my, mw, mh, colorLight, colorDark) {
        let peakX = mx; let peakY = my - mh;
        ctx.fillStyle = colorLight; ctx.beginPath(); ctx.moveTo(mx - mw/2, my); ctx.lineTo(peakX, peakY); ctx.lineTo(peakX, my); ctx.fill();
        ctx.fillStyle = colorDark; ctx.beginPath(); ctx.moveTo(peakX, peakY); ctx.lineTo(mx + mw/2, my); ctx.lineTo(peakX, my); ctx.fill();
        ctx.fillStyle = "#ffffff"; ctx.beginPath();
        let sH = mh * 0.2; 
        ctx.moveTo(peakX, peakY); ctx.lineTo(peakX - (mw/2)*(sH/mh), peakY + sH);
        let wStep = (mw/2)*(sH/mh) / 3;
        ctx.lineTo(peakX - wStep*2, peakY + sH + 15); ctx.lineTo(peakX - wStep, peakY + sH - 5); ctx.lineTo(peakX, peakY + sH + 20); ctx.lineTo(peakX + wStep, peakY + sH - 5); ctx.lineTo(peakX + wStep*2, peakY + sH + 15); ctx.lineTo(peakX + (mw/2)*(sH/mh), peakY + sH);
        ctx.closePath(); ctx.fill();
    }

    function drawBackground(ctx) {
        let skyGrad = ctx.createLinearGradient(0, 0, 0, WATER_LEVEL);
        skyGrad.addColorStop(0, "#7dd3fc"); skyGrad.addColorStop(1, "#bae6fd");
        ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, canvasWidth, WATER_LEVEL);

        // Rainbow (Drawn BEFORE Mountains, larger size)
        ctx.save(); ctx.translate(canvasWidth / 2, WATER_LEVEL);
        ctx.lineWidth = Math.min(25, canvasWidth * 0.02);
        let rbColors = ['#ff4b4b', '#ff9900', '#ffc800', '#58cc02', '#1cb0f6', '#ce82ff'];
        let baseRad = Math.min(canvasWidth * 0.45, 600);
        for(let i=0; i<rbColors.length; i++) { 
            ctx.strokeStyle = rbColors[i]; ctx.beginPath(); ctx.arc(0, 0, baseRad - i*(ctx.lineWidth), Math.PI, 0); ctx.stroke(); 
        }
        ctx.restore();

        // Mountains (Drawn AFTER Rainbow)
        mountains.forEach(m => { drawMountain(ctx, m.x, WATER_LEVEL, m.w, m.h, m.c1, m.c2); });

        ctx.fillStyle = "rgba(255, 255, 255, 0.95)";
        clouds.forEach(el => { ctx.beginPath(); ctx.arc(el.x, el.y, el.size, 0, Math.PI*2); ctx.arc(el.x + el.size*0.8, el.y + el.size*0.2, el.size*0.7, 0, Math.PI*2); ctx.arc(el.x - el.size*0.8, el.y + el.size*0.2, el.size*0.7, 0, Math.PI*2); ctx.fill(); });
        bgTrees.forEach(t => {
            ctx.save(); ctx.translate(t.x, t.y); ctx.scale(t.scale, t.scale);
            ctx.fillStyle = "#78350f"; ctx.fillRect(-10, 0, 20, 60);
            ctx.fillStyle = "#4ade80"; ctx.beginPath(); ctx.arc(0, -20, 40, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(-25, -10, 30, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(25, -10, 30, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        });

        let waterGrad = ctx.createLinearGradient(0, WATER_LEVEL, 0, canvasHeight);
        waterGrad.addColorStop(0, "#1ca3ec"); waterGrad.addColorStop(1, "#0f5e9c");
        ctx.fillStyle = waterGrad; ctx.fillRect(0, WATER_LEVEL, canvasWidth, canvasHeight - WATER_LEVEL);

        ctx.fillStyle = "rgba(0, 40, 80, 0.4)";
        for(let x = 0; x < canvasWidth; x+= 120) { ctx.beginPath(); ctx.ellipse(x + Math.sin(x)*40, canvasHeight - 30, 30 + Math.sin(x)*10, 15, 0, 0, Math.PI*2); ctx.fill(); }

        ctx.fillStyle = "rgba(100, 200, 255, 0.4)"; ctx.beginPath(); ctx.moveTo(0, canvasHeight);
        let speed1 = backgroundTime * 0.8;
        for(let x = 0; x <= canvasWidth + 50; x += 50) { let wave = Math.sin(x/120 + speed1) * 6; ctx.lineTo(x, WATER_LEVEL + 10 + wave); }
        ctx.lineTo(canvasWidth, canvasHeight); ctx.fill();

        standingLotuses.forEach(lotus => { drawStandingLotus(ctx, lotus.x, lotus.y, lotus.height, lotus.scale, Math.sin(backgroundTime * 1.5 + lotus.swayOffset) * 0.15); });
        floatingLeaves.forEach(leaf => { drawFloatingLeaf(ctx, leaf.x, leaf.y + Math.sin(leaf.x/120 + speed1)*6, leaf.scale, leaf.rotation + Math.sin(backgroundTime)*0.05); });

        ctx.fillStyle = "rgba(40, 180, 240, 0.8)"; ctx.beginPath(); ctx.moveTo(0, canvasHeight);
        let speed2 = backgroundTime * 1.0;
        for(let x = 0; x <= canvasWidth + 50; x += 50) { let wave = Math.sin(x/150 + speed2) * 10; ctx.lineTo(x, WATER_LEVEL + 30 + wave); }
        ctx.lineTo(canvasWidth, canvasHeight); ctx.fill();
        
        ctx.strokeStyle = "rgba(255, 255, 255, 0.5)"; ctx.lineWidth = 4; ctx.beginPath();
        for(let x = 0; x <= canvasWidth + 50; x += 50) { let wave = Math.sin(x/150 + speed2) * 10; if(x===0) ctx.moveTo(x, WATER_LEVEL + 30 + wave); else ctx.lineTo(x, WATER_LEVEL + 30 + wave); }
        ctx.stroke();

        decorFishes.forEach(f => {
            ctx.save(); ctx.translate(f.x, f.y + Math.sin(backgroundTime * 5 + f.bobOffset) * 15); ctx.scale(f.scale * f.dir, f.scale);
            ctx.fillStyle = f.colorObj.body; ctx.beginPath(); ctx.ellipse(0, 0, 25, 15, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = f.colorObj.stripe; ctx.beginPath(); ctx.moveTo(-20, 0); ctx.lineTo(-40, -15); ctx.lineTo(-35, 0); ctx.lineTo(-40, 15); ctx.fill();
            ctx.beginPath(); ctx.moveTo(0, -15); ctx.lineTo(-10, -25); ctx.lineTo(-15, -10); ctx.fill(); ctx.beginPath(); ctx.moveTo(0, 15); ctx.lineTo(-10, 25); ctx.lineTo(-15, 10); ctx.fill();
            ctx.fillStyle = f.colorObj.stripe; ctx.beginPath(); ctx.ellipse(-5, 0, 4, 18, 0, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(-15, 0, 3, 14, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(15, -5, 8, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#000000"; ctx.beginPath(); ctx.arc(18, -5, 4, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(19, -6, 1.5, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        });
    }

    function drawStandingLotus(ctx, px, py, h, scale, sway) {
        ctx.save(); ctx.translate(px, py); ctx.rotate(sway); ctx.scale(scale, scale);
        ctx.strokeStyle = "#276b1f"; ctx.lineWidth = 6; ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(-10, -h/2, 0, -h); ctx.stroke();
        ctx.translate(0, -h);
        ctx.fillStyle = "#ff63a5"; ctx.beginPath(); ctx.ellipse(-18, -10, 16, 28, -Math.PI/4, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(18, -10, 16, 28, Math.PI/4, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#ff9ec4"; ctx.beginPath(); ctx.ellipse(-10, -15, 14, 32, -Math.PI/8, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(10, -15, 14, 32, Math.PI/8, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#ffe0ec"; ctx.beginPath(); ctx.ellipse(0, -20, 14, 34, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#ffc800"; ctx.beginPath(); ctx.ellipse(0, 0, 14, 6, 0, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
    function drawFloatingLeaf(ctx, px, py, scale, rot) {
        ctx.save(); ctx.translate(px, py); ctx.scale(scale, scale * 0.5); ctx.rotate(rot);
        let w = 120;
        ctx.fillStyle = "#1e7a1e"; ctx.beginPath(); ctx.arc(0, 10, w/2, Math.PI * 0.1, Math.PI * 1.9); ctx.lineTo(0, 10); ctx.fill();
        let leafGrad = ctx.createLinearGradient(-w/2, -w/2, w/2, w/2); leafGrad.addColorStop(0, "#58cc02"); leafGrad.addColorStop(1, "#3ba302"); 
        ctx.fillStyle = leafGrad; ctx.beginPath(); ctx.arc(0, 0, w/2, Math.PI * 0.1, Math.PI * 1.9); ctx.lineTo(0, 0); ctx.fill();
        ctx.restore();
    }

    function drawNumberLine(ctx) {
        if (platforms.length === 0) return;
        ctx.strokeStyle = "rgba(0, 0, 0, 0.15)"; ctx.lineWidth = 12; ctx.lineCap = "round"; ctx.beginPath();
        ctx.moveTo(platforms[0].x, platforms[0].y + 10); ctx.lineTo(platforms[platforms.length-1].x, platforms[platforms.length-1].y + 10); ctx.stroke();

        platforms.forEach(p => {
            ctx.save(); ctx.translate(p.x, p.y + 10); ctx.scale(1, 0.4); 
            let w = p.w;
            ctx.fillStyle = "rgba(0,0,0,0.15)"; ctx.beginPath(); ctx.arc(0, 20, w/2, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#4ade80"; ctx.beginPath(); ctx.arc(0, 0, w/2, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#22c55e"; ctx.beginPath(); ctx.arc(0, 0, w/2 * 0.7, 0, Math.PI*2); ctx.fill();
            ctx.restore();

            ctx.save(); ctx.translate(p.x, p.y + 25); ctx.font = "900 " + Math.max(16, p.w*0.4) + "px Poppins, sans-serif"; 
            ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.lineWidth = 6; ctx.strokeStyle = "#ffffff"; 
            ctx.strokeText(p.num, 0, 0); ctx.fillStyle = "#333333"; ctx.fillText(p.num, 0, 0); ctx.restore();
        });
    }

    function drawHops(ctx) {
        if (completedHops.length === 0) return;
        ctx.lineWidth = 6; ctx.lineCap = "round"; ctx.setLineDash([10, 10]);
        completedHops.forEach(hop => {
            let startP = platforms[hop.from - 1]; let endP = platforms[hop.to - 1];
            if (!startP || !endP) return;
            let arcHeight = Math.abs(endP.x - startP.x) * 0.4 + 40;
            let midX = (startP.x + endP.x) / 2; let midY = startP.y - arcHeight;
            ctx.strokeStyle = "#1cb0f6"; ctx.beginPath(); ctx.moveTo(startP.x, startP.y - 10); ctx.quadraticCurveTo(midX, midY - 50, endP.x, endP.y - 10); ctx.stroke();
            
            ctx.setLineDash([]); ctx.save(); ctx.translate(midX, midY - 15);
            ctx.fillStyle = "#ffc800"; ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 3; ctx.stroke();
            ctx.font = "900 18px Poppins, sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillStyle = "#333"; ctx.fillText(hop.stepNum, 0, 2);
            ctx.restore(); ctx.setLineDash([10, 10]); 
        });
        ctx.setLineDash([]);
    }

    function drawFrog(ctx, px, py) {
        ctx.save(); ctx.translate(px, py - 5); 
        let squishY = 1, squishX = 1;
        if(!frog.isHopping && frog.state !== 'falling') { squishY = 1 + Math.sin(backgroundTime*5) * 0.05; squishX = 1 - Math.sin(backgroundTime*5) * 0.05; } 
        else { squishY = 1.1; squishX = 0.9; }
        let fScale = Math.min(1, leafWidth / 100); 
        ctx.scale(squishX * frog.facing * fScale, squishY * fScale);
        if(!frog.isHopping && frog.state !== 'falling') { ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.beginPath(); ctx.ellipse(0, 5, 30, 12, 0, 0, Math.PI*2); ctx.fill(); }

        const skinBright = "#a1e535"; const skinShadow = "#7ec41a"; const belly = "#faffb3"; 
        let legOffset = (!frog.isHopping) ? 0 : 15;

        ctx.fillStyle = skinShadow; ctx.beginPath(); ctx.ellipse(-28, -12 + legOffset/2, 14, 20, -Math.PI/6, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(28, -12 + legOffset/2, 14, 20, Math.PI/6, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = skinBright; ctx.beginPath(); ctx.ellipse(-34, 2 + legOffset, 12, 6, -Math.PI/8, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(34, 2 + legOffset, 12, 6, Math.PI/8, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = skinBright; ctx.beginPath(); ctx.moveTo(0, -40); ctx.bezierCurveTo(40, -40, 45, 5, 0, 5); ctx.bezierCurveTo(-45, 5, -40, -40, 0, -40); ctx.fill();
        ctx.fillStyle = belly; ctx.beginPath(); ctx.ellipse(0, -8, 24, 14, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "rgba(255, 120, 150, 0.6)"; ctx.beginPath(); ctx.ellipse(-22, -15, 7, 4, -0.1, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(20, -15, 7, 4, 0.1, 0, Math.PI*2); ctx.fill();
        
        ctx.fillStyle = skinBright; ctx.beginPath(); ctx.arc(-18, -42, 16, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(18, -42, 16, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(-18, -42, 12, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(18, -42, 12, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#111111"; ctx.beginPath(); ctx.arc(-18, -42, 6, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(18, -42, 6, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(-20, -45, 2.5, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(16, -45, 2.5, 0, Math.PI*2); ctx.fill();
        
        ctx.strokeStyle = "#2b6311"; ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.beginPath();
        ctx.moveTo(-12, -26); ctx.quadraticCurveTo(-6, -20, 0, -26); ctx.quadraticCurveTo(6, -20, 12, -26); ctx.stroke();
        ctx.fillStyle = "#ff4b4b"; ctx.beginPath(); ctx.moveTo(-10, -23); ctx.quadraticCurveTo(0, -8, 10, -23); ctx.fill(); ctx.fillStyle = "#ff8a8a"; ctx.beginPath(); ctx.arc(0, -15, 4, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBackground(ctx);
        drawNumberLine(ctx);
        drawHops(ctx);
        if(gameState !== 'start' && gameState !== 'win') drawFrog(ctx, frog.x, frog.y);

        particles.forEach(p => { ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0, p.life); ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1.0; });

        fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
        confetti.forEach(c => {
            fxCtx.save(); fxCtx.translate(c.x, c.y); fxCtx.rotate(c.rot); fxCtx.fillStyle = c.color;
            if(c.size % 2 > 1) { fxCtx.beginPath(); fxCtx.arc(0, 0, c.size/2, 0, Math.PI*2); fxCtx.fill(); } else { fxCtx.fillRect(-c.size/2, -c.size/2, c.size, c.size); }
            fxCtx.restore();
        });
    }

    let lastTime = 0;
    function loop(timestamp) { 
        if (!lastTime) lastTime = timestamp;
        let dt = timestamp - lastTime;
        lastTime = timestamp;
        if (dt > 100) dt = 16.66; // Ngăn nhảy khung hình lớn nếu người dùng sang tab khác
        let timeScale = dt / 16.666; // Cân bằng tốc độ chuẩn theo tần số quét 60Hz
        
        update(timeScale); 
        render(); 
        requestAnimationFrame(loop); 
    }

    function startGame() {
        initAudio();
        document.getElementById('start-panel').classList.add('hidden');
        document.getElementById('top-bar').style.display = 'flex';
        document.getElementById('bottom-controls').style.display = 'flex';
        initLevel(); gameState = 'playing';
    }

    function resetMainGame() {
        initAudio();
        document.getElementById('win-panel').classList.add('hidden');
        document.getElementById('start-panel').classList.remove('hidden');
        document.getElementById('top-bar').style.display = 'none';
        document.getElementById('bottom-controls').style.display = 'none';
        document.getElementById('btn-check').style.display = 'flex';
        document.getElementById('btn-reset').style.display = 'flex';
        document.getElementById('btn-next').style.display = 'none';
        frog.x = -1000; frog.isHopping = false; frog.state = 'idle';
        gameState = 'start';
    }

    resize(); requestAnimationFrame(loop);


    // =========================================================================
    // MINIGAME BONUS SCRIPT (FLIP Animation)
    // =========================================================================
    const MG = {
        COLORS: [
            { id: 'red', main: '#FF4B4B', dark: '#cc0000' },
            { id: 'blue', main: '#1CB0F6', dark: '#007BB5' },
            { id: 'yellow', main: '#FFC800', dark: '#CC9A00' }
        ],
        TUBE_CAPACITY: 4,
        tubesState: [],
        selectedTubeIdx: null,
        isAnimating: false,
        history: [],
        containers: {
            tubes: document.getElementById('mg-tubes-container')
        }
    };

    function mg_createBackground() {
        const bg = document.getElementById('mg-bg-shapes');
        bg.innerHTML = '';
        for(let i=0; i<6; i++) {
            const cloud = document.createElement('div'); cloud.className = 'mg-cloud';
            const size = 50 + Math.random() * 100;
            cloud.style.width = size + 'px'; cloud.style.height = (size/2) + 'px';
            cloud.style.top = (Math.random() * 80) + '%'; cloud.style.left = (Math.random() * 100) + '%';
            cloud.innerHTML = `<style>.mg-cloud:nth-child(${i+1})::before { width: ${size*0.6}px; height: ${size*0.6}px; top: ${-size*0.3}px; left: ${size*0.1}px; } .mg-cloud:nth-child(${i+1})::after { width: ${size*0.5}px; height: ${size*0.5}px; top: -${size*0.2}px; right: ${size*0.1}px; }</style>`;
            bg.appendChild(cloud);
        }
    }

    function mg_generateLevel() {
        let initialTubes = Array.from({length: 5}, () => []);
        for(let i=0; i<3; i++) {
            for(let j=0; j<MG.TUBE_CAPACITY; j++) {
                initialTubes[i].push({ colorId: MG.COLORS[i].id, colorObj: MG.COLORS[i] });
            }
        }
        let shuffles = 3 * 20; 
        for(let i=0; i<shuffles; i++) {
            let nonEmptyIdxs = []; for(let t=0; t<initialTubes.length; t++) { if(initialTubes[t].length > 0) nonEmptyIdxs.push(t); }
            if(nonEmptyIdxs.length === 0) continue;
            let fromIdx = nonEmptyIdxs[Math.floor(Math.random() * nonEmptyIdxs.length)];
            let notFullIdxs = []; for(let t=0; t<initialTubes.length; t++) { if(initialTubes[t].length < MG.TUBE_CAPACITY && t !== fromIdx) notFullIdxs.push(t); }
            if(notFullIdxs.length === 0) continue;
            let toIdx = notFullIdxs[Math.floor(Math.random() * notFullIdxs.length)];
            initialTubes[toIdx].push(initialTubes[fromIdx].pop());
        }
        if (mg_checkWinCondition(initialTubes)) return mg_generateLevel(); 
        return initialTubes;
    }

    function mg_buildDOM(initialState) {
        MG.containers.tubes.innerHTML = '';
        initialState.forEach((tubeArr, tIdx) => {
            const tubeEl = document.createElement('div'); tubeEl.className = 'mg-tube';
            tubeEl.addEventListener('click', () => mg_handleTubeClick(tIdx));
            tubeEl.addEventListener('touchstart', (e) => { e.preventDefault(); mg_handleTubeClick(tIdx); }, {passive: false});
            
            tubeArr.forEach((ballObj) => {
                const ballEl = document.createElement('div'); ballEl.className = 'mg-ball';
                ballEl.style.background = `radial-gradient(circle at 30% 30%, #fff 0%, ${ballObj.colorObj.main} 40%, ${ballObj.colorObj.dark} 100%)`;
                tubeEl.appendChild(ballEl);
            });
            MG.containers.tubes.appendChild(tubeEl);
        });
    }

    function mg_handleTubeClick(clickedIdx) {
        if (MG.isAnimating) return;
        initAudio(); 
        const clickedTube = MG.tubesState[clickedIdx];
        const clickedTubeEl = MG.containers.tubes.children[clickedIdx];
        
        // Deselect
        if (MG.selectedTubeIdx === clickedIdx) { 
            MG.selectedTubeIdx = null; 
            const topBall = clickedTubeEl.lastElementChild;
            if(topBall) topBall.classList.remove('selected');
            sfx.hop(); return; 
        }

        // Select
        if (MG.selectedTubeIdx === null) {
            if (clickedTube.length === 0) return;
            MG.selectedTubeIdx = clickedIdx; 
            const topBall = clickedTubeEl.lastElementChild;
            if(topBall) topBall.classList.add('selected');
            sfx.hop(); return;
        }

        // Validate Move
        const fromIdx = MG.selectedTubeIdx; const toIdx = clickedIdx;
        const fromTubeState = MG.tubesState[fromIdx]; const toTubeState = MG.tubesState[toIdx];
        const ballToMoveState = fromTubeState[fromTubeState.length - 1];
        const topBallAtTargetState = toTubeState.length > 0 ? toTubeState[toTubeState.length - 1] : null;

        if (toTubeState.length >= MG.TUBE_CAPACITY || (topBallAtTargetState !== null && topBallAtTargetState.colorId !== ballToMoveState.colorId)) {
            sfx.wrong();
            const fromTubeEl = MG.containers.tubes.children[fromIdx];
            if(fromTubeEl.lastElementChild) fromTubeEl.lastElementChild.classList.remove('selected');
            MG.selectedTubeIdx = null; return;
        }

        // Valid Move
        MG.history.push(MG.tubesState.map(t => [...t]));
        toTubeState.push(fromTubeState.pop());
        MG.selectedTubeIdx = null; MG.isAnimating = true;
        sfx.hop();

        // FLIP Animation
        const fromTubeEl = MG.containers.tubes.children[fromIdx];
        const toTubeEl = MG.containers.tubes.children[toIdx];
        const ballEl = fromTubeEl.lastElementChild;
        
        const firstRect = ballEl.getBoundingClientRect();
        ballEl.classList.remove('selected');
        
        toTubeEl.appendChild(ballEl);
        const lastRect = ballEl.getBoundingClientRect();
        
        const dx = firstRect.left - lastRect.left;
        const dy = firstRect.top - lastRect.top;
        
        ballEl.style.transition = 'none';
        ballEl.style.transform = `translate(${dx}px, ${dy}px)`;
        
        requestAnimationFrame(() => {
            void ballEl.offsetWidth; // force reflow
            ballEl.style.transition = 'transform 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
            ballEl.style.transform = 'translate(0px, 0px)';
            
            setTimeout(() => {
                ballEl.style.transition = '';
                MG.isAnimating = false;
                mg_checkTubeComplete(toIdx);
                if(mg_checkWinCondition(MG.tubesState)) { mg_handleWin(); }
            }, 300);
        });
    }

    function mg_checkTubeComplete(tIdx) {
        const tube = MG.tubesState[tIdx];
        if (tube.length === MG.TUBE_CAPACITY && tube.every(b => b.colorId === tube[0].colorId)) {
            sfx.correct();
            const tubeEl = MG.containers.tubes.children[tIdx];
            tubeEl.classList.add('completed');
            
            const rect = tubeEl.getBoundingClientRect();
            for(let i=0; i<8; i++) {
                const p = document.createElement('div'); p.className = 'mg-particle';
                const size = 5 + Math.random() * 8; p.style.width = size + 'px'; p.style.height = size + 'px';
                p.style.left = (rect.left + (Math.random() * rect.width)) + 'px'; p.style.top = (rect.top + (Math.random() * rect.height)) + 'px';
                document.body.appendChild(p); setTimeout(() => p.remove(), 600);
            }
        }
    }

    function mg_checkWinCondition(state) {
        let completedTubes = 0;
        for(let tube of state) {
            if(tube.length === MG.TUBE_CAPACITY && tube.every(b => b.colorId === tube[0].colorId)) completedTubes++;
            else if (tube.length > 0) return false;
        }
        return completedTubes === 3;
    }

    function mg_undoMove() {
        if(MG.isAnimating || MG.history.length === 0) return;
        initAudio();
        
        const prevState = MG.history.pop();
        let fromIdx = -1, toIdx = -1;
        for(let i=0; i<MG.tubesState.length; i++) {
            if(MG.tubesState[i].length > prevState[i].length) toIdx = i;
            else if (MG.tubesState[i].length < prevState[i].length) fromIdx = i;
        }
        
        if (toIdx !== -1 && fromIdx !== -1) {
            MG.isAnimating = true;
            const fromTubeEl = MG.containers.tubes.children[toIdx]; 
            const toTubeEl = MG.containers.tubes.children[fromIdx]; 
            const ballEl = fromTubeEl.lastElementChild;
            
            if(MG.selectedTubeIdx !== null) {
                const selTube = MG.containers.tubes.children[MG.selectedTubeIdx];
                if(selTube.lastElementChild) selTube.lastElementChild.classList.remove('selected');
                MG.selectedTubeIdx = null;
            }

            const firstRect = ballEl.getBoundingClientRect();
            toTubeEl.appendChild(ballEl);
            const lastRect = ballEl.getBoundingClientRect();
            
            const dx = firstRect.left - lastRect.left;
            const dy = firstRect.top - lastRect.top;
            
            ballEl.style.transition = 'none';
            ballEl.style.transform = `translate(${dx}px, ${dy}px)`;
            
            requestAnimationFrame(() => {
                void ballEl.offsetWidth;
                ballEl.style.transition = 'transform 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
                ballEl.style.transform = 'translate(0px, 0px)';
                setTimeout(() => {
                    ballEl.style.transition = '';
                    MG.isAnimating = false;
                }, 300);
            });
        }
        
        MG.tubesState = prevState;
        Array.from(MG.containers.tubes.children).forEach(t => t.classList.remove('completed'));
        sfx.hop();
    }

    function mg_restartLevel() {
        if(MG.isAnimating || MG.history.length === 0) return;
        initAudio();
        MG.tubesState = MG.history[0].map(t => [...t]); MG.history = []; MG.selectedTubeIdx = null;
        mg_buildDOM(MG.tubesState); sfx.hop();
    }

    let mgParticles = []; let mgConfettiActive = false; let mgLastTime = 0;
    function mg_fireConfetti() {
        const mgCanvas = document.getElementById('mg-confetti-canvas');
        mgCanvas.width = window.innerWidth; mgCanvas.height = window.innerHeight;
        const colors = ['#FF4B4B', '#1CB0F6', '#FFC800', '#58CC02', '#A66CFF', '#ffffff'];
        for(let i=0; i<100; i++) {
            mgParticles.push({ x: Math.random() * mgCanvas.width, y: -Math.random() * mgCanvas.height, r: Math.random() * 6 + 4, dx: Math.random() * 4 - 2, dy: Math.random() * 3 + 2, color: colors[Math.floor(Math.random() * colors.length)], tilt: Math.floor(Math.random() * 10) - 10, tiltAngleInc: (Math.random() * 0.07) + 0.05, tiltAngle: 0 });
        }
        if(!mgConfettiActive) { 
            mgConfettiActive = true; 
            mgLastTime = 0;
            requestAnimationFrame(mg_drawConfetti); 
        }
    }
    function mg_drawConfetti(timestamp) {
        if(!mgConfettiActive) return;
        requestAnimationFrame(mg_drawConfetti);
        
        if (!mgLastTime) mgLastTime = timestamp;
        let dt = timestamp - mgLastTime;
        mgLastTime = timestamp;
        if (dt > 100) dt = 16.66;
        let timeScale = dt / 16.666; // Normalize

        const mgCanvas = document.getElementById('mg-confetti-canvas');
        const mgCtx = mgCanvas.getContext('2d');
        mgCtx.clearRect(0, 0, mgCanvas.width, mgCanvas.height);
        for(let i=0; i<mgParticles.length; i++) {
            let p = mgParticles[i]; 
            p.tiltAngle += p.tiltAngleInc * timeScale; 
            p.y += ((Math.cos(p.tiltAngle) + 1 + p.r / 2) / 2) * timeScale; 
            p.x += Math.sin(p.tiltAngle) * 2 * timeScale;
            mgCtx.beginPath(); mgCtx.lineWidth = p.r; mgCtx.strokeStyle = p.color; mgCtx.moveTo(p.x + p.tilt + p.r, p.y); mgCtx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r); mgCtx.stroke();
            if(p.y > mgCanvas.height) { mgParticles.splice(i, 1); i--; }
        }
    }

    function mg_handleWin() {
        MG.isAnimating = true; sfx.win();
        setTimeout(() => {
            mg_fireConfetti();
            document.getElementById('mg-level-complete-overlay').classList.add('active');
        }, 500);
    }

    function openMinigamePenalty() {
        initAudio();
        document.getElementById('mg-layer').style.display = 'flex';
        mg_createBackground();
        MG.history = []; MG.selectedTubeIdx = null; MG.isAnimating = false;
        MG.tubesState = mg_generateLevel();
        mg_buildDOM(MG.tubesState);
        document.getElementById('mg-level-complete-overlay').classList.remove('active');
        mgParticles = []; mgConfettiActive = false; 
        const mgCanvas = document.getElementById('mg-confetti-canvas');
        const mgCtx = mgCanvas.getContext('2d');
        mgCtx.clearRect(0, 0, mgCanvas.width, mgCanvas.height);
    }

    function closeMinigame() {
        initAudio();
        document.getElementById('mg-layer').style.display = 'none';
        mgParticles = []; mgConfettiActive = false;
        
        // Bỏ generateMathQuestion() đi vì câu hỏi đã được tạo sẵn từ handleNext()
    }

</script>
