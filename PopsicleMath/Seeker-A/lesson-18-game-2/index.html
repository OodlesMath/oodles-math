<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            /* Beautiful gradient background */
            background: linear-gradient(135deg, #e0f2fe 0%, #cffafe 50%, #e0e7ff 100%);
            background-size: 200% 200%;
            animation: gradientMove 15s ease infinite;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            overflow-y: auto;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Subtle cute dot overlay */
        .bg-pattern {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(#bae6fd 15%, transparent 15%), radial-gradient(#bae6fd 15%, transparent 15%);
            background-position: 0 0, 30px 30px;
            background-size: 60px 60px;
            opacity: 0.6;
            z-index: -1;
            pointer-events: none;
        }

        /* Floating elements for extra cuteness */
        .floating-shape {
            position: fixed;
            z-index: -1;
            opacity: 0.4;
            animation: floatShape 8s ease-in-out infinite;
        }
        @keyframes floatShape {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* 3D Physical Button effect */
        .bouncy-button {
           transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.1s cubic-bezier(0.4, 0, 0.2, 1);
           cursor: pointer;
        }
        .bouncy-button:active:not(:disabled) {
           transform: translateY(6px) !important;
           box-shadow: 0 0px 0 transparent !important;
        }
        .bouncy-button:disabled {
           cursor: not-allowed;
           transform: none;
        }

        /* Animations */
        @keyframes floating {
           0%, 100% { transform: translateY(0); }
           50% { transform: translateY(-10px); }
        }
        .animate-floating { animation: floating 3s ease-in-out infinite; }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        @keyframes shake {
          0%, 100% { transform: translateX(0); }
          25% { transform: translateX(-10px) rotate(-3deg); }
          75% { transform: translateX(10px) rotate(3deg); }
        }
        .animate-shake { animation: shake 0.4s 2; }

        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow { animation: spin-slow 4s linear infinite; }

        /* Racing Road Background */
        .road-bg {
            background-color: #374151;
            background-image: linear-gradient(to bottom, #ffffff 50%, transparent 50%), linear-gradient(to bottom, #ffffff 50%, transparent 50%);
            background-size: 8px 80px; 
            background-position: 33% 0, 67% 0; 
            background-repeat: repeat-y;
            border-left: 16px solid #4ade80; 
            border-right: 16px solid #4ade80; 
            box-shadow: inset 0 0 30px rgba(0,0,0,0.6);
            animation: scrollRoad 0.4s linear infinite;
        }
        @keyframes scrollRoad {
            from { background-position-y: 0px, 0px; }
            to { background-position-y: 80px, 80px; }
        }

        .screen { display: none; flex-direction: column; height: 100%; width: 100%; }
        .screen.active { display: flex; }
        
        canvas { z-index: 1000 !important; pointer-events: none; }
    </style>
</head>

    <script>

                draw: (w) => `<g filter="url(#cute-shadow)">

                    <rect x="10" y="24" width="${w}" height="4" fill="#93c5fd" rx="2" opacity="0.5" />

        // Color palettes for the option buttons
        const COLORFUL_BTN_CLASSES = [

            "bg-emerald-100 border-emerald-300 text-emerald-700 shadow-[0_6px_0_#6ee7b7] active:shadow-[0_0px_0_#6ee7b7]",
            "bg-rose-100 border-rose-300 text-rose-700 shadow-[0_6px_0_#fda4af] active:shadow-[0_0px_0_#fda4af]",

        // --- GAME STATE ---
        let currentLevel = 0;

        function playSound(type) {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!window.audioCtx) window.audioCtx = new AudioContext();
                const ctx = window.audioCtx;
                if (ctx.state === 'suspended') ctx.resume();

                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                const now = ctx.currentTime;

                if (type === 'pop') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, now);
                    osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
                    gainNode.gain.setValueAtTime(0.3, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now); osc.stop(now + 0.1);
                } else if (type === 'ding') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(800, now);
                    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                    osc.frequency.setValueAtTime(1200, now + 0.1);
                    osc.frequency.exponentialRampToValueAtTime(1600, now + 0.2);
                    gainNode.gain.setValueAtTime(0.2, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    osc.start(now); osc.stop(now + 0.5);
                } else if (type === 'buzz') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.linearRampToValueAtTime(100, now + 0.4);
                    gainNode.gain.setValueAtTime(0.3, now);
                    gainNode.gain.linearRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now); osc.stop(now + 0.4);
                } else if (type === 'tada') {
                    [440, 554.37, 659.25, 880].forEach((freq, i) => { 
                        const o = ctx.createOscillator(); const g = ctx.createGain();
                        o.type = 'square'; o.frequency.value = freq;
                        o.connect(g); g.connect(ctx.destination);
                        g.gain.setValueAtTime(0.05, now + i * 0.1);
                        g.gain.exponentialRampToValueAtTime(0.01, now + 1.5 + i * 0.1);
                        o.start(now + i * 0.1); o.stop(now + 1.5 + i * 0.1);
                    });
                } else if (type === 'vroom') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(60, now);
                    osc.frequency.linearRampToValueAtTime(120, now + 0.3);
                    gainNode.gain.setValueAtTime(0.15, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now); osc.stop(now + 0.3);
                }
            } catch (e) { console.log("Audio disabled or failed", e); }
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = window.speechSynthesis.getVoices();
                const usVoice = voices.find(v => v.lang.includes('en-US')) || voices.find(v => v.lang.includes('en'));
                if (usVoice) utterance.voice = usVoice;
                utterance.lang = 'en-US';
                utterance.rate = 0.85; 
                utterance.pitch = 1.3; 
                window.speechSynthesis.speak(utterance);
            }
        }

        function playQuestionAudio() {
            const obj = OBJECTS[currentLevel];
            speak(`How long is the ${obj.name}?`);
        }

        function fireConfetti(isBig = false) {
            if (!window.confetti) return;
            if (isBig) {
                let duration = 4500;
                let animationEnd = Date.now() + duration;
                let defaults = { startVelocity: 45, spread: 360, ticks: 100, zIndex: 1000, colors: CUBE_COLORS };
                let interval = setInterval(function() {
                    let timeLeft = animationEnd - Date.now();
                    if (timeLeft <= 0) return clearInterval(interval);
                    let particleCount = 100 * (timeLeft / duration);
                    window.confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random() * 0.2, y: 0 } }));
                    window.confetti(Object.assign({}, defaults, { particleCount, origin: { x: 1 - Math.random() * 0.2, y: 0 } }));
                }, 250);
            } else {
                window.confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 }, colors: CUBE_COLORS, shapes: ['circle', 'square'], zIndex: 1000 });
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function updateHeader() {
            document.getElementById('score-display').innerText = score;
            const streakDisplay = document.getElementById('streak-display');
            if (streak > 0) {
                streakDisplay.innerText = `Streak: ${streak} 🔥`;
                streakDisplay.classList.remove('hidden');
            } else {
                streakDisplay.classList.add('hidden');
            }

            const pb = document.getElementById('progress-bar');
            pb.innerHTML = '';
            for(let i=0; i<OBJECTS.length; i++) {
                let clz = `h-2 md:h-3 rounded-full transition-all duration-500 shadow-inner `;
                if(i < currentLevel) clz += `bg-emerald-400 w-4 md:w-6 border-2 border-emerald-300`;
                else if(i === currentLevel) clz += `bg-yellow-400 w-6 md:w-8 animate-pulse border-2 border-yellow-200`;
                else clz += `bg-slate-200 w-2 md:w-3`;
                pb.innerHTML += `<div class="${clz}"></div>`;
            }
        }

        function generateOptions(correctAnswer) {
            let optionsSet = new Set();
            optionsSet.add(correctAnswer);
            
            let offsets = [-2, -1, 1, 2];
            offsets.sort(() => Math.random() - 0.5);
            
            for (let offset of offsets) {
                if (optionsSet.size >= 4) break;
                let num = correctAnswer + offset;
                if (num > 0 && num <= 15) optionsSet.add(num);
            }
            
            while (optionsSet.size < 4) {
                optionsSet.add(Math.floor(Math.random() * 12) + 1);
            }
            
            let optionsArray = Array.from(optionsSet).sort(() => Math.random() - 0.5);
            // Sửa đáp án trắc nghiệm ngắn gọn, trực diện, bỏ số 1,2,3,4 ở đầu
            return optionsArray.map(num => ({
                number: num,
                text: `${num} ${num === 1 ? 'cube' : 'cubes'} long`
            }));
        }

        function renderPlayScreen(keepOptions = false) {
            const obj = OBJECTS[currentLevel];
            const objWidth = obj.length * CUBE_SIZE;

            document.getElementById('status-area').innerHTML = '';
            document.getElementById('question-text').innerText = `How long is the ${obj.name}?`;

            let cubesHTML = '';
            for (let i = 0; i < obj.length; i++) {
                const color = obj.colors[i % obj.colors.length];
                const x = 10 + i * CUBE_SIZE;
                const isCounted = countedIndices.includes(i);
                
                cubesHTML += `
                <g transform="translate(${x}, 80)" onclick="handleCubeClick(${i})" class="cursor-pointer transition-transform duration-100 active:scale-95">

                </g>`;
            }

            document.getElementById('svg-container').innerHTML = `
                <svg viewBox="0 0 800 180" class="w-full h-full drop-shadow-xl" preserveAspectRatio="xMidYMid meet" style="overflow: visible; max-width: 100%;">
                    ${SVG_DEFS}
                    <g transform="translate(${(800 - objWidth)/2}, 0)">
                        ${obj.draw(objWidth)}
                        ${cubesHTML}
                    </g>
                </svg>

            if (!keepOptions) {
                currentOptions = generateOptions(obj.length);
                let optionsHTML = '';
                // Áp dụng mảng màu sắc rực rỡ ngẫu nhiên/cố định cho các đáp án
                let colorClasses = [...COLORFUL_BTN_CLASSES].sort(() => 0.5 - Math.random());
                
                currentOptions.forEach((opt, idx) => {
                    const btnClass = colorClasses[idx];
                    optionsHTML += `
                    <button onclick="checkAnswer(${opt.number}, this)" class="option-btn text-center p-4 md:p-6 text-[18px] sm:text-xl md:text-2xl font-black rounded-[20px] md:rounded-[28px] border-2 border-b-[6px] md:border-b-[8px] transition-all flex items-center justify-center outline-none bouncy-button ${btnClass}">
                        <span class="leading-tight drop-shadow-sm">${opt.text}</span>
                    </button>`;
                });
                document.getElementById('options-container').innerHTML = optionsHTML;
            }
        }

        function startGame() {
            startLevel(0);
        }

        function resetGame() {
            score = 0; streak = 0; bestStreak = 0;
            updateHeader();
            startLevel(0);
        }

        function startLevel(index) {
            if (index >= OBJECTS.length) {
                showScreen('end-screen');
                document.getElementById('final-score').innerText = score;
                document.getElementById('final-streak').innerText = bestStreak;
                playSound('tada');
                fireConfetti(true);
                return;
            }
            currentLevel = index;
            countedIndices = [];
            hasMadeMistake = false;
            updateHeader();
            renderPlayScreen(false);
            showScreen('play-screen');
            setTimeout(playQuestionAudio, 500);
        }

        function handleCubeClick(i) {
            if (!countedIndices.includes(i)) {
                playSound('pop');
                countedIndices.push(i);
                speak(countedIndices.length.toString());
                renderPlayScreen(true);
            }
        }

        function checkAnswer(num, btnElement) {
            if(btnElement.disabled) return;
            
            const correct = OBJECTS[currentLevel].length;
            const statusArea = document.getElementById('status-area');
            const allButtons = document.querySelectorAll('.option-btn');

            if (num === correct) {
                playSound('ding');
                let newStreak = streak;
                
                // Highlight correct button
                btnElement.className = "option-btn text-center p-4 md:p-6 text-[18px] sm:text-xl md:text-2xl font-black rounded-[20px] md:rounded-[28px] border-2 border-b-[6px] md:border-b-[8px] transition-all flex items-center justify-center outline-none bg-green-400 border-green-600 text-white scale-105 shadow-[0_6px_0_#16a34a] z-10 relative";
                
                if (!hasMadeMistake) {
                    score += 10;
                    newStreak = streak + 1;
                    streak = newStreak;
                    if (newStreak > bestStreak) bestStreak = newStreak;
                    speak(`Awesome! ${num} ${num === 1 ? 'cube' : 'cubes'} long.`);
                    fireConfetti(false);
                    statusArea.innerHTML = `<div class="flex items-center justify-center gap-2 text-2xl md:text-4xl font-black text-emerald-500 animate-bounce drop-shadow-md"><svg class="w-8 h-8 md:w-10 md:h-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> EXCELLENT!</div>`;
                } else {
                    streak = 0; newStreak = 0;
                    speak(`That's right! ${num} ${num === 1 ? 'cube' : 'cubes'} long.`);
                    statusArea.innerHTML = `<div class="flex items-center justify-center gap-2 text-2xl md:text-4xl font-black text-emerald-500 animate-bounce drop-shadow-md"><svg class="w-8 h-8 md:w-10 md:h-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> GOOD JOB!</div>`;
                }
                
                updateHeader();
                
                // Disable all buttons
                allButtons.forEach(btn => {
                    btn.disabled = true;
                    if (btn !== btnElement) {
                        btn.classList.add('opacity-40', 'grayscale', 'scale-95');
                        btn.style.boxShadow = "none";
                        btn.style.transform = "translateY(6px)";
                        btn.style.borderBottomWidth = "2px";
                    }
                });

                setTimeout(() => {
                    if (newStreak % 3 === 0 && newStreak > 0) {
                        startBonusGame();
                        speak("Bonus game time!");
                    } else {
                        showScreen('result-screen');
                    }
                }, 3000);

            } else {
                playSound('buzz');
                streak = 0; 
                hasMadeMistake = true;
                updateHeader();
                speak(`Whoops! Try counting the blocks again!`);
                countedIndices = [];
                
                // Highlight wrong button
                btnElement.classList.add('opacity-50', 'pointer-events-none');
                btnElement.style.boxShadow = "none";
                btnElement.style.transform = "translateY(6px)";
                btnElement.style.borderBottomWidth = "2px";
                
                statusArea.innerHTML = `<div class="flex items-center justify-center text-xl md:text-3xl font-black text-rose-500 gap-2 animate-shake drop-shadow-md"><svg class="w-8 h-8 md:w-10 md:h-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg> TRY AGAIN!</div>`;
                
                setTimeout(() => {
                    renderPlayScreen(true); // Keep options, just clear cubes
                }, 2000);
            }
        }

        function nextLevel() {
            playSound('pop');
            startLevel(currentLevel + 1);
        }

        // --- RACING MINIGAME ---
        let racingGameData = { active: false, lane: 1, obs: [], hits: 0, timeLeft: 15 };
        let racingAnimationId = null;
        let racingIntervalId = null;

        function startBonusGame() {
            showScreen('bonus-screen');
            racingGameData = { active: true, lane: 1, obs: [], hits: 0, timeLeft: 15 };
            updateRacingUI();
            
            racingIntervalId = setInterval(() => {
                if(!racingGameData.active) return;
                racingGameData.timeLeft -= 1;
                document.getElementById('bonus-time').innerText = racingGameData.timeLeft;
                if (racingGameData.timeLeft <= 0) endBonusGame('win');
            }, 1000);

            function gameLoop() {
                if(!racingGameData.active) return;
                
                if (Math.random() < 0.035 && racingGameData.obs.every(o => o.y > 40)) {
                    racingGameData.obs.push({ id: Date.now(), lane: Math.floor(Math.random() * 3), y: -20, type: Math.floor(Math.random() * 3) });
                }

                let hitObstacle = null;
                for (let i = racingGameData.obs.length - 1; i >= 0; i--) {
                    let o = racingGameData.obs[i];
                    o.y += 1.6; 
                    if (o.y > 65 && o.y < 95 && o.lane === racingGameData.lane) hitObstacle = o;
                    if (o.y > 115) racingGameData.obs.splice(i, 1);
                }

                if (hitObstacle) {
                    playSound('buzz');
                    flashScreen();
                    racingGameData.hits += 1;
                    updateRacingUI();
                    racingGameData.obs = racingGameData.obs.filter(o => o.id !== hitObstacle.id);
                    
                    if (racingGameData.hits >= 2) {
                        endBonusGame('lose');
                        return;
                    }
                }

                renderObstacles();
                racingAnimationId = requestAnimationFrame(gameLoop);
            }
            racingAnimationId = requestAnimationFrame(gameLoop);
        }

        function moveCar(dir) {
            if (!racingGameData.active) return;
            const newLane = Math.max(0, Math.min(2, racingGameData.lane + dir));
            if (newLane !== racingGameData.lane) {
                playSound('vroom');
                racingGameData.lane = newLane;
                const positions = ['16%', '50%', '84%'];
                document.getElementById('player-car').style.left = positions[racingGameData.lane];
            }
        }

        document.getElementById('btn-left').addEventListener('pointerdown', (e) => { e.preventDefault(); moveCar(-1); });
        document.getElementById('btn-right').addEventListener('pointerdown', (e) => { e.preventDefault(); moveCar(1); });
        window.addEventListener('keydown', (e) => {
            if(document.getElementById('bonus-screen').classList.contains('active')) {
                if (e.key === 'ArrowLeft') moveCar(-1);
                if (e.key === 'ArrowRight') moveCar(1);
            }
        });

        function getEnemySVG(type) {
            if (type === 0) { 
                return `<svg viewBox="0 0 100 160" class="w-full h-full drop-shadow-md"><rect x="20" y="10" width="60" height="140" rx="20" fill="#eab308" stroke="#a16207" stroke-width="4" /><rect x="25" y="40" width="50" height="25" rx="5" fill="#334155" /><rect x="25" y="100" width="50" height="20" rx="5" fill="#334155" /><rect x="35" y="60" width="30" height="10" rx="2" fill="#000" /><rect x="40" y="62" width="20" height="6" fill="#facc15" /><circle cx="35" cy="15" r="5" fill="#fef08a" /><circle cx="65" cy="15" r="5" fill="#fef08a" /></svg>`;
            } else if (type === 1) { 
                return `<svg viewBox="0 0 100 160" class="w-full h-full drop-shadow-md"><rect x="20" y="10" width="60" height="140" rx="20" fill="#f8fafc" stroke="#0f172a" stroke-width="4" /><rect x="20" y="70" width="60" height="30" fill="#0f172a" /><rect x="25" y="40" width="50" height="25" rx="5" fill="#334155" /><rect x="25" y="100" width="50" height="20" rx="5" fill="#334155" /><rect x="30" y="60" width="15" height="8" rx="2" fill="#ef4444" class="animate-pulse" /><rect x="55" y="60" width="15" height="8" rx="2" fill="#3b82f6" class="animate-pulse" /></svg>`;
            } else { 
                return `<svg viewBox="0 0 100 160" class="w-full h-full drop-shadow-md"><rect x="15" y="10" width="70" height="140" rx="10" fill="#22c55e" stroke="#14532d" stroke-width="4" /><rect x="25" y="25" width="50" height="20" rx="5" fill="#1e293b" /><rect x="20" y="55" width="60" height="80" rx="4" fill="#bbf7d0" stroke="#166534" stroke-width="2" /><circle cx="30" cy="15" r="5" fill="#fde047" /><circle cx="70" cy="15" r="5" fill="#fde047" /></svg>`;
            }
        }

        function renderObstacles() {
            const container = document.getElementById('obstacles-container');
            const positions = ['16%', '50%', '84%'];
            let html = '';
            for(let o of racingGameData.obs) {
                html += `<div class="absolute w-16 h-24 md:w-20 md:h-28 flex items-center justify-center transition-none" style="left: ${positions[o.lane]}; top: ${o.y}%; transform: translate(-50%, -50%) rotate(180deg)">${getEnemySVG(o.type)}</div>`;
            }
            container.innerHTML = html;
        }

        function updateRacingUI() {
            document.getElementById('bonus-time').innerText = racingGameData.timeLeft;
            const hearts = document.getElementById('lives-container');
            hearts.innerHTML = `
                <svg class="w-6 h-6 md:w-7 md:h-7 ${racingGameData.hits < 2 ? "text-rose-500 fill-rose-500" : "text-slate-500 fill-slate-500"}" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                <svg class="w-6 h-6 md:w-7 md:h-7 ${racingGameData.hits < 1 ? "text-rose-500 fill-rose-500" : "text-slate-500 fill-slate-500"}" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
            `;
            document.getElementById('player-car').style.left = ['16%', '50%', '84%'][racingGameData.lane];
        }

        function flashScreen() {
            const screen = document.getElementById('bonus-screen');
            screen.classList.remove('bg-slate-900');
            screen.classList.add('bg-red-500');
            setTimeout(() => {
                screen.classList.remove('bg-red-500');
                screen.classList.add('bg-slate-900');
            }, 150);
        }

        function endBonusGame(status) {
            racingGameData.active = false;
            clearInterval(racingIntervalId);
            cancelAnimationFrame(racingAnimationId);

            const overlay = document.getElementById('bonus-overlay');
            overlay.classList.remove('hidden');
            
            if (status === 'win') {
                playSound('tada');
                overlay.innerHTML = `<div class="absolute inset-0 bg-emerald-500/95 z-30 flex items-center justify-center backdrop-blur-sm"><div class="text-4xl md:text-7xl font-black text-white animate-bounce drop-shadow-xl text-center leading-tight">YOU SURVIVED!<br/><span class="text-2xl md:text-3xl text-emerald-200">+10 STARS</span></div></div>`;
                setTimeout(() => handleBonusComplete(true), 2500);
            } else {
                overlay.innerHTML = `<div class="absolute inset-0 bg-rose-600/95 z-30 flex items-center justify-center backdrop-blur-sm"><div class="text-4xl md:text-7xl font-black text-white animate-shake drop-shadow-xl text-center leading-tight">GAME OVER<br/><span class="text-2xl md:text-3xl text-rose-200">Watch out!</span></div></div>`;
                setTimeout(() => handleBonusComplete(false), 2500);
            }
        }

        function handleBonusComplete(won) {
            document.getElementById('bonus-overlay').classList.add('hidden');
            if (won) {
                score += 10;
                updateHeader();
                speak("Great driving! Ten bonus stars!");
            } else {
                speak("Oops! Be careful next time. Let's keep measuring.");
            }
            showScreen('result-screen');
        }

        window.onload = () => {
            window.speechSynthesis.getVoices();
        };
    </script>
</body>
</html>
