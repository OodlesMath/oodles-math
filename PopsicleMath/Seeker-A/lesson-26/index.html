<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lava Leap v17</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f051d;
            font-family: 'Poppins', sans-serif;
            touch-action: none;
            user-select: none;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        /* --- UI LAYER --- */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #top-bar {
            position: absolute;
            top: 25px;
            width: 100%;
            display: flex;
            justify-content: center; 
            padding: 0 20px;
            box-sizing: border-box;
            pointer-events: none;
            display: none;
        }

        #score-container {
            position: absolute;
            left: 30px;
            top: 0;
            background: rgba(30, 10, 60, 0.85);
            border: 3px solid rgba(0, 255, 255, 0.8);
            padding: 8px 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.6), inset 0 0 15px rgba(0, 255, 255, 0.3);
            min-width: 130px;
            text-align: center;
        }

        #score-display {
            font-size: 2.2rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.9), 2px 2px 0px #006666;
        }
        
        #progress-display {
            font-size: 1rem;
            font-weight: 800;
            color: #ffcc00;
            margin-top: -3px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #question-board {
            background: rgba(40, 15, 80, 0.95);
            border: 4px solid #ffcc00;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8), inset 0 0 15px rgba(255, 200, 0, 0.5);
            border-radius: 25px;
            padding: 8px 30px; 
            display: flex;
            align-items: center;
            gap: 20px;
            pointer-events: auto;
            transform: translateY(0);
            animation: floatBoard 3s ease-in-out infinite;
        }

        @keyframes floatBoard {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        #question-text {
            font-size: 3.2rem; 
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px #ff3366, 0 0 15px #ffcc00, 3px 3px 0px #000;
            letter-spacing: 3px;
            white-space: nowrap;
        }

        #speaker-btn {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.6), rgba(0, 150, 255, 0.6));
            border: 3px solid #00ffff;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.6), inset 0 0 15px rgba(255,255,255,0.5);
            transition: all 0.15s ease;
            color: #fff;
            flex-shrink: 0;
        }

        #speaker-btn:hover {
            transform: scale(1.15) translateY(-2px);
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.9), rgba(0, 150, 255, 0.9));
        }

        #speaker-btn:active {
            transform: scale(0.95);
        }

        /* --- PANELS --- */
        .panel {
            background: linear-gradient(145deg, rgba(60, 20, 90, 0.95), rgba(30, 5, 50, 0.98));
            border: 4px solid;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            padding: 40px 50px;
            border-radius: 30px;
            text-align: center;
            color: #fff;
            pointer-events: auto;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scale(1);
            max-width: 90%; 
            width: 500px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #start-panel { border-color: #00ffff; box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 30px rgba(0, 255, 255, 0.3); }
        #win-panel { border-color: #ffcc00; box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 40px rgba(255, 200, 0, 0.4); }
        #game-over-panel { border-color: #ff3333; box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 40px rgba(255, 50, 50, 0.4); }

        .panel.hidden {
            display: none !important;
            transform: scale(0.8) translateY(40px);
            opacity: 0;
        }

        .title-start { color: #00ffff; text-shadow: 0 0 15px rgba(0,255,255,0.8), 3px 3px 0 #000; }
        .title-win { color: #ffcc00; text-shadow: 0 0 20px rgba(255,200,0,0.8), 3px 3px 0 #000; }
        .title-lose { color: #ff3333; text-shadow: 0 0 20px rgba(255,50,50,0.8), 3px 3px 0 #000; }

        .panel h1 {
            margin: 10px 0;
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            line-height: 1.1;
        }

        .panel p {
            font-size: 1.3rem;
            color: #e0f8f8;
            margin-bottom: 25px;
            line-height: 1.6;
            font-weight: 600;
        }

        .highlight {
            color: #ffcc00;
            font-weight: 900;
            font-size: 2rem;
            text-shadow: 0 0 10px rgba(255, 200, 0, 0.8);
        }

        .settings-row {
            background: rgba(0,0,0,0.5);
            padding: 15px 25px;
            border-radius: 15px;
            margin: 20px 0 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            border: 2px solid rgba(255,255,255,0.15);
            width: 100%;
            box-sizing: border-box;
        }

        .settings-row label {
            font-size: 1.3rem;
            font-weight: 800;
            color: #00ffcc;
        }

        select {
            background: #110522;
            color: #ff00ff;
            font-size: 1.3rem;
            font-weight: 900;
            font-family: 'Poppins', sans-serif;
            border: 3px solid #ff00ff;
            border-radius: 10px;
            padding: 6px 15px;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }

        button.main-btn {
            background: linear-gradient(135deg, #ff00ff, #00ffff);
            border: none;
            border-radius: 18px;
            padding: 18px 0;
            font-size: 1.6rem;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 #006666, 0 15px 20px rgba(0,0,0,0.6);
            text-transform: uppercase;
            letter-spacing: 3px;
            width: 100%;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            margin-top: 10px;
            transition: all 0.15s ease;
        }

        button.main-btn:hover { transform: translateY(-3px); filter: brightness(1.2); box-shadow: 0 11px 0 #006666; }
        button.main-btn:active { transform: translateY(8px); box-shadow: 0 0px 0 #006666; }

        .diamond-icon {
            font-size: 4.5rem;
            filter: drop-shadow(0 0 15px rgba(0, 255, 255, 0.8));
            animation: floatBoard 2s infinite ease-in-out;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="top-bar">
            <div id="score-container">
                <div id="score-display">💎 0</div>
                <div id="progress-display">Question: 1/10</div>
            </div>
            
            <div id="question-board">
                <span id="question-text">12 + 3 = ?</span>
                <button id="speaker-btn" onclick="playTTS()" title="Read aloud">🔊</button>
            </div>
        </div>

        <div id="start-panel" class="panel">
            <div class="diamond-icon">💎</div>
            <h1 class="title-start">Lava Leap</h1>
            <p>Magical Math Adventure!<br>Jump to the correct answers.<br>Escape the cave to win!</p>
            
            <div class="settings-row">
                <label for="math-range">Max Number:</label>
                <select id="math-range">
                    <option value="10">10</option>
                    <option value="20" selected>20</option>
                    <option value="30">30</option>
                    <option value="40">40</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
            </div>
            <button class="main-btn" onclick="startGame()">Play Now!</button>
        </div>

        <div id="game-over-panel" class="panel hidden">
            <h1 class="title-lose">OH NO!</h1>
            <p>You fell into the lava.</p>
            <h2 style="color:#fff; font-size:2rem; margin:10px 0 25px;">Collected: <span id="final-score" class="highlight">0</span> 💎</h2>
            <button class="main-btn" onclick="resetGame()">Try Again</button>
        </div>

        <div id="win-panel" class="panel hidden">
            <div class="diamond-icon">💎</div>
            <h1 class="title-win">VICTORY!</h1>
            <p>Amazing! You escaped the cave!</p>
            <h2 style="color:#fff; font-size:2rem; margin:10px 0 25px;">Total: <span id="win-score" class="highlight">10</span> 💎</h2>
            <button class="main-btn" onclick="resetGame()">Play Again!</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: false }); // Optimizes rendering
    
    const VW = 1600;
    const VH = 900;
    
    let gameState = 'start'; 
    let scale = 1, offsetX = 0, offsetY = 0;
    
    let cameraX = 0;
    let targetCameraX = 0;
    let cameraShake = 0;

    let diamonds = 0;
    let questionsAnswered = 0;
    let maxQuestions = 10;
    let currentMathRange = 20;
    let usedQuestions = new Set();
    const gravity = 0.75; 
    
    let player = {
        x: 0, y: 0, 
        vx: 0, vy: 0,
        width: 36, height: 110,
        state: 'idle', 
        targetPlatform: null,
        isJumpingToCave: false,
        jumpTargetX: null 
    };

    let platforms = [];
    let exits = []; 
    let particles = [];
    let backgroundElements = [];
    let spores = [];
    let fireworks = [];
    let floatingTexts = [];
    let lavaBubbles = [];
    let backgroundTime = 0;
    let fwInterval = null;

    let currentQuestion = null;

    // --- AUDIO SYSTEM ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function initAudio() {
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playTone(freq, type, duration, vol=0.1) {
        if(!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function sfxJump() {
        playTone(350, 'sine', 0.1, 0.05);
        setTimeout(() => playTone(550, 'sine', 0.15, 0.05), 50);
    }

    function sfxCorrect() {
        playTone(523.25, 'sine', 0.1, 0.1); 
        setTimeout(() => playTone(659.25, 'sine', 0.1, 0.1), 100); 
        setTimeout(() => playTone(783.99, 'sine', 0.3, 0.1), 200); 
    }

    function sfxWrong() {
        playTone(200, 'sawtooth', 0.2, 0.1);
        setTimeout(() => playTone(150, 'sawtooth', 0.3, 0.1), 150);
    }

    function sfxWin() {
        [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
            setTimeout(() => playTone(freq, 'square', 0.3, 0.05), i * 150);
        });
    }

    function sfxLose() {
        [400, 350, 300, 250].forEach((freq, i) => {
            setTimeout(() => playTone(freq, 'triangle', 0.3, 0.05), i * 200);
        });
    }

    // --- SETUP & RESIZE ---
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        let scaleX = canvas.width / VW;
        let scaleY = canvas.height / VH;
        scale = Math.min(scaleX, scaleY);
        
        offsetX = (canvas.width - VW * scale) / 2;
        offsetY = (canvas.height - VH * scale) / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- MATH & TTS ---
    function generateMathQuestion() {
        let op = (questionsAnswered % 2 === 0) ? '+' : '-';
        let num1, num2, ans, qString;
        let attempts = 0;

        do {
            num1 = Math.floor(Math.random() * (currentMathRange + 1));
            num2 = Math.floor(Math.random() * (currentMathRange + 1));

            if (op === '-' && num1 < num2) {
                let temp = num1; num1 = num2; num2 = temp;
            }

            ans = op === '+' ? num1 + num2 : num1 - num2;
            if(ans > currentMathRange) continue;

            qString = `${num1} ${op} ${num2}`;
            attempts++;
            if (attempts > 50) break; 
        } while (usedQuestions.has(qString));

        usedQuestions.add(qString);
        
        let options = [ans];
        while(options.length < 4) {
            let offset = Math.floor(Math.random() * 9) - 4; 
            if (offset === 0) offset = 5;
            let fake = ans + offset;
            
            if (fake >= 0 && fake <= currentMathRange + 5 && !options.includes(fake)) {
                options.push(fake);
            }
        }
        
        options.sort(() => Math.random() - 0.5);
        
        let spokenOp = op === '+' ? 'plus' : 'minus';
        currentQuestion = {
            text: `${num1} ${op} ${num2} = ?`,
            ans: ans,
            options: options,
            spokenText: `${num1} ${spokenOp} ${num2} equals what?`
        };
        
        document.getElementById('question-text').innerText = currentQuestion.text;
        document.getElementById('progress-display').innerText = `Question: ${questionsAnswered + 1}/${maxQuestions}`;
    }

    function playTTS() {
        if (!currentQuestion) return;
        initAudio();
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); 
            let msg = new SpeechSynthesisUtterance(currentQuestion.spokenText);
            msg.lang = 'en-US';
            msg.rate = 0.85; 
            window.speechSynthesis.speak(msg);
        }
    }

    // --- PROCEDURAL GENERATION (Optimized & Beautiful) ---
    function generateBackgroundElements() {
        backgroundElements = [];
        spores = [];
        lavaBubbles = [];
        
        // Distant stars/sparkles in the cave roof
        for(let i=0; i<40; i++) {
            backgroundElements.push({
                type: 'star',
                x: Math.random() * VW * 4,
                y: Math.random() * VH * 0.5,
                size: Math.random() * 2 + 1,
                parallax: 0.05
            });
        }

        // Reduced counts for smooth performance
        for(let i=0; i<8; i++) {
            backgroundElements.push({
                type: 'crystal',
                x: Math.random() * VW * 4, 
                y: VH/2 + Math.random() * 300 - 150,
                size: 35 + Math.random() * 70,
                hue: Math.random() > 0.5 ? 185 : (Math.random() > 0.5 ? 300 : 280), 
                parallax: 0.15 + Math.random() * 0.2
            });
        }
        for(let i=0; i<10; i++) {
            backgroundElements.push({
                type: 'pillar_back',
                x: Math.random() * VW * 4,
                width: 250 + Math.random() * 250,
                parallax: 0.2
            });
        }
        for(let i=0; i<6; i++) {
            backgroundElements.push({
                type: 'pillar_front',
                x: Math.random() * VW * 4,
                width: 150 + Math.random() * 150,
                parallax: 0.35
            });
        }
        for(let i=0; i<30; i++) {
            spores.push({
                x: Math.random() * VW * 3,
                y: Math.random() * VH,
                size: Math.random() * 3 + 1,
                speedX: (Math.random() - 0.5) * 1.5,
                speedY: (Math.random() - 0.5) * 1.5,
                hue: Math.random() > 0.5 ? 180 : 50, 
                parallax: 0.4
            });
        }
        for(let i=0; i<20; i++) {
            lavaBubbles.push({
                x: Math.random() * VW * 2,
                y: VH - 40 + Math.random() * 30,
                size: Math.random() * 12 + 8,
                life: Math.random(),
                speed: Math.random() * 1.5 + 0.5
            });
        }
    }

    function createPlatformObject(x, y, w, isBase, answerValue) {
        let shape = [];
        let segments = Math.floor(w / 15);
        for(let i = 0; i <= segments; i++) {
            let px = (i / segments) * w;
            let py = (i === 0 || i === segments) ? 0 : (Math.random() * 8 - 4); 
            shape.push({ x: px, y: py });
        }
        
        let cracks = [];
        if(!isBase) {
            let numCracks = Math.floor(Math.random() * 2) + 1; 
            for(let c=0; c<numCracks; c++) {
                let startX = w * (0.2 + Math.random() * 0.6);
                cracks.push({ x: startX, len: 40 + Math.random()*50, branch: Math.random() > 0.5 });
            }
        }
        
        let hangingMoss = [];
        for(let i = 0; i <= segments; i++) {
            hangingMoss.push(10 + Math.random() * 30);
        }

        return {
            x: x, y: y, w: w, 
            blockHeight: 220 + Math.random() * 60, 
            h: 800, 
            shape: shape,
            cracks: cracks,
            hangingMoss: hangingMoss,
            isBase: isBase,
            answer: answerValue,
            isCrumbling: false,
            vy: 0,
            mossColor: `hsl(${95 + Math.random()*25}, 85%, 45%)` 
        };
    }

    function generateLevelSet(baseX) {
        let baseY = VH - 280;
        if (platforms.length === 0) {
            platforms.push(createPlatformObject(baseX, baseY, 200, true, null));
        } else {
            baseY = platforms[0].y;
        }

        let startX = baseX + 280;
        let yOffsets = [-40, -120, 20, -90]; 
        
        for(let i=0; i<4; i++) {
            let platX = startX + i * 240;
            let platY = baseY + yOffsets[i];
            platforms.push(createPlatformObject(platX, platY, 140, false, currentQuestion.options[i]));
        }
    }

    function initLevel() {
        initAudio();
        currentMathRange = parseInt(document.getElementById('math-range').value);
        diamonds = 0;
        questionsAnswered = 0;
        usedQuestions.clear();
        
        document.getElementById('score-display').innerText = `💎 0`;
        
        platforms = [];
        exits = [];
        particles = [];
        fireworks = [];
        floatingTexts = [];
        if(fwInterval) clearInterval(fwInterval);
        
        generateBackgroundElements();
        generateMathQuestion();
        generateLevelSet(200);

        player.x = platforms[0].x + platforms[0].w / 2;
        player.y = platforms[0].y;
        player.vx = 0;
        player.vy = 0;
        player.state = 'idle';
        player.targetPlatform = null;
        player.isJumpingToCave = false;
        player.jumpTargetX = null;
        
        cameraX = 0;
        targetCameraX = 0;
        cameraShake = 0;
    }

    // --- INPUT HANDLING ---
    canvas.addEventListener('mousedown', handleClick);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleClick(e.touches[0] || e); }, {passive: false});

    function handleClick(e) {
        initAudio(); 
        if(gameState !== 'playing' || player.state !== 'idle') return;

        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        const scaledX = x - offsetX;
        const scaledY = y - offsetY;
        
        const virtualX = scaledX / scale + cameraX;
        const virtualY = scaledY / scale;

        for(let i=1; i<platforms.length; i++) {
            let p = platforms[i];
            if (!p.isCrumbling && virtualX >= p.x && virtualX <= p.x + p.w && virtualY >= p.y - 150 && virtualY <= p.y + p.h) {
                jumpTo(p);
                break;
            }
        }
    }

    function jumpTo(target) {
        sfxJump();
        player.state = 'jumping';
        player.targetPlatform = target;
        
        let targetX = target.x + target.w/2;
        player.jumpTargetX = targetX; 
        
        let dx = targetX - player.x;
        let dy = target.y - player.y;

        let vx_speed = 22; 
        let T = Math.abs(dx) / vx_speed;
        
        player.vx = vx_speed;
        player.vy = (dy - 0.5 * gravity * T * T) / T;
    }

    function screenShake(amount) {
        cameraShake = amount;
    }

    // --- GAME LOGIC ---
    function update() {
        backgroundTime += 0.03;
        if(cameraShake > 0) cameraShake *= 0.8;

        let desiredCamX = player.x - VW * 0.15; 
        if(desiredCamX > targetCameraX) targetCameraX = desiredCamX; 
        cameraX += (targetCameraX - cameraX) * 0.08; 

        backgroundElements.forEach(bg => {
            if(bg.x < cameraX * bg.parallax - VW) {
                bg.x += VW * 2.5;
                if(bg.type === 'crystal') bg.y = VH/2 + Math.random() * 300 - 150;
                if(bg.type === 'star') bg.y = Math.random() * VH * 0.5;
            }
        });

        spores.forEach(s => {
            s.x += s.speedX;
            s.y += s.speedY;
            let px = s.x - cameraX * s.parallax;
            if (px < -100) s.x += VW * 2.5;
            if (s.y < -100) s.y += VH + 200;
            if (s.y > VH + 100) s.y -= VH + 200;
        });

        lavaBubbles.forEach(b => {
            b.life += 0.015 * b.speed; 
            if(b.life > 1) {
                b.life = 0;
                b.x = cameraX + Math.random() * VW * 1.5;
                b.y = VH - 20; 
                b.size = Math.random() * 10 + 6;
                b.speed = Math.random() * 1.5 + 0.5;
            }
        });

        // Fast Fireworks Physics
        for (let i = fireworks.length - 1; i >= 0; i--) {
            let f = fireworks[i];
            f.px = f.x; 
            f.py = f.y;
            f.x += f.vx;
            f.y += f.vy;
            f.vy += 0.12; 
            f.vx *= 0.96; 
            f.life -= f.decay;
            if (f.life <= 0) fireworks.splice(i, 1);
        }

        for (let i = floatingTexts.length - 1; i >= 0; i--) {
            let ft = floatingTexts[i];
            ft.y -= 2.5;
            ft.life -= 0.02;
            if(ft.life <= 0) floatingTexts.splice(i, 1);
        }

        if (gameState !== 'playing') {
            if ((gameState === 'gameover' || gameState === 'win') && Math.random() < (gameState==='win'?0.1:0.02)) {
                createFirework(cameraX + VW/2 + (Math.random()-0.5)*1000, VH*0.3 + (Math.random()-0.5)*300);
            }
            return;
        }

        if (player.state === 'jumping') {
            player.x += player.vx;
            player.vy += gravity;
            player.y += player.vy;

            let targetX = player.jumpTargetX || (player.targetPlatform.x + player.targetPlatform.w/2);
            
            if (player.x >= targetX) {
                player.x = targetX;
                player.y = player.targetPlatform.y; 
                player.vx = 0;
                player.vy = 0;
                player.jumpTargetX = null;
                
                screenShake(8);

                if (player.isJumpingToCave) {
                    player.state = 'idle';
                    player.isJumpingToCave = false;
                    
                    fwInterval = setInterval(() => {
                        if(gameState !== 'win') clearInterval(fwInterval);
                        createFirework(cameraX + VW/2 + (Math.random()-0.5)*1000, VH*0.4 + (Math.random()-0.5)*400);
                    }, 250);
                    
                    winGame();
                }
                else if (player.targetPlatform.answer === currentQuestion.ans) {
                    sfxCorrect();
                    player.state = 'idle';
                    diamonds += 1;
                    questionsAnswered++;
                    document.getElementById('score-display').innerText = `💎 ${diamonds}`;
                    
                    floatingTexts.push({x: player.x, y: player.y - 120, text: "+1 💎", life: 1});

                    platforms.forEach(p => {
                        if (p !== player.targetPlatform && !p.isBase) {
                            p.isCrumbling = true;
                        }
                    });

                    player.targetPlatform.isBase = true;
                    player.targetPlatform.answer = null; 
                    
                    platforms = platforms.filter(p => p === player.targetPlatform || p.isCrumbling);
                    
                    if(questionsAnswered < maxQuestions) {
                        generateMathQuestion();
                        generateLevelSet(player.targetPlatform.x);
                    } else {
                        // TRIGGER THE WAY OUT (Meadow Exit)
                        document.getElementById('top-bar').style.display = 'none';
                        
                        let exitX = player.targetPlatform.x + 350;
                        let exitY = player.targetPlatform.y; 
                        
                        let exitShore = createPlatformObject(exitX, exitY, VW * 2, true, null);
                        exitShore.isExit = true; 
                        platforms.push(exitShore);
                        exits.push({x: exitX, y: exitY, w: VW*1.2});
                        
                        setTimeout(() => {
                            sfxJump();
                            player.targetPlatform = exitShore;
                            player.jumpTargetX = exitX + 300; 
                            
                            let dx = player.jumpTargetX - player.x;
                            let dy = exitY - player.y;
                            let T = Math.abs(dx) / 22;
                            player.vx = 22;
                            player.vy = (dy - 0.5 * gravity * T * T) / T;
                            player.state = 'jumping';
                            player.isJumpingToCave = true;
                        }, 1000);
                    }
                } else {
                    sfxWrong();
                    player.state = 'falling';
                    player.targetPlatform.isCrumbling = true;
                }
            }
        } 
        else if (player.state === 'falling') {
            if (player.targetPlatform) {
                player.y = player.targetPlatform.y;
                player.x = player.targetPlatform.x + player.targetPlatform.w/2;
            } else {
                player.vy += gravity;
                player.y += player.vy;
            }
            
            if (player.y > VH + 100) {
                loseGame();
            }
        }

        platforms.forEach(p => {
            if (p.isCrumbling) {
                p.vy += gravity * 0.4; 
                p.y += p.vy;
            }
        });

        // Cleanup
        for (let i = platforms.length - 1; i >= 0; i--) {
            if (platforms[i].y > VH + 300 || platforms[i].x < cameraX - 800) {
                platforms.splice(i, 1);
            }
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= p.decay;
            p.vy += 0.2; 
            if (p.life <= 0) particles.splice(i, 1); 
        }
    }

    function createDust(x, y, amount) {
        for(let i=0; i<amount; i++) {
            particles.push({
                x: x + (Math.random() - 0.5) * 50,
                y: y,
                vx: (Math.random() - 0.5) * 8,
                vy: -Math.random() * 5 - 1,
                size: Math.random() * 6 + 3,
                color: `rgba(200, 220, 200, ${Math.random()*0.5 + 0.3})`, 
                life: 1,
                decay: 0.03 + Math.random()*0.02,
                type: 'dust'
            });
        }
    }

    function createSplash(x, y, amount=30) {
        for(let i=0; i<amount; i++) {
            particles.push({
                x: x + (Math.random() - 0.5) * 100,
                y: y,
                vx: (Math.random() - 0.5) * 12,
                vy: -Math.random() * 15 - 5,
                size: Math.random() * 10 + 4,
                color: Math.random() > 0.4 ? '#ffcc00' : '#ff3300', 
                life: 1,
                decay: 0.02,
                type: 'splash'
            });
        }
    }

    function createFirework(x, y) {
        let count = 30 + Math.random()*20; 
        let hues = [0, 60, 180, 280, 320, 120]; 
        let hue = hues[Math.floor(Math.random()*hues.length)];
        for(let i=0; i<count; i++) {
            let angle = Math.random() * Math.PI * 2;
            let speed = Math.random() * 14 + 4;
            fireworks.push({
                x: x, y: y, px: x, py: y,
                vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
                life: 1.0, decay: Math.random()*0.02 + 0.015,
                color: `hsl(${hue + (Math.random()-0.5)*20}, 100%, 65%)`
            });
        }
    }

    // --- ENHANCED DRAWING (Optimized) ---
    function darken(hex, percent) {
        let num = parseInt(hex.replace("#",""),16),
        amt = Math.round(2.55 * percent),
        R = (num >> 16) - amt,
        B = (num >> 8 & 0x00FF) - amt,
        G = (num & 0x0000FF) - amt;
        return "#" + (0x1000000 + (R<255?R<1?0:R:255)*0x10000 + (B<255?B<1?0:B:255)*0x100 + (G<255?G<1?0:G:255)).toString(16).slice(1);
    }

    function drawOrganicLimb(ctx, startX, startY, thickBase, thickEnd, length, angle, color1, highlight1, isLeg) {
        ctx.save();
        ctx.translate(startX, startY);
        ctx.rotate(angle);
        
        ctx.fillStyle = color1; 
        
        ctx.beginPath();
        ctx.moveTo(-thickBase/2, 0);
        ctx.lineTo(thickBase/2, 0);
        ctx.quadraticCurveTo(thickBase/2, length/4, thickEnd/2, length/2);
        ctx.lineTo(-thickEnd/2, length/2);
        ctx.quadraticCurveTo(-thickBase/2, length/4, -thickBase/2, 0);
        ctx.fill();

        ctx.strokeStyle = highlight1; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(thickEnd/4, 5); ctx.lineTo(thickEnd/4, length/2-5); ctx.stroke();

        ctx.beginPath(); ctx.arc(0, length/2, thickEnd/2, 0, Math.PI*2); ctx.fill();

        ctx.translate(0, length/2);
        ctx.rotate(-angle * 0.2); 

        ctx.beginPath();
        ctx.moveTo(-thickEnd/2, 0);
        ctx.lineTo(thickEnd/2, 0);
        ctx.quadraticCurveTo(thickEnd/2, length/4, (thickEnd*0.8)/2, length/2);
        ctx.lineTo(-(thickEnd*0.8)/2, length/2);
        ctx.quadraticCurveTo(-thickEnd/2, length/4, -thickEnd/2, 0);
        ctx.fill();

        ctx.translate(0, length/2);
        if(isLeg) { 
            ctx.fillStyle = "#4a2c14";
            ctx.beginPath();
            ctx.roundRect(-thickEnd/2 - 4, 0, thickEnd + 12, 18, 5);
            ctx.fill();
            
            ctx.fillStyle = "#111";
            ctx.fillRect(-thickEnd/2 - 3, 14, thickEnd + 10, 6);
            
            ctx.fillStyle = "#ffaa00";
            ctx.fillRect(-thickEnd/2 + 2, 4, 6, 2);
            ctx.fillRect(-thickEnd/2 + 3, 9, 6, 2);
            ctx.fillStyle = "#2d1b0b";
            ctx.fillRect(-thickEnd/2 - 4, 0, 7, 14); 
        } else { 
            ctx.fillStyle = "#fcd4b1"; 
            ctx.beginPath();
            ctx.arc(0, 3, thickEnd/2, 0, Math.PI*2);
            ctx.fill();
        }
        ctx.restore();
    }

    function drawRealisticPlayer(ctx, px, py) {
        ctx.save();
        ctx.translate(px, py);
        
        const h = player.height;
        const headR = 10;
        const torsoH = 42;
        const legH = 50;
        
        let legAngle1 = 0, legAngle2 = 0;
        let armAngle1 = 0, armAngle2 = 0;
        let bodyTilt = 0;

        if (player.state === 'idle' || player.state === 'falling') {
            legAngle1 = Math.PI / 15;
            legAngle2 = -Math.PI / 12;
            armAngle1 = -Math.PI / 10;
            armAngle2 = Math.PI / 8;
            if (player.state === 'falling') {
                armAngle1 = -Math.PI / 1.5;
                armAngle2 = -Math.PI / 1.2;
                legAngle1 = -Math.PI / 4;
            }
        } else if (player.state === 'jumping') {
            bodyTilt = Math.PI / 8;
            if(player.vy < -5) {
                legAngle1 = -Math.PI / 3.5; 
                legAngle2 = Math.PI / 3;  
                armAngle1 = Math.PI / 1.8;  
                armAngle2 = -Math.PI / 2;
            } else if (player.vy > 5) {
                legAngle1 = Math.PI / 6; 
                legAngle2 = Math.PI / 8;
                armAngle1 = -Math.PI / 2.5;
                armAngle2 = -Math.PI / 4;
                bodyTilt = Math.PI / 12;
            } else {
                legAngle1 = -Math.PI / 15; 
                legAngle2 = Math.PI / 5;
                armAngle1 = Math.PI / 7; 
                armAngle2 = -Math.PI / 4;
            }
        }

        ctx.rotate(bodyTilt);

        const skinColor = "#fcd4b1";
        const jacketColor = "#185f80"; 
        const jacketHi = "#2b8cb8";
        const pantsColor = "#2d3436"; 
        const pantsHi = "#4a5356";
        const backpackMain = "#e86a17"; 
        const backpackSub = "#ff8e42";

        // Backpack 
        ctx.fillStyle = backpackMain;
        ctx.beginPath();
        ctx.roundRect(-32, -h + headR*2, 24, 40, 8);
        ctx.fill();
        ctx.fillStyle = darken(backpackMain, 20);
        ctx.beginPath();
        ctx.roundRect(-36, -h + headR*2 + 10, 10, 22, 4);
        ctx.fill();
        
        ctx.fillStyle = "#2d3e33"; 
        ctx.beginPath();
        ctx.roundRect(-34, -h + headR*2 + 40, 30, 16, 5);
        ctx.fill();
        ctx.strokeStyle = "#e8c274"; ctx.lineWidth = 2; 
        ctx.beginPath(); ctx.arc(-26, -h + headR*2 + 28, 6, 0, Math.PI*2); ctx.stroke();

        // Limbs Back 
        drawOrganicLimb(ctx, 3, -legH, 16, 12, legH, legAngle2, darken(pantsColor, 15), darken(pantsHi, 15), true);
        drawOrganicLimb(ctx, -3, -h + headR*2 + 5, 12, 9, 34, armAngle2, darken(jacketColor, 20), darken(jacketHi, 20), false);

        // Torso curved (Flat color for speed)
        ctx.fillStyle = jacketColor;
        ctx.beginPath();
        ctx.moveTo(-13, -h + headR*2);
        ctx.lineTo(13, -h + headR*2);
        ctx.quadraticCurveTo(15, -h + headR*2 + torsoH/2, 13, -h + headR*2 + torsoH);
        ctx.lineTo(-13, -h + headR*2 + torsoH);
        ctx.quadraticCurveTo(-15, -h + headR*2 + torsoH/2, -13, -h + headR*2);
        ctx.fill();

        ctx.fillStyle = "#1a1a1a";
        ctx.fillRect(-14, -h + headR*2 + torsoH - 9, 28, 9); 
        ctx.fillStyle = "#ffd700"; 
        ctx.fillRect(4, -h + headR*2 + torsoH - 8, 8, 7); 
        ctx.fillStyle = darken(jacketColor, 30);
        ctx.fillRect(2, -h + headR*2 + 12, 8, 10); 

        ctx.beginPath(); 
        ctx.moveTo(-6, -h + headR*2); ctx.lineTo(-10, -h + headR*2 + torsoH/2);
        ctx.lineWidth = 5; ctx.strokeStyle = "#111"; ctx.stroke(); 

        ctx.fillStyle = darken(skinColor, 20);
        ctx.fillRect(-4, -h + headR*1.8, 9, 8); 

        // Face Profile
        ctx.fillStyle = skinColor;
        ctx.beginPath();
        ctx.arc(0, -h + headR, headR, Math.PI * 0.5, Math.PI * 1.5); 
        ctx.quadraticCurveTo(headR * 1.1, -h + headR - headR, headR * 1.1, -h + headR); 
        ctx.lineTo(headR * 1.4, -h + headR + 2); 
        ctx.lineTo(headR * 0.8, -h + headR + 4); 
        ctx.quadraticCurveTo(headR, -h + headR + 8, 0, -h + headR*2); 
        ctx.fill();
        
        ctx.fillStyle = "#221100";
        ctx.beginPath(); 
        ctx.arc(headR-1, -h + headR - 1, 1.5, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = "#a05a45"; ctx.lineWidth = 1.5;
        ctx.beginPath(); 
        ctx.arc(headR-2, -h + headR + 3, 2.5, 0, Math.PI/2);
        ctx.stroke();

        // Hair
        const hairColor = "#3d2212"; 
        ctx.fillStyle = hairColor;
        ctx.beginPath(); 
        ctx.arc(-1, -h + headR - 2, headR + 2.5, Math.PI*0.7, Math.PI*2.5);
        ctx.fill();
        
        ctx.lineWidth = 8;
        ctx.lineCap = "round";
        let hairSway = player.state === 'jumping' ? player.vy * 1.5 : (Math.sin(backgroundTime*2.5)*3);
        
        ctx.strokeStyle = hairColor;
        ctx.beginPath();
        ctx.moveTo(-headR+2, -h + headR + 2);
        let controlX = -22 + hairSway*0.4;
        let controlY = -h + headR + 22 + Math.abs(hairSway)*1.2;
        ctx.quadraticCurveTo(-26, -h + headR + 15, controlX, controlY);
        ctx.stroke();
        
        ctx.lineWidth = 3;
        ctx.strokeStyle = "#6b3b1f";
        ctx.beginPath();
        ctx.moveTo(-headR+2, -h + headR + 2);
        ctx.quadraticCurveTo(-26, -h + headR + 15, controlX, controlY);
        ctx.stroke();

        // Limbs Front
        drawOrganicLimb(ctx, 0, -legH, 18, 13, legH, legAngle1, pantsColor, pantsHi, true);
        drawOrganicLimb(ctx, 8, -h + headR*2 + 5, 14, 10, 35, armAngle1, jacketColor, jacketHi, false);

        ctx.restore();
    }

    // A helper to draw beautiful fluffy clouds
    function drawCloud(ctx, cx, cy, scale) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.scale(scale, scale);
        ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
        ctx.beginPath();
        ctx.arc(0, 0, 40, 0, Math.PI*2);
        ctx.arc(40, 10, 30, 0, Math.PI*2);
        ctx.arc(-30, 15, 25, 0, Math.PI*2);
        ctx.arc(20, -15, 35, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    }

    function drawCaveBackground() {
        let startDraw = -offsetX/scale;
        let endDraw = VW + offsetX/scale;
        
        // Simple fast background
        ctx.fillStyle = "#160729";
        ctx.fillRect(startDraw, 0, endDraw - startDraw, VH); 

        backgroundElements.forEach(el => {
            let px = el.x - cameraX * el.parallax;
            if(px + 300 < startDraw || px > endDraw + 300) return;

            if(el.type === 'star') {
                ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
                let blink = Math.sin(backgroundTime*2 + el.x)*0.5 + 0.5;
                ctx.beginPath();
                ctx.arc(px, el.y, el.size * blink, 0, Math.PI*2);
                ctx.fill();
            }
            else if (el.type === 'crystal') {
                ctx.fillStyle = `hsla(${el.hue}, 90%, 65%, 0.5)`;
                ctx.beginPath();
                ctx.moveTo(px, el.y - el.size*1.6);
                ctx.lineTo(px + el.size*0.6, el.y);
                ctx.lineTo(px, el.y + el.size*2);
                ctx.lineTo(px - el.size*0.6, el.y);
                ctx.fill();
            } else {
                let isFront = el.type === 'pillar_front';
                ctx.fillStyle = isFront ? "#2a0d42" : "#1a062e";
                ctx.beginPath();
                ctx.moveTo(px, 0);
                for(let y=0; y<=VH; y+=150) { // Optimized steps
                    ctx.lineTo(px + Math.sin(y/(isFront?60:90))* (isFront?20:10), y);
                }
                ctx.lineTo(px + el.width, VH);
                for(let y=VH; y>=0; y-=150) {
                    ctx.lineTo(px + el.width + Math.sin(y/(isFront?50:80))* (isFront?20:10), y);
                }
                ctx.fill();
            }
        });

        ctx.fillStyle = "rgba(170, 255, 229, 0.6)";
        spores.forEach(s => {
            let px = s.x - cameraX * s.parallax;
            if(px < startDraw || px > endDraw) return;
            ctx.beginPath();
            ctx.arc(px, s.y, s.size, 0, Math.PI*2);
            ctx.fill();
        });
    }

    function drawExit(c) {
        let cx = c.x;
        let cy = c.y; 
        
        let startDraw = -offsetX/scale + cameraX;
        let endDraw = VW + offsetX/scale + cameraX;
        if (cx > endDraw) return;

        ctx.save();
        ctx.translate(cx, cy);

        // --- NEW EXIT SCENE (The Way Out - Meadow) ---
        // 1. Beautiful Sky Gradient
        let skyGrad = ctx.createLinearGradient(0, -VH, 0, 0);
        skyGrad.addColorStop(0, "#1976D2"); // Deep blue
        skyGrad.addColorStop(0.5, "#64B5F6"); // Light blue
        skyGrad.addColorStop(1, "#FFF9C4"); // Warm sunrise yellow at horizon
        ctx.fillStyle = skyGrad;
        ctx.fillRect(-200, -VH, VW*1.5 + 400, VH);

        // 2. The Sun
        ctx.fillStyle = "rgba(255, 235, 150, 0.15)";
        ctx.beginPath(); ctx.arc(400, -350, 180, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "rgba(255, 245, 200, 0.3)";
        ctx.beginPath(); ctx.arc(400, -350, 120, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#FFFDE7";
        ctx.beginPath(); ctx.arc(400, -350, 70, 0, Math.PI*2); ctx.fill();

        // 3. Clouds (Slowly drifting)
        let cloudOffset1 = (backgroundTime * 15) % (VW * 1.5);
        let cloudOffset2 = (backgroundTime * 8) % (VW * 1.5);
        drawCloud(ctx, 100 + cloudOffset1, -550, 1.2);
        drawCloud(ctx, 600 + cloudOffset2, -450, 1.8);
        drawCloud(ctx, -200 + cloudOffset1, -300, 1);
        drawCloud(ctx, 1000 + cloudOffset2, -600, 1.5);

        // 4. Distant Mountains (Layered for depth)
        // Back mountains
        ctx.fillStyle = "#90CAF9"; 
        ctx.beginPath();
        ctx.moveTo(-200, 0);
        ctx.lineTo(200, -250); ctx.lineTo(450, -100); ctx.lineTo(800, -300); ctx.lineTo(1200, -50);
        ctx.lineTo(VW*1.5, -200); ctx.lineTo(VW*1.5, 0);
        ctx.fill();
        // Front mountains
        ctx.fillStyle = "#81C784"; 
        ctx.beginPath();
        ctx.moveTo(-200, 0);
        ctx.lineTo(50, -150); ctx.lineTo(350, -50); ctx.lineTo(600, -180); ctx.lineTo(950, -80);
        ctx.lineTo(VW*1.5, -150); ctx.lineTo(VW*1.5, 0);
        ctx.fill();

        // 5. Solid Ground (Dirt Base)
        ctx.fillStyle = "#5D4037"; 
        ctx.fillRect(-200, 0, VW*1.5 + 400, VH);

        // 6. Lush Meadow Grass
        let grassGrad = ctx.createLinearGradient(0, 0, 0, 100);
        grassGrad.addColorStop(0, "#7CB342");
        grassGrad.addColorStop(1, "#33691E");
        ctx.fillStyle = grassGrad;
        ctx.beginPath();
        ctx.moveTo(-200,0);
        // Gently rolling hills
        for(let x=-200; x<=VW*1.5; x+=50) {
            ctx.quadraticCurveTo(x + 25, -20 + Math.sin(x/100)*10, x + 50, 0);
        }
        ctx.lineTo(VW*1.5, VH);
        ctx.lineTo(-200, VH);
        ctx.fill();

        // 7. Cave Opening Silhouette (Framing the exit organically)
        ctx.fillStyle = "#11052b"; 
        
        // Left Cave Wall
        ctx.beginPath();
        ctx.moveTo(0, 200); 
        ctx.lineTo(200, 200); 
        ctx.quadraticCurveTo(180, -100, 150, -200); 
        ctx.quadraticCurveTo(100, -400, 50, -VH); 
        ctx.lineTo(-200, -VH); 
        ctx.lineTo(-200, 200); 
        ctx.fill();

        // Top Cave Arch
        ctx.beginPath();
        ctx.moveTo(0, -VH);
        ctx.lineTo(VW*1.5, -VH);
        ctx.lineTo(VW*1.5, -500);
        ctx.quadraticCurveTo(800, -750, 50, -VH);
        ctx.fill();

        // 8. Trees on the exit cliff
        function drawTree(tx, ty, scale) {
            ctx.save(); ctx.translate(tx, ty); ctx.scale(scale, scale);
            ctx.fillStyle = "#4E342E"; // Trunk
            ctx.fillRect(-8, -50, 16, 50);
            ctx.fillStyle = "#2E7D32"; // Leaves
            ctx.beginPath(); ctx.arc(0, -60, 35, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(-20, -45, 25, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(20, -45, 25, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(0, -90, 30, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }

        drawTree(250, -5, 1.2);
        drawTree(450, 10, 0.9);
        drawTree(700, -15, 1.4);
        drawTree(850, 5, 1.1);

        ctx.restore();
    }

    function drawPlatform(p) {
        if (p.isExit) return; 
        
        let drawX = p.x;
        let startDraw = -offsetX/scale + cameraX;
        let endDraw = VW + offsetX/scale + cameraX;
        if (drawX + p.w < startDraw - 200 || drawX > endDraw + 200) return;

        ctx.save();
        ctx.translate(drawX, p.y);

        if (p.isCrumbling) {
            ctx.translate((Math.random()-0.5)*10, (Math.random()-0.5)*10);
        }

        let w = p.w;
        let h = p.blockHeight; 
        
        let fTopL = {x: 0, y: 0};
        let fTopR = {x: w * 0.85, y: 0};
        let fBotR = {x: w * 0.7, y: h * 0.8};
        let fBotC = {x: w * 0.4, y: h};
        let fBotL = {x: w * 0.1, y: h * 0.85};

        let sTopR = {x: w, y: -20};
        let sBotR = {x: w * 0.85, y: h * 0.75};

        // Side Face (Flat color)
        ctx.fillStyle = "#3e2723";
        ctx.beginPath();
        ctx.moveTo(fTopR.x, fTopR.y);
        ctx.lineTo(sTopR.x, sTopR.y);
        ctx.lineTo(sBotR.x, sBotR.y);
        ctx.lineTo(fBotR.x, fBotR.y);
        ctx.fill();

        // Front Face (Flat color with bottom tint)
        ctx.fillStyle = "#5d4037";
        ctx.beginPath();
        ctx.moveTo(fTopL.x, fTopL.y);
        for(let i=0; i<p.shape.length; i++) {
            ctx.lineTo(p.shape[i].x * 0.85, p.shape[i].y);
        }
        ctx.lineTo(fBotR.x, fBotR.y);
        ctx.lineTo(fBotC.x, fBotC.y);
        ctx.lineTo(fBotL.x, fBotL.y);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "rgba(100, 20, 0, 0.4)"; // Lava tint at bottom
        ctx.beginPath();
        ctx.moveTo(fTopL.x, fTopL.y + h*0.5);
        ctx.lineTo(fTopR.x, fTopR.y + h*0.5);
        ctx.lineTo(fBotR.x, fBotR.y);
        ctx.lineTo(fBotC.x, fBotC.y);
        ctx.lineTo(fBotL.x, fBotL.y);
        ctx.fill();

        // Cracks
        ctx.strokeStyle = "rgba(0,0,0,0.6)";
        ctx.lineWidth = 3;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.beginPath();
        p.cracks.forEach(c => {
            let cx = c.x * 0.85;
            ctx.moveTo(cx, 0); 
            ctx.lineTo(cx + 10, c.len*0.3); 
            ctx.lineTo(cx - 5, c.len*0.6); 
            ctx.lineTo(cx + 5, c.len);
        });
        ctx.stroke();

        // Moss (Flat color)
        ctx.fillStyle = p.mossColor;
        ctx.beginPath();
        ctx.moveTo(fTopL.x, fTopL.y);
        for(let i=0; i<p.shape.length; i++) { 
            ctx.lineTo(p.shape[i].x * 0.85, p.shape[i].y); 
        }
        for(let i=p.shape.length-1; i>=0; i--) { 
            ctx.lineTo(p.shape[i].x * 0.85, p.shape[i].y + p.hangingMoss[i] * 0.8); 
        }
        ctx.fill();

        // Runes
        if (p.answer !== null) {
            let rx = w * 0.425;
            let ry = h * 0.4;

            ctx.font = "900 65px Poppins, sans-serif"; 
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
            ctx.fillText(p.answer, rx, ry + 4);
            
            ctx.fillStyle = "#ffaa00";
            ctx.fillText(p.answer, rx, ry);
            ctx.fillStyle = "#ffffff"; // inner core
            ctx.font = "900 60px Poppins, sans-serif"; 
            ctx.fillText(p.answer, rx, ry);
        }

        ctx.restore();
    }

    function render() {
        let shakeX = (Math.random() - 0.5) * cameraShake;
        let shakeY = (Math.random() - 0.5) * cameraShake;
        
        ctx.save(); 
        ctx.translate(offsetX, offsetY);
        ctx.scale(scale, scale);
        
        drawCaveBackground();

        ctx.save();
        ctx.translate(-cameraX + shakeX, shakeY);

        let startDraw = -offsetX/scale + cameraX - 200;
        let endDraw = VW + offsetX/scale + cameraX + 200;

        // Boiling Bubbling Hot Lava (Optimized)
        // Draw base lava color
        ctx.fillStyle = "#8a1c00";
        ctx.fillRect(startDraw, VH - 100, endDraw - startDraw, 150);

        for(let j=0; j<2; j++) { // Reduced to 2 layers
            let lavaGrad = ctx.createLinearGradient(0, VH - 120 + j*30, 0, VH);
            lavaGrad.addColorStop(0, j===0 ? '#ffcc00' : '#ff5500'); 
            lavaGrad.addColorStop(1, '#550000'); 

            ctx.fillStyle = lavaGrad;
            ctx.beginPath();
            ctx.moveTo(startDraw, VH);
            
            let speed = backgroundTime * (2.5 + j*0.6);
            let heightBase = VH - 80 + j * 30;
            
            for(let x = startDraw; x <= endDraw; x += 50) { // Optimized steps
                let wave = Math.sin((x + cameraX*0.2)/(70 + j*15) + speed) * (18 + j*6);
                ctx.lineTo(x, heightBase + wave);
            }
            ctx.lineTo(endDraw, VH);
            ctx.fill();
        }

        // Bubbles Rising and Popping
        lavaBubbles.forEach(b => {
            let px = b.x;
            if(px < startDraw || px > endDraw) return;
            
            let py = b.y - (b.life * 60 * b.speed); 
            let size = b.size * (1 + b.life*0.5); 
            
            if (b.life < 0.9) {
                ctx.globalAlpha = Math.sin(b.life * Math.PI); 
                ctx.fillStyle = "#ffcc00"; 
                ctx.beginPath();
                ctx.arc(px, py, size, 0, Math.PI*2);
                ctx.fill();
            } else {
                ctx.globalAlpha = (1 - b.life) * 10;
                ctx.strokeStyle = "#ffaa00";
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(px, py, size * 1.5, 0, Math.PI*2);
                ctx.stroke();
            }
        });
        ctx.globalAlpha = 1.0;

        // Correct depth sorting
        exits.forEach(c => drawExit(c));
        platforms.forEach(p => drawPlatform(p));
        drawRealisticPlayer(ctx, player.x, player.y);

        ctx.fillStyle = "rgba(200, 200, 200, 0.6)";
        particles.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
            ctx.fill();
        });
        
        floatingTexts.forEach(ft => {
            ctx.globalAlpha = ft.life;
            ctx.font = "900 45px Poppins, sans-serif";
            ctx.textAlign = "center";
            ctx.fillStyle = "#ffcc00";
            ctx.fillText(ft.text, ft.x, ft.y);
            ctx.globalAlpha = 1.0;
        });

        // Fast Motion Trail Fireworks (No shadow blur)
        ctx.lineCap = "round";
        fireworks.forEach(f => {
            // Fake glow (wide semi-transparent line)
            ctx.strokeStyle = f.color;
            ctx.lineWidth = 10;
            ctx.globalAlpha = f.life * 0.3;
            ctx.beginPath();
            ctx.moveTo(f.px, f.py);
            ctx.lineTo(f.x, f.y);
            ctx.stroke();

            // Core line
            ctx.lineWidth = 3;
            ctx.globalAlpha = f.life;
            ctx.beginPath();
            ctx.moveTo(f.px, f.py);
            ctx.lineTo(f.x, f.y);
            ctx.stroke();
            
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(f.x, f.y, 2, 0, Math.PI*2);
            ctx.fill();
        });
        ctx.globalAlpha = 1.0;

        ctx.restore(); 
        ctx.restore(); 
    }

    // --- GAME LOOP ---
    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        update();
        render();
        requestAnimationFrame(loop);
    }

    // --- UI CONTROLS ---
    function startGame() {
        initAudio();
        document.getElementById('start-panel').classList.add('hidden');
        document.getElementById('top-bar').style.display = 'flex';
        initLevel();
        gameState = 'playing';
    }

    function winGame() {
        gameState = 'win';
        sfxWin();
        document.getElementById('win-score').innerText = diamonds;
        setTimeout(() => {
            document.getElementById('win-panel').classList.remove('hidden');
        }, 1500); 
    }

    function loseGame() {
        gameState = 'gameover';
        sfxLose();
        document.getElementById('final-score').innerText = diamonds;
        setTimeout(() => {
            document.getElementById('game-over-panel').classList.remove('hidden');
            document.getElementById('top-bar').style.display = 'none';
        }, 1200);
    }

    function resetGame() {
        initAudio();
        document.getElementById('game-over-panel').classList.add('hidden');
        document.getElementById('win-panel').classList.add('hidden');
        document.getElementById('start-panel').classList.remove('hidden');
        gameState = 'start';
    }

    // Initial render
    currentMathRange = 20;
    generateBackgroundElements();
    generateMathQuestion(); 
    generateLevelSet(200);
    requestAnimationFrame(loop);

</script>
</body>
</html>
