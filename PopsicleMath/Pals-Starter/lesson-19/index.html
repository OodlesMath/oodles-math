<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Graphing Adventure!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        :root {
            --primary-bg: #e0f2fe;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .bubbly-title {
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(0,0,0,0.1);
            color: #0369a1;
        }

        .playground {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 4px dashed #7dd3fc;
            min-height: 200px;
        }

        .item-pop {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .item-pop.clicked {
            filter: grayscale(1) opacity(0.3);
            transform: scale(0.8);
        }

        .graph-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 6px solid transparent;
        }

        .graph-card:hover {
            transform: translateY(-5px) scale(1.02);
        }

        .graph-card.selected-correct {
            border-color: #22c55e;
            background-color: #f0fdf4;
        }

        .graph-card.selected-wrong {
            border-color: #ef4444;
            background-color: #fef2f2;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .graph-cell {
            width: 45px;
            height: 25px;
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 4px;
            margin: 1px;
        }

        .cell-fill {
            width: 100%;
            height: 100%;
            border-radius: 3px;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.1);
        }

        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 100;
        }

        .score-badge {
            background: linear-gradient(to right, #fbbf24, #f59e0b);
            box-shadow: 0 4px 0 #b45309;
        }

        /* Mobile specific adjustments */
        @media (max-width: 640px) {
            .graph-cell { width: 35px; height: 20px; }
            .y-axis-label { height: 22px; font-size: 10px; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <canvas id="fireworks-canvas"></canvas>

    <!-- Start Overlay -->
    <div id="start-overlay" class="fixed inset-0 bg-sky-500 z-[200] flex flex-items center justify-center flex-col text-white p-6 text-center">
        <h1 class="text-5xl font-extrabold mb-4 bubbly-title">Graphing Adventure!</h1>
        <p class="text-xl mb-8">Are you ready to count and win?</p>
        <button onclick="startGame()" class="bg-white text-sky-600 px-12 py-4 rounded-full font-black text-2xl shadow-2xl hover:scale-110 transition-transform">
            PLAY NOW! 🚀
        </button>
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <div class="text-left">
                <h1 class="text-4xl font-black bubbly-title">Level <span id="level-num">1</span></h1>
                <p class="text-slate-500 font-semibold uppercase tracking-wider text-sm">Count items and find the right graph!</p>
            </div>
            <div class="score-badge px-6 py-2 rounded-2xl text-white font-bold text-xl flex items-center gap-2">
                <span>⭐ SCORE:</span>
                <span id="score-val">0</span>
            </div>
        </header>

        <!-- The Items Area -->
        <div id="playground" class="playground rounded-3xl p-6 flex flex-wrap gap-4 justify-center items-center mb-8 shadow-inner">
            <!-- Items injected here -->
        </div>

        <!-- Options Container -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div id="option-a" class="graph-card bg-white p-6 rounded-[2rem] shadow-xl cursor-pointer" onclick="checkAnswer('a')">
                <h3 class="text-center font-black text-2xl mb-6 text-indigo-500">Graph A</h3>
                <div id="graph-a-content" class="flex justify-center items-end gap-2 overflow-x-auto pb-2">
                    <div id="y-axis-a" class="flex flex-col-reverse"></div>
                    <!-- Columns here -->
                </div>
            </div>

            <div id="option-b" class="graph-card bg-white p-6 rounded-[2rem] shadow-xl cursor-pointer" onclick="checkAnswer('b')">
                <h3 class="text-center font-black text-2xl mb-6 text-pink-500">Graph B</h3>
                <div id="graph-b-content" class="flex justify-center items-end gap-2 overflow-x-auto pb-2">
                    <div id="y-axis-b" class="flex flex-col-reverse"></div>
                    <!-- Columns here -->
                </div>
            </div>

        </div>
    </div>

    <!-- Win Modal -->
    <div id="win-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center p-4 z-[150]">
        <div class="bg-white rounded-[3rem] p-10 max-w-md w-full text-center shadow-2xl transform scale-110">
            <div class="text-8xl mb-4">🥳</div>
            <h2 class="text-4xl font-black text-slate-800 mb-2">AMAZING!</h2>
            <p class="text-slate-500 text-lg mb-8">You are a Math Superstar! Keep going!</p>
            <button onclick="nextLevel()" class="bg-green-500 hover:bg-green-600 text-white w-full py-5 rounded-2xl font-black text-2xl shadow-lg transition-all active:scale-95">
                NEXT LEVEL ➔
            </button>
        </div>
    </div>

    <script>
        // Sound System
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'click') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'correct') {
                osc.type = 'triangle';
                [523.25, 659.25, 783.99].forEach((freq, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.1);
                    g.gain.setValueAtTime(0.1, audioCtx.currentTime + i * 0.1);
                    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.3);
                    o.start(audioCtx.currentTime + i * 0.1);
                    o.stop(audioCtx.currentTime + i * 0.1 + 0.3);
                });
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // Game Configuration
        const ALL_ITEMS = [
            { emoji: '🚀', color: 'bg-indigo-500', name: 'Rocket' },
            { emoji: '🦖', color: 'bg-green-500', name: 'Dino' },
            { emoji: '🦄', color: 'bg-pink-400', name: 'Unicorn' },
            { emoji: '🚗', color: 'bg-red-500', name: 'Car' },
            { emoji: '🧸', color: 'bg-orange-400', name: 'Bear' },
            { emoji: '🍦', color: 'bg-blue-300', name: 'Ice Cream' },
            { emoji: '⚽', color: 'bg-slate-700', name: 'Ball' },
            { emoji: '🦁', color: 'bg-amber-500', name: 'Lion' }
        ];

        let state = {
            score: 0,
            level: 1,
            correctOption: '',
            currentItems: [],
            actualCounts: []
        };

        function startGame() {
            document.getElementById('start-overlay').classList.add('hidden');
            if (audioCtx.state === 'suspended') audioCtx.resume();
            initLevel();
        }

        function initLevel() {
            const container = document.getElementById('playground');
            container.innerHTML = '';
            
            // Randomly pick 2-4 categories based on level
            const numCats = Math.min(4, 2 + Math.floor(state.level / 5));
            const shuffled = [...ALL_ITEMS].sort(() => 0.5 - Math.random());
            state.currentItems = shuffled.slice(0, numCats);

            // Generate counts (3 to 8 for balance)
            state.actualCounts = state.currentItems.map(() => Math.floor(Math.random() * 6) + 2);

            // Create item pool
            let pool = [];
            state.currentItems.forEach((item, idx) => {
                for (let i = 0; i < state.actualCounts[idx]; i++) {
                    pool.push({...item});
                }
            });
            pool.sort(() => 0.5 - Math.random());

            pool.forEach(item => {
                const el = document.createElement('div');
                el.className = 'item-pop text-5xl md:text-6xl p-2 select-none';
                el.innerHTML = item.emoji;
                el.onclick = () => {
                    el.classList.toggle('clicked');
                    playSound('click');
                };
                container.appendChild(el);
            });

            state.correctOption = Math.random() > 0.5 ? 'a' : 'b';
            
            // Wrong counts generation
            let wrongCounts = [...state.actualCounts];
            const changeIdx = Math.floor(Math.random() * numCats);
            const offset = Math.random() > 0.5 ? 1 : -1;
            wrongCounts[changeIdx] = Math.max(1, wrongCounts[changeIdx] + offset);
            if (wrongCounts[changeIdx] === state.actualCounts[changeIdx]) wrongCounts[changeIdx]++;

            const maxDisplay = Math.max(...state.actualCounts, ...wrongCounts) + 1;

            renderGraph('a', state.correctOption === 'a' ? state.actualCounts : wrongCounts, maxDisplay);
            renderGraph('b', state.correctOption === 'b' ? state.actualCounts : wrongCounts, maxDisplay);
        }

        function renderGraph(prefix, data, maxY) {
            const container = document.getElementById(`graph-${prefix}-content`);
            const yAxis = document.getElementById(`y-axis-${prefix}`);
            
            // Clear previous
            while (container.children.length > 1) container.removeChild(container.lastChild);
            yAxis.innerHTML = '';

            // Y Axis
            for (let i = 1; i <= maxY; i++) {
                const label = document.createElement('div');
                label.className = 'y-axis-label h-[27px] flex items-center justify-end pr-2 text-slate-400 font-bold text-xs';
                label.innerText = i;
                yAxis.appendChild(label);
            }

            // Columns
            state.currentItems.forEach((item, idx) => {
                const col = document.createElement('div');
                col.className = 'flex flex-col items-center';
                
                const stack = document.createElement('div');
                stack.className = 'flex flex-col-reverse';

                for (let i = 1; i <= maxY; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'graph-cell';
                    if (i <= data[idx]) {
                        cell.innerHTML = `<div class="cell-fill ${item.color}"></div>`;
                    } else {
                        cell.className += ' bg-slate-50';
                    }
                    stack.appendChild(cell);
                }

                const icon = document.createElement('div');
                icon.className = 'text-2xl mt-2';
                icon.innerText = item.emoji;

                col.appendChild(stack);
                col.appendChild(icon);
                container.appendChild(col);
            });
        }

        function checkAnswer(choice) {
            const card = document.getElementById(`option-${choice}`);
            if (choice === state.correctOption) {
                playSound('correct');
                card.classList.add('selected-correct');
                state.score += 10;
                document.getElementById('score-val').innerText = state.score;
                startFireworks();
                setTimeout(() => {
                    document.getElementById('win-modal').classList.remove('hidden');
                }, 1000);
            } else {
                playSound('wrong');
                card.classList.add('selected-wrong');
                setTimeout(() => card.classList.remove('selected-wrong'), 500);
            }
        }

        function nextLevel() {
            state.level++;
            document.getElementById('level-num').innerText = state.level;
            document.getElementById('win-modal').classList.add('hidden');
            document.getElementById('option-a').classList.remove('selected-correct');
            document.getElementById('option-b').classList.remove('selected-correct');
            initLevel();
        }

        // Simple Fireworks System
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resizeCanvas;
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.destX = Math.random() * canvas.width;
                this.destY = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 15;
                this.vy = (Math.random() - 0.5) * 15;
                this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
                this.size = Math.random() * 4 + 2;
                this.life = 100;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.1; // gravity
                this.life--;
                this.size *= 0.96;
            }
        }

        function startFireworks() {
            particles = [];
            for (let i = 0; i < 100; i++) particles.push(new Particle());
            animate();
        }

        function animate() {
            if (particles.length === 0) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.update();
                p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
