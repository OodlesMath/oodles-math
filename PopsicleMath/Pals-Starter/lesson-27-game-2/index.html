  <style>
    body {
      font-family: 'Poppins', sans-serif;
      user-select: none;
      -webkit-user-select: none;
      overflow-x: hidden;
      min-height: 100vh;
      margin: 0;
    }

    /* --- Scenery Background Container --- */
    .scenery-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 60%);
      overflow: hidden;
      pointer-events: none;
    }

    /* --- Ver 1 UI Elements (Wood & Chalkboard) --- */
    .wood-border {
      border: 12px solid #8d6e63;
      border-radius: 1.5rem;
      box-shadow: inset 0 4px 6px rgba(0,0,0,0.2), 0 10px 25px rgba(0,0,0,0.3);
      background-color: #ffffff;
    }
    
    .chalkboard {
      background-color: #1e3f20;
      border: 8px solid #5d4037;
      box-shadow: inset 0 4px 8px rgba(0,0,0,0.4), 0 6px 12px rgba(0,0,0,0.15);
    }

    /* --- Duolingo style 3D Buttons --- */
    .duo-btn {
      position: relative;
      border-radius: 1rem;
      font-weight: 800;
      transition: all 0.15s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .duo-btn-primary {
      background-color: #58cc02;
      color: white;
      border: 2px solid #58cc02;
      border-bottom: 6px solid #46a302;
    }
    .duo-btn-primary:active:not(:disabled) {
      border-bottom: 2px solid #46a302;
      transform: translateY(4px);
    }

    .duo-btn-option {
      background-color: #ffffff;
      color: #374151;
      border: 2px solid #e5e7eb;
      border-bottom: 6px solid #e5e7eb;
    }
    .duo-btn-option:hover {
      background-color: #f3f4f6;
    }
    .duo-btn-option:active:not(:disabled) {
      border-bottom: 2px solid #e5e7eb;
      transform: translateY(4px);
    }

    .duo-btn-correct {
      background-color: #d7ffb8;
      color: #58cc02;
      border: 2px solid #58cc02;
      border-bottom: 6px solid #58cc02;
    }

    .duo-btn-wrong {
      background-color: #ffdfe0;
      color: #ea2b2b;
      border: 2px solid #ea2b2b;
      border-bottom: 6px solid #ea2b2b;
    }

    /* --- Realistic 3D Block Styles (Modified height & dividers) --- */
    .realistic-rod {
      background: linear-gradient(90deg, #facc15, #eab308);
      box-shadow: inset -2px -2px 5px rgba(0,0,0,0.15), inset 2px 2px 5px rgba(255,255,255,0.6), 0 4px 6px rgba(0,0,0,0.15);
      border-radius: 6px;
      overflow: hidden;
    }
    /* 50% Taller and bolder dividers */
    .realistic-rod-segment {
      border-bottom: 2px solid rgba(0,0,0,0.3);
      border-top: 1px solid rgba(255,255,255,0.5);
    }
    
    .realistic-cube {
      background: linear-gradient(135deg, #38bdf8, #0284c7);
      box-shadow: inset -2px -2px 4px rgba(0,0,0,0.2), inset 2px 2px 5px rgba(255,255,255,0.5), 0 4px 6px rgba(0,0,0,0.2);
      border-radius: 6px;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .realistic-rod-target {
      background: linear-gradient(90deg, #facc15, #eab308);
      box-shadow: inset -2px -2px 5px rgba(0,0,0,0.15), inset 2px 2px 5px rgba(255,255,255,0.6), 0 4px 6px rgba(0,0,0,0.15);
    }

    .realistic-cube-target {
      background: linear-gradient(135deg, #facc15, #eab308);
      box-shadow: inset -2px -2px 4px rgba(0,0,0,0.2), inset 2px 2px 5px rgba(255,255,255,0.6), 0 4px 6px rgba(0,0,0,0.2);
    }

    /* --- Animations --- */
    @keyframes gentle-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .bounce-element {
      animation: gentle-bounce 2s infinite ease-in-out;
    }

    @keyframes pulse-border {
      0%, 100% { border-color: #3b82f6; box-shadow: 0 0 0 rgba(59, 130, 246, 0); }
      50% { border-color: #60a5fa; box-shadow: 0 0 15px rgba(59, 130, 246, 0.6); }
    }
    .guide-glow {
      animation: pulse-border 1.5s infinite;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }
    .animate-shake {
      animation: shake 0.3s ease-in-out;
    }

    @keyframes pop-in {
      0% { transform: scale(0.5); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .pop-in {
      animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .grabby {

      100% { transform: translateX(100vw); }
    }
    .cloud {
      animation: float-cloud linear infinite;
    }

  <script>
    // Web Audio API for custom sound effects
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let soundsEnabled = true;

    // TTS Functionality using window.speechSynthesis
    function speakText(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 0.85; 
        utterance.pitch = 1.2; 
        utterance.volume = 1;
        utterance.lang = 'en-US';

        const voices = window.speechSynthesis.getVoices();
        const preferredVoice = voices.find(voice => voice.name.includes('Google US English') || voice.name.includes('Female'));
        if (preferredVoice) {
          utterance.voice = preferredVoice;
        }

        window.speechSynthesis.speak(utterance);
      }
    }

    // TTS for Equation "X plus Y equals"
    function speakEquation() {
      const lvl = LEVELS[currentLevelIndex];
      let eqText = `${lvl.big} plus ${lvl.small} equals`;
      if (regroupDone || levelComplete) {
        eqText += ` ${lvl.big + lvl.small}`; // Read full equation if answered
      }
      
      const icon = document.querySelector('#eq-speaker-btn i');
      icon.classList.add('animate-ping');
      setTimeout(() => icon.classList.remove('animate-ping'), 500);

      speakText(eqText);
    }

    // Bind Speaker Button
    document.getElementById('eq-speaker-btn').addEventListener('click', speakEquation);

    // Synthesized Sound Effects
    function playSound(type) {
      if (!soundsEnabled) return;
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      const now = audioCtx.currentTime;

      switch(type) {
        case 'grab':
          osc.type = 'sine';
          osc.frequency.setValueAtTime(400, now);
          osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
          gain.gain.setValueAtTime(0.1, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
          osc.start(now);
          osc.stop(now + 0.1);
          break;
        case 'snap':
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(600, now);
          osc.frequency.setValueAtTime(300, now + 0.05);
          gain.gain.setValueAtTime(0.15, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
          osc.start(now);
          osc.stop(now + 0.1);
          break;
        case 'success':
          osc.type = 'sine';
          osc.frequency.setValueAtTime(523.25, now); 
          osc.frequency.setValueAtTime(659.25, now + 0.1); 
          osc.frequency.setValueAtTime(783.99, now + 0.2); 
          osc.frequency.setValueAtTime(1046.50, now + 0.3); 
          gain.gain.setValueAtTime(0.2, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
          osc.start(now);
          osc.stop(now + 0.5);
          break;
        case 'wrong':
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(200, now);
          osc.frequency.linearRampToValueAtTime(150, now + 0.2);
          gain.gain.setValueAtTime(0.1, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
          osc.start(now);
          osc.stop(now + 0.2);
          break;
        case 'regroup':
          [392.00, 493.88, 587.33, 783.99].forEach((freq, i) => {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g);
            g.connect(audioCtx.destination);
            o.type = 'sine';
            o.frequency.setValueAtTime(freq, now + i * 0.06);
            g.gain.setValueAtTime(0.1, now + i * 0.06);
            g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.06 + 0.2);
            o.start(now + i * 0.06);
            o.stop(now + i * 0.06 + 0.2);
          });
          break;
      }
    }

    // Problem Sets
    const LEVELS = [
      { big: 14, small: 5 },
      { big: 22, small: 6 },
      { big: 31, small: 4 },
      { big: 25, small: 3 },
      { big: 33, small: 5 },
      { big: 12, small: 15 },
      { big: 24, small: 13 },
      { big: 11, small: 17 },
      { big: 16, small: 22 },
      { big: 21, small: 18 }
    ];

    let currentLevelIndex = 0;
    let score = 0;
    let totalAttempts = 0;
    let correctFirstTime = true;
    let isAutoAnimating = false;
    let levelComplete = false;

    let onesSnappedCount = 0;
    let tensSnappedCount = 0;
    let onesDone = false;
    let tensDone = false;
    let regroupDone = false;

    // DOM Elements
    const currentRoundEl = document.getElementById('current-round');
    const scoreEl = document.getElementById('score');
    const eqBigEl = document.getElementById('eq-big');
    const eqSmallEl = document.getElementById('eq-small');
    const eqResultEl = document.getElementById('eq-result');
    const instructionBanner = document.getElementById('instruction-banner');
    
    const destinationRods = document.getElementById('destination-rods');
    const tenFrameGrid = document.getElementById('ten-frame-grid');
    const sourceBox = document.getElementById('source-box');
    
    const mcqPrompt = document.getElementById('mcq-prompt');
    const mcqOptionsContainer = document.getElementById('mcq-options-container');

    // Start Level
    function startLevel(levelIdx) {
      currentLevelIndex = levelIdx;
      if (currentLevelIndex >= LEVELS.length) {
        showScoreboard();
        return;
      }

      const lvl = LEVELS[currentLevelIndex];
      onesSnappedCount = 0;
      tensSnappedCount = 0;
      onesDone = (lvl.small % 10 === 0);
      tensDone = (Math.floor(lvl.small / 10) === 0);
      regroupDone = false;
      correctFirstTime = true;
      isAutoAnimating = false;
      levelComplete = false;

      // Update Top Bar
      currentRoundEl.textContent = currentLevelIndex + 1;
      scoreEl.textContent = score;

      // Reset Equations
      eqBigEl.textContent = lvl.big;
      eqSmallEl.textContent = lvl.small;
      eqResultEl.textContent = "?";
      eqResultEl.className = "text-gray-400 bg-black/40 px-4 py-1 rounded-xl";
      
      instructionBanner.textContent = "";
      instructionBanner.className = "hidden absolute -top-2 bg-rose-500 text-white font-bold px-4 py-1.5 rounded-xl text-sm shadow-lg text-center w-max max-w-full z-20 uppercase tracking-widest border-2 border-white";

      // Reset Prompt
      mcqPrompt.innerHTML = `<i class="fa-solid fa-circle-question text-indigo-500 animate-pulse"></i><span>Select the total sum, or drag the blocks to count!</span>`;
      mcqOptionsContainer.classList.remove('pointer-events-none');

      buildBase10Representation(lvl);
      setupMCQButtons(lvl);

      setTimeout(drawGuidedArrow, 400);
    }

    function showBannerMsg(text, type) {
      instructionBanner.textContent = text;
      instructionBanner.classList.remove('hidden', 'bg-rose-500', 'bg-blue-500', 'bg-emerald-500', 'text-amber-900', 'bg-amber-300');
      
      if (type === 'error') {
        instructionBanner.classList.add('bg-rose-500', 'animate-shake');
        playSound('wrong');
      } else if (type === 'info') {
        instructionBanner.classList.add('bg-blue-500', 'bounce-element');
        playSound('success');
      } else if (type === 'success') {
        instructionBanner.classList.add('bg-emerald-500', 'bounce-element');
      }
    }

    function hideBannerMsg() {
      instructionBanner.classList.add('hidden');
    }

    // Build Graphics
    function buildBase10Representation(lvl) {
      // 1. Target Rods
      destinationRods.innerHTML = '';
      const existingRods = Math.floor(lvl.big / 10); 
      for (let r = 0; r < existingRods; r++) {
        destinationRods.appendChild(createTenRodMarkup(true));
      }

      // 2. Target Ten Frame
      tenFrameGrid.innerHTML = '';
      const existingOnes = lvl.big % 10; 
      
      for (let s = 1; s <= 10; s++) {
        const slot = document.createElement('div');
        slot.className = "w-[32px] h-[32px] sm:w-[38px] sm:h-[38px] border-2 border-amber-300/40 rounded flex items-center justify-center relative";
        
        if (s <= existingOnes) {
          slot.appendChild(createOneCubeMarkup(true));
        } else {
          slot.classList.add('bg-white/50', 'border-dashed');
          slot.setAttribute('data-empty-slot', 'true');
        }
        tenFrameGrid.appendChild(slot);
      }

      // 3. Source loose blocks
      sourceBox.innerHTML = '';
      
      const smallTens = Math.floor(lvl.small / 10);
      for (let i = 0; i < smallTens; i++) {
        const rodWrapper = document.createElement('div');
        rodWrapper.className = "absolute touch-none select-none z-10 pop-in";
        rodWrapper.dataset.type = "ten";
        
        const percentX = 15 + (i * 20);
        const percentY = 25 + (i * 5);
        rodWrapper.style.left = `${percentX}%`;
        rodWrapper.style.top = `${percentY}%`;

        const rod = createTenRodMarkup(false);
        rod.classList.add('grabby', 'active-draggable-rod');
        rodWrapper.appendChild(rod);
        sourceBox.appendChild(rodWrapper);
        makeElementDraggable(rodWrapper, rod, 'ten');
      }

      const smallOnes = lvl.small % 10;
      for (let b = 1; b <= smallOnes; b++) {
        const cubeWrapper = document.createElement('div');
        cubeWrapper.className = "absolute touch-none select-none z-10 pop-in";
        cubeWrapper.dataset.type = "one";
        cubeWrapper.style.animationDelay = `${b * 0.05}s`;
        
        const startX = smallTens > 0 ? 40 : 15;
        const spreadX = smallTens > 0 ? 45 : 70;
        
        const percentX = startX + ((b - 1) / (smallOnes - 1 || 1)) * spreadX;
        const percentY = 40 + (Math.sin(b * 1.5) * 20);
        
        cubeWrapper.style.left = `${percentX}%`;
        cubeWrapper.style.top = `${percentY}%`;

        const cube = createOneCubeMarkup(false);
        cube.classList.add('grabby', 'active-draggable-cube');
        cubeWrapper.appendChild(cube);
        sourceBox.appendChild(cubeWrapper);
        makeElementDraggable(cubeWrapper, cube, 'one');
      }
    }

    function createTenRodMarkup(isTarget = true) {
      const rod = document.createElement('div');
      const baseClass = isTarget ? 'realistic-rod-target' : 'realistic-rod bg-gradient-to-r from-cyan-400 to-cyan-500';
      // Added height by creating taller segments (18px / 22px)
      rod.className = `w-8 sm:w-[32px] flex flex-col p-[2px] shadow-md ${baseClass}`;
      
      for (let i = 0; i < 10; i++) {
        const seg = document.createElement('div');
        // Increased height 50% from 12px/14px to 18px/22px
        seg.className = "w-full h-[18px] sm:h-[22px] realistic-rod-segment";
        if (i === 0) seg.style.borderTop = 'none';
        if (i === 9) seg.style.borderBottom = 'none';
        rod.appendChild(seg);
      }
      return rod;
    }

    function createOneCubeMarkup(isTarget = true) {
      const cube = document.createElement('div');
      const baseClass = isTarget ? 'realistic-cube-target' : 'realistic-cube';
      cube.className = `w-[28px] h-[28px] sm:w-[32px] sm:h-[32px] ${baseClass}`;
      return cube;
    }

    // Drag and Drop Engine
    function makeElementDraggable(dragWrapper, nodeToAnimate, type) {
      let isDragging = false;
      let startX, startY;
      let initialLeft, initialTop;

      dragWrapper.addEventListener('pointerdown', (e) => {
        if (regroupDone || isAutoAnimating) return;
        
        if (type === 'ten' && !onesDone) {
          showBannerMsg("MOVE THE ONES FIRST!", 'error');
          return;
        }

        e.preventDefault();
        hideBannerMsg();
        
        dragWrapper.setPointerCapture(e.pointerId);
        isDragging = true;
        dragWrapper.style.zIndex = "100";
        nodeToAnimate.style.transform = "scale(1.2)";
        
        startX = e.clientX;
        startY = e.clientY;
        initialLeft = dragWrapper.offsetLeft;
        initialTop = dragWrapper.offsetTop;

        playSound('grab');
      });

      dragWrapper.addEventListener('pointermove', (e) => {
        if (!isDragging) return;
        const deltaX = e.clientX - startX;
        const deltaY = e.clientY - startY;
        dragWrapper.style.left = `${initialLeft + deltaX}px`;
        dragWrapper.style.top = `${initialTop + deltaY}px`;
      });

      dragWrapper.addEventListener('pointerup', (e) => {
        if (!isDragging) return;
        isDragging = false;
        dragWrapper.style.zIndex = "50";
        nodeToAnimate.style.transform = "scale(1)";
        dragWrapper.releasePointerCapture(e.pointerId);

        let success = false;
        if (type === 'one') {
          success = checkCollisionWithTenFrame(dragWrapper);
        } else if (type === 'ten') {
          success = checkCollisionWithRodsArea(dragWrapper);
        }

        if (success) {
          playSound('snap');
        } else {
          dragWrapper.style.transition = "all 0.3s ease-out";
          dragWrapper.style.left = `${initialLeft}px`;
          dragWrapper.style.top = `${initialTop}px`;
          setTimeout(() => dragWrapper.style.transition = "", 300);
        }
      });
    }

    function checkCollisionWithTenFrame(dragWrapper) {
      const draggedRect = dragWrapper.getBoundingClientRect();
      const emptySlots = document.querySelectorAll('[data-empty-slot="true"]');
      let closestSlot = null;
      let minDistance = 10000;

      emptySlots.forEach(slot => {
        const slotRect = slot.getBoundingClientRect();
        const dx = (draggedRect.left + draggedRect.width/2) - (slotRect.left + slotRect.width/2);
        const dy = (draggedRect.top + draggedRect.height/2) - (slotRect.top + slotRect.height/2);
        const distance = Math.sqrt(dx*dx + dy*dy);

        if (distance < 60 && distance < minDistance) {
          minDistance = distance;
          closestSlot = slot;
        }
      });

      if (closestSlot) {
        closestSlot.removeAttribute('data-empty-slot');
        closestSlot.classList.remove('bg-white/50', 'border-dashed');
        closestSlot.innerHTML = '';
        const snapCube = createOneCubeMarkup(true);
        snapCube.classList.add('pop-in');
        closestSlot.appendChild(snapCube);

        dragWrapper.remove();
        onesSnappedCount++;
        checkProgress();
        return true;
      }
      return false;
    }

    function checkCollisionWithRodsArea(dragWrapper) {
      const draggedRect = dragWrapper.getBoundingClientRect();
      const destBox = document.getElementById('destination-box'); 
      const destRect = destBox.getBoundingClientRect();
      
      const centerX = draggedRect.left + draggedRect.width/2;
      const centerY = draggedRect.top + draggedRect.height/2;

      if (centerX > destRect.left && centerX < destRect.right && centerY > destRect.top && centerY < destRect.bottom) {
        const destRods = document.getElementById('destination-rods');
        const snapRod = createTenRodMarkup(true);
        snapRod.classList.add('pop-in');
        destRods.appendChild(snapRod);

        dragWrapper.remove();
        tensSnappedCount++;
        checkProgress();
        return true;
      }
      return false;
    }

    // Checking Game Progress
    function checkProgress(silent = false) {
      const lvl = LEVELS[currentLevelIndex];
      const smallOnes = lvl.small % 10;
      const smallTens = Math.floor(lvl.small / 10);

      if (onesSnappedCount >= smallOnes && !onesDone) {
        onesDone = true;
        if (smallTens > 0 && !silent && !isAutoAnimating) {
          showBannerMsg("GREAT! NOW MOVE THE TENS!", 'info');
        }
      }

      if (onesDone && tensSnappedCount >= smallTens && !tensDone) {
        tensDone = true;
        if (!isAutoAnimating) triggerAllCombinedTransition();
      } else if (!silent && !isAutoAnimating) {
        setTimeout(drawGuidedArrow, 100);
      }
    }

    function animateRemainingBlocks(lvl, onComplete) {
      isAutoAnimating = true;
      hideGuidedArrow();

      const queue = [];
      const oneWrappers = Array.from(sourceBox.querySelectorAll('[data-type="one"]'));
      const emptySlots = Array.from(document.querySelectorAll('[data-empty-slot="true"]'));
      oneWrappers.forEach((wrapper, idx) => {
         if(emptySlots[idx]) queue.push({ wrapper, target: emptySlots[idx], type: 'one' });
      });
      
      const tenWrappers = Array.from(sourceBox.querySelectorAll('[data-type="ten"]'));
      const destRods = document.getElementById('destination-rods');
      tenWrappers.forEach((wrapper) => {
         queue.push({ wrapper, target: destRods, type: 'ten' });
      });

      if (queue.length === 0) {
        isAutoAnimating = false;
        onComplete();
        return;
      }

      let idx = 0;
      function animateNext() {
        if (idx >= queue.length) {
          setTimeout(() => { isAutoAnimating = false; onComplete(); }, 300);
          return;
        }

        const {wrapper, target, type} = queue[idx];
        wrapper.style.pointerEvents = "none";
        
        const wrapperRect = wrapper.getBoundingClientRect();
        const targetRect = target.getBoundingClientRect();
        
        let dx = targetRect.left - wrapperRect.left;
        let dy = targetRect.top - wrapperRect.top;
        
        if (type === 'ten') {
           dx = targetRect.right - wrapperRect.left + 5; 
        }

        wrapper.style.transition = "transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)";
        wrapper.style.transform = `translate(${dx}px, ${dy}px)`;
        playSound('grab');

        setTimeout(() => {
          playSound('snap');
          if (type === 'one') {
            target.removeAttribute('data-empty-slot');
            target.classList.remove('bg-white/50', 'border-dashed');
            target.innerHTML = '';
            target.appendChild(createOneCubeMarkup(true));
            onesSnappedCount++;
          } else {
            destRods.appendChild(createTenRodMarkup(true));
            tensSnappedCount++;
          }
          wrapper.remove();
          checkProgress(true);
          
          idx++;
          setTimeout(animateNext, 80);
        }, 400);
      }
      animateNext();
    }

    function triggerAllCombinedTransition() {
      regroupDone = true;
      hideGuidedArrow();
      playSound('regroup');

      mcqPrompt.innerHTML = `<i class="fa-solid fa-circle-question text-indigo-600 animate-bounce mr-2"></i> What is the total sum?`;
      
      // Highlight the board
      const board = document.getElementById('destination-box').parentElement;
      board.classList.add('ring-4', 'ring-emerald-400', 'transition-all');
      setTimeout(() => board.classList.remove('ring-4', 'ring-emerald-400'), 1000);
    }

    // MCQ Selection logic
    function setupMCQButtons(lvl) {
      const correctAnswer = lvl.big + lvl.small;
      
      let d1 = correctAnswer + (Math.random() > 0.5 ? 2 : -2);
      let d2 = correctAnswer + (Math.random() > 0.5 ? 10 : -10);
      
      if (d1 === correctAnswer || d1 < 10 || d1 > 40) d1 = correctAnswer + 3;
      if (d2 === correctAnswer || d2 === d1 || d2 < 10 || d2 > 40) d2 = correctAnswer - 3;

      const choices = [correctAnswer, d1, d2].sort(() => Math.random() - 0.5);

      const buttons = mcqOptionsContainer.querySelectorAll('button');
      buttons.forEach((btn, idx) => {
        btn.textContent = choices[idx];
        btn.className = "duo-btn duo-btn-option py-3 sm:py-4 text-2xl sm:text-3xl font-black";
        btn.disabled = false;
        
        const newBtn = btn.cloneNode(true);
        btn.parentNode.replaceChild(newBtn, btn);

        newBtn.addEventListener('click', () => handleMCQSelection(choices[idx], correctAnswer, newBtn));
      });
    }

    function handleMCQSelection(selectedVal, correctVal, buttonNode) {
      if (isAutoAnimating) return;
      totalAttempts++;
      const lvl = LEVELS[currentLevelIndex];

      if (selectedVal === correctVal) {
        regroupDone = true;
        levelComplete = true;
        mcqOptionsContainer.classList.add('pointer-events-none');
        
        buttonNode.className = "duo-btn duo-btn-correct py-3 sm:py-4 text-2xl sm:text-3xl font-black";
        
        const remainingOnes = (lvl.small % 10) - onesSnappedCount;
        const remainingTens = Math.floor(lvl.small / 10) - tensSnappedCount;

        if (remainingOnes > 0 || remainingTens > 0) {
          showBannerMsg("CORRECT! WATCH THE BLOCKS COMBINE!", 'success');
          animateRemainingBlocks(lvl, () => finalizeLevelSuccess(correctVal, lvl));
        } else {
          finalizeLevelSuccess(correctVal, lvl);
        }

      } else {
        correctFirstTime = false;
        buttonNode.className = "duo-btn duo-btn-wrong py-3 sm:py-4 text-2xl sm:text-3xl font-black animate-shake";
        buttonNode.disabled = true;
        showBannerMsg("TRY AGAIN! COUNT THE BLOCKS!", 'error');
      }
    }

    function finalizeLevelSuccess(correctVal, lvl) {
      playSound('success');
      hideBannerMsg();
      
      // Auto-read full equation on success
      speakEquation();
      
      // Update equation styling to show success on Chalkboard
      const baseTensVal = (Math.floor(lvl.big / 10) + Math.floor(lvl.small / 10)) * 10;
      const totalOnes = (lvl.big % 10) + (lvl.small % 10);
      eqResultEl.textContent = correctVal;
      eqResultEl.className = "text-emerald-400 bg-black/40 px-6 py-1 rounded-xl scale-110 transition-transform duration-300";

      if (correctFirstTime) {
        score += 100;
        showFloatingPoints('+100');
      } else {
        score += 50;
        showFloatingPoints('+50');
      }
      
      scoreEl.textContent = score;

      setTimeout(() => {
        startLevel(currentLevelIndex + 1);
      }, 2500);
    }

    function showFloatingPoints(text) {
      const floater = document.createElement('div');
      floater.textContent = text;
      floater.className = "absolute text-emerald-500 font-black text-4xl z-50 animate-bounce pointer-events-none drop-shadow-md";
      floater.style.left = "45%";
      floater.style.top = "30%";
      document.getElementById('game-play-view').appendChild(floater);
      
      setTimeout(() => floater.remove(), 1500);
    }

    // Guide Arrow
    function drawGuidedArrow() {
      const container = document.getElementById('guided-arrow-container');
      const path = document.getElementById('guide-path');
      
      if (regroupDone || isAutoAnimating) {
        hideGuidedArrow();
        return;
      }

      let sourceEl, targetEl;

      if (!onesDone) {
        sourceEl = document.querySelector('.active-draggable-cube');
        targetEl = document.querySelector('[data-empty-slot="true"]');
      } else {
        sourceEl = document.querySelector('.active-draggable-rod');
        targetEl = document.getElementById('destination-rods');
      }

      if (!sourceEl || !targetEl) {
        hideGuidedArrow();
        return;
      }

      const allSlots = document.querySelectorAll('.guide-glow');
      allSlots.forEach(s => s.classList.remove('guide-glow'));
      targetEl.classList.add('guide-glow');

      const rectA = sourceEl.getBoundingClientRect();
      const rectB = targetEl.getBoundingClientRect();
      const containerRect = container.getBoundingClientRect();
      
      let targetX, targetY;
      if (onesDone) {
         targetX = rectB.right + 20;
         targetY = rectB.top + rectB.height / 2;
      } else {
         targetX = rectB.left + rectB.width / 2;
         targetY = rectB.top + rectB.height / 2;
      }

      const x1 = rectA.left + rectA.width / 2 - containerRect.left;
      const y1 = rectA.top + rectA.height / 2 - containerRect.top;
      const x2 = targetX - containerRect.left;
      const y2 = targetY - containerRect.top;

      const cx1 = x1 - 40;
      const cy1 = y1 - 80;
      const cx2 = x2 + 40;
      const cy2 = y2 - 80;

      path.setAttribute('d', `M ${x1} ${y1} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${x2} ${y2}`);
      container.classList.remove('hidden');
    }

    function hideGuidedArrow() {
      document.getElementById('guided-arrow-container').classList.add('hidden');
      const allSlots = document.querySelectorAll('.guide-glow');
      allSlots.forEach(s => s.classList.remove('guide-glow'));
    }

    window.addEventListener('resize', () => {
      if (!regroupDone) drawGuidedArrow();
    });

    // Scoreboard & Confetti
    function showScoreboard() {
      document.getElementById('game-play-view').classList.add('hidden');
      document.getElementById('score-screen-view').classList.remove('hidden');

      document.getElementById('final-score').textContent = score;
      const accuracy = totalAttempts > 0 ? Math.round((LEVELS.length / totalAttempts) * 100) : 100;
      document.getElementById('final-accuracy').textContent = `${Math.min(100, accuracy)}%`;
      
      playSound('success');
      fireConfetti();
    }

    document.getElementById('play-again-btn').addEventListener('click', () => {
      score = 0;
      totalAttempts = 0;
      document.getElementById('game-play-view').classList.remove('hidden');
      document.getElementById('score-screen-view').classList.add('hidden');
      document.getElementById('confetti-canvas').classList.add('hidden');
      startLevel(0);
    });

    // Lightweight Canvas Confetti Engine
    function fireConfetti() {
      const canvas = document.getElementById('confetti-canvas');
      canvas.classList.remove('hidden');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const pieces = [];
      const colors = ['#facc15', '#f87171', '#60a5fa', '#34d399', '#c084fc', '#fb923c'];
      
      for(let i=0; i<150; i++) {
        pieces.push({
          x: canvas.width / 2,
          y: canvas.height / 2 + 100, 
          vx: (Math.random() - 0.5) * 20,
          vy: (Math.random() - 1) * 20 - 5,
          size: Math.random() * 10 + 6,
          color: colors[Math.floor(Math.random() * colors.length)],
          rotation: Math.random() * 360,
          rotationSpeed: (Math.random() - 0.5) * 10
        });
      }

      function animateConfetti() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let active = false;
        
        pieces.forEach(p => {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.5; // Gravity
          p.rotation += p.rotationSpeed;
          
          if (p.y < canvas.height) active = true;

          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rotation * Math.PI / 180);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
          ctx.restore();
        });

        if (active) requestAnimationFrame(animateConfetti);
      }
      
      animateConfetti();
    }

    // Init
    window.onload = () => {
      startLevel(0);
    }
  </script>
