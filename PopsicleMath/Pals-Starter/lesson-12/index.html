<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pattern Pals V2 - Oodles Math</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;800;900&display=swap" rel="stylesheet">
    <!-- Confetti Library for Game Over -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --duo-blue: #1cb0f6;
            --duo-blue-dark: #1899d6;
            --duo-green: #58cc02;
            --duo-green-dark: #58a700;
            --duo-red: #ff4b4b;
            --duo-red-dark: #ea1515;
            --duo-yellow: #ffc800;
            --duo-yellow-dark: #e5b400;
            --duo-gray: #e5e7eb;
            --duo-gray-dark: #d1d5db;
            --duo-text: #374151;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--duo-blue);
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            color: var(--duo-text);
        }
        
        .fancy-font { font-weight: 900; }
        
        /* Decorative Background Clouds */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 100px;
            z-index: 0;
            pointer-events: none;
        }
        .cloud::after, .cloud::before {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 100px;
        }
        .c1 { width: 140px; height: 50px; top: 12%; left: -150px; animation: float 25s linear infinite; }
        .c1::before { width: 70px; height: 70px; top: -30px; left: 20px; }
        .c1::after { width: 60px; height: 60px; top: -20px; right: 20px; }
        
        .c2 { width: 180px; height: 60px; top: 35%; right: -200px; animation: float 35s linear infinite reverse; }
        .c2::before { width: 80px; height: 80px; top: -40px; left: 30px; }
        .c2::after { width: 70px; height: 70px; top: -25px; right: 30px; }
        
        .c3 { width: 120px; height: 40px; bottom: 20%; left: -150px; animation: float 20s linear infinite; }
        .c3::before { width: 60px; height: 60px; top: -25px; left: 15px; }

        @keyframes float {
            0% { transform: translateX(-10vw); }
            100% { transform: translateX(110vw); }
        }

        /* Duolingo Style Buttons */
        .duo-btn {
            background-color: #ffffff;
            border: 2px solid var(--duo-gray);
            border-bottom: 8px solid var(--duo-gray-dark);
            border-radius: 1.5rem;
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--duo-text);
            cursor: pointer;
        }
        .duo-btn:hover {
            background-color: #f9fafb;
            transform: translateY(-2px);
            border-bottom-width: 10px;
        }
        .duo-btn:active {
            border-bottom-width: 0px;
            transform: translateY(8px);
            margin-bottom: 8px; /* Maintain layout spacing */
        }
        
        .duo-btn-primary {
            background-color: var(--duo-green);
            border-color: var(--duo-green-dark);
            border-bottom-color: var(--duo-green-dark);
            color: white;
        }
        .duo-btn-primary:hover { background-color: #61df02; border-bottom-color: var(--duo-green-dark); }
        
        /* Correct/Wrong States */
        .duo-btn-correct {
            background-color: var(--duo-green) !important;
            border-color: var(--duo-green-dark) !important;
            border-bottom-color: var(--duo-green-dark) !important;
            color: white !important;
            pointer-events: none;
        }
        .duo-btn-wrong {
            background-color: var(--duo-red) !important;
            border-color: var(--duo-red-dark) !important;
            border-bottom-color: var(--duo-red-dark) !important;
            color: white !important;
            pointer-events: none;
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        /* Game specific elements */
        .pattern-card {
            background: white;
            border: 3px solid var(--duo-gray);
            border-bottom: 6px solid var(--duo-gray-dark);
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .speaker-btn {
            background: var(--duo-blue);
            border: 2px solid var(--duo-blue-dark);
            border-bottom: 6px solid var(--duo-blue-dark);
            color: white;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
        }
        .speaker-btn:hover {
            transform: translateY(-2px);
            border-bottom-width: 8px;
            background: #2bcdf9;
        }
        .speaker-btn:active {
            transform: translateY(6px);
            border-bottom-width: 0px;
        }

        .title-container {
            background: white;
            border: 4px solid var(--duo-gray);
            border-bottom: 10px solid var(--duo-gray-dark);
            border-radius: 2rem;
            padding: 1.5rem 3rem;
            transform: rotate(-2deg);
        }

        .floating {
            animation: floating 2s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        .scale-up {
            animation: scaleUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes scaleUp {
            0% { transform: scale(0.2); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .logo-bounce {
            animation: logoBounce 4s infinite ease-in-out;
        }
        @keyframes logoBounce {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.05) translateY(-5px); }
        }

        .loading-audio {
            animation: audioPulse 1.5s infinite ease-in-out;
            opacity: 0.6;
            pointer-events: none;
        }
        @keyframes audioPulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
        }
    </style>
</head>

            </h1>

            <div class="flex gap-6 md:gap-12 mb-12 w-full justify-center">

                </div>
                <div id="final-p2-card" class="bg-[#f0fff4] p-6 md:p-8 rounded-[2rem] text-center border-2 border-green-100 border-b-8 flex-1 max-w-[200px] hidden">
                    <div class="text-4xl mb-2">🧒🏻</div>
                    <div class="text-sm font-bold text-green-400 uppercase mb-1">PLAYER 2</div>

            <button onclick="resetGame()" class="duo-btn duo-btn-primary fancy-font text-2xl md:text-4xl px-12 py-6 w-full max-w-sm uppercase tracking-wide">

    <!-- Sounds -->
    <audio id="sfx-correct" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
    <audio id="sfx-wrong" src="https://assets.mixkit.co/active_storage/sfx/2004/2004-preview.mp3"></audio>
    <audio id="sfx-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <script>
        const apiKey = "";
        const state = {
            mode: 'single',
            currentRound: 1,
            maxRounds: 8,
            scores: [0, 0],
            currentQuestion: null,
            canAnswer: false,
            audioCache: null,
            isFetchingAudio: false,
            userWantsSpeech: false
        };

        // Confetti Effect
        function fireConfetti() {
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 1000 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount,
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }
                }));
                confetti(Object.assign({}, defaults, { particleCount,
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }
                }));
            }, 250);
        }

        // Audio TTS
        async function prefetchQuestionAudio(text) {
            state.audioCache = null;
            state.isFetchingAudio = true;
            state.userWantsSpeech = false;
            
            updateSpeakerUI(true);

            const speechText = `Say cheerfully: ${text}`;
            const payload = {
                contents: [{ parts: [{ text: speechText }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: {
                        voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } }
                    }
                }
            };

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error('API Error');
                    const result = await response.json();
                    const audioData = result.candidates?.[0]?.content?.parts?.[0]?.inlineData;
                    
                    if (audioData) {
                        const blob = base64ToWavBlob(audioData.data, audioData.mimeType);
                        state.audioCache = blob;
                        state.isFetchingAudio = false;
                        updateSpeakerUI(false);
                        
                        if (state.userWantsSpeech) playCachedAudio();
                        return;
                    }
                } catch (e) {
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
            state.isFetchingAudio = false;
            updateSpeakerUI(false);
        }

        function updateSpeakerUI(loading) {
            const btns = [document.getElementById('single-speaker-btn'), document.getElementById('multi-speaker-btn')];
            btns.forEach(btn => {
                if (btn) {
                    if (loading) btn.classList.add('loading-audio');
                    else btn.classList.remove('loading-audio');
                }
            });
        }

        function triggerTTS() {
            if (state.audioCache) {
                playCachedAudio();
            } else if (state.isFetchingAudio) {
                state.userWantsSpeech = true;
            } else if (state.currentQuestion) {
                prefetchQuestionAudio(state.currentQuestion.qText);
                state.userWantsSpeech = true;
            }
        }

        function playCachedAudio() {
            if (!state.audioCache) return;
            const audio = new Audio(URL.createObjectURL(state.audioCache));
            audio.play();
            state.userWantsSpeech = false;
        }

        function base64ToWavBlob(base64Data, mimeType) {
            const binary = atob(base64Data);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            const sampleRate = parseInt(mimeType.split('rate=')[1]) || 24000;
            return pcmToWav(bytes, sampleRate);
        }

        function pcmToWav(pcmData, sampleRate) {
            const buffer = new ArrayBuffer(44 + pcmData.length);
            const view = new DataView(buffer);
            const writeString = (v, offset, str) => {
                for (let i = 0; i < str.length; i++) v.setUint8(offset + i, str.charCodeAt(i));
            };
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + pcmData.length, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(view, 36, 'data');
            view.setUint32(40, pcmData.length, true);
            for (let i = 0; i < pcmData.length; i++) view.setUint8(44 + i, pcmData[i]);
            return new Blob([view], { type: 'audio/wav' });
        }

        function startGame(mode) {
            state.mode = mode;
            state.maxRounds = mode === 'double' ? 10 : 8;
            document.getElementById('screen-start').classList.add('hidden');
            if (mode === 'double') document.getElementById('game-multi').classList.remove('hidden');
            else document.getElementById('game-container').classList.remove('hidden');
            nextRound();
        }

        function resetGame() {
            state.currentRound = 1;
            state.scores = [0, 0];
            state.canAnswer = false;
            state.currentQuestion = null;
            state.audioCache = null;
            updateScoresUI();
            document.getElementById('screen-results').classList.add('hidden');
            document.getElementById('game-container').classList.add('hidden');
            document.getElementById('game-multi').classList.add('hidden');
            document.getElementById('final-p2-card').classList.add('hidden');
            document.getElementById('screen-start').classList.remove('hidden');
        }

        function generateQuestion() {
            const types = ['next', 'missing', 'rule'];
            const type = types[Math.floor(Math.random() * types.length)];
            const isAddition = Math.random() > 0.3; 
            const step = (Math.floor(Math.random() * 5) + 1) * (isAddition ? 1 : -1);
            let start = isAddition ? Math.floor(Math.random() * 15) : Math.floor(Math.random() * 25) + 15;
            const pattern = [start, start + step, start + step * 2, start + step * 3];
            
            let display = [], answer = null, qText = "", isRule = false;

            if (type === 'next') {
                display = [...pattern, '?'];
                answer = start + step * 4;
                qText = "What comes next?";
            } else if (type === 'missing') {
                const idx = Math.floor(Math.random() * 4);
                display = [...pattern];
                answer = display[idx];
                display[idx] = '?';
                qText = "Find the missing number!";
            } else {
                display = [...pattern];
                answer = step;
                qText = "What is the rule?";
                isRule = true;
            }

            let options = [answer];
            while (options.length < 4) {
                const offset = (Math.floor(Math.random() * 6) - 3) || 1;
                const opt = isRule ? answer + offset : Math.max(0, answer + offset);
                if (!options.includes(opt)) options.push(opt);
            }
            for (let i = options.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [options[i], options[j]] = [options[j], options[i]];
            }
            return { display, answer, options, qText, isRule };
        }

        function nextRound() {
            if (state.currentRound > state.maxRounds) {
                showResults();
                return;
            }
            state.currentQuestion = generateQuestion();
            state.canAnswer = true;
            renderRound();
            prefetchQuestionAudio(state.currentQuestion.qText);
        }

        function renderRound() {
            if (state.mode === 'single') renderSingle();
            else renderMulti();
        }

        function renderSingle() {
            document.getElementById('round-info').innerText = `🎯 ROUND ${state.currentRound}/${state.maxRounds}`;
            document.getElementById('question-text').innerText = state.currentQuestion.qText;
            const ptn = document.getElementById('pattern-display');
            
            ptn.innerHTML = state.currentQuestion.display.map(n => `
                <div class="pattern-card w-16 h-16 sm:w-24 sm:h-24 md:w-28 md:h-28 text-3xl sm:text-4xl md:text-5xl font-bold ${n === '?' ? 'text-[#ffc800] border-[#ffc800] border-b-[8px] floating bg-[#fff9e6]' : 'text-[#1cb0f6]'}">
                    ${n}
                </div>
            `).join('');
            
            const grid = document.getElementById('answer-grid');
            grid.innerHTML = state.currentQuestion.options.map(o => `
                <button onclick="handleAnswer(${o}, this, 0)" class="duo-btn py-4 md:py-8 text-4xl md:text-5xl font-bold">
                    ${state.currentQuestion.isRule ? (o > 0 ? `+${o}` : o) : o}
                </button>
            `).join('');
        }

        function renderMulti() {
            document.getElementById('multi-round-info').innerText = `🎯 ROUND ${state.currentRound}/${state.maxRounds}`;
            document.getElementById('shared-question-text').innerText = state.currentQuestion.qText;
            const sharedPtn = document.getElementById('shared-pattern');
            
            sharedPtn.innerHTML = state.currentQuestion.display.map(n => `
                <div class="pattern-card w-12 h-12 sm:w-16 sm:h-16 md:w-20 md:h-20 text-xl sm:text-2xl md:text-4xl font-bold ${n === '?' ? 'text-[#ffc800] border-[#ffc800] border-b-[6px] floating bg-[#fff9e6]' : 'text-[#1cb0f6]'}">
                    ${n}
                </div>
            `).join('');
            
            ['p1', 'p2'].forEach((p, idx) => {
                const grid = document.getElementById(`${p}-answers`);
                grid.innerHTML = state.currentQuestion.options.map(o => `
                    <button onclick="handleAnswer(${o}, this, ${idx})" class="duo-btn py-3 md:py-6 text-2xl md:text-4xl font-bold">
                        ${state.currentQuestion.isRule ? (o > 0 ? `+${o}` : o) : o}
                    </button>
                `).join('');
            });
        }

        function handleAnswer(choice, btn, playerIdx) {
            if (!state.canAnswer) return;
            const isCorrect = choice === state.currentQuestion.answer;
            if (isCorrect) {
                state.canAnswer = false; 
                state.scores[playerIdx] += 1;
                updateScoresUI();
                showFeedback(true);
                btn.classList.add('duo-btn-correct');
                
                setTimeout(() => {
                    state.currentRound++;
                    nextRound();
                }, 1000);
            } else {
                btn.classList.add('duo-btn-wrong');
                btn.disabled = true;
                const sfx = document.getElementById('sfx-wrong');
                sfx.currentTime = 0;
                sfx.play().catch(() => {});
            }
        }

        function updateScoresUI() {
            document.getElementById('p1-score').innerText = state.scores[0];
            document.getElementById('p1-multi-score').innerText = state.scores[0];
            document.getElementById('p2-multi-score').innerText = state.scores[1];
        }

        function showFeedback(correct) {
            const overlay = document.getElementById('feedback-overlay');
            const msg = document.getElementById('feedback-message');
            const sfx = document.getElementById(correct ? 'sfx-correct' : 'sfx-wrong');
            
            msg.innerHTML = correct ? 'AWESOME!<br>🌟' : 'OH NO!<br>🙈';
            msg.className = `text-6xl md:text-8xl fancy-font text-center px-4 ${correct ? 'text-[#58cc02]' : 'text-[#ff4b4b]'} scale-up`;
            msg.style.textShadow = '0 4px 0 rgba(0,0,0,0.1)';
            
            overlay.classList.remove('hidden');
            sfx.currentTime = 0;
            sfx.play().catch(() => {});
            setTimeout(() => overlay.classList.add('hidden'), 900);
        }

        function showResults() {
            document.getElementById('game-container').classList.add('hidden');
            document.getElementById('game-multi').classList.add('hidden');
            document.getElementById('screen-results').classList.remove('hidden');
            
            document.getElementById('final-p1').innerText = state.scores[0];
            if (state.mode === 'double') {
                document.getElementById('final-p2-card').classList.remove('hidden');
                document.getElementById('final-p2').innerText = state.scores[1];
                const winMsg = state.scores[0] > state.scores[1] ? "PLAYER 1 WINS! 🏆" : 
                               state.scores[1] > state.scores[0] ? "PLAYER 2 WINS! 🏆" : "IT'S A TIE! 🤝";
                document.getElementById('winner-text').innerText = winMsg;
            } else {
                document.getElementById('winner-text').innerText = "You are a Pattern Expert! 🏆";
            }

            // Play win sound and fire confetti
            const sfxWin = document.getElementById('sfx-win');
            sfxWin.currentTime = 0;
            sfxWin.play().catch(() => {});
            fireConfetti();
        }
    </script>
</body>
</html>
