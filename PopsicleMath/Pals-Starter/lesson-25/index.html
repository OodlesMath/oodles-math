<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Number! - Ver 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #87CEEB; /* Sky Blue */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.4) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(255, 255, 255, 0.4) 0%, transparent 20%);
            background-size: 100% 100%;
            overflow-x: hidden;
            touch-action: manipulation;
            min-height: 100vh;
        }

        /* Cartoon Styles */
        .cartoon-card {
            background: #ffffff;
            border: 4px solid #000000;
            border-radius: 24px;
            box-shadow: 8px 8px 0px #000000;
        }

        .cartoon-display {
            background: #FFE4B5; /* Moccasin */
            border: 4px solid #000000;
            border-radius: 20px;
            box-shadow: inset 5px 5px 0px rgba(0,0,0,0.1);
        }

        .cartoon-btn {
            border: 4px solid #000000;
            border-radius: 50px;
            box-shadow: 4px 4px 0px #000000;
            transition: all 0.1s ease;
            cursor: pointer;
            user-select: none;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .cartoon-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #000000;
        }

        .cartoon-btn:disabled {
            background: #D1D5DB !important; /* Tailwind gray-300 */
            color: #6B7280 !important;
            cursor: not-allowed;
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000000;
        }

        /* Kid-friendly colorful title */
        .kid-title {
            color: #FFDE00; /* Bright Yellow */
            font-weight: 900;
            text-shadow:
                -3px -3px 0 #FF6B6B,
                3px -3px 0 #FF6B6B,
                -3px 3px 0 #FF6B6B,
                3px 3px 0 #FF6B6B,
                6px 6px 0px #000000;
        }

        /* Range Buttons */
        .range-btn {
            border: 3px solid #000000;
            border-radius: 16px;
            box-shadow: 4px 4px 0px #000000;
            transition: transform 0.1s, box-shadow 0.1s;
            font-weight: 800;
            font-size: 1.5rem;
            color: white;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.3);
        }
        .range-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #000000;
        }

        /* Decorative Clouds */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            z-index: -1;
            opacity: 0.9;
            animation: float 25s infinite linear;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }

        @keyframes float {
            0% { transform: translateX(-150px); }
            100% { transform: translateX(110vw); }
        }

        /* Number Animation */
        @keyframes pop {
            0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
            60% { transform: scale(1.3) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        
        .number-pop {
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Confetti Canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body class="flex items-center justify-center relative p-4">

    <!-- Background Clouds -->
    <div class="cloud w-32 h-12 top-10 left-10 before:w-16 before:h-16 before:-top-8 before:left-4 after:w-12 after:h-12 after:-top-4 after:left-14"></div>
    <div class="cloud w-48 h-16 top-1/4 right-5 before:w-24 before:h-24 before:-top-12 before:left-6 after:w-16 after:h-16 after:-top-6 after:left-24" style="animation-duration: 35s; animation-delay: -15s;"></div>
    <div class="cloud w-40 h-14 bottom-20 left-1/4 before:w-20 before:h-20 before:-top-10 before:left-5 after:w-16 after:h-16 after:-top-6 after:left-20" style="animation-duration: 28s; animation-delay: -5s;"></div>

    <!-- MAIN CONTAINER -->
    <div class="cartoon-card p-6 md:p-8 w-full max-w-lg text-center relative z-20">
        
        <!-- ========================================== -->
        <!-- LOGO HERE: REPLACE SRC WITH YOUR LOGO URL  -->
        <!-- ========================================== -->
        <img src="https://image2url.com/r2/default/images/1770270908168-036a8878-e468-415d-9a50-73d8cbcc8574.png" alt="Your Logo" class="mx-auto mb-2 w-32 h-32 object-contain bg-transparent">

        <!-- SETUP SCREEN -->
        <div id="setup-screen" class="block">
            <h1 class="kid-title text-4xl md:text-5xl mb-4 tracking-wide">
                Lucky Number!
            </h1>
            
            <div class="bg-blue-100 border-4 border-black rounded-xl p-4 mb-6 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                <p class="text-xl md:text-2xl font-bold text-gray-800 mb-2">Choose Maximum Number:</p>
                <p class="text-sm font-semibold text-gray-600">I want to play from 1 to...</p>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-2">
                <button onclick="startGame(10)" class="range-btn py-4 bg-[#FF6B6B]">10</button>
                <button onclick="startGame(20)" class="range-btn py-4 bg-[#4ECDC4]">20</button>
                <button onclick="startGame(30)" class="range-btn py-4 bg-[#FFE66D] !text-black">30</button>
                <button onclick="startGame(40)" class="range-btn py-4 bg-[#A374D5]">40</button>
                <button onclick="startGame(50)" class="range-btn py-4 bg-[#FF9F1C]">50</button>
                <button onclick="startGame(100)" class="range-btn py-4 bg-[#2ECC71]">100</button>
            </div>
        </div>

        <!-- GAME SCREEN -->
        <div id="game-screen" class="hidden">
            <h1 class="kid-title text-4xl md:text-5xl mb-6 tracking-wide">
                Lucky Number!
            </h1>

            <div class="text-lg font-bold text-gray-700 mb-3 bg-white border-2 border-black inline-block px-4 py-1 rounded-full shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">
                Range: 1 to <span id="display-range" class="text-red-500">100</span>
            </div>

            <!-- The Display Box -->
            <div class="cartoon-display h-48 md:h-56 flex items-center justify-center mb-8 relative overflow-hidden bg-white">
                <!-- Result Text -->
                <span id="result-text" class="text-8xl md:text-9xl font-black text-gray-800" style="text-shadow: 3px 3px 0px #ccc;">?</span>
                
                <!-- Little decorative dots in corners -->
                <div class="absolute top-3 left-3 w-4 h-4 rounded-full bg-black opacity-10"></div>
                <div class="absolute top-3 right-3 w-4 h-4 rounded-full bg-black opacity-10"></div>
                <div class="absolute bottom-3 left-3 w-4 h-4 rounded-full bg-black opacity-10"></div>
                <div class="absolute bottom-3 right-3 w-4 h-4 rounded-full bg-black opacity-10"></div>
            </div>

            <!-- Controls -->
            <div class="flex flex-col gap-4 justify-center">
                <button id="spin-btn" onclick="spin()" class="cartoon-btn px-8 py-4 text-2xl md:text-3xl text-white bg-[#FF6B6B] w-full flex items-center justify-center gap-3">
                    <span>PLAY NOW!</span>
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
                
                <button onclick="goBack()" class="font-bold text-gray-500 hover:text-black underline mt-2 text-lg transition-colors">
                    Change Number Range
                </button>
            </div>
        </div>

    </div>

    <!-- Canvas for confetti -->
    <canvas id="confetti-canvas"></canvas>

    <script>
        // DOM Elements
        const setupScreen = document.getElementById('setup-screen');
        const gameScreen = document.getElementById('game-screen');
        const resultText = document.getElementById('result-text');
        const spinBtn = document.getElementById('spin-btn');
        const displayRange = document.getElementById('display-range');
        
        // Game State
        let maxNumber = 100;
        let isSpinning = false;

        // --- Navigation Functions ---
        function startGame(selectedMax) {
            maxNumber = selectedMax;
            displayRange.innerText = maxNumber;
            
            // Reset game screen UI
            resultText.innerText = '?';
            resultText.style.color = '#1F2937'; // gray-800
            resultText.classList.remove('number-pop');
            spinBtn.innerText = "PLAY NOW!";
            spinBtn.classList.remove('bg-[#2ECC71]', 'bg-gray-400');
            spinBtn.classList.add('bg-[#FF6B6B]');
            
            // Switch screens
            setupScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
        }

        function goBack() {
            if (isSpinning) return; // Don't allow back while spinning
            gameScreen.classList.add('hidden');
            setupScreen.classList.remove('hidden');
        }

        // --- Sound Effects ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playPopSound(freq = 400, type = 'sine') {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = type;
            oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(freq/2, audioCtx.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        function playWinSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            
            // Cheerful Arpeggio
            [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.value = freq;
                
                gain.gain.setValueAtTime(0, now + i*0.1);
                gain.gain.linearRampToValueAtTime(0.3, now + i*0.1 + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, now + i*0.1 + 0.4);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + i*0.1);
                osc.stop(now + i*0.1 + 0.5);
            });
        }

        // --- Game Logic ---
        function spin() {
            if (isSpinning) return;
            isSpinning = true;
            
            // Update Button State
            spinBtn.disabled = true;
            spinBtn.innerText = "SPINNING...";
            spinBtn.classList.remove('bg-[#FF6B6B]', 'bg-[#2ECC71]');
            spinBtn.classList.add('bg-gray-400');
            
            resultText.classList.remove('number-pop');
            
            let count = 0;
            const maxShuffles = 25; // How many times numbers flicker
            const speed = 70; // Speed of flicker in ms

            // Vibrant kid-friendly colors for shuffle
            const colors = ['#FF6B6B', '#4ECDC4', '#A374D5', '#FF9F1C', '#2ECC71', '#3B82F6'];

            const interval = setInterval(() => {
                const randomTemp = Math.floor(Math.random() * maxNumber) + 1;
                resultText.innerText = randomTemp;
                resultText.style.color = colors[Math.floor(Math.random() * colors.length)];
                playPopSound(300 + Math.random() * 300, 'square'); 
                
                count++;
                if (count >= maxShuffles) {
                    clearInterval(interval);
                    finalize();
                }
            }, speed);
        }

        function finalize() {
            const finalNumber = Math.floor(Math.random() * maxNumber) + 1;
            
            resultText.innerText = finalNumber;
            resultText.style.color = '#E63946'; // Strong red for the final number
            resultText.classList.add('number-pop');
            
            playWinSound();
            fireConfetti();

            // Reset Button
            spinBtn.disabled = false;
            spinBtn.innerText = "PLAY AGAIN!";
            spinBtn.classList.remove('bg-gray-400');
            spinBtn.classList.add('bg-[#2ECC71]'); // Green for "Play Again"

            isSpinning = false;
        }

        // --- Confetti Logic ---
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function fireConfetti() {
            particles = [];
            const particleCount = 150;
            for(let i=0; i<particleCount; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    vx: (Math.random() - 0.5) * 25,
                    vy: (Math.random() - 1) * 25,
                    size: Math.random() * 12 + 8,
                    color: `hsl(${Math.random() * 360}, 100%, 60%)`,
                    rotation: Math.random() * 360,
                    rotationSpeed: (Math.random() - 0.5) * 15
                });
            }
            requestAnimationFrame(updateConfetti);
        }

        function updateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let activeParticles = false;

            particles.forEach((p) => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.6; // Gravity
                p.rotation += p.rotationSpeed;

                if (p.y < canvas.height) {
                    activeParticles = true;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    
                    // Draw random shapes (circles and squares)
                    if (p.size % 2 > 1) {
                        ctx.beginPath();
                        ctx.arc(0, 0, p.size/2, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                    }
                    
                    ctx.restore();
                }
            });

            if (activeParticles) {
                requestAnimationFrame(updateConfetti);
            }
        }
    </script>
</body>
</html>
