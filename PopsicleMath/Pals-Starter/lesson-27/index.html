<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Mountain Adventure V6</title>
    <!-- Load React, ReactDOM, Babel, Tailwind, Tone.js, Confetti, and Google Fonts -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        duo: {
                            green: '#58cc02', greenHover: '#46a302', greenBorder: '#58a700',
                            blue: '#1cb0f6', blueHover: '#148dd0', blueBorder: '#1899d6',
                            yellow: '#ffc800', yellowHover: '#e6b400', yellowBorder: '#cc9600',
                            red: '#ff4b4b', redHover: '#e54343', redBorder: '#cc3c3c',
                            purple: '#ce82ff', purpleBorder: '#a568cc',
                            grayLight: '#f3f4f6', grayMid: '#e5e5e5', grayDark: '#afafaf',
                            bg: '#DDF4FF'
                        }
                    },
                    animation: {
                        'bounce-slight': 'bounceSlight 2s infinite',
                        'pop': 'pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'slide-up': 'slideUp 0.5s ease-out forwards',
                        'float-up': 'floatUp 1.5s ease-out forwards',
                        'wiggle': 'wiggle 0.5s ease-in-out',
                    },
                    keyframes: {
                        bounceSlight: {
                            '0%, 100%': { transform: 'translateY(-5%)' },
                            '50%': { transform: 'translateY(0)' },
                        },
                        pop: {
                            '0%': { transform: 'scale(0.8)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        floatUp: {
                            '0%': { transform: 'translateY(0) scale(1)', opacity: '1' },
                            '100%': { transform: 'translateY(-40px) scale(1.2)', opacity: '0' },
                        },
                        wiggle: {
                            '0%, 100%': { transform: 'rotate(-3deg)' },
                            '50%': { transform: 'rotate(3deg)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #DDF4FF; font-family: 'Poppins', sans-serif; touch-action: manipulation; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Duolingo style button utility classes */
        .btn-duo-green { background-color: #58cc02; color: white; border-bottom: 4px solid #58a700; transition: all 0.1s; }
        .btn-duo-green:active:not(:disabled) { border-bottom-width: 0px; transform: translateY(4px); margin-bottom: 4px; }
        .btn-duo-green:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .btn-duo-blue { background-color: #1cb0f6; color: white; border-bottom: 4px solid #1899d6; transition: all 0.1s; }
        .btn-duo-blue:active:not(:disabled) { border-bottom-width: 0px; transform: translateY(4px); margin-bottom: 4px; }
        .btn-duo-blue:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-duo-yellow { background-color: #ffc800; color: white; border-bottom: 4px solid #cc9600; transition: all 0.1s; }
        .btn-duo-yellow:active:not(:disabled) { border-bottom-width: 0px; transform: translateY(4px); margin-bottom: 4px; }
        
        .btn-duo-white { background-color: #ffffff; color: #4b4b4b; border: 2px solid #e5e5e5; border-bottom: 4px solid #e5e5e5; transition: all 0.1s; }
        .btn-duo-white:active:not(:disabled) { border-bottom-width: 2px; transform: translateY(2px); margin-bottom: 2px; }

        /* Hide native number input spinners */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type="number"] { -moz-appearance: textfield; }
    </style>

    <!-- Configure Babel to fix JSX runtime errors in browser -->
    <script>
        Babel.registerPreset('react-classic', {
            presets: [
                [Babel.availablePresets['react'], { runtime: 'classic' }]
            ]
        });
    </script>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <div id="root"></div>

    <script type="text/babel" data-presets="react-classic">
        const { useState, useEffect, useRef, useMemo } = React;

        const playSound = (type) => {
            try {
                if (!window.Tone) return;
                if (Tone.context.state !== 'running') Tone.context.resume();
                
                if (type === 'success') {
                    const synth = new Tone.PolySynth(Tone.Synth).toDestination();
                    synth.triggerAttackRelease(["C4", "E4", "G4"], "8n", Tone.now());
                } else if (type === 'error') {
                    const synth = new Tone.Synth().toDestination();
                    synth.triggerAttackRelease("C2", "8n");
                } else if (type === 'click') {
                    const synth = new Tone.MembraneSynth().toDestination();
                    synth.triggerAttackRelease("C4", "32n");
                } else if (type === 'jump') {
                    const synth = new Tone.Synth({ oscillator: { type: "sine" } }).toDestination();
                    synth.triggerAttackRelease("G4", "16n");
                } else if (type === 'win') {
                    const synth = new Tone.PolySynth(Tone.Synth).toDestination();
                    const now = Tone.now();
                    synth.triggerAttackRelease(["C4", "E4", "G4"], "8n", now);
                    synth.triggerAttackRelease(["F4", "A4", "C5"], "8n", now + 0.2);
                    synth.triggerAttackRelease(["G4", "B4", "D5"], "8n", now + 0.4);
                    synth.triggerAttackRelease(["C5", "E5", "G5"], "2n", now + 0.6);
                }
            } catch (e) { console.warn('Audio playback failed', e); }
        };

        const speakText = (text) => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                utterance.pitch = 1.1;
                window.speechSynthesis.speak(utterance);
            }
        };

        const triggerConfetti = () => {
            if (window.confetti) {
                const duration = 3000;
                const end = Date.now() + duration;
                const frame = () => {
                    confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, zIndex: 9999, colors: ['#58cc02', '#1cb0f6', '#ffc800', '#ff4b4b'] });
                    confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, zIndex: 9999, colors: ['#58cc02', '#1cb0f6', '#ffc800', '#ff4b4b'] });
                    if (Date.now() < end) requestAnimationFrame(frame);
                };
                frame();
            }
        };

        const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

        const generateQuestion = (level) => {
            let num1, num2, operation, requiresRegrouping;
            let targetLevel = level === 2 ? (Math.random() > 0.5 ? 1 : 3) : level;
            const isAdd = targetLevel === 4 ? false : (targetLevel === 3 ? true : Math.random() > 0.5);

            if (targetLevel === 1) { 
                if (isAdd) {
                    num1 = rand(10, 38);
                    num2 = rand(1, Math.max(1, 9 - (num1 % 10)));
                } else { 
                    num1 = rand(11, 40);
                    num2 = rand(1, Math.max(1, num1 % 10));
                }
                requiresRegrouping = false;
            } else if (targetLevel === 3) { 
                num1 = rand(11, 29);
                num2 = rand(10 - (num1 % 10), 9);
                requiresRegrouping = true;
            } else { 
                num1 = rand(21, 40); 
                num2 = rand((num1 % 10) + 1, 9);
                requiresRegrouping = true;
            }

            if (isAdd && num1 + num2 > 40) num2 = 40 - num1;
            if (!isAdd && num1 - num2 < 0) { num1 = 21; num2 = 5; }

            return { num1, num2, operation: isAdd ? '+' : '-', answer: isAdd ? num1 + num2 : num1 - num2, requiresRegrouping };
        };

        const PATH_POINTS = Array.from({length: 21}, (_, i) => {
            const progress = i / 20;
            const y = 90 - (progress * 80); 
            const isEvenRow = Math.floor(i / 5) % 2 === 0;
            const xBase = (i % 5) * 16;
            return { id: i, x: isEvenRow ? 10 + xBase : 90 - xBase, y };
        });

        const TOTAL_SPACES = 20;
        const SPECIAL_SPACES = {
            3: { type: 'STAR', name: 'Star Space', icon: '⭐', desc: 'Gain 2 bonus stars!' },
            7: { type: 'MYSTERY', name: 'Mystery Chest', icon: '🎁', desc: 'A surprise reward!' },
            12: { type: 'HEART', name: 'Heart Space', icon: '❤️', desc: 'Gain 1 extra heart!' },
            16: { type: 'ROCKET', name: 'Rocket Boost', icon: '🚀', desc: 'Zoom ahead 2 spaces!' },
            8: { type: 'CHALLENGE', name: 'Line Challenge', icon: '🧩', desc: 'Must use Number Line' },
            18: { type: 'CHALLENGE', name: 'Bond Challenge', icon: '🧩', desc: 'Must use Number Bond' }
        };

        const STRATEGIES = {
            NUMBER_LINE: { id: 'NUMBER_LINE', name: 'Number Line', colorClass: 'btn-duo-blue', icon: '📏' },
            NUMBER_BOND: { id: 'NUMBER_BOND', name: 'Number Bond', colorClass: 'btn-duo-green', icon: '🔗' },
            BASE_TEN: { id: 'BASE_TEN', name: 'Tens & Ones', colorClass: 'btn-duo-yellow', icon: '🧊' }
        };

        const IconHeart = ({ className = "w-6 h-6", filled = true }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill={filled ? "#ff4b4b" : "#e5e5e5"} className={className} style={{filter: filled ? 'drop-shadow(0px 2px 0px #cc3c3c)' : 'none'}}>
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
        );

        const IconStar = ({ className = "w-6 h-6", filled = true }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill={filled ? "#ffc800" : "#e5e5e5"} className={className} style={{filter: filled ? 'drop-shadow(0px 2px 0px #cc9600)' : 'none'}}>
                <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
            </svg>
        );
        
        const IconCheck = ({ className = "w-6 h-6" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>
        );

        const ExplorerIcon = ({ className = "w-8 h-8" }) => (
            <svg viewBox="0 0 100 100" className={className}>
                <circle cx="50" cy="40" r="25" fill="#fca5a5" />
                <path d="M 20 90 Q 50 60 80 90 Z" fill="#1cb0f6" />
                <circle cx="50" cy="15" r="15" fill="#ffc800" />
                <circle cx="40" cy="35" r="4" fill="#4b4b4b" />
                <circle cx="60" cy="35" r="4" fill="#4b4b4b" />
                <path d="M 45 45 Q 50 50 55 45" stroke="#4b4b4b" strokeWidth="3" fill="none" strokeLinecap="round" />
            </svg>
        );

        const CustomNumberInput = ({ value, onChange, min = 0, max = 99, placeholder = "?", className="", disabled=false }) => {
            const handleUp = () => {
                if(disabled) return;
                let val = parseInt(value || 0);
                if (isNaN(val)) val = min - 1;
                if (val < max) onChange((val + 1).toString());
                playSound('click');
            };
            const handleDown = () => {
                if(disabled) return;
                let val = parseInt(value || 0);
                if (isNaN(val)) val = max + 1;
                if (val > min) onChange((val - 1).toString());
                playSound('click');
            };
            const handleChange = (e) => {
                if(disabled) return;
                const val = e.target.value;
                if (val === '' || (parseInt(val) >= min && parseInt(val) <= max)) {
                    onChange(val);
                }
            };

            return (
                <div className={`inline-flex items-stretch bg-white border-2 rounded-xl overflow-hidden shadow-sm transition-all focus-within:ring-2 focus-within:ring-blue-100 ${disabled ? 'opacity-70 bg-gray-50 border-gray-200' : 'border-gray-300 focus-within:border-blue-400'} ${className}`}>
                    <input 
                        type="text" inputMode="numeric"
                        value={value} onChange={handleChange} placeholder={placeholder} disabled={disabled}
                        className="w-full flex-1 h-full text-center font-black text-gray-700 outline-none bg-transparent placeholder:text-gray-400"
                    />
                    <div className={`flex flex-col border-l-2 shrink-0 ${disabled ? 'border-gray-200 bg-gray-50' : 'border-gray-300 bg-[#f8fafc]'} w-7 sm:w-8`}>
                        <button onClick={handleUp} disabled={disabled} className="flex-1 flex items-center justify-center hover:bg-gray-200 active:bg-gray-300 disabled:opacity-50 border-b-2 border-gray-300 text-gray-500 transition-colors">
                            <svg className="w-2.5 h-2.5 sm:w-3 sm:h-3" fill="currentColor" viewBox="0 0 24 24"><polygon points="12,7 20,17 4,17" /></svg>
                        </button>
                        <button onClick={handleDown} disabled={disabled} className="flex-1 flex items-center justify-center hover:bg-gray-200 active:bg-gray-300 disabled:opacity-50 text-gray-500 transition-colors">
                            <svg className="w-2.5 h-2.5 sm:w-3 sm:h-3" fill="currentColor" viewBox="0 0 24 24"><polygon points="12,17 4,7 20,7" /></svg>
                        </button>
                    </div>
                </div>
            );
        };

        const BaseTenTool = ({ question, onSolve }) => {
            const isAdd = question.operation === '+';
            const [tens, setTens] = useState(Math.floor(question.num1 / 10));
            const [ones, setOnes] = useState(question.num1 % 10);
            const [actionAmount, setActionAmount] = useState(0);
            const [animating, setAnimating] = useState(false);
            const [tensInput, setTensInput] = useState('');
            const [onesInput, setOnesInput] = useState('');

            const targetAmount = question.num2;
            const actionComplete = actionAmount === targetAmount;

            const addBlock = (val) => {
                if (actionAmount + val > targetAmount) { playSound('error'); return; }
                playSound('click');
                setActionAmount(prev => prev + val);
                if (val === 10) setTens(prev => prev + 1);
                if (val === 1) setOnes(prev => prev + 1);
            };

            const removeBlock = (val) => {
                if (actionAmount + val > targetAmount) return;
                playSound('click');
                if (val === 10 && tens > 0) {
                    setActionAmount(prev => prev + val);
                    setTens(prev => prev - 1);
                }
                if (val === 1 && ones > 0) {
                    setActionAmount(prev => prev + val);
                    setOnes(prev => prev - 1);
                }
            };

            const handleRegroupUp = () => {
                if (ones >= 10 && !animating) {
                    playSound('success');
                    setAnimating(true);
                    setTimeout(() => {
                        setOnes(prev => prev - 10);
                        setTens(prev => prev + 1);
                        setAnimating(false);
                    }, 500);
                }
            };

            const handleRegroupDown = () => {
                if (tens > 0 && !animating) {
                    playSound('jump');
                    setAnimating(true);
                    setTimeout(() => {
                        setTens(prev => prev - 1);
                        setOnes(prev => prev + 10);
                        setAnimating(false);
                    }, 500);
                }
            };

            const handleSubmit = () => {
                const combinedAnswer = parseInt(tensInput || 0) * 10 + parseInt(onesInput || 0);
                onSolve(combinedAnswer);
            };

            return (
                <div className="flex flex-col h-full bg-white rounded-2xl p-4 lg:p-6 w-full overflow-y-auto hide-scrollbar">
                    <div className="text-center mb-4">
                        <h3 className="font-bold text-gray-700 text-xl">Tens and Ones Frame</h3>
                        {!actionComplete ? (
                            <p className="text-sm font-semibold text-duo-blue mt-1">
                                {isAdd ? `Add ${targetAmount} to the board.` : `Click blocks to remove ${targetAmount}.`}
                                <span className="ml-2 px-3 py-1 bg-duo-blue text-white rounded-full text-xs">
                                    Progress: {actionAmount} / {targetAmount}
                                </span>
                            </p>
                        ) : ones >= 10 ? (
                            <p className="text-sm text-duo-red font-bold mt-1 animate-pulse">
                                ⚠️ Trade 10 Ones for a Ten rod!
                            </p>
                        ) : (
                            <p className="text-sm text-duo-green font-bold mt-1">
                                Awesome! Count the blocks and enter the answer.
                            </p>
                        )}
                    </div>

                    <div className="flex-1 flex flex-col xl:flex-row gap-6 items-stretch">
                        <div className="flex-1 flex bg-white rounded-2xl border-2 border-gray-100 shadow-inner p-2 min-h-[220px]">
                            {/* Tens Column */}
                            <div className="w-1/2 p-2 border-r-[3px] border-blue-100 flex flex-col items-center bg-blue-50/50 rounded-l-xl">
                                <div className="font-black text-blue-500 text-xs lg:text-sm mb-4 bg-white px-3 py-1 rounded-full uppercase tracking-widest shadow-sm border border-blue-100">TENS</div>
                                <div className="flex flex-wrap content-start gap-3 justify-center">
                                    {Array.from({length: tens}).map((_, i) => (
                                        <div key={`t-${i}`} 
                                             onClick={() => { if (!isAdd && !actionComplete) removeBlock(10); }}
                                             className={`flex flex-col w-[26px] rounded-sm overflow-hidden shadow-md transform transition-transform ${!isAdd && !actionComplete ? 'cursor-pointer hover:-translate-y-1 hover:shadow-lg hover:ring-2 ring-red-400' : ''} ${animating ? 'opacity-50' : ''}`}>
                                             {Array.from({length: 10}).map((_, j) => (
                                                 <div key={j} className="h-[14px] bg-gradient-to-b from-[#38bdf8] to-[#0ea5e9] border border-[#0284c7] shadow-[inset_0_2px_1px_rgba(255,255,255,0.4)]"></div>
                                             ))}
                                        </div>
                                    ))}
                                </div>
                            </div>
                            {/* Ones Column */}
                            <div className="w-1/2 p-2 flex flex-col items-center bg-yellow-50/50 rounded-r-xl">
                                <div className="font-black text-yellow-600 text-xs lg:text-sm mb-4 bg-white px-3 py-1 rounded-full uppercase tracking-widest shadow-sm border border-yellow-200">ONES</div>
                                <div className="flex flex-wrap content-start gap-2 justify-center">
                                    {Array.from({length: ones}).map((_, i) => (
                                        <div key={`o-${i}`} 
                                             onClick={() => { if (!isAdd && !actionComplete) removeBlock(1); }}
                                             className={`w-[26px] h-[26px] rounded-sm bg-gradient-to-br from-[#fde047] to-[#eab308] border border-[#ca8a04] shadow-md shadow-[inset_0_2px_1px_rgba(255,255,255,0.6)] transform transition-transform ${!isAdd && !actionComplete ? 'cursor-pointer hover:-translate-y-1 hover:shadow-lg hover:ring-2 ring-red-400' : ''} ${animating && i >= ones - 10 ? 'animate-pop !bg-red-400 !border-red-600' : ''}`}>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Place Value Grid */}
                        <div className="w-full xl:w-80 flex flex-col items-center justify-center p-2">
                            <div className="flex items-center gap-2">
                                <div className="text-5xl font-black text-slate-700 select-none pr-1 translate-y-[15px]">
                                    {isAdd ? '+' : '−'}
                                </div>
                                <div className="border-[3px] border-slate-700 rounded-xl overflow-hidden bg-white shadow-lg w-full max-w-[200px]">
                                    <div className="grid grid-cols-2 bg-[#84cc16] text-white text-center font-black text-lg py-1.5 border-b-[3px] border-slate-700">
                                        <div className="border-r-[3px] border-slate-700">Tens</div>
                                        <div>Ones</div>
                                    </div>
                                    <div className="grid grid-cols-2 text-center text-3xl font-black py-2.5 text-[#f15a24] border-b-[3px] border-slate-700 bg-white">
                                        <div className="border-r-[3px] border-slate-700">{Math.floor(question.num1 / 10)}</div>
                                        <div>{question.num1 % 10}</div>
                                    </div>
                                    <div className="grid grid-cols-2 text-center text-3xl font-black py-2.5 text-[#f15a24] border-b-[3px] border-slate-700 bg-white">
                                        <div className="border-r-[3px] border-slate-700"></div>
                                        <div>{question.num2}</div>
                                    </div>
                                    <div className="grid grid-cols-2 text-center py-2 bg-[#fff7ed] h-[72px]">
                                        <div className="border-r-[3px] border-slate-700 flex items-center justify-center px-1.5">
                                            {actionComplete && ones < 10 ? (
                                                <CustomNumberInput value={tensInput} onChange={v => setTensInput(v.slice(0,1))} className="w-full h-11 !border-orange-300 !border-2 text-2xl text-[#f15a24]" />
                                            ) : (
                                                <span className="text-gray-300 font-black text-3xl">?</span>
                                            )}
                                        </div>
                                        <div className="flex items-center justify-center px-1.5">
                                            {actionComplete && ones < 10 ? (
                                                <CustomNumberInput value={onesInput} onChange={v => setOnesInput(v.slice(0,1))} className="w-full h-11 !border-orange-300 !border-2 text-2xl text-[#f15a24]" />
                                            ) : (
                                                <span className="text-gray-300 font-black text-3xl">?</span>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="mt-6 flex flex-col gap-3">
                        {!actionComplete && (
                            <div className="flex gap-4 justify-center">
                                <button onClick={() => isAdd ? addBlock(10) : removeBlock(10)} disabled={!isAdd && tens === 0} className="btn-duo-blue px-6 py-3 font-bold rounded-2xl text-lg flex-1 max-w-[200px]">
                                    {isAdd ? '+ 1 Ten' : '- Remove'}
                                </button>
                                {isAdd && (
                                    <button onClick={() => addBlock(1)} className="btn-duo-yellow px-6 py-3 font-bold rounded-2xl text-lg flex-1 max-w-[200px] text-gray-800">
                                        + 1 One
                                    </button>
                                )}
                            </div>
                        )}
                        {ones >= 10 && (
                            <button onClick={handleRegroupUp} className="btn-duo-green px-6 py-3 font-bold rounded-2xl text-lg w-full max-w-md mx-auto animate-bounce">
                                ✨ Regroup 10 Ones to 1 Ten
                            </button>
                        )}
                        {!isAdd && ones === 0 && !actionComplete && tens > 0 && (
                            <button onClick={handleRegroupDown} className="btn-duo-yellow px-6 py-3 font-bold rounded-2xl text-lg w-full max-w-md mx-auto text-gray-800 animate-pulse">
                                🔨 Break 1 Ten to 10 Ones
                            </button>
                        )}
                        {actionComplete && ones < 10 && (
                            <button onClick={handleSubmit} disabled={!tensInput || !onesInput} className="btn-duo-green px-8 py-3 font-bold text-xl rounded-2xl w-full max-w-sm mx-auto animate-slide-up">
                                Check Answer!
                            </button>
                        )}
                    </div>
                </div>
            );
        };

        const NumberLineTool = ({ question, onSolve }) => {
            const [currentPos, setCurrentPos] = useState(question.num1);
            const [jumps, setJumps] = useState([]);
            const [finalInput, setFinalInput] = useState('');
            
            const isAdd = question.operation === '+';
            const totalJumped = jumps.reduce((sum, j) => sum + Math.abs(j.amount), 0);
            const actionComplete = totalJumped === question.num2;

            const handleJump = (amount) => {
                if (totalJumped + Math.abs(amount) > question.num2) { playSound('error'); return; }
                playSound('jump');
                const start = currentPos;
                const end = start + amount;
                setJumps([...jumps, { amount, start, end }]);
                setCurrentPos(end);
            };

            const handleReset = () => {
                playSound('click');
                setCurrentPos(question.num1);
                setJumps([]);
            };

            const minVal = Math.min(question.num1, question.answer);
            const maxVal = Math.max(question.num1, question.answer);
            let startTick = Math.max(0, minVal - 2);
            let endTick = maxVal + 2;
            if (endTick - startTick < 10) endTick = startTick + 10;
            const range = endTick - startTick;

            const svgWidth = 800;
            const svgHeight = 220;
            const marginX = 40;
            const useableWidth = svgWidth - 2 * marginX;
            const getX = (val) => marginX + ((val - startTick) / range) * useableWidth;

            return (
                <div className="flex flex-col h-full bg-white rounded-2xl p-4 lg:p-6 w-full">
                    <div className="text-center mb-6">
                        <h3 className="font-bold text-gray-700 text-xl">Number Line</h3>
                        <p className="text-sm font-semibold text-duo-blue mt-1">
                            Start at {question.num1}. {isAdd ? 'Jump forward' : 'Jump backward'} {question.num2} spaces.
                            <span className="ml-3 px-3 py-1 bg-duo-blue text-white rounded-full text-xs">
                                Jumped: {totalJumped} / {question.num2}
                            </span>
                        </p>
                    </div>

                    <div className="flex justify-center gap-4 mb-6">
                        {!actionComplete && (
                            <>
                                <button onClick={() => handleJump(isAdd ? 10 : -10)} className="btn-duo-blue px-6 py-2 font-bold rounded-xl shadow-sm">
                                    {isAdd ? '+10 Jump' : '-10 Jump'}
                                </button>
                                <button onClick={() => handleJump(isAdd ? 1 : -1)} className="btn-duo-yellow px-6 py-2 font-bold text-gray-800 rounded-xl shadow-sm">
                                    {isAdd ? '+1 Jump' : '-1 Jump'}
                                </button>
                            </>
                        )}
                        <button onClick={handleReset} className="btn-duo-white px-6 py-2 font-bold rounded-xl shadow-sm">
                            Reset
                        </button>
                    </div>

                    <div className="flex-1 w-full bg-gradient-to-b from-sky-50 to-white rounded-2xl border-[3px] border-sky-100 overflow-hidden relative flex items-center justify-center min-h-[200px] shadow-inner">
                        <svg viewBox={`0 0 ${svgWidth} ${svgHeight}`} className="w-full max-w-full drop-shadow-sm overflow-visible">
                            <line x1={marginX} y1={140} x2={svgWidth - marginX} y2={140} stroke="#cbd5e1" strokeWidth="8" strokeLinecap="round" />
                            
                            {Array.from({length: range + 1}).map((_, i) => {
                                const val = startTick + i;
                                const isMajor = val % 5 === 0;
                                return (
                                    <g key={val}>
                                        <line x1={getX(val)} y1={140} x2={getX(val)} y2={isMajor ? 155 : 148} stroke={isMajor ? "#94a3b8" : "#cbd5e1"} strokeWidth={isMajor ? 4 : 2} strokeLinecap="round" />
                                        <text x={getX(val)} y={175} textAnchor="middle" fill={isMajor ? "#334155" : "#64748b"} fontSize={isMajor ? "18" : "14"} fontWeight={isMajor ? "800" : "600"} fontFamily="Poppins">
                                            {val}
                                        </text>
                                    </g>
                                );
                            })}

                            <circle cx={getX(question.num1)} cy={140} r="8" fill="#f59e0b" stroke="#d97706" strokeWidth="3" />
                            
                            {jumps.map((j, idx) => {
                                const x1 = getX(j.start);
                                const x2 = getX(j.end);
                                const midX = (x1 + x2) / 2;
                                const arcH = Math.abs(j.amount) === 10 ? 70 : 35;
                                const path = `M ${x1} 140 Q ${midX} ${140 - arcH * 2} ${x2} 140`;
                                const color = isAdd ? '#06b6d4' : '#f43f5e'; // cyan and rose
                                
                                return (
                                    <g key={idx}>
                                        <path d={path} fill="none" stroke={color} strokeWidth="4" strokeLinecap="round" strokeDasharray="6 4" className="animate-pop" style={{transformOrigin: `${midX}px 140px`}} />
                                        <polygon points={`${x2},140 ${x2+(isAdd?-8:8)},132 ${x2+(isAdd?-3:3)},140 ${x2+(isAdd?-8:8)},148`} fill={color} />
                                        <text x={midX} y={140 - arcH - 10} textAnchor="middle" fill={color} fontSize="18" fontWeight="800" fontFamily="Poppins" className="animate-pop">
                                            {j.amount > 0 ? '+' : ''}{j.amount}
                                        </text>
                                    </g>
                                );
                            })}
                            <circle cx={getX(currentPos)} cy={140} r="10" fill={isAdd ? '#06b6d4' : '#f43f5e'} stroke="#ffffff" strokeWidth="3" className="animate-pulse" />
                        </svg>
                    </div>

                    {actionComplete && (
                        <div className="mt-6 flex flex-col items-center gap-4 animate-slide-up">
                            <span className="font-bold text-gray-700 text-xl">Where did you land?</span>
                            <div className="flex flex-col md:flex-row gap-4 items-center">
                                <CustomNumberInput value={finalInput} onChange={setFinalInput} className="h-14 w-28 text-2xl !border-green-400" />
                                <button onClick={() => onSolve(finalInput)} className="btn-duo-green px-8 py-3 h-14 font-bold text-xl rounded-xl w-full md:w-auto">
                                    Submit
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const NumberBondTool = ({ question, onSolve }) => {
            const isAdd = question.operation === '+';
            const [step, setStep] = useState(1);
            const [inputs, setInputs] = useState({ p1: '', p2: '', final: '' });
            const [errorMsg, setErrorMsg] = useState('');

            const bigger = question.num1;
            const smaller = question.num2;
            const isRegroupSub = !isAdd && question.requiresRegrouping;
            
            const expectedP1 = isRegroupSub ? (Math.floor(bigger / 10) * 10 - 10) : (Math.floor(bigger / 10) * 10);
            const expectedP2 = isRegroupSub ? (bigger % 10 + 10) : (bigger % 10);

            const handleCheckBond = () => {
                if (parseInt(inputs.p1) === expectedP1 && parseInt(inputs.p2) === expectedP2) {
                    playSound('success');
                    setStep(2);
                    setErrorMsg('');
                } else {
                    playSound('error');
                    if (isRegroupSub) {
                        setErrorMsg(`Hint: Break a ten! Split ${bigger} into ${expectedP1} and ${expectedP2}.`);
                    } else {
                        setErrorMsg(`Hint: Split ${bigger} into tens and ones (${expectedP1} and ${expectedP2}).`);
                    }
                }
            };

            const intermediateStep1 = isRegroupSub ? expectedP2 - smaller : (isAdd ? expectedP2 + smaller : expectedP2 - smaller);

            return (
                <div className="flex flex-col h-full bg-white rounded-2xl p-4 lg:p-6 w-full overflow-y-auto hide-scrollbar">
                    <div className="text-center mb-6">
                        <h3 className="font-bold text-gray-700 text-xl">Number Bond Strategy</h3>
                        <p className="text-sm font-semibold text-duo-blue mt-1">Split the 2-digit number into tens and ones for an easier solution!</p>
                    </div>

                    <div className="flex-1 flex flex-col items-center gap-8">
                        <div className={`p-6 rounded-3xl border-4 w-full max-w-md transition-all ${step === 1 ? 'border-indigo-200 bg-white shadow-sm' : 'border-gray-200 bg-gray-50 opacity-80'}`}>
                            <p className="font-bold mb-6 text-center text-gray-600 uppercase tracking-wide">Step 1: Split {bigger}</p>
                            
                            <div className="relative w-full h-[260px] max-w-[360px] mx-auto mb-4">
                                {/* Solid Vector Lines for perfect geometric connection */}
                                <svg className="absolute inset-0 w-full h-full pointer-events-none" style={{zIndex: 0}}>
                                    <line x1="50%" y1="20%" x2="25%" y2="75%" stroke="#a5b4fc" strokeWidth="6" strokeLinecap="round" />
                                    <line x1="50%" y1="20%" x2="75%" y2="75%" stroke="#a5b4fc" strokeWidth="6" strokeLinecap="round" />
                                </svg>
                                
                                {/* Top Bubble */}
                                <div className="absolute z-10 w-24 h-24 rounded-full border-[5px] border-indigo-400 shadow-lg flex items-center justify-center bg-gradient-to-b from-white to-indigo-50"
                                     style={{ left: '50%', top: '20%', transform: 'translate(-50%, -50%)' }}>
                                    <span className="text-4xl font-black text-indigo-900">{bigger}</span>
                                </div>
                                
                                {/* Bottom Left Bubble - Tens */}
                                <div className="absolute z-10 w-[116px] h-[116px] rounded-full border-[5px] border-pink-400 flex flex-col items-center justify-center shadow-lg bg-gradient-to-b from-white to-pink-50"
                                     style={{ left: '25%', top: '75%', transform: 'translate(-50%, -50%)' }}>
                                    <CustomNumberInput value={inputs.p1} onChange={v => setInputs({...inputs, p1: v})} disabled={step !== 1} className="w-20 h-11 !border-pink-300" />
                                    <span className="text-[11px] font-black text-pink-500 absolute -bottom-7 uppercase tracking-widest bg-white px-2 py-0.5 rounded-full shadow-sm border border-pink-100">Tens</span>
                                </div>

                                {/* Bottom Right Bubble - Ones */}
                                <div className="absolute z-10 w-[116px] h-[116px] rounded-full border-[5px] border-teal-400 flex flex-col items-center justify-center shadow-lg bg-gradient-to-b from-white to-teal-50"
                                     style={{ left: '75%', top: '75%', transform: 'translate(-50%, -50%)' }}>
                                    <CustomNumberInput value={inputs.p2} onChange={v => setInputs({...inputs, p2: v})} disabled={step !== 1} className="w-20 h-11 !border-teal-300" />
                                    <span className="text-[11px] font-black text-teal-600 absolute -bottom-7 uppercase tracking-widest bg-white px-2 py-0.5 rounded-full shadow-sm border border-teal-100">Ones</span>
                                </div>
                            </div>
                            
                            {isRegroupSub && <p className="text-sm font-bold text-duo-red text-center mt-8 animate-pulse">Break a ten into ones!</p>}
                            {errorMsg && <p className="text-duo-red text-sm text-center mt-8 font-bold bg-red-100 py-2 rounded-xl">{errorMsg}</p>}
                            
                            {step === 1 && (
                                <div className="mt-10 text-center">
                                    <button onClick={handleCheckBond} className="btn-duo-blue px-8 py-3 font-bold rounded-2xl text-lg w-full shadow-sm">Check Bond</button>
                                </div>
                            )}
                        </div>

                        {step === 2 && (
                            <div className="p-6 bg-green-50 border-4 border-duo-green rounded-3xl flex flex-col items-center gap-6 animate-slide-up w-full max-w-md shadow-sm">
                                <div className="text-center text-lg text-gray-700 bg-white px-6 py-4 rounded-2xl border-2 border-gray-200 w-full shadow-sm">
                                    <p className="font-bold text-sm text-gray-400 mb-3 uppercase tracking-wide">Helpful Steps:</p>
                                    {isAdd ? (
                                        <>
                                            <div className="mb-2"><span className="text-teal-600 font-black">{expectedP2}</span> + <span className="text-duo-yellow font-black">{smaller}</span> = <span className="font-black text-gray-800">{intermediateStep1}</span></div>
                                            <div><span className="text-pink-500 font-black">{expectedP1}</span> + <span className="font-black text-gray-800">{intermediateStep1}</span> = <span className="text-duo-green font-black">?</span></div>
                                        </>
                                    ) : (
                                        <>
                                            <div className="mb-2"><span className="text-teal-600 font-black">{expectedP2}</span> - <span className="text-duo-yellow font-black">{smaller}</span> = <span className="font-black text-gray-800">{intermediateStep1}</span></div>
                                            <div><span className="text-pink-500 font-black">{expectedP1}</span> + <span className="font-black text-gray-800">{intermediateStep1}</span> = <span className="text-duo-green font-black">?</span></div>
                                        </>
                                    )}
                                </div>

                                <div className="flex flex-col items-center gap-4 w-full">
                                    <span className="font-bold text-gray-700 text-xl uppercase">Final Answer</span>
                                    <div className="flex flex-col md:flex-row gap-4 items-center">
                                        <CustomNumberInput value={inputs.final} onChange={v => setInputs({...inputs, final: v})} className="w-28 h-14 text-2xl !border-[3px] !border-green-400" />
                                        <button onClick={() => onSolve(inputs.final)} className="btn-duo-green px-8 py-3 h-14 font-bold text-xl rounded-2xl w-full md:w-auto shadow-sm">
                                            Submit
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const MathMountainApp = () => {
            const [gameState, setGameState] = useState('START'); 
            const [position, setPosition] = useState(0);
            const [hearts, setHearts] = useState(5);
            const [stars, setStars] = useState(0);
            const [currentLevel, setCurrentLevel] = useState(1);
            const [question, setQuestion] = useState(null);
            const [selectedStrategy, setSelectedStrategy] = useState(null);
            const [feedback, setFeedback] = useState(null); 
            const [requiredStrategy, setRequiredStrategy] = useState(null);
            const [stats, setStats] = useState({ solved: 0, wrong: 0, strategies: { NUMBER_LINE: 0, NUMBER_BOND: 0, BASE_TEN: 0 }, streak: 0, maxStreak: 0 });
            const [rewardPopup, setRewardPopup] = useState(null);

            const startAudio = async () => {
                if (window.Tone && Tone.context.state !== 'running') {
                    await Tone.start();
                }
            };

            const startGame = async () => {
                await startAudio();
                playSound('click');
                setGameState('PLAYING');
                setPosition(0);
                setHearts(5);
                setStars(0);
                setCurrentLevel(1);
                setStats({ solved: 0, wrong: 0, strategies: { NUMBER_LINE: 0, NUMBER_BOND: 0, BASE_TEN: 0 }, streak: 0, maxStreak: 0 });
                setRewardPopup(null);
                loadNextTurn(0);
            };

            const loadNextTurn = (newPos) => {
                let level = 1;
                if (newPos >= 5) level = 2;
                if (newPos >= 10) level = 3;
                if (newPos >= 15) level = 4;
                setCurrentLevel(level);

                const spaceInfo = SPECIAL_SPACES[newPos];
                let reqStrat = null;
                if (spaceInfo && spaceInfo.type === 'CHALLENGE') {
                    reqStrat = spaceInfo.name === 'Line Challenge' ? 'NUMBER_LINE' : 'NUMBER_BOND';
                }
                setRequiredStrategy(reqStrat);
                setSelectedStrategy(reqStrat);

                setQuestion(generateQuestion(level));
                setFeedback(null);
            };

            const handleSolve = (userAnswerStr) => {
                const userAnswer = parseInt(userAnswerStr);
                if (isNaN(userAnswer)) {
                    playSound('error');
                    setFeedback({ type: 'error', msg: 'Please enter a number!' });
                    setTimeout(() => setFeedback(null), 2000);
                    return;
                }

                if (userAnswer === question.answer) {
                    playSound('success');
                    const newStreak = stats.streak + 1;
                    const newStats = {
                        ...stats, solved: stats.solved + 1, streak: newStreak, maxStreak: Math.max(stats.maxStreak, newStreak),
                        strategies: { ...stats.strategies, [selectedStrategy]: stats.strategies[selectedStrategy] + 1 }
                    };
                    setStats(newStats);
                    setStars(prev => prev + 1);
                    setFeedback({ type: 'success', msg: 'Great job!' });
                    
                    setTimeout(() => {
                        handleMovement(position + 1);
                    }, 2000);
                } else {
                    playSound('error');
                    setHearts(prev => Math.max(0, prev - 1));
                    setStats(prev => ({ ...prev, wrong: prev.wrong + 1, streak: 0 }));
                    
                    if (hearts <= 1) {
                        setFeedback({ type: 'error', msg: `Oh no! The answer was ${question.answer}. Let's rest and try a new problem.` });
                        setTimeout(() => {
                            setFeedback(null);
                            setHearts(5); 
                            loadNextTurn(position);
                        }, 3000);
                    } else {
                        setFeedback({ type: 'error', msg: `Keep trying!` });
                        setTimeout(() => setFeedback(null), 2000); 
                    }
                }
            };

            const handleMovement = (newPos) => {
                if (newPos >= TOTAL_SPACES) {
                    setPosition(TOTAL_SPACES);
                    setTimeout(() => setGameState('END'), 1000);
                    return;
                }
                
                playSound('jump');
                setPosition(newPos);
                
                const spaceInfo = SPECIAL_SPACES[newPos];
                if (spaceInfo) {
                    let msg = "";
                    if (spaceInfo.type === 'STAR') { setStars(prev => prev + 2); playSound('success'); msg = "+2 Stars!"; }
                    if (spaceInfo.type === 'HEART') { setHearts(prev => Math.min(5, prev + 1)); playSound('success'); msg = "+1 Heart!"; }
                    if (spaceInfo.type === 'MYSTERY') {
                        const reward = Math.random() > 0.5 ? 'STAR' : 'HEART';
                        if (reward === 'STAR') { setStars(prev => prev + 3); msg = "+3 Stars!"; }
                        else { setHearts(prev => Math.min(5, prev + 1)); msg = "+1 Heart!"; }
                        playSound('success');
                    }
                    if (msg) {
                        setRewardPopup({ id: Date.now(), msg, pos: newPos });
                        setTimeout(() => setRewardPopup(null), 2000);
                    }
                    if (spaceInfo.type === 'ROCKET') {
                        playSound('jump');
                        setTimeout(() => handleMovement(newPos + 2), 1000);
                        return;
                    }
                }
                
                setTimeout(() => loadNextTurn(newPos), 1500);
            };

            useEffect(() => {
                if (gameState === 'END') {
                    playSound('win');
                    triggerConfetti();
                }
            }, [gameState]);

            const renderBoard = () => (
                <div className="relative w-full h-full rounded-2xl overflow-hidden flex items-center justify-center p-2 lg:p-4 bg-green-50 border-4 border-green-200 shadow-inner">
                    <svg className="absolute inset-0 w-full h-full pointer-events-none opacity-30">
                        <path d="M0 100 Q 200 50 400 150 T 800 100 L 800 800 L 0 800 Z" fill="#86efac" />
                        <path d="M0 300 Q 300 200 500 400 T 800 300 L 800 800 L 0 800 Z" fill="#4ade80" />
                        <path d="M200 0 L 300 150 L 100 150 Z" fill="#cbd5e1" />
                    </svg>

                    <div className="relative w-full max-w-[280px] lg:max-w-md aspect-[3/4] lg:aspect-auto lg:h-full">
                        <svg className="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 100 100" preserveAspectRatio="none">
                            <polyline points={PATH_POINTS.map(p => `${p.x},${100 - p.y}`).join(' ')} fill="none" stroke="#ffffff" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" />
                        </svg>

                        {PATH_POINTS.map((p, i) => {
                            const isCurrent = position === i;
                            const isPassed = position > i;
                            const special = SPECIAL_SPACES[i];
                            const isCheckpoint = i > 0 && i % 5 === 0;

                            let bgColor = isPassed ? 'bg-duo-green' : 'bg-white';
                            let borderColor = isCurrent ? 'border-duo-yellow' : 'border-gray-300';
                            let scale = isCurrent ? 'scale-125 z-20' : (isCheckpoint ? 'scale-110 z-10' : 'scale-100');

                            if (special && !isPassed) bgColor = 'bg-yellow-100';
                            if (isCheckpoint && !isPassed) bgColor = 'bg-purple-100';

                            return (
                                <div key={i} className={`absolute w-7 h-7 lg:w-9 lg:h-9 rounded-full border-4 shadow-sm flex items-center justify-center transition-all duration-500 transform ${bgColor} ${borderColor} ${scale}`}
                                     style={{ left: `calc(${p.x}% - 14px)`, bottom: `calc(${p.y}% - 14px)` }}>
                                    
                                    {isCurrent && (
                                        <div className="absolute -top-10 lg:-top-12 animate-bounce z-30">
                                            <ExplorerIcon className="w-10 h-10 lg:w-12 lg:h-12 drop-shadow-md" />
                                        </div>
                                    )}

                                    {rewardPopup && rewardPopup.pos === i && (
                                        <div className="absolute -top-6 text-sm font-black text-duo-yellow animate-float-up whitespace-nowrap z-40 drop-shadow-md" style={{textShadow: '1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff'}}>
                                            {rewardPopup.msg}
                                        </div>
                                    )}

                                    {!isPassed && special && <span className="text-sm lg:text-base select-none">{special.icon}</span>}
                                    {!isPassed && !special && isCheckpoint && <span className="text-[10px] lg:text-xs font-bold text-purple-700">L{i/5+1}</span>}
                                    {isPassed && <IconCheck className="w-4 h-4 lg:w-5 lg:h-5 text-white" />}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );

            if (gameState === 'START') {
                return (
                    <div className="flex flex-col items-center justify-center h-[100dvh] w-full bg-duo-bg">
                        <div className="text-center mb-10 animate-wiggle">
                            <h1 className="text-5xl lg:text-7xl font-black mb-4 text-duo-blue" style={{textShadow: '0px 4px 0px #1899d6'}}>Math Mountain</h1>
                            <h2 className="text-3xl lg:text-4xl font-bold text-gray-700">Adventure</h2>
                        </div>
                        <div className="bg-white p-8 lg:p-10 rounded-3xl shadow-xl max-w-xl text-center border-2 border-gray-100 mx-4">
                            <p className="text-xl text-gray-600 mb-8 font-medium">Climb the mountain by solving math puzzles. Learn powerful strategies along the way!</p>
                            <div className="flex justify-center gap-6 mb-10 text-5xl drop-shadow-sm">
                                📏 🔗 🧊
                            </div>
                            <button onClick={startGame} className="btn-duo-green text-2xl lg:text-3xl px-10 py-5 font-black rounded-2xl w-full uppercase tracking-wider">
                                Start Climbing!
                            </button>
                        </div>
                    </div>
                );
            }

            if (gameState === 'END') {
                const acc = Math.round((stats.solved / (stats.solved + stats.wrong)) * 100) || 0;
                return (
                    <div className="flex flex-col items-center justify-center h-[100dvh] w-full bg-duo-bg p-4 overflow-y-auto z-50">
                        <h1 className="text-4xl lg:text-6xl font-black mb-4 text-duo-yellow animate-bounce text-center" style={{textShadow: '0px 4px 0px #cc9600'}}>🎉 SUMMIT REACHED! 🎉</h1>
                        <p className="text-xl lg:text-2xl font-bold text-gray-600 mb-8 text-center">You are a Math Mountain Champion!</p>
                        
                        <div className="bg-white p-6 lg:p-10 rounded-3xl shadow-xl w-full max-w-2xl text-center animate-slide-up border-2 border-gray-100 relative z-10">
                            <div className="grid grid-cols-2 gap-4 lg:gap-6 mb-10">
                                <div className="bg-yellow-50 p-4 rounded-2xl border-2 border-yellow-200 flex flex-col items-center">
                                    <div className="text-xs lg:text-sm text-gray-500 font-bold uppercase tracking-wide">Stars Collected</div>
                                    <div className="text-3xl lg:text-4xl flex items-center justify-center gap-2 text-duo-yellow font-black mt-2">
                                        <IconStar filled/> {stars}
                                    </div>
                                </div>
                                <div className="bg-green-50 p-4 rounded-2xl border-2 border-green-200 flex flex-col items-center">
                                    <div className="text-xs lg:text-sm text-gray-500 font-bold uppercase tracking-wide">Accuracy</div>
                                    <div className="text-3xl lg:text-4xl text-duo-green font-black mt-2">{acc}%</div>
                                </div>
                                <div className="bg-blue-50 p-4 rounded-2xl border-2 border-blue-200 flex flex-col items-center">
                                    <div className="text-xs lg:text-sm text-gray-500 font-bold uppercase tracking-wide">Problems Solved</div>
                                    <div className="text-3xl lg:text-4xl text-duo-blue font-black mt-2">{stats.solved}</div>
                                </div>
                                <div className="bg-red-50 p-4 rounded-2xl border-2 border-red-200 flex flex-col items-center">
                                    <div className="text-xs lg:text-sm text-gray-500 font-bold uppercase tracking-wide">Best Streak</div>
                                    <div className="text-3xl lg:text-4xl text-duo-red font-black mt-2">{stats.maxStreak} 🔥</div>
                                </div>
                            </div>
                            <button onClick={startGame} className="btn-duo-blue text-2xl px-12 py-4 font-black rounded-2xl uppercase tracking-wider w-full">
                                Play Again
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col lg:flex-row h-[100dvh] w-full bg-duo-bg">
                    <div className="w-full lg:w-1/3 h-[35vh] lg:h-full flex flex-col p-3 lg:p-6 bg-white border-b-4 lg:border-b-0 lg:border-r-4 border-gray-200 shadow-sm shrink-0">
                        <div className="bg-white rounded-2xl border-2 border-gray-200 p-3 mb-3 lg:mb-6 flex justify-between items-center shadow-sm">
                            <div className="flex gap-1">
                                {Array.from({length: 5}).map((_, i) => (
                                    <IconHeart key={i} className="w-6 h-6 lg:w-8 lg:h-8" filled={i < hearts} />
                                ))}
                            </div>
                            <div className="flex items-center gap-2 bg-yellow-50 px-4 py-1.5 rounded-full border-2 border-yellow-200">
                                <IconStar className="w-6 h-6 lg:w-8 lg:h-8" filled />
                                <span className="text-xl lg:text-2xl font-black text-duo-yellow">{stars}</span>
                            </div>
                        </div>
                        <div className="flex-1 min-h-0">
                            {renderBoard()}
                        </div>
                    </div>

                    <div className="w-full lg:w-2/3 flex-1 flex flex-col items-center justify-start p-3 lg:p-8 overflow-y-auto relative">
                        {question && (
                            <div className="w-full max-w-3xl flex items-center justify-center gap-4 bg-gradient-to-r from-blue-100 via-white to-blue-100 p-4 lg:p-6 rounded-3xl border-4 border-blue-200 shadow-md mb-4 lg:mb-8 relative mt-2 lg:mt-0">
                                <div className="absolute -top-5 bg-blue-500 text-white px-6 py-1.5 rounded-full font-black text-sm shadow-md uppercase tracking-widest border-2 border-blue-600">
                                    Level {currentLevel}
                                </div>
                                <span className="text-5xl lg:text-7xl font-black text-gray-800 tracking-widest mt-2 drop-shadow-sm">
                                    {question.num1} {question.operation} {question.num2} = ?
                                </span>
                                <button onClick={() => {
                                            playSound('click');
                                            speakText(`${question.num1} ${question.operation === '+' ? 'plus' : 'minus'} ${question.num2} equals what?`);
                                        }} 
                                        className="bg-blue-400 hover:bg-blue-500 text-white p-3 lg:p-4 rounded-2xl ml-2 lg:ml-6 active:scale-95 transition-transform shadow-[0_4px_0_#2563eb] active:shadow-[0_0px_0_#2563eb] active:translate-y-1" title="Read Aloud">
                                    <svg className="w-8 h-8 lg:w-10 lg:h-10 drop-shadow-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M15.536 8.464a5 5 0 010 7.072M18.364 5.636a9 9 0 010 12.728M11 5L6 9H2v6h4l5 4V5z"></path></svg>
                                </button>
                            </div>
                        )}

                        {feedback && (
                            <div className="absolute inset-0 z-50 flex items-center justify-center bg-white/70 backdrop-blur-sm p-4">
                                <div className={`p-8 rounded-3xl border-4 shadow-xl max-w-sm w-full text-center animate-pop ${feedback.type === 'success' ? 'bg-green-50 border-duo-green' : 'bg-red-50 border-duo-red'}`}>
                                    <div className="text-6xl mb-4">{feedback.type === 'success' ? '🌟' : '💔'}</div>
                                    <h2 className={`text-3xl font-black mb-2 ${feedback.type === 'success' ? 'text-duo-green' : 'text-duo-red'}`}>
                                        {feedback.type === 'success' ? 'Correct!' : 'Keep Trying!'}
                                    </h2>
                                    <p className="text-lg font-semibold text-gray-700">{feedback.msg}</p>
                                </div>
                            </div>
                        )}

                        {!selectedStrategy ? (
                            <div className="w-full max-w-3xl flex-1 bg-white rounded-3xl border-4 border-gray-200 shadow-sm p-6 lg:p-10 flex flex-col items-center justify-center">
                                <h3 className="text-2xl lg:text-3xl font-black text-gray-700 mb-8 text-center uppercase tracking-wide">Choose a strategy to solve this puzzle!</h3>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 lg:gap-6 w-full">
                                    {Object.values(STRATEGIES).map(strat => {
                                        const isLocked = requiredStrategy && requiredStrategy !== strat.id;
                                        return (
                                            <button 
                                                key={strat.id}
                                                onClick={() => { playSound('click'); setSelectedStrategy(strat.id); }}
                                                disabled={isLocked}
                                                className={`${strat.colorClass} flex flex-col items-center p-6 rounded-3xl transition-all ${isLocked ? 'opacity-40 bg-gray-200 border-gray-300 text-gray-500' : ''}`}
                                            >
                                                <span className="text-6xl mb-4 drop-shadow-md">{strat.icon}</span>
                                                <span className="font-black text-xl drop-shadow-sm">{strat.name}</span>
                                                {isLocked && <span className="mt-3 text-xs bg-black/10 px-3 py-1 rounded-full font-bold text-white">Locked by Challenge</span>}
                                            </button>
                                        );
                                    })}
                                </div>
                                {requiredStrategy && (
                                    <p className="mt-8 text-duo-red font-bold bg-red-50 border-2 border-red-200 px-6 py-3 rounded-2xl animate-pulse text-center">
                                        ⚠️ This space requires you to use the {STRATEGIES[requiredStrategy].name}!
                                    </p>
                                )}
                            </div>
                        ) : (
                            <div className="w-full max-w-4xl flex-1 flex flex-col min-h-[400px] relative">
                                {!requiredStrategy && !feedback && (
                                    <button onClick={() => { playSound('click'); setSelectedStrategy(null); }} className="absolute -top-12 lg:-top-16 right-0 z-10 btn-duo-white px-4 py-2 rounded-xl text-sm font-bold shadow-sm">
                                        Change Strategy
                                    </button>
                                )}
                                
                                {question && (
                                    <div className="flex-1 bg-white rounded-3xl border-4 border-gray-200 shadow-sm overflow-hidden flex flex-col relative z-0">
                                        {selectedStrategy === 'BASE_TEN' && <BaseTenTool key={position} question={question} onSolve={handleSolve} />}
                                        {selectedStrategy === 'NUMBER_LINE' && <NumberLineTool key={position} question={question} onSolve={handleSolve} />}
                                        {selectedStrategy === 'NUMBER_BOND' && <NumberBondTool key={position} question={question} onSolve={handleSolve} />}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MathMountainApp />);
    </script>
</body>
</html>
