<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: {
                        brand: {
                            green: '#58cc02', greenDark: '#58a700', greenLight: '#a5ed6d',
                            blue: '#1cb0f6', blueDark: '#1899d6', blueLight: '#7dd2fa',
                            yellow: '#ffc800', yellowDark: '#e5b400', yellowLight: '#ffdf66',
                            orange: '#ff9600', orangeDark: '#e58700',
                            red: '#ff4b4b', redDark: '#ea2b2b', redLight: '#ff8585',
                            purple: '#ce82ff', purpleDark: '#a568cc',
                            gray: '#e5e5e5', text: '#3c3c3c'
                        }
                    },
                    boxShadow: {
                        'card': '0 6px 0 0 rgba(229, 229, 229, 1)',
                        'btn-green': '0 6px 0 0 #58a700',
                        'btn-blue': '0 6px 0 0 #1899d6',
                        'btn-orange': '0 6px 0 0 #e58700',
                        'btn-purple': '0 6px 0 0 #a568cc',
                        'btn-red': '0 6px 0 0 #ea2b2b',

                    }

    <style>
        body {
            /* Unicorn / Cotton Candy colorful gradient background - super attractive for kids */
            background: radial-gradient(circle at top, #ffe4e1 0%, #e0c3fc 50%, #8ec5fc 100%);
            background-attachment: fixed;
            color: #3c3c3c;
            touch-action: manipulation;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        
        /* 3D Button Press Effect */
        .btn-3d {
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            top: 0;
            transform: translateY(0);
        }
        .btn-3d:active, .btn-3d.pressed {
            top: 6px;
            box-shadow: none !important;
        }

        /* --- Nested SVG Animations --- */
        @keyframes jumpInInner {
            0% { transform: translate(-400px, -200px) scale(0.2) rotate(-30deg); opacity: 0; }
            50% { transform: translate(30px, -50px) scale(1.2) rotate(10deg); opacity: 1; }
            75% { transform: translate(-10px, 10px) scale(0.9) rotate(-5deg); opacity: 1; }
            100% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes flyInInner {
            0% { transform: translate(-500px, -100px) scale(0.5); opacity: 0; }
            60% { transform: translate(20px, 20px) scale(1.1); opacity: 1; }
            100% { transform: translate(0, 0) scale(1); opacity: 1; }
        }

        /* NEW: Move Aside animation for subtraction (stays visible) */
        @keyframes moveAsideInner {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            20% { transform: translate(0, -30px) scale(1.1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0.85); opacity: 0.75; filter: grayscale(15%); }
        }

        .inner-add-jump { animation: jumpInInner 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .inner-add-fly { animation: flyInInner 1.2s ease-out forwards; }
        .inner-sub-aside { animation: moveAsideInner 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        
        @keyframes floatIdle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes pulseSoft { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .idle-float { animation: floatIdle 3s ease-in-out infinite; }
        .idle-pulse { animation: pulseSoft 2s ease-in-out infinite; }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; }
        .screen.active { display: flex; }
        
        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 99999; }
        
        .highlight-number { color: #ff9600; font-size: 1.2em; font-weight: 900; text-shadow: 1px 1px 0px white; display: inline-block; transform: translateY(2px); }
        .text-glow { text-shadow: 0 2px 4px rgba(255,255,255,0.9), 0 0 10px rgba(255,255,255,1); }
    </style>
</head>

    <script>
        const gameData = [
            { type: 'add', sceneId: 'frogs', text: "There are 5 frogs in the pond. 8 more frogs jump into the pond.", question: "How many frogs are there altogether?", initial: 5, change: 8, correctAnswer: "5 + 8 = 13", wrongAnswers: ["5 + 7 = 12", "8 - 5 = 3"] },
            { type: 'add', sceneId: 'birds', text: "There are 6 birds in the tree. 5 more birds fly over.", question: "How many birds are there altogether?", initial: 6, change: 5, correctAnswer: "6 + 5 = 11", wrongAnswers: ["6 + 4 = 10", "6 - 5 = 1"] },
            { type: 'add', sceneId: 'fish', text: "There are 7 fish in the water. 6 more fish swim over.", question: "How many fish are there altogether?", initial: 7, change: 6, correctAnswer: "7 + 6 = 13", wrongAnswers: ["7 + 5 = 12", "7 - 6 = 1"] },
            { type: 'add', sceneId: 'balloons', text: "There are 8 balloons. 4 more balloons float up.", question: "How many balloons are there altogether?", initial: 8, change: 4, correctAnswer: "8 + 4 = 12", wrongAnswers: ["8 + 5 = 13", "8 - 4 = 4"] },
            { type: 'add', sceneId: 'apples', text: "There are 9 apples. 5 more apples are put into the basket.", question: "How many apples are there altogether?", initial: 9, change: 5, correctAnswer: "9 + 5 = 14", wrongAnswers: ["9 + 4 = 13", "9 - 5 = 4"] },
            { type: 'subtract', sceneId: 'cakes', text: "There are 13 cakes on the table. 6 cakes are eaten.", question: "How many cakes are left?", initial: 13, change: 6, correctAnswer: "13 - 6 = 7", wrongAnswers: ["13 - 7 = 6", "14 - 6 = 8"] },
            { type: 'subtract', sceneId: 'ducks', text: "There are 15 ducks in the pond. 6 ducks swim away.", question: "How many ducks are left?", initial: 15, change: 6, correctAnswer: "15 - 6 = 9", wrongAnswers: ["15 - 5 = 10", "14 - 6 = 8"] },
            { type: 'subtract', sceneId: 'cookies', text: "There are 18 cookies. 9 cookies are eaten.", question: "How many cookies are left?", initial: 18, change: 9, correctAnswer: "18 - 9 = 9", wrongAnswers: ["17 - 8 = 9", "18 - 8 = 10"] },
            { type: 'subtract', sceneId: 'stars', text: "There are 14 stars in the sky. 7 stars fade away.", question: "How many stars are left?", initial: 14, change: 7, correctAnswer: "14 - 7 = 7", wrongAnswers: ["14 - 6 = 8", "15 - 7 = 8"] },
            { type: 'subtract', sceneId: 'cars', text: "There are 16 toy cars. 8 cars are taken away.", question: "How many cars are left?", initial: 16, change: 8, correctAnswer: "16 - 8 = 8", wrongAnswers: ["16 - 7 = 9", "15 - 8 = 7"] }
        ];

        const AudioEngine = (function() {
            let ctx = null;
            let isEnabled = true;

            function initCtx() {
                if (!ctx) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    ctx = new AudioContext();
                }
                if (ctx.state === 'suspended') ctx.resume();
            }

            function playTone(freq, type, duration, vol, rampDown = true) {
                if (!isEnabled) return;
                initCtx();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                
                gain.gain.setValueAtTime(vol, ctx.currentTime);
                if (rampDown) {
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
                } else {
                    gain.gain.setValueAtTime(0, ctx.currentTime + duration);
                }

                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            }

            return {
                toggle: () => { isEnabled = !isEnabled; return isEnabled; },
                getState: () => isEnabled,
                init: () => initCtx(),
                click: () => playTone(600, 'sine', 0.1, 0.1),
                correct: () => {
                    playTone(523.25, 'sine', 0.15, 0.15, false); // C5
                    setTimeout(() => playTone(659.25, 'sine', 0.15, 0.15, false), 100); // E5
                    setTimeout(() => playTone(783.99, 'sine', 0.3, 0.2), 200); // G5
                },
                wrong: () => {
                    playTone(300, 'triangle', 0.2, 0.1);
                    setTimeout(() => playTone(250, 'triangle', 0.4, 0.1), 150);
                },
                win: () => {
                    const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51]; 
                    notes.forEach((n, i) => setTimeout(() => playTone(n, 'square', 0.2, 0.08), i * 120));
                }
            };
        })();

        const SceneRenderer = (function() {
            const viewBoxW = 1200;
            const viewBoxH = 600;

            function getPositions(count, maxCols, xStep, yStep, yOffset = 0, alignLeft = false) {
                let pos = [];
                let actualCols = Math.min(count, maxCols);
                let rows = Math.ceil(count / actualCols);
                
                let gridW = (actualCols - 1) * xStep;
                let gridH = (rows - 1) * yStep;
                
                let startX = alignLeft ? 100 : (viewBoxW - gridW) / 2;
                let startY = (viewBoxH - gridH) / 2 + yOffset;

                for(let i=0; i<count; i++) {
                    let r = Math.floor(i / actualCols);
                    let c = i % actualCols;

                        let delayStyle = '';

                        if (isAdd && i >= q.initial) {
                            cls = animType;
                            isNew = true;
                            delayStyle = `style="animation-delay: ${(i-q.initial)*0.1}s"`;
                        } else if (!isAdd && i >= q.initial - q.change) {
                            cls = animType; 
                            let rPos = removedPos[i - (q.initial - q.change)];
                            let p = pos[i];
                            delayStyle = `style="animation-delay: ${1.5 + (i-(q.initial-q.change))*0.1}s; --dx: ${rPos.x - p.x}px; --dy: ${rPos.y - p.y}px;"`;
                        }

                        if (cls) cls += `" ${delayStyle} data-dummy="`; 

                        let p = pos[i];
                        if(q.sceneId === 'frogs') itemsHtml += drawFrog(p.x, p.y, cls, isNew);
                        if(q.sceneId === 'birds') itemsHtml += drawBird(p.x, p.y, cls, isNew);
                        if(q.sceneId === 'fish') itemsHtml += drawFish(p.x, p.y, cls, isNew);
                        if(q.sceneId === 'balloons') itemsHtml += drawBalloon(p.x, (p.y + (i%2)*30), cls, isNew, i);
                        if(q.sceneId === 'apples') itemsHtml += drawApple(p.x, p.y, cls, isNew);
                        if(q.sceneId === 'cakes') itemsHtml += drawCake(p.x, p.y, cls);
                        if(q.sceneId === 'ducks') itemsHtml += drawDuck(p.x, p.y, cls);
                        if(q.sceneId === 'cookies') itemsHtml += drawCookie(p.x, p.y, cls);
                        if(q.sceneId === 'stars') itemsHtml += drawStar(p.x, p.y, cls);
                        if(q.sceneId === 'cars') itemsHtml += drawCar(p.x, p.y, cls);
                    }

                    return `<svg viewBox="0 0 ${viewBoxW} ${viewBoxH}" class="w-full h-full drop-shadow-md" preserveAspectRatio="xMidYMid meet">
                        ${bg}
                        ${bgExtras}
                        <g id="items-layer">${itemsHtml}</g>
                    </svg>`;
                }
            }
        })();

        const App = (function() {
            let currentQIndex = 0;
            let score = 0;
            let stars = 0;
            let shuffledQuestions = [];
            let firstTry = true;

            const screens = {
                start: document.getElementById('start-screen'),
                game: document.getElementById('game-screen'),
                end: document.getElementById('end-screen')
            };
            const ui = {
                storyText: document.getElementById('story-text'),
                questionText: document.getElementById('question-text'),
                storyVisual: document.getElementById('story-visual'),
                choices: document.querySelectorAll('.choice-btn'),
                progressBar: document.getElementById('progress-bar'),
                starCount: document.getElementById('star-count'),
                feedbackPanel: document.getElementById('feedback-panel'),
                feedbackBg: document.getElementById('feedback-bg'),
                feedbackIcon: document.getElementById('feedback-icon'),
                feedbackTitle: document.getElementById('feedback-title'),
                feedbackMsg: document.getElementById('feedback-msg'),
                btnNext: document.getElementById('btn-next'),
                btnSpeak: document.getElementById('btn-speak')
            };

            const shuffle = array => array.sort(() => Math.random() - 0.5);
            const showScreen = name => {
                Object.values(screens).forEach(s => s.classList.remove('active'));
                screens[name].classList.add('active');
            };

            const formatStoryText = (text) => text.replace(/\b(\d+)\b/g, '<span class="highlight-number">$1</span>');

            const speakText = (text) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.9;
                    utterance.pitch = 1.1; 
                    window.speechSynthesis.speak(utterance);
                }
            };

            function bindEvents() {
                document.getElementById('btn-start').addEventListener('click', () => {
                    AudioEngine.init();
                    AudioEngine.click();
                    startGame();
                });
                
                const sndBtn = document.getElementById('btn-sound-toggle');
                sndBtn.addEventListener('click', () => {
                    const isEn = AudioEngine.toggle();
                    document.getElementById('icon-sound-on').classList.toggle('hidden', !isEn);
                    document.getElementById('icon-sound-off').classList.toggle('hidden', isEn);
                });

                document.getElementById('btn-home').addEventListener('click', () => {
                    AudioEngine.click();
                    showScreen('start');
                });

                document.getElementById('btn-replay').addEventListener('click', () => {
                    AudioEngine.click();
                    startGame();
                });

                ui.btnSpeak.addEventListener('click', () => {
                    const q = shuffledQuestions[currentQIndex];
                    speakText(q.text + " " + q.question);
                });

                ui.choices.forEach(btn => {
                    btn.addEventListener('touchstart', () => btn.classList.add('pressed'), {passive:true});
                    btn.addEventListener('touchend', () => btn.classList.remove('pressed'), {passive:true});
                    btn.addEventListener('mousedown', () => btn.classList.add('pressed'));
                    btn.addEventListener('mouseup', () => btn.classList.remove('pressed'));
                    btn.addEventListener('mouseleave', () => btn.classList.remove('pressed'));
                    
                    btn.addEventListener('click', (e) => handleAnswer(e.currentTarget));
                });

                ui.btnNext.addEventListener('click', () => {
                    ui.feedbackPanel.classList.add('translate-y-full'); 
                    if(ui.btnNext.dataset.correct === 'true') {
                        currentQIndex++;
                        if (currentQIndex < shuffledQuestions.length) {
                            loadQuestion();
                        } else {
                            endGame();
                        }
                    }
                });
            }

            function startGame() {
                currentQIndex = 0;
                score = 0;
                stars = 0;
                updateStats();
                shuffledQuestions = shuffle([...gameData]); 
                loadQuestion();
                showScreen('game');
            }

            function loadQuestion() {
                firstTry = true;
                const q = shuffledQuestions[currentQIndex];
                
                ui.progressBar.style.width = `${((currentQIndex) / shuffledQuestions.length) * 100}%`;
                ui.storyText.innerHTML = formatStoryText(q.text);
                ui.questionText.innerText = q.question;
                ui.storyVisual.innerHTML = SceneRenderer.render(q);

                const answers = shuffle([q.correctAnswer, ...q.wrongAnswers]);
                const colors = ['text-brand-blue', 'text-brand-purpleDark', 'text-brand-orangeDark'];
                
                ui.choices.forEach((btn, idx) => {
                    btn.disabled = false;
                    btn.className = `choice-btn btn-3d bg-white border-2 border-gray-200 font-black text-3xl sm:text-4xl py-6 rounded-3xl shadow-card hover:bg-gray-50 transition-colors ${colors[idx]}`;
                    btn.querySelector('.choice-text').innerText = answers[idx];
                    btn.dataset.answer = answers[idx];
                });
            }

            function handleAnswer(btn) {
                if (btn.disabled) return;
                
                const q = shuffledQuestions[currentQIndex];
                const isCorrect = btn.dataset.answer === q.correctAnswer;
                
                ui.choices.forEach(b => b.disabled = true);

                if (isCorrect) {
                    AudioEngine.correct();
                    if (firstTry) {
                        score++;
                        stars++;
                        updateStats();
                    }
                    
                    btn.classList.remove('bg-white', 'border-gray-200', 'shadow-card');
                    btn.classList.add('bg-brand-green', 'border-brand-greenDark', 'shadow-btn-green', 'text-white');
                    
                    showFeedback(true);
                } else {
                    AudioEngine.wrong();
                    firstTry = false;
                    
                    btn.classList.remove('bg-white', 'border-gray-200', 'shadow-card');
                    btn.classList.add('bg-brand-red', 'border-brand-redDark', 'shadow-none', 'text-white', 'opacity-60');
                    
                    showFeedback(false);
                }
            }

            function showFeedback(isCorrect) {
                ui.feedbackPanel.classList.remove('translate-y-full');
                ui.btnNext.dataset.correct = isCorrect;
                
                if (isCorrect) {
                    ui.feedbackBg.className = 'w-full p-6 sm:p-10 rounded-t-[2rem] border-t-2 bg-[#d7ffb8] border-[#b8f28b] text-brand-greenDark';
                    ui.feedbackIcon.innerHTML = `<svg class="w-12 h-12 text-brand-green" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="5" d="M5 13l4 4L19 7"></path></svg>`;
                    ui.feedbackTitle.innerText = "Great job!";
                    ui.feedbackMsg.innerText = "That's exactly right!";
                    ui.btnNext.className = 'btn-3d w-full sm:w-auto text-2xl font-black py-4 px-12 rounded-2xl tracking-widest uppercase bg-brand-green text-white shadow-btn-green border-2 border-brand-greenDark hover:bg-brand-greenLight transition-colors';
                } else {
                    ui.feedbackBg.className = 'w-full p-6 sm:p-10 rounded-t-[2rem] border-t-2 bg-[#ffdfe0] border-[#ffb3b8] text-brand-redDark';
                    ui.feedbackIcon.innerHTML = `<svg class="w-12 h-12 text-brand-red" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="5" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                    ui.feedbackTitle.innerText = "Try again!";
                    ui.feedbackMsg.innerText = "Let's pick another answer.";
                    ui.btnNext.className = 'btn-3d w-full sm:w-auto text-2xl font-black py-4 px-12 rounded-2xl tracking-widest uppercase bg-brand-red text-white shadow-none border-b-4 border-brand-redDark hover:bg-brand-redLight transition-colors';
                    
                    ui.btnNext.onclick = () => {
                        ui.feedbackPanel.classList.add('translate-y-full');
                        ui.choices.forEach(b => {
                            if (!b.classList.contains('bg-brand-red')) b.disabled = false; 
                        });
                        ui.btnNext.onclick = null;
                    };
                }
            }

            function updateStats() {
                ui.starCount.innerText = stars;
            }

            function endGame() {
                showScreen('end');
                document.getElementById('final-score').innerText = `${score} / ${shuffledQuestions.length}`;
                document.getElementById('final-stars').innerHTML = `<svg class="w-10 h-10 mr-2 text-brand-yellow" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg> ${stars}`;
                
                const title = document.getElementById('end-title');
                if (score === 10) {
                    title.innerText = "Perfect Score!\nYou are a Math Star!";
                    title.className = "text-5xl sm:text-6xl font-black mb-6 drop-shadow-md text-brand-purple whitespace-pre-line leading-tight";
                } else if (score >= 7) {
                    title.innerText = "Amazing Work!";
                    title.className = "text-5xl sm:text-6xl font-black mb-6 drop-shadow-md text-brand-green";
                } else {
                    title.innerText = "Good Try!\nKeep practicing!";
                    title.className = "text-5xl sm:text-6xl font-black mb-6 drop-shadow-md text-brand-blue whitespace-pre-line leading-tight";
                }

                AudioEngine.win();
                triggerConfetti();
            }

            return { init: bindEvents };
        })();

        function triggerConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const pieces = [];
            const colors = ['#58cc02', '#1cb0f6', '#ffc800', '#ff4b4b', '#ce82ff', '#ff9600'];
            
            for (let i = 0; i < 200; i++) {
                pieces.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height * 1.5,
                    w: Math.random() * 15 + 8,
                    h: Math.random() * 15 + 8,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    speedY: Math.random() * 5 + 3,
                    speedX: Math.random() * 4 - 2,
                    rot: Math.random() * 360,
                    rotSpeed: Math.random() * 10 - 5
                });
            }

            let animationId;
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let active = false;
                pieces.forEach(p => {
                    p.y += p.speedY;
                    p.x += p.speedX;
                    p.rot += p.rotSpeed;
                    if (p.y < canvas.height) active = true;
                    
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rot * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
                    ctx.restore();
                });
                
                if (active) animationId = requestAnimationFrame(animate);
                else ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
            animate();
            
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }, {once: true}); 

            setTimeout(() => {
                cancelAnimationFrame(animationId);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }, 7000);
        }

        window.onload = App.init;
    </script>
