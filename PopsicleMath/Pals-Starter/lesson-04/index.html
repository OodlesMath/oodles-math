<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Bear Math Adventure - V13</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --p1-color: #3b82f6;
            --p2-color: #ef4444;
        }

        body {
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            /* Bầu trời xanh dương trong vắt */
            background: linear-gradient(180deg, #0ea5e9 0%, #38bdf8 30%, #7dd3fc 65%, #bae6fd 100%);
            user-select: none;
            touch-action: manipulation;
        }

        .font-game { font-weight: 900; }

        /* Mặt trời góc TRÁI */
        .sun {
            position: absolute;
            top: -20px;
            left: -20px;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, #fef08a 0%, #f59e0b 80%);
            border-radius: 50%;
            box-shadow: 0 0 60px #fcd34d, 0 0 120px #fde047;
            animation: pulse-sun 4s infinite alternate;
            z-index: 0;
        }
        @keyframes pulse-sun {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(1.05); opacity: 1; }
        }

        /* Mây trôi chậm rãi */
        .cloud {
            position: absolute;
            background: #ffffff;
            border-radius: 50px;
            opacity: 0.9;
            z-index: 1;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
        }
        
        .cloud-1 { width: 150px; height: 50px; top: 10%; left: -200px; animation: float 60s linear infinite; }
        .cloud-1::before { width: 80px; height: 80px; top: -35px; left: 20px; }
        .cloud-1::after { width: 60px; height: 60px; top: -25px; right: 25px; }

        .cloud-2 { width: 200px; height: 65px; top: 35%; left: -250px; animation: float 85s linear infinite 10s; opacity: 0.7;}
        .cloud-2::before { width: 100px; height: 100px; top: -45px; left: 35px; }
        .cloud-2::after { width: 70px; height: 70px; top: -30px; right: 35px; }

        .cloud-3 { width: 120px; height: 40px; top: 20%; left: -150px; animation: float 55s linear infinite 25s; }
        .cloud-3::before { width: 60px; height: 60px; top: -25px; left: 15px; }
        .cloud-3::after { width: 50px; height: 50px; top: -15px; right: 15px; }

        @keyframes float {
            from { transform: translateX(0); left: -250px; }
            to { transform: translateX(100vw); left: 100%; }
        }

        /* Đường đua trung tâm (Desktop) */
        .race-track {
            position: absolute;
            left: 50%;
            bottom: 0;
            transform: translateX(-50%);
            width: 280px;
            height: 70%; 
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(8px);
            border-radius: 120px 120px 0 0;
            border: 6px solid rgba(255, 255, 255, 0.6);
            display: flex;
            justify-content: space-around;
            z-index: 20;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
            padding: 0 10px;
        }

        .tree-trunk {
            position: relative;
            width: 60px;
            height: 100%;
            background: linear-gradient(to right, #8b5a2b, #a1887f, #8b5a2b);
            border-radius: 10px;
            box-shadow: inset 4px 0 10px rgba(0,0,0,0.3);
        }

        .climb-step {
            position: absolute;
            left: -15px;
            width: 90px;
            height: 10px;
            background: linear-gradient(to bottom, #4ade80, #16a34a);
            border-radius: 20px;
            border-bottom: 3px solid #14532d;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .bear {
            position: absolute;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: bottom 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 30;
            filter: drop-shadow(0 8px 8px rgba(0,0,0,0.4));
            margin-left: -20px; /* Căn chỉnh để gấu ôm vào thân cây */
        }

        .svg-icon {
            width: 100%;
            height: 100%;
        }

        /* Phần thưởng: Tổ ong */
        .goal-item {
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
            animation: bounce-hive 3s infinite ease-in-out;
            filter: drop-shadow(0 6px 6px rgba(0,0,0,0.3));
        }

        @keyframes bounce-hive {
            0%, 100% { transform: translateX(-50%) rotate(-3deg); }
            50% { transform: translateX(-50%) rotate(3deg); }
        }

        /* Hiệu ứng Ngủ 3 giây / Ong đốt */
        .frozen-area {
            /* Ửng đỏ khi trả lời sai (Bị ong đốt) */
            filter: sepia(0.5) hue-rotate(-30deg) saturate(2) brightness(0.9);
            pointer-events: none;
            transition: filter 0.2s;
        }
        
        .bee-swarm {
            position: absolute;
            font-size: 35px;
            z-index: 50;
            text-shadow: 0 4px 6px rgba(0,0,0,0.4);
            pointer-events: none;
        }

        .bee-0 { animation: swarm1 0.3s infinite alternate; top: -15px; left: -15px; }
        .bee-1 { animation: swarm2 0.4s infinite alternate; top: -25px; right: -15px; }
        .bee-2 { animation: swarm3 0.35s infinite alternate; top: 15px; right: -25px; }

        @keyframes swarm1 { 0% { transform: translate(0,0) rotate(-15deg); } 100% { transform: translate(20px,-20px) rotate(15deg); } }
        @keyframes swarm2 { 0% { transform: translate(0,0) rotate(20deg); } 100% { transform: translate(-25px,-15px) rotate(-20deg); } }
        @keyframes swarm3 { 0% { transform: translate(0,0) rotate(-25deg); } 100% { transform: translate(-20px,20px) rotate(25deg); } }

        /* Bảng Kẹo */
        .candy-box {
            background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(248,250,252,0.95) 100%);
            border-radius: 45px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15), inset 0 -10px 20px rgba(0,0,0,0.05);
            border: 8px solid #ffffff;
            transition: transform 0.3s, filter 0.3s;
            position: relative;
        }
        .candy-box::before {
            content: '';
            position: absolute;
            top: 15px; left: 25px; right: 25px; height: 30%;
            background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 100%);
            border-radius: 30px;
            pointer-events: none;
            z-index: 1;
        }

        /* Nút tùy chọn Setting */
        .setting-btn {
            transition: all 0.2s;
            border: 4px solid #e2e8f0;
            background: white;
            color: #64748b;
            box-shadow: 0 6px 0 #cbd5e1;
        }
        .setting-btn.active {
            background-color: #10b981;
            color: white;
            border-color: #047857;
            box-shadow: 0 6px 0 #064e3b;
            transform: scale(1.1) translateY(-2px);
        }

        /* Token 3D */
        .token {
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            position: relative;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-shadow: 2px 2px 0 rgba(255,255,255,0.7);
        }

        .token-main { 
            background: radial-gradient(circle at 30% 30%, #dcfce7 0%, #4ade80 100%);
            border: 6px solid #ffffff;
            box-shadow: 0 15px 0 #16a34a, 0 20px 20px rgba(0,0,0,0.15), inset 0 -8px 15px rgba(0,0,0,0.1);
            color: #14532d; 
            width: 110px; height: 110px; font-size: 55px; 
            z-index: 20;
        }
        .token-p1 { 
            background: radial-gradient(circle at 30% 30%, #dbeafe 0%, #60a5fa 100%);
            border: 5px solid #ffffff;
            box-shadow: 0 12px 0 #2563eb, 0 15px 15px rgba(0,0,0,0.15), inset 0 -6px 10px rgba(0,0,0,0.1);
            color: #1e3a8a; 
            width: 80px; height: 80px; font-size: 40px; 
        }
        .token-p2 { 
            background: radial-gradient(circle at 30% 30%, #fee2e2 0%, #f87171 100%);
            border: 5px solid #ffffff;
            box-shadow: 0 12px 0 #dc2626, 0 15px 15px rgba(0,0,0,0.15), inset 0 -6px 10px rgba(0,0,0,0.1);
            color: #7f1d1d; 
            width: 80px; height: 80px; font-size: 40px; 
        }

        .token::after {
            content: '';
            position: absolute;
            top: 5%; left: 15%; right: 15%; height: 35%;
            background: linear-gradient(180deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 100%);
            border-radius: 50%;
            pointer-events: none;
        }

        .bond-line {
            stroke: #cbd5e1;
            stroke-width: 14;
            stroke-linecap: round;
            fill: none;
            transition: 0.4s;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1));
        }
        .bond-line-active { 
            stroke: #f59e0b; 
            stroke-dasharray: 15, 15; 
            animation: dashmove 1s linear infinite; 
            stroke-width: 18;
            filter: drop-shadow(0 0 10px #fcd34d);
        }
        @keyframes dashmove { to { stroke-dashoffset: -30; } }

        /* Nút bấm đồ chơi 3D */
        .toy-button {
            position: relative;
            border-radius: 30px;
            font-weight: 900;
            font-size: 45px;
            transition: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            overflow: hidden;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
            color: white;
            border: 4px solid rgba(255,255,255,0.5);
        }
        .toy-button::after {
            content: '';
            position: absolute;
            top: 2px; left: 5%; right: 5%; height: 35%;
            background: linear-gradient(180deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0) 100%);
            border-radius: 20px;
            pointer-events: none;
        }

        .btn-blue { 
            background: linear-gradient(180deg, #60a5fa 0%, #3b82f6 100%);
            box-shadow: 0 12px 0 #1d4ed8, 0 15px 20px rgba(0,0,0,0.2); 
        }
        .btn-blue:active { transform: translateY(8px); box-shadow: 0 4px 0 #1d4ed8, 0 5px 10px rgba(0,0,0,0.15); }
        
        .btn-red { 
            background: linear-gradient(180deg, #f87171 0%, #ef4444 100%);
            box-shadow: 0 12px 0 #b91c1c, 0 15px 20px rgba(0,0,0,0.2); 
        }
        .btn-red:active { transform: translateY(8px); box-shadow: 0 4px 0 #b91c1c, 0 5px 10px rgba(0,0,0,0.15); }
        
        .correct-flash { 
            background: linear-gradient(180deg, #4ade80 0%, #22c55e 100%) !important; 
            border-color: #ffffff !important; 
            box-shadow: 0 12px 0 #14532d, 0 15px 20px rgba(0,0,0,0.3) !important; 
            color: white !important;
        }

        .pulse-target { animation: pulse-glow 1.5s infinite; }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0px rgba(251, 191, 36, 0.6), 0 12px 0 var(--shadow-col, #cbd5e1); transform: scale(1); }
            50% { box-shadow: 0 0 0 20px rgba(251, 191, 36, 0), 0 12px 0 var(--shadow-col, #cbd5e1); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0px rgba(251, 191, 36, 0), 0 12px 0 var(--shadow-col, #cbd5e1); transform: scale(1); }
        }

        .completed-part {
            background: radial-gradient(circle at 30% 30%, #f0fdf4 0%, #bbf7d0 100%) !important;
            color: #14532d !important;
            border-color: #4ade80 !important;
            --shadow-col: #22c55e;
            box-shadow: 0 12px 0 var(--shadow-col), inset 0 -4px 10px rgba(0,0,0,0.1) !important;
            text-shadow: none !important;
        }

        .pop-in { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop {
            0% { transform: scale(0.3); opacity: 0; }
            80% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }

        .math-text {
            text-shadow: 3px 3px 0 rgba(0,0,0,0.1);
            color: #334155;
        }

        /* Hào quang chiến thắng */
        .victory-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 150vw; height: 150vw;
            background: radial-gradient(circle, rgba(253,224,71,0.5) 0%, rgba(0,0,0,0) 50%);
            animation: spin-glow 15s linear infinite;
            z-index: -1;
            pointer-events: none;
        }
        @keyframes spin-glow { 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        /* Đồng hồ dùng chung */
        .global-timer {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 8px 30px;
            border-radius: 50px;
            border: 6px solid #facc15;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            font-size: 32px;
            font-weight: 900;
            color: #334155;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .race-track { display: none; }
            .mobile-track { display: flex; flex-direction: column; justify-content: flex-end; align-items: center; position: absolute; bottom: 0; height: 100%; z-index: 10; }
            .mobile-track-left { left: 5px; }
            .mobile-track-right { right: 5px; }
            .tree-trunk { width: 50px; }
            .climb-step { width: 75px; left: -12.5px; }
            .bear { width: 85px; height: 85px; margin-left: -15px; }
            .goal-item { width: 80px; height: 80px; top: -85px; }
            
            .candy-box { max-width: 90%; margin: 0 auto; padding: 20px; border-radius: 35px; border-width: 6px; }
            .token-main { width: 90px; height: 90px; font-size: 45px; }
            .token-p1, .token-p2 { width: 70px; height: 70px; font-size: 35px; border-width: 4px; box-shadow: 0 8px 0 #cbd5e1; }
            .toy-button { font-size: 36px; height: 65px; border-radius: 20px; border-width: 4px; box-shadow: 0 8px 0 #cbd5e1; }
            .toy-button:active { transform: translateY(5px); box-shadow: 0 3px 0 #cbd5e1; }
            
            #main-container { flex-direction: column; justify-content: center; gap: 25px; padding-top: 80px;}
            .player-area { width: 100%; padding: 0 75px; }
            
            .start-controls { flex-direction: column; gap: 15px; }
        }
        @media (min-width: 1025px) {
            .mobile-track { display: none; }
            .start-controls { flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 20px; }
        }
    </style>
</head>

    <script>
        // Bơm SVG trực tiếp vào DOM khi load
        window.onload = () => {
            document.getElementById('trophy-container').innerHTML = svgIcons.trophy;
            
            document.querySelectorAll('.hive-icon-container').forEach(el => {
                el.innerHTML = svgIcons.honey;
            });
            
            document.querySelectorAll('.bear-icon-container').forEach(el => {
                el.innerHTML = svgIcons.bear;
            });
        };

        // --- HỆ THỐNG ÂM THANH Web Audio API ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        const sounds = {
            click: () => {
                if(audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            },
            pop: () => {
                if(audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            },
            correct: () => { 
                if(audioCtx.state === 'suspended') audioCtx.resume();
                [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => {
                    setTimeout(() => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(f, audioCtx.currentTime);
                        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                        osc.connect(gain); gain.connect(audioCtx.destination);
                        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
                    }, i * 80);
                });
            },
            wrong: () => { 
                if(audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(250, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            },
            buzz: () => { 
                if(audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                
                osc.frequency.linearRampToValueAtTime(180, audioCtx.currentTime + 0.5);
                osc.frequency.linearRampToValueAtTime(120, audioCtx.currentTime + 1.0);
                osc.frequency.linearRampToValueAtTime(180, audioCtx.currentTime + 1.5);
                osc.frequency.linearRampToValueAtTime(120, audioCtx.currentTime + 2.0);
                osc.frequency.linearRampToValueAtTime(180, audioCtx.currentTime + 2.5);
                osc.frequency.linearRampToValueAtTime(120, audioCtx.currentTime + 3.0);
                
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 2.8);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 3.0);
                
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 3.0);
            },
            win: () => {
                if(audioCtx.state === 'suspended') audioCtx.resume();
                [523.25, 659.25, 783.99, 1046.50, 1318.51].forEach((f, i) => {
                    setTimeout(() => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(f, audioCtx.currentTime);
                        gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                        osc.connect(gain); gain.connect(audioCtx.destination);
                        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
                    }, i * 150);
                });
            }
        };

        // --- CÀI ĐẶT GAME ---
        let gameMode = 'pvp';
        let mathRange = 20;   
        let totalTime = 120;
        
        let p1Score = 0, p2Score = 0;
        let p1State = 'b1', p2State = 'b1';
        let p1Prob, p2Prob;
        let gameActive = false;
        let timeLeft = 120;
        let timerInterval, botInterval;
        let p1Frozen = false, p2Frozen = false;
        let victoryConfettiInterval;

        function setMode(mode, btn) {
            sounds.click();
            gameMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function setTime(sec, btn) {
            sounds.click();
            totalTime = sec;
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function setRange(range, btn) {
            sounds.click();
            mathRange = range;
            document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function formatTime(s) {
            const m = Math.floor(s/60);
            const sec = s % 60;
            return `${m}:${sec < 10 ? '0':''}${sec}`;
        }

        function createTreeSteps() {
            ['1', '2', 'm1', 'm2'].forEach(id => {
                const tree = document.getElementById(`tree-${id}`);
                if(!tree) return;
                for(let i=0; i<15; i++) {
                    const step = document.createElement('div');
                    step.className = 'climb-step';
                    step.style.bottom = `${i * 6.5}%`;
                    tree.appendChild(step);
                }
            });
        }
        createTreeSteps();

        function startGame() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            sounds.pop();
            document.getElementById('start-screen').classList.add('hidden');
            
            // Hiển thị Timer
            document.getElementById('global-timer-box').classList.remove('hidden');

            // Cài đặt hiển thị Bot/Player
            if(gameMode === 'pve') {
                document.getElementById('p2-label').innerText = 'BOT 🤖';
                document.getElementById('team2-title-end').innerText = 'BOT 🤖';
                document.getElementById('bear-2').innerHTML = svgIcons.bot;
                document.getElementById('bear-m2').innerHTML = svgIcons.bot;
            }

            gameActive = true;
            timeLeft = totalTime;
            updateTimerDisplay();
            
            nextProblem(1);
            nextProblem(2);

            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if(timeLeft <= 0) endGame();
            }, 1000);

            if(gameMode === 'pve') startBot();
        }

        function updateTimerDisplay() {
            const t = formatTime(timeLeft);
            document.getElementById('global-timer-text').innerText = t;
            // Đổi màu cảnh báo 10s cuối
            if(timeLeft <= 10) {
                document.getElementById('global-timer-box').style.borderColor = '#ef4444';
                document.getElementById('global-timer-text').style.color = '#ef4444';
                sounds.click();
            }
        }

        function generateProblem() {
            let n1, b1, b2, n2, total;
            let valid = false;
            while(!valid) {
                let maxTens = Math.max(0, Math.floor(mathRange / 10) - 1);
                let tens = Math.floor(Math.random() * (maxTens + 1));
                let units = Math.floor(Math.random() * 3) + 7; 
                n1 = (tens * 10) + units;
                
                if (n1 >= mathRange - 2) continue; 
                
                b1 = 10 - units; 
                b2 = Math.floor(Math.random() * 6) + 1; 
                n2 = b1 + b2;
                total = n1 + n2;
                
                if(total <= mathRange && n1 > 0) valid = true;
            }
            return { n1, n2, b1, b2, total };
        }

        function nextProblem(p) {
            const prob = generateProblem();
            if (p === 1) { p1Prob = prob; p1State = 'b1'; }
            else { p2Prob = prob; p2State = 'b1'; }
            updateUI(p);
        }

        function updateUI(p) {
            const state = (p === 1) ? p1State : p2State;
            const prob = (p === 1) ? p1Prob : p2Prob;
            const prefix = `p${p}`;

            document.getElementById(`${prefix}-num1`).innerText = prob.n1;
            document.getElementById(`${prefix}-num2`).innerText = prob.n2;

            const b1Box = document.getElementById(`${prefix}-b1-box`);
            const b2Box = document.getElementById(`${prefix}-b2-box`);
            const totalBox = document.getElementById(`${prefix}-total-box`);
            const l1 = document.getElementById(`${prefix}-line1`);
            const l2 = document.getElementById(`${prefix}-line2`);

            [b1Box, b2Box, totalBox].forEach(el => {
                el.classList.remove('pulse-target', 'completed-part', 'pop-in');
            });
            l1.classList.remove('bond-line-active');
            l2.classList.remove('bond-line-active');

            let correctVal;
            if (state === 'b1') {
                document.getElementById(`${prefix}-bond1`).innerText = '?';
                document.getElementById(`${prefix}-bond2`).innerText = '?';
                document.getElementById(`${prefix}-total`).innerText = '?';
                b1Box.classList.add('pulse-target');
                l1.classList.add('bond-line-active');
                correctVal = prob.b1;
            } else if (state === 'b2') {
                document.getElementById(`${prefix}-bond1`).innerText = prob.b1;
                document.getElementById(`${prefix}-bond2`).innerText = '?';
                b1Box.classList.add('completed-part', 'pop-in');
                b2Box.classList.add('pulse-target');
                l2.classList.add('bond-line-active');
                correctVal = prob.b2;
            } else {
                document.getElementById(`${prefix}-bond1`).innerText = prob.b1;
                document.getElementById(`${prefix}-bond2`).innerText = prob.b2;
                b1Box.classList.add('completed-part');
                b2Box.classList.add('completed-part', 'pop-in');
                totalBox.classList.add('pulse-target');
                correctVal = prob.total;
            }
            renderChoices(p, correctVal);
        }

        function renderChoices(p, correct) {
            const container = document.getElementById(`p${p}-choices`);
            container.innerHTML = '';
            let choices = [correct];
            while(choices.length < 4) {
                let diff = Math.floor(Math.random() * 9) - 4; 
                if (diff === 0) diff = 1;
                let r = correct + diff;
                if (r >= 0 && r <= mathRange + 10 && !choices.includes(r)) choices.push(r);
            }
            choices.sort(() => Math.random() - 0.5);

            choices.forEach(val => {
                const btn = document.createElement('button');
                btn.className = `toy-button btn-${p === 1 ? 'blue' : 'red'}`;
                btn.innerText = val;
                btn.onclick = () => handleChoice(p, val, correct, btn);
                container.appendChild(btn);
            });
        }

        function handleChoice(p, val, correct, btn) {
            if (!gameActive) return;
            if ((p === 1 && p1Frozen) || (p === 2 && p2Frozen)) return;

            if (val === correct) {
                btn.classList.add('correct-flash');
                if ((p === 1 && p1State === 'b1') || (p === 2 && p2State === 'b1')) {
                    sounds.pop();
                    p === 1 ? p1State = 'b2' : p2State = 'b2';
                    setTimeout(() => updateUI(p), 250);
                } else if ((p === 1 && p1State === 'b2') || (p === 2 && p2State === 'b2')) {
                    sounds.pop();
                    p === 1 ? p1State = 'total' : p2State = 'total';
                    setTimeout(() => updateUI(p), 250);
                } else {
                    sounds.correct();
                    p === 1 ? p1Score++ : p2Score++;
                    updateScoreAndCheckWinner();
                    setTimeout(() => nextProblem(p), 400);
                }
            } else {
                sounds.wrong();
                btn.classList.add('opacity-30');
                freezePlayer(p);
            }
        }

        function freezePlayer(p) {
            if(p === 1) p1Frozen = true; else p2Frozen = true;
            const area = document.getElementById(`p${p}-area`);
            area.classList.add('wrong-shake', 'frozen-area');
            setTimeout(() => area.classList.remove('wrong-shake'), 400);

            sounds.buzz();

            const bears = [document.getElementById(`bear-${p}`), document.getElementById(`bear-m${p}`)];
            bears.forEach(b => {
                if(!b) return;
                for(let i=0; i<3; i++) {
                    const bee = document.createElement('div');
                    bee.innerText = '🐝';
                    bee.className = `bee-swarm bee-${i}`;
                    b.appendChild(bee);
                }
            });

            setTimeout(() => {
                if(!gameActive) return;
                if(p === 1) p1Frozen = false; else p2Frozen = false;
                area.classList.remove('frozen-area');
                document.querySelectorAll(`#bear-${p} .bee-swarm, #bear-m${p} .bee-swarm`).forEach(el => el.remove());
            }, 3000);
        }

        function startBot() {
            if(!gameActive || gameMode !== 'pve') return;
            
            let thinkTime = Math.random() * 1500 + 1500; 
            
            botInterval = setTimeout(() => {
                if(gameActive && !p2Frozen) {
                    let correct;
                    if(p2State === 'b1') correct = p2Prob.b1;
                    else if(p2State === 'b2') correct = p2Prob.b2;
                    else correct = p2Prob.total;

                    let chosenVal = correct;
                    if(Math.random() < 0.15) chosenVal = correct + 1;

                    const buttons = document.getElementById('p2-choices').getElementsByTagName('button');
                    let targetBtn = buttons[0];
                    for(let btn of buttons) {
                        if(parseInt(btn.innerText) === chosenVal) targetBtn = btn;
                    }
                    if(targetBtn) targetBtn.click();
                }
                startBot(); 
            }, thinkTime);
        }

        function updateScoreAndCheckWinner() {
            document.getElementById('score-1').innerText = p1Score;
            document.getElementById('score-2').innerText = p2Score;
            
            const gap = Math.abs(p1Score - p2Score);
            document.getElementById('gap-info').innerText = `Gap: ${gap}`;

            const h1 = Math.min(p1Score * 6.5, 85) + '%';
            const h2 = Math.min(p2Score * 6.5, 85) + '%';
            document.getElementById('bear-1').style.bottom = h1;
            document.getElementById('bear-m1').style.bottom = h1;
            document.getElementById('bear-2').style.bottom = h2;
            document.getElementById('bear-m2').style.bottom = h2;

            if (gap >= 3) endGame();
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);
            clearTimeout(botInterval);
            document.getElementById('global-timer-box').classList.add('hidden');
            sounds.win();
            
            let winner = 0;
            if (p1Score > p2Score) winner = 1;
            else if (p2Score > p1Score) winner = 2;

            if(winner !== 0) {
                const bd = document.getElementById(`bear-${winner}`);
                const bm = document.getElementById(`bear-m${winner}`);
                bd.style.bottom = '95%'; bm.style.bottom = '95%';
            }

            startVictoryConfetti();

            setTimeout(() => {
                document.getElementById('game-over').classList.remove('hidden');
                const winName = document.getElementById('winner-name');
                if (winner === 1) {
                    winName.innerText = "TEAM 1 WINS!";
                    winName.className = "text-5xl lg:text-7xl font-game mb-2 uppercase text-blue-500";
                } else if (winner === 2) {
                    winName.innerText = gameMode === 'pve' ? "BOT WINS!" : "TEAM 2 WINS!";
                    winName.className = "text-5xl lg:text-7xl font-game mb-2 uppercase text-red-500";
                } else {
                    winName.innerText = "DRAW!";
                    winName.className = "text-5xl lg:text-7xl font-game mb-2 uppercase text-yellow-500";
                }
                document.getElementById('final-score-1').innerText = p1Score;
                document.getElementById('final-score-2').innerText = p2Score;
            }, 1000);
        }

        function startVictoryConfetti() {
            victoryConfettiInterval = setInterval(() => {
                confetti({ 
                    particleCount: 15, 
                    spread: 100, 
                    origin: { y: 0.6, x: Math.random() },
                    colors: ['#3b82f6', '#ef4444', '#fcd34d', '#4ade80', '#c084fc']
                });
            }, 300);
        }
    </script>
</body>
