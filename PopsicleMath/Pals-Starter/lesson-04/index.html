<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make 10 Monkey Climb - V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            /* Bright kid-friendly background */
            background: linear-gradient(180deg, #60a5fa 0%, #bae6fd 60%, #86efac 60%, #4ade80 100%);
            user-select: none;
            touch-action: manipulation;
        }
        .font-game { font-family: 'Poppins', sans-serif; font-weight: 900; }
        
        /* Cloud Decorations */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 100px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            z-index: -10;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .cloud1 { width: 120px; height: 40px; top: 10%; left: 10%; animation: float 6s ease-in-out infinite; }
        .cloud1::before { width: 60px; height: 60px; top: -30px; left: 15px; }
        .cloud1::after { width: 40px; height: 40px; top: -15px; right: 20px; }
        
        .cloud2 { width: 160px; height: 50px; top: 25%; right: 15%; animation: float 8s ease-in-out infinite reverse; }
        .cloud2::before { width: 80px; height: 80px; top: -40px; left: 20px; }
        .cloud2::after { width: 60px; height: 60px; top: -20px; right: 25px; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Tree Styling - Moved to extreme edges */
        .tree-container {
            position: absolute;
            bottom: 0;
            width: 50px;
            height: 100%; 
            background: linear-gradient(to right, #78350f, #92400e, #78350f);
            box-shadow: inset -4px 0 10px rgba(0,0,0,0.5), 8px 0 15px rgba(0,0,0,0.2);
            z-index: 30;
        }
        @media (min-width: 768px) {
            .tree-container { width: 80px; border-top-left-radius: 40px; border-top-right-radius: 40px; height: 90%; }
        }
        
        .climb-step {
            position: absolute;
            left: -10%;
            width: 120%;
            height: 8px;
            background: linear-gradient(to bottom, #4ade80, #15803d);
            border-radius: 10px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }
        
        .monkey {
            position: absolute;
            width: 100%;
            height: auto;
            font-size: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: bottom 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 40;
            filter: drop-shadow(0 6px 8px rgba(0,0,0,0.4));
        }
        @media (min-width: 768px) { .monkey { font-size: 4rem; } }

        .goal-banana {
            position: absolute;
            top: 2%;
            font-size: 2.5rem;
            z-index: 50;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            animation: bounce 1.5s infinite;
        }
        @media (min-width: 768px) { .goal-banana { font-size: 4rem; top: -5%; } }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.1); }
        }

        /* Toy-like Buttons */
        .toy-btn {
            transition: all 0.1s;
            border: 4px solid rgba(255,255,255,0.4);
            box-shadow: 0 8px 0 rgba(0,0,0,0.2), inset 0 -4px 0 rgba(0,0,0,0.1);
        }
        .toy-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 rgba(0,0,0,0.2), inset 0 -2px 0 rgba(0,0,0,0.1);
        }

        .team-blue-btn { background: linear-gradient(180deg, #3b82f6, #2563eb); }
        .team-red-btn { background: linear-gradient(180deg, #ef4444, #dc2626); }

        .time-btn {
            background: white;
            color: #475569;
            border: 4px solid #cbd5e1;
            box-shadow: 0 6px 0 #94a3b8;
            transition: all 0.2s;
        }
        .time-btn.active {
            background: #10b981;
            color: white;
            border-color: #047857;
            box-shadow: 0 6px 0 #064e3b;
            transform: scale(1.1) translateY(-4px);
        }

        /* 3D Bubble/Token look for numbers */
        .token {
            background: white;
            border: 4px solid #e2e8f0;
            box-shadow: inset -4px -4px 10px rgba(0,0,0,0.1), inset 4px 4px 10px rgba(255,255,255,0.9), 0 6px 12px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            color: #334155;
        }

        .bond-line {
            stroke: #94a3b8; 
            stroke-width: 8;
            stroke-linecap: round;
            fill: none;
            transition: all 0.4s;
            opacity: 0.4;
        }
        .bond-line-active {
            stroke: #f59e0b;
            opacity: 1;
            stroke-width: 12;
            stroke-dasharray: 10, 10;
            animation: dash 1s linear infinite;
        }
        @keyframes dash { to { stroke-dashoffset: -20; } }

        .pulse-target {
            animation: pulse-glow 1.5s infinite;
            border-color: #fbbf24 !important;
            background-color: #fffbeb !important;
        }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0px rgba(251, 191, 36, 0.5), inset -4px -4px 10px rgba(0,0,0,0.1); transform: scale(1); }
            50% { box-shadow: 0 0 0 15px rgba(251, 191, 36, 0), inset -4px -4px 10px rgba(0,0,0,0.1); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0px rgba(251, 191, 36, 0), inset -4px -4px 10px rgba(0,0,0,0.1); transform: scale(1); }
        }

        .completed-part {
            background: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
        }

        .number-pop { animation: number-pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes number-pop {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        .wrong-shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

    </style>
</head>
<body class="h-screen w-screen flex flex-col">

    <!-- Scenic Background -->
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>

    <!-- Start Screen -->
    <div id="start-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-sky-900/60 backdrop-blur-sm p-4">

            <h1 class="text-5xl md:text-7xl font-game text-sky-500 mb-2 uppercase tracking-tighter drop-shadow-md">MONKEY CLIMB</h1>
            <p class="text-xl md:text-3xl font-bold text-emerald-500 mb-8 tracking-wider">MAKE 10 MARATHON</p>
            
            <div class="mb-8">
                <p class="text-base md:text-xl font-bold text-slate-500 mb-4 uppercase">Select Time</p>
                <div class="flex justify-center gap-3 md:gap-6">
                    <button onclick="setGameTime(120, this)" class="time-btn px-4 py-2 md:px-6 md:py-3 rounded-2xl font-game text-lg md:text-2xl active">2 MIN</button>
                    <button onclick="setGameTime(300, this)" class="time-btn px-4 py-2 md:px-6 md:py-3 rounded-2xl font-game text-lg md:text-2xl">5 MIN</button>
                    <button onclick="setGameTime(600, this)" class="time-btn px-4 py-2 md:px-6 md:py-3 rounded-2xl font-game text-lg md:text-2xl">10 MIN</button>

            <div class="flex gap-8 md:gap-16 justify-center mb-8 md:mb-12">
                <div class="flex flex-col items-center">
                    <div class="w-16 h-16 md:w-24 md:h-24 bg-blue-400 rounded-full flex items-center justify-center text-3xl md:text-5xl mb-2 shadow-inner border-4 border-white">🐒</div>
                    <span class="font-game text-base md:text-xl text-blue-500">TEAM 1</span>
                </div>
                <div class="flex flex-col items-center">
                    <div class="w-16 h-16 md:w-24 md:h-24 bg-red-400 rounded-full flex items-center justify-center text-3xl md:text-5xl mb-2 shadow-inner border-4 border-white">🐒</div>
                    <span class="font-game text-base md:text-xl text-red-500">TEAM 2</span>

            </div>
            
            <button onclick="startGame()" class="bg-yellow-400 hover:bg-yellow-300 text-yellow-900 px-12 py-4 md:px-20 md:py-6 rounded-full text-4xl md:text-6xl font-game shadow-[0_10px_0_#b45309] active:shadow-[0_0px_0_#b45309] active:translate-y-[10px] transition-all border-4 border-white">

    </div>

    <!-- Game Over Screen -->
    <div id="game-over" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 hidden p-4">
        <div class="bg-white rounded-[3rem] md:rounded-[4rem] p-8 md:p-16 text-center max-w-3xl w-full border-[12px] md:border-[16px] border-yellow-400 shadow-[0_0_50px_rgba(250,204,21,0.5)]">
            <div id="winner-emoji" class="text-7xl md:text-[10rem] mb-2 animate-bounce">🏆</div>
            <h2 class="text-5xl md:text-7xl font-game mb-8 text-emerald-500" id="winner-text">TIME'S UP!</h2>
            
            <div class="flex justify-around mb-10 md:mb-12 gap-4">
                <div class="text-blue-500 flex-1">
                    <p class="text-xl md:text-3xl font-bold mb-2 uppercase">Team 1</p>
                    <div class="bg-blue-50 p-4 md:p-8 rounded-3xl border-4 md:border-8 border-blue-200">
                        <p id="final-score-1" class="text-6xl md:text-8xl font-game">0</p>
                        <p class="text-sm md:text-lg font-bold text-blue-400 mt-2">POINTS</p>
                    </div>
                </div>
                <div class="text-red-500 flex-1">
                    <p class="text-xl md:text-3xl font-bold mb-2 uppercase">Team 2</p>
                    <div class="bg-red-50 p-4 md:p-8 rounded-3xl border-4 md:border-8 border-red-200">
                        <p id="final-score-2" class="text-6xl md:text-8xl font-game">0</p>
                        <p class="text-sm md:text-lg font-bold text-red-400 mt-2">POINTS</p>
                    </div>
                </div>
            </div>
            <button onclick="location.reload()" class="bg-emerald-500 text-white px-10 py-4 md:px-16 md:py-6 rounded-full text-3xl md:text-5xl font-game shadow-[0_8px_0_#064e3b] active:shadow-none active:translate-y-[8px] transition-all border-4 border-white">PLAY AGAIN</button>
        </div>
    </div>

    <!-- Main Gameplay Area -->
    <div class="flex-1 flex flex-col relative w-full h-full">
        
        <!-- Top Bar: Timer -->
        <div class="w-full z-20 pt-2 px-4 flex justify-center sticky top-0">
            <div class="bg-white px-8 py-2 md:py-3 rounded-full border-4 border-slate-200 shadow-lg flex items-center gap-4">
                <span class="text-3xl md:text-4xl">⏱️</span>
                <span class="text-3xl md:text-5xl font-game text-slate-700 w-24 text-center" id="timer-text">2:00</span>
            </div>
        </div>

        <!-- Trees on fixed absolute edges -->
        <div class="absolute left-0 bottom-0 w-12 md:w-20 h-full flex flex-col justify-end items-center pointer-events-none z-10">
            <div class="goal-banana">🍌</div>
            <div class="tree-container left-0" id="tree-1"></div>
            <div id="monkey-1" class="monkey">🐒</div>
        </div>
        
        <div class="absolute right-0 bottom-0 w-12 md:w-20 h-full flex flex-col justify-end items-center pointer-events-none z-10">
            <div class="goal-banana">🍌</div>
            <div class="tree-container right-0" id="tree-2"></div>
            <div id="monkey-2" class="monkey">🐒</div>
        </div>

        <!-- Center Game Area (Responsive Flex) -->
        <!-- flex-col on mobile (stack top/bottom), flex-row on lg (side by side) -->
        <div class="flex-1 flex flex-col lg:flex-row w-full h-full px-14 md:px-24 pb-4 pt-4 gap-4 overflow-hidden z-20">
            
            <!-- Team 1 Area -->
            <div class="flex-1 flex flex-col items-center justify-center bg-white/60 backdrop-blur-md rounded-[2rem] p-2 md:p-6 shadow-xl border-4 border-white relative w-full h-1/2 lg:h-full">
                <div class="absolute top-4 left-4 md:left-6 bg-blue-100 px-4 py-1 md:py-2 rounded-xl border-2 border-blue-200 shadow-sm flex items-center gap-2">
                    <span class="text-blue-500 font-bold text-sm md:text-xl">TEAM 1</span>
                    <span class="bg-blue-500 text-white px-3 py-1 rounded-lg font-game text-lg md:text-2xl" id="score-1">0</span>
                </div>
                
                <div class="flex flex-col items-center w-full max-w-[400px] mt-8 md:mt-12" id="p1-eq-container">
                    <!-- Equation layout: Top Number + Bond below = Total -->
                    <div class="flex items-center justify-center gap-2 md:gap-4 w-full">
                        <span class="text-5xl md:text-7xl font-game text-slate-700" id="p1-num1">?</span>
                        <span class="text-3xl md:text-5xl font-game text-slate-400">+</span>
                        
                        <!-- Number Bond -->
                        <div class="flex flex-col items-center relative w-[100px] md:w-[140px]">
                            <div class="w-16 h-16 md:w-20 md:h-20 rounded-full token relative z-30 mb-6 md:mb-10 text-3xl md:text-5xl font-game" id="p1-num2-box">
                                <span id="p1-num2">?</span>
                            </div>
                            
                            <svg class="absolute top-[40px] md:top-[50px] left-0 w-full h-[60px] md:h-[80px] pointer-events-none z-10" viewBox="0 0 140 80">
                                <line x1="70" y1="0" x2="30" y2="60" class="bond-line" id="p1-path1" />
                                <line x1="70" y1="0" x2="110" y2="60" class="bond-line" id="p1-path2" />
                            </svg>

                            <div class="flex gap-4 md:gap-6 relative z-20">
                                <div class="w-12 h-12 md:w-16 md:h-16 rounded-full token text-xl md:text-3xl font-game" id="p1-bond1-circle">
                                    <span id="p1-bond1">?</span>
                                </div>
                                <div class="w-12 h-12 md:w-16 md:h-16 rounded-full token text-xl md:text-3xl font-game" id="p1-bond2-circle">
                                    <span id="p1-bond2">?</span>
                                </div>
                            </div>
                        </div>

                        <span class="text-3xl md:text-5xl font-game text-slate-400">=</span>
                        
                        <div class="w-16 h-16 md:w-24 md:h-24 rounded-2xl token text-4xl md:text-6xl font-game text-blue-500 border-blue-200" id="p1-total-box">
                            <span id="p1-total">?</span>
                        </div>
                    </div>

                    <!-- Choices -->
                    <div class="grid grid-cols-4 lg:grid-cols-2 gap-2 md:gap-4 w-full mt-6 md:mt-10" id="p1-choices"></div>
                </div>
            </div>

            <!-- Team 2 Area -->
            <div class="flex-1 flex flex-col items-center justify-center bg-white/60 backdrop-blur-md rounded-[2rem] p-2 md:p-6 shadow-xl border-4 border-white relative w-full h-1/2 lg:h-full">
                <div class="absolute top-4 right-4 md:right-6 bg-red-100 px-4 py-1 md:py-2 rounded-xl border-2 border-red-200 shadow-sm flex items-center gap-2">
                    <span class="text-red-500 font-bold text-sm md:text-xl">TEAM 2</span>
                    <span class="bg-red-500 text-white px-3 py-1 rounded-lg font-game text-lg md:text-2xl" id="score-2">0</span>
                </div>
                
                <div class="flex flex-col items-center w-full max-w-[400px] mt-8 md:mt-12" id="p2-eq-container">
                    <div class="flex items-center justify-center gap-2 md:gap-4 w-full">
                        <span class="text-5xl md:text-7xl font-game text-slate-700" id="p2-num1">?</span>
                        <span class="text-3xl md:text-5xl font-game text-slate-400">+</span>
                        
                        <div class="flex flex-col items-center relative w-[100px] md:w-[140px]">
                            <div class="w-16 h-16 md:w-20 md:h-20 rounded-full token relative z-30 mb-6 md:mb-10 text-3xl md:text-5xl font-game" id="p2-num2-box">
                                <span id="p2-num2">?</span>
                            </div>
                            
                            <svg class="absolute top-[40px] md:top-[50px] left-0 w-full h-[60px] md:h-[80px] pointer-events-none z-10" viewBox="0 0 140 80">
                                <line x1="70" y1="0" x2="30" y2="60" class="bond-line" id="p2-path1" />
                                <line x1="70" y1="0" x2="110" y2="60" class="bond-line" id="p2-path2" />
                            </svg>

                            <div class="flex gap-4 md:gap-6 relative z-20">
                                <div class="w-12 h-12 md:w-16 md:h-16 rounded-full token text-xl md:text-3xl font-game" id="p2-bond1-circle">
                                    <span id="p2-bond1">?</span>
                                </div>
                                <div class="w-12 h-12 md:w-16 md:h-16 rounded-full token text-xl md:text-3xl font-game" id="p2-bond2-circle">
                                    <span id="p2-bond2">?</span>
                                </div>
                            </div>
                        </div>

                        <span class="text-3xl md:text-5xl font-game text-slate-400">=</span>
                        
                        <div class="w-16 h-16 md:w-24 md:h-24 rounded-2xl token text-4xl md:text-6xl font-game text-red-500 border-red-200" id="p2-total-box">
                            <span id="p2-total">?</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-4 lg:grid-cols-2 gap-2 md:gap-4 w-full mt-6 md:mt-10" id="p2-choices"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- AUDIO SYSTEM ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTone(freq, type, duration, vol=0.1) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const sfx = {
            click: () => playTone(600, 'sine', 0.1, 0.1),
            correct: () => { 
                playTone(523.25, 'sine', 0.1, 0.1); // C5
                setTimeout(()=>playTone(659.25, 'sine', 0.1, 0.1), 100); // E5
                setTimeout(()=>playTone(783.99, 'sine', 0.2, 0.1), 200); // G5
            },
            wrong: () => { 
                playTone(200, 'sawtooth', 0.2, 0.1); 
                setTimeout(()=>playTone(150, 'sawtooth', 0.3, 0.1), 150); 
            },
            win: () => {
                const notes = [523.25, 659.25, 783.99, 1046.50];
                notes.forEach((f, i) => setTimeout(() => playTone(f, 'square', 0.15, 0.1), i * 150));
                setTimeout(() => playTone(1046.50, 'square', 0.6, 0.1), 600);
                setTimeout(() => playTone(1046.50, 'square', 0.6, 0.1), 800);
            }
        };


        // --- GAME LOGIC ---
        let p1Score = 0, p2Score = 0;
        let p1State = 'bond1', p2State = 'bond1';
        let p1CurrentProblem = null, p2CurrentProblem = null;
        let selectedTotalTime = 120; // 2 minutes default
        let timeLeft = 120, timerInterval;
        let gameActive = false;

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function setGameTime(seconds, btn) {
            sfx.click();
            selectedTotalTime = seconds;
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function createSteps() {
            [1, 2].forEach(p => {
                const tree = document.getElementById(`tree-${p}`);
                tree.innerHTML = '';
                for(let i=0; i<100; i++) {
                    const step = document.createElement('div');
                    step.className = 'climb-step';
                    // Spread steps appropriately
                    step.style.bottom = `${i * 60 + 50}px`;
                    tree.appendChild(step);
                }
            });
        }
        createSteps();

        function startGame() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            sfx.click();
            document.getElementById('start-screen').classList.add('hidden');
            gameActive = true;
            timeLeft = selectedTotalTime;
            document.getElementById('timer-text').innerText = formatTime(timeLeft);
            nextProblem(1);
            nextProblem(2);
            startGlobalTimer();
        }

        function generateProblem() {
            const n1 = Math.floor(Math.random() * 3) + 7; // 7, 8, 9
            const toMake10 = 10 - n1;
            const extra = Math.floor(Math.random() * 5) + 1; // 1 to 5
            const n2 = toMake10 + extra;
            const total = n1 + n2;
            return { n1, n2, toMake10, extra, total };
        }

        function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

        function nextProblem(p) {
            if (!gameActive) return;
            const problem = generateProblem();
            if (p === 1) { p1CurrentProblem = problem; p1State = 'bond1'; }
            else { p2CurrentProblem = problem; p2State = 'bond1'; }
            updatePlayerUI(p);
        }

        function updatePlayerUI(p) {
            const state = p === 1 ? p1State : p2State;
            const prob = p === 1 ? p1CurrentProblem : p2CurrentProblem;

            document.getElementById(`p${p}-num1`).innerText = prob.n1;
            document.getElementById(`p${p}-num2`).innerText = prob.n2;

            const b1c = document.getElementById(`p${p}-bond1-circle`);
            const b2c = document.getElementById(`p${p}-bond2-circle`);
            const totalBox = document.getElementById(`p${p}-total-box`);
            const num2Box = document.getElementById(`p${p}-num2-box`);
            
            const b1t = document.getElementById(`p${p}-bond1`);
            const b2t = document.getElementById(`p${p}-bond2`);
            const tt = document.getElementById(`p${p}-total`);

            const path1 = document.getElementById(`p${p}-path1`);
            const path2 = document.getElementById(`p${p}-path2`);

            // Reset UI states
            [b1c, b2c, totalBox, num2Box].forEach(el => el.classList.remove('pulse-target', 'completed-part'));
            path1.classList.remove('bond-line-active');
            path2.classList.remove('bond-line-active');

            if (state === 'bond1') {
                b1t.innerText = '?'; b2t.innerText = '?'; tt.innerText = '?';
                b1c.classList.add('pulse-target');
                num2Box.classList.add('pulse-target');
                path1.classList.add('bond-line-active');
                renderChoices(p, prob.toMake10, 'bond1');
            } else if (state === 'bond2') {
                b1t.innerText = prob.toMake10;
                b1c.classList.add('completed-part');
                b2t.innerText = '?'; tt.innerText = '?';
                b2c.classList.add('pulse-target');
                num2Box.classList.add('pulse-target');
                path2.classList.add('bond-line-active');
                renderChoices(p, prob.extra, 'bond2');
            } else {
                b1t.innerText = prob.toMake10;
                b2t.innerText = prob.extra;
                b1c.classList.add('completed-part');
                b2c.classList.add('completed-part');
                tt.innerText = '?';
                totalBox.classList.add('pulse-target');
                renderChoices(p, prob.total, 'total');
            }
        }

        function renderChoices(p, correctVal, type) {
            const container = document.getElementById(`p${p}-choices`);
            container.innerHTML = '';
            container.style.pointerEvents = 'auto';
            
            const choices = new Set([correctVal]);
            while(choices.size < 4) {
                let val = correctVal + (Math.floor(Math.random() * 7) - 3);
                if (val >= 0 && val <= 20) choices.add(val);
            }

            const btnClass = p === 1 ? 'team-blue-btn' : 'team-red-btn';

            shuffle(Array.from(choices)).forEach(val => {
                const btn = document.createElement('button');
                btn.className = `toy-btn h-12 md:h-16 rounded-2xl text-2xl md:text-3xl font-game text-white ${btnClass}`;
                btn.innerText = val;
                btn.onclick = () => handleInput(p, val, btn, type);
                container.appendChild(btn);
            });
        }

        function handleInput(p, val, btn, type) {
            if (!gameActive) return;
            const prob = p === 1 ? p1CurrentProblem : p2CurrentProblem;
            let correct = type === 'bond1' ? prob.toMake10 : (type === 'bond2' ? prob.extra : prob.total);
            
            if (val === correct) {
                sfx.click(); // Short pop for intermediate steps
                if (type === 'bond1') {
                    if (p === 1) p1State = 'bond2'; else p2State = 'bond2';
                    triggerPop(document.getElementById(`p${p}-bond1`));
                    updatePlayerUI(p);
                } else if (type === 'bond2') {
                    if (p === 1) p1State = 'total'; else p2State = 'total';
                    triggerPop(document.getElementById(`p${p}-bond2`));
                    updatePlayerUI(p);
                } else {
                    // Fully correct
                    sfx.correct();
                    if (p === 1) {
                        p1Score++;
                        document.getElementById('score-1').innerText = p1Score;
                        updateMonkey(1, p1Score);
                    } else {
                        p2Score++;
                        document.getElementById('score-2').innerText = p2Score;
                        updateMonkey(2, p2Score);
                    }
                    
                    btn.classList.remove('team-blue-btn', 'team-red-btn');
                    btn.style.background = '#22c55e';
                    btn.style.boxShadow = '0 8px 0 #166534, inset 0 -4px 0 rgba(0,0,0,0.1)';
                    document.getElementById(`p${p}-choices`).style.pointerEvents = 'none';
                    
                    const totalSpan = document.getElementById(`p${p}-total`);
                    totalSpan.innerText = prob.total;
                    triggerPop(totalSpan);
                    document.getElementById(`p${p}-total-box`).classList.add('completed-part');
                    
                    setTimeout(() => nextProblem(p), 600);
                }
            } else {
                sfx.wrong();
                btn.classList.add('opacity-40', 'pointer-events-none');
                const box = document.getElementById(`p${p}-eq-container`);
                box.classList.remove('wrong-shake');
                void box.offsetWidth; // trigger reflow
                box.classList.add('wrong-shake');
            }
        }

        function triggerPop(el) {
            el.classList.remove('number-pop');
            void el.offsetWidth;
            el.classList.add('number-pop');
        }

        function updateMonkey(p, count) {
            const monkey = document.getElementById(`monkey-${p}`);
            const tree = document.getElementById(`tree-${p}`);
            
            // Climb 50px per point
            const totalHeight = count * 50;
            monkey.style.bottom = totalHeight + 'px';
            
            // Auto-scroll tree if monkey goes too high
            const viewportH = window.innerHeight;
            if (totalHeight > viewportH - 150) {
                 const offset = totalHeight - (viewportH - 150);
                 tree.style.transform = `translateY(${offset}px)`;
                 monkey.style.transform = `translateY(${offset}px)`;
            }
        }

        function startGlobalTimer() {
            clearInterval(timerInterval);
            const text = document.getElementById('timer-text');
            
            timerInterval = setInterval(() => {
                timeLeft -= 1;
                text.innerText = formatTime(timeLeft);
                
                if (timeLeft <= 0) { 
                    clearInterval(timerInterval); 
                    endGame(); 
                } else if (timeLeft <= 10) {
                    text.style.color = '#ef4444'; // turn red last 10s
                    sfx.click(); // tick tock
                }
            }, 1000);
        }

        function shootFireworks() {
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) { return clearInterval(interval); }
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        function endGame() {
            gameActive = false;
            document.getElementById('game-over').classList.remove('hidden');
            document.getElementById('final-score-1').innerText = p1Score;
            document.getElementById('final-score-2').innerText = p2Score;
            
            const winEl = document.getElementById('winner-text');
            const emojiEl = document.getElementById('winner-emoji');
            
            if (p1Score > p2Score) {
                winEl.innerText = "TEAM 1 WINS!";
                winEl.className = "text-5xl md:text-7xl font-game mb-8 text-blue-500";
                emojiEl.innerText = "🏆🐒";
            } else if (p2Score > p1Score) {
                winEl.innerText = "TEAM 2 WINS!";
                winEl.className = "text-5xl md:text-7xl font-game mb-8 text-red-500";
                emojiEl.innerText = "🐒🏆";
            } else {
                winEl.innerText = "IT'S A TIE!";
                winEl.className = "text-5xl md:text-7xl font-game mb-8 text-yellow-500";
                emojiEl.innerText = "🍌🤝🍌";
            }

            sfx.win();
            shootFireworks();
        }
    </script>
</body>
</html>
