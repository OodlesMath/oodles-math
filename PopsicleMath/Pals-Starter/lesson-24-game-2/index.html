<!-- Google Fonts: Poppins -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(-45deg, #1cb0f6, #009ce0, #58cc02, #38bdf8);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        overflow-x: hidden;
        touch-action: manipulation;
        color: #374151;
        user-select: none;
    }

    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* Hoạt ảnh tùy chỉnh */
    @keyframes bounceIn {
        0% { transform: scale(0.5); opacity: 0; }
        60% { transform: scale(1.05); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
    }

    @keyframes wiggle {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(-10deg); }
        50% { transform: rotate(10deg); }
        75% { transform: rotate(-10deg); }
    }

    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-15px); }
    }

    @keyframes popIn {
        0% { transform: scale(0.5); opacity: 0; }
        80% { transform: scale(1.2); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
    }

    .animate-bounceIn { animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    .animate-wiggle { animation: wiggle 0.4s ease-in-out; }
    .animate-float { animation: float 3s ease-in-out infinite; }
    .animate-pop { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

    /* Phong cách nút nổi 3D kiểu Duolingo */
    .duo-box {
        background: #ffffff;
        border-radius: 24px;
        border: 2px solid #e5e7eb;
        border-bottom: 8px solid #e5e7eb;
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    .duo-btn {
        transition: all 0.1s ease-in-out;
        cursor: pointer;
    }

    .duo-btn:active {
        transform: translateY(6px);
        border-bottom-width: 2px !important;
        margin-top: 6px;
        margin-bottom: -6px;
    }

    .duo-btn-blue {
        background-color: #1cb0f6;
        color: white;
        border: 2px solid #1899d6;
        border-bottom: 8px solid #1899d6;
    }

    .duo-btn-green {
        background-color: #58cc02;
        color: white;
        border: 2px solid #58a700;
        border-bottom: 8px solid #58a700;
    }

    .duo-btn-speaker {
        background-color: #f3f4f6;
        color: #374151;
        border: 2px solid #d1d5db;
        border-bottom: 6px solid #d1d5db;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        width: 50px;
        height: 50px;
    }

    .duo-btn-speaker:hover {
        background-color: #e5e7eb;
    }

    /* Thẻ lựa chọn đáp án */
    .option-card {
        background: #ffffff;
        border-radius: 24px;
        border: 3px solid #e5e7eb;
        border-bottom: 8px solid #e5e7eb;
        transition: all 0.1s ease-in-out;
        cursor: pointer;
        position: relative;
    }

    .option-card:hover {
        background: #f8fafc;
        border-color: #cbd5e1;
        border-bottom-color: #cbd5e1;
        transform: translateY(-2px);
    }

    .option-card:active {
        transform: translateY(6px);
        border-bottom-width: 3px;
        margin-top: 5px;
    }

    /* Pháo giấy - Cần hiển thị trên cùng */
    .confetti {
        position: fixed;
        width: 12px;
        height: 24px;
        z-index: 99999;
        pointer-events: none;
        animation: fall 3s ease-in forwards;
    }

    @keyframes fall {
        0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
        100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* Ô trống chứa dấu chấm hỏi */
    .missing-slot {
        border: 4px dashed #cbd5e1;
        background-color: #f8fafc;
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        color: #cbd5e1;
        font-weight: 800;
        box-shadow: inset 0 4px 10px rgba(0,0,0,0.05);
    }

    .text-stroke-title {
        text-shadow: 
            -2px -2px 0 #1e3a8a,  
             2px -2px 0 #1e3a8a,
            -2px  2px 0 #1e3a8a,
             2px  2px 0 #1e3a8a,
             0px  6px 0 #1e3a8a;
    }

    /* Rung lắc Icon khi di chuột */
    .shape-icon {
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .option-card:hover .shape-icon {
        transform: scale(1.15) rotate(5deg);
    }
</style>

<body class="min-h-screen flex flex-col items-center justify-center p-4 sm:p-6 md:p-8">
<img src="../assets/logo-oodles-math.png" class="oodles-logo">
<!-- Cảnh báo âm thanh -->
<div id="audio-context-warning" class="hidden fixed top-4 left-1/2 transform -translate-x-1/2 bg-yellow-100 text-yellow-800 px-6 py-3 rounded-full font-bold shadow-lg z-50 animate-bounce">
    Tap anywhere to enable sound! 🎵
</div>

<!-- Khung chứa Game chính -->
<div id="app" class="w-full max-w-5xl flex flex-col items-center justify-center relative my-auto">
    <!-- Màn hình sẽ được nạp bằng JS -->
</div>

<script>
// --- 1. DỮ LIỆU GAME & CẤU HÌNH ---

const COLORS = {
    red: '#ff4b4b',
    blue: '#1cb0f6',
    green: '#58cc02',
    yellow: '#ffc800',
    purple: '#ce82ff',
    pink: '#ff82d2',
    orange: '#ff9600'
};
const COLOR_VALS = Object.values(COLORS);
const SHAPES = ['square', 'circle', 'triangle', 'star', 'heart'];
const SIZES = ['small', 'medium', 'large'];
const PATTERNS = ['AB', 'ABC', 'AABB', 'AAB', 'ABB'];

let currentState = {
    screen: 'start', 
    round: 0, 
    questionIdx: 0,
    score: 0,
    totalQuestions: 9,
    questions: [] // Sẽ chứa các câu hỏi được tạo ngẫu nhiên
};

// --- 2. TRÌNH TẠO CÂU HỎI NGẪU NHIÊN ---

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function getRandomElements(arr, n) {
    let shuffled = shuffleArray([...arr]);
    return shuffled.slice(0, n);
}

function getPatternSequence(patternStr, length) {
    let seq = [];
    let i = 0;
    while(seq.length < length) {
        seq.push(patternStr[i % patternStr.length]);
        i++;
    }
    return seq;
}

function generateDynamicQuestions() {
    let questions = [];
    
    // Hàm phụ trợ để xây dựng một câu hỏi đơn lẻ
    function buildQuestion(roundType, roundNum, roundTitle) {
        let patternType = getRandomElements(PATTERNS, 1)[0];
        
        // LOGIC: Với pattern dài >= 3 (ABC, AAB, ABB, AABB) -> hiển thị 6 slots
        // pattern đơn giản (AB) -> hiển thị 5 slots.
        let totalSlots = (patternType.length >= 3) ? 6 : 5;
        let missingIndex = totalSlots - 1; 

        let seqLabels = getPatternSequence(patternType, totalSlots);
        
        let shapeMap = {}, colorMap = {}, sizeMap = {};
        
        // Thuộc tính cơ bản (cố định cho vòng này trừ khi biến đổi)
        let baseShape = getRandomElements(SHAPES, 1)[0];
        let baseColor = getRandomElements(COLOR_VALS, 1)[0];
        let baseSize = 'large';

        // Thay đổi thuộc tính dựa trên vòng chơi
        if (roundType === 'color') {
            let colors = getRandomElements(COLOR_VALS, new Set(patternType.split('')).size);
            let uniqueLabels = Array.from(new Set(patternType.split('')));
            uniqueLabels.forEach((label, idx) => colorMap[label] = colors[idx]);
        } else if (roundType === 'shape') {
            let shapes = getRandomElements(SHAPES, new Set(patternType.split('')).size);
            let uniqueLabels = Array.from(new Set(patternType.split('')));
            uniqueLabels.forEach((label, idx) => shapeMap[label] = shapes[idx]);
        } else if (roundType === 'size') {
            let sizes = getRandomElements(SIZES, new Set(patternType.split('')).size);
            let uniqueLabels = Array.from(new Set(patternType.split('')));
            uniqueLabels.forEach((label, idx) => sizeMap[label] = sizes[idx]);
        }

        let sequence = seqLabels.map((label, idx) => {
            if (idx === missingIndex) return null; // Ô trống ở cuối cùng
            return {
                shape: shapeMap[label] || baseShape,
                color: colorMap[label] || baseColor,
                size: sizeMap[label] || baseSize
            };
        });

        let correctItem = {
            shape: shapeMap[seqLabels[missingIndex]] || baseShape,
            color: colorMap[seqLabels[missingIndex]] || baseColor,
            size: sizeMap[seqLabels[missingIndex]] || baseSize
        };

        // Tạo các tùy chọn sai
        let wrongOptions = [];
        while(wrongOptions.length < 2) {
            let wrong = {
                shape: roundType === 'shape' ? getRandomElements(SHAPES, 1)[0] : correctItem.shape,
                color: roundType === 'color' ? getRandomElements(COLOR_VALS, 1)[0] : correctItem.color,
                size: roundType === 'size' ? getRandomElements(SIZES, 1)[0] : correctItem.size
            };
            
            // Kiểm tra xem nó có khác biệt với kết quả đúng và các kết quả sai khác không
            let isDiffFromCorrect = wrong.shape !== correctItem.shape || wrong.color !== correctItem.color || wrong.size !== correctItem.size;
            let isDiffFromWrongs = !wrongOptions.some(w => w.shape === wrong.shape && w.color === wrong.color && w.size === wrong.size);
            
            if(isDiffFromCorrect && isDiffFromWrongs) {
                wrongOptions.push(wrong);
            }
        }

        let options = [correctItem, ...wrongOptions];
        shuffleArray(options);
        let correctIndex = options.findIndex(opt => opt.shape === correctItem.shape && opt.color === correctItem.color && opt.size === correctItem.size);

        return {
            round: roundNum,
            roundTitle: roundTitle,
            patternType: patternType,
            sequence: sequence,
            options: options,
            correctIndex: correctIndex
        };
    }

    // Tạo 3 câu hỏi cho mỗi vòng
    for(let i=0; i<3; i++) questions.push(buildQuestion('color', 1, "Round 1: Color Patterns! 🎨"));
    for(let i=0; i<3; i++) questions.push(buildQuestion('shape', 2, "Round 2: Shape Patterns! ⭐"));
    for(let i=0; i<3; i++) questions.push(buildQuestion('size', 3, "Round 3: Size Patterns! 📏"));

    return questions;
}

// --- 3. HỆ THỐNG ÂM THANH & TTS ---
let correctSynth, errorSynth, clickSynth;
let isAudioReady = false;

async function initAudio() {
    if (isAudioReady) return;
    
    // Kiểm tra xem thư viện Tone có tải được thành công không
    if (typeof Tone === 'undefined') {
        console.warn("Thư viện Tone.js chưa được tải thành công.");
        return;
    }

    try {
        // Đảm bảo trình duyệt mở khóa AudioContext
        await Tone.start();

        correctSynth = new Tone.PolySynth(Tone.Synth, {
            oscillator: { type: "triangle" },
            envelope: { attack: 0.05, decay: 0.1, sustain: 0.2, release: 1 }
        }).toDestination();
        correctSynth.volume.value = 0; // Âm lượng to, rõ ràng

        errorSynth = new Tone.Synth({
            oscillator: { type: "sine" },
            envelope: { attack: 0.1, decay: 0.4, sustain: 0, release: 0.1 }
        }).toDestination();
        errorSynth.volume.value = 0;

        // Âm thanh "Pop/Bloop" đã đổi thành tiếng Synth cao và ngắn (dễ nghe trên mọi thiết bị)
        clickSynth = new Tone.Synth({
            oscillator: { type: "sine" },
            envelope: { attack: 0.005, decay: 0.1, sustain: 0, release: 0.01 }
        }).toDestination();
        clickSynth.volume.value = 0;

        isAudioReady = true;
    } catch (e) {
        console.log("Audio waiting for user interaction.", e);
    }
}

function playClickSound() {
    if (isAudioReady && typeof Tone !== 'undefined' && clickSynth && Tone.context.state === 'running') {
        // Tiếng pop cao (C6) nhịp siêu ngắn
        clickSynth.triggerAttackRelease("C6", "32n", Tone.now()); 
    }
}

function playCorrectSound() {
    if (isAudioReady && typeof Tone !== 'undefined' && correctSynth && Tone.context.state === 'running') {
        // Phát sau tiếng pop 1 chút
        const now = Tone.now() + 0.15; 
        correctSynth.triggerAttackRelease("C5", "16n", now);
        correctSynth.triggerAttackRelease("E5", "16n", now + 0.1);
        correctSynth.triggerAttackRelease("G5", "16n", now + 0.2);
        correctSynth.triggerAttackRelease("C6", "4n", now + 0.3);
    }
}

function playIncorrectSound() {
    if (isAudioReady && typeof Tone !== 'undefined' && errorSynth && Tone.context.state === 'running') {
        // Trượt dốc pitch cho hiệu ứng "boing" (phát sau tiếng pop)
        const now = Tone.now() + 0.15;
        errorSynth.triggerAttack("D3", now);
        errorSynth.frequency.exponentialRampToValueAtTime("D2", now + 0.4);
        errorSynth.triggerRelease(now + 0.4);
    }
}

function playVictorySound() {
    if (isAudioReady && typeof Tone !== 'undefined' && correctSynth && Tone.context.state === 'running') {
        const now = Tone.now();
        correctSynth.triggerAttackRelease(["C4", "E4", "G4"], "4n", now);
        correctSynth.triggerAttackRelease(["F4", "A4", "C5"], "4n", now + 0.3);
        correctSynth.triggerAttackRelease(["G4", "B4", "D5"], "4n", now + 0.6);
        correctSynth.triggerAttackRelease(["C5", "E5", "G5", "C6"], "2n", now + 0.9);
    }
}

// Chuyển văn bản thành giọng nói (Text to Speech)
function speakQuestion() {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance("What comes next?");
        utterance.lang = 'en-US';
        utterance.rate = 0.85; 
        utterance.pitch = 1.2; 
        window.speechSynthesis.speak(utterance);
    }
}

// --- 4. CÔNG CỤ HIỂN THỊ & SVGS ---

function getAppElement() {
    return document.getElementById('app');
}

// Icon đẹp bóng bẩy 3D
function generateSVG(shapeObj) {
    if (!shapeObj) return '';

    const { shape, color, size } = shapeObj;

    let sizeClasses = '';
    if (size === 'large') sizeClasses = 'w-16 h-16 sm:w-20 sm:h-20 md:w-24 md:h-24';
    if (size === 'medium') sizeClasses = 'w-12 h-12 sm:w-16 sm:h-16 md:w-20 md:h-20';
    if (size === 'small') sizeClasses = 'w-8 h-8 sm:w-10 sm:h-10 md:w-14 md:h-14';

    let path = '';
    switch (shape) {
        case 'square':
            path = `<rect x="15" y="15" width="70" height="70" rx="16" fill="${color}" />
                    <rect x="15" y="15" width="70" height="70" rx="16" fill="url(#shineGrad)" />`;
            break;
        case 'circle':
            path = `<circle cx="50" cy="50" r="38" fill="${color}" />
                    <circle cx="50" cy="50" r="38" fill="url(#shineGrad)" />`;
            break;
        case 'triangle':
            path = `<polygon points="50,15 85,80 15,80" fill="${color}" stroke-linejoin="round" />
                    <polygon points="50,15 85,80 15,80" fill="url(#shineGrad)" stroke-linejoin="round" />`;
            break;
        case 'star':
            path = `<polygon points="50,10 61,35 88,35 66,52 75,78 50,62 25,78 34,52 12,35 39,35" fill="${color}" stroke-linejoin="round" />
                    <polygon points="50,10 61,35 88,35 66,52 75,78 50,62 25,78 34,52 12,35 39,35" fill="url(#shineGrad)" stroke-linejoin="round" />`;
            break;
        case 'heart':
            path = `<path d="M50,85 C50,85 15,55 15,30 C15,15 30,10 45,25 C50,30 50,30 55,25 C70,10 85,15 85,30 C85,55 50,85 50,85 Z" fill="${color}" stroke-linejoin="round" />
                    <path d="M50,85 C50,85 15,55 15,30 C15,15 30,10 45,25 C50,30 50,30 55,25 C70,10 85,15 85,30 C85,55 50,85 50,85 Z" fill="url(#shineGrad)" stroke-linejoin="round" />`;
            break;
    }

    return `
    <svg class="shape-icon ${sizeClasses} drop-shadow-xl" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="white" stop-opacity="0.6" />
                <stop offset="30%" stop-color="white" stop-opacity="0.1" />
                <stop offset="100%" stop-color="black" stop-opacity="0.15" />
            </linearGradient>
            <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3" />
            </filter>
        </defs>
        <g filter="url(#shadow)">
            ${path}
        </g>
    </svg>
    `;
}

function triggerConfetti() {
    const colors = ['#ff4b4b', '#1cb0f6', '#58cc02', '#ffc800', '#ce82ff'];
    for (let i = 0; i < 80; i++) {
        const confetti = document.createElement('div');
        confetti.classList.add('confetti');
        
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.top = -10 + 'px';
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
        confetti.style.animationDelay = (Math.random() * 0.5) + 's';
        
        if (Math.random() > 0.5) confetti.style.borderRadius = '50%';
        
        document.body.appendChild(confetti);

        setTimeout(() => { confetti.remove(); }, 5000);
    }
}

// --- 5. RENDER GIAO DIỆN CHÍNH ---

function renderStartScreen() {
    const app = getAppElement();
    app.innerHTML = `
        <div class="flex flex-col items-center justify-center animate-bounceIn text-center w-full max-w-lg mx-auto">
            <h1 class="text-5xl md:text-7xl font-black text-[#ffc800] mb-8 text-stroke-title drop-shadow-2xl leading-tight">
                Pattern<br>Detective
            </h1>

            <div class="relative mb-12 animate-float">
                <div class="text-[120px] md:text-[140px] drop-shadow-2xl">🐶</div>
                <div class="absolute -top-8 -right-16 bg-white rounded-3xl p-4 shadow-xl text-lg md:text-xl font-bold text-[#1cb0f6] border-4 border-[#e5e7eb] rotate-6 z-10 whitespace-nowrap">
                    Hi! I'm Doggo! <br> Let's play! 🔎
                </div>
            </div>

            <button onclick="startGame()" class="w-full sm:w-auto duo-btn duo-btn-green font-bold text-3xl md:text-4xl py-5 px-16 rounded-3xl tracking-wide uppercase">
                Start Game!
            </button>
        </div>
    `;
}

function renderRoundTransition() {
    const app = getAppElement();
    const currentQ = currentState.questions[currentState.questionIdx];

    app.innerHTML = `
        <div class="fixed inset-0 bg-[#1cb0f6] bg-opacity-95 flex items-center justify-center z-50 p-4">
            <div class="duo-box p-10 md:p-16 rounded-[40px] text-center w-full max-w-xl animate-bounceIn">
                <h2 class="text-4xl md:text-5xl font-black text-[#1cb0f6] mb-6">${currentQ.roundTitle}</h2>
                <div class="text-[80px] md:text-[100px] animate-float mb-4">🌟</div>
                <p class="text-2xl md:text-3xl text-gray-500 font-bold uppercase tracking-wide">Get ready!</p>
            </div>
        </div>
    `;

    setTimeout(() => {
        renderGameScreen();
    }, 2000);
}

function renderGameScreen() {
    const currentQ = currentState.questions[currentState.questionIdx];
    const app = getAppElement();

    if (currentState.questionIdx > 0 &&
        currentState.questions[currentState.questionIdx].round !== currentState.questions[currentState.questionIdx - 1].round &&
        currentState.screen !== 'round-transition') {
        currentState.screen = 'round-transition';
        renderRoundTransition();
        return;
    }
    currentState.screen = 'game';

    let sequenceHTML = currentQ.sequence.map((item, index) => {
        if (item === null) {
            return `<div class="missing-slot w-16 h-16 sm:w-20 sm:h-20 md:w-24 md:h-24 animate-pulse">?</div>`;
        }
        return `<div class="flex items-center justify-center transform transition hover:scale-110">${generateSVG(item)}</div>`;
    }).join(`
        <div class="text-2xl sm:text-3xl md:text-4xl text-white font-black opacity-60 px-1 drop-shadow-md">·</div>
    `);

    let optionsHTML = currentQ.options.map((opt, index) => {
        return `
            <div onclick="handleOptionClick(${index})" class="option-card p-4 sm:p-6 flex items-center justify-center w-24 h-24 sm:w-28 sm:h-28 md:w-36 md:h-36">
                ${generateSVG(opt)}
            </div>
        `;
    }).join('');

    app.innerHTML = `
        <!-- Top Bar -->
        <div class="flex flex-col sm:flex-row justify-between items-center w-full mb-6 mt-2 px-4 gap-4">
            <div class="bg-white/90 backdrop-blur-sm py-3 px-6 rounded-2xl shadow-sm font-black text-xl md:text-2xl text-[#1cb0f6] uppercase tracking-wide">
                ${currentQ.roundTitle}
            </div>
            <div class="bg-[#ffc800] py-3 px-6 rounded-2xl shadow-sm font-black text-xl md:text-2xl text-white border-b-4 border-[#e5b400] flex items-center gap-2">
                ⭐ Score: ${currentState.score}
            </div>
        </div>

        <!-- Khung hiển thị câu hỏi -->
        <div class="duo-box w-full max-w-4xl p-8 md:p-12 flex flex-col items-center justify-center mb-8 relative z-10">
            <div class="absolute -top-14 -left-4 md:-left-8 text-[80px] md:text-[100px] animate-float z-20 drop-shadow-lg">🐶</div>
            
            <div class="flex items-center justify-center gap-4 mb-8">
                <h2 class="text-3xl md:text-4xl font-black text-[#374151] text-center uppercase tracking-wide">
                    What comes next?
                </h2>
                <!-- Nút loa -->
                <button onclick="speakQuestion()" class="duo-btn duo-btn-speaker hover:scale-110 transition-transform active:scale-95" title="Read Question">
                    <svg class="w-8 h-8 text-[#1cb0f6]" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77zM16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM3 9v6h4l5 5V4L7 9H3z"/>
                    </svg>
                </button>
            </div>

            <!-- Các biểu tượng mẫu trong chuỗi -->
            <div class="flex items-center justify-center flex-wrap gap-y-6 w-full px-2">
                ${sequenceHTML}
            </div>
        </div>

        <!-- Khu vực đáp án -->
        <div class="w-full flex flex-col items-center z-10">
            <p class="text-2xl md:text-3xl font-black text-white mb-6 drop-shadow-md uppercase tracking-wide text-stroke-title" style="text-shadow: 2px 2px 0 rgba(0,0,0,0.2);">
                Choose the missing piece!
            </p>
            <div class="flex gap-4 sm:gap-6 md:gap-8 justify-center flex-wrap px-4">
                ${optionsHTML}
            </div>
        </div>

        <!-- Màn hình kết quả trả lời -->
        <div id="feedback-overlay" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-[#374151] bg-opacity-70 backdrop-blur-sm transition-opacity">
            <div id="feedback-card" class="duo-box p-10 md:p-16 text-center transform scale-0 transition-transform duration-300">
                <div id="feedback-emoji" class="text-[100px] md:text-[120px] mb-4 drop-shadow-xl">✅</div>
                <h2 id="feedback-text" class="text-5xl md:text-6xl font-black text-[#58cc02] mb-4 uppercase">Correct!</h2>
                <div class="bg-[#ffc800] text-white font-bold text-2xl py-2 px-6 rounded-full inline-block border-b-4 border-[#e5b400]">
                    +1 Point
                </div>
            </div>
        </div>
    `;
}

function renderCertificate() {
    const app = getAppElement();
    app.innerHTML = `
        <div class="flex flex-col items-center justify-center w-full min-h-screen py-10 animate-bounceIn px-4 z-10 relative">

            <div class="duo-box p-8 md:p-14 w-full max-w-2xl text-center relative overflow-hidden z-20">
                <!-- Hình nền trang trí -->
                <div class="absolute -top-10 -right-10 text-[150px] opacity-10">⭐</div>
                <div class="absolute -bottom-10 -left-10 text-[150px] opacity-10">🎉</div>

                <h1 class="text-4xl md:text-5xl font-black text-[#1cb0f6] mb-4 uppercase tracking-widest">
                    Lesson Complete!
                </h1>
                
                <div class="flex justify-center mb-6">
                    <div class="text-[100px] md:text-[120px] drop-shadow-2xl animate-float">🐶</div>
                </div>

                <p class="text-xl md:text-2xl text-gray-500 font-bold mb-6 uppercase">
                    You are a Pattern Master!
                </p>

                <div class="bg-[#f3f4f6] rounded-3xl p-6 md:p-8 border-4 border-[#e5e7eb] mb-8 inline-block mx-auto w-4/5 sm:w-2/3">
                    <p class="text-lg font-bold text-gray-500 uppercase tracking-wide mb-2">Final Score</p>
                    <p class="text-5xl md:text-7xl font-black text-[#ffc800] drop-shadow-md">
                        ${currentState.score} / ${currentState.totalQuestions}
                    </p>
                </div>

                <div class="w-full flex justify-center">
                    <button onclick="resetGame()" class="w-full sm:w-auto duo-btn duo-btn-blue font-bold text-2xl py-4 px-12 rounded-2xl uppercase tracking-wide flex items-center justify-center gap-3">
                        <span class="text-3xl">🔄</span> Play Again!
                    </button>
                </div>
            </div>
        </div>
    `;
    
    // Bắn pháo giấy tại màn hình kết thúc
    triggerConfetti();
    setTimeout(triggerConfetti, 500);
    playVictorySound();
}

// --- 6. LOGIC TƯƠNG TÁC ---

async function startGame() {
    await initAudio(); 
    playClickSound();
    
    currentState.questions = generateDynamicQuestions();
    
    currentState.score = 0;
    currentState.questionIdx = 0;
    currentState.round = 1;
    renderGameScreen();
}

async function handleOptionClick(selectedIndex) {
    // Đảm bảo đánh thức AudioContext nếu trình duyệt tạm dừng
    if (typeof Tone !== 'undefined' && Tone.context && Tone.context.state !== 'running') {
        try {
            await Tone.start();
        } catch(e) {
            console.log("Audio resume error:", e);
        }
    }
    
    playClickSound(); // Ngay lập tức phát tiếng Pop

    const currentQ = currentState.questions[currentState.questionIdx];
    const isCorrect = selectedIndex === currentQ.correctIndex;

    const overlay = document.getElementById('feedback-overlay');
    const card = document.getElementById('feedback-card');
    const emoji = document.getElementById('feedback-emoji');
    const text = document.getElementById('feedback-text');

    if (isCorrect) {
        // Đúng - Phát âm thanh chính xác
        playCorrectSound(); 
        currentState.score++;
        
        emoji.innerText = '🌟';
        text.innerText = 'Awesome!';
        text.className = 'text-5xl md:text-6xl font-black text-[#58cc02] mb-4 uppercase';

        // Cập nhật ô bị thiếu
        const missingSlot = document.querySelector('.missing-slot');
        if(missingSlot) {
            missingSlot.classList.remove('missing-slot', 'animate-pulse');
            missingSlot.classList.add('flex', 'items-center', 'justify-center', 'animate-pop');
            missingSlot.innerHTML = generateSVG(currentQ.options[selectedIndex]);
        }

    } else {
        // Sai
        playIncorrectSound();

        emoji.innerText = '🐶';
        text.innerText = 'Try Again!';
        text.className = 'text-5xl md:text-6xl font-black text-[#ff4b4b] mb-4 uppercase';

        // Lắc nút bấm
        const buttons = document.querySelectorAll('.option-card');
        buttons[selectedIndex].classList.add('animate-wiggle', 'border-[#ff4b4b]');
        setTimeout(() => {
            buttons[selectedIndex].classList.remove('animate-wiggle', 'border-[#ff4b4b]');
        }, 500);

        overlay.classList.remove('hidden');
        setTimeout(() => { card.style.transform = 'scale(1)'; }, 10);
        
        setTimeout(() => {
            card.style.transform = 'scale(0)';
            setTimeout(() => overlay.classList.add('hidden'), 300);
        }, 1200);
        return; 
    }

    // Giao diện đúng
    overlay.classList.remove('hidden');
    setTimeout(() => {
        card.style.transform = 'scale(1.1) rotate(-3deg)';
        setTimeout(() => { card.style.transform = 'scale(1) rotate(0deg)'; }, 150);
    }, 10);

    setTimeout(() => {
        card.style.transform = 'scale(0)';
        setTimeout(() => {
            overlay.classList.add('hidden');
            nextQuestion();
        }, 300);
    }, 1800);
}

function nextQuestion() {
    currentState.questionIdx++;
    if (currentState.questionIdx >= currentState.questions.length) {
        currentState.screen = 'end';
        renderCertificate();
    } else {
        renderGameScreen();
    }
}

async function resetGame() {
    if (typeof Tone !== 'undefined' && Tone.context && Tone.context.state !== 'running') {
        try {
            await Tone.start();
        } catch(e) {}
    }
    playClickSound();
    currentState = {
        screen: 'start',
        round: 0,
        questionIdx: 0,
        score: 0,
        totalQuestions: 9,
        questions: []
    };
    renderStartScreen();
}

// Khởi chạy khi tải trang
window.onload = () => {
    renderStartScreen();
};

</script>
