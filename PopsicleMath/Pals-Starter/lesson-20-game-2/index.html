<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../assets/brand.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Adventures: Story Problems within 20</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Poppins for a modern, friendly look -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      /* Sky background */
      background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
      position: relative;
      overflow-x: hidden;
    }

    /* Scenic elements using pseudo-elements */
    body::before, body::after {
      content: '';
      position: fixed;
      bottom: 0;
      width: 100%;
      pointer-events: none;
      z-index: -1;
    }

    /* Grass layer - Improved with waves */
    body::before {
      height: 35vh;
      background: 
        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 200" preserveAspectRatio="none"><path d="M0,200 L0,80 Q250,150 500,80 T1000,120 L1000,200 Z" fill="%2355C500"/><path d="M0,200 L0,120 Q250,200 500,120 T1000,160 L1000,200 Z" fill="%2361E002"/></svg>') no-repeat bottom center;
      background-size: cover;
    }

    /* Clouds, Trees, Sun, Rainbow and Flowers layer */
    body::after {
      top: 0;
      height: 100vh;
      background: 
        /* Sun at Top Left */
        radial-gradient(circle at 10% 15%, #FFD700 0%, #FFD700 45px, transparent 46px),
        /* Rainbow */
        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100"><path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="%23FF0000" stroke-width="8"/><path d="M 28 100 A 72 72 0 0 1 172 100" fill="none" stroke="%23FF7F00" stroke-width="8"/><path d="M 36 100 A 64 64 0 0 1 164 100" fill="none" stroke="%23FFFF00" stroke-width="8"/><path d="M 44 100 A 56 56 0 0 1 156 100" fill="none" stroke="%2300FF00" stroke-width="8"/><path d="M 52 100 A 48 48 0 0 1 148 100" fill="none" stroke="%230000FF" stroke-width="8"/><path d="M 60 100 A 40 40 0 0 1 140 100" fill="none" stroke="%234B0082" stroke-width="8"/><path d="M 68 100 A 32 32 0 0 1 132 100" fill="none" stroke="%239400D3" stroke-width="8"/></svg>') 50% 50% / 300px 150px no-repeat,
        /* Cloud 1 */
        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 50"><path d="M20,40 a10,10 0 0,1 0,-20 a15,15 0 0,1 25,-5 a15,15 0 0,1 25,5 a10,10 0 0,1 0,20 z" fill="white" opacity="0.9"/></svg>') 25% 15% / 150px 75px no-repeat,
        /* Cloud 2 */
        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 50"><path d="M20,40 a10,10 0 0,1 0,-20 a15,15 0 0,1 25,-5 a15,15 0 0,1 25,5 a10,10 0 0,1 0,20 z" fill="white" opacity="0.8"/></svg>') 75% 20% / 180px 90px no-repeat,
        /* Tree 1 */
        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 150"><rect x="40" y="80" width="20" height="70" fill="%238B4513"/><circle cx="50" cy="50" r="40" fill="%23228B22"/><circle cx="30" cy="70" r="30" fill="%23006400"/><circle cx="70" cy="70" r="30" fill="%2332CD32"/></svg>') 5% 100% / 120px 180px no-repeat,
        /* Tree 2 */
        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 150"><rect x="40" y="80" width="20" height="70" fill="%238B4513"/><circle cx="50" cy="50" r="40" fill="%23228B22"/><circle cx="30" cy="70" r="30" fill="%23006400"/><circle cx="70" cy="70" r="30" fill="%2332CD32"/></svg>') 95% 100% / 100px 150px no-repeat,
        /* Flower 1 (Pink) */
        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50"><path d="M25,50 L25,25" stroke="%23006400" stroke-width="4"/><circle cx="25" cy="25" r="6" fill="%23FFD700"/><circle cx="25" cy="12" r="8" fill="%23FF1493"/><circle cx="38" cy="25" r="8" fill="%23FF1493"/><circle cx="25" cy="38" r="8" fill="%23FF1493"/><circle cx="12" cy="25" r="8" fill="%23FF1493"/></svg>') 15% 95% / 40px 40px no-repeat,
        /* Flower 2 (Purple) */
        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50"><path d="M25,50 L25,25" stroke="%23006400" stroke-width="4"/><circle cx="25" cy="25" r="6" fill="%23FFD700"/><circle cx="25" cy="12" r="8" fill="%238A2BE2"/><circle cx="38" cy="25" r="8" fill="%238A2BE2"/><circle cx="25" cy="38" r="8" fill="%238A2BE2"/><circle cx="12" cy="25" r="8" fill="%238A2BE2"/></svg>') 85% 92% / 45px 45px no-repeat,
        /* Flower 3 (Orange) */
        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50"><path d="M25,50 L25,25" stroke="%23006400" stroke-width="4"/><circle cx="25" cy="25" r="6" fill="%23FFD700"/><circle cx="25" cy="12" r="8" fill="%23FF4500"/><circle cx="38" cy="25" r="8" fill="%23FF4500"/><circle cx="25" cy="38" r="8" fill="%23FF4500"/><circle cx="12" cy="25" r="8" fill="%23FF4500"/></svg>') 35% 98% / 35px 35px no-repeat,
        /* Flower 4 (Blue) */
        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50"><path d="M25,50 L25,25" stroke="%23006400" stroke-width="4"/><circle cx="25" cy="25" r="6" fill="%23FFD700"/><circle cx="25" cy="12" r="8" fill="%2300BFFF"/><circle cx="38" cy="25" r="8" fill="%2300BFFF"/><circle cx="25" cy="38" r="8" fill="%2300BFFF"/><circle cx="12" cy="25" r="8" fill="%2300BFFF"/></svg>') 70% 96% / 38px 38px no-repeat;
    }

    .bubble-btn {
      transition: all 0.1s ease;
      position: relative;
    }
    .bubble-btn:active {
      transform: translateY(4px);
      box-shadow: none !important;
    }

    .wiggle {
      animation: wiggle 0.4s ease-in-out;
    }
    @keyframes wiggle {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px) rotate(-3deg); }
      75% { transform: translateX(8px) rotate(3deg); }
    }
    
    .bounce-slow {
      animation: bounce 2s infinite;
    }
    
    .pop-in {
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }

    /* 3D realistic emoji styling */

    /* Ensuring confetti is always on top */

      pointer-events: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
    }
  </style>
</head>

  <script>
    // --- Audio Engine (Mute functionality removed) ---
    class KidsAudioEngine {
      constructor() {
        this.ctx = null;
      }
      init() {
        if (!this.ctx) {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
      }
      playTone(freq, type, duration, delay = 0, vol = 0.15) {
        this.init();
        setTimeout(() => {
          try {
            let osc = this.ctx.createOscillator();
            let gain = this.ctx.createGain();
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            
            // Pop sound envelope
            gain.gain.setValueAtTime(0, this.ctx.currentTime);
            gain.gain.linearRampToValueAtTime(vol, this.ctx.currentTime + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
            
            osc.start();
            osc.stop(this.ctx.currentTime + duration);
          } catch(e) { console.log(e); }
        }, delay * 1000);
      }
      playCorrect() {
        // Cheerful major arpeggio
        this.playTone(523.25, 'sine', 0.2, 0); // C5
        this.playTone(659.25, 'sine', 0.2, 0.1); // E5
        this.playTone(783.99, 'sine', 0.2, 0.2); // G5
        this.playTone(1046.50, 'sine', 0.4, 0.3); // C6
      }
      playIncorrect() {
        // Gentle "boop"
        this.playTone(300, 'triangle', 0.3, 0); 
        this.playTone(250, 'triangle', 0.4, 0.15); 
      }
      playClick() {
        // Light pop
        this.playTone(800, 'sine', 0.1, 0, 0.05);
      }
      playLevelComplete() {
        // Fanfare
        const notes = [
          {f: 523.25, d: 0.1, t: 0},
          {f: 523.25, d: 0.1, t: 0.15},
          {f: 523.25, d: 0.1, t: 0.3},
          {f: 659.25, d: 0.4, t: 0.45},
          {f: 587.33, d: 0.2, t: 0.85},
          {f: 783.99, d: 0.6, t: 1.05}
        ];
        notes.forEach(n => this.playTone(n.f, 'square', n.d, n.t, 0.1));
      }
    }

    const audio = new KidsAudioEngine();

    // --- Game Data ---
    let score = 0;
    let currentQuestionIndex = 0;
    let gameQuestions = [];
    let correctAnswersCount = 0;
    let wrongAttemptsCount = 0;
    let isCurrentAnsweredCorrectly = false;
    let attemptsForCurrent = 0; // Tracks if it's the first try for points

    const allQuestions = [
      // Sums within 10
      { id: 1, type: 'addition', context: 'fruits', story: "Leo has 4 red apples. Max gives him 3 green apples. How many apples does Leo have now?", num1: 4, num2: 3, emoji1: '🍎', emoji2: '🍏', options: [6, 7, 8], answer: 7 },

    // --- Core Logic ---
    function startGame() {
      audio.playClick();
      
      const shuffled = allQuestions.sort(() => 0.5 - Math.random());
      
      const additions = shuffled.filter(q => q.type === 'addition').slice(0, 5);
      const subtractions = shuffled.filter(q => q.type === 'subtraction').slice(0, 5);
      
      gameQuestions = [];
      for (let i = 0; i < 5; i++) {
        if (additions[i]) gameQuestions.push(additions[i]);
        if (subtractions[i]) gameQuestions.push(subtractions[i]);
      }
      
      if (gameQuestions.length < 10) {
        gameQuestions = shuffled.slice(0, 10);
      }

      score = 0;
      currentQuestionIndex = 0;
      correctAnswersCount = 0;
      wrongAttemptsCount = 0;
      document.getElementById('game-score').innerText = score;

      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('reward-screen').classList.add('hidden');
      document.getElementById('gameplay-screen').classList.remove('hidden');
      document.getElementById('gameplay-screen').classList.add('flex');

      loadQuestion();
    }

    function loadQuestion() {
      isCurrentAnsweredCorrectly = false;
      attemptsForCurrent = 0; // Reset attempts counter for new question
      
      const q = gameQuestions[currentQuestionIndex];
      
      document.getElementById('context-tag').innerText = q.context;
      document.getElementById('story-text').innerText = q.story;
      
      const percent = ((currentQuestionIndex) / gameQuestions.length) * 100;
      document.getElementById('progress-bar-fill').style.width = `${percent}%`;

      renderVisuals(q);

      const options = [...q.options];
      options.sort(() => 0.5 - Math.random());

      for (let i = 0; i < 3; i++) {
        const btn = document.getElementById(`opt-${i}`);
        btn.innerText = options[i];
        btn.setAttribute('data-val', options[i]);
        
        btn.className = "bubble-btn option-card h-24 sm:h-32 rounded-3xl font-black text-4xl sm:text-5xl text-[#3C3C3C] bg-white border-2 border-slate-200 shadow-[0_8px_0_#E5E5E5] flex items-center justify-center hover:bg-slate-50 active:shadow-none active:translate-y-2 transition-all";
      }
    }

    function renderVisuals(q) {
      const area = document.getElementById('visuals-area');
      area.innerHTML = '';

      if (q.type === 'addition') {
        const groupA = document.createElement('div');
        groupA.className = 'flex flex-wrap justify-center gap-1 bg-[#FFF5E6] p-3 rounded-2xl';
        for (let i = 0; i < q.num1; i++) {
          groupA.innerHTML += `<span class="inline-block real-icon hover:-translate-y-2 transition-transform duration-200 cursor-pointer">${q.emoji1}</span>`;
        }
        area.appendChild(groupA);

        const plus = document.createElement('span');
        plus.className = 'text-4xl font-black text-[#1CB0F6] px-2 self-center real-icon';
        plus.innerText = '➕';
        area.appendChild(plus);

        const groupB = document.createElement('div');
        groupB.className = 'flex flex-wrap justify-center gap-1 bg-[#EAF9DE] p-3 rounded-2xl';
        for (let i = 0; i < q.num2; i++) {
          groupB.innerHTML += `<span class="inline-block real-icon hover:-translate-y-2 transition-transform duration-200 cursor-pointer">${q.emoji2 || q.emoji1}</span>`;
        }
        area.appendChild(groupB);

      } else if (q.type === 'subtraction') {
        const totalDiv = document.createElement('div');
        totalDiv.className = 'flex flex-wrap items-center justify-center gap-2 bg-[#FFEBED] p-4 rounded-[2rem] max-w-full';
        
        const normalCount = q.num1 - q.num2;
        
        for (let i = 0; i < normalCount; i++) {
          totalDiv.innerHTML += `<span class="inline-block real-icon hover:-translate-y-2 transition-transform duration-200 cursor-pointer">${q.emoji1}</span>`;
        }

        for (let i = 0; i < q.num2; i++) {
          totalDiv.innerHTML += `
            <span class="relative inline-block opacity-50 real-icon">
              ${q.emoji1}
              <span class="absolute inset-0 flex items-center justify-center text-[#FF4B4B] font-extrabold text-3xl drop-shadow-[0_2px_2px_rgba(255,255,255,0.8)]">❌</span>
            </span>`;
        }
        area.appendChild(totalDiv);
      }
    }

    // --- TTS & Checking ---
    function readAloud() {
      const text = document.getElementById('story-text').innerText;
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        const voices = window.speechSynthesis.getVoices();
        let selectedVoice = voices.find(v => v.lang.startsWith('en') && (v.name.includes('Natural') || v.name.includes('Samantha')));
        if (!selectedVoice) selectedVoice = voices.find(v => v.lang.startsWith('en'));
        if (selectedVoice) utterance.voice = selectedVoice;
        utterance.rate = 0.9; 
        utterance.pitch = 1.1; 
        window.speechSynthesis.speak(utterance);
      }
    }

    if ('speechSynthesis' in window) {
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }

    function checkAnswer(optionIndex) {
      const q = gameQuestions[currentQuestionIndex];
      const btn = document.getElementById(`opt-${optionIndex}`);
      const valSelected = parseInt(btn.getAttribute('data-val'));

      attemptsForCurrent++;

      if (valSelected === q.answer) {
        audio.playCorrect();
        isCurrentAnsweredCorrectly = true;
        correctAnswersCount++;
        
        // Only award points on the very first try
        if (attemptsForCurrent === 1) {
          score += 10;
          document.getElementById('game-score').innerText = score;
        }

        btn.className = "bubble-btn option-card h-24 sm:h-32 rounded-3xl font-black text-4xl sm:text-5xl text-white bg-[#58CC02] shadow-[0_8px_0_#58A700] flex items-center justify-center scale-105 transition-all z-10 border-none";
        
        startConfetti();
        setTimeout(() => { showFeedback(true); }, 800);

      } else {
        audio.playIncorrect();
        wrongAttemptsCount++;
        
        btn.className = "bubble-btn option-card h-24 sm:h-32 rounded-3xl font-black text-4xl sm:text-5xl text-white bg-[#FF4B4B] shadow-[0_8px_0_#EA2B2B] flex items-center justify-center transition-all wiggle border-none opacity-80";
        
        setTimeout(() => { showFeedback(false, valSelected); }, 600);
      }
    }

    // --- Feedback Modal ---
    function showFeedback(isCorrect, wrongVal = null) {
      const q = gameQuestions[currentQuestionIndex];
      const modal = document.getElementById('feedback-modal');
      const emoji = document.getElementById('feedback-emoji');
      const title = document.getElementById('feedback-title');
      const equationDiv = document.getElementById('feedback-equation');
      const bondDiv = document.getElementById('number-bond');
      const desc = document.getElementById('feedback-desc');
      const btn = document.getElementById('feedback-btn');

      modal.classList.remove('hidden');

      if (isCorrect) {
        // Fixed text to "Superb!" exactly as requested
        title.innerText = "Superb!";
        title.className = "text-4xl sm:text-5xl font-black mb-2 text-[#58CC02] drop-shadow-sm tracking-wide";
        emoji.innerText = "🌟";
        
        const symbol = q.type === 'addition' ? '+' : '-';
        equationDiv.innerText = `${q.num1} ${symbol} ${q.num2} = ${q.answer}`;
        equationDiv.classList.remove('hidden');
        equationDiv.classList.add('flex');
        
        // Setup Number Bond
        let wholeVal, part1Val, part2Val;
        if (q.type === 'addition') {
          wholeVal = q.answer;
          part1Val = q.num1;
          part2Val = q.num2;
        } else {
          wholeVal = q.num1;
          part1Val = q.num2;
          part2Val = q.answer;
        }
        
        document.getElementById('bond-whole').innerText = wholeVal;
        document.getElementById('bond-part1').innerText = part1Val;
        document.getElementById('bond-part2').innerText = part2Val;
        
        bondDiv.classList.remove('hidden');
        bondDiv.classList.add('block');
        
        desc.classList.add('hidden');

        btn.innerText = "Continue";
        btn.className = "bubble-btn w-full max-w-sm py-5 px-8 rounded-3xl font-black text-2xl sm:text-3xl text-white bg-[#58CC02] shadow-[0_8px_0_#58A700] hover:bg-[#61E002] active:shadow-[0_0px_0_#58A700] uppercase tracking-wider mt-auto sm:mt-8";
      } else {
        emoji.innerText = "🤔";
        title.innerText = "Let's check!";
        title.className = "text-4xl sm:text-5xl font-black mb-2 text-[#FF4B4B] drop-shadow-sm tracking-wide";
        
        equationDiv.classList.add('hidden');
        equationDiv.classList.remove('flex');
        bondDiv.classList.add('hidden');
        bondDiv.classList.remove('block');
        
        desc.classList.remove('hidden');
        desc.innerHTML = `You chose <span class="text-[#FF4B4B] font-black">${wrongVal}</span>. Count the pictures carefully!`;
        
        btn.innerText = "Got it";
        btn.className = "bubble-btn w-full max-w-sm py-5 px-8 rounded-3xl font-black text-2xl sm:text-3xl text-white bg-[#FF4B4B] shadow-[0_8px_0_#EA2B2B] hover:bg-[#FF6666] active:shadow-[0_0px_0_#EA2B2B] uppercase tracking-wider mt-auto sm:mt-8";
      }
    }

    function nextAction() {
      audio.playClick();
      document.getElementById('feedback-modal').classList.add('hidden');

      if (isCurrentAnsweredCorrectly) {
        currentQuestionIndex++;
        if (currentQuestionIndex < gameQuestions.length) {
          loadQuestion();
        } else {
          endGame();
        }
      } else {
        // Disable the wrong answer so they can try again
        for (let i = 0; i < 3; i++) {
          const btn = document.getElementById(`opt-${i}`);
          if (btn.classList.contains('bg-[#FF4B4B]')) {
             btn.className = "bubble-btn option-card h-24 sm:h-32 rounded-3xl font-black text-4xl sm:text-5xl text-slate-300 bg-slate-100 border-2 border-slate-200 shadow-none flex items-center justify-center opacity-50 pointer-events-none";
          }
        }
      }
    }

    // --- End Sequence ---
    function endGame() {
      audio.playLevelComplete();

      document.getElementById('gameplay-screen').classList.add('hidden');
      document.getElementById('gameplay-screen').classList.remove('flex');
      document.getElementById('feedback-modal').classList.add('hidden');
      document.getElementById('reward-screen').classList.remove('hidden');

      const percent = (currentQuestionIndex / gameQuestions.length) * 100;
      document.getElementById('progress-bar-fill').style.width = `100%`;

      const finalAcc = Math.round((correctAnswersCount / (correctAnswersCount + wrongAttemptsCount)) * 100) || 0;
      document.getElementById('final-score').innerText = score;

      const starsArea = document.getElementById('star-rewards');
      const trophyEmoji = document.getElementById('final-trophy-emoji');
      
      if (finalAcc >= 90) {
        starsArea.innerText = "⭐⭐⭐";
        trophyEmoji.innerText = "🏆";
      } else if (finalAcc >= 70) {
        starsArea.innerText = "⭐⭐";
        trophyEmoji.innerText = "🥈";
      } else {
        starsArea.innerText = "⭐";
        trophyEmoji.innerText = "🥉";
      }

      let confInt = setInterval(startConfetti, 800);
      setTimeout(()=> clearInterval(confInt), 5000);
    }

    function resetToHome() {
      audio.playClick();
      document.getElementById('reward-screen').classList.add('hidden');
      document.getElementById('gameplay-screen').classList.add('hidden');
      document.getElementById('gameplay-screen').classList.remove('flex');
      document.getElementById('start-screen').classList.remove('hidden');
      document.getElementById('progress-bar-fill').style.width = `0%`;
    }

    // --- Confetti System ---
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    let confetti = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function startConfetti() {
      const colors = ['#58CC02', '#1CB0F6', '#FFC800', '#FF4B4B', '#CE82FF'];
      for (let i = 0; i < 80; i++) {
        confetti.push({
          x: Math.random() * canvas.width,
          y: -20 - Math.random() * 50,
          vx: (Math.random() - 0.5) * 6,
          vy: Math.random() * 5 + 3,
          size: Math.random() * 12 + 8,
          color: colors[Math.floor(Math.random() * colors.length)],
          rotation: Math.random() * 360,
          rotationSpeed: (Math.random() - 0.5) * 10,
          shape: Math.random() > 0.5 ? 'rect' : 'circle'
        });
      }
    }

    function animateConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confetti.forEach((p, index) => {
        p.x += p.vx;
        p.y += p.vy;
        p.rotation += p.rotationSpeed;

        p.x += Math.sin(p.y / 50) * 1;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate((p.rotation * Math.PI) / 180);
        ctx.fillStyle = p.color;
        
        if(p.shape === 'rect') {
           ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 1.5);
        } else {
           ctx.beginPath();
           ctx.arc(0, 0, p.size/2, 0, Math.PI * 2);
           ctx.fill();
        }
        
        ctx.restore();

        if (p.y > canvas.height + 50) {
          confetti.splice(index, 1);
        }
      });
      requestAnimationFrame(animateConfetti);
    }
    animateConfetti();

    lucide.createIcons();
  </script>
