    body {
      font-family: 'Fredoka', sans-serif;
      user-select: none;
      -webkit-user-select: none;
      overflow-x: hidden;
      min-height: 100vh;
      margin: 0;

    /* --- Scenery Background Container (From Ver 3) --- */
    .scenery-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 60%);
      overflow: hidden;
      pointer-events: none;
    }

    /* Cloud Animation */
    @keyframes float-cloud {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100vw); }
    }
    .cloud {
      animation: float-cloud linear infinite;
    }

    .wood-border {
      border: 12px solid #a17c6e;
      border-radius: 2.5rem;
      box-shadow: inset 0 6px 12px rgba(0,0,0,0.2), 0 15px 35px rgba(0,0,0,0.25);
    }
    .chalkboard {
      background-color: #2a4e39;
      border: 8px solid #3e2723;
      box-shadow: inset 0 6px 12px rgba(0,0,0,0.5);
      background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 0);
      background-size: 8px 8px;
    }
    /* Pulsing glowing animation for targeting placeholders */
    @keyframes slot-glow {
      0%, 100% { background-color: rgba(220, 161, 52, 0.1); border-color: rgba(220, 161, 52, 0.3); }
      50% { background-color: rgba(220, 161, 52, 0.25); border-color: rgba(220, 161, 52, 0.8); box-shadow: 0 0 10px #dca134; }
    }
    .target-slot-glow {

    .neon-pill {
      border: 2px solid #e19575;
      box-shadow: 0 0 12px rgba(225, 149, 117, 0.4);

    }
    /* Gentle floating bounce animation */
    @keyframes gentle-bounce {

      50% { transform: translateY(-6px); }
    }
    .bounce-element {

  <script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let soundsEnabled = true;

    function playSound(type) {
      if (!soundsEnabled) return;
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      const now = audioCtx.currentTime;

      if (type === 'select') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(320, now);
        osc.frequency.exponentialRampToValueAtTime(550, now + 0.1);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now);
        osc.stop(now + 0.1);
      } else if (type === 'correct') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(523.25, now); // C5
        osc.frequency.setValueAtTime(659.25, now + 0.08); // E5
        osc.frequency.setValueAtTime(783.99, now + 0.16); // G5
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
        osc.start(now);
        osc.stop(now + 0.35);
      } else if (type === 'incorrect') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(140, now);
        osc.frequency.linearRampToValueAtTime(95, now + 0.22);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.22);
        osc.start(now);
        osc.stop(now + 0.22);
      } else if (type === 'fly') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(280, now);
        osc.frequency.linearRampToValueAtTime(750, now + 0.4);
        gain.gain.setValueAtTime(0.08, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
        osc.start(now);
        osc.stop(now + 0.4);
      }
    }

    // Toggle mute switch
    document.getElementById('sound-btn').addEventListener('click', () => {
      soundsEnabled = !soundsEnabled;
      const icon = document.getElementById('sound-icon');
      if (soundsEnabled) {
        icon.className = 'fa-solid fa-volume-high';
        playSound('select');
      } else {
        icon.className = 'fa-solid fa-volume-xmark';
      }
    });

    // Split into perfect multiples of ten and standard regroupings to control variety and prevent repetition
    const PERFECT_TENS = [
      { num1: 25, num2: 15 }, // 40 (40 + 0)
      { num1: 15, num2: 15 }, // 30 (30 + 0)
      { num1: 24, num2: 16 }, // 40 (40 + 0)
      { num1: 23, num2: 17 }, // 40 (40 + 0)
      { num1: 22, num2: 18 }, // 40 (40 + 0)
      { num1: 21, num2: 19 }, // 40 (40 + 0)
      { num1: 18, num2: 12 }, // 30 (30 + 0)
      { num1: 17, num2: 13 }, // 30 (30 + 0)
      { num1: 16, num2: 14 }, // 30 (30 + 0)
      { num1: 29, num2: 11 }, // 40 (40 + 0)
      { num1: 28, num2: 12 }  // 40 (40 + 0)
    ];

    const STANDARD_REGROUP = [
      // 2-digit + 2-digit
      { num1: 19, num2: 12 }, // 31 (30 + 1)
      { num1: 19, num2: 13 }, // 32 (30 + 2)
      { num1: 19, num2: 14 }, // 33 (30 + 3)
      { num1: 19, num2: 15 }, // 34 (30 + 4)
      { num1: 19, num2: 16 }, // 35 (30 + 5)
      { num1: 19, num2: 17 }, // 36 (30 + 6)
      { num1: 19, num2: 18 }, // 37 (30 + 7)
      { num1: 19, num2: 19 }, // 38 (30 + 8)
      { num1: 18, num2: 13 }, // 31 (30 + 1)
      { num1: 18, num2: 14 }, // 32 (30 + 2)
      { num1: 18, num2: 15 }, // 33 (30 + 3)
      { num1: 18, num2: 16 }, // 34 (30 + 4)
      { num1: 18, num2: 17 }, // 35 (30 + 5)
      { num1: 18, num2: 18 }, // 36 (30 + 6)
      { num1: 17, num2: 14 }, // 31 (30 + 1)
      { num1: 17, num2: 15 }, // 32 (30 + 2)
      { num1: 17, num2: 16 }, // 33 (30 + 3)
      { num1: 17, num2: 17 }, // 34 (30 + 4)
      { num1: 16, num2: 15 }, // 31 (30 + 1)
      { num1: 16, num2: 16 }, // 32 (30 + 2)
      
      // 2-digit + 1-digit
      { num1: 19, num2: 2 },  // 21 (20 + 1)
      { num1: 19, num2: 3 },  // 22 (20 + 2)
      { num1: 19, num2: 4 },  // 23 (20 + 3)
      { num1: 19, num2: 5 },  // 24 (20 + 4)
      { num1: 19, num2: 6 },  // 25 (20 + 5)
      { num1: 19, num2: 7 },  // 26 (20 + 6)
      { num1: 19, num2: 8 },  // 27 (20 + 7)
      { num1: 19, num2: 9 },  // 28 (20 + 8)
      { num1: 28, num2: 3 },  // 31 (30 + 1)
      { num1: 28, num2: 4 },  // 32 (30 + 2)
      { num1: 28, num2: 5 },  // 33 (30 + 3)
      { num1: 28, num2: 6 },  // 34 (30 + 4)
      { num1: 28, num2: 7 },  // 35 (30 + 5)
      { num1: 28, num2: 8 },  // 36 (30 + 6)
      { num1: 28, num2: 9 },  // 37 (30 + 7)
      { num1: 29, num2: 2 },  // 31 (30 + 1)
      { num1: 29, num2: 3 },  // 32 (30 + 2)
      { num1: 29, num2: 4 },  // 33 (30 + 3)
      { num1: 29, num2: 5 },  // 34 (30 + 4)
      { num1: 29, num2: 6 },  // 35 (30 + 5)
      { num1: 29, num2: 7 },  // 36 (30 + 6)
      { num1: 29, num2: 8 },  // 37 (30 + 7)
      { num1: 29, num2: 9 }   // 38 (30 + 8)
    ];

    let currentQuestions = [];
    let currentRoundIndex = 0;
    let totalScore = 0;
    let attemptsThisLevel = 0;
    let totalAttempts = 0;
    let levelSolved = false;

    // Element selection cache
    const currentRoundEl = document.getElementById('current-round');
    const scoreEl = document.getElementById('score');
    const restartBtn = document.getElementById('restart-btn');
    const playAgainBtn = document.getElementById('play-again-btn');
    const nextBtn = document.getElementById('next-btn');
    
    const eqNum1 = document.getElementById('eq-num-1');
    const eqNum2 = document.getElementById('eq-num-2');
    
    // Chalkboard slots
    const eqRegroupSlot = document.getElementById('eq-regroup-slot');
    const eqRegroupText = document.getElementById('eq-regroup-text');
    const eqResultBox = document.getElementById('eq-result-box');
    const eqFinalTotal = document.getElementById('eq-final-total');

    const rodsContainer = document.getElementById('rods-container');
    const tenFrameGrid = document.getElementById('ten-frame-grid');
    const looseOnesContainer = document.getElementById('loose-ones-container');
    const optionsStack = document.getElementById('options-stack');

    const gamePlayView = document.getElementById('game-play-view');
    const scoreScreenView = document.getElementById('score-screen-view');

    // Utility: Fisher-Yates array shuffling
    function shuffleArray(array) {
      const arrCopy = [...array];
      for (let i = arrCopy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arrCopy[i], arrCopy[j]] = [arrCopy[j], arrCopy[i]];
      }
      return arrCopy;
    }

    // Select strictly 2 perfect tens and 8 standard regroupings per round to avoid overrepresentation
    function initializeRoundQuestions() {
      const selectedPerfect = shuffleArray(PERFECT_TENS).slice(0, 2);
      const selectedStandard = shuffleArray(STANDARD_REGROUP).slice(0, 8);
      currentQuestions = shuffleArray([...selectedPerfect, ...selectedStandard]);
    }

    function loadLevel(roundIdx) {
      currentRoundIndex = roundIdx;
      if (currentRoundIndex >= currentQuestions.length) {
        showScoreboard();
        return;
      }

      const q = currentQuestions[currentRoundIndex];
      attemptsThisLevel = 0;
      levelSolved = false;

      currentRoundEl.textContent = currentRoundIndex + 1;
      scoreEl.textContent = totalScore;
      nextBtn.classList.add('hidden');

      // Set the chalkboard first and second numbers (num1 is always the bigger number)
      eqNum1.textContent = q.num1;
      eqNum2.textContent = q.num2;
      
      // Reset regroup slot to standard placeholder state
      eqRegroupSlot.className = "min-w-[130px] sm:min-w-[170px] h-[50px] sm:h-[65px] border-2 border-[#3d5c49] bg-[#1d3827] rounded-xl flex items-center justify-center transition-all duration-300 px-3";
      eqRegroupText.textContent = "?";
      eqRegroupText.className = "text-slate-500/50 text-xl sm:text-3xl font-bold";

      // Reset final total result box state
      eqResultBox.className = "min-w-[65px] sm:min-w-[85px] h-[50px] sm:h-[65px] border-2 border-[#1c3527] bg-[#1c3527] rounded-xl flex items-center justify-center px-4 transition-all duration-300";
      eqFinalTotal.textContent = "?";
      eqFinalTotal.className = "text-[#34b285]/40 text-2xl sm:text-4xl font-black";

      const tenFrameBox = document.getElementById('ten-frame-container');
      tenFrameBox.classList.remove('hidden');
      tenFrameBox.style.transform = 'scale(1)';
      tenFrameBox.style.transition = '';

      renderBase10Illustration(q);
      generateInteractiveOptions(q);
    }

    function renderBase10Illustration(q) {
      // 1. Render Tens Rods (Left Side - Golden Yellow)
      rodsContainer.innerHTML = '';
      const fullRodsCount = Math.floor(q.num1 / 10);
      for (let r = 0; r < fullRodsCount; r++) {
        rodsContainer.appendChild(createRodDOM('amber'));
      }

      // 2. Render Incomplete Ten Frame (Left Side - Golden Yellow)
      tenFrameGrid.innerHTML = '';
      const existingOnes = q.num1 % 10;
      for (let s = 1; s <= 10; s++) {
        const slot = document.createElement('div');
        slot.className = "w-7 h-7 sm:w-8 sm:h-8 border border-[#dca134]/30 rounded-md flex items-center justify-center bg-white/50";
        slot.id = `frame-slot-${s}`;
        
        if (s <= existingOnes) {
          slot.appendChild(createOneCubeDOM('amber'));
        } else {
          slot.classList.add('border-dashed', 'bg-white/20');
          slot.setAttribute('data-target-empty', 'true');
        }
        tenFrameGrid.appendChild(slot);
      }

      // 3. Render Smaller Number Pile Blocks (Right Side - Blue Cyan)
      looseOnesContainer.innerHTML = '';
      
      const rightRodsCount = Math.floor(q.num2 / 10);
      const rightOnesCount = q.num2 % 10;

      const innerWrapper = document.createElement('div');
      innerWrapper.className = "flex items-end gap-3 justify-center w-full";
      looseOnesContainer.appendChild(innerWrapper);

      // Render rods on the right (styled cyan with a unique class)
      if (rightRodsCount > 0) {
        const rightRodsCol = document.createElement('div');
        rightRodsCol.className = "flex gap-2";
        for (let r = 0; r < rightRodsCount; r++) {
          const cyanRod = createRodDOM('cyan');
          cyanRod.classList.add('right-rod-unit', 'transition-transform');
          rightRodsCol.appendChild(cyanRod);
        }
        innerWrapper.appendChild(rightRodsCol);
      }

      // Render loose ones cubes on the right
      if (rightOnesCount > 0) {
        const rightOnesCol = document.createElement('div');
        rightOnesCol.className = "grid grid-cols-2 gap-2 pb-1";
        for (let l = 1; l <= rightOnesCount; l++) {
          const blockWrapper = document.createElement('div');
          blockWrapper.className = "w-7 h-7 sm:w-8 sm:h-8 relative block-unit";
          blockWrapper.id = `loose-cube-${l}`;
          blockWrapper.appendChild(createOneCubeDOM('cyan'));
          rightOnesCol.appendChild(blockWrapper);
        }
        innerWrapper.appendChild(rightOnesCol);
      }
    }

    // Creates dynamic 10-Rod with heightened blocks and bold dividers
    function createRodDOM(colorType = 'amber') {
      const rod = document.createElement('div');
      const bgStyle = colorType === 'amber' ? 'bg-[#dca134] border-[#b27d1a]' : 'bg-[#2995a5] border-[#1d6b77]';
      const fillStyle = colorType === 'amber' ? 'bg-[#f4be41]' : 'bg-[#4dc1d2]';
      
      // Increased height significantly (h-44 sm:h-[210px]) 
      // Added p-0.5 gap-[1px] to handle dividers alongside explicit border
      rod.className = `w-7 sm:w-8 ${bgStyle} rounded-lg border-2 flex flex-col p-0.5 shadow-md h-[180px] sm:h-[210px] justify-between transition-transform overflow-hidden gap-[1px]`;
      
      for (let i = 0; i < 10; i++) {
        const seg = document.createElement('div');
        // Applying strong border logic for individual cube distinction
        seg.className = `w-full flex-1 ${fillStyle} rounded-[1px] border-b-[3px] border-black/30 border-t border-white/50`;
        if (i === 9) {
           seg.classList.remove('border-b-[3px]', 'border-black/30'); // remove bottom border for the very last piece to fit nicely
        }
        rod.appendChild(seg);
      }
      return rod;
    }

    // Creates dynamic 1x1 unit cube with bold 3D styling
    function createOneCubeDOM(colorType = 'amber') {
      const cube = document.createElement('div');
      const bgStyle = colorType === 'amber' ? 'bg-[#f4be41] border-[#b27d1a]' : 'bg-[#4dc1d2] border-[#2995a5]';
      const glossStyle = 'bg-white/20';
      
      // Stronger bold border added via custom classes
      cube.className = `w-full h-full rounded-md border-2 border-b-[4px] border-black/30 ${bgStyle} relative shadow-sm flex items-center justify-center`;
      
      const gloss = document.createElement('div');
      gloss.className = `absolute top-0.5 left-0.5 right-0.5 h-1.5 rounded-t-sm ${glossStyle} opacity-75`;
      cube.appendChild(gloss);
      
      return cube;
    }

    function generateInteractiveOptions(q) {
      optionsStack.innerHTML = '';

      const sum = q.num1 + q.num2;
      const targetTen = Math.floor(sum / 10) * 10;
      const remainingOnes = sum % 10;

      // Correct regroup answer: highest possible tens + remainder (e.g. 40 + 0 or 30 + 1)
      const correctDecomp = {
        text: `${targetTen} + ${remainingOnes}`,
        isCorrect: true
      };

      const distractors = [];

      // Distractor 1: Standard regroup step without consolidating existing tens (e.g. 30 + 10 instead of 40 + 0)
      const nonConsolidatedTen = Math.floor(q.num1 / 10) * 10 + 10;
      const nonConsolidatedOnes = sum - nonConsolidatedTen;
      if (nonConsolidatedTen < targetTen && nonConsolidatedOnes >= 0) {
        distractors.push({
          text: `${nonConsolidatedTen} + ${nonConsolidatedOnes}`,
          isCorrect: false
        });
      }

      // Distractor 2: No regrouping of the second number (e.g. 20 + 15 instead of 40 + 0)
      const simpleAddTen = Math.floor(q.num1 / 10) * 10 + 10;
      if (simpleAddTen !== targetTen) {
        distractors.push({
          text: `${simpleAddTen} + ${q.num2 % 10}`,
          isCorrect: false
        });
      } else {
        distractors.push({
          text: `${targetTen - 10} + ${remainingOnes + 10}`,
          isCorrect: false
        });
      }

      // Distractor 3: General arithmetic target variation (off-by-one check)
      const offsetOnes = remainingOnes === 0 ? 2 : (remainingOnes + (Math.random() > 0.5 ? 1 : -1));
      distractors.push({
        text: `${targetTen} + ${Math.max(0, offsetOnes)}`,
        isCorrect: false
      });

      // Select unique options
      const uniqueDistractors = [];
      distractors.forEach(d => {
        if (d.text !== correctDecomp.text && !uniqueDistractors.some(ud => ud.text === d.text)) {
          uniqueDistractors.push(d);
        }
      });

      const chosenDistractors = uniqueDistractors.slice(0, 2);
      const allOptions = [correctDecomp, ...chosenDistractors].sort(() => Math.random() - 0.5);

      allOptions.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = "w-full bg-white hover:bg-[#f6f9fc] text-slate-700 font-extrabold text-base sm:text-lg py-3 px-4 border-2 border-slate-200 rounded-xl shadow-sm transition-all duration-200 flex items-center justify-between";
        
        btn.innerHTML = `
          <span>${opt.text}</span>
          <span class="text-slate-300 text-sm"><i class="fa-solid fa-circle-notch text-base"></i></span>
        `;

        btn.addEventListener('click', () => handleOptionSelection(opt, btn, q));
        optionsStack.appendChild(btn);
      });
    }

    function handleOptionSelection(opt, btnElement, q) {
      if (levelSolved) return; 
      
      attemptsThisLevel++;
      totalAttempts++;

      if (opt.isCorrect) {
        levelSolved = true;
        playSound('correct');

        const scoreGained = attemptsThisLevel === 1 ? 100 : 50;
        totalScore += scoreGained;
        scoreEl.textContent = totalScore;

        btnElement.className = "w-full bg-[#e6f7f0] text-[#1e6b4e] font-extrabold text-base sm:text-lg py-3 px-4 border-2 border-[#34b285] rounded-xl shadow-md transition-all scale-[1.02] flex items-center justify-between";
        btnElement.querySelector('i').className = "fa-solid fa-circle-check text-[#34b285] text-base";

        const siblingButtons = optionsStack.querySelectorAll('button');
        siblingButtons.forEach(btn => {
          if (btn !== btnElement) {
            btn.classList.add('opacity-40', 'cursor-not-allowed');
            btn.disabled = true;
          }
        });

        // Trigger regroup animations: fly ones blocks and fixed tens rods from right to left!
        animateRegroupAction(q, () => {
          revealChalkboardEquation(q);
        });

      } else {
        playSound('incorrect');
        btnElement.className = "w-full bg-[#fff5f5] text-[#9b2c2c] font-extrabold text-base sm:text-lg py-3 px-4 border-2 border-[#e53e3e] rounded-xl shadow-sm scale-95 opacity-80 cursor-not-allowed flex items-center justify-between";
        btnElement.querySelector('i').className = "fa-solid fa-circle-xmark text-[#e53e3e] text-base";
        btnElement.disabled = true;
      }
    }

    function animateRegroupAction(q, callback) {
      let animationsToWait = 0;
      let animationsCompleted = 0;

      function checkAllDone() {
        animationsCompleted++;
        if (animationsCompleted === animationsToWait) {
          if (callback) callback();
        }
      }

      const rightRods = Array.from(looseOnesContainer.querySelectorAll('.right-rod-unit'));
      const makeTenNeed = 10 - (q.num1 % 10);
      const looseBlocks = Array.from(looseOnesContainer.querySelectorAll('.block-unit'));
      const emptySlots = Array.from(tenFrameGrid.querySelectorAll('[data-target-empty="true"]'));

      const rodsToAnimate = rightRods.length;
      const cubesToAnimate = Math.min(makeTenNeed, looseBlocks.length, emptySlots.length);

      animationsToWait = (rodsToAnimate > 0 ? 1 : 0) + (cubesToAnimate > 0 ? 1 : 0);

      if (animationsToWait === 0) {
        if (callback) callback();
        return;
      }

      // A. Animate Tens Rods Flying from right box to left box
      if (rodsToAnimate > 0) {
        let rodsDone = 0;
        rightRods.forEach((rod, idx) => {
          // Create a matching amber rod on the left (initially hidden)
          const targetRod = createRodDOM('amber');
          targetRod.style.opacity = '0';
          targetRod.style.transform = 'scale(0.8)';
          targetRod.style.transition = 'all 0.5s ease-out';
          rodsContainer.appendChild(targetRod);

          // Get positions
          const startRect = rod.getBoundingClientRect();
          const endRect = targetRod.getBoundingClientRect();

          const diffX = endRect.left - startRect.left;
          const diffY = endRect.top - startRect.top;

          // Animate the cyan rod flying smoothly
          playSound('fly');
          rod.style.transition = 'all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
          rod.style.transform = `translate(${diffX}px, ${diffY}px) scale(1) rotate(0deg)`;
          rod.style.zIndex = '999';

          rod.addEventListener('transitionend', () => {
            targetRod.style.opacity = '1';
            targetRod.style.transform = 'scale(1)';
            rod.remove();
            rodsDone++;
            if (rodsDone === rodsToAnimate) {
              checkAllDone();
            }
          }, { once: true });
        });
      }

      // B. Animate Ones Cubes Flying to empty ten-frame slots
      if (cubesToAnimate > 0) {
        for (let i = 0; i < cubesToAnimate; i++) {
          if (emptySlots[i]) emptySlots[i].classList.add('target-slot-glow');
        }

        let cubesDone = 0;
        for (let index = 0; index < cubesToAnimate; index++) {
          const looseBlock = looseBlocks[looseBlocks.length - 1 - index];
          const targetSlot = emptySlots[index];

          if (!looseBlock || !targetSlot) continue;

          playSound('fly');

          const startRect = looseBlock.getBoundingClientRect();
          const endRect = targetSlot.getBoundingClientRect();

          const diffX = endRect.left - startRect.left;
          const diffY = endRect.top - startRect.top;

          looseBlock.style.transition = 'all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
          looseBlock.style.transform = `translate(${diffX}px, ${diffY}px) scale(1.1) rotate(15deg)`;
          looseBlock.style.zIndex = '999';

          looseBlock.addEventListener('transitionend', () => {
            targetSlot.removeAttribute('data-target-empty');
            targetSlot.classList.remove('border-dashed', 'bg-white/20', 'target-slot-glow');
            targetSlot.innerHTML = '';
            
            const solidNewCube = createOneCubeDOM('amber');
            solidNewCube.classList.add('animate-ping-once');
            targetSlot.appendChild(solidNewCube);

            looseBlock.remove();

            cubesDone++;
            if (cubesDone === cubesToAnimate) {
              setTimeout(() => {
                fuseTenFrameToRod(() => {
                  checkAllDone();
                });
              }, 500);
            }
          }, { once: true });
        }
      }
    }

    // Fuses a fully completed 10-frame into a vertical Tens-Rod
    function fuseTenFrameToRod(callback) {
      const tenFrameBox = document.getElementById('ten-frame-container');
      
      tenFrameBox.style.transition = 'all 0.4s cubic-bezier(0.6, -0.28, 0.735, 0.045)';
      tenFrameBox.style.transform = 'scale(0) rotate(-10deg)';

      setTimeout(() => {
        rodsContainer.appendChild(createRodDOM('amber'));
        tenFrameBox.classList.add('hidden');
        playSound('select');
        if (callback) callback();
      }, 400);
    }

    function revealChalkboardEquation(q) {
      const sum = q.num1 + q.num2;
      const targetTen = Math.floor(sum / 10) * 10;
      const remainingOnes = sum % 10;

      // Fill in regroup step placeholder inside chalkboard beautifully
      eqRegroupSlot.className = "min-w-[130px] sm:min-w-[170px] h-[50px] sm:h-[65px] border-2 border-[#34b285] bg-[#1c3527] rounded-xl flex items-center justify-center transition-all duration-300 px-3 scale-105 shadow-md";
      eqRegroupText.textContent = `${targetTen} + ${remainingOnes}`;
      eqRegroupText.className = "text-[#e8c86b] text-xl sm:text-3xl font-bold animate-pulse";

      // Trigger reveal of final result with a tiny timing delay
      setTimeout(() => {
        eqResultBox.className = "min-w-[65px] sm:min-w-[85px] h-[50px] sm:h-[65px] border-2 border-[#34b285] bg-[#1c3527] rounded-xl flex items-center justify-center px-4 transition-all duration-300 scale-105 shadow-md";
        eqFinalTotal.textContent = sum;
        eqFinalTotal.className = "text-[#34b285] text-2xl sm:text-4xl font-black";
        nextBtn.classList.remove('hidden');
      }, 500);
    }

    // Trigger round progressions
    nextBtn.addEventListener('click', () => {
      currentRoundIndex++;
      loadLevel(currentRoundIndex);
    });

    function showScoreboard() {
      gamePlayView.classList.add('hidden');
      scoreScreenView.classList.remove('hidden');

      const card = document.getElementById('victory-card');
      card.classList.remove('scale-95');
      card.classList.add('scale-100');

      document.getElementById('final-score').textContent = totalScore;
      
      const accuracy = totalAttempts > 0 ? Math.round((currentQuestions.length / totalAttempts) * 100) : 100;
      document.getElementById('final-accuracy').textContent = `${accuracy}%`;

      playSound('correct');
    }

    function restartEverything() {
      totalScore = 0;
      totalAttempts = 0;
      currentRoundIndex = 0;
      
      gamePlayView.classList.remove('hidden');
      scoreScreenView.classList.add('hidden');

      const tenFrameBox = document.getElementById('ten-frame-container');
      tenFrameBox.classList.remove('hidden');
      tenFrameBox.style.transform = 'scale(1)';
      tenFrameBox.style.transition = '';

      initializeRoundQuestions();
      loadLevel(0);
    }

    restartBtn.addEventListener('click', restartEverything);
    playAgainBtn.addEventListener('click', restartEverything);

    // Initial load handler
    window.onload = function () {
      initializeRoundQuestions();
      loadLevel(0);
    };
  </script>
</body>
</html>
