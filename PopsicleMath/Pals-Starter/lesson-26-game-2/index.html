<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Symmetry Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #E0F2FE; /* sky-100 */
            margin: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Duolingo-style 3D Buttons */
        .btn-3d {
            transition: all 0.1s ease;
            box-shadow: 0 6px 0 rgba(0, 0, 0, 0.15);
        }
        .btn-3d:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 rgba(0, 0, 0, 0);
        }
        .btn-3d:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: translateY(6px);
            box-shadow: 0 0 0 rgba(0, 0, 0, 0);
        }

        /* Answer Buttons Specific Colors */
        .btn-ans-1 { background-color: #38BDF8; box-shadow: 0 6px 0 #0284C7; color: white; }
        .btn-ans-2 { background-color: #FB7185; box-shadow: 0 6px 0 #E11D48; color: white; }
        .btn-ans-3 { background-color: #34D399; box-shadow: 0 6px 0 #059669; color: white; }
        .btn-ans-4 { background-color: #FBBF24; box-shadow: 0 6px 0 #D97706; color: white; }

        .speaker-btn {
            background-color: #BAE6FD; /* sky-200 */
            box-shadow: 0 4px 0 #7DD3FC; /* sky-300 */
        }
        .speaker-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #7DD3FC;
        }

        /* Confetti Animation */
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
        .confetti-piece {
            position: absolute;
            width: 12px;
            height: 24px;
            border-radius: 6px;
            top: -20px;
        }

        /* Shape container bounce */
        @keyframes pop {
            0% { transform: scale(0.9); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .animate-pop {
            animation: pop 0.3s ease-out;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center py-4">
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- GAME SCREEN -->
    <div id="game-screen" class="w-full max-w-md bg-white p-6 rounded-3xl shadow-2xl mx-4 relative hidden">
        <!-- Header -->
        <div class="flex justify-between items-center mb-4 text-sky-600 font-black text-lg">
            <div class="bg-sky-100 px-4 py-2 rounded-2xl">Level: <span id="round-display">1</span> / 10</div>
            <div class="bg-amber-100 text-amber-500 px-4 py-2 rounded-2xl flex items-center gap-2">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                <span id="score-display">0</span>
            </div>
        </div>
        
        <!-- Question Block -->
        <div class="bg-sky-50 border-2 border-sky-100 p-5 rounded-3xl mb-6 flex items-center gap-4 relative">
            <p id="question-text" class="text-xl font-bold text-sky-900 leading-snug flex-1"></p>
            <button onclick="readQuestion()" class="speaker-btn p-3 rounded-full flex-shrink-0 transition-transform">
                <svg class="w-8 h-8 text-sky-600" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.983 3.983 0 00-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd"></path></svg>
            </button>
        </div>

        <!-- Animation Text (Order X/Y) -->
        <div id="rot-text" class="text-center font-bold text-lg text-indigo-500 h-6 mb-2 hidden"></div>

        <!-- Shape Display -->
        <div class="flex justify-center mb-6">
            <svg id="shape-svg" viewBox="0 0 100 100" class="w-56 h-56 drop-shadow-xl animate-pop">
                <!-- Reference layer (stationary) for rotational symmetry -->
                <path id="shape-ref" d="" fill="none" stroke="#ccc" stroke-dasharray="2 2" stroke-width="1" class="hidden" />
                
                <!-- Moving layer -->
                <g id="shape-group" transform="rotate(0, 50, 50)">
                    <path id="shape-path" d="" fill="" stroke="#1E293B" stroke-width="2" stroke-linejoin="round" />
                    <!-- Rotational indicator radius line -->
                    <line id="rot-line" x1="50" y1="50" x2="50" y2="10" stroke="#EF4444" stroke-width="2" class="hidden" />
                    <circle id="rot-circle1" cx="50" cy="10" r="3" fill="#EF4444" class="hidden" />
                </g>
                
                <!-- Rotational center point -->
                <circle id="rot-circle-center" cx="50" cy="50" r="3" fill="#334155" class="hidden" />
                
                <!-- Lines of symmetry container -->
                <g id="lines-container"></g>
            </svg>
        </div>

        <!-- Feedback Msg -->
        <div id="feedback-msg" class="text-center font-black text-2xl mb-4 h-8 invisible"></div>

        <!-- Options Grid -->
        <div id="options-grid" class="grid grid-cols-2 gap-4 transition-opacity duration-300">
            <!-- Buttons injected by JS -->
        </div>
    </div>

    <!-- SUMMARY SCREEN -->
    <div id="summary-screen" class="w-full max-w-md bg-white p-8 rounded-3xl shadow-2xl mx-4 text-center relative z-10 hidden">
        <div class="mb-6">
            <svg class="w-32 h-32 mx-auto text-amber-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1.323l3.954 1.582 1.599-.8a1 1 0 01.894 1.79l-1.233.616 1.738 5.42a1 1 0 01-.285 1.05A3.989 3.989 0 0115 15a3.989 3.989 0 01-2.667-1.019 1 1 0 01-.285-1.05l1.715-5.349L11 6.477V16h2a1 1 0 110 2H7a1 1 0 110-2h2V6.477L6.237 7.582l1.715 5.349a1 1 0 01-.285 1.05A3.989 3.989 0 015 15a3.989 3.989 0 01-2.667-1.019 1 1 0 01-.285-1.05l1.738-5.42-1.233-.617a1 1 0 01.894-1.788l1.599.799L9 4.323V3a1 1 0 011-1z" clip-rule="evenodd"></path></svg>
        </div>
        <h1 class="text-4xl font-black text-sky-500 mb-4 uppercase">Well Done!</h1>
        <p class="text-2xl font-bold text-slate-600 mb-8">You scored <span id="final-score" class="text-amber-500 text-4xl"></span> / 10</p>
        <button onclick="initGame()" class="w-full bg-sky-500 text-white py-5 rounded-2xl text-2xl font-black shadow-[0_6px_0_#0284C7] hover:bg-sky-400 active:translate-y-[6px] active:shadow-none transition-all">
            Play Again
        </button>
    </div>

    <!-- Confetti Container -->
    <div id="confetti-container" class="fixed inset-0 pointer-events-none z-50 overflow-hidden hidden"></div>

    <script>
        // --- SHAPE GENERATORS ---
        const generatePolygonPath = (sides, radius = 40) => {
            let path = '';
            for (let i = 0; i < sides; i++) {
                const angle = -Math.PI / 2 + (i * 2 * Math.PI) / sides;
                const x = 50 + radius * Math.cos(angle);
                const y = 50 + radius * Math.sin(angle);
                path += (i === 0 ? 'M ' : 'L ') + `${x} ${y} `;
            }
            return path + 'Z';
        };

        const generateStarPath = (points, inner, outer) => {
            let path = '';
            for (let i = 0; i < points * 2; i++) {
                const radius = i % 2 === 0 ? outer : inner;
                const angle = -Math.PI / 2 + (i * Math.PI) / points;
                const x = 50 + radius * Math.cos(angle);
                const y = 50 + radius * Math.sin(angle);
                path += (i === 0 ? 'M ' : 'L ') + `${x} ${y} `;
            }
            return path + 'Z';
        };

        // --- DATA (Strictly the requested 2D shapes) ---
        const SHAPES = [
            { id: 1, name: 'Square', lines: 4, rot: 4, path: generatePolygonPath(4, 40), color: '#38BDF8' }, // Sky Blue
            { id: 2, name: 'Equilateral Triangle', lines: 3, rot: 3, path: generatePolygonPath(3, 40), color: '#FB7185' }, // Pink-Rose
            { id: 3, name: 'Rectangle', lines: 2, rot: 2, path: 'M 20 30 L 80 30 L 80 70 L 20 70 Z', color: '#A78BFA' }, // Purple
            { id: 4, name: '5-Point Star', lines: 5, rot: 5, path: generateStarPath(5, 18, 45), color: '#FBBF24' }, // Amber
            { id: 5, name: 'Regular Pentagon', lines: 5, rot: 5, path: generatePolygonPath(5, 40), color: '#34D399' }, // Emerald Green
            { id: 6, name: 'Regular Hexagon', lines: 6, rot: 6, path: generatePolygonPath(6, 40), color: '#F472B6' }, // Pink
            { id: 7, name: '6-Point Star', lines: 6, rot: 6, path: generateStarPath(6, 23, 45), color: '#60A5FA' }, // Blue
            { id: 8, name: 'Isosceles Trapezoid', lines: 1, rot: 1, path: 'M 30 25 L 70 25 L 85 75 L 15 75 Z', color: '#F87171' } // Red
        ];

        const BTN_CLASSES = ['btn-ans-1', 'btn-ans-2', 'btn-ans-3', 'btn-ans-4'];
        
        // --- STATE ---
        let currentRound = 1;
        let score = 0;
        let taskPool = [];
        let currentTask = null;
        let audioCtx = null;

        // --- AUDIO ENGINE ---
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            } else if (type === 'incorrect') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(250, now);
                osc.frequency.exponentialRampToValueAtTime(150, now + 0.3);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'match') {
                // Short pop for animation
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'win') {
                [440, 554, 659, 880].forEach((freq, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.type = 'square';
                    o.frequency.value = freq;
                    g.gain.setValueAtTime(0.1, now + i * 0.1);
                    g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.3);
                    o.start(now + i * 0.1);
                    o.stop(now + i * 0.1 + 0.3);
                });
            }
        }

        function readQuestion() {
            if (!currentTask) return;
            window.speechSynthesis.cancel();
            const text = currentTask.mode === 'lines' 
                ? "How many lines of symmetry does the shape have?" 
                : "What is the order of rotational symmetry for this shape?";
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        // --- GAME LOGIC ---
        function generateTaskPool() {
            let pool = [];
            SHAPES.forEach(shape => {
                pool.push({ shape, mode: 'lines', correct: shape.lines });
                pool.push({ shape, mode: 'rotational', correct: shape.rot });
            });
            // Shuffle pool
            pool = pool.sort(() => Math.random() - 0.5);
            // Slice 10 questions
            return pool.slice(0, 10);
        }

        function initGame() {
            initAudio();
            taskPool = generateTaskPool();
            currentRound = 1;
            score = 0;
            
            document.getElementById('summary-screen').classList.add('hidden');
            document.getElementById('confetti-container').classList.add('hidden');
            document.getElementById('confetti-container').innerHTML = '';
            document.getElementById('game-screen').classList.remove('hidden');
            
            loadNextQuestion();
        }

        function resetSvg() {
            document.getElementById('lines-container').innerHTML = '';
            document.getElementById('shape-ref').classList.add('hidden');
            document.getElementById('rot-line').classList.add('hidden');
            document.getElementById('rot-circle1').classList.add('hidden');
            document.getElementById('rot-circle-center').classList.add('hidden');
            document.getElementById('rot-text').classList.add('hidden');
            document.getElementById('shape-group').setAttribute('transform', 'rotate(0, 50, 50)');
            document.getElementById('options-grid').classList.remove('opacity-50', 'pointer-events-none');
        }

        function loadNextQuestion() {
            if (currentRound > 10) {
                showSummary();
                return;
            }

            resetSvg();
            currentTask = taskPool[currentRound - 1];
            
            // Update UI
            document.getElementById('round-display').innerText = currentRound;
            document.getElementById('score-display').innerText = score;
            
            const qText = currentTask.mode === 'lines' 
                ? 'How many lines of symmetry does the shape have?' 
                : 'What is the order of rotational symmetry for this shape?';
            document.getElementById('question-text').innerText = qText;

            const shapeSvg = document.getElementById('shape-svg');
            shapeSvg.classList.remove('animate-pop');
            void shapeSvg.offsetWidth; // trigger reflow
            shapeSvg.classList.add('animate-pop');

            const pathEl = document.getElementById('shape-path');
            pathEl.setAttribute('d', currentTask.shape.path);
            pathEl.setAttribute('fill', currentTask.shape.color);
            
            // Set ref path to match
            document.getElementById('shape-ref').setAttribute('d', currentTask.shape.path);

            document.getElementById('feedback-msg').className = "text-center font-black text-2xl mb-4 h-8 invisible";
            
            generateOptions();
        }

        function generateOptions() {
            const opts = new Set([currentTask.correct]);
            while (opts.size < 4) {
                let randomOpt = Math.floor(Math.random() * 8) + 1; // 1 to 8
                if (currentTask.mode === 'lines' && currentTask.correct === 0) {
                    randomOpt = Math.floor(Math.random() * 5); // Allow 0 if needed, though our shapes min is 1
                }
                opts.add(randomOpt);
            }
            const optionsArray = Array.from(opts).sort(() => Math.random() - 0.5);

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            
            optionsArray.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.className = `btn-3d ${BTN_CLASSES[index]} py-5 rounded-2xl text-4xl font-black w-full flex items-center justify-center`;
                btn.onclick = () => handleAnswer(opt, btn);
                grid.appendChild(btn);
            });
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function animateRotation(element, start, end, duration) {
            return new Promise(resolve => {
                let startTime = null;
                function step(timestamp) {
                    if (!startTime) startTime = timestamp;
                    let progress = Math.min((timestamp - startTime) / duration, 1);
                    // Ease out cubic
                    let easeProgress = 1 - Math.pow(1 - progress, 3);
                    let currentAngle = start + (end - start) * easeProgress;
                    element.setAttribute("transform", `rotate(${currentAngle}, 50, 50)`);
                    if (progress < 1) {
                        window.requestAnimationFrame(step);
                    } else {
                        resolve();
                    }
                }
                window.requestAnimationFrame(step);
            });
        }

        async function playExplanation() {
            const shapeGroup = document.getElementById('shape-group');
            const linesContainer = document.getElementById('lines-container');
            const optionsGrid = document.getElementById('options-grid');
            
            // Dim options during animation
            optionsGrid.classList.add('opacity-50', 'pointer-events-none');

            if (currentTask.mode === 'lines') {
                for (let i = 0; i < currentTask.correct; i++) {
                    const angle = (i * 180) / currentTask.correct;
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", "50");
                    line.setAttribute("y1", "-10");
                    line.setAttribute("x2", "50");
                    line.setAttribute("y2", "110");
                    line.setAttribute("stroke", "#1E293B");
                    line.setAttribute("stroke-width", "2.5");
                    line.setAttribute("stroke-dasharray", "6 4");
                    line.setAttribute("transform", `rotate(${angle}, 50, 50)`);
                    linesContainer.appendChild(line);
                    
                    playSound('match');
                    await sleep(500);
                }
                await sleep(1000);
            } else {
                // Rotational
                document.getElementById('shape-ref').classList.remove('hidden');
                document.getElementById('rot-line').classList.remove('hidden');
                document.getElementById('rot-circle1').classList.remove('hidden');
                document.getElementById('rot-circle-center').classList.remove('hidden');
                const rotText = document.getElementById('rot-text');
                rotText.classList.remove('hidden');

                const order = currentTask.correct;
                for (let i = 1; i <= order; i++) {
                    rotText.innerText = `Order: ${i} / ${order}`;
                    let startAngle = (i - 1) * (360 / order);
                    let endAngle = i * (360 / order);
                    
                    await animateRotation(shapeGroup, startAngle, endAngle, 600);
                    playSound('match');
                    await sleep(400);
                }
                await sleep(800);
            }

            // End explanation, go next
            currentRound++;
            loadNextQuestion();
        }

        function handleAnswer(selectedVal, btnElement) {
            initAudio();
            const gridButtons = document.getElementById('options-grid').querySelectorAll('button');
            gridButtons.forEach(b => b.disabled = true);

            const fb = document.getElementById('feedback-msg');
            fb.classList.remove('invisible');

            if (selectedVal === currentTask.correct) {
                playSound('correct');
                score++;
                document.getElementById('score-display').innerText = score;
                fb.innerText = "Awesome! ✨";
                fb.classList.add('text-emerald-500');
                fb.classList.remove('text-rose-500');
                
                // Play visual explanation
                playExplanation();

            } else {
                playSound('incorrect');
                fb.innerText = "Try again! 💫";
                fb.classList.remove('text-emerald-500');
                fb.classList.add('text-rose-500');
                
                // Shake effect on the wrong button
                btnElement.style.transform = "translateX(-5px)";
                setTimeout(() => btnElement.style.transform = "translateX(5px)", 100);
                setTimeout(() => btnElement.style.transform = "translateX(-5px)", 200);
                setTimeout(() => btnElement.style.transform = "translateY(0px)", 300);

                setTimeout(() => {
                    fb.classList.add('invisible');
                    gridButtons.forEach(b => {
                        b.disabled = false;
                        b.style.transform = '';
                    });
                }, 1000);
            }
        }

        function showSummary() {
            playSound('win');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('summary-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            fireConfetti();
        }

        function fireConfetti() {
            const container = document.getElementById('confetti-container');
            container.classList.remove('hidden');
            container.innerHTML = '';
            
            const colors = ['#38BDF8', '#FB7185', '#34D399', '#FBBF24', '#A78BFA'];
            
            for (let i = 0; i < 70; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti-piece';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.animation = `fall ${Math.random() * 2 + 1.5}s linear forwards`;
                conf.style.animationDelay = Math.random() * 0.5 + 's';
                container.appendChild(conf);
            }
        }

        // Initialize on load
        window.onload = initGame;

    </script>
</body>
</html>
