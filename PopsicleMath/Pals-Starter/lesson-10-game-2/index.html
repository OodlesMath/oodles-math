<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oodles Math: Shape Explorer V2</title>
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #1cb0f6;
            --success: #58cc02;
            --warning: #ffc800;
            --danger: #ff4b4b;
            --purple: #ce82ff;
            --dark: #0f172a;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(180deg, #60c5f7 0%, #b5e6fc 100%);
            user-select: none;
            overflow: hidden; /* Prevent scrolling for app-like feel */
            touch-action: pan-y;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Right Logo Placeholder - Kept empty as requested */
        .logo-placeholder {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 120px;
            height: 60px;
            z-index: 100;
            /* background: rgba(0,0,0,0.1); border: 2px dashed #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; */ /* Uncomment to see the reserved space */
        }

        /* 3D Button Effects */
        .btn-3d {
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            border-bottom: 6px solid rgba(0,0,0,0.2);
            position: relative;
        }
        .btn-3d:active:not(:disabled) {
            transform: translateY(4px);
            border-bottom-width: 2px;
        }
        
        .btn-speaker {
            transition: transform 0.1s, filter 0.1s;
        }
        .btn-speaker:active {
            transform: scale(0.9);
            filter: brightness(0.9);
        }

        /* --- Scenery Background --- */
        .scenery {
            position: fixed;
            inset: 0;
            z-index: -10;
            pointer-events: none;
        }

        /* Rainbow */
        .rainbow {
            position: absolute;
            top: 5%;
            left: 5%;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            box-shadow: 
                inset 0 0 0 15px #ff4b4b, 
                inset 0 0 0 30px #ff9600, 
                inset 0 0 0 45px #ffc800, 
                inset 0 0 0 60px #58cc02, 
                inset 0 0 0 75px #1cb0f6,
                inset 0 0 0 90px #ce82ff;
            clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%);
            opacity: 0.85;
            z-index: -9;
        }

        /* Clouds */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            animation: move-clouds linear infinite;
            box-shadow: 0 8px 0 0 rgba(255,255,255,0.7);
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .cloud::before { width: 50px; height: 50px; top: -20px; left: 15px; }
        .cloud::after { width: 70px; height: 70px; top: -30px; right: 15px; }

        @keyframes move-clouds {
            from { transform: translateX(-200px); }
            to { transform: translateX(100vw); }
        }

        /* Grass Hills */
        .bg-hills {
            position: fixed;
            bottom: -5vh; 
            left: -10%; 
            right: -10%;
            height: 35vh;
            background: #58cc02;
            border-top-left-radius: 50% 100%;
            border-top-right-radius: 50% 100%;
            z-index: -5;
            box-shadow: inset 0 20px 0 0 #7ade28;
            pointer-events: none;
        }

        /* Trees & Flowers */
        .tree {
            position: absolute;
            bottom: 60%;
            width: 30px;
            height: 50px;
            background: #8b5a2b; /* Trunk */
            border-radius: 5px;
        }
        .tree::after {
            content: '';
            position: absolute;
            bottom: 20px;
            left: -25px;
            width: 80px;
            height: 80px;
            background: #46a302; /* Leaves */
            border-radius: 50%;
            box-shadow: inset -10px -10px 0 0 rgba(0,0,0,0.1);
        }

        .flower {
            position: absolute;
            bottom: 40%;
            width: 6px;
            height: 30px;
            background: #46a302;
            border-radius: 3px;
        }
        .flower::before {
            content: '';
            position: absolute;
            top: -15px;
            left: -12px;
            width: 30px;
            height: 30px;
            background: #ff4b4b; /* Petals */
            border-radius: 50%;
            box-shadow: inset -5px -5px 0 0 rgba(0,0,0,0.1);
        }
        .flower::after {
            content: '';
            position: absolute;
            top: -5px;
            left: -2px;
            width: 10px;
            height: 10px;
            background: #ffc800; /* Center */
            border-radius: 50%;
        }

        .sunburst {
            position: fixed;
            top: 50%; left: 50%;
            width: 200vw; height: 200vw;
            margin-left: -100vw; margin-top: -100vw;
            background: repeating-conic-gradient(from 0deg, rgba(255, 255, 255, 0.2) 0deg 15deg, transparent 15deg 30deg);
            animation: rotate-sun 60s linear infinite;
            z-index: -8;
            pointer-events: none;
        }

        @keyframes rotate-sun { 100% { transform: rotate(360deg); } }

        /* Flashlight Mask Effect */
        #game-stage { 
             cursor: crosshair; 
             box-shadow: 0 0 0 8px white, 0 20px 25px -5px rgba(0, 0, 0, 0.15), 0 10px 10px -5px rgba(0, 0, 0, 0.05);
        }

        .flashlight-overlay {
            position: absolute;
            inset: 0;
            background-color: #0f172a;
            pointer-events: none;
            transition: opacity 0.5s ease;
            mask-image: radial-gradient(circle var(--torch-size, 90px) at var(--torch-x, 50%) var(--torch-y, 50%), transparent 0%, black 100%);
            -webkit-mask-image: radial-gradient(circle var(--torch-size, 90px) at var(--torch-x, 50%) var(--torch-y, 50%), transparent 0%, black 100%);
            mask-composite: intersect;
        }

        .torch-ring {
            position: absolute;
            pointer-events: none;
            border: 4px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            width: calc(var(--torch-size, 90px) * 2);
            height: calc(var(--torch-size, 90px) * 2);
            left: var(--torch-x, 50%);
            top: var(--torch-y, 50%);
            box-shadow: inset 0 0 20px rgba(255,255,255,0.2), 0 0 50px rgba(255, 255, 255, 0.4);
            transition: width 0.1s, height 0.1s;
        }

        /* Custom Range Slider */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 28px; width: 28px;
            border-radius: 50%;
            background: #ffc800;
            border: 4px solid white;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            margin-top: -10px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 10px;
            cursor: pointer;
            background: #cbd5e1;
            border-radius: 5px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.15);
        }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        .hidden-element { display: none !important; }

        /* Confetti z-index enforcement */
        canvas[style*="z-index"] { z-index: 9999 !important; }

        /* SVG Drop shadow filter definition for juiciness */
        .juicy-shape { filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.25)); }
    </style>
</head>
<body class="p-2 md:p-4">
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- Top Right reserved space for logo -->
    <div class="logo-placeholder"></div>

    <!-- Scenery Environment -->
    <div class="scenery">
        <div class="sunburst" id="bg-sunburst"></div>
        <div class="rainbow"></div>
        <div class="bg-clouds">
            <div class="cloud w-32 h-10 top-10" style="animation-duration: 45s; animation-delay: -5s;"></div>
            <div class="cloud w-48 h-12 top-32" style="animation-duration: 65s; animation-delay: -25s; opacity: 0.8;"></div>
            <div class="cloud w-40 h-10 top-60" style="animation-duration: 55s; animation-delay: -40s;"></div>
        </div>
        <div class="bg-hills" id="bg-hills">
            <!-- Scenery Details -->
            <div class="tree" style="left: 15%;"></div>
            <div class="tree" style="left: 85%; bottom: 65%; transform: scale(1.2);"></div>
            <div class="tree" style="left: 40%; bottom: 50%; transform: scale(0.8);"></div>
            <div class="flower" style="left: 25%;"></div>
            <div class="flower" style="left: 30%; bottom: 45%; filter: hue-rotate(90deg);"></div>
            <div class="flower" style="left: 70%; bottom: 55%; filter: hue-rotate(180deg);"></div>
            <div class="flower" style="left: 75%; filter: hue-rotate(270deg);"></div>
        </div>
    </div>

    <!-- MAIN GAME CONTAINER: Centers content gracefully -->
    <div class="flex-1 flex flex-col justify-center items-center w-full max-w-5xl mx-auto h-full relative z-10 my-auto">

        <!-- START SCREEN -->
        <div id="screen-start" class="flex flex-col items-center justify-center p-4 w-full">
            <div class="bg-white/95 backdrop-blur-sm rounded-[3.5rem] p-8 md:p-14 max-w-lg w-full text-center shadow-[0_25px_0_0_rgba(0,0,0,0.1)] border-4 border-white transform transition-all hover:scale-105">
                <div class="text-7xl md:text-8xl mb-6 drop-shadow-lg animate-bounce">🔭</div>
                <h1 class="text-4xl md:text-5xl font-black text-slate-700 mb-2 tracking-tight leading-tight">SHAPE<br><span class="text-[#1cb0f6]">EXPLORER</span></h1>
                <p class="text-slate-400 font-bold text-lg md:text-xl mb-10">Find all the hidden magic shapes!</p>
                
                <div class="flex flex-col gap-5">
                    <button onclick="startGame('2D')" class="btn-3d w-full bg-[#58cc02] border-[#46a302] text-white text-2xl font-black py-5 md:py-6 rounded-3xl">
                        2D ADVENTURE
                    </button>
                    <button onclick="startGame('3D')" class="btn-3d w-full bg-[#ce82ff] border-[#a85ad4] text-white text-2xl font-black py-5 md:py-6 rounded-3xl">
                        3D CHALLENGE
                    </button>
                </div>
            </div>
        </div>

        <!-- GAME OVER SCREEN -->
        <div id="screen-over" class="flex items-center justify-center p-4 w-full hidden-element">
            <div class="bg-white/95 backdrop-blur-sm rounded-[4rem] p-10 md:p-14 max-w-xl w-full text-center shadow-[0_25px_0_0_rgba(0,0,0,0.1)] border-4 border-white">
                <div class="text-8xl mb-6 animate-bounce drop-shadow-xl">🏆</div>
                <h1 class="text-5xl font-black text-slate-700 mb-2">WOW!</h1>
                <p class="text-2xl font-bold text-slate-400 mb-8">You found every single shape!</p>
                
                <div id="star-container" class="flex justify-center gap-3 mb-10 text-5xl md:text-6xl flex-wrap"></div>

                <button onclick="location.reload()" class="btn-3d w-full bg-[#1cb0f6] border-[#1899d6] text-white text-2xl font-black py-6 rounded-3xl flex items-center justify-center gap-3 hover:bg-[#149cd3]">
                    PLAY AGAIN
                </button>
            </div>
        </div>

        <!-- MAIN GAMEPLAY UI -->
        <div id="game-ui" class="w-full hidden-element flex flex-col h-full max-h-[95vh]">
            <!-- Top Bar -->
            <div class="flex justify-between items-center mb-4 bg-white/95 backdrop-blur-md py-3 md:py-4 px-6 md:px-8 rounded-[2rem] shadow-lg border-b-4 border-white w-full">
                <div class="flex items-center gap-4 md:gap-5">
                    <button onclick="location.reload()" class="w-12 h-12 bg-slate-100 text-slate-400 rounded-2xl flex items-center justify-center hover:bg-slate-200 transition-all font-bold text-2xl shadow-sm">
                        ↺
                    </button>
                    <div id="progress-dots" class="flex gap-2 overflow-x-auto max-w-[40vw] pb-1"></div>
                </div>
                <div class="flex items-center gap-2 bg-[#ffc800]/20 text-[#d4a000] px-4 md:px-5 py-2 md:py-2.5 rounded-2xl font-black text-xl border-2 border-[#ffc800]/40 whitespace-nowrap">
                    ⭐ <span id="current-score">0</span>
                </div>
            </div>

            <!-- Stage area -->
            <div class="flex-1 min-h-[30vh] w-full flex flex-col justify-center relative">
                <div id="game-stage" class="relative w-full mx-auto aspect-square md:aspect-[16/9] max-h-[50vh] md:max-h-[55vh] bg-[#f8fafc] rounded-[2.5rem] md:rounded-[3rem] overflow-hidden border-4 border-white shadow-xl">
                    <div class="absolute inset-0 opacity-[0.15]" style="background-image: radial-gradient(#1cb0f6 4px, transparent 0); background-size: 40px 40px;"></div>
                    
                    <div id="shape-render-area" class="absolute inset-0 flex items-center justify-center pointer-events-none transition-transform duration-1000"></div>

                    <!-- Overlays -->
                    <div id="darkness" class="flashlight-overlay"></div>
                    <div id="torch-ring" class="torch-ring"></div>

                    <div id="success-label" class="absolute top-1/4 left-0 w-full text-center hidden-element z-20 pointer-events-none">
                        <span class="bg-white/95 backdrop-blur-sm text-[#58cc02] px-8 py-3 md:px-10 md:py-4 rounded-full text-3xl md:text-5xl font-black uppercase tracking-widest shadow-2xl border-4 border-[#58cc02] animate-bounce inline-block">
                            PERFECT!
                        </span>
                    </div>
                </div>
            </div>

            <!-- Controls (Fixed at bottom on smaller screens, relative on large) -->
            <div class="mt-4 text-center bg-white/95 backdrop-blur-md p-5 md:p-6 rounded-[2.5rem] shadow-xl border-t-4 md:border-4 border-white w-full">
                <div class="flex justify-center items-center gap-3 mb-4 md:mb-5">
                    <h2 class="text-slate-600 text-xl md:text-2xl font-black uppercase tracking-widest m-0">Which shape is it?</h2>
                    <button onclick="playTTS('Which shape is it?')" class="btn-speaker bg-[#1cb0f6] text-white w-10 h-10 md:w-12 md:h-12 rounded-full flex items-center justify-center text-xl md:text-2xl shadow-md border-b-4 border-[#1899d6]" aria-label="Listen to question">
                        🔊
                    </button>
                </div>
                
                <div id="options-container" class="grid grid-cols-1 md:grid-cols-3 gap-3 md:gap-5 mb-4"></div>
                
                <!-- Adjustable Torch Size Slider -->
                <div class="flex items-center justify-center gap-3 md:gap-4 bg-slate-100/80 py-2.5 px-6 rounded-2xl border-2 border-slate-200 inline-flex mx-auto shadow-inner">
                    <span class="text-2xl">🔦</span>
                    <span class="text-slate-500 font-bold uppercase tracking-wider text-xs md:text-sm">Light Size</span>
                    <input type="range" id="torch-slider" min="60" max="180" value="100" class="w-32 md:w-48 ml-2">
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- High Quality, Realistic & Juicy SVGs ---
        // Enhanced with gradients, drop shadows, and highlights for 4-5 year olds
        
        const SVG_DEFS = `
            <defs>
                <!-- 2D Glossy Highlight -->
                <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
                    <stop offset="40%" stop-color="white" stop-opacity="0.1"/>
                    <stop offset="100%" stop-color="white" stop-opacity="0"/>
                </linearGradient>
                <!-- 3D Shading Gradients -->
                <linearGradient id="cylinderBody" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="black" stop-opacity="0.1"/>
                    <stop offset="30%" stop-color="white" stop-opacity="0.2"/>
                    <stop offset="70%" stop-color="currentColor"/>
                    <stop offset="100%" stop-color="black" stop-opacity="0.3"/>
                </linearGradient>
                <radialGradient id="sphereJuice" cx="35%" cy="35%" r="65%">
                    <stop offset="0%" stop-color="white" stop-opacity="0.8" />
                    <stop offset="30%" stop-color="currentColor" stop-opacity="1" />
                    <stop offset="100%" stop-color="black" stop-opacity="0.4" />
                </radialGradient>
            </defs>
        `;

        const SHAPES_2D = [
            { name: 'Circle', color: '#ff4b4b', svg: `<g class="juicy-shape" stroke="#1e293b" stroke-width="4"><circle cx="50" cy="50" r="40" fill="currentColor"/><circle cx="50" cy="50" r="40" fill="url(#gloss)" stroke="none"/></g>` },
            { name: 'Triangle', color: '#1cb0f6', svg: `<g class="juicy-shape" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"><polygon points="50,15 90,85 10,85" fill="currentColor"/><polygon points="50,15 90,85 10,85" fill="url(#gloss)" stroke="none"/></g>` },
            { name: 'Rectangle', color: '#ce82ff', svg: `<g class="juicy-shape" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"><rect x="10" y="30" width="80" height="40" rx="4" fill="currentColor"/><rect x="10" y="30" width="80" height="40" rx="4" fill="url(#gloss)" stroke="none"/></g>` },
            { name: 'Square', color: '#ffc800', svg: `<g class="juicy-shape" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"><rect x="20" y="20" width="60" height="60" rx="6" fill="currentColor"/><rect x="20" y="20" width="60" height="60" rx="6" fill="url(#gloss)" stroke="none"/></g>` },
            { name: 'Half Circle', color: '#ff9600', svg: `<g class="juicy-shape" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"><path d="M 10 70 A 40 40 0 0 1 90 70 Z" fill="currentColor"/><path d="M 10 70 A 40 40 0 0 1 90 70 Z" fill="url(#gloss)" stroke="none"/></g>` },
            { name: 'Quarter', color: '#58cc02', svg: `<g class="juicy-shape" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"><path d="M 20 80 L 80 80 A 60 60 0 0 0 20 20 Z" fill="currentColor"/><path d="M 20 80 L 80 80 A 60 60 0 0 0 20 20 Z" fill="url(#gloss)" stroke="none"/></g>` },
            { name: 'Diamond', color: '#ff4b4b', svg: `<g class="juicy-shape" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"><polygon points="50,5 85,50 50,95 15,50" fill="currentColor"/><polygon points="50,5 85,50 50,95 15,50" fill="url(#gloss)" stroke="none"/></g>` }
        ];

        // 3D Shapes with distinct shading on faces for a realistic look
        const SHAPES_3D = [
            { name: 'Cube', color: '#1cb0f6', svg: `<g class="juicy-shape" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"><polygon points="50,25 75,40 50,55 25,40" fill="currentColor"/><polygon points="50,25 75,40 50,55 25,40" fill="white" fill-opacity="0.4" stroke="none"/><polygon points="25,40 50,55 50,85 25,70" fill="currentColor"/><polygon points="50,55 75,40 75,70 50,85" fill="currentColor"/><polygon points="50,55 75,40 75,70 50,85" fill="black" fill-opacity="0.3" stroke="none"/></g>` },
            { name: 'Sphere', color: '#ff4b4b', svg: `<g class="juicy-shape"><circle cx="50" cy="50" r="40" fill="currentColor" stroke="#1e293b" stroke-width="4"/><circle cx="50" cy="50" r="40" fill="url(#sphereJuice)"/></g>` },
            { name: 'Cone', color: '#ffc800', svg: `<g class="juicy-shape" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"><path d="M 50,15 L 20,75 A 30 12 0 0 0 80,75 Z" fill="currentColor"/><path d="M 50,15 L 20,75 A 30 12 0 0 0 80,75 Z" fill="url(#cylinderBody)" stroke="none"/></g>` },
            { name: 'Cylinder', color: '#00cd9c', svg: `<g class="juicy-shape" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"><path d="M 25,30 L 25,75 A 25 12 0 0 0 75,75 L 75,30 Z" fill="currentColor"/><path d="M 25,30 L 25,75 A 25 12 0 0 0 75,75 L 75,30 Z" fill="url(#cylinderBody)" stroke="none"/><ellipse cx="50" cy="30" rx="25" ry="12" fill="currentColor"/><ellipse cx="50" cy="30" rx="25" ry="12" fill="white" fill-opacity="0.3" stroke="none"/></g>` },
            { name: 'Pyramid', color: '#ce82ff', svg: `<g class="juicy-shape" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"><polygon points="50,20 20,75 50,90" fill="currentColor"/><polygon points="50,20 20,75 50,90" fill="white" fill-opacity="0.1" stroke="none"/><polygon points="50,20 50,90 80,75" fill="currentColor"/><polygon points="50,20 50,90 80,75" fill="black" fill-opacity="0.3" stroke="none"/></g>` },
            { name: 'Cuboid', color: '#58cc02', svg: `<g class="juicy-shape" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"><polygon points="50,15 75,30 50,45 25,30" fill="currentColor"/><polygon points="50,15 75,30 50,45 25,30" fill="white" fill-opacity="0.4" stroke="none"/><polygon points="25,30 50,45 50,90 25,75" fill="currentColor"/><polygon points="50,45 75,30 75,75 50,90" fill="currentColor"/><polygon points="50,45 75,30 75,75 50,90" fill="black" fill-opacity="0.3" stroke="none"/></g>` },
            { name: 'Prism', color: '#ff9600', svg: `<g class="juicy-shape" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"><polygon points="50,35 75,80 90,60 65,15" fill="currentColor"/><polygon points="50,35 75,80 90,60 65,15" fill="black" fill-opacity="0.25" stroke="none"/><polygon points="25,80 75,80 50,35" fill="currentColor"/><polygon points="25,80 75,80 50,35" fill="white" fill-opacity="0.1" stroke="none"/></g>` }
        ];

        // --- State ---
        let mode = '2D';
        let currentRound = 1;
        let score = 0;
        let shapeQueue = [];
        let currentTarget = null;
        let isRevealed = false;

        // --- Core Functions ---
        function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

        // Upgraded Sound Effects for kids
        function playSfx(type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                
                if (type === 'correct') {
                    // Cheerful Arpeggio
                    osc.type = 'sine'; 
                    osc.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
                    osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1); // E5
                    osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.2); // G5
                    osc.frequency.setValueAtTime(1046.50, ctx.currentTime + 0.3); // C6
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                    osc.start(); osc.stop(ctx.currentTime + 0.5);
                } else {
                    // Gentle boop
                    osc.type = 'triangle'; 
                    osc.frequency.setValueAtTime(250, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start(); osc.stop(ctx.currentTime + 0.3);
                }
            } catch(e) {}
        }

        // Text-to-Speech Function
        function playTTS(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Stop any current speech
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = "en-US";
                utterance.rate = 0.85; // Slightly slower
                utterance.pitch = 1.3; // Higher, more cheerful pitch
                window.speechSynthesis.speak(utterance);
            }
        }

        // --- Game Flow ---
        function startGame(selectedMode) {
            mode = selectedMode;
            document.getElementById('screen-start').classList.add('hidden-element');
            document.getElementById('game-ui').classList.remove('hidden-element');
            
            // Adjust background elements
            document.getElementById('bg-sunburst').classList.add('hidden-element');
            document.getElementById('bg-hills').style.zIndex = "-10"; 
            
            const list = mode === '2D' ? [...SHAPES_2D] : [...SHAPES_3D];
            shapeQueue = shuffle(list).slice(0, 7); // Pick 7 random rounds

            initProgressDots();
            setupRound();
            updateTorchSize(document.getElementById('torch-slider').value);
        }

        function initProgressDots() {
            const container = document.getElementById('progress-dots');
            container.innerHTML = '';
            shapeQueue.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'h-3 md:h-4 w-8 md:w-10 rounded-full bg-slate-200/50 shadow-inner transition-all flex-shrink-0';
                dot.id = `dot-${i + 1}`;
                container.appendChild(dot);
            });
        }

        function setupRound() {
            isRevealed = false;
            currentTarget = shapeQueue[currentRound - 1];
            
            document.getElementById('darkness').style.opacity = '1';
            document.getElementById('torch-ring').style.opacity = '1';
            document.getElementById('success-label').classList.add('hidden-element');
            
            const currentDot = document.getElementById(`dot-${currentRound}`);
            currentDot.classList.remove('bg-slate-200/50');
            currentDot.classList.add('bg-[#ffc800]', 'animate-pulse');

            const area = document.getElementById('shape-render-area');
            area.innerHTML = `
                <svg width="250" height="250" viewBox="0 0 100 100" style="color: ${currentTarget.color}" class="max-w-[70%] max-h-[70%] drop-shadow-2xl">
                    ${SVG_DEFS}
                    ${currentTarget.svg}
                </svg>
            `;
            area.style.transform = 'scale(1)';

            // Auto-play the question sound on new round (optional, can be removed if annoying)
            setTimeout(() => playTTS("Which shape is it?"), 500);

            // Generate 3 Options
            const allShapes = mode === '2D' ? SHAPES_2D : SHAPES_3D;
            let wrongs = shuffle(allShapes.filter(s => s.name !== currentTarget.name)).slice(0, 2);
            const opts = shuffle([currentTarget, ...wrongs]);

            const optContainer = document.getElementById('options-container');
            optContainer.innerHTML = '';
            opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn-3d w-full text-xl md:text-2xl font-black py-4 md:py-6 rounded-2xl md:rounded-3xl bg-white text-slate-600 border-b-4 border-slate-200 hover:bg-slate-50 uppercase tracking-widest shadow-sm';
                btn.innerText = opt.name;
                btn.onclick = () => handleGuess(opt.name, btn);
                optContainer.appendChild(btn);
            });
        }

        function handleGuess(name, btn) {
            if (isRevealed) return;
            if (name === currentTarget.name) {
                isRevealed = true; score++;
                playSfx('correct');
                playTTS("Correct! It's a " + name);
                
                document.getElementById('current-score').innerText = score;
                document.getElementById('darkness').style.opacity = '0';
                document.getElementById('torch-ring').style.opacity = '0';
                document.getElementById('success-label').classList.remove('hidden-element');
                document.getElementById('shape-render-area').style.transform = 'scale(1.3)';
                
                const dot = document.getElementById(`dot-${currentRound}`);
                dot.className = 'h-3 md:h-4 w-8 md:w-10 rounded-full bg-[#58cc02] shadow-sm flex-shrink-0';
                
                btn.classList.add('bg-[#58cc02]', 'text-white', 'border-[#46a302]');
                btn.classList.remove('bg-white', 'text-slate-600', 'border-slate-200');

                setTimeout(() => {
                    if (currentRound < shapeQueue.length) {
                        currentRound++;
                        setupRound();
                    } else {
                        finishGame();
                    }
                }, 2500);
            } else {
                playSfx('wrong');
                btn.classList.add('shake', 'bg-red-100', 'text-red-600', 'border-red-300');
                setTimeout(() => btn.classList.remove('shake', 'bg-red-100', 'text-red-600', 'border-red-300'), 400);
            }
        }

        function finishGame() {
            document.getElementById('game-ui').classList.add('hidden-element');
            document.getElementById('bg-sunburst').classList.remove('hidden-element');
            document.getElementById('screen-over').classList.remove('hidden-element');
            
            playTTS("Wow! You found every single shape!");

            const starContainer = document.getElementById('star-container');
            starContainer.innerHTML = '';
            for(let i=0; i<shapeQueue.length; i++) {
                const s = document.createElement('span');
                s.innerText = i < score ? '⭐' : '☆';
                s.className = i < score ? 'animate-bounce drop-shadow-md' : 'opacity-30';
                s.style.animationDelay = `${i * 0.1}s`;
                starContainer.appendChild(s);
            }
            
            // Fire high-priority confetti
            confetti({ particleCount: 300, spread: 100, origin: { y: 0.5 }, zIndex: 9999, colors: ['#ff4b4b', '#1cb0f6', '#ffc800', '#58cc02', '#ce82ff'] });
            setTimeout(() => confetti({ particleCount: 200, spread: 140, origin: { y: 0.6 }, zIndex: 9999 }), 800);
            setTimeout(() => confetti({ particleCount: 200, spread: 140, origin: { y: 0.7 }, zIndex: 9999 }), 1600);
        }

        // --- Interaction & Torch Logic ---
        const stage = document.getElementById('game-stage');
        const torchSlider = document.getElementById('torch-slider');

        function moveTorch(e) {
            const rect = stage.getBoundingClientRect();
            // ClientX/Y ensures it follows cursor even if page scrolled
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            
            // Constrain within bounds
            const boundedX = Math.max(0, Math.min(x, rect.width));
            const boundedY = Math.max(0, Math.min(y, rect.height));

            stage.style.setProperty('--torch-x', `${boundedX}px`);
            stage.style.setProperty('--torch-y', `${boundedY}px`);
        }
        
        function updateTorchSize(val) {
            // Scale dynamically based on window width to feel consistent on mobile
            const scale = window.innerWidth < 768 ? 0.7 : 1;
            stage.style.setProperty('--torch-size', `${val * scale}px`);
        }

        stage.addEventListener('mousemove', moveTorch);
        stage.addEventListener('touchmove', (e) => { e.preventDefault(); moveTorch(e); }, { passive: false });
        
        torchSlider.addEventListener('input', (e) => {
            updateTorchSize(e.target.value);
        });

        // Initialize center pos
        stage.style.setProperty('--torch-x', `50%`);
        stage.style.setProperty('--torch-y', `50%`);
        updateTorchSize(100);

        // Handle window resize dynamically adjusting torch
        window.addEventListener('resize', () => {
             updateTorchSize(torchSlider.value);
        });

    </script>
</body>
</html>
