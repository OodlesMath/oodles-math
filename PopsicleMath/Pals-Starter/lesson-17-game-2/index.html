<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Superhero Number Race - Version 12</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #4ab1f5;
            overflow: hidden;
            touch-action: none;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
        }

        .bubbly-font {
            font-family: 'Poppins', sans-serif;
            font-weight: 900;
            letter-spacing: 0.02em;
        }

        .btn-3d {
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .btn-3d:active {
            transform: translateY(6px);
            border-bottom-width: 0px !important;
            margin-bottom: 6px;
        }
        .btn-3d.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
            filter: grayscale(100%);
        }

        /* Character Animations */
        .hero-container {
            transition: left 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            will-change: left, transform;
            z-index: 20;
        }
        
        .hover-bob { animation: bob 2s infinite ease-in-out; }
        @keyframes bob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .cape-anim {
            animation: cape-wave 0.5s infinite ease-in-out;
            transform-origin: left center;
        }
        @keyframes cape-wave {
            0%, 100% { transform: scaleY(1) rotate(0deg); }
            50% { transform: scaleY(1.1) rotate(5deg); }
        }

        /* Stun Effect Animations */
        .spin-slow {
            animation: spin 3s linear infinite;
            transform-origin: 150px 45px;
        }
        .spin-fast {
            animation: spin 1.5s linear infinite;
            transform-origin: 150px 45px;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        .shake-stun {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) infinite;
        }
        @keyframes shake {
            0%, 100% { transform: translate3d(0, 0, 0); }
            25% { transform: translate3d(-3px, 3px, 0); }
            50% { transform: translate3d(3px, -2px, 0); }
            75% { transform: translate3d(-2px, -3px, 0); }
        }

        .confetti-piece {
            position: absolute;
            z-index: 9999;
            pointer-events: none;
            will-change: transform, opacity;
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- SVG Definitions for Pastel Gradients -->
    <svg style="width:0;height:0;position:absolute;" aria-hidden="true" focusable="false">

                <!-- Right Trees -->

                    <rect x="15" y="40" width="10" height="40" fill="#78350f" rx="2"/>
                    <circle cx="20" cy="20" r="30" fill="#22c55e"/>
                    <circle cx="0" cy="35" r="20" fill="#16a34a"/>
                    <circle cx="40" cy="35" r="20" fill="#16a34a"/>
                </g>
                <g transform="translate(850, 590) scale(0.75)">
                    <rect x="15" y="40" width="10" height="40" fill="#78350f" rx="2"/>
                    <circle cx="20" cy="20" r="30" fill="#22c55e"/>
                    <circle cx="0" cy="35" r="20" fill="#15803d"/>
                    <circle cx="40" cy="35" r="20" fill="#15803d"/>

                <!-- Center Dashed Line ONLY (Clean look) -->
                <line x1="600" y1="550" x2="600" y2="850" stroke="#FFFFFF" stroke-width="10" stroke-dasharray="40 40" opacity="0.9" />
            </svg>
        </div>

        <!-- UI & Game Layer (Flex layout for perfect scaling) -->

            <!-- TOP UI: HUD & Pattern -->

                        <path d="M 160 25 Q 155 35 150 25" fill="none" stroke="#0f172a" stroke-width="2"/> 
                        <circle cx="165" cy="42" r="3.5" fill="#000"/>

                <!-- Player 2 (Robot / Hero) -->

                        <path d="M 35 50 L 15 70 L 30 80 L 50 60 Z" fill="#eab308"/> 
                        <path d="M 90 60 L 50 65 L 30 85" fill="none" stroke="#22c55e" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M 45 65 L 20 85 L 40 95 L 60 75 Z" fill="#fde047"/>
                        <path d="M 70 35 L 130 35 A 15 15 0 0 1 145 50 A 15 15 0 0 1 130 65 L 70 65 Z" fill="#22c55e"/>
                        <path d="M 65 35 L 90 35 L 90 65 L 65 65 Z" fill="#eab308"/> 
                        <rect x="85" y="35" width="8" height="30" fill="#ffffff"/>
                        <circle cx="155" cy="45" r="22" fill="#fca5a5"/>
                        <path d="M 133 45 Q 133 20 155 20 Q 180 20 175 45 Q 165 25 145 35 Z" fill="#166534"/>

                        <path d="M 135 55 L 185 45 L 220 45" fill="none" stroke="#22c55e" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="220" cy="45" r="8" fill="#fca5a5"/>
                        <g class="stun-effect hidden transition-opacity duration-300">
                            <circle cx="155" cy="45" r="30" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6 6" class="spin-slow opacity-60"/>
                            <g class="spin-fast" style="transform-origin: 155px 45px;">
                                <text x="145" y="20" font-size="24">⭐</text>

            <!-- BOTTOM UI: Options. Increased gap to separate P1 and P2 clearly -->

                <div class="flex flex-row w-full gap-8 md:gap-24 justify-center">
                    
                    <!-- Player 1 Panel -->

                        <div class="bg-blue-600 text-white px-4 py-1 rounded-full w-max mx-auto border-2 border-white shadow-md">
                            <h3 class="bubbly-font text-xs md:text-sm uppercase m-0 tracking-widest">PLAYER 1</h3>
                        </div>
                        
                        <div class="relative w-full">
                            <div id="p1-options" class="grid grid-cols-2 gap-3 md:gap-5 w-full">
                                <!-- Buttons -->
                            </div>
                            <div id="p1-stun-overlay" class="hidden absolute -inset-3 bg-blue-900/30 backdrop-blur-[2px] rounded-3xl z-10 flex items-center justify-center pointer-events-none">
                                <span class="text-5xl animate-spin drop-shadow-xl">💫</span>
                            </div>
                        </div>
                    </div>

                    <!-- Player 2 / CPU Panel -->
                    <div id="p2-panel" class="flex-1 flex flex-col gap-2 transition-all duration-300">
                        <div class="bg-green-600 text-white px-4 py-1 rounded-full w-max mx-auto border-2 border-white shadow-md">

        <!-- 5-Second Finish Sequence Overlay -->
        <div id="finish-sequence" class="hidden absolute inset-0 z-[140] flex flex-col items-center justify-center bg-black/60 backdrop-blur-sm p-4">
            <svg width="250" height="250" viewBox="0 0 200 200" class="animate-bounce drop-shadow-2xl">
                <!-- Pole -->
                <rect x="20" y="20" width="12" height="160" fill="#e2e8f0" rx="6"/>

                    <path d="M 32 30 Q 90 10 150 30 T 195 20 L 195 110 Q 150 130 90 110 T 32 120 Z" fill="#ef4444"/>
                    <text x="110" y="85" fill="#fff" font-family="'Poppins', sans-serif" font-weight="900" font-size="32" text-anchor="middle" transform="rotate(-5, 110, 85)" style="text-shadow: 2px 2px 0px #991b1b;">FINISH</text>
                </g>
            </svg>
            <h2 id="finish-sequence-text" class="text-4xl md:text-6xl bubbly-font text-white drop-shadow-[0_5px_10px_rgba(0,0,0,0.8)] text-center mt-6">
                <!-- Text Injected by JS -->

        <!-- Main Menu -->
        <div id="main-menu" class="absolute inset-0 z-[150] flex flex-col items-center justify-center bg-black/50 backdrop-blur-sm p-4">
            <h1 class="text-5xl md:text-7xl lg:text-8xl text-white bubbly-font text-center leading-tight drop-shadow-[0_10px_20px_rgba(0,0,0,0.8)] mb-8 md:mb-12" style="-webkit-text-stroke: 3px #1d4ed8;">
                CITY HERO<br>RACE
            </h1>
            <div class="flex flex-col md:flex-row gap-4 md:gap-6 w-full max-w-3xl px-4">
                <button onclick="startGame('1p')" class="flex-1 btn-3d bg-sky-400 hover:bg-sky-300 text-sky-900 px-4 py-6 md:py-8 rounded-3xl text-2xl md:text-4xl bubbly-font border-b-[8px] border-sky-600 shadow-2xl uppercase">
                    1 PLAYER<br><span class="text-lg md:text-2xl text-sky-800 block mt-1">(VS CPU)</span>
                </button>
                <button onclick="startGame('2p')" class="flex-1 btn-3d bg-green-400 hover:bg-green-300 text-green-900 px-4 py-6 md:py-8 rounded-3xl text-2xl md:text-4xl bubbly-font border-b-[8px] border-green-600 shadow-2xl uppercase">
                    2 PLAYERS<br><span class="text-lg md:text-2xl text-green-800 block mt-1">(LOCAL)</span>
                </button>
            </div>
        </div>

        <!-- Result Modal -->
        <div id="result-modal" class="hidden absolute inset-0 z-[150] flex items-center justify-center bg-black/60 backdrop-blur-md p-4">
            <div class="bg-white rounded-[2.5rem] p-8 md:p-10 max-w-md w-full text-center space-y-6 md:space-y-8 border-[8px] shadow-2xl relative overflow-hidden" id="result-box">
                <div id="result-icon" class="text-6xl md:text-8xl animate-bounce">🏆</div>
                <div>
                    <h2 id="result-title" class="text-4xl md:text-5xl bubbly-font mb-2">WINNER!</h2>
                    <p id="result-text" class="text-lg md:text-xl font-bold text-gray-500">Amazing race!</p>
                </div>
                
                <div class="flex justify-center gap-4">
                    <div class="bg-blue-100 rounded-2xl p-4 border-2 border-blue-300 flex-1">
                        <p class="text-xs md:text-sm font-bold text-blue-700 uppercase mb-1">P1 Score</p>
                        <p id="final-p1" class="text-4xl md:text-5xl bubbly-font text-blue-600">0</p>
                    </div>
                    <div class="bg-green-100 rounded-2xl p-4 border-2 border-green-300 flex-1">
                        <p id="final-p2-label" class="text-xs md:text-sm font-bold text-green-700 uppercase mb-1">P2 Score</p>
                        <p id="final-p2" class="text-4xl md:text-5xl bubbly-font text-green-600">0</p>
                    </div>
                </div>

                <button onclick="resetGame()" class="btn-3d w-full bg-yellow-400 hover:bg-yellow-300 text-yellow-900 py-4 md:py-5 rounded-2xl text-xl md:text-2xl bubbly-font border-b-[6px] border-yellow-600 uppercase tracking-widest mt-4 shadow-lg">
                    PLAY AGAIN
                </button>
            </div>
        </div>

        <div id="confetti-container" class="absolute inset-0 pointer-events-none z-[200] overflow-hidden"></div>
    </div>

    <script>
        const state = {
            mode: '2p', 
            questionCount: 1,
            maxQuestions: 10,
            p1: { score: 0, stunned: false },
            p2: { score: 0, stunned: false },
            gameActive: false,
            currentCorrectAnswer: null,
            pattern: [],
            missingIdx: 0,
            audioInitialized: false,
            cpuTimer: null,
            diffSteps: [1, 1, 1, 2, 2, 2, 5, 5, 10, 10]
        };

        let synth, polySynth;
        
        async function initAudio() {
            if (state.audioInitialized) return;
            await Tone.start();
            polySynth = new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: "triangle" },
                envelope: { attack: 0.05, decay: 0.1, sustain: 0.3, release: 1 }
            }).toDestination();
            polySynth.volume.value = -10;

            synth = new Tone.Synth({
                oscillator: { type: "sawtooth" },
                envelope: { attack: 0.1, decay: 0.2, sustain: 0.1, release: 0.5 }
            }).toDestination();
            synth.volume.value = -12;
            state.audioInitialized = true;
        }

        function playCorrectSound() {
            if(!state.audioInitialized) return;
            const now = Tone.now();
            polySynth.triggerAttackRelease(["C5", "E5", "G5"], "16n", now);
        }

        function playWrongSound() {
            if(!state.audioInitialized) return;
            synth.triggerAttackRelease("C3", "8n");
        }

        function playWinSound() {
            if(!state.audioInitialized) return;
            const now = Tone.now();
            polySynth.triggerAttackRelease(["C4", "E4", "G4", "C5"], "8n", now);
            polySynth.triggerAttackRelease(["E4", "G4", "C5", "E5"], "8n", now + 0.2);
            polySynth.triggerAttackRelease(["G4", "C5", "E5", "G5"], "2n", now + 0.4);
        }

        async function startGame(mode) {
            await initAudio();
            state.mode = mode;
            document.getElementById('main-menu').classList.add('hidden');
            
            const p1Panel = document.getElementById('p1-panel');
            const p2Panel = document.getElementById('p2-panel');

            // Setup UI for 1P vs 2P
            if (mode === '1p') {
                document.getElementById('p2-hero-svg').classList.add('hidden');
                document.getElementById('p2-robot-svg').classList.remove('hidden');
                
                // Hide P2 buttons panel to center P1's panel
                p2Panel.classList.add('hidden');
                p1Panel.classList.remove('flex-1');
                p1Panel.classList.add('w-full', 'max-w-xl', 'mx-auto');
            } else {
                document.getElementById('p2-hero-svg').classList.remove('hidden');
                document.getElementById('p2-robot-svg').classList.add('hidden');
                document.getElementById('p2-panel-title').textContent = 'PLAYER 2';
                
                // Show both panels
                p2Panel.classList.remove('hidden');
                p1Panel.classList.add('flex-1');
                p1Panel.classList.remove('w-full', 'max-w-xl', 'mx-auto');
            }

            state.questionCount = 1;
            state.p1 = { score: 0, stunned: false };
            state.p2 = { score: 0, stunned: false };
            state.gameActive = true;
            
            updatePositions();
            updateUI();
            loadNewPattern();
        }

        function updateUI() {
            document.getElementById('q-num').textContent = state.questionCount;
            document.getElementById('score-p1').textContent = state.p1.score;
            document.getElementById('score-p2').textContent = state.p2.score;
        }

        function updatePositions() {
            const p1Pos = state.p1.score * 8.5; // Scale up to near edge
            const p2Pos = state.p2.score * 8.5;
            
            document.getElementById('hero-p1').style.left = `${p1Pos}%`;
            document.getElementById('hero-p2').style.left = `${p2Pos}%`;
        }

        function generatePattern() {
            const length = 5;
            const stepIndex = Math.min(state.questionCount - 1, state.diffSteps.length - 1);
            const step = state.diffSteps[stepIndex];
            
            let start = Math.floor(Math.random() * 5) + 1;
            if (step === 5 || step === 10) start = step; 
            
            const pattern = [];
            for (let i = 0; i < length; i++) pattern.push(start + (i * step));
            
            const missingIdx = Math.floor(Math.random() * length);
            const correct = pattern[missingIdx];
            
            return { pattern, missingIdx, correct, step };
        }

        function loadNewPattern() {
            if (state.questionCount > state.maxQuestions) {
                endGame();
                return;
            }

            if (state.cpuTimer) clearTimeout(state.cpuTimer);

            const { pattern, missingIdx, correct, step } = generatePattern();
            state.currentCorrectAnswer = correct;
            state.pattern = pattern;
            state.missingIdx = missingIdx;
            
            updateUI();

            const display = document.getElementById('pattern-display');
            display.innerHTML = '';
            pattern.forEach((num, i) => {
                const span = document.createElement('span');
                if (i === missingIdx) {
                    span.innerHTML = `<span class="text-yellow-700 bg-yellow-200 border-b-[4px] md:border-b-[6px] border-yellow-500 rounded-xl md:rounded-2xl px-3 md:px-6 py-1 min-w-[50px] md:min-w-[75px] inline-block text-center shadow-inner">?</span>`;
                } else {
                    span.textContent = num;
                }
                display.appendChild(span);
                if (i < pattern.length - 1) {
                    const dot = document.createElement('span');
                    dot.textContent = '·';
                    dot.className = 'text-gray-300 mx-1 md:mx-3';
                    display.appendChild(dot);
                }
            });

            const options = [correct];
            while (options.length < 4) {
                const choices = [correct + step, correct - step, correct + 1, correct - 1, correct + step*2, correct - step*2];
                let fake = choices[Math.floor(Math.random() * choices.length)];
                if (fake > 0 && !options.includes(fake)) options.push(fake);
            }
            options.sort(() => Math.random() - 0.5);

            renderButtons('p1-options', options, 1);
            
            const optionsP2 = [...options].sort(() => Math.random() - 0.5);
            renderButtons('p2-options', optionsP2, 2);

            if (state.mode === '1p') {
                scheduleCpu();
            }
        }

        function scheduleCpu() {
            if (state.cpuTimer) clearTimeout(state.cpuTimer);
            if (!state.gameActive || state.p2.stunned) return;

            const baseDelay = 3500 - (state.questionCount * 150);
            const delay = Math.max(1500, baseDelay + Math.random() * 1500);
            
            state.cpuTimer = setTimeout(() => {
                if (!state.gameActive || state.p2.stunned) return;
                
                const isCorrect = Math.random() < 0.8;
                const btns = document.getElementById('p2-options').querySelectorAll('button');
                let targetBtn;
                
                if (isCorrect) {
                    targetBtn = Array.from(btns).find(b => parseInt(b.textContent) === state.currentCorrectAnswer);
                } else {
                    const wrongBtns = Array.from(btns).filter(b => parseInt(b.textContent) !== state.currentCorrectAnswer);
                    targetBtn = wrongBtns[Math.floor(Math.random() * wrongBtns.length)];
                }
                
                if(targetBtn) {
                    handleAnswer(2, parseInt(targetBtn.textContent));
                }
            }, delay);
        }

        function renderButtons(containerId, options, playerNum) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            const colorClass = playerNum === 1 ? 'bg-blue-500 border-blue-700 hover:bg-blue-400 text-white' : 'bg-green-500 border-green-700 hover:bg-green-400 text-white';

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = `btn-3d ${colorClass} text-2xl md:text-4xl bubbly-font py-3 md:py-5 rounded-xl md:rounded-[1.25rem] border-b-[5px] md:border-b-[8px] outline-none w-full h-full shadow-[0_10px_20px_rgba(0,0,0,0.3)] flex items-center justify-center tracking-wide`;
                btn.textContent = opt;
                btn.onclick = () => handleAnswer(playerNum, opt);
                container.appendChild(btn);
            });
        }

        function handleAnswer(playerNum, selected) {
            if (!state.gameActive) return;
            
            const pState = playerNum === 1 ? state.p1 : state.p2;
            if (pState.stunned) return;

            if (selected === state.currentCorrectAnswer) {
                playCorrectSound();
                pState.score += 1;
                
                const patCont = document.getElementById('pattern-container');
                patCont.style.transform = 'scale(1.05)';
                patCont.style.borderColor = '#4ADE80';
                
                updatePositions();
                
                if (state.cpuTimer) clearTimeout(state.cpuTimer);
                
                setTimeout(() => {
                    patCont.style.transform = 'scale(1)';
                    patCont.style.borderColor = '#ffffff';
                    state.questionCount++;
                    loadNewPattern();
                }, 400);

            } else {
                playWrongSound();
                stunPlayer(playerNum);
            }
        }

        function stunPlayer(playerNum) {
            const pState = playerNum === 1 ? state.p1 : state.p2;
            pState.stunned = true;

            const overlay = document.getElementById(`p${playerNum}-stun-overlay`);
            const heroClass = playerNum === 1 ? '.hero-svg-p1' : (state.mode === '1p' ? '#p2-robot-svg' : '#p2-hero-svg');
            const heroSvg = document.querySelector(heroClass);
            const stars = heroSvg.querySelector('.stun-effect');
            
            overlay.classList.remove('hidden');
            stars.classList.remove('hidden');
            heroSvg.classList.add('shake-stun');

            const btns = document.getElementById(`p${playerNum}-options`).querySelectorAll('button');
            btns.forEach(b => b.classList.add('disabled'));

            setTimeout(() => {
                pState.stunned = false;
                overlay.classList.add('hidden');
                stars.classList.add('hidden');
                heroSvg.classList.remove('shake-stun');
                btns.forEach(b => b.classList.remove('disabled'));
                
                if (playerNum === 2 && state.mode === '1p') {
                    scheduleCpu();
                }
            }, 3000);
        }

        // --- NEW END GAME LOGIC ---
        function endGame() {
            state.gameActive = false;
            if (state.cpuTimer) clearTimeout(state.cpuTimer);
            playWinSound();
            
            // Determine winner for the finish text
            let winnerName = "";
            let colorClass = "";
            if (state.p1.score > state.p2.score) {
                winnerName = "PLAYER 1";
                colorClass = "text-blue-400";
            } else if (state.p2.score > state.p1.score) {
                winnerName = state.mode === '1p' ? "CPU" : "PLAYER 2";
                colorClass = "text-green-400";
            } else {
                winnerName = "EVERYONE";
                colorClass = "text-yellow-400";
            }

            // Show 5-second Finish Flag Sequence
            const finishSeq = document.getElementById('finish-sequence');
            const finishText = document.getElementById('finish-sequence-text');
            finishText.innerHTML = `<span class="${colorClass}">${winnerName}</span><br/>CROSSED THE FINISH LINE!`;
            finishSeq.classList.remove('hidden');

            // Wait 5 seconds, then show final result board
            setTimeout(() => {
                finishSeq.classList.add('hidden');
                showFinalResultModal();
            }, 5000);
        }

        function showFinalResultModal() {
            const modal = document.getElementById('result-modal');
            const title = document.getElementById('result-title');
            const box = document.getElementById('result-box');
            
            document.getElementById('final-p1').textContent = state.p1.score;
            document.getElementById('final-p2').textContent = state.p2.score;
            document.getElementById('final-p2-label').textContent = state.mode === '1p' ? 'CPU SCORE' : 'P2 SCORE';

            box.className = "bg-white rounded-[2.5rem] p-8 md:p-10 max-w-md w-full text-center space-y-6 md:space-y-8 border-[8px] shadow-2xl relative overflow-hidden";

            if (state.p1.score > state.p2.score) {
                title.textContent = "PLAYER 1 WINS!";
                title.className = "text-4xl md:text-5xl bubbly-font text-blue-600 mb-2";
                box.classList.add('border-blue-400');
                fireRealisticConfetti();
            } else if (state.p2.score > state.p1.score) {
                if (state.mode === '1p') {
                    title.textContent = "CPU WINS!";
                    title.className = "text-4xl md:text-5xl bubbly-font text-gray-500 mb-2";
                    box.classList.add('border-gray-400');
                    fireRealisticConfetti();
                } else {
                    title.textContent = "PLAYER 2 WINS!";
                    title.className = "text-4xl md:text-5xl bubbly-font text-green-600 mb-2";
                    box.classList.add('border-green-400');
                    fireRealisticConfetti();
                }
            } else {
                title.textContent = "IT's A TIE!";
                title.className = "text-4xl md:text-5xl bubbly-font text-yellow-500 mb-2";
                box.classList.add('border-yellow-400');
                fireRealisticConfetti();
            }

            modal.classList.remove('hidden');
        }

        function resetGame() {
            document.getElementById('finish-sequence').classList.add('hidden');
            document.getElementById('result-modal').classList.add('hidden');
            
            [1, 2].forEach(num => {
                document.getElementById(`p${num}-stun-overlay`).classList.add('hidden');
                document.querySelector(`.hero-svg-p1`).classList.remove('shake-stun');
                document.querySelector(`#p2-hero-svg`).classList.remove('shake-stun');
                document.querySelector(`#p2-robot-svg`).classList.remove('shake-stun');
                
                document.querySelectorAll('.stun-effect').forEach(el => el.classList.add('hidden'));
            });

            document.getElementById('confetti-container').innerHTML = '';
            document.getElementById('main-menu').classList.remove('hidden');
        }

        function fireRealisticConfetti() {
            const container = document.getElementById('confetti-container');
            container.innerHTML = ''; 
            
            const colors = ['#fce18a', '#ff726d', '#b48def', '#f4306d', '#4ade80', '#3b82f6', '#facc15', '#a855f7'];
            const amount = window.innerWidth < 768 ? 100 : 200; 

            for (let i = 0; i < amount; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti-piece');
                
                const color = colors[Math.floor(Math.random() * colors.length)];
                const left = Math.random() * 100;
                
                const shapeRand = Math.random();
                if (shapeRand < 0.5) {
                    confetti.style.width = (Math.random() * 8 + 6) + 'px';
                    confetti.style.height = (Math.random() * 16 + 10) + 'px';
                } else if (shapeRand < 0.75) {
                    const size = (Math.random() * 10 + 6) + 'px';
                    confetti.style.width = size;
                    confetti.style.height = size;
                } else {
                    const size = (Math.random() * 10 + 8) + 'px';
                    confetti.style.width = size;
                    confetti.style.height = size;
                    confetti.style.borderRadius = '50%';
                }

                confetti.style.backgroundColor = color;
                confetti.style.left = `${left}%`;
                confetti.style.top = `-20px`;

                const duration = Math.random() * 3 + 2.5; 
                const delay = Math.random() * 1.5; 
                const xMovement = Math.random() * 400 - 200; 
                const rotateStart = Math.random() * 360;
                const rotateX = Math.random() * 1080; 
                const rotateY = Math.random() * 1080;
                const rotateZ = Math.random() * 720;

                confetti.animate([
                    { transform: `translate3d(0, 0, 0) rotate(${rotateStart}deg) rotateX(0) rotateY(0)`, opacity: 1 },
                    { transform: `translate3d(${xMovement/2}px, 50vh, 0) rotate(${rotateStart + rotateZ/2}deg) rotateX(${rotateX/2}deg) rotateY(${rotateY/2}deg)`, opacity: 1 },
                    { transform: `translate3d(${xMovement}px, 105vh, 0) rotate(${rotateStart + rotateZ}deg) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`, opacity: 0 }
                ], {
                    duration: duration * 1000,
                    delay: delay * 1000,
                    easing: 'cubic-bezier(.25,.46,.45,.94)',
                    fill: 'forwards'
                });
                
                container.appendChild(confetti);
            }
        }
    </script>
</body>
</html>
