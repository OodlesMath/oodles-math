<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Bonds V5 - Check Button</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to bottom, #7dd3fc, #e0f2fe);
            overflow: hidden;
            height: 100vh;
            margin: 0;
            touch-action: manipulation;
        }

        /* Floating Cloud Animation */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 9999px;
            opacity: 0.95;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            animation: float-horizontal 30s linear infinite;
            z-index: 0;
        }

        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .cloud::before { width: 50%; height: 100%; top: -40%; left: 15%; }
        .cloud::after { width: 40%; height: 80%; top: -20%; right: 15%; }

        @keyframes float-horizontal {
            from { transform: translateX(-200px); }
            to { transform: translateX(110vw); }
        }

        /* Group Float */
        .magic-float {
            animation: float-vertical 3s ease-in-out infinite alternate;
        }

        @keyframes float-vertical {
            from { transform: translateY(0px); }
            to { transform: translateY(-15px); }
        }

        .pop-animation {
            animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
        }

        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Fireworks and Confetti */
        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 999;
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(255,255,255,0.8);
        }

        /* Realistic 3D Toy Buttons */
        .toy-button {
            background: linear-gradient(to bottom, #ef4444, #dc2626);
            box-shadow: 0 8px 0 #991b1b, 0 15px 20px rgba(0,0,0,0.3), inset 0 4px 5px rgba(255,255,255,0.4);
            transition: all 0.1s;
            border: 4px solid #fca5a5;
        }
        .toy-button:active {
            box-shadow: 0 0px 0 #991b1b, 0 5px 10px rgba(0,0,0,0.3), inset 0 2px 5px rgba(255,255,255,0.4);
            transform: translateY(8px);
        }

        .toy-button-blue {
            background: linear-gradient(to bottom, #3b82f6, #2563eb);
            box-shadow: 0 8px 0 #1e3a8a, 0 15px 20px rgba(0,0,0,0.3), inset 0 4px 5px rgba(255,255,255,0.4);
            border: 4px solid #93c5fd;
        }
        .toy-button-blue:active {
            box-shadow: 0 0px 0 #1e3a8a, 0 5px 10px rgba(0,0,0,0.3), inset 0 2px 5px rgba(255,255,255,0.4);
            transform: translateY(8px);
        }

        .toy-button-green {
            background: linear-gradient(to bottom, #22c55e, #16a34a);
            box-shadow: 0 8px 0 #14532d, 0 15px 20px rgba(0,0,0,0.3), inset 0 4px 5px rgba(255,255,255,0.4);
            border: 4px solid #86efac;
            transition: all 0.1s;
        }
        .toy-button-green:active {
            box-shadow: 0 0px 0 #14532d, 0 5px 10px rgba(0,0,0,0.3), inset 0 2px 5px rgba(255,255,255,0.4);
            transform: translateY(8px);
        }

        /* Glossy Candy/Balloon Circles for Kids */
        .node-circle {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50% !important; 
            font-weight: 900;
            position: absolute; 
            z-index: 20;
            aspect-ratio: 1 / 1; 
            box-shadow: 
                inset -8px -8px 15px rgba(0,0,0,0.15), 
                inset 8px 8px 15px rgba(255,255,255,0.8), 
                0 15px 25px rgba(0,0,0,0.2);
            text-shadow: 2px 3px 0px rgba(0,0,0,0.1);
            border: clamp(4px, 1vw, 8px) solid rgba(255,255,255,0.7);
        }

        .whole-bg { background: radial-gradient(circle at 30% 30%, #fcd34d, #f59e0b); color: #78350f; }
        .part1-bg { background: radial-gradient(circle at 30% 30%, #f9a8d4, #db2777); color: #fff; }
        .part2-bg { background: radial-gradient(circle at 30% 30%, #67e8f9, #0891b2); color: #fff; }

        /* Sizing logic */
        #wholeCircle { 
            width: clamp(100px, 24vw, 150px); 
            height: clamp(100px, 24vw, 150px); 
            font-size: clamp(2.8rem, 8vw, 4rem); 
        }
        .part-circle { 
            width: clamp(85px, 20vw, 120px); 
            height: clamp(85px, 20vw, 120px); 
            font-size: clamp(2.2rem, 7vw, 3rem); 
        }

        /* Sentence Block 3D styling */
        .sentence-card {
            background: linear-gradient(to bottom, #ffffff, #f0f9ff);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1), inset 0 3px 0 rgba(255,255,255,1);
            border: 4px solid #bae6fd;
            border-radius: 1.5rem;
            transition: all 0.15s ease;
            cursor: pointer;
        }
        .sentence-card:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1), inset 0 2px 0 rgba(255,255,255,1);
        }

        .app-container {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 1rem;
        }
    </style>
</head>
<body class="select-none text-gray-800">
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- Animated Clouds (V1 Sky) -->
    <div class="cloud w-32 h-10 top-[10%]" style="animation-delay: -5s; animation-duration: 35s;"></div>
    <div class="cloud w-48 h-14 top-[25%]" style="animation-delay: -15s; animation-duration: 45s;"></div>
    <div class="cloud w-28 h-8 top-[65%]" style="animation-delay: -2s; animation-duration: 25s;"></div>
    <div class="cloud w-40 h-12 top-[45%]" style="animation-delay: -25s; animation-duration: 38s;"></div>

    <div class="app-container relative z-10">
        <!-- Header & Progress -->
        <header class="flex flex-col items-center w-full max-w-lg">
            <div class="flex justify-between items-center w-full px-4 mb-2">
                <div class="bg-white/80 backdrop-blur px-4 py-2 rounded-2xl shadow-md border-2 border-white flex items-center gap-3">
                    <!-- Realistic SVG Star Icon -->
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="url(#starGrad)" stroke="#B45309" stroke-width="1.5" stroke-linejoin="round"/>
                        <defs>
                            <linearGradient id="starGrad" x1="12" y1="2" x2="12" y2="21" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#FEF08A"/>
                                <stop offset="1" stop-color="#F59E0B"/>
                            </linearGradient>
                        </defs>
                    </svg>
                    <span id="progressText" class="font-extrabold text-xl md:text-2xl text-blue-800">0 / 10</span>
                </div>
            </div>
            <h1 class="text-4xl md:text-5xl font-black text-white drop-shadow-[0_4px_4px_rgba(0,100,200,0.3)] tracking-tight text-center mt-1" style="-webkit-text-stroke: 1px #0284c7;">
                Number Bonds
            </h1>
        </header>

        <!-- Main Game Area -->
        <div id="gameArea" class="w-full max-w-[500px] flex-1 min-h-[45vh] flex flex-col items-center justify-center relative my-2">
            
            <div id="emptyState" class="text-blue-900 text-2xl md:text-3xl font-black bg-white/60 backdrop-blur-md px-8 py-4 rounded-3xl shadow-[0_10px_20px_rgba(0,0,0,0.1)] border-2 border-white animate-bounce text-center">
                Tap the GO Button! 👇
            </div>
            
            <div id="bondContent" class="hidden w-full h-full relative magic-float min-h-[280px] max-h-[350px]">
                <!-- SVG Connections -->
                <svg class="absolute inset-0 w-full h-full pointer-events-none" style="z-index: 10;">
                    <defs>
                        <filter id="shadow">
                            <feDropShadow dx="0" dy="5" stdDeviation="4" flood-opacity="0.15"/>
                        </filter>
                    </defs>
                    <line x1="50%" y1="20%" x2="22%" y2="78%" stroke="white" stroke-width="14" stroke-linecap="round" filter="url(#shadow)" />
                    <line x1="50%" y1="20%" x2="78%" y2="78%" stroke="white" stroke-width="14" stroke-linecap="round" filter="url(#shadow)" />
                </svg>

                <!-- Whole -->
                <div class="top-[2%] inset-x-0 mx-auto node-circle whole-bg" id="wholeCircle">0</div>
                <!-- Part 1 -->
                <div class="bottom-[5%] left-[4%] node-circle part-circle part1-bg" id="part1Circle">0</div>
                <!-- Part 2 -->
                <div class="bottom-[5%] right-[4%] node-circle part-circle part2-bg" id="part2Circle">0</div>
            </div>

            <!-- Sentence & Speaker Block (Hidden until Check is clicked) -->
            <div id="sentenceBlock" onclick="speakSentence()" class="hidden mt-6 px-6 py-3 sentence-card flex items-center justify-center gap-4 w-11/12 max-w-[380px] z-30">
                <span id="sentenceText" class="text-2xl md:text-3xl font-black text-blue-900 tracking-wide text-center"></span>
                <!-- Realistic Speaker SVG -->
                <svg class="flex-shrink-0 drop-shadow-md" width="38" height="38" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M11 5L6 9H2V15H6L11 19V5Z" fill="url(#speakerGrad)" stroke="#1e3a8a" stroke-width="1.5" stroke-linejoin="round"/>
                    <path d="M15.54 8.46C16.4774 9.39764 17.004 10.6692 17.004 11.995C17.004 13.3208 16.4774 14.5924 15.54 15.53M19.07 4.93C20.9447 6.80527 21.9979 9.34835 21.9979 12C21.9979 14.6516 20.9447 17.1947 19.07 19.07" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="speakerGrad" x1="2" y1="5" x2="11" y2="19" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#93C5FD"/>
                            <stop offset="1" stop-color="#2563EB"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
        </div>

        <!-- Game Over / Success Screen -->
        <div id="gameOverArea" class="hidden w-full max-w-[500px] flex-1 flex-col items-center justify-center relative my-4 z-50">
            <div class="bg-white/95 backdrop-blur-md p-8 rounded-[3rem] shadow-2xl border-8 border-yellow-400 text-center pop-animation flex flex-col items-center">
                <!-- Realistic Trophy SVG -->
                <svg class="mb-4 drop-shadow-xl" width="100" height="100" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 4H20V8C20 12.418 16.418 16 12 16C7.582 16 4 12.418 4 8V4Z" fill="url(#goldGrad)" stroke="#92400E" stroke-width="1.5"/>
                    <path d="M4 7H2C2 7 2 11 4 13M20 7H22C22 7 22 11 20 13M12 16V20M8 20H16" stroke="#92400E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 6L13.5 9.5L17 10L14.5 12.5L15 16L12 14.5L9 16L9.5 12.5L7 10L10.5 9.5L12 6Z" fill="#FFFBEB" opacity="0.6"/>
                    <defs>
                       <linearGradient id="goldGrad" x1="12" y1="4" x2="12" y2="16" gradientUnits="userSpaceOnUse">
                           <stop stop-color="#FEF08A"/>
                           <stop offset="1" stop-color="#D97706"/>
                       </linearGradient>
                   </defs>
               </svg>
                <h2 class="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-violet-600 mb-2">AMAZING JOB!</h2>
                <p class="text-2xl font-bold text-gray-600 mb-6">You got 10 stars!</p>
                <button onclick="resetGame()" class="toy-button-blue relative inline-flex items-center justify-center px-10 py-4 font-black text-white rounded-full text-2xl w-full">
                    PLAY AGAIN 🔄
                </button>
            </div>
        </div>

        <!-- Footer / Action Area (Two Buttons Side By Side) -->
        <footer class="flex flex-row justify-center items-center gap-3 md:gap-4 w-full px-4 mb-6 max-w-[450px] mx-auto">
            <button 
                id="checkBtn"
                onclick="handleCheckAction(event)"
                class="hidden toy-button-green relative items-center justify-center py-4 md:py-5 font-black text-white rounded-full text-2xl md:text-3xl flex-1"
            >
                CHECK ✔️
            </button>
            <button 
                id="magicBtn"
                onclick="handleMainAction(event)"
                class="toy-button relative flex items-center justify-center py-4 md:py-5 font-black text-white rounded-full text-2xl md:text-3xl flex-1 max-w-[300px]"
            >
                GO! 🚀
            </button>
        </footer>
    </div>

    <script>
        let lastBond = null;
        let audioCtx = null;
        let currentRound = 0;
        const maxRounds = 10;
        let fireworkInterval;
        let speechTimeout;

        // Initialize Audio context
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // Sounds
        function playClickSound() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playPopSound() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(500, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        function playMagicShimmer() {
            if(!audioCtx) return;
            const notes = [1046.50, 1318.51, 1567.98, 2093.00]; 
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + (i * 0.08));
                gain.gain.setValueAtTime(0, audioCtx.currentTime + (i * 0.08));
                gain.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + (i * 0.08) + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (i * 0.08) + 0.5);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + (i * 0.08));
                osc.stop(audioCtx.currentTime + (i * 0.08) + 0.6);
            });
        }

        function playWinSound() {
            if(!audioCtx) return;
            const notes = [
                { f: 523.25, d: 0.15 }, { f: 659.25, d: 0.15 }, { f: 783.99, d: 0.15 }, 
                { f: 1046.50, d: 0.4 }
            ];
            let time = audioCtx.currentTime;
            notes.forEach(note => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(note.f, time);
                gain.gain.setValueAtTime(0.08, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + note.d);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(time);
                osc.stop(time + note.d);
                time += note.d;
            });
        }

        // Text To Speech logic
        function speakSentence() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const text = document.getElementById('sentenceText').innerText;
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85; 
                utterance.pitch = 1.2; 
                window.speechSynthesis.speak(utterance);
                
                // Visual feedback on block click
                const block = document.getElementById('sentenceBlock');
                block.style.transform = "scale(0.95)";
                setTimeout(() => block.style.transform = "scale(1)", 150);
            }
        }

        // Visuals
        function createParticles(x, y, count = 20, isFirework = false) {
            const colors = ['#f472b6', '#a78bfa', '#fbbf24', '#34d399', '#60a5fa', '#f87171'];
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                const size = Math.random() * (isFirework ? 12 : 18) + 6;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                document.body.appendChild(particle);

                const angle = Math.random() * Math.PI * 2;
                const velocity = (Math.random() * (isFirework ? 15 : 10)) + 5;
                const vx = Math.cos(angle) * velocity;
                let vy = Math.sin(angle) * velocity;
                let opacity = 1;
                let posX = x;
                let posY = y;

                function animate() {
                    posX += vx;
                    vy += 0.3; 
                    posY += vy;
                    opacity -= isFirework ? 0.015 : 0.02;
                    
                    particle.style.transform = `translate(${posX - x}px, ${posY - y}px) scale(${opacity})`;
                    particle.style.opacity = opacity;
                    
                    if (opacity > 0) requestAnimationFrame(animate);
                    else particle.remove();
                }
                requestAnimationFrame(animate);
            }
        }

        function triggerFireworks() {
            let fwCount = 0;
            playWinSound();
            fireworkInterval = setInterval(() => {
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * (window.innerHeight / 2); 
                createParticles(x, y, 40, true);
                
                if(audioCtx) {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800 + Math.random()*400, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.1);
                }

                fwCount++;
                if(fwCount > 8) clearInterval(fireworkInterval);
            }, 400);
        }

        // Interactions
        function handleMainAction(e) {
            initAudio();
            playClickSound(); 
            createParticles(e.clientX || window.innerWidth/2, e.clientY || window.innerHeight-100, 15);
            
            // Hide sentence block and check button for new round
            document.getElementById('sentenceBlock').classList.add('hidden');
            document.getElementById('sentenceBlock').classList.remove('pop-animation');
            document.getElementById('checkBtn').classList.add('hidden');
            document.getElementById('checkBtn').classList.remove('flex');
            document.getElementById('magicBtn').classList.add('max-w-[300px]');
            
            clearTimeout(speechTimeout);

            if (currentRound >= maxRounds) {
                showEndGame();
                return;
            }

            currentRound++;
            document.getElementById('progressText').innerText = `${currentRound} / ${maxRounds}`;

            if (currentRound === maxRounds) {
                document.getElementById('magicBtn').innerHTML = 'FINISH! 🏆';
                document.getElementById('magicBtn').classList.remove('bg-red-500', 'hover:bg-red-400');
                document.getElementById('magicBtn').classList.add('bg-yellow-500');
            }

            generateNewBond();
        }

        function handleCheckAction(e) {
            initAudio();
            playClickSound();
            createParticles(e.clientX || window.innerWidth/2, e.clientY || window.innerHeight-100, 10);

            const sentenceBlock = document.getElementById('sentenceBlock');
            sentenceBlock.classList.remove('hidden');
            
            // Re-trigger animation
            sentenceBlock.classList.remove('pop-animation');
            void sentenceBlock.offsetWidth; 
            sentenceBlock.classList.add('pop-animation');

            // Play the audio reading out the sentence automatically after a short delay
            speechTimeout = setTimeout(speakSentence, 300);
        }

        function generateNewBond() {
            let whole, p1, p2;
            
            while (true) {
                whole = Math.floor(Math.random() * 5) + 6; 
                p1 = Math.floor(Math.random() * (whole - 1)) + 1; 
                p2 = whole - p1;
                
                const currentBondKey = `${whole}-${Math.min(p1, p2)}-${Math.max(p1, p2)}`;
                if (currentBondKey !== lastBond) {
                    lastBond = currentBondKey;
                    break;
                }
            }
            
            const parts = Math.random() > 0.5 ? [p1, p2] : [p2, p1];

            setTimeout(() => {
                displayBond(whole, parts[0], parts[1]);
                playPopSound();
                playMagicShimmer();
            }, 100);
        }

        function displayBond(whole, p1, p2) {
            const content = document.getElementById('bondContent');
            const empty = document.getElementById('emptyState');
            const sentenceText = document.getElementById('sentenceText');
            const checkBtn = document.getElementById('checkBtn');
            const magicBtn = document.getElementById('magicBtn');
            
            document.getElementById('wholeCircle').textContent = whole;
            document.getElementById('part1Circle').textContent = p1;
            document.getElementById('part2Circle').textContent = p2;
            
            // Set sentence text
            sentenceText.innerText = `${p1} and ${p2} make ${whole}`;
            
            empty.classList.add('hidden');
            content.classList.remove('hidden');
            
            // Bubble animations
            const circles = document.querySelectorAll('.node-circle');
            circles.forEach((c, i) => {
                c.classList.remove('pop-animation');
                void c.offsetWidth;
                c.style.animationDelay = (i * 0.1) + 's';
                c.classList.add('pop-animation');
            });

            // Show CHECK button after bubbles appear
            setTimeout(() => {
                checkBtn.classList.remove('hidden');
                checkBtn.classList.add('flex', 'pop-animation');
                magicBtn.classList.remove('max-w-[300px]');
            }, 600); 
        }

        function showEndGame() {
            document.getElementById('gameArea').classList.add('hidden');
            document.getElementById('magicBtn').parentElement.classList.add('hidden');
            document.getElementById('gameOverArea').classList.remove('hidden');
            document.getElementById('gameOverArea').classList.add('flex');
            triggerFireworks();
        }

        function resetGame() {
            initAudio();
            playClickSound();
            clearInterval(fireworkInterval);
            currentRound = 0;
            lastBond = null;
            document.getElementById('progressText').innerText = `0 / ${maxRounds}`;
            
            // Reset Buttons
            document.getElementById('magicBtn').innerHTML = 'GO! 🚀';
            document.getElementById('magicBtn').classList.remove('bg-yellow-500');
            document.getElementById('checkBtn').classList.add('hidden');
            document.getElementById('checkBtn').classList.remove('flex');
            document.getElementById('magicBtn').classList.add('max-w-[300px]');
            
            // Toggle Views
            document.getElementById('gameOverArea').classList.add('hidden');
            document.getElementById('gameOverArea').classList.remove('flex');
            document.getElementById('gameArea').classList.remove('hidden');
            document.getElementById('magicBtn').parentElement.classList.remove('hidden');
            
            // Reset game area
            document.getElementById('bondContent').classList.add('hidden');
            document.getElementById('sentenceBlock').classList.add('hidden');
            document.getElementById('emptyState').classList.remove('hidden');
        }
    </script>
</body>
</html>
