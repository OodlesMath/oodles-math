<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visual Subtraction Fun - Version 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            /* Vibrant Duolingo-style sky gradient */
            background: linear-gradient(180deg, #1cb0f6 0%, #78c8f5 100%);
            overflow: hidden;
            height: 100vh;
            margin: 0;
            touch-action: manipulation;
            color: #4b4b4b;
        }

        /* Landscape Background Layer */
        .landscape-bg {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40vh;
            z-index: 0;
            pointer-events: none;
        }
        
        /* Sun and Cloud Combo */
        .sun-combo {
            position: absolute;
            top: 5%;
            right: 10%;
            width: clamp(80px, 15vw, 120px);
            height: clamp(80px, 15vw, 120px);
            z-index: 1;
            pointer-events: none;
        }

        .sun-circle {
            position: absolute;
            top: 0;
            left: 20%;
            width: 70%;
            height: 70%;
            background: #ffc800;
            border-radius: 50%;
            box-shadow: 0 0 0 10px rgba(255, 200, 0, 0.3), 0 0 40px #ffc800;
            animation: pulse-sun 4s ease-in-out infinite alternate;
        }

        @keyframes pulse-sun {
            0% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255, 200, 0, 0.2); }
            100% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255, 200, 0, 0.4); }
        }

        /* Fluffy Duolingo-style Clouds */
        .fluffy-cloud {
            position: absolute;
            background: #ffffff;
            border-radius: 100px;
            opacity: 0.95;
            animation: float-horizontal 60s linear infinite;
            z-index: 1;
            pointer-events: none;
            box-shadow: 0 8px 0 rgba(0,0,0,0.05);
        }
        .fluffy-cloud::before, .fluffy-cloud::after {
            content: '';
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
        }
        .fluffy-cloud::before { width: 60%; height: 120%; top: -50%; left: 15%; }
        .fluffy-cloud::after { width: 45%; height: 90%; top: -30%; right: 15%; }

        @keyframes float-horizontal {
            from { transform: translateX(-200px); }
            to { transform: translateX(110vw); }
        }

        #confettiCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* Duolingo Style UI Cards */
        .kid-card {
            background: #ffffff;
            border-radius: 1.5rem;
            border: 2px solid #e5e5e5;
            border-bottom: 8px solid #e5e5e5;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }

        /* Duolingo Style Buttons */
        .btn-3d {
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 1rem;
            transition: all 0.1s;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
        }

        .btn-blue {
            background-color: #1cb0f6;
            color: white;
            box-shadow: 0 6px 0 #1899d6, 0 10px 15px rgba(0,0,0,0.1);
        }
        .btn-blue:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 #1899d6, 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn-green {
            background-color: #58cc02;
            color: white;
            box-shadow: 0 6px 0 #58a700, 0 10px 15px rgba(0,0,0,0.1);
        }
        .btn-green:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 #58a700, 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn-yellow {
            background-color: #ffc800;
            color: white;
            box-shadow: 0 6px 0 #e5b400, 0 10px 15px rgba(0,0,0,0.1);
        }
        .btn-yellow:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 #e5b400, 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Visual Container */
        .visual-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: clamp(8px, 2vw, 20px);
            padding: clamp(15px, 3vw, 25px);
            align-content: center;
            justify-items: center;
            min-height: clamp(120px, 25vh, 220px);
        }

        .item-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
            aspect-ratio: 1/1;
        }

        .item-icon {
            width: 90%;
            height: 90%;
            filter: drop-shadow(0 8px 6px rgba(0,0,0,0.15));
            transition: all 0.3s ease;
        }

        .item-wrapper:active:not(.item-subtracted) {
            transform: scale(0.85);
        }

        .item-wrapper:hover:not(.item-subtracted) {
            transform: scale(1.05) translateY(-2px);
        }

        /* Red "X" Cross-out Styling */
        .item-subtracted .item-icon {
            opacity: 0.5;
            filter: grayscale(0.4) drop-shadow(0 2px 2px rgba(0,0,0,0.1));
            transform: scale(0.9);
        }

        .item-subtracted::before, .item-subtracted::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: clamp(8px, 1.5vw, 14px);
            background-color: #ff4b4b;
            border-radius: 10px;
            z-index: 20;
            box-shadow: 0 4px 0 #cc0000, 0 0 10px rgba(255,255,255,0.5);
            animation: drawX 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.4) forwards;
            border: 2px solid white;
        }

        .item-subtracted::before { transform: translate(-50%, -50%) rotate(45deg); }
        .item-subtracted::after { transform: translate(-50%, -50%) rotate(-45deg); animation-delay: 0.08s; }

        @keyframes drawX {
            0% { transform: translate(-50%, -50%) scale(0) rotate(inherit); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1.1) rotate(inherit); opacity: 1; }
        }

        .pop-animation {
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .bouncy-text {
            animation: bounce-text 2s infinite;
        }
        @keyframes bounce-text {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .text-shadow-custom {
            text-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }
    </style>
</head>

        function initAudio() {

            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // Advanced sound generator for cute UI effects
        function playSound(type) {
            if(!audioCtx) return;
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'pop') {
                // Happy bubble pop (clicking item)
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, t);
                osc.frequency.exponentialRampToValueAtTime(300, t + 0.1);
                gain.gain.setValueAtTime(0.3, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
                osc.start(t);
                osc.stop(t + 0.1);
            } else if (type === 'unpop') {
                // Reverse bubble pop (unclicking item)
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, t);
                osc.frequency.exponentialRampToValueAtTime(600, t + 0.1);
                gain.gain.setValueAtTime(0.3, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
                osc.start(t);
                osc.stop(t + 0.1);
            } else if (type === 'success') {
                // Bright chime
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(440, t); // A4
                osc.frequency.setValueAtTime(554.37, t + 0.1); // C#5
                osc.frequency.setValueAtTime(659.25, t + 0.2); // E5
                gain.gain.setValueAtTime(0.2, t);
                gain.gain.setValueAtTime(0.2, t + 0.2);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
                osc.start(t);
                osc.stop(t + 0.5);
            } else if (type === 'error') {
                // Gentle bonk
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, t);
                osc.frequency.linearRampToValueAtTime(150, t + 0.2);
                gain.gain.setValueAtTime(0.1, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
                osc.start(t);
                osc.stop(t + 0.2);
            } else if (type === 'start') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, t);
                osc.frequency.exponentialRampToValueAtTime(800, t + 0.2);
                gain.gain.setValueAtTime(0.2, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
                osc.start(t);
                osc.stop(t + 0.3);
            }
        }

        function startGame() {
            initAudio();
            playSound('start');
            score = 0;
            document.getElementById('btnContainerGo').classList.add('hidden');
            handleNextAction();
        }

        function generateVisualTask() {
            const whole = Math.floor(Math.random() * 6) + 5; // 5 to 10
            const part = Math.floor(Math.random() * (whole - 1)) + 1;
            const remaining = whole - part;

            currentData = { whole, part, remaining, crossedOut: 0, isChecking: false };

            const visualContent = document.getElementById('visualContent');
            const empty = document.getElementById('emptyState');
            const grid = document.getElementById('itemGrid');
            const taskText = document.getElementById('taskText');
            
            document.getElementById('btnContainerCheck').classList.remove('hidden');
            document.getElementById('btnContainerNext').classList.add('hidden');
            document.getElementById('sentenceBlock').classList.add('hidden');

            const graphic = toyGraphics[Math.floor(Math.random() * toyGraphics.length)];

            grid.innerHTML = '';
            for(let i = 0; i < whole; i++) {
                const div = document.createElement('div');
                div.innerHTML = graphic;
                div.className = 'pop-animation item-wrapper';
                div.style.animationDelay = (i * 0.05) + 's';
                div.onclick = function() { handleItemClick(this); };
                grid.appendChild(div);
            }

            taskText.innerHTML = `
                <div class="flex-1 text-center text-xl md:text-2xl font-bold text-slate-700 leading-relaxed">
                    Start with <span class="text-blue-500 font-black text-3xl mx-1">${whole}</span>.<br/> 
                    Take away <span class="text-pink-500 font-black text-3xl mx-1">${part}</span>.
                </div>
                <button onclick="speakQuestion(event)" class="bg-blue-100 text-blue-500 p-3 rounded-full shadow-sm hover:bg-blue-200 flex-shrink-0 transition-transform active:scale-95">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.01,19.86 21,16.28 21,12C21,7.72 18.01,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16.02C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z" /></svg>
                </button>
            `;

            document.getElementById('sentenceText').innerHTML = 
                `${whole} <span class="text-pink-500">-</span> ${part} <span class="text-slate-400">=</span> <span class="text-green-500">${remaining}</span>`;

            empty.classList.add('hidden');
            visualContent.classList.remove('hidden');
        }

        function updateVisuals() {
            const items = document.querySelectorAll('.item-wrapper');
            items.forEach((item, index) => {
                // Cross out from the end (right to left visually makes sense for subtraction)
                if (index >= currentData.whole - currentData.crossedOut) {
                    if (!item.classList.contains('item-subtracted')) {
                        item.classList.add('item-subtracted');
                    }
                } else {
                    item.classList.remove('item-subtracted');
                }
            });
        }

        function handleItemClick(element) {
            if (currentData.isChecking) return;

            if (element.classList.contains('item-subtracted')) {
                if (currentData.crossedOut > 0) {
                    currentData.crossedOut--;
                    playSound('unpop');
                }
            } else {
                if (currentData.crossedOut < currentData.whole) {
                    currentData.crossedOut++;
                    playSound('pop');
                }
            }
            updateVisuals();
        }

        function handleCheckAction() {
            currentData.isChecking = true; 
            const taskText = document.getElementById('taskText');
            
            if (currentData.crossedOut === currentData.part) {
                score++;
                playSound('success');
                taskText.innerHTML = `<div class="text-green-500 font-black text-2xl w-full text-center bouncy-text">Awesome! That's correct! 🎉</div>`;
            } else {
                playSound('error');
                taskText.innerHTML = `<div class="text-pink-500 font-bold text-xl w-full text-center">Oops! We need to cross out exactly <span class="font-black text-2xl">${currentData.part}</span>.</div>`;
                // Auto-correct the visual for learning purpose
                currentData.crossedOut = currentData.part;
                updateVisuals();
            }

            const block = document.getElementById('sentenceBlock');
            block.classList.remove('hidden');
            block.classList.remove('pop-animation');
            void block.offsetWidth; 
            block.classList.add('pop-animation');
            
            document.getElementById('btnContainerCheck').classList.add('hidden');
            document.getElementById('btnContainerNext').classList.remove('hidden');
            
            setTimeout(speakSentence, 600);
        }

        function handleNextAction() {
            if (currentRound >= maxRounds) {
                showEndGame();
                return;
            }

            currentRound++;
            document.getElementById('progressText').innerText = `${currentRound} / ${maxRounds}`;
            generateVisualTask();
        }

        function speakQuestion(e) {
            if(e) e.stopPropagation();
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const text = `Start with ${currentData.whole}. Take away ${currentData.part}.`;
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.85;
                utterance.pitch = 1.1; // Slightly higher pitch for kids
                window.speechSynthesis.speak(utterance);
            }
        }

        function speakSentence() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const text = `${currentData.whole} minus ${currentData.part} equals ${currentData.remaining}`;
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.85;
                utterance.pitch = 1.1;
                window.speechSynthesis.speak(utterance);
            }
        }

        function showEndGame() {
            playSound('success'); // Additional win sound
            setTimeout(() => playSound('success'), 400);

            document.getElementById('gameArea').classList.add('hidden');
            document.getElementById('btnContainerNext').classList.add('hidden');
            document.getElementById('gameOverArea').classList.remove('hidden');
            document.getElementById('gameOverArea').classList.add('flex');
            
            let message = "Great Try!";
            if (score === maxRounds) message = "Perfect Score!";
            else if (score >= maxRounds * 0.7) message = "Super Job!";

            document.getElementById('finalScoreText').innerHTML = `
                <div class="text-3xl mb-2 text-sky-500 font-black">${message}</div>
                You scored <span class="text-green-500 font-black text-4xl mx-2">${score}</span> out of ${maxRounds}!
            `;
            
            startConfetti();
        }

        function resetGame() {
            currentRound = 0;
            score = 0;
            document.getElementById('progressText').innerText = `0 / ${maxRounds}`;
            document.getElementById('gameOverArea').classList.add('hidden');
            document.getElementById('gameArea').classList.remove('hidden');
            
            document.getElementById('btnContainerGo').classList.remove('hidden');
            document.getElementById('visualContent').classList.add('hidden');
            document.getElementById('emptyState').classList.remove('hidden');
            
            document.getElementById('sentenceBlock').classList.add('hidden');

            stopConfetti();
        }

        /* --- Enhanced Confetti Logic --- */
        const canvas = document.getElementById('confettiCanvas');
        const ctx = canvas.getContext('2d');
        let confettis = [];
        // Vibrant Duolingo colors
        const colors = ['#1cb0f6', '#58cc02', '#ffc800', '#ff4b4b', '#ce82ff'];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Confetti {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -canvas.height;
                this.size = Math.random() * 12 + 6;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.speedY = Math.random() * 4 + 2;
                this.speedX = Math.random() * 3 - 1.5;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 10 - 5;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                this.rotation += this.rotationSpeed;
                // Add slight gravity acceleration
                this.speedY += 0.02;
                if (this.y > canvas.height) {
                    this.y = -20;
                    this.x = Math.random() * canvas.width;
                    this.speedY = Math.random() * 4 + 2; // reset speed
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.fillStyle = this.color;
                // Draw slight rectangles instead of perfect squares for realistic confetti
                ctx.fillRect(-this.size / 2, -this.size / 3, this.size, this.size * 0.6);
                ctx.restore();
            }
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            confettis.forEach(c => {
                c.update();
                c.draw();
            });
            confettiFrameId = requestAnimationFrame(animateConfetti);
        }

        function startConfetti() {
            confettis = [];
            for (let i = 0; i < 200; i++) {
                confettis.push(new Confetti());
            }
            if (!confettiFrameId) {
                animateConfetti();
            }
        }

        function stopConfetti() {
            if (confettiFrameId) {
                cancelAnimationFrame(confettiFrameId);
                confettiFrameId = null;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }
    </script>
</body>
