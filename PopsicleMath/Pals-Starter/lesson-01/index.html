<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Quest V5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Confetti Library for End Game -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Modern, friendly Poppins font */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;800;900&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #d7f4fc;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: manipulation;
            color: #4b4b4b;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* ----- SCENERY ELEMENTS ----- */
        .sun {
            position: fixed;
            top: 5%;
            left: 5%;
            width: 80px;
            height: 80px;
            background: #ffc800;
            border-radius: 50%;
            box-shadow: 0 0 0 15px rgba(255, 200, 0, 0.2), 0 0 0 30px rgba(255, 200, 0, 0.1);
            z-index: -3;
            animation: pulseSun 4s infinite alternate ease-in-out;
        }

        @keyframes pulseSun {
            0% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255, 200, 0, 0.3), 0 0 0 25px rgba(255, 200, 0, 0.1); }
            100% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(255, 200, 0, 0.2), 0 0 0 40px rgba(255, 200, 0, 0.05); }
        }

        .rainbow {
            position: fixed;
            bottom: -10vh;
            left: 50%;
            transform: translateX(-50%);
            width: 140vw;
            height: 140vw;
            max-width: 1000px;
            max-height: 1000px;
            border-radius: 50%;
            background: radial-gradient(circle at center,
                transparent 50%,
                #a881fb 50%, #a881fb 53%, 
                #1cb0f6 53%, #1cb0f6 56%, 
                #58cc02 56%, #58cc02 59%, 
                #ffc800 59%, #ffc800 62%, 
                #ff9600 62%, #ff9600 65%, 
                #ff4b4b 65%, #ff4b4b 68%, 
                transparent 68%
            );
            opacity: 0.4;
            z-index: -4;
            pointer-events: none;
        }

        .grass-bg {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 15vh;
            background-color: #58cc02;
            border-top: 10px solid #46a302;
            z-index: -2;
        }

        .tree {
            position: absolute;
            bottom: 100%;
            width: 16px;
            height: 40px;
            background: #8b5a2b;
            border-radius: 4px;
        }
        .tree::after {
            content: '';
            position: absolute;
            bottom: 20px;
            left: -27px;
            width: 70px;
            height: 70px;
            background: #46a302;
            border-radius: 50%;
            border: 4px solid #337a01;
        }
        .tree-1 { left: 15%; transform: scale(1.2); }
        .tree-2 { right: 10%; transform: scale(0.9); }
        .tree-3 { right: 30%; transform: scale(0.6); }

        .flower {
            position: absolute;
            bottom: 100%;
            width: 4px;
            height: 15px;
            background: #46a302;
        }
        .flower::after {
            content: '🌸';
            position: absolute;
            top: -15px;
            left: -10px;
            font-size: 1.2rem;
            filter: drop-shadow(0 2px 1px rgba(0,0,0,0.2));
        }
        .flower-1 { left: 25%; }
        .flower-2 { left: 45%; }
        .flower-3 { right: 20%; transform: scale(1.2); }
        .flower-4 { right: 45%; transform: scale(0.8); }

        .cloud {
            position: fixed;
            background: #ffffff;
            border-radius: 50px;
            z-index: -3;
            opacity: 0.9;
            pointer-events: none;
            box-shadow: 0 8px 15px rgba(0,0,0,0.03);
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
        }
        .cloud::before { width: 50px; height: 50px; top: -20px; left: 15px; }
        .cloud::after { width: 70px; height: 70px; top: -30px; right: 15px; }

        .cloud1 { width: 120px; height: 40px; top: 12%; animation: floatCloud 45s linear infinite; }
        .cloud2 { width: 160px; height: 50px; top: 28%; animation: floatCloud 55s linear infinite; animation-delay: -20s; transform: scale(0.8); }
        .cloud3 { width: 100px; height: 35px; top: 45%; animation: floatCloud 35s linear infinite; animation-delay: -10s; transform: scale(1.1); }

        @keyframes floatCloud {
            0% { left: -20%; }
            100% { left: 120%; }
        }

        /* Typography */
        .text-black-weight { font-weight: 900; }
        
        .title-text {
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(to right, #ff4b4b, #ff9600, #58cc02, #1cb0f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 3px 0px rgba(0,0,0,0.1));
        }

        /* Duolingo Style Panel */
        .duo-panel {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 2px solid #e5e5e5;
            border-bottom: 8px solid #e5e5e5;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        /* Buttons */
        .btn-primary {
            background-color: #58cc02;
            color: #ffffff;
            border-radius: 16px;
            border: 2px solid transparent;
            border-bottom: 6px solid #46a302;
            transition: all 0.1s ease;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 1px;
            box-shadow: 0 4px 6px rgba(88, 204, 2, 0.2);
        }
        .btn-primary:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
            margin-bottom: 4px;
        }

        .btn-speaker {
            background-color: #1cb0f6;
            color: #ffffff;
            border-radius: 16px;
            border: 2px solid transparent;
            border-bottom: 6px solid #1899d6;
            transition: all 0.1s ease;
        }
        .btn-speaker:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
        }

        /* ----- CARDS / BLOCKS OPTIMIZED FOR NO OVERFLOW ----- */
        .die-box {
            background: #ffffff;
            border: 2px solid #e5e5e5;
            border-bottom: 8px solid #e5e5e5;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 15px;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            width: 100%;
            min-width: 130px;
            max-width: 180px;
            min-height: 260px;
            height: auto;
        }

        .die-box:hover {
            transform: translateY(-2px);
            border-color: #d1d5db;
        }

        .die-selected {
            border-color: #1cb0f6 !important;
            border-bottom-color: #1899d6 !important;
            background: #ddf4ff !important;
            transform: translateY(-4px);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.05) translateY(-8px); }
            100% { transform: scale(1) translateY(-4px); }
        }

        /* Better, juicier icons */
        .realistic-icon {
            filter: drop-shadow(0px 6px 5px rgba(0, 0, 0, 0.4)) saturate(1.4) contrast(1.15);
            font-size: clamp(1.6rem, 4.5vw, 2.4rem);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: block;
        }

        .concrete-items {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            align-content: center;
            gap: 6px;
            margin-top: 10px;
            width: 100%;
            flex-grow: 1; 
        }

        .item-wrapper {
            width: clamp(30px, 8vw, 42px);
            height: clamp(30px, 8vw, 42px);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .counted-item {
            opacity: 0.4;
            transform: scale(0.6) rotate(-15deg);
            filter: grayscale(0.5);
        }

        .number-display {
            font-size: clamp(3rem, 8vw, 4.5rem);
            color: #4b4b4b;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 5px;
        }

        /* Animations */
        .rolling {
            animation: fastWiggle 0.2s ease-in-out infinite;
            pointer-events: none;
            background: #f7f7f7;
        }

        @keyframes fastWiggle {
            0%, 100% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(-3deg) scale(1.02); }
            50% { transform: rotate(3deg) scale(1); }
            75% { transform: rotate(-2deg) scale(1.01); }
        }

        .pulse-hint {
            animation: hintPulse 2s infinite;
        }

        @keyframes hintPulse {
            0%, 100% { box-shadow: 0 0 0 0 transparent; }
            50% { box-shadow: 0 0 0 6px rgba(28, 176, 246, 0.3); }
        }

        /* ----- MINIGAME STYLING (DOUBLE WIDTH) ----- */
        #miniGameModal {
            /* Mở rộng gấp đôi không gian Modal */
            width: 95%;
            max-width: 800px; 
        }

        #gameCanvas {
            background: linear-gradient(180deg, #1cb0f6 0%, #a1c4fd 100%);
            border-radius: 20px;
            border: 6px solid #fff;
            width: 100%;
            max-width: 800px;
            height: auto;
            aspect-ratio: 8/5; /* Tỷ lệ màn hình rộng */
            touch-action: none;
            box-shadow: inset 0 0 30px rgba(255,255,255,0.4);
            cursor: crosshair;
        }

        /* Badges */
        .score-badge { background: #ffc800; color: #b38c00; border-bottom: 4px solid #d4a600; }
        .round-badge { background: #ffffff; color: #afafaf; border: 2px solid #e5e5e5; }
        
        .logo-img {
            max-height: 70px;
            object-fit: contain;
            filter: drop-shadow(0px 5px 5px rgba(0,0,0,0.1));
            transition: transform 0.3s;
        }
        .logo-img:hover {
            transform: scale(1.05) rotate(-2deg);
        }
        
        .flash-red { animation: flashRed 0.5s ease-out; }
        @keyframes flashRed {
            0% { background-color: rgba(255,0,0,0.8); }
            100% { background-color: transparent; }
        }
    </style>
</head>
<body class="p-4 sm:p-8 relative">

    <!-- Scenery -->
    <div class="sun"></div>
    <div class="rainbow"></div>
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
    
    <div class="grass-bg">
        <div class="tree tree-1"></div>
        <div class="tree tree-2"></div>
        <div class="tree tree-3"></div>
        <div class="flower flower-1"></div>
        <div class="flower flower-2"></div>
        <div class="flower flower-3"></div>
        <div class="flower flower-4"></div>
    </div>

    <!-- Main Screen -->
    <div class="duo-panel p-6 sm:p-8 w-full max-w-lg text-center relative mx-auto z-10 my-8">
        
        <!-- Header: Round & Score -->
        <div class="flex justify-between items-center mb-4">
            <div class="round-badge font-bold text-sm sm:text-base px-4 py-2 rounded-xl uppercase tracking-wider">
                Round <span id="roundCountDisplay">1</span>/10
            </div>
            <div class="score-badge flex items-center gap-2 font-black text-lg sm:text-xl px-4 py-2 rounded-xl uppercase transition-transform duration-300">
                ⭐ <span id="totalScore">0</span>
            </div>
        </div>

        <!-- Logo -->
        <img src="https://image2url.com/r2/default/images/1770270908168-036a8878-e468-415d-9a50-73d8cbcc8574.png" alt="Math Quest Logo" class="logo-img mx-auto mb-2">

        <h1 class="title-text mb-4">Math Quest</h1>
        
        <!-- Question & Speaker Area -->
        <div class="min-h-[80px] flex flex-col items-center justify-center mb-4">
            <div class="flex items-center justify-center gap-3">
                <button id="speakerBtn" onclick="replayAudio()" class="btn-speaker p-3 rounded-full hidden focus:outline-none flex items-center justify-center" title="Listen again">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 sm:h-8 sm:w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.5 10H2a1 1 0 00-1 1v2a1 1 0 001 1h3.5l5.5 5.5v-15L5.5 10z" />
                    </svg>
                </button>
                <h2 id="questionText" class="text-2xl sm:text-3xl text-black-weight text-gray-700 opacity-0 transition-opacity duration-300">Question</h2>
            </div>
            <p id="feedbackText" class="text-xl sm:text-2xl text-black-weight opacity-0 transition-opacity duration-300 mt-2"></p>
        </div>

        <!-- Cards Area -->
        <div class="flex justify-center items-stretch gap-4 sm:gap-6 mb-6 px-1">
            <div id="die1" class="die-box pulse-hint" onclick="handleBoxClick(1)">
                <div class="number-display">?</div>
                <div class="concrete-items"></div>
            </div>
            <div id="die2" class="die-box pulse-hint" onclick="handleBoxClick(2)">
                <div class="number-display">?</div>
                <div class="concrete-items"></div>
            </div>
        </div>

        <!-- Submit Button Container -->
        <div id="submitContainer" class="hidden opacity-0 transition-opacity duration-300 h-[60px]">
            <button id="submitBtn" class="btn-primary w-full py-4 text-xl sm:text-2xl">
                CHECK
            </button>
        </div>

        <!-- Audio Elements -->
        <audio id="audioGreater" src="greater.mp3"></audio>
        <audio id="audioLess" src="less.mp3"></audio>
    </div>

    <!-- Mini Game Overlay (Extra Wide Modal) -->
    <div id="miniGameOverlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[50] flex items-center justify-center hidden opacity-0 transition-opacity duration-300 p-4">
        <div class="duo-panel p-4 sm:p-6 text-center transform scale-95 transition-transform duration-300 overflow-hidden relative" id="miniGameModal">
            
            <div id="flashOverlay" class="absolute inset-0 pointer-events-none z-50 rounded-2xl"></div>

            <h2 class="text-3xl sm:text-4xl font-black text-blue-500 mb-4 uppercase tracking-wide">Fruit Ninja!</h2>
            
            <div class="flex justify-between items-center mb-4 font-bold text-xl">
                <div class="flex items-center gap-2 text-white bg-red-400 px-5 py-2 rounded-xl shadow-sm border-b-4 border-red-500">
                    ⏳ <span id="timeLeft">60</span>s
                </div>
                <div class="flex items-center gap-2 text-white bg-yellow-400 px-5 py-2 rounded-xl shadow-sm border-b-4 border-yellow-500">
                    ⭐ <span id="miniScore">0</span>
                </div>
            </div>

            <!-- Wider Canvas -->
            <div class="flex justify-center w-full relative mb-4">
                <canvas id="gameCanvas" width="800" height="500"></canvas>
            </div>
            
            <p class="text-gray-500 font-bold text-sm sm:text-base">Swipe to slice the fruit! Avoid the BOMBS 💣!</p>
        </div>
    </div>

    <!-- End Game Modal -->
    <div id="endGameModal" class="fixed inset-0 bg-black/70 backdrop-blur-md z-[60] flex items-center justify-center hidden opacity-0 transition-opacity duration-500 p-4">
        <div class="duo-panel p-8 text-center transform scale-90 transition-transform duration-500 w-full max-w-sm border-b-8">
            <div class="text-6xl mb-4">🎉</div>
            <h2 class="text-4xl font-black text-yellow-500 mb-2 uppercase">Awesome!</h2>
            <p class="text-xl font-bold text-gray-500 mb-6">You finished 10 rounds!</p>
            
            <div class="bg-gray-100 rounded-2xl p-6 mb-8 border-2 border-gray-200">
                <p class="text-gray-500 font-bold mb-1 uppercase text-sm">Total Stars</p>
                <p class="text-6xl font-black text-yellow-500">⭐ <span id="finalScoreDisplay">0</span></p>
            </div>

            <button onclick="restartFullGame()" class="btn-primary w-full py-4 text-2xl">
                PLAY AGAIN
            </button>
        </div>
    </div>

    <script>
        // --- SOUND ENGINE ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTone(freq, type, duration, vol = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playSfx(type) {
            initAudio();
            switch(type) {
                case 'click':
                    playTone(700, 'sine', 0.1, 0.1);
                    break;
                case 'pop':
                    playTone(900, 'triangle', 0.05, 0.08);
                    break;
                case 'roll':
                    playTone(400 + Math.random() * 200, 'sine', 0.05, 0.05);
                    break;
                case 'win':
                    playTone(523.25, 'sine', 0.1, 0.15); 
                    setTimeout(() => playTone(659.25, 'sine', 0.1, 0.15), 100); 
                    setTimeout(() => playTone(783.99, 'sine', 0.1, 0.15), 200); 
                    setTimeout(() => playTone(1046.50, 'sine', 0.3, 0.15), 300); 
                    break;
                case 'lose':
                    playTone(300, 'sawtooth', 0.2, 0.1);
                    setTimeout(() => playTone(250, 'sawtooth', 0.4, 0.1), 150);
                    break;
                case 'slice':
                    playTone(1200 + Math.random() * 400, 'triangle', 0.08, 0.05);
                    break;
                case 'bomb':
                    playTone(100, 'sawtooth', 0.5, 0.3);
                    setTimeout(() => playTone(50, 'square', 0.5, 0.3), 50);
                    break;
                case 'end_round':
                    playTone(523, 'square', 0.1, 0.05);
                    setTimeout(() => playTone(659, 'square', 0.1, 0.05), 100);
                    setTimeout(() => playTone(783, 'square', 0.2, 0.05), 200);
                    break;
                case 'game_over':
                    playTone(523.25, 'triangle', 0.15, 0.2);
                    setTimeout(() => playTone(659.25, 'triangle', 0.15, 0.2), 150);
                    setTimeout(() => playTone(783.99, 'triangle', 0.15, 0.2), 300);
                    setTimeout(() => playTone(1046.50, 'triangle', 0.4, 0.2), 450);
                    break;
            }
        }

        // --- MAIN LOGIC ---
        let val1 = 0;
        let val2 = 0;
        let currentQuestionType = ''; 
        let currentQuestionText = '';
        let gameState = 'REVEAL'; 
        let box1Revealed = false;
        let box2Revealed = false;
        let isRolling1 = false;
        let isRolling2 = false;
        let totalScore = 0;
        let selectedBoxIndex = null;
        
        let currentRound = 1;
        const maxRounds = 10;

        // Expanded and cuter icons list
        const cuteIcons = ['🍎', '🍉', '🍓', '🍩', '🥝', '🥑', '🍍', '🍒', '🧁', '🍕', '🍔', '🍬', '🍭', '🍇'];
        let currentIcon1 = '🍎';
        let currentIcon2 = '🍉';

        const die1El = document.getElementById('die1');
        const die2El = document.getElementById('die2');
        const questionTextEl = document.getElementById('questionText');
        const feedbackTextEl = document.getElementById('feedbackText');
        const submitBtn = document.getElementById('submitBtn');
        const submitContainer = document.getElementById('submitContainer');
        const totalScoreEl = document.getElementById('totalScore');
        const speakerBtn = document.getElementById('speakerBtn');
        const roundCountDisplay = document.getElementById('roundCountDisplay');

        document.body.addEventListener('click', initAudio, { once: true });
        document.body.addEventListener('touchstart', initAudio, { once: true });

        submitBtn.addEventListener('click', submitAnswer);

        function resetGameUI() {
            gameState = 'REVEAL';
            box1Revealed = false;
            box2Revealed = false;
            val1 = 0;
            val2 = 0;
            selectedBoxIndex = null;
            
            roundCountDisplay.textContent = currentRound;

            die1El.classList.remove('die-selected');
            die2El.classList.remove('die-selected');
            die1El.classList.add('pulse-hint');
            die2El.classList.add('pulse-hint');
            
            submitContainer.classList.add('opacity-0');
            setTimeout(() => submitContainer.classList.add('hidden'), 300);
            
            die1El.querySelector('.number-display').textContent = "?";
            die1El.querySelector('.concrete-items').innerHTML = "";
            die2El.querySelector('.number-display').textContent = "?";
            die2El.querySelector('.concrete-items').innerHTML = "";
            
            questionTextEl.textContent = "Tap the cards to open them! ✨";
            questionTextEl.classList.remove('text-green-500', 'text-red-500', 'text-blue-500');
            questionTextEl.classList.add('text-gray-700');
            questionTextEl.style.opacity = '1';
            
            feedbackTextEl.style.opacity = '0';
            speakerBtn.classList.add('hidden');
        }

        resetGameUI();

        window.countItem = function(event, el) {
            event.stopPropagation(); 
            playSfx('pop');
            el.querySelector('.realistic-icon').classList.toggle('counted-item');
        }

        function generateConcretes(num, icon) {
            return Array(num).fill(
                `<div class="item-wrapper" onclick="countItem(event, this)">
                    <span class="realistic-icon">${icon}</span>
                </div>`
            ).join('');
        }

        function setDieContent(dieEl, number, icon) {
            dieEl.querySelector('.number-display').textContent = number;
            dieEl.querySelector('.concrete-items').innerHTML = generateConcretes(number, icon);
        }

        function handleBoxClick(index) {
            if (gameState === 'REVEAL') {
                revealBox(index);
            } else if (gameState === 'ANSWER') {
                selectBox(index);
            }
        }

        function revealBox(index) {
            const dieEl = index === 1 ? die1El : die2El;
            
            if (index === 1 && (box1Revealed || isRolling1)) return;
            if (index === 2 && (box2Revealed || isRolling2)) return;

            playSfx('click');
            
            if (index === 1) {
                isRolling1 = true;
                currentIcon1 = cuteIcons[Math.floor(Math.random() * cuteIcons.length)];
            }
            if (index === 2) {
                isRolling2 = true;
                currentIcon2 = cuteIcons[Math.floor(Math.random() * cuteIcons.length)];
            }

            dieEl.classList.remove('pulse-hint');
            dieEl.classList.add('rolling');

            let rollInterval = setInterval(() => {
                setDieContent(dieEl, Math.floor(Math.random() * 10) + 1, index === 1 ? currentIcon1 : currentIcon2);
                playSfx('roll');
            }, 80);

            setTimeout(() => {
                clearInterval(rollInterval);
                dieEl.classList.remove('rolling');

                if (index === 1) {
                    do {
                        val1 = Math.floor(Math.random() * 10) + 1;
                    } while (box2Revealed && val1 === val2); 
                    setDieContent(dieEl, val1, currentIcon1);
                    box1Revealed = true;
                    isRolling1 = false;
                } else {
                    do {
                        val2 = Math.floor(Math.random() * 10) + 1;
                    } while (box1Revealed && val2 === val1); 
                    setDieContent(dieEl, val2, currentIcon2);
                    box2Revealed = true;
                    isRolling2 = false;
                }

                checkBothRevealed();
            }, 600);
        }

        function checkBothRevealed() {
            if (box1Revealed && box2Revealed) {
                gameState = 'ANSWER';
                currentQuestionType = Math.random() < 0.5 ? 'greater' : 'less';
                // Improved Grammar
                currentQuestionText = currentQuestionType === 'greater' ? 'Which one is GREATER?' : 'Which one is LESS?';
                
                questionTextEl.style.opacity = '0';
                setTimeout(() => {
                    questionTextEl.textContent = currentQuestionText;
                    questionTextEl.classList.remove('text-gray-700');
                    questionTextEl.classList.add('text-blue-500'); 
                    questionTextEl.style.opacity = '1';
                    speakerBtn.classList.remove('hidden');
                    playAudio(currentQuestionText, currentQuestionType);
                }, 300);
            }
        }

        function selectBox(index) {
            if (gameState !== 'ANSWER') return;
            playSfx('click');
            
            die1El.classList.remove('die-selected');
            die2El.classList.remove('die-selected');
            
            selectedBoxIndex = index;
            const selectedEl = index === 1 ? die1El : die2El;
            selectedEl.classList.add('die-selected');

            submitContainer.classList.remove('hidden');
            setTimeout(() => submitContainer.classList.remove('opacity-0'), 10);
        }

        function submitAnswer() {
            if (gameState !== 'ANSWER' || selectedBoxIndex === null) return;

            submitContainer.classList.add('opacity-0');
            setTimeout(() => submitContainer.classList.add('hidden'), 300);

            let correctBoxIndex;
            if (currentQuestionType === 'greater') {
                correctBoxIndex = val1 > val2 ? 1 : 2;
            } else {
                correctBoxIndex = val1 < val2 ? 1 : 2;
            }

            feedbackTextEl.style.opacity = '1';
            
            if (selectedBoxIndex === correctBoxIndex) {
                playSfx('win');
                feedbackTextEl.textContent = "Awesome! It's Bonus Time! ✨";
                feedbackTextEl.className = "text-xl sm:text-2xl text-black-weight text-green-500 transition-opacity duration-300 mt-2 uppercase";
                gameState = 'WAITING'; 
                speakerBtn.classList.add('hidden');
                
                setTimeout(() => {
                    startMiniGame();
                }, 1500);
            } else {
                playSfx('lose');
                feedbackTextEl.textContent = "Oops! Let's try again! 🥺";
                feedbackTextEl.className = "text-xl sm:text-2xl text-black-weight text-red-500 transition-opacity duration-300 mt-2 uppercase";
            }

            die1El.classList.remove('die-selected');
            die2El.classList.remove('die-selected');
        }

        function playAudio(text, type) {
            const audioId = type === 'greater' ? 'audioGreater' : 'audioLess';
            const audioEl = document.getElementById(audioId);
            
            audioEl.play().catch(e => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel(); 
                    const msg = new SpeechSynthesisUtterance(text);
                    msg.lang = 'en-US'; 
                    msg.rate = 0.85; 
                    msg.pitch = 1.3; 
                    window.speechSynthesis.speak(msg);
                }
            });
        }

        function replayAudio() {
            playSfx('click');
            if(currentQuestionText && currentQuestionType) {
                playAudio(currentQuestionText, currentQuestionType);
            }
        }

        // --- FRUIT NINJA MINI GAME ---
        const overlay = document.getElementById('miniGameOverlay');
        const modal = document.getElementById('miniGameModal');
        const canvas = document.getElementById('gameCanvas');
        const flashOverlay = document.getElementById('flashOverlay');
        const ctx = canvas.getContext('2d');
        const timeLeftEl = document.getElementById('timeLeft');
        const miniScoreEl = document.getElementById('miniScore');

        let minigameObjects = [];
        let particles = [];
        let juiceDrops = [];
        let trail = [];
        let miniScore = 0;
        let timeRemaining = 60; 
        let gameLoopId;
        let timerId;
        let isGameRunning = false;
        let isPointerDown = false;

        const GRAVITY = 0.4;
        
        function getCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX = e.clientX;
            let clientY = e.clientY;
            
            if(e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            }
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function addTrailPoint(pos) {
            trail.push(pos);
            if (trail.length > 12) {
                trail.shift();
            }
        }

        canvas.addEventListener('mousedown', (e) => { isPointerDown = true; addTrailPoint(getCanvasPos(e)); });
        canvas.addEventListener('mousemove', (e) => { if (isPointerDown) addTrailPoint(getCanvasPos(e)); });
        window.addEventListener('mouseup', () => { isPointerDown = false; trail = []; });
        window.addEventListener('mouseleave', () => { isPointerDown = false; trail = []; });

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); isPointerDown = true; addTrailPoint(getCanvasPos(e)); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (isPointerDown) addTrailPoint(getCanvasPos(e)); }, {passive: false});
        window.addEventListener('touchend', () => { isPointerDown = false; trail = []; });

        const colorsForJuice = {
            '🍎': '#ff4b4b', '🍉': '#ff4b4b', '🍓': '#ff4b4b', '🍒': '#ff4b4b',
            '🥝': '#58cc02', '🥑': '#58cc02', '🍇': '#a881fb',
            '🍍': '#ffc800', '🍩': '#8b5a2b', '🧁': '#ff9a9e',
            '🍬': '#1cb0f6', '🍭': '#ff4b4b'
        };

        function spawnFruitOrBomb() {
            if (Math.random() < 0.05) {
                const isBomb = Math.random() < 0.15; 
                const emoji = isBomb ? '💣' : cuteIcons[Math.floor(Math.random() * cuteIcons.length)];
                
                // Spawn logic for wide canvas
                minigameObjects.push({
                    x: 100 + Math.random() * (canvas.width - 200),
                    y: canvas.height + 60,
                    vx: (Math.random() - 0.5) * 8, // Wider horizontal spread
                    vy: -(15 + Math.random() * 4), // Higher vertical jump
                    radius: 45,
                    emoji: emoji,
                    isBomb: isBomb,
                    sliced: false,
                    rotation: 0,
                    rotSpeed: (Math.random() - 0.5) * 0.2
                });
            }
        }

        function distToSegmentSquared(p, v, w) {
            let l2 = (v.x - w.x)*(v.x - w.x) + (v.y - w.y)*(v.y - w.y);
            if (l2 === 0) return (p.x - v.x)*(p.x - v.x) + (p.y - v.y)*(p.y - v.y);
            let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            let proj = { x: v.x + t * (w.x - v.x), y: v.y + t * (w.y - v.y) };
            return (p.x - proj.x)*(p.x - proj.x) + (p.y - proj.y)*(p.y - proj.y);
        }

        function checkSlices() {
            if (trail.length < 2) return;
            
            const p1 = trail[trail.length - 2];
            const p2 = trail[trail.length - 1];

            for (let i = minigameObjects.length - 1; i >= 0; i--) {
                let obj = minigameObjects[i];
                if (obj.sliced) continue;

                const distSq = distToSegmentSquared(obj, p1, p2);
                if (distSq < obj.radius * obj.radius) {
                    obj.sliced = true;
                    
                    if (obj.isBomb) {
                        playSfx('bomb');
                        triggerBombGameOver();
                    } else {
                        playSfx('slice');
                        miniScore++;
                        miniScoreEl.textContent = miniScore;
                        
                        // PERFECT SLICING: Create Left Half and Right Half
                        particles.push({x: obj.x, y: obj.y, vx: obj.vx - 4, vy: obj.vy, emoji: obj.emoji, alpha: 1, rot: obj.rotation - 0.2, part: 'left'});
                        particles.push({x: obj.x, y: obj.y, vx: obj.vx + 4, vy: obj.vy, emoji: obj.emoji, alpha: 1, rot: obj.rotation + 0.2, part: 'right'});
                        
                        // Juice Splashes
                        let color = colorsForJuice[obj.emoji] || '#ffffff';
                        for(let k=0; k<8; k++) {
                            juiceDrops.push({
                                x: obj.x, y: obj.y,
                                vx: (Math.random()-0.5)*14,
                                vy: (Math.random()-0.5)*14,
                                radius: Math.random()*6 + 3,
                                color: color,
                                alpha: 1
                            });
                        }
                        
                        minigameObjects.splice(i, 1);
                    }
                }
            }
        }

        function triggerBombGameOver() {
            isGameRunning = false;
            flashOverlay.classList.add('flash-red');
            setTimeout(() => {
                flashOverlay.classList.remove('flash-red');
                endMiniGame();
            }, 600);
        }

        function gameLoop() {
            if (!isGameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Spawn & Draw Objects
            spawnFruitOrBomb();
            for (let i = minigameObjects.length - 1; i >= 0; i--) {
                let obj = minigameObjects[i];
                obj.vy += GRAVITY;
                obj.x += obj.vx;
                obj.y += obj.vy;
                obj.rotation += obj.rotSpeed;

                ctx.save();
                ctx.translate(obj.x, obj.y);
                ctx.rotate(obj.rotation);
                ctx.font = '65px Arial'; // Bigger font for wide canvas
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.filter = obj.isBomb ? "drop-shadow(0px 0px 20px red)" : "drop-shadow(0px 10px 8px rgba(0,0,0,0.5))";
                ctx.fillText(obj.emoji, 0, 0);
                ctx.restore();

                if (obj.y > canvas.height + 150) {
                    minigameObjects.splice(i, 1);
                }
            }

            // Draw Sliced Halves (Perfectly cut in half)
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.vy += GRAVITY;
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.015;

                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                    continue;
                }

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot);
                ctx.globalAlpha = p.alpha;
                ctx.font = '65px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                // Clip canvas to draw only left or right half
                ctx.beginPath();
                if (p.part === 'left') {
                    ctx.rect(-100, -100, 100, 200); // Tọa độ âm X để cắt lấy nửa trái
                } else {
                    ctx.rect(0, -100, 100, 200); // Tọa độ dương X để cắt lấy nửa phải
                }
                ctx.clip();
                
                ctx.fillText(p.emoji, 0, 0);
                ctx.restore();
            }

            // Draw Juice Drops
            for (let i = juiceDrops.length - 1; i >= 0; i--) {
                let j = juiceDrops[i];
                j.vy += GRAVITY * 0.8;
                j.x += j.vx;
                j.y += j.vy;
                j.alpha -= 0.03;

                if (j.alpha <= 0) {
                    juiceDrops.splice(i, 1);
                    continue;
                }

                ctx.beginPath();
                ctx.arc(j.x, j.y, j.radius, 0, Math.PI * 2);
                ctx.fillStyle = j.color;
                ctx.globalAlpha = j.alpha;
                ctx.fill();
                ctx.globalAlpha = 1;
            }

            // Draw Trail (Blade)
            if (isPointerDown && trail.length > 0) {
                ctx.beginPath();
                ctx.moveTo(trail[0].x, trail[0].y);
                for (let i = 1; i < trail.length; i++) {
                    ctx.lineTo(trail[i].x, trail[i].y);
                }
                
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                // Outer glow
                ctx.strokeStyle = 'rgba(28, 176, 246, 0.4)';
                ctx.lineWidth = 20; // Thicker blade for wide screen
                ctx.stroke();

                // Inner core
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 8;
                ctx.shadowColor = '#1cb0f6';
                ctx.shadowBlur = 12;
                ctx.stroke();
                
                ctx.shadowBlur = 0; 
            }

            if (isPointerDown) {
                checkSlices();
            }

            if(trail.length > 0 && !isPointerDown) {
                trail.shift();
                trail.shift(); // Fade faster
            }

            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function startMiniGame() {
            miniScore = 0;
            timeRemaining = 60;
            minigameObjects = [];
            particles = [];
            juiceDrops = [];
            trail = [];
            isPointerDown = false;
            isGameRunning = true;
            
            miniScoreEl.textContent = miniScore;
            timeLeftEl.textContent = timeRemaining;

            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                modal.classList.remove('scale-95');
            }, 10);

            gameLoop();

            timerId = setInterval(() => {
                timeRemaining--;
                timeLeftEl.textContent = timeRemaining;
                if (timeRemaining <= 0) {
                    endMiniGame();
                }
            }, 1000);
        }

        function endMiniGame() {
            if(!isGameRunning && timeRemaining > 0) {
                // Bomb triggered
            } else {
                playSfx('end_round'); 
            }
            
            isGameRunning = false;
            clearInterval(timerId);
            cancelAnimationFrame(gameLoopId);
            
            totalScore += miniScore;
            totalScoreEl.textContent = totalScore;
            
            const badge = totalScoreEl.parentElement;
            badge.classList.add('scale-125', 'bg-yellow-300');
            setTimeout(() => {
                badge.classList.remove('scale-125', 'bg-yellow-300');
            }, 400);

            overlay.classList.add('opacity-0');
            modal.classList.add('scale-95');
            
            setTimeout(() => {
                overlay.classList.add('hidden');
                
                currentRound++;
                if(currentRound > maxRounds) {
                    showEndGame();
                } else {
                    resetGameUI();
                }
            }, 300);
        }

        // --- END GAME & CONFETTI ---
        const endGameModal = document.getElementById('endGameModal');
        const finalScoreDisplay = document.getElementById('finalScoreDisplay');

        function showEndGame() {
            playSfx('game_over');
            finalScoreDisplay.textContent = totalScore;
            endGameModal.classList.remove('hidden');
            setTimeout(() => {
                endGameModal.classList.remove('opacity-0');
                endGameModal.querySelector('.duo-panel').classList.remove('scale-90');
            }, 10);
            
            shootConfetti();
        }

        function shootConfetti() {
            if(typeof confetti === 'undefined') return;

            var duration = 4000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 8,
                    angle: 60,
                    spread: 65,
                    origin: { x: 0 },
                    colors: ['#58cc02', '#1cb0f6', '#ffc800', '#ff4b4b', '#ff9600']
                });
                confetti({
                    particleCount: 8,
                    angle: 120,
                    spread: 65,
                    origin: { x: 1 },
                    colors: ['#58cc02', '#1cb0f6', '#ffc800', '#ff4b4b', '#ff9600']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        function restartFullGame() {
            playSfx('click');
            currentRound = 1;
            totalScore = 0;
            totalScoreEl.textContent = totalScore;
            
            endGameModal.classList.add('opacity-0');
            endGameModal.querySelector('.duo-panel').classList.add('scale-90');
            
            setTimeout(() => {
                endGameModal.classList.add('hidden');
                resetGameUI();
            }, 500);
        }
    </script>
</body>
</html>
