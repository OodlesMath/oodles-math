<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Place Value Game - Fun Math!</title>
    
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    animation: {
                        'gradient-x': 'gradient-x 6s ease infinite',
                        'bounce-slow': 'bounce 2s infinite',
                    },
                    keyframes: {
                        'gradient-x': {
                            '0%, 100%': {
                                'background-size': '200% 200%',
                                'background-position': 'left center'
                            },
                            '50%': {
                                'background-size': '200% 200%',
                                'background-position': 'right center'
                            },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 3D Realistic Blocks for Kids */
        .cube-one {
            width: clamp(1.2rem, 4vw, 2rem);
            height: clamp(1.2rem, 4vw, 2rem);
            background: linear-gradient(135deg, #FFD700, #FFA500);
            box-shadow: inset 2px 2px 4px rgba(255,255,255,0.6), inset -2px -2px 4px rgba(0,0,0,0.2), 2px 2px 5px rgba(0,0,0,0.3);
            border: 1px solid #D2691E;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .cube-one:active { transform: scale(0.9); }

        .cube-ten-segment {
            width: clamp(1.2rem, 4vw, 2rem);
            height: clamp(1.2rem, 4vw, 2rem);
            background: linear-gradient(135deg, #00FFFF, #1E90FF);
            box-shadow: inset 2px 2px 4px rgba(255,255,255,0.6), inset -2px -2px 4px rgba(0,0,0,0.2);
            border: 1px solid #0000CD;
            border-radius: 2px;
        }
        
        .rod-ten {
            display: flex;
            flex-direction: column;
            gap: 0;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            border-radius: 4px;
            overflow: hidden;
        }
        @media (min-width: 640px) {
            .rod-ten { flex-direction: row; }
        }
        .rod-ten:active { transform: scale(0.95); }

        /* Bubbly Buttons */
        .btn-bubbly {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-bubbly:active {
            transform: translateY(4px);
            border-bottom-width: 0px !important;
            margin-top: 4px;
        }

        /* Confetti Canvas */
        #fireworksCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body class="w-full h-screen bg-gradient-to-br from-pink-200 via-purple-200 to-sky-300 animate-gradient-x overflow-hidden flex flex-col items-center">

    <!-- HEADER -->
    <div class="w-full bg-white/90 backdrop-blur-md border-b-4 border-white/50 p-2 sm:p-4 shadow-lg z-20 flex justify-between items-center rounded-b-3xl">
        <div class="flex items-center gap-2 sm:gap-4">
            <img 
                src="https://image2url.com/r2/default/images/1770270908168-036a8878-e468-415d-9a50-73d8cbcc8574.png" 
                alt="Logo" 
                class="h-12 sm:h-16 w-auto drop-shadow-md animate-bounce-slow" 
            />
            <div class="flex flex-col">
                <h1 class="text-xl sm:text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-500 drop-shadow-sm">
                    Math Fun!
                </h1>
                <div class="flex items-baseline gap-2">
                    <button onclick="speakNumber()" class="bg-sky-100 hover:bg-sky-200 text-sky-600 p-2 rounded-full shadow-sm transition-colors" aria-label="Speak number">
                        <i data-lucide="volume-2" class="w-4 h-4 sm:w-5 sm:h-5"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="flex gap-2 sm:gap-4">
            <button 
                onclick="finishGame()" 
                class="btn-bubbly flex items-center gap-2 bg-gradient-to-r from-green-400 to-green-500 hover:from-green-500 hover:to-green-600 text-white px-4 py-2 sm:px-6 sm:py-3 rounded-2xl border-b-4 border-green-700 font-black text-sm sm:text-lg shadow-lg"
            >
                <i data-lucide="star" class="w-5 h-5 fill-yellow-300 text-yellow-300"></i>
                <span class="hidden sm:inline">Celebrate!</span>
            </button>
            <button 
                onclick="resetBoard()" 
                class="btn-bubbly flex items-center gap-2 bg-rose-100 hover:bg-rose-200 text-rose-600 px-3 py-2 sm:px-4 sm:py-3 rounded-2xl border-b-4 border-rose-300 font-bold text-sm sm:text-base shadow-sm"
            >
                <i data-lucide="rotate-ccw" class="w-4 h-4 sm:w-5 sm:h-5"></i>
            </button>
        </div>
    </div>

    <!-- NOTIFICATION -->
    <div id="notification-container" class="h-10 flex items-center justify-center mt-2 relative w-full z-30 pointer-events-none">
        <!-- Notification injected here -->
    </div>

    <!-- GAME BOARD -->
    <div class="flex-1 w-full max-w-5xl p-2 sm:p-4 flex flex-col overflow-hidden relative">
        <div class="flex-1 bg-white/80 backdrop-blur-lg rounded-[2rem] border-8 border-white/50 flex flex-col overflow-hidden shadow-2xl relative">
            
            <!-- Labels -->
            <div class="flex border-b-4 border-white/50 bg-gradient-to-r from-blue-100/50 to-orange-100/50">
                <div class="w-1/2 py-3 sm:py-4 text-center text-blue-600 font-black text-2xl sm:text-3xl tracking-widest border-r-4 border-white/50 drop-shadow-sm flex justify-center items-center gap-2">
                    TENS
                </div>
                <div class="w-1/2 py-3 sm:py-4 text-center text-orange-500 font-black text-2xl sm:text-3xl tracking-widest drop-shadow-sm flex justify-center items-center gap-2">
                    ONES
                </div>
            </div>

            <!-- Columns -->
            <div class="flex-1 flex overflow-hidden relative">
                
                <!-- TENS COLUMN -->
                <div 
                    id="tens-column"
                    class="w-1/2 border-r-4 border-dashed border-sky-200 p-2 sm:p-6 overflow-y-auto overflow-x-hidden flex flex-col items-center gap-3 sm:gap-4 bg-blue-50/30 transition-colors duration-300"
                >
                    <div id="tens-container" class="flex flex-wrap justify-center gap-3 sm:gap-5 w-full content-start pb-24">
                        <!-- Ten Rods injected here -->
                    </div>
                    <div id="tens-zero" class="text-blue-200 font-black mt-10 text-4xl opacity-50 drop-shadow-sm">0</div>
                </div>

                <!-- ONES COLUMN -->
                <div class="w-1/2 p-2 sm:p-6 overflow-y-auto flex flex-col relative bg-orange-50/30">
                    <div id="ones-container" class="flex flex-wrap content-start justify-center gap-2 sm:gap-3 w-full pb-24">
                        <!-- One Cubes injected here -->
                    </div>
                    <div id="ones-zero" class="text-orange-200 font-black mt-10 text-4xl opacity-50 w-full text-center drop-shadow-sm">0</div>

                    <!-- REGROUPING OVERLAY/HINT -->
                    <div id="regroup-hint" class="sticky bottom-4 left-0 right-0 flex justify-center pointer-events-none z-20 mt-auto hidden">
                        <div class="bg-white p-3 sm:p-4 rounded-3xl border-4 border-purple-400 shadow-2xl animate-bounce flex flex-col items-center">
                            <span class="text-purple-600 font-black text-sm sm:text-base mb-2 uppercase flex items-center gap-1">
                                ✨ Magic 10! ✨
                            </span>
                            <div 
                                id="regroup-drag-handle"
                                class="pointer-events-auto cursor-grab active:cursor-grabbing bg-yellow-100 p-3 rounded-2xl border-4 border-yellow-400 flex flex-wrap gap-1 w-24 sm:w-32 justify-center shadow-lg transform hover:scale-110 transition-transform"
                            >
                                <div class="w-full flex flex-wrap gap-1 justify-center" id="bundle-preview"></div>
                                <div class="absolute -top-3 -right-3 bg-purple-500 text-white rounded-full p-2 shadow-lg animate-pulse">
                                    <i data-lucide="hand" class="w-5 h-5"></i>
                                </div>
                            </div>
                            <span class="text-xs sm:text-sm text-purple-500 font-bold mt-2">Drag to TENS! 👈</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- CONTROLS -->
    <div class="w-full bg-white/90 backdrop-blur-md p-4 sm:p-6 pb-8 sm:pb-6 flex flex-col gap-3 shadow-[0_-10px_30px_rgba(0,0,0,0.1)] z-30 rounded-t-[2.5rem]">
        <div class="flex justify-center items-stretch gap-4 sm:gap-8 max-w-4xl mx-auto w-full">
            
            <!-- TENS CONTROLS -->
            <div class="flex-1 flex gap-2 sm:gap-3">
                <button 
                    onclick="removeTen()"
                    id="btn-remove-ten"
                    class="btn-bubbly bg-red-400 hover:bg-red-500 active:bg-red-600 border-b-4 border-red-600 text-white disabled:opacity-40 rounded-2xl p-3 sm:p-4 flex items-center justify-center transition-all w-16 sm:w-20 shadow-md"
                    aria-label="Remove Ten"
                >
                    <i data-lucide="minus" class="w-8 h-8 sm:w-10 sm:h-10"></i>
                </button>
                <button 
                    onclick="addTen()"
                    class="btn-bubbly flex-1 bg-blue-500 hover:bg-blue-400 active:bg-blue-600 border-b-4 border-blue-700 text-white rounded-2xl p-2 sm:p-3 flex flex-col items-center justify-center gap-1 sm:gap-2 transition-all shadow-md"
                >
                    <div class="flex gap-0 shadow-sm border border-blue-800 rounded-[2px] overflow-hidden">
                        <div class="w-1 h-4 sm:w-1.5 sm:h-5 bg-gradient-to-b from-cyan-300 to-blue-500"></div>
                        <div class="w-1 h-4 sm:w-1.5 sm:h-5 bg-gradient-to-b from-cyan-300 to-blue-500 border-l border-blue-800"></div>
                        <div class="w-1 h-4 sm:w-1.5 sm:h-5 bg-gradient-to-b from-cyan-300 to-blue-500 border-l border-blue-800"></div>
                    </div>
                    <span class="font-black text-lg sm:text-2xl uppercase tracking-wider">Add 10</span>
                </button>
            </div>

            <!-- ONES CONTROLS -->
            <div class="flex-1 flex gap-2 sm:gap-3">
                <button 
                    onclick="addOne()"
                    class="btn-bubbly flex-1 bg-orange-400 hover:bg-orange-300 active:bg-orange-500 border-b-4 border-orange-600 text-white rounded-2xl p-2 sm:p-3 flex flex-col items-center justify-center gap-1 sm:gap-2 transition-all shadow-md"
                >
                    <div class="w-4 h-4 sm:w-5 sm:h-5 bg-gradient-to-br from-yellow-300 to-orange-500 rounded-[2px] shadow-sm border border-orange-700"></div>
                    <span class="font-black text-lg sm:text-2xl uppercase tracking-wider">Add 1</span>
                </button>
                <button 
                    onclick="removeOne()"
                    id="btn-remove-one"
                    class="btn-bubbly bg-red-400 hover:bg-red-500 active:bg-red-600 border-b-4 border-red-600 text-white disabled:opacity-40 rounded-2xl p-3 sm:p-4 flex items-center justify-center transition-all w-16 sm:w-20 shadow-md"
                    aria-label="Remove One"
                >
                    <i data-lucide="minus" class="w-8 h-8 sm:w-10 sm:h-10"></i>
                </button>
            </div>

        </div>
        <div class="text-center text-purple-600 font-bold text-sm sm:text-base mt-2 flex justify-center items-center gap-2">
            💡 Tip: Collect 10 ONES to make magic! 🌟
        </div>
    </div>

    <!-- DRAG PREVIEW -->
    <div 
        id="drag-preview" 
        class="fixed pointer-events-none z-50 flex items-center hidden"
        style="transform: translate(-50%, -50%) rotate(-10deg);"
    >
        <div class="bg-yellow-300 p-2 sm:p-3 rounded-xl shadow-2xl scale-125 border-4 border-white flex gap-1" id="drag-preview-rod">
            <!-- Filled via JS -->
        </div>
    </div>

    <!-- SCORE MODAL & FIREWORKS -->
    <canvas id="fireworksCanvas"></canvas>
    <div id="scoreModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[110] flex items-center justify-center hidden opacity-0 transition-opacity duration-500">
        <div class="bg-white rounded-[3rem] p-8 sm:p-12 max-w-lg w-11/12 text-center shadow-2xl border-8 border-yellow-400 transform scale-90 transition-transform duration-500" id="scoreModalContent">
            <h2 class="text-4xl sm:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-pink-500 mb-4 animate-bounce">
                Great Job! 🎉
            </h2>
            <p class="text-xl sm:text-2xl text-slate-600 font-bold mb-6">You made the number:</p>
            <div class="text-7xl sm:text-9xl font-black text-blue-600 mb-8 drop-shadow-lg" id="finalScoreDisplay">0</div>
            
            <div class="flex justify-center gap-4">
                <button onclick="hideScoreModal()" class="btn-bubbly bg-gradient-to-r from-blue-500 to-cyan-400 text-white px-8 py-4 rounded-full font-black text-xl border-b-4 border-blue-700 shadow-xl w-full">
                    Play Again! 🚀
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- State ---
        let tens = 0;
        let ones = 0;
        let isRegroupingDrag = false;
        let dragPos = { x: 0, y: 0 };
        let notificationTimeout = null;

        const MAX_TENS = 20;
        const MAX_ONES = 30;

        // --- Refs ---
        const tensColumn = document.getElementById('tens-column');
        const tensContainer = document.getElementById('tens-container');
        const tensZero = document.getElementById('tens-zero');
        
        const onesContainer = document.getElementById('ones-container');
        const onesZero = document.getElementById('ones-zero');
        
        const notificationContainer = document.getElementById('notification-container');
        const regroupHint = document.getElementById('regroup-hint');
        const regroupDragHandle = document.getElementById('regroup-drag-handle');
        const dragPreview = document.getElementById('drag-preview');
        const dragPreviewRod = document.getElementById('drag-preview-rod');

        const btnRemoveTen = document.getElementById('btn-remove-ten');
        const btnRemoveOne = document.getElementById('btn-remove-one');

        const scoreModal = document.getElementById('scoreModal');
        const scoreModalContent = document.getElementById('scoreModalContent');
        const finalScoreDisplay = document.getElementById('finalScoreDisplay');

        // --- Audio Engine (Enhanced for Kids) ---
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (AudioContext) audioCtx = new AudioContext();
            }
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            initAudio();
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'pop') {
                // Happy marimba-like pop
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'delete') {
                // Soft boop down
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.linearRampToValueAtTime(200, now + 0.15);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'magic') {
                // Chime / Sparkle
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.linearRampToValueAtTime(1600, now + 0.3);
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.3, now + 0.1);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            } else if (type === 'win') {
                // Happy Fanfare chord (C major arpeggio)
                const freqs = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
                freqs.forEach((f, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.type = 'square';
                    o.frequency.value = f;
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    g.gain.setValueAtTime(0, now + i*0.1);
                    g.gain.linearRampToValueAtTime(0.15, now + i*0.1 + 0.05);
                    g.gain.exponentialRampToValueAtTime(0.01, now + i*0.1 + 0.6);
                    o.start(now + i*0.1);
                    o.stop(now + i*0.1 + 0.6);
                });
            }
        }

        function speakNumber(textToSpeak = null) {
            if ('speechSynthesis' in window) {
                const total = tens * 10 + ones;
                const text = textToSpeak || `${total}`;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.9; // Slightly slower, clearer for kids
                utterance.pitch = 1.2; // Happier, higher pitch
                window.speechSynthesis.speak(utterance);
            }
        }

        // --- Elements Creators ---
        function createTenRodElement() {
            const rod = document.createElement('div');
            rod.className = "rod-ten";
            rod.onclick = removeTen;
            for (let i = 0; i < 10; i++) {
                const seg = document.createElement('div');
                seg.className = "cube-ten-segment";
                rod.appendChild(seg);
            }
            return rod;
        }

        function createOneCubeElement() {
            const cube = document.createElement('div');
            cube.className = "cube-one";
            cube.onclick = removeOne;
            return cube;
        }

        // --- UI Updates ---
        function updateUI() {
            tensContainer.innerHTML = '';
            for (let i = 0; i < tens; i++) {
                tensContainer.appendChild(createTenRodElement());
            }
            tensZero.style.display = tens === 0 ? 'block' : 'none';
            btnRemoveTen.disabled = tens === 0;

            onesContainer.innerHTML = '';
            for (let i = 0; i < ones; i++) {
                onesContainer.appendChild(createOneCubeElement());
            }
            onesZero.style.display = ones === 0 ? 'block' : 'none';
            btnRemoveOne.disabled = ones === 0;

            if (ones >= 10) {
                regroupHint.classList.remove('hidden');
                const bundle = document.getElementById('bundle-preview');
                if (bundle.children.length === 0) {
                     for(let i=0; i<10; i++) {
                         const d = document.createElement('div');
                         d.className = "cube-one !w-3 !h-3 sm:!w-4 sm:!h-4";
                         bundle.appendChild(d);
                     }
                }
            } else {
                regroupHint.classList.add('hidden');
            }

            if (isRegroupingDrag) {
                tensColumn.classList.add('bg-white/60', 'ring-inset', 'ring-8', 'ring-purple-400', 'rounded-2xl');
            } else {
                tensColumn.classList.remove('bg-white/60', 'ring-inset', 'ring-8', 'ring-purple-400', 'rounded-2xl');
            }
        }

        function showNotification(msg) {
            if (notificationTimeout) clearTimeout(notificationTimeout);
            notificationContainer.innerHTML = `
                <div class="bg-purple-600 text-white px-6 py-2 rounded-full text-base sm:text-lg font-black animate-bounce shadow-xl border-4 border-purple-300">
                    ${msg}
                </div>
            `;
            notificationTimeout = setTimeout(() => {
                notificationContainer.innerHTML = '';
            }, 2000);
        }

        // --- Game Logic ---
        function addOne() {
            if (ones < MAX_ONES) {
                playSound('pop');
                ones++;
                updateUI();
            } else {
                showNotification("Too many ones! Time to regroup! ✨");
            }
        }

        function removeOne() {
            if (ones > 0) {
                playSound('delete');
                ones--;
                updateUI();
            }
        }

        function addTen() {
            if (tens < MAX_TENS) {
                playSound('pop');
                tens++;
                updateUI();
            } else {
                showNotification("Wow! Board is full! 🚀");
            }
        }

        function removeTen() {
            if (tens > 0) {
                playSound('delete');
                tens--;
                updateUI();
            }
        }

        function resetBoard() {
            playSound('delete');
            tens = 0;
            ones = 0;
            updateUI();
        }

        function finishGame() {
            const total = tens * 10 + ones;
            finalScoreDisplay.innerText = total;
            
            scoreModal.classList.remove('hidden');
            setTimeout(() => {
                scoreModal.classList.remove('opacity-0');
                scoreModalContent.classList.remove('scale-90');
                scoreModalContent.classList.add('scale-100');
            }, 10);
            
            playSound('win');
            speakNumber(`Wow! You made ${total}! Great job!`);
            startFireworks();
        }

        function hideScoreModal() {
            scoreModal.classList.add('opacity-0');
            scoreModalContent.classList.remove('scale-100');
            scoreModalContent.classList.add('scale-90');
            setTimeout(() => {
                scoreModal.classList.add('hidden');
                stopFireworks();
                resetBoard();
            }, 500);
        }

        // --- Regrouping Drag ---
        function startDrag(e) {
            e.preventDefault();
            isRegroupingDrag = true;
            
            if (dragPreviewRod.children.length === 0) {
                for (let i = 0; i < 10; i++) {
                    const d = document.createElement('div');
                    d.className = "cube-one";
                    dragPreviewRod.appendChild(d);
                }
            }

            dragPreview.classList.remove('hidden');
            moveDrag(e);
            updateUI(); 
        }

        function moveDrag(e) {
            if (!isRegroupingDrag) return;
            e.preventDefault();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            dragPreview.style.left = clientX + 'px';
            dragPreview.style.top = clientY + 'px';
        }

        function endDrag(e) {
            if (!isRegroupingDrag) return;
            isRegroupingDrag = false;
            dragPreview.classList.add('hidden');
            updateUI(); 

            const rect = tensColumn.getBoundingClientRect();
            const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
            const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;

            if (clientX >= rect.left && clientX <= rect.right && clientY >= rect.top && clientY <= rect.bottom) {
                if (tens < MAX_TENS) {
                    playSound('magic');
                    tens++;
                    ones -= 10;
                    showNotification("Magic 10 Created! 🌟");
                    updateUI();
                } else {
                    showNotification("Board full! 🚀");
                }
            }
        }

        regroupDragHandle.addEventListener('mousedown', startDrag);
        regroupDragHandle.addEventListener('touchstart', startDrag, { passive: false });
        window.addEventListener('mousemove', moveDrag);
        window.addEventListener('touchmove', moveDrag, { passive: false });
        window.addEventListener('mouseup', endDrag);
        window.addEventListener('touchend', endDrag);

        // --- Fireworks Animation ---
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationId = null;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function createParticles(x, y) {
            const particleCount = 60;
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 15,
                    life: 1,
                    color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                    size: Math.random() * 6 + 4
                });
            }
        }

        function animateFireworks() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Randomly launch fireworks
            if (Math.random() < 0.08) {
                createParticles(Math.random() * canvas.width, Math.random() * canvas.height * 0.5);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1; // gravity
                p.life -= 0.015;
                
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();

                if (p.life <= 0) particles.splice(i, 1);
            }
            ctx.globalAlpha = 1;
            animationId = requestAnimationFrame(animateFireworks);
        }

        function startFireworks() {
            resizeCanvas();
            particles = [];
            createParticles(canvas.width/2, canvas.height/2); // Initial burst
            if (!animationId) animateFireworks();
        }

        function stopFireworks() {
            if (animationId) cancelAnimationFrame(animationId);
            animationId = null;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = [];
        }

        // --- Init ---
        lucide.createIcons();
        updateUI();

    </script>
</body>
</html>
