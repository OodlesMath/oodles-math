<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fruit Math Adventure! V3</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Vibrant "Candy" Colors for kids */
            --bg-sky: #A1C4FD;
            --font-main: 'Poppins', sans-serif;
            --font-title: 'Nunito', sans-serif;
            --c-red: #FF4757;
            --c-blue: #1E90FF;
            --c-green: #2ED573;
            --c-yellow: #FFA502;
            --c-orange: #FF7F50;
            --c-purple: #9B59B6;
            --c-pink: #FF6B81;
            --c-white: #FFFFFF;
            --shadow-soft: 0 10px 30px rgba(0,0,0,0.15);
            --bubbly-shadow: 0 6px 0 rgba(0,0,0,0.1);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-main);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            position: relative;
        }

        /* Animated Bubbles Background */
        .bg-bubbles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none; overflow: hidden;
        }
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: floatUp 10s infinite ease-in-out;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
        }

        header {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.95);
            padding: clamp(10px, 3vw, 15px) clamp(15px, 4vw, 25px);
            border-radius: 30px;
            box-shadow: var(--bubbly-shadow);
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 4px solid white;
            z-index: 10;
        }

        .title-group h1 {
            font-family: var(--font-title);
            color: #FFFFFF;
            text-shadow: 3px 3px 0 var(--c-pink), -1px -1px 0 var(--c-pink), 1px -1px 0 var(--c-pink), -1px 1px 0 var(--c-pink), 1px 1px 0 var(--c-pink);
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 900;
        }

        .score-board {
            background: var(--c-yellow);
            color: #2F3542;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: clamp(0.85rem, 3.5vw, 1rem);
            font-weight: 800;
            box-shadow: 0 4px 0 #E29B00;
            text-align: center;
            line-height: 1.2;
            border: 3px solid white;
        }

        #main-stage {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            padding: clamp(15px, 5vw, 30px);
            box-shadow: var(--shadow-soft);
            border: 6px solid white;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            min-height: 70vh;
            flex-grow: 1;
        }

        .screen {
            width: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            flex-grow: 1;
        }
        .screen.active { display: flex; }

        @keyframes bounceIn { 
            0% { opacity: 0; transform: scale(0.8); } 
            100% { opacity: 1; transform: scale(1); } 
        }
        
        .instruction-text {
            font-size: clamp(1.2rem, 5vw, 1.6rem);
            color: var(--c-blue);
            text-align: center;
            margin-bottom: clamp(15px, 4vw, 25px);
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            width: 100%;
            text-shadow: 1px 1px 0px rgba(0,0,0,0.1);
        }

        .mini-speaker-btn {
            background: var(--c-green);
            color: white;
            border: 3px solid white;
            border-radius: 50%;
            width: clamp(45px, 12vw, 55px);
            height: clamp(45px, 12vw, 55px);
            cursor: pointer;
            font-size: clamp(1.2rem, 5vw, 1.5rem);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 #20AC5B;
            transition: 0.1s;
            flex-shrink: 0;
            filter: drop-shadow(0 4px 5px rgba(0,0,0,0.2));
        }
        .mini-speaker-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #20AC5B; }

        /* Make emojis look 3D and more real */
        .emoji-3d {
            filter: drop-shadow(0 5px 8px rgba(0,0,0,0.3));
            display: inline-block;
        }

        .graph-display {
            width: 100%;
            background: #F1F2F6;
            padding: clamp(10px, 3vw, 20px);
            border-radius: 30px;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            border: 4px solid #DFE4EA;
        }

        .graph-row {
            display: flex;
            align-items: center;
            gap: clamp(8px, 2vw, 15px);
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .graph-row.highlight { 
            background: #FFF; 
            box-shadow: 0 5px 15px rgba(30, 144, 255, 0.2); 
            transform: scale(1.02);
            border: 2px solid var(--c-blue);
        }

        .row-label { 
            font-size: clamp(1.8rem, 7vw, 2.5rem); 
            width: clamp(40px, 12vw, 65px); 
            text-align: center; 
        }

        .bar-container {
            flex: 1;
            display: flex;
            gap: 3px;
            height: clamp(28px, 8vw, 42px);
            background: #FFFFFF;
            border-radius: 12px;
            padding: 4px;
            border: 2px solid #CED6E0;
        }

        .graph-box {
            flex: 1;
            height: 100%;
            background: transparent;
            border: 2px dashed #DFE4EA;
            border-radius: 8px;
            max-width: 30px;
        }

        .graph-box.filled { 
            border: none; 
            animation: fillPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
            box-shadow: 0 3px 0 rgba(0,0,0,0.1);
        }

        .count-badge {
            font-weight: 900;
            width: clamp(35px, 10vw, 50px);
            text-align: center;
            color: #FFFFFF;
            background: var(--c-blue);
            border-radius: 15px;
            padding: 5px;
            font-size: clamp(1.2rem, 5vw, 1.5rem);
            box-shadow: 0 3px 0 #146BBF;
        }
        
        .answers-wrap {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: clamp(12px, 4vw, 20px);
            margin-top: auto;
            width: 100%;
            padding-bottom: 10px;
        }

        .ans-btn {
            background: white;
            border: 4px solid var(--c-blue);
            border-radius: 25px;
            padding: clamp(12px, 4vw, 18px) clamp(25px, 8vw, 40px);
            font-size: clamp(1.6rem, 7vw, 2.2rem);
            font-weight: 900;
            color: var(--c-blue);
            cursor: pointer;
            box-shadow: 0 8px 0 var(--c-blue);
            transition: all 0.1s;
            min-width: clamp(80px, 22vw, 110px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ans-btn:active { 
            transform: translateY(8px); 
            box-shadow: 0 0px 0 var(--c-blue); 
        }
        .ans-btn.emoji-large { 
            font-size: clamp(2.5rem, 10vw, 3.5rem); 
            min-width: clamp(80px, 20vw, 100px); 
            border-color: var(--c-pink);
            color: var(--c-pink);
            box-shadow: 0 8px 0 var(--c-pink);
        }
        .ans-btn.emoji-large:active { box-shadow: 0 0px 0 var(--c-pink); }
        
        /* ------------------------------------- */
        /* FIXED NUMBER BOND - NO JS NEEDED      */
        /* ------------------------------------- */
        .bond-container {
            position: relative;
            width: 100%;
            max-width: 320px;
            aspect-ratio: 1.1;
            margin: 20px 0;
        }

        .bond-node {
            position: absolute;
            transform: translate(-50%, -50%); /* Centers element perfectly on top/left coordinates */
            background: white;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            z-index: 2;
        }

        .bond-whole { 
            top: 15%; left: 50%; 
            width: clamp(100px, 28vw, 130px); height: clamp(100px, 28vw, 130px); 
            border: clamp(4px, 1.5vw, 6px) solid var(--c-purple);
            box-shadow: 0 8px 0 #7D3C98; 
            color: var(--c-purple);
            font-size: clamp(2.5rem, 8vw, 3.5rem);
        }

        .bond-part {
            width: clamp(80px, 22vw, 110px); height: clamp(80px, 22vw, 110px);
            border: clamp(4px, 1.5vw, 6px) solid;
            font-size: clamp(1.8rem, 6vw, 2.5rem);
        }

        .bond-part-1 { 
            top: 85%; left: 20%; 
            border-color: var(--c-green); 
            box-shadow: 0 8px 0 #20AC5B; 
            color: var(--c-green); 
        }
        
        .bond-part-2 { 
            top: 85%; left: 80%; 
            border-color: var(--c-orange); 
            box-shadow: 0 8px 0 #D35400; 
            color: var(--c-orange); 
        }

        .bond-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .node-icon {
            font-size: clamp(1rem, 4vw, 1.5rem);
            position: absolute;
            top: -10px;
            right: -10px;
            background: white;
            border: 3px solid #eee;
            border-radius: 50%;
            width: clamp(35px, 10vw, 45px);
            height: clamp(35px, 10vw, 45px);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .canvas-container {
            width: 100%;
            position: relative;
            background: #2F3542;
            border-radius: 30px;
            overflow: hidden;
            border: 8px solid #57606F;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.5);
        }

        #slice-canvas {
            width: 100%;
            height: 45vh;
            display: block;
            touch-action: none;
            background: 
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.1) 0%, transparent 60%),
                repeating-linear-gradient(45deg, #2F3542 0px, #2F3542 20px, #3A4050 20px, #3A4050 40px);
        }

        .feedback-label {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            background: white;
            padding: 20px 40px;
            border-radius: 40px;
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 900;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            border: 5px solid white;
            z-index: 1000;
            display: none;
            white-space: nowrap;
            pointer-events: none;
            text-align: center;
        }

        #modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: clamp(30px, 8vw, 50px);
            border-radius: 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 0 rgba(0,0,0,0.2);
            border: 8px solid var(--c-yellow);
            animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .btn-action {
            background: var(--c-green);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: clamp(1.4rem, 6vw, 1.8rem);
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 #20AC5B;
            border: 4px solid white;
            margin-top: 25px;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.1s;
        }
        .btn-action:active { transform: translateY(8px); box-shadow: 0 0 0 #20AC5B; }

        #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 1500; }

        @keyframes fillPop { 
            0% { transform: scale(0.3); opacity: 0; } 
            70% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; } 
        }

        @keyframes feedbackPop {
            0% { transform: translate(-50%, -50%) scale(0.1) rotate(-10deg); opacity: 0; }
            70% { transform: translate(-50%, -50%) scale(1.2) rotate(5deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
        }

    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <div class="bg-bubbles" id="bg-bubbles"></div>

    <header>
        <div class="title-group">
            <h1>Fruit Math! 🍓</h1>
        </div>
        <div class="score-board">
            Round: <span id="round-val">1</span> / 5<br>
            Score: <span id="score-val">0</span>
        </div>
    </header>

    <main id="main-stage">
        <div id="task-screen" class="screen">
            <div class="instruction-text">
                <span id="task-instr">How many apples?</span>
                <button class="mini-speaker-btn" onclick="speakCurrentTask()" aria-label="Speak instruction">🔊</button>
            </div>
            <div id="task-graph-container" class="graph-display"></div>
            <div class="answers-wrap" id="task-answers"></div>
        </div>

        <div id="addition-screen" class="screen">
            <div class="instruction-text">
                Find the total sum!
                <button class="mini-speaker-btn" onclick="speakCurrentTask()" aria-label="Speak instruction">🔊</button>
            </div>
            
            <div class="bond-container">
                <!-- SVG handles perfect alignment across all devices -->
                <svg class="bond-svg">
                    <line x1="50%" y1="15%" x2="20%" y2="85%" stroke="#DFE4EA" stroke-width="10" stroke-linecap="round"/>
                    <line x1="50%" y1="15%" x2="80%" y2="85%" stroke="#DFE4EA" stroke-width="10" stroke-linecap="round"/>
                </svg>

                <div class="bond-whole bond-node" id="node-whole">?</div>
                <div class="bond-part-1 bond-node bond-part" id="node-part1">
                    <span class="val">0</span>
                    <span class="node-icon emoji-3d" id="icon-part1">🍎</span>
                </div>
                <div class="bond-part-2 bond-node bond-part" id="node-part2">
                    <span class="val">0</span>
                    <span class="node-icon emoji-3d" id="icon-part2">🍌</span>
                </div>
            </div>

            <div id="addition-graph-ref" class="graph-display" style="transform: scale(0.9); margin-top: -10px; margin-bottom: 15px;"></div>
            <div class="answers-wrap" id="bond-answers"></div>
        </div>

        <div id="slice-screen" class="screen">
            <div class="instruction-text" style="color: var(--c-red);">NINJA BONUS: Slice Fruits! 💣</div>
            <div class="canvas-container">
                <canvas id="slice-canvas"></canvas>
            </div>
            <div style="margin-top: 15px; font-weight: 900; color: var(--c-red); font-size: clamp(1.5rem, 6vw, 2rem); background: white; padding: 5px 20px; border-radius: 20px; border: 3px solid var(--c-red);">
                Time: <span id="slice-timer">15</span>s
            </div>
        </div>
    </main>

    <div id="feedback" class="feedback-label"></div>
    <div id="modal-overlay">
        <div class="modal-content" id="modal-body"></div>
    </div>

    <!-- Pháo giấy (Confetti) Canvas -->
    <canvas id="confetti-canvas"></canvas>

    <script>
        // Create bubbles for background
        const bubblesContainer = document.getElementById('bg-bubbles');
        for(let i=0; i<15; i++) {
            let bubble = document.createElement('div');
            bubble.className = 'bubble';
            let size = Math.random() * 60 + 20;
            bubble.style.width = size + 'px';
            bubble.style.height = size + 'px';
            bubble.style.left = Math.random() * 100 + 'vw';
            bubble.style.animationDuration = (Math.random() * 10 + 5) + 's';
            bubble.style.animationDelay = (Math.random() * 5) + 's';
            bubblesContainer.appendChild(bubble);
        }

        const ALL_FRUIT_TYPES = [
            { type: 'apple', emoji: '🍎', color: '#FF4757' },
            { type: 'banana', emoji: '🍌', color: '#FFA502' },
            { type: 'grape', emoji: '🍇', color: '#9B59B6' },
            { type: 'orange', emoji: '🍊', color: '#FF7F50' },
            { type: 'strawberry', emoji: '🍓', color: '#FF1493' },
            { type: 'watermelon', emoji: '🍉', color: '#2ED573' }
        ];

        let FRUIT_TYPES = [];

        let state = {
            round: 1, 
            score: 0, 
            counts: {}, 
            step: 0, 
            targetFruitIdx: 0,
            targetAdditionFruits: [],
            sliceActive: false, 
            currentTask: ""
        };

        const screens = {
            task: document.getElementById('task-screen'),
            addition: document.getElementById('addition-screen'),
            slice: document.getElementById('slice-screen')
        };

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(freq, type = 'sine', duration = 0.2, vol = 0.1) {
            try {
                if(audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                osc.connect(gain); gain.connect(audioCtx.destination);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        function playChime() {
            playSfx(523.25, 'triangle', 0.15, 0.1); 
            setTimeout(() => playSfx(659.25, 'triangle', 0.15, 0.1), 80); 
            setTimeout(() => playSfx(783.99, 'triangle', 0.3, 0.1), 160); 
        }
        function playBoop() { playSfx(200, 'sine', 0.3, 0.15); }
        function playPop() { playSfx(1200, 'sine', 0.1, 0.05); }
        function playBoom() { playSfx(100, 'square', 0.5, 0.2); }
        function playWin() {
            [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                setTimeout(() => playSfx(freq, 'square', 0.4, 0.1), i * 150);
            });
        }

        function speakCurrentTask() {
            window.speechSynthesis.cancel();
            const ut = new SpeechSynthesisUtterance(state.currentTask);
            ut.lang = 'en-US';
            ut.pitch = 1.2; 
            ut.rate = 0.9; 
            window.speechSynthesis.speak(ut);
        }

        function showScreen(name) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            screens[name].classList.add('active');
        }

        function showFeedback(text, color, borderColor) {
            const f = document.getElementById('feedback');
            f.innerText = text; 
            f.style.color = color; 
            f.style.borderColor = borderColor || color;
            f.style.display = 'block';
            f.style.animation = 'none';
            f.offsetHeight; 
            f.style.animation = 'feedbackPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';
            setTimeout(() => { f.style.display = 'none'; }, 1200);
        }

        function updateScore(points) {
            state.score += points;
            document.getElementById('score-val').innerText = state.score;
        }

        function initRound() {
            state.counts = {};
            state.step = 0;
            
            FRUIT_TYPES = [...ALL_FRUIT_TYPES].sort(() => 0.5 - Math.random()).slice(0, 4);
            state.targetFruitIdx = Math.floor(Math.random() * FRUIT_TYPES.length);
            document.getElementById('round-val').innerText = state.round;
            
            let values = [];
            while(values.length < 4) {
                let v = Math.floor(Math.random() * 8) + 3; 
                if(!values.includes(v)) values.push(v);
            }
            
            FRUIT_TYPES.forEach((ft, i) => {
                state.counts[ft.type] = values[i];
            });

            const sortedByCount = [...FRUIT_TYPES].sort((a,b) => state.counts[a.type] - state.counts[b.type]);
            state.targetAdditionFruits = sortedByCount.slice(0, 2); 

            setupTaskStep();
        }

        function createGraphRow(ft, suffix = '', hideCount = false) {
            const row = document.createElement('div');
            row.className = 'graph-row';
            row.id = `row-${ft.type}${suffix}`;
            row.innerHTML = `
                <div class="row-label emoji-3d">${ft.emoji}</div>
                <div class="bar-container">
                    ${Array(12).fill(0).map((_, i) => `<div class="graph-box" id="box-${ft.type}-${i}${suffix}"></div>`).join('')}
                </div>
                <div class="count-badge" style="background:${ft.color}; box-shadow: 0 3px 0 ${adjustColor(ft.color, -40)}">${hideCount ? '?' : state.counts[ft.type]}</div>
            `;
            return row;
        }

        function adjustColor(color, amount) {
            return '#' + color.replace(/^#/, '').replace(/../g, color => ('0'+Math.min(255, Math.max(0, parseInt(color, 16) + amount)).toString(16)).substr(-2));
        }

        function setupTaskStep() {
            const container = document.getElementById('task-graph-container');
            const answers = document.getElementById('task-answers');
            container.innerHTML = '';
            answers.innerHTML = '';

            const sorted = Object.entries(state.counts).sort((a,b) => b[1] - a[1]);

            if (state.step === 0) {
                const target = FRUIT_TYPES[state.targetFruitIdx];
                state.currentTask = `How many ${target.type}s are there?`;
                document.getElementById('task-instr').innerHTML = `How many <span class="emoji-3d">${target.emoji}</span> are there?`;

                FRUIT_TYPES.forEach(ft => {
                    const row = createGraphRow(ft, '-task', ft.type === target.type);
                    if(ft.type === target.type) row.classList.add('highlight');
                    container.appendChild(row);
                    for(let i=0; i < state.counts[ft.type]; i++){
                        const b = row.querySelector(`#box-${ft.type}-${i}-task`);
                        if(b) { b.classList.add('filled'); b.style.backgroundColor = ft.color; }
                    }
                });

                const correctVal = state.counts[target.type];
                let choices = [correctVal];
                while(choices.length < 4) {
                    let rand = correctVal + Math.floor(Math.random() * 5) - 2;
                    if(rand > 0 && !choices.includes(rand)) choices.push(rand);
                }
                
                choices.sort((a,b) => a - b).forEach(val => {
                    const btn = document.createElement('button');
                    btn.className = 'ans-btn';
                    btn.innerText = val;
                    btn.onclick = () => {
                        if(val === correctVal) {
                            playChime(); 
                            showFeedback("PERFECT! 🌟", "var(--c-green)", "#20AC5B");
                            state.step++;
                            updateScore(10);
                            setTimeout(setupTaskStep, 1200);
                        } else {
                            playBoop(); 
                            showFeedback("Oops! Count again!", "var(--c-red)", "#D63031");
                        }
                    };
                    answers.appendChild(btn);
                });

            } else {
                const isMost = state.step === 1;
                state.currentTask = isMost ? "Which fruit has the most?" : "Which fruit has the least?";
                document.getElementById('task-instr').innerText = state.currentTask;

                FRUIT_TYPES.forEach(ft => {
                    const row = createGraphRow(ft, '-task', false);
                    container.appendChild(row);
                    for(let i=0; i < state.counts[ft.type]; i++){
                        const b = row.querySelector(`#box-${ft.type}-${i}-task`);
                        if(b) { b.classList.add('filled'); b.style.backgroundColor = ft.color; }
                    }
                });

                const correctType = isMost ? sorted[0][0] : sorted[sorted.length-1][0];

                FRUIT_TYPES.forEach(ft => {
                    const btn = document.createElement('button');
                    btn.className = 'ans-btn emoji-large emoji-3d';
                    btn.innerText = ft.emoji;
                    btn.onclick = () => {
                        if(ft.type === correctType) {
                            playChime(); 
                            showFeedback("GREAT JOB! 🎉", "var(--c-blue)", "#192A56");
                            state.step++;
                            updateScore(10);
                            setTimeout(() => {
                                if(state.step < 3) setupTaskStep();
                                else setupAddition();
                            }, 1200);
                        } else {
                            playBoop(); 
                            showFeedback("Try again!", "var(--c-orange)", "#D35400");
                        }
                    };
                    answers.appendChild(btn);
                });
            }
            showScreen('task');
        }

        function setupAddition() {
            const f1 = state.targetAdditionFruits[0], f2 = state.targetAdditionFruits[1];
            const v1 = state.counts[f1.type], v2 = state.counts[f2.type], sum = v1 + v2;
            
            state.currentTask = `How many ${f1.type}s and ${f2.type}s are there altogether?`;

            document.querySelector('#node-part1 .val').innerText = v1;
            document.querySelector('#node-part2 .val').innerText = v2;
            document.getElementById('icon-part1').innerText = f1.emoji;
            document.getElementById('icon-part2').innerText = f2.emoji;
            document.getElementById('node-whole').innerText = '?';

            const ref = document.getElementById('addition-graph-ref');
            ref.innerHTML = '';
            FRUIT_TYPES.forEach(ft => {
                const isPart = ft.type === f1.type || ft.type === f2.type;
                const row = createGraphRow(ft, '-ref', false); 
                row.style.opacity = isPart ? '1' : '0.2';
                ref.appendChild(row);
                for(let i=0; i<state.counts[ft.type]; i++){
                    const b = row.querySelector(`#box-${ft.type}-${i}-ref`);
                    if(b) { b.classList.add('filled'); b.style.backgroundColor = ft.color; }
                }
            });

            let choices = [sum];
            while(choices.length < 4) {
                let w = sum + Math.floor(Math.random() * 7) - 3;
                if(w >= 0 && !choices.includes(w)) choices.push(w);
            }
            
            const wrap = document.getElementById('bond-answers'); 
            wrap.innerHTML = '';
            choices.sort(() => Math.random() - 0.5).forEach(val => {
                const btn = document.createElement('button');
                btn.className = 'ans-btn'; 
                btn.innerText = val;
                btn.onclick = () => {
                    if(val === sum) { 
                        playChime(); 
                        showFeedback("CORRECT! 🚀", "var(--c-purple)", "#7D3C98"); 
                        updateScore(20); 
                        document.getElementById('node-whole').innerText = sum;
                        setTimeout(startBonusRound, 1500);
                    } else { 
                        playBoop(); 
                        showFeedback("Not quite!", "var(--c-red)", "#D63031"); 
                    }
                };
                wrap.appendChild(btn);
            });

            showScreen('addition');
        }

        let sliceTimerInterval;
        function startBonusRound() {
            showScreen('slice');
            state.currentTask = "Ninja Bonus! Slice the fruits but stay away from the bombs!";
            initSliceGame();
            let timeLeft = 15;
            document.getElementById('slice-timer').innerText = timeLeft;
            clearInterval(sliceTimerInterval);
            sliceTimerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('slice-timer').innerText = timeLeft;
                if(timeLeft <= 0) { 
                    clearInterval(sliceTimerInterval); 
                    endSliceGame(false); 
                }
            }, 1000);
        }

        function initSliceGame() {
            const canvas = document.getElementById('slice-canvas');
            const ctx = canvas.getContext('2d');
            const container = canvas.parentElement;
            
            function resizeCanvas() {
                canvas.width = container.offsetWidth;
                canvas.height = container.offsetHeight;
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            state.sliceActive = true;
            let items = [];
            let trail = [];
            let isSlicing = false;

            function spawn() {
                if(!state.sliceActive) return;
                const isBomb = Math.random() < 0.25;
                items.push({
                    x: Math.random() * (canvas.width - 80) + 40,
                    y: canvas.height + 60,
                    vx: (Math.random() - 0.5) * 6,
                    vy: -Math.random() * 4 - 10,
                    emoji: isBomb ? '💣' : ALL_FRUIT_TYPES[Math.floor(Math.random()*ALL_FRUIT_TYPES.length)].emoji,
                    isBomb: isBomb,
                    sliced: false,
                    rot: 0, 
                    vrot: (Math.random() - 0.5) * 0.2
                });
                setTimeout(spawn, 400 + Math.random() * 600);
            }
            spawn();

            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const ev = e.touches ? e.touches[0] : e;
                return { x: ev.clientX - rect.left, y: ev.clientY - rect.top };
            };

            canvas.addEventListener('mousedown', (e) => { isSlicing = true; trail = [getPos(e)]; });
            canvas.addEventListener('touchstart', (e) => { isSlicing = true; trail = [getPos(e)]; e.preventDefault(); }, {passive: false});
            
            canvas.addEventListener('mousemove', (e) => { 
                if(!isSlicing) return;
                const pos = getPos(e); trail.push(pos);
                if(trail.length > 12) trail.shift();
                checkSlice(pos.x, pos.y);
            });
            canvas.addEventListener('touchmove', (e) => { 
                if(!isSlicing) return;
                const pos = getPos(e); trail.push(pos);
                if(trail.length > 12) trail.shift();
                checkSlice(pos.x, pos.y);
                e.preventDefault();
            }, {passive: false});

            window.addEventListener('mouseup', () => { isSlicing = false; trail = []; });
            window.addEventListener('touchend', () => { isSlicing = false; trail = []; });

            function checkSlice(cx, cy) {
                items.forEach(item => {
                    if(!item.sliced) {
                        const d = Math.hypot(item.x - cx, item.y - cy);
                        if(d < 50) {
                            item.sliced = true;
                            if(item.isBomb) { 
                                playBoom(); 
                                endSliceGame(true); 
                            } else { 
                                playPop(); 
                                updateScore(5); 
                            }
                        }
                    }
                });
            }

            function render() {
                if(!state.sliceActive) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if(trail.length > 1) {
                    ctx.beginPath();
                    ctx.strokeStyle = "rgba(255, 255, 255, 0.9)";
                    ctx.shadowColor = "rgba(255, 255, 255, 0.5)";
                    ctx.shadowBlur = 10;
                    ctx.lineWidth = 6;
                    ctx.lineCap = "round";
                    ctx.moveTo(trail[0].x, trail[0].y);
                    for(let i=1; i<trail.length; i++) ctx.lineTo(trail[i].x, trail[i].y);
                    ctx.stroke();
                    ctx.shadowBlur = 0; 
                }

                items = items.filter(it => !(it.sliced && !it.isBomb));
                items.forEach((it, i) => {
                    it.x += it.vx; 
                    it.y += it.vy; 
                    it.vy += 0.25; 
                    it.rot += it.vrot;
                    
                    ctx.save();
                    ctx.translate(it.x, it.y); 
                    ctx.rotate(it.rot);
                    ctx.shadowColor = "rgba(0,0,0,0.5)";
                    ctx.shadowOffsetX = 3;
                    ctx.shadowOffsetY = 5;
                    ctx.shadowBlur = 5;
                    ctx.font = "clamp(45px, 12vw, 65px) Poppins"; 
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText(it.emoji, 0, 0);
                    ctx.restore();
                    
                    if(it.y > canvas.height + 150) items.splice(i, 1);
                });
                requestAnimationFrame(render);
            }
            render();
        }

        function endSliceGame(bomb) {
            state.sliceActive = false; 
            clearInterval(sliceTimerInterval);
            if(bomb) {
                showModal(`
                    <h2 style="color:var(--c-red); font-family:var(--font-title); font-size:3rem; margin:0; text-shadow: 2px 2px 0 #D63031;">BOOM! 💣</h2>
                    <p style="font-size: 1.5rem; color: #2F3542; font-weight: bold;">Watch out for bombs!<br>Let's play again!</p>
                    <button class="btn-action" onclick="location.reload()">Restart Game</button>
                `);
            } else if(state.round < 5) { 
                state.round++; 
                initRound(); 
            } else { 
                victory(); 
            }
        }

        function victory() {
            playWin();
            showModal(`
                <h2 style="color:var(--c-purple); font-family:var(--font-title); font-size:3rem; margin:0; text-shadow: 2px 2px 0 #7D3C98;">🏆 MATH MASTER!</h2>
                <p style="font-size: 1.4rem; color: #2F3542; font-weight: bold;">Amazing job! You finished 5 rounds!</p>
                <div style="font-size: 4rem; font-weight: 900; color: var(--c-blue); text-shadow: 3px 3px 0 #146BBF; margin: 15px 0; animation: bounceIn 1s infinite alternate;">${state.score}</div>
                <button class="btn-action" onclick="location.reload()">Play Again 🌟</button>
            `);
            startConfetti();
        }

        function showModal(html) {
            const o = document.getElementById('modal-overlay');
            const b = document.getElementById('modal-body');
            b.innerHTML = html; 
            o.style.display = 'flex';
        }

        // Bắn Pháo Giấy (Confetti Effect)
        function startConfetti() {
            const c = document.getElementById('confetti-canvas');
            const ctx = c.getContext('2d');
            c.width = window.innerWidth; 
            c.height = window.innerHeight;
            let confetti = [];
            const colors = ['#FF4757', '#FFA502', '#2ED573', '#1E90FF', '#9B59B6', '#FF1493', '#F1C40F'];
            
            // Create 150 pieces of confetti
            for(let i=0; i<150; i++) {
                confetti.push({
                    x: Math.random() * c.width,
                    y: Math.random() * c.height - c.height, // Khởi tạo vị trí tít phía trên màn hình
                    vx: (Math.random() - 0.5) * 3,
                    vy: Math.random() * 3 + 3,
                    w: Math.random() * 12 + 8,
                    h: Math.random() * 12 + 8,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rot: Math.random() * 360,
                    rotSpeed: (Math.random() - 0.5) * 15,
                    sway: Math.random() * Math.PI * 2,
                    swaySpeed: Math.random() * 0.05 + 0.02,
                    isCircle: Math.random() > 0.5
                });
            }

            function loop() {
                ctx.clearRect(0, 0, c.width, c.height);
                
                confetti.forEach((p) => {
                    p.y += p.vy;
                    p.x += Math.sin(p.sway) * 2 + p.vx;
                    p.sway += p.swaySpeed;
                    p.rot += p.rotSpeed;

                    // Nếu rơi khỏi màn hình thì recycle lại về trên cùng
                    if(p.y > c.height) {
                        p.y = -20;
                        p.x = Math.random() * c.width;
                        p.vy = Math.random() * 3 + 3;
                    }

                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rot * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    
                    // Mix giữa mảnh giấy vuông và mảnh tròn
                    if (p.isCircle) {
                        ctx.beginPath();
                        ctx.arc(0, 0, p.w/2, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
                    }
                    ctx.restore();
                });
                
                requestAnimationFrame(loop);
            }
            loop();
        }

        window.onload = initRound;
    </script>
</body>
