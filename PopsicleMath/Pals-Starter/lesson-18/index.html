<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bridge Master: Counting Challenge v2.0.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            background: #bae6fd;
        }

        /* --- BACKGROUND STYLE --- */
        #bg-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #0ea5e9 0%, #38bdf8 40%, #bae6fd 100%);
            z-index: 0;
            overflow: hidden;
        }

        .sun {
            position: absolute;
            top: -40px; left: -40px;
            width: clamp(120px, 20vw, 220px);
            height: clamp(120px, 20vw, 220px);
            background: #facc15;
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(250, 204, 21, 0.6);
            z-index: 1;
        }

        .cloud-container {
            position: absolute;
            pointer-events: none;
            z-index: 2;
            opacity: 0.9;
        }

        .cloud-shape {
            width: 120px; height: 40px;
            background: #fff;
            border-radius: 50px;
            position: relative;
            filter: drop-shadow(0 10px 15px rgba(255,255,255,0.6));
        }

        .cloud-shape::after, .cloud-shape::before {
            content: '';
            position: absolute;
            background: #fff;
            border-radius: 50%;
        }

        .cloud-shape::after { width: 60px; height: 60px; top: -30px; left: 15px; }
        .cloud-shape::before { width: 50px; height: 50px; top: -20px; right: 15px; }

        .cloud-move-1 { animation: float 65s infinite linear; top: 15%; }
        .cloud-move-2 { animation: float 50s infinite linear reverse; top: 25%; }

        @keyframes float {
            from { transform: translateX(-200px); }
            to { transform: translateX(110vw); }
        }

        canvas {
            display: block;
            position: absolute;
            top: 0; left: 0;
            z-index: 10;
            background: transparent;
        }

        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .interactive { pointer-events: auto; }

        .pop-in { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* --- UI TOP RIGHT --- */
        .top-right-ui {
            position: absolute;
            top: 20px;
            right: 120px; 
            display: flex;
            align-items: center;
            gap: 12px;
            pointer-events: none;
        }

        .hint-text-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 8px 18px;
            border-radius: 15px;
            border: 3px solid #facc15;
            font-weight: 700;
            color: #1e293b;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .sound-btn {
            width: 55px;
            height: 55px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 4px solid #facc15;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.2s;
        }
        .sound-btn:active { transform: scale(0.9); }
        .sound-btn svg { width: 28px; height: 28px; fill: #facc15; }
        .sound-btn.speaking { animation: pulse-ring 1s infinite; }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(250, 204, 21, 0); }
            100% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0); }
        }

        .score-box {
            background: #facc15;
            border: 4px solid #fff;
            border-radius: 18px;
            padding: 8px 15px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            opacity: 0;
            transition: opacity 0.5s;
            white-space: nowrap;
        }

        /* --- BUILD AREA (BOTTOM LEFT) --- */
        .build-area-container {
            position: absolute;
            bottom: 30px;
            left: 30px; 
            pointer-events: auto;
            display: flex;
            align-items: flex-end;
            gap: 15px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .action-btn {
            width: 80px; 
            height: 80px; 
            border: 5px solid #fff;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: white;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 6px 0 rgba(0,0,0,0.3);
        }

        .btn-build {
            background: #ea580c;
        }
        .btn-build:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.3);
            background: #f97316;
        }

        .btn-drop {
            background: #16a34a;
        }
        .btn-drop:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.3);
            background: #22c55e;
        }

        .unit-count-display {
            font-size: 1.6rem;
            line-height: 1;
        }

        .btn-label-text {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .math-card {
            background: white;
            border: 8px solid #fbbf24;
            border-radius: 3rem;
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <div id="bg-container">
        <div class="sun"></div>
        <div class="cloud-container cloud-move-1" style="left: 10%;"><div class="cloud-shape"></div></div>
        <div class="cloud-container cloud-move-2" style="right: 5%;"><div class="cloud-shape"></div></div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <canvas id="fireworksCanvas"></canvas>

    <div class="ui-layer">
        <div class="top-right-ui">
            <div id="hintTextBox" class="hint-text-box">
                It is <span id="hintCubesNum">0</span> cubes long
            </div>
            <button id="speakerBtn" class="sound-btn interactive hidden">
                <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            </button>
            <div id="scoreBox" class="score-box">
                🏆 Score: <span id="currentScore">0</span>/10
            </div>
        </div>

        <div class="logo-placeholder"></div>

        <!-- Build Area -->
        <div id="controlArea" class="build-area-container hidden">
            <div class="btn-group">
                <button id="buildBtn" class="action-btn btn-build interactive">
                    <span id="unitCounter" class="unit-count-display">0</span>
                    <span class="btn-label-text">Build</span>
                </button>
            </div>
            <div class="btn-group">
                <button id="dropBtn" class="action-btn btn-drop interactive">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 2px;"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"/></svg>
                    <span class="btn-label-text">Drop</span>
                </button>
            </div>
        </div>

        <!-- Screens -->
        <div id="startScreen" class="absolute inset-0 flex items-center justify-center bg-black/20 backdrop-blur-sm interactive">
            <div class="bg-white rounded-[2.5rem] p-8 max-sm:p-6 max-w-sm w-[90%] text-center shadow-2xl border-8 border-[#facc15] pop-in">
                <h1 class="text-4xl sm:text-5xl font-extrabold text-[#facc15] mb-2 text-nowrap">Bridge Master</h1>
                <h2 class="text-lg font-semibold text-slate-500 mb-8 uppercase tracking-widest">👷 Counting Challenge</h2>
                <div class="flex justify-center gap-6 mb-8 text-7xl"><div class="animate-bounce">🏗️</div></div>
                <p class="text-slate-600 mb-8 font-medium italic">"Build with Build button, Drop with Green button!"</p>
                <button id="startBtn" class="w-full bg-green-500 hover:bg-green-600 text-white text-2xl font-bold py-4 rounded-2xl shadow-[0_8px_0_rgb(21,128,61)] active:translate-y-1 active:shadow-none transition-all">
                    START PROJECT
                </button>
            </div>
        </div>

        <div id="mathRevivalScreen" class="hidden absolute inset-0 flex items-center justify-center bg-black/60 backdrop-blur-md interactive">
            <div class="math-card max-w-md w-[90%] text-center pop-in shadow-2xl">
                <h2 class="text-3xl font-bold text-[#facc15] mb-2">URGENT REPAIR! 🛠️</h2>
                <p class="text-slate-500 mb-6 font-semibold uppercase tracking-wider text-sm">Solve to save the worker!</p>
                <div id="mathQuestion" class="text-5xl font-black text-slate-800 mb-8 bg-yellow-50 py-8 rounded-3xl border-4 border-yellow-100">? + ? = ?</div>
                <div id="mathOptions" class="grid grid-cols-2 gap-4"></div>
            </div>
        </div>

        <div id="gameOverScreen" class="hidden absolute inset-0 flex items-center justify-center bg-black/50 interactive">
            <div class="bg-white rounded-[3rem] p-10 max-sm:p-6 max-w-sm w-[90%] text-center shadow-2xl border-8 border-red-500 pop-in">
                <h1 class="text-3xl sm:text-4xl font-bold text-red-600 mb-4 text-center">MISSION FAILED</h1>
                <div class="text-8xl mb-6 text-center">🐊</div>
                <button id="retryBtn" class="w-full bg-blue-500 hover:bg-blue-600 text-white text-2xl font-bold py-4 rounded-2xl transition-all">
                    RETRY PROJECT ↺
                </button>
            </div>
        </div>

        <div id="congratsScreen" class="hidden absolute inset-0 flex items-center justify-center bg-yellow-400/20 backdrop-blur-sm interactive">
            <div class="bg-white rounded-[3rem] p-10 text-center shadow-2xl border-8 border-green-500 pop-in">
                <h1 class="text-5xl font-bold text-green-600 mb-4">WELL DONE!</h1>
                <div class="text-9xl mb-8">🏆</div>
                <button id="finalResetBtn" class="w-full bg-green-500 hover:bg-green-600 text-white text-2xl font-bold py-4 rounded-2xl transition-all">
                    START NEW PROJECT
                </button>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "";
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const fwCanvas = document.getElementById('fireworksCanvas');
        const fwCtx = fwCanvas.getContext('2d');
        const speakerBtn = document.getElementById('speakerBtn');
        const scoreBox = document.getElementById('scoreBox');
        const controlArea = document.getElementById('controlArea');
        const buildBtn = document.getElementById('buildBtn');
        const dropBtn = document.getElementById('dropBtn');
        const unitCounter = document.getElementById('unitCounter');
        const hintTextBox = document.getElementById('hintTextBox');
        const hintCubesNum = document.getElementById('hintCubesNum');
        
        // --- SOUND MANAGER ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const Sound = {
            play(freq, type, duration, vol = 0.1) {
                try {
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + duration);
                } catch(e) {}
            },
            build() { this.play(600, 'sine', 0.1, 0.2); },
            drop() {
                try {
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
                } catch(e) {}
            },
            success() { this.play(800, 'sine', 0.2); setTimeout(() => this.play(1000, 'sine', 0.3), 100); },
            fail() { this.play(150, 'sawtooth', 0.5, 0.1); },
            win() {
                [440, 554, 659, 880].forEach((f, i) => {
                    setTimeout(() => this.play(f, 'sine', 0.4, 0.1), i * 150);
                });
            }
        };

        // --- CONFIGURATION ---
        let PLATFORM_Y_OFFSET = 180; 
        const UNIT_SIZE = 40; 
        const MIN_UNITS = 2;
        const MAX_UNITS = 10;

        const pickerColors = ['#E63946', '#F4A261', '#2A9D8F', '#E9C46A', '#264653', '#6D597A', '#F28482', '#A2D149', '#0077B6', '#D62828'];

        let score = 0, gameActive = false, state = 'waiting'; 
        let platforms = [], placedSticks = [], stick = { x: 0, y: 0, length: 0, angle: 0 };
        let character = { x: 0, y: 0, targetX: 0 }, cameraX = 0, targetCameraX = 0, fwParticles = [], viewScale = 1;

        function updateUI() { 
            const scoreEl = document.getElementById('currentScore');
            if (scoreEl) scoreEl.innerText = score; 
            if (scoreBox) scoreBox.style.opacity = '1'; 
            if (hintTextBox) hintTextBox.style.opacity = '1';
            
            const count = Math.round(stick.length / UNIT_SIZE);
            if (unitCounter) unitCounter.innerText = count;
            if (platforms[1]) {
                hintCubesNum.innerText = platforms[1].unitsGoal;
            }
        }

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            const w = window.innerWidth, h = window.innerHeight;
            canvas.width = w * dpr; canvas.height = h * dpr;
            canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
            fwCanvas.width = w * dpr; fwCanvas.height = h * dpr;
            fwCanvas.style.width = w + 'px'; fwCanvas.style.height = h + 'px';
            ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.scale(dpr, dpr);
            fwCtx.setTransform(1, 0, 0, 1, 0, 0); fwCtx.scale(dpr, dpr);
            viewScale = Math.min(1, w / 800);
            PLATFORM_Y_OFFSET = Math.max(180, h * 0.28); 
            if (gameActive) draw();
        }
        window.addEventListener('resize', resize);
        resize();

        function initGame() {
            score = 0; platforms = []; placedSticks = []; cameraX = 0; targetCameraX = 0;
            const startWidth = Math.max(100, window.innerWidth * 0.2);
            platforms.push({ x: 50, width: startWidth });
            addPlatform();
            character.x = platforms[0].x + platforms[0].width - 40;
            character.y = window.innerHeight - PLATFORM_Y_OFFSET;
            character.targetX = character.x;
            resetStick();
            state = 'waiting';
            updateUI();
            speakerBtn.classList.remove('hidden');
            controlArea.classList.remove('hidden');
        }

        function resetStick() {
            stick.length = 0; stick.angle = -Math.PI / 2;
            stick.x = platforms[0].x + platforms[0].width;
            stick.y = window.innerHeight - PLATFORM_Y_OFFSET;
            if (unitCounter) unitCounter.innerText = "0";
        }

        function addPlatform() {
            const last = platforms[platforms.length - 1];
            const unitsGap = MIN_UNITS + Math.floor(Math.random() * (MAX_UNITS - MIN_UNITS));
            platforms.push({ 
                x: last.x + last.width + (unitsGap * UNIT_SIZE), 
                width: 80 + Math.random() * 60, 
                unitsGoal: unitsGap 
            });
        }

        function pcmToWav(pcmData, sampleRate = 24000) {
            const buffer = new ArrayBuffer(44 + pcmData.byteLength);
            const view = new DataView(buffer);
            const writeStr = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
            writeStr(0, 'RIFF'); view.setUint32(4, 36 + pcmData.byteLength, true); writeStr(8, 'WAVE');
            writeStr(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true); 
            view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true); 
            view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); 
            view.setUint16(34, 16, true); writeStr(36, 'data'); view.setUint32(40, pcmData.byteLength, true);
            new Uint8Array(buffer, 44).set(new Uint8Array(pcmData));
            return new Blob([buffer], { type: 'audio/wav' });
        }

        async function playHint() {
            if (state !== 'waiting' || !gameActive || speakerBtn.classList.contains('speaking')) return;
            const targetUnits = platforms[1].unitsGoal;
            const textToSay = `It is ${targetUnits} cubes long.`;
            speakerBtn.classList.add('speaking');
            try {
                if (!apiKey) throw new Error();
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: textToSay }] }],
                        generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } } },
                        model: "gemini-2.5-flash-preview-tts"
                    })
                });
                const data = await response.json();
                const audioData = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                if (audioData) {
                    const audio = new Audio(URL.createObjectURL(pcmToWav(Uint8Array.from(atob(audioData), c => c.charCodeAt(0)).buffer, 24000)));
                    audio.onended = () => speakerBtn.classList.remove('speaking');
                    await audio.play();
                } else throw new Error();
            } catch (err) {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const u = new SpeechSynthesisUtterance(textToSay); u.lang = 'en-US'; u.rate = 0.85;
                    u.onend = () => speakerBtn.classList.remove('speaking');
                    window.speechSynthesis.speak(u);
                } else speakerBtn.classList.remove('speaking');
            }
        }
        speakerBtn.onclick = (e) => { e.stopPropagation(); playHint(); };

        function onBuildClick(e) {
            if (!gameActive || (state !== 'waiting' && state !== 'growing')) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (state === 'waiting') state = 'growing';
            if (stick.length < UNIT_SIZE * 15) {
                stick.length += UNIT_SIZE;
                Sound.build();
                updateUI();
            }
        }

        function onDropClick(e) {
            if (!gameActive || state !== 'growing') return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            Sound.drop();
            state = 'falling';
        }

        buildBtn.onclick = onBuildClick;
        dropBtn.onclick = onDropClick;

        function update() {
            if (!gameActive && state !== 'congrats') {
                if (fwParticles.length > 0) drawFireworks();
                return;
            }
            cameraX += (targetCameraX - cameraX) * 0.08;
            
            if (state === 'falling') {
                stick.angle += 0.18;
                const landingX = stick.x + stick.length, target = platforms[1];
                if (stick.angle >= 0) {
                    if (landingX >= target.x && landingX <= target.x + target.width) {
                        stick.angle = 0; state = 'walking'; character.targetX = target.x + target.width - 40;
                    } else if (landingX < target.x) {
                        if (stick.angle >= Math.PI/2) { stick.angle = Math.PI/2; state = 'walking'; character.targetX = stick.x + 5; }
                    } else { stick.angle = 0; state = 'walking'; character.targetX = landingX + 30; }
                }
            }
            
            if (state === 'walking') {
                character.x += 4.5;
                if (character.x >= character.targetX) {
                    character.x = character.targetX;
                    if (isSuccess()) {
                        Sound.success();
                        placedSticks.push({ x: stick.x, y: stick.y, length: stick.length, angle: 0 });
                        score++; updateUI();
                        if (score >= 10) triggerCompletion(); else nextTurn();
                    } else {
                        Sound.fail();
                        state = 'falling_down';
                    }
                }
            }
            
            if (state === 'falling_down') { character.y += 12; if (character.y > window.innerHeight + 150) triggerMathChallenge(); }
            draw(); drawFireworks(); requestAnimationFrame(update);
        }

        function isSuccess() {
            const landingX = stick.x + stick.length, target = platforms[1];
            return landingX >= target.x && landingX <= target.x + target.width;
        }

        function nextTurn() {
            state = 'transitioning';
            setTimeout(() => {
                targetCameraX = platforms[1].x - 50;
                setTimeout(() => { platforms.shift(); addPlatform(); resetStick(); state = 'waiting'; updateUI(); }, 600);
            }, 300);
        }

        function drawWorker(x, y) {
            ctx.save(); ctx.translate(x, y);
            const time = Date.now() * 0.01;
            const isWalking = state === 'walking', cycle = isWalking ? Math.sin(time) : 0, bob = isWalking ? Math.abs(Math.sin(time * 2)) * 4 : 0;
            ctx.translate(0, -bob);
            ctx.fillStyle = '#f59e0b'; ctx.beginPath(); ctx.arc(0, -88, 15, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-5, -90, 2.3, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(5, -90, 2.3, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#000'; ctx.lineWidth = 1.2; ctx.beginPath(); ctx.arc(0, -84, 5, 0.2, Math.PI-0.2); ctx.stroke();
            const hatGrad = ctx.createLinearGradient(-22, -110, 22, -90);
            hatGrad.addColorStop(0, '#fbbf24'); hatGrad.addColorStop(1, '#b45309');
            ctx.fillStyle = hatGrad; ctx.beginPath(); ctx.ellipse(0, -100, 20, 16, 0, Math.PI, 0); ctx.fill();
            ctx.beginPath(); ctx.roundRect(-26, -102, 52, 6, 3); ctx.fill();
            [Math.sin(time+Math.PI), Math.sin(time)].forEach((c, idx) => {
                ctx.save(); ctx.translate(0, -35); ctx.rotate(isWalking?c*0.45:0);
                ctx.fillStyle = idx===0?'#1e3a8a':'#2563eb'; ctx.beginPath(); ctx.roundRect(-7, 0, 14, 22, 6); ctx.fill();
                ctx.translate(0, 18); ctx.rotate(isWalking?(c>0?c*0.5:0):0);
                ctx.beginPath(); ctx.roundRect(-6.5, 0, 13, 20, 5); ctx.fill(); ctx.restore();
                ctx.save(); ctx.translate(idx===0?14:-14, -65); ctx.rotate(isWalking?-c*0.6:0);
                ctx.fillStyle = '#3b82f6'; ctx.beginPath(); ctx.roundRect(idx===0?0:-9,0,9,18,4); ctx.fill(); ctx.restore();
            });
            ctx.fillStyle = '#ea580c'; ctx.beginPath(); ctx.roundRect(-16, -72, 32, 37, 6); ctx.fill();
            ctx.fillStyle = '#f8fafc'; ctx.fillRect(-16, -64, 32, 4.5); ctx.fillRect(-16, -48, 32, 4.5);
            ctx.restore();
        }

        function drawWorld() {
            const time = Date.now() * 0.002;
            ctx.fillStyle = '#0369a1'; ctx.fillRect(cameraX, window.innerHeight-80, window.innerWidth, 80);
            const crocBaseX = cameraX+window.innerWidth/2+Math.sin(time*0.4)*(window.innerWidth/2.8);
            const crocDir = Math.cos(time*0.4)>0?1:-1, swing = Math.sin(time*5)*12;
            ctx.save(); ctx.translate(crocBaseX, window.innerHeight-35); ctx.scale(crocDir, 1);
            const grad = ctx.createLinearGradient(0, -20, 0, 20); grad.addColorStop(0, '#166534'); grad.addColorStop(1, '#064e3b');
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.ellipse(0, 0, 75, 20, 0, 0, Math.PI * 2); ctx.fill(); 
            ctx.save(); ctx.clip();
            ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
            for(let i=-80; i<80; i+=10) { ctx.beginPath(); ctx.moveTo(i, -30); ctx.lineTo(i+30, 30); ctx.stroke(); ctx.beginPath(); ctx.moveTo(i, 30); ctx.lineTo(i+30, -30); ctx.stroke(); }
            ctx.restore();
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.moveTo(-55, 0); ctx.quadraticCurveTo(-110, swing, -140, 0); ctx.lineTo(-55, 8); ctx.fill(); 
            ctx.beginPath(); ctx.moveTo(50, -8); ctx.quadraticCurveTo(100, -15, 130, -5); ctx.lineTo(130, 10); ctx.quadraticCurveTo(100, 20, 50, 15); ctx.fill(); 
            ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(65,-8,4,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(66,-8,2.5,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#064e3b'; for(let i=-45; i<45; i+=15) { ctx.beginPath(); ctx.moveTo(i, -16); ctx.quadraticCurveTo(i+8, -32, i+16, -16); ctx.fill(); }
            ctx.restore();
            if (cameraX < 850) {
                ctx.save(); ctx.translate(-200, window.innerHeight - PLATFORM_Y_OFFSET);
                ctx.fillStyle = '#22c55e'; ctx.beginPath(); ctx.roundRect(0, 0, 650, 400, 20); ctx.fill();
                ctx.translate(80, 0); ctx.scale(viewScale, viewScale);
                ctx.fillStyle = '#f8fafc'; ctx.beginPath(); ctx.roundRect(150, -110, 300, 110, 8); ctx.fill();
                ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 4; ctx.stroke();
                ctx.fillStyle = '#334155'; ctx.beginPath(); ctx.moveTo(130, -110); ctx.lineTo(470, -110); ctx.lineTo(450, -150); ctx.lineTo(150, -150); ctx.fill();
                ctx.fillStyle = '#bae6fd'; ctx.fillRect(180, -80, 60, 45); ctx.fillRect(360, -80, 60, 45);
                ctx.fillStyle = '#64748b'; ctx.fillRect(275, -80, 50, 80); ctx.restore();
            }
            if (score >= 9) {
                const targetP = platforms[platforms.length-1];
                ctx.save(); ctx.translate(targetP.x + targetP.width - 100, window.innerHeight - PLATFORM_Y_OFFSET); 
                ctx.fillStyle = '#22c55e'; ctx.beginPath(); ctx.roundRect(0, 0, 1200, 400, 20); ctx.fill();
                ctx.scale(viewScale, viewScale);
                const bW = 260, bH = 480; 
                const bGrad = ctx.createLinearGradient(50, -bH, 50+bW, -bH);
                bGrad.addColorStop(0, '#1e293b'); bGrad.addColorStop(0.5, '#334155'); bGrad.addColorStop(1, '#0f172a');
                ctx.fillStyle = bGrad; ctx.beginPath(); ctx.roundRect(50, -bH, bW, bH, 15); ctx.fill();
                ctx.strokeStyle = '#475569'; ctx.lineWidth = 2; ctx.stroke();
                for(let r=0; r<12; r++) { for(let c=0; c<4; c++) {
                    const isLit = (Math.sin(Date.now()*0.001 + r + c) > 0);
                    ctx.fillStyle = isLit ? '#38bdf8' : '#0369a1';
                    ctx.globalAlpha = isLit ? 0.8 : 0.4;
                    ctx.beginPath(); ctx.roundRect(75 + c*58, -bH + 20 + r*38, 42, 28, 4); ctx.fill();
                }}
                ctx.globalAlpha = 1.0;
                const craneX = bW + 100;
                ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 14;
                ctx.beginPath(); ctx.moveTo(craneX, 0); ctx.lineTo(craneX, -580); ctx.stroke();
                ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                for(let ty=0; ty < 580; ty+=40) { ctx.beginPath(); ctx.moveTo(craneX-7, -ty); ctx.lineTo(craneX+7, -ty-40); ctx.stroke(); ctx.beginPath(); ctx.moveTo(craneX+7, -ty); ctx.lineTo(craneX-7, -ty-40); ctx.stroke(); }
                ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 14;
                ctx.beginPath(); ctx.moveTo(craneX - 250, -580); ctx.lineTo(craneX + 380, -580); ctx.stroke();
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.roundRect(craneX - 30, -610, 60, 50, 10); ctx.fill();
                ctx.fillStyle = '#38bdf8'; ctx.fillRect(craneX - 20, -600, 40, 25);
                ctx.strokeStyle = '#475569'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(craneX + 300, -580); ctx.lineTo(craneX + 300, -250); ctx.stroke();
                ctx.fillStyle = '#1e293b'; ctx.beginPath(); ctx.arc(craneX + 300, -250, 15, 0, Math.PI*2); ctx.fill();
                if (Math.floor(Date.now() / 500) % 2 === 0) { ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.arc(craneX, -620, 10, 0, Math.PI*2); ctx.fill(); }
                ctx.restore();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            ctx.save(); ctx.translate(-cameraX, 0); drawWorld();
            platforms.forEach((p, idx) => {
                const y = window.innerHeight - PLATFORM_Y_OFFSET;
                ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(p.x + 8, y + 8, p.width, PLATFORM_Y_OFFSET);
                ctx.fillStyle = '#cbd5e1'; ctx.beginPath(); ctx.roundRect(p.x, y, p.width, PLATFORM_Y_OFFSET, 8); ctx.fill();
                ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 4; ctx.beginPath();
                ctx.moveTo(p.x+10,y+30); ctx.lineTo(p.x+p.width-10, window.innerHeight-10);
                ctx.moveTo(p.x+p.width-10,y+30); ctx.lineTo(p.x+10, window.innerHeight-10); ctx.stroke();
                // FIX: Added quotes to #22c55e to fix SyntaxError
                ctx.fillStyle = (idx===1 && score>=9)?'#22c55e':(idx===1?'#f59e0b':'#64748b');
                ctx.beginPath(); ctx.roundRect(p.x-2, y, p.width+4, 20, 4); ctx.fill();
                if(idx===1 && score<9) { ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.arc(p.x+p.width/2, y+10, 6, 0, Math.PI*2); ctx.fill(); }
            });
            const activeSticks = [...placedSticks];
            if (state === 'growing' || state === 'falling' || state === 'walking' || state === 'falling_down') activeSticks.push(stick);
            activeSticks.forEach(s => {
                ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(s.angle);
                const units = Math.round(s.length / UNIT_SIZE);
                for(let i=0; i<units; i++) {
                    ctx.fillStyle = pickerColors[i % pickerColors.length]; ctx.beginPath(); 
                    ctx.roundRect(i*UNIT_SIZE + 1, 0, UNIT_SIZE - 2, UNIT_SIZE, 6); ctx.fill();
                    ctx.strokeStyle = 'white'; ctx.lineWidth = 2.5; ctx.stroke();
                }
                ctx.restore();
            });
            drawWorker(character.x, character.y); ctx.restore();
        }

        function triggerMathChallenge() {
            gameActive = false; controlArea.classList.add('hidden'); const isAdd = Math.random() > 0.5; let n1, n2, ans;
            if (isAdd) { ans = Math.floor(Math.random()*16)+4; n1 = Math.floor(Math.random()*(ans-1))+1; n2 = ans-n1; } 
            else { n1 = Math.floor(Math.random()*11)+10; n2 = Math.floor(Math.random()*(n1-2))+1; ans = n1-n2; }
            document.getElementById('mathQuestion').innerText = `${n1} ${isAdd?'+':'-'} ${n2} = ?`;
            const options = [ans]; while(options.length < 4) { const fake = ans + (Math.floor(Math.random()*8)-4); if (fake >= 0 && !options.includes(fake)) options.push(fake); }
            options.sort(() => Math.random() - 0.5);
            const grid = document.getElementById('mathOptions'); grid.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button'); btn.className = "bg-[#facc15] hover:bg-yellow-500 text-white text-3xl font-bold py-5 rounded-2xl interactive";
                btn.innerText = opt; btn.onclick = (e) => { e.stopPropagation(); if (opt === ans) revive(); else gameOver(); };
                grid.appendChild(btn);
            });
            document.getElementById('mathRevivalScreen').classList.remove('hidden');
        }

        function revive() { document.getElementById('mathRevivalScreen').classList.add('hidden'); controlArea.classList.remove('hidden'); character.x = platforms[0].x+platforms[0].width-40; character.y = window.innerHeight-PLATFORM_Y_OFFSET; character.targetX = character.x; resetStick(); state = 'waiting'; gameActive = true; update(); updateUI(); }
        function triggerCompletion() { Sound.win(); state = 'congrats'; gameActive = false; controlArea.classList.add('hidden'); document.getElementById('congratsScreen').classList.remove('hidden'); for(let i=0; i<15; i++) { setTimeout(() => createFirework(Math.random()*window.innerWidth, Math.random()*window.innerHeight/2.2), i*300); } animateFireworksLoop(); }
        function createFirework(x, y) { const colors = ['#facc15', '#f87171', '#60a5fa', '#4ade80', '#ffffff']; for(let i=0; i<40; i++) { const angle = (Math.PI*2/40)*i; const speed = 3 + Math.random()*6; fwParticles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, alpha: 1, color: colors[Math.floor(Math.random()*colors.length)] }); } }
        function drawFireworks() { fwCtx.clearRect(0, 0, window.innerWidth, window.innerHeight); for(let i = fwParticles.length-1; i >= 0; i--) { const p = fwParticles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.alpha -= 0.015; if (p.alpha <= 0) fwParticles.splice(i, 1); else { fwCtx.globalAlpha = p.alpha; fwCtx.fillStyle = p.color; fwCtx.beginPath(); fwCtx.arc(p.x, p.y, 3, 0, Math.PI * 2); fwCtx.fill(); } } }
        function animateFireworksLoop() { if (state !== 'congrats') return; drawFireworks(); requestAnimationFrame(animateFireworksLoop); }

        function gameOver() { document.getElementById('mathRevivalScreen').classList.add('hidden'); gameActive = false; controlArea.classList.add('hidden'); document.getElementById('gameOverScreen').classList.remove('hidden'); }

        document.getElementById('startBtn').onclick = (e) => { e.stopPropagation(); document.getElementById('startScreen').classList.add('hidden'); gameActive = true; initGame(); update(); };
        document.getElementById('retryBtn').onclick = (e) => { e.stopPropagation(); document.getElementById('gameOverScreen').classList.add('hidden'); gameActive = true; initGame(); update(); };
        document.getElementById('finalResetBtn').onclick = (e) => { e.stopPropagation(); document.getElementById('congratsScreen').classList.add('hidden'); initGame(); gameActive = true; update(); };

        initGame(); draw();
    </script>
</body>
