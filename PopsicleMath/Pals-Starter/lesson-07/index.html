<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Place Value Party v5!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Duolingo inspired vibrant palette */
            --bg-color-1: #58cc02; /* Green */
            --bg-color-2: #1cb0f6; /* Blue */
            --bg-color-3: #ce82ff; /* Purple */
            --bg-color-4: #ff4b4b; /* Red */

            /* Responsive Icon Sizes */
            --icon-size: 20px;
            --icon-pad: 4px;
            --grid-gap: 4px;
        }

        @media (min-width: 480px) {
            :root { --icon-size: 26px; }
        }
        @media (min-width: 768px) {
            :root { --icon-size: 34px; --icon-pad: 6px; --grid-gap: 6px; }
        }
        @media (min-width: 1024px) {
            :root { --icon-size: 42px; --icon-pad: 8px; --grid-gap: 8px; }
        }

        /* --- DENSE MODE FOR LARGE NUMBERS --- */
        #game-board.dense-mode {
            --icon-size: 14px;
            --icon-pad: 2px;
            --grid-gap: 2px;
        }
        @media (min-width: 480px) {
            #game-board.dense-mode { --icon-size: 18px; }
        }
        @media (min-width: 768px) {
            #game-board.dense-mode { --icon-size: 22px; --icon-pad: 4px; --grid-gap: 4px; }
        }
        @media (min-width: 1024px) {
            #game-board.dense-mode { --icon-size: 28px; }
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e0f2fe, #fce7f3, #f3e8ff, #e0e7ff);
            background-size: 300% 300%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        /* Soft clouds floating in the background */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            z-index: -1;
            animation: float 10s infinite ease-in-out;
            filter: blur(10px);
        }
        body::before { top: 5%; left: 5%; }
        body::after { bottom: 5%; right: 5%; animation-delay: -5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-40px) scale(1.1); }
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #game-board {
            width: 100vw;
            height: 100vh;
            max-width: 1200px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 4px solid rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            padding: 1rem;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15), 0 0 0 10px rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }

        @media (min-width: 768px) {
            #game-board {
                width: 95vw;
                height: 92vh;
                border-radius: 3.5rem;
                padding: 2.5rem;
            }
        }

        /* --- STYLING THE TITLE --- */
        .fancy-title {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 900;
            text-transform: uppercase;
            text-shadow:
                -4px -4px 0 #fff, 4px -4px 0 #fff,
                -4px 4px 0 #fff, 4px 4px 0 #fff,
                0 4px 0 #fff, 0 -4px 0 #fff,
                4px 0 0 #fff, -4px 0 0 #fff,
                0px 8px 10px rgba(0,0,0,0.15);
            margin-bottom: 0.25rem;
            letter-spacing: -2px;
            line-height: 1.1;
        }
        
        .word-place { color: #4B8AF2; } /* Blue */
        .word-value { color: #A55EFA; } /* Purple */
        .word-party { color: #F44CA2; } /* Pink */
        
        .title-subtitle {
            font-size: clamp(0.9rem, 2vw, 1.3rem);
            font-weight: 800;
            color: #6B7280;
            margin-top: 0.5rem;
            letter-spacing: -0.5px;
        }

        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            min-height: 0;
            margin-top: 1rem;
        }

        .chart-area {
            flex: 1;
            display: flex;
            flex-direction: row; /* Always side-by-side */
            gap: 10px;
            min-height: 0;
        }

        @media (min-width: 768px) {
            .chart-area { gap: 2rem; flex: 2; }
        }

        .column {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            position: relative;
            box-shadow: inset 0 0 20px rgba(255,255,255,1), 0 10px 20px rgba(0,0,0,0.08);
            border: 3px solid white;
            overflow: hidden;
            flex: 1;
        }

        .column-label-wrapper {
            background: linear-gradient(135deg, #ffffff, #f8fafc);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            margin-bottom: 1rem;
            border: 2px solid #e2e8f0;
            width: 90%;
        }

        .column-label {
            font-weight: 900;
            font-size: clamp(1.2rem, 3vw, 2rem);
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 2px;
            margin: 0;
        }

        /* --- BLOCKS & GRID OPTIMIZATIONS --- */
        .block-container {
            flex: 1;
            width: 100%;
            display: flex;
            flex-wrap: wrap; /* Allows blocks to wrap to next line if needed */
            align-content: center; /* Vertically center all items */
            align-items: center;
            justify-content: center; /* Horizontally center */
            gap: 15px;
            overflow-y: auto;
            padding: 10px 0;
        }

        .toy-icon {
            font-size: var(--icon-size);
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: var(--icon-size);
            height: var(--icon-size);
            line-height: 1;
            filter: drop-shadow(0px 3px 2px rgba(0,0,0,0.3));
            animation: float-icon 3s ease-in-out infinite;
            transform-origin: center bottom;
            transition: all 0.3s ease;
        }

        @keyframes float-icon {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-3px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* TENS: 5 Columns x 2 Rows (Horizontal Rod) */
        .block-tens-group {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: var(--grid-gap);
            background: rgba(255, 199, 0, 0.15);
            border: 3px dashed #ffb703;
            border-radius: 1rem;
            padding: var(--icon-pad);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: inset 0 0 10px rgba(255,255,255,0.5);
            width: max-content;
        }

        .block-tens-group .toy-icon:nth-child(even) { animation-delay: 0.5s; }
        .block-tens-group .toy-icon:nth-child(3n) { animation-delay: 1s; }

        /* ONES: Single blocks */
        .block-ones-single {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(0, 210, 255, 0.15);
            border: 3px dashed #3a7bd5;
            border-radius: 0.8rem;
            padding: var(--icon-pad);
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes popIn {
            0% { transform: scale(0) translateY(30px); opacity: 0; }
            70% { transform: scale(1.1) translateY(-10px); opacity: 1; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* Action Area */
        .action-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 2rem;
            border: 3px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .options-container {
            display: flex;
            flex-direction: row;
            gap: 1rem;
            width: 100%;
            justify-content: center;
        }

        @media (max-width: 600px) {
            .options-container {
                flex-direction: column;
                align-items: center;
            }
            .options-container button {
                width: 100%;
                max-width: 300px;
                padding: 0.8rem 1.5rem;
                font-size: 2rem;
            }
        }

        /* Duolingo Style Button */
        .btn-choice {
            background: #ffffff;
            border: 3px solid #e5e7eb;
            border-bottom-width: 8px;
            padding: 1rem 2rem;
            border-radius: 1.5rem;
            font-weight: 900;
            font-size: 2.2rem;
            color: #4b5563;
            transition: all 0.15s ease;
            cursor: pointer;
            min-width: 120px;
            text-align: center;
            outline: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        @media (min-width: 768px) {
            .btn-choice { font-size: 3rem; padding: 1.2rem 3.5rem; min-width: 180px; }
        }

        .btn-choice:active:not(:disabled) {
            border-bottom-width: 3px;
            transform: translateY(5px);
            background: #f9fafb;
        }

        .btn-choice.correct {
            background: #58cc02; border-color: #58cc02; border-bottom-color: #46a302;
            color: white; box-shadow: 0 0 20px rgba(88, 204, 2, 0.4);
        }
        .btn-choice.correct:active { border-bottom-width: 8px; transform: translateY(0); }

        .btn-choice.wrong {
            background: #ff4b4b; border-color: #ff4b4b; border-bottom-color: #ea1515;
            color: white; animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; opacity: 0.8;
        }

        .btn-choice:disabled { cursor: default; }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(3px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-5px, 0, 0); }
            40%, 60% { transform: translate3d(5px, 0, 0); }
        }

        .status-badge {
            background: #ffffff;
            border: 3px solid #e5e7eb;
            border-bottom-width: 5px;
            border-radius: 1.5rem;
            padding: 0.5rem 1rem;
            font-weight: 800;
            font-size: clamp(1rem, 2vw, 1.2rem);
            color: #4b5563;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Range Selection Buttons */
        .range-btn {
            border: 3px solid rgba(255,255,255,0.5);
            border-bottom-width: 8px;
            border-radius: 2rem;
            font-weight: 900;
            font-size: 1.5rem;
            color: white;
            padding: 1rem 2rem;
            cursor: pointer;
            transition: all 0.15s;
            text-shadow: 1px 2px 0px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 250px;
        }
        
        @media (min-width: 768px) {
            .range-btn { font-size: 1.8rem; padding: 1.2rem 3rem; max-width: none; width: auto; }
        }
        .range-btn:active { border-bottom-width: 3px; transform: translateY(5px); }

        /* Minigame Overlay */
        #minigame-screen {
            background: linear-gradient(to bottom, #7dd3fc, #bae6fd);
            touch-action: none; 
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- Game Board -->
    <div id="game-board" class="hidden">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-center gap-2">
            <div class="text-center md:text-left">
                <div class="fancy-title">
                    <span class="word-place">PLACE</span>
                    <span class="word-value">VALUE</span>
                    <span class="word-party">PARTY!</span>
                </div>
                <div class="title-subtitle">Count the tens and ones, then select the right number!</div>
            </div>
            <div class="flex gap-2 md:gap-3 mt-2 md:mt-0 flex-wrap justify-center">
                <div class="status-badge">
                    <span class="text-gray-400">STREAK</span> <span id="streak-display" class="text-pink-500 text-xl font-black">0</span><span class="text-gray-400">/3</span>
                </div>
                <div class="status-badge">
                    <span class="text-yellow-400 text-2xl">⭐</span> <span id="score-display" class="text-yellow-500 text-xl font-black">0</span>
                </div>
                <div class="status-badge">
                    <span class="text-gray-400">R</span> <span id="round-display" class="text-blue-500 text-xl font-black">1</span><span class="text-gray-400">/10</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="workspace">
            <div class="chart-area">
                <div class="column" id="tens-col">
                    <div class="column-label-wrapper">
                        <div class="column-label text-orange-500">TENS</div>
                    </div>
                    <!-- Blocks injected here -->
                    <div class="block-container" id="tens-container"></div>
                </div>
                <div class="column" id="ones-col">
                    <div class="column-label-wrapper">
                        <div class="column-label text-blue-500">ONES</div>
                    </div>
                    <!-- Blocks injected here -->
                    <div class="block-container" id="ones-container"></div>
                </div>
            </div>

            <!-- Action Area with 3 Choices -->
            <div class="action-area">
                <div class="options-container" id="options-container">
                    <!-- Buttons injected via JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-50 p-6 text-center" style="background: linear-gradient(135deg, #1cb0f6, #ce82ff);">
        <div class="text-8xl md:text-9xl mb-8" style="filter: drop-shadow(0px 15px 5px rgba(0,0,0,0.3));">🍉</div>
        <div class="fancy-title" style="margin-bottom: 2rem;">
            <span class="word-place">PLACE</span>
            <span class="word-value">VALUE</span>
            <span class="word-party">PARTY!</span>
        </div>
        
        <div class="bg-white/20 p-8 rounded-[3rem] backdrop-blur-md border-4 border-white/40 shadow-2xl w-full max-w-3xl">
            <h3 class="text-2xl md:text-3xl font-black text-white mb-6 drop-shadow-md">Choose Maximum Number:</h3>
            <div class="flex flex-wrap justify-center gap-4 md:gap-6">
                <button onclick="startGame(20)" class="range-btn bg-[#58cc02] hover:bg-[#46a302] border-[#46a302]">Up to 20</button>
                <button onclick="startGame(30)" class="range-btn bg-[#ce82ff] hover:bg-[#a668cc] border-[#a668cc]">Up to 30</button>
                <button onclick="startGame(50)" class="range-btn bg-[#1cb0f6] hover:bg-[#168ec6] border-[#168ec6]">Up to 50</button>
                <button onclick="startGame(100)" class="range-btn bg-[#ff4b4b] hover:bg-[#cc3c3c] border-[#cc3c3c]">Up to 100</button>
            </div>
        </div>
    </div>

    <!-- Minigame Catching Fruit Screen -->
    <div id="minigame-screen" class="hidden fixed inset-0 z-50 flex flex-col items-center justify-center">
        <div class="absolute top-8 px-6 py-4 bg-white border-4 border-pink-400 rounded-[2rem] shadow-xl z-10 flex flex-col items-center">
            <h2 class="text-2xl md:text-4xl font-black text-pink-500">FRUIT BONUS!</h2>
            <p class="text-xl md:text-2xl font-bold text-gray-600 mt-1">
                Time: <span id="fruit-timer" class="text-red-500">15</span>s | Catch: <span id="fruit-score" class="text-green-500">0</span>
            </p>
        </div>
        <canvas id="fruit-canvas" class="absolute inset-0 w-full h-full block"></canvas>
    </div>

    <!-- End Screen (Total Game Over / Win) -->
    <div id="end-screen" class="hidden fixed inset-0 flex flex-col items-center justify-center z-50 p-6 text-center" style="background: linear-gradient(135deg, #ff9900, #ff4b4b);">
        <div id="end-icon" class="text-8xl md:text-9xl mb-6" style="filter: drop-shadow(0px 15px 5px rgba(0,0,0,0.3));">🏆</div>
        <h1 id="end-title" class="text-6xl md:text-8xl font-black text-white mb-4" style="text-shadow: 0px 8px 0px rgba(0,0,0,0.2);">AMAZING!</h1>
        <p id="end-subtitle" class="text-3xl md:text-4xl font-bold text-white mb-4" style="text-shadow: 1px 2px 0px rgba(0,0,0,0.1);">You collected</p>
        <div class="text-8xl md:text-[10rem] font-black text-yellow-300 mb-12" style="text-shadow: 0 10px 20px rgba(0,0,0,0.3), 0px 8px 0px #d97706;">
            <span id="final-score">0</span> ⭐
        </div>
        <button onclick="resetToMenu()" class="btn-choice" style="background: white; color: #ff4b4b; border-color: #f3f4f6; border-bottom-color: #d1d5db; border-radius: 3rem; padding: 1.5rem 4rem; font-size: 2.5rem;">
            PLAY AGAIN 🔄
        </button>
    </div>

    <script>
        // Chỉ sử dụng các icon trái cây siêu đẹp
        const emojis = ['🍎', '🍌', '🍇', '🍉', '🍓', '🍒', '🍍', '🥝', '🍑', '🍊', '🍋', '🍐'];
        let currentTarget = 0;
        let maxNumberRange = 50; 
        let audioStarted = false;
        
        // Game State
        let currentRound = 1;
        const maxRounds = 10;
        let score = 0;
        let consecutiveCorrect = 0;
        let firstTry = true;

        // Tone.js
        const synth = new Tone.PolySynth().toDestination();
        const popSynth = new Tone.MembraneSynth().toDestination();
        let lastPopTime = 0;
        
        function playPop() { 
            if(audioStarted) {
                let now = Tone.now();
                if (now <= lastPopTime) { now = lastPopTime + 0.05; }
                popSynth.triggerAttackRelease("C4", "32n", now);
                lastPopTime = now;
            } 
        }
        
        function playSuccess() { if(audioStarted) synth.triggerAttackRelease(["C4", "E4", "G4", "C5"], "8n"); }
        function playError() { if(audioStarted) synth.triggerAttackRelease(["C3"], "16n"); }
        function playTada() { if(audioStarted) synth.triggerAttackRelease(["C4", "E4", "G4", "C5", "E5"], "2n"); }
        function playExplosion() { if(audioStarted) popSynth.triggerAttackRelease("C1", "2n"); }

        async function startGame(range) {
            maxNumberRange = range;
            await Tone.start();
            audioStarted = true;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-board').classList.remove('hidden');
            
            currentRound = 1;
            score = 0;
            consecutiveCorrect = 0;
            updateUI();
            generateLevel();
        }

        function updateUI() {
            document.getElementById('round-display').innerText = currentRound;
            document.getElementById('score-display').innerText = score;
            document.getElementById('streak-display').innerText = consecutiveCorrect;
        }

        function generateOptions(correctAnswer) {
            let options = [correctAnswer];
            while(options.length < 3) {
                let wrong = correctAnswer;
                let strategy = Math.random();
                
                if (strategy < 0.3) {
                    let tens = Math.floor(correctAnswer / 10);
                    let ones = correctAnswer % 10;
                    wrong = ones * 10 + tens;
                } else if (strategy < 0.6) {
                    let offset = [1, -1, 2, -2, 10, -10][Math.floor(Math.random() * 6)];
                    wrong = correctAnswer + offset;
                } else {
                    wrong = Math.floor(Math.random() * maxNumberRange) + 1;
                }

                if (wrong > 0 && wrong <= (maxNumberRange + 10) && !options.includes(wrong) && wrong !== correctAnswer) {
                    options.push(wrong);
                }
            }
            return options.sort(() => Math.random() - 0.5);
        }

        function generateLevel() {
            firstTry = true; 
            currentTarget = Math.floor(Math.random() * (maxNumberRange - 9)) + 10;
            const emoji = emojis[Math.floor(Math.random() * emojis.length)];
            
            const tens = Math.floor(currentTarget / 10);
            const ones = currentTarget % 10;

            const tensContainer = document.getElementById('tens-container');
            const onesContainer = document.getElementById('ones-container');
            const optionsContainer = document.getElementById('options-container');
            const gameBoard = document.getElementById('game-board');

            // Bật "Dense Mode" để thu nhỏ icon cho phép nhét 2 thanh ngang trên 1 dòng nếu số lớn
            if (tens >= 4) {
                gameBoard.classList.add('dense-mode');
            } else {
                gameBoard.classList.remove('dense-mode');
            }
            
            tensContainer.innerHTML = '';
            onesContainer.innerHTML = '';
            optionsContainer.innerHTML = '';

            const options = generateOptions(currentTarget);
            options.forEach(num => {
                const btn = document.createElement('button');
                btn.className = 'btn-choice';
                btn.innerText = num;
                btn.onclick = () => checkAnswer(num, btn);
                optionsContainer.appendChild(btn);
            });

            // Animate Tens (Groups of 10 ngang 5x2)
            for(let i=0; i<tens; i++) {
                setTimeout(() => {
                    const group = document.createElement('div');
                    group.className = 'block-tens-group';
                    for(let j=0; j<10; j++) {
                        const s = document.createElement('span');
                        s.innerText = emoji;
                        s.className = 'toy-icon';
                        group.appendChild(s);
                    }
                    tensContainer.appendChild(group);
                    playPop();
                }, i * 150);
            }

            // Animate Ones
            let onesAppended = 0;
            let currentRowDiv = null;

            for(let i=0; i<ones; i++) {
                setTimeout(() => {
                    if (onesAppended % 5 === 0) {
                        currentRowDiv = document.createElement('div');
                        currentRowDiv.style.display = 'flex';
                        currentRowDiv.style.justifyContent = 'center';
                        currentRowDiv.style.gap = 'var(--grid-gap)';
                        currentRowDiv.style.marginBottom = 'var(--grid-gap)';
                        onesContainer.appendChild(currentRowDiv);
                    }
                    
                    const block = document.createElement('div');
                    block.className = 'block-ones-single';
                    const icon = document.createElement('span');
                    icon.innerText = emoji;
                    icon.className = 'toy-icon';
                    block.appendChild(icon);
                    currentRowDiv.appendChild(block);
                    
                    onesAppended++;
                    playPop();
                }, (tens * 150) + (i * 150));
            }
        }

        function checkAnswer(selectedNumber, buttonElement) {
            if (selectedNumber === currentTarget) {
                // CORRECT
                playSuccess();
                buttonElement.classList.add('correct');
                
                const allButtons = document.getElementById('options-container').querySelectorAll('.btn-choice');
                allButtons.forEach(btn => btn.disabled = true);

                if (firstTry) {
                    score++;
                    consecutiveCorrect++;
                    updateUI();
                }

                confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#58cc02', '#1cb0f6', '#ce82ff', '#ffc700', '#ff4b4b'] });

                setTimeout(() => {
                    // Update trigger to 3 consecutive
                    if (consecutiveCorrect >= 3) {
                        consecutiveCorrect = 0; 
                        updateUI();
                        startMinigame(); 
                    } else {
                        advanceRound(); 
                    }
                }, 2500);

            } else {
                // INCORRECT
                playError();
                firstTry = false;
                consecutiveCorrect = 0;
                updateUI();
                buttonElement.classList.add('wrong');
                buttonElement.disabled = true; 
            }
        }

        function advanceRound() {
            currentRound++;
            if (currentRound > maxRounds) {
                showEndScreen(); // Tới màn hình kết thúc chiến thắng
            } else {
                updateUI();
                generateLevel();
            }
        }

        // ================= MINIGAME LOGIC =================
        let minigameActive = false;
        let fruitAnimId;
        let minigameTimerId;
        let minigameTimeLeft = 15;
        const fruitCanvas = document.getElementById('fruit-canvas');
        const ctx = fruitCanvas.getContext('2d');
        const fruitList = ['🍎', '🍌', '🍇', '🍉', '🍓', '🍒', '🍍', '🍑'];
        
        let basket = { x: 0, y: 0, size: 80 };
        let fallingItems = [];
        let caughtCount = 0;
        let inputX = window.innerWidth / 2;

        window.addEventListener('mousemove', (e) => { if(minigameActive) inputX = e.clientX; });
        window.addEventListener('touchmove', (e) => { 
            if(minigameActive) { inputX = e.touches[0].clientX; e.preventDefault(); }
        }, {passive: false});

        function resizeCanvas() {
            fruitCanvas.width = window.innerWidth;
            fruitCanvas.height = window.innerHeight;
            basket.y = fruitCanvas.height - 120;
        }
        window.addEventListener('resize', resizeCanvas);

        function startMinigame() {
            document.getElementById('game-board').classList.add('hidden');
            document.getElementById('minigame-screen').classList.remove('hidden');
            
            minigameActive = true;
            caughtCount = 0;
            fallingItems = [];
            minigameTimeLeft = 15;
            document.getElementById('fruit-score').innerText = caughtCount;
            document.getElementById('fruit-timer').innerText = minigameTimeLeft;
            
            resizeCanvas();
            basket.x = fruitCanvas.width / 2;
            inputX = fruitCanvas.width / 2;

            fruitAnimId = requestAnimationFrame(fruitLoop);
            
            // Start 15s Timer
            minigameTimerId = setInterval(() => {
                minigameTimeLeft--;
                document.getElementById('fruit-timer').innerText = minigameTimeLeft;
                if (minigameTimeLeft <= 0) {
                    endMinigame(true); // Time's up! Player survived!
                }
            }, 1000);
        }

        function fruitLoop() {
            if (!minigameActive) return;

            ctx.clearRect(0, 0, fruitCanvas.width, fruitCanvas.height);
            basket.x += (inputX - basket.x) * 0.15;
            if(basket.x < 60) basket.x = 60;
            if(basket.x > fruitCanvas.width - 60) basket.x = fruitCanvas.width - 60;

            // Draw Prettier Basket with Shadow
            ctx.shadowColor = "rgba(255, 255, 255, 0.7)";
            ctx.shadowBlur = 25;
            ctx.font = "110px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("🧺", basket.x, basket.y);
            ctx.shadowBlur = 0; // reset shadow

            // Spawn items
            if (Math.random() < 0.05) {
                let isBomb = Math.random() < 0.15; 
                fallingItems.push({
                    x: Math.random() * (fruitCanvas.width - 100) + 50,
                    y: -50,
                    speed: Math.random() * 4 + 4,
                    emoji: isBomb ? '💣' : fruitList[Math.floor(Math.random() * fruitList.length)],
                    isBomb: isBomb
                });
            }

            for (let i = fallingItems.length - 1; i >= 0; i--) {
                let f = fallingItems[i];
                f.y += f.speed;

                ctx.font = "50px Arial";
                ctx.fillText(f.emoji, f.x, f.y);

                let dist = Math.hypot(basket.x - f.x, basket.y - f.y);
                if (dist < 70) {
                    if (f.isBomb) {
                        endMinigame(false); // Hit a bomb!
                        return;
                    } else {
                        caughtCount++;
                        document.getElementById('fruit-score').innerText = caughtCount;
                        playPop();
                        fallingItems.splice(i, 1);
                    }
                } else if (f.y > fruitCanvas.height + 50) {
                    fallingItems.splice(i, 1);
                }
            }

            fruitAnimId = requestAnimationFrame(fruitLoop);
        }

        function endMinigame(success) {
            minigameActive = false;
            cancelAnimationFrame(fruitAnimId);
            clearInterval(minigameTimerId);
            
            if (success) {
                // Survived 15s! Award bonus stars
                playSuccess();
                score += caughtCount; 
                updateUI();
                confetti({ particleCount: 150, spread: 90, origin: { y: 0.5 } });
                
                setTimeout(() => {
                    document.getElementById('minigame-screen').classList.add('hidden');
                    document.getElementById('game-board').classList.remove('hidden');
                    advanceRound(); 
                }, 2000);
            } else {
                // BOMB HIT! - Game over cho minigame nhưng vẫn chơi tiếp câu hỏi
                playExplosion();
                ctx.fillStyle = "rgba(255, 0, 0, 0.7)";
                ctx.fillRect(0, 0, fruitCanvas.width, fruitCanvas.height);
                ctx.font = "bold 90px Poppins";
                ctx.fillStyle = "white";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.shadowColor = "black";
                ctx.shadowBlur = 15;
                ctx.fillText("BOOM! 💥", fruitCanvas.width/2, fruitCanvas.height/2);
                ctx.shadowBlur = 0;
                
                setTimeout(() => {
                    document.getElementById('minigame-screen').classList.add('hidden');
                    document.getElementById('game-board').classList.remove('hidden');
                    advanceRound(); // KHÔNG chuyển tới end screen, đi tới câu hỏi tiếp theo!
                }, 1800);
            }
        }
        // ==================================================

        function showEndScreen() {
            document.getElementById('game-board').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            
            const endScreen = document.getElementById('end-screen');
            const endIcon = document.getElementById('end-icon');
            const endTitle = document.getElementById('end-title');
            
            endScreen.style.background = "linear-gradient(135deg, #ff9900, #ff4b4b)";
            endIcon.innerText = "🏆";
            endTitle.innerText = "AMAZING!";
            playTada();
            
            // Winning Confetti
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);

                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        function randomInRange(min, max) { return Math.random() * (max - min) + min; }

        function resetToMenu() {
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
