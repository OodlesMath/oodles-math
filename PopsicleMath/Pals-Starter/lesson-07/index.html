<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Place Value Party v5!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color-1: #a8edea;
            --bg-color-2: #fed6e3;
            --bg-color-3: #e0c3fc;
            --bg-color-4: #8ec5fc;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bg-color-1), var(--bg-color-2), var(--bg-color-3), var(--bg-color-4));
            background-size: 300% 300%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        /* Thêm các họa tiết bong bóng bay lơ lửng ở background */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            z-index: -1;
            animation: float 8s infinite ease-in-out;
        }
        body::before { top: 10%; left: 10%; }
        body::after { bottom: 10%; right: 10%; animation-delay: -4s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.1); }
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #game-board {
            width: 100vw;
            height: 100vh;
            max-width: 1200px;
            /* Glassmorphism effect */
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 4px solid rgba(255, 255, 255, 0.8);
            display: flex;
            flex-direction: column;
            padding: 1rem;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15), 0 0 0 10px rgba(255, 255, 255, 0.3);
        }

        @media (min-width: 768px) {
            #game-board {
                width: 95vw;
                height: 90vh;
                border-radius: 3.5rem;
                padding: 2.5rem;
            }
        }

        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            min-height: 0;
        }

        .chart-area {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            min-height: 0;
        }

        @media (min-width: 768px) {
            .chart-area {
                gap: 2rem;
                flex: 2;
            }
        }

        .column {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            position: relative;
            box-shadow: inset 0 0 20px rgba(255,255,255,1), 0 10px 20px rgba(0,0,0,0.05);
            border: 3px solid white;
            overflow: hidden;
        }

        .column-label-wrapper {
            background: linear-gradient(135deg, #ffffff, #f1f5f9);
            padding: 0.5rem 2rem;
            border-radius: 2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 1rem;
            border: 2px solid white;
        }

        .column-label {
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 2px;
            margin: 0;
        }

        @media (min-width: 768px) {
            .column-label { font-size: 2rem; }
        }

        .block-container {
            flex: 1;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            justify-content: center;
            gap: 10px;
            overflow-y: auto;
            padding: 10px;
        }

        /* Block Styles */
        .block-tens {
            width: 50px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2px;
            background: linear-gradient(145deg, #ffd166, #ffb703);
            border: 3px solid white;
            border-radius: 0.8rem;
            padding: 4px;
            box-shadow: 0 6px 10px rgba(251, 133, 0, 0.3), inset 0 2px 4px rgba(255,255,255,0.8);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @media (min-width: 768px) {
            .block-tens {
                width: 70px;
                gap: 3px;
                padding: 6px;
                border-radius: 1rem;
            }
        }

        .block-ones {
            width: 45px;
            height: 45px;
            background: linear-gradient(145deg, #06d6a0, #00b4d8);
            border: 3px solid white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            box-shadow: 0 6px 10px rgba(0, 150, 199, 0.3), inset 0 2px 4px rgba(255,255,255,0.8);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @media (min-width: 768px) {
            .block-ones {
                width: 65px;
                height: 65px;
                font-size: 2.5rem;
            }
        }

        /* Improved Toys icons shadow & animation for realistic appealing looks */
        @keyframes float-icon {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-3px); }
            100% { transform: translateY(0px); }
        }

        .toy-icon {
            display: inline-block;
            filter: drop-shadow(2px 4px 0px rgba(0,0,0,0.25)) drop-shadow(0px 0px 2px rgba(255,255,255,0.5));
            transform-origin: center bottom;
            animation: float-icon 2.5s ease-in-out infinite;
        }

        .block-tens .toy-icon:nth-child(even) {
            animation-delay: 0.5s;
        }

        .block-tens .toy-icon:nth-child(3n) {
            animation-delay: 1s;
        }

        @keyframes popIn {
            0% { transform: scale(0) translateY(20px); opacity: 0; }
            70% { transform: scale(1.1) translateY(-5px); opacity: 1; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* Action UI */
        .action-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 2.5rem;
            border: 3px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .btn-action {
            background: linear-gradient(135deg, #fb7185, #f43f5e);
            border: 4px solid white;
            padding: 1rem 3rem;
            border-radius: 3rem;
            font-weight: 900;
            font-size: 2rem;
            color: white;
            box-shadow: 0 10px 20px rgba(244, 63, 94, 0.3), 0 8px 0 #e11d48;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 1px 2px 0px rgba(0,0,0,0.2);
            min-width: 250px;
        }

        @media (min-width: 768px) {
            .btn-action {
                font-size: 3rem;
                padding: 1.5rem 5rem;
                min-width: 400px;
            }
        }

        .btn-action:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #e11d48, 0 5px 10px rgba(244, 63, 94, 0.3);
            transition: all 0.1s;
        }

        .btn-action:disabled {
            cursor: not-allowed;
            transform: scale(1.05);
            border-color: #4ade80;
        }

        .status-badge {
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid white;
            border-radius: 2rem;
            padding: 0.5rem 1.5rem;
            font-weight: 800;
            font-size: 1.2rem;
            color: #8b5cf6;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            backdrop-filter: blur(5px);
        }

        /* Range Selection Buttons */
        .range-btn {
            border: 4px solid white;
            border-radius: 2rem;
            font-weight: 900;
            font-size: 1.5rem;
            color: white;
            padding: 1rem 2rem;
            cursor: pointer;
            transition: all 0.2s;
            text-shadow: 1px 2px 0px rgba(0,0,0,0.2);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2), 0 6px 0 rgba(0,0,0,0.2);
        }
        
        @media (min-width: 768px) {
            .range-btn { font-size: 2rem; padding: 1.2rem 3rem; }
        }

        .range-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2), 0 0px 0 rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">

    <!-- Game Board -->
    <div id="game-board" class="hidden">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-2 gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 tracking-tight drop-shadow-sm" style="filter: drop-shadow(2px 2px 0px rgba(255,255,255,1));">
                    PLACE VALUE PARTY! ✨
                </h1>
                <p class="text-pink-600 font-bold text-lg md:text-xl mt-1">Count out loud, then check!</p>
            </div>
            <div class="flex gap-3">
                <div class="status-badge text-purple-500">
                    ROUND <span id="round-display" class="text-purple-600 text-xl">1</span>/5
                </div>
                <div class="status-badge text-yellow-500">
                    STARS <span id="score-display" class="text-yellow-600 text-xl">0</span> ⭐
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="workspace">
            <div class="chart-area">
                <div class="column" id="tens-col">
                    <div class="column-label-wrapper">
                        <div class="column-label text-orange-500">TENS</div>
                    </div>
                    <div class="block-container" id="tens-container"></div>
                </div>
                <div class="column" id="ones-col">
                    <div class="column-label-wrapper">
                        <div class="column-label text-cyan-500">ONES</div>
                    </div>
                    <div class="block-container" id="ones-container"></div>
                </div>
            </div>

            <div class="action-area">
                <button class="btn-action" id="check-btn" onclick="checkAnswer()">CHECK!</button>
            </div>
        </div>
    </div>

    <!-- Start Screen with Number Selection -->
    <div id="start-screen" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-50 p-6 text-center" style="background: linear-gradient(135deg, #a8edea, #fed6e3);">
        <div class="text-8xl md:text-9xl mb-8 animate-bounce toy-icon" style="animation: none; filter: drop-shadow(2px 8px 4px rgba(0,0,0,0.3));">🦄</div>
        <h1 class="text-6xl md:text-8xl font-black text-white mb-2" style="text-shadow: 4px 4px 0px #ff7eb3, 8px 8px 20px rgba(0,0,0,0.2);">PLACE VALUE</h1>
        <h2 class="text-5xl md:text-7xl font-black text-purple-500 mb-10" style="text-shadow: 3px 3px 0px #ffffff;">PARTY!</h2>
        
        <div class="bg-white/40 p-6 rounded-3xl backdrop-blur-sm border-4 border-white shadow-xl">
            <h3 class="text-2xl md:text-3xl font-black text-pink-600 mb-6 drop-shadow-sm">Choose Maximum Number:</h3>
            <div class="flex flex-wrap justify-center gap-4 md:gap-6 max-w-2xl">
                <button onclick="startGame(20)" class="range-btn bg-gradient-to-br from-pink-400 to-pink-500 hover:from-pink-300 hover:to-pink-400">Up to 20</button>
                <button onclick="startGame(30)" class="range-btn bg-gradient-to-br from-purple-400 to-purple-500 hover:from-purple-300 hover:to-purple-400">Up to 30</button>
                <button onclick="startGame(50)" class="range-btn bg-gradient-to-br from-blue-400 to-blue-500 hover:from-blue-300 hover:to-blue-400">Up to 50</button>
                <button onclick="startGame(100)" class="range-btn bg-gradient-to-br from-green-400 to-green-500 hover:from-green-300 hover:to-green-400">Up to 100</button>
            </div>
        </div>
    </div>

    <!-- End Screen -->
    <div id="end-screen" class="hidden fixed inset-0 bg-white flex flex-col items-center justify-center z-50 p-6 text-center" style="background: linear-gradient(135deg, #e0c3fc, #8ec5fc);">
        <div class="text-8xl md:text-9xl mb-6 animate-pulse toy-icon" style="animation: none; filter: drop-shadow(2px 8px 4px rgba(0,0,0,0.3));">🌟</div>
        <h1 class="text-6xl md:text-8xl font-black text-white mb-4" style="text-shadow: 4px 4px 0px #a855f7;">AMAZING!</h1>
        <p class="text-3xl md:text-4xl font-bold text-white mb-8" style="text-shadow: 2px 2px 0px rgba(0,0,0,0.1);">You collected</p>
        <div class="text-8xl md:text-[10rem] font-black text-yellow-300 mb-12" style="text-shadow: 0 10px 20px rgba(0,0,0,0.2), 5px 5px 0px #d97706;">
            <span id="final-score">0</span> ⭐
        </div>
        <button onclick="resetToMenu()" class="bg-gradient-to-r from-pink-400 to-orange-400 text-white text-3xl md:text-4xl font-black px-14 py-6 rounded-full border-4 border-white shadow-2xl transition-all active:scale-95" style="box-shadow: 0 15px 0 #ea580c, 0 20px 30px rgba(0,0,0,0.2);">
            PLAY AGAIN 🔄
        </button>
    </div>

    <script>
        // Danh sách các emoji tinh chọn siêu đáng yêu cho bé
        const emojis = ['🦄', '🍓', '🍭', '🦋', '🧸', '🌈', '🎨', '🚀', '⭐', '🍕', '🍩', '🎁', '⚽', '👑', '🐶'];
        let currentTarget = 0;
        let maxNumberRange = 50; // Mặc định
        let audioStarted = false;
        
        // Game State
        let currentRound = 1;
        const maxRounds = 5;
        let score = 0;

        // Tone.js Synthesizers
        const synth = new Tone.PolySynth().toDestination();
        const popSynth = new Tone.MembraneSynth().toDestination();

        let lastPopTime = 0;
        
        function playPop() { 
            if(audioStarted) {
                let now = Tone.now();
                if (now <= lastPopTime) {
                    now = lastPopTime + 0.05; 
                }
                popSynth.triggerAttackRelease("C4", "32n", now);
                lastPopTime = now;
            } 
        }
        
        function playSuccess() { if(audioStarted) synth.triggerAttackRelease(["C4", "E4", "G4", "C5"], "8n"); }
        function playTada() { if(audioStarted) synth.triggerAttackRelease(["C4", "E4", "G4", "C5", "E5"], "2n"); }

        async function startGame(range) {
            maxNumberRange = range;
            await Tone.start();
            audioStarted = true;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-board').classList.remove('hidden');
            
            currentRound = 1;
            score = 0;
            document.getElementById('round-display').innerText = currentRound;
            document.getElementById('score-display').innerText = score;
            
            generateLevel();
        }

        function generateLevel() {
            // Lấy ngẫu nhiên từ 10 đến maxNumberRange. Ví dụ: max=20 -> (0..10) + 10 = 10..20
            currentTarget = Math.floor(Math.random() * (maxNumberRange - 9)) + 10;
            const emoji = emojis[Math.floor(Math.random() * emojis.length)];
            
            const tens = Math.floor(currentTarget / 10);
            const ones = currentTarget % 10;

            const tensContainer = document.getElementById('tens-container');
            const onesContainer = document.getElementById('ones-container');
            const checkBtn = document.getElementById('check-btn');
            
            // Reset UI
            tensContainer.innerHTML = '';
            onesContainer.innerHTML = '';
            
            checkBtn.disabled = false;
            checkBtn.innerText = "CHECK!";
            checkBtn.style.background = 'linear-gradient(135deg, #fb7185, #f43f5e)';
            checkBtn.style.boxShadow = '0 10px 20px rgba(244, 63, 94, 0.3), 0 8px 0 #e11d48';

            // Đặt block vào cột với độ trễ siêu cuốn
            for(let i=0; i<tens; i++) {
                setTimeout(() => {
                    tensContainer.appendChild(createBlock('tens', emoji));
                    playPop();
                }, i * 150);
            }

            for(let i=0; i<ones; i++) {
                setTimeout(() => {
                    onesContainer.appendChild(createBlock('ones', emoji));
                    playPop();
                }, (tens * 150) + (i * 150));
            }
        }

        function createBlock(type, emoji) {
            const div = document.createElement('div');
            div.className = type === 'tens' ? 'block-tens' : 'block-ones';
            if(type === 'tens') {
                for(let i=0; i<10; i++) {
                    const s = document.createElement('span');
                    s.innerText = emoji;
                    s.className = 'toy-icon';
                    s.style.fontSize = window.innerWidth < 768 ? '12px' : '18px';
                    div.appendChild(s);
                }
            } else {
                div.innerText = emoji;
                div.className += ' toy-icon';
            }
            return div;
        }

        function checkAnswer() {
            const checkBtn = document.getElementById('check-btn');

            checkBtn.disabled = true;

            // Chuyển trực tiếp nút check thành số kết quả luôn
            playSuccess();
            score++;
            document.getElementById('score-display').innerText = score;
            
            checkBtn.innerText = "IT IS " + currentTarget + "! ⭐";
            checkBtn.style.background = '#34d399'; // green-400
            checkBtn.style.boxShadow = '0 15px 30px rgba(52, 211, 153, 0.5), 0 0 0 #059669'; // Removed bottom shadow to look pressed down slightly
            
            // Bắn pháo hoa ăn mừng
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 },
                colors: ['#a8edea', '#fed6e3', '#e0c3fc', '#facc15', '#4ade80']
            });

            // Chờ 3.5 giây để bé ngắm kết quả rồi chuyển vòng mới
            setTimeout(() => {
                currentRound++;
                if (currentRound > maxRounds) {
                    showEndScreen();
                } else {
                    document.getElementById('round-display').innerText = currentRound;
                    generateLevel();
                }
            }, 3500);
        }

        function showEndScreen() {
            document.getElementById('game-board').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            
            playTada();

            // Pháo hoa tưng bừng màn kết
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        function randomInRange(min, max) {
            return Math.random() * (max - min) + min;
        }

        function resetToMenu() {
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
