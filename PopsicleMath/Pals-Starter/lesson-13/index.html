<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Math Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-top: #1cb0f6;
            --sky-bottom: #89d9ff;
            --grass-light: #58cc02;
            --grass-dark: #46a302;
            --basket-base: #d4a373;
            --basket-dark: #8b5a2b;
            --text-main: #4b4b4b;
            --primary: #ff4b4b;
            --primary-shadow: #ea2b2b;
            --secondary: #1cb0f6;
            --secondary-shadow: #1899d6;
            --success: #58cc02;
            --success-shadow: #46a302;
            --warning: #ffc800;
            --warning-shadow: #d1a300;
            --bg-card: #ffffff;
            --bond-border: #e5e5e5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 45%, var(--grass-light) 45%, var(--grass-dark) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            touch-action: manipulation;
            position: relative;
        }

        /* --- Background Elements --- */
        .sun {
            position: absolute; top: 20px; left: 30px; width: 100px; height: 100px;
            background: radial-gradient(circle, #fff700 30%, #ffaa00 100%); border-radius: 50%;
            box-shadow: 0 0 60px #fff700, 0 0 100px #ffaa00; z-index: 0; animation: pulse-sun 3s infinite alternate;
        }
        @keyframes pulse-sun { 0% { transform: scale(1); box-shadow: 0 0 40px #fff700, 0 0 80px #ffaa00; } 100% { transform: scale(1.05); box-shadow: 0 0 70px #fff700, 0 0 120px #ffaa00; } }

        .cloud { position: absolute; background: #fff; border-radius: 50px; opacity: 0.95; z-index: 0; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: #fff; border-radius: 50%; }
        .c1 { width: 130px; height: 40px; top: 6%; left: 15%; animation: float 25s linear infinite; }
        .c1::before { width: 60px; height: 60px; top: -30px; left: 15px; }
        .c1::after { width: 50px; height: 50px; top: -20px; left: 60px; }
        .c2 { width: 160px; height: 50px; top: 15%; right: -15%; animation: float 35s linear infinite reverse; }
        .c2::before { width: 80px; height: 80px; top: -40px; left: 25px; }
        .c2::after { width: 60px; height: 60px; top: -25px; left: 85px; }
        @keyframes float { from { transform: translateX(-150px); } to { transform: translateX(110vw); } }

        .flower { position: absolute; width: 50px; height: 50px; background-size: contain; background-repeat: no-repeat; z-index: 1; opacity: 0.9; animation: sway 4s infinite ease-in-out alternate; }
        .flower-white { background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50,20 C80,0 80,50 80,50 C100,80 50,80 50,80 C0,80 20,50 20,50 C20,0 50,20 50,20 Z" fill="%23ffffff"/><circle cx="50" cy="53" r="14" fill="%23ffca28"/></svg>'); }
        .flower-pink { background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50,20 C80,0 80,50 80,50 C100,80 50,80 50,80 C0,80 20,50 20,50 C20,0 50,20 50,20 Z" fill="%23ff9ff3"/><circle cx="50" cy="53" r="14" fill="%23ffca28"/></svg>'); }
        @keyframes sway { 0% { transform: rotate(-10deg); } 100% { transform: rotate(10deg); } }
        .f1 { bottom: 8%; left: 8%; transform: scale(0.9); } .f2 { bottom: 25%; left: 25%; transform: scale(1.1); animation-delay: 1s; }
        .f3 { bottom: 12%; right: 15%; transform: scale(0.8); animation-delay: 0.5s; } .f4 { bottom: 30%; right: 8%; transform: scale(1); animation-delay: 1.5s; }
        .f5 { bottom: 5%; left: 45%; transform: scale(1.2); animation-delay: 0.2s; } .f6 { bottom: 20%; right: 35%; transform: scale(0.9); animation-delay: 0.8s; }

        /* --- Header --- */
        header { text-align: center; padding: 15px 10px 5px; z-index: 10; position: relative; }
        h1 { color: #fff; font-size: 2.5rem; font-weight: 900; letter-spacing: 1px; -webkit-text-stroke: 2px var(--secondary-shadow); text-shadow: 0px 6px 0 var(--secondary-shadow); margin-bottom: 5px; }
        .progress-bar { width: 80%; max-width: 400px; height: 16px; background: rgba(255,255,255,0.3); border-radius: 10px; margin: 0 auto; position: relative; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--warning); width: 0%; border-radius: 10px; transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: inset 0 -4px 0 var(--warning-shadow); }

        /* --- Layout: Centralized Wrapper --- */
        .main-wrapper {
            display: flex; flex: 1; width: 100%; justify-content: center; align-items: center; padding: 10px; z-index: 10;
        }

        .game-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; gap: 30px;
        }

        @media (min-width: 1000px) {
            .game-container { flex-direction: row; gap: 60px; max-width: 1100px; }
        }

        /* --- Play Area (Tree & Baskets) --- */
        .play-area { display: flex; flex-direction: column; align-items: center; }
        
        .tree-container {
            position: relative; width: 450px; height: 400px; margin-bottom: 5px;
            display: flex; justify-content: center; align-items: center;
        }
        .tree-svg { position: absolute; bottom: 0; width: 100%; height: 100%; filter: drop-shadow(0 20px 20px rgba(0,0,0,0.3)); }
        .tree-leaves { width: 400px; height: 280px; position: absolute; top: 10px; z-index: 2; }

        .apple {
            width: 45px; height: 45px; position: absolute; z-index: 100;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0px 8px 6px rgba(0,0,0,0.4));
        }

        /* Baskets */
        .baskets-wrapper { display: flex; gap: 30px; justify-content: center; position: relative; z-index: 5; margin-top: 5px; }
        .basket-container { display: flex; flex-direction: column; align-items: center; }
        
        .basket {
            width: 240px; height: 110px; 
            background: linear-gradient(135deg, #e6b980 25%, transparent 25%) -50px 0, linear-gradient(225deg, #e6b980 25%, transparent 25%) -50px 0, linear-gradient(315deg, #e6b980 25%, transparent 25%), linear-gradient(45deg, #e6b980 25%, transparent 25%);
            background-size: 20px 20px; background-color: var(--basket-base);
            border-radius: 10px 10px 40px 40px; position: relative; border: 6px solid var(--basket-dark);
            border-top: none; display: flex; flex-wrap: wrap-reverse; align-content: flex-start; justify-content: center;
            padding: 10px; box-shadow: 0 15px 20px rgba(0,0,0,0.3);
        }
        .basket::before {
            content: ''; position: absolute; top: -10px; left: -10px; right: -10px; height: 20px;
            background: #cd853f; border-radius: 50%; border: 4px solid var(--basket-dark);
            z-index: 12; box-shadow: inset 0 -3px 5px rgba(0,0,0,0.3);
        }
        .basket::after {
            content: ''; position: absolute; top: -4px; left: 0; right: 0; height: 12px;
            background: rgba(0,0,0,0.4); border-radius: 50%; z-index: 1;
        }

        .basket-label {
            background: #fff; color: var(--basket-dark); padding: 5px 30px; border-radius: 20px;
            font-weight: 900; font-size: 1.3rem; margin-top: -15px; z-index: 15;
            border: 4px solid var(--basket-dark); box-shadow: 0 4px 0 var(--basket-dark);
        }

        /* --- Quiz Area --- */
        .quiz-area { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; max-width: 400px;}

        /* Question Text for Subtraction */
        .question-text {
            display: none; background: var(--secondary); color: white; padding: 8px 20px; border-radius: 15px;
            font-size: 1.2rem; font-weight: 800; text-align: center; width: 100%;
            box-shadow: 0 4px 0 var(--secondary-shadow); margin-bottom: 5px;
        }

        /* Feedback Box */
        .feedback-box {
            display: none; background: #fff; border: 4px solid var(--primary); border-radius: 25px;
            padding: 15px 20px; align-items: center; justify-content: space-between; gap: 15px;
            box-shadow: 0 8px 0 var(--primary-shadow); animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%; text-align: center;
        }
        .feedback-box.active { display: flex; }
        .feedback-text { font-size: 1.8rem; font-weight: 900; line-height: 1.2; flex: 1; }
        .feedback-status { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px;}
        
        .speaker-btn {
            background: var(--secondary); border: none; min-width: 50px; height: 50px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            box-shadow: 0 4px 0 var(--secondary-shadow); transition: transform 0.1s;
        }
        .speaker-btn:active { transform: translateY(4px); box-shadow: 0 0 0; }
        .speaker-btn svg { width: 24px; height: 24px; fill: white; }
        @keyframes slideDown { from { transform: translateY(-20px) scale(0.9); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }

        /* Number Bond */
        .number-bond {
            background: var(--bg-card); padding: 15px; border-radius: 25px;
            box-shadow: 0 8px 0 #e5e5e5; position: relative;
            width: 260px; height: 200px; display: flex; flex-direction: column; align-items: center;
            border: 3px solid #e5e5e5;
        }
        .bond-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .circle {
            width: 65px; height: 65px; border: 4px solid var(--bond-border); border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-size: 2rem; font-weight: 900;
            color: var(--text-main); position: absolute; z-index: 2; background: white;
            box-shadow: 0 4px 0 #e5e5e5; transition: all 0.3s;
        }
        .circle-total { top: 20px; border-color: #e5e5e5; color: var(--secondary); left: calc(50% - 32.5px); }
        .circle-part1 { bottom: 20px; left: 30px; border-color: var(--primary); color: var(--primary); box-shadow: 0 4px 0 var(--primary-shadow);}
        .circle-part2 { bottom: 20px; right: 30px; border-color: var(--warning); color: var(--warning); box-shadow: 0 4px 0 var(--warning-shadow);}
        
        .circle.revealed { border-color: var(--success); color: var(--success); box-shadow: 0 4px 0 var(--success-shadow); animation: pop 0.5s; }

        /* Options */
        .options-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; }
        .option-btn {
            background: #fff; border: 3px solid #e5e5e5; border-radius: 20px;
            padding: 15px 0; font-size: 2rem; font-weight: 900; color: var(--text-main);
            cursor: pointer; transition: all 0.1s; box-shadow: 0 6px 0 #e5e5e5; text-align: center;
        }
        .option-btn:active, .option-btn.selected { transform: translateY(6px); box-shadow: 0 0 0 #e5e5e5; }
        .option-btn.selected { border-color: var(--secondary); color: var(--secondary); background: #e1f5fe; }
        .option-btn.correct { border-color: var(--success); color: var(--success); background: #e8f5e9; box-shadow: 0 6px 0 var(--success-shadow); transform: translateY(0); animation: pop 0.5s; }
        .option-btn.wrong { border-color: var(--primary); color: var(--primary); background: #ffebee; opacity: 0.6; box-shadow: 0 0 0 transparent; transform: translateY(6px); }

        /* Action */
        .action-container { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-top: 5px; }
        .main-btn { width: 100%; padding: 18px; border-radius: 20px; font-size: 1.5rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; color: white; border: none; cursor: pointer; transition: all 0.1s; }
        .btn-check { background: var(--success); box-shadow: 0 6px 0 var(--success-shadow); }
        .btn-check:active { transform: translateY(6px); box-shadow: 0 0 0 var(--success-shadow); }
        .btn-check:disabled { background: #e5e5e5; box-shadow: 0 6px 0 #cfcfcf; color: #a0a0a0; cursor: not-allowed; transform: none; }
        .btn-next { background: var(--secondary); box-shadow: 0 6px 0 var(--secondary-shadow); display: none; }
        .btn-next:active { transform: translateY(6px); box-shadow: 0 0 0 var(--secondary-shadow); }

        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        /* --- Modals (Setup & End Game) --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.7); z-index: 5000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(3px);
        }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: white; padding: 35px 25px; border-radius: 30px; text-align: center;
            border: 8px solid #ff9f43; transform: scale(0.5); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); width: 90%; max-width: 420px;
        }
        .modal.active .modal-content { transform: scale(1); }
        
        .setup-title { font-size: 2.8rem; color: var(--primary); margin-bottom: 10px; font-weight: 900; text-shadow: 2px 2px 0 var(--primary-shadow);}
        .setup-section-title { font-size: 1.2rem; font-weight: bold; color: var(--text-main); margin-bottom: 10px; text-align: left; padding-left: 10px; }
        
        .setup-row { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap;}
        .mode-btn {
            background: #fff; border: 4px solid #e5e5e5; border-radius: 15px; padding: 12px 15px;
            font-size: 1.2rem; font-weight: 900; color: var(--text-main); cursor: pointer;
            box-shadow: 0 6px 0 #e5e5e5; transition: all 0.1s; flex: 1; min-width: 110px;
        }
        .mode-btn:active { transform: translateY(6px); box-shadow: 0 0 0 transparent; }
        .mode-btn.active { border-color: var(--secondary); background: #e1f5fe; color: var(--secondary); box-shadow: 0 6px 0 var(--secondary-shadow); }
        .mode-btn.op-btn.active { border-color: var(--success); background: #e8f5e9; color: var(--success); box-shadow: 0 6px 0 var(--success-shadow); }

        .modal p { font-size: 1.4rem; font-weight: bold; color: var(--text-main); margin-bottom: 20px; }
        
        /* Fireworks Particles Updated */
        .fw-particle {
            position: fixed; z-index: 10000; pointer-events: none;
            animation: fw-burst ease-out forwards;
        }
        @keyframes fw-burst {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0.5) rotate(var(--rot)); opacity: 0; }
        }

        /* --- Media Queries for Responsive Scaling --- */
        @media (max-width: 800px) {
            .game-container { gap: 15px; }
            .play-area { transform: scale(0.85); transform-origin: top center; }
            .quiz-area { margin-top: -50px; }
        }
        @media (max-width: 500px) {
            .play-area { transform: scale(0.65); }
            .quiz-area { margin-top: -120px; transform: scale(0.9); transform-origin: top center; }
            h1 { font-size: 2rem; }
        }
        @media (max-height: 750px) and (max-width: 500px) {
            .play-area { transform: scale(0.55); margin-bottom: 0;}
            .quiz-area { margin-top: -160px; transform: scale(0.85); }
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- Background Elements -->
    <div class="sun"></div>
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="flower flower-white f1"></div>
    <div class="flower flower-pink f2"></div>
    <div class="flower flower-white f3"></div>
    <div class="flower flower-pink f4"></div>
    <div class="flower flower-white f5"></div>
    <div class="flower flower-pink f6"></div>

    <header>
        <h1>Apple Math</h1>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </header>

    <main class="main-wrapper">
        <div class="game-container">
            <!-- Play Area -->
            <div class="play-area">
                <div class="tree-container" id="tree-zone">
                    <!-- Majestic Tree Vector -->
                    <svg class="tree-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="trunkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#5C3A21"/><stop offset="30%" stop-color="#8B5A2B"/><stop offset="70%" stop-color="#A06935"/><stop offset="100%" stop-color="#4A2E1B"/>
                            </linearGradient>
                            <radialGradient id="leafGradDark" cx="30%" cy="30%" r="70%">
                                <stop offset="0%" stop-color="#8bc34a"/><stop offset="60%" stop-color="#4caf50"/><stop offset="100%" stop-color="#2e7d32"/>
                            </radialGradient>
                            <radialGradient id="leafGradLight" cx="30%" cy="30%" r="70%">
                                <stop offset="0%" stop-color="#dcedc8"/><stop offset="50%" stop-color="#8bc34a"/><stop offset="100%" stop-color="#43a047"/>
                            </radialGradient>
                        </defs>
                        <path d="M 200 380 C 150 380, 110 395, 70 390 C 120 360, 140 300, 150 200 C 150 140, 120 100, 90 70 C 150 90, 175 140, 185 200 C 200 150, 230 100, 310 70 C 270 100, 240 140, 245 200 C 255 300, 280 360, 330 390 C 290 395, 250 380, 200 380 Z" fill="url(#trunkGrad)"/>
                        <path d="M 175 180 Q 170 240, 165 300 M 225 180 Q 230 240, 235 300 M 200 200 Q 198 250, 202 320" stroke="#4A2E1B" stroke-width="4" fill="none" opacity="0.4" stroke-linecap="round"/>
                        <circle cx="100" cy="150" r="70" fill="url(#leafGradDark)"/><circle cx="300" cy="150" r="70" fill="url(#leafGradDark)"/><circle cx="200" cy="80" r="80" fill="url(#leafGradDark)"/><circle cx="60" cy="210" r="50" fill="url(#leafGradDark)"/><circle cx="340" cy="210" r="50" fill="url(#leafGradDark)"/>
                        <circle cx="140" cy="190" r="60" fill="url(#leafGradLight)"/><circle cx="260" cy="190" r="60" fill="url(#leafGradLight)"/><circle cx="200" cy="130" r="75" fill="url(#leafGradLight)"/><circle cx="90" cy="240" r="45" fill="url(#leafGradLight)"/><circle cx="310" cy="240" r="45" fill="url(#leafGradLight)"/>
                        <circle cx="200" cy="50" r="55" fill="url(#leafGradLight)"/><circle cx="130" cy="100" r="55" fill="url(#leafGradLight)"/><circle cx="270" cy="100" r="55" fill="url(#leafGradLight)"/><circle cx="200" cy="200" r="50" fill="url(#leafGradLight)"/>
                    </svg>
                    <div class="tree-leaves" id="tree-leaves"></div>
                </div>

                <div class="baskets-wrapper">
                    <div class="basket-container" id="basket-container-1">
                        <div class="basket" id="basket-1"></div>
                        <div class="basket-label" id="label-1" style="color:var(--primary); border-color:var(--primary)">0</div>
                    </div>
                    <div class="basket-container" id="basket-container-2">
                        <div class="basket" id="basket-2"></div>
                        <div class="basket-label" id="label-2" style="color:var(--warning); border-color:var(--warning)">0</div>
                    </div>
                </div>
            </div>

            <!-- Quiz Area -->
            <div class="quiz-area">
                <!-- Feedback Box -->
                <div class="feedback-box" id="feedback-box">
                    <div class="feedback-text">
                        <span class="feedback-status" id="feedback-status">Awesome!</span>
                        <span id="feedback-equation" style="color: var(--text-main);">7 + 12 = 19</span>
                    </div>
                    <button class="speaker-btn" onclick="readEquation()">
                        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    </button>
                </div>

                <!-- Number Bond -->
                <div class="number-bond">
                    <svg class="bond-svg" viewBox="0 0 260 200">
                        <line x1="130" y1="52" x2="62" y2="152" stroke="#e5e5e5" stroke-width="8" stroke-linecap="round"/>
                        <line x1="130" y1="52" x2="198" y2="152" stroke="#e5e5e5" stroke-width="8" stroke-linecap="round"/>
                    </svg>
                    <div class="circle circle-total" id="bond-total">?</div>
                    <div class="circle circle-part1" id="bond-part1">0</div>
                    <div class="circle circle-part2" id="bond-part2">0</div>
                </div>

                <!-- Question Text (For Subtraction) -->
                <div class="question-text" id="question-text">How many apples are left?</div>

                <!-- Options -->
                <div class="options-grid" id="options-container">
                    <!-- Options injected via JS -->
                </div>

                <!-- Action Buttons -->
                <div class="action-container">
                    <button class="main-btn btn-check" id="btn-check" disabled onclick="checkAnswer()">Check</button>
                    <button class="main-btn btn-next" id="btn-next" onclick="nextQuestion()">Next</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Setup Modal -->
    <div class="modal active" id="setup-modal">
        <div class="modal-content">
            <h2 class="setup-title">Apple Math</h2>
            
            <div class="setup-section-title">Operation:</div>
            <div class="setup-row">
                <button class="mode-btn op-btn active" id="op-add" onclick="selectOp('add')">Addition (+)</button>
                <button class="mode-btn op-btn" id="op-sub" onclick="selectOp('sub')">Subtraction (-)</button>
            </div>

            <div class="setup-section-title">Number Range:</div>
            <div class="setup-row">
                <button class="mode-btn active" id="mode-5" onclick="selectMode(5)">Up to 5</button>
                <button class="mode-btn" id="mode-10" onclick="selectMode(10)">Up to 10</button>
                <button class="mode-btn" id="mode-20" onclick="selectMode(20)">Up to 20</button>
            </div>

            <button class="main-btn btn-check" style="box-shadow: 0 6px 0 var(--success-shadow); background: var(--success); margin-top: 10px;" onclick="startGameFromSetup()">Play Now!</button>
        </div>
    </div>

    <!-- End Modal -->
    <div class="modal" id="end-modal">
        <div class="modal-content">
            <h2 class="setup-title" style="color:var(--success); text-shadow: 2px 2px 0 var(--success-shadow);">Spectacular!</h2>
            <p>You completed all questions!</p>
            <p style="font-size: 2rem; color: var(--warning);">⭐ <span id="final-score">5</span> / <span id="total-qs">5</span> ⭐</p>
            <button class="main-btn btn-check" onclick="location.reload()">Play Again</button>
        </div>
    </div>

    <script>
        // --- Audio System ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            
            if (type === 'drop') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
                gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'click') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(400, now);
                gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.start(now); osc.stop(now + 0.05);
            } else if (type === 'correct') {
                osc.type = 'square'; osc.frequency.setValueAtTime(523.25, now); osc.frequency.setValueAtTime(659.25, now + 0.1);
                osc.frequency.setValueAtTime(783.99, now + 0.2); osc.frequency.setValueAtTime(1046.50, now + 0.3);
                gain.gain.setValueAtTime(0.05, now); gain.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, now); osc.frequency.linearRampToValueAtTime(200, now + 0.3);
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            }
        }

        const SVG_APPLE = `
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs><radialGradient id="ag" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#ff9999"/><stop offset="60%" stop-color="#ff3b30"/><stop offset="100%" stop-color="#c60000"/></radialGradient></defs>
            <path d="M50 15 C 70 0, 100 20, 90 55 C 80 90, 60 95, 50 85 C 40 95, 20 90, 10 55 C 0 20, 30 0, 50 15 Z" fill="url(#ag)"/>
            <path d="M50 15 Q48 5 55 0" fill="none" stroke="#5d4037" stroke-width="4" stroke-linecap="round"/>
            <path d="M55 5 C 65 -5, 80 5, 70 15 C 60 10, 55 10, 55 5 Z" fill="#58cc02"/>
            <ellipse cx="30" cy="35" rx="8" ry="16" fill="#fff" opacity="0.4" transform="rotate(-30 30 35)"/>
        </svg>`;

        // --- Game State ---
        let gameMode = 5; // default range
        let gameOp = 'add'; // 'add' or 'sub'
        let questions = [];
        let currentQIndex = 0;
        let score = 0;
        let selectedOption = null;
        let isAnimating = false;
        const TOTAL_QUESTIONS = 5;

        // UI Elements
        const elTree = document.getElementById('tree-leaves');
        const elBasketContainer1 = document.getElementById('basket-container-1');
        const elBasketContainer2 = document.getElementById('basket-container-2');
        const elBasket1 = document.getElementById('basket-1');
        const elBasket2 = document.getElementById('basket-2');
        const elLabel1 = document.getElementById('label-1');
        const elLabel2 = document.getElementById('label-2');
        const elBond1 = document.getElementById('bond-part1');
        const elBond2 = document.getElementById('bond-part2');
        const elBondTotal = document.getElementById('bond-total');
        const elOptionsContainer = document.getElementById('options-container');
        const btnCheck = document.getElementById('btn-check');
        const btnNext = document.getElementById('btn-next');
        const elFeedback = document.getElementById('feedback-box');
        const elFeedbackEq = document.getElementById('feedback-equation');
        const elFeedbackStatus = document.getElementById('feedback-status');
        const elProgress = document.getElementById('progress-fill');
        const elQuestionText = document.getElementById('question-text');

        // --- Setup Logic ---
        function selectMode(mode) {
            gameMode = mode;
            document.getElementById('mode-5').classList.remove('active');
            document.getElementById('mode-10').classList.remove('active');
            document.getElementById('mode-20').classList.remove('active');
            document.getElementById(`mode-${mode}`).classList.add('active');
            playSound('click');
        }

        function selectOp(op) {
            gameOp = op;
            document.getElementById('op-add').classList.remove('active');
            document.getElementById('op-sub').classList.remove('active');
            document.getElementById(`op-${op}`).classList.add('active');
            playSound('click');
        }

        function startGameFromSetup() {
            initAudio();
            document.getElementById('setup-modal').classList.remove('active');
            startGame();
        }

        function generateQuestions() {
            let pool = [];
            let minSum, maxSum;
            
            // For both + and -, `maxSum` represents the Total (The Whole)
            if (gameMode === 5) { minSum = 2; maxSum = 5; }
            else if (gameMode === 10) { minSum = 2; maxSum = 10; }
            else { minSum = 11; maxSum = 20; } 

            for (let a = 1; a < maxSum; a++) {
                for (let b = 1; b < maxSum; b++) {
                    let sum = a + b;
                    if (sum >= minSum && sum <= maxSum) {
                        pool.push({a, b, sum});
                    }
                }
            }
            
            pool.sort(() => Math.random() - 0.5);
            
            let qs = [];
            for(let i=0; i<TOTAL_QUESTIONS; i++) {
                if(pool.length === 0) break;
                const pair = pool.pop(); 
                
                let correctAns;
                if (gameOp === 'add') {
                    correctAns = pair.sum; // Find the whole
                } else {
                    correctAns = pair.b; // Find part 2 (total - part 1 = part 2)
                }
                
                let wrong1 = correctAns + (Math.random() > 0.5 ? 1 : -1);
                let wrong2 = correctAns + (Math.random() > 0.5 ? 2 : -2);
                
                while (wrong1 === correctAns || wrong1 < 0) wrong1 += 1;
                while (wrong2 === correctAns || wrong2 === wrong1 || wrong2 < 0) wrong2 += (wrong2 === wrong1 ? 2 : 1);

                let options = [correctAns, wrong1, wrong2];
                options.sort(() => Math.random() - 0.5);
                qs.push({ 
                    total: pair.sum, 
                    p1: pair.a, 
                    p2: pair.b, 
                    correct: correctAns, 
                    options: options 
                });
            }
            return qs;
        }

        function startGame() {
            questions = generateQuestions();
            currentQIndex = 0;
            score = 0;
            loadQuestion();
        }

        async function loadQuestion() {
            isAnimating = true;
            selectedOption = null;
            const q = questions[currentQIndex];

            // Reset UI
            elProgress.style.width = `${(currentQIndex / TOTAL_QUESTIONS) * 100}%`;
            elTree.innerHTML = '';
            elBasket1.innerHTML = '';
            elBasket2.innerHTML = '';
            elLabel1.innerText = '0';
            elLabel2.innerText = '0';
            
            elBondTotal.classList.remove('revealed');
            elBond2.classList.remove('revealed');
            
            elFeedback.classList.remove('active');
            btnCheck.style.display = 'block';
            btnCheck.disabled = true;
            btnNext.style.display = 'none';

            if (gameOp === 'add') {
                elBasketContainer2.style.display = 'flex';
                elQuestionText.style.display = 'none';
                elBondTotal.innerText = '?';
                elBond1.innerText = q.p1;
                elBond2.innerText = q.p2;
            } else {
                // Subtraction Mode UI
                elBasketContainer2.style.display = 'none';
                elQuestionText.style.display = 'block';
                elBondTotal.innerText = q.total;
                elBond1.innerText = q.p1;
                elBond2.innerText = '?';
            }

            // Render Options
            elOptionsContainer.innerHTML = '';
            q.options.forEach(opt => {
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => selectOption(btn, opt);
                elOptionsContainer.appendChild(btn);
            });

            // Animate Apples
            if (gameOp === 'add') {
                await dropApplesSequenceAdd(q.p1, q.p2);
            } else {
                await dropApplesSequenceSub(q.total, q.p1);
            }
            isAnimating = false;
        }

        function selectOption(btnEl, value) {
            if (isAnimating || btnCheck.style.display === 'none') return;
            playSound('click');
            
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btnEl.classList.add('selected');
            selectedOption = value;
            btnCheck.disabled = false;
        }

        function checkAnswer() {
            if (selectedOption === null) return;
            const q = questions[currentQIndex];
            const isCorrect = selectedOption === q.correct;
            
            btnCheck.style.display = 'none';
            const optionBtns = document.querySelectorAll('.option-btn');
            
            if (gameOp === 'add') {
                elFeedbackEq.innerText = `${q.p1} + ${q.p2} = ${q.correct}`;
            } else {
                elFeedbackEq.innerText = `${q.total} - ${q.p1} = ${q.correct}`;
            }

            if (isCorrect) {
                playSound('correct');
                score++;
                createFireworks(null, 120); 
                
                if (gameOp === 'add') {
                    elBondTotal.innerText = q.correct;
                    elBondTotal.classList.add('revealed');
                } else {
                    elBond2.innerText = q.correct;
                    elBond2.classList.add('revealed');
                }
                
                elFeedback.style.borderColor = "var(--success)";
                elFeedback.style.boxShadow = "0 8px 0 var(--success-shadow)";
                elFeedbackStatus.innerText = "Awesome!";
                elFeedbackStatus.style.color = "var(--success)";

                optionBtns.forEach(btn => { if (parseInt(btn.innerText) === q.correct) btn.classList.add('correct'); });
            } else {
                playSound('wrong');
                elFeedback.style.borderColor = "var(--primary)";
                elFeedback.style.boxShadow = "0 8px 0 var(--primary-shadow)";
                elFeedbackStatus.innerText = "Keep trying!";
                elFeedbackStatus.style.color = "var(--primary)";

                optionBtns.forEach(btn => {
                    const val = parseInt(btn.innerText);
                    if (val === q.correct) { btn.classList.add('correct'); }
                    else if (val === selectedOption) { btn.classList.add('wrong'); }
                    else { btn.style.opacity = '0.5'; }
                });
            }

            elFeedback.classList.add('active');
            setTimeout(() => { btnNext.style.display = 'block'; triggerPop(btnNext); }, 500);
        }

        function readEquation() {
            playSound('click');
            const q = questions[currentQIndex];
            let text = "";
            if (gameOp === 'add') {
                text = `${q.p1} plus ${q.p2} equals ${q.correct}`;
            } else {
                text = `${q.total} minus ${q.p1} equals ${q.correct}`;
            }
            
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.85; utterance.pitch = 1.1;
                window.speechSynthesis.speak(utterance);
            }
        }

        function nextQuestion() {
            playSound('click');
            window.speechSynthesis.cancel();
            currentQIndex++;
            if (currentQIndex < TOTAL_QUESTIONS) { loadQuestion(); }
            else { showEndGame(); }
        }

        function showEndGame() {
            elProgress.style.width = `100%`;
            document.getElementById('final-score').innerText = score;
            document.getElementById('total-qs').innerText = TOTAL_QUESTIONS;
            document.getElementById('end-modal').classList.add('active');
            playSound('correct');
            createFireworks(null, 250); 
        }

        // --- Animations & Layout ---
        const sleep = ms => new Promise(r => setTimeout(r, ms));

        function triggerPop(el) {
            el.style.animation = 'none'; el.offsetHeight; el.style.animation = 'pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        }

        // Helper to drop an apple
        async function dropToBasket(apple, basket, index, isBasket1) {
            playSound('drop');
            const rectT = apple.getBoundingClientRect();
            
            basket.appendChild(apple);
            apple.style.position = 'relative';
            apple.style.left = 'auto';
            apple.style.top = 'auto';
            
            apple.style.margin = '-5px -2px'; 
            apple.style.transform = `rotate(${Math.random()*60-30}deg)`;
            
            const rectB = apple.getBoundingClientRect();
            const dx = rectT.left - rectB.left;
            const dy = rectT.top - rectB.top;
            
            apple.style.transform = `translate(${dx}px, ${dy}px) rotate(0deg)`;
            apple.style.transition = 'none';
            apple.offsetHeight; 
            
            apple.style.transition = 'transform 0.4s cubic-bezier(0.5, 0, 0.75, 0)';
            apple.style.transform = `translate(0,0) rotate(${Math.random()*60-30}deg)`;

            if (isBasket1) { elLabel1.innerText = index + 1; triggerPop(elLabel1); }
            else { elLabel2.innerText = index + 1; triggerPop(elLabel2); }
            
            await sleep(150);
        }

        // Helper to spawn apples
        function spawnApplesOnTree(totalCount) {
            const goldenAngle = 137.508 * (Math.PI / 180);
            const apples = [];
            for(let i=0; i<totalCount; i++) {
                const a = document.createElement('div');
                a.className = 'apple';
                a.innerHTML = SVG_APPLE;
                
                const rRatio = Math.sqrt((i + 0.5) / totalCount);
                const rMaxX = 140; 
                const rMaxY = 100; 
                const theta = i * goldenAngle;
                
                const x = Math.cos(theta) * rRatio * rMaxX;
                const y = Math.sin(theta) * rRatio * rMaxY;
                
                a.style.left = `calc(50% + ${x - 22}px)`; 
                a.style.top = `calc(50% + ${y - 30}px)`;
                a.style.transform = `scale(0)`;
                elTree.appendChild(a);
                
                setTimeout(() => a.style.transform = `scale(1) rotate(${Math.random()*40-20}deg)`, 10);
                apples.push(a);
            }
            return apples;
        }

        // Add Sequence
        async function dropApplesSequenceAdd(c1, c2) {
            const total = c1 + c2;
            const apples = spawnApplesOnTree(total);
            await sleep(500);

            // Drop first half to Basket 1
            for(let i=0; i<c1; i++) {
                await dropToBasket(apples[i], elBasket1, i, true);
            }
            await sleep(300);
            // Drop second half to Basket 2
            for(let i=0; i<c2; i++) {
                await dropToBasket(apples[c1 + i], elBasket2, i, false);
            }
        }

        // Sub Sequence
        async function dropApplesSequenceSub(total, dropCount) {
            const apples = spawnApplesOnTree(total);
            await sleep(800); // Give player a moment to see the total amount

            // Drop 'dropCount' apples to Basket 1. The rest stay on the tree!
            for(let i=0; i<dropCount; i++) {
                await dropToBasket(apples[i], elBasket1, i, true);
            }
            // The remaining apples are left on the tree
        }

        // Confetti Effect
        function createFireworks(e, amount = 150) {
            const colors = ['#ff4b4b', '#ffc800', '#58cc02', '#1cb0f6', '#ce82ff', '#ff9ff3', '#feca57'];
            
            const centers = [
                { x: window.innerWidth * 0.2, y: window.innerHeight * 0.1 },
                { x: window.innerWidth * 0.8, y: window.innerHeight * 0.1 }
            ];

            for (let i = 0; i < amount; i++) {
                const center = centers[i % 2];
                const particle = document.createElement('div');
                particle.className = 'fw-particle';
                const size = Math.random() * 12 + 8;
                
                particle.style.width = `${size}px`;
                particle.style.height = `${Math.random() > 0.5 ? size : size * 1.5}px`;
                if (Math.random() > 0.5) particle.style.borderRadius = '50%';
                
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                particle.style.left = `${center.x}px`;
                particle.style.top = `${center.y}px`;

                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 300 + 100;
                
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity + window.innerHeight * 0.8; 
                
                particle.style.setProperty('--tx', `${tx}px`);
                particle.style.setProperty('--ty', `${ty}px`); 
                particle.style.setProperty('--rot', `${Math.random() * 1080 - 540}deg`); 
                
                const duration = 2000 + Math.random() * 1500;
                particle.style.animationDuration = `${duration}ms`;

                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), duration);
            }
        }
    </script>
</body>
</html>
