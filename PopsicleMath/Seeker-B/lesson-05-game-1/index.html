<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fruit Place Value Party v7!</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js"></script>
    <style>
        :root {
            /* Duolingo-inspired color palette */
            --c-green: #58CC02;
            --c-green-dark: #58A700;
            --c-blue: #1CB0F6;
            --c-blue-dark: #1899D6;
            --c-yellow: #FFC800;
            --c-yellow-dark: #F4A600;
            --c-red: #FF4B4B;
            --c-red-dark: #EA2B2B;
            --c-purple: #CE82FF;
            --c-purple-dark: #A559C0;
            --c-white: #FFFFFF;
            --c-gray-light: #F7F7F7;
            --c-gray-border: #E5E5E5;
            --c-text: #4B4B4B;
            
            --font-main: 'Poppins', sans-serif;
            --shadow-panel: 0 10px 25px rgba(0, 150, 255, 0.15);

            /* Variables for exactly matching fruit sizes */
            --fruit-size: 45px;
            --fruit-font: 2.5rem;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: var(--font-main);
        }

        body {
            /* V6/V7 background */
            background: linear-gradient(135deg, #A1C4FD 0%, #C2E9FB 100%);
            background-image: 
                radial-gradient(rgba(255, 255, 255, 0.4) 3px, transparent 3px),
                linear-gradient(135deg, #A1C4FD 0%, #C2E9FB 100%);
            background-size: 40px 40px, 100% 100%;
            margin: 0;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--c-text);
            touch-action: none;
        }

        /* --- Header --- */
        header {
            width: 100%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 25px;
            border: 3px solid white;
            box-shadow: var(--shadow-panel);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .title-group h1 {
            color: var(--c-green);
            font-size: 1.8rem;
            margin: 0;
            font-weight: 900;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.05);
            letter-spacing: 1px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .speaker-btn {
            background: var(--c-blue);
            color: white;
            border: none;
            border-radius: 18px;
            width: 50px;
            height: 50px;
            cursor: pointer;
            font-size: 1.5rem;
            box-shadow: 0 5px 0 var(--c-blue-dark);
            transition: all 0.1s;
        }
        .speaker-btn:active { transform: translateY(5px); box-shadow: 0 0 0 var(--c-blue-dark); }

        .score-board {
            background: var(--c-yellow);
            color: white;
            padding: 10px 20px;
            border-radius: 18px;
            font-size: 1.3rem;
            font-weight: 900;
            box-shadow: 0 5px 0 var(--c-yellow-dark);
            text-align: center;
            border: 2px solid white;
        }

        /* --- Main Stage --- */
        #main-stage {
            width: 100%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 20px 30px;
            border: 4px solid white;
            box-shadow: var(--shadow-panel);
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            position: relative;
        }

        .instruction-text {
            font-size: 1.6rem;
            color: var(--c-purple);
            text-align: center;
            margin-bottom: 20px;
            font-weight: 900;
            background: var(--c-gray-light);
            padding: 12px 30px;
            border-radius: 20px;
            border: 2px solid var(--c-gray-border);
            width: 100%;
        }

        /* --- Full Width Target Panel --- */
        .target-panel {
            width: 100%;
            background: #F0FDFA;
            border: 3px solid var(--c-green);
            border-radius: 25px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 20px rgba(88, 204, 2, 0.05);
        }

        .panel-title {
            text-align: center;
            font-weight: 900;
            margin-bottom: 20px;
            color: var(--c-text);
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
        }

        .full-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .column-header { font-weight: 900; font-size: 1.8rem; text-transform: uppercase; }
        .tens-header { color: var(--c-red); }
        .ones-header { color: var(--c-blue); }

        /* Drop Zones */
        .drop-column {
            background: var(--c-white);
            border: 4px dashed var(--c-gray-border);
            border-radius: 20px;
            width: 100%;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            padding: 15px;
            transition: all 0.2s ease;
        }
        .drop-column.highlight {
            border-color: var(--c-yellow);
            background: #FFFCF0;
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(255, 200, 0, 0.2);
        }

        .drop-area {
            flex: 1; width: 100%;
            display: flex; flex-wrap: wrap; justify-content: center; align-content: flex-start;
            gap: 15px;
        }

        /* Unified Source Zone */
        .unified-tray-wrap {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .unified-tray-wrap.hidden-tray {
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            position: absolute;
            visibility: hidden;
        }

        .tray-label {
            font-weight: 800;
            color: var(--c-purple);
            font-size: 1.3rem;
            margin-bottom: -15px; 
            background: white;
            padding: 8px 25px;
            border-radius: 20px;
            border: 3px solid var(--c-purple);
            z-index: 2;
        }

        .source-area {
            background: #FAF5FF;
            border: 4px solid var(--c-purple);
            border-radius: 25px;
            width: 100%;
            min-height: 160px;
            padding: 30px 20px 20px 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 15px;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.05);
        }

        /* --- Uniform Cards --- */
        .draggable-item {
            cursor: grab;
            touch-action: none;
            transition: transform 0.1s;
            position: relative;
        }

        .dragging {
            opacity: 0.9;
            transform: scale(1.1) rotate(5deg);
            z-index: 1000 !important;
            cursor: grabbing;
            pointer-events: none;
            box-shadow: 0 15px 20px rgba(0,0,0,0.3) !important;
        }

        /* IDENTICAL SIZE FRUITS */
        .tens-card span, .ones-card span {
            width: var(--fruit-size);
            height: var(--fruit-size);
            font-size: var(--fruit-font);
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 3px 3px rgba(0,0,0,0.25));
            line-height: 1;
        }

        .ones-card {
            background: #E0F2FE;
            border: 3px solid var(--c-blue);
            box-shadow: 0 6px 0 var(--c-blue-dark);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .tens-card {
            background: #FFE4E6;
            border: 3px solid var(--c-red);
            box-shadow: 0 6px 0 var(--c-red-dark);
            border-radius: 15px;
            display: grid;
            grid-template-columns: repeat(5, var(--fruit-size));
            grid-template-rows: repeat(2, var(--fruit-size));
            gap: 2px;
            padding: 8px;
            align-items: center;
            justify-items: center;
        }

        /* --- Footer Options --- */
        .options-bar {
            width: 100%;
            padding-top: 20px;
            margin-top: 25px;
            border-top: 3px dashed var(--c-gray-border);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ans-grid { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }

        .ans-btn {
            background: var(--c-white);
            border: 3px solid var(--c-gray-border);
            border-radius: 20px;
            padding: 15px 40px;
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--c-blue);
            cursor: pointer;
            box-shadow: 0 6px 0 var(--c-gray-border);
            transition: all 0.1s;
        }
        .ans-btn:not(.locked):hover { background: #F0F9FF; border-color: var(--c-blue); box-shadow: 0 6px 0 var(--c-blue-dark); }
        .ans-btn:not(.locked):active { transform: translateY(6px); box-shadow: 0 0 0 var(--c-blue-dark); }
        .ans-btn.locked { background: var(--c-gray-light); color: #AFAFAF; cursor: not-allowed; transform: translateY(6px); box-shadow: none; border-color: var(--c-gray-border); }

        /* --- Overlays & Modals --- */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(255, 255, 255, 0.95);
            z-index: 200;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
            backdrop-filter: blur(8px);
        }
        .hidden { display: none !important; }

        .start-btn {
            background: var(--c-green);
            color: white;
            border: 4px solid white;
            padding: 20px 60px;
            font-size: 2.2rem;
            font-weight: 900;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 8px 0 var(--c-green-dark), 0 15px 20px rgba(0,0,0,0.2);
            transition: all 0.1s;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 210;
        }
        .start-btn:active { transform: translateY(8px); box-shadow: 0 0 0 var(--c-green-dark), 0 5px 10px rgba(0,0,0,0.2); }

        /* --- Fullscreen Game Overlay Adjustments --- */
        #game-overlay {
            background: rgba(0, 0, 0, 0.5);
            justify-content: flex-start;
            padding-top: 40px;
        }
        
        .mini-game-ui {
            z-index: 210;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #game-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 205; 
            touch-action: none;
            cursor: crosshair;
        }

        .feedback-label {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 20px 50px; border-radius: 30px;
            font-size: 3rem; font-weight: 900;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 500; display: none; text-transform: uppercase;
            border: 5px solid;
            animation: popOut 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        @keyframes popOut { 
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 
            20% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; } 
            80% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 
            100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; } 
        }

        #fireworks-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 300; }

        /* --- Responsiveness --- */
        @media (max-width: 850px) {
            :root {
                --fruit-size: 35px;
                --fruit-font: 2.2rem;
            }
            .title-group h1 { font-size: 1.5rem; }
            .instruction-text { font-size: 1.3rem; padding: 10px 20px; }
            .ans-btn { font-size: 1.8rem; padding: 12px 30px; }
            #main-stage { padding: 15px; }
            .tray-label { font-size: 1.1rem; }
        }

        @media (max-width: 550px) {
            :root {
                --fruit-size: 26px;
                --fruit-font: 1.6rem;
            }
            .target-panel { padding: 10px; }
            .drop-column { min-height: 180px; padding: 10px; }
            .source-area { min-height: 120px; padding: 20px 10px 10px 10px; }
            .chart-grid { gap: 10px; }
            .column-header { font-size: 1.4rem; }
            .start-btn { font-size: 1.5rem; padding: 15px 40px; }
            .feedback-label { font-size: 2rem; width: 90%; text-align: center; }
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <header>
        <div class="title-group">
            <h1>🍎 Fruit Place Value!</h1>
        </div>
        <div class="controls">
            <button class="speaker-btn" onclick="speakInstruction()" title="Listen">🔊</button>
            <div class="score-board">Score: <span id="score-val">0</span></div>
        </div>
    </header>

    <main id="main-stage">
        <div id="instruction" class="instruction-text">Drag ALL fruits to the chart! 👇</div>
        
        <div class="target-panel">
            <div class="panel-title">Place Value Chart 📊</div>
            
            <div class="chart-grid">
                <!-- TENS COLUMN (Left) -->
                <div class="full-column">
                    <div class="column-header tens-header">Tens</div>
                    <div id="tens-col" class="drop-column">
                        <div id="tens-drop" class="drop-area"></div>
                    </div>
                </div>

                <!-- ONES COLUMN (Right) -->
                <div class="full-column">
                    <div class="column-header ones-header">Ones</div>
                    <div id="ones-col" class="drop-column">
                        <div id="ones-drop" class="drop-area"></div>
                    </div>
                </div>
            </div>

            <!-- Unified Source Box -->
            <div id="unified-tray-wrap" class="unified-tray-wrap">
                <div class="tray-label">Drag Fruits From Here ⬆️</div>
                <div id="unified-source" class="source-area"></div>
            </div>
        </div>

        <div class="options-bar">
            <div class="panel-title" style="color: var(--c-purple); margin-bottom: 10px;">How Many? (Drag First!)</div>
            <div id="ans-grid" class="ans-grid"></div>
        </div>
    </main>

    <!-- Overlays -->
    <div id="start-overlay" class="overlay">
        <h1 style="font-size: clamp(3rem, 8vw, 4.5rem); font-weight: 900; color: var(--c-green); margin-bottom: 10px;">Fruit Place Value!</h1>
        <div style="font-size: clamp(4rem, 10vw, 6rem); margin-bottom: 30px; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2));">🍓🍎🍉</div>
        <button class="start-btn" onclick="startGame()">START LEARNING ▶</button>
    </div>

    <!-- Fullscreen Mini-game Overlay -->
    <div id="game-overlay" class="overlay hidden">
        <canvas id="game-canvas"></canvas>
        
        <div class="mini-game-ui">
            <h2 style="font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 900; color: white; text-shadow: 0 4px 10px rgba(0,0,0,0.3); margin-bottom: 10px;">CATCH THE FRUITS!</h2>
            <p style="font-size: 1.4rem; font-weight: 700; color: var(--c-purple-dark); margin-bottom: 15px; background: white; padding: 10px 30px; border-radius: 25px; border: 3px solid var(--c-purple); box-shadow: 0 6px 0 var(--c-purple-dark);">Drag the basket to catch! 🧺</p>
            <div style="font-size: 2.2rem; font-weight: 900; color: white; text-shadow: 0 3px 5px rgba(0,0,0,0.5); margin-bottom: 15px;">Time: <span id="timer-val">15</span>s</div>
            
            <div id="game-score-display" style="font-size: 3rem; font-weight: 900; color: var(--c-yellow); text-shadow: 0 4px 6px rgba(0,0,0,0.5); margin-top: 20px;">Caught: 0</div>
            <button id="game-start-btn" class="start-btn" style="margin-top: 25px;" onclick="startGameMini()">READY, GO!</button>
        </div>
    </div>

    <div id="win-overlay" class="overlay hidden">
        <canvas id="fireworks-canvas"></canvas>
        <div style="font-size: clamp(5rem, 15vw, 8rem); position: relative; z-index: 10; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.2));">🏆✨</div>
        <h1 style="font-size: clamp(3rem, 8vw, 5rem); font-weight: 900; color: var(--c-yellow-dark); position: relative; z-index: 10; text-shadow: 0 4px 10px white;">YOU WON!</h1>
        <div style="font-size: 2.5rem; font-weight: 900; color: var(--c-blue); margin-bottom: 40px; position: relative; z-index: 10; background: white; padding: 15px 50px; border-radius: 30px; border: 4px solid var(--c-blue); box-shadow: 0 8px 0 var(--c-blue-dark);">Total Score: <span id="final-score">0</span></div>
        <button class="start-btn" style="position: relative; z-index: 10; background: var(--c-purple); box-shadow: 0 8px 0 var(--c-purple-dark), 0 15px 20px rgba(0,0,0,0.2); border-color: white;" onclick="location.reload()">PLAY AGAIN ↺</button>
    </div>

    <div id="feedback" class="feedback-label"></div>

    <script>
        const QUESTIONS = [
            { num: 14, item: '🍎', options: [14, 41, 15] },
            { num: 23, item: '🍓', options: [23, 32, 22] },
            { num: 12, item: '🍇', options: [12, 21, 11] },
            { num: 25, item: '🍊', options: [25, 52, 24] },
            { num: 31, item: '🍉', options: [31, 13, 30] },
            { num: 15, item: '🍌', options: [15, 51, 14] },
            { num: 22, item: '🍒', options: [22, 12, 23] },
            { num: 24, item: '🍍', options: [24, 42, 25] },
            { num: 13, item: '🥝', options: [13, 31, 12] },
            { num: 32, item: '🍑', options: [32, 23, 33] }
        ];

        // V7 Diverse Fruits list for the minigame
        const ALL_FRUITS = ['🍎', '🍌', '🍓', '🍊', '🍇', '🍉', '🍒', '🍍', '🥝', '🍑'];

        let state = {
            idx: 0,
            score: 0,
            dropped: 0,
            totalToDrag: 0,
            soundStarted: false
        };

        const sounds = {
            pop: new Tone.Synth({ oscillator: { type: 'sine' }, envelope: { attack: 0.01, decay: 0.2, sustain: 0, release: 0.1 } }).toDestination(),
            catch: new Tone.Synth({ oscillator: { type: 'triangle' }, envelope: { attack: 0.01, decay: 0.1, sustain: 0.1, release: 0.2 } }).toDestination(),
            correct: new Tone.PolySynth(Tone.Synth, { oscillator: { type: "triangle" }, envelope: { attack: 0.01, decay: 0.4, sustain: 0.2, release: 1 } }).toDestination(),
            wrong: new Tone.MembraneSynth({ pitchDecay: 0.05, octaves: 2, envelope: { attack: 0.01, decay: 0.4, sustain: 0, release: 0.1 } }).toDestination(),
            fanfare: new Tone.PolySynth(Tone.Synth, { oscillator: { type: "square" }, envelope: { attack: 0.05, decay: 0.2, sustain: 0.5, release: 1.5 } }).toDestination()
        };

        function playSfx(s) {
            if(!state.soundStarted) return;
            try {
                if(s==='correct') sounds.correct.triggerAttackRelease(['C5','E5','G5','C6'], '4n');
                else if(s==='wrong') sounds.wrong.triggerAttackRelease('G2', '8n');
                else if(s==='catch') sounds.catch.triggerAttackRelease('A5', '16n');
                else if(s==='fanfare') sounds.fanfare.triggerAttackRelease(['C5','E5','G5'], '2n');
                else sounds.pop.triggerAttackRelease('E5', '32n');
            } catch(e) { console.log("Audio play error ignored."); }
        }

        function speakInstruction() {
            window.speechSynthesis.cancel();
            const text = (state.dropped < state.totalToDrag) ? "Drag all the fruits to the chart!" : `Choose the number for ${QUESTIONS[state.idx].num}.`;
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'en-US';
            ut.rate = 0.85; 
            ut.pitch = 1.1; 
            window.speechSynthesis.speak(ut);
        }

        function showFeedback(text, color) {
            const f = document.getElementById('feedback');
            const newF = f.cloneNode(true);
            f.parentNode.replaceChild(newF, f);
            
            newF.innerText = text;
            newF.style.color = color;
            newF.style.borderColor = color;
            newF.style.display = 'block';
            
            setTimeout(() => newF.style.display = 'none', 1500);
        }

        function startGame() {
            if(Tone.context.state !== 'running') { Tone.start(); }
            state.soundStarted = true;
            document.getElementById('start-overlay').classList.add('hidden');
            QUESTIONS.sort(() => Math.random() - 0.5); 
            loadQuestion();
        }

        function loadQuestion() {
            const q = QUESTIONS[state.idx];
            const tens = Math.floor(q.num / 10);
            const ones = q.num % 10;
            
            state.dropped = 0;
            state.totalToDrag = tens + ones;
            
            const trayWrap = document.getElementById('unified-tray-wrap');
            trayWrap.classList.remove('hidden-tray');
            trayWrap.style.position = 'relative'; 

            const unifiedSource = document.getElementById('unified-source');
            unifiedSource.innerHTML = '';
            document.getElementById('tens-drop').innerHTML = '';
            document.getElementById('ones-drop').innerHTML = '';
            document.getElementById('ans-grid').innerHTML = '';
            
            const inst = document.getElementById('instruction');
            inst.innerText = "Drag ALL fruits to the chart! 👇";
            inst.style.color = "var(--c-purple)";
            inst.style.background = "var(--c-gray-light)";

            let elements = [];
            for(let i=0; i<tens; i++) elements.push(createBlock('tens', q.item));
            for(let i=0; i<ones; i++) elements.push(createBlock('ones', q.item));
            
            elements.forEach(el => unifiedSource.appendChild(el));

            const opts = [...q.options].sort(() => Math.random() - 0.5);
            opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "ans-btn locked";
                btn.innerText = opt;
                btn.disabled = true;
                btn.onclick = () => checkAnswer(opt, q.num, btn);
                document.getElementById('ans-grid').appendChild(btn);
            });
            
            setTimeout(speakInstruction, 500);
        }

        function createBlock(type, emoji) {
            const div = document.createElement('div');
            div.className = `draggable-item ${type==='tens' ? 'tens-card' : 'ones-card'}`;
            div.dataset.type = type;
            
            if (type === 'tens') {
                let inner = '';
                for(let i=0; i<10; i++) inner += `<span>${emoji}</span>`;
                div.innerHTML = inner;
            } else {
                div.innerHTML = `<span>${emoji}</span>`;
            }

            div.onpointerdown = handlePointerDown;
            return div;
        }

        let dragItem = null, placeholder = null, startX, startY;

        function handlePointerDown(e) {
            if(e.currentTarget.parentElement.id.includes('drop')) return;
            dragItem = e.currentTarget;
            const rect = dragItem.getBoundingClientRect();
            
            placeholder = dragItem.cloneNode(true);
            placeholder.style.visibility = 'hidden';
            dragItem.parentNode.insertBefore(placeholder, dragItem);

            dragItem.style.position = 'fixed';
            dragItem.style.width = rect.width + 'px';
            dragItem.style.height = rect.height + 'px';
            dragItem.style.left = rect.left + 'px';
            dragItem.style.top = rect.top + 'px';
            dragItem.classList.add('dragging');
            
            startX = e.clientX - rect.left;
            startY = e.clientY - rect.top;

            dragItem.setPointerCapture(e.pointerId);
            dragItem.onpointermove = handlePointerMove;
            dragItem.onpointerup = handlePointerUp;
            playSfx('pop');
        }

        function handlePointerMove(e) {
            if(!dragItem) return;
            dragItem.style.left = (e.clientX - startX) + 'px';
            dragItem.style.top = (e.clientY - startY) + 'px';
            
            const tCol = document.getElementById('tens-col');
            const oCol = document.getElementById('ones-col');
            const tRect = tCol.getBoundingClientRect(), oRect = oCol.getBoundingClientRect();
            
            tCol.classList.remove('highlight'); oCol.classList.remove('highlight');
            if(e.clientX > tRect.left && e.clientX < tRect.right && e.clientY > tRect.top && e.clientY < tRect.bottom) tCol.classList.add('highlight');
            else if(e.clientX > oRect.left && e.clientX < oRect.right && e.clientY > oRect.top && e.clientY < oRect.bottom) oCol.classList.add('highlight');
        }

        function handlePointerUp(e) {
            if(!dragItem) return;
            const tCol = document.getElementById('tens-col'), oCol = document.getElementById('ones-col');
            const tRect = tCol.getBoundingClientRect(), oRect = oCol.getBoundingClientRect();
            let success = false;

            if(dragItem.dataset.type === 'tens' && e.clientX > tRect.left && e.clientX < tRect.right && e.clientY > tRect.top && e.clientY < tRect.bottom) {
                document.getElementById('tens-drop').appendChild(dragItem);
                success = true;
            } else if(dragItem.dataset.type === 'ones' && e.clientX > oRect.left && e.clientX < oRect.right && e.clientY > oRect.top && e.clientY < oRect.bottom) {
                document.getElementById('ones-drop').appendChild(dragItem);
                success = true;
            }

            if(success) {
                dragItem.style.position = ''; dragItem.style.width = ''; dragItem.style.height = ''; dragItem.style.left = ''; dragItem.style.top = '';
                dragItem.onpointerdown = null; dragItem.classList.remove('dragging');
                state.dropped++;
                playSfx('pop');
                
                if(state.dropped === state.totalToDrag) {
                    const trayWrap = document.getElementById('unified-tray-wrap');
                    trayWrap.classList.add('hidden-tray');
                    
                    document.querySelectorAll('.ans-btn').forEach(b => { b.disabled = false; b.classList.remove('locked'); });
                    const inst = document.getElementById('instruction');
                    inst.innerText = "Awesome! Choose the right number! 🔢";
                    inst.style.color = "var(--c-white)";
                    inst.style.background = "var(--c-green)";
                    playSfx('correct'); 
                }
            } else {
                dragItem.classList.remove('dragging');
                dragItem.style.position = ''; dragItem.style.width = ''; dragItem.style.height = ''; dragItem.style.left = ''; dragItem.style.top = '';
                placeholder.replaceWith(dragItem);
                playSfx('wrong');
            }
            if(placeholder && placeholder.parentNode) placeholder.remove();
            dragItem = null;
            tCol.classList.remove('highlight'); oCol.classList.remove('highlight');
        }

        function checkAnswer(val, correct, btn) {
            if(val === correct) {
                playSfx('correct');
                showFeedback("GREAT JOB! 🌟", "var(--c-green)");
                setTimeout(() => {
                    document.getElementById('game-overlay').classList.remove('hidden');
                    // We no longer pass a specific fruit, it will be diverse
                    setupMiniGame(); 
                }, 1500);
            } else {
                playSfx('wrong');
                btn.style.background = "#FFE4E6";
                btn.style.borderColor = "var(--c-red)";
                btn.style.color = "var(--c-red-dark)";
                btn.disabled = true;
                showFeedback("Try again!", "var(--c-red)");
            }
        }

        // --- Fullscreen Fruit Catcher Mini Game (V7 Duolingo Style Background) ---
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        let gameId, isMiniRunning = false, miniScore = 0, startTime;
        
        let basket = { x: 0, y: 0, width: 160, height: 85, catchOffset: 0 }; 
        let fallingFruits = [];
        let hitEffects = [];
        let groundY = 0;
        
        // Setup initial cloud positions
        let clouds = [
            {x: 100, y: 150, s: 1.2}, 
            {x: 400, y: 100, s: 1.0}, 
            {x: 700, y: 180, s: 1.4},
            {x: 1000, y: 120, s: 1.1}
        ];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            groundY = canvas.height - 120; // Height of the flat floor for the basket
            basket.y = groundY - basket.height + 15; // sink basket slightly into grass
            basket.x = canvas.width / 2;
        }
        window.addEventListener('resize', () => { if(isMiniRunning) resizeCanvas(); });

        function updateBasketPos(clientX) {
            let x = clientX;
            if(x < basket.width/2) x = basket.width/2;
            if(x > canvas.width - basket.width/2) x = canvas.width - basket.width/2;
            basket.x = x;
        }

        canvas.addEventListener('pointermove', (e) => {
            if(isMiniRunning) { e.preventDefault(); updateBasketPos(e.clientX); }
        });
        canvas.addEventListener('pointerdown', (e) => {
            if(isMiniRunning) { e.preventDefault(); updateBasketPos(e.clientX); }
        });

        function setupMiniGame() {
            document.getElementById('game-start-btn').classList.remove('hidden');
            document.getElementById('game-start-btn').innerText = "START CATCHING!";
            resizeCanvas();
            drawMiniGameFrame();
        }

        function startGameMini() {
            document.getElementById('game-start-btn').classList.add('hidden');
            fallingFruits = []; 
            hitEffects = [];
            miniScore = 0; 
            startTime = Date.now(); 
            isMiniRunning = true;
            document.getElementById('game-score-display').innerText = "Caught: 0";
            updateMini();
        }

        function drawBackground() {
            // 1. Vibrant Sky
            ctx.fillStyle = "#5CE1E6"; 
            ctx.fillRect(0,0,canvas.width,canvas.height);

            // 2. Cartoon Sun
            ctx.fillStyle = "#FFDE59";
            ctx.beginPath(); ctx.arc(canvas.width - 150, 120, 70, 0, Math.PI*2); ctx.fill();
            // Sun inner detail (optional cuteness)
            ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
            ctx.beginPath(); ctx.arc(canvas.width - 170, 100, 15, 0, Math.PI*2); ctx.fill();

            // 3. Puffy Flat-bottom Clouds
            ctx.fillStyle = "#FFFFFF";
            clouds.forEach(c => {
                if(isMiniRunning) c.x -= 0.6 * c.s;
                if(c.x < -200) c.x = canvas.width + 150;
                
                ctx.beginPath();
                ctx.arc(c.x, c.y, 40*c.s, 0, Math.PI*2);
                ctx.arc(c.x + 35*c.s, c.y - 25*c.s, 50*c.s, 0, Math.PI*2);
                ctx.arc(c.x + 75*c.s, c.y - 10*c.s, 45*c.s, 0, Math.PI*2);
                ctx.arc(c.x + 110*c.s, c.y + 5*c.s, 35*c.s, 0, Math.PI*2);
                ctx.rect(c.x, c.y - 10*c.s, 110*c.s, 45*c.s); 
                ctx.fill();
            });

            // 4. Rolling Hills in the background (Layer 1)
            ctx.fillStyle = "#7ED957"; 
            ctx.beginPath(); ctx.arc(canvas.width * 0.25, groundY + 120, 300, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(canvas.width * 0.85, groundY + 150, 350, 0, Math.PI*2); ctx.fill();
            
            // 5. Solid Front Grass Floor
            ctx.fillStyle = "#58CC02"; // Duolingo primary green
            ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
            
            // Ground thickness detail
            ctx.fillStyle = "#46A302"; 
            ctx.fillRect(0, groundY + 30, canvas.width, canvas.height - groundY - 30);

            // 6. Cute Rounded Bushes
            ctx.fillStyle = "#008000";
            for(let bx = 100; bx < canvas.width; bx += 400) {
                ctx.beginPath(); ctx.arc(bx, groundY+10, 60, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(bx + 60, groundY+10, 45, 0, Math.PI*2); ctx.fill();
            }
        }

        function drawBeautifulBasket() {
            const bw = basket.width; 
            const bh = basket.height; 
            const bx = basket.x - bw/2;
            const by = basket.y + basket.catchOffset; 
            
            ctx.save();
            ctx.shadowColor = "rgba(0,0,0,0.3)";
            ctx.shadowBlur = 10;
            ctx.shadowOffsetY = 5;

            // Basket Body
            ctx.beginPath();
            ctx.moveTo(bx, by); 
            ctx.lineTo(bx + bw, by); 
            ctx.lineTo(bx + bw - 20, by + bh); 
            ctx.lineTo(bx + 20, by + bh); 
            ctx.closePath();

            let basketGrd = ctx.createLinearGradient(bx, by, bx, by + bh);
            basketGrd.addColorStop(0, "#DE9753"); 
            basketGrd.addColorStop(1, "#A15B1E"); 
            ctx.fillStyle = basketGrd;
            ctx.fill();
            
            ctx.shadowColor = "transparent"; 

            // Woven details
            ctx.strokeStyle = "#804311";
            ctx.lineWidth = 3;
            for(let i=1; i<=4; i++) {
                ctx.beginPath();
                ctx.moveTo(bx + (bw/5)*i, by);
                ctx.lineTo(bx + 20 + ((bw-40)/5)*i, by + bh);
                ctx.stroke();
            }

            // Top Rim
            ctx.fillStyle = "#BD6A22";
            ctx.beginPath();
            ctx.roundRect(bx - 10, by - 10, bw + 20, 20, 10);
            ctx.fill();
            
            ctx.strokeStyle = "#E29D5C";
            ctx.lineWidth = 2;
            ctx.strokeRect(bx - 8, by - 8, bw + 16, 16);

            ctx.restore();
        }

        function drawHitEffects() {
            hitEffects.forEach((eff, i) => {
                eff.life -= 0.03;
                eff.y -= 2.5;
                
                ctx.globalAlpha = Math.max(0, eff.life);
                ctx.fillStyle = "#FFF";
                ctx.font = "900 50px Poppins";
                ctx.strokeStyle = "#FF9F43";
                ctx.lineWidth = 8;
                ctx.textAlign = "center";
                ctx.strokeText(eff.text, eff.x, eff.y);
                ctx.fillText(eff.text, eff.x, eff.y);
                ctx.globalAlpha = 1.0;
                
                if(eff.life <= 0) hitEffects.splice(i, 1);
            });
        }

        function drawMiniGameFrame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();
            drawBeautifulBasket();
            drawHitEffects();
        }

        function updateMini() {
            if(!isMiniRunning) return;
            
            if(basket.catchOffset > 0) basket.catchOffset -= 1.5;
            if(basket.catchOffset < 0) basket.catchOffset = 0;

            const timePassed = Math.max(0, 15 - Math.floor((Date.now() - startTime)/1000));
            document.getElementById('timer-val').innerText = timePassed;
            
            if(timePassed <= 0) return endMiniRun("TIME'S UP!");

            drawMiniGameFrame();
            
            // V7: Diverse Fruits Spawning
            if(Math.random() < 0.06) { 
                let randomFruitEmoji = ALL_FRUITS[Math.floor(Math.random() * ALL_FRUITS.length)];
                fallingFruits.push({
                    x: Math.random() * (canvas.width - 120) + 60,
                    y: -80,
                    speed: Math.random() * 4 + 5, 
                    rotation: 0,
                    rotSpeed: (Math.random() - 0.5) * 0.1,
                    emoji: randomFruitEmoji // Save specific emoji for this falling object
                });
            }
            
            for(let i = fallingFruits.length - 1; i >= 0; i--) {
                let f = fallingFruits[i];
                f.y += f.speed;
                f.rotation += f.rotSpeed;
                
                ctx.save();
                ctx.translate(f.x, f.y);
                ctx.rotate(f.rotation);
                
                // Crisp emoji with native canvas shadow
                ctx.font = "80px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.shadowColor = "rgba(0, 0, 0, 0.4)";
                ctx.shadowBlur = 10;
                ctx.shadowOffsetY = 8;
                
                ctx.fillText(f.emoji, 0, 0); // V7: Draw the diverse fruit emoji
                ctx.restore();
                
                // Collision check
                if(f.y > basket.y - 40 && f.y < basket.y + 20 && Math.abs(f.x - basket.x) < (basket.width/2 + 20)) {
                    fallingFruits.splice(i, 1);
                    miniScore++;
                    basket.catchOffset = 15; 
                    
                    document.getElementById('game-score-display').innerText = `Caught: ${miniScore}`;
                    playSfx('catch');
                    hitEffects.push({x: f.x, y: basket.y - 30, life: 1, text: "+1"});
                } else if(f.y > canvas.height + 80) {
                    fallingFruits.splice(i, 1);
                }
            }
            
            gameId = requestAnimationFrame(updateMini);
        }

        function endMiniRun(msg) {
            isMiniRunning = false; 
            cancelAnimationFrame(gameId);
            playSfx('correct');
            
            const btn = document.getElementById('game-start-btn');
            btn.innerText = `NICE CATCHING! NEXT ➔`;
            btn.classList.remove('hidden');
            
            btn.onclick = () => {
                document.getElementById('game-overlay').classList.add('hidden');
                state.score += miniScore;
                document.getElementById('score-val').innerText = state.score;
                state.idx++;
                if(state.idx < QUESTIONS.length) loadQuestion();
                else showVictory();
                btn.onclick = startGameMini; 
            };
        }

        function showVictory() {
            document.getElementById('win-overlay').classList.remove('hidden');
            document.getElementById('final-score').innerText = state.score;
            playSfx('fanfare'); 
            startWinFireworks();
        }

        function startWinFireworks() {
            const fw = document.getElementById('fireworks-canvas');
            const fctx = fw.getContext('2d');
            fw.width = window.innerWidth; 
            fw.height = window.innerHeight;
            let particlesArr = [];
            
            function loopFw() {
                fctx.clearRect(0,0,fw.width,fw.height);
                
                if(Math.random() < 0.15) {
                    const colors = ['#58CC02', '#1CB0F6', '#FFC800', '#FF4B4B', '#CE82FF'];
                    const x = Math.random() * fw.width;
                    
                    for(let i=0; i<40; i++) {
                        particlesArr.push({
                            x: x, 
                            y: -20, 
                            vx: (Math.random() - 0.5) * 12, 
                            vy: Math.random() * 6 + 3, 
                            c: colors[Math.floor(Math.random() * colors.length)],
                            size: Math.random() * 12 + 6,
                            rot: Math.random() * Math.PI * 2,
                            rotSpeed: (Math.random() - 0.5) * 0.3
                        });
                    }
                }
                
                particlesArr.forEach((p, i) => {
                    p.x += p.vx; 
                    p.y += p.vy; 
                    p.vy += 0.15;
                    p.rot += p.rotSpeed;
                    
                    fctx.save();
                    fctx.translate(p.x, p.y);
                    fctx.rotate(p.rot);
                    fctx.fillStyle = p.c; 
                    fctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                    fctx.restore();
                    
                    if(p.y > fw.height + 50) particlesArr.splice(i, 1);
                });
                
                requestAnimationFrame(loopFw);
            }
            loopFw();
        }
    </script>
</body>
