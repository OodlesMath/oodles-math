<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ocean Math Adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #00b4d8, #0077b6, #023e8a);
            margin: 0;
            overflow: hidden;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .game-container {
            width: 100%;
            height: 100%;
            max-width: 550px;
            max-height: 900px;
            background: #ffffff;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            border: 6px solid #ff9f43;
        }

        @media (min-width: 640px) {
            .game-container {
                border-radius: 40px;
                height: 95dvh;
            }
        }

        .ocean-bg {
            background: linear-gradient(180deg, #caf0f8 0%, #90e0ef 50%, #00b4d8 100%);
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        .pyramid-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .pyramid-slot {
            width: 52px;
            height: 52px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px dashed #ff9f43;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .pyramid-slot .ordinal {
            font-size: 10px;
            font-weight: 700;
            color: #ff9f43;
            text-transform: uppercase;
        }

        .pyramid-slot .value {
            font-weight: 800;
            font-size: 1.1rem;
            color: #2c3e50;
        }

        .pyramid-slot.correct {
            background: #2ed573;
            border-color: #21b15e;
            border-style: solid;
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(46, 213, 115, 0.3);
        }

        .pyramid-slot.correct .value { color: white; }
        .pyramid-slot.correct .ordinal { color: rgba(255,255,255,0.7); }

        .sea-area {
            background: linear-gradient(180deg, #48cae4 0%, #0096c7 70%, #023e8a 100%);
            position: relative;
            flex-grow: 1;
            overflow: hidden;
            border-radius: 30px;
            margin: 10px;
            border: 5px solid white;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.2);
        }

        #fishing-hook {
            position: absolute;
            top: 0;
            left: 50%;
            width: 3px;
            background: #57606f;
            height: 0;
            transform: translateX(-50%);
            transition: height 0.6s cubic-bezier(0.45, 0, 0.55, 1);
            z-index: 20;
        }

        #fishing-hook::after {
            content: '⚓';
            position: absolute;
            bottom: -25px;
            left: -14px;
            font-size: 28px;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
        }

        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            pointer-events: none;
            animation: float-up var(--duration) linear infinite;
        }

        @keyframes float-up {
            0% { transform: translateY(110%) scale(1); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }

        .btn-pop:active { transform: scale(0.92); }
        
        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            padding: 20px;
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .screen.active { display: flex; }

        .ocean-entity {
            position: absolute;
            font-size: 40px;
            user-select: none;
            z-index: 15;
            transition: opacity 0.5s;
        }

        .shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <div class="game-container">
        <div class="ocean-bg"></div>

        <header class="bg-[#ff9f43] p-4 flex justify-between items-center text-white shrink-0 shadow-lg relative z-20">
            <div id="label-level" class="font-bold text-xs tracking-widest uppercase">LEVEL 1</div>
            <div class="font-extrabold text-lg sm:text-2xl drop-shadow-md">MATH OCEAN 🌊</div>
            <div id="label-score" class="bg-white/30 px-3 py-1 rounded-full font-bold text-sm">Score: 0</div>
        </header>

        <!-- Start Screen -->
        <div id="screen-start" class="screen active justify-center">
            <div class="text-8xl mb-6 drop-shadow-xl animate-bounce">🐳</div>
            <h1 class="text-4xl sm:text-6xl font-black text-white drop-shadow-[0_4px_4px_rgba(0,0,0,0.5)] mb-4 uppercase">Number<br>World</h1>
            <p class="text-white font-bold mb-10 text-lg sm:text-xl">Fun math for little explorers!</p>
            <button onclick="startGame()" class="bg-[#ff4757] text-white text-3xl sm:text-4xl font-black py-5 px-16 rounded-full shadow-[0_10px_0_#c0392b] btn-pop transition-all">START GAME</button>
        </div>

        <!-- Level 1: Counting -->
        <div id="screen-counting" class="screen">
            <div class="bg-white/80 rounded-3xl p-4 shadow-inner mb-4">
                <h2 class="text-xl sm:text-2xl font-black text-blue-600">How many do you see?</h2>
            </div>
            <div id="counting-area" class="flex-grow flex flex-wrap content-center justify-center gap-3 p-4 bg-white/40 rounded-3xl border-4 border-white/60 overflow-y-auto"></div>
            <div id="counting-options" class="grid grid-cols-2 gap-4 mt-6"></div>
        </div>

        <!-- Level 2/4: Pyramid Tower -->
        <div id="screen-tower" class="screen">
            <div class="bg-white/80 rounded-3xl p-4 shadow-inner mb-4">
                <h2 class="text-xl sm:text-2xl font-black text-blue-600">Number Tower!</h2>
                <p class="text-sm font-bold text-orange-500" id="tower-mode-text">Sort from Smallest to Largest</p>
            </div>
            <div id="tower-container" class="flex flex-col items-center justify-center flex-grow py-4"></div>
            <div id="tower-pool" class="flex flex-wrap justify-center gap-2 mt-4 p-4 bg-white/60 rounded-3xl min-h-[120px] shadow-inner"></div>
        </div>

        <!-- Bonus: Fishing -->
        <div id="screen-fishing" class="screen !p-2">
            <div class="flex justify-between items-center px-4 py-2 bg-white/80 rounded-full mx-2 mb-2 shadow-sm">
                <div id="fishing-timer" class="text-red-500 font-black text-lg">01:00</div>
                <div class="text-blue-600 font-bold text-sm">FIND THE NEXT NUMBER!</div>
            </div>
            <div class="sea-area" id="sea-area">
                <div id="fishing-hook"></div>
            </div>
            <div class="p-4 bg-white/90 rounded-3xl shadow-xl border-4 border-blue-200 mb-2">
                <div id="pattern-display" class="text-3xl font-black text-blue-700 mb-4 tracking-widest bg-blue-50 py-2 rounded-xl">?</div>
                <div id="pattern-options" class="grid grid-cols-2 gap-3"></div>
            </div>
        </div>

        <!-- Win Screen -->
        <div id="screen-win" class="screen justify-center">
            <div class="text-9xl mb-6 animate-bounce">👑</div>
            <h2 class="text-5xl font-black text-white drop-shadow-md uppercase mb-2">Excellent!</h2>
            <p class="text-2xl font-bold text-yellow-300 mb-10 drop-shadow-sm" id="final-score-text">Final Score: 0</p>
            <button onclick="location.reload()" class="bg-[#2ed573] text-white text-3xl font-black py-5 px-14 rounded-full shadow-[0_10px_0_#219150] btn-pop">PLAY AGAIN</button>
            <canvas id="fireworks-canvas" class="absolute inset-0 pointer-events-none"></canvas>
        </div>
    </div>

    <script>
        let score = 0;
        let countingCount = 0;
        let usedCounts = [];
        let towerTargetNumbers = [];
        let towerNextIndex = 0;
        let fishingTime = 60;
        let fishingInterval;
        let fishingNextStep = 'tower'; // Determines where to go after fishing
        let audioCtx;

        const fruits = ["🍎", "🍓", "🍌", "🍇", "🍊", "🍍", "🍐", "🍑", "🍒", "🥝"];
        const seaLife = ["🐠", "🐟", "🐡", "🐋", "🐙", "🐬", "🦑", "🦐", "🦀"];
        const trash = ["🥤", "🥡", "🗑️", "🍾", "👞"];

        function playSound(type) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'success') {
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            } else if (type === 'pop') {
                osc.frequency.setValueAtTime(300, now);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.start(); osc.stop(now + 0.05);
            } else if (type === 'fail') {
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.linearRampToValueAtTime(100, now + 0.2);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(); osc.stop(now + 0.2);
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`screen-${id}`).classList.add('active');
            if (id === 'fishing') createBubbles();
        }

        function createBubbles() {
            const sea = document.getElementById('sea-area');
            sea.querySelectorAll('.bubble').forEach(b => b.remove());
            for(let i=0; i<20; i++) {
                const b = document.createElement('div');
                b.className = 'bubble';
                const size = Math.random() * 20 + 5;
                b.style.width = size + 'px';
                b.style.height = size + 'px';
                b.style.left = Math.random() * 100 + '%';
                b.style.setProperty('--duration', (Math.random() * 4 + 2) + 's');
                b.style.animationDelay = Math.random() * 5 + 's';
                sea.appendChild(b);
            }
        }

        function updateScore(points) {
            score += points;
            document.getElementById('label-score').textContent = `Score: ${score}`;
        }

        function startGame() {
            playSound('pop');
            initCounting();
        }

        // --- LEVEL 1: COUNTING ---
        function initCounting() {
            document.getElementById('label-level').textContent = "LEVEL 1: COUNTING";
            countingCount = 0;
            usedCounts = [];
            loadCountingQuestion();
            showScreen('counting');
        }

        function loadCountingQuestion() {
            if (countingCount >= 5) {
                fishingNextStep = 'tower';
                initFishing();
                return;
            }

            let count;
            do {
                count = Math.floor(Math.random() * 10) + 11;
            } while (usedCounts.includes(count));
            usedCounts.push(count);

            const fruit = fruits[Math.floor(Math.random() * fruits.length)];
            const area = document.getElementById('counting-area');
            const opts = document.getElementById('counting-options');
            
            area.innerHTML = '';
            opts.innerHTML = '';

            for (let i = 0; i < count; i++) {
                const span = document.createElement('span');
                span.className = 'text-4xl sm:text-5xl animate-pulse';
                span.textContent = fruit;
                area.appendChild(span);
            }

            let answers = [count];
            while (answers.length < 4) {
                let r = Math.floor(Math.random() * 10) + 11;
                if (!answers.includes(r)) answers.push(r);
            }
            answers.sort(() => Math.random() - 0.5);

            answers.forEach(ans => {
                const btn = document.createElement('button');
                btn.className = 'bg-orange-400 text-white font-black py-4 rounded-2xl shadow-[0_6px_0_#d35400] text-2xl btn-pop';
                btn.textContent = ans;
                btn.onclick = () => {
                    if (ans === count) {
                        playSound('success');
                        updateScore(10);
                        countingCount++;
                        loadCountingQuestion();
                    } else {
                        playSound('fail');
                        btn.classList.add('bg-red-500', 'shake');
                        setTimeout(() => btn.classList.remove('bg-red-500', 'shake'), 500);
                    }
                };
                opts.appendChild(btn);
            });
        }

        // --- LEVEL 3: PYRAMID ---
        function getOrdinal(n) {
            const s = ["th", "st", "nd", "rd"], v = n % 100;
            return n + (s[(v - 20) % 10] || s[v] || s[0]);
        }

        function initTower() {
            document.getElementById('label-level').textContent = "LEVEL 3: TOWER";
            towerNextIndex = 0;
            let available = Array.from({length: 16}, (_, i) => i + 5);
            towerTargetNumbers = [];
            for(let i=0; i<10; i++) {
                let idx = Math.floor(Math.random() * available.length);
                towerTargetNumbers.push(available.splice(idx, 1)[0]);
            }
            towerTargetNumbers.sort((a,b) => a-b);

            showScreen('tower');
            const container = document.getElementById('tower-container');
            container.innerHTML = '';
            let slotId = 0;
            [1, 2, 3, 4].forEach(count => {
                const row = document.createElement('div');
                row.className = 'pyramid-row';
                for(let i=0; i<count; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'pyramid-slot';
                    slot.id = `slot-${slotId}`;
                    slot.innerHTML = `<span class="ordinal">${getOrdinal(slotId + 1)}</span><span class="value">?</span>`;
                    row.appendChild(slot);
                    slotId++;
                }
                container.appendChild(row);
            });

            const pool = document.getElementById('tower-pool');
            pool.innerHTML = '';
            const shuffled = [...towerTargetNumbers].sort(() => Math.random() - 0.5);
            shuffled.forEach(n => {
                const btn = document.createElement('button');
                btn.className = 'w-12 h-12 bg-blue-500 text-white font-black rounded-xl shadow-[0_4px_0_#0652dd] btn-pop text-lg';
                btn.textContent = n;
                btn.onclick = () => {
                    if (n === towerTargetNumbers[towerNextIndex]) {
                        playSound('success');
                        const slot = document.getElementById(`slot-${towerNextIndex}`);
                        slot.querySelector('.value').textContent = n;
                        slot.classList.add('correct');
                        btn.style.visibility = 'hidden';
                        updateScore(5);
                        towerNextIndex++;
                        if (towerNextIndex >= 10) {
                            fishingNextStep = 'win';
                            setTimeout(initFishing, 1200);
                        }
                    } else {
                        playSound('fail');
                        btn.classList.add('shake', 'bg-red-400');
                        setTimeout(() => btn.classList.remove('shake', 'bg-red-400'), 500);
                    }
                };
                pool.appendChild(btn);
            });
        }

        // --- BONUS: FISHING ---
        let fishEntities = [];
        let isFishingBusy = false;
        let currentPatternAns = 0;

        function initFishing() {
            document.getElementById('label-level').textContent = "BONUS: SEAFOOD CATCH";
            showScreen('fishing');
            const sea = document.getElementById('sea-area');
            sea.querySelectorAll('.ocean-entity').forEach(e => e.remove());
            fishEntities = [];
            for(let i=0; i<10; i++) spawnEntity('fish');
            for(let i=0; i<4; i++) spawnEntity('trash');

            fishingTime = 60;
            clearInterval(fishingInterval);
            fishingInterval = setInterval(() => {
                fishingTime--;
                document.getElementById('fishing-timer').textContent = `00:${fishingTime < 10 ? '0'+fishingTime : fishingTime}`;
                if (fishingTime <= 0) {
                    clearInterval(fishingInterval);
                    fishingNextStep === 'win' ? showWin() : initTower();
                }
            }, 1000);

            loadFishingPattern();
            requestAnimationFrame(animateOcean);
        }

        function spawnEntity(type) {
            const sea = document.getElementById('sea-area');
            const el = document.createElement('div');
            el.className = 'ocean-entity';
            el.textContent = type === 'fish' ? seaLife[Math.floor(Math.random() * seaLife.length)] : trash[Math.floor(Math.random() * trash.length)];
            el.style.top = (Math.random() * 70 + 10) + '%';
            el.style.left = (Math.random() * 80 + 5) + '%';
            el.dataset.type = type;
            el.dataset.speed = (Math.random() * 1.8 + 0.6);
            el.dataset.dir = Math.random() > 0.5 ? 1 : -1;
            sea.appendChild(el);
            fishEntities.push(el);
        }

        function animateOcean() {
            if (!document.getElementById('screen-fishing').classList.contains('active')) return;
            fishEntities.forEach(f => {
                if (f.classList.contains('caught')) return;
                let left = parseFloat(f.style.left);
                let dir = parseFloat(f.dataset.dir);
                let speed = parseFloat(f.dataset.speed);
                left += dir * (speed / 8);
                if (left > 90 || left < 0) {
                    dir *= -1;
                    f.dataset.dir = dir;
                    f.style.transform = dir > 0 ? 'scaleX(1)' : 'scaleX(-1)';
                }
                f.style.left = left + '%';
            });
            requestAnimationFrame(animateOcean);
        }

        function loadFishingPattern() {
            const patterns = [
                { s: [10, 12, 14, 16], a: 18 }, { s: [11, 13, 15, 17], a: 19 },
                { s: [10, 11, 10, 11], a: 10 }, { s: [15, 16, 17, 18], a: 19 },
                { s: [20, 18, 16, 14], a: 12 }, { s: [10, 15, 10, 15], a: 10 }
            ];
            const p = patterns[Math.floor(Math.random() * patterns.length)];
            currentPatternAns = p.a;
            document.getElementById('pattern-display').textContent = p.s.join(' - ') + ' - ?';
            const opts = document.getElementById('pattern-options');
            opts.innerHTML = '';
            let answers = [p.a];
            while(answers.length < 4) {
                let r = Math.floor(Math.random() * 11) + 10;
                if(!answers.includes(r)) answers.push(r);
            }
            answers.sort(() => Math.random() - 0.5);
            answers.forEach(ans => {
                const b = document.createElement('button');
                b.className = 'bg-blue-600 text-white font-black py-4 rounded-2xl shadow-[0_5px_0_#023e8a] btn-pop text-xl';
                b.textContent = ans;
                b.onclick = () => {
                    if (isFishingBusy) return;
                    if (ans === currentPatternAns) dropHook();
                    else {
                        playSound('fail');
                        b.classList.add('bg-red-500', 'shake');
                        setTimeout(() => b.classList.remove('bg-red-500', 'shake'), 500);
                    }
                };
                opts.appendChild(b);
            });
        }

        function dropHook() {
            isFishingBusy = true;
            const hook = document.getElementById('fishing-hook');
            hook.style.height = '85%';
            setTimeout(() => {
                checkCatch();
                hook.style.height = '0';
                setTimeout(() => {
                    isFishingBusy = false;
                    loadFishingPattern();
                }, 650);
            }, 650);
        }

        function checkCatch() {
            let caughtAny = false;
            fishEntities.forEach(f => {
                if (f.classList.contains('caught')) return;
                const left = parseFloat(f.style.left);
                if (left > 42 && left < 58) {
                    f.classList.add('caught');
                    f.style.transition = 'top 0.6s ease-in, opacity 0.4s';
                    f.style.top = '-80px';
                    f.style.opacity = '0';
                    if (f.dataset.type === 'fish') { playSound('success'); updateScore(20); }
                    else { playSound('fail'); updateScore(-10); }
                    caughtAny = true;
                }
            });
            if (!caughtAny) playSound('pop');
        }

        function showWin() {
            showScreen('win');
            document.getElementById('final-score-text').textContent = `Final Score: ${score}`;
            startFireworks();
        }

        function startFireworks() {
            const canvas = document.getElementById('fireworks-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            let particles = [];
            const colors = ['#ff4757', '#2ed573', '#1e90ff', '#ffa502', '#ffffff'];
            function createFirework() {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height / 2;
                const color = colors[Math.floor(Math.random() * colors.length)];
                for(let i=0; i<40; i++) {
                    particles.push({ x, y, vx: (Math.random() - 0.5) * 12, vy: (Math.random() - 0.5) * 12, alpha: 1, color });
                }
            }
            function animate() {
                if (!document.getElementById('screen-win').classList.contains('active')) return;
                ctx.clearRect(0,0, canvas.width, canvas.height);
                if (Math.random() < 0.08) createFirework();
                particles.forEach((p, i) => {
                    p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.alpha -= 0.012;
                    ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fill();
                    if(p.alpha <= 0) particles.splice(i, 1);
                });
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
