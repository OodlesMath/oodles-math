<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Number Adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --accent: #f59e0b;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(180deg, #a1c4fd 0%, #c2e9fb 100%);
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Hiệu ứng mây bay nền */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.9;
            z-index: -1;
            animation: move-clouds 30s linear infinite;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .cloud:nth-child(1) { width: 120px; height: 50px; top: 10%; left: -150px; animation-duration: 40s; }
        .cloud:nth-child(1)::before { width: 60px; height: 60px; top: -30px; left: 15px; }
        .cloud:nth-child(1)::after { width: 40px; height: 40px; top: -20px; left: 65px; }
        
        .cloud:nth-child(2) { width: 180px; height: 70px; top: 25%; left: -250px; animation-duration: 55s; animation-delay: 5s; transform: scale(0.8); }
        .cloud:nth-child(2)::before { width: 80px; height: 80px; top: -40px; left: 20px; }
        .cloud:nth-child(2)::after { width: 60px; height: 60px; top: -30px; left: 90px; }

        .cloud:nth-child(3) { width: 140px; height: 60px; top: 60%; left: -200px; animation-duration: 45s; animation-delay: 15s; transform: scale(1.2); }
        .cloud:nth-child(3)::before { width: 70px; height: 70px; top: -35px; left: 20px; }
        .cloud:nth-child(3)::after { width: 50px; height: 50px; top: -25px; left: 75px; }

        @keyframes move-clouds {
            from { transform: translateX(0); }
            to { transform: translateX(calc(100vw + 300px)); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }
        .shake { animation: shake 0.5s ease-in-out; }

        @keyframes bounce-pop {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }
        .bounce-pop { animation: bounce-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.5)); }
            50% { filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.9)); transform: scale(1.05); }
        }
        .text-glow { animation: pulse-glow 2s infinite; }

        /* Nút bấm kiểu kẹo ngọt (3D) */
        .btn-candy {
            position: relative;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border-bottom: 8px solid rgba(0,0,0,0.15);
        }
        .btn-candy:hover { transform: translateY(-3px) scale(1.02); border-bottom-width: 10px; }
        .btn-candy:active { transform: translateY(6px) scale(0.98); border-bottom-width: 2px; }

        .treasure-item {
            font-size: 5rem;
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.15));
            animation: treasure-float 3s ease-in-out infinite;
        }
        @keyframes treasure-float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.1); }
        }

        .particle {
            position: absolute;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            z-index: 100;
            box-shadow: 0 0 10px currentColor;
        }

        @keyframes firework-burst {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translate(var(--tw-x), var(--tw-y)) scale(0); opacity: 0; }
        }

        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 1; }
        }

        /* Tùy chỉnh thanh cuộn cho dãy pattern */
        .custom-scrollbar::-webkit-scrollbar {
            height: 12px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(99, 102, 241, 0.1);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.4);
            border-radius: 10px;
        }

        /* Outline giả cho emoji trong game tìm đồ */
        .emoji-outline {
            filter: drop-shadow(0px 2px 0px rgba(0,0,0,0.8)) 
                    drop-shadow(0px -2px 0px rgba(0,0,0,0.8)) 
                    drop-shadow(2px 0px 0px rgba(0,0,0,0.8)) 
                    drop-shadow(-2px 0px 0px rgba(0,0,0,0.8));
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- Hiệu ứng mây nền -->
    <div class="cloud"></div>
    <div class="cloud"></div>
    <div class="cloud"></div>

    <div id="game-container" class="w-full max-w-5xl bg-white/95 backdrop-blur-xl rounded-[3rem] shadow-[0_25px_60px_-15px_rgba(0,0,0,0.3)] p-6 md:p-10 text-center relative overflow-hidden border-8 border-white">
        
        <!-- Màn hình bắt đầu -->
        <div id="start-screen" class="absolute inset-0 bg-[#fff5f8] z-50 flex flex-col items-center justify-center p-6 text-center">
            <div class="treasure-item mb-6">🔢</div>
            <h1 class="text-6xl md:text-8xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 drop-shadow-sm text-glow">
                Number Fun!
            </h1>
            <p class="text-3xl text-pink-400 mb-12 font-bold uppercase tracking-widest drop-shadow-sm">A Math Adventure</p>
            <button id="start-button" class="btn-candy bg-gradient-to-r from-indigo-500 to-purple-500 text-white text-4xl font-black py-6 px-20 rounded-full shadow-2xl hover:from-indigo-400 hover:to-purple-400">
                PLAY NOW!
            </button>
        </div>

        <!-- Thanh thông tin -->
        <div class="flex justify-between items-center mb-6">
            <div id="progress-text" class="bg-indigo-100 text-indigo-700 px-6 py-3 rounded-2xl font-black text-xl shadow-sm border-2 border-indigo-200">LEVEL 1 / 15</div>
            <div id="score" class="bg-pink-100 text-pink-600 px-6 py-3 rounded-2xl font-black text-xl shadow-sm border-2 border-pink-200">✨ TREASURES: 0</div>
        </div>
        
        <!-- Thanh tiến trình với tên lửa -->
        <div class="relative w-full h-10 mb-10 bg-slate-100 rounded-full p-1.5 shadow-inner border-2 border-slate-200">
            <div id="progress-bar" class="h-full bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 rounded-full transition-all duration-700 flex justify-end items-center px-1 shadow-sm" style="width: 0%;">
                <div class="w-8 h-8 bg-white rounded-full shadow-md flex items-center justify-center text-sm">🚀</div>
            </div>
        </div>

        <!-- Khu vực câu hỏi -->
        <div id="question-area">
            <div class="flex justify-center items-center gap-6 mb-8"> 
                <h2 id="question-text" class="text-5xl md:text-6xl font-black text-slate-700 drop-shadow-sm">What's next?</h2>
                <button id="replay-speech-button" class="btn-candy bg-amber-400 text-amber-900 p-4 rounded-3xl shadow-lg hover:bg-amber-300 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                </button>
            </div>
            
            <div id="pattern-display" class="flex flex-nowrap overflow-x-auto justify-start lg:justify-center items-center gap-4 md:gap-8 min-h-[200px] bg-indigo-50/50 rounded-[3rem] p-6 md:p-10 mb-12 border-4 border-dashed border-indigo-200 shadow-inner custom-scrollbar">
                <!-- Nội dung được JS tạo -->
            </div>
        </div>

        <!-- Khu vực lựa chọn -->
        <div id="options-display" class="flex flex-wrap justify-center gap-8 md:gap-12">
            <!-- Nội dung được JS tạo -->
        </div>

        <!-- Lớp phủ phản hồi -->
        <div id="feedback-modal" class="absolute inset-0 bg-white/95 flex items-center justify-center z-20 hidden backdrop-blur-sm">
            <div id="feedback-content" class="text-7xl md:text-[10rem] font-black drop-shadow-2xl scale-0 transition-transform duration-500">
                GREAT!
            </div>
        </div>

        <!-- Vòng thưởng (Mini Game: Find hidden items) -->
        <div id="minigame-modal" class="absolute inset-0 bg-gradient-to-br from-emerald-400 to-teal-500 flex flex-col items-center justify-center z-30 hidden p-6 backdrop-blur-md">
            <!-- Search Bar -->
            <div class="bg-white rounded-[2.5rem] py-3 px-8 shadow-2xl flex items-center gap-6 mb-8 border-[6px] border-yellow-300 bounce-pop">
                <span class="text-5xl drop-shadow-sm">🔍</span>
                <div id="minigame-targets" class="flex gap-4 text-6xl emoji-outline">
                    <!-- Target icons go here -->
                </div>
            </div>

            <!-- Play Area -->
            <div id="minigame-area" class="relative w-full max-w-3xl h-[55vh] bg-[#81e6d9] rounded-[3rem] border-8 border-white shadow-[inset_0_10px_30px_rgba(0,0,0,0.15)] overflow-hidden">
                <!-- Random icons go here -->
            </div>
            
            <div id="minigame-result" class="absolute bg-white/95 border-8 border-yellow-400 rounded-[3rem] p-8 flex-col items-center justify-center hidden z-40 shadow-2xl bounce-pop">
                <p id="minigame-result-text" class="text-4xl md:text-5xl text-pink-500 font-black text-center mb-4"></p>
                <div id="minigame-result-icon" class="text-[8rem] filter drop-shadow-xl animate-bounce"></div>
            </div>
        </div>

        <!-- Màn hình kết thúc game -->
        <div id="game-over-modal" class="absolute inset-0 bg-gradient-to-tr from-indigo-600 via-purple-600 to-pink-500 flex flex-col items-center justify-center z-40 hidden p-6 text-white text-center">
            <div class="treasure-item mb-10 text-8xl">🏆</div>
            <h2 class="text-7xl md:text-[8rem] font-black mb-6 drop-shadow-2xl text-glow">SUPER STAR!</h2>
            <p class="text-4xl font-bold mb-8 drop-shadow-md">All patterns are solved!</p>
            <div class="bg-white/20 p-8 rounded-[3rem] border-4 border-white/40 backdrop-blur-sm mb-14">
                <p id="final-score" class="text-6xl text-yellow-300 font-black drop-shadow-lg">Treasures Found: 0</p>
            </div>
            <button id="play-again-button" class="btn-candy bg-white text-indigo-600 text-4xl font-black py-6 px-20 rounded-full shadow-2xl hover:scale-105 active:scale-95">
                PLAY AGAIN!
            </button>
        </div>

        <div id="fx-container" class="absolute inset-0 pointer-events-none z-50"></div>
    </div>

    <script>
        // --- Cấu hình & Dữ liệu (Sử dụng Số thay vì Hình) ---
        const n = (val, color) => ({ value: val, color: color });

        const treasures = [
            { icon: "🧸", name: "Teddy Bear" },
            { icon: "🌈", name: "Rainbow" },
            { icon: "🍎", name: "Apple" }, 
            { icon: "🍭", name: "Candy" },
            { icon: "🚀", name: "Rocket" },
            { icon: "🐘", name: "Elephant" }, 
            { icon: "💎", name: "Diamond" },
            { icon: "🍦", name: "Ice Cream" }, 
            { icon: "⚽", name: "Soccer Ball" },
            { icon: "🔔", name: "Magic Bell" }
        ];

        const miniGameEmojis = ["🍕","🚂","🎨","🎁","🧩","🐳","🦒","🍓","🐙","⭐","🎒","🐧","🖍️","🍩","🎈","🌈","🐘","🍉","🚁","🧸","🚀","🍎","🐞","🐶"];

        // 15 dãy số logic đa dạng cho bé - Tất cả số trong phạm vi TỪ 5 ĐẾN 20
        // Theo các định dạng: ABABAB, AABAAB, ABCABC
        const questions = [
            // Q1: ABABAB (5, 6, 5, 6, 5, ?) -> Ans: 6
            { pattern: [n(5, 'bg-rose-500'), n(6, 'bg-blue-500'), n(5, 'bg-rose-500'), n(6, 'bg-blue-500'), n(5, 'bg-rose-500')], options: [n(5, 'bg-rose-500'), n(6, 'bg-blue-500'), n(7, 'bg-emerald-500')], correct: n(6, 'bg-blue-500') },
            
            // Q2: AABAAB (7, 7, 8, 7, 7, ?) -> Ans: 8
            { pattern: [n(7, 'bg-amber-400'), n(7, 'bg-amber-400'), n(8, 'bg-purple-500'), n(7, 'bg-amber-400'), n(7, 'bg-amber-400')], options: [n(7, 'bg-amber-400'), n(8, 'bg-purple-500'), n(9, 'bg-pink-500')], correct: n(8, 'bg-purple-500') },
            
            // Q3: ABCABC (5, 6, 7, 5, 6, ?) -> Ans: 7
            { pattern: [n(5, 'bg-indigo-500'), n(6, 'bg-teal-500'), n(7, 'bg-orange-500'), n(5, 'bg-indigo-500'), n(6, 'bg-teal-500')], options: [n(5, 'bg-indigo-500'), n(6, 'bg-teal-500'), n(7, 'bg-orange-500')], correct: n(7, 'bg-orange-500') },
            
            // Q4: ABABAB (10, 15, 10, 15, 10, ?) -> Ans: 15
            { pattern: [n(10, 'bg-cyan-500'), n(15, 'bg-rose-500'), n(10, 'bg-cyan-500'), n(15, 'bg-rose-500'), n(10, 'bg-cyan-500')], options: [n(10, 'bg-cyan-500'), n(15, 'bg-rose-500'), n(20, 'bg-blue-500')], correct: n(15, 'bg-rose-500') },
            
            // Q5: AABAAB (8, 8, 12, 8, 8, ?) -> Ans: 12
            { pattern: [n(8, 'bg-emerald-500'), n(8, 'bg-emerald-500'), n(12, 'bg-amber-400'), n(8, 'bg-emerald-500'), n(8, 'bg-emerald-500')], options: [n(8, 'bg-emerald-500'), n(10, 'bg-purple-500'), n(12, 'bg-amber-400')], correct: n(12, 'bg-amber-400') },
            
            // Q6: ABCABC (11, 12, 13, 11, 12, ?) -> Ans: 13
            { pattern: [n(11, 'bg-pink-500'), n(12, 'bg-indigo-500'), n(13, 'bg-teal-500'), n(11, 'bg-pink-500'), n(12, 'bg-indigo-500')], options: [n(11, 'bg-pink-500'), n(12, 'bg-indigo-500'), n(13, 'bg-teal-500')], correct: n(13, 'bg-teal-500') },
            
            // Q7: ABABAB (7, 14, 7, 14, 7, ?) -> Ans: 14
            { pattern: [n(7, 'bg-orange-500'), n(14, 'bg-cyan-500'), n(7, 'bg-orange-500'), n(14, 'bg-cyan-500'), n(7, 'bg-orange-500')], options: [n(7, 'bg-orange-500'), n(14, 'bg-cyan-500'), n(20, 'bg-rose-500')], correct: n(14, 'bg-cyan-500') },
            
            // Q8: AABAAB (9, 9, 10, 9, 9, ?) -> Ans: 10
            { pattern: [n(9, 'bg-blue-500'), n(9, 'bg-blue-500'), n(10, 'bg-emerald-500'), n(9, 'bg-blue-500'), n(9, 'bg-blue-500')], options: [n(9, 'bg-blue-500'), n(5, 'bg-amber-400'), n(10, 'bg-emerald-500')], correct: n(10, 'bg-emerald-500') },
            
            // Q9: ABCABC (10, 12, 14, 10, 12, ?) -> Ans: 14
            { pattern: [n(10, 'bg-purple-500'), n(12, 'bg-pink-500'), n(14, 'bg-indigo-500'), n(10, 'bg-purple-500'), n(12, 'bg-pink-500')], options: [n(12, 'bg-pink-500'), n(14, 'bg-indigo-500'), n(16, 'bg-teal-500')], correct: n(14, 'bg-indigo-500') },
            
            // Q10: ABABAB (9, 18, 9, 18, 9, ?) -> Ans: 18
            { pattern: [n(9, 'bg-orange-500'), n(18, 'bg-cyan-500'), n(9, 'bg-orange-500'), n(18, 'bg-cyan-500'), n(9, 'bg-orange-500')], options: [n(9, 'bg-orange-500'), n(18, 'bg-cyan-500'), n(19, 'bg-rose-500')], correct: n(18, 'bg-cyan-500') },
            
            // Q11: AABAAB (5, 5, 15, 5, 5, ?) -> Ans: 15
            { pattern: [n(5, 'bg-blue-500'), n(5, 'bg-blue-500'), n(15, 'bg-emerald-500'), n(5, 'bg-blue-500'), n(5, 'bg-blue-500')], options: [n(5, 'bg-blue-500'), n(10, 'bg-amber-400'), n(15, 'bg-emerald-500')], correct: n(15, 'bg-emerald-500') },
            
            // Q12: ABCABC (17, 18, 19, 17, 18, ?) -> Ans: 19
            { pattern: [n(17, 'bg-purple-500'), n(18, 'bg-pink-500'), n(19, 'bg-indigo-500'), n(17, 'bg-purple-500'), n(18, 'bg-pink-500')], options: [n(17, 'bg-purple-500'), n(18, 'bg-pink-500'), n(19, 'bg-indigo-500')], correct: n(19, 'bg-indigo-500') },
            
            // Q13: ABABAB (13, 20, 13, 20, 13, ?) -> Ans: 20
            { pattern: [n(13, 'bg-teal-500'), n(20, 'bg-orange-500'), n(13, 'bg-teal-500'), n(20, 'bg-orange-500'), n(13, 'bg-teal-500')], options: [n(13, 'bg-teal-500'), n(15, 'bg-cyan-500'), n(20, 'bg-orange-500')], correct: n(20, 'bg-orange-500') },
            
            // Q14: AABAAB (12, 12, 20, 12, 12, ?) -> Ans: 20
            { pattern: [n(12, 'bg-rose-500'), n(12, 'bg-rose-500'), n(20, 'bg-blue-500'), n(12, 'bg-rose-500'), n(12, 'bg-rose-500')], options: [n(12, 'bg-rose-500'), n(10, 'bg-emerald-500'), n(20, 'bg-blue-500')], correct: n(20, 'bg-blue-500') },
            
            // Q15: ABCABC (8, 9, 10, 8, 9, ?) -> Ans: 10
            { pattern: [n(8, 'bg-amber-400'), n(9, 'bg-purple-500'), n(10, 'bg-pink-500'), n(8, 'bg-amber-400'), n(9, 'bg-purple-500')], options: [n(8, 'bg-amber-400'), n(9, 'bg-purple-500'), n(10, 'bg-pink-500')], correct: n(10, 'bg-pink-500') }
        ];

        let score = 0;
        let currentQuestionIndex = 0;
        let isChecking = false;
        let gameOverLoop = null;
        let minigameFound = 0;
        const minigameTargetCount = 3;
        const totalQuestions = questions.length;

        // Âm thanh
        let correctSynth, incorrectSynth, bonusSynth, clickSynth;
        function initAudio() {
            if (correctSynth) return;
            correctSynth = new Tone.PolySynth(Tone.Synth).toDestination();
            incorrectSynth = new Tone.PolySynth(Tone.Synth).toDestination();
            bonusSynth = new Tone.PolySynth(Tone.Synth).toDestination();
            clickSynth = new Tone.MembraneSynth().toDestination();
            Tone.start();
        }

        const speechSynth = window.speechSynthesis;
        function speak(text) {
            speechSynth.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US';
            u.rate = 1.0;
            u.pitch = 1.3;
            speechSynth.speak(u);
        }

        // --- DOM Elements ---
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-button');
        const patternDisplay = document.getElementById('pattern-display');
        const optionsDisplay = document.getElementById('options-display');
        const feedbackModal = document.getElementById('feedback-modal');
        const feedbackContent = document.getElementById('feedback-content');
        const minigameModal = document.getElementById('minigame-modal');
        const gameOverModal = document.getElementById('game-over-modal');
        const scoreEl = document.getElementById('score');
        const progressTextEl = document.getElementById('progress-text');
        const progressBarEl = document.getElementById('progress-bar');
        const fxContainer = document.getElementById('fx-container');

        // --- Hiệu ứng hình ảnh ---
        function createConfetti() {
            const colors = ['#818cf8', '#f472b6', '#34d399', '#fbbf24', '#a78bfa', '#2dd4bf', '#f87171'];
            for (let i = 0; i < 80; i++) {
                const c = document.createElement('div');
                c.className = 'particle';
                c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                c.style.left = `${Math.random() * 100}%`;
                c.style.top = `-20px`;
                c.style.animation = `fall ${2 + Math.random() * 2}s ease-out forwards`;
                c.style.opacity = '1';
                fxContainer.appendChild(c);
                setTimeout(() => c.remove(), 4000);
            }
        }

        function launchFirework() {
            const colors = ['#ef4444', '#10b981', '#3b82f6', '#f59e0b', '#d946ef', '#06b6d4', '#f97316'];
            const x = 10 + Math.random() * 80;
            const y = 20 + Math.random() * 50;
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            for (let i = 0; i < 60; i++) {
                const p = document.createElement('div');
                const angle = (Math.PI * 2 * i) / 60;
                const distance = 100 + Math.random() * 250;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;

                p.className = 'particle';
                p.style.backgroundColor = color;
                p.style.color = color; // Cho bóng
                p.style.left = `${x}%`;
                p.style.top = `${y}%`;
                p.style.setProperty('--tw-x', `${tx}px`);
                p.style.setProperty('--tw-y', `${ty}px`);
                p.style.animation = `firework-burst 1.5s cubic-bezier(0.1, 0.5, 0.5, 1) forwards`;
                fxContainer.appendChild(p);
                setTimeout(() => p.remove(), 1500);
            }
        }

        // --- Hàm hỗ trợ vẽ khối số 3D ---
        function getNumberHtml(item, isLarge = true) {
            const sizeClass = isLarge ? "w-[70px] h-[70px] md:w-[100px] md:h-[100px]" : "w-[60px] h-[60px] md:w-[80px] md:h-[80px]"; 
            const textClass = isLarge ? "text-4xl md:text-[3.5rem]" : "text-3xl md:text-5xl";

            // Khối kẹo 3D có bóng và góc bo tròn
            return `
                <div class="relative flex shrink-0 items-center justify-center transition-transform hover:scale-110 p-2">
                    <div class="${sizeClass} ${item.color} rounded-[1.25rem] md:rounded-[1.75rem] flex items-center justify-center ${textClass} font-black text-white shadow-[inset_0_-8px_0_rgba(0,0,0,0.2),0_10px_15px_-3px_rgba(0,0,0,0.3)] border-t-4 border-white/40">
                        ${item.value}
                    </div>
                </div>
            `;
        }

        // --- Logic chính ---
        function loadQuestion() {
            if (currentQuestionIndex >= totalQuestions) {
                showGameOver();
                return;
            }
            isChecking = false;
            const q = questions[currentQuestionIndex];
            
            patternDisplay.innerHTML = '';
            
            q.pattern.forEach((item, idx) => {
                const el = document.createElement('div');
                el.className = 'bounce-pop shrink-0';
                el.style.animationDelay = `${idx * 0.1}s`;
                el.innerHTML = getNumberHtml(item);
                patternDisplay.appendChild(el);
            });
            
            // Dấu chấm hỏi (nằm cùng trên 1 hàng)
            const questionMark = document.createElement('div');
            questionMark.className = 'bounce-pop shrink-0';
            questionMark.style.animationDelay = `${q.pattern.length * 0.1}s`;
            questionMark.innerHTML = `
                <div class="relative flex items-center justify-center p-2">
                    <div class="w-[70px] h-[70px] md:w-[100px] md:h-[100px] bg-white border-4 border-dashed border-indigo-300 rounded-[1.25rem] md:rounded-[1.75rem] flex items-center justify-center text-5xl md:text-7xl font-black text-indigo-200 shadow-inner">?</div>
                </div>
            `;
            patternDisplay.appendChild(questionMark);

            optionsDisplay.innerHTML = '';
            [...q.options].sort(() => Math.random() - 0.5).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn-candy bg-white rounded-[2.5rem] p-6 shadow-xl border-4 border-slate-50 hover:bg-slate-50 active:bg-indigo-50 transition-colors';
                btn.innerHTML = getNumberHtml(opt, false);
                btn.onclick = () => handleChoice(opt, btn);
                optionsDisplay.appendChild(btn);
            });

            updateUI();
        }

        function handleChoice(selected, btn) {
            if (isChecking) return;
            isChecking = true;
            initAudio();
            clickSynth.triggerAttackRelease('C4', '8n');

            const correct = questions[currentQuestionIndex].correct;
            // Chỉ cần so sánh giá trị value cho mảng số
            const isMatch = selected.value === correct.value;

            if (isMatch) {
                correctSynth.triggerAttackRelease(["C5", "E5", "G5"], "0.3");
                createConfetti();
                feedbackContent.textContent = "GREAT!";
                feedbackContent.className = "text-8xl md:text-[10rem] font-black text-green-500 drop-shadow-2xl transform scale-100 transition-transform duration-500";
                feedbackModal.classList.remove('hidden');
                
                // Kiểm tra xem đã trả lời đúng mỗi 3 câu chưa (câu 3, 6, 9, 12, 15)
                if ((currentQuestionIndex + 1) % 3 === 0) {
                    setTimeout(() => {
                        feedbackModal.classList.add('hidden');
                        feedbackContent.classList.add('scale-0');
                        showMiniGame();
                    }, 1400);
                } else {
                    setTimeout(() => {
                        feedbackModal.classList.add('hidden');
                        feedbackContent.classList.add('scale-0');
                        currentQuestionIndex++;
                        if (currentQuestionIndex >= totalQuestions) {
                            showGameOver();
                        } else {
                            loadQuestion();
                        }
                    }, 1400);
                }
            } else {
                incorrectSynth.triggerAttackRelease(["C4", "B3"], "0.3");
                document.getElementById('game-container').classList.add('shake');
                btn.classList.add('bg-red-50', 'border-red-200');
                
                feedbackContent.textContent = "TRY AGAIN!";
                feedbackContent.className = "text-7xl md:text-9xl font-black text-red-500 drop-shadow-2xl transform scale-100 transition-transform duration-500";
                feedbackModal.classList.remove('hidden');

                setTimeout(() => {
                    document.getElementById('game-container').classList.remove('shake');
                    btn.classList.remove('bg-red-50', 'border-red-200');
                    feedbackModal.classList.add('hidden');
                    feedbackContent.classList.add('scale-0');
                    isChecking = false;
                }, 1000);
            }
        }

        // --- MINI GAME: FIND HIDDEN ITEMS ---
        function showMiniGame() {
            minigameModal.classList.remove('hidden');
            minigameModal.classList.add('flex');
            document.getElementById('minigame-result').classList.add('hidden');
            document.getElementById('minigame-result').classList.remove('flex');
            
            const area = document.getElementById('minigame-area');
            const targetContainer = document.getElementById('minigame-targets');
            area.innerHTML = '';
            targetContainer.innerHTML = '';
            minigameFound = 0;

            // Pick a random target
            const targetEmoji = miniGameEmojis[Math.floor(Math.random() * miniGameEmojis.length)];
            
            // Draw targets in search bar (mờ đi nhưng vẫn giữ nguyên màu sắc, không dùng grayscale)
            for(let i=0; i<minigameTargetCount; i++) {
                const span = document.createElement('span');
                span.textContent = targetEmoji;
                span.className = 'opacity-30 transition-all duration-300 transform scale-90'; // Mờ và nhỏ hơn chút
                span.id = `target-icon-${i}`;
                targetContainer.appendChild(span);
            }

            // Generate icons in area
            const itemsToPlace = [];
            // 3 target items
            for(let i=0; i<minigameTargetCount; i++) itemsToPlace.push({ isTarget: true, emoji: targetEmoji });
            
            // ~45 random distractor items
            for(let i=0; i<45; i++) {
                let randomEmoji;
                do { randomEmoji = miniGameEmojis[Math.floor(Math.random() * miniGameEmojis.length)]; } while(randomEmoji === targetEmoji);
                itemsToPlace.push({ isTarget: false, emoji: randomEmoji });
            }

            // Shuffle array
            itemsToPlace.sort(() => Math.random() - 0.5);

            // Place in area
            itemsToPlace.forEach(item => {
                const el = document.createElement('div');
                el.textContent = item.emoji;
                el.className = 'absolute text-5xl md:text-6xl cursor-pointer hover:scale-125 transition-transform select-none emoji-outline z-10';
                
                // Random position (padding 5% - 85% to avoid clipping edges completely)
                el.style.left = `${5 + Math.random() * 80}%`;
                el.style.top = `${5 + Math.random() * 80}%`;
                // Random rotation
                el.style.transform = `rotate(${Math.random() * 360}deg)`;
                
                el.onclick = () => {
                    if (item.isTarget && !el.classList.contains('found')) {
                        // Correct item found
                        el.classList.add('found', 'scale-150', 'opacity-0', 'pointer-events-none');
                        el.classList.remove('hover:scale-125');
                        el.style.transition = 'all 0.5s ease-out';
                        el.style.zIndex = '50'; // bring to front when animating out
                        
                        correctSynth.triggerAttackRelease("E5", "0.1");
                        
                        // Update search bar icon (làm rõ lên, phóng to)
                        const targetIcon = document.getElementById(`target-icon-${minigameFound}`);
                        targetIcon.classList.remove('opacity-30', 'scale-90');
                        targetIcon.classList.add('opacity-100', 'scale-125', 'drop-shadow-md');
                        
                        minigameFound++;
                        
                        if (minigameFound === minigameTargetCount) {
                            setTimeout(winMiniGame, 600);
                        }
                    } else if (!item.isTarget) {
                        // Wrong item clicked
                        incorrectSynth.triggerAttackRelease(["C4"], "0.2");
                        el.classList.add('shake');
                        setTimeout(() => el.classList.remove('shake'), 500);
                    }
                };
                area.appendChild(el);
            });
            
            speak("Find the hidden items!");
        }

        function winMiniGame() {
            bonusSynth.triggerAttackRelease(["G4", "B4", "D5"], "0.5");
            score++;
            updateUI();
            
            // Give a random treasure
            const treasure = treasures[Math.floor(Math.random() * treasures.length)];
            const firstChar = treasure.name.charAt(0).toLowerCase();
            const article = ['a', 'e', 'i', 'o', 'u'].includes(firstChar) ? 'an' : 'a';

            const resultContainer = document.getElementById('minigame-result');
            const resultText = document.getElementById('minigame-result-text');
            const resultIcon = document.getElementById('minigame-result-icon');
            
            resultText.textContent = `You found ${article} ${treasure.name}!`;
            resultIcon.textContent = treasure.icon;
            
            resultContainer.classList.remove('hidden');
            resultContainer.classList.add('flex');
            createConfetti();

            setTimeout(() => {
                minigameModal.classList.add('hidden');
                minigameModal.classList.remove('flex');
                currentQuestionIndex++;
                if (currentQuestionIndex >= totalQuestions) {
                    showGameOver();
                } else {
                    loadQuestion();
                }
            }, 3500);
        }

        function updateUI() {
            scoreEl.textContent = `✨ TREASURES: ${score}`;
            progressTextEl.textContent = `LEVEL ${Math.min(currentQuestionIndex + 1, totalQuestions)} / ${totalQuestions}`;
            progressBarEl.style.width = `${(currentQuestionIndex / totalQuestions) * 100}%`;
        }

        function showGameOver() {
            document.getElementById('final-score').textContent = `Treasures Found: ${score}`;
            gameOverModal.classList.remove('hidden');
            
            if (gameOverLoop) clearInterval(gameOverLoop);
            gameOverLoop = setInterval(() => {
                launchFirework();
                if (Math.random() > 0.3) createConfetti();
            }, 600);
            
            // Initial blast
            launchFirework();
            launchFirework();
            createConfetti();
        }

        // --- Khởi tạo sự kiện ---
        startBtn.onclick = () => {
            initAudio();
            startScreen.classList.add('hidden');
            loadQuestion();
        };

        document.getElementById('play-again-button').onclick = () => {
            if (gameOverLoop) clearInterval(gameOverLoop);
            score = 0;
            currentQuestionIndex = 0;
            gameOverModal.classList.add('hidden');
            fxContainer.innerHTML = ''; // Dọn dẹp pháo hoa cũ
            loadQuestion();
        };

        document.getElementById('replay-speech-button').onclick = () => {
            initAudio();
            if (!minigameModal.classList.contains('hidden')) {
                speak("Find the hidden items!");
            } else if (!gameOverModal.classList.contains('hidden')) {
                speak("Super star! You found all the patterns!");
            } else {
                speak("What comes next?");
            }
        };
    </script>
</body>
</html>
