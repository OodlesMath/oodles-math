<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Game: Tens & Ones (Beautiful Edition)</title>
    <!-- 100% Poppins Font for clean, Duolingo-style text -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            /* Duolingo Color Palette (Ver 13 Style) */
            --c-blue: #1CB0F6;
            --c-blue-dark: #1899D6;
            --c-green: #58CC02;
            --c-green-dark: #58A700;
            --c-red: #FF4B4B;
            --c-red-dark: #EA2B2B;
            --c-yellow: #FFC800;
            --c-yellow-dark: #E5B400;
            --c-purple: #CE82FF;
            --c-purple-dark: #A568CC;
            --c-gray-light: #F7F7F8;
            --c-gray-mid: #E5E5E5;
            --c-gray-dark: #AFAFAF;
            --c-text-main: #4B4B4B;
            
            --font-main: 'Poppins', sans-serif;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: var(--font-main);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            60% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); }
        }

        .animate-shake { animation: shake 0.3s ease-in-out; }
        .animate-bounceIn { animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        body {
            /* Beautiful pastel gradient background */
            background: linear-gradient(-45deg, #FF9A9E, #FECFEF, #A1C4FD, #C2E9FB);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--c-text-main);
            touch-action: manipulation;
            overflow-x: hidden;
        }

        /* App Container */
        #app-wrapper {
            width: 100%;
            max-width: 800px; 
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Header */
        header {
            background: #ffffff;
            padding: 12px 20px;
            border-radius: 20px;
            border: 2px solid var(--c-gray-mid);
            border-bottom: 6px solid var(--c-gray-mid);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            flex-wrap: wrap; 
            gap: 15px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .title-group h1 {
            color: var(--c-text-main);
            font-size: 1.6rem;
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .score-board {
            background: var(--c-purple);
            color: white;
            padding: 8px 15px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 800;
            border-bottom: 4px solid var(--c-purple-dark);
            text-align: center;
            letter-spacing: 1px;
        }
        .score-board.score { background: var(--c-yellow); border-bottom-color: var(--c-yellow-dark); }

        .btn-icon {
            background: #ffffff;
            border: 2px solid var(--c-gray-mid);
            border-bottom: 4px solid var(--c-gray-mid);
            border-radius: 12px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
        }
        .btn-icon svg { width: 22px; height: 22px; fill: var(--c-gray-dark); transition: fill 0.2s; }
        .btn-icon:active { transform: translateY(4px); border-bottom: 0px; margin-bottom: 4px; }

        /* Operation Selector */
        .op-selector {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
        }
        .op-btn {
            flex: 1;
            max-width: 200px;
            padding: 12px;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 900;
            text-transform: uppercase;
            border: 2px solid var(--c-gray-mid);
            border-bottom: 6px solid var(--c-gray-mid);
            background: white;
            color: var(--c-gray-dark);
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .op-btn svg { width: 24px; height: 24px; stroke: currentColor; }
        .op-btn.active {
            background: var(--c-blue);
            color: white;
            border-color: var(--c-blue-dark);
            border-bottom-color: var(--c-blue-dark);
        }
        .op-btn:active:not(:disabled) { transform: translateY(6px); border-bottom-width: 0px; margin-bottom: 6px; }
        .op-btn.disabled-state { opacity: 0.5; pointer-events: none; }

        /* EQUATION CARD */
        .equation-card {
            background: white;
            border-radius: 20px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            border: 2px solid var(--c-gray-mid);
            border-bottom: 6px solid var(--c-gray-mid);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .eq-nums {
            font-size: 3.5rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 15px;
            line-height: 1;
        }
        .eq-sign { color: var(--c-gray-dark); font-size: 2.5rem; font-weight: 700; }
        .eq-ans { color: var(--c-text-main); font-size: 3.5rem; }

        /* Hint & Action Area */
        .hint-bar {
            text-align: center;
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--c-text-main);
            background: rgba(255,255,255,0.7);
            padding: 8px 20px;
            border-radius: 20px;
            width: fit-content;
            margin: 0 auto;
        }

        .btn-primary {
            background: var(--c-green);
            color: white;
            border: none;
            border-bottom: 6px solid var(--c-green-dark);
            padding: 16px 40px;
            font-size: 1.5rem;
            font-weight: 800;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.1s;
            text-transform: uppercase;
        }
        .btn-primary:active { transform: translateY(6px); border-bottom: 0px; margin-bottom: 6px; }

        /* MAIN GAME AREA & BOARD */
        .game-area {
            background: white;
            border-radius: 24px;
            width: 100%;
            display: flex;
            flex-direction: column;
            border: 2px solid var(--c-gray-mid);
            border-bottom: 8px solid var(--c-gray-mid);
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            flex: 1;
            min-height: 350px;
        }

        .board-headers {
            display: flex;
            padding: 15px 15px 5px 15px;
            gap: 15px;
            background: var(--c-gray-light);
        }
        .col-header {
            flex: 1;
            text-align: center;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
            padding-bottom: 5px;
        }
        .header-tens { color: var(--c-blue-dark); border-bottom: 4px solid var(--c-blue-dark); }
        .header-ones { color: var(--c-green-dark); border-bottom: 4px solid var(--c-green-dark); }

        .board-cols-wrapper {
            flex: 1;
            display: flex;
            flex-direction: row;
            background: var(--c-gray-light);
            padding: 0 15px 15px 15px;
            position: relative;
        }

        .col-divider {
            width: 4px;
            background: var(--c-gray-mid);
            border-radius: 2px;
            margin: 10px 10px;
        }

        .col-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 10px;
            position: relative;
            border-radius: 16px;
        }

        .col-section {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            align-content: flex-start;
        }

        .dashed-divider {
            width: 100%;
            height: 4px;
            background: repeating-linear-gradient(90deg, var(--c-gray-dark), var(--c-gray-dark) 8px, transparent 8px, transparent 16px);
            margin: 10px 0;
            opacity: 0.4;
        }

        .zero-placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            font-weight: 900;
            color: var(--c-gray-mid);
            pointer-events: none;
        }

        /* MANUAL CONTROLS (Replacing drag supply from Ver 13) */
        .supply-panel {
            background: white;
            padding: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: stretch;
            border-top: 4px solid var(--c-gray-mid);
            flex-wrap: wrap;
        }

        .supply-btn {
            flex: 1;
            min-width: 70px;
            max-width: 150px;
            border-radius: 16px;
            border: 2px solid;
            border-bottom-width: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 5px;
            font-weight: 900;
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.1s;
            color: white;
        }
        .supply-btn:active:not(.disabled-state) {
            transform: translateY(6px);
            border-bottom-width: 0px;
            margin-bottom: 6px;
        }
        .supply-btn.disabled-state {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        .btn-add { background: var(--c-blue); border-color: var(--c-blue-dark); }
        .btn-sub { background: var(--c-red); border-color: var(--c-red-dark); }

        .btn-make-ten {
            background: var(--c-yellow);
            border-color: var(--c-yellow-dark);
            color: white;
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: 16px;
            font-weight: 900;
            border-bottom-width: 6px;
            border-style: solid;
            cursor: pointer;
            z-index: 10;
        }
        .btn-make-ten:active { transform: translate(-50%, 6px); border-bottom-width: 0; }

        /* BEAUTIFUL 3D BLOCKS */
        .ten-rod {
            display: flex;
            flex-direction: row; 
            background-color: var(--c-blue);
            border-radius: 8px;
            border: 2px solid var(--c-blue-dark);
            border-bottom: 6px solid var(--c-blue-dark);
            width: 100%;
            max-width: 280px; 
            cursor: pointer;
            transition: transform 0.1s;
            overflow: hidden;
            box-shadow: inset 0 3px 4px rgba(255,255,255,0.3); 
        }
        .ten-rod:active { transform: scale(0.95); }
        
        .ten-block {
            flex: 1;
            aspect-ratio: 1 / 1; 
            border-right: 2px solid rgba(0,0,0,0.15); 
            position: relative;
        }
        .ten-block::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 40%; height: 40%;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            box-shadow: inset 0 -2px 2px rgba(0,0,0,0.1), inset 0 2px 2px rgba(255,255,255,0.4);
        }
        .ten-block:last-child { border-right: none; }

        .one-cube {
            width: 100%;
            max-width: 36px; 
            aspect-ratio: 1 / 1; 
            background-color: var(--c-green);
            border-radius: 6px;
            border: 2px solid var(--c-green-dark);
            border-bottom: 6px solid var(--c-green-dark);
            cursor: pointer;
            transition: transform 0.1s;
            position: relative;
            box-shadow: inset 0 3px 4px rgba(255,255,255,0.3);
        }
        .one-cube:active { transform: scale(0.9); }
        .one-cube::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 40%; height: 40%;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            box-shadow: inset 0 -2px 2px rgba(0,0,0,0.1), inset 0 2px 2px rgba(255,255,255,0.4);
        }

        /* OPTIONS GRID */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }
        .opt-btn {
            height: 80px;
            background: white;
            border-radius: 20px;
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--c-blue);
            border: 2px solid var(--c-gray-mid);
            border-bottom: 6px solid var(--c-gray-mid);
            cursor: pointer;
            transition: all 0.1s;
        }
        .opt-btn:active:not(.disabled-state) { transform: translateY(6px); border-bottom: 0px; margin-bottom: 6px; }
        
        .opt-btn.correct { 
            background: var(--c-green); color: white; 
            border-color: var(--c-green-dark); border-bottom-color: var(--c-green-dark); 
        }
        .opt-btn.wrong { 
            background: var(--c-red); color: white; 
            border-color: var(--c-red-dark); border-bottom-color: var(--c-red-dark); 
        }
        .opt-btn.disabled-state { 
            opacity: 0.5; cursor: default; 
            transform: none; border-bottom: 6px solid var(--c-gray-mid); margin-bottom: 0; 
            color: var(--c-gray-dark);
        }

        /* MODALS */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            border: 6px solid var(--c-blue);
            text-align: center;
            position: relative;
        }
        .hidden { display: none !important; }

        @media (max-width: 500px) {
            header { justify-content: center; } 
            .eq-nums { font-size: 2.8rem; }
            .board-cols-wrapper { flex-direction: column; }
            .col-divider { width: 100%; height: 4px; margin: 10px 0; }
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <div id="app-wrapper">
        <header>
            <div class="header-left">
                <div class="title-group">
                    <h1>TENS & ONES</h1>
                </div>
                <div class="controls">
                     <div class="score-board">Round: <span id="display-round">1</span>/5</div>
                     <div class="score-board score">★ <span id="display-score">0</span></div>
                     <button class="btn-icon" onclick="resetBoardFull()" title="Reset">
                        <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                     </button>
                </div>
            </div>
        </header>

        <!-- START SCREEN -->
        <div id="start-screen" class="modal-overlay hidden">
            <!-- Handled via setup directly for smoother flow, but kept structure if needed -->
        </div>

        <!-- MAIN PLAYING SCREEN -->
        <div id="playing-screen" style="display: flex; flex-direction: column; flex: 1; gap: 15px;">
            
            <!-- Operation Selector -->
            <div class="op-selector" id="op-selector">
                <button id="btn-op-add" class="op-btn active" onclick="setOp('+')">
                    <svg fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M12 4v16m8-8H4"></path></svg> ADD
                </button>
                <button id="btn-op-sub" class="op-btn" onclick="setOp('-')">
                    <svg fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M20 12H4"></path></svg> SUB
                </button>
            </div>

            <!-- Hint Bar -->
            <div class="hint-bar" id="hint-text">Build your starting number!</div>

            <!-- Equation Card -->
            <div class="equation-card">
                <div class="eq-nums">
                    <span style="color:var(--c-blue)" id="eq-num1">_</span>
                    <span class="eq-sign" id="eq-op">
                        <svg class="w-8 h-8" style="width:32px;height:32px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M12 4v16m8-8H4"></path></svg>
                    </span>
                    <span style="color:var(--c-red)" id="eq-num2">_</span>
                    <span class="eq-sign">=</span>
                    <span class="eq-ans" id="eq-ans">?</span>
                </div>
            </div>

            <!-- Game Area -->
            <div class="game-area relative">
                <div class="board-headers">
                    <div class="col-header header-tens">TENS</div>
                    <div class="col-header header-ones">ONES</div>
                </div>
                
                <div class="board-cols-wrapper">
                    <div class="col-content" id="tens-col">
                        <div id="tens-zero" class="zero-placeholder">0</div>
                        <div class="col-section" id="tens-container"></div>
                    </div>
                    
                    <div class="col-divider"></div>
                    
                    <div class="col-content" id="ones-col">
                        <div id="ones-zero" class="zero-placeholder">0</div>
                        <div class="col-section" id="ones-container"></div>
                        
                        <!-- Make Ten Button Overlay -->
                        <button id="regroup-hint" class="btn-make-ten hidden" onclick="regroupTen()">
                            MAKE TEN!
                        </button>
                    </div>
                </div>

                <!-- Manual Controls Panel -->
                <div class="supply-panel" id="manual-controls">
                    <div class="supply-btn btn-sub" id="btn-sub-ten" onclick="removeTen()"><span>- 10</span></div>
                    <div class="supply-btn btn-add" id="btn-add-ten" onclick="addTen()"><span>+ 10</span></div>
                    <div class="supply-btn btn-add" id="btn-add-one" onclick="addOne()"><span>+ 1</span></div>
                    <div class="supply-btn btn-sub" id="btn-sub-one" onclick="removeOne()"><span>- 1</span></div>
                </div>
            </div>

            <!-- Lock Number Area -->
            <div id="action-area" style="display: flex; justify-content: center; width: 100%;">
                <button id="btn-confirm-1" onclick="confirmStep1()" class="btn-primary">Lock Number & Start!</button>
            </div>

            <!-- Options Grid -->
            <div class="options-grid hidden" id="mcq-options-container"></div>
        </div>

        <!-- TOWER MODAL -->
        <div id="tower-modal" class="modal-overlay hidden animate-bounceIn">
            <div class="modal-content" style="border-color: var(--c-blue); padding: 20px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px; background: var(--c-gray-light); padding: 10px 15px; border-radius: 16px;">
                    <h2 style="margin:0; color: var(--c-blue); font-size: 1.5rem; font-weight: 900;">Bonus Game!</h2>
                    <div style="font-weight: 800; color: var(--c-gray-dark);">Score: <span id="tower-score-display" style="color: var(--c-blue);">0</span>/10</div>
                </div>
                
                <div style="position: relative; border-radius: 16px; overflow: hidden; border: 4px solid var(--c-gray-light);">
                    <canvas id="gameCanvas" style="width:100%; height:300px; display:block; background:#fff;"></canvas>
                    
                    <div id="tower-overlay" style="position: absolute; inset: 0; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;">
                        <div style="font-size: 4rem; margin-bottom: 10px;">🧱</div>
                        <h3 style="font-size: 1.8rem; font-weight: 900; margin-bottom: 20px; color: var(--c-text-main);">Stack the blocks!</h3>
                        <button class="btn-primary" onclick="startTowerGame()" style="font-size: 1.2rem; padding: 10px 30px;">PLAY</button>
                    </div>

                    <div id="tower-result-overlay" class="hidden" style="position: absolute; inset: 0; background: rgba(255,255,255,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;">
                        <div id="tower-result-emoji" style="font-size: 5rem; margin-bottom: 10px;">🏆</div>
                        <h3 id="tower-status-text" style="font-size: 2rem; font-weight: 900; margin-bottom: 20px;"></h3>
                        <button class="btn-primary" onclick="closeTowerGame()" style="background: var(--c-blue); border-color: var(--c-blue-dark); font-size: 1.2rem; padding: 10px 30px;">Next Problem ➔</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- END GAME MODAL -->
        <div id="end-game-modal" class="modal-overlay hidden">
            <canvas id="fireworksCanvas" style="position: absolute; inset: 0; pointer-events: none; z-index: 10;"></canvas>
            <div class="modal-content animate-bounceIn" style="border-color: var(--c-yellow); z-index: 20;">
                <div style="font-size: 5rem; margin-top: -60px; margin-bottom: 10px;">🌟</div>
                <h1 style="font-size: 3rem; font-weight: 900; color: var(--c-red); margin: 0 0 10px 0; text-transform: uppercase;">You Did It!</h1>
                <p style="font-size: 1.2rem; color: var(--c-gray-dark); font-weight: 700; margin-bottom: 20px;">You are a math superstar!</p>
                
                <div style="background: var(--c-gray-light); border-radius: 20px; padding: 20px; margin-bottom: 25px;">
                    <div style="font-size: 1rem; color: var(--c-gray-dark); font-weight: 800; text-transform: uppercase; margin-bottom: 5px;">Final Score</div>
                    <div style="font-size: 4rem; font-weight: 900; color: var(--c-blue);"><span id="final-score-display">0</span> 🏆</div>
                </div>
                
                <button onclick="playAgain()" class="btn-primary" style="width: 100%;">PLAY AGAIN!</button>
            </div>
        </div>

    </div>

    <script>
        /* --- AUDIO SYSTEM --- */
        let audioCtx = null;
        
        function initAudio() {
            if (!audioCtx) {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if(AudioContextClass) audioCtx = new AudioContextClass();
            }
        }

        function playSound(type) {
            initAudio();
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            if (type === 'pop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'delete') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(150, now + 0.15);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'magic') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.setValueAtTime(800, now + 0.1);
                osc.frequency.setValueAtTime(1200, now + 0.2);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'win') {
                const freqs = [440, 554.37, 659.25, 880];
                freqs.forEach((f, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.type = 'sine';
                    o.frequency.value = f;
                    const t = now + (i * 0.1);
                    g.gain.setValueAtTime(0, t);
                    g.gain.linearRampToValueAtTime(0.2, t + 0.05);
                    g.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
                    o.start(t); o.stop(t + 0.3);
                });
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.linearRampToValueAtTime(150, now + 0.3);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            }
        }

        /* --- GAME STATE --- */
        let step = 1; 
        let operation = '+'; 
        let num1 = 0, initialTens = 0, initialOnes = 0;
        let tens = 0, ones = 0;
        let globalScore = 0;
        let currentRound = 1;
        const MAX_ROUNDS = 5;
        const MAX_TENS = 20, MAX_ONES = 30;
        
        // DOM Elements
        const tensContainer = document.getElementById('tens-container');
        const onesContainer = document.getElementById('ones-container');
        const mcqOptions = document.getElementById('mcq-options-container');
        const btnConfirm1 = document.getElementById('btn-confirm-1');
        const eqAns = document.getElementById('eq-ans');
        const hintText = document.getElementById('hint-text');
        
        function updateHints() {
            if (step === 1) {
                hintText.innerHTML = `Build your starting number!`;
                hintText.style.color = "var(--c-text-main)";
            } else {
                let current = tens * 10 + ones;
                let n2 = (operation === '+') ? (current - num1) : (num1 - current);

                if (n2 <= 0) {
                    hintText.innerHTML = operation === '+' ? "Add blocks using the buttons below!" : "Tap blocks to remove them!";
                    hintText.style.color = "var(--c-blue)";
                } else {
                    hintText.innerHTML = "Choose the correct answer!";
                    hintText.style.color = "var(--c-green)";
                }
            }
        }

        function setOp(op) {
            if (step === 2) return;
            operation = op;
            const btnAdd = document.getElementById('btn-op-add');
            const btnSub = document.getElementById('btn-op-sub');
            const eqOp = document.getElementById('eq-op');
            
            const svgPlus = `<svg style="width:32px;height:32px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M12 4v16m8-8H4"></path></svg>`;
            const svgMinus = `<svg style="width:32px;height:32px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M20 12H4"></path></svg>`;

            if (op === '+') {
                btnAdd.classList.add('active');
                btnSub.classList.remove('active');
                eqOp.innerHTML = svgPlus;
            } else {
                btnSub.classList.add('active');
                btnAdd.classList.remove('active');
                eqOp.innerHTML = svgMinus;
            }
            playSound('pop');
            updateCalculatorUI();
            updateHints();
        }

        function confirmStep1() {
            num1 = tens * 10 + ones;
            if (num1 === 0) {
                hintText.innerHTML = "⚠️ Please add some blocks first!";
                hintText.style.color = "var(--c-red)";
                hintText.classList.add('animate-shake');
                setTimeout(() => {
                    hintText.classList.remove('animate-shake');
                    updateHints();
                }, 2000);
                return; 
            }
            initialTens = tens; 
            initialOnes = ones; 
            step = 2;
            playSound('magic');
            
            // UI Updates
            document.getElementById('op-selector').classList.add('disabled-state');
            document.getElementById('action-area').classList.add('hidden'); 
            
            updateUI(); 
            updateCalculatorUI();
            updateHints();
        }

        function updateCalculatorUI() {
            let current = tens * 10 + ones;
            let n2 = 0;
            
            if (step === 1) { 
                document.getElementById('eq-num1').textContent = current || "_"; 
                document.getElementById('eq-num2').textContent = "_";
                eqAns.textContent = "?";
                eqAns.style.color = "var(--c-text-main)";
                mcqOptions.classList.add('hidden');
            } else {
                document.getElementById('eq-num1').textContent = num1;
                n2 = (operation === '+') ? (current - num1) : (num1 - current);
                document.getElementById('eq-num2').textContent = n2 <= 0 ? "_" : n2;
                
                if (n2 > 0) {
                     mcqOptions.classList.remove('hidden');
                     generateOptions(); 
                } else {
                     mcqOptions.classList.add('hidden');
                }
            }
            
            document.getElementById('display-round').textContent = currentRound;
            document.getElementById('display-score').textContent = globalScore;
            
            if (step === 2) updateHints();
        }

        function generateOptions() {
            if (step !== 2) return;
            let currentDisplayNumber = tens * 10 + ones;
            let correctAns = currentDisplayNumber; 
            
            let options = new Set([correctAns]);
            while(options.size < 4) {
                let offset = (Math.floor(Math.random() * 5) + 1);
                let sign = Math.random() > 0.5 ? 1 : -1;
                let dist = correctAns + (sign * offset);
                if (options.size === 1 && correctAns > 10) options.add(correctAns - 10);
                else if (options.size === 2 && correctAns < 90) options.add(correctAns + 10);
                else if (dist >= 0) options.add(dist);
            }
            
            mcqOptions.innerHTML = '';
            Array.from(options).sort(() => Math.random() - 0.5).forEach(v => {
                const b = document.createElement('button');
                b.className = "opt-btn";
                b.textContent = v;
                b.onclick = () => handleAnswer(v, correctAns, b);
                mcqOptions.appendChild(b);
            });
        }

        function handleAnswer(selectedValue, correctAns, btnElement) {
            if (selectedValue === correctAns) {
                btnElement.classList.add('correct');
                eqAns.textContent = selectedValue; 
                eqAns.style.color = "var(--c-green)";
                
                globalScore += 10; 
                document.getElementById('display-score').textContent = globalScore;
                playSound('win');
                
                Array.from(mcqOptions.children).forEach(child => child.classList.add('disabled-state'));
                disableAllBlockControls();
                
                setTimeout(() => { 
                    if (currentRound >= MAX_ROUNDS) {
                        showEndScreen();
                    } else {
                        document.getElementById('tower-modal').classList.remove('hidden'); 
                    }
                }, 1000);
                
            } else {
                btnElement.classList.add('wrong', 'animate-shake');
                playSound('wrong');
                setTimeout(() => {
                    btnElement.classList.remove('animate-shake');
                }, 400);
            }
        }

        function disableAllBlockControls() {
            document.getElementById('btn-add-ten').classList.add('disabled-state');
            document.getElementById('btn-sub-ten').classList.add('disabled-state');
            document.getElementById('btn-add-one').classList.add('disabled-state');
            document.getElementById('btn-sub-one').classList.add('disabled-state');
            
            // disable click on blocks
            const blocks = document.querySelectorAll('.ten-rod, .one-cube');
            blocks.forEach(b => b.style.pointerEvents = 'none');
        }

        /* --- VISUAL BLOCK GENERATION --- */
        function createTenRod(isBase) {
            const rod = document.createElement('div');
            rod.className = "ten-rod";
            for (let i = 0; i < 10; i++) {
                const seg = document.createElement('div');
                seg.className = "ten-block";
                rod.appendChild(seg);
            }

            const handleClick = (e) => {
                if(step === 2 && operation === '+' && isBase) {
                    rod.classList.add('animate-shake');
                    setTimeout(() => rod.classList.remove('animate-shake'), 300);
                    return; 
                }
                if(step === 1 || (step === 2 && operation === '-')) {
                    if(tens > 0) { 
                        tens--; 
                        playSound('delete'); 
                        updateUI(); 
                        updateCalculatorUI(); 
                    }
                }
            };
            rod.onclick = handleClick;
            return rod;
        }

        function createOneCube(isBase) {
            const cube = document.createElement('div'); 
            cube.className = "one-cube";
            
            const handleCubeClick = () => {
                if(step === 2 && operation === '+' && isBase) {
                    cube.classList.add('animate-shake');
                    setTimeout(() => cube.classList.remove('animate-shake'), 300);
                    return;
                }
                if(step === 1 || (step === 2 && operation === '-')) {
                    if(ones > 0) { 
                        ones--; 
                        playSound('delete'); 
                        updateUI(); 
                        updateCalculatorUI(); 
                    }
                }
            };
            cube.onclick = handleCubeClick;
            return cube;
        }

        /* --- UI UPDATER --- */
        function updateUI() {
            tensContainer.innerHTML = '';
            let baseTensCount = (step === 2 && operation === '+') ? initialTens : 0;
            
            for (let i = 0; i < tens; i++) {
                let isBase = (i < baseTensCount);
                if (step === 2 && operation === '+' && i === initialTens && initialTens > 0) {
                    const d = document.createElement('div'); 
                    d.className = "dashed-divider";
                    tensContainer.appendChild(d);
                }
                tensContainer.appendChild(createTenRod(isBase));
            }
            
            onesContainer.innerHTML = '';
            let baseOnesCount = (step === 2 && operation === '+') ? initialOnes : 0;

            for (let i = 0; i < ones; i++) {
                let isBase = (i < baseOnesCount);
                if (step === 2 && operation === '+' && i === initialOnes && initialOnes > 0) {
                    const d = document.createElement('div'); 
                    d.className = "dashed-divider";
                    onesContainer.appendChild(d);
                }
                onesContainer.appendChild(createOneCube(isBase));
            }

            // --- Button States Control ---
            const btnAddTen = document.getElementById('btn-add-ten');
            const btnSubTen = document.getElementById('btn-sub-ten');
            const btnAddOne = document.getElementById('btn-add-one');
            const btnSubOne = document.getElementById('btn-sub-one');

            btnAddTen.classList.remove('disabled-state');
            btnSubTen.classList.remove('disabled-state');
            btnAddOne.classList.remove('disabled-state');
            btnSubOne.classList.remove('disabled-state');

            if (step === 2) {
                if (operation === '-') {
                    btnAddTen.classList.add('disabled-state'); btnAddOne.classList.add('disabled-state');
                    if(tens <= 0) btnSubTen.classList.add('disabled-state');
                    if(ones <= 0) btnSubOne.classList.add('disabled-state');
                } else {
                    if(tens >= MAX_TENS) btnAddTen.classList.add('disabled-state');
                    if(ones >= MAX_ONES) btnAddOne.classList.add('disabled-state');
                    if(tens <= initialTens) btnSubTen.classList.add('disabled-state');
                    if(ones <= initialOnes) btnSubOne.classList.add('disabled-state');
                }
            } else {
                if(tens >= MAX_TENS) btnAddTen.classList.add('disabled-state');
                if(ones >= MAX_ONES) btnAddOne.classList.add('disabled-state');
                if(tens <= 0) btnSubTen.classList.add('disabled-state');
                if(ones <= 0) btnSubOne.classList.add('disabled-state');
            }
            
            // Regroup hint (Ones to Ten)
            if (ones >= 10) { 
                document.getElementById('regroup-hint').classList.remove('hidden'); 
            } else {
                document.getElementById('regroup-hint').classList.add('hidden');
            }

            // Zeros background
            document.getElementById('tens-zero').style.display = tens === 0 ? 'block' : 'none';
            document.getElementById('ones-zero').style.display = ones === 0 ? 'block' : 'none';
        }

        // Manual controls
        function addOne() { if (ones < MAX_ONES) { ones++; playSound('pop'); updateUI(); updateCalculatorUI(); } }
        function removeOne() { 
            if (ones > 0) { 
                if(step === 2 && operation === '+' && ones <= initialOnes) {
                    playSound('wrong'); return;
                }
                ones--; playSound('delete'); updateUI(); updateCalculatorUI(); 
            } 
        }
        function addTen() { if (tens < MAX_TENS) { tens++; playSound('pop'); updateUI(); updateCalculatorUI(); } }
        function removeTen() { 
            if (tens > 0) { 
                if(step === 2 && operation === '+' && tens <= initialTens) {
                    playSound('wrong'); return;
                }
                tens--; playSound('delete'); updateUI(); updateCalculatorUI(); 
            } 
        }

        function regroupTen() {
            if (tens < MAX_TENS && ones >= 10) { 
                tens++; ones -= 10; 
                if(step === 2 && operation === '+') { initialTens++; initialOnes -= 10; }
                playSound('magic'); updateUI(); updateCalculatorUI();
            }
        }

        function resetBoardFull() {
            step = 1; tens = 0; ones = 0; num1 = 0; initialTens = 0; initialOnes = 0;
            document.getElementById('op-selector').classList.remove('disabled-state');
            document.getElementById('action-area').classList.remove('hidden'); 
            mcqOptions.classList.add('hidden');
            mcqOptions.innerHTML = '';
            eqAns.textContent = "?"; eqAns.style.color = "var(--c-text-main)";
            
            // Re-enable blocks if they were disabled at win state
            const blocks = document.querySelectorAll('.ten-rod, .one-cube');
            blocks.forEach(b => b.style.pointerEvents = 'auto');

            updateUI(); updateCalculatorUI(); updateHints();
        }

        /* --- BONUS MINI GAME (TOWER) --- */
        const towerCanvas = document.getElementById('gameCanvas');
        const tCtx = towerCanvas.getContext('2d');
        const BLOCK_HEIGHT = 28;
        const WIN_LIMIT = 10;
        const COLORS = ['#FFC800', '#FF4B4B', '#1CB0F6', '#58CC02', '#CE82FF'];
        let towerBlocks = [], currentTBlock = null, towerScore = 0, towerCameraY = 0, towerGameState = 'START';

        function initTowerCanvas() {
            const r = towerCanvas.parentElement.getBoundingClientRect();
            towerCanvas.width = r.width; towerCanvas.height = 300;
        }

        class TBlock {
            constructor(x, y, w, color, spd) {
                this.x = x; this.y = y; this.w = w; this.h = BLOCK_HEIGHT; 
                this.color = color; this.spd = spd; this.dir = 1; this.falling = false;
            }
            update() {
                if (!this.falling) {
                    this.x += this.spd * this.dir;
                    if (this.x + this.w > towerCanvas.width || this.x < 0) this.dir *= -1;
                } else this.y += 15;
            }
            draw(ctx, offset) {
                ctx.fillStyle = this.color; 
                ctx.fillRect(this.x, this.y + offset, this.w, this.h);
                
                // 3D Highlight & Shadow
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(this.x, this.y + offset, this.w, 3);
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.fillRect(this.x, this.y + offset + this.h - 3, this.w, 3);
                
                ctx.strokeStyle = '#fff'; 
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x, this.y + offset, this.w, this.h);
            }
        }

        function startTowerGame() {
            initTowerCanvas(); 
            towerGameState = 'PLAYING'; 
            towerBlocks = []; 
            towerScore = 0; 
            towerCameraY = 0;
            document.getElementById('tower-overlay').classList.add('hidden');
            document.getElementById('tower-score-display').textContent = '0';
            
            towerBlocks.push(new TBlock((towerCanvas.width - 140)/2, towerCanvas.height - BLOCK_HEIGHT, 140, '#1CB0F6', 0));
            spawnTBlock(); 
            requestAnimationFrame(animateTower);
            playSound('magic');
        }

        function spawnTBlock() {
            const last = towerBlocks[towerBlocks.length - 1];
            let spd = 2.5 + (towerScore * 0.25);
            if(window.innerWidth < 600) spd *= 0.8; 
            
            currentTBlock = new TBlock(0, last.y - BLOCK_HEIGHT - 120, last.w, COLORS[towerScore % COLORS.length], spd);
        }

        function animateTower() {
            if (towerGameState !== 'PLAYING') return;
            
            // Background
            tCtx.fillStyle = '#EAE8FA';
            tCtx.fillRect(0,0,towerCanvas.width, towerCanvas.height);
            
            // Draw Goal Line
            const goalY = towerBlocks[0].y - (WIN_LIMIT * BLOCK_HEIGHT);
            tCtx.setLineDash([8, 8]); 
            tCtx.strokeStyle = '#FFC800'; 
            tCtx.lineWidth = 4;
            tCtx.beginPath();
            tCtx.moveTo(0, goalY + towerCameraY); 
            tCtx.lineTo(towerCanvas.width, goalY + towerCameraY); 
            tCtx.stroke();
            tCtx.setLineDash([]);

            towerBlocks.forEach(b => b.draw(tCtx, towerCameraY));
            currentTBlock.update(); 
            currentTBlock.draw(tCtx, towerCameraY);
            
            if (currentTBlock.falling) {
                const last = towerBlocks[towerBlocks.length - 1];
                if (currentTBlock.y + BLOCK_HEIGHT >= last.y) {
                    const diff = currentTBlock.x - last.x; 
                    const overlap = currentTBlock.w - Math.abs(diff);
                    
                    if (overlap > 10) { 
                        currentTBlock.falling = false; 
                        currentTBlock.y = last.y - BLOCK_HEIGHT;
                        currentTBlock.w = overlap; 
                        currentTBlock.x = diff > 0 ? last.x + diff : last.x;
                        
                        towerBlocks.push(currentTBlock); 
                        towerScore++;
                        document.getElementById('tower-score-display').textContent = towerScore;
                        playSound('pop');

                        if (currentTBlock.y + towerCameraY < 120) {
                            towerCameraY += BLOCK_HEIGHT;
                        }
                        
                        if (towerScore >= WIN_LIMIT) {
                            endTower('WIN'); 
                        } else {
                            spawnTBlock();
                        }
                    } else {
                        endTower('LOSE');
                    }
                }
            }
            requestAnimationFrame(animateTower);
        }

        function endTower(res) {
            towerGameState = res;
            document.getElementById('tower-result-overlay').classList.remove('hidden');
            const txt = document.getElementById('tower-status-text');
            const emoji = document.getElementById('tower-result-emoji');
            
            if (res === 'WIN') {
                txt.textContent = "Awesome Builder!";
                txt.style.color = "var(--c-green)";
                emoji.textContent = "🏆";
                playSound('win');
                globalScore += 5;
                document.getElementById('display-score').textContent = globalScore;
            } else {
                txt.textContent = "Oops! It fell.";
                txt.style.color = "var(--c-red)";
                emoji.textContent = "💥";
                playSound('wrong');
            }
        }

        function closeTowerGame() {
            document.getElementById('tower-modal').classList.add('hidden');
            document.getElementById('tower-result-overlay').classList.add('hidden');
            document.getElementById('tower-overlay').classList.remove('hidden');
            
            currentRound++;
            resetBoardFull();
        }

        towerCanvas.addEventListener('mousedown', () => { if(currentTBlock && !currentTBlock.falling) currentTBlock.falling = true; });
        towerCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); if(currentTBlock && !currentTBlock.falling) currentTBlock.falling = true; }, {passive:false});

        /* --- END GAME & FIREWORKS --- */
        const fwCanvas = document.getElementById('fireworksCanvas');
        const fwCtx = fwCanvas.getContext('2d');
        let fwParticles = [];
        let fwAnimationId;

        function showEndScreen() {
            document.getElementById('end-game-modal').classList.remove('hidden');
            document.getElementById('final-score-display').textContent = globalScore;
            playSound('win');
            startFireworks();
        }

        function playAgain() {
            document.getElementById('end-game-modal').classList.add('hidden');
            cancelAnimationFrame(fwAnimationId);
            fwParticles = [];
            currentRound = 1;
            globalScore = 0;
            resetBoardFull();
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 3;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.01;
                this.size = Math.random() * 5 + 2;
            }
            update() {
                this.vy += 0.1; 
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.alpha);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function createExplosion(x, y) {
            const colors = ['#1CB0F6', '#58CC02', '#FF4B4B', '#FFC800', '#CE82FF'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            for (let i = 0; i < 60; i++) {
                fwParticles.push(new Particle(x, y, color));
            }
        }

        function animateFireworks() {
            fwCanvas.width = window.innerWidth;
            fwCanvas.height = window.innerHeight;
            fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
            
            if (Math.random() < 0.08) {
                createExplosion(Math.random() * fwCanvas.width, Math.random() * (fwCanvas.height * 0.6));
            }

            for (let i = fwParticles.length - 1; i >= 0; i--) {
                const p = fwParticles[i];
                p.update();
                p.draw(fwCtx);
                if (p.alpha <= 0) fwParticles.splice(i, 1);
            }
            fwAnimationId = requestAnimationFrame(animateFireworks);
        }

        function startFireworks() {
            fwCanvas.width = window.innerWidth;
            fwCanvas.height = window.innerHeight;
            animateFireworks();
        }

        // Initialize UI
        updateUI();
        updateHints();
        
        // Handle resize for canvases
        window.addEventListener('resize', () => {
            if(towerGameState === 'PLAYING') initTowerCanvas();
        });

    </script>
</body>
