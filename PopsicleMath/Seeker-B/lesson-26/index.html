<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Game: Tens & Ones (Ver 3)</title>
    <!-- 100% Poppins Font for clean, Duolingo-style text -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            /* Duolingo Color Palette */
            --c-blue: #1CB0F6;
            --c-blue-dark: #1899D6;
            --c-green: #58CC02;
            --c-green-dark: #58A700;
            --c-red: #FF4B4B;
            --c-red-dark: #EA2B2B;
            --c-yellow: #FFC800;
            --c-yellow-dark: #E5B400;
            --c-purple: #CE82FF;
            --c-purple-dark: #A568CC;
            --c-gray-light: #F7F7F8;
            --c-gray-mid: #E5E5E5;
            --c-gray-dark: #AFAFAF;
            --c-text-main: #4B4B4B;
            
            --font-main: 'Poppins', sans-serif;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: var(--font-main);
        }

        /* ==================================================== */
        /* SCENERY BACKGROUND CSS */
        /* ==================================================== */
        .scenery-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            overflow: hidden;
            background: linear-gradient(to bottom, #6EE2FF, #C9F0FF);
        }
        .scenery-sun {
            position: absolute;
            top: 2rem; left: 2rem;
            width: 5rem; height: 5rem;
            background-color: #FFD166;
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(255,209,102,0.8);
            animation: sun-pulse 4s ease-in-out infinite;
        }
        @media (min-width: 640px) {
            .scenery-sun { top: 4rem; left: 6rem; width: 8rem; height: 8rem; }
        }
        .scenery-rainbow {
            position: absolute;
            bottom: 20%; left: 50%;
            transform: translateX(-50%);
            width: 150%;
            min-width: 800px; max-width: 1400px;
            opacity: 0.6;
        }
        .scenery-cloud {
            position: absolute;
            color: white;
            filter: drop-shadow(0 4px 3px rgba(0,0,0,0.07)) drop-shadow(0 2px 2px rgba(0,0,0,0.06));
        }
        .scenery-cloud-1 { top: 10%; opacity: 0.9; width: 6rem; animation: cloud-fly 45s linear infinite; animation-delay: -5s; }
        .scenery-cloud-2 { top: 25%; opacity: 0.8; width: 8rem; animation: cloud-fly 60s linear infinite; animation-delay: -30s; }
        .scenery-cloud-3 { top: 5%; opacity: 0.8; width: 5rem; animation: cloud-fly 30s linear infinite; animation-delay: -15s; }
        @media (min-width: 640px) {
            .scenery-cloud-1 { width: 9rem; }
            .scenery-cloud-2 { width: 12rem; }
            .scenery-cloud-3 { width: 7rem; }
        }
        .scenery-grass-1 { position: absolute; bottom: 0; width: 100%; height: 25vh; }
        .scenery-grass-2 { position: absolute; bottom: 0; width: 100%; height: 15vh; }
        @media (min-width: 640px) {
            .scenery-grass-1 { height: 30vh; }
            .scenery-grass-2 { height: 20vh; }
        }
        .scenery-flowers-container {
            position: absolute; bottom: 0; width: 100%; height: 15vh;
            overflow: hidden; pointer-events: none;
        }
        .scenery-flower {
            position: absolute;
            animation: wiggle 2s ease-in-out infinite;
        }
        .flower-1 { bottom: 20%; left: 5%; font-size: 1.5rem; }
        .flower-2 { bottom: 40%; left: 25%; font-size: 1.25rem; animation-delay: 0.4s; }
        .flower-3 { bottom: 15%; left: 50%; font-size: 1.875rem; animation-delay: 1s; }
        .flower-4 { bottom: 30%; left: 75%; font-size: 1.5rem; animation-delay: 0.6s; }
        .flower-5 { bottom: 10%; left: 90%; font-size: 1.875rem; animation-delay: 0.2s; }
        @media (min-width: 640px) {
            .flower-1 { font-size: 2.25rem; }
            .flower-2 { font-size: 1.875rem; }
            .flower-3 { font-size: 3rem; }
            .flower-4 { font-size: 2.25rem; }
            .flower-5 { font-size: 3rem; }
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }
        @keyframes cloud-fly {
            0% { transform: translateX(-15vw); }
            100% { transform: translateX(115vw); }
        }
        @keyframes sun-pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 80px rgba(255,209,102,1); }
        }
        /* ==================================================== */

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            60% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); }
        }

        @keyframes pulse-green {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); box-shadow: 0 4px 15px rgba(88, 204, 2, 0.4); }
        }

        .animate-shake { animation: shake 0.3s ease-in-out; }
        .animate-bounceIn { animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        body {
            background-color: transparent;
            margin: 0;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--c-text-main);
            touch-action: manipulation;
            overflow-x: hidden;
            /* Dành khoảng trống ở trên để tránh che mất top-left-controls */
            padding-top: 80px; 
        }

        #app-wrapper {
            width: 100%;
            max-width: 800px; 
            margin: 0 auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
            z-index: 10; 
        }

        /* Top Left Controls */
        #top-left-controls {
            position: fixed;
            top: 15px;
            left: 15px;
            display: flex;
            gap: 10px;
            z-index: 50;
            flex-wrap: wrap;
            align-items: center;
        }

        .score-board {
            background: var(--c-purple);
            color: white;
            padding: 8px 15px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 800;
            border-bottom: 4px solid var(--c-purple-dark);
            text-align: center;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .score-board.score { background: var(--c-yellow); border-bottom-color: var(--c-yellow-dark); }

        .btn-icon {
            background: #ffffff;
            border: 2px solid var(--c-gray-mid);
            border-bottom: 4px solid var(--c-gray-mid);
            border-radius: 12px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .btn-icon svg { width: 22px; height: 22px; fill: var(--c-gray-dark); transition: fill 0.2s; }
        .btn-icon:active { transform: translateY(4px); border-bottom: 0px; margin-bottom: 4px; box-shadow: none; }

        .op-selector {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
        }
        .op-btn {
            flex: 1;
            max-width: 200px;
            padding: 12px;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 900;
            text-transform: uppercase;
            border: 2px solid var(--c-gray-mid);
            border-bottom: 6px solid var(--c-gray-mid);
            background: white;
            color: var(--c-gray-dark);
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .op-btn svg { width: 24px; height: 24px; stroke: currentColor; }
        .op-btn.active {
            background: var(--c-blue);
            color: white;
            border-color: var(--c-blue-dark);
            border-bottom-color: var(--c-blue-dark);
        }
        .op-btn:active:not(:disabled) { transform: translateY(6px); border-bottom-width: 0px; margin-bottom: 6px; }
        .op-btn.disabled-state { opacity: 0.5; pointer-events: none; }

        .equation-section {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
            align-items: stretch;
            flex-wrap: wrap;
        }

        .equation-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            min-width: 280px; 
            border: 2px solid rgba(255,255,255,0.5);
            border-bottom: 6px solid var(--c-gray-mid);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin: 0;
        }

        .eq-nums {
            font-size: 3.5rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            line-height: 1;
            width: 100%;
            flex-wrap: wrap; /* Cho phép rớt dòng nếu màn hình quá nhỏ */
        }
        
        .eq-input {
            width: 90px;
            height: 70px;
            background: transparent;
            border: none;
            font-size: 3.5rem;
            font-weight: 900;
            text-align: center;
            outline: none;
            padding: 0;
            margin: 0;
            border-radius: 8px 8px 0 0;
            transition: all 0.2s;
            font-family: inherit;
        }
        .eq-input::-webkit-outer-spin-button,
        .eq-input::-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .eq-input[type=number] { -moz-appearance: textfield; }

        .eq-input.num1 {
            border-bottom: 8px solid var(--c-blue);
            color: var(--c-blue);
        }
        .eq-input.num1:focus { background: rgba(28, 176, 246, 0.1); }
        .eq-input.num1:disabled { border-bottom-color: transparent; opacity: 1; }

        .eq-input.num2 {
            border-bottom: 8px solid transparent; 
            color: var(--c-red);
        }
        .eq-input.num2:not(:disabled) { border-bottom-color: var(--c-red); }
        .eq-input.num2:focus { background: rgba(234, 43, 43, 0.1); }
        .eq-input.num2.waiting { border-bottom-color: var(--c-red) !important; }
        .eq-input.num2:disabled { opacity: 1; }

        .eq-sign { color: var(--c-gray-dark); font-size: 2.5rem; font-weight: 700; }
        .eq-ans { color: var(--c-text-main); font-size: 3.5rem; }

        /* Nút Lock Inline Nhấp nháy */
        .btn-lock-inline {
            background: var(--c-green);
            color: white;
            border: none;
            border-bottom: 4px solid var(--c-green-dark);
            padding: 8px 15px;
            font-size: 1rem;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.1s;
            text-transform: uppercase;
            animation: pulse-green 1s infinite;
            white-space: nowrap;
        }
        .btn-lock-inline:active { transform: translateY(4px); border-bottom-width: 0px; margin-bottom: 4px; }

        .hint-bar {
            text-align: center;
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--c-text-main);
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(4px);
            padding: 8px 20px;
            border-radius: 20px;
            width: fit-content;
            margin: 0 auto;
        }

        .btn-primary {
            background: var(--c-green);
            color: white;
            border: none;
            border-bottom: 6px solid var(--c-green-dark);
            padding: 15px 30px;
            font-size: 1.4rem;
            font-weight: 800;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.1s;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            text-align: center;
        }
        .btn-primary:active { transform: translateY(6px); border-bottom: 0px; margin-bottom: 6px; }

        .game-area {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            width: 100%;
            display: flex;
            flex-direction: column;
            border: 2px solid rgba(255,255,255,0.5);
            border-bottom: 8px solid var(--c-gray-mid);
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            flex: 1;
            min-height: 350px;
        }

        .board-headers {
            display: flex;
            padding: 15px 15px 5px 15px;
            gap: 15px;
            background: rgba(247, 247, 248, 0.8);
        }
        .col-header {
            flex: 1;
            text-align: center;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
            padding-bottom: 5px;
        }
        .header-tens { color: var(--c-blue-dark); border-bottom: 4px solid var(--c-blue-dark); }
        .header-ones { color: var(--c-green-dark); border-bottom: 4px solid var(--c-green-dark); }

        .board-cols-wrapper {
            flex: 1;
            display: flex;
            flex-direction: row;
            background: rgba(247, 247, 248, 0.8);
            padding: 0 15px 15px 15px;
            position: relative;
        }

        .col-divider {
            width: 4px;
            background: var(--c-gray-mid);
            border-radius: 2px;
            margin: 10px 10px;
        }

        .col-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 10px;
            position: relative;
            border-radius: 16px;
            transition: background-color 0.2s, box-shadow 0.2s;
        }

        .highlight-drop {
            background-color: #E2F5E2 !important;
            box-shadow: inset 0 0 0 4px var(--c-green);
        }

        .col-section {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            align-content: flex-start;
        }

        .dashed-divider {
            width: 100%;
            height: 4px;
            background: repeating-linear-gradient(90deg, var(--c-gray-dark), var(--c-gray-dark) 8px, transparent 8px, transparent 16px);
            margin: 10px 0;
            opacity: 0.4;
        }

        .zero-placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            font-weight: 900;
            color: var(--c-gray-mid);
            pointer-events: none;
        }

        .supply-panel {
            background: white;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            justify-content: center;
            align-items: center;
            border-top: 4px solid var(--c-gray-mid);
        }
        
        .supply-btns-row {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        .supply-btn {
            flex: 1;
            min-width: 70px;
            max-width: 150px;
            border-radius: 16px;
            border: 2px solid;
            border-bottom-width: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 5px;
            font-weight: 900;
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.1s;
            color: white;
        }
        .supply-btn:active:not(.disabled-state) {
            transform: translateY(6px);
            border-bottom-width: 0px;
            margin-bottom: 6px;
        }
        .supply-btn.disabled-state {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        .btn-add { background: var(--c-blue); border-color: var(--c-blue-dark); }
        .btn-sub { background: var(--c-red); border-color: var(--c-red-dark); }

        .btn-make-ten {
            background: var(--c-yellow);
            border-color: var(--c-yellow-dark);
            color: white;
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: 16px;
            font-weight: 900;
            border-bottom-width: 6px;
            border-style: solid;
            cursor: pointer;
            z-index: 10;
        }
        .btn-make-ten:active { transform: translate(-50%, 6px); border-bottom-width: 0; }

        .ten-rod {
            display: flex;
            flex-direction: row; 
            background-color: var(--c-blue);
            border-radius: 8px;
            border: 2px solid var(--c-blue-dark);
            border-bottom: 6px solid var(--c-blue-dark);
            width: 100%;
            max-width: 280px; 
            cursor: pointer;
            transition: transform 0.1s;
            overflow: hidden;
            box-shadow: inset 0 3px 4px rgba(255,255,255,0.3); 
        }
        .ten-rod:active { transform: scale(0.95); }
        
        .ten-block {
            flex: 1;
            aspect-ratio: 1 / 1; 
            border-right: 2px solid rgba(0,0,0,0.15); 
            position: relative;
        }
        .ten-block::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 40%; height: 40%;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            box-shadow: inset 0 -2px 2px rgba(0,0,0,0.1), inset 0 2px 2px rgba(255,255,255,0.4);
        }
        .ten-block:last-child { border-right: none; }

        .one-cube {
            width: 100%;
            max-width: 36px; 
            aspect-ratio: 1 / 1; 
            background-color: var(--c-green);
            border-radius: 6px;
            border: 2px solid var(--c-green-dark);
            border-bottom: 6px solid var(--c-green-dark);
            cursor: pointer;
            transition: transform 0.1s;
            position: relative;
            box-shadow: inset 0 3px 4px rgba(255,255,255,0.3);
        }
        .one-cube:active { transform: scale(0.9); }
        .one-cube::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 40%; height: 40%;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            box-shadow: inset 0 -2px 2px rgba(0,0,0,0.1), inset 0 2px 2px rgba(255,255,255,0.4);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }
        .opt-btn {
            height: 80px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--c-blue);
            border: 2px solid rgba(255,255,255,0.5);
            border-bottom: 6px solid var(--c-gray-mid);
            cursor: pointer;
            transition: all 0.1s;
        }
        .opt-btn:active:not(.disabled-state) { transform: translateY(6px); border-bottom: 0px; margin-bottom: 6px; }
        
        .opt-btn.correct { 
            background: var(--c-green); color: white; 
            border-color: var(--c-green-dark); border-bottom-color: var(--c-green-dark); 
        }
        .opt-btn.wrong { 
            background: var(--c-red); color: white; 
            border-color: var(--c-red-dark); border-bottom-color: var(--c-red-dark); 
        }
        .opt-btn.disabled-state { 
            opacity: 0.5; cursor: default; 
            transform: none; border-bottom: 6px solid var(--c-gray-mid); margin-bottom: 0; 
            color: var(--c-gray-dark);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            border: 6px solid var(--c-blue);
            text-align: center;
            position: relative;
        }

        .hidden { display: none !important; }

        @media (max-width: 500px) {
            .eq-nums { font-size: 2.8rem; }
            .board-cols-wrapper { flex-direction: column; }
            .col-divider { width: 100%; height: 4px; margin: 10px 0; }
            .eq-input { width: 75px; height: 60px; font-size: 2.8rem; }
            /* Mobile adjustment for lock button inline */
            .btn-lock-inline { font-size: 0.9rem; padding: 6px 12px; }
        }
    </style>
</head>
<body>
    
    <!-- ================= SCENERY BACKGROUND ================= -->
    <div class="scenery-bg">
        <div class="scenery-sun"></div>
        <svg class="scenery-rainbow" viewBox="0 0 100 50">
            <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#EF476F" stroke-width="3"/>
            <path d="M 13 50 A 37 37 0 0 1 87 50" fill="none" stroke="#F78C6B" stroke-width="3"/>
            <path d="M 16 50 A 34 34 0 0 1 84 50" fill="none" stroke="#FFD166" stroke-width="3"/>
            <path d="M 19 50 A 31 31 0 0 1 81 50" fill="none" stroke="#06D6A0" stroke-width="3"/>
            <path d="M 22 50 A 28 28 0 0 1 78 50" fill="none" stroke="#118AB2" stroke-width="3"/>
            <path d="M 25 50 A 25 25 0 0 1 75 50" fill="none" stroke="#073B4C" stroke-width="3"/>
        </svg>

        <svg class="scenery-cloud scenery-cloud-1" viewBox="0 0 24 24"><path fill="currentColor" d="M17.5,19c2.48,0,4.5-2.02,4.5-4.5c0-2.33-1.78-4.25-4.06-4.47c-0.65-2.9-3.26-5.03-6.44-5.03c-2.81,0-5.21,1.75-6.19,4.24C2.5,9.45,0.5,11.83,0.5,14.5C0.5,17.53,2.97,20,6,20h11.5V19z"/></svg>
        <svg class="scenery-cloud scenery-cloud-2" viewBox="0 0 24 24"><path fill="currentColor" d="M17.5,19c2.48,0,4.5-2.02,4.5-4.5c0-2.33-1.78-4.25-4.06-4.47c-0.65-2.9-3.26-5.03-6.44-5.03c-2.81,0-5.21,1.75-6.19,4.24C2.5,9.45,0.5,11.83,0.5,14.5C0.5,17.53,2.97,20,6,20h11.5V19z"/></svg>

    <script>
        /* --- AUDIO SYSTEM --- */
        let audioCtx = null;
        
        function initAudio() {
            if (!audioCtx) {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if(AudioContextClass) audioCtx = new AudioContextClass();
            }
        }

        function playSound(type) {
            initAudio();
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            if (type === 'pop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'delete') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(150, now + 0.15);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'magic') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.setValueAtTime(800, now + 0.1);
                osc.frequency.setValueAtTime(1200, now + 0.2);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'win') {
                const freqs = [440, 554.37, 659.25, 880];
                freqs.forEach((f, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.type = 'sine';
                    o.frequency.value = f;
                    const t = now + (i * 0.1);
                    g.gain.setValueAtTime(0, t);
                    g.gain.linearRampToValueAtTime(0.2, t + 0.05);
                    g.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
                    o.start(t); o.stop(t + 0.3);
                });
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.linearRampToValueAtTime(150, now + 0.3);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            }
        }

        /* --- GAME STATE --- */
        let step = 1; 
        let operation = '+'; 
        let num1 = 0, initialTens = 0, initialOnes = 0;
        let tens = 0, ones = 0;
        let globalScore = 0;
        let currentRound = 1;
        const MAX_ROUNDS = 5;
        const MAX_TENS = 20, MAX_ONES = 30;
        
        let draggedRodClone = null;

        // DOM Elements
        const tensContainer = document.getElementById('tens-container');
        const onesContainer = document.getElementById('ones-container');
        const mcqOptions = document.getElementById('mcq-options-container');
        const btnConfirmInline = document.getElementById('btn-confirm-inline');
        const eqAns = document.getElementById('eq-ans');
        const hintText = document.getElementById('hint-text');
        const eqNum1Input = document.getElementById('eq-num1');
        const eqNum2Input = document.getElementById('eq-num2');
        
        function updateHints() {
            if (step === 1) {
                hintText.innerHTML = `Build your starting number or type it below!`;
                hintText.style.color = "var(--c-text-main)";
            } else {
                let current = tens * 10 + ones;
                let n2 = (operation === '+') ? (current - num1) : (num1 - current);

                if (n2 <= 0) {
                    if (operation === '+') {
                        hintText.innerHTML = "Add blocks or type the second number!";
                    } else {
                        if (ones < 10 && tens > 0) {
                            hintText.innerHTML = "Tap blocks to remove, or <b>drag a Ten to Ones to break it!</b>";
                        } else {
                            hintText.innerHTML = "Tap blocks to remove them!";
                        }
                    }
                    hintText.style.color = "var(--c-blue)";
                } else {
                    hintText.innerHTML = "Choose the correct answer!";
                    hintText.style.color = "var(--c-green)";
                }
            }
        }

        function handleDirectInput(val) {
            if (step !== 1) return;
            let n = parseInt(val);
            if (isNaN(n) || val === '') {
                tens = 0;
                ones = 0;
            } else {
                if (n < 0) n = 0;
                if (n > 99) n = 99;
                tens = Math.floor(n / 10);
                ones = n % 10;
                if (tens > MAX_TENS) tens = MAX_TENS;
                if (ones > MAX_ONES) ones = MAX_ONES;
            }
            updateUI();
            updateCalculatorUI();
        }

        function handleDirectInput2(val) {
            if (step !== 2 || operation !== '+') return;
            let n2 = parseInt(val);
            if (isNaN(n2) || val === '') {
                n2 = 0;
            } else {
                if (n2 < 0) n2 = 0;
            }
            
            let addedTens = Math.floor(n2 / 10);
            let addedOnes = n2 % 10;
            
            tens = initialTens + addedTens;
            ones = initialOnes + addedOnes;
            
            if (tens > MAX_TENS) tens = MAX_TENS;
            if (ones > MAX_ONES) ones = MAX_ONES;
            
            updateUI();
            updateCalculatorUI();
        }

        function setOp(op) {
            if (step === 2) return;
            operation = op;
            const btnAdd = document.getElementById('btn-op-add');
            const btnSub = document.getElementById('btn-op-sub');
            const eqOp = document.getElementById('eq-op');
            
            const svgPlus = `<svg style="width:32px;height:32px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M12 4v16m8-8H4"></path></svg>`;
            const svgMinus = `<svg style="width:32px;height:32px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M20 12H4"></path></svg>`;

            if (op === '+') {
                btnAdd.classList.add('active');
                btnSub.classList.remove('active');
                eqOp.innerHTML = svgPlus;
            } else {
                btnSub.classList.add('active');
                btnAdd.classList.remove('active');
                eqOp.innerHTML = svgMinus;
            }
            playSound('pop');
            updateCalculatorUI();
            updateHints();
        }

        function confirmStep1() {
            num1 = tens * 10 + ones;
            if (num1 === 0) {
                hintText.innerHTML = "⚠️ Please add some blocks first!";
                hintText.style.color = "var(--c-red)";
                hintText.classList.add('animate-shake');
                setTimeout(() => {
                    hintText.classList.remove('animate-shake');
                    updateHints();
                }, 2000);
                return; 
            }
            initialTens = tens; 
            initialOnes = ones; 
            step = 2;
            playSound('magic');
            
            // UI Updates
            document.getElementById('op-selector').classList.add('disabled-state');
            
            updateUI(); 
            updateCalculatorUI();
            updateHints();
        }

        function updateCalculatorUI() {
            let current = tens * 10 + ones;
            let n2 = 0;
            
            if (step === 1) { 
                eqNum1Input.disabled = false;
                if (document.activeElement !== eqNum1Input) {
                    eqNum1Input.value = current === 0 ? '' : current; 
                }
                
                // Show/hide lock button seamlessly when there is a valid number
                if (current > 0) {
                    btnConfirmInline.classList.remove('hidden');
                } else {
                    btnConfirmInline.classList.add('hidden');
                }

                eqNum2Input.value = '';
                eqNum2Input.disabled = true;
                eqNum2Input.classList.remove('waiting');
                
                eqAns.textContent = "?";
                eqAns.style.color = "var(--c-text-main)";
                mcqOptions.classList.add('hidden');
            } else {
                eqNum1Input.disabled = true;
                eqNum1Input.value = num1;
                
                // Hide lock button
                btnConfirmInline.classList.add('hidden');
                
                n2 = (operation === '+') ? (current - num1) : (num1 - current);
                
                if (operation === '+') {
                    eqNum2Input.disabled = false;
                    if (document.activeElement !== eqNum2Input) {
                        eqNum2Input.value = n2 === 0 ? '' : n2;
                    }
                } else {
                    eqNum2Input.disabled = true;
                    eqNum2Input.value = n2 === 0 ? '' : n2;
                }
                
                if (n2 <= 0) {
                    eqNum2Input.classList.add('waiting');
                    mcqOptions.classList.add('hidden');
                } else {
                    eqNum2Input.classList.remove('waiting');
                    mcqOptions.classList.remove('hidden');
                    generateOptions(); 
                }
            }
            
            document.getElementById('display-round').textContent = currentRound;
            document.getElementById('display-score').textContent = globalScore;
            
            if (step === 2) updateHints();
        }

        function generateOptions() {
            if (step !== 2) return;
            let currentDisplayNumber = tens * 10 + ones;
            let correctAns = currentDisplayNumber; 
            
            let options = new Set([correctAns]);
            while(options.size < 4) {
                let offset = (Math.floor(Math.random() * 5) + 1);
                let sign = Math.random() > 0.5 ? 1 : -1;
                let dist = correctAns + (sign * offset);
                if (options.size === 1 && correctAns > 10) options.add(correctAns - 10);
                else if (options.size === 2 && correctAns < 90) options.add(correctAns + 10);
                else if (dist >= 0) options.add(dist);
            }
            
            mcqOptions.innerHTML = '';
            Array.from(options).sort(() => Math.random() - 0.5).forEach(v => {
                const b = document.createElement('button');
                b.className = "opt-btn";
                b.textContent = v;
                b.onclick = () => handleAnswer(v, correctAns, b);
                mcqOptions.appendChild(b);
            });
        }

        function handleAnswer(selectedValue, correctAns, btnElement) {
            if (selectedValue === correctAns) {
                btnElement.classList.add('correct');
                eqAns.textContent = selectedValue; 
                eqAns.style.color = "var(--c-green)";
                
                globalScore += 10; 
                document.getElementById('display-score').textContent = globalScore;
                playSound('win');
                
                Array.from(mcqOptions.children).forEach(child => child.classList.add('disabled-state'));
                disableAllBlockControls();
                eqNum2Input.disabled = true;
                
                setTimeout(() => { 
                    if (currentRound >= MAX_ROUNDS) {
                        showEndScreen();
                    } else {
                        // Kích hoạt Fullscreen Catcher Game
                        document.getElementById('app-wrapper').style.display = 'none';
                        document.getElementById('catcher-fullscreen').classList.remove('hidden'); 
                        initCatcherCanvas();
                    }
                }, 1000);
                
            } else {
                btnElement.classList.add('wrong', 'animate-shake');
                playSound('wrong');
                setTimeout(() => {
                    btnElement.classList.remove('animate-shake');
                }, 400);
            }
        }

        function disableAllBlockControls() {
            document.getElementById('btn-add-ten').classList.add('disabled-state');
            document.getElementById('btn-sub-ten').classList.add('disabled-state');
            document.getElementById('btn-add-one').classList.add('disabled-state');
            document.getElementById('btn-sub-one').classList.add('disabled-state');
            
            const blocks = document.querySelectorAll('.ten-rod, .one-cube');
            blocks.forEach(b => b.style.pointerEvents = 'none');
        }

        /* --- VISUAL BLOCK GENERATION & DRAG-DROP --- */
        function allowDrop(ev) {
            if (step === 2 && operation === '-') {
                ev.preventDefault();
                document.getElementById('ones-col').classList.add('highlight-drop');
            }
        }
        function dragLeave(ev) {
            document.getElementById('ones-col').classList.remove('highlight-drop');
        }
        function dropTen(ev) {
            ev.preventDefault();
            document.getElementById('ones-col').classList.remove('highlight-drop');
            const action = ev.dataTransfer.getData("action");
            if (action === "break-ten") {
                if (tens > 0) {
                    tens--;
                    ones += 10;
                    playSound('magic');
                    updateUI();
                    updateCalculatorUI();
                }
            }
        }

        function createTenRod(isBase) {
            const rod = document.createElement('div');
            rod.className = "ten-rod";
            for (let i = 0; i < 10; i++) {
                const seg = document.createElement('div');
                seg.className = "ten-block";
                rod.appendChild(seg);
            }

            const handleClick = (e) => {
                if(step === 2 && operation === '+' && isBase) {
                    rod.classList.add('animate-shake');
                    setTimeout(() => rod.classList.remove('animate-shake'), 300);
                    return; 
                }
                if(step === 1 || (step === 2 && operation === '-')) {
                    if(tens > 0) { 
                        tens--; 
                        playSound('delete'); 
                        updateUI(); 
                        updateCalculatorUI(); 
                    }
                }
            };

            rod.draggable = true;
            rod.addEventListener('dragstart', (e) => {
                if (step === 2 && operation === '-') {
                    e.dataTransfer.setData("action", "break-ten");
                    e.dataTransfer.effectAllowed = "move";
                } else {
                    e.preventDefault();
                }
            });
            rod.onclick = handleClick;

            let touchStartX = 0, touchStartY = 0;
            let moved = false;

            rod.addEventListener('touchstart', (e) => {
                if (step === 2 && operation === '-') {
                    const touch = e.touches[0];
                    touchStartX = touch.clientX;
                    touchStartY = touch.clientY;
                    moved = false;

                    draggedRodClone = rod.cloneNode(true);
                    draggedRodClone.style.position = 'fixed';
                    draggedRodClone.style.left = (touch.clientX - rod.offsetWidth/2) + 'px';
                    draggedRodClone.style.top = (touch.clientY - rod.offsetHeight/2) + 'px';
                    draggedRodClone.style.opacity = '0.8';
                    draggedRodClone.style.pointerEvents = 'none';
                    draggedRodClone.style.zIndex = '1000';
                    draggedRodClone.style.display = 'none'; 
                    document.body.appendChild(draggedRodClone);
                }
            }, {passive: false});

            rod.addEventListener('touchmove', (e) => {
                if (step === 2 && operation === '-' && draggedRodClone) {
                    const touch = e.touches[0];
                    if (!moved && (Math.abs(touch.clientX - touchStartX) > 5 || Math.abs(touch.clientY - touchStartY) > 5)) {
                        moved = true;
                        draggedRodClone.style.display = 'flex';
                        rod.style.opacity = '0.3';
                    }
                    if (moved) {
                        e.preventDefault(); 
                        draggedRodClone.style.left = (touch.clientX - draggedRodClone.offsetWidth/2) + 'px';
                        draggedRodClone.style.top = (touch.clientY - draggedRodClone.offsetHeight/2) + 'px';
                        const elUnderFinger = document.elementFromPoint(touch.clientX, touch.clientY);
                        const onesCol = document.getElementById('ones-col');
                        if (onesCol && onesCol.contains(elUnderFinger)) {
                            onesCol.classList.add('highlight-drop');
                        } else if (onesCol) {
                            onesCol.classList.remove('highlight-drop');
                        }
                    }
                }
            }, {passive: false});

            rod.addEventListener('touchend', (e) => {
                if (step === 2 && operation === '-') {
                    if (moved && draggedRodClone) {
                        const touch = e.changedTouches[0];
                        const elUnderFinger = document.elementFromPoint(touch.clientX, touch.clientY);
                        const onesCol = document.getElementById('ones-col');
                        
                        if (onesCol && onesCol.contains(elUnderFinger)) {
                            if (tens > 0) {
                                tens--;
                                ones += 10;
                                playSound('magic');
                                updateUI();
                                updateCalculatorUI();
                            }
                        }
                        if(onesCol) onesCol.classList.remove('highlight-drop');
                    } else if (!moved) {
                        handleClick(e);
                    }
                    
                    if (draggedRodClone) {
                        draggedRodClone.remove();
                        draggedRodClone = null;
                    }
                    rod.style.opacity = '1';
                }
            });

            return rod;
        }

        function createOneCube(isBase) {
            const cube = document.createElement('div'); 
            cube.className = "one-cube";
            
            const handleCubeClick = () => {
                if(step === 2 && operation === '+' && isBase) {
                    cube.classList.add('animate-shake');
                    setTimeout(() => cube.classList.remove('animate-shake'), 300);
                    return;
                }
                if(step === 1 || (step === 2 && operation === '-')) {
                    if(ones > 0) { 
                        ones--; 
                        playSound('delete'); 
                        updateUI(); 
                        updateCalculatorUI(); 
                    }
                }
            };
            cube.onclick = handleCubeClick;
            return cube;
        }

        /* --- UI UPDATER --- */
        function updateUI() {
            tensContainer.innerHTML = '';
            let baseTensCount = (step === 2 && operation === '+') ? initialTens : 0;
            
            for (let i = 0; i < tens; i++) {
                let isBase = (i < baseTensCount);
                if (step === 2 && operation === '+' && i === initialTens && initialTens > 0) {
                    const d = document.createElement('div'); 
                    d.className = "dashed-divider";
                    tensContainer.appendChild(d);
                }
                tensContainer.appendChild(createTenRod(isBase));
            }
            
            onesContainer.innerHTML = '';
            let baseOnesCount = (step === 2 && operation === '+') ? initialOnes : 0;

            for (let i = 0; i < ones; i++) {
                let isBase = (i < baseOnesCount);
                if (step === 2 && operation === '+' && i === initialOnes && initialOnes > 0) {
                    const d = document.createElement('div'); 
                    d.className = "dashed-divider";
                    onesContainer.appendChild(d);
                }
                onesContainer.appendChild(createOneCube(isBase));
            }

            const btnAddTen = document.getElementById('btn-add-ten');
            const btnSubTen = document.getElementById('btn-sub-ten');
            const btnAddOne = document.getElementById('btn-add-one');
            const btnSubOne = document.getElementById('btn-sub-one');

            btnAddTen.classList.remove('disabled-state');
            btnSubTen.classList.remove('disabled-state');
            btnAddOne.classList.remove('disabled-state');
            btnSubOne.classList.remove('disabled-state');

            if (step === 2) {
                if (operation === '-') {
                    btnAddTen.classList.add('disabled-state'); btnAddOne.classList.add('disabled-state');
                    if(tens <= 0) btnSubTen.classList.add('disabled-state');
                    if(ones <= 0) btnSubOne.classList.add('disabled-state');
                } else {
                    if(tens >= MAX_TENS) btnAddTen.classList.add('disabled-state');
                    if(ones >= MAX_ONES) btnAddOne.classList.add('disabled-state');
                    if(tens <= initialTens) btnSubTen.classList.add('disabled-state');
                    if(ones <= initialOnes) btnSubOne.classList.add('disabled-state');
                }
            } else {
                if(tens >= MAX_TENS) btnAddTen.classList.add('disabled-state');
                if(ones >= MAX_ONES) btnAddOne.classList.add('disabled-state');
                if(tens <= 0) btnSubTen.classList.add('disabled-state');
                if(ones <= 0) btnSubOne.classList.add('disabled-state');
            }
            
            if (ones >= 10) { 
                document.getElementById('regroup-hint').classList.remove('hidden'); 
            } else {
                document.getElementById('regroup-hint').classList.add('hidden');
            }

            document.getElementById('tens-zero').style.display = tens === 0 ? 'block' : 'none';
            document.getElementById('ones-zero').style.display = ones === 0 ? 'block' : 'none';
        }

        // Manual controls
        function addOne() { if (ones < MAX_ONES) { ones++; playSound('pop'); updateUI(); updateCalculatorUI(); } }
        function removeOne() { 
            if (ones > 0) { 
                if(step === 2 && operation === '+' && ones <= initialOnes) {
                    playSound('wrong'); return;
                }
                ones--; playSound('delete'); updateUI(); updateCalculatorUI(); 
            } 
        }
        function addTen() { if (tens < MAX_TENS) { tens++; playSound('pop'); updateUI(); updateCalculatorUI(); } }
        function removeTen() { 
            if (tens > 0) { 
                if(step === 2 && operation === '+' && tens <= initialTens) {
                    playSound('wrong'); return;
                }
                tens--; playSound('delete'); updateUI(); updateCalculatorUI(); 
            } 
        }

        function regroupTen() {
            if (tens < MAX_TENS && ones >= 10) { 
                tens++; ones -= 10; 
                if(step === 2 && operation === '+') { initialTens++; initialOnes -= 10; }
                playSound('magic'); updateUI(); updateCalculatorUI();
            }
        }

        function resetBoardFull() {
            step = 1; tens = 0; ones = 0; num1 = 0; initialTens = 0; initialOnes = 0;
            document.getElementById('op-selector').classList.remove('disabled-state');
            
            eqNum1Input.value = '';
            eqNum1Input.disabled = false;
            eqNum2Input.value = '';
            eqNum2Input.disabled = true;
            eqNum2Input.classList.remove('waiting');
            
            mcqOptions.classList.add('hidden');
            mcqOptions.innerHTML = '';
            eqAns.textContent = "?"; eqAns.style.color = "var(--c-text-main)";
            
            const blocks = document.querySelectorAll('.ten-rod, .one-cube');
            blocks.forEach(b => b.style.pointerEvents = 'auto');

            updateUI(); updateCalculatorUI(); updateHints();
        }

        /* --- BONUS MINI GAME FULLSCREEN (FRUIT CATCHER) --- */
        const catcherCanvas = document.getElementById('catcherCanvas');
        const cCtx = catcherCanvas.getContext('2d');
        let catcherGameState = 'START';
        let catcherScore = 0;
        const WIN_FRUITS = 10;
        let fruits = [];
        let basket = { x: 0, y: 300, w: 70 };

        function initCatcherCanvas() {
            catcherCanvas.width = window.innerWidth; 
            catcherCanvas.height = window.innerHeight;
            // Di chuyển giỏ lên một chút để không bị che bởi thanh điều hướng trên điện thoại
            basket.y = catcherCanvas.height - 80;
            if(catcherGameState === 'START') basket.x = catcherCanvas.width / 2;
        }

        catcherCanvas.addEventListener('mousemove', (e) => {
            if(catcherGameState !== 'PLAYING') return;
            const rect = catcherCanvas.getBoundingClientRect();
            basket.x = e.clientX - rect.left;
        });

        catcherCanvas.addEventListener('touchmove', (e) => {
            if(catcherGameState !== 'PLAYING') return;
            e.preventDefault(); 
            const rect = catcherCanvas.getBoundingClientRect();
            basket.x = e.touches[0].clientX - rect.left;
        }, {passive: false});

        function startCatcherGame() {
            initCatcherCanvas();
            catcherGameState = 'PLAYING';
            catcherScore = 0;
            fruits = [];
            document.getElementById('catcher-overlay').classList.add('hidden');
            document.getElementById('catcher-ingame-score').classList.remove('hidden');
            document.getElementById('catcher-ingame-score-text').textContent = '0';
            requestAnimationFrame(animateCatcher);
            playSound('magic');
        }

        function animateCatcher() {
            if (catcherGameState !== 'PLAYING') return;
            
            // Xóa Canvas trong suốt để thấy nền Scenery phía sau
            cCtx.clearRect(0, 0, catcherCanvas.width, catcherCanvas.height);
            
            // Vẽ giỏ trái cây
            cCtx.font = "60px Arial";
            cCtx.textAlign = "center";
            cCtx.textBaseline = "middle";
            cCtx.fillText("🧺", basket.x, basket.y);

            if (Math.random() < 0.035) { 
                fruits.push({
                    x: Math.random() * (catcherCanvas.width - 60) + 30,
                    y: -30,
                    speed: 3 + Math.random() * 2.5 + (catcherScore * 0.2),
                    emoji: ['🍎', '🍌', '🍉', '🍇', '🍓'][Math.floor(Math.random()*5)]
                });
            }

            for (let i = fruits.length - 1; i >= 0; i--) {
                let f = fruits[i];
                f.y += f.speed;
                cCtx.font = "45px Arial";
                cCtx.fillText(f.emoji, f.x, f.y);

                if (f.y + 20 > basket.y - 30 && f.y - 20 < basket.y + 30) {
                    if (Math.abs(f.x - basket.x) < basket.w) {
                        catcherScore++;
                        document.getElementById('catcher-ingame-score-text').textContent = catcherScore;
                        playSound('pop');
                        fruits.splice(i, 1);

                        if (catcherScore >= WIN_FRUITS) {
                            endCatcher();
                            return;
                        }
                        continue;
                    }
                }

                if (f.y > catcherCanvas.height + 40) {
                    fruits.splice(i, 1);
                }
            }

            requestAnimationFrame(animateCatcher);
        }

        function endCatcher() {
            catcherGameState = 'WIN';
            document.getElementById('catcher-result-overlay').classList.remove('hidden');
            document.getElementById('catcher-ingame-score').classList.add('hidden');
            playSound('win');
            globalScore += 5;
            document.getElementById('display-score').textContent = globalScore;
        }

        function closeCatcherGame() {
            document.getElementById('catcher-fullscreen').classList.add('hidden');
            document.getElementById('app-wrapper').style.display = 'flex'; // Trả lại game chính
            document.getElementById('catcher-result-overlay').classList.add('hidden');
            document.getElementById('catcher-overlay').classList.remove('hidden');
            
            currentRound++;
            resetBoardFull();
        }

        /* --- END GAME & FIREWORKS --- */
        const fwCanvas = document.getElementById('fireworksCanvas');
        const fwCtx = fwCanvas.getContext('2d');
        let fwParticles = [];
        let fwAnimationId;

        function showEndScreen() {
            document.getElementById('end-game-modal').classList.remove('hidden');
            document.getElementById('final-score-display').textContent = globalScore;
            playSound('win');
            startFireworks();
        }

        function playAgain() {
            document.getElementById('end-game-modal').classList.add('hidden');
            cancelAnimationFrame(fwAnimationId);
            fwParticles = [];
            currentRound = 1;
            globalScore = 0;
            resetBoardFull();
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 3;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.01;
                this.size = Math.random() * 5 + 2;
            }
            update() {
                this.vy += 0.1; 
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.alpha);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function createExplosion(x, y) {
            const colors = ['#1CB0F6', '#58CC02', '#FF4B4B', '#FFC800', '#CE82FF'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            for (let i = 0; i < 60; i++) {
                fwParticles.push(new Particle(x, y, color));
            }
        }

        function animateFireworks() {
            fwCanvas.width = window.innerWidth;
            fwCanvas.height = window.innerHeight;
            fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
            
            if (Math.random() < 0.08) {
                createExplosion(Math.random() * fwCanvas.width, Math.random() * (fwCanvas.height * 0.6));
            }

            for (let i = fwParticles.length - 1; i >= 0; i--) {
                const p = fwParticles[i];
                p.update();
                p.draw(fwCtx);
                if (p.alpha <= 0) fwParticles.splice(i, 1);
            }
            fwAnimationId = requestAnimationFrame(animateFireworks);
        }

        function startFireworks() {
            fwCanvas.width = window.innerWidth;
            fwCanvas.height = window.innerHeight;
            animateFireworks();
        }

        // Initialize UI
        updateUI();
        updateHints();
        
        // Handle resize for canvases
        window.addEventListener('resize', () => {
            if(catcherGameState === 'PLAYING') initCatcherCanvas();
        });

    </script>
</body>
</html>
