<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Game: Tens & Ones V4</title>
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        'game-bg': '#87CEEB',
                        'tens-color': '#00d2d3',
                        'ones-color': '#ff9f43',
                    },
                    keyframes: {
                        shake: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '25%': { transform: 'translateX(-5px)' },
                            '75%': { transform: 'translateX(5px)' }
                        },
                        bounceIn: {
                            '0%': { transform: 'scale(0.1)', opacity: '0' },
                            '60%': { transform: 'scale(1.1)', opacity: '1' },
                            '100%': { transform: 'scale(1)' }
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' }
                        },
                        pulseGlow: {
                            '0%, 100%': { boxShadow: '0 0 0 0 rgba(74, 222, 128, 0.7)' },
                            '50%': { boxShadow: '0 0 0 10px rgba(74, 222, 128, 0)' }
                        }
                    },
                    animation: {
                        shake: 'shake 0.3s ease-in-out 0s 2',
                        bounceIn: 'bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        float: 'float 3s ease-in-out infinite',
                        pulseGlow: 'pulseGlow 2s infinite'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at 50% 0%, #93c5fd 0%, #c4b5fd 50%, #fbcfe8 100%);
            background-attachment: fixed;
        }

        /* Ambient floating bubbles in background */
        .bg-pattern {
            position: absolute;
            inset: 0;
            z-index: -1;
            opacity: 0.6;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 5%),
                radial-gradient(circle at 80% 20%, rgba(255,255,255,0.4) 0%, transparent 8%),
                radial-gradient(circle at 40% 80%, rgba(255,255,255,0.4) 0%, transparent 6%),
                radial-gradient(circle at 70% 90%, rgba(255,255,255,0.4) 0%, transparent 4%);
            background-size: 100% 100%;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Bubbly Buttons */
        .gummy-btn { 
            box-shadow: 0 6px 0 rgba(0,0,0,0.15), 0 8px 10px rgba(0,0,0,0.1); 
            transition: all 0.1s ease;
        }
        .gummy-btn:active:not(:disabled) { 
            box-shadow: 0 0px 0 rgba(0,0,0,0), 0 2px 5px rgba(0,0,0,0.1); 
            transform: translateY(6px); 
        }
        .gummy-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.1);
        }

        /* Text Styles */
        .text-shadow-bubbly {
            text-shadow: 2px 2px 0px #fff, -2px -2px 0px #fff, 2px -2px 0px #fff, -2px 2px 0px #fff, 4px 4px 8px rgba(0,0,0,0.2);
        }

        /* Realistic 3D Blocks */
        .block-3d {
            box-shadow: 
                inset -3px -3px 8px rgba(0,0,0,0.3), 
                inset 3px 3px 8px rgba(255,255,255,0.8),
                2px 4px 6px rgba(0,0,0,0.25);
        }
        
        .ten-rod {
            /* Changed to horizontal gradient */
            background: linear-gradient(180deg, #00e5ff, #00b8d4);
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: row; /* Horizontal blocks */
            border: 1px solid rgba(0, 139, 160, 0.5);
        }
        
        .ten-segment {
            flex: 1;
            /* Changed borders for horizontal segments */
            border-right: 1px solid rgba(0, 86, 100, 0.4);
            border-left: 1px solid rgba(255,255,255,0.6);
            box-sizing: border-box;
        }
        .ten-segment:last-child { border-right: none; }
        .ten-segment:first-child { border-left: none; }

        .one-cube {
            background: linear-gradient(135deg, #ffab91, #ff7043);
            border-radius: 4px;
            border: 1px solid rgba(200, 50, 10, 0.3);
        }

        /* Glassmorphism containers */
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 4px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        /* Custom Icon SVG styles */
        .math-icon {
            width: 1em;
            height: 1em;
            display: inline-block;
            vertical-align: text-bottom;
        }
    </style>
</head>
<body class="w-full h-screen font-sans flex flex-col items-center p-2 sm:p-4 relative">
    <div class="bg-pattern"></div>
    
    <!-- Header Logo -->
    <div class="mb-1 sm:mb-2 shrink-0 animate-float flex items-center gap-2">
        <svg class="w-8 h-8 sm:w-10 sm:h-10 text-yellow-400 drop-shadow-md" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        <h1 class="text-2xl sm:text-4xl font-black text-pink-500 text-shadow-bubbly uppercase tracking-wider">Math Fun!</h1>
        <svg class="w-8 h-8 sm:w-10 sm:h-10 text-yellow-400 drop-shadow-md" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    </div>

    <!-- MAIN GAME UI -->
    <div id="calculator-ui" class="w-full h-full flex flex-col items-center gap-2 sm:gap-3 max-w-5xl z-10">
        
        <!-- HEADER BAR -->
        <div class="w-full glass-panel rounded-3xl p-2 sm:p-4 flex flex-col sm:flex-row justify-between items-center shrink-0 gap-2">
            <h2 id="game-title" class="text-lg sm:text-2xl font-black text-blue-600 uppercase tracking-tight text-center sm:text-left flex items-center gap-2">
                <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                Subtracting Blocks
            </h2>
            <div class="flex items-center gap-2 sm:gap-3">
                <div class="bg-purple-100 border-2 border-purple-300 text-purple-700 px-3 py-1.5 sm:px-4 sm:py-2 rounded-full font-black text-xs sm:text-sm uppercase shadow-sm flex items-center gap-1">
                    Round: <span id="display-round">1</span>/5
                </div>
                <div class="bg-green-100 border-2 border-green-300 text-green-700 px-3 py-1.5 sm:px-4 sm:py-2 rounded-full font-black text-xs sm:text-sm uppercase shadow-sm flex items-center gap-1">
                    Score: <span id="display-score">0</span>
                </div>
                <button onclick="resetBoardFull()" class="bg-white hover:bg-gray-100 text-gray-700 p-2 rounded-full shadow-md transform transition-transform hover:scale-110 active:scale-95 border border-gray-200" title="Restart">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
            </div>
        </div>

        <!-- OPERATION BAR & EQUATION -->
        <div class="w-full flex flex-col items-center shrink-0 gap-2 sm:gap-3">
            <div id="op-selector" class="flex bg-white/90 rounded-full p-1 border-4 border-white shadow-md">
                <button onclick="setOp('+')" id="btn-op-add" class="px-5 py-1.5 sm:px-6 sm:py-2 rounded-full text-gray-400 font-black text-xs sm:text-base transition-all flex items-center gap-1.5">
                    <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M12 4v16m8-8H4"></path></svg> Add
                </button>
                <button onclick="setOp('-')" id="btn-op-sub" class="px-5 py-1.5 sm:px-6 sm:py-2 rounded-full bg-blue-500 text-white shadow-md font-black text-xs sm:text-base transition-all flex items-center gap-1.5">
                    <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M20 12H4"></path></svg> Sub
                </button>
            </div>

            <div class="w-full max-w-2xl bg-white rounded-[2rem] p-3 sm:p-5 border-8 border-yellow-300 shadow-xl flex flex-col items-center relative overflow-hidden">
                <div class="absolute top-0 right-0 w-12 h-12 bg-yellow-100 rounded-bl-full -z-10"></div>
                <div class="absolute bottom-0 left-0 w-12 h-12 bg-blue-50 rounded-tr-full -z-10"></div>
                
                <div class="text-4xl sm:text-6xl md:text-7xl font-black tracking-tighter flex items-center justify-center gap-2 sm:gap-4">
                    <span id="eq-num1" class="text-blue-500 drop-shadow-md">_</span>
                    
                    <span class="text-gray-300 flex items-center justify-center px-1">
                        <!-- Minus SVG (Default) -->
                        <svg id="eq-op" class="w-6 h-6 sm:w-8 sm:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M20 12H4"></path></svg>
                    </span>
                    
                    <span id="eq-num2" class="text-rose-400 drop-shadow-md">_</span>
                    
                    <span class="text-gray-300 flex items-center justify-center px-1">
                        <!-- Equals SVG -->
                        <svg class="w-6 h-6 sm:w-8 sm:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M4 9h16M4 15h16"></path></svg>
                    </span>
                    
                    <span id="eq-ans" class="text-gray-300 drop-shadow-md">?</span>
                </div>
            </div>
        </div>

        <!-- NOTIFICATION / HINT -->
        <div id="notification-container" class="w-full max-w-2xl flex justify-center shrink-0">
            <div id="hint-text" class="bg-yellow-100 border-2 border-yellow-300 rounded-full px-5 py-1 shadow-sm text-yellow-700 font-bold text-center text-xs sm:text-sm animate-pulse flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
                Build your starting number!
            </div>
        </div>

        <!-- BOARD (TENS AND ONES) -->
        <div class="flex-1 w-full flex flex-col overflow-hidden relative glass-panel rounded-[2rem] border-8 border-white shadow-inner">
            <div class="flex shrink-0 bg-white border-b-4 border-gray-100">
                <div class="w-1/2 py-2 sm:py-3 text-center flex justify-center items-center gap-1.5 sm:gap-2 bg-cyan-50/50">
                    <div class="w-3 h-3 sm:w-4 sm:h-4 bg-cyan-400 rounded-sm border border-cyan-500 shadow-sm"></div>
                    <span class="text-cyan-600 font-black text-lg sm:text-2xl uppercase tracking-wider">Tens</span>
                </div>
                <div class="w-1/2 py-2 sm:py-3 text-center flex justify-center items-center gap-1.5 sm:gap-2 bg-orange-50/50 border-l-4 border-gray-100">
                    <div class="w-3 h-3 sm:w-4 sm:h-4 bg-orange-400 rounded-sm border border-orange-500 shadow-sm"></div>
                    <span class="text-orange-500 font-black text-lg sm:text-2xl uppercase tracking-wider">Ones</span>
                </div>
            </div>
            
            <div class="flex-1 flex overflow-hidden relative bg-white/40">
                <!-- TENS COLUMN -->
                <!-- Use flex-col and items-center to stack horizontal rods vertically -->
                <div id="tens-column" class="w-1/2 border-r-4 border-gray-100 p-2 sm:p-4 overflow-y-auto overflow-x-hidden flex flex-col items-center relative">
                    <div id="tens-container" class="flex flex-col items-center gap-1.5 sm:gap-2 w-full content-start pb-24 relative z-10"></div>
                    <div id="tens-zero" class="text-gray-200 font-black text-5xl sm:text-7xl absolute top-1/2 -translate-y-1/2 select-none opacity-50">0</div>
                </div>
                
                <!-- ONES COLUMN -->
                <div id="ones-column" class="w-1/2 p-2 sm:p-4 overflow-y-auto overflow-x-hidden flex flex-col items-center relative">
                    <div id="ones-container" class="flex flex-wrap content-start justify-center gap-1.5 sm:gap-2.5 w-full pb-32 relative z-10"></div>
                    <div id="ones-zero" class="text-gray-200 font-black text-5xl sm:text-7xl absolute top-1/2 -translate-y-1/2 select-none opacity-50">0</div>
                    
                    <!-- MAKE TEN BUTTON -->
                    <div id="regroup-hint" class="absolute bottom-3 left-1/2 -translate-x-1/2 z-20 hidden w-[90%] sm:w-[80%] max-w-[200px]">
                        <button onclick="regroupTen()" class="w-full bg-gradient-to-r from-yellow-400 to-orange-400 p-2 sm:p-3 rounded-xl border-[3px] border-white shadow-xl flex flex-col items-center gummy-btn group animate-pulseGlow">
                            <span class="text-white font-black text-[11px] sm:text-sm uppercase mb-1 drop-shadow-md flex items-center gap-1">
                                <svg class="w-4 h-4 sm:w-5 sm:h-5 text-white animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                                MAKE TEN!
                            </span>
                            <div class="bg-white/30 p-1.5 rounded-md flex flex-wrap gap-0.5 sm:gap-1 justify-center w-full" id="bundle-preview"></div>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- CONTROLS -->
        <div id="control-panel" class="w-full max-w-2xl flex flex-col gap-2 sm:gap-3 shrink-0 pb-1 sm:pb-2">
            
            <!-- STEP 1 CONFIRM BUTTON -->
            <div id="action-area" class="flex justify-center mt-1">
                <button id="btn-confirm-1" onclick="confirmStep1()" class="bg-green-500 hover:bg-green-400 text-white font-black py-2.5 px-6 sm:py-3 sm:px-8 rounded-2xl border-4 border-green-200 text-sm sm:text-lg transition-all gummy-btn flex items-center gap-2">
                    <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg> 
                    Lock Number & Start!
                </button>
            </div>

            <!-- STEP 2 MCQ OPTIONS -->
            <div id="mcq-options-container" class="grid grid-cols-2 gap-2 sm:gap-4 w-full hidden px-2 sm:px-4"></div>

            <!-- MANUAL ADD/SUBTRACT CONTROLS -->
            <div id="manual-controls" class="flex justify-center gap-2 sm:gap-4 w-full px-1 sm:px-2">
                
                <!-- TENS Controls -->
                <div class="flex-1 flex gap-1 sm:gap-2 bg-cyan-50 p-1.5 sm:p-2 rounded-2xl sm:rounded-3xl border-2 border-cyan-100 shadow-sm">
                    <button id="btn-sub-ten" onclick="removeTen()" class="bg-white text-cyan-600 rounded-xl sm:rounded-2xl p-2 gummy-btn font-bold flex items-center justify-center transition-all w-10 sm:w-14">
                        <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M20 12H4"></path></svg>
                    </button>
                    <button id="btn-add-ten" onclick="addTen()" class="flex-1 bg-cyan-400 text-white rounded-xl sm:rounded-2xl font-black uppercase text-[10px] sm:text-sm gummy-btn border-2 border-cyan-300 flex flex-col items-center justify-center leading-tight transition-all">
                        <span>Add 10</span>
                        <div class="w-3 h-3 sm:w-4 sm:h-4 bg-cyan-300 rounded-sm border border-cyan-100 mt-0.5"></div>
                    </button>
                </div>
                
                <!-- ONES Controls -->
                <div class="flex-1 flex gap-1 sm:gap-2 bg-orange-50 p-1.5 sm:p-2 rounded-2xl sm:rounded-3xl border-2 border-orange-100 shadow-sm">
                    <button id="btn-add-one" onclick="addOne()" class="flex-1 bg-orange-400 text-white rounded-xl sm:rounded-2xl font-black uppercase text-[10px] sm:text-sm gummy-btn border-2 border-orange-300 flex flex-col items-center justify-center leading-tight transition-all">
                        <span>Add 1</span>
                        <div class="w-3 h-3 sm:w-4 sm:h-4 bg-orange-300 rounded-sm border border-orange-100 mt-0.5"></div>
                    </button>
                    <button id="btn-sub-one" onclick="removeOne()" class="bg-white text-orange-600 rounded-xl sm:rounded-2xl p-2 gummy-btn font-bold flex items-center justify-center transition-all w-10 sm:w-14">
                        <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M20 12H4"></path></svg>
                    </button>
                </div>
                
            </div>
        </div>
    </div>

    <!-- TOWER MODAL (Bonus Game) -->
    <div id="tower-modal" class="fixed inset-0 z-40 flex items-center justify-center bg-black/60 backdrop-blur-sm hidden p-4">
        <div class="w-full max-w-md bg-white rounded-[2.5rem] p-4 sm:p-6 shadow-2xl relative border-8 border-blue-400 transform scale-100 animate-bounceIn">
            <div class="flex justify-between items-center mb-4 bg-blue-50 p-3 rounded-2xl border-2 border-blue-100">
                <h1 class="text-lg sm:text-2xl font-black text-blue-600 flex items-center gap-2">
                    <svg class="w-6 h-6 text-yellow-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    Bonus Game!
                </h1>
                <div class="text-sm sm:text-base font-bold text-gray-500 bg-white px-3 py-1 rounded-xl shadow-sm">
                    Blocks: <span id="tower-score-display" class="text-blue-600 text-xl font-black">0</span>/10
                </div>
            </div>
            
            <div class="relative w-full rounded-2xl overflow-hidden border-4 border-gray-100">
                <canvas id="gameCanvas" style="width:100%; height:300px; display:block; background:#fff; box-shadow: inset 0 4px 15px rgba(0,0,0,0.1);"></canvas>
                
                <div id="tower-overlay" class="absolute inset-0 bg-white/80 flex flex-col items-center justify-center z-10 backdrop-blur-[2px]">
                    <div class="text-5xl mb-3">🧱</div>
                    <h2 class="text-xl sm:text-2xl font-black text-gray-800 mb-4 drop-shadow-sm text-center">Stack the blocks!</h2>
                    <button class="bg-green-500 text-white px-8 py-3 rounded-full font-black text-lg sm:text-xl gummy-btn uppercase tracking-widest border-4 border-green-300" onclick="startTowerGame()">Play</button>
                </div>
                
                <div id="tower-result-overlay" class="absolute inset-0 bg-white/95 flex flex-col items-center justify-center z-10 hidden backdrop-blur-[2px]">
                    <div id="tower-result-emoji" class="text-6xl sm:text-7xl mb-2 animate-bounce">🏆</div>
                    <h2 id="tower-status-text" class="text-2xl sm:text-3xl font-black mb-6 text-center px-4"></h2>
                    <button class="bg-blue-500 text-white px-6 py-3 rounded-full font-black text-base sm:text-lg gummy-btn border-4 border-blue-300 uppercase flex items-center gap-2" onclick="closeTowerGame()">
                        Next Problem 
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- END GAME SUMMARY MODAL -->
    <div id="end-game-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-md hidden p-4">
        <canvas id="fireworksCanvas" class="absolute inset-0 pointer-events-none"></canvas>
        <div class="w-full max-w-lg bg-white rounded-[3rem] p-8 shadow-2xl relative border-8 border-yellow-400 text-center animate-bounceIn z-10 flex flex-col items-center">
            <div class="absolute -top-12 left-1/2 -translate-x-1/2 text-7xl sm:text-8xl">🌟</div>
            <h1 class="text-3xl sm:text-5xl font-black text-pink-500 mt-6 mb-2 text-shadow-bubbly uppercase">You Did It!</h1>
            <p class="text-lg sm:text-xl text-gray-600 font-bold mb-6">You are a math superstar!</p>
            
            <div class="bg-blue-50 w-full rounded-3xl p-6 border-4 border-blue-100 mb-8 flex flex-col items-center">
                <span class="text-gray-500 font-bold uppercase tracking-wider mb-2">Final Score</span>
                <div class="text-5xl sm:text-6xl font-black text-blue-600 drop-shadow-md flex items-center gap-2">
                    <span id="final-score-display">0</span> <span class="text-4xl">🏆</span>
                </div>
            </div>
            
            <button onclick="playAgain()" class="bg-green-500 hover:bg-green-400 text-white px-8 sm:px-10 py-3 sm:py-4 rounded-full font-black text-lg sm:text-xl gummy-btn border-4 border-green-200 shadow-xl flex items-center gap-2 transform transition-all hover:scale-105">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> 
                Play Again!
            </button>
        </div>
    </div>

    <!-- DRAG PREVIEW -->
    <div id="drag-preview" class="fixed pointer-events-none z-[60] flex items-center hidden transition-opacity" style="transform: translate(-50%, -50%) rotate(-5deg);">
        <div id="drag-preview-content" class="p-2 rounded-xl shadow-2xl scale-125 border-2 border-white bg-white/50 backdrop-blur-sm flex">
            <!-- Filled dynamically -->
        </div>
    </div>

    <script>
        /* --- AUDIO SYSTEM --- */
        let audioCtx = null;
        
        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
        }

        function playSound(type) {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            if (type === 'pop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'delete') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(150, now + 0.15);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'magic') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.setValueAtTime(800, now + 0.1);
                osc.frequency.setValueAtTime(1200, now + 0.2);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'win') {
                const freqs = [440, 554.37, 659.25, 880];
                freqs.forEach((f, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.type = 'sine';
                    o.frequency.value = f;
                    const t = now + (i * 0.1);
                    g.gain.setValueAtTime(0, t);
                    g.gain.linearRampToValueAtTime(0.2, t + 0.05);
                    g.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
                    o.start(t); o.stop(t + 0.3);
                });
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.linearRampToValueAtTime(150, now + 0.3);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            }
        }

        /* --- GAME STATE --- */
        let step = 1; 
        let operation = '-'; 
        let num1 = 0, initialTens = 0, initialOnes = 0;
        let tens = 0, ones = 0;
        let globalScore = 0;
        let currentRound = 1;
        const MAX_ROUNDS = 5;
        const MAX_TENS = 20, MAX_ONES = 30;
        
        // DOM Elements
        const tensContainer = document.getElementById('tens-container');
        const onesContainer = document.getElementById('ones-container');
        const mcqOptions = document.getElementById('mcq-options-container');
        const btnConfirm1 = document.getElementById('btn-confirm-1');
        const eqAns = document.getElementById('eq-ans');
        const gameTitle = document.getElementById('game-title');
        const hintText = document.getElementById('hint-text');
        
        function updateHints() {
            if (step === 1) {
                hintText.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg> Build your starting number!`;
                hintText.className = "bg-yellow-100 border-2 border-yellow-300 rounded-full px-5 py-1.5 shadow-sm text-yellow-700 font-bold text-center text-xs sm:text-sm animate-pulse flex items-center justify-center gap-2";
            } else {
                let current = tens * 10 + ones;
                let n2 = (operation === '+') ? (current - num1) : (num1 - current);

                if (n2 <= 0) {
                    hintText.innerHTML = operation === '+' ? "Add blocks using the buttons below!" : "Tap blocks to remove them!";
                    hintText.className = "bg-blue-100 border-2 border-blue-300 rounded-full px-5 py-1.5 shadow-sm text-blue-700 font-bold text-center text-xs sm:text-sm animate-pulse";
                } else {
                    hintText.innerHTML = "Choose the correct answer!";
                    hintText.className = "bg-green-100 border-2 border-green-300 rounded-full px-5 py-1.5 shadow-sm text-green-700 font-bold text-center text-xs sm:text-sm";
                }
            }
        }

        function setOp(op) {
            if (step === 2) return;
            operation = op;
            const btnAdd = document.getElementById('btn-op-add');
            const btnSub = document.getElementById('btn-op-sub');
            const eqOp = document.getElementById('eq-op');
            
            // Clean inline SVGs for the equation operator
            const svgPlus = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M12 4v16m8-8H4"></path>`;
            const svgMinus = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M20 12H4"></path>`;

            if (op === '+') {
                btnAdd.className = "px-5 py-1.5 sm:px-6 sm:py-2 rounded-full bg-blue-500 text-white shadow-md font-black text-xs sm:text-base transition-all flex items-center gap-1.5";
                btnSub.className = "px-5 py-1.5 sm:px-6 sm:py-2 rounded-full text-gray-400 font-black text-xs sm:text-base transition-all flex items-center gap-1.5";
                eqOp.innerHTML = svgPlus;
                gameTitle.innerHTML = `<svg class="w-5 h-5 sm:w-6 sm:h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg> Adding Blocks`;
            } else {
                btnSub.className = "px-5 py-1.5 sm:px-6 sm:py-2 rounded-full bg-blue-500 text-white shadow-md font-black text-xs sm:text-base transition-all flex items-center gap-1.5";
                btnAdd.className = "px-5 py-1.5 sm:px-6 sm:py-2 rounded-full text-gray-400 font-black text-xs sm:text-base transition-all flex items-center gap-1.5";
                eqOp.innerHTML = svgMinus;
                gameTitle.innerHTML = `<svg class="w-5 h-5 sm:w-6 sm:h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"></path></svg> Subtracting Blocks`;
            }
            playSound('pop');
            updateCalculatorUI();
            updateHints();
        }

        function confirmStep1() {
            num1 = tens * 10 + ones;
            if (num1 === 0) {
                hintText.innerHTML = "⚠️ Please add some blocks first!";
                hintText.classList.add('animate-shake', 'bg-red-100', 'text-red-600', 'border-red-300');
                setTimeout(updateHints, 2000);
                return; 
            }
            initialTens = tens; 
            initialOnes = ones; 
            step = 2;
            playSound('magic');
            
            // UI Updates
            document.getElementById('op-selector').classList.add('opacity-40', 'pointer-events-none');
            btnConfirm1.parentElement.classList.add('hidden'); // Hide confirm button
            
            updateUI(); 
            updateCalculatorUI();
            updateHints();
            
            // Pulse blocks to show they are locked
            tensContainer.childNodes.forEach(n => n.classList.add('animate-pulse'));
            onesContainer.childNodes.forEach(n => n.classList.add('animate-pulse'));
            setTimeout(() => {
                tensContainer.childNodes.forEach(n => n.classList.remove('animate-pulse'));
                onesContainer.childNodes.forEach(n => n.classList.remove('animate-pulse'));
            }, 1000);
        }

        function updateCalculatorUI() {
            let current = tens * 10 + ones;
            let n2 = 0;
            
            if (step === 1) { 
                document.getElementById('eq-num1').textContent = current || "_"; 
                document.getElementById('eq-num2').textContent = "_";
                eqAns.textContent = "?";
                mcqOptions.classList.add('hidden');
            } else {
                document.getElementById('eq-num1').textContent = num1;
                n2 = (operation === '+') ? (current - num1) : (num1 - current);
                document.getElementById('eq-num2').textContent = n2 <= 0 ? "_" : n2;
                
                // Only show MCQ options when user has actually added/subtracted blocks
                if (n2 > 0) {
                     mcqOptions.classList.remove('hidden');
                     generateOptions(); 
                } else {
                     mcqOptions.classList.add('hidden');
                }
            }
            
            document.getElementById('display-round').textContent = currentRound;
            document.getElementById('display-score').textContent = globalScore;
            
            // Ensure hint updates when state changes
            if (step === 2) updateHints();
        }

        function generateOptions() {
            if (step !== 2) return;
            let currentDisplayNumber = tens * 10 + ones;
            let correctAns = currentDisplayNumber; 
            
            let options = new Set([correctAns]);
            while(options.size < 4) {
                let offset = (Math.floor(Math.random() * 5) + 1);
                let sign = Math.random() > 0.5 ? 1 : -1;
                let dist = correctAns + (sign * offset);
                // Smart wrong options
                if (options.size === 1 && correctAns > 10) options.add(correctAns - 10);
                else if (options.size === 2 && correctAns < 90) options.add(correctAns + 10);
                else if (dist >= 0) options.add(dist);
            }
            
            mcqOptions.innerHTML = '';
            Array.from(options).sort(() => Math.random() - 0.5).forEach(v => {
                const b = document.createElement('button');
                b.className = "bg-white hover:bg-gray-50 border-4 border-gray-100 text-blue-600 font-black text-2xl sm:text-3xl py-3 sm:py-4 rounded-2xl sm:rounded-3xl shadow-lg gummy-btn transition-all";
                b.textContent = v;
                b.onclick = () => handleAnswer(v, correctAns, b);
                mcqOptions.appendChild(b);
            });
        }

        function handleAnswer(selectedValue, correctAns, btnElement) {
            if (selectedValue === correctAns) {
                // Correct!
                btnElement.classList.remove('bg-white', 'text-blue-600', 'border-gray-100');
                btnElement.classList.add('bg-green-500', 'text-white', 'border-green-400');
                eqAns.textContent = selectedValue; 
                eqAns.className = "text-green-500 drop-shadow-md";
                
                globalScore += 10; 
                document.getElementById('display-score').textContent = globalScore;
                playSound('win');
                
                // Disable all buttons
                Array.from(mcqOptions.children).forEach(child => child.disabled = true);
                
                // Disable block manipulation
                disableAllBlockControls();
                
                setTimeout(() => { 
                    if (currentRound >= MAX_ROUNDS) {
                        showEndScreen();
                    } else {
                        document.getElementById('tower-modal').classList.remove('hidden'); 
                    }
                }, 1000);
                
            } else {
                // Wrong
                btnElement.classList.remove('bg-white', 'border-gray-100');
                btnElement.classList.add('bg-red-400', 'text-white', 'border-red-500', 'animate-shake');
                playSound('wrong');
                setTimeout(() => {
                    btnElement.classList.remove('animate-shake');
                }, 400);
            }
        }

        function disableAllBlockControls() {
            document.getElementById('btn-add-ten').disabled = true;
            document.getElementById('btn-sub-ten').disabled = true;
            document.getElementById('btn-add-one').disabled = true;
            document.getElementById('btn-sub-one').disabled = true;
        }

        /* --- VISUAL BLOCK GENERATION --- */
        
        function createTenRod() {
            const wrapper = document.createElement('div'); 
            wrapper.className = "cursor-grab touch-none group hover:scale-105 transition-transform flex flex-row";
            
            // Drag Logic for regrouping
            let startX, startY;
            wrapper.onmousedown = (e) => { startX = e.clientX; startY = e.clientY; startDrag(e, 'tenRod', wrapper); };
            wrapper.addEventListener('touchstart', (e) => { 
                if(e.cancelable) e.preventDefault(); 
                startX = e.touches[0].clientX; startY = e.touches[0].clientY; startDrag(e, 'tenRod', wrapper); 
            }, {passive: false});

            // Click logic for removal
            const handleClick = (e) => {
                let cx = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
                let cy = e.clientY || (e.changedTouches && e.changedTouches[0].clientY);
                const dist = Math.sqrt(Math.pow(cx-startX,2)+Math.pow(cy-startY,2));
                if (dist < 10) { // It's a click/tap
                    if(step === 2 && operation === '+' && tens <= initialTens) {
                        wrapper.classList.add('animate-shake');
                        setTimeout(() => wrapper.classList.remove('animate-shake'), 300);
                        return; // Can't remove base numbers when adding
                    }
                    if(step === 1 || (step === 2 && operation === '-')) {
                        if(tens > 0) { 
                            tens--; 
                            playSound('delete'); 
                            updateUI(); 
                            updateCalculatorUI(); 
                        }
                    }
                }
            };
            wrapper.onmouseup = handleClick;
            wrapper.addEventListener('touchend', handleClick);

            const rod = document.createElement('div');
            // Changed dimensions to be horizontal
            rod.className = "ten-rod block-3d h-4 w-[120px] sm:h-6 sm:w-[180px] md:h-7 md:w-[210px]";
            for (let i = 0; i < 10; i++) {
                const seg = document.createElement('div');
                seg.className = "ten-segment";
                rod.appendChild(seg);
            }
            wrapper.appendChild(rod);
            return wrapper;
        }

        function createOneCube() {
            const cube = document.createElement('div'); 
            cube.className = "one-cube block-3d w-5 h-5 sm:w-7 sm:h-7 cursor-pointer hover:scale-110 transition-transform";
            
            const handleCubeClick = () => {
                if(step === 2 && operation === '+' && ones <= initialOnes) {
                    cube.classList.add('animate-shake');
                    setTimeout(() => cube.classList.remove('animate-shake'), 300);
                    return;
                }
                if(step === 1 || (step === 2 && operation === '-')) {
                    if(ones > 0) { 
                        ones--; 
                        playSound('delete'); 
                        updateUI(); 
                        updateCalculatorUI(); 
                    }
                }
            };
            cube.onclick = handleCubeClick;
            cube.addEventListener('touchstart', (e) => { if(e.cancelable) e.preventDefault(); handleCubeClick(); }, {passive: false});
            
            return cube;
        }

        /* --- DRAG & DROP FOR REGROUPING --- */
        let isDragging = false;
        const dragPreview = document.getElementById('drag-preview');
        const dragPreviewContent = document.getElementById('drag-preview-content');

        function startDrag(e, type, sourceElement) {
            isDragging = true;
            
            // Populate preview
            dragPreviewContent.innerHTML = '';
            if (type === 'tenRod') {
                const rod = document.createElement('div');
                // Ensure preview matches horizontal size
                rod.className = "ten-rod block-3d h-4 w-[120px] sm:h-6 sm:w-[180px] md:h-7 md:w-[210px]";
                for(let i=0; i<10; i++) rod.appendChild(document.createElement('div')).className = "ten-segment";
                dragPreviewContent.appendChild(rod);
                sourceElement.style.opacity = '0.3'; // Dim original
            }

            dragPreview.classList.remove('hidden');
            positionDragPreview(e);

            const move = (me) => {
                if(me.cancelable) me.preventDefault();
                positionDragPreview(me);
            };

            const stop = (se) => {
                window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', stop);
                window.removeEventListener('touchmove', move); window.removeEventListener('touchend', stop);
                
                isDragging = false; 
                dragPreview.classList.add('hidden');
                if(sourceElement) sourceElement.style.opacity = '1';

                const ex = se.changedTouches ? se.changedTouches[0].clientX : se.clientX;
                const ey = se.changedTouches ? se.changedTouches[0].clientY : se.clientY;
                
                // Check if dropped in ones column
                const r = document.getElementById('ones-column').getBoundingClientRect();
                if (ex >= r.left && ex <= r.right && ey >= r.top && ey <= r.bottom) { 
                    if (tens > 0 && ones + 10 <= MAX_ONES) { 
                        if(step === 2 && operation === '+' && tens <= initialTens) {
                           // Cannot break base ten while adding
                           playSound('wrong');
                        } else {
                            tens--; 
                            ones += 10; 
                            if(step === 2 && operation === '+') { initialTens--; initialOnes += 10; }
                            playSound('magic'); 
                        }
                    }
                }
                updateUI(); 
                updateCalculatorUI();
            };

            window.addEventListener('mousemove', move); window.addEventListener('mouseup', stop);
            window.addEventListener('touchmove', move, {passive:false}); window.addEventListener('touchend', stop);
        }

        function positionDragPreview(e) {
            const mx = e.touches ? e.touches[0].clientX : e.clientX;
            const my = e.touches ? e.touches[0].clientY : e.clientY;
            dragPreview.style.left = mx + 'px'; 
            dragPreview.style.top = my + 'px';
        }

        /* --- UI UPDATER --- */
        function updateUI() {
            tensContainer.innerHTML = '';
            for (let i = 0; i < tens; i++) {
                if (step === 2 && operation === '+' && i === initialTens && initialTens > 0) {
                    const d = document.createElement('div'); 
                    d.className = "w-full border-b-[3px] border-dashed border-cyan-400 my-1 sm:my-2 relative opacity-70";
                    tensContainer.appendChild(d);
                }
                tensContainer.appendChild(createTenRod());
            }
            
            onesContainer.innerHTML = '';
            for (let i = 0; i < ones; i++) {
                if (step === 2 && operation === '+' && i === initialOnes && initialOnes > 0) {
                    const d = document.createElement('div'); 
                    d.className = "w-full basis-full border-b-[3px] border-dashed border-orange-400 my-1 sm:my-2 relative opacity-70";
                    onesContainer.appendChild(d);
                }
                onesContainer.appendChild(createOneCube());
            }

            // --- Button States Control ---
            const btnAddTen = document.getElementById('btn-add-ten');
            const btnSubTen = document.getElementById('btn-sub-ten');
            const btnAddOne = document.getElementById('btn-add-one');
            const btnSubOne = document.getElementById('btn-sub-one');

            if (step === 2) {
                if (operation === '-') {
                    // Subtraction: Disable Add buttons
                    btnAddTen.disabled = true; btnAddOne.disabled = true;
                    btnSubTen.disabled = (tens <= 0); btnSubOne.disabled = (ones <= 0);
                } else {
                    // Addition: Enable Add buttons, Disable sub past initial limit
                    btnAddTen.disabled = (tens >= MAX_TENS); btnAddOne.disabled = (ones >= MAX_ONES);
                    btnSubTen.disabled = (tens <= initialTens);
                    btnSubOne.disabled = (ones <= initialOnes);
                }
            } else {
                // Step 1: All active within limits
                btnAddTen.disabled = (tens >= MAX_TENS); btnAddOne.disabled = (ones >= MAX_ONES);
                btnSubTen.disabled = (tens <= 0); btnSubOne.disabled = (ones <= 0);
            }
            
            // Regroup hint (Ones to Ten)
            if (ones >= 10) { 
                document.getElementById('regroup-hint').classList.remove('hidden'); 
                const bp = document.getElementById('bundle-preview'); bp.innerHTML = '';
                for(let i=0; i<10; i++) bp.innerHTML += `<div class="w-2.5 h-2.5 bg-orange-400 rounded-sm"></div>`;
            } else {
                document.getElementById('regroup-hint').classList.add('hidden');
            }

            // Zeros background
            document.getElementById('tens-zero').style.display = tens === 0 ? 'block' : 'none';
            document.getElementById('ones-zero').style.display = ones === 0 ? 'block' : 'none';

            if (step === 2) {
                // generateOptions is called via updateCalculatorUI when n2 > 0
            }
        }

        // Manual controls
        function addOne() { if (ones < MAX_ONES) { ones++; playSound('pop'); updateUI(); updateCalculatorUI(); } }
        function removeOne() { 
            if (ones > 0) { 
                if(step === 2 && operation === '+' && ones <= initialOnes) {
                    playSound('wrong'); return;
                }
                ones--; playSound('delete'); updateUI(); updateCalculatorUI(); 
            } 
        }
        function addTen() { if (tens < MAX_TENS) { tens++; playSound('pop'); updateUI(); updateCalculatorUI(); } }
        function removeTen() { 
            if (tens > 0) { 
                if(step === 2 && operation === '+' && tens <= initialTens) {
                    playSound('wrong'); return;
                }
                tens--; playSound('delete'); updateUI(); updateCalculatorUI(); 
            } 
        }

        function regroupTen() {
            if (tens < MAX_TENS && ones >= 10) { 
                tens++; ones -= 10; 
                if(step === 2 && operation === '+') { initialTens++; initialOnes -= 10; }
                playSound('magic'); updateUI(); updateCalculatorUI();
            }
        }

        function resetBoardFull() {
            step = 1; tens = 0; ones = 0; num1 = 0; initialTens = 0; initialOnes = 0;
            document.getElementById('op-selector').classList.remove('opacity-40', 'pointer-events-none');
            btnConfirm1.parentElement.classList.remove('hidden'); 
            mcqOptions.classList.add('hidden');
            eqAns.textContent = "?"; eqAns.className = "text-gray-300 drop-shadow-md";
            updateUI(); updateCalculatorUI(); updateHints();
        }

        /* --- BONUS MINI GAME (TOWER) --- */
        const towerCanvas = document.getElementById('gameCanvas');
        const tCtx = towerCanvas.getContext('2d');
        const BLOCK_HEIGHT = 28;
        const WIN_LIMIT = 10;
        const COLORS = ['#FF9F43', '#EE5253', '#0ABDE3', '#10AC84', '#F368E0'];
        let towerBlocks = [], currentTBlock = null, towerScore = 0, towerCameraY = 0, towerGameState = 'START';

        function initTowerCanvas() {
            const r = towerCanvas.parentElement.getBoundingClientRect();
            towerCanvas.width = r.width; towerCanvas.height = 300;
        }

        class TBlock {
            constructor(x, y, w, color, spd) {
                this.x = x; this.y = y; this.w = w; this.h = BLOCK_HEIGHT; 
                this.color = color; this.spd = spd; this.dir = 1; this.falling = false;
            }
            update() {
                if (!this.falling) {
                    this.x += this.spd * this.dir;
                    if (this.x + this.w > towerCanvas.width || this.x < 0) this.dir *= -1;
                } else this.y += 15; // Fast fall speed
            }
            draw(ctx, offset) {
                ctx.fillStyle = this.color; 
                ctx.fillRect(this.x, this.y + offset, this.w, this.h);
                
                // 3D Highlight & Shadow
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(this.x, this.y + offset, this.w, 3);
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.fillRect(this.x, this.y + offset + this.h - 3, this.w, 3);
                
                ctx.strokeStyle = '#fff'; 
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x, this.y + offset, this.w, this.h);
            }
        }

        function startTowerGame() {
            initTowerCanvas(); 
            towerGameState = 'PLAYING'; 
            towerBlocks = []; 
            towerScore = 0; 
            towerCameraY = 0;
            document.getElementById('tower-overlay').classList.add('hidden');
            document.getElementById('tower-score-display').textContent = '0';
            
            // Base block
            towerBlocks.push(new TBlock((towerCanvas.width - 140)/2, towerCanvas.height - BLOCK_HEIGHT, 140, '#546de5', 0));
            spawnTBlock(); 
            requestAnimationFrame(animateTower);
            playSound('magic');
        }

        function spawnTBlock() {
            const last = towerBlocks[towerBlocks.length - 1];
            let spd = 2.5 + (towerScore * 0.25);
            if(window.innerWidth < 600) spd *= 0.8; 
            
            currentTBlock = new TBlock(0, last.y - BLOCK_HEIGHT - 120, last.w, COLORS[towerScore % COLORS.length], spd);
        }

        function animateTower() {
            if (towerGameState !== 'PLAYING') return;
            
            // Background
            const grad = tCtx.createLinearGradient(0,0,0,towerCanvas.height);
            grad.addColorStop(0, '#e0f7fa');
            grad.addColorStop(1, '#ffffff');
            tCtx.fillStyle = grad;
            tCtx.fillRect(0,0,towerCanvas.width, towerCanvas.height);
            
            // Draw Goal Line
            const goalY = towerBlocks[0].y - (WIN_LIMIT * BLOCK_HEIGHT);
            tCtx.setLineDash([8, 8]); 
            tCtx.strokeStyle = '#F1C40F'; 
            tCtx.lineWidth = 3;
            tCtx.beginPath();
            tCtx.moveTo(0, goalY + towerCameraY); 
            tCtx.lineTo(towerCanvas.width, goalY + towerCameraY); 
            tCtx.stroke();
            tCtx.setLineDash([]);

            towerBlocks.forEach(b => b.draw(tCtx, towerCameraY));
            currentTBlock.update(); 
            currentTBlock.draw(tCtx, towerCameraY);
            
            if (currentTBlock.falling) {
                const last = towerBlocks[towerBlocks.length - 1];
                if (currentTBlock.y + BLOCK_HEIGHT >= last.y) {
                    const diff = currentTBlock.x - last.x; 
                    const overlap = currentTBlock.w - Math.abs(diff);
                    
                    if (overlap > 10) { 
                        currentTBlock.falling = false; 
                        currentTBlock.y = last.y - BLOCK_HEIGHT;
                        currentTBlock.w = overlap; 
                        currentTBlock.x = diff > 0 ? last.x + diff : last.x;
                        
                        towerBlocks.push(currentTBlock); 
                        towerScore++;
                        document.getElementById('tower-score-display').textContent = towerScore;
                        playSound('pop');

                        if (currentTBlock.y + towerCameraY < 120) {
                            towerCameraY += BLOCK_HEIGHT;
                        }
                        
                        if (towerScore >= WIN_LIMIT) {
                            endTower('WIN'); 
                        } else {
                            spawnTBlock();
                        }
                    } else {
                        endTower('LOSE');
                    }
                }
            }
            requestAnimationFrame(animateTower);
        }

        function endTower(res) {
            towerGameState = res;
            document.getElementById('tower-result-overlay').classList.remove('hidden');
            const txt = document.getElementById('tower-status-text');
            const emoji = document.getElementById('tower-result-emoji');
            
            if (res === 'WIN') {
                txt.textContent = "Awesome Builder!";
                txt.className = "text-2xl sm:text-3xl font-black text-green-500 mb-6 text-center px-4";
                emoji.textContent = "🏆";
                playSound('win');
                globalScore += 5;
                document.getElementById('display-score').textContent = globalScore;
            } else {
                txt.textContent = "Oops! It fell.";
                txt.className = "text-2xl sm:text-3xl font-black text-red-500 mb-6 text-center px-4";
                emoji.textContent = "💥";
                playSound('wrong');
            }
        }

        function closeTowerGame() {
            document.getElementById('tower-modal').classList.add('hidden');
            document.getElementById('tower-result-overlay').classList.add('hidden');
            document.getElementById('tower-overlay').classList.remove('hidden');
            
            currentRound++;
            resetBoardFull();
        }

        towerCanvas.addEventListener('mousedown', () => { if(currentTBlock && !currentTBlock.falling) currentTBlock.falling = true; });
        towerCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); if(currentTBlock && !currentTBlock.falling) currentTBlock.falling = true; }, {passive:false});

        /* --- END GAME & FIREWORKS --- */
        const fwCanvas = document.getElementById('fireworksCanvas');
        const fwCtx = fwCanvas.getContext('2d');
        let fwParticles = [];
        let fwAnimationId;

        function showEndScreen() {
            document.getElementById('end-game-modal').classList.remove('hidden');
            document.getElementById('final-score-display').textContent = globalScore;
            playSound('win');
            startFireworks();
        }

        function playAgain() {
            document.getElementById('end-game-modal').classList.add('hidden');
            cancelAnimationFrame(fwAnimationId);
            fwParticles = [];
            currentRound = 1;
            globalScore = 0;
            resetBoardFull();
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 3;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.01;
                this.size = Math.random() * 5 + 2;
            }
            update() {
                this.vy += 0.1; 
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.alpha);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function createExplosion(x, y) {
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffffff'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            for (let i = 0; i < 60; i++) {
                fwParticles.push(new Particle(x, y, color));
            }
        }

        function animateFireworks() {
            fwCanvas.width = window.innerWidth;
            fwCanvas.height = window.innerHeight;
            fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
            
            if (Math.random() < 0.08) {
                createExplosion(Math.random() * fwCanvas.width, Math.random() * (fwCanvas.height * 0.6));
            }

            for (let i = fwParticles.length - 1; i >= 0; i--) {
                const p = fwParticles[i];
                p.update();
                p.draw(fwCtx);
                if (p.alpha <= 0) fwParticles.splice(i, 1);
            }
            fwAnimationId = requestAnimationFrame(animateFireworks);
        }

        function startFireworks() {
            fwCanvas.width = window.innerWidth;
            fwCanvas.height = window.innerHeight;
            animateFireworks();
        }

        // Initialize UI
        updateUI();
        updateHints();
        
        // Handle resize for canvases
        window.addEventListener('resize', () => {
            if(towerGameState === 'PLAYING') initTowerCanvas();
        });

    </script>
</body>
