<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Make the Story - Level 5</title>
    
    <!-- Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        duo: {
                            green: '#58cc02',
                            greenDark: '#58a700',
                            blue: '#1cb0f6',
                            blueDark: '#1899d6',
                            yellow: '#ffc800',
                            yellowDark: '#c6a100',
                            red: '#ff4b4b',
                            redDark: '#ea2b2b',
                            purple: '#ce82ff',
                            purpleDark: '#a560cc',
                            bg: '#ddf4ff'
                        }
                    },
                    boxShadow: {
                        'duo-sm': '0 4px 0 0 rgba(0,0,0,0.1)',
                        'duo-md': '0 6px 0 0 rgba(0,0,0,0.1)',
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Framer Motion for smooth animations -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <!-- Tone.js for audio -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden; /* Prevent scrolling while dragging */
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        
        /* Make emojis look more realistic/3D via filters */
        .realistic-icon {
            filter: drop-shadow(0px 8px 6px rgba(0,0,0,0.3)) saturate(1.3) contrast(1.1);
        }
        
        /* Custom scrollbar for pools */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(203, 213, 225, 0.8);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(148, 163, 184, 0.8);
        }
    </style>
</head>
<body class="text-gray-800 h-screen w-screen flex justify-center items-center bg-[#87CEEB]">
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- Root Container: Flex-centered to guarantee the game block stays in the middle -->
    <div id="root" class="w-full h-full flex items-center justify-center"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- Audio & TTS Setup ---
        let boingSynth = null;
        let winSynth = null;
        let grandWinSynth = null;

        const initAudio = async () => {
            await Tone.start();
            if (!boingSynth) {
                boingSynth = new Tone.Synth({
                    oscillator: { type: 'triangle' },
                    envelope: { attack: 0.01, decay: 0.2, sustain: 0, release: 0.1 }
                }).toDestination();
                boingSynth.volume.value = -5;
            }
            if (!winSynth) {
                winSynth = new Tone.PolySynth(Tone.Synth).toDestination();
                winSynth.volume.value = -5;
            }
            if (!grandWinSynth) {
                grandWinSynth = new Tone.PolySynth(Tone.Synth).toDestination();
                grandWinSynth.volume.value = -2;
            }

            if ('speechSynthesis' in window) {
                const silentUtterance = new SpeechSynthesisUtterance('');
                silentUtterance.volume = 0;
                window.speechSynthesis.speak(silentUtterance);
            }
        };

        const playBoing = () => {
            if (boingSynth && Tone.context.state === 'running') {
                boingSynth.triggerAttackRelease("A4", "16n");
                boingSynth.oscillator.frequency.setValueAtTime(300, Tone.now());
                boingSynth.oscillator.frequency.exponentialRampToValueAtTime(800, Tone.now() + 0.1);
            }
        };

        const playWinSound = () => {
            if (winSynth && Tone.context.state === 'running') {
                const now = Tone.now();
                winSynth.triggerAttackRelease(["C4", "E4", "G4"], "8n", now);
                winSynth.triggerAttackRelease(["C4", "E4", "G4", "C5"], "2n", now + 0.15);
            }
        };

        const playGrandWinSound = () => {
            if (grandWinSynth && Tone.context.state === 'running') {
                const now = Tone.now();
                grandWinSynth.triggerAttackRelease(["C4", "E4", "G4", "C5"], "8n", now);
                grandWinSynth.triggerAttackRelease(["D4", "F#4", "A4", "D5"], "8n", now + 0.2);
                grandWinSynth.triggerAttackRelease(["E4", "G#4", "B4", "E5"], "2n", now + 0.4);
            }
        };

        const speak = (text) => {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.8; 
            utterance.pitch = 1.2; 
            
            const voices = window.speechSynthesis.getVoices();
            const usVoice = voices.find(v => v.lang === 'en-US' && v.name.toLowerCase().includes('female')) || 
                            voices.find(v => v.lang === 'en-US') || voices[0];
            
            if (usVoice) utterance.voice = usVoice;
            window.speechSynthesis.speak(utterance);
        };

        const MAX_LEVELS = 10;
        
        // 10 Scenarios alternating between Animals and Fruits
        const SCENARIOS = [
            { type: 'animal', emoji1: '🐶', singular1: 'Dog', plural1: 'Dogs', emoji2: '🐱', singular2: 'Cat', plural2: 'Cats', collectiveName: 'Pets', sceneDesc: 'in the house', bgColor: 'bg-green-100/80', borderColor: 'border-green-500' },
            { type: 'fruit', emoji1: '🍎', singular1: 'Apple', plural1: 'Apples', emoji2: '🍌', singular2: 'Banana', plural2: 'Bananas', collectiveName: 'Fruits', sceneDesc: 'in the basket', bgColor: 'bg-red-100/80', borderColor: 'border-red-500' },
            { type: 'animal', emoji1: '🐰', singular1: 'Rabbit', plural1: 'Rabbits', emoji2: '🐭', singular2: 'Mouse', plural2: 'Mice', collectiveName: 'Animals', sceneDesc: 'in the garden', bgColor: 'bg-emerald-100/80', borderColor: 'border-emerald-500' },
            { type: 'fruit', emoji1: '🍓', singular1: 'Strawberry', plural1: 'Strawberries', emoji2: '🍇', singular2: 'Grape', plural2: 'Grapes', collectiveName: 'Fruits', sceneDesc: 'in the bowl', bgColor: 'bg-pink-100/80', borderColor: 'border-pink-500' },
            { type: 'animal', emoji1: '🐷', singular1: 'Pig', plural1: 'Pigs', emoji2: '🐮', singular2: 'Cow', plural2: 'Cows', collectiveName: 'Farm Animals', sceneDesc: 'on the farm', bgColor: 'bg-amber-100/80', borderColor: 'border-amber-500' },
            { type: 'fruit', emoji1: '🍊', singular1: 'Orange', plural1: 'Oranges', emoji2: '🍉', singular2: 'Watermelon', plural2: 'Watermelons', collectiveName: 'Fruits', sceneDesc: 'on the table', bgColor: 'bg-orange-100/80', borderColor: 'border-orange-500' },
            { type: 'animal', emoji1: '🐔', singular1: 'Chicken', plural1: 'Chickens', emoji2: '🦆', singular2: 'Duck', plural2: 'Ducks', collectiveName: 'Birds', sceneDesc: 'by the pond', bgColor: 'bg-cyan-100/80', borderColor: 'border-cyan-500' },
            { type: 'fruit', emoji1: '🍑', singular1: 'Peach', plural1: 'Peaches', emoji2: '🍒', singular2: 'Cherry', plural2: 'Cherries', collectiveName: 'Fruits', sceneDesc: 'in the box', bgColor: 'bg-rose-100/80', borderColor: 'border-rose-500' },
            { type: 'animal', emoji1: '🐵', singular1: 'Monkey', plural1: 'Monkeys', emoji2: '🐼', singular2: 'Panda', plural2: 'Pandas', collectiveName: 'Wild Animals', sceneDesc: 'in the zoo', bgColor: 'bg-teal-100/80', borderColor: 'border-teal-500' },
            { type: 'fruit', emoji1: '🍍', singular1: 'Pineapple', plural1: 'Pineapples', emoji2: '🥭', singular2: 'Mango', plural2: 'Mangoes', collectiveName: 'Fruits', sceneDesc: 'on the plate', bgColor: 'bg-yellow-100/80', borderColor: 'border-yellow-500' }
        ];

        const generateLevel = (levelIndex) => {
            const c = Math.floor(Math.random() * 8) + 3; // 3 to 10
            const a = Math.floor(Math.random() * (c - 1)) + 1;
            const b = c - a;

            // Pick scenario based on level index to ensure alternation
            const scenario = SCENARIOS[levelIndex % SCENARIOS.length];
            const items = [];
            
            const numE1 = Math.max(a + 2, 5);
            const numE2 = Math.max(b + 2, 5);

            for (let i = 0; i < numE1; i++) items.push({ id: `e1_${i}`, type: 'type1', emoji: scenario.emoji1, zone: 'pool' });
            for (let i = 0; i < numE2; i++) items.push({ id: `e2_${i}`, type: 'type2', emoji: scenario.emoji2, zone: 'pool' });

            items.sort(() => Math.random() - 0.5);
            return { a, b, c, scenario, items };
        };

        const GameBackground = () => {
            return (
                <div className="fixed inset-0 -z-10 bg-gradient-to-b from-[#87CEEB] to-[#e0f6ff] pointer-events-none overflow-hidden flex flex-col justify-end">
                    
                    {/* Sky Elements - Fixed to Top */}
                    <div className="absolute top-0 w-full h-full">
                        {/* Rainbow - Using viewBox to maintain proportions */}
                        <svg className="absolute top-[5%] left-[5%] md:left-[10%] w-[30vw] min-w-[200px] max-w-[400px] opacity-70" viewBox="0 0 200 100" preserveAspectRatio="xMidYMid meet">
                            <path d="M 10,100 A 90,90 0 0,1 190,100" fill="none" stroke="#ff4b4b" strokeWidth="8"/>
                            <path d="M 20,100 A 80,80 0 0,1 180,100" fill="none" stroke="#ffc800" strokeWidth="8"/>
                            <path d="M 30,100 A 70,70 0 0,1 170,100" fill="none" stroke="#58cc02" strokeWidth="8"/>
                            <path d="M 40,100 A 60,60 0 0,1 160,100" fill="none" stroke="#1cb0f6" strokeWidth="8"/>
                            <path d="M 50,100 A 50,50 0 0,1 150,100" fill="none" stroke="#ce82ff" strokeWidth="8"/>
                        </svg>

                        {/* Sun */}
                        <div className="absolute top-[8%] right-[8%] md:top-[10%] md:right-[15%] w-20 h-20 sm:w-28 sm:h-28 bg-yellow-300 rounded-full shadow-[0_0_60px_rgba(253,224,71,1)] animate-pulse"></div>

                        {/* Clouds (Animated) */}
                        <motion.div animate={{ x: ['-20vw', '120vw'] }} transition={{ duration: 60, repeat: Infinity, ease: "linear" }} className="absolute top-[12%] text-6xl md:text-8xl opacity-90 drop-shadow-lg">☁️</motion.div>
                        <motion.div animate={{ x: ['120vw', '-20vw'] }} transition={{ duration: 80, repeat: Infinity, ease: "linear" }} className="absolute top-[25%] text-5xl md:text-7xl opacity-80 drop-shadow-lg">☁️</motion.div>
                        <motion.div animate={{ x: ['-10vw', '110vw'] }} transition={{ duration: 45, repeat: Infinity, ease: "linear", delay: 10 }} className="absolute top-[5%] text-4xl md:text-6xl opacity-70 drop-shadow-lg">☁️</motion.div>
                    </div>

                    {/* Grass Hills - SVG approach prevents all distortion on resize */}
                    <div className="relative w-full h-[35vh] min-h-[250px] max-h-[400px]">
                        {/* SVG Background ensuring smooth curve on ANY aspect ratio */}
                        <svg className="absolute bottom-0 w-full h-full" preserveAspectRatio="xMidYMax slice" viewBox="0 0 1440 400" xmlns="http://www.w3.org/2000/svg">
                            {/* Back Hill */}
                            <path fill="#74d642" d="M0,150 C400,350 1000,-50 1440,150 L1440,400 L0,400 Z" />
                            {/* Front Hill */}
                            <path fill="#58cc02" d="M0,250 C500,50 1100,350 1440,200 L1440,400 L0,400 Z" />
                        </svg>
                        
                        {/* Trees & Flowers Scattered using absolute vw/vh to stick accurately to the hills */}
                        <div className="absolute bottom-[20%] left-[10%] text-5xl md:text-7xl drop-shadow-md realistic-icon">🌳</div>
                        <div className="absolute bottom-[10%] left-[25%] text-3xl md:text-5xl drop-shadow-md realistic-icon">🌷</div>
                        <div className="absolute bottom-[40%] left-[35%] text-4xl md:text-6xl drop-shadow-md realistic-icon">🌲</div>
                        <div className="absolute bottom-[15%] right-[35%] text-3xl md:text-5xl drop-shadow-md realistic-icon">🌻</div>
                        <div className="absolute bottom-[25%] right-[15%] text-6xl md:text-8xl drop-shadow-md realistic-icon">🌳</div>
                        <div className="absolute bottom-[5%] right-[45%] text-2xl md:text-4xl drop-shadow-md realistic-icon">🌼</div>
                        <div className="absolute bottom-[10%] left-[50%] text-2xl md:text-4xl drop-shadow-md realistic-icon">🌸</div>
                    </div>
                </div>
            );
        };

        const Confetti = ({ dense = false }) => {
            const colors = ['#58cc02', '#1cb0f6', '#ffc800', '#ff4b4b', '#ce82ff'];
            const count = dense ? 150 : 40;
            return (
                <div className="fixed inset-0 pointer-events-none z-[9999] overflow-hidden">
                    {[...Array(count)].map((_, i) => (
                        <motion.div
                            key={i}
                            initial={{ x: '50vw', y: '100vh', scale: 0 }}
                            animate={{
                                x: `${Math.random() * 100}vw`,
                                y: `${(Math.random() * 100) - 20}vh`,
                                scale: Math.random() * 1.5 + 0.5,
                                rotate: Math.random() * 720
                            }}
                            transition={{ duration: dense ? 3 : 1.5, ease: "easeOut", delay: Math.random() * 0.3 }}
                            className="absolute w-5 h-5 rounded-sm shadow-md"
                            style={{ backgroundColor: colors[Math.floor(Math.random() * colors.length)] }}
                        />
                    ))}
                </div>
            );
        };

        const DuoButton = ({ children, onClick, colorClass, borderClass, className="" }) => (
            <motion.button
                whileHover={{ scale: 1.02 }}
                whileTap={{ y: 6, borderBottomWidth: 0, marginBottom: 6 }}
                onClick={onClick}
                className={`px-8 py-4 ${colorClass} text-white font-black rounded-2xl border-b-[6px] ${borderClass} text-xl sm:text-2xl uppercase tracking-widest transition-all ${className}`}
            >
                {children}
            </motion.button>
        );

        const App = () => {
            const [gameState, setGameState] = useState('start'); // start, playing, won, finished
            const [level, setLevel] = useState(null);
            const [levelCount, setLevelCount] = useState(1);
            const [score, setScore] = useState(0);
            const sceneRef = useRef(null);

            const startGame = async () => {
                await initAudio();
                setScore(0);
                setLevelCount(1);
                startNextLevel(1);
            };

            const startNextLevel = (currentLevelNum) => {
                const newLevel = generateLevel(currentLevelNum - 1);
                setLevel(newLevel);
                setGameState('playing');
                
                setTimeout(() => {
                    const name1 = newLevel.a === 1 ? newLevel.scenario.singular1 : newLevel.scenario.plural1;
                    const name2 = newLevel.b === 1 ? newLevel.scenario.singular2 : newLevel.scenario.plural2;
                    const isAre1 = newLevel.a === 1 ? 'There is' : 'There are';
                    const isAre2 = newLevel.b === 1 ? 'There is' : 'There are';
                    
                    speak(`${isAre1} ${newLevel.a} ${name1}. ${isAre2} ${newLevel.b} ${name2}. How many ${newLevel.scenario.collectiveName} altogether?`);
                }, 600);
            };

            const handleDragEnd = (event, info, id) => {
                if (gameState !== 'playing') return;

                const sceneRect = sceneRef.current.getBoundingClientRect();
                const pointerX = info.point.x;
                const pointerY = info.point.y;

                const isInsideScene = (
                    pointerX >= sceneRect.left && pointerX <= sceneRect.right &&
                    pointerY >= sceneRect.top && pointerY <= sceneRect.bottom
                );

                const newZone = isInsideScene ? 'scene' : 'pool';

                setLevel(prev => {
                    const item = prev.items.find(i => i.id === id);
                    if (item && item.zone !== newZone) {
                        playBoing();
                        return { ...prev, items: prev.items.map(i => i.id === id ? { ...i, zone: newZone } : i) };
                    }
                    return prev;
                });
            };

            useEffect(() => {
                if (gameState === 'playing' && level) {
                    const count1 = level.items.filter(i => i.zone === 'scene' && i.type === 'type1').length;
                    const count2 = level.items.filter(i => i.zone === 'scene' && i.type === 'type2').length;
                    
                    if (count1 === level.a && count2 === level.b) {
                        setGameState('won');
                        setScore(prev => prev + 1);
                        playWinSound();
                        
                        const name1 = level.a === 1 ? level.scenario.singular1 : level.scenario.plural1;
                        const name2 = level.b === 1 ? level.scenario.singular2 : level.scenario.plural2;
                        speak(`Amazing! ${level.a} plus ${level.b} makes ${level.c} ${level.scenario.collectiveName}!`);
                    }
                }
            }, [level?.items, gameState]);

            if (gameState === 'start') {
                return (
                    <>
                        <GameBackground />
                        <div className="flex flex-col items-center justify-center w-full h-full max-w-5xl p-4 z-10 relative">
                            <motion.div 
                                initial={{ scale: 0, rotate: -10 }}
                                animate={{ scale: 1, rotate: 0 }}
                                transition={{ type: "spring", bounce: 0.6 }}
                                className="bg-white/90 backdrop-blur-md p-6 sm:p-10 rounded-3xl shadow-duo-md border-2 border-white/50 flex flex-col items-center mx-4"
                            >
                                <h1 className="text-4xl sm:text-6xl md:text-7xl font-black text-duo-blue mb-4 text-center drop-shadow-sm">
                                    Math Story
                                </h1>
                                <div className="flex gap-4 text-5xl sm:text-7xl mb-6 realistic-icon">
                                    🐶 ➕ 🍎
                                </div>
                                <p className="text-lg sm:text-2xl text-gray-600 font-semibold mb-8 text-center max-w-md">
                                    Listen, drag, and count to solve 10 fun puzzles!
                                </p>
                                
                                <DuoButton onClick={startGame} colorClass="bg-duo-green" borderClass="border-duo-greenDark">
                                    Play Now
                                </DuoButton>
                            </motion.div>
                        </div>
                    </>
                );
            }

            if (gameState === 'finished') {
                return (
                    <>
                        <GameBackground />
                        <div className="flex flex-col items-center justify-center w-full h-full max-w-5xl p-4 z-50 relative">
                            <Confetti dense={true} />
                            <motion.div 
                                initial={{ scale: 0.5, opacity: 0 }}
                                animate={{ scale: 1, opacity: 1 }}
                                className="bg-white/90 backdrop-blur-md p-8 sm:p-12 rounded-3xl shadow-duo-md border-2 border-white/50 flex flex-col items-center z-10 text-center relative mx-4"
                            >
                                <h1 className="text-4xl sm:text-5xl md:text-6xl font-black text-duo-yellow mb-2 drop-shadow-sm">
                                    Level Complete!
                                </h1>
                                <div className="text-7xl sm:text-8xl my-6 realistic-icon">🌟</div>
                                <p className="text-2xl sm:text-4xl font-bold text-gray-700 mb-8">
                                    You scored <span className="text-duo-green">{score}</span> / {MAX_LEVELS}!
                                </p>
                                
                                <DuoButton onClick={startGame} colorClass="bg-duo-blue" borderClass="border-duo-blueDark">
                                    Play Again
                                </DuoButton>
                            </motion.div>
                        </div>
                    </>
                );
            }

            if (!level) return null;

            const { a, b, c, scenario, items } = level;
            const count1 = items.filter(i => i.zone === 'scene' && i.type === 'type1').length;
            const count2 = items.filter(i => i.zone === 'scene' && i.type === 'type2').length;
            
            return (
                <>
                    <GameBackground />
                    
                    {/* Centered Main Container Wrapper */}
                    <div className="relative z-10 w-full h-full max-w-6xl max-h-[1000px] flex flex-col p-2 sm:p-4 gap-3 sm:gap-4 overflow-hidden">
                        {gameState === 'won' && <Confetti />}

                        {/* Top Info Bar (Progress, Equations) */}
                        <div className="bg-white/90 backdrop-blur-md rounded-2xl md:rounded-3xl shadow-duo-sm border-2 border-white/50 p-3 sm:p-5 flex flex-col items-center shrink-0 z-10">
                            
                            {/* Progress Bar */}
                            <div className="w-full max-w-3xl bg-gray-200/80 rounded-full h-3 sm:h-4 mb-3 sm:mb-4 overflow-hidden border border-gray-300">
                                <motion.div 
                                    className="bg-duo-green h-full rounded-full"
                                    initial={{ width: `${((levelCount - 1) / MAX_LEVELS) * 100}%` }}
                                    animate={{ width: `${(levelCount / MAX_LEVELS) * 100}%` }}
                                    transition={{ duration: 0.5 }}
                                />
                            </div>

                            {/* Story Blocks */}
                            <div className="flex flex-row justify-center gap-2 sm:gap-6 w-full max-w-4xl mb-2 sm:mb-4">
                                <div className="flex-1 bg-duo-bg/80 rounded-2xl p-2 sm:p-4 border-2 border-blue-200 flex items-center justify-center gap-2 sm:gap-4 shadow-sm min-w-[120px]">
                                    <span className="text-3xl sm:text-5xl realistic-icon">{scenario.emoji1}</span>
                                    <div className="text-sm sm:text-xl font-bold text-gray-700 leading-tight">
                                        <span className="text-duo-blue text-xl sm:text-3xl">{a}</span><br className="sm:hidden" /> {a === 1 ? scenario.singular1 : scenario.plural1}
                                    </div>
                                </div>
                                <div className="flex items-center text-3xl sm:text-5xl font-black text-gray-500 drop-shadow-sm">+</div>
                                <div className="flex-1 bg-duo-bg/80 rounded-2xl p-2 sm:p-4 border-2 border-blue-200 flex items-center justify-center gap-2 sm:gap-4 shadow-sm min-w-[120px]">
                                    <span className="text-3xl sm:text-5xl realistic-icon">{scenario.emoji2}</span>
                                    <div className="text-sm sm:text-xl font-bold text-gray-700 leading-tight">
                                        <span className="text-duo-blue text-xl sm:text-3xl">{b}</span><br className="sm:hidden" /> {b === 1 ? scenario.singular2 : scenario.plural2}
                                    </div>
                                </div>
                            </div>
                            
                            {/* Equation & Audio Button */}
                            <div className="flex items-center gap-4 sm:gap-6">
                                <button 
                                    onClick={() => speak(`There are ${a} ${a===1?scenario.singular1:scenario.plural1}. There are ${b} ${b===1?scenario.singular2:scenario.plural2}. How many ${scenario.collectiveName} altogether?`)}
                                    className="bg-gray-100 hover:bg-gray-200 p-2 sm:p-3 rounded-full shadow-sm text-xl sm:text-2xl transition-colors border-2 border-gray-200"
                                >
                                    🔊
                                </button>
                                <div className="text-3xl sm:text-5xl font-black text-gray-700 drop-shadow-sm">
                                    {a} + {b} = {gameState === 'won' ? <span className="text-duo-green">{c}</span> : <span className="text-gray-400">?</span>}
                                </div>
                            </div>
                        </div>

                        {}
                        {/* Play Area: Vertically stacked on mobile, Side-by-side on Landscape/Tablets */}
                        <div className="flex-1 flex flex-col md:flex-row gap-3 sm:gap-4 min-h-[300px] w-full mx-auto">
                            
                            {/* Scene (Drop Zone) */}
                            <div 
                                ref={sceneRef}
                                className={`flex-[3] md:flex-[6] rounded-2xl md:rounded-3xl border-[6px] ${scenario.borderColor} ${scenario.bgColor} backdrop-blur-sm relative overflow-hidden flex flex-col items-center pt-3 sm:pt-5 transition-colors duration-500 shadow-md`}
                            >
                                <h2 className="text-lg sm:text-3xl font-black text-white drop-shadow-md px-4 text-center tracking-wide uppercase bg-black/30 rounded-full py-1 z-10 max-w-[80%] truncate">
                                    {scenario.sceneDesc}
                                </h2>
                                
                                {/* Counters overlay */}
                                <div className="absolute top-2 right-2 sm:top-4 sm:right-4 bg-white/90 px-2 py-1 sm:px-3 sm:py-2 rounded-xl sm:rounded-2xl shadow-md border-2 border-white flex flex-col gap-1 z-20 font-bold text-xs sm:text-lg">
                                    <div className={count1 === a && gameState !== 'won' ? 'text-duo-green' : 'text-gray-500'}>
                                        {scenario.emoji1} {count1}/{a}
                                    </div>
                                    <div className={count2 === b && gameState !== 'won' ? 'text-duo-green' : 'text-gray-500'}>
                                        {scenario.emoji2} {count2}/{b}
                                    </div>
                                </div>
                                
                                {/* Grouping Boxes inside the Scene */}
                                <div className="flex flex-col w-full h-full p-2 sm:p-4 mt-2 gap-2 sm:gap-4 overflow-y-auto">
                                    {/* Group 1 */}
                                    <div className="flex-1 bg-white/50 backdrop-blur-md rounded-2xl border-2 border-dashed border-white/80 flex flex-wrap content-start justify-center p-2 sm:p-3 gap-2 sm:gap-4 min-h-[80px] shadow-inner">
                                        {items.filter(i => i.zone === 'scene' && i.type === 'type1').map(item => (
                                            <DraggableItem key={item.id} item={item} onDragEnd={handleDragEnd} />
                                        ))}
                                    </div>
                                    
                                    {/* Group 2 */}
                                    <div className="flex-1 bg-white/50 backdrop-blur-md rounded-2xl border-2 border-dashed border-white/80 flex flex-wrap content-start justify-center p-2 sm:p-3 gap-2 sm:gap-4 min-h-[80px] shadow-inner">
                                        {items.filter(i => i.zone === 'scene' && i.type === 'type2').map(item => (
                                            <DraggableItem key={item.id} item={item} onDragEnd={handleDragEnd} />
                                        ))}
                                    </div>
                                </div>
                                
                                {/* Win State Overlay within Scene */}
                                <AnimatePresence>
                                    {gameState === 'won' && (
                                        <motion.div 
                                            initial={{ opacity: 0, y: 50 }}
                                            animate={{ opacity: 1, y: 0 }}
                                            exit={{ opacity: 0 }}
                                            className="absolute inset-0 bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center z-30"
                                        >
                                            <h2 className="text-3xl sm:text-5xl md:text-6xl font-black text-duo-green mb-6 md:mb-8 drop-shadow-md text-center px-4">
                                                Excellent!
                                            </h2>
                                            <DuoButton 
                                                onClick={() => {
                                                    if (levelCount >= MAX_LEVELS) {
                                                        setGameState('finished');
                                                        playGrandWinSound();
                                                        speak(`You finished all lessons! Great job!`);
                                                    } else {
                                                        setLevelCount(prev => prev + 1);
                                                        startNextLevel(levelCount + 1);
                                                    }
                                                }} 
                                                colorClass="bg-duo-green" 
                                                borderClass="border-duo-greenDark"
                                            >
                                                {levelCount >= MAX_LEVELS ? "Finish Lesson" : "Continue"}
                                            </DuoButton>
                                        </motion.div>
                                    )}
                                </AnimatePresence>
                            </div>

                            {/* Pool Area (Where items are dragged from) */}
                            <div className="flex-[2] md:flex-[4] bg-white/90 backdrop-blur-md rounded-2xl md:rounded-3xl border-2 border-white/50 shadow-duo-sm p-3 sm:p-4 relative flex flex-col min-h-[150px] md:min-h-0">
                                <h2 className="text-gray-500 font-bold text-center text-xs sm:text-lg mb-2 shrink-0 uppercase tracking-wider drop-shadow-sm">
                                    Drag Items
                                </h2>
                                <div className="flex-1 flex flex-wrap content-start justify-center gap-2 sm:gap-3 overflow-y-auto p-2 bg-gray-100/80 rounded-2xl border-2 border-dashed border-gray-300 shadow-inner">
                                    {items.filter(i => i.zone === 'pool').map(item => (
                                        <DraggableItem key={item.id} item={item} onDragEnd={handleDragEnd} />
                                    ))}
                                </div>
                            </div>
                            
                        </div>
                    </div>
                </>
            );
        };

        const DraggableItem = ({ item, onDragEnd }) => {
            return (
                <motion.div
                    layout
                    layoutId={`emoji-${item.id}`}
                    drag
                    dragSnapToOrigin={true}
                    onDragEnd={(e, info) => onDragEnd(e, info, item.id)}
                    whileHover={{ scale: 1.1 }}
                    whileDrag={{ scale: 1.4, zIndex: 999, rotate: 10 }}
                    className="text-4xl sm:text-5xl md:text-6xl cursor-grab active:cursor-grabbing p-1 touch-none select-none realistic-icon"
                >
                    {item.emoji}
                </motion.div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
