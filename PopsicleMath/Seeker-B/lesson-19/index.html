<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Shape Adventure!</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg-top: #fff0f6;
            --bg-bottom: #e0f2fe;
            --font-main: 'Poppins', sans-serif;
            --c-pink: #ff85a2;
            --c-blue: #3b82f6;
            --c-green: #10b981;
            --c-yellow: #fbbf24;
            --glass: rgba(255, 255, 255, 0.92);
            --shadow: 0 15px 40px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-main);
            background: linear-gradient(135deg, var(--bg-top), var(--bg-bottom));
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden; touch-action: none;
        }

        /* Clouds Background Animation */
        .clouds { position: fixed; inset: 0; pointer-events: none; z-index: -1; }
        .cloud {
            position: absolute; background: white; border-radius: 100px; opacity: 0.7;
            animation: float linear infinite; filter: blur(3px);
        }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: white; border-radius: 50%; }
        @keyframes float { from { transform: translateX(-400px); } to { transform: translateX(calc(100vw + 400px)); } }

        header {
            width: 100%; max-width: 900px;
            background: var(--glass); padding: 15px 30px;
            border-radius: 30px; box-shadow: var(--shadow);
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(15px); border: 2px solid white; margin-bottom: 15px;
        }

        .score-box {
            background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; padding: 8px 22px;
            border-radius: 20px; font-weight: 800; font-size: 1.1rem;
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);
        }

        main {
            width: 100%; max-width: 900px; flex: 1;
            background: var(--glass); border-radius: 45px;
            padding: 30px; box-shadow: var(--shadow);
            display: flex; flex-direction: column; align-items: center;
            position: relative; border: 2px solid white;
        }

        .question-area {
            display: flex; align-items: center; gap: 20px; margin-bottom: 30px;
        }

        .question-text {
            font-size: 2.2rem; font-weight: 800; color: #1e293b; text-align: center;
            letter-spacing: -0.5px;
        }

        .speaker-btn {
            background: var(--c-yellow); border: none; border-radius: 50%;
            width: 70px; height: 70px; font-size: 2.5rem; cursor: pointer;
            box-shadow: 0 6px 0 #d97706; display: flex; align-items: center; justify-content: center;
            transition: transform 0.1s;
        }
        .speaker-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #d97706; }

        #game-content {
            width: 100%; flex: 1; display: flex; justify-content: center; align-items: center; gap: 30px;
        }

        .choice-card {
            background: white; border-radius: 45px; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 0 #f1f5f9; border: 4px solid #f8fafc;
            width: 260px; height: 300px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
        }
        .choice-card:hover { transform: translateY(-15px); box-shadow: 0 35px 0 #f1f5f9; }
        .choice-card:active { transform: translateY(8px); box-shadow: 0 5px 0 #f1f5f9; }

        .choice-card.correct { border-color: var(--c-green); background: #ecfdf5; box-shadow: 0 20px 0 #d1fae5; }
        .choice-card.wrong { border-color: #ef4444; background: #fef2f2; box-shadow: 0 20px 0 #fee2e2; }

        .overlay {
            position: fixed; inset: 0; background: rgba(255,255,255,0.98);
            z-index: 500; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
        }

        .start-btn {
            background: var(--c-pink); color: white; border: none;
            padding: 26px 80px; font-size: 2.5rem; font-weight: 800;
            border-radius: 70px; cursor: pointer; box-shadow: 0 12px 0 #e11d48;
        }
        .start-btn:active { transform: translateY(6px); box-shadow: 0 6px 0 #e11d48; }

        #bonus-canvas {
            background: linear-gradient(to bottom, #7dd3fc, #bae6fd);
            border-radius: 45px; border: 12px solid #a855f7;
            box-shadow: 0 30px 60px rgba(0,0,0,0.18); max-width: 100%;
        }

        .feedback {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 6rem; font-weight: 900; z-index: 1000; pointer-events: none; display: none;
            text-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .hidden { display: none !important; }

        #fireworks { position: fixed; inset: 0; pointer-events: none; z-index: 600; }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <div class="clouds" id="clouds-container"></div>

    <header>
        <div style="font-weight: 800; color: #1e293b; font-size: 1.6rem;">3D SHAPE QUEST 💎</div>
        <div class="score-box">⭐ SCORE: <span id="score-val">0</span></div>
    </header>

    <main>
        <div class="question-area">
            <div id="question" class="question-text">Loading...</div>
            <button class="speaker-btn" onclick="speakTask()">🔊</button>
        </div>

        <div id="game-content"></div>

        <div id="feedback" class="feedback"></div>
    </main>

    <div id="start-overlay" class="overlay">
        <h1 style="font-size: 5rem; color: #1e293b; margin-bottom: 10px; font-weight: 900; line-height: 1; letter-spacing: -2px;">3D SHAPE<br><span style="color: var(--c-pink)">QUEST</span></h1>
        <p style="font-size: 1.6rem; color: #64748b; margin-bottom: 50px; font-weight: 600;">Play with shapes and the Kangaroo! 🦘</p>
        <button class="start-btn" onclick="startGame()">LET'S GO! ▶</button>
    </div>

    <div id="bonus-overlay" class="overlay hidden">
        <h2 style="font-size: 4rem; color: #a855f7; font-weight: 900;">SUPER BONUS! 🦘</h2>
        <p style="font-weight: 600; color: #475569; font-size: 1.4rem;">Watch out! Jump over obstacles.</p>
        <div style="font-size: 2.2rem; font-weight: 800; color: #2563eb; margin-bottom: 20px;">Timer: <span id="timer-val">25</span>s</div>
        <canvas id="bonus-canvas" width="600" height="300"></canvas>
        <div id="bonus-score" style="font-size: 2.8rem; font-weight: 900; color: #fbbf24; margin-top: 25px;">Points: 0</div>
        <button id="bonus-start-btn" class="start-btn" style="margin-top: 25px;" onclick="startKangarooGame()">RUN! 🦘</button>
    </div>

    <div id="win-overlay" class="overlay hidden">
        <canvas id="fireworks"></canvas>
        <div style="font-size: 12rem; filter: drop-shadow(0 25px 30px rgba(0,0,0,0.15));">🏆</div>
        <h1 style="font-size: 5rem; color: #fbbf24; font-weight: 900;">AMAZING JOB!</h1>
        <div style="font-size: 3.2rem; font-weight: 800; color: #3b82f6; margin-bottom: 60px;">Score: <span id="final-score">0</span> ⭐</div>
        <button class="start-btn" onclick="location.reload()">PLAY AGAIN ↺</button>
    </div>

    <script>
        // Data with refined, bolder colors (Deep Navy, Ruby Red, Cobalt Blue, etc.)
        const SHAPES = [
            { id: 'cube', name: 'Cube', color: 0xd63031, geometry: (s=4) => new THREE.BoxGeometry(s, s*1.2, s) },
            { id: 'sphere', name: 'Sphere', color: 0x0984e3, geometry: (s=3) => new THREE.SphereGeometry(s, 32, 32) },
            { id: 'cylinder', name: 'Cylinder', color: 0xe67e22, geometry: (s=1.6) => new THREE.CylinderGeometry(s, s, 6.5, 32) },
            { id: 'cone', name: 'Cone', color: 0xe84118, geometry: (s=2.8) => new THREE.ConeGeometry(s, 7, 32) },
            { id: 'pyramid', name: 'Pyramid', color: 0x6c5ce7, geometry: (s=3) => new THREE.ConeGeometry(s, 6.5, 4) },
            { id: 'prism', name: 'Prism', color: 0x2c3e50, geometry: (s=2.8) => new THREE.CylinderGeometry(s, s, 6.5, 3) }
        ];

        let state = {
            score: 0,
            currentIdx: 0,
            questions: [],
            isLocked: false,
            soundInited: false
        };

        const synth = new Tone.PolySynth(Tone.Synth).toDestination();

        function initClouds() {
            const container = document.getElementById('clouds-container');
            for(let i=0; i<10; i++) {
                const c = document.createElement('div');
                c.className = 'cloud';
                const w = 250 + Math.random()*250;
                c.style.width = w + 'px';
                c.style.height = w*0.48 + 'px';
                c.style.top = Math.random()*85 + '%';
                c.style.left = '-500px';
                c.style.animationDuration = (18 + Math.random()*35) + 's';
                c.style.animationDelay = (Math.random()*25) + 's';
                container.appendChild(c);
            }
        }
        initClouds();

        function startGame() {
            Tone.start();
            state.soundInited = true;
            document.getElementById('start-overlay').classList.add('hidden');
            startLevel1();
        }

        function startLevel1() {
            state.currentIdx = 0;
            state.questions = [...SHAPES].sort(() => Math.random() - 0.5);
            loadNext();
        }

        function loadNext() {
            state.isLocked = false;
            const target = state.questions[state.currentIdx];
            const choices = [target];
            while(choices.length < 3) {
                const r = SHAPES[Math.floor(Math.random()*SHAPES.length)];
                if(!choices.find(c => c.id === r.id)) choices.push(r);
            }
            choices.sort(() => Math.random() - 0.5);

            document.getElementById('question').innerText = `Where is the ${target.name}?`;
            const container = document.getElementById('game-content');
            container.innerHTML = '';

            choices.forEach(c => {
                const card = document.createElement('div');
                card.className = 'choice-card';
                const canvas = document.createElement('canvas');
                canvas.width = 220; canvas.height = 220;
                card.appendChild(canvas);
                container.appendChild(card);
                initMiniThree(canvas, c);
                card.onclick = () => handleChoice(c, card, target);
            });

            speakTask();
        }

        function initMiniThree(canvas, shapeData) {
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
            camera.position.z = 10;
            
            scene.add(new THREE.AmbientLight(0xffffff, 2.2));
            const dLight = new THREE.DirectionalLight(0xffffff, 0.4);
            dLight.position.set(3, 3, 5);
            scene.add(dLight);

            // Bold Bold Look (Very low shininess, strong saturation)
            const mat = new THREE.MeshPhongMaterial({ 
                color: shapeData.color, 
                shininess: 2,
                specular: 0x222222
            });
            
            const mesh = new THREE.Mesh(shapeData.geometry(3.1), mat);
            scene.add(mesh);

            // Sharp outlines for illustrative effect
            const edges = new THREE.EdgesGeometry(mesh.geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x2d3436, transparent: true, opacity: 0.5, linewidth: 2 }));
            mesh.add(line);

            function animate() {
                if(!canvas.isConnected) return;
                requestAnimationFrame(animate);
                mesh.rotation.y += 0.025;
                mesh.rotation.x += 0.012;
                renderer.render(scene, camera);
            }
            animate();
        }

        function handleChoice(choice, card, target) {
            if(state.isLocked) return;
            state.isLocked = true;

            if(choice.id === target.id) {
                state.score += 10;
                document.getElementById('score-val').innerText = state.score;
                card.classList.add('correct');
                showFeedback("YEAH! ✨", "#10b981");
                synth.triggerAttackRelease(["C5", "E5", "G5"], "8n");

                setTimeout(() => {
                    state.currentIdx++;
                    if(state.currentIdx >= state.questions.length) showBonusIntro();
                    else loadNext();
                }, 1200);
            } else {
                card.classList.add('wrong');
                showFeedback("TRY AGAIN!", "#ef4444");
                synth.triggerAttackRelease("A2", "8n");
                setTimeout(() => {
                    card.classList.remove('wrong');
                    state.isLocked = false;
                }, 800);
            }
        }

        function showFeedback(text, color) {
            const fb = document.getElementById('feedback');
            fb.innerText = text;
            fb.style.color = color;
            fb.style.display = 'block';
            setTimeout(() => fb.style.display = 'none', 1000);
        }

        function speakTask() {
            if(!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(document.getElementById('question').innerText);
            utterance.lang = 'en-US';
            utterance.rate = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        // --- Kangaroo Mini Game (Enhanced Graphics) ---
        const bCanvas = document.getElementById('bonus-canvas');
        const bCtx = bCanvas.getContext('2d');
        let kId, kRunning = false, kangaroo = { x: 100, y: 215, dy: 0, grounded: true }, kObs = [], bScore = 0, kStart;
        
        let kClouds = [];
        for(let i=0; i<4; i++) kClouds.push({x: Math.random()*600, y: 30+Math.random()*80, s: 0.8+Math.random()*0.8, v: 0.4+Math.random()*0.5});
        
        let decor = [];
        for(let i=0; i<15; i++) decor.push({x: Math.random()*600, type: Math.random() > 0.5 ? 'grass' : 'flower', s: 0.5+Math.random()*0.5});

        function showBonusIntro() {
            document.getElementById('bonus-overlay').classList.remove('hidden');
        }

        function startKangarooGame() {
            document.getElementById('bonus-start-btn').classList.add('hidden');
            bScore = 0; kObs = []; kStart = Date.now(); kRunning = true;
            kangaroo.y = 215; kangaroo.dy = 0;
            updateKangaroo();
        }

        function drawKangaroo(x, y) {
            bCtx.save(); bCtx.translate(x, y);
            
            // Shadows
            bCtx.fillStyle = "rgba(0,0,0,0.1)";
            bCtx.beginPath(); bCtx.ellipse(25, 55, 30, 8, 0, 0, Math.PI*2); bCtx.fill();

            // Tail
            bCtx.strokeStyle = "#ca8a04"; bCtx.lineWidth = 14; bCtx.lineCap = "round";
            bCtx.beginPath(); bCtx.moveTo(-5, 35); bCtx.quadraticCurveTo(-45, 55, -35, 10); bCtx.stroke();
            
            // Legs
            bCtx.fillStyle = "#ca8a04"; bCtx.beginPath(); bCtx.ellipse(15, 45, 18, 10, 0.4, 0, Math.PI * 2); bCtx.fill();
            bCtx.fillStyle = "#eab308"; bCtx.beginPath(); bCtx.ellipse(18, 45, 12, 6, 0.4, 0, Math.PI * 2); bCtx.fill();
            
            // Body with Shading
            let bodyGrd = bCtx.createLinearGradient(0, 10, 0, 50);
            bodyGrd.addColorStop(0, "#f59e0b");
            bodyGrd.addColorStop(1, "#b45309");
            bCtx.fillStyle = bodyGrd;
            bCtx.beginPath(); bCtx.ellipse(30, 25, 28, 20, -0.2, 0, Math.PI * 2); bCtx.fill();
            
            // Pouch
            bCtx.fillStyle = "#fbef9c"; bCtx.beginPath(); bCtx.arc(42, 32, 12, 0, Math.PI); bCtx.fill();
            
            // Head
            bCtx.fillStyle = "#f59e0b";
            bCtx.beginPath(); bCtx.ellipse(55, 5, 16, 12, -0.4, 0, Math.PI * 2); bCtx.fill();
            
            // Ears
            bCtx.fillStyle = "#b45309";
            bCtx.beginPath(); bCtx.ellipse(48, -10, 5, 16, -0.5, 0, Math.PI * 2); bCtx.fill();
            bCtx.beginPath(); bCtx.ellipse(58, -12, 5, 16, -0.2, 0, Math.PI * 2); bCtx.fill();
            bCtx.fillStyle = "#fbef9c"; // Inner ear
            bCtx.beginPath(); bCtx.ellipse(48, -10, 2, 10, -0.5, 0, Math.PI * 2); bCtx.fill();
            
            // Eyes
            bCtx.fillStyle = "white"; bCtx.beginPath(); bCtx.arc(60, 4, 4, 0, Math.PI * 2); bCtx.fill();
            bCtx.fillStyle = "black"; bCtx.beginPath(); bCtx.arc(61.5, 4, 2, 0, Math.PI * 2); bCtx.fill();
            bCtx.restore();
        }

        function drawBackground() {
            // Sky Gradient
            let skyGrd = bCtx.createLinearGradient(0, 0, 0, 300);
            skyGrd.addColorStop(0, "#38bdf8");
            skyGrd.addColorStop(1, "#bae6fd");
            bCtx.fillStyle = skyGrd;
            bCtx.fillRect(0, 0, 600, 300);
            
            // Sun with Glow
            let sunGrd = bCtx.createRadialGradient(530, 50, 5, 530, 50, 70);
            sunGrd.addColorStop(0, "#fffbe6");
            sunGrd.addColorStop(0.3, "#fbbf24");
            sunGrd.addColorStop(1, "rgba(251, 191, 36, 0)");
            bCtx.fillStyle = sunGrd;
            bCtx.beginPath(); bCtx.arc(530, 50, 70, 0, Math.PI*2); bCtx.fill();

            // Clouds
            bCtx.fillStyle = "rgba(255, 255, 255, 0.95)";
            kClouds.forEach(c => {
                c.x -= c.v; if(c.x < -150) c.x = 650;
                bCtx.beginPath(); 
                bCtx.arc(c.x, c.y, 25*c.s, 0, Math.PI*2); 
                bCtx.arc(c.x + 22*c.s, c.y - 15*c.s, 35*c.s, 0, Math.PI*2); 
                bCtx.arc(c.x + 48*c.s, c.y, 25*c.s, 0, Math.PI*2); 
                bCtx.fill();
            });

            // Ground
            bCtx.fillStyle = "#10b981"; bCtx.fillRect(0, 265, 600, 35);
            bCtx.fillStyle = "#059669"; bCtx.fillRect(0, 265, 600, 4);
            
            // Flowers & Grass
            decor.forEach(d => {
                d.x -= 8.5; if(d.x < -40) d.x = 640;
                bCtx.save(); bCtx.translate(d.x, 265);
                if(d.type === 'grass') {
                    bCtx.fillStyle = "#34d399";
                    bCtx.beginPath(); bCtx.moveTo(0,0); bCtx.lineTo(-4*d.s, -12*d.s); bCtx.lineTo(4*d.s, -12*d.s); bCtx.fill();
                } else {
                    bCtx.fillStyle = "#f472b6";
                    bCtx.beginPath(); bCtx.arc(0, -10*d.s, 6*d.s, 0, Math.PI*2); bCtx.fill();
                    bCtx.fillStyle = "#fef08a";
                    bCtx.beginPath(); bCtx.arc(0, -10*d.s, 2*d.s, 0, Math.PI*2); bCtx.fill();
                }
                bCtx.restore();
            });
        }

        function updateKangaroo() {
            if(!kRunning) return;
            const remaining = Math.max(0, 25 - Math.floor((Date.now() - kStart)/1000));
            document.getElementById('timer-val').innerText = remaining;
            if(remaining <= 0) { showFinalWin(); return; }

            drawBackground();

            // Physics
            kangaroo.dy += 0.85; kangaroo.y += kangaroo.dy;
            if(kangaroo.y > 215) { kangaroo.y = 215; kangaroo.dy = 0; kangaroo.grounded = true; }
            drawKangaroo(kangaroo.x, kangaroo.y);

            // Obstacles
            if(Math.random() < 0.016 && (kObs.length === 0 || kObs[kObs.length-1].x < 350)) {
                kObs.push({x: 650, char: ['🌵','🪵','📦', '🔥'][Math.floor(Math.random()*4)]});
            }
            
            for(let i=kObs.length-1; i>=0; i--) {
                const o = kObs[i]; o.x -= 9.5;
                bCtx.font = "55px Arial"; bCtx.fillText(o.char, o.x, 262);
                
                // Collision
                if(kangaroo.x + 30 < o.x + 45 && kangaroo.x + 80 > o.x && kangaroo.y + 50 > 235) {
                    endKangaroo("CRASH!"); return;
                } else if(o.x < -70) {
                    kObs.splice(i, 1); bScore += 5;
                }
            }
            document.getElementById('bonus-score').innerText = `Points: ${bScore}`;
            kId = requestAnimationFrame(updateKangaroo);
        }

        bCanvas.onpointerdown = () => { if(kangaroo.grounded && kRunning) { kangaroo.dy = -17.5; kangaroo.grounded = false; } };

        function endKangaroo(reason) {
            kRunning = false; cancelAnimationFrame(kId);
            state.score += bScore;
            document.getElementById('score-val').innerText = state.score;
            
            const btn = document.getElementById('bonus-start-btn');
            btn.classList.remove('hidden');
            btn.innerText = (reason === "CRASH!" ? "Ouch! Next >>" : "Finish! Next >>");
            
            btn.onclick = () => {
                document.getElementById('bonus-overlay').classList.add('hidden');
                showFinalWin();
            };

            if(reason === "CRASH!") synth.triggerAttackRelease("A1", "2n");
            else synth.triggerAttackRelease(["C5", "G5", "C6"], "4n");
        }

        function showFinalWin() {
            kRunning = false;
            cancelAnimationFrame(kId);
            document.getElementById('bonus-overlay').classList.add('hidden');
            document.getElementById('win-overlay').classList.remove('hidden');
            document.getElementById('final-score').innerText = state.score;
            startFireworks();
        }

        function startFireworks() {
            const fCanvas = document.getElementById('fireworks');
            const fCtx = fCanvas.getContext('2d');
            fCanvas.width = window.innerWidth; fCanvas.height = window.innerHeight;
            let particles = [];
            function loop() {
                fCtx.fillStyle = 'rgba(255,255,255,0.2)'; fCtx.fillRect(0,0,fCanvas.width,fCanvas.height);
                if(Math.random() < 0.2) {
                    const x = Math.random()*fCanvas.width, y = Math.random()*fCanvas.height/2;
                    const color = `hsl(${Math.random()*360}, 100%, 65%)`;
                    for(let i=0; i<60; i++) {
                        const a = Math.random()*Math.PI*2, s = Math.random()*8+4;
                        particles.push({x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, color, life: 1});
                    }
                }
                particles.forEach((p, i) => {
                    p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= 0.012;
                    fCtx.globalAlpha = p.life; fCtx.fillStyle = p.color; fCtx.fillRect(p.x, p.y, 6, 6);
                    if(p.life <= 0) particles.splice(i, 1);
                });
                requestAnimationFrame(loop);
            }
            loop();
        }
    </script>
</body>
</html>
