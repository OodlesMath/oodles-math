
<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animal Addition Adventure - Background Ver 5</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF5A5F;
            --secondary: #08D9D6;
            --accent: #FFD369;
            --bg-top: #AEE1F9;
            --bg-bottom: #F0F9FF;
            --text-main: #2D3748;
            --bond-part: #48DBFB;
            --bond-whole: #FF9F43;
            --success: #2ED573;
            --danger: #FF4757;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to bottom, var(--bg-top), var(--bg-bottom));
            color: var(--text-main);
            min-height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }



        /* BGTemplate-style animated classroom background */
        #backgroundCanvas {
            display: block;
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        /* Use the canvas background instead of the old CSS-only background */
        body::before,
        body::after {
            .logo-safe-space {
    justify-self: end;
    width: clamp(88px, 15vw, 150px);
    height: clamp(42px, 8vmin, 64px);
    display: flex;
    align-items: center;
    justify-content: flex-end;
}

.oodles-logo {
    display: block !important;
    width: clamp(88px, 14vw, 145px);
    height: auto;
    object-fit: contain;
    position: relative;
    z-index: 120;
}

        .decoration,
        .sun-wrapper,
        .cloud,
        .rainbow,
        .tree,
        .flower-field {
            display: none !important;
        }

        #top-bar,
        #game-container,
        #mascot-area {
            position: relative;
        }

        .decoration { position: absolute; z-index: 1; pointer-events: none; opacity: 0.65; }
        .mountain { bottom: 0; width: 100%; height: 23vh; background: linear-gradient(to top, #6EDB83 0%, rgba(120,224,143,0.75) 45%, transparent 100%); clip-path: polygon(0 100%, 12% 46%, 27% 80%, 46% 24%, 68% 76%, 84% 38%, 100% 100%); }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(circle at 18% 18%, rgba(255,255,255,0.75) 0 8%, transparent 9%),
                radial-gradient(circle at 82% 16%, rgba(255,255,255,0.55) 0 6%, transparent 7%),
                linear-gradient(to bottom, #AEEBFF 0%, #DFF8FF 55%, #F7FFF0 100%);
        }
        body::after {
            content: "";
            position: fixed;
            left: 0; right: 0; bottom: 0;
            height: 13vh;
            pointer-events: none;
            z-index: 2;
            background:
                radial-gradient(circle at 8% 52%, #FF6B9D 0 5px, transparent 6px),
                radial-gradient(circle at 15% 42%, #FFD93D 0 5px, transparent 6px),
                radial-gradient(circle at 24% 58%, #6BCB77 0 5px, transparent 6px),
                radial-gradient(circle at 36% 46%, #4D96FF 0 5px, transparent 6px),
                radial-gradient(circle at 49% 60%, #FF9F1C 0 5px, transparent 6px),
                radial-gradient(circle at 63% 48%, #F15BB5 0 5px, transparent 6px),
                radial-gradient(circle at 78% 57%, #00BBF9 0 5px, transparent 6px),
                radial-gradient(circle at 91% 44%, #9B5DE5 0 5px, transparent 6px),
                linear-gradient(to top, #3EC66B 0%, #8CEB8A 75%, transparent 100%);
            border-top: 6px solid rgba(255,255,255,0.65);
        }
        .rainbow {
            position: absolute;
            top: 7vh;
            left: 6vw;
            width: clamp(190px, 34vw, 430px);
            height: clamp(95px, 17vw, 215px);
            border-radius: 50% 50% 0 0;
            border-top: 16px solid rgba(255, 78, 120, 0.85);
            box-shadow:
                0 -16px 0 0 rgba(255, 205, 86, 0.85) inset,
                0 -32px 0 0 rgba(67, 233, 123, 0.85) inset,
                0 -48px 0 0 rgba(79, 172, 254, 0.85) inset,
                0 -64px 0 0 rgba(162, 155, 254, 0.75) inset;
            opacity: 0.72;
            z-index: 1;
            pointer-events: none;
            transform: rotate(-4deg);
        }
        .tree {
            position: absolute;
            bottom: 7vh;
            width: clamp(54px, 9vw, 105px);
            height: clamp(95px, 17vw, 175px);
            z-index: 3;
            pointer-events: none;
        }
        .tree::before {
            content: "";
            position: absolute;
            left: 42%; bottom: 0;
            width: 18%; height: 46%;
            border-radius: 12px;
            background: linear-gradient(90deg, #8B5A2B, #C8843D, #7A431C);
            box-shadow: inset -4px 0 6px rgba(0,0,0,0.18);
        }
        .tree::after {
            content: "";
            position: absolute;
            left: 5%; top: 0;
            width: 90%; height: 72%;
            border-radius: 50% 50% 46% 46%;
            background:
                radial-gradient(circle at 30% 28%, #9DFF7A 0 14%, transparent 15%),
                radial-gradient(circle at 60% 22%, #6BEA70 0 18%, transparent 19%),
                radial-gradient(circle at 50% 48%, #32C95D 0 44%, #1FA64A 72%);
            filter: drop-shadow(0 8px 10px rgba(0,0,0,0.12));
        }
        .tree-left { left: 2vw; }
        .tree-right { right: 4vw; transform: scale(0.9); }
        .flower-field {
            position: fixed;
            bottom: 3.5vh;
            left: 0; right: 0;
            z-index: 4;
            display: flex;
            justify-content: space-around;
            pointer-events: none;
            font-size: clamp(16px, 3vmin, 28px);
            filter: drop-shadow(0 3px 3px rgba(0,0,0,0.12));
        }

        .sun-wrapper { position: absolute; top: 2vh; left: 2vw; z-index: 5; width: 12vmin; height: 12vmin; min-width: 60px; min-height: 60px; }
        .sun {
            width: 100%; height: 100%; background: #FFD369; border-radius: 50%;
            box-shadow: 0 0 4vmin #FF9800, 0 0 8vmin #FFD369;
            animation: pulseSun 3s infinite alternate; position: relative;
        }
        .sun-eyes { position: absolute; top: 35%; left: 20%; width: 60%; display: flex; justify-content: space-between; }
        .sun-eye { width: 1.2vmin; height: 1.2vmin; background: #D35400; border-radius: 50%; }
        .sun-smile { position: absolute; top: 55%; left: 35%; width: 30%; height: 1.5vmin; border-bottom: 0.5vmin solid #D35400; border-radius: 50%; }

        @keyframes pulseSun { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }

        .cloud {
            position: absolute; background: white; border-radius: 50px; opacity: 0.9;
            z-index: 2; animation: floatClouds linear infinite; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.05));
        }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: white; border-radius: 50%; }
        .c1 { width: 20vw; height: 6vh; top: 15%; left: -25vw; animation-duration: 48s; }
        .c1::before { width: 10vw; height: 10vw; top: -50%; left: 15%; }
        .c1::after { width: 8vw; height: 8vw; top: -40%; right: 15%; }
        .c2 { width: 16vw; height: 5vh; top: 31%; left: -25vw; animation-duration: 58s; animation-delay: -18s; opacity: 0.75; }
        .c2::before { width: 8vw; height: 8vw; top: -55%; left: 18%; }
        .c2::after { width: 7vw; height: 7vw; top: -45%; right: 18%; }
        .c3 { width: 18vw; height: 5.5vh; top: 8%; left: -25vw; animation-duration: 68s; animation-delay: -34s; opacity: 0.65; }
        .c3::before { width: 9vw; height: 9vw; top: -58%; left: 13%; }
        .c3::after { width: 8vw; height: 8vw; top: -42%; right: 14%; }

        @keyframes floatClouds { from { transform: translateX(-30vw); } to { transform: translateX(140vw); } }

        #top-bar {
            width: 100%; max-width: 1040px;
            padding: clamp(8px, 2vh, 18px) clamp(12px, 4vw, 40px);
            display: grid;
            grid-template-columns: minmax(92px, 1fr) auto minmax(92px, 1fr);
            align-items: center;
            z-index: 100;
            gap: 12px;
        }
        .top-actions {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: clamp(8px, 2vw, 14px);
        }
        .logo-safe-space {
            justify-self: end;
            width: clamp(88px, 15vw, 150px);
            height: clamp(42px, 8vmin, 64px);
            pointer-events: none;
        }
        .oodles-logo { display: none !important; }
        .icon-btn {
            background: linear-gradient(180deg, #FFFFFF, #F4FBFF); border: 0.45vmin solid #EDF2F7; border-radius: 50%;
            width: clamp(42px, 9vmin, 58px); height: clamp(42px, 9vmin, 58px); font-size: clamp(1.35rem, 4.2vmin, 2rem); 
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0.75vmin 0 #CBD5E0, 0 8px 18px rgba(0,0,0,0.12); transition: transform 0.1s;
        }
        .icon-btn:active { transform: translateY(0.75vmin); box-shadow: 0 0 0 #CBD5E0; }
        #score-display {
            background: linear-gradient(135deg, var(--accent), #FFB142); padding: clamp(8px, 1vh, 14px) clamp(28px, 5vw, 80px); border-radius: 40px;
            border: 0.55vmin solid #F6B93B; font-weight: 900; font-size: clamp(1.2rem, 4vw, 1.65rem); color: #B33939;
            display: flex; align-items: center; justify-content: center; gap: 1.5vmin; box-shadow: 0 0.8vmin 0 #F6B93B;
            min-width: clamp(150px, 28vw, 260px);
        }

        #game-container {
            flex: 1; width: 100%; max-width: 850px; position: relative;
            display: flex; flex-direction: column; align-items: center; padding: 1vh 2vw;
            z-index: 10;
            overflow: hidden;
        }

        .screen {
            display: none; flex-direction: column; align-items: center; width: 100%; height: 100%;
            animation: fadeIn 0.6s ease-out; text-align: center;
            justify-content: center;
        }
        .screen.active { display: flex; }

        h1, .colorful-title {
            font-size: clamp(1.8rem, 7vw, 3.2rem); font-weight: 900; line-height: 1.1; margin-bottom: 2vh;
            background: linear-gradient(45deg, #FF3E4D, #FFA502, #2ED573, #1E90FF);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(3px 3px 0px white);
        }

        .btn {
            background: linear-gradient(to bottom, #FF5A5F, #E23123); color: white; border: none;
            padding: clamp(1rem, 3vh, 2vh) 8vw; font-size: clamp(1.1rem, 4vw, 1.8rem); font-weight: 900;
            border-radius: 50px; cursor: pointer; box-shadow: 0 1vh 0 #A52A2A;
            transition: all 0.1s; text-transform: uppercase; margin: 2vh;
        }
        .btn:active { transform: translateY(1vh); box-shadow: 0 0 0 #A52A2A; }

        .progress-bg { width: 90%; height: 1.5vh; background: #E2E8F0; border-radius: 15px; margin: 1vh auto; overflow: hidden; border: 0.4vmin solid white; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #FF6B9D, #A29BFE, #6C5CE7); width: 0%; transition: width 0.5s ease; }

        .animals-display {
            font-size: clamp(2rem, 8vw, 4rem); margin: 1.5vh 0; min-height: 12vh;
            display: flex; justify-content: center; align-items: center; gap: 2vw;
            width: 100%;
        }
        .animal-group {
            display: flex; flex-wrap: wrap; justify-content: center; max-width: 48%; gap: 0.5vmin;
            padding: 1.5vmin; background: rgba(255, 255, 255, 0.7); border-radius: 20px; 
            border: 2px solid white; box-shadow: 0 0.5vh 1vh rgba(0,0,0,0.05); backdrop-filter: blur(5px);
        }

        .number-bonds {
            position: relative;
            width: clamp(182px, 39vw, 238px);
            height: clamp(146px, 24vh, 178px);
            margin: 0.65vh auto 0.45vh;
        }
        .number-bonds::before {
            content: "";
            position: absolute;
            inset: 10% 8% 7%;
            background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,255,255,0.74));
            border: 3px solid rgba(255,255,255,0.96);
            border-radius: 22px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.07), inset 0 0 0 3px rgba(8,217,214,0.10);
        }
        .number-bonds svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: visible;
        }
        .bond-circle {
            position: absolute;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: white;
            border: 3px solid rgba(255,255,255,0.96);
            box-shadow: 0 8px 14px rgba(0,0,0,0.12), inset 0 4px 8px rgba(255,255,255,0.16);
            z-index: 2;
            text-shadow: 0 2px 0 rgba(0,0,0,0.15);
        }
        .part-circle {
            width: clamp(44px, 8.5vw, 56px);
            height: clamp(44px, 8.5vw, 56px);
            font-size: clamp(1.08rem, 2.45vw, 1.42rem);
            background: linear-gradient(135deg, #55dfff, #14b8ff 55%, #0ea5e9);
            top: 20px;
        }
        .part-left { left: 24px; }
        .part-right { right: 24px; }
        .whole-circle {
            background: linear-gradient(135deg, #FFC96B, #FF9F43 58%, #f97316);
            width: clamp(62px, 12.5vw, 78px);
            height: clamp(62px, 12.5vw, 78px);
            font-size: clamp(1.55rem, 3.8vw, 2.05rem);
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
        }
        .number-bonds .bond-label {
            position: absolute;
            z-index: 3;
            font-size: clamp(0.48rem, 1.15vw, 0.62rem);
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #64748b;
        }
        .number-bonds .label-left { top: 10px; left: 32px; }
        .number-bonds .label-right { top: 10px; right: 32px; }
        .number-bonds .label-whole { bottom: 7px; left: 50%; transform: translateX(-50%); }

        .answer-buttons {
            display: grid;
            grid-template-columns: repeat(3, minmax(86px, 1fr));
            justify-content: center;
            gap: clamp(10px, 2.2vw, 20px);
            margin: 2vh auto 0;
            width: min(92%, 560px);
            padding-bottom: 2vh;
        }
        .answer-btn {
            position: relative;
            background: linear-gradient(180deg, #ffffff 0%, #effaff 100%);
            border: 4px solid #7dd3fc;
            color: var(--secondary-dark);
            font-size: clamp(1.7rem, 5.6vw, 2.55rem);
            font-weight: 900;
            padding: clamp(12px, 2.2vh, 18px) clamp(8px, 3vw, 24px);
            border-radius: 24px;
            box-shadow: 0 9px 0 #0ea5d7, 0 15px 24px rgba(24,153,214,0.18);
            cursor: pointer;
            transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
            min-width: 86px;
            overflow: hidden;
        }
        .answer-btn::after {
            content: "";
            position: absolute;
            top: 9px;
            left: 12px;
            right: 12px;
            height: 12px;
            border-radius: 999px;
            background: rgba(255,255,255,0.72);
            pointer-events: none;
        }
        .answer-btn:hover:not(:disabled) { transform: translateY(-2px) scale(1.02); }
        .answer-btn:active:not(:disabled) { transform: translateY(8px); box-shadow: 0 1px 0 #0ea5d7, 0 5px 12px rgba(24,153,214,0.18); }
        .answer-btn:disabled { cursor: default; }
        .answer-btn.correct {
            background: linear-gradient(180deg, #7CFF8E 0%, #2ED573 100%);
            border-color: #ffffff;
            color: #ffffff;
            box-shadow: 0 9px 0 #159447, 0 16px 26px rgba(46,213,115,0.28);
            text-shadow: 0 2px 0 rgba(0,0,0,0.12);
        }
        .answer-btn.wrong {
            background: linear-gradient(180deg, #FF8B8B 0%, #FF4757 100%);
            border-color: #ffffff;
            color: #ffffff;
            box-shadow: 0 9px 0 #C92A36, 0 16px 26px rgba(255,71,87,0.28);
            text-shadow: 0 2px 0 rgba(0,0,0,0.12);
            animation: answerShake 0.34s ease-in-out;
        }
        @keyframes answerShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .speaker-icon {
            display: inline-flex; align-items: center; justify-content: center;
            width: clamp(35px, 9vmin, 45px); height: clamp(35px, 9vmin, 45px); margin-left: 10px; cursor: pointer;
            background: white; border-radius: 50%; border: 2px solid var(--accent);
            box-shadow: 0 3px 6px rgba(0,0,0,0.1); transition: transform 0.2s;
            vertical-align: middle;
        }
        .speaker-icon:hover { transform: scale(1.1); }
        .speaker-icon svg { width: 60%; height: 60%; fill: var(--primary); }

        #game-container.run-mode {
            max-width: 100vw;
            width: 100vw;
            padding: 0;
            overflow: visible;
        }
        #screen-run {
            justify-content: flex-start;
            width: 100vw;
            min-height: 100%;
            overflow: visible;
        }


        /* MARIO RUN VER 5: MarioClean-inspired canvas mini game with coin counter */
        .run-instruction {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 900;
            color: #2D3748;
            margin-bottom: 0.6vh;
            font-size: clamp(0.9rem, 2.6vw, 1.12rem);
            background: rgba(255,255,255,0.78);
            border: 3px solid rgba(255,255,255,0.98);
            border-radius: 999px;
            padding: 6px 14px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.08);
        }
        .mini-speaker { width: clamp(32px, 7vmin, 42px); height: clamp(32px, 7vmin, 42px); margin-left: 0; border: 3px solid #87D37C; }
        #run-screen-container {
            position: relative;
            width: 100vw;
            height: calc(100vh - clamp(82px, 13vh, 118px));
            min-height: 330px;
            background: transparent;
            border: none;
            border-radius: 0;
            overflow: hidden;
            margin-top: 0;
            box-shadow: none;
            cursor: pointer;
            touch-action: none;
        }
        #mario-run-canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: transparent;
        }
        #mario-timer {
            position: absolute;
            top: clamp(8px, 2vh, 18px);
            right: clamp(16px, 5vw, 72px);
            font-weight: 900;
            font-size: clamp(1.05rem, 4vw, 1.55rem);
            color: white;
            background: linear-gradient(180deg, rgba(255,253,231,0.96), rgba(255,246,178,0.94));
            color: #9a6700;
            padding: 6px 16px;
            border-radius: 16px;
            border: 3px solid white;
            z-index: 10;
            box-shadow: 0 6px 12px rgba(0,0,0,0.18);
        }
        .mario-run-hint {
            position: absolute;
            left: 50%;
            bottom: clamp(18px, 4vh, 34px);
            transform: translateX(-50%);
            width: min(720px, calc(100% - 28px));
            background: #1cb0f6;
            color: white;
            border-radius: 28px;
            padding: 12px 18px;
            font-weight: 900;
            font-size: clamp(0.9rem, 3.2vw, 1.1rem);
            box-shadow: 0 8px 0 #1899d6, 0 18px 34px rgba(24,153,214,0.25);
            z-index: 12;
            pointer-events: none;
            transition: opacity 0.45s ease;
        }
        .mario-key {
            display: inline-block;
            background: white;
            color: #1cb0f6;
            padding: 3px 12px;
            margin: 0 4px;
            border-radius: 12px;
            box-shadow: 0 4px 0 #d7effc;
            transform: translateY(-1px);
        }

        #celebration-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: min(46vh, 430px);
            pointer-events: none; z-index: 1000;
        }

        #mascot-area { position: absolute; bottom: 1.5vh; left: 2vw; display: flex; align-items: flex-end; gap: 1.5vmin; z-index: 50; pointer-events: none; }
        #mascot { font-size: clamp(35px, 11vmin, 70px); animation: bounce 2s infinite; }
        .bubble {
            background: white; padding: 1vh 3vw; border-radius: 18px; border: 3px solid var(--secondary);
            font-size: clamp(0.8rem, 2vw, 1.1rem); font-weight: 800; color: #2C3E50; position: relative; box-shadow: 0 0.8vh 1.5vh rgba(0,0,0,0.1); max-width: 220px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes coinSpin { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }
        .hidden { display: none !important; }

        /* Responsive Fix for small screens and portrait devices */
        @media (max-height: 600px) {
            .animals-display { margin: 1vh 0; min-height: 10vh; }
            .number-bonds { width: 160px; height: 132px; }
            .answer-buttons { margin-top: 1vh; }
            h1 { font-size: 1.6rem; }
            #run-screen-container { height: calc(100vh - 86px); min-height: 300px; }
            #mascot-area { transform: scale(0.88); transform-origin: bottom left; }
        }
        @media (max-width: 540px) {
            #top-bar { grid-template-columns: 1fr auto 1fr; padding-inline: 10px; }
            .top-actions { gap: 6px; }
            .logo-safe-space { width: 76px; }
            #game-container { padding-inline: 10px; }
            .animals-display { gap: 1vw; }
            .animal-group { max-width: 46%; }
            .run-rainbow { left: 30%; width: 190px; }
            .tree-left, .tree-right { opacity: 0.55; transform: scale(0.75); }
            #mascot-area { max-width: 96vw; }
            .bubble { max-width: 180px; }
        }
        @media (orientation: portrait) {
            #run-screen-container { width: 100vw; height: calc(100vh - 94px); min-height: 360px; }
            .run-instruction { max-width: 94vw; }
        }
    </style>
</head>
<body>

    <div class="flower-field" aria-hidden="true"><span>🌷</span><span>🌼</span><span>🌻</span><span>🌸</span><span>🌺</span><span>🌼</span><span>🌷</span></div>

    <canvas id="celebration-canvas"></canvas>

    <div id="top-bar">
        <div class="top-actions">
            <button class="icon-btn" onclick="location.reload()" aria-label="Home">🏠</button>

        <div class="logo-safe-space">
    <img src="../assets/logo-oodles-math.png" class="oodles-logo" alt="Oodles Math logo">

    </div>

    <div id="game-container">
        <!-- Start Screen -->
        <div id="screen-start" class="screen active">
            <div style="font-size: clamp(70px, 18vmin, 110px); animation: bounce 2s infinite; margin-bottom: 2vh;">🦁</div>
            <h1 class="colorful-title">Animal Addition Adventure</h1>
            <p style="font-size: clamp(0.9rem, 3vw, 1.3rem); color: #718096; margin-bottom: 3vh; font-weight: 600;">Play & Learn on all your devices!</p>

        <!-- Math Game Screen -->
        <div id="screen-math" class="screen">

            <div class="progress-bg"><div class="progress-fill" id="p-bar"></div></div>
            <div id="question-text-area" style="font-size: clamp(1.45rem, 5vw, 2.2rem); line-height: 1.35; font-weight: 900; margin: 1.2vh 0 1.4vh; color: var(--text-main); min-height: 3.6rem; text-shadow: 1px 1px rgba(255,255,255,0.75);"></div>

                    </defs>
                    <path d="M82 70 C 108 105, 128 126, 148 158" stroke="url(#bondLineGradient)" stroke-width="6" stroke-linecap="round" fill="none" filter="url(#bondGlow)"/>

        <!-- End Screen -->
        <div id="screen-end" class="screen">
            <h1 class="colorful-title" style="margin-bottom: 2vh;">MISSION COMPLETE! 🌟</h1>

    <div id="mascot-area" style="display:none;">
        <div id="mascot">🦁</div>
        <div class="bubble" id="mascot-text">Oodles is ready!</div>
    </div>


    <script>
        // Animated background based on BGTemplate.html: sky, clouds, rainbow, hills, trees, flowers, and grass.
        (() => {
            const bgCanvas = document.getElementById('backgroundCanvas');
            const bgCtx = bgCanvas.getContext('2d', { alpha: false });

            let bgWidth = 0;
            let bgHeight = 0;
            let bgClouds = [];
            let bgTrees = [];
            let bgFlowers = [];
            let bgButterflies = [];

            const flowerColors = ['#ff4b4b', '#ffc800', '#ce82ff', '#ffffff', '#1cb0f6', '#ff8fab'];

            function resizeBackgroundCanvas() {
                const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
                bgWidth = window.innerWidth;
                bgHeight = window.innerHeight;
                bgCanvas.width = Math.floor(bgWidth * dpr);
                bgCanvas.height = Math.floor(bgHeight * dpr);
                bgCanvas.style.width = bgWidth + 'px';
                bgCanvas.style.height = bgHeight + 'px';
                bgCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
                generateBackgroundEnvironment();
            }

            function generateBackgroundEnvironment() {
                bgClouds = [];
                bgTrees = [];
                bgFlowers = [];
                bgButterflies = [];

                const cloudCount = bgWidth < 600 ? 5 : 8;
                for (let i = 0; i < cloudCount; i++) {
                    bgClouds.push({
                        x: Math.random() * bgWidth,
                        y: bgHeight * (0.08 + Math.random() * 0.34),
                        size: 28 + Math.random() * (bgWidth < 600 ? 34 : 52),
                        speed: Math.random() * 0.16 + 0.05,
                        opacity: 0.72 + Math.random() * 0.24
                    });
                }

                const treeCount = bgWidth < 600 ? 6 : 11;
                for (let i = 0; i < treeCount; i++) {
                    bgTrees.push({
                        x: (i / Math.max(1, treeCount - 1)) * bgWidth + (Math.random() * 70 - 35),
                        y: bgHeight * (0.66 + Math.random() * 0.04),
                        scale: 0.48 + Math.random() * 0.56
                    });
                }

                const flowerCount = bgWidth < 600 ? 26 : 46;
                for (let i = 0; i < flowerCount; i++) {
                    bgFlowers.push({
                        x: Math.random() * bgWidth,
                        y: bgHeight * 0.79 + Math.random() * (bgHeight * 0.18),
                        color: flowerColors[Math.floor(Math.random() * flowerColors.length)],
                        scale: 0.45 + Math.random() * 0.9,
                        sway: Math.random() * Math.PI * 2
                    });
                }

                for (let i = 0; i < 4; i++) {
                    bgButterflies.push({
                        x: Math.random() * bgWidth,
                        y: bgHeight * (0.28 + Math.random() * 0.24),
                        size: 5 + Math.random() * 4,
                        speed: 0.18 + Math.random() * 0.18,
                        phase: Math.random() * Math.PI * 2,
                        color: ['#ff6b9d', '#ffd93d', '#9b5de5', '#00bbf9'][i % 4]
                    });
                }
            }

            function updateBackground() {
                bgClouds.forEach(cloud => {
                    cloud.x -= cloud.speed;
                    if (cloud.x + cloud.size * 2.4 < 0) {
                        cloud.x = bgWidth + cloud.size * 2.4;
                        cloud.y = bgHeight * (0.08 + Math.random() * 0.34);
                    }
                });

                bgButterflies.forEach(b => {
                    b.x += b.speed;
                    b.phase += 0.08;
                    if (b.x > bgWidth + 30) {
                        b.x = -30;
                        b.y = bgHeight * (0.28 + Math.random() * 0.24);
                    }
                });
            }

            function drawRoundedCloud(cloud) {
                bgCtx.save();
                bgCtx.globalAlpha = cloud.opacity;
                bgCtx.fillStyle = '#ffffff';
                bgCtx.beginPath();
                bgCtx.arc(cloud.x, cloud.y, cloud.size, 0, Math.PI * 2);
                bgCtx.arc(cloud.x + cloud.size * 0.82, cloud.y + cloud.size * 0.2, cloud.size * 0.72, 0, Math.PI * 2);
                bgCtx.arc(cloud.x - cloud.size * 0.85, cloud.y + cloud.size * 0.22, cloud.size * 0.68, 0, Math.PI * 2);
                bgCtx.arc(cloud.x + cloud.size * 0.15, cloud.y - cloud.size * 0.28, cloud.size * 0.72, 0, Math.PI * 2);
                bgCtx.fill();
                bgCtx.restore();
            }

            function drawSun() {
                const x = Math.min(90, bgWidth * 0.12);
                const y = Math.min(92, bgHeight * 0.13);
                const r = Math.max(35, Math.min(bgWidth, bgHeight) * 0.055);
                bgCtx.save();
                bgCtx.translate(x, y);
                bgCtx.fillStyle = 'rgba(255, 213, 82, 0.22)';
                bgCtx.beginPath();
                bgCtx.arc(0, 0, r * 1.75, 0, Math.PI * 2);
                bgCtx.fill();
                bgCtx.fillStyle = '#FFD369';
                bgCtx.beginPath();
                bgCtx.arc(0, 0, r, 0, Math.PI * 2);
                bgCtx.fill();
                bgCtx.fillStyle = '#D35400';
                bgCtx.beginPath();
                bgCtx.arc(-r * 0.32, -r * 0.1, r * 0.08, 0, Math.PI * 2);
                bgCtx.arc(r * 0.32, -r * 0.1, r * 0.08, 0, Math.PI * 2);
                bgCtx.fill();
                bgCtx.strokeStyle = '#D35400';
                bgCtx.lineWidth = Math.max(3, r * 0.07);
                bgCtx.lineCap = 'round';
                bgCtx.beginPath();
                bgCtx.arc(0, r * 0.12, r * 0.36, 0.15 * Math.PI, 0.85 * Math.PI);
                bgCtx.stroke();
                bgCtx.restore();
            }

            function drawRainbow() {
                bgCtx.save();
                bgCtx.translate(bgWidth * 0.5, bgHeight * 0.67);
                bgCtx.lineWidth = Math.max(13, Math.min(22, bgWidth * 0.015));
                bgCtx.lineCap = 'round';
                const rainbowColors = ['#ff4b4b', '#ff9900', '#ffc800', '#58cc02', '#1cb0f6', '#ce82ff'];
                const baseRadius = Math.min(bgWidth * 0.34, bgHeight * 0.46, 420);
                for (let i = 0; i < rainbowColors.length; i++) {
                    bgCtx.strokeStyle = rainbowColors[i];
                    bgCtx.globalAlpha = 0.82;
                    bgCtx.beginPath();
                    bgCtx.arc(0, 0, baseRadius - i * bgCtx.lineWidth, Math.PI, 0);
                    bgCtx.stroke();
                }
                bgCtx.restore();
            }

            function drawTree(tree) {
                bgCtx.save();
                bgCtx.translate(tree.x, tree.y);
                bgCtx.scale(tree.scale, tree.scale);
                bgCtx.fillStyle = '#8B5A2B';
                bgCtx.fillRect(-9, 0, 18, 56);
                bgCtx.fillStyle = '#4ade80';
                bgCtx.beginPath();
                bgCtx.arc(0, -24, 38, 0, Math.PI * 2);
                bgCtx.arc(-25, -12, 29, 0, Math.PI * 2);
                bgCtx.arc(24, -10, 30, 0, Math.PI * 2);
                bgCtx.fill();
                bgCtx.fillStyle = 'rgba(255,255,255,0.28)';
                bgCtx.beginPath();
                bgCtx.arc(-12, -34, 12, 0, Math.PI * 2);
                bgCtx.fill();
                bgCtx.restore();
            }

            function drawFlower(flower, time) {
                bgCtx.save();
                const sway = Math.sin(time * 0.0015 + flower.sway) * 2;
                bgCtx.translate(flower.x + sway, flower.y);
                bgCtx.scale(flower.scale, flower.scale);
                bgCtx.strokeStyle = '#2fb344';
                bgCtx.lineWidth = 3;
                bgCtx.beginPath();
                bgCtx.moveTo(0, 4);
                bgCtx.lineTo(0, 22);
                bgCtx.stroke();
                bgCtx.fillStyle = flower.color;
                for (let petal = 0; petal < 5; petal++) {
                    bgCtx.rotate((Math.PI * 2) / 5);
                    bgCtx.beginPath();
                    bgCtx.ellipse(0, -10, 6, 12, 0, 0, Math.PI * 2);
                    bgCtx.fill();
                }
                bgCtx.fillStyle = '#ffc800';
                bgCtx.beginPath();
                bgCtx.arc(0, 0, 5.5, 0, Math.PI * 2);
                bgCtx.fill();
                bgCtx.restore();
            }

            function drawButterfly(b) {
                const y = b.y + Math.sin(b.phase) * 10;
                bgCtx.save();
                bgCtx.translate(b.x, y);
                bgCtx.fillStyle = b.color;
                bgCtx.globalAlpha = 0.88;
                bgCtx.beginPath();
                bgCtx.ellipse(-b.size, 0, b.size, b.size * 1.35, Math.sin(b.phase) * 0.5, 0, Math.PI * 2);
                bgCtx.ellipse(b.size, 0, b.size, b.size * 1.35, -Math.sin(b.phase) * 0.5, 0, Math.PI * 2);
                bgCtx.fill();
                bgCtx.strokeStyle = '#334155';
                bgCtx.lineWidth = 1.4;
                bgCtx.beginPath();
                bgCtx.moveTo(0, -b.size * 1.1);
                bgCtx.lineTo(0, b.size * 1.2);
                bgCtx.stroke();
                bgCtx.restore();
            }

            function drawBackground(time = 0) {
                const skyGradient = bgCtx.createLinearGradient(0, 0, 0, bgHeight * 0.72);
                skyGradient.addColorStop(0, '#7dd3fc');
                skyGradient.addColorStop(0.62, '#bae6fd');
                skyGradient.addColorStop(1, '#e0f8ff');
                bgCtx.fillStyle = skyGradient;
                bgCtx.fillRect(0, 0, bgWidth, bgHeight);

                drawSun();
                drawRainbow();

                bgClouds.forEach(drawRoundedCloud);
                bgButterflies.forEach(drawButterfly);

                bgCtx.fillStyle = '#65a30d';
                bgCtx.beginPath();
                bgCtx.moveTo(0, bgHeight);
                bgCtx.lineTo(0, bgHeight * 0.66);
                for (let x = 0; x <= bgWidth + 280; x += 280) {
                    bgCtx.quadraticCurveTo(x - 140, bgHeight * 0.55, x, bgHeight * 0.66);
                }
                bgCtx.lineTo(bgWidth, bgHeight);
                bgCtx.fill();

                bgTrees.forEach(drawTree);

                bgCtx.fillStyle = '#58cc02';
                bgCtx.beginPath();
                bgCtx.moveTo(0, bgHeight);
                bgCtx.lineTo(0, bgHeight * 0.72);
                bgCtx.quadraticCurveTo(bgWidth * 0.5, bgHeight * 0.66, bgWidth, bgHeight * 0.72);
                bgCtx.lineTo(bgWidth, bgHeight);
                bgCtx.fill();

                bgCtx.strokeStyle = '#84cc16';
                bgCtx.lineWidth = Math.max(10, Math.min(18, bgWidth * 0.014));
                bgCtx.lineCap = 'round';
                bgCtx.beginPath();
                bgCtx.moveTo(-20, bgHeight * 0.72);
                bgCtx.quadraticCurveTo(bgWidth * 0.5, bgHeight * 0.66, bgWidth + 20, bgHeight * 0.72);
                bgCtx.stroke();

                bgFlowers.forEach(flower => drawFlower(flower, time));
            }

            function backgroundAnimationLoop(time) {
                updateBackground();
                drawBackground(time);
                requestAnimationFrame(backgroundAnimationLoop);
            }

            window.addEventListener('resize', resizeBackgroundCanvas);
            resizeBackgroundCanvas();
            requestAnimationFrame(backgroundAnimationLoop);
        })();
    </script>

    <script>
        const animals = ['🐶', '🐱', '🐘', '🐸', '🦁', '🐰', '🐼', '🐯'];
        const animalNames = ['dogs', 'cats', 'elephants', 'frogs', 'lions', 'rabbits', 'pandas', 'tigers'];
        
        let score = 0, questionIndex = 0, currentStep = 1;
        const totalQuestions = 5;
        let count1, count2, animal1, animal2, correctAnswer;
        let soundEnabled = true, audioCtx = null, currentSpeech = "";

        // --- AUDIO ENGINE ---
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playTone(f, t, d, v=0.1) {
            if(!soundEnabled || !audioCtx) return;
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }
        function speak() {
            speakText(currentSpeech);
        }
        function speakText(text) {
            if(!soundEnabled || !window.speechSynthesis || !text) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US';
            u.rate = 0.92;
            u.pitch = 1.08;
            window.speechSynthesis.speak(u);
        }
        function toggleMute() {
            soundEnabled = !soundEnabled;
            document.getElementById('mute-btn').innerText = soundEnabled ? '🔊' : '🔇';
            if(!soundEnabled) window.speechSynthesis.cancel();
        }

        // --- NAVIGATION ---
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('game-container').classList.toggle('run-mode', id === 'screen-run');
        }

        function startGame() {
            initAudio(); score = 0; questionIndex = 0;
            document.getElementById('score-val').innerText = score;
            document.getElementById('mascot-area').style.display = 'flex';
            startMathQuestion();
        }

        function startMathQuestion() {
            if (questionIndex >= totalQuestions) {
                endGame();
                return;
            }
            currentStep = 1;
            const i1 = Math.floor(Math.random() * animals.length);
            let i2 = Math.floor(Math.random() * animals.length);
            while(i1 === i2) i2 = Math.floor(Math.random() * animals.length);
            
            animal1 = animals[i1]; animal2 = animals[i2];
            count1 = Math.floor(Math.random() * 5) + 2; // Reduced slightly for better mobile fit
            count2 = Math.floor(Math.random() * 5) + 2;

            document.getElementById('p-bar').style.width = (questionIndex / totalQuestions) * 100 + "%";
            showScreen('screen-math');
            loadMathStep();
        }

        function loadMathStep() {
            const display = document.getElementById('animals-display');
            const bonds = document.getElementById('number-bonds');
            const qText = document.getElementById('question-text-area');
            const feedback = document.getElementById('feedback');
            
            feedback.innerText = "";
            bonds.classList.add('hidden');

            if (currentStep === 1) {
                currentSpeech = `How many ${animalNames[animals.indexOf(animal1)]} do you see?`;
                display.innerHTML = `<div class="animal-group">${animal1.repeat(count1)}</div>`;
                correctAnswer = count1;
                setMascot("Count the first group of animals!");
            } else if (currentStep === 2) {
                currentSpeech = `How many ${animalNames[animals.indexOf(animal2)]} do you see?`;
                display.innerHTML = `<div class="animal-group">${animal2.repeat(count2)}</div>`;
                correctAnswer = count2;
                setMascot("Good job! Now, how many in the second group?");
            } else {
                currentSpeech = `How many animals are there altogether?`;
                display.innerHTML = `<div class="animal-group">${animal1.repeat(count1)}</div><div class="plus-sign" style="font-weight:900; color:var(--primary); font-size:1.5rem;">+</div><div class="animal-group">${animal2.repeat(count2)}</div>`;
                bonds.classList.remove('hidden');
                document.getElementById('bond-p1').innerText = count1;
                document.getElementById('bond-p2').innerText = count2;
                document.getElementById('bond-whole').innerText = "?";
                correctAnswer = count1 + count2;
                setMascot("Fantastic! Add them all together for the total!");
            }

            const speakerSVG = `<button class="speaker-icon" onclick="speak()" aria-label="Listen to question"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button>`;
            qText.innerHTML = `<span>${currentSpeech}</span> ${speakerSVG}`;
            generateButtons();
        }

        function setAnswerButtonsEnabled(enabled) {
            document.querySelectorAll('.answer-btn').forEach(btn => { btn.disabled = !enabled; });
        }

        function generateButtons() {
            const container = document.getElementById('answer-buttons');
            container.innerHTML = "";
            let opts = [correctAnswer];
            while(opts.length < 3) {
                let r = correctAnswer + (Math.floor(Math.random() * 6) - 3);
                if (r > 0 && !opts.includes(r)) opts.push(r);
            }
            opts.sort((a,b) => a - b).forEach(opt => {
                const b = document.createElement('button');
                b.className = 'answer-btn';
                b.innerText = opt;
                b.setAttribute('aria-label', `Answer ${opt}`);
                b.onclick = () => checkMath(opt, b);
                container.appendChild(b);
            });
        }

        function checkMath(val, buttonEl) {
            const f = document.getElementById('feedback');
            if (val === correctAnswer) {
                setAnswerButtonsEnabled(false);
                buttonEl.classList.add('correct');
                playTone(600, 'sine', 0.2);

        // --- MARIO ENGINE VER 5: adapted from MarioClean canvas runner ---
    function roundedRect(ctx, x, y, w, h, r) {
      const radius = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + w - radius, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
      ctx.lineTo(x + w, y + h - radius);
      ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
      ctx.lineTo(x + radius, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function fillStroke(ctx, fill, stroke = '#151515', lineWidth = 3) {
      ctx.fillStyle = fill;
      ctx.fill();
      ctx.lineWidth = lineWidth;
      ctx.strokeStyle = stroke;
      ctx.stroke();
    }

    function drawLineLimb(ctx, x1, y1, x2, y2, color, width) {
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.stroke();
      ctx.lineWidth = width + 3;
      ctx.strokeStyle = '#151515';
      ctx.globalCompositeOperation = 'destination-over';
      ctx.stroke();
      ctx.globalCompositeOperation = 'source-over';
    }

    function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
      let rot = Math.PI / 2 * 3;
      let x = cx;
      let y = cy;
      const step = Math.PI / spikes;
      ctx.beginPath();
      ctx.moveTo(cx, cy - outerRadius);
      for (let i = 0; i < spikes; i++) {
        x = cx + Math.cos(rot) * outerRadius;
        y = cy + Math.sin(rot) * outerRadius;
        ctx.lineTo(x, y);
        rot += step;
        x = cx + Math.cos(rot) * innerRadius;
        y = cy + Math.sin(rot) * innerRadius;
        ctx.lineTo(x, y);
        rot += step;
      }
      ctx.lineTo(cx, cy - outerRadius);
      ctx.closePath();
    }

    function drawMario(ctx, x, y, scale, frame, isJumping) {
      const swing = Math.sin(frame * 0.24);
      const bob = isJumping ? -5 : Math.abs(swing) * -1.8;

      ctx.save();

        ctx.translate(50 * scale, 64 * scale);
        ctx.rotate(-0.08);
        ctx.translate(-50 * scale, -64 * scale);
      }
      ctx.scale(scale, scale);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      const skin = '#ffd3ad';
      const cheek = 'rgba(255, 132, 160, 0.42)';
      const red = '#ef1c25';
      const redDark = '#bb1d1d';
      const blue = '#2151c8';
      const blueDark = '#173da3';
      const brown = '#7c4a23';
      const brownDark = '#5f3619';
      const outline = '#111827';
      const white = '#ffffff';
      const yellow = '#ffd744';
      const black = '#151515';

      function strokeShape(fill, lw = 3) {
        ctx.fillStyle = fill;
        ctx.fill();
        ctx.strokeStyle = outline;
        ctx.lineWidth = lw;
        ctx.stroke();
      }

      function capsule(x1, y1, x2, y2, width, fill, outlineWidth = 4) {
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.lineWidth = width + outlineWidth;
        ctx.strokeStyle = outline;
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.lineWidth = width;
        ctx.strokeStyle = fill;
        ctx.stroke();
        ctx.restore();

      function drawGlove(cx, cy, facing, angle = 0, small = false) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.ellipse(0, 0, small ? 9 : 11, small ? 7.2 : 8.8, 0, 0, Math.PI * 2);

        ctx.strokeStyle = outline;

        ctx.lineTo(facing > 0 ? 7 : 2, facing > 0 ? -2 : 4);

      function drawBoot(cx, cy, facing, angle = 0, small = false) {
        ctx.save();

        ctx.fill();

        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.strokeStyle = 'rgba(255,255,255,0.55)';

      // Red shirt torso
      ctx.beginPath();

      ctx.quadraticCurveTo(59, 52, 66, 58);
      ctx.quadraticCurveTo(67, 69, 65, 79);
      ctx.quadraticCurveTo(63, 90, 55, 93);
      ctx.quadraticCurveTo(49, 95, 44, 94);
      ctx.quadraticCurveTo(36, 93, 31, 87);
      ctx.quadraticCurveTo(28, 74, 31, 55);
      ctx.closePath();
      strokeShape(blue, 3);

      // Smooth bib / belt line
      ctx.strokeStyle = '#0f3e99';
      ctx.lineWidth = 2.4;
      ctx.beginPath();
      ctx.moveTo(33, 62);
      ctx.quadraticCurveTo(48, 58, 63, 65);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(47.5, 61.5);
      ctx.quadraticCurveTo(47.8, 76, 47.2, 91);
      ctx.stroke();

      // Smooth crotch panel to soften the join between two legs
      ctx.fillStyle = blue;
      ctx.beginPath();
      ctx.moveTo(39, 83);
      ctx.quadraticCurveTo(47, 76, 56, 83);
      ctx.quadraticCurveTo(52, 90, 47, 92);
      ctx.quadraticCurveTo(42, 90, 39, 83);

      ctx.fill();

      // Straps and buttons
      capsule(35, 53, 40, 75, 7, blue, 2);
      capsule(59, 55, 52, 76, 7, blue, 2);
      ctx.fillStyle = yellow;
      ctx.beginPath(); ctx.arc(38, 74, 4.2, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = outline; ctx.lineWidth = 2; ctx.stroke();
      ctx.beginPath(); ctx.arc(56, 74, 4.2, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = outline; ctx.lineWidth = 2; ctx.stroke();

      // Single eyebrow
      ctx.strokeStyle = brownDark;
      ctx.lineWidth = 2.2;
      ctx.beginPath(); ctx.moveTo(62.3, 16.2); ctx.quadraticCurveTo(67.4, 13.8, 72.6, 16.0); ctx.stroke();

      ctx.fillStyle = black;

      ctx.moveTo(57, 39.2);
      ctx.quadraticCurveTo(62, 35.8, 66.5, 39.8);

    function drawCoin(ctx, coin, frame) {
      const spin = Math.max(0.25, Math.abs(Math.cos(frame * 0.14 + coin.phase)));
      const bob = Math.sin(frame * 0.08 + coin.phase) * 4;
      const x = coin.x;
      const y = coin.y + bob;
      const r = coin.r;
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(spin, 1);

      const goldGrad = ctx.createRadialGradient(-r * 0.35, -r * 0.35, r * 0.1, 0, 0, r);
      goldGrad.addColorStop(0, '#fff7a8');
      goldGrad.addColorStop(0.48, '#ffc800');
      goldGrad.addColorStop(1, '#d3a600');
      ctx.fillStyle = goldGrad;
      ctx.strokeStyle = '#9a6700';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      ctx.strokeStyle = 'rgba(255,255,255,0.75)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(-r * 0.15, -r * 0.1, r * 0.56, 2.5, 4.45);
      ctx.stroke();

      ctx.strokeStyle = '#9a6700';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-r * 0.25, -r * 0.55);
      ctx.lineTo(-r * 0.25, r * 0.55);
      ctx.moveTo(r * 0.20, -r * 0.42);
      ctx.lineTo(r * 0.20, r * 0.42);
      ctx.stroke();
      ctx.restore();
    }

    function drawObstacle(ctx, obstacle, floorY, frame) {
      const x = obstacle.x;
      const h = obstacle.h;
      const w = obstacle.w;
      const y = floorY - h;
      ctx.save();
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';

      // Ground shadow
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.beginPath();
      ctx.ellipse(x + w / 2, floorY + 8, w * 0.56, 8, 0, 0, Math.PI * 2);
      ctx.fill();

      if (obstacle.type === 'pipe') {
        ctx.fillStyle = '#10b981';
        ctx.strokeStyle = '#064e3b';
        ctx.lineWidth = 4;
        roundedRect(ctx, x + w * 0.18, y + h * 0.22, w * 0.64, h * 0.78, 9);
        ctx.fill();
        ctx.stroke();

        const grad = ctx.createLinearGradient(x, 0, x + w, 0);
        grad.addColorStop(0, '#16a34a');
        grad.addColorStop(0.5, '#5eea89');
        grad.addColorStop(1, '#058345');
        ctx.fillStyle = grad;
        roundedRect(ctx, x + w * 0.08, y, w * 0.84, h * 0.28, 12);
        ctx.fill();
        ctx.stroke();
        ctx.strokeStyle = 'rgba(255,255,255,0.45)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(x + w * 0.36, y + h * 0.28);
        ctx.lineTo(x + w * 0.36, floorY - 7);
        ctx.stroke();
      } else if (obstacle.type === 'mushroom') {
        ctx.fillStyle = '#fff7d6';
        ctx.strokeStyle = '#92400e';
        ctx.lineWidth = 4;
        roundedRect(ctx, x + w * 0.36, y + h * 0.35, w * 0.28, h * 0.65, 10);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#ef4444';
        ctx.beginPath();
        ctx.ellipse(x + w / 2, y + h * 0.32, w * 0.5, h * 0.32, 0, Math.PI, Math.PI * 2);
        ctx.lineTo(x + w * 0.92, y + h * 0.32);
        ctx.quadraticCurveTo(x + w * 0.5, y + h * 0.58, x + w * 0.08, y + h * 0.32);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#ffffff';
        ctx.beginPath(); ctx.arc(x + w * 0.34, y + h * 0.27, w * 0.11, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(x + w * 0.62, y + h * 0.19, w * 0.09, 0, Math.PI * 2); ctx.fill();
      } else if (obstacle.type === 'star') {
        ctx.save();
        ctx.translate(x + w / 2, y + h / 2);
        ctx.rotate(frame * 0.05);
        drawStar(ctx, 0, 0, 5, w * 0.45, w * 0.2);
        ctx.fillStyle = '#ffc800';
        ctx.strokeStyle = '#b77900';
        ctx.lineWidth = 4;
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#7c4a00';
        ctx.beginPath(); ctx.arc(-w * 0.12, -h * 0.05, 2.2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(w * 0.12, -h * 0.05, 2.2, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      } else {
        const grad = ctx.createLinearGradient(x, y, x + w, floorY);
        grad.addColorStop(0, '#c3ccd6');
        grad.addColorStop(1, '#8894a3');
        ctx.fillStyle = grad;
        ctx.strokeStyle = '#566273';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(x + 6, floorY);
        ctx.quadraticCurveTo(x + w * 0.18, y + h * 0.55, x + w * 0.34, y + h * 0.42);
        ctx.quadraticCurveTo(x + w * 0.52, y - 3, x + w * 0.76, y + h * 0.34);
        ctx.quadraticCurveTo(x + w, y + h * 0.62, x + w - 5, floorY);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.strokeStyle = 'rgba(255,255,255,0.45)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(x + w * 0.37, y + h * 0.38);
        ctx.lineTo(x + w * 0.52, y + h * 0.18);
        ctx.stroke();
      }
      ctx.restore();
    }

        let runActive = false;

        class MiniMarioRunner {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.config = { SPEED: 4.15, GRAVITY: 0.70, INITIAL_JUMP_VELOCITY: 19.2 };
                this.player = { x: 120, y: 0, vy: 0, jumping: false, scale: 1, width: 98, height: 118 };
                this.obstacles = [];
                this.coins = [];
                this.sparkles = [];
                this.coinCount = 0;
                this.frameCount = 0;
                this.animationFrameId = null;
                this.running = false;
                this.dpr = Math.min(window.devicePixelRatio || 1, 2);
                window.addEventListener('resize', () => this.resize());
            }

            resize() {
                const rect = this.canvas.getBoundingClientRect();
                this.width = Math.max(320, rect.width || window.innerWidth);
                this.height = Math.max(280, rect.height || window.innerHeight * 0.55);
                this.dpr = Math.min(window.devicePixelRatio || 1, 2);
                this.canvas.width = Math.floor(this.width * this.dpr);
                this.canvas.height = Math.floor(this.height * this.dpr);
                this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);

                const pageGrassLine = window.innerHeight * 0.72;
                const canvasTop = rect.top || 0;
                this.floorY = Math.max(this.height * 0.55, Math.min(this.height - 74, pageGrassLine - canvasTop));
                const s = Math.min(1.05, Math.max(0.70, this.width / 1050));
                this.player.scale = s;
                this.player.width = 98 * s;
                this.player.height = 118 * s;
                this.player.x = Math.max(62, Math.min(142, this.width * 0.15));
                if (!this.player.jumping) this.player.y = this.floorY - this.player.height;
                this.draw();
            }

            start() {
                this.resize();
                this.restart();
                if (this.animationFrameId) cancelAnimationFrame(this.animationFrameId);
                this.gameLoop();
            }

            stop() {
                this.running = false;
                if (this.animationFrameId) cancelAnimationFrame(this.animationFrameId);
                this.animationFrameId = null;
            }

            restart() {
                this.resize();
                this.player.y = this.floorY - this.player.height;
                this.player.vy = 0;
                this.player.jumping = false;
                this.obstacles = [];
                this.coins = [];
                this.sparkles = [];
                this.coinCount = 0;
                this.frameCount = 0;
                this.running = true;
            }

            jump() {
                if (!this.running || this.player.jumping) return;
                this.player.vy = -this.config.INITIAL_JUMP_VELOCITY;
                this.player.jumping = true;
                playTone(450, 'triangle', 0.09, 0.08);
                setTimeout(() => playTone(660, 'triangle', 0.08, 0.05), 60);
                for (let i = 0; i < 8; i++) {
                    this.sparkles.push({
                        x: this.player.x + 55 * this.player.scale,
                        y: this.player.y + 90 * this.player.scale,
                        vx: Math.random() * -2 - 0.5,
                        vy: Math.random() * -2 - 0.5,
                        life: 24,
                        size: Math.random() * 4 + 3,
                        color: '#ffc800'
                    });
                }
            }

            spawnObstacle() {
                const types = ['pipe', 'mushroom', 'rock'];
                const type = types[Math.floor(Math.random() * types.length)];
                const s = this.player.scale;
                let w = 56 * s, h = 56 * s;
                if (type === 'pipe') { w = 52 * s; h = 72 * s; }
                if (type === 'mushroom') { w = 60 * s; h = 56 * s; }
                if (type === 'rock') { w = 60 * s; h = 52 * s; }
                this.obstacles.push({ x: this.width + 70, w, h, type });
            }

            spawnCoins() {
                const s = this.player.scale;
                const count = 3 + Math.floor(Math.random() * 3);
                const pattern = Math.random();
                const startX = this.width + 70;
                for (let i = 0; i < count; i++) {
                    let y = this.floorY - (82 + Math.random() * 48) * s;
                    if (pattern > 0.66) y = this.floorY - (112 + Math.sin(i / Math.max(1, count - 1) * Math.PI) * 58) * s;
                    if (pattern < 0.33) y = this.floorY - (78 + i * 18) * s;
                    this.coins.push({ x: startX + i * 52 * s, y, r: 16 * s, phase: Math.random() * Math.PI * 2, collected: false });
                }
            }

            update() {
                if (!this.running) return;
                this.frameCount++;

                this.player.y += this.player.vy;
                this.player.vy += this.config.GRAVITY;
                const restY = this.floorY - this.player.height;
                if (this.player.y >= restY) {
                    this.player.y = restY;
                    this.player.vy = 0;
                    this.player.jumping = false;
                }

                const spawnRate = Math.max(92, Math.floor(180 - this.config.SPEED * 8));
                if (this.frameCount > 62 && this.frameCount % spawnRate === 0) this.spawnObstacle();

                const coinRate = Math.max(64, Math.floor(118 - this.config.SPEED * 4));
                if (this.frameCount > 38 && this.frameCount % coinRate === 0) this.spawnCoins();

                const sCoin = this.player.scale;
                const pxCoin = this.player.x + 18 * sCoin;
                const pyCoin = this.player.y + 12 * sCoin;
                const pwCoin = 68 * sCoin;
                const phCoin = 94 * sCoin;
                this.coins.forEach(coin => {
                    coin.x -= this.config.SPEED;
                    if (!coin.collected) {
                        const cx = coin.x - coin.r;
                        const cy = coin.y - coin.r;
                        const cw = coin.r * 2;
                        const ch = coin.r * 2;
                        if (pxCoin < cx + cw && pxCoin + pwCoin > cx && pyCoin < cy + ch && pyCoin + phCoin > cy) {
                            coin.collected = true;
                            this.coinCount += 1;
                            const coinVal = document.getElementById('mario-coin-val');
                            if (coinVal) coinVal.innerText = this.coinCount;
                            score += 5;
                            document.getElementById('score-val').innerText = score;
                            playTone(900, 'sine', 0.06, 0.05);
                            for (let i = 0; i < 10; i++) {
                                this.sparkles.push({ x: coin.x, y: coin.y, vx: Math.random() * 5 - 2.5, vy: Math.random() * -4 - 0.5, life: 24, size: Math.random() * 4 + 3, color: '#ffc800' });
                            }
                        }
                    }
                });
                this.coins = this.coins.filter(coin => !coin.collected && coin.x > -80);

                this.obstacles.forEach(obstacle => {
                    obstacle.x -= this.config.SPEED;
                    const s = this.player.scale;
                    const px = this.player.x + 24 * s;
                    const py = this.player.y + 15 * s;
                    const pw = 50 * s;
                    const ph = 92 * s;
                    const ox = obstacle.x + obstacle.w * 0.14;
                    const oy = this.floorY - obstacle.h + obstacle.h * 0.12;
                    const ow = obstacle.w * 0.72;
                    const oh = obstacle.h * 0.84;
                    if (px < ox + ow && px + pw > ox && py < oy + oh && py + ph > oy) {
                        playTone(120, 'sawtooth', 0.28, 0.08);
                        endMarioRun();
                    }
                });
                this.obstacles = this.obstacles.filter(obstacle => obstacle.x > -120);

                this.sparkles.forEach(p => {
                    p.x += p.vx - this.config.SPEED * 0.35;
                    p.y += p.vy;
                    p.vy += 0.12;
                    p.life--;
                });
                this.sparkles = this.sparkles.filter(p => p.life > 0);
            }

            drawSparkles() {
                this.sparkles.forEach(p => {
                    const alpha = Math.max(0, p.life / 24);
                    this.ctx.save();
                    this.ctx.globalAlpha = alpha;
                    this.ctx.fillStyle = p.color || '#ffc800';
                    drawStar(this.ctx, p.x, p.y, 5, p.size, p.size * 0.42);
                    this.ctx.fill();
                    this.ctx.restore();
                });
            }

            draw() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, this.width, this.height);

                // Soft ground strokes that blend with the main BGTemplate grass.
                ctx.save();
                ctx.globalAlpha = 0.20;
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 3;
                for (let i = 0; i < 18; i++) {
                    const x = ((i * 120 - (this.frameCount * this.config.SPEED * 0.7)) % (this.width + 120)) - 60;
                    const y = this.floorY + 18 + (i % 3) * 22;
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(x + 34, y - 7);
                    ctx.stroke();
                }
                ctx.restore();

                this.obstacles.forEach(obstacle => drawObstacle(ctx, obstacle, this.floorY, this.frameCount));
                this.coins.forEach(coin => drawCoin(ctx, coin, this.frameCount));

                const s = this.player.scale;
                const air = Math.max(0, (this.floorY - this.player.height) - this.player.y);
                const shadowScale = Math.max(0.42, 1 - air / 220);
                ctx.fillStyle = 'rgba(0,0,0,0.20)';
                ctx.beginPath();
                ctx.ellipse(this.player.x + 49 * s, this.floorY + 12, 44 * s * shadowScale, 10 * s * shadowScale, 0, 0, Math.PI * 2);
                ctx.fill();

                drawMario(ctx, this.player.x, this.player.y, this.player.scale, this.frameCount, this.player.jumping);
                this.drawSparkles();
            }

            gameLoop() {
                this.update();
                this.draw();
                if (this.running) this.animationFrameId = requestAnimationFrame(() => this.gameLoop());
            }
        }

        function initMarioRun() {
            clearInterval(marioTimerInterval);
            showScreen('screen-run');
            runActive = true;
            gameTime = 0;
            const coinVal = document.getElementById('mario-coin-val');
            if (coinVal) coinVal.innerText = '0';
            setMascot("Quick! Jump over the pipes and collect coins!");
            if (!marioRunner) marioRunner = new MiniMarioRunner('mario-run-canvas');
            marioRunner.start();
            const hint = document.getElementById('mario-run-hint');
            hint.style.opacity = '1';
            clearTimeout(window.marioHintTimer);
            window.marioHintTimer = setTimeout(() => { hint.style.opacity = '0'; }, 5200);
        }

        function miniMarioJump(e) {
            if (e && e.target && e.target.closest && e.target.closest('button')) return;
            if (!runActive || !marioRunner) return;
            marioRunner.jump();
        }

        function marioJump() { miniMarioJump(); }

        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space' || e.code === 'ArrowUp') {
                if (runActive) {
                    e.preventDefault();
                    miniMarioJump(e);
                }
            }
        });

        function endMarioRun() {
            if(!runActive) return;
            runActive = false;
            clearInterval(marioTimerInterval);
            if (marioRunner) marioRunner.stop();
            setTimeout(() => { questionIndex++; startMathQuestion(); }, 800);
        }

        // --- FIREWORKS & CELEBRATION ---
        let fireworksActive = false;
        function endGame() {
            fireworksActive = true;
            document.getElementById('final-score').innerText = score;
            document.getElementById('mascot-area').style.display = 'none';
            showScreen('screen-end');
            playTone(400, 'sine', 0.2);
            setTimeout(() => playTone(500, 'sine', 0.2), 200);
            setTimeout(() => playTone(600, 'sine', 0.4), 400);
            startFireworks();
        }

        function startFireworks() {
            const canvas = document.getElementById('celebration-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = Math.min(window.innerHeight * 0.46, 430);

            let particles = [];
            function createFirework() {
                const x = Math.random() * canvas.width;
                const y = Math.random() * (canvas.height * 0.72);
                const color = `hsl(${Math.random() * 360}, 100%, 50%)`;
                for(let i=0; i<30; i++) {
                    particles.push({
                        x, y,
                        vx: (Math.random() - 0.5) * 10,
                        vy: (Math.random() - 0.5) * 10,
                        life: 1.0,
                        color
                    });
                }
            }

            function update() {
                if(!fireworksActive) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if(Math.random() < 0.08) createFirework();

                particles.forEach((p, i) => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.1;
                    p.life -= 0.02;
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                    ctx.fill();
                    if(p.life <= 0) particles.splice(i, 1);
                });
                requestAnimationFrame(update);
            }
            update();
        }

        window.onload = () => { document.querySelector('.c1').style.left = "-30vw"; };
        window.addEventListener('resize', () => {
            const canvas = document.getElementById('celebration-canvas');
            if (canvas) {
                canvas.width = window.innerWidth;
                canvas.height = Math.min(window.innerHeight * 0.46, 430);
            }
        });
    </script>
