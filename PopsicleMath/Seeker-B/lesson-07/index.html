<!doctype html>
<html lang="en">
 <head>
  <link rel="stylesheet" href="../assets/brand.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animal Addition Adventure</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Import Poppins Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- Import Canvas Confetti for Fireworks -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <style>
        body {
            box-sizing: border-box;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #FFE5F1, #E5F3FF, #F0FFE5);
            /* Updated font to Poppins */
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
        }
        .game-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        .title {
            text-align: center;
            font-size: 2.2em;
            color: #FF6B9D;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            font-weight: 700;
        }
        .progress-bar {
            width: 100%;
            height: 15px;
            background: #E0E0E0;
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FF6B9D, #4ECDC4);
            border-radius: 10px;
            transition: width 0.5s ease;
        }
        .question-area {
            text-align: center;
            margin-bottom: 30px;
        }
        .question-text {
            font-size: 1.6em;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .animals-display {
            font-size: 3em;
            margin: 20px 0;
            min-height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: nowrap;
            gap: 15px;
        }
        .plus-sign {
            font-size: 4em;
            color: #FF6B9D;
            margin: 0 15px;
            font-weight: 700;
        }
        .number-bonds {
            position: relative;
            width: 200px;
            height: 180px;
            margin: 20px auto;
        }
        .bond-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .bond-circle {
            position: absolute;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            z-index: 2;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .part-circle {
            width: 60px;
            height: 60px;
            font-size: 1.5em;
            background: #4ECDC4;
            top: 0;
        }
        .part-left { left: 10px; }
        .part-right { right: 10px; }
        .whole-circle {
            background: #FF6B9D;
            width: 80px;
            height: 80px;
            font-size: 2em;
            bottom: 0;
            left: 60px;
        }
        .answer-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 25px 0;
        }
        .answer-btn, .action-btn {
            padding: 15px 25px;
            font-size: 1.5em;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            min-width: 80px;
            font-family: 'Poppins', sans-serif;
        }
        .answer-btn {
            background: linear-gradient(135deg, #FFE066, #FF9A56);
            color: #333;
        }
        .answer-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .action-btn {
            background: linear-gradient(135deg, #4ECDC4, #44A08D);
            color: white;
            margin: 10px;
        }
        .action-btn:hover {
            transform: scale(1.05);
        }
        .feedback {
            font-size: 1.4em;
            font-weight: 700;
            margin: 15px 0;
            min-height: 30px;
        }
        .correct { color: #4CAF50; }
        .incorrect { color: #FF5722; }

        .celebration {
            text-align: center;
        }
        .celebration h2 {
            font-size: 2em;
            color: #FF6B9D;
            font-weight: 700;
        }
        .final-score {
            font-size: 2.5em;
            font-weight: 700;
            color: #4ECDC4;
            margin: 15px 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .hidden { display: none !important; }
        .listen-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1em;
            margin-left: 5px;
            padding: 5px;
            border-radius: 50%;
            transition: transform 0.2s ease;
        }
        .listen-btn:hover {
            transform: scale(1.2);
        }
        
        /* Styles for Shell Game */
        .mystery-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 1000;
            animation: popIn 0.5s ease;
            width: 90%;
            max-width: 500px;
        }
        .mystery-box h3 {
            color: #FF6B9D;
            margin-bottom: 20px;
            font-size: 1.8em;
            font-weight: 700;
        }
        .mystery-gifts-container {
            position: relative;
            height: 120px; 
            width: 100%;
            margin: 20px 0;
            display: flex;
            justify-content: center;
        }
        .mystery-gift {
            position: absolute; 
            font-size: 3.5em;
            cursor: pointer;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            background: rgba(255, 107, 157, 0.1);
            transition: left 0.6s ease-in-out, background 0.2s; 
            user-select: none;
        }
        .mystery-gift:hover {
            background: rgba(255, 107, 157, 0.3);
        }
        .mystery-gift.disabled {
            cursor: default;
            pointer-events: none;
        }
        .mystery-message {
            min-height: 1.5em;
            font-size: 1.2em;
            color: #555;
            margin-top: 10px;
            font-weight: 600;
        }

        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }
    </style>
 </head>
 <body>
  <img src="../assets/logo-oodles-math.png" class="oodles-logo">
  <div class="game-container">
   <h1 class="title" id="gameTitle">Animal Addition Adventure!</h1>
   <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
   </div>
   <div id="gameScreen">
    <div class="question-area">
     <div class="question-text" id="questionText"></div>
     <div class="animals-display" id="animalsDisplay"></div>
     <div class="number-bonds hidden" id="numberBonds"></div>
     <div class="answer-buttons" id="answerButtons"></div>
     <div class="feedback" id="feedback"></div>
    </div>
   </div>
   <div id="overlay" class="overlay hidden"></div>
   
   <div id="mysteryBox" class="mystery-box hidden">
    <h3 id="mysteryTitle">Find the Trophy! 🏆</h3>
    <div class="mystery-gifts-container" id="mysteryGiftsContainer">
        <!-- Boxes will be injected here via JS -->
    </div>
    <div id="mysteryResult" class="mystery-message">Watch closely...</div>
   </div>

   <div id="celebrationScreen" class="celebration hidden">
    <h2>Awesome Job!</h2>
    <div class="final-score" id="finalScoreDisplay">Score: 0</div>
    <div style="font-size: 3em; margin: 20px 0;">
     🐶🎉🐱✨🐘🎉🐸✨
    </div>
    <button class="action-btn" id="playAgainBtn">Play Again!</button>
   </div>
  </div>

  <script>
        const animals = ['🐶', '🐱', '🐘', '🐸', '🦁', '🐰', '🐼', '🐯'];
        const animalNames = ['dogs', 'cats', 'elephants', 'frogs', 'lions', 'rabbits', 'pandas', 'tigers'];
        const WIN_ITEM = '🏆';
        const LOSE_ITEM = '💨'; 
        
        let currentQuestion = 0;
        let currentStep = 1;
        let animal1, animal2, count1, count2, correctAnswer;
        let currentSpeechText = "";
        
        // Scoring system
        let totalScore = 0;
        let currentStepAttempts = 0;

        // Shell Game Variables
        let boxes = []; 
        const BOX_SPACING = 110; 
        
        const config = {
            encouragement_text: "Fantastic! You got it right!"
        };

        // --- AUDIO SYSTEM ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playTone(freq, type, duration, startTime, volume = 0.2) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start(startTime);
            gain.gain.setValueAtTime(volume, startTime);
            gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
            osc.stop(startTime + duration);
        }

        function playCheer() {
            const now = audioCtx.currentTime;
            playTone(523.25, 'sine', 0.3, now);       
            playTone(659.25, 'sine', 0.3, now + 0.1); 
            playTone(783.99, 'sine', 0.4, now + 0.2); 
        }

        function playCorrectMath() {
            const now = audioCtx.currentTime;
            playTone(523.25, 'triangle', 0.1, now, 0.1);
            playTone(1046.50, 'sine', 0.4, now + 0.05, 0.3); 
        }

        function playWrong() {
            const now = audioCtx.currentTime;
            playTone(300, 'sawtooth', 0.3, now, 0.1);
            playTone(200, 'sawtooth', 0.4, now + 0.2, 0.1);
        }

        function playShuffleSound() {
            const now = audioCtx.currentTime;
            playTone(400, 'square', 0.05, now, 0.05);
        }

        function playFanfare() {
            const now = audioCtx.currentTime;
            playTone(523.25, 'triangle', 0.2, now);       
            playTone(659.25, 'triangle', 0.2, now + 0.15); 
            playTone(783.99, 'triangle', 0.2, now + 0.30); 
            playTone(1046.50, 'triangle', 0.8, now + 0.45); 
        }

        // --- GAME LOGIC ---

        function startNewQuestion() {
            currentStep = 1;
            const indices = [];
            while (indices.length < 2) {
                const idx = Math.floor(Math.random() * animals.length);
                if (!indices.includes(idx)) indices.push(idx);
            }
            animal1 = animals[indices[0]];
            animal2 = animals[indices[1]];
            
            do {
                count1 = Math.floor(Math.random() * 10) + 1;
                count2 = Math.floor(Math.random() * 10) + 1;
            } while (count1 + count2 > 20);

            updateProgress();
            showStep1();
        }

        function showStep1() {
            currentStepAttempts = 0;
            currentSpeechText = `How many ${animalNames[animals.indexOf(animal1)]} do you see?`;
            const questionHtml = `
                <span>${currentSpeechText}</span>
                <button class="listen-btn" onclick="speakQuestion()">🔊</button>
            `;
            document.getElementById('questionText').innerHTML = questionHtml;
            document.getElementById('animalsDisplay').innerHTML = animal1.repeat(count1);
            document.getElementById('numberBonds').classList.add('hidden');
            correctAnswer = count1;
            createAnswerButtons();
        }

        function showStep2() {
            currentStepAttempts = 0;
            currentSpeechText = `How many ${animalNames[animals.indexOf(animal2)]} do you see?`;
            const questionHtml = `
                <span>${currentSpeechText}</span>
                <button class="listen-btn" onclick="speakQuestion()">🔊</button>
            `;
            document.getElementById('questionText').innerHTML = questionHtml;
            document.getElementById('animalsDisplay').innerHTML = animal2.repeat(count2);
            correctAnswer = count2;
            createAnswerButtons();
        }

        function showStep3() {
            currentStepAttempts = 0;
            currentSpeechText = 'How many animals altogether?';
            const questionHtml = `
                <span>${currentSpeechText}</span>
                <button class="listen-btn" onclick="speakQuestion()">🔊</button>
            `;
            document.getElementById('questionText').innerHTML = questionHtml;
            document.getElementById('animalsDisplay').innerHTML = 
                `${animal1.repeat(count1)}<span class="plus-sign">+</span>${animal2.repeat(count2)}`;
            
            const bondsHtml = `
                <svg class="bond-lines" viewBox="0 0 200 180" width="100%" height="100%">
                    <line x1="40" y1="30" x2="100" y2="140" stroke="#FF6B9D" stroke-width="4" stroke-linecap="round"/>
                    <line x1="160" y1="30" x2="100" y2="140" stroke="#FF6B9D" stroke-width="4" stroke-linecap="round"/>
                </svg>
                <div class="bond-circle part-circle part-left">${count1}</div>
                <div class="bond-circle part-circle part-right">${count2}</div>
                <div class="bond-circle whole-circle">?</div>
            `;
            document.getElementById('numberBonds').innerHTML = bondsHtml;
            document.getElementById('numberBonds').classList.remove('hidden');
            
            correctAnswer = count1 + count2;
            createAnswerButtons();
        }

        function createAnswerButtons() {
            const buttons = [];
            buttons.push(correctAnswer);
            while (buttons.length < 3) {
                let wrong = correctAnswer + Math.floor(Math.random() * 6) - 3;
                if (wrong > 0 && wrong !== correctAnswer && !buttons.includes(wrong)) {
                    buttons.push(wrong);
                }
            }
            buttons.sort(() => Math.random() - 0.5);
            
            const container = document.getElementById('answerButtons');
            container.innerHTML = '';
            buttons.forEach(num => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.textContent = num;
                btn.onclick = () => checkAnswer(num);
                container.appendChild(btn);
            });
            document.getElementById('feedback').textContent = '';
        }

        function checkAnswer(selected) {
            const feedback = document.getElementById('feedback');
            if (selected === correctAnswer) {
                // Calculate score: Max 10 pts for steps 1 & 2, Max 20 pts for step 3. Reduce if failed multiple times.
                let maxPts = (currentStep === 3) ? 20 : 10;
                let earnedPts = Math.max(maxPts - (currentStepAttempts * 5), 5); // Minimum 5 pts if correct eventually
                totalScore += earnedPts;

                playCorrectMath(); 
                feedback.innerHTML = `${config.encouragement_text} <span style="color:#FF9A56; font-size:0.9em;">(+${earnedPts} pts)</span>`;
                feedback.className = 'feedback correct';
                
                if (currentStep === 3) {
                    document.querySelector('.whole-circle').textContent = correctAnswer;
                }
                
                // Disable buttons
                const btns = document.querySelectorAll('.answer-btn');
                btns.forEach(b => b.style.pointerEvents = 'none');

                setTimeout(() => {
                    if (currentStep < 3) {
                        currentStep++;
                        if (currentStep === 2) showStep2();
                        else if (currentStep === 3) showStep3();
                    } else {
                        initMysteryGame(); 
                    }
                }, 1500);
            } else {
                currentStepAttempts++;
                playWrong();
                feedback.textContent = 'Try again!';
                feedback.className = 'feedback incorrect';
            }
        }

        // --- MYSTERY BOX SHELL GAME LOGIC ---

        function initMysteryGame() {
            document.getElementById('overlay').classList.remove('hidden');
            document.getElementById('mysteryBox').classList.remove('hidden');
            document.getElementById('mysteryResult').textContent = "Watch carefully!";
            document.getElementById('mysteryTitle').textContent = "Find the Trophy! 🏆";
            
            const container = document.getElementById('mysteryGiftsContainer');
            container.innerHTML = '';
            boxes = [];
            
            const trophyIndex = Math.floor(Math.random() * 3); 

            for (let i = 0; i < 3; i++) {
                const boxEl = document.createElement('div');
                boxEl.className = 'mystery-gift disabled'; 
                boxEl.textContent = '🎁';
                
                const offset = (i - 1) * BOX_SPACING;
                boxEl.style.left = `calc(50% + ${offset}px - 40px)`; 
                
                container.appendChild(boxEl);
                
                boxes.push({
                    id: i,
                    currentPos: i, 
                    hasTrophy: (i === trophyIndex),
                    element: boxEl
                });
            }

            setTimeout(() => {
                revealContents(true);
                setTimeout(() => {
                    revealContents(false);
                    document.getElementById('mysteryResult').textContent = "Shuffling...";
                    startShuffling(5); 
                }, 1500);
            }, 500);
        }

        function revealContents(show) {
            boxes.forEach(box => {
                if (show) {
                    box.element.textContent = box.hasTrophy ? WIN_ITEM : '';
                    if (!box.hasTrophy) box.element.style.background = 'rgba(0,0,0,0.05)';
                } else {
                    box.element.textContent = '🎁';
                    box.element.style.background = 'rgba(255, 107, 157, 0.1)';
                }
            });
            if(show && boxes.some(b => b.hasTrophy)) playCheer();
        }

        function startShuffling(swapsRemaining) {
            if (swapsRemaining <= 0) {
                enableSelection();
                return;
            }

            let posA = Math.floor(Math.random() * 3);
            let posB = Math.floor(Math.random() * 3);
            while (posA === posB) { posB = Math.floor(Math.random() * 3); }

            let boxA = boxes.find(b => b.currentPos === posA);
            let boxB = boxes.find(b => b.currentPos === posB);

            boxA.currentPos = posB;
            boxB.currentPos = posA;

            const offsetA = (boxA.currentPos - 1) * BOX_SPACING;
            const offsetB = (boxB.currentPos - 1) * BOX_SPACING;

            playShuffleSound();
            
            boxA.element.style.left = `calc(50% + ${offsetA}px - 40px)`;
            boxB.element.style.left = `calc(50% + ${offsetB}px - 40px)`;

            setTimeout(() => {
                startShuffling(swapsRemaining - 1);
            }, 700); 
        }

        function enableSelection() {
            document.getElementById('mysteryResult').textContent = "Where is the trophy?";
            boxes.forEach(box => {
                box.element.classList.remove('disabled');
                box.element.onclick = () => checkMysteryChoice(box);
            });
        }

        function checkMysteryChoice(box) {
            boxes.forEach(b => b.element.classList.add('disabled'));

            if (box.hasTrophy) {
                totalScore += 50; // Bonus points for finding trophy
                box.element.textContent = WIN_ITEM;
                playFanfare();
                document.getElementById('mysteryResult').innerHTML = `You found it! 🎉 <br><span style="color:#FF9A56; font-size:0.9em;">(+50 pts)</span>`;
                document.getElementById('mysteryTitle').textContent = "WINNER!";
                
                setTimeout(() => {
                    closeMysteryBox(true);
                }, 2000);
            } else {
                box.element.textContent = LOSE_ITEM;
                playWrong();
                document.getElementById('mysteryResult').textContent = "Oh no! Empty!";
                
                setTimeout(() => {
                    const actualBox = boxes.find(b => b.hasTrophy);
                    actualBox.element.textContent = WIN_ITEM;
                    actualBox.element.style.background = "#ffffaa";
                    setTimeout(() => {
                        closeMysteryBox(false); 
                    }, 2000);
                }, 800);
            }
        }

        function closeMysteryBox(won) {
            document.getElementById('overlay').classList.add('hidden');
            document.getElementById('mysteryBox').classList.add('hidden');
            nextQuestion();
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion >= 5) {
                showCelebration();
            } else {
                document.getElementById('gameScreen').classList.remove('hidden');
                startNewQuestion();
            }
        }

        function triggerFireworks() {
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
              return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
              var timeLeft = animationEnd - Date.now();

              if (timeLeft <= 0) {
                return clearInterval(interval);
              }

              var particleCount = 50 * (timeLeft / duration);
              // since particles fall down, start a bit higher than random
              confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
              confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
            }, 250);
        }

        function showCelebration() {
            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('progressFill').style.width = '100%';
            playCheer();
            document.getElementById('finalScoreDisplay').textContent = `Total Score: ${totalScore} Points!`;
            document.getElementById('celebrationScreen').classList.remove('hidden');
            triggerFireworks();
        }

        function restartGame() {
            currentQuestion = 0;
            totalScore = 0;
            document.getElementById('celebrationScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');
            startNewQuestion();
        }

        function updateProgress() {
            const progress = (currentQuestion / 5) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function speakQuestion() {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(currentSpeechText);
                utterance.lang = 'en-US'; // Force English pronunciation
                utterance.rate = 0.8;
                utterance.pitch = 1.2;
                window.speechSynthesis.speak(utterance);
            }
        }
        document.getElementById('playAgainBtn').onclick = restartGame;

        document.body.addEventListener('click', function() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }, {once:true});

        startNewQuestion();
    </script>
 </body>
</html>
