<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animal Math Stories - Ver 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700;800&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            font-family: 'Nunito', sans-serif;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            background-color: #fdf2f8; /* pink-50 */
            overflow: hidden;
        }

        .font-fredoka { font-family: 'Fredoka', sans-serif; }

        /* Cute dot pattern background for workspace */
        .bg-dots {
            background-image: radial-gradient(#fbcfe8 2px, transparent 2px);
            background-size: 30px 30px;
        }

        /* Bouncy Buttons */
        .btn-candy {
            transition: all 0.1s;
            position: relative;
        }
        .btn-candy:active:not(:disabled) {
            transform: translateY(4px);
            border-bottom-width: 1px !important;
            margin-top: 4px;
        }

        /* Animations */
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-bounce-slow { animation: bounce-slow 2s infinite ease-in-out; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
        }
        .animate-shake { animation: shake 0.4s ease-in-out; }

        @keyframes pop-in {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop-in { animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* Icon 3D styling */
        .icon-3d {
            filter: drop-shadow(0px 6px 4px rgba(0, 0, 0, 0.3));
        }

        /* Input Box Styling */
        .box-input {
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            background-color: white;
            color: #d1d5db; /* slate-300 placeholder color */
            border-color: #e9d5ff; /* purple-200 */
        }
        .input-active {
            border-color: #fbbf24 !important; /* amber-400 */
            box-shadow: 0 0 0 8px rgba(253, 230, 138, 0.6), inset 0 4px 6px rgba(0,0,0,0.05) !important;
            transform: scale(1.15);
            background-color: #fffbeb !important; /* amber-50 */
            color: #fbbf24 !important;
            z-index: 10;
        }
        
        /* THE GREEN FILLED STATE (CORRECT) */
        .input-filled {
            border-color: #4ade80 !important; /* green-400 */
            color: #16a34a !important; /* green-600 */
            background-color: #dcfce7 !important; /* green-100 */
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.05);
            transform: scale(1);
        }
        
        /* THE RED ERROR STATE (WRONG) */
        .input-error {
            border-color: #f87171 !important; /* red-400 */
            background-color: #fef2f2 !important; /* red-50 */
            color: #ef4444 !important; /* red-500 */
            box-shadow: 0 0 0 8px rgba(254, 202, 202, 0.6) !important; /* red-200 shadow */
        }
        
        /* Module Title Badges */
        .module-badge {
            font-family: 'Fredoka', sans-serif;
            background: #e9d5ff; /* purple-200 */
            color: #7e22ce; /* purple-700 */
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
            display: inline-block;
        }

        /* Custom Scrollbar for right panel */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #fdf2f8; }
        ::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #f9a8d4; }
    </style>
</head>
<body class="text-slate-800 h-[100dvh] w-screen flex flex-col">
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- START SCREEN -->
    <div id="screen-start" class="absolute inset-0 z-50 flex flex-col items-center justify-center p-4 bg-gradient-to-br from-pink-300 via-purple-300 to-indigo-400">
        <div class="bg-white/95 backdrop-blur rounded-[3rem] p-8 md:p-12 w-full max-w-lg text-center shadow-[0_20px_50px_rgba(0,0,0,0.15)] animate-pop-in border-8 border-white">
            <div class="text-7xl md:text-8xl mb-6 flex justify-center gap-2 icon-3d animate-bounce-slow">
                🐸 🐵 🐧
            </div>
            <h1 class="text-5xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-pink-500 mb-2 uppercase font-fredoka tracking-wide">Animal Math</h1>
            <p class="text-xl md:text-2xl font-bold text-purple-400 mb-8 uppercase tracking-wider">Learn to Subtract!</p>
            <button onclick="startGame()" class="btn-candy w-full bg-gradient-to-b from-green-400 to-green-500 text-white font-black text-3xl py-6 rounded-[2rem] border-b-[8px] border-green-600 shadow-xl uppercase tracking-widest hover:brightness-105">
                Play Now!
            </button>
        </div>
    </div>

    <!-- END SCREEN -->
    <div id="screen-end" class="absolute inset-0 z-[60] hidden flex flex-col items-center justify-center p-4 bg-gradient-to-br from-yellow-300 via-orange-300 to-pink-400">
        <div class="bg-white/95 backdrop-blur rounded-[3rem] p-8 md:p-12 w-full max-w-lg text-center shadow-[0_20px_50px_rgba(0,0,0,0.15)] border-8 border-white">
            <div class="text-8xl mb-6 animate-bounce-slow icon-3d">🏆</div>
            <h1 class="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-pink-600 mb-2 uppercase font-fredoka tracking-wide">You Did It!</h1>
            <p class="text-xl font-bold text-yellow-500 uppercase mt-6 mb-8">All stories completed!</p>
            <button onclick="location.reload()" class="btn-candy w-full bg-gradient-to-b from-blue-400 to-blue-500 text-white font-black text-2xl py-6 rounded-[2rem] border-b-[8px] border-blue-600 shadow-xl uppercase tracking-widest">
                Play Again
            </button>
        </div>
    </div>

    <!-- MAIN GAME UI -->
    <div id="screen-game" class="hidden flex-col h-full w-full bg-pink-50">
        
        <!-- Header -->
        <header class="flex-none bg-white p-3 md:p-4 flex justify-between items-center z-30 shadow-sm border-b-4 border-pink-100">
            <div class="flex-grow flex items-center max-w-3xl mx-auto space-x-3 md:space-x-6">
                <div class="font-black text-pink-400 uppercase tracking-widest text-sm md:text-base w-14 md:w-16">LVL <span id="level-display" class="ml-1">1</span></div>
                <div class="flex-grow h-4 md:h-5 bg-pink-100 rounded-full overflow-hidden border-2 border-pink-50">
                    <div id="progress-bar" class="h-full bg-gradient-to-r from-pink-400 to-purple-400 rounded-full transition-all duration-500 w-0"></div>
                </div>
                <button onclick="playCurrentStepAudio()" class="font-black text-pink-500 flex items-center bg-pink-50 px-3 py-1 md:px-4 md:py-2 rounded-2xl border-2 border-pink-200 active:scale-95 transition-transform">
                    🔊 INFO
                </button>
            </div>
        </header>

        <!-- SPLIT LAYOUT CONTAINER -->
        <div class="flex-grow flex flex-col lg:flex-row overflow-hidden w-full relative">
            
            <!-- LEFT PANEL: Visuals & Story -->
            <div class="w-full lg:w-1/2 flex flex-col relative h-[40vh] lg:h-full shrink-0 border-b-8 lg:border-b-0 lg:border-r-8 border-pink-200 bg-sky-100 z-10">
                
                <!-- Scene Area (Aspect Ratio maintained) -->
                <div id="scene-bg" class="flex-grow relative overflow-hidden transition-colors duration-1000 shadow-[inset_0_-10px_30px_rgba(0,0,0,0.1)] flex items-center justify-center">
                    <div class="relative w-full max-w-lg lg:max-w-xl aspect-[4/3]">
                        <div id="home-base" class="absolute top-1/2 left-1/2 w-[85%] h-[60%] transform -translate-x-1/2 -translate-y-1/2 transition-all duration-1000"></div>
                        <div id="animals-layer" class="absolute inset-0 z-10"></div>
                    </div>
                </div>

                <!-- Story Text Overlay (Step 0) -->
                <div id="story-overlay" class="absolute bottom-4 left-0 right-0 px-4 flex flex-col items-center z-20">
                    <div class="flex items-center bg-white/95 backdrop-blur px-2 py-2 pr-6 rounded-[2rem] border-4 border-white shadow-lg max-w-md w-full animate-pop-in">
                        <button onclick="playCurrentStepAudio()" class="btn-candy flex-none w-10 h-10 md:w-12 md:h-12 bg-pink-500 text-white rounded-full flex items-center justify-center text-xl md:text-2xl border-b-[4px] border-pink-700 shadow-sm mr-2 active:shadow-none active:translate-y-[4px]">
                            🔊
                        </button>
                        <p id="story-text" class="text-base md:text-lg lg:text-xl font-bold text-purple-900 leading-tight flex-grow text-center font-fredoka"></p>
                    </div>
                    <button id="btn-action" onclick="triggerAction()" class="btn-candy mt-4 px-8 py-4 w-full max-w-sm bg-gradient-to-b from-green-400 to-green-500 text-white font-black text-xl md:text-2xl uppercase rounded-[2rem] border-b-[6px] border-green-600 shadow-lg tracking-wider">
                        Watch what happens!
                    </button>
                </div>
            </div>

            <!-- RIGHT PANEL: Math Workspace & Numpad -->
            <div class="w-full lg:w-1/2 flex flex-col relative h-[60vh] lg:h-full bg-dots z-0">
                
                <!-- Scrollable Modules Area -->
                <div id="module-container" class="flex-grow overflow-y-auto px-4 py-6 md:p-8 flex flex-col items-center space-y-6 md:space-y-10 pb-[200px] lg:pb-[250px]">
                    
                    <!-- Module 0: Jump Sentence -->
                    <div id="mod-jump" class="bg-white/95 backdrop-blur border-4 border-white p-4 md:p-6 rounded-[2rem] w-full max-w-md shadow-sm flex flex-wrap items-center justify-center gap-3 transition-opacity duration-500 hidden">
                        <div id="box-jumped" class="box-input w-14 h-10 md:w-20 md:h-12 rounded-lg border-b-8 flex items-center justify-center text-3xl md:text-4xl font-black"></div>
                        <span id="jump-text" class="text-xl md:text-2xl font-black text-purple-900 font-fredoka"></span>
                        <button id="btn-audio-jump" class="btn-candy flex-none w-10 h-10 md:w-12 md:h-12 bg-pink-500 text-white rounded-full flex items-center justify-center text-xl md:text-2xl border-b-[4px] border-pink-700 shadow-sm ml-1">
                            🔊
                        </button>
                    </div>

                    <!-- Module 1: Equation -->
                    <div id="mod-equation" class="bg-white/80 backdrop-blur border-4 border-white p-6 md:p-8 rounded-[2rem] w-full max-w-md shadow-sm flex flex-col items-center opacity-40 transition-opacity duration-500 hidden">
                        <span class="module-badge">Equation</span>
                        <div class="flex items-center justify-center space-x-2 md:space-x-4">
                            <div id="box-eqTotal" class="box-input w-16 h-16 md:w-20 md:h-20 rounded-[1.25rem] border-[4px] md:border-[5px] flex items-center justify-center text-3xl md:text-4xl font-black shrink-0"></div>
                            <span class="text-4xl md:text-5xl font-black text-purple-300">-</span>
                            <div id="box-eqJumped" class="box-input w-16 h-16 md:w-20 md:h-20 rounded-[1.25rem] border-[4px] md:border-[5px] flex items-center justify-center text-3xl md:text-4xl font-black shrink-0"></div>
                            <span class="text-4xl md:text-5xl font-black text-purple-300">=</span>
                            <div id="box-eqLeft" class="box-input w-16 h-16 md:w-20 md:h-20 rounded-[1.25rem] border-[4px] md:border-[5px] flex items-center justify-center text-3xl md:text-4xl font-black shrink-0"></div>
                        </div>
                    </div>

                    <!-- Module 2: Number Bond -->
                    <div id="mod-bond" class="bg-white/80 backdrop-blur border-4 border-white p-6 md:p-8 rounded-[2rem] w-full max-w-md shadow-sm flex flex-col items-center opacity-40 transition-opacity duration-500 hidden relative">
                        <span class="module-badge">Number Bond</span>
                        
                        <div class="relative w-full h-36 md:h-44 flex flex-col items-center justify-between z-10 mt-2">
                            <!-- Lines -->
                            <svg class="absolute inset-0 w-full h-full pointer-events-none" style="z-index: -1;">
                                <line x1="50%" y1="20%" x2="25%" y2="80%" stroke="#e9d5ff" stroke-width="8" stroke-linecap="round" />
                                <line x1="50%" y1="20%" x2="75%" y2="80%" stroke="#e9d5ff" stroke-width="8" stroke-linecap="round" />
                            </svg>
                            <!-- Top Circle (Whole) -->
                            <div id="box-bondWhole" class="box-input w-[4.5rem] h-[4.5rem] md:w-20 md:h-20 rounded-full border-[4px] md:border-[5px] flex items-center justify-center text-3xl md:text-4xl font-black"></div>
                            <!-- Bottom Circles (Parts) -->
                            <div class="flex w-full justify-between px-8 md:px-12">
                                <div id="box-bondPart1" class="box-input w-[4.5rem] h-[4.5rem] md:w-20 md:h-20 rounded-full border-[4px] md:border-[5px] flex items-center justify-center text-3xl md:text-4xl font-black"></div>
                                <div id="box-bondPart2" class="box-input w-[4.5rem] h-[4.5rem] md:w-20 md:h-20 rounded-full border-[4px] md:border-[5px] flex items-center justify-center text-3xl md:text-4xl font-black"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Module 3: Final Answer -->
                    <div id="mod-final" class="bg-green-100 border-4 border-green-200 p-6 md:p-8 rounded-[2rem] w-full max-w-md shadow-sm flex flex-col items-center hidden animate-pop-in">
                        <p class="text-xl md:text-2xl font-black text-green-700 text-center flex items-center flex-wrap justify-center gap-2 md:gap-3 font-fredoka">
                            There are 
                            <span id="box-finalLeft" class="box-input inline-flex w-16 h-16 md:w-20 md:h-20 rounded-[1.25rem] border-[4px] md:border-[5px] items-center justify-center text-4xl md:text-5xl font-black mx-1 shrink-0"></span>
                            <span id="final-name" class="capitalize">animals</span> left!
                        </p>
                    </div>

                    <!-- Next Level Button -->
                    <button id="btn-next" onclick="nextLevel()" class="btn-candy hidden px-8 py-5 bg-gradient-to-b from-blue-400 to-blue-500 text-white font-black text-2xl uppercase rounded-[2rem] border-b-[8px] border-blue-600 tracking-wider w-full max-w-sm mt-4 animate-pop-in">
                        Continue ➔
                    </button>

                </div>

                <!-- NUMPAD AREA (Fixed to bottom of right panel) -->
                <div id="numpad-container" class="absolute bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t-4 border-pink-100 p-3 md:p-6 z-30 transform translate-y-full transition-transform duration-500 rounded-t-[2rem]">
                    <div class="flex flex-col items-center w-full max-w-md mx-auto">
                        <div id="numpad-hint" class="text-xs md:text-sm font-black text-purple-500 uppercase tracking-widest mb-3 bg-purple-100 px-4 py-1.5 rounded-full border-2 border-purple-200 text-center">
                            Tap a number
                        </div>
                        <div class="flex flex-wrap justify-center gap-1.5 md:gap-2 w-full" id="numpad-buttons">
                            <!-- Numpad buttons injected by JS -->
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- JS Logic -->
    <script>
        // --- DATA ---
        const LEVELS = [
            { total: 15, jumped: 6, emoji: '🐸', name: 'frogs', place: 'lily pad', actionText: 'jump into the pond', actionPast: 'jumped', bgTheme: 'bg-gradient-to-b from-cyan-300 to-blue-400', homeTheme: 'bg-green-400 rounded-[50%] border-b-[16px] border-green-600 shadow-xl' },
            { total: 18, jumped: 9, emoji: '🐒', name: 'monkeys', place: 'tree branch', actionText: 'swing away', actionPast: 'swung away', bgTheme: 'bg-gradient-to-b from-lime-300 to-green-500', homeTheme: 'bg-amber-600 rounded-3xl border-b-[16px] border-amber-800 shadow-xl' },
            { total: 12, jumped: 4, emoji: '🐧', name: 'penguins', place: 'iceberg', actionText: 'slide into the water', actionPast: 'slid', bgTheme: 'bg-gradient-to-b from-blue-200 to-indigo-300', homeTheme: 'bg-white rounded-t-full rounded-b-3xl shadow-xl border-b-[16px] border-blue-100' },
            { total: 16, jumped: 7, emoji: '🐝', name: 'bees', place: 'hive', actionText: 'fly out to get nectar', actionPast: 'flew', bgTheme: 'bg-gradient-to-b from-amber-200 to-orange-400', homeTheme: 'bg-yellow-400 rounded-full border-b-[16px] border-yellow-600 shadow-xl' },
            { total: 20, jumped: 8, emoji: '🐞', name: 'bugs', place: 'leaf', actionText: 'crawl under a rock', actionPast: 'crawled', bgTheme: 'bg-gradient-to-b from-green-300 to-emerald-500', homeTheme: 'bg-lime-400 rounded-[50%] border-b-[12px] border-lime-600 rotate-[5deg] shadow-xl' },
            { total: 14, jumped: 5, emoji: '🦆', name: 'ducks', place: 'grass', actionText: 'waddle into the lake', actionPast: 'waddled', bgTheme: 'bg-gradient-to-b from-sky-300 to-blue-500', homeTheme: 'bg-green-300 rounded-[50%] border-b-[16px] border-green-500 shadow-xl' },
            { total: 19, jumped: 11, emoji: '🐰', name: 'bunnies', place: 'meadow', actionText: 'hop into their burrow', actionPast: 'hopped', bgTheme: 'bg-gradient-to-b from-emerald-300 to-teal-500', homeTheme: 'bg-emerald-400 rounded-[50%] border-b-[16px] border-emerald-600 shadow-xl' },
            { total: 17, jumped: 9, emoji: '🐦', name: 'birds', place: 'fence', actionText: 'fly up to the sky', actionPast: 'flew', bgTheme: 'bg-gradient-to-b from-indigo-300 to-purple-400', homeTheme: 'bg-stone-300 rounded-lg border-b-[16px] border-stone-500 shadow-xl' },
            { total: 13, jumped: 6, emoji: '🐢', name: 'turtles', place: 'log', actionText: 'slip into the river', actionPast: 'slipped', bgTheme: 'bg-gradient-to-b from-cyan-200 to-teal-400', homeTheme: 'bg-orange-700 rounded-[50%] border-b-[16px] border-orange-900 shadow-xl' },
            { total: 20, jumped: 12, emoji: '🐠', name: 'fish', place: 'coral reef', actionText: 'swim into a dark cave', actionPast: 'swam', bgTheme: 'bg-gradient-to-b from-blue-400 to-indigo-600', homeTheme: 'bg-pink-400 rounded-[3rem] border-b-[16px] border-pink-600 shadow-xl' }
        ];

        // --- GRID LOGIC ---
        const getStartSpots = () => {
            return Array.from({ length: 20 }).map((_, i) => {
                const row = Math.floor(i / 5);
                const col = i % 5;
                return { top: `${25 + row * 16}%`, left: `${15 + col * 17.5}%`, rotate: '0deg' };
            });
        };
        const getActionSpots = () => {
            return Array.from({ length: 20 }).map((_, i) => {
                const isLeft = i % 2 === 0;
                const sideIndex = Math.floor(i / 2); 
                const row = Math.floor(sideIndex / 3);
                const col = sideIndex % 3; 
                if (isLeft) return { top: `${75 + row * 10}%`, left: `${5 + col * 8}%`, rotate: '-10deg' };
                else return { top: `${75 + row * 10}%`, left: `${70 + col * 8}%`, rotate: '10deg' };
            });
        };
        const startSpots = getStartSpots();
        const actionSpots = getActionSpots();

        // --- STATE ---
        const state = {
            level: 0,
            step: 0,
            hasJumped: false,
            audioCtx: null,
            inputs: {
                jumped: null, eqTotal: null, eqJumped: null, eqLeft: null,
                bondWhole: null, bondPart1: null, bondPart2: null, finalLeft: null
            }
        };

        // --- DOM ELEMENTS ---
        const els = {
            screenStart: document.getElementById('screen-start'),
            screenGame: document.getElementById('screen-game'),
            screenEnd: document.getElementById('screen-end'),
            sceneBg: document.getElementById('scene-bg'),
            homeBase: document.getElementById('home-base'),
            animalsLayer: document.getElementById('animals-layer'),
            storyOverlay: document.getElementById('story-overlay'),
            storyText: document.getElementById('story-text'),
            jumpText: document.getElementById('jump-text'),
            btnAudioJump: document.getElementById('btn-audio-jump'),
            moduleContainer: document.getElementById('module-container'),
            modJump: document.getElementById('mod-jump'),
            modEquation: document.getElementById('mod-equation'),
            modBond: document.getElementById('mod-bond'),
            modFinal: document.getElementById('mod-final'),
            numpadContainer: document.getElementById('numpad-container'),
            numpadHint: document.getElementById('numpad-hint'),
            numpadButtons: document.getElementById('numpad-buttons'),
            btnNext: document.getElementById('btn-next'),
            boxes: {
                jumped: document.getElementById('box-jumped'),
                eqTotal: document.getElementById('box-eqTotal'),
                eqJumped: document.getElementById('box-eqJumped'),
                eqLeft: document.getElementById('box-eqLeft'),
                bondWhole: document.getElementById('box-bondWhole'),
                bondPart1: document.getElementById('box-bondPart1'),
                bondPart2: document.getElementById('box-bondPart2'),
                finalLeft: document.getElementById('box-finalLeft')
            }
        };

        // --- AUDIO ENGINE ---
        function initAudio() {
            if (!state.audioCtx) state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (state.audioCtx.state === 'suspended') state.audioCtx.resume();
        }

        function playSound(type) {
            if (!state.audioCtx) return;
            const ctx = state.audioCtx;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            const now = ctx.currentTime;

            try {
                if (type === 'correct') { 
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, now);
                    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now); osc.stop(now + 0.2);
                } else if (type === 'wrong') { 
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(250, now);
                    osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now); osc.stop(now + 0.3);
                } else if (type === 'action') { 
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.exponentialRampToValueAtTime(800, now + 0.2);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now); osc.stop(now + 0.3);
                } else if (type === 'win') { 
                    osc.type = 'square';
                    [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                        const osc2 = ctx.createOscillator();
                        const gain2 = ctx.createGain();
                        osc2.connect(gain2); gain2.connect(ctx.destination);
                        osc2.type = 'sine'; osc2.frequency.value = freq;
                        gain2.gain.setValueAtTime(0, now + i*0.1);
                        gain2.gain.linearRampToValueAtTime(0.15, now + i*0.1 + 0.05);
                        gain2.gain.linearRampToValueAtTime(0, now + i*0.1 + 0.3);
                        osc2.start(now + i*0.1); osc2.stop(now + i*0.1 + 0.3);
                    });
                }
            } catch(e) { console.log(e); }
        }

        function speakText(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            utterance.pitch = 1.2;
            window.speechSynthesis.speak(utterance);
        }

        // --- INIT NUMPAD ---
        function buildNumpad() {
            els.numpadButtons.innerHTML = '';
            const themes = [
                'text-pink-600 bg-pink-50 border-pink-200 border-b-pink-300',
                'text-purple-600 bg-purple-50 border-purple-200 border-b-purple-300',
                'text-sky-600 bg-sky-50 border-sky-200 border-b-sky-300',
                'text-green-600 bg-green-50 border-green-200 border-b-green-300',
                'text-orange-600 bg-orange-50 border-orange-200 border-b-orange-300'
            ];

            for(let i=0; i<=20; i++) {
                const btn = document.createElement('button');
                const t = themes[i % themes.length].split(' ');
                btn.className = `btn-candy w-[12%] md:w-12 h-12 md:h-14 font-black text-xl md:text-2xl rounded-xl border-b-[5px] border-2 shadow-sm flex items-center justify-center bg-white ${t[0]} ${t[2]} ${t[3]}`;
                btn.innerText = i;
                btn.onclick = () => handleNumClick(i);
                els.numpadButtons.appendChild(btn);
            }
        }
        buildNumpad();

        // --- GAME LOGIC ---
        function startGame() {
            initAudio();
            els.screenStart.classList.add('hidden');
            els.screenGame.classList.remove('hidden');
            els.screenGame.classList.add('flex');
            loadLevel();
        }

        function loadLevel() {
            const lvl = LEVELS[state.level];
            state.step = 0;
            state.hasJumped = false;
            Object.keys(state.inputs).forEach(k => state.inputs[k] = null);
            
            document.getElementById('level-display').innerText = state.level + 1;
            document.getElementById('progress-bar').style.width = `${((state.level) / 10) * 100}%`;
            
            els.sceneBg.className = `flex-grow relative overflow-hidden transition-colors duration-1000 shadow-[inset_0_-10px_30px_rgba(0,0,0,0.1)] flex items-center justify-center ${lvl.bgTheme}`;
            els.homeBase.className = `absolute top-1/2 left-1/2 w-[85%] h-[60%] transform -translate-x-1/2 -translate-y-1/2 transition-all duration-1000 ${lvl.homeTheme}`;
            
            document.getElementById('final-name').innerText = lvl.name;
            els.jumpText.innerHTML = `&nbsp;${lvl.name} ${lvl.actionText}.`;
            
            els.btnAudioJump.onclick = () => {
                speakText(`${lvl.jumped} ${lvl.name} ${lvl.actionText}.`);
            };

            renderSceneAnimals();
            updateUI();
        }

        function renderSceneAnimals() {
            const lvl = LEVELS[state.level];
            const leftCount = lvl.total - lvl.jumped;
            els.animalsLayer.innerHTML = '';

            for (let i = 0; i < lvl.total; i++) {
                const isJumping = state.hasJumped && i >= leftCount;
                const pos = isJumping ? actionSpots[i] : startSpots[i];
                
                const anim = document.createElement('div');
                anim.className = 'absolute text-[2.5rem] md:text-5xl lg:text-[3.5rem] transition-all duration-[1500ms] ease-in-out filter drop-shadow-md z-10 select-none';
                anim.style.top = pos.top;
                anim.style.left = pos.left;
                anim.style.transform = `translate(-50%, -50%) ${isJumping ? `rotate(${pos.rotate}) scale(0.65)` : 'scale(1)'}`;
                if(isJumping) anim.style.opacity = '0.75';
                
                const emoji = document.createElement('div');
                emoji.innerText = lvl.emoji;
                if(isJumping) emoji.classList.add('animate-bounce-slow');
                
                anim.appendChild(emoji);
                els.animalsLayer.appendChild(anim);
            }
        }

        function getCurrentStepText() {
            const lvl = LEVELS[state.level];
            switch(state.step) {
                case 0: return `There are ${lvl.total} ${lvl.name} on the ${lvl.place}.`;
                case 1: return `How many ${lvl.actionPast}?`;
                case 2: return `Let's build the equation. Tap the starting total!`;
                case 3: return `Minus how many ${lvl.actionPast}?`;
                case 4: return `Equals how many are left?`;
                case 5: return `Now for the number bond. Tap the whole amount.`;
                case 6: return `Tap one of the parts.`;
                case 7: return `Tap the other part.`;
                case 8: return `Great! Tap the final answer.`;
                case 9: return `Awesome job!`;
                default: return "";
            }
        }

        function playCurrentStepAudio() {
            speakText(getCurrentStepText());
        }

        function triggerAction() {
            state.hasJumped = true;
            playSound('action');
            renderSceneAnimals();
            els.storyOverlay.classList.add('hidden');
            setTimeout(() => {
                state.step = 1;
                updateUI();
                scrollToWorkspace();
            }, 1200);
        }

        function scrollToWorkspace() {
            if(window.innerWidth < 1024) {
                setTimeout(() => {
                    const activeBox = document.querySelector('.input-active');
                    if(activeBox) activeBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 100);
            }
        }

        function handleNumClick(num) {
            const lvl = LEVELS[state.level];
            const left = lvl.total - lvl.jumped;
            let expected = null;
            let targetKey = null;

            switch(state.step) {
                case 1: expected = lvl.jumped; targetKey = 'jumped'; break;
                case 2: expected = lvl.total; targetKey = 'eqTotal'; break;
                case 3: expected = lvl.jumped; targetKey = 'eqJumped'; break;
                case 4: expected = left; targetKey = 'eqLeft'; break;
                case 5: expected = lvl.total; targetKey = 'bondWhole'; break;
                case 6: 
                    if(num === lvl.jumped || num === left) {
                        playSound('correct');
                        state.inputs.bondPart1 = num;
                        state.step++; updateUI(); scrollToWorkspace();
                        return;
                    }
                    triggerError(); return;
                case 7: 
                    expected = state.inputs.bondPart1 === left ? lvl.jumped : left; 
                    targetKey = 'bondPart2'; 
                    break;
                case 8: expected = left; targetKey = 'finalLeft'; break;
                default: return;
            }

            if (num === expected) {
                playSound('correct');
                state.inputs[targetKey] = num;
                
                if (state.step === 8) {
                    state.step = 9;
                    doWin();
                } else {
                    state.step++;
                    updateUI();
                    scrollToWorkspace();
                }
            } else {
                triggerError();
            }
        }

        function triggerError() {
            playSound('wrong');
            const activeBox = document.querySelector('.input-active');
            if(activeBox) {
                activeBox.classList.remove('animate-shake');
                void activeBox.offsetWidth; // trigger reflow
                activeBox.classList.add('animate-shake', 'input-error');
                setTimeout(() => activeBox.classList.remove('input-error', 'animate-shake'), 400);
            }
        }

        function doWin() {
            playSound('win');
            updateUI();
            
            const duration = 2000;
            const end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#4ade80', '#fbbf24', '#f472b6', '#38bdf8', '#c084fc'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#4ade80', '#fbbf24', '#f472b6', '#38bdf8', '#c084fc'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function nextLevel() {
            if (state.level < LEVELS.length - 1) {
                state.level++;
                loadLevel();
            } else {
                els.screenGame.classList.add('hidden');
                els.screenGame.classList.remove('flex');
                els.screenEnd.classList.remove('hidden');
                els.screenEnd.classList.add('flex');
                playSound('win');
                speakText("You finished all stories! You are a math master!");
                confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
            }
        }

        // --- UI RENDERER ---
        function updateUI() {
            const lvl = LEVELS[state.level];
            
            // Story Text
            els.storyText.innerText = getCurrentStepText();
            playCurrentStepAudio();

            // Visibility
            if (state.step === 0) {
                els.storyOverlay.classList.remove('hidden');
                els.modJump.classList.add('hidden');
                els.modEquation.classList.add('hidden');
                els.modBond.classList.add('hidden');
                els.modFinal.classList.add('hidden');
                els.btnNext.classList.add('hidden');
                els.numpadContainer.classList.add('translate-y-full'); 
            } else {
                els.storyOverlay.classList.add('hidden');
                els.numpadContainer.classList.remove('translate-y-full'); 
            }

            // Update Box logic (GREEN FOR CORRECT)
            const updateBox = (boxEl, value, isActive) => {
                boxEl.innerText = value !== null ? value : '';
                boxEl.classList.remove('input-active', 'input-filled', 'bg-white', 'text-slate-300', 'border-purple-200');
                
                if (isActive) {
                    boxEl.classList.add('input-active');
                } else if (value !== null) {
                    // CORRECT => GREEN
                    boxEl.classList.add('input-filled');
                } else {
                    // EMPTY => WHITE/PURPLE BORDER
                    boxEl.classList.add('bg-white', 'border-purple-200', 'text-slate-300');
                }
            };

            // Module 0: Jump
            if (state.step >= 1) {
                els.modJump.classList.remove('hidden');
                els.modJump.classList.toggle('opacity-40', state.step > 1);
                updateBox(els.boxes.jumped, state.inputs.jumped, state.step === 1);
                // Special style adjustment for mod 0
                if(state.inputs.jumped === null && state.step === 1) {
                    els.boxes.jumped.classList.add('border-amber-400', 'bg-amber-50');
                } else if (state.inputs.jumped !== null) {
                    els.boxes.jumped.classList.add('border-green-400', 'text-green-600');
                } else {
                    els.boxes.jumped.classList.add('border-purple-300');
                }
            }

            // Module 1: Equation
            if (state.step >= 2) {
                els.modEquation.classList.remove('hidden');
                els.modEquation.classList.toggle('opacity-40', state.step > 4);
                updateBox(els.boxes.eqTotal, state.inputs.eqTotal, state.step === 2);
                updateBox(els.boxes.eqJumped, state.inputs.eqJumped, state.step === 3);
                updateBox(els.boxes.eqLeft, state.inputs.eqLeft, state.step === 4);
            }

            // Module 2: Number Bond
            if (state.step >= 5) {
                els.modBond.classList.remove('hidden');
                els.modBond.classList.toggle('opacity-40', state.step > 7);
                updateBox(els.boxes.bondWhole, state.inputs.bondWhole, state.step === 5);
                updateBox(els.boxes.bondPart1, state.inputs.bondPart1, state.step === 6);
                updateBox(els.boxes.bondPart2, state.inputs.bondPart2, state.step === 7);
            }

            // Module 3: Final Answer
            if (state.step >= 8) {
                els.modFinal.classList.remove('hidden');
                updateBox(els.boxes.finalLeft, state.inputs.finalLeft, state.step === 8);
            }

            // Win State
            if (state.step === 9) {
                els.numpadContainer.classList.add('translate-y-full'); 
                els.btnNext.classList.remove('hidden');
                els.modJump.classList.add('opacity-40');
                els.modEquation.classList.add('opacity-40');
                els.modBond.classList.add('opacity-40');
                setTimeout(() => els.btnNext.scrollIntoView({ behavior: 'smooth', block: 'center' }), 200);
            }

            // Numpad Hint
            if(state.step >= 1 && state.step <= 8) {
                let hint = "Tap a number";
                if(state.step === 1 || state.step === 3) hint = `Tap how many ${lvl.actionPast}`;
                if(state.step === 2 || state.step === 5) hint = "Tap the Total";
                if(state.step === 4 || state.step === 8) hint = "Tap how many are left";
                if(state.step === 6 || state.step === 7) hint = "Tap a Part";
                els.numpadHint.innerText = hint;
            }
        }
    </script>
</body>
