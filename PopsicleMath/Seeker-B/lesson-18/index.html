<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fun Measurement Class - Version 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
            overflow: hidden;
            touch-action: manipulation;
            margin: 0;
            padding: 0;
        }

        /* Beautiful Landscape Background */
        .scenery {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        
        .sun {
            position: absolute;
            top: 5%;
            right: 10%;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #FFE600 0%, #FFB800 100%);
            border-radius: 50%;
            box-shadow: 0 0 40px #FFB800, 0 0 80px #FFE600;
            animation: pulseSun 3s infinite alternate;
        }

        .hills {
            position: absolute;
            bottom: 30%; /* Behind the table */
            width: 100%;
            height: 40%;
            background: radial-gradient(ellipse at center, #84cc16 0%, #65a30d 100%);
            border-radius: 100% 100% 0 0 / 40% 40% 0 0;
            box-shadow: inset 0 20px 30px rgba(255,255,255,0.2);
            transform: scaleX(1.5);
        }

        .hills-back {
            position: absolute;
            bottom: 40%;
            width: 100%;
            height: 30%;
            background: radial-gradient(ellipse at center, #a3e635 0%, #84cc16 100%);
            border-radius: 100% 100% 0 0 / 50% 50% 0 0;
            transform: scaleX(2) translateX(10%);
            opacity: 0.8;
        }

        /* Textured Wood Table */
        .wood-table {
            background-color: #d97706;
            background-image: repeating-linear-gradient(
                45deg,
                #d97706,
                #d97706 10px,
                #b45309 10px,
                #b45309 20px
            );
            border-top: 16px solid #92400e;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.3);
            border-radius: 30px 30px 0 0;
            margin: 0;
            width: 100%;
            position: absolute;
            bottom: 0;
            height: 40vh;
            z-index: 10;
        }

        .game-object {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            position: relative;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2));
            transform-origin: bottom center;
        }

        .game-object:active {
            transform: scale(0.9) translateY(10px);
        }

        .game-object:hover {
            filter: brightness(1.1) drop-shadow(0 15px 15px rgba(0,0,0,0.3));
            transform: translateY(-10px) scale(1.05);
        }

        /* Animations */
        @keyframes pulseSun { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-30px) scale(1.05); } }
        @keyframes wiggle { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-10deg); } 75% { transform: rotate(10deg); } }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 80% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes floatClouds { 0% { transform: translateX(-50px); } 100% { transform: translateX(50vw); } }

        .animate-bounce-happy { animation: bounce 0.6s infinite; }
        .animate-wiggle { animation: wiggle 0.4s ease-in-out; }
        .animate-pop { animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .cloud-anim { animation: floatClouds linear infinite alternate; position: absolute; z-index: 1; opacity: 0.8; }

        /* Typography for Kids */
        .kid-text {
            color: white;
            text-shadow: 
                -3px -3px 0 #3b82f6, 3px -3px 0 #3b82f6, -3px 3px 0 #3b82f6, 3px 3px 0 #3b82f6,
                0px 5px 10px rgba(0,0,0,0.3);
            letter-spacing: 2px;
        }
        
        .highlight-long {
            color: #bef264; /* Lime */
            text-shadow: -3px -3px 0 #4d7c0f, 3px -3px 0 #4d7c0f, -3px 3px 0 #4d7c0f, 3px 3px 0 #4d7c0f;
        }
        .highlight-short {
            color: #fca5a5; /* Red/Pink */
            text-shadow: -3px -3px 0 #991b1b, 3px -3px 0 #991b1b, -3px 3px 0 #991b1b, 3px 3px 0 #991b1b;
        }

        .speech-bubble {
            position: relative;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 2rem;
            border: 6px solid #60A5FA;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            z-index: 20;
        }
        .speech-bubble:after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            border: 20px solid transparent;
            border-top-color: #60A5FA;
            margin-left: -20px;
        }
        .speech-bubble:before {
            content: '';
            position: absolute;
            bottom: -11px;
            left: 50%;
            border: 14px solid transparent;
            border-top-color: #ffffff;
            margin-left: -14px;
            z-index: 1;
        }

        /* Mini-game Basket */
        .basket {
            bottom: 5vh;
            width: 140px;
            height: 80px;
            background: linear-gradient(to bottom, #A0522D, #8B4513);
            border-radius: 10px 10px 40px 40px;
            border: 4px solid #5C2E0B;
            position: absolute;
            box-shadow: inset 0 -10px 20px rgba(0,0,0,0.5), 0 10px 15px rgba(0,0,0,0.3);
            z-index: 50;
        }
        .basket:before {
            content: '';
            position: absolute;
            top: -40px; left: 15px; width: 102px; height: 50px;
            border: 8px solid #8B4513; border-bottom: none;
            border-radius: 50px 50px 0 0; z-index: -1;
        }
        .basket-weave {
            position: absolute; inset: 0; border-radius: inherit;
            background-image: linear-gradient(45deg, rgba(0,0,0,0.1) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.1) 75%, rgba(0,0,0,0.1)), linear-gradient(45deg, rgba(0,0,0,0.1) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.1) 75%, rgba(0,0,0,0.1));
            background-size: 20px 20px; background-position: 0 0, 10px 10px;
            opacity: 0.5;
        }
        
        .falling-item {
            position: absolute;
            font-size: 55px;
            top: -80px;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
            z-index: 40;
        }

        #fireworks-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col select-none relative">

    <!-- Scenery Background -->
    <div class="scenery">
        <div class="sun"></div>
        <!-- Clouds -->
        <div class="cloud-anim text-white" style="top: 5%; left: -10%; animation-duration: 25s;"><svg width="150" height="80" viewBox="0 0 24 24" fill="currentColor"><path d="M18.5 7.5c-.22 0-.44.03-.65.08A6.002 6.002 0 0 0 7 6.5c-2.48 0-4.5 2.02-4.5 4.5 0 .38.05.74.14 1.09A4.498 4.498 0 0 0 0 16.5c0 2.48 2.02 4.5 4.5 4.5h14c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg></div>
        <div class="cloud-anim text-white opacity-60" style="top: 15%; left: 30%; animation-duration: 35s; animation-direction: reverse;"><svg width="200" height="100" viewBox="0 0 24 24" fill="currentColor"><path d="M18.5 7.5c-.22 0-.44.03-.65.08A6.002 6.002 0 0 0 7 6.5c-2.48 0-4.5 2.02-4.5 4.5 0 .38.05.74.14 1.09A4.498 4.498 0 0 0 0 16.5c0 2.48 2.02 4.5 4.5 4.5h14c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg></div>
        <div class="cloud-anim text-white opacity-80" style="top: 8%; right: -20%; animation-duration: 30s; animation-delay: -10s;"><svg width="120" height="70" viewBox="0 0 24 24" fill="currentColor"><path d="M18.5 7.5c-.22 0-.44.03-.65.08A6.002 6.002 0 0 0 7 6.5c-2.48 0-4.5 2.02-4.5 4.5 0 .38.05.74.14 1.09A4.498 4.498 0 0 0 0 16.5c0 2.48 2.02 4.5 4.5 4.5h14c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg></div>
        <!-- Hills -->
        <div class="hills-back"></div>
        <div class="hills"></div>
    </div>

    <!-- Top Bar: Progress and Score -->
    <div class="flex justify-between items-center p-4 sm:p-6 z-30 absolute top-0 w-full pointer-events-none">
        <div class="flex gap-4 items-center pointer-events-auto">
            <div class="flex gap-1 sm:gap-2 bg-black/20 p-2 rounded-full backdrop-blur-sm" id="star-container">
                <!-- Stars injected here -->
            </div>
            <div class="bg-white px-4 py-2 sm:px-6 sm:py-3 rounded-full font-extrabold text-orange-500 shadow-[0_5px_0_#fbd38d] flex items-center gap-2 border-4 border-yellow-400 transform transition hover:scale-105">
                <span class="text-3xl drop-shadow-md">🍎</span> 
                <span id="fruit-score" class="text-2xl sm:text-3xl">0</span>
            </div>
        </div>
        <button onclick="toggleSound()" id="sound-btn" class="pointer-events-auto bg-white p-3 sm:p-4 rounded-full shadow-[0_5px_0_#cbd5e1] text-3xl hover:bg-gray-50 transform active:translate-y-1 transition border-4 border-gray-200 text-gray-600">
            🔊
        </button>
    </div>

    <!-- Main Game Area -->
    <div id="main-game-layer" class="flex-grow flex flex-col items-center justify-end relative h-full z-10 transition-all duration-500">
        
        <!-- Teacher/Prompt Area -->
        <div class="absolute top-[15vh] left-0 right-0 flex flex-col items-center z-20" id="prompt-container">
            <div onclick="speakCurrentPrompt()" class="cursor-pointer speech-bubble px-6 py-4 sm:px-10 sm:py-6 transform hover:scale-105 transition max-w-2xl w-[90%] flex flex-col items-center gap-2">
                <h1 id="question-text" class="kid-text text-3xl sm:text-5xl md:text-6xl font-black text-center leading-tight">Loading...</h1>
                <div class="bg-blue-100 p-3 rounded-full shadow-inner mt-2">
                    <span id="speaker-icon" class="text-3xl text-blue-500 block animate-pulse">🔈</span>
                </div>
            </div>
            <!-- Character Mascot -->
            <div class="relative mt-4">
                <div class="text-[100px] sm:text-[120px] filter drop-shadow-[0_10px_10px_rgba(0,0,0,0.3)] animate-bounce" style="animation-duration: 3s;">🦉</div>
            </div>
        </div>

        <!-- The Table -->
        <div class="wood-table flex items-end justify-center pb-8 sm:pb-12 px-2 sm:px-10">
            <div id="game-stage" class="flex items-end justify-center w-full gap-8 sm:gap-16 md:gap-24 h-[80%] max-w-5xl"></div>
        </div>
    </div>

    <!-- Mini-game Area -->
    <div id="mini-game-layer" class="absolute inset-0 z-20 hidden flex-col items-center pointer-events-none transition-opacity duration-500 opacity-0 bg-gradient-to-b from-sky-400 to-sky-200">
        <div class="mt-[15vh] text-center pointer-events-auto z-30">
            <h2 class="kid-text text-6xl md:text-8xl font-black mb-2 animate-bounce">Fruit Party!</h2>
            <p class="text-white text-2xl font-bold drop-shadow-md">Catch the apples! 🍎</p>
        </div>
        <div id="mini-game-area" class="w-full flex-grow relative overflow-hidden pointer-events-auto touch-none">
            <div id="basket" class="basket left-1/2 -translate-x-1/2 transition-transform duration-75">
                <div class="basket-weave"></div>
            </div>
        </div>
    </div>

    <!-- Victory Overlay -->
    <div id="victory-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center backdrop-blur-md">
        <!-- Canvas for fireworks behind the modal content -->
        <canvas id="fireworks-canvas"></canvas>
        
        <div class="bg-white rounded-[3rem] p-8 sm:p-12 flex flex-col items-center shadow-2xl animate-pop border-[12px] border-yellow-400 max-w-md w-[90%] relative z-10 text-center">
            <div class="text-[100px] -mt-20 mb-4 filter drop-shadow-[0_15px_15px_rgba(0,0,0,0.2)] animate-bounce">🏆</div>
            <h2 class="kid-text text-5xl sm:text-6xl font-black mb-4">Awesome!</h2>
            
            <div class="bg-gray-100 rounded-3xl p-6 w-full mb-8 shadow-inner border-4 border-gray-200">
                <div class="flex justify-between items-center mb-4 border-b-2 border-gray-300 pb-4">
                    <span class="text-3xl font-bold text-gray-600">Stars:</span>
                    <span class="text-4xl">⭐⭐⭐⭐⭐</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-3xl font-bold text-gray-600">Fruits:</span>
                    <div class="flex items-center gap-2">
                        <span class="text-4xl drop-shadow-md">🍎</span> 
                        <span id="final-fruit-score" class="text-4xl font-black text-orange-500">0</span>
                    </div>
                </div>
            </div>

            <button onclick="restartGame()" class="w-full bg-gradient-to-b from-green-400 to-green-600 hover:from-green-300 hover:to-green-500 text-white text-3xl font-black py-5 rounded-2xl shadow-[0_8px_0_#166534] transform transition active:scale-95 active:translate-y-2 border-4 border-green-700">
                PLAY AGAIN
            </button>
        </div>
    </div>

    <script>
        // --- Game State ---
        let score = 0;
        const maxScore = 5;
        let fruitScore = 0;
        let currentLevelData = null;
        let soundEnabled = true;
        let isProcessing = false;
        let isMiniGameActive = false;

        // --- Audio Context & Improved Sounds ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playTone(freq, type, duration, vol=0.2, slideTo=null) {
            if (!soundEnabled) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            if(slideTo) {
                osc.frequency.exponentialRampToValueAtTime(slideTo, audioCtx.currentTime + duration);
            }
            
            // Percussive envelope
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playSuccessSound() {
            // Magical upward chime
            playTone(523.25, 'sine', 0.4, 0.3); // C5
            setTimeout(() => playTone(659.25, 'sine', 0.4, 0.3), 100); // E5
            setTimeout(() => playTone(783.99, 'sine', 0.6, 0.3), 200); // G5
            setTimeout(() => playTone(1046.50, 'sine', 0.8, 0.3), 300); // C6
        }

        function playErrorSound() {
            // Funny boing down
            playTone(300, 'triangle', 0.4, 0.4, 150);
        }
        
        function playCatchSound() { 
            // Bright pop
            playTone(880, 'sine', 0.15, 0.2); 
            setTimeout(() => playTone(1200, 'sine', 0.2, 0.2), 50);
        } 
        function playBombSound() { 
            // Splat/bloop
            playTone(150, 'sawtooth', 0.3, 0.4, 50); 
        }
        function playCheerSound() {
            // Arpeggio for win
            [523.25, 659.25, 783.99, 1046.50, 1318.51].forEach((freq, i) => {
                setTimeout(() => playTone(freq, 'square', i===4 ? 1.0 : 0.2, 0.1), i * 150);
            });
        }

        function speak(text) {
            if (!soundEnabled) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US'; 
            utterance.rate = 0.9; // Slower for kids
            utterance.pitch = 1.3; // Higher, friendlier pitch
            window.speechSynthesis.speak(utterance);
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('sound-btn').innerText = soundEnabled ? '🔊' : '🔇';
            if(soundEnabled && audioCtx.state === 'suspended') audioCtx.resume();
        }

        // --- Beautiful Asset Generators (SVGs with Gradients & 3D look) ---
        
        // Define gradients universally for the SVGs to use
        const svgDefs = `
            <defs>
                <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#cbd5e1"/>
                    <stop offset="50%" stop-color="#f8fafc"/>
                    <stop offset="100%" stop-color="#94a3b8"/>
                </linearGradient>
                <linearGradient id="eraser" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#fca5a5"/>
                    <stop offset="100%" stop-color="#ef4444"/>
                </linearGradient>
                <linearGradient id="wood" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#fde047"/>
                    <stop offset="100%" stop-color="#d97706"/>
                </linearGradient>
            </defs>
        `;

        function createCylinderGradient(id, colorHex, shadeHex, lightHex) {
            return `
                <linearGradient id="${id}" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="${shadeHex}"/>
                    <stop offset="30%" stop-color="${colorHex}"/>
                    <stop offset="70%" stop-color="${lightHex}"/>
                    <stop offset="100%" stop-color="${shadeHex}"/>
                </linearGradient>
            `;
        }

        // Colors palette for 3D mapping
        const colorPalette = [
            { id: 'red', hex: '#ef4444', dark: '#b91c1c', light: '#fca5a5' },
            { id: 'blue', hex: '#3b82f6', dark: '#1d4ed8', light: '#93c5fd' },
            { id: 'green', hex: '#22c55e', dark: '#15803d', light: '#86efac' },
            { id: 'yellow', hex: '#eab308', dark: '#a16207', light: '#fde047' },
            { id: 'purple', hex: '#a855f7', dark: '#7e22ce', light: '#d8b4fe' }
        ];

        function getRandomColorObj() {
            return colorPalette[Math.floor(Math.random() * colorPalette.length)];
        }

        // 1. Realistic Pencil
        function createPencil(length, colorObj) {
            const h = length;
            const gradId = `grad-${colorObj.id}-${Math.random()}`;
            return `
                <svg width="60" height="${h}" viewBox="0 0 60 ${h}" style="overflow:visible">
                    <defs>
                        ${createCylinderGradient(gradId, colorObj.hex, colorObj.dark, colorObj.light)}
                        <linearGradient id="tip" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#fcd34d"/><stop offset="100%" stop-color="#b45309"/>
                        </linearGradient>
                        <linearGradient id="eraser-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#fca5a5"/><stop offset="100%" stop-color="#b91c1c"/>
                        </linearGradient>
                        <linearGradient id="metal-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#94a3b8"/><stop offset="50%" stop-color="#f1f5f9"/><stop offset="100%" stop-color="#64748b"/>
                        </linearGradient>
                    </defs>
                    <!-- Body -->
                    <rect x="10" y="40" width="40" height="${h - 40}" fill="url(#${gradId})" stroke="#000" stroke-width="3" rx="4" />
                    <!-- Details lines on body -->
                    <line x1="23" y1="40" x2="23" y2="${h-25}" stroke="#000" stroke-width="1" opacity="0.3"/>
                    <line x1="37" y1="40" x2="37" y2="${h-25}" stroke="#000" stroke-width="1" opacity="0.3"/>
                    <!-- Tip Wood -->
                    <path d="M 10 40 L 30 0 L 50 40 Z" fill="url(#tip)" stroke="#000" stroke-width="3" stroke-linejoin="round"/>
                    <path d="M 16 30 Q 30 45 44 30 L 50 40 L 10 40 Z" fill="rgba(0,0,0,0.1)"/>
                    <!-- Lead -->
                    <path d="M 24 12 L 30 0 L 36 12 Z" fill="#333" stroke="#000" stroke-width="1"/>
                    <!-- Eraser -->
                    <path d="M 10 ${h-15} L 10 ${h} Q 30 ${h+10} 50 ${h} L 50 ${h-15} Z" fill="url(#eraser-grad)" stroke="#000" stroke-width="3"/>
                    <!-- Metal Band -->
                    <rect x="10" y="${h-25}" width="40" height="10" fill="url(#metal-grad)" stroke="#000" stroke-width="3"/>
                    <line x1="10" y1="${h-20}" x2="50" y2="${h-20}" stroke="#000" stroke-width="1" opacity="0.5"/>
                </svg>
            `;
        }

        // 2. Glossy Pen
        function createPen(length, colorObj) {
            const h = length;
            const gradId = `pen-${colorObj.id}-${Math.random()}`;
            return `
                <svg width="50" height="${h}" viewBox="0 0 50 ${h}" style="overflow:visible">
                    <defs>
                        ${createCylinderGradient(gradId, colorObj.hex, colorObj.dark, colorObj.light)}
                        <linearGradient id="metal-pen" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#64748b"/><stop offset="50%" stop-color="#fff"/><stop offset="100%" stop-color="#475569"/>
                        </linearGradient>
                    </defs>
                    <!-- Body -->
                    <rect x="12" y="15" width="26" height="${h-30}" fill="url(#${gradId})" stroke="#000" stroke-width="3" rx="10"/>
                    <rect x="14" y="20" width="8" height="${h-40}" fill="#fff" opacity="0.3" rx="4"/> <!-- Highlight -->
                    <!-- Cap / Clicker base -->
                    <rect x="12" y="10" width="26" height="5" fill="url(#metal-pen)" stroke="#000" stroke-width="3"/>
                    <!-- Clicker -->
                    <rect x="18" y="0" width="14" height="10" fill="url(#metal-pen)" stroke="#000" stroke-width="3" rx="3"/>
                    <!-- Clip -->
                    <path d="M 32 20 L 32 50 Q 32 55 36 53" stroke="url(#metal-pen)" stroke-width="4" fill="none" stroke-linecap="round" filter="drop-shadow(2px 2px 2px rgba(0,0,0,0.3))"/>
                    <!-- Grip -->
                    <path d="M 12 ${h-30} L 38 ${h-30} L 34 ${h-10} L 16 ${h-10} Z" fill="#334155" stroke="#000" stroke-width="3"/>
                    <!-- Tip -->
                    <path d="M 16 ${h-10} L 25 ${h+5} L 34 ${h-10} Z" fill="url(#metal-pen)" stroke="#000" stroke-width="3" stroke-linejoin="round"/>
                    <circle cx="25" cy="${h+4}" r="2" fill="${colorObj.hex}"/>
                </svg>
            `;
        }

        // 3. Bright Ruler
        function createRuler(length, colorObj) {
            const h = length;
            let ticks = '';
            for(let i=15; i<h-15; i+=20) {
                let text = (i % 40 === 15) ? `<text x="40" y="${i+6}" font-family="Poppins" font-weight="900" font-size="16" fill="#000" text-anchor="start">${Math.round((h-i)/20)}</text>` : '';
                ticks += `<line x1="10" y1="${i}" x2="${(i % 40 === 15) ? 35 : 25}" y2="${i}" stroke="#000" stroke-width="3" stroke-linecap="round"/> ${text}`;
            }
            return `
                <svg width="70" height="${h}" viewBox="0 0 70 ${h}" style="overflow:visible">
                    <!-- Base -->
                    <rect x="5" y="0" width="60" height="${h}" fill="${colorObj.hex}" rx="8" stroke="#000" stroke-width="4"/>
                    <!-- Inner highlight -->
                    <rect x="10" y="5" width="50" height="${h-10}" fill="#fff" rx="4" opacity="0.3"/>
                    <!-- Groove -->
                    <line x1="55" y1="10" x2="55" y2="${h-10}" stroke="#000" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
                    ${ticks}
                </svg>
            `;
        }

        // 4. Glossy Paintbrush
        function createPaintbrush(length, colorObj) {
            const h = length;
            const bristleH = 40;
            const ferruleH = 20;
            const gradId = `brush-${colorObj.id}-${Math.random()}`;
            return `
                <svg width="60" height="${h}" viewBox="0 0 60 ${h}" style="overflow:visible">
                    <defs>
                        ${createCylinderGradient(gradId, colorObj.hex, colorObj.dark, colorObj.light)}
                        <linearGradient id="metal-brush" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#94a3b8"/><stop offset="50%" stop-color="#fff"/><stop offset="100%" stop-color="#64748b"/>
                        </linearGradient>
                        <linearGradient id="bristle-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#fef08a"/><stop offset="100%" stop-color="#b45309"/>
                        </linearGradient>
                    </defs>
                    <!-- Handle -->
                    <path d="M 22 ${h} L 22 ${bristleH + ferruleH} L 38 ${bristleH + ferruleH} L 38 ${h} Q 30 ${h+10} 22 ${h} Z" fill="url(#${gradId})" stroke="#000" stroke-width="3"/>
                    <rect x="24" y="${bristleH + ferruleH + 5}" width="5" height="${h - bristleH - ferruleH - 10}" fill="#fff" opacity="0.3" rx="2"/> <!-- Highlight -->
                    <!-- Ferrule -->
                    <rect x="20" y="${bristleH}" width="20" height="${ferruleH}" fill="url(#metal-brush)" stroke="#000" stroke-width="3" rx="2"/>
                    <line x1="20" y1="${bristleH + 5}" x2="40" y2="${bristleH + 5}" stroke="#000" stroke-width="2" opacity="0.5"/>
                    <line x1="20" y1="${bristleH + 15}" x2="40" y2="${bristleH + 15}" stroke="#000" stroke-width="2" opacity="0.5"/>
                    <!-- Bristles -->
                    <path d="M 20 ${bristleH} Q 15 0 30 0 Q 45 0 40 ${bristleH} Z" fill="url(#bristle-grad)" stroke="#000" stroke-width="3"/>
                    <!-- Paint Dip -->
                    <path d="M 20 ${bristleH/2 + 5} Q 15 0 30 0 Q 45 0 40 ${bristleH/2 + 5} Q 30 ${bristleH} 20 ${bristleH/2 + 5}" fill="${colorObj.hex}" opacity="0.9"/>
                </svg>
            `;
        }

        // 5. 3D Block Tower
        function createCubeTower(length, colorObj) {
            const h = length;
            const cubeSize = 45;
            const numCubes = Math.floor(h / cubeSize);
            let cubes = '';
            for(let i=0; i<numCubes; i++) {
                const y = h - (i+1)*cubeSize;
                const c = i % 2 === 0 ? colorObj : colorPalette.find(p=>p.id==='yellow'); 
                // Draw a 3D looking block using overlapping shapes
                cubes += `
                    <g transform="translate(0, ${y})">
                        <!-- Main face -->
                        <rect x="10" y="5" width="${cubeSize}" height="${cubeSize}" fill="${c.hex}" stroke="#000" stroke-width="3" rx="4"/>
                        <!-- Top highlight -->
                        <rect x="12" y="7" width="${cubeSize-4}" height="10" fill="${c.light}" opacity="0.8" rx="2"/>
                        <!-- Right shadow -->
                        <rect x="${10 + cubeSize - 8}" y="7" width="6" height="${cubeSize-4}" fill="${c.dark}" opacity="0.5" rx="2"/>
                        <!-- Peg -->
                        <rect x="${10 + cubeSize/2 - 10}" y="-5" width="20" height="10" fill="${c.hex}" stroke="#000" stroke-width="3" rx="2"/>
                        <rect x="${10 + cubeSize/2 - 8}" y="-3" width="16" height="4" fill="${c.light}" opacity="0.8" rx="1"/>
                    </g>
                `;
            }
            return `
                <svg width="70" height="${h + 10}" viewBox="0 0 70 ${h + 10}" style="overflow:visible">
                    ${cubes}
                </svg>
            `;
        }


        // --- Main Game Logic ---
        const generators = [createPencil, createPen, createRuler, createPaintbrush, createCubeTower];
        
        const prompts = {
            superlative: [
                { type: 'longest', text: "Which one is the LONGEST?", keyword: "LONGEST", css: "highlight-long", compare: (a, b) => b.val - a.val },
                { type: 'shortest', text: "Which one is the SHORTEST?", keyword: "SHORTEST", css: "highlight-short", compare: (a, b) => a.val - b.val }
            ],
            comparative: [
                { type: 'longer', text: "Which one is LONGER?", keyword: "LONGER", css: "highlight-long", compare: (a, b) => b.val - a.val },
                { type: 'shorter', text: "Which one is SHORTER?", keyword: "SHORTER", css: "highlight-short", compare: (a, b) => a.val - b.val }
            ]
        };

        function generateLevel() {
            const numObjects = score < 2 ? 2 : 3;
            const isComparative = numObjects === 2;
            
            const objectTypeIdx = Math.floor(Math.random() * generators.length);
            const generator = generators[objectTypeIdx];
            
            let items = [];
            // Scale base unit dynamically based on screen height so it doesn't overflow
            const screenH = window.innerHeight;
            // Target max height around 35vh
            const maxPx = screenH * 0.35; 
            const baseUnit = Math.floor(maxPx / 9); // Max 9 units tall
            
            for (let i = 0; i < numObjects; i++) {
                let units;
                let isUnique = false;
                while (!isUnique) {
                    units = Math.floor(Math.random() * 5) + 4; // 4 to 8 units
                    const tooClose = items.some(item => Math.abs(item.units - units) < 1);
                    if (!tooClose) isUnique = true;
                }

                items.push({
                    id: i,
                    units: units,
                    height: units * baseUnit,
                    colorObj: getRandomColorObj(),
                    svg: generator(units * baseUnit, getRandomColorObj())
                });
            }

            const questionPool = isComparative ? prompts.comparative : prompts.superlative;
            const question = questionPool[Math.floor(Math.random() * questionPool.length)];
            
            const sorted = [...items].sort((a, b) => question.compare({val: a.height}, {val: b.height}));
            const correctId = sorted[0].id;

            return { items, question, correctId };
        }

        function renderLevel() {
            if(isMiniGameActive) return;
            isProcessing = false;
            currentLevelData = generateLevel();
            const stage = document.getElementById('game-stage');
            const promptText = document.getElementById('question-text');
            
            stage.innerHTML = '';
            
            let qText = currentLevelData.question.text;
            const keyword = currentLevelData.question.keyword;
            const cssClass = currentLevelData.question.css;
            qText = qText.replace(keyword, `<span class="${cssClass}">${keyword}</span>`);
            promptText.innerHTML = qText;

            currentLevelData.items.forEach(item => {
                const container = document.createElement('div');
                container.className = 'flex items-end justify-center group game-object';
                // Container height defines the physical layout space
                container.style.height = item.height + 'px';
                container.onclick = () => handleInput(item.id, container);
                container.innerHTML = item.svg;
                stage.appendChild(container);
            });

            setTimeout(speakCurrentPrompt, 600);
        }

        function speakCurrentPrompt() {
            if(currentLevelData && !isMiniGameActive) {
                speak(currentLevelData.question.text);
            }
        }

        function handleInput(id, element) {
            if (isProcessing || isMiniGameActive) return;

            if (id === currentLevelData.correctId) {
                isProcessing = true;
                playSuccessSound();
                speak("Correct!");
                element.classList.add('animate-bounce-happy');
                createConfetti(element);
                
                score++;
                updateStars();

                setTimeout(() => {
                    startMiniGame();
                }, 1500);

            } else {
                playErrorSound();
                element.classList.add('animate-wiggle');
                speak("Oops! Try again.");
                setTimeout(() => {
                    element.classList.remove('animate-wiggle');
                }, 500);
            }
        }

        function updateStars() {
            const container = document.getElementById('star-container');
            container.innerHTML = '';
            for(let i=0; i<maxScore; i++) {
                if (i < score) {
                    container.innerHTML += `<div class="w-10 h-10 sm:w-12 sm:h-12 bg-yellow-400 rounded-full flex items-center justify-center text-white text-2xl sm:text-3xl shadow-[0_4px_0_#b45309] border-2 border-white animate-pop">⭐</div>`;
                } else {
                    container.innerHTML += `<div class="w-10 h-10 sm:w-12 sm:h-12 bg-black/30 rounded-full flex items-center justify-center text-white/40 text-2xl sm:text-3xl shadow-inner border-2 border-transparent">⭐</div>`;
                }
            }
        }

        function createConfetti(target) {
            const rect = target.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top;
            for (let i = 0; i < 30; i++) {
                const conf = document.createElement('div');
                conf.classList.add('fixed', 'w-4', 'h-4', 'rounded-full');
                conf.style.backgroundColor = colorPalette[Math.floor(Math.random()*colorPalette.length)].hex;
                conf.style.left = centerX + 'px';
                conf.style.top = centerY + 'px';
                conf.style.transition = 'all 1s cubic-bezier(0.1, 0.8, 0.3, 1)';
                conf.style.zIndex = 100;
                document.body.appendChild(conf);
                
                // Trigger reflow
                conf.getBoundingClientRect();
                
                const x = (Math.random() - 0.5) * 400;
                const y = (Math.random() - 1) * 400;
                const rot = Math.random() * 360;
                
                conf.style.transform = `translate(${x}px, ${y}px) rotate(${rot}deg) scale(0)`;
                conf.style.opacity = 0;
                
                setTimeout(() => conf.remove(), 1000);
            }
        }

        // --- Mini-game Logic ---
        let itemSpawnInterval;
        let miniGameStartTime;
        let basketPosition = 50; 
        const basket = document.getElementById('basket');
        const miniGameArea = document.getElementById('mini-game-area');
        const fruitScoreEl = document.getElementById('fruit-score');

        function startMiniGame() {
            isMiniGameActive = true;
            miniGameStartTime = Date.now();
            
            document.getElementById('main-game-layer').classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('mini-game-layer').classList.remove('hidden', 'opacity-0', 'pointer-events-none');
            document.getElementById('mini-game-layer').classList.add('flex');
            
            speak("Fruit party! Catch the apples!");

            basketPosition = 50;
            updateBasketPosition();
            scheduleNextSpawn();
            setupMiniGameControls();
        }

        function scheduleNextSpawn() {
            if(!isMiniGameActive) return;
            const elapsed = Date.now() - miniGameStartTime;
            const level = Math.floor(elapsed / 4000); 
            let delay = Math.max(300, 800 - (level * 150));

            itemSpawnInterval = setTimeout(() => {
                spawnItem();
                scheduleNextSpawn();
            }, delay);
        }

        function endMiniGame() {
            clearTimeout(itemSpawnInterval);
            document.querySelectorAll('.falling-item').forEach(el => el.remove());
            teardownMiniGameControls();

            isMiniGameActive = false;
            
            document.getElementById('mini-game-layer').classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                 document.getElementById('mini-game-layer').classList.add('hidden');
                 document.getElementById('mini-game-layer').classList.remove('flex');
                 document.getElementById('main-game-layer').classList.remove('opacity-0', 'pointer-events-none');
            }, 500);
            
            if (score >= maxScore) {
                setTimeout(() => {
                    document.getElementById('final-fruit-score').innerText = fruitScore;
                    document.getElementById('victory-modal').classList.remove('hidden');
                    playCheerSound();
                    speak("Congratulations! You are a measurement star!");
                    startFireworks();
                }, 1000);
            } else {
                speak("Next level! Get ready!");
                setTimeout(renderLevel, 1000);
            }
        }

        function spawnItem() {
            const elapsed = Date.now() - miniGameStartTime;
            const level = Math.floor(elapsed / 4000); 

            let items = ['🍎', '🍎', '🍊', '🍇', '🍓', '🍌']; 
            let speed = Math.min(15, 5 + level * 1.5);
            
            const bombCount = 1 + Math.floor(level/2);
            for(let i=0; i<bombCount; i++) items.push('💣');

            const item = items[Math.floor(Math.random() * items.length)];
            const el = document.createElement('div');
            el.classList.add('falling-item');
            el.innerText = item;
            el.style.left = Math.random() * 80 + 10 + '%'; 
            miniGameArea.appendChild(el);

            let posY = -100;
            
            const fallInterval = setInterval(() => {
                if(!isMiniGameActive) {
                    clearInterval(fallInterval);
                    el.remove();
                    return;
                }

                posY += speed;
                el.style.top = posY + 'px';

                const basketRect = basket.getBoundingClientRect();
                const itemRect = el.getBoundingClientRect();

                // Hitbox logic
                const hitY = posY > miniGameArea.offsetHeight - 150; 
                if(hitY && 
                   itemRect.right > basketRect.left + 30 && 
                   itemRect.left < basketRect.right - 30) {
                    
                    clearInterval(fallInterval);
                    el.remove();

                    if(item === '💣') {
                        playBombSound();
                        basket.classList.add('animate-wiggle');
                        speak("Oh no! A bomb!");
                        setTimeout(() => basket.classList.remove('animate-wiggle'), 500);
                        endMiniGame();
                    } else {
                        playCatchSound();
                        fruitScore++;
                        
                        const plusOne = document.createElement('div');
                        plusOne.innerText = '+1';
                        plusOne.className = 'absolute text-yellow-300 font-black text-4xl animate-pop drop-shadow-[0_4px_4px_rgba(0,0,0,0.5)]';
                        plusOne.style.left = (itemRect.left - miniGameArea.getBoundingClientRect().left) + 'px';
                        plusOne.style.top = (basketRect.top - miniGameArea.getBoundingClientRect().top - 40) + 'px';
                        miniGameArea.appendChild(plusOne);
                        setTimeout(()=>plusOne.remove(), 600);
                        
                        fruitScoreEl.innerText = fruitScore;
                        
                        // Basket bounce effect
                        basket.style.transform = 'scale(1.1) translateY(10px)';
                        setTimeout(()=> basket.style.transform = 'scale(1) translateY(0)', 100);
                    }

                } else if (posY > miniGameArea.offsetHeight) {
                    clearInterval(fallInterval);
                    el.remove();
                }
            }, 20);
        }

        // Touch/Mouse Controls
        function setupMiniGameControls() {
            miniGameArea.addEventListener('touchmove', handleMove, {passive: false});
            miniGameArea.addEventListener('mousemove', handleMove);
        }
        function teardownMiniGameControls() {
            miniGameArea.removeEventListener('touchmove', handleMove);
            miniGameArea.removeEventListener('mousemove', handleMove);
        }
        function handleMove(e) {
            if(!isMiniGameActive) return;
            e.preventDefault();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const rect = miniGameArea.getBoundingClientRect();
            let relativeX = clientX - rect.left;
            basketPosition = (relativeX / rect.width) * 100;
            updateBasketPosition();
        }
        function updateBasketPosition() {
            basketPosition = Math.max(10, Math.min(90, basketPosition)); 
            basket.style.left = `calc(${basketPosition}% - 70px)`; // Center adjustment
        }

        function restartGame() {
            stopFireworks();
            score = 0;
            fruitScore = 0;
            fruitScoreEl.innerText = '0';
            document.getElementById('victory-modal').classList.add('hidden');
            updateStars();
            renderLevel();
        }

        // --- Canvas Fireworks System ---
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        let fireworks = [];
        let particles = [];
        let fireworksAnimId;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.friction = 0.95; this.gravity = 0.2;
                this.alpha = 1; this.decay = Math.random() * 0.02 + 0.015;
            }
            update() {
                this.vx *= this.friction; this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx; this.y += this.vy;
                this.alpha -= this.decay;
            }
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function startFireworks() {
            resizeCanvas();
            fireworks = []; particles = [];
            
            function loop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Randomly spawn fireworks
                if(Math.random() < 0.05) {
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * (canvas.height / 2); // Top half
                    const color = colorPalette[Math.floor(Math.random()*colorPalette.length)].hex;
                    for(let i=0; i<50; i++) particles.push(new Particle(x, y, color));
                    
                    // Small pop sound
                    if(Math.random() < 0.3) playTone(400 + Math.random()*400, 'sine', 0.1, 0.05);
                }

                particles.forEach((p, index) => {
                    p.update();
                    p.draw(ctx);
                    if(p.alpha <= 0) particles.splice(index, 1);
                });

                fireworksAnimId = requestAnimationFrame(loop);
            }
            loop();
        }

        function stopFireworks() {
            cancelAnimationFrame(fireworksAnimId);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // Initialize
        window.onload = () => {
            updateStars();
            renderLevel();
            document.body.addEventListener('click', function() {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }, {once:true});
            document.body.addEventListener('touchstart', function() {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }, {once:true});
        };

    </script>
</body>
</html>
