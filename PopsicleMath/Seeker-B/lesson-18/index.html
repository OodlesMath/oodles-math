
<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fun Measurement Class - Version 3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&display=swap');

        :root {
            --duo-green: #58CC02;
            --duo-green-dark: #46A302;
            --duo-sky: #1CB0F6;
            --duo-sky-dark: #1899D6;
            --duo-yellow: #FFC800;
            --duo-yellow-dark: #E5B400;
            --duo-red: #FF4B4B;
            --duo-red-dark: #EA2B2B;
            --duo-text: #4B4B4B;
            --duo-bg: #F7F7F7;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--duo-sky);
            overflow: hidden;
            touch-action: manipulation;
            margin: 0;
            padding: 0;
            color: var(--duo-text);
        }

        /* Beautiful Gradient Question Text */
        .question-text-style {
            background: linear-gradient(90deg, #FF4B4B, #CE82FF, #1CB0F6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            -webkit-text-stroke: 3px white;
            filter: drop-shadow(0 4px 2px rgba(0,0,0,0.1));
            letter-spacing: 1px;
        }

        .title-text {
            color: var(--duo-yellow);
            text-shadow: 
                0 6px 0 var(--duo-yellow-dark),
                -2px -2px 0 var(--duo-yellow-dark),  
                2px -2px 0 var(--duo-yellow-dark),
                -2px 2px 0 var(--duo-yellow-dark),
                2px 2px 0 var(--duo-yellow-dark);
        }

        .duo-btn {
            background-color: var(--duo-green);
            color: white;
            border-radius: 1.5rem;
            border-bottom: 6px solid var(--duo-green-dark);
            transition: all 0.1s ease-in-out;
            cursor: pointer;
            text-transform: uppercase;
        }
        .duo-btn:active {
            border-bottom-width: 0px;
            transform: translateY(6px);
        }

        /* ----- UPGRADED SCENERY ----- */
        .scenery {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background: linear-gradient(180deg, #1CB0F6 0%, #78C8F6 100%);
        }
        
        /* Rainbow Adjusted to be visible and beautiful */
        .rainbow {
            position: absolute;
            width: 140vw; 
            height: 140vw; 
            border-radius: 50%;
            top: 10vh; /* Pushed down into view */
            left: -20vw; /* Centered horizontally */
            box-shadow: 
                inset 0 0 0 15px rgba(255, 75, 75, 0.35),
                inset 0 0 0 30px rgba(255, 150, 0, 0.35),
                inset 0 0 0 45px rgba(255, 200, 0, 0.35),
                inset 0 0 0 60px rgba(88, 204, 2, 0.35),
                inset 0 0 0 75px rgba(28, 176, 246, 0.35),
                inset 0 0 0 90px rgba(206, 130, 255, 0.35);
            pointer-events: none;
            opacity: 0.9;
        }

        /* Sun moved to Top Left */
        .sun {
            position: absolute;
            top: 5%;
            left: 5%; 
            width: 100px;
            height: 100px;
            background-color: var(--duo-yellow);
            border-radius: 50%;
            animation: floatSun 4s infinite alternate ease-in-out;
            box-shadow: 0 0 0 15px rgba(255, 200, 0, 0.2), 0 0 0 30px rgba(255, 200, 0, 0.1);
        }

        .hills-back {
            position: absolute;
            bottom: 12vh;
            width: 200%;
            left: -50%;
            height: 45vh;
            background-color: #72D826; /* Lighter grass */
            border-radius: 50% 50% 0 0;
            opacity: 0.9;
        }
        .hills-front {
            position: absolute;
            bottom: 10vh;
            width: 150%;
            left: -25%;
            height: 35vh;
            background-color: #58CC02; /* Vibrant grass */
            border-radius: 50% 50% 0 0;
            box-shadow: inset 0 15px 0 rgba(255,255,255,0.15);
        }

        /* Flowers */
        .flower {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #FFC800; /* Center */
            border-radius: 50%;
            box-shadow: 
                0 -8px 0 white,
                0 8px 0 white,
                -8px 0 0 white,
                8px 0 0 white;
            animation: wiggle 3s infinite ease-in-out;
            animation-delay: calc(var(--delay) * 1s);
        }
        .flower.pink {
            box-shadow: 0 -8px 0 #FFA5A5, 0 8px 0 #FFA5A5, -8px 0 0 #FFA5A5, 8px 0 0 #FFA5A5;
        }

        .desk {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 15vh;
            background-color: #D3A068;
            border-top: 10px solid #B88550;
            background-image: repeating-linear-gradient(
                to right,
                rgba(0,0,0,0.04) 0px,
                rgba(0,0,0,0.04) 30px,
                transparent 30px,
                transparent 60px
            );
            box-shadow: inset 0 15px 20px -15px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* Game Objects */
        .game-object {
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            position: relative;
            transform-origin: bottom center;
            filter: drop-shadow(0 15px 8px rgba(0,0,0,0.3));
            width: 28%;
            max-width: 150px;
            min-width: 70px;
            pointer-events: auto;
        }
        .game-object:active { transform: scale(0.9) translateY(10px); }
        .game-object:hover {
            transform: translateY(-15px) scale(1.05);
            filter: drop-shadow(0 25px 12px rgba(0,0,0,0.4));
        }

        /* Animations */
        @keyframes floatSun { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(-10px) scale(1.05); } }
        @keyframes floatClouds { 0% { transform: translateX(-150px); } 100% { transform: translateX(110vw); } }
        @keyframes bounceIn { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.15); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes wiggle { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-10deg); } 75% { transform: rotate(10deg); } }
        @keyframes happyBounce { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-40px) scale(1.1); } }
        
        .animate-bounce-in { animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .animate-wiggle { animation: wiggle 0.4s ease-in-out; }
        .animate-happy { animation: happyBounce 0.6s ease-in-out 2; }
        .cloud-anim { animation: floatClouds linear infinite; position: absolute; z-index: 1; opacity: 0.95; }

        /* Mini-game styling */
        .basket {
            position: absolute;
            bottom: 5vh;
            width: 140px;
            height: 75px;
            background: linear-gradient(to bottom, #E8B478, #C48E55);
            border: 6px solid #99693B;
            border-radius: 10px 10px 40px 40px;
            box-shadow: inset 0 -10px 0 rgba(0,0,0,0.1), 0 15px 10px rgba(0,0,0,0.2);
            z-index: 50;
            transform-origin: center;
            transition: left 0.1s ease-out;
        }
        .falling-item {
            position: absolute;
            font-size: clamp(48px, 8vw, 65px);
            top: 0;
            left: 0;
            line-height: 1;
            filter: drop-shadow(0 10px 6px rgba(0,0,0,0.3));
            z-index: 40;
            will-change: transform;
            transform: translate3d(0, -100px, 0);
            contain: layout paint style;
        }
        #mini-game-area {
            contain: layout paint size;
        }
        #mini-game-layer {
            transform: translateZ(0);
        }

        #fireworks-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .pill {
            background: white;
            border: 4px solid var(--duo-bg);
            border-bottom: 6px solid #E5E5E5;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            gap: 0.5rem;
        }


        /* ----- BGTemplate canvas background + responsive game polish ----- */
        #backgroundCanvas {
            display: block;
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        .scenery {
            display: none !important;
        }

        #start-overlay {
            background: rgba(125, 211, 252, 0.78) !important;
            backdrop-filter: blur(6px);
        }

        .oodles-logo {
            position: fixed;
            top: clamp(10px, 2vw, 22px);
            right: clamp(10px, 2vw, 26px);
            width: clamp(78px, 12vw, 155px);
            height: auto;
            object-fit: contain;
            z-index: 120;
            pointer-events: none;
            filter: drop-shadow(0 6px 8px rgba(0,0,0,0.18));
        }

        .game-hud {
            padding-right: clamp(115px, 18vw, 230px) !important;
            padding-left: clamp(12px, 3vw, 36px) !important;
        }

        .game-hud::after {
            content: "";
            position: fixed;
            top: 10px;
            right: 10px;
            width: clamp(96px, 16vw, 205px);
            height: clamp(58px, 10vw, 112px);
            pointer-events: none;
        }

        #star-container {
            max-width: min(62vw, 640px) !important;
        }

        #question-container {
            max-width: min(92vw, 980px);
            justify-content: center;
        }

        #question-text {
            line-height: 1.08;
            overflow-wrap: anywhere;
        }

        .speaker-btn {
            background: linear-gradient(180deg, #35c7ff 0%, #1cb0f6 100%) !important;
            box-shadow: 0 6px 0 var(--duo-sky-dark), 0 12px 22px rgba(28, 176, 246, 0.22) !important;
        }

        #game-stage {
            width: min(94vw, 980px) !important;
            left: 50%;
            transform: translateX(-50%);
            min-height: 300px;
        }

        .game-object {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            will-change: transform;
        }

        .game-object svg {
            overflow: visible;
            shape-rendering: geometricPrecision;
        }

        .game-object::after {
            content: "";
            position: absolute;
            bottom: -8px;
            left: 50%;
            width: 70%;
            height: 16px;
            transform: translateX(-50%);
            background: radial-gradient(ellipse, rgba(0,0,0,0.22), rgba(0,0,0,0));
            border-radius: 50%;
            z-index: -1;
        }

        #fireworks-canvas {
            top: 0;
            left: 0;
            z-index: 99999;
        }

        @media (max-width: 640px) {
            .game-hud {
                justify-content: flex-start !important;
                gap: 0.5rem !important;
                padding-top: 10px !important;
                padding-right: 86px !important;
            }

            #star-container {
                max-width: 54vw !important;
                min-height: 46px !important;
                padding: 0.35rem 0.5rem !important;
            }

            #fruit-score {
                font-size: 1.25rem !important;
            }

            #question-container {
                padding: 0.65rem 0.85rem !important;
                border-radius: 1.45rem !important;
                gap: 0.5rem !important;
            }

            #question-text {
                font-size: clamp(1.45rem, 8vw, 2.1rem) !important;
                -webkit-text-stroke: 1.5px white;
            }

            .speaker-btn {
                width: 44px !important;
                height: 44px !important;
                min-width: 44px !important;
            }

            #game-stage {
                width: 96vw !important;
                height: 52vh !important;
                bottom: 13vh !important;
                gap: 0.8rem !important;
                min-height: 260px;
            }

            .game-object {
                max-width: 116px;
                min-width: 62px;
            }
        }

        @media (orientation: landscape) and (max-height: 560px) {
            .game-hud {
                transform: scale(0.86);
                transform-origin: top center;
                padding-top: 8px !important;
            }

            .absolute.top-\[12vh\], .absolute.sm\:top-\[15vh\] {
                top: 15vh !important;
            }

            #question-text {
                font-size: clamp(1.5rem, 4.2vw, 2.5rem) !important;
            }

            #game-stage {
                bottom: 10vh !important;
                height: 50vh !important;
                min-height: 210px;
            }
        }

    </style>
</head>
<body class="h-screen w-screen flex flex-col select-none relative">
    <canvas id="backgroundCanvas" aria-label="Colorful sky, rainbow, trees, flowers, and grass background"></canvas>
    <img src="../assets/logo-oodles-math.png" alt="Oodles Math logo" class="oodles-logo" onerror="this.style.display='none'">
    <!-- Logo area: keep this image once only. Do not duplicate it elsewhere. -->
    <!-- Global SVG Defs -->
    <svg width="0" height="0" class="absolute pointer-events-none">
        <defs>
            <linearGradient id="cylinderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="rgba(255,255,255,0.4)" />
                <stop offset="20%" stop-color="rgba(255,255,255,0.1)" />
                <stop offset="80%" stop-color="rgba(0,0,0,0.05)" />
                <stop offset="100%" stop-color="rgba(0,0,0,0.3)" />
            </linearGradient>
            <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#9CA3AF" />
                <stop offset="30%" stop-color="#F3F4F6" />
                <stop offset="70%" stop-color="#9CA3AF" />
                <stop offset="100%" stop-color="#4B5563" />
            </linearGradient>
            <linearGradient id="plasticGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="rgba(255,255,255,0.6)" />
                <stop offset="15%" stop-color="rgba(255,255,255,0.2)" />
                <stop offset="85%" stop-color="rgba(0,0,0,0.05)" />
                <stop offset="100%" stop-color="rgba(0,0,0,0.2)" />
            </linearGradient>
            <linearGradient id="glossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="rgba(255,255,255,0.65)" />
                <stop offset="45%" stop-color="rgba(255,255,255,0.15)" />
                <stop offset="100%" stop-color="rgba(255,255,255,0)" />
            </linearGradient>
            <filter id="softSvgShadow" x="-30%" y="-30%" width="160%" height="170%">
                <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.22"/>
            </filter>
        </defs>
    </svg>

    <!-- Start Overlay -->
    <div id="start-overlay" class="fixed inset-0 bg-[var(--duo-sky)] z-[200] flex flex-col items-center justify-center backdrop-blur-sm">
        <div class="text-[120px] animate-bounce-in drop-shadow-2xl mb-2">🦉</div>
        <h1 class="title-text text-5xl md:text-7xl font-black mb-12 text-center">MEASUREMENT<br>CLASS</h1>
        <button onclick="initGame()" class="duo-btn text-3xl md:text-4xl px-12 py-6 font-black w-3/4 max-w-md shadow-2xl">PLAY NOW!</button>
    </div>

    <!-- Scenery Background -->
    <div class="scenery">
        <div class="rainbow"></div>
        <div class="sun"></div>
        
        <div class="cloud-anim text-white" style="top: 12%; left: -10%; animation-duration: 45s;">
            <svg width="200" height="100" viewBox="0 0 24 24" fill="currentColor"><path d="M18.5 7.5c-.22 0-.44.03-.65.08A6.002 6.002 0 0 0 7 6.5c-2.48 0-4.5 2.02-4.5 4.5 0 .38.05.74.14 1.09A4.498 4.498 0 0 0 0 16.5c0 2.48 2.02 4.5 4.5 4.5h14c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
        </div>
        <div class="cloud-anim text-white" style="top: 25%; left: 30%; animation-duration: 60s; animation-direction: reverse; transform: scale(1.4); opacity: 0.7;">
            <svg width="240" height="120" viewBox="0 0 24 24" fill="currentColor"><path d="M18.5 7.5c-.22 0-.44.03-.65.08A6.002 6.002 0 0 0 7 6.5c-2.48 0-4.5 2.02-4.5 4.5 0 .38.05.74.14 1.09A4.498 4.498 0 0 0 0 16.5c0 2.48 2.02 4.5 4.5 4.5h14c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
        </div>
        
        <div class="hills-back">
            <!-- Trees in background -->
            <svg style="position:absolute; left: 20%; top: -30px;" width="60" height="80" viewBox="0 0 100 140"><rect x="42" y="90" width="16" height="50" fill="#8B5A2B" /><circle cx="50" cy="40" r="40" fill="#4CAF50" /><circle cx="25" cy="70" r="30" fill="#388E3C" /><circle cx="75" cy="70" r="30" fill="#388E3C" /></svg>
            <svg style="position:absolute; left: 70%; top: -50px;" width="80" height="100" viewBox="0 0 100 140"><rect x="42" y="90" width="16" height="50" fill="#8B5A2B" /><circle cx="50" cy="40" r="40" fill="#4CAF50" /><circle cx="25" cy="70" r="30" fill="#388E3C" /><circle cx="75" cy="70" r="30" fill="#388E3C" /></svg>
        </div>
        <div class="hills-front">
            <!-- Trees in foreground -->
            <svg style="position:absolute; left: 10%; top: -60px;" width="100" height="140" viewBox="0 0 100 140"><rect x="42" y="90" width="16" height="50" fill="#8B5A2B" /><circle cx="50" cy="40" r="40" fill="#8BC34A" /><circle cx="25" cy="70" r="30" fill="#689F38" /><circle cx="75" cy="70" r="30" fill="#689F38" /></svg>
            <svg style="position:absolute; left: 85%; top: -40px;" width="70" height="90" viewBox="0 0 100 140"><rect x="42" y="90" width="16" height="50" fill="#8B5A2B" /><circle cx="50" cy="40" r="40" fill="#8BC34A" /><circle cx="25" cy="70" r="30" fill="#689F38" /><circle cx="75" cy="70" r="30" fill="#689F38" /></svg>
            
            <!-- Flowers scattered -->
            <div class="flower" style="left: 25%; top: 30%; --delay: 0.1;"></div>
            <div class="flower pink" style="left: 35%; top: 50%; --delay: 0.5;"></div>
            <div class="flower" style="left: 45%; top: 20%; transform: scale(0.8); --delay: 0.3;"></div>
            <div class="flower pink" style="right: 35%; top: 40%; transform: scale(0.9); --delay: 0.8;"></div>
            <div class="flower" style="right: 25%; top: 60%; transform: scale(0.7); --delay: 0.2;"></div>
        </div>
        
        <div class="desk"></div>
    </div>

    <!-- Top Navigation Bar -->
    <div class="game-hud flex justify-center items-center gap-3 sm:gap-6 p-4 sm:p-6 z-30 absolute top-0 w-full pointer-events-none">
        <!-- 10 Stars Container -->
        <div class="pill border-yellow-200 pointer-events-auto bg-white shadow-[0_4px_0_#fef08a] min-h-[55px] flex-wrap justify-center px-4 py-2 flex-1 md:flex-none max-w-[70%]" id="star-container">
            <!-- Stars JS injected -->
        </div>
        
        <!-- Fruit Score -->
        <div class="pill bg-white text-[var(--duo-text)] border-orange-200 shadow-[0_4px_0_#fed7aa] h-[55px] sm:h-[65px] px-4 sm:px-6 pointer-events-auto" >
            <span class="text-3xl sm:text-4xl filter drop-shadow-sm">🍎</span> 
            <span id="fruit-score" class="ml-2 text-2xl sm:text-3xl font-black text-orange-500">0</span>
        </div>
    </div>

    <!-- Visible Question Text with Glassmorphism & Inline Speaker -->
    <div class="absolute top-[12vh] sm:top-[15vh] w-full z-20 pointer-events-none flex justify-center px-4">
        <div id="question-container" class="flex items-center gap-3 bg-white/30 backdrop-blur-md px-6 py-3 rounded-[2rem] border-4 border-white/50 shadow-xl transition-all duration-300 transform scale-0 pointer-events-auto">
            <h2 id="question-text" class="text-3xl sm:text-4xl md:text-5xl font-black text-center question-text-style">
                <!-- Question goes here -->
            </h2>
            <button onclick="speakCurrentPrompt()" aria-label="Listen to the question" class="speaker-btn bg-[var(--duo-sky)] text-white w-12 h-12 md:w-14 md:h-14 rounded-full flex items-center justify-center border-4 border-[var(--duo-sky-dark)] shadow-[0_4px_0_var(--duo-sky-dark)] hover:scale-105 active:translate-y-1 transition-all flex-shrink-0 cursor-pointer">
                <span class="text-2xl md:text-3xl filter drop-shadow-md">🔊</span>
            </button>
        </div>
    </div>

    <!-- Main Game Layer -->
    <div id="main-game-layer" class="flex-grow flex flex-col items-center relative h-full z-10 transition-all duration-500">
        <div class="absolute bottom-[15vh] w-full h-[55vh] flex items-end justify-center gap-6 sm:gap-12 md:gap-20 px-2 z-20 pointer-events-none" id="game-stage">
            <!-- Objects generated here -->
        </div>
    </div>

    <!-- Mini-Game Layer -->
    <div id="mini-game-layer" class="absolute inset-0 z-40 hidden flex-col items-center pointer-events-none transition-opacity duration-500 opacity-0 bg-black/40 backdrop-blur-sm">
        <div class="mt-[18vh] text-center pointer-events-auto z-30">
            <h2 class="title-text text-5xl md:text-7xl font-black mb-4 animate-bounce">Fruit Party!</h2>
            <div class="inline-block bg-white rounded-full px-8 py-3 text-2xl md:text-3xl font-black border-4 border-gray-200 shadow-xl text-orange-500">
                Catch the apples! 🍎
            </div>
        </div>
        <div id="mini-game-area" class="w-full flex-grow relative overflow-hidden pointer-events-auto touch-none mt-10">
            <div id="basket" class="basket left-1/2 -translate-x-1/2"></div>
        </div>
    </div>

    <!-- Victory Modal -->
    <div id="victory-modal" class="hidden fixed inset-0 bg-black/60 z-[9000] flex items-center justify-center backdrop-blur-md">
        <!-- Confetti canvas stays on the top layer -->
        <canvas id="fireworks-canvas"></canvas>
        
        <div class="bg-white rounded-[2.5rem] p-8 sm:p-12 flex flex-col items-center animate-bounce-in border-8 border-yellow-400 max-w-md w-[90%] relative z-[9500] text-center shadow-2xl">
            <div class="text-[110px] -mt-28 mb-4 filter drop-shadow-[0_15px_10px_rgba(0,0,0,0.2)]">🏆</div>
            <h2 class="text-5xl sm:text-6xl font-black mb-8 title-text">AWESOME!</h2>
            
            <div class="w-full bg-[#F3F4F6] rounded-3xl p-6 mb-8 flex flex-col gap-5 border-4 border-gray-200 shadow-inner">
                <div class="flex justify-between items-center bg-white rounded-2xl p-4 border-2 border-gray-100 shadow-sm">
                    <span class="text-xl sm:text-2xl font-black text-gray-400">STARS</span>
                    <span class="text-2xl sm:text-3xl text-yellow-400 font-black drop-shadow-sm">10/10 ⭐</span>
                </div>
                <div class="flex justify-between items-center bg-white rounded-2xl p-4 border-2 border-gray-100 shadow-sm">
                    <span class="text-xl sm:text-2xl font-black text-gray-400">FRUITS</span>
                    <div class="flex items-center gap-2">
                        <span class="text-3xl sm:text-4xl">🍎</span> 
                        <span id="final-fruit-score" class="text-3xl sm:text-4xl font-black text-orange-500">0</span>
                    </div>
                </div>
            </div>

            <button onclick="restartGame()" class="w-full duo-btn text-2xl sm:text-3xl font-black py-5 shadow-lg">
                PLAY AGAIN
            </button>
        </div>
    </div>


    <script>
        // BGTemplate-style animated background canvas
        const bgCanvas = document.getElementById('backgroundCanvas');
        const bgCtx = bgCanvas.getContext('2d', { alpha: false });

        let bgCanvasWidth = 0;
        let bgCanvasHeight = 0;
        let bgClouds = [];
        let bgTrees = [];
        let bgFlowers = [];

        function resizeBackgroundCanvas() {
            bgCanvasWidth = window.innerWidth;
            bgCanvasHeight = window.innerHeight;
            bgCanvas.width = bgCanvasWidth;
            bgCanvas.height = bgCanvasHeight;
            generateBackgroundEnvironment();
        }

        function generateBackgroundEnvironment() {
            bgClouds = [];
            bgTrees = [];
            bgFlowers = [];

            for (let i = 0; i < 8; i++) {
                bgClouds.push({
                    x: Math.random() * bgCanvasWidth,
                    y: Math.random() * (bgCanvasHeight * 0.42),
                    size: 30 + Math.random() * 50,
                    speed: Math.random() * 0.18 + 0.08
                });
            }

            for (let i = 0; i < 10; i++) {
                bgTrees.push({
                    x: Math.random() * bgCanvasWidth,
                    y: bgCanvasHeight * 0.65 + (Math.random() * 20 - 10),
                    scale: 0.5 + Math.random() * 0.5
                });
            }

            const flowerColors = ['#ff4b4b', '#ffc800', '#ce82ff', '#ffffff', '#1cb0f6'];
            for (let i = 0; i < 28; i++) {
                bgFlowers.push({
                    x: Math.random() * bgCanvasWidth,
                    y: bgCanvasHeight * 0.8 + Math.random() * (bgCanvasHeight * 0.18),
                    color: flowerColors[Math.floor(Math.random() * flowerColors.length)],
                    scale: 0.45 + Math.random() * 0.85
                });
            }
        }

        function updateBackgroundCanvas() {
            bgClouds.forEach(cloud => {
                cloud.x -= cloud.speed;
                if (cloud.x + cloud.size * 2 < 0) {
                    cloud.x = bgCanvasWidth + cloud.size * 2;
                    cloud.y = Math.random() * (bgCanvasHeight * 0.42);
                }
            });
        }

        function drawBackgroundCloud(cloud) {
            bgCtx.beginPath();
            bgCtx.arc(cloud.x, cloud.y, cloud.size, 0, Math.PI * 2);
            bgCtx.arc(cloud.x + cloud.size * 0.8, cloud.y + cloud.size * 0.2, cloud.size * 0.7, 0, Math.PI * 2);
            bgCtx.arc(cloud.x - cloud.size * 0.8, cloud.y + cloud.size * 0.2, cloud.size * 0.7, 0, Math.PI * 2);
            bgCtx.fill();
        }

        function drawBackgroundTree(tree) {
            bgCtx.save();
            bgCtx.translate(tree.x, tree.y);
            bgCtx.scale(tree.scale, tree.scale);

            bgCtx.fillStyle = '#78350f';
            bgCtx.fillRect(-10, 0, 20, 60);

            bgCtx.fillStyle = '#4ade80';
            bgCtx.beginPath();
            bgCtx.arc(0, -20, 40, 0, Math.PI * 2);
            bgCtx.fill();
            bgCtx.beginPath();
            bgCtx.arc(-25, -10, 30, 0, Math.PI * 2);
            bgCtx.fill();
            bgCtx.beginPath();
            bgCtx.arc(25, -10, 30, 0, Math.PI * 2);
            bgCtx.fill();

            bgCtx.restore();
        }

        function drawBackgroundFlower(flower) {
            bgCtx.save();
            bgCtx.translate(flower.x, flower.y);
            bgCtx.scale(flower.scale, flower.scale);

            bgCtx.fillStyle = flower.color;
            for (let petal = 0; petal < 5; petal++) {
                bgCtx.rotate((Math.PI * 2) / 5);
                bgCtx.beginPath();
                bgCtx.ellipse(0, -10, 6, 12, 0, 0, Math.PI * 2);
                bgCtx.fill();
            }

            bgCtx.fillStyle = '#ffc800';
            bgCtx.beginPath();
            bgCtx.arc(0, 0, 6, 0, Math.PI * 2);
            bgCtx.fill();

            bgCtx.restore();
        }

        function drawBackgroundCanvas() {
            const skyGradient = bgCtx.createLinearGradient(0, 0, 0, bgCanvasHeight * 0.7);
            skyGradient.addColorStop(0, '#7dd3fc');
            skyGradient.addColorStop(1, '#bae6fd');
            bgCtx.fillStyle = skyGradient;
            bgCtx.fillRect(0, 0, bgCanvasWidth, bgCanvasHeight);

            bgCtx.save();
            bgCtx.translate(bgCanvasWidth / 2, bgCanvasHeight * 0.7);
            bgCtx.lineWidth = Math.min(20, bgCanvasWidth * 0.015);
            bgCtx.lineCap = 'round';
            const rainbowColors = ['#ff4b4b', '#ff9900', '#ffc800', '#58cc02', '#1cb0f6', '#ce82ff'];
            const baseRadius = Math.min(bgCanvasWidth * 0.3, 400);

            for (let i = 0; i < rainbowColors.length; i++) {
                bgCtx.strokeStyle = rainbowColors[i];
                bgCtx.beginPath();
                bgCtx.arc(0, 0, baseRadius - i * bgCtx.lineWidth, Math.PI, 0);
                bgCtx.stroke();
            }
            bgCtx.restore();

            bgCtx.fillStyle = 'rgba(255, 255, 255, 0.95)';
            bgClouds.forEach(drawBackgroundCloud);

            bgCtx.fillStyle = '#65a30d';
            bgCtx.beginPath();
            bgCtx.moveTo(0, bgCanvasHeight);
            bgCtx.lineTo(0, bgCanvasHeight * 0.65);
            for (let x = 0; x <= bgCanvasWidth + 300; x += 300) {
                bgCtx.quadraticCurveTo(x - 150, bgCanvasHeight * 0.55, x, bgCanvasHeight * 0.65);
            }
            bgCtx.lineTo(bgCanvasWidth, bgCanvasHeight);
            bgCtx.fill();

            bgTrees.forEach(drawBackgroundTree);

            bgCtx.fillStyle = '#58cc02';
            bgCtx.beginPath();
            bgCtx.moveTo(0, bgCanvasHeight);
            bgCtx.lineTo(0, bgCanvasHeight * 0.7);
            bgCtx.quadraticCurveTo(bgCanvasWidth / 2, bgCanvasHeight * 0.65, bgCanvasWidth, bgCanvasHeight * 0.7);
            bgCtx.lineTo(bgCanvasWidth, bgCanvasHeight);
            bgCtx.fill();

            bgCtx.strokeStyle = '#84cc16';
            bgCtx.lineWidth = 15;
            bgCtx.lineCap = 'round';
            bgCtx.beginPath();
            bgCtx.moveTo(-20, bgCanvasHeight * 0.7);
            bgCtx.quadraticCurveTo(bgCanvasWidth / 2, bgCanvasHeight * 0.65, bgCanvasWidth + 20, bgCanvasHeight * 0.7);
            bgCtx.stroke();

            bgFlowers.forEach(drawBackgroundFlower);
        }

        let lastBackgroundFrame = 0;
        function backgroundAnimationLoop(timestamp) {
            requestAnimationFrame(backgroundAnimationLoop);
            const miniGameIsRunning = typeof isMiniGameActive !== 'undefined' && isMiniGameActive;
            const minFrameGap = miniGameIsRunning ? 66 : 16;
            if (timestamp - lastBackgroundFrame < minFrameGap) return;
            lastBackgroundFrame = timestamp;
            updateBackgroundCanvas();
            drawBackgroundCanvas();
        }

        window.addEventListener('resize', resizeBackgroundCanvas);
        resizeBackgroundCanvas();
        requestAnimationFrame(backgroundAnimationLoop);
    </script>

    <script>
        // --- Game State & Config ---
        let score = 0;
        const maxScore = 10; 
        let fruitScore = 0;
        let currentLevelData = null;
        let soundEnabled = true;
        let isProcessing = false;
        let isMiniGameActive = false;
        let audioCtx;
        let lastGeneratorIdx = -1;

        // --- Vibrant Kid-friendly Colors ---
        const flatColors = [
            { id: 'red', main: '#FF4B4B', dark: '#E02424', light: '#FF8A8A' },
            { id: 'blue', main: '#1CB0F6', dark: '#1A8CD8', light: '#78C8F6' },
            { id: 'green', main: '#58CC02', dark: '#4BAA02', light: '#89E23D' },
            { id: 'yellow', main: '#FFC800', dark: '#E5A500', light: '#FFDE59' },
            { id: 'purple', main: '#CE82FF', dark: '#B061E6', light: '#E4B8FF' },
            { id: 'orange', main: '#FF9600', dark: '#E57300', light: '#FFB84D' }
        ];

        function getRandomColorObj() {
            return flatColors[Math.floor(Math.random() * flatColors.length)];
        }

        // --- Audio Context ---
        function initGame() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            
            let utter = new SpeechSynthesisUtterance('');
            window.speechSynthesis.speak(utter);

            document.getElementById('start-overlay').classList.add('hidden');
            updateStars();
            renderLevel();
            playSuccessSound(); 
        }

        function playTone(freq, type, duration, vol=0.1) {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = type; 
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playSuccessSound() {
            playTone(523.25, 'triangle', 0.3, 0.15); 
            setTimeout(() => playTone(659.25, 'triangle', 0.3, 0.15), 100); 
            setTimeout(() => playTone(783.99, 'triangle', 0.4, 0.15), 200); 
            setTimeout(() => playTone(1046.50, 'triangle', 0.6, 0.15), 300); 
        }

        function playErrorSound() {
            playTone(250, 'square', 0.3, 0.1);
            setTimeout(() => playTone(200, 'square', 0.4, 0.1), 100);
        }

        function playCatchSound() { 
            playTone(880, 'sine', 0.15, 0.1); 
            setTimeout(() => playTone(1200, 'sine', 0.2, 0.1), 50);
        } 
        function playBombSound() { 
            playTone(150, 'sawtooth', 0.4, 0.2); 
        }
        function playCheerSound() {
            [523.25, 659.25, 783.99, 1046.50, 1318.51].forEach((freq, i) => {
                setTimeout(() => playTone(freq, 'triangle', 0.4, 0.15), i * 150);
            });
            setTimeout(() => playSuccessSound(), 800);
        }

        function speak(text) {
            if (!soundEnabled) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US'; 
            utterance.rate = 0.85; 
            utterance.pitch = 1.2; 
            window.speechSynthesis.speak(utterance);
        }

        // --- UPGRADED REALISTIC 2.5D ICONS (SVG) ---
        function createFlatPencil(h, c) {
            return `
                <svg viewBox="0 0 100 ${h}" preserveAspectRatio="xMidYMax meet" width="100%" height="100%" style="overflow:visible;">
                    <polygon points="30,50 70,50 50,0" fill="#FDE047" />
                    <polygon points="40,50 60,50 50,0" fill="#FACC15" />
                    <polygon points="45,50 55,50 50,0" fill="#EAB308" />
                    <polygon points="44,15 56,15 50,0" fill="#374151" />
                    <polygon points="48,15 52,15 50,0" fill="#1F2937" />
                    <rect x="30" y="50" width="40" height="${h-85}" fill="${c.main}" />
                    <rect x="30" y="50" width="40" height="${h-85}" fill="url(#cylinderGrad)" />
                    <line x1="42" y1="50" x2="42" y2="${h-35}" stroke="rgba(0,0,0,0.15)" stroke-width="2" />
                    <line x1="58" y1="50" x2="58" y2="${h-35}" stroke="rgba(255,255,255,0.3)" stroke-width="2" />
                    <rect x="30" y="${h-35}" width="40" height="15" fill="url(#metalGrad)" />
                    <line x1="30" y1="${h-30}" x2="70" y2="${h-30}" stroke="#4B5563" stroke-width="1.5" />
                    <line x1="30" y1="${h-25}" x2="70" y2="${h-25}" stroke="#4B5563" stroke-width="1.5" />
                    <path d="M 30 ${h-20} L 70 ${h-20} L 70 ${h-5} Q 70 ${h} 65 ${h} L 35 ${h} Q 30 ${h} 30 ${h-5} Z" fill="#FCA5A5" />
                    <path d="M 30 ${h-20} L 70 ${h-20} L 70 ${h-5} Q 70 ${h} 65 ${h} L 35 ${h} Q 30 ${h} 30 ${h-5} Z" fill="url(#cylinderGrad)" />
                </svg>
            `;
        }

        function createFlatCrayon(h, c) {
            return `
                <svg viewBox="0 0 100 ${h}" preserveAspectRatio="xMidYMax meet" width="100%" height="100%" style="overflow:visible;">
                    <path d="M 33 30 L 67 30 L 60 5 Q 50 -2 40 5 Z" fill="${c.main}" />
                    <path d="M 33 30 L 67 30 L 60 5 Q 50 -2 40 5 Z" fill="url(#cylinderGrad)" />
                    <rect x="30" y="30" width="40" height="${h-30}" fill="${c.light}" />
                    <rect x="30" y="30" width="40" height="${h-30}" fill="url(#cylinderGrad)" />
                    <path d="M 30 40 Q 40 35 50 40 T 70 40 L 70 48 Q 60 43 50 48 T 30 48 Z" fill="#111827" opacity="0.9" />
                    <path d="M 30 ${h-25} Q 40 ${h-30} 50 ${h-25} T 70 ${h-25} L 70 ${h-17} Q 60 ${h-22} 50 ${h-17} T 30 ${h-17} Z" fill="#111827" opacity="0.9" />
                    <ellipse cx="50" cy="${(h/2)+10}" rx="14" ry="22" fill="#111827" opacity="0.9" />
                    <ellipse cx="50" cy="${(h/2)+10}" rx="10" ry="18" fill="${c.main}" />
                </svg>
            `;
        }

        function createFlatRuler(h, c) {
            let ticks = '';
            for(let i=30; i<h-20; i+=10) {
                let isMajor = i % 30 === 0;
                ticks += `<line x1="25" y1="${i}" x2="${isMajor ? 48 : 38}" y2="${i}" stroke="#ffffff" stroke-width="${isMajor?3:1.5}" stroke-linecap="round" opacity="0.9"/>`;
            }
            return `
                <svg viewBox="0 0 100 ${h}" preserveAspectRatio="xMidYMax meet" width="100%" height="100%" style="overflow:visible;">
                    <rect x="25" y="0" width="50" height="${h}" fill="${c.main}" rx="5" opacity="0.95" />
                    <rect x="25" y="0" width="50" height="${h}" fill="url(#plasticGrad)" rx="5" />
                    <rect x="65" y="5" width="6" height="${h-10}" fill="black" opacity="0.1" rx="3" />
                    <circle cx="50" cy="15" r="6" fill="var(--duo-sky)" />
                    <circle cx="50" cy="15" r="6" fill="rgba(0,0,0,0.1)" transform="translate(0, 1)" />
                    ${ticks}
                </svg>
            `;
        }

        function createFlatPaintbrush(h, c) {
            return `
                <svg viewBox="0 0 100 ${h}" preserveAspectRatio="xMidYMax meet" width="100%" height="100%" style="overflow:visible;">
                    <path d="M 33 45 Q 28 -5 50 0 Q 72 -5 67 45 Z" fill="#D97706" />
                    <path d="M 37 45 Q 35 5 50 5 Q 65 5 63 45 Z" fill="#FBBF24" />
                    <path d="M 34 30 Q 30 -2 50 0 Q 70 -2 66 30 Q 58 42 50 30 Q 42 18 34 30 Z" fill="${c.main}" />
                    <path d="M 34 30 Q 30 -2 50 0 Q 70 -2 66 30 Q 58 42 50 30 Q 42 18 34 30 Z" fill="rgba(255,255,255,0.2)" />
                    <rect x="33" y="45" width="34" height="20" fill="url(#metalGrad)" rx="3"/>
                    <line x1="33" y1="51" x2="67" y2="51" stroke="#374151" stroke-width="1.5" />
                    <line x1="33" y1="57" x2="67" y2="57" stroke="#374151" stroke-width="1.5" />
                    <path d="M 37 65 L 63 65 L 58 ${h-5} Q 50 ${h+5} 42 ${h-5} Z" fill="#92400E" />
                    <path d="M 39 ${h-30} L 61 ${h-30} L 58 ${h-5} Q 50 ${h+5} 42 ${h-5} Z" fill="${c.dark}" />
                    <path d="M 37 65 L 63 65 L 58 ${h-5} Q 50 ${h+5} 42 ${h-5} Z" fill="url(#cylinderGrad)" />
                </svg>
            `;
        }

        function createFlatBlocks(h, c) {
            const blockH = 28;
            const count = Math.floor(h / blockH);
            let blocks = '';
            for(let i=0; i<count; i++) {
                let y = h - (i + 1) * blockH;
                let color = i % 2 === 0 ? c.main : c.light;
                let darkColor = i % 2 === 0 ? c.dark : c.main;
                blocks += `
                    <g transform="translate(0, ${y})">
                        <path d="M 36 6 L 36 0 Q 40 -2 44 0 L 44 6 Z" fill="${color}" />
                        <path d="M 46 6 L 46 0 Q 50 -2 54 0 L 54 6 Z" fill="${color}" />
                        <path d="M 56 6 L 56 0 Q 60 -2 64 0 L 64 6 Z" fill="${color}" />
                        <path d="M 36 6 L 36 0 Q 40 -2 44 0 L 44 6 Z" fill="rgba(255,255,255,0.4)" />
                        <path d="M 46 6 L 46 0 Q 50 -2 54 0 L 54 6 Z" fill="rgba(255,255,255,0.4)" />
                        <path d="M 56 6 L 56 0 Q 60 -2 64 0 L 64 6 Z" fill="rgba(255,255,255,0.4)" />
                        <rect x="30" y="5" width="40" height="${blockH-5}" fill="${color}" rx="3" />
                        <rect x="30" y="${blockH-4}" width="40" height="4" fill="${darkColor}" rx="2" />
                        <rect x="66" y="5" width="4" height="${blockH-5}" fill="${darkColor}" rx="2" />
                        <rect x="30" y="5" width="40" height="3" fill="rgba(255,255,255,0.5)" rx="2" />
                        <rect x="30" y="5" width="3" height="${blockH-5}" fill="rgba(255,255,255,0.5)" rx="2" />
                    </g>
                `;
            }
            return `
                <svg viewBox="0 0 100 ${h}" preserveAspectRatio="xMidYMax meet" width="100%" height="100%" style="overflow:visible;">
                    ${blocks}
                </svg>
            `;
        }

        // --- Core Game Logic ---
        const generators = [createFlatPencil, createFlatCrayon, createFlatRuler, createFlatPaintbrush, createFlatBlocks];
        
        const prompts = {
            superlative: [
                { text: "Which one is the longest?", compare: (a, b) => b.val - a.val },
                { text: "Which one is the shortest?", compare: (a, b) => a.val - b.val }
            ],
            comparative: [
                { text: "Which one is longer?", compare: (a, b) => b.val - a.val },
                { text: "Which one is shorter?", compare: (a, b) => a.val - b.val }
            ]
        };

        function generateLevel() {
            // Difficulty curve
            const numObjects = score < 3 ? 2 : 3;
            const isComparative = numObjects === 2;
            
            // Random object generator without immediate repeating
            let genIdx;
            do {
                genIdx = Math.floor(Math.random() * generators.length);
            } while (genIdx === lastGeneratorIdx);
            lastGeneratorIdx = genIdx;
            const generator = generators[genIdx];
            
            let items = [];
            const maxUnits = 12; 
            
            // --- FIX LAG: Guaranteed distinct sizes without infinite loops ---
            // Create a pool of guaranteed unique sizes
            let sizePool = [6, 8, 10, 12];
            
            // Fisher-Yates shuffle the pool
            for (let i = sizePool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [sizePool[i], sizePool[j]] = [sizePool[j], sizePool[i]];
            }

            for (let i = 0; i < numObjects; i++) {
                let units = sizePool[i]; // Pick a unique size from the shuffled pool

                const heightPct = (units / maxUnits) * 100;
                const svgHeight = units * 25; 

                items.push({
                    id: i,
                    units: units,
                    heightPct: heightPct,
                    val: units,
                    svg: generator(svgHeight, getRandomColorObj())
                });
            }

            const questionPool = isComparative ? prompts.comparative : prompts.superlative;
            const question = questionPool[Math.floor(Math.random() * questionPool.length)];
            
            const sorted = [...items].sort((a, b) => question.compare(a, b));
            const correctId = sorted[0].id;

            return { items, question, correctId };
        }

        function renderLevel() {
            if(isMiniGameActive) return;
            isProcessing = false;
            currentLevelData = generateLevel();
            
            // Update Question UI
            const questionContainer = document.getElementById('question-container');
            const questionEl = document.getElementById('question-text');
            questionEl.innerText = currentLevelData.question.text;
            questionContainer.style.transform = 'scale(0)';
            setTimeout(() => {
                questionContainer.style.transform = 'scale(1)';
            }, 100);

            const stage = document.getElementById('game-stage');
            stage.innerHTML = '';

            currentLevelData.items.forEach((item, index) => {
                const container = document.createElement('div');
                container.className = 'game-object flex-none flex justify-center items-end opacity-0';
                container.style.height = item.heightPct + '%';
                container.onclick = () => handleInput(item.id, container);
                container.innerHTML = item.svg;
                
                setTimeout(() => {
                    container.classList.add('animate-bounce-in');
                    container.classList.remove('opacity-0');
                }, index * 150);

                stage.appendChild(container);
            });

            setTimeout(speakCurrentPrompt, 800);
        }

        function speakCurrentPrompt() {
            if(currentLevelData && !isMiniGameActive) {
                speak(currentLevelData.question.text);
                const qEl = document.getElementById('question-container');
                qEl.classList.add('animate-wiggle');
                setTimeout(() => qEl.classList.remove('animate-wiggle'), 400);
            }
        }

        function handleInput(id, element) {
            if (isProcessing || isMiniGameActive) return;

            if (id === currentLevelData.correctId) {
                isProcessing = true;
                playSuccessSound();
                speak("Correct!");
                element.classList.add('animate-happy');
                createConfettiExplosion(element);
                
                score++;
                updateStars();

                setTimeout(() => {
                    document.getElementById('question-container').style.transform = 'scale(0)';
                    
                    // Trigger minigame at 5 and 10
                    if (score % 5 === 0) {
                        startMiniGame();
                    } else {
                        renderLevel();
                    }
                }, 1800);

            } else {
                playErrorSound();
                element.classList.add('animate-wiggle');
                speak("Oops! Try again.");
                setTimeout(() => {
                    element.classList.remove('animate-wiggle');
                }, 500);
            }
        }

        function updateStars() {
            const container = document.getElementById('star-container');
            container.innerHTML = '';
            for(let i=0; i<maxScore; i++) {
                if (i < score) {
                    container.innerHTML += `<div class="text-xl sm:text-3xl filter drop-shadow-md animate-bounce-in mx-[1px]">⭐</div>`;
                } else {
                    container.innerHTML += `<div class="text-xl sm:text-3xl opacity-20 grayscale mx-[1px]">⭐</div>`;
                }
            }
        }

        // --- Visual Effects ---
        function createConfettiExplosion(target) {
            const rect = target.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            for (let i = 0; i < 50; i++) {
                const conf = document.createElement('div');
                conf.className = 'fixed w-3 h-3 sm:w-4 sm:h-4 rounded-sm z-[9999]'; 
                conf.style.backgroundColor = flatColors[Math.floor(Math.random()*flatColors.length)].main;
                conf.style.left = centerX + 'px';
                conf.style.top = centerY + 'px';
                conf.style.transition = 'all 1s cubic-bezier(0.1, 0.8, 0.3, 1)';
                document.body.appendChild(conf);
                
                conf.getBoundingClientRect(); // Reflow
                
                const angle = Math.random() * Math.PI * 2;
                const distance = 100 + Math.random() * 250;
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance + 50; 
                const rot = Math.random() * 720;
                
                conf.style.transform = `translate(${x}px, ${y}px) rotate(${rot}deg)`;
                conf.style.opacity = 0;
                
                setTimeout(() => conf.remove(), 1000);
            }
        }

        // --- Mini-game Logic ---
        let itemSpawnInterval;
        let miniGameStartTime;
        let miniGameAnimationId = null;
        let lastMiniGameFrame = 0;
        let nextMiniGameSpawnAt = 0;
        let activeFallingItems = [];
        let basketPosition = 50;
        let cachedAreaWidth = 0;
        let cachedAreaHeight = 0;
        let cachedBasketLeft = 0;
        let cachedBasketRight = 0;
        let cachedBasketTop = 0;
        const basket = document.getElementById('basket');
        const miniGameArea = document.getElementById('mini-game-area');
        const fruitScoreEl = document.getElementById('fruit-score');

        function startMiniGame() {
            isMiniGameActive = true;
            miniGameStartTime = performance.now();
            lastMiniGameFrame = 0;
            nextMiniGameSpawnAt = 0;
            activeFallingItems = [];
            clearTimeout(itemSpawnInterval);
            cancelAnimationFrame(miniGameAnimationId);
            document.querySelectorAll('.falling-item').forEach(el => el.remove());
            
            document.getElementById('main-game-layer').classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('mini-game-layer').classList.remove('hidden', 'opacity-0', 'pointer-events-none');
            document.getElementById('mini-game-layer').classList.add('flex');
            
            speak("Fruit party! Catch the apples!");

            basketPosition = 50;
            updateBasketPosition();
            setupMiniGameControls();
            cacheMiniGameLayout();
            miniGameAnimationId = requestAnimationFrame(miniGameLoop);
        }

        function cacheMiniGameLayout() {
            cachedAreaWidth = miniGameArea.clientWidth || window.innerWidth;
            cachedAreaHeight = miniGameArea.clientHeight || Math.round(window.innerHeight * 0.65);
            const basketWidth = basket.offsetWidth || 140;
            const basketCenter = (basketPosition / 100) * cachedAreaWidth;
            cachedBasketLeft = basketCenter - basketWidth / 2;
            cachedBasketRight = basketCenter + basketWidth / 2;
            cachedBasketTop = basket.offsetTop || Math.max(0, cachedAreaHeight - 120);
        }

        function getMiniGameDelay(now) {
            const elapsed = now - miniGameStartTime;
            const level = Math.floor(elapsed / 3500);
            return Math.max(430, 820 - (level * 70));
        }

        function scheduleNextSpawn() {
            // Kept for compatibility with the original game flow.
            // Version 3 uses one requestAnimationFrame loop instead of many timers.
        }

        function endMiniGame() {
            if (!isMiniGameActive) return;
            clearTimeout(itemSpawnInterval);
            cancelAnimationFrame(miniGameAnimationId);
            miniGameAnimationId = null;
            activeFallingItems.forEach(obj => obj.el.remove());
            activeFallingItems = [];
            document.querySelectorAll('.falling-item').forEach(el => el.remove());
            teardownMiniGameControls();

            isMiniGameActive = false;
            
            document.getElementById('mini-game-layer').classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => { 
                document.getElementById('mini-game-layer').classList.add('hidden'); 
                document.getElementById('mini-game-layer').classList.remove('flex'); 
                document.getElementById('main-game-layer').classList.remove('opacity-0', 'pointer-events-none');
            }, 500);
            
            if (score >= maxScore) { 
                setTimeout(() => {
                    document.getElementById('final-fruit-score').innerText = fruitScore;
                    document.getElementById('victory-modal').classList.remove('hidden');
                    playCheerSound();
                    speak("Awesome! You are a measurement star!");
                    startFireworks();
                }, 800);
            } else {
                speak("Great! Next level! Get ready!");
                setTimeout(renderLevel, 800);
            }
        }

        function spawnItem() {
            if (!isMiniGameActive) return;
            cacheMiniGameLayout();

            const elapsed = performance.now() - miniGameStartTime;
            const level = Math.floor(elapsed / 4200);
            const choices = ['🍎', '🍎', '🍊', '🍇', '🍓', '🍌'];
            const bombCount = Math.min(3, 1 + Math.floor(level / 3));
            for (let i = 0; i < bombCount; i++) choices.push('💣');

            const item = choices[Math.floor(Math.random() * choices.length)];
            const el = document.createElement('div');
            el.className = 'falling-item';
            el.textContent = item;

            const size = Math.max(48, Math.min(65, cachedAreaWidth * 0.08));
            const x = Math.random() * Math.max(40, cachedAreaWidth - size - 40) + 20;
            const speed = Math.min(620, 285 + level * 36 + Math.random() * 65);
            el.style.transform = `translate3d(${x}px, -${size + 35}px, 0)`;
            miniGameArea.appendChild(el);

            activeFallingItems.push({
                el,
                item,
                x,
                y: -size - 35,
                size,
                speed,
                collected: false
            });
        }

        function miniGameLoop(timestamp) {
            if (!isMiniGameActive) return;

            if (!lastMiniGameFrame) {
                lastMiniGameFrame = timestamp;
                nextMiniGameSpawnAt = timestamp;
            }

            const delta = Math.min(0.033, Math.max(0.001, (timestamp - lastMiniGameFrame) / 1000));
            lastMiniGameFrame = timestamp;

            if (timestamp >= nextMiniGameSpawnAt && activeFallingItems.length < 7) {
                spawnItem();
                nextMiniGameSpawnAt = timestamp + getMiniGameDelay(timestamp);
            }

            cacheMiniGameLayout();

            for (let i = activeFallingItems.length - 1; i >= 0; i--) {
                const obj = activeFallingItems[i];
                obj.y += obj.speed * delta;
                obj.el.style.transform = `translate3d(${obj.x}px, ${obj.y}px, 0)`;

                const itemLeft = obj.x + 4;
                const itemRight = obj.x + obj.size - 4;
                const itemBottom = obj.y + obj.size;

                if (itemBottom >= cachedBasketTop &&
                    itemRight > cachedBasketLeft + 18 &&
                    itemLeft < cachedBasketRight - 18) {
                    handleMiniGameCatch(obj, i);
                    if (!isMiniGameActive) return;
                } else if (obj.y > cachedAreaHeight + 80) {
                    obj.el.remove();
                    activeFallingItems.splice(i, 1);
                }
            }

            miniGameAnimationId = requestAnimationFrame(miniGameLoop);
        }

        function handleMiniGameCatch(obj, index) {
            obj.el.remove();
            activeFallingItems.splice(index, 1);

            if (obj.item === '💣') {
                playBombSound();
                basket.classList.add('animate-wiggle');
                speak("Oh no! A bomb!");
                setTimeout(() => basket.classList.remove('animate-wiggle'), 500);
                endMiniGame();
                return;
            }

            playCatchSound();
            fruitScore++;

            const plusOne = document.createElement('div');
            plusOne.innerText = '+1';
            plusOne.className = 'absolute title-text font-black text-5xl animate-bounce-in z-50 pointer-events-none';
            plusOne.style.left = `${Math.min(cachedAreaWidth - 80, Math.max(20, obj.x))}px`;
            plusOne.style.top = `${Math.max(20, cachedBasketTop - 50)}px`;
            miniGameArea.appendChild(plusOne);
            setTimeout(() => plusOne.remove(), 600);

            fruitScoreEl.innerText = fruitScore;
            basket.style.transform = 'translateX(-50%) scale(1.08) translateY(8px)';
            setTimeout(() => basket.style.transform = 'translateX(-50%) scale(1) translateY(0)', 90);
        }

        function setupMiniGameControls() {
            miniGameArea.addEventListener('touchmove', handleMove, {passive: false});
            miniGameArea.addEventListener('mousemove', handleMove);
            window.addEventListener('resize', cacheMiniGameLayout);
        }
        function teardownMiniGameControls() {
            miniGameArea.removeEventListener('touchmove', handleMove);
            miniGameArea.removeEventListener('mousemove', handleMove);
            window.removeEventListener('resize', cacheMiniGameLayout);
        }
        function handleMove(e) {
            if(!isMiniGameActive) return;
            e.preventDefault();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const rect = miniGameArea.getBoundingClientRect();
            let relativeX = clientX - rect.left;
            basketPosition = (relativeX / rect.width) * 100;
            updateBasketPosition();
        }
        function updateBasketPosition() {
            basketPosition = Math.max(10, Math.min(90, basketPosition)); 
            basket.style.left = `${basketPosition}%`;
            cacheMiniGameLayout();
        }

        function restartGame() {
            stopFireworks();
            score = 0;
            fruitScore = 0;
            lastGeneratorIdx = -1;
            fruitScoreEl.innerText = '0';
            document.getElementById('victory-modal').classList.add('hidden');
            updateStars();
            renderLevel();
        }

        // --- Canvas Fireworks System ---
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let fireworksAnimId;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 12 + 4;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.friction = 0.95; this.gravity = 0.2;
                this.alpha = 1; this.decay = Math.random() * 0.015 + 0.01;
                this.size = Math.random() * 8 + 4;
            }
            update() {
                this.vx *= this.friction; this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx; this.y += this.vy;
                this.alpha -= this.decay;
            }
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.alpha);
                ctx.beginPath();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.vx * 0.5);
                ctx.rect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function startFireworks() {
            resizeCanvas();
            particles = [];
            for (let burst = 0; burst < 5; burst++) {
                const x = (burst + 0.5) * canvas.width / 5;
                const y = 30 + Math.random() * Math.min(120, canvas.height * 0.15);
                const color = flatColors[burst % flatColors.length].main;
                for (let i = 0; i < 55; i++) particles.push(new Particle(x, y, color));
            }
            
            function loop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if(Math.random() < 0.13) {
                    const x = Math.random() * canvas.width;
                    const y = 20 + Math.random() * Math.min(150, canvas.height * 0.18);
                    const color = flatColors[Math.floor(Math.random()*flatColors.length)].main;
                    for(let i=0; i<70; i++) particles.push(new Particle(x, y, color));
                    
                    if(Math.random() < 0.4) playTone(500 + Math.random()*600, 'triangle', 0.15, 0.08);
                }

                particles.forEach((p, index) => {
                    p.update();
                    p.draw(ctx);
                    if(p.alpha <= 0) particles.splice(index, 1);
                });

                fireworksAnimId = requestAnimationFrame(loop);
            }
            loop();
        }

        function stopFireworks() {
            cancelAnimationFrame(fireworksAnimId);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    </script>
</body>
