<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mass Adventure - Heavy or Light?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            touch-action: manipulation;
            user-select: none;
            overflow: hidden;
            background: #bae6fd;
        }

        /* --- BEAUTIFUL TYPOGRAPHY --- */
        .text-fun-title {
            background: linear-gradient(to bottom, #fde047, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 6px 0px #b45309) drop-shadow(0px 10px 15px rgba(0,0,0,0.3));
            letter-spacing: 2px;
        }

        .text-fun-subtitle {
            color: #fff;
            text-shadow: 
                3px 3px 0 #ec4899,
                -2px -2px 0 #ec4899,  
                2px -2px 0 #ec4899,
                -2px 2px 0 #ec4899,
                2px 2px 0 #ec4899,
                0 8px 15px rgba(0,0,0,0.4);
            letter-spacing: 1px;
        }

        /* --- BACKGROUND ELEMENTS --- */
        .sky-bg {
            background: linear-gradient(to bottom, #0ea5e9 0%, #38bdf8 40%, #bae6fd 100%);
            position: relative;
        }

        .sun {
            position: absolute;
            top: -20px;
            left: -20px;
            width: clamp(100px, 15vw, 160px);
            height: clamp(100px, 15vw, 160px);
            background: radial-gradient(circle, #fef08a 20%, #facc15 60%, transparent 75%);
            border-radius: 50%;
            box-shadow: 0 0 50px 25px rgba(253, 224, 71, 0.4);
            animation: sun-glow 5s infinite alternate ease-in-out;
            z-index: 0;
        }

        @keyframes sun-glow {
            from { transform: scale(1); opacity: 0.8; }
            to { transform: scale(1.1); opacity: 1; }
        }

        .cloud-container {
            position: absolute;
            z-index: 0;
            filter: drop-shadow(0 10px 15px rgba(255, 255, 255, 0.3));
        }
        
        .cloud-float { animation: float-h 45s infinite linear; }
        .cloud-bob { animation: bob 4s infinite alternate ease-in-out; }

        @keyframes float-h {
            from { transform: translateX(-250px); }
            to { transform: translateX(100vw); }
        }

        @keyframes bob {
            from { transform: translateY(0px); }
            to { transform: translateY(15px); }
        }

        .grass-ground {
            background-color: #22c55e;
            background-image: 
                radial-gradient(circle at 10% 20%, #16a34a 2%, transparent 2.5%),
                radial-gradient(circle at 90% 80%, #16a34a 2%, transparent 2.5%);
            background-size: 60px 60px;
        }

        /* --- ENHANCED BALANCE SCALE WITH CHAINS --- */
        .scale-wrapper {
            position: absolute;
            bottom: 25vh; /* Sits exactly on grass */
            left: 50%;
            transform: translateX(-50%);
            width: min(90vw, 500px);
            height: min(40vh, 350px);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 10;
        }

        .scale-base {
            width: 45%;
            height: 30px;
            background: linear-gradient(to bottom, #d97706, #78350f);
            border-radius: 15px 15px 8px 8px;
            position: absolute;
            bottom: 0;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4), inset 0 3px 5px rgba(255,255,255,0.3);
            border: 2px solid #451a03;
        }

        .scale-pillar {
            width: 24px;
            height: 65%;
            background: linear-gradient(to right, #b45309, #f59e0b, #b45309);
            position: absolute;
            bottom: 25px;
            border-radius: 12px 12px 0 0;
            border: 2px solid #78350f;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        .scale-pivot {
            width: 36px;
            height: 36px;
            background: radial-gradient(circle at 30% 30%, #fef08a, #d97706, #78350f);
            border: 3px solid #78350f;
            border-radius: 50%;
            position: absolute;
            bottom: calc(65% + 5px);
            z-index: 20;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }

        .scale-beam {
            width: 100%;
            height: 14px;
            background: linear-gradient(to bottom, #fcd34d, #d97706, #92400e);
            position: absolute;
            bottom: calc(65% + 15px);
            border-radius: 7px;
            transition: transform 0.9s cubic-bezier(0.45, 0, 0.55, 1);
            transform-origin: center;
            border: 2px solid #78350f;
            z-index: 15;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        }

        .pan-container {
            position: absolute;
            top: 7px;
            width: 30%;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.9s cubic-bezier(0.45, 0, 0.55, 1);
        }

        .scale-pan {
            width: 100%;
            height: 25px;
            background: linear-gradient(to bottom, #fcd34d, #d97706);
            border-radius: 0 0 50px 50px;
            margin-top: clamp(45px, 8vh, 75px);
            border: 3px solid #92400e;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3), inset 0 2px 5px rgba(255,255,255,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- REALISTIC BOWLING --- */
        .bowling-lane-realistic {
            background: linear-gradient(to bottom, #92400e 0%, #d97706 100%);
            width: min(85vw, 400px);
            height: 45vh;
            border-radius: 20px 20px 0 0;
            position: relative;
            box-shadow: 
                inset 15px 0 20px rgba(0,0,0,0.4),
                inset -15px 0 20px rgba(0,0,0,0.4),
                0 15px 25px rgba(0,0,0,0.5);
            border: 6px solid #451a03;
            border-bottom: none;
            overflow: hidden;
        }

        .lane-lines {
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 25px,
                rgba(0,0,0,0.15) 25px,
                rgba(0,0,0,0.15) 27px
            );
        }

        .pin-wrapper {
            position: absolute;
            font-size: clamp(2rem, 6vw, 3rem);
            transform-origin: bottom center;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 6px 6px rgba(0,0,0,0.4));
            z-index: 10;
        }

        .bowling-ball-real {
            width: clamp(50px, 12vw, 70px);
            height: clamp(50px, 12vw, 70px);
            background: radial-gradient(circle at 30% 30%, #64748b, #0f172a);
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6), inset -5px -5px 15px rgba(0,0,0,0.8);
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
            cursor: pointer;
        }

        .ball-holes {
            position: absolute;
            top: 20%;
            right: 20%;
            width: 30%;
            height: 30%;
        }

        .hole {
            background: #000;
            border-radius: 50%;
            position: absolute;
            box-shadow: inset 1px 1px 3px rgba(255,255,255,0.3);
        }

        /* --- UI HELPERS --- */
        .pop-in { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .wiggle { animation: wiggle 0.4s ease-in-out; }
        @keyframes wiggle {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px) rotate(-5deg); }
            50% { transform: translateX(8px) rotate(5deg); }
            75% { transform: translateX(-8px) rotate(-5deg); }
        }

        .emoji-shadow {
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3));
        }

        #fireworksCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body class="sky-bg h-screen w-screen overflow-hidden flex flex-col relative text-slate-800">
    <img src="../assets/logo-oodles-math.png" class="oodles-logo absolute top-4 right-4 w-24 sm:w-32 z-30" onerror="this.style.display='none'">
    
    <!-- Environment -->
    <div class="sun"></div>
    <div class="cloud-container cloud-float" style="top: 5%; animation-duration: 50s; opacity: 0.9;">
        <div class="cloud-bob"><svg width="140" height="80" viewBox="0 0 180 100" fill="white"><circle cx="40" cy="60" r="35"/><circle cx="85" cy="45" r="45"/><circle cx="135" cy="60" r="35"/><rect x="40" y="65" width="95" height="30"/></svg></div>
    </div>
    <div class="cloud-container cloud-float" style="top: 15%; animation-duration: 35s; animation-delay: -10s; opacity: 0.7;">
        <div class="cloud-bob" style="animation-delay: -1s;"><svg width="100" height="60" viewBox="0 0 140 80" fill="white"><circle cx="30" cy="50" r="25"/><circle cx="65" cy="35" r="35"/><circle cx="105" cy="50" r="25"/><rect x="30" y="55" width="75" height="20"/></svg></div>
    </div>

    <div class="absolute bottom-0 left-0 w-full h-[25vh] grass-ground border-t-8 border-green-500 shadow-[inset_0_10px_20px_rgba(0,0,0,0.1)] z-0"></div>

    <!-- SCREENS -->
    
    <!-- Start Screen -->
    <div id="screen-start" class="absolute inset-0 z-50 flex items-center justify-center bg-black/30 backdrop-blur-sm">
        <div class="bg-white/90 backdrop-blur rounded-[3rem] p-8 sm:p-12 max-w-md w-[90%] text-center shadow-2xl border-[10px] border-white pop-in">
            <h1 class="text-6xl sm:text-7xl font-black mb-2 text-fun-title">MASS</h1>
            <h2 class="text-3xl sm:text-4xl font-black mb-10 text-fun-subtitle">ADVENTURE</h2>
            
            <div class="flex justify-center gap-6 mb-12 text-6xl sm:text-7xl emoji-shadow">
                <div class="animate-bounce" style="animation-delay: 0s">🎈</div>
                <div class="animate-bounce" style="animation-delay: 0.1s">⚖️</div>
                <div class="animate-bounce" style="animation-delay: 0.2s">🐘</div>
            </div>
            
            <button onclick="startGame()" class="w-full bg-gradient-to-b from-green-400 to-green-600 hover:from-green-500 hover:to-green-700 text-white text-3xl font-black py-4 rounded-3xl shadow-[0_8px_0_rgb(21,128,61)] active:shadow-none active:translate-y-2 transition-all border-4 border-green-300">
                PLAY! ▶
            </button>
        </div>
    </div>

    <!-- Game UI -->
    <div id="game-ui" class="hidden absolute top-0 left-0 w-full p-4 sm:p-6 z-30 flex flex-col items-center gap-3">
        <div class="w-full max-w-4xl flex flex-wrap justify-between items-center gap-4">
            <!-- Score -->
            <div class="bg-white/95 backdrop-blur rounded-2xl px-5 py-2 border-4 border-yellow-400 shadow-xl flex items-center gap-3">
                <div class="text-2xl animate-pulse">⭐</div>
                <span id="score-text" class="text-2xl font-black text-yellow-600">0</span>
            </div>

            <!-- Question Area -->
            <div class="bg-white/95 backdrop-blur-md px-6 sm:px-10 py-3 rounded-full shadow-2xl border-4 border-indigo-100 flex items-center gap-4">
                <h2 id="question-text" class="text-xl sm:text-3xl font-black text-slate-800 text-center">
                    Which is <span class="text-rose-500">HEAVIER</span>?
                </h2>
                <button onclick="readQuestion()" class="w-12 h-12 bg-sky-100 hover:bg-sky-200 rounded-full flex items-center justify-center border-4 border-sky-300 text-xl shadow-md active:scale-95 transition-transform">
                    🔊
                </button>
            </div>

            <!-- Level -->
            <div class="bg-gradient-to-b from-indigo-500 to-indigo-700 text-white px-5 py-2 rounded-2xl border-4 border-indigo-300 shadow-xl flex flex-col items-center">
                <span id="level-text" class="text-2xl font-black leading-none tracking-wider">1/10</span>
            </div>
        </div>
    </div>

    <!-- Main Game Scene -->
    <main id="game-main" class="hidden flex-1 w-full flex flex-col justify-end items-center relative z-10">
        <div class="scale-wrapper">
            <!-- Base & Pillar -->
            <div class="scale-base"></div>
            <div class="scale-pillar"></div>
            <div class="scale-pivot"></div>
            
            <!-- Beam -->
            <div id="scale-beam" class="scale-beam">
                <!-- Left Pan -->
                <div id="pan-left-container" class="pan-container" style="left: -5%;">
                    <!-- Chain SVG -->
                    <svg class="absolute top-[-70px] w-full h-[70px] opacity-70" viewBox="0 0 100 70" preserveAspectRatio="none">
                        <line x1="50" y1="0" x2="10" y2="70" stroke="#451a03" stroke-width="3" stroke-dasharray="6,4" />
                        <line x1="50" y1="0" x2="90" y2="70" stroke="#451a03" stroke-width="3" stroke-dasharray="6,4" />
                    </svg>
                    <div id="pan-left-box" class="scale-pan">
                        <div id="obj-left" class="text-5xl sm:text-7xl cursor-pointer hover:scale-110 transition-transform active:scale-95 mb-20 sm:mb-24 emoji-shadow" onclick="checkAnswer('left')">🍎</div>
                    </div>
                </div>

                <!-- Right Pan -->
                <div id="pan-right-container" class="pan-container" style="right: -5%;">
                    <!-- Chain SVG -->
                    <svg class="absolute top-[-70px] w-full h-[70px] opacity-70" viewBox="0 0 100 70" preserveAspectRatio="none">
                        <line x1="50" y1="0" x2="10" y2="70" stroke="#451a03" stroke-width="3" stroke-dasharray="6,4" />
                        <line x1="50" y1="0" x2="90" y2="70" stroke="#451a03" stroke-width="3" stroke-dasharray="6,4" />
                    </svg>
                    <div id="pan-right-box" class="scale-pan">
                        <div id="obj-right" class="text-5xl sm:text-7xl cursor-pointer hover:scale-110 transition-transform active:scale-95 mb-20 sm:mb-24 emoji-shadow" onclick="checkAnswer('right')">🐘</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bowling Bonus Scene -->
    <div id="screen-bowling" class="hidden absolute inset-0 z-40 flex items-center justify-center bg-black/60 backdrop-blur-sm">
        <div class="bg-white rounded-[3rem] p-6 sm:p-8 text-center shadow-[0_0_50px_rgba(0,0,0,0.5)] border-8 border-indigo-400 pop-in flex flex-col items-center">
            <h2 class="text-3xl sm:text-5xl font-black mb-6 text-fun-title">Bowling Time! 🎳</h2>
            
            <div class="bowling-lane-realistic flex justify-center">
                <div class="lane-lines"></div>
                <!-- Pins Area -->
                <div id="bowling-area" class="absolute inset-0 w-full h-full"></div>
                
                <!-- Realistic Ball -->
                <div id="bowling-ball" class="bowling-ball-real" onclick="throwBall()">
                    <div class="ball-holes">
                        <div class="hole w-[25%] h-[25%] top-0 left-0"></div>
                        <div class="hole w-[25%] h-[25%] top-[10%] right-[10%]"></div>
                        <div class="hole w-[35%] h-[35%] bottom-0 left-[20%]"></div>
                    </div>
                </div>
            </div>
            
            <p class="text-xl font-black text-indigo-500 mt-6 animate-pulse uppercase tracking-wider">Tap the ball to throw!</p>
        </div>
    </div>

    <canvas id="fireworksCanvas"></canvas>

    <script>
        // --- Updated Robust Config ---
        // Removed problematic emojis (feather, rock) and replaced with universal ones
        const ITEMS = [
            { id: 'butterfly', emoji: '🦋', mass: 1, category: 'light' },
            { id: 'leaf', emoji: '🍃', mass: 2, category: 'light' },
            { id: 'balloon', emoji: '🎈', mass: 3, category: 'light' },
            { id: 'strawberry', emoji: '🍓', mass: 5, category: 'light' },
            { id: 'apple', emoji: '🍎', mass: 10, category: 'light' },
            { id: 'toy_bear', emoji: '🧸', mass: 20, category: 'light' },
            { id: 'watermelon', emoji: '🍉', mass: 100, category: 'heavy' },
            { id: 'brick', emoji: '🧱', mass: 300, category: 'heavy' },
            { id: 'dumbbell', emoji: '🏋️', mass: 500, category: 'heavy' },
            { id: 'car', emoji: '🚗', mass: 1500, category: 'heavy' },
            { id: 'bus', emoji: '🚌', mass: 3000, category: 'heavy' },
            { id: 'elephant', emoji: '🐘', mass: 5000, category: 'heavy' },
            { id: 'whale', emoji: '🐋', mass: 8000, category: 'heavy' },
            { id: 'house', emoji: '🏠', mass: 10000, category: 'heavy' }
        ];

        let state = {
            score: 0,
            level: 1,
            maxLevels: 10,
            currentQuestion: 'heavier',
            leftItem: null,
            rightItem: null,
            busy: false,
            bowlingActive: false
        };

        // --- Audio ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(523, now);
                osc.frequency.exponentialRampToValueAtTime(880, now + 0.2);
                gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(220, now);
                gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            } else if (type === 'hit') {
                osc.type = 'square'; osc.frequency.setValueAtTime(100, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
                gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            }
        }

        function readQuestion() {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const text = `Which is ${state.currentQuestion}?`;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9; // Slightly slower for kids
            window.speechSynthesis.speak(utterance);
        }

        // --- UI Screens ---
        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            document.getElementById('game-main').classList.remove('hidden');
            state.score = 0;
            state.level = 1;
            nextLevel();
        }

        function nextLevel() {
            state.busy = false;
            updateUI();
            let items = [...ITEMS].sort(() => Math.random() - 0.5);
            state.leftItem = items[0];
            state.rightItem = items[1];
            if (state.leftItem.id === state.rightItem.id) return nextLevel();
            state.currentQuestion = Math.random() > 0.5 ? 'heavier' : 'lighter';
            renderLevel();
            setTimeout(readQuestion, 500);
        }

        function renderLevel() {
            const leftEl = document.getElementById('obj-left');
            const rightEl = document.getElementById('obj-right');
            const questionEl = document.getElementById('question-text');
            const beam = document.getElementById('scale-beam');
            const panLeft = document.getElementById('pan-left-container');
            const panRight = document.getElementById('pan-right-container');
            const panLeftBox = document.getElementById('pan-left-box');
            const panRightBox = document.getElementById('pan-right-box');

            leftEl.innerText = state.leftItem.emoji;
            rightEl.innerText = state.rightItem.emoji;
            
            const colorClass = state.currentQuestion === 'heavier' ? 'text-rose-500' : 'text-sky-500';
            questionEl.innerHTML = `Which is <span class="${colorClass} underline decoration-4 underline-offset-4 uppercase">${state.currentQuestion}</span>?`;

            let tilt = 0;
            if (state.leftItem.mass > state.rightItem.mass) tilt = -16;
            else if (state.leftItem.mass < state.rightItem.mass) tilt = 16;

            beam.style.transform = `rotate(${tilt}deg)`;
            const tiltRad = tilt * (Math.PI / 180);
            const drop = Math.abs(Math.sin(tiltRad) * 200); 
            
            panLeft.style.transform = `translateY(${tilt < 0 ? drop : -drop}px)`;
            panRight.style.transform = `translateY(${tilt > 0 ? drop : -drop}px)`;
            panLeftBox.style.transform = `rotate(${-tilt}deg)`;
            panRightBox.style.transform = `rotate(${-tilt}deg)`;
        }

        function checkAnswer(side) {
            if (state.busy) return;
            const isHeavier = state.leftItem.mass > state.rightItem.mass ? 'left' : 'right';
            const isCorrect = (state.currentQuestion === 'heavier' && side === isHeavier) || 
                              (state.currentQuestion === 'lighter' && side !== isHeavier);

            if (isCorrect) {
                handleCorrect();
            } else {
                handleWrong(side);
            }
        }

        function handleCorrect() {
            state.busy = true;
            state.score += 10;
            playSfx('correct');
            triggerFireworks();
            setTimeout(startBowling, 1500);
        }

        function handleWrong(side) {
            playSfx('wrong');
            const el = document.getElementById(side === 'left' ? 'obj-left' : 'obj-right');
            el.classList.add('wiggle');
            setTimeout(() => el.classList.remove('wiggle'), 400);
        }

        function updateUI() {
            document.getElementById('score-text').innerText = state.score;
            document.getElementById('level-text').innerText = `${state.level}/${state.maxLevels}`;
        }

        // --- ENHANCED BOWLING GAME LOGIC ---
        function startBowling() {
            state.bowlingActive = true;
            document.getElementById('screen-bowling').classList.remove('hidden');
            const area = document.getElementById('bowling-area');
            const ball = document.getElementById('bowling-ball');
            
            area.innerHTML = '';
            
            // Reset ball properties
            ball.style.bottom = '20px';
            ball.style.transform = 'translateX(-50%) scale(1)';
            ball.style.opacity = '1';

            // Create Pins in Triangle Formation
            const pinLayout = [
                { top: '15%', left: '50%' }, // Row 1 (back)
                { top: '25%', left: '40%' }, { top: '25%', left: '60%' }, // Row 2
                { top: '38%', left: '30%' }, { top: '38%', left: '50%' }, { top: '38%', left: '70%' } // Row 3 (front)
            ];

            pinLayout.forEach((pos, i) => {
                const pin = document.createElement('div');
                pin.className = 'pin-wrapper';
                pin.innerText = '🎳';
                pin.style.top = pos.top;
                pin.style.left = pos.left;
                pin.style.transform = 'translateX(-50%)';
                area.appendChild(pin);
            });
        }

        function throwBall() {
            if (!state.bowlingActive) return;
            state.bowlingActive = false;
            
            const ball = document.getElementById('bowling-ball');
            // Animate ball moving forward (shrinking gives 3D perspective effect)
            ball.style.bottom = '70%';
            ball.style.transform = 'translateX(-50%) scale(0.4) rotate(720deg)';
            
            setTimeout(() => {
                playSfx('hit');
                const pins = document.querySelectorAll('.pin-wrapper');
                pins.forEach(pin => {
                    // Explosion effect for pins
                    const rotate = Math.random() * 120 - 60;
                    const flyX = Math.random() * 100 - 50;
                    const flyY = -(Math.random() * 50 + 50);
                    
                    pin.style.transform = `translate(calc(-50% + ${flyX}px), ${flyY}px) rotate(${rotate}deg) scale(0.5)`;
                    pin.style.opacity = '0';
                });
                
                // Hide ball after strike
                ball.style.opacity = '0';
                
                // Extra score for strike
                state.score += 5;
                updateUI();
                triggerFireworks();
                
                setTimeout(() => {
                    document.getElementById('screen-bowling').classList.add('hidden');
                    if (state.level >= state.maxLevels) {
                        showGameOver();
                    } else {
                        state.level++;
                        nextLevel();
                    }
                }, 1500);
            }, 600); // Wait for ball to reach pins
        }

        function showGameOver() {
            const final = document.createElement('div');
            final.className = "fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-md";
            final.innerHTML = `
                <div class="bg-white/95 rounded-[3rem] p-12 text-center shadow-[0_0_50px_rgba(0,0,0,0.5)] border-[10px] border-green-400 pop-in">
                    <h1 class="text-6xl font-black mb-4 text-fun-title">AWESOME!</h1>
                    <div class="text-8xl mb-8 emoji-shadow animate-bounce">🏆</div>
                    <p class="text-3xl font-black text-slate-700 mb-8 uppercase tracking-widest">Score: <span class="text-yellow-500">${state.score}</span></p>
                    <button onclick="location.reload()" class="w-full bg-gradient-to-b from-indigo-400 to-indigo-600 hover:from-indigo-500 hover:to-indigo-700 text-white text-3xl font-black py-5 rounded-3xl shadow-[0_8px_0_rgb(67,56,202)] active:translate-y-2 transition-all border-4 border-indigo-300">
                        PLAY AGAIN! ↺
                    </button>
                </div>
            `;
            document.body.appendChild(final);
        }

        // --- Visual Effects ---
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeFw() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeFw);
        resizeFw();

        function animateFw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.alpha -= 0.015;
                ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; 
                ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI * 2); ctx.fill(); ctx.restore();
                if (p.alpha <= 0) particles.splice(index, 1);
            });
            requestAnimationFrame(animateFw);
        }
        animateFw();

        function triggerFireworks() {
            const colors = ['#facc15', '#3b82f6', '#ef4444', '#22c55e', '#ec4899', '#a855f7'];
            for(let i=0; i<4; i++) {
                setTimeout(() => {
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * (canvas.height * 0.6); // Keep fireworks in upper part
                    const color = colors[Math.floor(Math.random()*colors.length)];
                    for(let j=0; j<25; j++) {
                        particles.push({
                            x, y, vx: Math.cos(j)*Math.random()*10, vy: Math.sin(j)*Math.random()*10, color, alpha: 1
                        });
                    }
                }, i * 150);
            }
        }
    </script>
</body>
</html>
