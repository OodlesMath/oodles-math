<!DOCTYPE html>
<html lang="en">
<head>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fruit & Candy Catcher V4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Confetti Library for End Game Celebration -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap');
        
        :root {
            --c-blue: #1CB0F6;
            --c-blue-dark: #1899D6;
            --c-green: #58CC02;
            --c-green-dark: #58A700;
            --c-red: #FF4B4B;
            --c-red-dark: #EA2B2B;
            --c-yellow: #FFC800;
            --font-main: 'Poppins', sans-serif;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: var(--font-main);
        }

        body {
            background-color: transparent;
            min-height: 100vh;
            overflow: hidden; /* Prevent scrolling */
            margin: 0;
            padding: 0;
        }

        /* ==================================================== */
        /* SCENERY BACKGROUND CSS */
        /* ==================================================== */
        .scenery-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -10;
            overflow: hidden;
            background: linear-gradient(to bottom, #6EE2FF, #C9F0FF);
        }
        .scenery-sun {
            position: absolute;
            top: 2rem; left: 2rem;
            width: 5rem; height: 5rem;
            background-color: #FFD166;
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(255,209,102,0.8);
            animation: sun-pulse 4s ease-in-out infinite;
        }
        @media (min-width: 640px) {
            .scenery-sun { top: 4rem; left: 6rem; width: 8rem; height: 8rem; }
        }
        .scenery-rainbow {
            position: absolute;
            bottom: 20%; left: 50%;
            transform: translateX(-50%);
            width: 150%;
            min-width: 800px; max-width: 1400px;
            opacity: 0.6;
            z-index: 1; /* Cầu vồng nằm ở lớp dưới */
        }
        .scenery-cloud {
            position: absolute;
            color: white;
            filter: drop-shadow(0 4px 3px rgba(0,0,0,0.07));
        }
        .scenery-cloud-1 { top: 10%; opacity: 0.9; width: 6rem; animation: cloud-fly 45s linear infinite; animation-delay: -5s; }
        .scenery-cloud-2 { top: 25%; opacity: 0.8; width: 8rem; animation: cloud-fly 60s linear infinite; animation-delay: -30s; }
        .scenery-cloud-3 { top: 5%; opacity: 0.8; width: 5rem; animation: cloud-fly 30s linear infinite; animation-delay: -15s; }
        
        .scenery-grass-1 { position: absolute; bottom: 0; width: 100%; height: 25vh; z-index: 2; }
        .scenery-grass-2 { position: absolute; bottom: 0; width: 100%; height: 15vh; z-index: 3; }

        .scenery-flowers-container {
            position: absolute; bottom: 0; width: 100%; height: 15vh;
            overflow: hidden; pointer-events: none;
            z-index: 4;
        }
        .scenery-flower {
            position: absolute;
            animation: wiggle 2s ease-in-out infinite;
        }
        
        .tree {
            position: absolute;
            bottom: 12vh;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
            z-index: 5; /* Cho cây nằm đè lên cầu vồng */
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }
        @keyframes cloud-fly {
            0% { transform: translateX(-15vw); }
            100% { transform: translateX(115vw); }
        }
        @keyframes sun-pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 80px rgba(255,209,102,1); }
        }

        /* ==================================================== */
        /* GAME SPECIFIC STYLES */
        /* ==================================================== */
        #gameCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 10;
            touch-action: none;
        }

        .hud-container {
            position: fixed;
            top: 20px; left: 20px; right: 20px;
            display: flex;
            justify-content: flex-start; /* Căn trái */
            gap: 15px; /* Khoảng cách giữa điểm và tim */
            z-index: 20;
            pointer-events: none;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255,255,255,0.5);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .score-badge {
            background: linear-gradient(to right, #fbbf24, #f59e0b);
            border-bottom: 4px solid #b45309;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .lives-badge {
            background: white;
            border-bottom: 4px solid var(--c-gray-mid, #e2e8f0);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .lives-badge.shake {
            animation: shakeLives 0.4s;
            border-bottom-color: var(--c-red);
        }

        @keyframes shakeLives {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 4px solid white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transform: scale(0.9);
            animation: popIn 0.4s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            to { transform: scale(1); }
        }

        .btn-primary {
            background: var(--c-green);
            color: white;
            border: none;
            border-bottom: 6px solid var(--c-green-dark);
            padding: 15px 40px;
            font-size: 1.6rem;
            font-weight: 900;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.1s;
            text-transform: uppercase;
            width: 100%;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-primary:active {
            transform: translateY(6px);
            border-bottom: 0px;
            margin-top: 26px;
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- ================= SCENERY BACKGROUND ================= -->
    <div class="scenery-bg">
        <div class="scenery-sun"></div>
        <svg class="scenery-rainbow" viewBox="0 0 100 50">

        <svg class="scenery-cloud scenery-cloud-3" viewBox="0 0 24 24"><path fill="currentColor" d="M17.5,19c2.48,0,4.5-2.02,4.5-4.5c0-2.33-1.78-4.25-4.06-4.47c-0.65-2.9-3.26-5.03-6.44-5.03c-2.81,0-5.21,1.75-6.19,4.24C2.5,9.45,0.5,11.83,0.5,14.5C0.5,17.53,2.97,20,6,20h11.5V19z"/></svg>

        <svg class="scenery-grass-1" preserveAspectRatio="none" viewBox="0 0 1440 320"><path fill="#7ED321" d="M0,160L48,154.7C96,149,192,139,288,144C384,149,480,171,576,176C672,181,768,171,864,149.3C960,128,1056,96,1152,90.7C1248,85,1344,107,1392,117.3L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>
        <svg class="scenery-grass-2" preserveAspectRatio="none" viewBox="0 0 1440 320"><path fill="#52B700" d="M0,224L60,208C120,192,240,160,360,160C480,160,600,192,720,202.7C840,213,960,203,1080,186.7C1200,171,1320,149,1380,138.7L1440,128L1440,320L1380,320C1320,320,1200,320,1080,320C960,320,840,320,720,320C600,320,480,320,360,320C240,320,120,320,60,320L0,320Z"></path></svg>

        <div class="scenery-flowers-container">
            <span class="scenery-flower flower-1" style="bottom: 20%; left: 5%; font-size: 2rem;">🌸</span>
            <span class="scenery-flower flower-2" style="bottom: 40%; left: 25%; font-size: 1.5rem; animation-delay: 0.4s">🌼</span>

    <!-- ================= END SCENERY ================= -->

    <!-- HEADS UP DISPLAY (HUD) -->
    <div class="hud-container hidden" id="hud">
        <div class="score-badge">
            ⭐ <span id="score-text">0</span>
        </div>
        <!-- Block mạng (Tim) ngay cạnh block tính sao -->
        <div class="lives-badge" id="lives-container">
            <!-- Hearts injected here -->
        </div>
    </div>

    <!-- GAME CANVAS -->
    <canvas id="gameCanvas"></canvas>

    <!-- START SCREEN -->
    <div id="start-screen" class="modal-overlay">
        <div class="modal-content glass-panel" style="border-color: var(--c-blue);">
            <div class="text-7xl mb-4">🍎</div>
            <h1 class="text-4xl md:text-5xl font-black text-sky-500 mb-2 leading-tight">Fruit & Candy<br>Catch!</h1>
            <p class="text-slate-500 text-lg mb-8 font-semibold">Catch to score points!<br><span class="text-red-500">Only BOMB 💣 hurts you!</span></p>
            <button class="btn-primary" onclick="startGame()">
                <svg width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>

    <!-- GAME OVER SCREEN -->
    <div id="game-over-screen" class="modal-overlay hidden">

            <p id="go-reason" class="text-slate-500 text-xl mb-6 font-semibold">You caught 3 BOMBS!</p>
            
            <div class="bg-slate-100 rounded-3xl p-6 mb-8 border-2 border-slate-200">
                <p class="text-slate-400 font-bold uppercase tracking-widest text-sm mb-2">Final Score</p>
                <div class="text-6xl font-black text-yellow-500"><span id="final-score">0</span></div>
            </div>

            <button class="btn-primary" style="background: var(--c-blue); border-bottom-color: var(--c-blue-dark);" onclick="startGame()">
                <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                PLAY AGAIN!
            </button>
        </div>
    </div>

    <script>
        // --- AUDIO SYSTEM ---
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if(AudioContextClass) audioCtx = new AudioContextClass();
            }
        }

        function playSound(type) {
            initAudio();
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            if (type === 'catch') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'gameover') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.5);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            } else if (type === 'explosion') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.exponentialRampToValueAtTime(10, now + 0.5);
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            }
        }

        // --- GAME LOGIC ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let state = 'START'; // START, PLAYING, GAMEOVER
        let score = 0;
        let lives = 3;
        let items = [];
        let animationId;
        let gameStartTime = 0;

        const GOOD_EMOJIS = ['🍎', '🍌', '🍉', '🍇', '🍓', '🍒', '🍑', '🍬', '🍭', '🥝', '🍍'];
        const BOMB_EMOJI = '💣';
        
        // Basket Object
        let basket = {
            x: window.innerWidth / 2,
            y: window.innerHeight - 100,
            w: 120, // Width rổ vẽ tay
            h: 70
        };

        // Handle Resize
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Reposition basket relatively
            basket.y = canvas.height - Math.min(120, canvas.height * 0.15); 
            // Responsive basket width
            basket.w = Math.max(90, Math.min(140, canvas.width * 0.2));
            basket.h = basket.w * 0.6;
        }
        window.addEventListener('resize', resize);
        resize();

        // Handle Input
        function moveBasket(x) {
            basket.x = x;
            if (basket.x < basket.w/2) basket.x = basket.w/2;
            if (basket.x > canvas.width - basket.w/2) basket.x = canvas.width - basket.w/2;
        }

        window.addEventListener('mousemove', (e) => {
            if(state === 'PLAYING') moveBasket(e.clientX);
        });

        window.addEventListener('touchmove', (e) => {
            if(state === 'PLAYING') {
                e.preventDefault(); 
                moveBasket(e.touches[0].clientX);
            }
        }, { passive: false });

        function updateHUD() {
            document.getElementById('score-text').innerText = score;
            const livesContainer = document.getElementById('lives-container');
            livesContainer.innerHTML = '';
            for(let i=0; i<3; i++) {
                livesContainer.innerHTML += i < lives ? '❤️' : '🤍';
            }
        }

        // Tạo hiệu ứng rung tim khi mất mạng
        function shakeHearts() {
            const livesContainer = document.getElementById('lives-container');
            livesContainer.classList.add('shake');
            setTimeout(() => {
                livesContainer.classList.remove('shake');
            }, 400);
        }

        function spawnItem() {
            let elapsedSeconds = (Date.now() - gameStartTime) / 1000;
            
            // Speed logic: Chậm ban đầu, tăng tốc ĐỘ sau mỗi 10 giây
            let phase = Math.floor(elapsedSeconds / 10); 
            let baseSpeed = 2 + (canvas.height / 500); // Tốc độ khởi điểm
            let speedMultiplier = 1 + (phase * 0.3); // Tăng 30% tốc độ mỗi 10s
            
            let speed = (baseSpeed + Math.random() * 2) * speedMultiplier;

            // Bomb logic: Bắt đầu có bom từ giây thứ 10. Số lượng tăng dần mỗi 10s
            let bombChance = 0;
            if (elapsedSeconds > 10) {
                // Tỉ lệ bom tăng dần sau mỗi giây trôi qua từ mốc 10s, giới hạn tối đa 50%
                bombChance = Math.min(0.5, (elapsedSeconds - 10) * 0.015);
            }

            let type = Math.random() < bombChance ? 'bomb' : 'good';
            let emoji = type === 'bomb' ? BOMB_EMOJI : GOOD_EMOJIS[Math.floor(Math.random() * GOOD_EMOJIS.length)];

            items.push({
                x: Math.random() * (canvas.width - 60) + 30,
                y: -50,
                speed: speed,
                emoji: emoji,
                type: type,
                size: type === 'bomb' ? 60 : 50 + Math.random() * 15
            });
        }

        // Draw Custom Basket (Mây Tre Đan)
        function drawBasket(ctx, x, y, w, h) {
            ctx.save();
            
            // Vẽ Quai xách (Handle)
            ctx.beginPath();
            ctx.arc(x, y - 5, w / 2 - 10, Math.PI, 0);
            ctx.strokeStyle = "#8B4513"; // SaddleBrown
            ctx.lineWidth = 8;
            ctx.stroke();

            // Vẽ Bóng rổ (Inner Shadow)
            ctx.beginPath();
            ctx.ellipse(x, y, w/2, h/4, 0, 0, Math.PI * 2);
            ctx.fillStyle = "#6B3E11";
            ctx.fill();

            // Vẽ Thân rổ (Body)
            ctx.beginPath();
            ctx.moveTo(x - w/2, y);
            ctx.lineTo(x + w/2, y);
            ctx.bezierCurveTo(x + w/2, y + h, x - w/2, y + h, x - w/2, y);
            ctx.fillStyle = "#D2691E"; // Chocolate
            ctx.fill();
            
            // Vẽ Viền rổ
            ctx.lineWidth = 4;
            ctx.strokeStyle = "#8B4513";
            ctx.stroke();

            // Vẽ Đai trang trí màu vàng
            ctx.fillStyle = "#FFD700"; // Gold
            ctx.beginPath();
            ctx.ellipse(x, y + h/3, w/2 - 8, h/6, 0, 0, Math.PI, false);
            ctx.fill();

            ctx.restore();
        }

        // Game Loop
        function update() {
            if (state !== 'PLAYING') return;

            let elapsedSeconds = (Date.now() - gameStartTime) / 1000;

            // Xóa canvas (trong suốt để thấy background CSS)
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Vẽ Rổ tự tuỳ chỉnh
            drawBasket(ctx, basket.x, basket.y, basket.w, basket.h);

            // Tỷ lệ thả item cũng tăng nhẹ theo thời gian
            let spawnRate = 0.015 + Math.min(0.06, elapsedSeconds * 0.001);
            if (Math.random() < spawnRate) {
                spawnItem();
            }

            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                item.y += item.speed;

                // Vẽ Item với đổ bóng 3D
                ctx.save();
                ctx.shadowColor = "rgba(0,0,0,0.3)";
                ctx.shadowBlur = 8;
                ctx.shadowOffsetY = 4;
                ctx.font = item.size + "px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(item.emoji, item.x, item.y);
                ctx.restore();

                // Kiểm tra va chạm (Collision) - Chỉ xét miệng rổ (basket.y)
                if (item.y + item.size/3 > basket.y - 10 && item.y - item.size/3 < basket.y + 10) {
                    if (Math.abs(item.x - basket.x) < basket.w / 2) {
                        
                        if (item.type === 'bomb') {
                            // Hứng trúng BOM: Trừ 1 mạng
                            lives--;
                            updateHUD();
                            shakeHearts();
                            playSound('explosion');
                            items.splice(i, 1);
                            
                            // Nếu hết 3 mạng -> Game Over
                            if (lives <= 0) {
                                gameOver('bomb');
                                return; // Dừng update ngay lập tức
                            }
                            continue;
                        } else {
                            // BẮT ĐƯỢC TRÁI CÂY/KẸO
                            score += 10;
                            updateHUD();
                            playSound('catch');
                            items.splice(i, 1);
                            continue;
                        }
                    }
                }

                // Rớt ra khỏi màn hình
                if (item.y > canvas.height + item.size) {
                    items.splice(i, 1);
                }
            }

            animationId = requestAnimationFrame(update);
        }

        function startGame() {
            initAudio();
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over-screen').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            
            score = 0;
            lives = 3;
            items = [];
            state = 'PLAYING';
            gameStartTime = Date.now();
            
            updateHUD();
            resize(); 
            
            if(animationId) cancelAnimationFrame(animationId);
            update();
        }

        function gameOver(reason) {
            state = 'GAMEOVER';
            
            document.getElementById('hud').classList.add('hidden');
            document.getElementById('final-score').innerText = score;
            
            const goReason = document.getElementById('go-reason');
            const goIcon = document.getElementById('go-icon');

            if (reason === 'bomb') {
                playSound('gameover');
                goReason.innerText = "You caught 3 BOMBS! 💣";
                goIcon.innerText = "💥";
            }

            document.getElementById('game-over-screen').classList.remove('hidden');

            // Hiệu ứng pháo giấy nếu có điểm
            if (score > 0) {
                setTimeout(() => {
                    confetti({
                        particleCount: 150,
                        spread: 80,
                        origin: { y: 0.6 },
                        colors: ['#1CB0F6', '#58CC02', '#FF4B4B', '#FFC800', '#CE82FF']
                    });
                }, 300);
            }
        }

    </script>
</body>
</html>
