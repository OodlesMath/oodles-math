
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Colorful Classroom Background Template</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --sky-top: #7dd3fc;
      --sky-bottom: #bae6fd;
      --grass-main: #58cc02;
      --grass-highlight: #84cc16;
      --hill-green: #65a30d;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--sky-top);
      font-family: 'Poppins', sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #backgroundCanvas {
      display: block;
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="backgroundCanvas" aria-label="Colorful sky, rainbow, trees, flowers, and grass background"></canvas>

  <script>
    const canvas = document.getElementById('backgroundCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });

    let canvasWidth = 0;
    let canvasHeight = 0;
    let clouds = [];
    let bgTrees = [];
    let bgFlowers = [];

    function resizeCanvas() {
      canvasWidth = window.innerWidth;
      canvasHeight = window.innerHeight;
      canvas.width = canvasWidth;
      canvas.height = canvasHeight;
      generateEnvironment();
    }

    function generateEnvironment() {
      clouds = [];
      bgTrees = [];
      bgFlowers = [];

      for (let i = 0; i < 8; i++) {
        clouds.push({
          x: Math.random() * canvasWidth,
          y: Math.random() * (canvasHeight * 0.42),
          size: 30 + Math.random() * 50,
          speed: Math.random() * 0.18 + 0.08
        });
      }

      for (let i = 0; i < 10; i++) {
        bgTrees.push({
          x: Math.random() * canvasWidth,
          y: canvasHeight * 0.65 + (Math.random() * 20 - 10),
          scale: 0.5 + Math.random() * 0.5
        });
      }

      const flowerColors = ['#ff4b4b', '#ffc800', '#ce82ff', '#ffffff', '#1cb0f6'];
      for (let i = 0; i < 28; i++) {
        bgFlowers.push({
          x: Math.random() * canvasWidth,
          y: canvasHeight * 0.8 + Math.random() * (canvasHeight * 0.18),
          color: flowerColors[Math.floor(Math.random() * flowerColors.length)],
          scale: 0.45 + Math.random() * 0.85
        });
      }
    }

    function updateBackground() {
      clouds.forEach(cloud => {
        cloud.x -= cloud.speed;
        if (cloud.x + cloud.size * 2 < 0) {
          cloud.x = canvasWidth + cloud.size * 2;
          cloud.y = Math.random() * (canvasHeight * 0.42);
        }
      });
    }

    function drawCloud(cloud) {
      ctx.beginPath();
      ctx.arc(cloud.x, cloud.y, cloud.size, 0, Math.PI * 2);
      ctx.arc(cloud.x + cloud.size * 0.8, cloud.y + cloud.size * 0.2, cloud.size * 0.7, 0, Math.PI * 2);
      ctx.arc(cloud.x - cloud.size * 0.8, cloud.y + cloud.size * 0.2, cloud.size * 0.7, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawTree(tree) {
      ctx.save();
      ctx.translate(tree.x, tree.y);
      ctx.scale(tree.scale, tree.scale);

      ctx.fillStyle = '#78350f';
      ctx.fillRect(-10, 0, 20, 60);

      ctx.fillStyle = '#4ade80';
      ctx.beginPath();
      ctx.arc(0, -20, 40, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(-25, -10, 30, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(25, -10, 30, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawFlower(flower) {
      ctx.save();
      ctx.translate(flower.x, flower.y);
      ctx.scale(flower.scale, flower.scale);

      ctx.fillStyle = flower.color;
      for (let petal = 0; petal < 5; petal++) {
        ctx.rotate((Math.PI * 2) / 5);
        ctx.beginPath();
        ctx.ellipse(0, -10, 6, 12, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = '#ffc800';
      ctx.beginPath();
      ctx.arc(0, 0, 6, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawBackground() {
      const skyGradient = ctx.createLinearGradient(0, 0, 0, canvasHeight * 0.7);
      skyGradient.addColorStop(0, '#7dd3fc');
      skyGradient.addColorStop(1, '#bae6fd');
      ctx.fillStyle = skyGradient;
      ctx.fillRect(0, 0, canvasWidth, canvasHeight);

      ctx.save();
      ctx.translate(canvasWidth / 2, canvasHeight * 0.7);
      ctx.lineWidth = Math.min(20, canvasWidth * 0.015);
      ctx.lineCap = 'round';
      const rainbowColors = ['#ff4b4b', '#ff9900', '#ffc800', '#58cc02', '#1cb0f6', '#ce82ff'];
      const baseRadius = Math.min(canvasWidth * 0.3, 400);

      for (let i = 0; i < rainbowColors.length; i++) {
        ctx.strokeStyle = rainbowColors[i];
        ctx.beginPath();
        ctx.arc(0, 0, baseRadius - i * ctx.lineWidth, Math.PI, 0);
        ctx.stroke();
      }
      ctx.restore();

      ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
      clouds.forEach(drawCloud);

      ctx.fillStyle = '#65a30d';
      ctx.beginPath();
      ctx.moveTo(0, canvasHeight);
      ctx.lineTo(0, canvasHeight * 0.65);
      for (let x = 0; x <= canvasWidth + 300; x += 300) {
        ctx.quadraticCurveTo(x - 150, canvasHeight * 0.55, x, canvasHeight * 0.65);
      }
      ctx.lineTo(canvasWidth, canvasHeight);
      ctx.fill();

      bgTrees.forEach(drawTree);

      ctx.fillStyle = '#58cc02';
      ctx.beginPath();
      ctx.moveTo(0, canvasHeight);
      ctx.lineTo(0, canvasHeight * 0.7);
      ctx.quadraticCurveTo(canvasWidth / 2, canvasHeight * 0.65, canvasWidth, canvasHeight * 0.7);
      ctx.lineTo(canvasWidth, canvasHeight);
      ctx.fill();

      ctx.strokeStyle = '#84cc16';
      ctx.lineWidth = 15;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-20, canvasHeight * 0.7);
      ctx.quadraticCurveTo(canvasWidth / 2, canvasHeight * 0.65, canvasWidth + 20, canvasHeight * 0.7);
      ctx.stroke();

      bgFlowers.forEach(drawFlower);
    }

    function animationLoop() {
      updateBackground();
      drawBackground();
      requestAnimationFrame(animationLoop);
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    requestAnimationFrame(animationLoop);
  </script>
</body>
</html>
