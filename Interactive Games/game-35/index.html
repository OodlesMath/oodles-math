<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Number Line Adventure - Math Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #58cc02;
            --green-shadow: #58a700;
            --blue: #1cb0f6;
            --blue-shadow: #1899d6;
            --yellow: #ffc800;
            --yellow-shadow: #e5b400;
            --red: #ff4b4b;
            --red-shadow: #ea2b2b;
            --purple: #ce82ff;
            --white: #ffffff;
            --bg-gray: #f7f7f7;
            --border-gray: #e5e5e5;
            --text-dark: #4b4b4b;
            --text-light: #afafaf;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #7dd3fc; /* Sky blue */
            font-family: 'Poppins', sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }

        /* Dedicated canvas for Confetti so it stays on top of EVERYTHING */
        #fxCanvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            z-index: 100;
            pointer-events: none;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #top-bar {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0 20px;
            box-sizing: border-box;
            pointer-events: none;
            display: none;
        }

        /* Top Bar Wrapper to manage layout (Leaves Top Right Empty) */
        .top-bar-inner {
            display: flex;
            width: 100%;
            max-width: 1200px;
            justify-content: flex-start;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .top-bar-inner {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
        }

        .ui-box {
            background: var(--white);
            border: 3px solid var(--border-gray);
            border-bottom: 6px solid var(--border-gray);
            padding: 10px 25px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        #score-container {
            flex-direction: column;
            min-width: 120px;
        }

        .gem-icon {
            width: 32px;
            height: 32px;
            margin-right: 8px;
            filter: drop-shadow(0px 3px 0px rgba(0,0,0,0.15));
        }

        #score-display {
            font-size: 2rem;
            font-weight: 900;
            color: var(--blue);
            display: flex;
            align-items: center;
        }        
        
        #progress-display {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-light);
            margin-top: -5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #question-board {
            gap: 20px;
            transform: translateY(0);
            animation: bounceSoft 3s ease-in-out infinite;
        }

        @keyframes bounceSoft {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        #question-text {
            font-size: 3rem; 
            font-weight: 900;
            color: var(--purple);
            white-space: nowrap;
        }

        #speaker-btn {
            background: var(--blue);
            border: none;
            border-bottom: 5px solid var(--blue-shadow);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.1s ease;
            flex-shrink: 0;
            padding: 12px;
        }

        #speaker-btn svg { width: 100%; height: 100%; fill: var(--white); }
        #speaker-btn:active { transform: translateY(5px); border-bottom: 0px solid var(--blue-shadow); margin-bottom: 5px; }

        #bottom-controls {
            position: absolute;
            bottom: 30px;
            display: flex;
            gap: 15px;
            pointer-events: auto;
            display: none; /* hidden until game starts */
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 25px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 4px solid var(--border-gray);
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .ctrl-btn {
            border: none;
            border-radius: 20px;
            padding: 15px 25px;
            font-size: 1.5rem;
            color: var(--white);
            font-family: 'Poppins', sans-serif;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-blue { background: var(--blue); border-bottom: 6px solid var(--blue-shadow); }
        .btn-yellow { background: var(--yellow); border-bottom: 6px solid var(--yellow-shadow); color: var(--text-dark); }
        .btn-green { background: var(--green); border-bottom: 6px solid var(--green-shadow); }
        
        .ctrl-btn:active { transform: translateY(6px); border-bottom-width: 0px; margin-bottom: 6px; }
        .ctrl-btn svg { width: 28px; height: 28px; fill: currentColor; font-weight: bold; }

        /* PANELS */
        .panel {
            background: var(--white);
            border: 4px solid var(--border-gray);
            border-bottom: 12px solid var(--border-gray);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            padding: 40px 50px;
            border-radius: 35px;
            text-align: center;
            color: var(--text-dark);
            pointer-events: auto;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%; 
            width: 450px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .panel.hidden { display: none !important; }
        .title-icon { width: 100px; height: 100px; margin-bottom: 10px; animation: bounceSoft 2s infinite ease-in-out; }
        
        .panel h1 {
            margin: 5px 0 10px;
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1.1;
        }
        
        .title-start { color: var(--green); }
        .title-win { color: var(--yellow); }
        .title-lose { color: var(--red); }

        .panel p { font-size: 1.2rem; color: var(--text-light); margin-bottom: 25px; line-height: 1.6; font-weight: 700; }
        .highlight { color: var(--blue); font-weight: 900; font-size: 2.2rem; }

        button.main-btn {
            background: var(--green); border: none; border-bottom: 6px solid var(--green-shadow);
            border-radius: 20px; padding: 18px 0; font-size: 1.8rem; color: var(--white);
            font-family: 'Poppins', sans-serif; font-weight: 900; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; width: 100%; margin-top: 10px; transition: all 0.1s ease;
        }
        button.main-btn.btn-red { background: var(--red); border-bottom-color: var(--red-shadow); }
        button.main-btn.btn-blue { background: var(--blue); border-bottom-color: var(--blue-shadow); }
        button.main-btn:hover { filter: brightness(1.1); }
        button.main-btn:active { transform: translateY(6px); border-bottom-width: 0px; margin-bottom: 6px; }

        @media (max-width: 768px) {
            #question-text { font-size: 2.2rem; }
            .panel h1 { font-size: 2.8rem; }
            button.main-btn { font-size: 1.5rem; padding: 15px 0; }
            .ctrl-btn { padding: 12px 20px; font-size: 1.2rem; }
            #bottom-controls { width: 95%; padding: 10px; bottom: 15px; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <canvas id="fxCanvas"></canvas> <!-- FX Layer for confetti on top -->

    <div id="ui-layer">
        <div id="top-bar">
            <div class="top-bar-inner">
                <div id="score-container" class="ui-box">
                    <div id="score-display">
                        <svg class="gem-icon" viewBox="0 0 24 24"><path fill="#00e5ff" d="M12 2L2 8l10 14L22 8Z"/><path fill="#00b8cc" d="M12 2v20l10-14Z"/><path fill="#e0ffff" d="M12 2L2 8h20Z"/></svg>
                        <span id="score-text">0</span>
                    </div>
                    <div id="progress-display">Level 1/10</div>
                </div>
                
                <div id="question-board" class="ui-box">
                    <span id="question-text">1 + 1 = ?</span>
                    <button id="speaker-btn" onclick="playTTS()" title="Read aloud">
                        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    </button>
                </div>
                <!-- The right side is naturally empty for logos -->
            </div>
        </div>

        <div id="bottom-controls">
            <button onclick="handleHop(-1)" class="ctrl-btn btn-blue" title="Jump Left">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </button>
            <button onclick="handleReset()" class="ctrl-btn btn-yellow" title="Reset Hops">
                <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
                RESET
            </button>
            <button onclick="handleCheck()" class="ctrl-btn btn-green" title="Check Answer">
                <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                CHECK
            </button>
            <button onclick="handleHop(1)" class="ctrl-btn btn-blue" title="Jump Right">
                <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
            </button>
        </div>

        <div id="start-panel" class="panel">
            <svg class="title-icon" viewBox="0 0 100 100">
                <circle cx="50" cy="55" r="40" fill="#a1e535"/>
                <circle cx="30" cy="25" r="15" fill="#a1e535"/>
                <circle cx="70" cy="25" r="15" fill="#a1e535"/>
                <circle cx="30" cy="25" r="8" fill="#fff"/>
                <circle cx="70" cy="25" r="8" fill="#fff"/>
                <circle cx="30" cy="25" r="4" fill="#000"/>
                <circle cx="70" cy="25" r="4" fill="#000"/>
                <path d="M 35 60 Q 50 75 65 60" stroke="#4b4b4b" stroke-width="6" fill="none" stroke-linecap="round"/>
            </svg>
            <h1 class="title-start">Number Line</h1>
            <p>Solve the math by hopping<br>on the number line!</p>
            <button class="main-btn" onclick="startGame()">START GAME</button>
        </div>

        <div id="game-over-panel" class="panel hidden">
            <svg class="title-icon" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="#ff4b4b"/>
                <path d="M30 30 L70 70 M70 30 L30 70" stroke="#fff" stroke-width="12" stroke-linecap="round"/>
            </svg>
            <h1 class="title-lose">Oops!</h1>
            <p>The frog hopped to the wrong leaf!</p>
            <h2 style="color:var(--text-dark); font-size:1.8rem; margin:10px 0 25px;">Score: <br><span id="final-score" class="highlight">0</span></h2>
            <button class="main-btn btn-red" onclick="resetGame()">TRY AGAIN</button>
        </div>

        <div id="win-panel" class="panel hidden">
            <svg class="title-icon" viewBox="0 0 24 24" fill="#ffc800"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            <h1 id="win-title" class="title-win">GREAT JOB!</h1>
            <p>You completed all the hops!</p>
            <h2 style="color:var(--text-dark); font-size:1.8rem; margin:10px 0 25px;">Total Score: <br><span id="win-score" class="highlight">10</span></h2>
            <button class="main-btn btn-blue" onclick="resetGame()">PLAY AGAIN</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    
    const fxCanvas = document.getElementById('fxCanvas');
    const fxCtx = fxCanvas.getContext('2d');
    
    let canvasWidth, canvasHeight;
    let leafSpacing, startX, leafWidth;
    
    let gameState = 'start'; 
    let diamonds = 0; 
    let questionsAnswered = 0;
    let maxQuestions = 10;
    let usedQuestions = new Set();
    
    // Frog & Hop Mechanics
    let frog = {
        leafIndex: 1, // 1 to 10
        startLeafIndex: 1, // where the question started
        x: 0, y: 0,
        vx: 0, vy: 0,
        hopProgress: 0,
        isHopping: false,
        facing: 1,
        targetIndex: 1
    };

    let jumpHistory = []; // Tracks steps for visualization [{from: 1, to: 2, stepNum: 1}, ...]
    
    // Background arrays
    let clouds = [];
    let bgTrees = [];
    let bgFlowers = [];
    let platforms = []; // The Number Line leaves
    let particles = [];
    let confetti = [];
    
    let backgroundTime = 0;
    let currentQuestion = null;

    // --- AUDIO SYSTEM ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function initAudio() { if (audioCtx.state === 'suspended') audioCtx.resume(); }

    function playTone(freq, type, duration, vol=0.1) {
        if(!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function sfxHop() { playTone(400, 'sine', 0.1, 0.05); setTimeout(() => playTone(600, 'sine', 0.15, 0.05), 50); }
    function sfxCorrect() { playTone(523.25, 'sine', 0.1, 0.1); setTimeout(() => playTone(659.25, 'sine', 0.1, 0.1), 100); setTimeout(() => playTone(783.99, 'sine', 0.3, 0.1), 200); }
    function sfxWrong() { playTone(250, 'square', 0.2, 0.08); setTimeout(() => playTone(150, 'square', 0.3, 0.1), 150); }
    function sfxReset() { playTone(300, 'triangle', 0.1, 0.1); setTimeout(() => playTone(250, 'triangle', 0.2, 0.1), 100); }
    function sfxWin() { [523.25, 659.25, 783.99, 1046.50, 1318.51].forEach((freq, i) => setTimeout(() => playTone(freq, 'square', 0.4, 0.08), i * 120)); }
    function sfxBonk() { playTone(150, 'sawtooth', 0.1, 0.05); }

    function resize() {
        canvasWidth = window.innerWidth;
        canvasHeight = window.innerHeight;
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;
        fxCanvas.width = canvasWidth;
        fxCanvas.height = canvasHeight;

        // Calculate responsive number line
        let padding = canvasWidth * 0.05; // 5% padding on sides
        if (padding < 20) padding = 20;
        let availableWidth = canvasWidth - padding * 2;
        
        leafSpacing = availableWidth / 9; // 10 leaves = 9 gaps
        startX = padding;
        leafWidth = Math.min(leafSpacing * 0.7, 80); // max width 80px

        // Update platform positions immediately
        platforms = [];
        let lineY = canvasHeight * 0.75; // 75% down the screen
        for(let i = 1; i <= 10; i++) {
            platforms.push({
                num: i,
                x: startX + (i - 1) * leafSpacing,
                y: lineY,
                w: leafWidth
            });
        }

        // Snap frog to current leaf
        if(!frog.isHopping && platforms[frog.leafIndex - 1]) {
            let p = platforms[frog.leafIndex - 1];
            frog.x = p.x;
            frog.y = p.y;
        }
        
        generateEnvironment();
    }
    window.addEventListener('resize', resize);

    // --- PROCEDURAL ENVIRONMENT (Duolingo Style) ---
    function generateEnvironment() {
        clouds = [];
        bgTrees = [];
        bgFlowers = [];

        for(let i=0; i<8; i++) {
            clouds.push({
                x: Math.random() * canvasWidth,
                y: Math.random() * (canvasHeight * 0.4),
                size: 30 + Math.random() * 50,
                speed: Math.random() * 0.2 + 0.1
            });
        }

        for(let i=0; i<10; i++) {
            bgTrees.push({
                x: Math.random() * canvasWidth,
                y: canvasHeight * 0.65 + (Math.random() * 20 - 10),
                scale: 0.5 + Math.random() * 0.5
            });
        }

        const flowerColors = ['#ff4b4b', '#ffc800', '#ce82ff', '#ffffff'];
        for(let i=0; i<20; i++) {
            bgFlowers.push({
                x: Math.random() * canvasWidth,
                y: canvasHeight * 0.8 + Math.random() * (canvasHeight * 0.2),
                color: flowerColors[Math.floor(Math.random() * flowerColors.length)],
                scale: 0.5 + Math.random() * 0.8
            });
        }
    }

    function generateMathQuestion() {
        let op = (questionsAnswered % 2 === 0) ? '+' : '-';
        let num1, num2, ans, qString;
        let attempts = 0;

        do {
            if (op === '+') {
                ans = Math.floor(Math.random() * 9) + 2; // 2 to 10
                num1 = Math.floor(Math.random() * (ans - 1)) + 1; 
                num2 = ans - num1;
            } else {
                num1 = Math.floor(Math.random() * 9) + 2; // 2 to 10
                num2 = Math.floor(Math.random() * (num1 - 1)) + 1; 
                ans = num1 - num2; 
            }
            qString = `${num1} ${op} ${num2}`;
            attempts++;
            if (attempts > 50) break;
        } while (usedQuestions.has(qString));

        usedQuestions.add(qString);
        
        currentQuestion = {
            num1: num1, op: op, num2: num2, ans: ans,
            text: `${num1} ${op} ${num2} = ?`,
            spokenText: `${num1} ${op === '+' ? 'plus' : 'minus'} ${num2} equals what?`
        };
        
        document.getElementById('question-text').innerText = currentQuestion.text;
        document.getElementById('progress-display').innerText = `Level ${questionsAnswered + 1}/10`;

        // Teleport frog to num1
        frog.startLeafIndex = num1;
        frog.leafIndex = num1;
        frog.targetIndex = num1;
        jumpHistory = [];
        
        let startLeaf = platforms[num1 - 1];
        if (startLeaf) {
            frog.x = startLeaf.x;
            frog.y = startLeaf.y;
            frog.facing = op === '+' ? 1 : -1;
            createSparkles(frog.x, frog.y, 15, '#ffffff');
        }
    }

    function playTTS() {
        if (!currentQuestion) return;
        initAudio();
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            let msg = new SpeechSynthesisUtterance(currentQuestion.spokenText);
            msg.lang = 'en-US'; msg.rate = 0.9; msg.pitch = 1.2;
            window.speechSynthesis.speak(msg);
        }
    }

    function initLevel() {
        initAudio();
        diamonds = 0;
        questionsAnswered = 0;
        usedQuestions.clear();
        document.getElementById('score-text').innerText = `0`;
        
        particles = []; confetti = [];
        jumpHistory = [];
        
        resize(); // sets up platforms and env
        
        setTimeout(() => { generateMathQuestion(); }, 500);
    }

    function handleHop(direction) {
        initAudio();
        if(gameState !== 'playing' || frog.isHopping) return;

        let newTarget = frog.leafIndex + direction;
        
        // Prevent jumping off the ends
        if (newTarget < 1 || newTarget > 10) {
            sfxBonk();
            // Small shake effect on frog
            frog.x += direction * 10;
            setTimeout(() => { if(!frog.isHopping) frog.x = platforms[frog.leafIndex - 1].x; }, 100);
            return;
        }

        sfxHop();
        frog.targetIndex = newTarget;
        frog.facing = direction;
        frog.isHopping = true;
        frog.hopProgress = 0;
        
        // Register the hop in history for the drawing arc
        let stepCount = jumpHistory.length + 1;
        jumpHistory.push({
            from: frog.leafIndex,
            to: newTarget,
            stepNum: stepCount,
            direction: direction
        });
    }

    function handleReset() {
        initAudio();
        if(gameState !== 'playing' || frog.isHopping) return;
        if(jumpHistory.length === 0) return; // already at start

        sfxReset();
        jumpHistory = [];
        frog.leafIndex = frog.startLeafIndex;
        frog.targetIndex = frog.startLeafIndex;
        let p = platforms[frog.startLeafIndex - 1];
        frog.x = p.x;
        frog.y = p.y;
        createSparkles(frog.x, frog.y, 10, '#ffc800');
    }

    function handleCheck() {
        initAudio();
        if(gameState !== 'playing' || frog.isHopping) return;

        if (frog.leafIndex === currentQuestion.ans) {
            // Correct!
            sfxCorrect();
            diamonds++;
            questionsAnswered++;
            document.getElementById('score-text').innerText = `${diamonds}`;
            createSparkles(frog.x, frog.y, 25, '#ffc800');
            
            if(questionsAnswered < maxQuestions) {
                setTimeout(() => { generateMathQuestion(); }, 1500);
            } else {
                setTimeout(() => {
                    gameState = 'win';
                    document.getElementById('top-bar').style.display = 'none';
                    document.getElementById('bottom-controls').style.display = 'none';
                    document.getElementById('win-score').innerText = diamonds;
                    document.getElementById('win-panel').classList.remove('hidden');
                    
                    // Win Fireworks
                    sfxWin();
                    for(let i=0; i<5; i++) {
                        setTimeout(() => {
                            createConfettiBurst(canvasWidth*0.2 + Math.random()*canvasWidth*0.6, canvasHeight*0.3);
                        }, i * 300);
                    }
                }, 1000);
            }
        } else {
            // Wrong!
            sfxWrong();
            frog.isHopping = true; // trigger fall animation
            frog.targetIndex = -1; // signals fall
        }
    }

    function update() {
        backgroundTime += 0.03;

        // Animate Clouds
        clouds.forEach(el => {
            el.x -= el.speed;
            if (el.x + el.size * 2 < 0) {
                el.x = canvasWidth + el.size * 2;
                el.y = Math.random() * (canvasHeight * 0.4);
            }
        });

        // Frog Hop Animation
        if (frog.isHopping) {
            if (frog.targetIndex === -1) {
                // Falling (Wrong answer)
                frog.vy += 0.8; // gravity
                frog.y += frog.vy;
                if (frog.y > canvasHeight + 100) {
                    gameState = 'gameover';
                    document.getElementById('final-score').innerText = diamonds;
                    document.getElementById('game-over-panel').classList.remove('hidden');
                    document.getElementById('top-bar').style.display = 'none';
                    document.getElementById('bottom-controls').style.display = 'none';
                }
            } else {
                // Parabolic Hop
                frog.hopProgress += 0.06; // animation speed
                
                let startP = platforms[frog.leafIndex - 1];
                let endP = platforms[frog.targetIndex - 1];
                
                if (frog.hopProgress >= 1) {
                    frog.hopProgress = 1;
                    frog.isHopping = false;
                    frog.leafIndex = frog.targetIndex;
                    frog.x = endP.x;
                    frog.y = endP.y;
                    createSparkles(frog.x, frog.y + 10, 5, '#ffffff');
                } else {
                    // Linear X interpolation
                    frog.x = startP.x + (endP.x - startP.x) * frog.hopProgress;
                    // Sine wave Y for hop height
                    let hopHeight = 80;
                    frog.y = startP.y - Math.sin(frog.hopProgress * Math.PI) * hopHeight;
                }
            }
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= p.decay;
            if (p.life <= 0) particles.splice(i, 1);
        }

        // Confetti (FX layer)
        for (let i = confetti.length - 1; i >= 0; i--) {
            let c = confetti[i];
            c.x += c.vx; c.y += c.vy; c.vy += 0.1; 
            c.rot += c.rotSpeed; c.wobble += c.wobbleSpeed; 
            c.x += Math.sin(c.wobble) * 2; 
            if (c.y > canvasHeight + 100) confetti.splice(i, 1);
        }
    }

    function createSparkles(x, y, amount, color) {
        for(let i=0; i<amount; i++) {
            particles.push({
                x: x + (Math.random() - 0.5) * 30, y: y + (Math.random() - 0.5) * 20,
                vx: (Math.random() - 0.5) * 6, vy: -Math.random() * 6 - 2,
                size: Math.random() * 6 + 3, color: color, life: 1, decay: 0.02 + Math.random()*0.02
            });
        }
    }

    function createConfettiBurst(x, y) {
        let count = 60 + Math.random()*20; 
        let colors = ["#1cb0f6", "#58cc02", "#ffc800", "#ff4b4b", "#ce82ff"];
        for(let i=0; i<count; i++) {
            let angle = Math.random() * Math.PI * 2; let speed = Math.random() * 12 + 4;
            confetti.push({
                x: x, y: y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed - 5,
                size: Math.random()*15 + 8, color: colors[Math.floor(Math.random()*colors.length)],
                rot: Math.random()*Math.PI*2, rotSpeed: (Math.random()-0.5)*0.3,
                wobbleSpeed: Math.random()*0.1 + 0.05, wobble: Math.random()*Math.PI*2
            });
        }
    }

    function drawBackground(ctx) {
        // Sky Gradient
        let skyGrad = ctx.createLinearGradient(0, 0, 0, canvasHeight * 0.7);
        skyGrad.addColorStop(0, "#7dd3fc"); // Light blue
        skyGrad.addColorStop(1, "#bae6fd");
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);

        // Rainbow (Canvas center background)
        ctx.save();
        ctx.translate(canvasWidth / 2, canvasHeight * 0.7);
        ctx.lineWidth = Math.min(20, canvasWidth * 0.015);
        let rbColors = ['#ff4b4b', '#ff9900', '#ffc800', '#58cc02', '#1cb0f6', '#ce82ff'];
        let baseRad = Math.min(canvasWidth * 0.3, 400);
        for(let i=0; i<rbColors.length; i++) {
            ctx.strokeStyle = rbColors[i];
            ctx.beginPath();
            ctx.arc(0, 0, baseRad - i*(ctx.lineWidth), Math.PI, 0);
            ctx.stroke();
        }
        ctx.restore();

        // Clouds
        ctx.fillStyle = "rgba(255, 255, 255, 0.95)";
        clouds.forEach(el => {
            ctx.beginPath();
            ctx.arc(el.x, el.y, el.size, 0, Math.PI*2);
            ctx.arc(el.x + el.size*0.8, el.y + el.size*0.2, el.size*0.7, 0, Math.PI*2);
            ctx.arc(el.x - el.size*0.8, el.y + el.size*0.2, el.size*0.7, 0, Math.PI*2);
            ctx.fill();
        });

        // Far Grass Hills (Darker green)
        ctx.fillStyle = "#65a30d"; // Darker lime
        ctx.beginPath();
        ctx.moveTo(0, canvasHeight);
        ctx.lineTo(0, canvasHeight * 0.65);
        for(let x = 0; x <= canvasWidth + 200; x += 300) {
            ctx.quadraticCurveTo(x - 150, canvasHeight * 0.55, x, canvasHeight * 0.65);
        }
        ctx.lineTo(canvasWidth, canvasHeight);
        ctx.fill();

        // Background Trees
        bgTrees.forEach(t => {
            ctx.save();
            ctx.translate(t.x, t.y);
            ctx.scale(t.scale, t.scale);
            // Trunk
            ctx.fillStyle = "#78350f";
            ctx.fillRect(-10, 0, 20, 60);
            // Leaves
            ctx.fillStyle = "#4ade80"; // Bright green
            ctx.beginPath(); ctx.arc(0, -20, 40, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(-25, -10, 30, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(25, -10, 30, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        });

        // Main Grass Area
        ctx.fillStyle = "#58cc02"; // Duolingo green
        ctx.beginPath();
        ctx.moveTo(0, canvasHeight);
        ctx.lineTo(0, canvasHeight * 0.7);
        ctx.quadraticCurveTo(canvasWidth/2, canvasHeight * 0.65, canvasWidth, canvasHeight * 0.7);
        ctx.lineTo(canvasWidth, canvasHeight);
        ctx.fill();
        
        // Grass top edge highlight
        ctx.strokeStyle = "#84cc16";
        ctx.lineWidth = 15;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(-20, canvasHeight * 0.7);
        ctx.quadraticCurveTo(canvasWidth/2, canvasHeight * 0.65, canvasWidth+20, canvasHeight * 0.7);
        ctx.stroke();

        // Decorative Flowers
        bgFlowers.forEach(f => {
            ctx.save();
            ctx.translate(f.x, f.y);
            ctx.scale(f.scale, f.scale);
            ctx.fillStyle = f.color;
            for(let j=0; j<5; j++) {
                ctx.rotate((Math.PI*2)/5);
                ctx.beginPath(); ctx.ellipse(0, -10, 6, 12, 0, 0, Math.PI*2); ctx.fill();
            }
            ctx.fillStyle = "#ffc800";
            ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        });
    }

    function drawNumberLine(ctx) {
        if (platforms.length === 0) return;

        // Draw Thick Connecting Line
        ctx.strokeStyle = "rgba(0, 0, 0, 0.15)";
        ctx.lineWidth = 12;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(platforms[0].x, platforms[0].y + 20);
        ctx.lineTo(platforms[platforms.length-1].x, platforms[platforms.length-1].y + 20);
        ctx.stroke();

        // Draw Nodes/Leaves
        platforms.forEach(p => {
            ctx.save();
            ctx.translate(p.x, p.y + 20); // shift down slightly so frog stands on top

            // Simple cute leaf top-down view
            let w = p.w;
            ctx.scale(1, 0.4); 
            
            // Shadow
            ctx.fillStyle = "rgba(0,0,0,0.15)";
            ctx.beginPath(); ctx.arc(0, 20, w/2, 0, Math.PI*2); ctx.fill();

            // Leaf Body
            ctx.fillStyle = "#4ade80"; // Base green
            ctx.beginPath(); ctx.arc(0, 0, w/2, 0, Math.PI*2); ctx.fill();
            
            ctx.fillStyle = "#22c55e"; // Darker center
            ctx.beginPath(); ctx.arc(0, 0, w/2 * 0.7, 0, Math.PI*2); ctx.fill();

            ctx.restore();

            // Number Marker (standing up)
            ctx.save();
            ctx.translate(p.x, p.y + 35);
            ctx.font = "900 " + Math.max(16, w*0.4) + "px Poppins, sans-serif"; 
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.lineWidth = 6;
            ctx.strokeStyle = "#ffffff"; 
            ctx.strokeText(p.num, 0, 0);
            ctx.fillStyle = "#333333";
            ctx.fillText(p.num, 0, 0);
            ctx.restore();
        });
    }

    function drawHops(ctx) {
        if (jumpHistory.length === 0) return;

        ctx.lineWidth = 6;
        ctx.lineCap = "round";
        ctx.setLineDash([10, 10]);
        
        jumpHistory.forEach(hop => {
            let startP = platforms[hop.from - 1];
            let endP = platforms[hop.to - 1];
            if (!startP || !endP) return;

            let arcHeight = 100;
            let midX = (startP.x + endP.x) / 2;
            let midY = startP.y - arcHeight;

            // Draw Dashed Arc
            ctx.strokeStyle = "#1cb0f6"; // Duolingo blue
            ctx.beginPath();
            ctx.moveTo(startP.x, startP.y - 10);
            ctx.quadraticCurveTo(midX, midY - 50, endP.x, endP.y - 10);
            ctx.stroke();

            // Draw Step Badge (1, 2, 3...)
            ctx.setLineDash([]);
            ctx.save();
            // Position badge at the peak of the arc
            ctx.translate(midX, midY - 15);
            
            // Badge background
            ctx.fillStyle = "#ffc800"; // Yellow badge
            ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 3; ctx.stroke();
            
            // Text inside badge
            ctx.font = "900 18px Poppins, sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillStyle = "#333";
            ctx.fillText(hop.stepNum, 0, 2);
            ctx.restore();
            
            ctx.setLineDash([10, 10]); // reset for next line
        });
        ctx.setLineDash([]); // clear dash
    }

    function drawFrog(ctx, px, py) {
        ctx.save();
        ctx.translate(px, py - 5); // Stand on leaf
        
        let squishY = 1, squishX = 1;
        if(!frog.isHopping) { 
            squishY = 1 + Math.sin(backgroundTime*5) * 0.05; 
            squishX = 1 - Math.sin(backgroundTime*5) * 0.05; 
        } 
        else { squishY = 1.1; squishX = 0.9; }
        
        // Scale to fit smaller leaves
        let fScale = Math.min(1, leafWidth / 100); 
        ctx.scale(squishX * frog.facing * fScale, squishY * fScale);

        if(!frog.isHopping) { 
            ctx.fillStyle = "rgba(0,0,0,0.2)"; 
            ctx.beginPath(); ctx.ellipse(0, 5, 30, 12, 0, 0, Math.PI*2); ctx.fill(); 
        }

        const skinBright = "#a1e535"; const skinShadow = "#7ec41a"; const belly = "#faffb3"; 
        let legOffset = (!frog.isHopping) ? 0 : 15;

        // Back Legs
        ctx.fillStyle = skinShadow; 
        ctx.beginPath(); ctx.ellipse(-28, -12 + legOffset/2, 14, 20, -Math.PI/6, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(28, -12 + legOffset/2, 14, 20, Math.PI/6, 0, Math.PI*2); ctx.fill();

        // Feet
        ctx.fillStyle = skinBright;
        ctx.beginPath(); ctx.ellipse(-34, 2 + legOffset, 12, 6, -Math.PI/8, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(34, 2 + legOffset, 12, 6, Math.PI/8, 0, Math.PI*2); ctx.fill();

        // Body
        ctx.fillStyle = skinBright;
        ctx.beginPath(); ctx.moveTo(0, -40); ctx.bezierCurveTo(40, -40, 45, 5, 0, 5); ctx.bezierCurveTo(-45, 5, -40, -40, 0, -40); ctx.fill();
        
        // Belly
        ctx.fillStyle = belly; ctx.beginPath(); ctx.ellipse(0, -8, 24, 14, 0, 0, Math.PI*2); ctx.fill();

        // Blushes
        ctx.fillStyle = "rgba(255, 120, 150, 0.6)";
        ctx.beginPath(); ctx.ellipse(-22, -15, 7, 4, -0.1, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(20, -15, 7, 4, 0.1, 0, Math.PI*2); ctx.fill();

        // Eyes
        ctx.fillStyle = skinBright; 
        ctx.beginPath(); ctx.arc(-18, -42, 16, 0, Math.PI*2); ctx.fill(); 
        ctx.beginPath(); ctx.arc(18, -42, 16, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#ffffff"; 
        ctx.beginPath(); ctx.arc(-18, -42, 12, 0, Math.PI*2); ctx.fill(); 
        ctx.beginPath(); ctx.arc(18, -42, 12, 0, Math.PI*2); ctx.fill();

        ctx.fillStyle = "#111111"; 
        ctx.beginPath(); ctx.arc(-18, -42, 6, 0, Math.PI*2); ctx.fill(); 
        ctx.beginPath(); ctx.arc(18, -42, 6, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#ffffff";
        ctx.beginPath(); ctx.arc(-20, -45, 2.5, 0, Math.PI*2); ctx.fill(); 
        ctx.beginPath(); ctx.arc(16, -45, 2.5, 0, Math.PI*2); ctx.fill();

        // Mouth
        ctx.strokeStyle = "#2b6311"; ctx.lineWidth = 3; ctx.lineCap = "round";
        ctx.beginPath();
        if(frog.targetIndex === -1) { // Falling/Wrong
            ctx.fillStyle = "#ff4b4b"; ctx.ellipse(0, -22, 8, 10, 0, 0, Math.PI*2); ctx.fill();
        } else {
            ctx.moveTo(-12, -26); ctx.quadraticCurveTo(-6, -20, 0, -26); ctx.quadraticCurveTo(6, -20, 12, -26); ctx.stroke();
            ctx.fillStyle = "#ff4b4b"; ctx.beginPath(); ctx.moveTo(-10, -23); ctx.quadraticCurveTo(0, -8, 10, -23); ctx.fill();
            ctx.fillStyle = "#ff8a8a"; ctx.beginPath(); ctx.arc(0, -15, 4, 0, Math.PI*2); ctx.fill();
        }

        ctx.restore();
    }

    function render() {
        // Render main game (under UI)
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBackground(ctx);
        drawNumberLine(ctx);
        drawHops(ctx);
        if(gameState !== 'start' && gameState !== 'win') {
            drawFrog(ctx, frog.x, frog.y);
        }

        // Particles (Sparkles)
        particles.forEach(p => {
            ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0, p.life); 
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); 
            ctx.globalAlpha = 1.0;
        });

        // FX Canvas (Confetti ON TOP of everything)
        fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
        confetti.forEach(c => {
            fxCtx.save(); 
            fxCtx.translate(c.x, c.y); fxCtx.rotate(c.rot); fxCtx.fillStyle = c.color;
            if(c.size % 2 > 1) { fxCtx.beginPath(); fxCtx.arc(0, 0, c.size/2, 0, Math.PI*2); fxCtx.fill(); } 
            else { fxCtx.fillRect(-c.size/2, -c.size/2, c.size, c.size); }
            fxCtx.restore();
        });
    }

    function loop() {
        update();
        render();
        requestAnimationFrame(loop);
    }

    function startGame() {
        initAudio();
        document.getElementById('start-panel').classList.add('hidden');
        document.getElementById('top-bar').style.display = 'flex';
        document.getElementById('bottom-controls').style.display = 'flex';
        initLevel();
        gameState = 'playing';
    }

    function resetGame() {
        initAudio();
        document.getElementById('game-over-panel').classList.add('hidden');
        document.getElementById('win-panel').classList.add('hidden');
        document.getElementById('start-panel').classList.remove('hidden');
        document.getElementById('top-bar').style.display = 'none';
        document.getElementById('bottom-controls').style.display = 'none';
        
        // Reset frog so it hides behind panel again
        frog.x = -1000;
        frog.isHopping = false;
        
        gameState = 'start';
    }

    // Force layout update on load
    resize();
    frog.x = -1000; // hide initially
    requestAnimationFrame(loop);

</script>
</body>
