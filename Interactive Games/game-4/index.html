<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slide Puzzle Game - Ver 4</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Duolingo-inspired color palette */
            --primary: #58cc02;
            --primary-shadow: #58a700;
            --secondary: #1cb0f6;
            --secondary-shadow: #1899d6;
            --danger: #ff4b4b;
            --danger-shadow: #ea2b2b;
            --warning: #ffc800;
            --warning-shadow: #e5b400;
            --surface: #ffffff;
            --text-main: #374151;
            --text-light: #6b7280;
            --border-radius-lg: 24px;
            --border-radius-md: 16px;
            --border-radius-sm: 12px;
            
            /* Dynamic sizing */
            --board-size: clamp(280px, 90vw, 400px);
            --tile-gap: 6px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            overflow-x: hidden;
            position: relative;
            background-color: #8fd3f4;
        }

        /* --- BACKGROUND SCENERY --- */
        .scenery-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }
        .scenery-bg svg {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Quản lý các màn hình */
        .screen {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .screen.active {
            display: flex;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- MÀN HÌNH MENU CHỌN ẢNH --- */
        .menu-container {
            background-color: rgba(255, 255, 255, 0.95);
            padding: clamp(1.5rem, 4vw, 2.5rem);
            border-radius: var(--border-radius-lg);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1), 0 4px 0 rgba(0,0,0,0.1);
            width: 100%;
            max-width: 650px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .menu-header h1 {
            color: var(--secondary);
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            font-weight: 800;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }

        .menu-header p {
            color: var(--text-light);
            font-weight: 600;
            margin-bottom: 2rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 15px;
            margin-bottom: 1rem;
        }

        .gallery-item {
            aspect-ratio: 1;
            border-radius: var(--border-radius-md);
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            background-size: cover;
            background-position: center;
            border: 3px solid transparent;
            position: relative;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.15), 0 4px 0 rgba(0,0,0,0.1);
            border-color: var(--warning);
        }

        .gallery-item:active {
            transform: translateY(2px);
            box-shadow: 0 0px 0 rgba(0,0,0,0.1);
        }

        /* --- MÀN HÌNH GAME CHÍNH --- */
        .game-container {
            background-color: var(--surface);
            padding: clamp(1rem, 4vw, 2rem);
            border-radius: var(--border-radius-lg);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1), 0 4px 0 rgba(0,0,0,0.15);
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            position: relative;
        }

        .header {
            text-align: center;
            width: 100%;
            position: relative;
        }

        .back-btn {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            background: #f3f4f6;
            border: 2px solid #e5e7eb;
            color: var(--text-main);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .back-btn:active { transform: translateY(-50%) scale(0.9); }

        .title-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 0.5rem;
        }

        h2 {
            color: var(--primary);
            font-size: clamp(1.5rem, 6vw, 2rem);
            font-weight: 800;
        }

        .instruction {
            color: var(--text-light);
            font-size: clamp(0.9rem, 3.5vw, 1.1rem);
            font-weight: 600;
        }

        /* Stats & Controls Bar */
        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 5px;
        }

        .stats {
            display: flex;
            gap: 1rem;
            font-weight: 700;
            color: var(--primary);
            background: #f3f4f6;
            padding: 8px 16px;
            border-radius: var(--border-radius-md);
            border: 2px solid #e5e7eb;
        }

        .sound-btn {
            background: #f3f4f6;
            border: 2px solid #e5e7eb;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sound-btn:active { transform: scale(0.9); }

        /* The Puzzle Board */
        .board-wrapper {
            position: relative;
            padding: 10px;
            background: #e5e7eb;
            border-radius: var(--border-radius-lg);
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.1);
        }

        .board {
            width: var(--board-size);
            height: var(--board-size);
            background-color: #d1d5db;
            border-radius: var(--border-radius-md);
            position: relative;
            overflow: hidden;
        }

        .tile {
            position: absolute;
            background-color: var(--surface);
            border-radius: var(--border-radius-sm);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.15), inset 0 2px 0 rgba(255,255,255,0.5);
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94), 
                        top 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94), 
                        left 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            background-size: var(--board-size) var(--board-size);
            background-repeat: no-repeat;
            background-color: var(--warning); 
        }

        .tile:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 rgba(0,0,0,0.15), inset 0 2px 0 rgba(255,255,255,0.5);
        }

        .tile.empty {
            background: transparent;
            box-shadow: none;
            cursor: default;
            border: 2px dashed rgba(0,0,0,0.1);
        }

        /* Buttons Area */
        .action-buttons {
            display: flex;
            gap: 1rem;
            width: 100%;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            font-family: 'Poppins', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: var(--border-radius-md);
            color: white;
            cursor: pointer;
            transition: all 0.1s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex: 1;
            min-width: 120px;
        }

        .btn-start {
            background-color: var(--primary);
            box-shadow: 0 6px 0 var(--primary-shadow);
        }
        .btn-start:active { transform: translateY(6px); box-shadow: 0 0 0 var(--primary-shadow); }

        .btn-shuffle {
            background-color: var(--secondary);
            box-shadow: 0 6px 0 var(--secondary-shadow);
        }
        .btn-shuffle:active { transform: translateY(6px); box-shadow: 0 0 0 var(--secondary-shadow); }

        /* Difficulty Selector */
        .difficulty-selector {
            display: flex;
            gap: 10px;
            background: #f3f4f6;
            padding: 5px;
            border-radius: var(--border-radius-md);
        }

        .diff-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            color: var(--text-light);
            border-radius: var(--border-radius-sm);
            cursor: pointer;
            transition: all 0.2s;
        }

        .diff-btn.active {
            background: white;
            color: var(--secondary);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Encouragement Messages */
        .encouragement {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--warning);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            text-shadow: 1px 1px 0px rgba(0,0,0,0.2);
            white-space: nowrap;
            z-index: 20;
        }

        .encouragement.show {
            opacity: 1;
            animation: popUpAndFade 2s forwards;
        }

        @keyframes popUpAndFade {
            0% { opacity: 0; transform: translate(-50%, 10px) scale(0.8); }
            15% { opacity: 1; transform: translate(-50%, 0) scale(1.1); }
            30% { transform: translate(-50%, 0) scale(1); }
            80% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -20px); }
        }

        /* Celebration Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .celebration-card {
            background: white;
            padding: 3rem 2rem;
            border-radius: var(--border-radius-lg);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            transform: scale(0.8);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%;
        }

        .overlay.active .celebration-card { transform: scale(1); }
        .celebration-card h2 { color: var(--primary); font-size: 2.5rem; margin-bottom: 1rem; }
        .celebration-card p { font-size: 1.2rem; color: var(--text-light); margin-bottom: 2rem; }
        .celebration-mascot { font-size: 5rem; margin-bottom: 1rem; animation: bounce 1s infinite; }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .stars-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .star-icon {
            font-size: 3rem;
            color: var(--warning);
            opacity: 0;
            transform: scale(0);
        }

        .overlay.active .star-icon:nth-child(1) { animation: popStar 0.5s 0.3s forwards; }
        .overlay.active .star-icon:nth-child(2) { animation: popStar 0.5s 0.6s forwards; }
        .overlay.active .star-icon:nth-child(3) { animation: popStar 0.5s 0.9s forwards; }

        @keyframes popStar {
            0% { opacity: 0; transform: scale(0) rotate(-45deg); }
            70% { opacity: 1; transform: scale(1.2) rotate(10deg); }
            100% { opacity: 1; transform: scale(1) rotate(0); }
        }

        #confetti {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        /* Reference Image Thumbnail */
        .reference-img-container {
            position: absolute;
            bottom: -60px;
            right: 0;
            width: 50px;
            height: 50px;
            border-radius: 10px;
            background: white;
            padding: 3px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            cursor: pointer;
            z-index: 10;
        }

        .reference-img-container:hover {
            transform: scale(1.5) translate(-10px, -10px);
            z-index: 30;
        }

        .reference-img {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
        }

    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- SCENERY BACKGROUND -->
    <div class="scenery-bg">
        <svg viewBox="0 0 1000 600" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
            <!-- Mặt trời -->
            <circle cx="120" cy="100" r="70" fill="#fde047" opacity="0.9"/>
            <circle cx="120" cy="100" r="50" fill="#fff" opacity="0.4"/>
            <!-- Mây -->
            <path d="M 80,120 Q 90,100 110,120 Q 140,110 150,130 Q 170,130 160,150 L 70,150 Q 60,130 80,120 Z" fill="white" opacity="0.9"/>
            <path d="M 650,80 Q 660,70 670,80 Q 685,75 690,85 Q 700,85 695,95 L 645,95 Q 640,85 650,80 Z" fill="white" opacity="0.8"/>
            <path d="M 400,200 Q 410,180 430,200 Q 460,190 470,210 Q 490,210 480,230 L 390,230 Q 380,210 400,200 Z" fill="white" opacity="0.5"/>
            <!-- Cầu vồng -->
            <g transform="translate(500, 500)">
                <path d="M -350,0 A 350,350 0 0,1 350,0" fill="none" stroke="#d5869d" stroke-width="30"/>
                <path d="M -320,0 A 320,320 0 0,1 320,0" fill="none" stroke="#e8d388" stroke-width="30"/>
                <path d="M -290,0 A 290,290 0 0,1 290,0" fill="none" stroke="#87d197" stroke-width="30"/>
                <path d="M -260,0 A 260,260 0 0,1 260,0" fill="none" stroke="#5fb2e2" stroke-width="30"/>
                <path d="M -230,0 A 230,230 0 0,1 230,0" fill="none" stroke="#9079b6" stroke-width="30"/>
            </g>
            <!-- Bãi cỏ đồi -->
            <path d="M -100,550 Q 250,480 600,550 T 1100,550 L 1100,600 L -100,600 Z" fill="#88c927"/>
            <path d="M -100,600 Q 300,520 800,600 L -100,600 Z" fill="#75b81f"/>
            <!-- Cây cối -->
            <g transform="translate(100, 480)">
                <rect x="-10" y="20" width="20" height="40" fill="#8b5a2b"/>
                <circle cx="0" cy="0" r="30" fill="#2d8a4e"/>
                <circle cx="-15" cy="15" r="20" fill="#2d8a4e"/>
                <circle cx="15" cy="15" r="20" fill="#2d8a4e"/>
            </g>
            <g transform="translate(850, 470)">
                <rect x="-12" y="20" width="24" height="45" fill="#8b5a2b"/>
                <circle cx="0" cy="0" r="35" fill="#2d8a4e"/>
                <circle cx="-20" cy="20" r="25" fill="#2d8a4e"/>
                <circle cx="20" cy="20" r="25" fill="#2d8a4e"/>
            </g>
            <!-- Hoa lá -->
            <g transform="translate(250, 560) scale(0.5)">
                <circle cx="0" cy="0" r="8" fill="#fff"/>
                <circle cx="-8" cy="-8" r="8" fill="#fff"/>
                <circle cx="8" cy="-8" r="8" fill="#fff"/>
                <circle cx="-8" cy="8" r="8" fill="#fff"/>
                <circle cx="8" cy="8" r="8" fill="#fff"/>
                <circle cx="0" cy="0" r="6" fill="#fde047"/>
            </g>
            <g transform="translate(750, 570) scale(0.6)">
                <path d="M0,0 Q-15,-15 0,-25 Q15,-15 0,0" fill="#f472b6"/>
                <path d="M0,0 Q-20,0 -15,-15 Q0,-10 0,0" fill="#f472b6"/>
                <path d="M0,0 Q20,0 15,-15 Q0,-10 0,0" fill="#f472b6"/>
                <rect x="-2" y="0" width="4" height="20" fill="#15803d"/>
            </g>
        </svg>
    </div>

    <!-- MÀN HÌNH 1: CHỌN HÌNH -->
    <div id="menuScreen" class="screen active">
        <div class="menu-container">
            <div class="menu-header">
                <h1>🎨 Choose a Picture</h1>
                <p>Pick your favorite puzzle to start playing!</p>
            </div>
            <div class="gallery-grid" id="galleryGrid">
                <!-- Javascript sẽ tự động điền 12 hình vào đây -->
            </div>
        </div>
    </div>

    <!-- MÀN HÌNH 2: GAME CHÍNH -->
    <div id="gameScreen" class="screen">
        <div class="game-container">
            <!-- Lời động viên -->
            <div id="encouragementMsg" class="encouragement">Nice move! 🌟</div>

            <!-- Header -->
            <div class="header">
                <button class="back-btn" id="backBtn" aria-label="Back to Menu">🔙</button>
                <div class="title-area">
                    <h2>Slide Puzzle</h2>
                </div>
                <p class="instruction">Slide the tiles to complete the picture!</p>
            </div>

            <!-- Controls -->
            <div class="controls-bar">
                <div class="difficulty-selector">
                    <button class="diff-btn active" data-size="3">3x3</button>
                    <button class="diff-btn" data-size="4">4x4</button>
                </div>
                <div class="stats">
                    <span>Moves: <span id="moveCount">0</span></span>
                </div>
                <button class="sound-btn" id="soundToggle" aria-label="Toggle Sound">🔊</button>
            </div>

            <!-- Board -->
            <div class="board-wrapper">
                <div id="puzzleBoard" class="board"></div>
                <div class="reference-img-container" title="Target Picture">
                    <div id="referenceImg" class="reference-img"></div>
                </div>
            </div>

            <!-- Nút hành động -->
            <div class="action-buttons">
                <button class="btn btn-shuffle" id="shuffleBtn">🔀 Shuffle</button>
                <button class="btn btn-start" id="startBtn">▶️ Start Game</button>
            </div>
        </div>
    </div>

    <!-- LỚP PHỦ ĂN MỪNG CHIẾN THẮNG -->
    <div id="celebrationOverlay" class="overlay">
        <canvas id="confetti"></canvas>
        <div class="celebration-card">
            <div class="celebration-mascot">🎉</div>
            <div class="stars-container">
                <div class="star-icon">⭐</div>
                <div class="star-icon">⭐</div>
                <div class="star-icon">⭐</div>
            </div>
            <h2>Great job!</h2>
            <p>You completed the puzzle in <span id="finalMoves">0</span> moves!</p>
            <button class="btn btn-start" id="playAgainBtn" style="width: 100%;">🔄 Play Again</button>
        </div>
    </div>

    <script>
        /**
         * HỆ THỐNG ÂM THANH Web Audio API
         */
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let soundEnabled = true;

        const sounds = {
            pop: () => playTone(400, 'sine', 0.1, 0.05),
            slide: () => playSweep(200, 300, 0.1),
            ding: () => playDing(),
            celebration: () => playMelody(),
            error: () => playTone(150, 'square', 0.1, 0.2)
        };

        function playTone(freq, type, duration, vol) {
            if (!soundEnabled || audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playSweep(startFreq, endFreq, duration) {
            if (!soundEnabled || audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(startFreq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(endFreq, audioCtx.currentTime + duration);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playDing() {
            if (!soundEnabled || audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function playMelody() {
            if (!soundEnabled || audioCtx.state === 'suspended') return;
            const notes = [{f: 440, d: 0.1}, {f: 554.37, d: 0.1}, {f: 659.25, d: 0.1}, {f: 880, d: 0.3}];
            let time = audioCtx.currentTime;
            notes.forEach(note => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.value = note.f;
                gain.gain.setValueAtTime(0.1, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + note.d);

                osc.start(time);
                osc.stop(time + note.d);
                time += note.d + 0.05;
            });

            `, `

            makeAnimalSVG('#1e1b4b', `

                <circle cx="250" cy="60" r="3" fill="white" /> <!-- Stars -->

                <circle cx="320" cy="200" r="3" fill="white" />
                <path d="M 0 280 Q 200 320 400 280 L 400 330 Q 200 360 0 330 Z" fill="#451a03"/> <!-- Big Branch -->
                <path d="M 300 290 Q 350 250 400 260 L 400 280 Q 350 270 300 310 Z" fill="#451a03"/> <!-- Small branch R -->
                <!-- Leaves -->
                <ellipse cx="380" cy="250" rx="15" ry="8" fill="#064e3b" transform="rotate(-20 380 250)"/>
                <ellipse cx="20" cy="300" rx="15" ry="8" fill="#064e3b" transform="rotate(20 20 300)"/>
            `, `

                <polygon points="280,120 250,140 240,110" fill="#78350f" /> <!-- Ear R -->
                <circle cx="160" cy="170" r="25" fill="white" />

                <circle cx="240" cy="170" r="10" fill="#1f2937" /><circle cx="243" cy="167" r="3" fill="white" />
                <polygon points="190,190 210,190 200,210" fill="#f59e0b" /> <!-- Beak -->
                <!-- Wing L -->
                <path d="M 120 180 C 90 220 90 260 130 250 Z" fill="#451a03" />

                <path d="M 280 180 C 310 220 310 260 270 250 Z" fill="#451a03" />

            // 12. Chó Cún (Cuter Dog in Backyard)
            makeAnimalSVG('#86efac', `

                <ellipse cx="60" cy="340" rx="20" ry="8" fill="white" transform="rotate(-15 60 340)"/>

                <circle cx="40" cy="345" r="6" fill="white" />
                <circle cx="80" cy="330" r="6" fill="white" />
                <circle cx="75" cy="340" r="6" fill="white" />
            `, `
                <path d="M 260 280 Q 320 280 300 230 Q 290 200 320 200" fill="none" stroke="#fcd34d" stroke-width="15" stroke-linecap="round"/>

                <path d="M 160 320 C 160 240 240 240 240 320 Z" fill="#fef3c7" />
                <rect x="165" y="240" width="70" height="12" rx="4" fill="#3b82f6" />
                <circle cx="200" cy="255" r="10" fill="#fbbf24" />
                <ellipse cx="155" cy="315" rx="22" ry="16" fill="#fcd34d" />
                <ellipse cx="245" cy="315" rx="22" ry="16" fill="#fcd34d" />
                <line x1="145" y1="315" x2="145" y2="325" stroke="#b45309" stroke-width="2"/>

                <line x1="235" y1="315" x2="235" y2="325" stroke="#b45309" stroke-width="2"/>
                <line x1="255" y1="315" x2="255" y2="325" stroke="#b45309" stroke-width="2"/>

                <path d="M 270 140 C 320 120 320 230 270 220 Z" fill="#b45309" />

                <ellipse cx="160" cy="150" rx="25" ry="30" fill="#b45309" transform="rotate(-15 160 150)" />
                <circle cx="160" cy="155" r="12" fill="#1f2937" />
                <circle cx="163" cy="150" r="4" fill="white" />
                <circle cx="240" cy="155" r="12" fill="#1f2937" />
                <circle cx="243" cy="150" r="4" fill="white" />
                <ellipse cx="200" cy="205" rx="40" ry="30" fill="#fef3c7" />
                <ellipse cx="200" cy="195" rx="14" ry="10" fill="#1f2937" />
                <path d="M 195 190 Q 200 188 205 190" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
                <path d="M 200 205 L 200 215 Q 185 225 170 210" fill="none" stroke="#1f2937" stroke-width="3" stroke-linecap="round"/>
                <path d="M 200 205 L 200 215 Q 215 225 230 210" fill="none" stroke="#1f2937" stroke-width="3" stroke-linecap="round"/>
                <path d="M 185 220 Q 200 245 215 220 Z" fill="#fca5a5" stroke="#1f2937" stroke-width="2"/>
                <line x1="200" y1="220" x2="200" y2="235" stroke="#1f2937" stroke-width="2"/>
                <ellipse cx="135" cy="185" rx="10" ry="6" fill="#fca5a5" opacity="0.6"/>
                <ellipse cx="265" cy="185" rx="10" ry="6" fill="#fca5a5" opacity="0.6"/>
            `)
        ];

        /**
         * GAME STATE & LOGIC
         */
        let currentImageURL = imageCollection[0];
        let size = 3; 
        let tiles = [];
        let emptyIndex = size * size - 1; 
        let moves = 0;
        let isPlaying = false;
        let isAnimating = false;
        
        // DOM Elements
        const menuScreen = document.getElementById('menuScreen');
        const gameScreen = document.getElementById('gameScreen');
        const galleryGrid = document.getElementById('galleryGrid');
        const backBtn = document.getElementById('backBtn');
        
        const boardEl = document.getElementById('puzzleBoard');
        const moveCountEl = document.getElementById('moveCount');
        const startBtn = document.getElementById('startBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const diffBtns = document.querySelectorAll('.diff-btn');
        const soundBtn = document.getElementById('soundToggle');
        const overlay = document.getElementById('celebrationOverlay');
        const playAgainBtn = document.getElementById('playAgainBtn');
        const encouragementMsg = document.getElementById('encouragementMsg');
        const referenceImg = document.getElementById('referenceImg');

        const encouragements = ["Nice move! 🌟", "Keep going! 🎈", "You can do it! 💪", "Amazing! ✨", "So smart! 🧠"];

        // Khởi tạo
        function init() {
            renderGallery();
            setupEventListeners();
        }

        function renderGallery() {
            galleryGrid.innerHTML = '';
            imageCollection.forEach((imgUrl, index) => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.style.backgroundImage = imgUrl;
                item.addEventListener('click', () => {
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    sounds.pop();
                    startGameWithImage(imgUrl);
                });
                galleryGrid.appendChild(item);
            });
        }

        function startGameWithImage(imgUrl) {
            currentImageURL = imgUrl;
            referenceImg.style.backgroundImage = currentImageURL;
            
            // Switch screen
            menuScreen.classList.remove('active');
            gameScreen.classList.add('active');
            
            setupBoard();
        }

        function setupBoard() {
            boardEl.innerHTML = '';
            tiles = [];
            const tileGap = 6; 
            document.documentElement.style.setProperty('--tile-gap', `${tileGap}px`);
            
            const totalTiles = size * size;
            emptyIndex = totalTiles - 1;
            moves = 0;
            updateMoves();
            isPlaying = false;
            startBtn.innerHTML = "▶️ Start Game";
            
            for (let i = 0; i < totalTiles; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.dataset.index = i;
                
                if (i === emptyIndex) {
                    tile.classList.add('empty');
                } else {
                    const row = Math.floor(i / size);
                    const col = i % size;
                    const percentX = (col / (size - 1)) * 100;
                    const percentY = (row / (size - 1)) * 100;
                    
                    tile.style.backgroundImage = currentImageURL;
                    tile.style.backgroundPosition = `${percentX}% ${percentY}%`;
                }
                
                positionTile(tile, i);
                
                tile.addEventListener('mousedown', () => handleTileClick(i));
                tile.addEventListener('touchstart', (e) => {
                    e.preventDefault(); 
                    handleTileClick(i);
                }, { passive: false });
                
                boardEl.appendChild(tile);
                tiles.push({ el: tile, currentPos: i, correctPos: i });
            }
        }

        function positionTile(tile, posIndex) {
            const gap = 6;
            const row = Math.floor(posIndex / size);
            const col = posIndex % size;
            const step = 100 / size;
            
            const gapAdjustmentX = gap * col - (gap * (size-1) * col / size);
            const gapAdjustmentY = gap * row - (gap * (size-1) * row / size);
            
            tile.style.width = `calc(${step}% - ${gap * (size - 1) / size}px)`;
            tile.style.height = `calc(${step}% - ${gap * (size - 1) / size}px)`;
            tile.style.left = `calc(${col * step}% + ${gapAdjustmentX}px)`;
            tile.style.top = `calc(${row * step}% + ${gapAdjustmentY}px)`;
        }

        function updateAllTilePositions() {
            tiles.forEach(tileObj => {
                positionTile(tileObj.el, tileObj.currentPos);
            });
        }

        window.addEventListener('resize', updateAllTilePositions);

        function handleTileClick(clickedIndex) {
            if (!isPlaying || isAnimating) return;
            
            const clickedTileObj = tiles.find(t => t.correctPos === clickedIndex);
            const currentPos = clickedTileObj.currentPos;
            
            if (isAdjacent(currentPos, emptyIndex)) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                isAnimating = true;
                moveTile(clickedTileObj, currentPos, emptyIndex);
            } else {
                sounds.error();
                clickedTileObj.el.style.transform = 'translateX(-5px)';
                setTimeout(() => clickedTileObj.el.style.transform = 'translateX(5px)', 50);
                setTimeout(() => clickedTileObj.el.style.transform = 'translateX(0)', 100);
            }
        }

        function isAdjacent(pos1, pos2) {
            const row1 = Math.floor(pos1 / size);
            const col1 = pos1 % size;
            const row2 = Math.floor(pos2 / size);
            const col2 = pos2 % size;

            return (Math.abs(row1 - row2) === 1 && col1 === col2) || 
                   (Math.abs(col1 - col2) === 1 && row1 === row2);
        }

        function moveTile(tileObj, fromPos, toPos) {
            const emptyTileObj = tiles.find(t => t.currentPos === toPos);
            
            tileObj.currentPos = toPos;
            emptyTileObj.currentPos = fromPos;
            emptyIndex = fromPos;

            positionTile(tileObj.el, toPos);
            positionTile(emptyTileObj.el, fromPos);
            
            sounds.slide();
            moves++;
            updateMoves();

            if (moves > 0 && moves % 5 === 0) {
                showEncouragement();
            }

            setTimeout(() => {
                isAnimating = false;
                checkWin();
            }, 200);
        }

        function showEncouragement() {
            const msg = encouragements[Math.floor(Math.random() * encouragements.length)];
            encouragementMsg.innerText = msg;
            encouragementMsg.classList.remove('show');
            void encouragementMsg.offsetWidth; 
            encouragementMsg.classList.add('show');
            sounds.ding();
        }

        function updateMoves() {
            moveCountEl.innerText = moves;
        }

        function checkWin() {
            const isWin = tiles.every(t => t.currentPos === t.correctPos);
            if (isWin && isPlaying) {
                isPlaying = false;
                sounds.celebration();
                document.getElementById('finalMoves').innerText = moves;
                startConfetti();
                overlay.classList.add('active');
            }
        }

        async function shuffle() {
            if (isAnimating) return;
            isPlaying = false;
            startBtn.innerHTML = "▶️ Start Game";
            
            const shuffleMoves = size * size * 10; 
            isAnimating = true;
            
            for (let i = 0; i < shuffleMoves; i++) {
                const validNeighbors = [];
                const row = Math.floor(emptyIndex / size);
                const col = emptyIndex % size;
                
                if (row > 0) validNeighbors.push(emptyIndex - size);
                if (row < size - 1) validNeighbors.push(emptyIndex + size);
                if (col > 0) validNeighbors.push(emptyIndex - 1);
                if (col < size - 1) validNeighbors.push(emptyIndex + 1);
                
                const randomNeighborPos = validNeighbors[Math.floor(Math.random() * validNeighbors.length)];
                
                const tileToMove = tiles.find(t => t.currentPos === randomNeighborPos);
                const emptyTile = tiles.find(t => t.currentPos === emptyIndex);
                
                tileToMove.currentPos = emptyIndex;
                emptyTile.currentPos = randomNeighborPos;
                emptyIndex = randomNeighborPos;
            }
            
            updateAllTilePositions();
            
            setTimeout(() => {
                isAnimating = false;
                moves = 0;
                updateMoves();
                sounds.pop();
            }, 50); 
        }

        function setupEventListeners() {
            backBtn.addEventListener('click', () => {
                sounds.pop();
                gameScreen.classList.remove('active');
                menuScreen.classList.add('active');
                isPlaying = false;
            });

            startBtn.addEventListener('click', () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                if (!isPlaying) {
                    const isSolved = tiles.every(t => t.currentPos === t.correctPos);
                    if (isSolved) {
                        shuffle().then(() => {
                            isPlaying = true;
                            startBtn.innerHTML = "⏸️ Playing";
                            sounds.ding();
                        });
                    } else {
                        isPlaying = true;
                        startBtn.innerHTML = "⏸️ Playing";
                        sounds.ding();
                    }
                } else {
                    isPlaying = false;
                    startBtn.innerHTML = "▶️ Resume";
                }
            });

            shuffleBtn.addEventListener('click', () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                shuffle();
                isPlaying = true;
                startBtn.innerHTML = "⏸️ Playing";
            });

            diffBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    diffBtns.forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    size = parseInt(e.target.dataset.size);
                    setupBoard();
                    sounds.pop();
                });
            });

            soundBtn.addEventListener('click', () => {
                soundEnabled = !soundEnabled;
                soundBtn.innerHTML = soundEnabled ? "🔊" : "🔇";
                if (soundEnabled) sounds.pop();
            });

            playAgainBtn.addEventListener('click', () => {
                overlay.classList.remove('active');
                stopConfetti();
                shuffle().then(() => {
                    isPlaying = true;
                    startBtn.innerHTML = "⏸️ Playing";
                });
            });
        }

        // --- Hiệu ứng Confetti ---
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let confettiAnimationId;

        function startConfetti() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            const colors = ['#58cc02', '#1cb0f6', '#ffc800', '#ff4b4b', '#a855f7'];
            for (let i = 0; i < 150; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    w: Math.random() * 10 + 5,
                    h: Math.random() * 10 + 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    speed: Math.random() * 3 + 2,
                    angle: Math.random() * 360,
                    spin: Math.random() * 0.2 - 0.1
                });
            }
            animateConfetti();
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.y += p.speed;
                p.angle += p.spin;
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.angle);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
                ctx.restore();
                if (p.y > canvas.height) {
                    particles[index].y = -10;
                    particles[index].x = Math.random() * canvas.width;
                }
            });
            confettiAnimationId = requestAnimationFrame(animateConfetti);
        }

        function stopConfetti() {
            cancelAnimationFrame(confettiAnimationId);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        window.addEventListener('resize', () => {
            if (overlay.classList.contains('active')) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });

        // Bắt đầu
        window.onload = init;

    </script>
