<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background: linear-gradient(to bottom, #AEE1F9, #F0F9FF);
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        .svg-defs { display: none; }

        #backgroundCanvas {
            display: block;
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        .ui-layer {
            position: relative;
            z-index: 10;
        }

        .btn-bubbly {
            transition: transform 0.1s, filter 0.1s, box-shadow 0.1s;
            position: relative; top: 0; border-radius: 1rem; text-transform: uppercase;
        }
        .btn-bubbly:active, .btn-bubbly.simulated-active {
             top: 6px; box-shadow: 0 0 0 rgba(0,0,0,0.2) !important; transform: translateY(2px); border-bottom-width: 0px !important; margin-bottom: 6px;
        }
        .btn-disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(100%); transform: none !important; box-shadow: none !important; top: 6px; border-bottom-width: 0px !important; margin-bottom: 6px;}

        .idle-anim { animation: bounceIdle 2s infinite ease-in-out; }
        @keyframes bounceIdle { 0%, 100% { transform: translateY(0) scaleY(1); } 50% { transform: translateY(-12px) scaleY(0.97); } }
        
        .hit-anim { animation: squash 0.4s; }
        @keyframes squash {
            0% { transform: scale(1, 1); filter: brightness(1); }
            25% { transform: scale(1.15, 0.8) translateY(15px); filter: brightness(1.5) sepia(1) hue-rotate(-50deg); }
            50% { transform: scale(0.9, 1.1) translateY(-15px); }
            75% { transform: scale(1.05, 0.95); }
            100% { transform: scale(1, 1); filter: brightness(1); }
        }
        .character-svg { filter: drop-shadow(0 15px 10px rgba(0,0,0,0.3)); transform-origin: bottom center; }

        .speaker-anim { animation: pulseSpeaker 1.5s infinite; cursor: pointer; }
        @keyframes pulseSpeaker { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15) rotate(-5deg); } }

        .projectile {
             position: absolute; z-index: 50; pointer-events: none; filter: drop-shadow(0 12px 12px rgba(0,0,0,0.4));
             top: 0; left: 0; transform-origin: center;
        }
        .projectile span { display: flex; justify-content: center; align-items: center; transition: transform 0.2s; }

        .splash-effect {
             position: absolute; z-index: 45; pointer-events: none; width: 140px; height: 140px; top: 0; left: 0;
             animation: splashAnim 0.5s ease-out forwards;
         }
        @keyframes splashAnim {
            0% { transform: translate(-50%, -50%) scale(0.2); opacity: 1; filter: brightness(2); }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.6) translateY(20px); opacity: 0; }
        }

        .health-bar-container { border: 4px solid white; border-radius: 999px; background-color: #e5e5e5; overflow: hidden; height: 28px; box-shadow: inset 0 4px 6px rgba(0,0,0,0.1); }
        .health-bar { height: 100%; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s; border-radius: 999px; position: relative;}
        .health-bar::after { content: ''; position: absolute; top: 3px; left: 4px; right: 4px; height: 6px; background: rgba(255,255,255,0.45); border-radius: 999px;}

        .text-stroke { -webkit-text-stroke: 2px white; }
        .text-stroke-sm { -webkit-text-stroke: 1px white; }

        .bg-pattern { background-color: rgba(255, 200, 0, 0.9); background-image: radial-gradient(#ffa000 4px, transparent 4px); background-size: 50px 50px; }

        .power-bar-wrapper { width: 100%; height: 40px; background: #f3f4f6; border-radius: 999px; border: 4px solid #d1d5db; overflow: hidden; position: relative; }
        .power-bar-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #1cb0f6 0%, #58cc02 50%, #ff4b4b 100%); }
        .power-indicator { position: absolute; top: -4px; bottom: -4px; width: 12px; background: white; border: 3px solid #374151; border-radius: 6px; left: 0%; transform: translateX(-50%); box-shadow: 0 0 10px rgba(0,0,0,0.3);}
        
        .dmg-popup { position: absolute; font-size: 4.5rem; font-weight: 900; color: #ff4b4b; -webkit-text-stroke: 3px white; animation: floatUp 1s forwards; pointer-events: none; z-index: 60; text-shadow: 0 6px 0px rgba(0,0,0,0.25); }
        .heal-popup { color: #58cc02; }
        @keyframes floatUp { 0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5) rotate(-10deg); } 20% { transform: translate(-50%, calc(-50% - 25px)) scale(1.3) rotate(5deg); } 100% { opacity: 0; transform: translate(-50%, calc(-50% - 120px)) scale(1) rotate(0deg); } }

        .bg-celebrate { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(8px); }
    </style>
</head>

    <script>
        let gameMode = 'pvc';
        let mathRange = 10;
        const BASE_DAMAGE = 10;
        const apiKey = "";

        let p2 = { id: 'boy', hp: 100, score: 0, isStunned: false, dmgMult: 1, sizeMult: 1, ans: 0, power: 0, powerDir: 1, powerAnim: null, usedItems: {dmg:false, size:false, heal:false} };
        
        let isGameOver = false;

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if(audioCtx.state === 'suspended') audioCtx.resume(); }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'click') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
                osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'wrong') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(200, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'throw') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.4);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'hit') {
                osc.type = 'square'; osc.frequency.setValueAtTime(100, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'powerup') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(1000, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(1500, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'win') {
                osc.type = 'triangle';
                const notes = [523.25, 659.25, 783.99, 1046.50];
                notes.forEach((freq, i) => { osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i*0.15); });
                gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5);
                osc.start(); osc.stop(audioCtx.currentTime + 1.5);
            }
        }

        function speakMath(event, text) {
            event.stopPropagation();
            if('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85;
                utterance.pitch = 1.3;
                window.speechSynthesis.speak(utterance);
            }
        }

        async function getAICheer(winnerName) {
            const aiMessageEl = document.getElementById('ai-message');
            aiMessageEl.innerText = "✨ Magic AI is thinking... ✨";
            
            const prompt = `Write a short, super fun, enthusiastic congratulatory message (just 1 sentence) for a 4-5 year old kid who just won a math game as ${winnerName}. Use simple English and fun emojis. No quotes.`;
            const delays = [1000, 2000, 4000, 8000, 16000];
            
            for (let i = 0; i <= 5; i++) {
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { temperature: 0.9, maxOutputTokens: 60 }
                        })
                    });
                    
                    if (res.ok) {
                        const data = await res.json();
                        const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                        
                        if (text) {
                            aiMessageEl.innerText = text.replace(/\"/g, '');
                            return;
                        }
                    }
                } catch(e) {}
                
                if (i < 5) {
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                } else {
                    aiMessageEl.innerText = `Yay ${winnerName}! You are a super smart math star! 🌟🎉`;
                }
            }
        }

            initAudio(); playSound('correct');
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('flex');

            document.getElementById('score-girl').innerText = "0";
            document.getElementById('score-boy').innerText = "0";

            resetPowerupUI('girl'); resetPowerupUI('boy');
            updateHealthBars();
            
            document.getElementById('math-ui-girl').classList.remove('hidden');
            document.getElementById('power-ui-girl').classList.add('hidden');
            document.getElementById('math-ui-boy').classList.remove('hidden');
            document.getElementById('power-ui-boy').classList.add('hidden');
            
            document.getElementById('overlay-girl').classList.add('hidden');
            document.getElementById('overlay-boy').classList.add('hidden');

            generateQuestion(p1); generateQuestion(p2);

            if(gameMode === 'pvc') {
                document.getElementById('btn-dmg-boy').classList.add('btn-disabled');
                document.getElementById('btn-size-boy').classList.add('btn-disabled');
                document.getElementById('btn-heal-boy').classList.add('btn-disabled');
                document.getElementById('btn-throw-boy').classList.add('btn-disabled');
                botLoop();
            }
        }

        function updateHealthBars() {
            document.getElementById('health-girl').style.width = `${p1.hp}%`;
            document.getElementById('health-boy').style.width = `${p2.hp}%`;
            document.getElementById('hp-text-girl').innerText = `${p1.hp} HP`;
            document.getElementById('hp-text-boy').innerText = `${p2.hp} HP`;
            
            document.getElementById('health-girl').style.backgroundColor = p1.hp > 30 ? '#ff4b4b' : '#c80000';
            document.getElementById('health-boy').style.backgroundColor = p2.hp > 30 ? '#1cb0f6' : '#ff4b4b';
        }

        function generateQuestion(p) {
            if(isGameOver) return;
            const isAddition = Math.random() > 0.4;
            let num1, num2;
            let operatorSymbol, opWord;

            if (isAddition) {
                num1 = Math.floor(Math.random() * (mathRange - 1)) + 1;
                let maxNum2 = mathRange - num1;
                if (maxNum2 < 1) maxNum2 = 1;
                num2 = Math.floor(Math.random() * maxNum2) + 1;
                p.ans = num1 + num2;
                operatorSymbol = '+'; opWord = 'plus';
            } else {
                num1 = Math.floor(Math.random() * (mathRange - 1)) + 2;
                num2 = Math.floor(Math.random() * (num1 - 1)) + 1;
                p.ans = num1 - num2;
                operatorSymbol = '-'; opWord = 'minus';
            }

            const speechText = `${num1} ${opWord} ${num2} equals what?`;

            document.getElementById(`math-question-${p.id}`).innerHTML = `
                <span>${num1} ${operatorSymbol} ${num2} = ?</span>
                <button onclick="speakMath(event, '${speechText}')" class="speaker-anim text-[#1cb0f6] bg-blue-50 p-2 md:p-3 rounded-full shadow-sm border-2 border-blue-200 flex items-center justify-center">
                    <svg class="w-6 h-6 md:w-8 md:h-8 drop-shadow-sm" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                </button>
            `;

            let answers = new Set([p.ans]);
            while(answers.size < 4) {
                let offset = Math.floor(Math.random() * 4) + 1;
                let wrongAns = p.ans + offset * (Math.random() > 0.5 ? 1 : -1);
                if (wrongAns >= 0 && wrongAns <= mathRange + 10) answers.add(wrongAns);
            }

            let answersArray = Array.from(answers).sort(() => Math.random() - 0.5);
            const container = document.getElementById(`answers-container-${p.id}`);
            container.innerHTML = '';
            
            const btnColor = p.id === 'girl' ? 'bg-[#ff4b4b] border-[#c80000]' : 'bg-[#1cb0f6] border-[#0284c7]';

            answersArray.forEach((ans) => {
                const btn = document.createElement('button');
                btn.dataset.answer = ans;
                btn.className = `py-3 md:py-5 text-2xl sm:text-3xl md:text-5xl font-black text-white rounded-2xl border-b-[6px] btn-bubbly ${btnColor} shadow-sm`;
                btn.innerText = ans;
                btn.onclick = () => checkAnswer(ans, btn, p);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selectedAnswer, btnElement, p) {
            if (p.isStunned || isGameOver) return;

            const container = document.getElementById(`answers-container-${p.id}`);
            container.querySelectorAll('button').forEach(b => b.disabled = true);

            if (selectedAnswer === p.ans) {
                playSound('correct');
                p.score++;
                document.getElementById(`score-${p.id}`).innerText = p.score;

                btnElement.classList.add('ring-4', 'ring-white', 'simulated-active');
                
                setTimeout(() => {
                    document.getElementById(`math-ui-${p.id}`).classList.add('hidden');
                    document.getElementById(`power-ui-${p.id}`).classList.remove('hidden');
                    startPowerBar(p);
                }, 400);

            } else {
                playSound('wrong');
                btnElement.classList.remove('border-b-[6px]');
                btnElement.classList.add('bg-gray-400', 'border-gray-500', 'translate-y-[6px]');
                stunPlayer(p, 3, "OOPS! WAIT", "🧊");
            }
        }

        function stunPlayer(p, seconds, msgText, iconEmoji) {
            p.isStunned = true;
            const overlay = document.getElementById(`overlay-${p.id}`);
            const textEl = document.getElementById(`text-freeze-${p.id}`);
            document.getElementById(`icon-freeze-${p.id}`).innerText = iconEmoji;
            
            overlay.classList.remove('hidden');
            
            let time = seconds;
            textEl.innerText = `${msgText} ${time}s`;
            
            const interval = setInterval(() => {
                time--;
                if(time > 0) {
                    textEl.innerText = `${msgText} ${time}s`;
                } else {
                    clearInterval(interval);
                    p.isStunned = false;
                    overlay.classList.add('hidden');
                    if(document.getElementById(`math-ui-${p.id}`).classList.contains('hidden') === false) {
                        generateQuestion(p);
                    }
                }
            }, 1000);
        }

        function startPowerBar(p) {
            p.power = 0; p.powerDir = 1;
            const indicator = document.getElementById(`power-indicator-${p.id}`);
            
            function animate() {
                if(isGameOver || p.isStunned || document.getElementById(`power-ui-${p.id}`).classList.contains('hidden')) {
                    cancelAnimationFrame(p.powerAnim); return;
                }
                p.power += (2.5 * p.powerDir);
                if (p.power >= 100) { p.power = 100; p.powerDir = -1; }
                if (p.power <= 0) { p.power = 0; p.powerDir = 1; }
                
                indicator.style.left = `${p.power}%`;
                p.powerAnim = requestAnimationFrame(animate);
            }
            p.powerAnim = requestAnimationFrame(animate);
        }

        function throwWeapon(playerId) {
            const p = playerId === 'girl' ? p1 : p2;
            const target = playerId === 'girl' ? p2 : p1;
            
            if(p.isStunned || isGameOver) return;
            cancelAnimationFrame(p.powerAnim); 

            playSound('throw');
            
            document.getElementById(`power-ui-${p.id}`).classList.add('hidden');
            document.getElementById(`math-ui-${p.id}`).classList.remove('hidden');

            let powerRatio = Math.max(0.2, p.power / 100);
            let finalDmg = Math.ceil(BASE_DAMAGE * powerRatio) * p.dmgMult;
            
            if (gameMode === 'pvc' && p.id === 'boy') {
                finalDmg = Math.min(10, finalDmg);
            }
            
            const battleArea = document.getElementById('battle-area');
            const proj = document.createElement('div');
            proj.className = 'projectile';
            
            const span = document.createElement('span');
            span.innerHTML = p.id === 'girl' ? '<svg class="w-20 h-20 md:w-28 md:h-28"><use href="#icon-tomato"></use></svg>' : '<svg class="w-20 h-20 md:w-28 md:h-28"><use href="#icon-egg"></use></svg>';
            
            proj.appendChild(span);
            battleArea.appendChild(proj);

            const startRect = document.getElementById(`char-${p.id}`).getBoundingClientRect();
            const endRect = document.getElementById(`char-${target.id}`).getBoundingClientRect();
            
            const startX = startRect.left + startRect.width / 2;
            const startY = startRect.top + startRect.height / 2;
            const endX = endRect.left + endRect.width / 2;
            const endY = endRect.top + endRect.height / 2;

            const baseScale = p.sizeMult > 1 ? 1.5 : 0.8;
            const midScale = p.sizeMult > 1 ? 2.5 : 1.5;
            const endScale = p.sizeMult > 1 ? 2 : 1;
            const rotateDir = p.id === 'girl' ? 360 : -360;

            const flyAnimation = [
                { transform: `translate(calc(${startX}px - 50%), calc(${startY}px - 50%)) rotate(0deg) scale(${baseScale})` },
                { transform: `translate(calc(${(startX + endX) / 2}px - 50%), calc(${startY - 250}px - 50%)) rotate(${rotateDir / 2}deg) scale(${midScale})` },
                { transform: `translate(calc(${endX}px - 50%), calc(${endY}px - 50%)) rotate(${rotateDir}deg) scale(${endScale})` }
            ];

            const animTiming = { duration: 1200, easing: 'cubic-bezier(.36,-0.32,.58,1.3)', fill: 'forwards' };
            const animation = proj.animate(flyAnimation, animTiming);

            animation.onfinish = () => {
                if(isGameOver) return;
                proj.remove();
                playSound('hit');
                createSplashEffect(target.id, p.id, p.sizeMult);

                const targetChar = document.getElementById(`char-${target.id}`);
                targetChar.classList.add('hit-anim');
                setTimeout(() => targetChar.classList.remove('hit-anim'), 400);

                target.hp -= finalDmg;
                if(target.hp < 0) target.hp = 0;
                updateHealthBars();
                showPopup(target.id, `-${finalDmg}`, 'dmg-popup');

                p.dmgMult = 1; p.sizeMult = 1;
                if (target.hp === 0) endGame();
                else generateQuestion(p);
            };
        }

        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        let confettis = [];
        let isConfettiActive = false;

        function resizeConfettiCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeConfettiCanvas); resizeConfettiCanvas();

        const confettiColors = ['#ff4b4b', '#1cb0f6', '#58cc02', '#ffc800', '#ce82ff', '#ff9600', '#f472b6'];

        class ConfettiPiece {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.w = Math.random() * 12 + 10;
                this.h = Math.random() * 10 + 8;
                this.color = confettiColors[Math.floor(Math.random() * confettiColors.length)];
                this.vy = Math.random() * 3 + 2.5;
                this.vx = Math.random() * 4 - 2;
                this.angle = Math.random() * 360;
                this.spin = (Math.random() * 6 - 3);
                this.type = Math.random() > 0.5 ? 'circle' : 'rect';
                this.tiltAngle = 0;
                this.tiltAngleInc = (Math.random() * 0.07) + 0.05;
            }
            update() {
                this.y += this.vy;
                this.x += this.vx + Math.sin(this.tiltAngle) * 2;
                this.angle += this.spin;
                this.tiltAngle += this.tiltAngleInc;
                if (this.y > canvas.height) {
                    this.y = -20;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle * Math.PI / 180);
                ctx.scale(1, Math.sin(this.tiltAngle)); // 3D flip effect
                ctx.fillStyle = this.color;
                
                if (this.type === 'circle') {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.w / 2, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillRect(-this.w / 2, -this.h / 2, this.w, this.h);
                }
                ctx.restore();
            }
        }

        function loopConfetti() {
            if (!isConfettiActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            confettis.forEach(c => { c.update(); c.draw(); });
            requestAnimationFrame(loopConfetti);
        }

        function startConfetti() {
             isConfettiActive = true;
             confettis = Array.from({length: 300}, () => new ConfettiPiece());
             loopConfetti();
         }
        function stopConfetti() {
             isConfettiActive = false;
             ctx.clearRect(0, 0, canvas.width, canvas.height);
         }

        // ==========================================
        // === CANVAS BACKGROUND SYSTEM ===
        // ==========================================
        (() => {
            const bgCanvas = document.getElementById('backgroundCanvas');
            const bgCtx = bgCanvas.getContext('2d', { alpha: false });

            let bgWidth = 0;
            let bgHeight = 0;
            let bgClouds = [];
            let bgTrees = [];
            let bgFlowers = [];
            let bgButterflies = [];

            const flowerColors = ['#ff4b4b', '#ffc800', '#ce82ff', '#ffffff', '#1cb0f6', '#ff8fab'];

            function resizeBackgroundCanvas() {
                const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
                bgWidth = window.innerWidth;
                bgHeight = window.innerHeight;
                bgCanvas.width = Math.floor(bgWidth * dpr);
                bgCanvas.height = Math.floor(bgHeight * dpr);
                bgCanvas.style.width = bgWidth + 'px';
                bgCanvas.style.height = bgHeight + 'px';
                bgCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
                generateBackgroundEnvironment();
            }

            function generateBackgroundEnvironment() {
                bgClouds = []; bgTrees = []; bgFlowers = []; bgButterflies = [];

                const cloudCount = bgWidth < 600 ? 3 : 5;
                for (let i = 0; i < cloudCount; i++) {
                    bgClouds.push({
                        x: Math.random() * bgWidth,
                        y: bgHeight * (0.08 + Math.random() * 0.34),
                        size: 28 + Math.random() * (bgWidth < 600 ? 34 : 52),
                        speed: Math.random() * 0.16 + 0.05,
                        opacity: 0.72 + Math.random() * 0.24
                    });
                }

                // RAISED GRASS LEVEL: Synchronized with HTML Character container style="bottom: max(42vh, 320px);"
                const groundBase = Math.max(bgHeight * 0.42, 320);
                const yEdge = bgHeight - groundBase + 10;
                
                const treeCount = bgWidth < 600 ? 6 : 11;
                for (let i = 0; i < treeCount; i++) {
                    bgTrees.push({
                        x: (i / Math.max(1, treeCount - 1)) * bgWidth + (Math.random() * 70 - 35),
                        y: (yEdge - 20) + Math.random() * 20, 
                        scale: 0.48 + Math.random() * 0.56
                    });
                }

                const flowerCount = bgWidth < 600 ? 10 : 18;
                for (let i = 0; i < flowerCount; i++) {
                    bgFlowers.push({
                        x: Math.random() * bgWidth,
                        y: yEdge + Math.random() * (groundBase - 30), 
                        color: flowerColors[Math.floor(Math.random() * flowerColors.length)],
                        scale: 0.42 + Math.random() * 0.42,
                        sway: Math.random() * Math.PI * 2,
                        petals: Math.random() > 0.45 ? 6 : 5
                    });
                }

                for (let i = 0; i < 4; i++) {
                    bgButterflies.push({
                        x: Math.random() * bgWidth,
                        y: bgHeight * (0.28 + Math.random() * 0.24),
                        size: 5 + Math.random() * 4,
                        speed: 0.18 + Math.random() * 0.18,
                        phase: Math.random() * Math.PI * 2,
                        color: ['#ff6b9d', '#ffd93d', '#9b5de5', '#00bbf9'][i % 4]
                    });
                }
            }

            function updateBackground() {
                bgClouds.forEach(cloud => {
                    cloud.x -= cloud.speed;
                    if (cloud.x + cloud.size * 2.4 < 0) {
                        cloud.x = bgWidth + cloud.size * 2.4;
                        cloud.y = bgHeight * (0.08 + Math.random() * 0.34);
                    }
                });

                bgButterflies.forEach(b => {
                    b.x += b.speed;
                    b.phase += 0.08;
                    if (b.x > bgWidth + 30) {
                        b.x = -30;
                        b.y = bgHeight * (0.28 + Math.random() * 0.24);
                    }
                });
            }

            function drawRoundedCloud(cloud) {
                bgCtx.save();
                bgCtx.globalAlpha = cloud.opacity;
                bgCtx.fillStyle = '#ffffff';
                bgCtx.beginPath();
                bgCtx.arc(cloud.x, cloud.y, cloud.size, 0, Math.PI * 2);
                bgCtx.arc(cloud.x + cloud.size * 0.82, cloud.y + cloud.size * 0.2, cloud.size * 0.72, 0, Math.PI * 2);
                bgCtx.arc(cloud.x - cloud.size * 0.85, cloud.y + cloud.size * 0.22, cloud.size * 0.68, 0, Math.PI * 2);
                bgCtx.arc(cloud.x + cloud.size * 0.15, cloud.y - cloud.size * 0.28, cloud.size * 0.72, 0, Math.PI * 2);
                bgCtx.fill();
                bgCtx.restore();
            }

            function drawSun() {
                // SUN MOVED TO CENTER
                const x = bgWidth * 0.5;
                const y = bgHeight * 0.15;
                const r = Math.max(35, Math.min(bgWidth, bgHeight) * 0.055);
                bgCtx.save();
                bgCtx.translate(x, y);
                bgCtx.fillStyle = 'rgba(255, 213, 82, 0.22)';
                bgCtx.beginPath();
                bgCtx.arc(0, 0, r * 1.75, 0, Math.PI * 2);
                bgCtx.fill();
                bgCtx.fillStyle = '#FFD369';
                bgCtx.beginPath();
                bgCtx.arc(0, 0, r, 0, Math.PI * 2);
                bgCtx.fill();
                bgCtx.fillStyle = '#D35400';
                bgCtx.beginPath();
                bgCtx.arc(-r * 0.32, -r * 0.1, r * 0.08, 0, Math.PI * 2);
                bgCtx.arc(r * 0.32, -r * 0.1, r * 0.08, 0, Math.PI * 2);
                bgCtx.fill();
                bgCtx.strokeStyle = '#D35400';
                bgCtx.lineWidth = Math.max(3, r * 0.07);
                bgCtx.lineCap = 'round';
                bgCtx.beginPath();
                bgCtx.arc(0, r * 0.12, r * 0.36, 0.15 * Math.PI, 0.85 * Math.PI);
                bgCtx.stroke();
                bgCtx.restore();
            }

            function drawRainbow() {
                bgCtx.save();
                bgCtx.translate(bgWidth * 0.5, bgHeight * 0.67);
                bgCtx.lineWidth = Math.max(13, Math.min(22, bgWidth * 0.015));
                bgCtx.lineCap = 'round';
                const rainbowColors = ['#ff4b4b', '#ff9900', '#ffc800', '#58cc02', '#1cb0f6', '#ce82ff'];
                const baseRadius = Math.min(bgWidth * 0.34, bgHeight * 0.46, 420);
                for (let i = 0; i < rainbowColors.length; i++) {
                    bgCtx.strokeStyle = rainbowColors[i];
                    bgCtx.globalAlpha = 0.82;
                    bgCtx.beginPath();
                    bgCtx.arc(0, 0, baseRadius - i * bgCtx.lineWidth, Math.PI, 0);
                    bgCtx.stroke();
                }
                bgCtx.restore();
            }

            function drawTree(tree) {
                bgCtx.save();
                bgCtx.translate(tree.x, tree.y);
                bgCtx.scale(tree.scale, tree.scale);
                bgCtx.fillStyle = '#8B5A2B';
                bgCtx.fillRect(-9, 0, 18, 56);
                bgCtx.fillStyle = '#4ade80';
                bgCtx.beginPath();
                bgCtx.arc(0, -24, 38, 0, Math.PI * 2);
                bgCtx.arc(-25, -12, 29, 0, Math.PI * 2);
                bgCtx.arc(24, -10, 30, 0, Math.PI * 2);
                bgCtx.fill();
                bgCtx.fillStyle = 'rgba(255,255,255,0.28)';
                bgCtx.beginPath();
                bgCtx.arc(-12, -34, 12, 0, Math.PI * 2);
                bgCtx.fill();
                bgCtx.restore();
            }

            function drawFlower(flower, time) {
                bgCtx.save();
                const sway = Math.sin(time * 0.0015 + flower.sway) * 1.4;
                bgCtx.translate(flower.x + sway, flower.y);
                bgCtx.scale(flower.scale, flower.scale);

                bgCtx.strokeStyle = '#259a3f';
                bgCtx.lineWidth = 2.4;
                bgCtx.lineCap = 'round';
                bgCtx.beginPath();
                bgCtx.moveTo(0, 5);
                bgCtx.quadraticCurveTo(2, 14, 0, 23);
                bgCtx.stroke();

                bgCtx.fillStyle = '#55d85a';
                bgCtx.beginPath();
                bgCtx.ellipse(-6, 15, 4, 8, -0.8, 0, Math.PI * 2);
                bgCtx.ellipse(6, 18, 4, 8, 0.75, 0, Math.PI * 2);
                bgCtx.fill();

                const petalCount = flower.petals || 6;
                bgCtx.fillStyle = flower.color;
                for (let petal = 0; petal < petalCount; petal++) {
                    bgCtx.save();
                    bgCtx.rotate((Math.PI * 2 * petal) / petalCount);
                    bgCtx.beginPath();
                    bgCtx.ellipse(0, -9, 5.2, 9.5, 0, 0, Math.PI * 2);
                    bgCtx.fill();
                    bgCtx.restore();
                }

                bgCtx.fillStyle = '#ffe066';
                bgCtx.beginPath();
                bgCtx.arc(0, 0, 5, 0, Math.PI * 2);
                bgCtx.fill();
                bgCtx.strokeStyle = 'rgba(154,103,0,0.28)';
                bgCtx.lineWidth = 1;
                bgCtx.stroke();
                bgCtx.restore();
            }

            function drawButterfly(b) {
                const y = b.y + Math.sin(b.phase) * 10;
                bgCtx.save();
                bgCtx.translate(b.x, y);
                bgCtx.fillStyle = b.color;
                bgCtx.globalAlpha = 0.88;
                bgCtx.beginPath();
                bgCtx.ellipse(-b.size, 0, b.size, b.size * 1.35, Math.sin(b.phase) * 0.5, 0, Math.PI * 2);
                bgCtx.ellipse(b.size, 0, b.size, b.size * 1.35, -Math.sin(b.phase) * 0.5, 0, Math.PI * 2);
                bgCtx.fill();
                bgCtx.strokeStyle = '#334155';
                bgCtx.lineWidth = 1.4;
                bgCtx.beginPath();
                bgCtx.moveTo(0, -b.size * 1.1);
                bgCtx.lineTo(0, b.size * 1.2);
                bgCtx.stroke();
                bgCtx.restore();
            }

            function drawBackground(time = 0) {
                const skyGradient = bgCtx.createLinearGradient(0, 0, 0, bgHeight * 0.72);
                skyGradient.addColorStop(0, '#7dd3fc');
                skyGradient.addColorStop(0.62, '#bae6fd');
                skyGradient.addColorStop(1, '#e0f8ff');
                bgCtx.fillStyle = skyGradient;
                bgCtx.fillRect(0, 0, bgWidth, bgHeight);

                drawSun();
                drawRainbow();

                bgClouds.forEach(drawRoundedCloud);
                bgButterflies.forEach(drawButterfly);

                // EXACT MATH SYNC WITH HTML CHARACTERS
                const groundBase = Math.max(bgHeight * 0.42, 320);
                const yEdge = bgHeight - groundBase + 10;
                const yCenter = yEdge - Math.min(40, bgHeight * 0.05);

                // Back Grass Layer
                bgCtx.fillStyle = '#65a30d';
                bgCtx.beginPath();
                bgCtx.moveTo(0, bgHeight);
                bgCtx.lineTo(0, yEdge - 20);
                for (let x = 0; x <= bgWidth + 280; x += 280) {
                    bgCtx.quadraticCurveTo(x - 140, yCenter - 30, x, yEdge - 20);
                }
                bgCtx.lineTo(bgWidth, bgHeight);
                bgCtx.fill();

                bgTrees.forEach(drawTree);

                // Front Grass Layer
                bgCtx.fillStyle = '#58cc02';
                bgCtx.beginPath();
                bgCtx.moveTo(0, bgHeight);
                bgCtx.lineTo(0, yEdge);
                bgCtx.quadraticCurveTo(bgWidth * 0.5, yCenter, bgWidth, yEdge);
                bgCtx.lineTo(bgWidth, bgHeight);
                bgCtx.fill();

                // Highlight Outline
                bgCtx.strokeStyle = '#84cc16';
                bgCtx.lineWidth = Math.max(10, Math.min(18, bgWidth * 0.014));
                bgCtx.lineCap = 'round';
                bgCtx.beginPath();
                bgCtx.moveTo(-20, yEdge);
                bgCtx.quadraticCurveTo(bgWidth * 0.5, yCenter, bgWidth + 20, yEdge);
                bgCtx.stroke();

                bgFlowers.forEach(flower => drawFlower(flower, time));
            }

            function backgroundAnimationLoop(time) {
                updateBackground();
                drawBackground(time);
                requestAnimationFrame(backgroundAnimationLoop);
            }

            window.addEventListener('resize', resizeBackgroundCanvas);
            resizeBackgroundCanvas();
            requestAnimationFrame(backgroundAnimationLoop);
        })();
    </script>
</body>
</html>
