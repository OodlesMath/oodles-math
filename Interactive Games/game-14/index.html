<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hidden Picture Hunt</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap');

        :root {
            /* Duolingo-inspired Color Palette - Enhanced Vibrancy */
            --primary: #1CB0F6;
            --primary-shadow: #1899D6;
            --success: #58CC02;
            --success-shadow: #58A700;
            --warning: #FFC800;
            --warning-shadow: #E5B400;
            --danger: #FF4B4B;
            --danger-shadow: #EA2B2B;
            --purple: #CE82FF;
            --purple-shadow: #A558D6;
            --pink: #FF96C5;
            --pink-shadow: #D16A99;
            
            --bg-color: #E5E5E5; 
            --card-bg: #FFFFFF;
            --text-main: #4B4B4B;
            --text-light: #AFB2B6;
            
            --border-radius: 24px;
            --btn-radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            touch-action: none; 
            background-image: radial-gradient(circle at 50% 50%, #ffffff 0%, var(--bg-color) 100%);
        }

        #app-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 768px) and (min-height: 600px) {
            #app-container {
                width: 90vw;
                max-width: 1024px;
                height: 90vh;
                max-height: 800px;
                border-radius: var(--border-radius);
                box-shadow: 0 20px 50px rgba(0,0,0,0.15), 0 0 0 10px rgba(255,255,255,0.5);
                border: 4px solid #E5E5E5;
            }
        }

        .screen {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: var(--card-bg);
            z-index: 10;
        }
        .screen.active {
            display: flex;
        }

        .btn {
            background-color: var(--success);
            color: white;
            border: none;
            border-radius: var(--btn-radius);
            padding: 16px 32px;
            font-size: clamp(20px, 4vw, 26px);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--success-shadow);
            transition: transform 0.1s, box-shadow 0.1s;
            outline: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 var(--success-shadow);
        }
        .btn-primary { background-color: var(--primary); box-shadow: 0 6px 0 var(--primary-shadow); }
        .btn-primary:active { transform: translateY(6px); box-shadow: 0 0px 0 var(--primary-shadow); }
        .btn-warning { background-color: var(--warning); box-shadow: 0 6px 0 var(--warning-shadow); color: #B38600;}
        .btn-warning:active { transform: translateY(6px); box-shadow: 0 0px 0 var(--warning-shadow); }
        
        .btn:disabled {
            background-color: #E5E5E5;
            color: #AFB2B6;
            box-shadow: 0 6px 0 #D0D0D0;
            cursor: not-allowed;
            transform: translateY(0);
        }

        /* START SCREEN */
        #start-screen {
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #89E219 0%, #58CC02 100%);
            color: white;
            text-align: center;
            padding: 20px;
        }
        .floating-bg {
            position: absolute;
            opacity: 0.2;
            animation: float 6s infinite ease-in-out;
            pointer-events: none;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }
        #start-screen h1 {
            font-size: clamp(40px, 10vw, 72px);
            font-weight: 900;
            text-shadow: 0 6px 0 rgba(0,0,0,0.15);
            margin-bottom: 15px;
            line-height: 1.1;
            letter-spacing: -1px;
            z-index: 2;
        }
        #start-screen p {
            font-size: clamp(18px, 4vw, 26px);
            font-weight: 700;
            margin-bottom: 40px;
            background: rgba(255,255,255,0.25);
            padding: 12px 24px;
            border-radius: 24px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.05);
            z-index: 2;
        }
        #start-hero-icon {
            width: clamp(150px, 30vw, 220px);
            height: clamp(150px, 30vw, 220px);
            margin-bottom: 20px;
            animation: bounce 2s infinite ease-in-out;
            z-index: 2;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2));
        }

        /* GAME SCREEN */
        #game-screen {
            display: none;
            flex-direction: column;
            background-color: var(--bg-color); 
        }
        #game-screen.active {
            display: flex;
        }

        #top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: var(--card-bg);
            border-bottom: 2px solid #E5E5E5;
            z-index: 20;
        }
        
        .hud-item {
            display: flex;
            align-items: center;
            background: #F0F0F0;
            padding: 6px 16px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 18px;
            color: var(--warning);
            text-shadow: 0 1px 0 rgba(0,0,0,0.1);
            gap: 8px;
            border: 2px solid #E5E5E5;
        }
        
        #sound-btn {
            background: none;
            border: none;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F0F0F0;
            color: var(--text-main);
            font-size: 20px;
            border: 2px solid #E5E5E5;
            transition: transform 0.1s;
        }
        #sound-btn:active { transform: scale(0.9); }

        #level-instruction-container {
            background: var(--card-bg);
            padding: 8px 0;
            text-align: center;
            z-index: 20;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        #level-instruction {
            font-size: clamp(20px, 5vw, 30px);
            font-weight: 900;
            color: var(--primary);
            text-transform: capitalize;
            text-shadow: 0 2px 0 rgba(0,0,0,0.05);
        }

        #scene-wrapper {
            position: relative;
            width: 100%;
            flex-grow: 1;
            overflow: hidden;
            background: #D5E8F2; 
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }

        #scene-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        .scene-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; 
            z-index: 1;
        }

        .hidden-item {
            position: absolute;
            cursor: pointer;
            transform-origin: center center;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
        }
        .hidden-item:hover {
            transform: scale(1.15) rotate(5deg);
        }
        .hidden-item.found {
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #feedback-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            background: white;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 32px;
            font-weight: 900;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2), 0 0 0 6px rgba(255,255,255,0.5);
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 20;
            text-align: center;
            color: var(--success);
        }
        #feedback-msg.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        /* BOTTOM BAR & COLLECTION (UPDATED FOR VER 3) */
        #bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: var(--card-bg);
            border-top: 2px solid #E5E5E5;
            min-height: 90px;
            z-index: 20;
        }
        
        #collection-area {
            display: flex;
            align-items: center;
            background: #F8F8F8;
            padding: 8px;
            border-radius: 20px;
            border: 2px solid #EAEAEA;
            flex-grow: 1;
            margin-right: 15px;
            overflow: hidden; /* Keep items inside */
        }
        
        #collection-icon {
            width: 60px;
            height: 60px;
            min-width: 60px;
            background: white;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 3px solid #E5E5E5;
            box-shadow: 0 4px 0 #E5E5E5;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2;
        }
        #collection-icon svg {
            width: 70%;
            height: 70%;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
        }
        
        #collected-items-box {
            display: flex;
            align-items: center;
            gap: 6px;
            padding-left: 12px;
            flex-wrap: wrap;
            height: 100%;
        }

        .mini-collected-item {
            width: 32px;
            height: 32px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
        }
        .mini-collected-item svg {
            width: 100%;
            height: 100%;
        }
        
        #next-btn {
            font-size: 20px;
            padding: 12px 24px;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.8);
            transition: opacity 0.4s, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-width: 120px;
        }
        #next-btn.visible {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        /* END SCREEN */
        #end-screen {
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, var(--purple) 0%, #9B59B6 100%);
            z-index: 30; 
            padding: 20px;
        }
        #end-screen h2 {
            font-size: clamp(40px, 10vw, 64px);
            color: white;
            font-weight: 900;
            margin-bottom: 10px;
            text-shadow: 0 6px 0 rgba(0,0,0,0.2);
            z-index: 35;
        }
        #end-screen .subtitle {
            font-size: clamp(18px, 4vw, 24px);
            font-weight: 700;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
            background: rgba(0,0,0,0.1);
            padding: 10px 20px;
            border-radius: 20px;
            z-index: 35;
        }
        .stats-box {
            background: white;
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2), 0 0 0 8px rgba(255,255,255,0.2);
            z-index: 35;
            position: relative;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--text-light);
            border-bottom: 2px dashed #E5E5E5;
            padding-bottom: 15px;
        }
        .stat-row:last-child {
            margin-bottom: 0;
            border-bottom: none;
            padding-bottom: 0;
        }
        .stat-row span:last-child {
            color: var(--primary);
            font-size: 32px;
            font-weight: 900;
        }
        .stat-row .score-val {
            color: var(--warning) !important;
            text-shadow: 0 2px 0 var(--warning-shadow);
        }

        #play-again-btn {
            z-index: 35;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        @keyframes wiggle {
            0% { transform: rotate(0deg) scale(1.1); }
            20% { transform: rotate(15deg) scale(1.1); }
            40% { transform: rotate(-15deg) scale(1.1); }
            60% { transform: rotate(15deg) scale(1.1); }
            80% { transform: rotate(-15deg) scale(1.1); }
            100% { transform: rotate(0deg) scale(1.1); }
        }
        .wiggle {
            animation: wiggle 0.8s ease-in-out;
        }
        @keyframes sparkle-anim {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.5) rotate(180deg); opacity: 1; }
            100% { transform: scale(0) rotate(360deg); opacity: 0; }
        }
        .sparkle-fx {
            position: absolute;
            width: 60px;
            height: 60px;
            pointer-events: none;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 0 L60 40 L100 50 L60 60 L50 100 L40 60 L0 50 L40 40 Z" fill="%23FFC800"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            animation: sparkle-anim 0.7s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            filter: drop-shadow(0 0 10px rgba(255, 200, 0, 0.8));
        }

        #confetti-canvas {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 99999; 
        }
    </style>
</head>
<body>

    <div id="app-container">
        
        <div id="start-screen" class="screen active">
            <svg class="floating-bg" style="top: 10%; left: 10%; width: 50px;" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="white"/></svg>
            <svg class="floating-bg" style="top: 20%; right: 15%; width: 70px; animation-delay: -2s;" viewBox="0 0 100 100"><polygon points="50,10 90,90 10,90" fill="white"/></svg>
            <svg class="floating-bg" style="bottom: 15%; left: 20%; width: 60px; animation-delay: -4s;" viewBox="0 0 100 100"><rect x="20" y="20" width="60" height="60" rx="10" fill="white"/></svg>
            
            <svg id="start-hero-icon" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="100" cy="80" r="70" fill="white" stroke="#1CB0F6" stroke-width="12"/>
                <circle cx="100" cy="80" r="50" fill="#E8F6FF"/>
                <circle cx="75" cy="70" r="12" fill="#4B4B4B"/>
                <circle cx="125" cy="70" r="12" fill="#4B4B4B"/>
                <circle cx="78" cy="65" r="4" fill="white"/>
                <circle cx="128" cy="65" r="4" fill="white"/>
                <ellipse cx="60" cy="85" rx="8" ry="5" fill="#FF96C5" opacity="0.6"/>
                <ellipse cx="140" cy="85" rx="8" ry="5" fill="#FF96C5" opacity="0.6"/>
                <path d="M 85 100 Q 100 115 115 100" fill="none" stroke="#4B4B4B" stroke-width="8" stroke-linecap="round"/>
                <rect x="88" y="150" width="24" height="40" rx="12" fill="#1CB0F6"/>
                <path d="M100 150 L100 190" stroke="#1899D6" stroke-width="8" stroke-linecap="round"/>
            </svg>
            <h1 style="color: white;">Hidden<br>Picture Hunt</h1>
            <p>Look carefully and find the hidden objects!</p>
            <button id="start-btn" class="btn">Play Now <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg></button>
        </div>

        <div id="game-screen" class="screen">
            <div id="top-bar">
                <div class="hud-item" id="score-display">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--warning)"><path d="M12 .587l3.668 7.568 8.332 1.151-6.064 5.828 1.48 8.279-7.416-3.967-7.417 3.967 1.481-8.279-6.064-5.828 8.332-1.151z"/></svg>
                    <span id="score-text">0</span>
                </div>
                <div class="hud-item" style="color: var(--primary);">
                    Level <span id="level-text">1</span>/10
                </div>
                <button id="sound-btn">🔊</button>
            </div>
            
            <div id="level-instruction-container">
                <div id="level-instruction">Find 3 keys!</div>
            </div>

            <div id="scene-wrapper">
                <div id="scene-container"></div>
                <div id="feedback-msg">Great job!</div>
            </div>

            <div id="bottom-bar">
                <div id="collection-area">
                    <div id="collection-icon">
                        <!-- Icon goes here -->
                    </div>
                    <!-- New container for visually stacking found items -->
                    <div id="collected-items-box"></div>
                </div>
                <button id="next-btn" class="btn btn-primary">Next <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M5 3l3.057-3 11.943 12-11.943 12-3.057-3 9-9z"/></svg></button>
            </div>
        </div>

        <div id="end-screen" class="screen">
            <svg class="floating-bg" style="top: 10%; left: 10%; width: 40px;" viewBox="0 0 100 100"><polygon points="50,0 60,40 100,50 60,60 50,100 40,60 0,50 40,40" fill="white"/></svg>
            <svg class="floating-bg" style="top: 20%; right: 15%; width: 50px; animation-delay: -1s;" viewBox="0 0 100 100"><polygon points="50,0 60,40 100,50 60,60 50,100 40,60 0,50 40,40" fill="white"/></svg>
            <svg class="floating-bg" style="bottom: 30%; left: 15%; width: 30px; animation-delay: -2s;" viewBox="0 0 100 100"><polygon points="50,0 60,40 100,50 60,60 50,100 40,60 0,50 40,40" fill="white"/></svg>
            
            <h2>Amazing!</h2>
            <div class="subtitle">You beat all 10 levels!</div>
            
            <div class="stats-box">
                <div class="stat-row">
                    <span>Objects Found</span>
                    <span id="final-items">15</span>
                </div>
                <div class="stat-row">
                    <span>Total Score</span>
                    <span id="final-score" class="score-val">230</span>
                </div>
            </div>
            
            <button id="play-again-btn" class="btn btn-warning" style="color: #664d00;">Play Again <svg width="24" height="24" viewBox="0 0 24 24" fill="#664d00"><path d="M12 2.02c5.514 0 10 4.486 10 10s-4.486 10-10 10-10-4.486-10-10 4.486-10 10-10zm0-2.02c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm6 12h-4v4h-4v-4h-4v-4h4v-4h4v4h4v4z" opacity="0"/><path d="M13.5 2c-5.629 0-10.212 4.436-10.475 10h-3.025l4.537 5.917 4.463-5.917h-2.975c.26-3.902 3.508-7 7.475-7 4.136 0 7.5 3.364 7.5 7.5s-3.364 7.5-7.5 7.5c-2.381 0-4.502-1.119-5.876-2.854l-1.847 2.449c1.919 2.088 4.664 3.405 7.723 3.405 5.798 0 10.5-4.702 10.5-10.5s-4.702-10.5-10.5-10.5z"/></svg></button>
        </div>
        
    </div>

    <canvas id="confetti-canvas"></canvas>

<script>
    // ----------------------------------------------------------------------
    // SVGs (Backgrounds, Items, Collections) - Expanded to 10 Levels
    // ----------------------------------------------------------------------
    const itemSVGs = {

    function initAudio() {
        if (!audioCtx) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playTone(freq, type, duration, vol = 0.1) {
        if (!soundEnabled || !audioCtx) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        } catch (e) { console.log(e); }
    }

    function playSoundCorrect() {
        playTone(523.25, 'sine', 0.1, 0.2); 
        setTimeout(() => playTone(659.25, 'sine', 0.1, 0.2), 80); 
        setTimeout(() => playTone(1046.50, 'sine', 0.3, 0.2), 160); 
    }

        setTimeout(() => playTone(250, 'sine', 0.2, 0.1), 100);
    }

    function playSoundLevelComplete() {
        const notes = [523.25, 659.25, 783.99, 1046.50];

        });

    }

            setTimeout(() => playTone(n.f, 'triangle', 0.3, 0.15), n.t);
        });
    }

    function flyItemToCollection(originalItem, e) {
        const level = levelsData[currentLevelIndex];
        
        // 1. Create a transparent placeholder mini icon in the collected box first
        const miniItem = document.createElement('div');
        miniItem.className = 'mini-collected-item';
        miniItem.innerHTML = level.itemSVG;
        miniItem.style.opacity = '0';
        ui.collectedItemsBox.appendChild(miniItem);
        
        // Ensure browser renders it to get correct position
        miniItem.getBoundingClientRect();

        // 2. Clone the clicked item for animation
        const rect = originalItem.getBoundingClientRect();
        const clone = document.createElement('div');
        clone.innerHTML = originalItem.innerHTML;
        clone.style.position = 'fixed';
        clone.style.left = `${rect.left}px`;
        clone.style.top = `${rect.top}px`;
        clone.style.width = `${rect.width}px`;
        clone.style.height = `${rect.height}px`;
        clone.style.zIndex = '1000';
        clone.style.transition = 'all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)'; 
        clone.style.pointerEvents = 'none';
        
        const svg = clone.querySelector('svg');
        if(svg) { svg.style.width = '100%'; svg.style.height = '100%'; }

        document.body.appendChild(clone);
        originalItem.classList.add('found');

        // 3. Calculate destination (the mini icon we just appended)
        const destRect = miniItem.getBoundingClientRect();
        const destX = destRect.left;
        const destY = destRect.top;

        clone.getBoundingClientRect(); // reflow

        // 4. Animate clone to dest
        clone.style.left = `${destX}px`;
        clone.style.top = `${destY}px`;
        clone.style.width = `32px`;
        clone.style.height = `32px`;
        clone.style.transform = 'rotate(360deg)';
        clone.style.opacity = '0.8';

        // 5. Cleanup on end
        setTimeout(() => {
            clone.remove();
            
            // Show real mini icon and pop it
            miniItem.style.opacity = '1';
            miniItem.style.transform = 'scale(1.4)';
            setTimeout(() => miniItem.style.transform = 'scale(1)', 200);

            // Bounce main basket slightly
            ui.collectionIcon.style.transform = 'scale(1.1) translateY(-5px)';
            setTimeout(() => ui.collectionIcon.style.transform = 'scale(1) translateY(0)', 200);
            
            updateLevelProgress();
        }, 600);
    }

    // CONFETTI
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    let confettiParticles = [];
    let confettiAnimationId = null;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function createConfetti() {
        const colors = ['#1CB0F6', '#58CC02', '#FFC800', '#FF4B4B', '#CE82FF', '#FF96C5'];
        const shapes = ['square', 'circle', 'triangle'];
        
        for (let i = 0; i < 200; i++) {
            confettiParticles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height - 50,
                w: Math.random() * 12 + 8,
                h: Math.random() * 12 + 8,
                color: colors[Math.floor(Math.random() * colors.length)],
                shape: shapes[Math.floor(Math.random() * shapes.length)],
                vy: Math.random() * 4 + 3, 
                vx: Math.random() * 6 - 3, 
                rot: Math.random() * 360,
                rotSpeed: Math.random() * 10 - 5
            });
        }
    }

    function updateConfetti() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let activeParticles = 0;
        
        confettiParticles.forEach((p) => {
            p.y += p.vy;
            p.x += p.vx;
            p.rot += p.rotSpeed;
            p.vx += Math.sin(p.y * 0.01) * 0.1;
            
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot * Math.PI / 180);
            ctx.fillStyle = p.color;
            
            if (p.shape === 'square') {
                ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
            } else if (p.shape === 'circle') {
                ctx.beginPath();
                ctx.arc(0, 0, p.w/2, 0, Math.PI * 2);
                ctx.fill();
            } else { 
                ctx.beginPath();
                ctx.moveTo(0, -p.h/2);
                ctx.lineTo(p.w/2, p.h/2);
                ctx.lineTo(-p.w/2, p.h/2);
                ctx.fill();
            }
            ctx.restore();

            if (p.y < canvas.height + 50) {
                activeParticles++;
            }
        });

        if (activeParticles > 0) {
            confettiAnimationId = requestAnimationFrame(updateConfetti);
        }
    }

    function startConfetti() {
        resizeCanvas();
        confettiParticles = [];
        createConfetti();
        if(confettiAnimationId) cancelAnimationFrame(confettiAnimationId);
        updateConfetti();
    }

    function stopConfetti() {
        confettiParticles = [];
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if(confettiAnimationId) cancelAnimationFrame(confettiAnimationId);
    }

</script>
