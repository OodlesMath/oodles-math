<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Background Template</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0ea5e9;
            --secondary: #ec4899;
            --accent: #facc15;
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            overflow: hidden;
            touch-action: none;
            /* Prevent text selection to feel more like an app */
            user-select: none;
            -webkit-user-select: none;
        }

        /* Beautiful Duolingo-style Scenery Background */
        .scenery-bg {
            position: fixed;
            inset: 0;
            z-index: -10;
            background: linear-gradient(to bottom, #7dd3fc 0%, #e0f2fe 60%);
            overflow: hidden;
        }

        .sun {
            position: absolute;
            top: 5%;
            left: 10%;
            width: 120px;
            height: 120px;
            background: #fef08a;
            border-radius: 50%;
            box-shadow: 0 0 40px #facc15, 0 0 80px #fde047;
            animation: pulse-sun 4s infinite alternate ease-in-out;
        }

        /* Massive Rainbow touching the grass */
        .rainbow {
            position: absolute;
            bottom: calc(20vh - 450px);
            left: 50%;
            transform: translateX(-50%);
            width: 900px;
            height: 900px;
            border-radius: 50%;
            box-shadow: 
                inset 0 0 0 28px rgba(239, 68, 68, 0.6),
                inset 0 0 0 56px rgba(249, 115, 22, 0.6),
                inset 0 0 0 84px rgba(250, 204, 21, 0.6),
                inset 0 0 0 112px rgba(74, 222, 128, 0.6),
                inset 0 0 0 140px rgba(59, 130, 246, 0.6),
                inset 0 0 0 168px rgba(168, 85, 247, 0.6);
            opacity: 0.7;
            clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%);
            z-index: -5; /* Stay behind everything but background */
        }

        /* Rainbow scaling for larger screens */
        @media (min-width: 768px) {
            .rainbow {
                width: 1400px;
                height: 1400px;
                bottom: calc(20vh - 700px);
                box-shadow: 
                    inset 0 0 0 40px rgba(239, 68, 68, 0.6),
                    inset 0 0 0 80px rgba(249, 115, 22, 0.6),
                    inset 0 0 0 120px rgba(250, 204, 21, 0.6),
                    inset 0 0 0 160px rgba(74, 222, 128, 0.6),
                    inset 0 0 0 200px rgba(59, 130, 246, 0.6),
                    inset 0 0 0 240px rgba(168, 85, 247, 0.6);
            }
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.9;
            animation: float-clouds linear infinite;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .cloud-1 { top: 15%; width: 120px; height: 40px; animation-duration: 40s; left: -150px; }
        .cloud-1::before { width: 50px; height: 50px; top: -25px; left: 15px; }
        .cloud-1::after { width: 70px; height: 70px; top: -35px; right: 15px; }
        
        .cloud-2 { top: 25%; width: 100px; height: 35px; animation-duration: 55s; left: -120px; animation-delay: 15s; }
        .cloud-2::before { width: 40px; height: 40px; top: -20px; left: 15px; }
        .cloud-2::after { width: 60px; height: 60px; top: -30px; right: 10px; }

        .grass-layer-1 {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 25vh;
            background: #4ade80;
            border-top: 8px solid #22c55e;
            border-radius: 50% 50% 0 0 / 40px 100px 0 0;
            transform: scaleX(1.2);
            z-index: -4;
        }
        
        .grass-layer-2 {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 18vh;
            background: #22c55e;
            border-top: 8px solid #16a34a;
            border-radius: 50% 50% 0 0 / 100px 40px 0 0;
            transform: scaleX(1.2) translateX(-5%);
            z-index: -3;
        }

        .scenery-tree {
            position: absolute;
            bottom: 15vh;
            width: 60px;
            height: 120px;
            z-index: -2;
        }
        .tree-trunk { position: absolute; bottom: 0; left: 20px; width: 20px; height: 40px; background: #92400e; border-radius: 5px; }
        .tree-leaves { position: absolute; bottom: 30px; left: 0; width: 60px; height: 90px; background: #15803d; border-radius: 50px; }

        .scenery-flower {
            position: absolute;
            bottom: 5vh;
            width: 30px;
            height: 40px;
            z-index: -1;
        }
        .flower-stem { position: absolute; bottom: 0; left: 13px; width: 4px; height: 20px; background: #16a34a; }
        .flower-petals { position: absolute; top: 0; left: 5px; width: 20px; height: 20px; background: #ec4899; border-radius: 50%; box-shadow: 0 0 0 5px #f472b6; }
        .flower-center { position: absolute; top: 5px; left: 10px; width: 10px; height: 10px; background: #facc15; border-radius: 50%; }

        /* Top Right Logo Area */
        .logo-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        .oodles-logo {
            max-width: 120px;
            height: auto;
            background: rgba(255,255,255,0.8);
            padding: 5px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Animations */
        @keyframes float-clouds {
            from { transform: translateX(-50vw); }
            to { transform: translateX(150vw); }
        }

        @keyframes pulse-sun {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }
    </style>
</head>
<!-- Add standard flex layout classes to body so any injected game card is centered automatically -->
<body class="flex items-center justify-center h-screen p-4">
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- Duolingo Style Background -->
    <div class="scenery-bg">
        <div class="sun"></div>
        <div class="rainbow"></div>
        
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2" style="top: 40%; transform: scale(1.5);"></div>
        <div class="cloud cloud-1" style="top: 60%; left: 30%; animation-duration: 45s;"></div>

        <!-- Grass overlapping rainbow -->
        <div class="grass-layer-1"></div>
        <div class="grass-layer-2"></div>

        <!-- Trees -->
        <div class="scenery-tree" style="left: 10%;">
            <div class="tree-trunk"></div><div class="tree-leaves"></div>
        </div>
        <div class="scenery-tree" style="right: 20%; transform: scale(1.2);">
            <div class="tree-trunk"></div><div class="tree-leaves"></div>
        </div>

        <!-- Flowers -->
        <div class="scenery-flower" style="left: 25%;"><div class="flower-stem"></div><div class="flower-petals" style="background:#f43f5e;"></div><div class="flower-center"></div></div>
        <div class="scenery-flower" style="left: 45%;"><div class="flower-stem"></div><div class="flower-petals" style="background:#8b5cf6;"></div><div class="flower-center"></div></div>
        <div class="scenery-flower" style="right: 35%;"><div class="flower-stem"></div><div class="flower-petals" style="background:#0ea5e9;"></div><div class="flower-center"></div></div>
        <div class="scenery-flower" style="right: 15%;"><div class="flower-stem"></div><div class="flower-petals" style="background:#f97316;"></div><div class="flower-center"></div></div>
    </div>

    <!-- Logo Area Top Right -->
    <div class="logo-container">
        <img src="../assets/logo-oodles-math.png" class="oodles-logo" onerror="this.style.display='none'" alt="Logo">
    </div>

    <!-- NỘI DUNG GAME MỚI CỦA BẠN SẼ ĐƯỢC CHÈN VÀO ĐÂY -->

</body>
</html>
