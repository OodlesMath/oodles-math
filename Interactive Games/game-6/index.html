<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Caro Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Duolingo-inspired Bright Color Palette */
            --green: #58cc02;
            --green-shadow: #58a700;
            --blue: #1cb0f6;
            --blue-shadow: #1899d6;
            --yellow: #ffc800;
            --yellow-shadow: #e5b400;
            --orange: #ff9600;
            --orange-shadow: #e58700;
            --pink: #ff4b4b;
            --pink-shadow: #ea3232;
            --white: #ffffff;
            --sky-top: #78d6ff;
            --sky-bottom: #e5f6ff;
            --text-main: #4b4b4b;
            --text-light: #afafaf;
            --board-border: #e5e5e5;
            --cell-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-bottom) 100%);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            padding-bottom: 30px;
        }

        /* Beautiful Duolingo-style Background Landscape */
        .landscape {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 15vh;
            background: var(--green);
            border-top: 6px solid var(--green-shadow);
            border-top-left-radius: 50% 40px;
            border-top-right-radius: 50% 40px;
            z-index: -1;
        }
        
        .landscape::before {
            content: '';
            position: absolute;
            bottom: -20px;
            left: -10%;
            width: 60%;
            height: 18vh;
            background: #61df02;
            border-top-left-radius: 50% 60px;
            border-top-right-radius: 50% 60px;
            z-index: -1;
        }

        .cloud {
            background: white;
            border-radius: 50px;
            position: absolute;
            animation: float 12s infinite alternate ease-in-out;
            opacity: 0.8;
            z-index: -2;
        }
        .cloud::before, .cloud::after {
            content: '';
            background: white;
            position: absolute;
            border-radius: 50%;
        }
        .cloud1 { width: 140px; height: 50px; top: 8%; left: 5%; animation-duration: 15s; }
        .cloud1::before { width: 60px; height: 60px; top: -25px; left: 25px; }
        .cloud1::after { width: 50px; height: 50px; top: -15px; left: 70px; }
        
        .cloud2 { width: 110px; height: 40px; top: 20%; right: 5%; animation-duration: 11s; animation-delay: -3s; transform: scale(0.8); }
        .cloud2::before { width: 45px; height: 45px; top: -20px; left: 20px; }
        .cloud2::after { width: 40px; height: 40px; top: -10px; left: 50px; }

        @keyframes float {
            0% { transform: translateY(0px) translateX(0px); }
            100% { transform: translateY(-15px) translateX(25px); }
        }

        /* App Layout */
        .app-container {
            width: 100%;
            max-width: 650px;
            padding: clamp(10px, 3vw, 20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        /* Header Area */
        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            margin-top: 10px;
        }

        .title {
            font-size: clamp(24px, 6vw, 36px);
            font-weight: 900;
            color: var(--white);
            -webkit-text-stroke: 2px var(--blue-shadow);
            text-shadow: 0px 4px 0px var(--blue-shadow);
            letter-spacing: 1.5px;
        }

        /* Controls & Buttons */
        .mode-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            width: 100%;
            justify-content: center;
        }

        .mode-btn {
            flex: 1;
            max-width: 200px;
            background-color: var(--white);
            color: var(--blue);
            border: 2px solid var(--blue-shadow);
            border-bottom: 5px solid var(--blue-shadow);
            border-radius: 18px;
            padding: 10px 15px;
            font-size: clamp(14px, 3vw, 16px);
            font-weight: 800;
            cursor: pointer;
            transition: all 0.1s;
        }
        .mode-btn.active {
            background-color: var(--blue);
            color: var(--white);
            border-bottom-width: 2px;
            transform: translateY(3px);
        }

        .btn {
            background-color: var(--green);
            color: var(--white);
            border: none;
            border-bottom: 6px solid var(--green-shadow);
            border-radius: 20px;
            padding: 14px 28px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.1s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            width: 100%;
            max-width: 300px;
        }
        .btn:active {
            transform: translateY(6px);
            border-bottom-width: 0px;
            margin-bottom: 6px;
        }
        
        .btn-icon {
            padding: 10px;
            border-radius: 50%;
            border-bottom: 4px solid var(--blue-shadow);
            background-color: var(--white);
            color: var(--blue);
            border-top: none; border-left: none; border-right: none;
            cursor: pointer;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-icon:active {
            transform: translateY(4px);
            border-bottom-width: 0px;
            margin-bottom: 4px;
        }

        /* Status Banner */
        .status-container {
            background: var(--white);
            width: 100%;
            border-radius: 24px;
            padding: 12px 20px;
            text-align: center;
            box-shadow: 0 6px 0 rgba(0,0,0,0.08);
            margin-bottom: 15px;
            border: 3px solid var(--board-border);
        }
        
        .turn-indicator {
            font-size: clamp(18px, 4.5vw, 22px);
            font-weight: 800;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .turn-p1 { color: var(--yellow-shadow); }
        .turn-p2 { color: var(--pink); }
        
        .friendly-message {
            font-size: clamp(14px, 3.5vw, 16px);
            color: var(--blue);
            font-weight: 700;
            min-height: 24px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .pop-msg { transform: scale(1.15); color: var(--orange); }

        /* --- THE GRID FIX --- */
        .board {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            gap: 2px;
            background-color: var(--board-border);
            padding: 4px;
            border-radius: 16px;
            box-shadow: 0 8px 0 rgba(0,0,0,0.1);
            width: 100%;
            max-width: 550px;
            aspect-ratio: 1 / 1;
            margin-bottom: 20px;
            background-clip: padding-box;
        }

        .cell {
            background-color: var(--cell-bg);
            border-radius: 3px;
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            aspect-ratio: 1 / 1; /* Fixes distortion */
            min-width: 0;
            min-height: 0;
            overflow: hidden;
        }
        .cell:active {
            background-color: #f0f0f0;
        }
        .cell.filled { cursor: default; }
        .cell.filled:active { background-color: var(--cell-bg); }
        
        .cell.winning-cell {
            background-color: #fff4ba;
            animation: pulse-win 1s infinite alternate;
            z-index: 2;
            border-radius: 8px;
        }
        .cell.last-move::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 20%, transparent 60%);
            pointer-events: none;
            z-index: 1;
        }

        @keyframes pulse-win {
            0% { transform: scale(1); box-shadow: 0 0 0px 0px var(--yellow); }
            100% { transform: scale(1.1); box-shadow: 0 0 10px 2px var(--orange); }
        }

        .icon-container {
            width: 85%;
            height: 85%;
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.1) translateY(15px); }
            60% { opacity: 1; transform: scale(1.2) translateY(-5px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Bottom Legend and Scores */
        .legend-score-area {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 15px;
            align-items: center;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 25px;
            background: var(--white);
            padding: 12px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.08);
            border: 2px solid var(--board-border);
            width: 100%;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: clamp(14px, 3.5vw, 16px);
            color: var(--text-main);
        }
        .legend-icon { width: 24px; height: 24px; display: flex; }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            width: 100%;
        }
        .score-card {
            flex: 1;
            background: var(--white);
            padding: 12px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 6px 0 rgba(0,0,0,0.08);
            border: 2px solid var(--board-border);
            border-top: 5px solid;
        }
        .score-p1 { border-color: var(--yellow-shadow); }
        .score-p2 { border-color: var(--pink); }
        .score-draw { border-color: var(--blue); }
        
        .score-title { font-size: 12px; font-weight: 800; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; }
        .score-value { font-size: 24px; font-weight: 900; color: var(--text-main); }

        /* Enhanced Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(28, 176, 246, 0.6); /* Soft blue blur */
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-card {
            background: var(--white);
            width: 90%;
            max-width: 420px;
            border-radius: 35px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 15px 0 rgba(0,0,0,0.1), 0 20px 30px rgba(0,0,0,0.2);
            transform: translateY(60px) scale(0.8);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            border: 4px solid var(--board-border);
        }
        .modal-overlay.active .modal-card {
            transform: translateY(0) scale(1);
        }

        .modal-icon { width: 80px; height: 80px; margin: 0 auto 15px auto; }
        .modal-title { font-size: 32px; font-weight: 900; margin-bottom: 5px; }
        .modal-title.win-p1 { color: var(--yellow-shadow); }
        .modal-title.win-p2 { color: var(--pink); }
        .modal-title.draw { color: var(--blue); }

        .modal-message { font-size: 18px; font-weight: 700; color: var(--text-light); margin-bottom: 25px; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }
        .stat-item {
            background: var(--bg-light);
            padding: 12px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 700;
            color: var(--blue);
            border: 2px solid var(--blue-shadow);
        }
        .stat-item span { display: block; font-size: 22px; font-weight: 900; color: var(--text-main); margin-top: 4px;}

        /* Confetti */
        #confetti {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 90;
        }

        .svg-icon { width: 100%; height: 100%; display: block; }

    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- Duolingo style Background -->
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="landscape"></div>
    
    <canvas id="confetti"></canvas>

    <div class="app-container">
        
        <!-- Header -->
        <div class="header">
            <h1 class="title">Happy Caro</h1>
            <button class="btn-icon" id="soundBtn" aria-label="Toggle Sound">
                <!-- Speaker Icon -->
                <svg id="speakerIcon" xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                </svg>
            </button>
        </div>

        <!-- Mode Selector -->
        <div class="mode-selector">
            <button class="mode-btn active" id="btnPvP" onclick="setMode('PvP')">2 Players</button>
            <button class="mode-btn" id="btnPvC" onclick="setMode('PvC')">Play vs Bot</button>
        </div>

        <!-- Status & Messages -->
        <div class="status-container">
            <div class="turn-indicator" id="turnIndicator">
                <span class="turn-p1" id="turnText">Player 1's Turn</span>
                <div class="legend-icon" id="turnIconHolder"></div>
            </div>
            <div class="friendly-message" id="friendlyMessage">Let's Play!</div>
        </div>

        <!-- Game Board (15x15) -->
        <div class="board" id="board">
            <!-- Cells generated by JS -->
        </div>

        <!-- Legend & Scoreboard -->
        <div class="legend-score-area">
            <div class="legend">
                <div class="legend-item">
                    P1 = <div class="legend-icon" id="legendP1"></div>
                </div>
                <div class="legend-item" id="legendP2Text">
                    P2 = <div class="legend-icon" id="legendP2"></div>
                </div>
            </div>
            
            <div class="scoreboard">
                <div class="score-card score-p1">
                    <div class="score-title" id="scoreTitleP1">Player 1</div>
                    <div class="score-value" id="scoreP1">0</div>
                </div>
                <div class="score-card score-draw">
                    <div class="score-title">Draw</div>
                    <div class="score-value" id="scoreDraw">0</div>
                </div>
                <div class="score-card score-p2">
                    <div class="score-title" id="scoreTitleP2">Player 2</div>
                    <div class="score-value" id="scoreP2">0</div>
                </div>
            </div>
            
            <button class="btn" id="restartBtn" style="margin-top: 15px;">Restart Game</button>
        </div>
    </div>

    <!-- End Game Modal -->
    <div class="modal-overlay" id="endModal">
        <div class="modal-card">
            <div class="modal-icon" id="modalIcon"></div>
            <h2 class="modal-title" id="modalTitle">You Win!</h2>
            <p class="modal-message" id="modalMessage">Amazing job!</p>
            
            <div class="stats-grid">
                <div class="stat-item" id="statLabelP1">P1 Score <span id="statP1Val">0</span></div>
                <div class="stat-item" id="statLabelP2">P2 Score <span id="statP2Val">0</span></div>
                <div class="stat-item">Draws <span id="statDraw">0</span></div>
                <div class="stat-item">Total <span id="statTotal">0</span></div>
            </div>
            
            <button class="btn" id="playAgainBtn" style="width: 100%;">Play Again</button>
        </div>
    </div>

    <script>
        // High Quality 3D-Glossy SVGs for kids
        const svgs = {
            player1: `
                <svg class="svg-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
                    <defs>
                        <radialGradient id="starCore" cx="40%" cy="30%" r="60%">
                            <stop offset="0%" stop-color="#fff176" />
                            <stop offset="60%" stop-color="#ffb300" />
                            <stop offset="100%" stop-color="#f57f17" />
                        </radialGradient>
                        <filter id="starShadow" x="-10%" y="-10%" width="130%" height="130%">
                            <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#b0bec5" flood-opacity="0.8"/>
                        </filter>
                    </defs>
                    <g filter="url(#starShadow)">
                        <path d="M50 8 L63 35 L93 37 L70 56 L77 85 L50 70 L23 85 L30 56 L7 37 L37 35 Z" fill="url(#starCore)" stroke="#ff8f00" stroke-width="2" stroke-linejoin="round"/>
                        <!-- Glossy highlight -->
                        <path d="M50 12 L60 33 L85 35 L65 52 C 55 45 45 45 35 52 L15 35 L40 33 Z" fill="#ffffff" opacity="0.4" />
                        <!-- Cute Face -->
                        <circle cx="38" cy="52" r="5" fill="#3e2723" />
                        <circle cx="62" cy="52" r="5" fill="#3e2723" />
                        <circle cx="40" cy="50" r="1.5" fill="#ffffff" />
                        <circle cx="64" cy="50" r="1.5" fill="#ffffff" />
                        <path d="M 45 62 Q 50 68 55 62" fill="none" stroke="#3e2723" stroke-width="3" stroke-linecap="round"/>
                        <circle cx="30" cy="58" r="4" fill="#ff5252" opacity="0.5"/>
                        <circle cx="70" cy="58" r="4" fill="#ff5252" opacity="0.5"/>
                    </g>
                </svg>
            `,
            player2: `
                <svg class="svg-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
                    <defs>
                        <radialGradient id="heartCore" cx="35%" cy="30%" r="60%">
                            <stop offset="0%" stop-color="#ff80ab" />
                            <stop offset="50%" stop-color="#ff1744" />
                            <stop offset="100%" stop-color="#d50000" />
                        </radialGradient>
                        <filter id="heartShadow" x="-10%" y="-10%" width="130%" height="130%">
                            <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#b0bec5" flood-opacity="0.8"/>
                        </filter>
                    </defs>
                    <g filter="url(#heartShadow)">
                        <path d="M50 85 C 50 85, 10 55, 10 30 C 10 12, 30 5, 50 25 C 70 5, 90 12, 90 30 C 90 55, 50 85, 50 85 Z" fill="url(#heartCore)" stroke="#b71c1c" stroke-width="2" stroke-linejoin="round"/>
                        <!-- Glossy highlight curve -->
                        <path d="M 20 30 C 20 18, 32 12, 45 22 C 30 25, 25 35, 25 45 C 22 40, 20 35, 20 30 Z" fill="#ffffff" opacity="0.6"/>
                        <!-- Cute Face -->
                        <circle cx="36" cy="42" r="5" fill="#3e2723" />
                        <circle cx="64" cy="42" r="5" fill="#3e2723" />
                        <circle cx="38" cy="40" r="1.5" fill="#ffffff" />
                        <circle cx="66" cy="40" r="1.5" fill="#ffffff" />
                        <path d="M 45 52 Q 50 58 55 52" fill="none" stroke="#3e2723" stroke-width="3" stroke-linecap="round"/>
                        <circle cx="26" cy="48" r="4" fill="#ff8a80" opacity="0.7"/>
                        <circle cx="74" cy="48" r="4" fill="#ff8a80" opacity="0.7"/>
                    </g>
                </svg>
            `,
            drawIcon: `
                <svg class="svg-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                     <circle cx="50" cy="50" r="40" fill="#ffc107" stroke="#ffa000" stroke-width="4"/>
                     <circle cx="35" cy="40" r="6" fill="#3e2723" />
                     <circle cx="65" cy="40" r="6" fill="#3e2723" />
                     <path d="M 35 65 Q 50 55 65 65" fill="none" stroke="#3e2723" stroke-width="5" stroke-linecap="round"/>
                </svg>
            `,
            soundOn: `
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
            `,
            soundOff: `
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <line x1="23" y1="1" x2="1" y2="23"></line>
                <line x1="15" y1="9" x2="21" y2="15"></line>
                <line x1="21" y1="9" x2="15" y2="15"></line>
            `
        };

        document.getElementById('legendP1').innerHTML = svgs.player1;
        document.getElementById('legendP2').innerHTML = svgs.player2;
        document.getElementById('turnIconHolder').innerHTML = svgs.player1;

        // ==========================================
        // WEB AUDIO API
        // ==========================================
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        let isSoundEnabled = true;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTone(frequency, type, duration, vol = 0.1) {
            if (!isSoundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playPopSound() {
            if (!isSoundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            // Fun bubble pop sound
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playWinSound() {
            if (!isSoundEnabled || !audioCtx) return;
            // Cheerful TADA arpeggio
            const notes = [440, 554.37, 659.25, 880];
            notes.forEach((freq, i) => {
                setTimeout(() => playTone(freq, 'sine', 0.4, 0.2), i * 120);
            });
        }

        function playDrawSound() {
            if (!isSoundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(350, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(200, audioCtx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }

        const soundBtn = document.getElementById('soundBtn');
        const speakerIcon = document.getElementById('speakerIcon');
        soundBtn.addEventListener('click', () => {
            initAudio();
            isSoundEnabled = !isSoundEnabled;
            speakerIcon.innerHTML = isSoundEnabled ? svgs.soundOn : svgs.soundOff;
        });

        // ==========================================
        // GAME LOGIC (CARO 15x15)
        // ==========================================
        const BOARD_SIZE = 15;
        const TOTAL_CELLS = BOARD_SIZE * BOARD_SIZE;
        const boardEl = document.getElementById('board');
        let cells = [];
        
        let boardState = Array(TOTAL_CELLS).fill(null);
        let currentPlayer = 'P1'; 
        let gameMode = 'PvP'; 
        let gameActive = true;
        let lastMoveIndex = -1;
        
        let scores = { P1: 0, P2: 0, Draw: 0, Total: 0 };
        
        const friendlyPhrases = ["Great move!", "Awesome!", "Keep going!", "You rock!", "Nice one!", "Wow!"];

        function createBoard() {
            boardEl.innerHTML = '';
            cells = [];
            for (let i = 0; i < TOTAL_CELLS; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleCellClick(i));
                boardEl.appendChild(cell);
                cells.push(cell);
            }
        }

        function setMode(mode) {
            gameMode = mode;
            document.getElementById('btnPvP').classList.toggle('active', mode === 'PvP');
            document.getElementById('btnPvC').classList.toggle('active', mode === 'PvC');
            
            if(mode === 'PvP') {
                document.getElementById('scoreTitleP1').textContent = "Player 1";
                document.getElementById('scoreTitleP2').textContent = "Player 2";
                document.getElementById('legendP2Text').innerHTML = `P2 = <div class="legend-icon" id="legendP2"></div>`;
            } else {
                document.getElementById('scoreTitleP1').textContent = "You";
                document.getElementById('scoreTitleP2').textContent = "Bot";
                document.getElementById('legendP2Text').innerHTML = `Bot = <div class="legend-icon" id="legendP2"></div>`;
            }
            document.getElementById('legendP2').innerHTML = svgs.player2;
            
            scores = { P1: 0, P2: 0, Draw: 0, Total: 0 };
            updateScoreBoard();
            restartGame();
        }

        function handleCellClick(index) {
            if (boardState[index] !== null || !gameActive) return;
            if (gameMode === 'PvC' && currentPlayer === 'P2') return; 
            
            initAudio();
            processMove(index);
        }

        function processMove(index) {
            boardState[index] = currentPlayer;
            const cell = cells[index];
            
            if (lastMoveIndex !== -1) {
                cells[lastMoveIndex].classList.remove('last-move');
            }
            lastMoveIndex = index;
            cell.classList.add('last-move');

            const iconDiv = document.createElement('div');
            iconDiv.className = 'icon-container';
            iconDiv.innerHTML = currentPlayer === 'P1' ? svgs.player1 : svgs.player2;
            cell.appendChild(iconDiv);
            cell.classList.add('filled');
            
            playPopSound();
            showRandomFriendlyMessage();
            
            const winningCells = checkWin(currentPlayer, index);
            if (winningCells) {
                gameActive = false;
                winningCells.forEach(i => cells[i].classList.add('winning-cell'));
                handleWin(currentPlayer);
                return;
            }

            if (!boardState.includes(null)) {
                gameActive = false;
                handleDraw();
                return;
            }

            currentPlayer = currentPlayer === 'P1' ? 'P2' : 'P1';
            updateTurnIndicator();

            if (gameMode === 'PvC' && currentPlayer === 'P2' && gameActive) {
                setTimeout(makeBotMove, 500); // Small delay for realistic feel
            }
        }

        function checkWin(player, index) {
            const r = Math.floor(index / BOARD_SIZE);
            const c = index % BOARD_SIZE;
            const dirs = [[1, 0], [0, 1], [1, 1], [1, -1]];
            
            for (let [dr, dc] of dirs) {
                let count = 1;
                let winningCells = [index];
                let blocked1 = false, blocked2 = false;

                // Positive direction
                let i = 1;
                while (true) {
                    const nr = r + dr * i;
                    const nc = c + dc * i;
                    if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) { 
                        blocked1 = true; break; 
                    }
                    const nIdx = nr * BOARD_SIZE + nc;
                    if (boardState[nIdx] === player) {
                        count++;
                        winningCells.push(nIdx);
                        i++;
                    } else if (boardState[nIdx] !== null) {
                        blocked1 = true;
                        break;
                    } else {
                        break;
                    }
                }
                
                // Negative direction
                i = 1;
                while (true) {
                    const nr = r - dr * i;
                    const nc = c - dc * i;
                    if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) { 
                        blocked2 = true; break; 
                    }
                    const nIdx = nr * BOARD_SIZE + nc;
                    if (boardState[nIdx] === player) {
                        count++;
                        winningCells.push(nIdx);
                        i++;
                    } else if (boardState[nIdx] !== null) {
                        blocked2 = true;
                        break;
                    } else {
                        break; 
                    }
                }
                
                // Rule: 5 in a row, not blocked on BOTH ends
                if (count >= 5) {
                    if (!(blocked1 && blocked2)) {
                        return winningCells;
                    }
                }
            }
            return null;
        }

        function evaluateCell(index, player) {
            let score = 0;
            const r = Math.floor(index / BOARD_SIZE);
            const c = index % BOARD_SIZE;
            const dirs = [[1, 0], [0, 1], [1, 1], [1, -1]];
            
            for (let [dr, dc] of dirs) {
                let count = 1;
                let openEnds = 0;
                
                let i = 1;
                while(true) {
                    const nr = r + dr*i, nc = c + dc*i;
                    if (nr<0 || nr>=BOARD_SIZE || nc<0 || nc>=BOARD_SIZE) break;
                    const val = boardState[nr*BOARD_SIZE+nc];
                    if (val === player) { count++; i++; }
                    else if (val === null) { openEnds++; break; }
                    else break;
                }
                i = 1;
                while(true) {
                    const nr = r - dr*i, nc = c - dc*i;
                    if (nr<0 || nr>=BOARD_SIZE || nc<0 || nc>=BOARD_SIZE) break;
                    const val = boardState[nr*BOARD_SIZE+nc];
                    if (val === player) { count++; i++; }
                    else if (val === null) { openEnds++; break; }
                    else break;
                }
                
                if (count >= 5) score += 100000;
                else if (count === 4 && openEnds === 2) score += 10000;
                else if (count === 4 && openEnds === 1) score += 1000;
                else if (count === 3 && openEnds === 2) score += 100;
                else if (count === 3 && openEnds === 1) score += 10;
                else if (count === 2 && openEnds === 2) score += 5;
            }
            return score;
        }

        function makeBotMove() {
            if (!gameActive) return;
            
            let bestScore = -1;
            let bestMoves = [];
            
            for (let i = 0; i < TOTAL_CELLS; i++) {
                if (boardState[i] === null) {
                    let score = evaluateCell(i, 'P2') + evaluateCell(i, 'P1') * 0.9;
                    if (score > bestScore) {
                        bestScore = score;
                        bestMoves = [i];
                    } else if (score === bestScore) {
                        bestMoves.push(i);
                    }
                }
            }
            
            let moveIndex = bestMoves[Math.floor(Math.random() * bestMoves.length)];
            
            if (bestScore === 0 && boardState.filter(v => v!==null).length === 0) {
                moveIndex = Math.floor(BOARD_SIZE/2) * BOARD_SIZE + Math.floor(BOARD_SIZE/2);
            } else if (bestScore === 0) {
                let empty = boardState.map((v, i) => v === null ? i : null).filter(v => v !== null);
                moveIndex = empty[Math.floor(Math.random() * empty.length)];
            }
            
            processMove(moveIndex);
        }

        function updateTurnIndicator() {
            let p1Text = gameMode === 'PvP' ? "Player 1's Turn" : "Your Turn";
            let p2Text = gameMode === 'PvP' ? "Player 2's Turn" : "Bot's Turn";
            turnText.textContent = currentPlayer === 'P1' ? p1Text : p2Text;
            turnText.className = currentPlayer === 'P1' ? "turn-p1" : "turn-p2";
            turnIconHolder.innerHTML = currentPlayer === 'P1' ? svgs.player1 : svgs.player2;
        }

        const friendlyMessage = document.getElementById('friendlyMessage');
        const turnText = document.getElementById('turnText');
        const turnIconHolder = document.getElementById('turnIconHolder');

        function showRandomFriendlyMessage() {
            const randomMsg = friendlyPhrases[Math.floor(Math.random() * friendlyPhrases.length)];
            friendlyMessage.textContent = randomMsg;
            friendlyMessage.classList.remove('pop-msg');
            void friendlyMessage.offsetWidth; 
            friendlyMessage.classList.add('pop-msg');
            setTimeout(() => friendlyMessage.classList.remove('pop-msg'), 300);
        }

        function updateScoreBoard() {
            document.getElementById('scoreP1').textContent = scores.P1;
            document.getElementById('scoreP2').textContent = scores.P2;
            document.getElementById('scoreDraw').textContent = scores.Draw;
        }

        function showModal(title, msg, type, iconSvg) {
            scores.Total++;
            
            const p1L = gameMode === 'PvP' ? "P1 Score" : "Your Score";
            const p2L = gameMode === 'PvP' ? "P2 Score" : "Bot Score";

            document.getElementById('statLabelP1').innerHTML = `${p1L} <span id="statP1Val">${scores.P1}</span>`;
            document.getElementById('statLabelP2').innerHTML = `${p2L} <span id="statP2Val">${scores.P2}</span>`;
            document.getElementById('statDraw').textContent = scores.Draw;
            document.getElementById('statTotal').textContent = scores.Total;

            const modalTitle = document.getElementById('modalTitle');
            modalTitle.textContent = title;
            modalTitle.className = 'modal-title ' + type;
            document.getElementById('modalMessage').textContent = msg;
            document.getElementById('modalIcon').innerHTML = iconSvg;

            setTimeout(() => {
                document.getElementById('endModal').classList.add('active');
            }, 800); 
        }

        function handleWin(player) {
            scores[player]++;
            updateScoreBoard();
            playWinSound();
            friendlyMessage.textContent = "We have a winner!";
            
            let title = "";
            if (gameMode === 'PvC') {
                title = player === 'P1' ? 'You Win!' : 'Bot Wins!';
            } else {
                title = player === 'P1' ? 'Player 1 Wins!' : 'Player 2 Wins!';
            }
            
            const type = player === 'P1' ? 'win-p1' : 'win-p2';
            const iconSvg = player === 'P1' ? svgs.player1 : svgs.player2;
            const messages = ["Fantastic job!", "You are a star!", "Brilliant play!"];
            const msg = messages[Math.floor(Math.random() * messages.length)];
            
            triggerConfetti(true);
            showModal(title, msg, type, iconSvg);
        }

        function handleDraw() {
            scores.Draw++;
            updateScoreBoard();
            playDrawSound();
            friendlyMessage.textContent = "It's a draw!";
            
            triggerConfetti(false);
            showModal("It's a Tie!", "Both of you played so well!", "draw", svgs.drawIcon);
        }

        function restartGame() {
            boardState = Array(TOTAL_CELLS).fill(null);
            gameActive = true;
            currentPlayer = 'P1';
            lastMoveIndex = -1;
            
            cells.forEach(cell => {
                cell.innerHTML = '';
                cell.className = 'cell';
            });
            
            updateTurnIndicator();
            friendlyMessage.textContent = "Let's Play!";
            document.getElementById('endModal').classList.remove('active');
            stopConfetti();
        }

        document.getElementById('restartBtn').addEventListener('click', restartGame);
        document.getElementById('playAgainBtn').addEventListener('click', restartGame);

        // ==========================================
        // CUSTOM CONFETTI
        // ==========================================
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        let confettiParticles = [];
        let confettiAnimationId;
        let isConfettiActive = false;
        // Brighter Duolingo-like colors
        const colors = ['#58cc02', '#1cb0f6', '#ffc800', '#ff9600', '#ff4b4b', '#ff80ab'];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(isBig) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.size = isBig ? Math.random() * 12 + 8 : Math.random() * 6 + 4;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.speedY = Math.random() * 4 + 2;
                this.speedX = Math.random() * 5 - 2.5;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 15 - 7.5;
                this.shape = Math.random() > 0.5 ? 'circle' : 'rect';
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                this.rotation += this.rotationSpeed;
                if (this.y > canvas.height) {
                    this.y = -20;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate((this.rotation * Math.PI) / 180);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                if (this.shape === 'circle') {
                    ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
                } else {
                    ctx.rect(-this.size / 2, -this.size / 2, this.size, this.size);
                }
                ctx.fill();
                ctx.restore();
            }
        }

        function triggerConfetti(isWin) {
            isConfettiActive = true;
            confettiParticles = [];
            const count = isWin ? 200 : 60; 
            for (let i = 0; i < count; i++) {
                confettiParticles.push(new Particle(isWin));
            }
            animateConfetti();
        }

        function animateConfetti() {
            if (!isConfettiActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            confettiParticles.forEach(p => {
                p.update();
                p.draw();
            });
            confettiAnimationId = requestAnimationFrame(animateConfetti);
        }

        function stopConfetti() {
            isConfettiActive = false;
            cancelAnimationFrame(confettiAnimationId);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            confettiParticles = [];
        }

        createBoard();

    </script>
</body>
</html>
